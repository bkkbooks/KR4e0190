front:
  text: 重刋荆川先生文集卷之二詩
  hash: sha256:7915a10edb3212191078ed4e989e21f02a3c49ea18be1cb8d15f3263463ef66d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_002-1a}
body:
  text: 庚子歲海印寺再舉同年㑹紀事四首此下係春坊時作伐木張新燕攀鱗憶往時重來散花處更是聚星期玉佩皆鵷侣金河即鳯池獨憐丘壑質還復接芳儀淨院早凉生佳賔四座傾花間重識面塔裏舊題名對酒憐萍跡聞歌想鹿鳴十年還此㑹那得更無情故遊經繡陌𥘉地入松屝可那看花伴年年漸覺稀一鐘收宿雨雙樹帶餘暉若問龍池劫誰能不醉歸𣑽宫鄰帝苑長此集儒紳檻外諸天界尊前四海人星霜别後鬢花月向來春且共攄籌䇿雲臺早致身得薛君所寄三游紀興刻中有楊方洲見懷之作蓋别去已十餘年矣撫卷慨然用韻奉答昔抗萬言疏還歸四壁居誼才應共惜黯戅更無如顧爾猶巖壑慚豫濫石渠聖明思直諫早晚下徴書送黃翠巖赴松江推官任君本儒家子新詩更出竒自宜金馬署暫拜爽鳩司海國收魚稻桑田賦繭絲南州饒土物勉爾一無私送沈君守寧波五馬去䟃𧽼孤城積水含地收蚶蛤稅人與龍蛇參夷貢珠頻入仙書穴可探清貧君已慣海味不須甘送陸舍人調遼府長史十載紫薇郎長隨玉輦傍忽辭漢天子去謁諸侯王夢渚陪游獵蘭臺佐羽觴子虛今在楚作賦有輝光送王舍人往崑山為顧相公營墓明主敦耆老藏山借寵恩使臣出左掖祕器給東園舊路吳中樹新碑海上原平津衆賔客試問幾人存聞石屋彭君置生棺有感為賦四詩青山結净因回首跡俱陳司馬四壁宅榮期百歲身文犧幸知免行蟻待相親試料還真後誰為倚户人隱几嗒然安疑君是鶡冠道書肘後繫人世鏡中看家本無千橘生常卧一棺不因兹下淚任爾雍門彈苦欲辭簮紱歸來掩故園無過六百石只對五千言倚樹看蜩化逢人笑舌存老龍且莫去為我發狂論吾與爾皆夢相看一笑時拘拘亦何惡役役尚如斯藂桂山中約枯槎海上期胡為更羈緤有愧故八知寺中訪後渠崔侍郎不遇次韻為訪高人館聮鑣出近坰並從金地入不見玉山形榻尚留仙麈雲疑隔使星無人問竒字載酒只空亭濟上别錢副使木落村逾逈洲回水更包亂泉舂急峽短日漾寒郊問俗非吾土逢君似舊交笑談方此始何事又相拋點蒼山歌贈雪屏趙考功點蒼山十九峯峯峯巧削玉芙蓉炎天赤日雪不融峯頂湧出十九泉一峯一泉相縈纒流到峯前共一川雪花亂落緑波裏疊島連洲鏡中起是為巨海名西洱蒙舍當年控百蠻山水中間鑿兩關一夫守此百不攀聖代垂裳九夷附此地千秋罷烽戍洱海行人日夜渡剪除蓬藋疏街衢歌鍾綺衣盈路隅昔日不毛今雄都山中雞犬散不取山下烏蠻種禾黍况乃儒風似鄒魯紛紛犀象走王庭怪石亦具山水形盡輦中州作畫屏羡君結廬山之窟窗裏諸峯互出沒夜夜讀書常映雪十年簮笏繫朝班位高官要身不閒惟有清夢到故山余亦平生好竒者一說名山心若灑何時與君共坐雪峯下李中麓文選藏書歌中麓子最好竒平生苦心只自知破冢將尋姬氏籍鑿山欲出禹王碑鳥篆蚪文焚後字白雲黃竹刪前詩藏在隂崖及海窟神物守護誰得窺自從掇取歸君屋但聞胡山鬼夜哭汗牛詎止盈五車插駕應知滿萬軸開函几席生雲烟五色紛紛耀人目家中綾綺割截盡更剪朝衣作裝束中麓子幾歲讀書長閉門自信中郎能一目還輕左氏識三墳邇來下筆作詞賦絶似先年石鼓文却憶射䇿來京國此時才士紛如雲雕龍白馬爭先後一日逢君皆閉口試問䶂鼠君已知解對黃熊誰更有共看飛騰邁等倫早排閶闔上麒麟遂令紈袴生嘆息公卿元是讀書人老大無聞豫自憐論交多愧十年前可道壯心猶未已時復從君乞一編詹府宴集奉和上宰松臯公三首祥光虹渚應玄蒼喜溢仙曹薦羽觴匙鬯萬年徴子聖股肱一德見臣良䄂携香霧東華上履曵星辰北斗旁共說疑丞歸大老競將禮樂贊靈昌御苑先春萬木蒼宫雲裊裊度瓊觴鵷班並引金貂貴鴻羽全收玉署良分日傳經清禁裏罷朝起草紫宸旁恩波忝竊安能報願祝千秋寶曆昌玉津晴望鬱蒼蒼環珮𥘉臨試紫觴並向鳯池開勝㑹早從麟角識元良衣冠逈出商巖上雨露偏承幼海旁自愧承華針未就謬將彤管奉明昌送王翰林浙江兵備副使同時詞客不如君一劍還將靜海濆雞舌舊從香署吏虎符新領伏波軍帆檣萬里輸鮫織樓閣三秋吐蜃雲自笑馮郎將白首欲從幕下䇿竒勳送鄒東郭掌南院最憐江左風流地暫作周南太史公通籍總稱鸞掖吏分曹獨向鳯臺東香携漢署沾新綬花近秦淮瞰故宫此去談經門下客幾人相對坐春風贈吳山人歸自京師山人不解機心事早歲藏珍學鹿門住傍巖崖惟四壁賦成金石幾千言偶遊卿相多懸榻歸去蓬蒿正滿園京洛豈無知已在看君終是厭煩喧贈許太宰卿家勳貴似諸袁兩世三登八座尊接席貂蟬開甲第成隂桃李在公門身延白屋頻推哺官借青宫獨拜恩天子行將問黃髮老臣何以贊嘉言宿雙塔寺林東城羅念菴誤于郭外相尋不遇有作見寄用韻奉答謾向金門學隱淪獨遊花院散凉氛諸天只在人間世並馬誰尋野外雲白日金輪臨戶映香街笙管隔墻分化城本是迷來路莫訝幽人好避群次韻贈湯將軍將軍故中山侯之孫也將軍妙算古人同料敵常如在目中鐵騎連營寒映月樓船跨海夜乘風玉門烽火今猶急桂嶺珠璣久未通却笑封侯應有種看君百戰立竒功自述此下係後家居時作秪為抽簮早歸來已四春本非食肉相猶是飯牛身負郭無新業灌園有舊鄰磯邊獨釣客隴上偶耕人相見一相笑吾今罷問津宿游塘書懷二首脉脉常多病睢睢竟寡諧鷽鳩知分量稿木任形骸蟲語喧清夜藤花媚小齊逃虛何足嘆心迹幸無乖雨過草木好夜來池館清露蟲疑燭影風樹答書聲似瓠甘無用為羶厭有名且師河上叟毋使慮營營題陳渡莊經時不到此花落遍庭蕪開館猶如客慿軒忽喪吾蝶飛看栩栩鳥喚聽烏烏便欲題丘壑于今總姓愚㞯亭遇盜次韻枕書覺已倦挺劒忽相求驚起游仙夢虛疑賈客舟齎糧十日少載槖一身浮淡泊堪為笑將何謝爾偷病中試新茶久不窺園圃多應遍落花生涯只本草歲月又新茶婚嫁身多債詩書眼尚遮病來都忘却恰似老僧伽泊舟郭外有感時旱灾甚愁多畨夜短村郭又雞鳴更聽鄰舟語行看海日生新秋河漢影竟夕桔橰聲誰能訟風伯一使甘霖傾同禇生滔徐生大復夜過城濠水榭作二首出郭即山家孤亭更水涯人開池上酌蓮吐月中花清籟微微至明河漸漸斜坐疑塵世隔雞犬亦無譁祗堪成獨往詎意得同群栁色秋將近烏啼夜欲分細吟西澗草閒誦北山文縱然逢醉尉不是故將軍時居人有訶問者游永慶寺示諸友村墟正三月春服領春風飛鳥機心外青天佛眼中觀心猶是障齊物亦非同何處參真訣顔生昔屢空題金山寺付僧惠傑四首何處尋龍藏停橈聽𣑽音中流一塔影逺樹萬家隂僧定潮來去月明江淺深試將空水相堪比慧公心隱隱帆檣外分明見法幢川光孤斷石井脉割寒江折葦僧歸渡觀潮客倚窗一窺龍女偈坐使戰心降慿虛聊騁望面面荻蘆秋坐據三生石心隨萬里流黿鼉爭出沒樓館定沉浮向夕烟氛斂珠光似可求法界元無著寥寥空水雲鐘聲潮外住佛相鏡中分經為魚龍說人將鸛鶴群慈航如可借不厭往來勤宿荆溪上塘菴述懷余向曾遊此匆匆十年矣園令還多病東方更少徒尋山只獨往到寺即吾廬酬答慙居士衣冠謝鄙儒冥心偶有㑹木榻小跏趺禪棲吾所好來往亦隨緣信宿還今夕支離又十年病身寧禮束懶性已書捐興到成開口逢人更默然海上倭方急雲中虜又侵纓冠本非分抱膝復何心樹冷秋前寺篁齊雨後林此鄉非楚澤濯足亦成吟委形堪落魄任性絶安排得失浮生夢閒忙造物差平湖踈野樹微雨寂山齊欲證空王偈猶嫌落幾階家園只百里幾月不知歸飯合山僧竈眠分漁父磯貌衰非示病才拙似忘機雖然斷葷酒不惹獨醒譏山房夜雨歇簷溜響空階叔夜惟貪睡榮趎又孰偕廢梳同祝髮厭肉類持齊轉覺人情隔岩僧却可儕登常山山亭次壁間韻二首關通百粵㑹地帶上游雄車馬年年客塵埃滚滚中憂時譏喪狗逃世托冥鴻出處將誰是徒令懷古風平生好竒士撫景氣還雄棧度盤蛇際灘行磨蟻中客心南北水世事去來鴻聞說仙山近冷然欲馭風過清溪莊值主人不在岸岸夾叢竹清溪幾許深君從城市隱余向碧山尋翳翳孤村景刁刁衆木吟還看題壁字想見閉關心題清溪莊三首贈顧副使阮生常避俗平子正歸田種秫供生事為樓佇列仙沙行隨鷺跡湖泛趂漁船月下聞高咏應多感興篇城郭往來久獨憐湖上居素封千樹橘白首一牀書山客秋分蜜溪氓夜捕魚橫金豈不貴此樂復何如地即梁鴻宅溪連范蠡湖霜天榮橘柚秋水戲鷗鳬從宦元非巧名丘亦是愚欣君遂始願繞屋樹枌榆答陳澄江僉事村居韻八首畨嫌結社閙獨往築秋場已謝二千石何須八百桑站站夕時鳥欣欣雨後秧感時聊一適不是阮生狂昔歲理人術今朝種樹書太恩畨是纍非種亦須鋤身老兼栽藥家貧待畜魚求羊還愧我肯許叩精廬酒隱君能慣青天白眼寬貌肥占道勝祿去易身安鳥跡携書對藤花倚樹看枋榆非不樂何用羡扶摶君往愜幽意吾留厭市聲園廬本相接喧寂不同情𥚹心違請謁病骨廢耘耕出處兩無著空慚大隱名城市終當徙開軒向緑疇老知學稼好窮帶著書愁野燕登蠶箔山雞雊麥秋村氓無曲調出口自成謳南國頻饑後餐麩勝酪酥比閭雖麥穗盜賊尚􅍉蒲闔室供繅繭分溝競轆轤田家莫厭苦試看荷戈夫樗散甘為笑逢迎已覺迷漸能諳豕牧寧復舞雞啼村居鄰北郭野語學東齊此是潜夫宅吾將為子題葺屋才支漏新茅不用添風清田叟鼓雨應社神籖野蔭炎還冷村醪酸亦甜高人方對卷晒麥也能兼贈王山人自笑久磷緇還真已是遲偶尋赤松子更結白雲期短褐身將老微言世莫知吾生同智北從此問無為贈山隂陳千戶病卧毗陵三首陳故毗陵人也問子來何處云從剡水隂越吟多病客吳語故鄉心尺牘人爭羡一言余所欽由來絶絃意今日為知音到處能驚座知君是姓陳小言工作賦大隱不違親倒篋酬寒士投書絶貴人吾將從汝去共醉若耶春高牙將門子何事老蓬蒿坦蕩從吾好浮沉任所遭行窮五名嶽家住一漁舠尚覺雄心在逢人脫寶刀周蓮渠以詩問病次韻詩書能作祟齒髮自多愁且效􅃮園放還同蓮社投樗材非世用藥石拙身謀脉脉淹時序空貽知已憂載疊前韻二首贈蓮渠十年不入市一飲復何愁祕籙時堪展華簮久已投只有歸田賦曾無問舍謀營營憐俗子得失盡成憂字許門生問詩從海上求養真人伴鶴寄傲屋如舟得喪驚蕉夢榮華覺梗浮邑中有耆舊應使俗回偷憲副饒湖田見過陳渡草堂賦此為贈皂帽棲遲日掩扉方灌園豈知繡斧客還過雀羅門絲繭東南急羽書邊徼繁憂時在君輩野老復何言贈郡倅綱運之子從王事秋江曉問津泛舟千里役行篋一官貧淮海雄畿服瑶琨貢國珍聖明如有問正可繪流民時江南早甚送人赴真定幕幕下繡鞍來滹沱氷未開股肱稱大郡帷幄選名才鴈起分秦塞雀棲辨魏臺雲山自可樂况得庾公陪贈馮午山提學吳俗今應變楚材昔共聞試看鑄人術豈尚雕蟲文驄馬回江樹絃歌散海雲史書徴德化更是一馮君漢史大馮君小馮君政如魯衛德化均贈吳賔湖幽棲謝俗客相對只清湖野服裁芳芰時𬞞剪緑蒲行吟向漁父著論比潜夫前洲雙白鳥識得主人無題徐君淵泉號磊磊長髯客人間久避名獨因南澗賞遂與北山盟流處玉琴響繞來茅屋清風流堪此地今古一徐生贈王思東號王君祖為中舍以兹百年感東望一欷歔氏族王孫後弓裘世澤餘時攀臯上樹獨對齊中書尚說傳竒字知君辨魯魚贈熊南沙郡倅入賀萬壽節三首去去朝元使先年漢署郎遙將華封祝再惹御爐香近侍陳鴻寶仙人捧御床試看舊朋輩多在弭貂行畫省何年别頻驚江上楓因兹萬國㑹還向五雲宫恩承天語潤班許近臣同自信真心在羞言藉子公一朝辭寵辱終歲事沉冥只可群麋鹿那能出戶庭北胡頻候月南紀正占星時火守斗長䇿須君輩將何獻帝庭壬子陸生南陽禇生滔赴試與之叙别不覺坐至夜分因作二首齒長愧一日經傳在兩生攝衣常共席連茹亦同征夜露澄杯氣秋河淡月明忘言吾已久欵欵見深情汨沒嗟來久前儒與後生爭矜腐鼠得誰逐冥鴻征默坐蛩秋語窺書螢夜明舊游看籍湜應悉此時情韓子云籍湜輩屢指教能不叛去否常山懷羅念菴本為窮幽賞非因避世氛鄉心吳水盡客路粵山分名姓休相問漁樵久作群忽思鸞掖侣日暮倚停雲壽詩早謝浮名絆生涯常宴如春來江上棹老去枕中書東郭閒居慣南榮世慮踈看君足道貌自與俗人殊董進齊壽詩自愛懸車早經今十歲餘薄遊滄海客大隱市城居坐閲人間世時翻肘後書里中問耆舊羡爾更誰如蔡南村壽詩蔡泰伯里人瀛之父我識南村叟臞然一逸民卜居三讓里擊壤百年身城府入來少桑麻樂處真一經今有子環堵豈嫌貧壽王生革母之子門生秀傳經契獨深還因飲氷志更識和丸心貧供江水饌詩獻柏舟吟古來推善養尹母復如今法慕菴六十暟之父家世法真餘清名人不如高年推亥字大隱寄㕓居逸客閒相過機心老更踈多君能教子餘慶在詩書贈徐學琴六十大復之父改歲周正月推年綘老人山田新刈秫茅屋久藏珍白雪絃中意青衫物外身贏金亦何羡有子不為貧題孤山林隱居祠二首孤山春欲半猶及見梅花笑踏王孫草言尋處士家塵心瑩水鏡野服映山霞岩壑長如此榮名豈足誇碧水年年色幽人復此遊不因同所好那得獨相求山鳥矜春語湖烟淡夕流思君忽自笑信矣一生浮嶽將軍墓二首國耻猶未雪身危亦自甘九原人不返萬壑氣長寒豈恨藏弓早終知借劍難吾生非壯士於此髮衝冠誰將三字獄墮此萬里城北望真堪淚南枝空自榮國隨身共殞相與虜俱生落日松風起猶聞劍㦸鳴吳江三忠祠祠在太湖東畔三忠伍太宰張睢陽嶽武穆也廟枕洞庭波招魂薦楚歌靈風鼠雀避落日鹿麋過東國終為沼南兵不渡河江淮形勝地保障近如何墓檟幾經秋興亡一鐲樓死應為厲鬼生肯共金酋吳越車書混江淮戰伐休幸逢全盛世此地弄扁舟松關蠡南雜詩為吳頥山副使作月出照松關松隂正滿地恐有山僧歸終夜不須閉梅塢層氷結平川積雪埋高樹無處寄幽情但到梅花塢筠徑靣靣隔深竹茅齊在何處遙聞犬吠聲試從此路去石丈自是太古人一身衣百草年年只在山憐爾亦枯槁蒼翠亭風來松濤生風去松濤罷雖非參禪客暫此學觀化㑹逺樓層樓對回溪溪邊草新緑不是傷春人聊騁千里目元陽洞混沌遇倏忽誤𬒳鑿一竅寄語談玄人此中可觀妙小虹橋採花與汲澗幽事俱在山朝向橋上去暮向橋上還迎仙館空齊寂無人草木自森蔚不因羽客遊安得有雲氣禮星臺昔在明光宫日侍北斗傍此時卧空谷頻望北斗光靈芬精舍山人愛長生辟榖亦云久何以濟朝饑紫芝大如手山田從橫亂峯裡忽此見平田不須抱甕汲自有峯頂泉山池百泉自奔注更不費疏鑿雨歇天氣清臨池看洗鶴茅亭孤亭簇群岫宴坐增悄然主人何所作多應草太玄良友軒竹里中耆舊多談笑每相聚日暮各自歸此君獨不去聽鶯閣春催金谷曉一望百花齊不作遼西夢從渠著意啼賀陳吏部父母榮贈二首歲月生涯短詩書世澤長今看墓木拱猶自𬒳恩光翠鸐裁新服丹沙駐舊容為問天書寵何如石窖封己酉八月十八日觀潮作秋空忽爾色黯黲萬竅怒號山震蕩冥冥混沌一氣來游人共指潮頭上𥘉時映海色尚微及至摧山力漸壯􅐓洞吳越懼一壑幻戲人獸驚殊狀滿空烟霧走玉龍萬里川源豗白象雷鼓鞺鞳馮夷舞日車出沒鮫綃漾海神珍寶不自惜歲與江妃一相餉須臾漲盡勢稍歇依然宇宙回清亮昔人說此已愈疾何况臨流恣踈放賀金翁夫婦雙壽詩翁舉人子韶庠生子聲之父也金家兄弟早空群倚馬便作萬言文玉樹輝輝照前後弱冠英名在人口黌舍同遊愧我先相見每稱吾小友曾說而翁好避喧隱身西郭如鄉村一生愛誦逺公偈纍歲不識縣令門夫婦齊年人共羡九月開筵對歸鴈請看二子接翅飛好將文繡作斑衣題贈喬僉事兼為乃翁封君壽使君昂藏關西客弱冠聲名已籍籍著書每欲凖盤誥作賦時能擲金石為郎幾歲歷金華還聞建節度褒斜錦水秋霜看避馬杜陵春草正思家君家住近谷口東而翁亦有子真風游宦勿言親舍逺金牛元自接秦中希周兄八十三十年前事未遙兄時鄉杖我垂髫豈識負剱從長者惟解戲雞逐馬誇輕蹻三十年後事已更驚看鏡裡白髭生問兄何為却少壯應是黃金鑄已成石湖王傅辱觀拙集見贈長句二十三韻奉答一首少年文苑恣搜集每得異書心喜懌或時一日來束閣輒覺無聊少顔色偶熟草木鳥獸經充貢王廷叨簡迪眉目可醜非世用依然歸來事藿食荒廬四壁豈嫌陋敝帚千金徒自嚇不能屈蠖事深藏尚爾雕蟲餘故習苦思疾書寒燈伴微吟骨立長松側言語能工詫鸚鵡心田耳穢驚狐蜮已知壯夫决不為況有良朋相羽翼㫪陵無極只一語此是尼山真血脉汙背幾枉過一生焚棄筆硯甘守黑回頭可笑瓿堪覆後生謬謂玄非白秪合篋笥掩瑕垢誰寫竹帛露狂易雲間長史有古風三江五湖襟期隔下里因風忽傳去幸逢知音寬我責謂余朋舊往復書蠢戅頗比他山石百卅餘言拜嘉句坐令枯槁生潤澤夫君清標逺俗姿矯矯忽向我前立轉覺側身感四愁何時開徑延三益東海此日多君子有如塤箎遞戞擊寄聲林莫兩楊君努力與世掃蘙塞題偶耕書屋送謝右溪西歸兼東左溪長君昔挂西曹冠青風漠漠滄江寒少君復謝薇省吏身世飄颻忽如棄歸來對坐四壁居篋中一卷種樹書誰言丘壑足枯稿折腰昔日今何如五月黃梅雨茅屋麥苗滿田蠶上族童稚欣欣笑相語但免饑寒百事足吳國樗生少好游三仕無成感四休巳道栖栖非我事將從沮溺問良謀題夏中書畫竹古來畫竹多少人葉葉枝枝輳成幅獨有中書似老文解道胸中有成竹辛苦欲得此君意屢歲清齊斷葷肉偶然興到始一灑萬壑寒聲忽滿屋秋殺春生併一時幾株抽葉幾株秃披紛蛇蠖爭屈伸數寸巳覺千尋足中書醉墨滿人間此幅風神更不俗勸君風雨好收拾葛陂恐與蛟龍逐卓小仙草書歌莆守寄我卓仙書北窗閒佇時玩展吳人本慣見龍蛇對此真形驚走轉瓌譎東海黃公符蒼古太廟姫王瑑曲處素娥欹舞腰徑來壯夫摐狼銑藤纒老樹千尺挂鷹攫寒崖百鳥愞巳覺人間出草聖却訝空中墮雲篆古來草書誰擅場酒旭僧素頗中還漏痕叉股那足竒脫帽露頂空漫衍雖然奔放不可羈筆墨蹊徑未盡遣傳聞卓仙形貌異蓬頭濶口足爪跣胸中光怪祕不得漏泄機緘在此卷軒轅道士罵俗書寫出靈文世不辨卓仙作字不用手唐生識字亦非眼說到手眼兩忘處作者識者俱一莞幾時杖䇿入武夷試問仙郎叩金簡楊教師鎗歌老楊自是關東客短衣長軀棗紅面千里隨身丈八矛到處尋人鬪輕健謂余儒生頗好武一揖滚滚發美人昔日開匣時兩面含嬌自矜戲一朝委世拋珠玉獨殉此物不忍離埋沒土中幾何年大塊為工再爐鞴砂精永火日夜蒸噴作丹朱滿身痣中凝一點秋露珠宿世銅胎盡銷棄有如鍊骨老臞仙血肉都捐秪靈氣神物安能久藏匿化作白霓躍出地銀鏤細細髲髢縈瓜皮津津流水漬山人何處得此寶王孫逺自夷門寄良工為我重開闢一鈎剖出千齡閟𥘉時混沌蟠玄黃倐忽晦明分面背清輝逼人心髓寒驚詫蟾蜍墮簷際却憶朝朝鏡裡人巳謂衰容止如是今朝覽鏡咄自驚短髮絲絲見凋敝濕灰餘色轉分明皺縠新紋大髣佛雲臺勳業巳如夢名山著書安可冀本欣始識真面目回首壯心一憔悴照罷還如未照時好醜依然都不記峩嵋道人拳歌浮屠善幻多技能少林拳法世希有道人更自出新竒乃是深山白猿授是日茆堂秋氣高霜薄風微靜枯栁忽然竪髮一頓足崖石迸裂驚砂走去來星女擲靈梭夭矯天魔翻翠䄂舑舕含沙鬼戲人髬䰄磨牙贙捕獸形人自詫我無形或將跟絓示之肘險中呈巧衆盡驚拙裡藏機人莫究漢京尋撞未趫捷海國眩人空抖擻畨身直指日車停縮首斜鑽針眼透百折連腰盡無骨一撒通身皆是手猶言技癢試賈勇低蹲更作獅子吼興䦨顧影却自惜肯使天機俱泄漏餘竒未竟已收埸鼻息無聲神氣守道人變化固不測跳上蒲團如木耦日本刀歌有客贈我日本刀魚鬚作靶青絲綆重重碧海浮渡來身上龍文雜藻荇悵然提刀起四顧白日高高天冏冏毛髮凛冽生雞皮坐失炎蒸日方永聞道倭夷𥘉鑄成幾歲埋藏擲深井日淘月煉火氣盡一片凝氷鬪清冷持此月中斫桂樹顧兔應知避光景倭夷塗刀用人血至今班點誰能整精靈長與刀相隨清宵恍見夷鬼影邇來韃靼頗驕黠昨夜三關又聞警誰能將此向龍沙奔騰一斬單于頸古來神物用有時且向囊中試韜頴劒井行時有白氣屬天仙人擲劒不記年至今光怪猶未歇薄蝕日月騰金晶青天倒挂雙白霓曾斬妖蛟帶腥氣寒泉滿甃誰敢汲只恐仙人求故物但看水底飛露靂為謝參政與槐題青白蓮畫紛紛滿眼盡紅粧忽然見此青白色並挺孤標出倫類豈特中通并外直不緣太潔遭染汗自爾天然去雕飾西山賊夫斷煙火南州高士力稼穡對花疑是此二人良工託物象其德寫貞直欲空諸相詎肯輕著一點墨世人只將肉眼看道是紅粧正堪玩金陵謝兄善識花每對此花再三嘆謝兄卓犖不俗狀已有聲名動藩翰願言永保金石心不負此花長作伴悼僕鈕才昨日裝書書滿箱恰如鳥盡良弓藏臼中餘藥正在搗猶似平生事未了幻泡本是無常期咄哉一病不周時游塘風冷白楊樹堪記年年課租處重刋荆川先生文集卷之二
