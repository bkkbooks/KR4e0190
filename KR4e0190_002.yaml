front:
  text: 重刋荆川先生文集卷之二詩
  hash: sha256:7915a10edb3212191078ed4e989e21f02a3c49ea18be1cb8d15f3263463ef66d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_002-1a}
body:
  text: 庚子歳海印寺再舉同年㑹紀事四首此下係春坊時作伐木張新燕攀鱗憶徃時重來散花處更是聚星期玉佩皆鵷侣金河即鳯池獨憐丘壑質還復接芳儀浄院早凉生佳賔四座傾花間重識面塔裏舊題名對酒憐萍跡聞歌想鹿鳴十年還此㑹那得更無情故遊經繡陌𥘉地入松屝可那看花伴年年漸覺稀一鐘収宿雨雙樹帶餘暉若問龍池刼誰能不醉歸𣑽宫鄰帝苑長此集儒紳檻外諸天界尊前四海人星霜别後鬢花月向來春且共攄籌䇿雲臺早致身得薛君所寄三游紀興刻中有楊方洲見懷之作蓋别去已十餘年矣撫卷慨然用韻奉答昔抗萬言䟽還歸四壁居誼才應共惜黯戅更無如顧爾猶巖壑慚予濫石渠聖明思直諫早晚下徴書送黄翠巖赴松江推官任君本儒家子新詩更出竒自宜金馬署暫拜爽鳩司海國収魚稻桑田賦繭絲南州饒土物勉爾一無私送沈君守寜波五馬去䟃𧽼孤城積水含地収蚶蛤稅人與龍蛇參夷貢珠頻入僊書穴可探清貧君已慣海味不湏甘送陸舎人調遼府長史十載紫薇郎長隨玉輦傍忽辭漢天子去謁諸侯王夢渚陪游獵蘭臺佐羽觴子虚今在楚作賦有輝光送王舎人徃崑山爲顧相公營墓明主敦耆老藏山借寵恩使臣岀左掖秘噐給東園舊路吳中樹新碑海上原平津衆賔客試問幾人存聞石屋彭君置生棺有感爲賦四詩青山結净因囬首跡俱陳司馬四壁宅榮期百歳身文犧幸知免行蟻待相親試料還真後誰爲倚户人隱几嗒然安疑君是鶡冠道書肘後繋人世鏡中看家本無千橘生常卧一棺不因兹下淚任爾雍門彈苦欲辭簮紱歸來掩故園無過六百石只對五千言倚樹看蜩化逢人笑舌存老龍且莫去爲我發狂論吾與爾皆夢相看一笑時拘拘亦何惡役役尚如斯藂桂山中約枯槎海上期胡爲更覊緤有愧故八知寺中訪後渠崔侍郎不遇次韻為訪高人舘聮鑣出近坰並從金地入不見玉山形榻尚留僊麈雲疑隔使星無人問竒字載酒只空亭濟上别錢副使木落村逾逈洲廻水更包亂泉舂急峽短日漾寒郊問俗非吾土逢君似舊交笑談方此始何事又相抛點蒼山歌贈雪屏趙考功點蒼山十九峯峯峯巧削玉芙蓉炎天赤日雪不融峯頂湧出十九泉一峯一泉相縈纒流到峯前共一川雪花亂落緑波裏疊島連洲鏡中起是爲巨海名西洱蒙舎當年控百蠻山水中間鑿兩關一夫守此百不攀聖代垂裳九夷附此地千秋罷烽戍洱海行人日夜渡剪除蓬藋䟽街衢歌鍾綺衣盈路隅昔日不毛今雄都山中雞犬散不取山下烏蠻種禾黍况乃儒風似鄒魯紛紛犀象走王庭恠石亦具山水形盡輦中州作畫屏羡君結廬山之窟窓裏諸峯互出沒夜夜讀書常映雪十年簮笏繋朝班位高官要身不閒惟有清夢到故山余亦平生好竒者一說名山心若洒何時與君共坐雪峯下李中麓文選藏書歌中麓子最好竒平生苦心只自知破塚将㝷姬氏籍鑿山欲出禹王碑鳥篆蚪文焚後字白雲黄竹刪前詩藏在隂厓及海窟神物守護誰得窺自從掇取歸君屋但聞胡山鬼夜哭汗牛詎止盈五車挿駕應知滿萬軸開凾几席生雲烟五色紛紛耀人目家中綾綺割截盡更剪朝衣作装束中麓子幾歳讀書長閉門自信中郎能一目還輕左氏識三墳邇來下筆作詞賦絶似先年石鼓文却憶射䇿來京國此時才士紛如雲雕龍白馬争先後一日逢君皆閉口試問䶂䑕君已知解對黄熊誰更有共看飛騰邁等倫早排閶闔上麒麟遂令紈袴生嘆息公卿元是讀書人老大無聞予自憐論交多愧十年前可道壮心猶未已時復從君乞一編詹府讌集奉和上宰松臯公三首祥光虹渚應玄蒼喜溢仙曹薦羽觴匙鬯萬年徴子聖股肱一德見臣良䄂携香霧東華上履曵星辰北斗旁共說疑丞歸大老競将禮樂賛靈昌御苑先春萬木蒼宫雲裊裊度瓊觴鵷班並引金貂貴鴻羽全収玉署良分日傳經清禁裏罷朝起草紫宸旁恩波忝竊安能報願祝千秋寳暦昌玉津晴望鬱蒼蒼環珮𥘉臨試紫觴並向鳯池開勝㑹早從麟角識元良衣冠逈出商巖上雨露偏承㓜海旁自愧承華箴未就謬将彤管奉明昌送王翰林浙江兵備副使同時詞客不如君一劍還将静海濆雞舌舊從香署吏虎符新領伏波軍帆檣萬里輸鮫織樓閣三秋吐蜃雲自笑馮郎将白首欲從幕下䇿竒勲送鄒東郭掌南院最憐江左風流地蹔作周南太史公通籍總稱鸞掖吏分曹獨向鳯臺東香携漢署沾新綬花近秦淮瞰故宫此去談經門下客幾人相對坐春風贈吳山人歸自京師山人不解機心事早歳藏珍學鹿門住傍巖崖惟四壁賦成金石幾千言偶遊卿相多懸榻歸去蓬蒿正滿園京洛豈無知已在看君終是厭煩喧贈許太宰卿家勲貴似諸袁兩世三登八座尊接席貂蟬開甲第成隂桃李在公門身延白屋頻推哺官借青宫獨拜恩天子行将問黄髪老臣何以賛嘉言宿雙塔寺林東城羅念菴誤扵郭外相㝷不遇有作見寄用韻奉答謾向金門學隱淪獨遊花院散凉氛諸天只在人間世並馬誰㝷野外雲白日金輪臨戸映香街笙管隔墻分化城本是迷來路莫訝幽人好避群次韻贈湯将軍将軍故中山侯之孫也将軍妙筭古人同料敵常如在目中銕騎連營寒映月樓船跨海夜乗風玉門烽火今猶急桂嶺珠璣乆未通却笑封侯應有種看君百戰立竒功自述此下係後家居時作秪爲抽簮早歸來已四春本非食肉相猶是飯牛身負郭無新業灌園有舊鄰磯邊獨釣客隴上偶耕人相見一相笑吾今罷問津宿游塘書懷二首脉脉常多病睢睢竟寡諧鷽鳩知分量稿木任形骸虫語喧清夜藤花媚小齋逃虚何足嘆心迹幸無乖雨過草木好夜來池舘清露虫疑燭影風樹答書聲似瓠甘無用爲羶厭有名且師河上叟毋使慮營營題陳渡荘經時不到此花落徧庭蕪開舘猶如客慿軒忽喪吾蝶飛看栩栩鳥喚聽烏烏便欲題丘壑扵今總姓愚㞯亭遇盗次韻枕書覺已倦挺劒忽相求驚起游仙夢虚疑賈客舟齎糧十日少載槖一身浮澹泊堪爲笑将何謝爾偷病中試新茶乆不窺園圃多應徧落花生涯只本草歳月又新茶婚嫁身多債詩書眼尚遮病來都忘却恰似老僧伽泊舟郭外有感時旱灾甚愁多畨夜短村郭又雞鳴更聽鄰舟語行看海日生新秋河漢影竟夕桔橰聲誰能訟風伯一使甘霖傾同禇生滔徐生大復夜過城濠水榭作二首出郭即山家孤亭更水涯人開池上酌蓮吐月中花清籟㣲㣲至明河漸漸斜坐疑塵世隔雞犬亦無譁祗堪成獨徃詎意得同群栁色秋将近烏啼夜欲分細吟西澗草閒誦北山文縱然逢醉尉不是故将軍時居人有訶問者游永慶寺示諸友村墟正三月春服領春風飛鳥機心外青天佛眼中觀心猶是障齊物亦非同何處叅真訣顔生昔屢空題金山寺付僧恵傑四首何處㝷龍藏停橈聽𣑽音中流一塔影逺樹萬家隂僧定潮來去月明江淺深試将空水相堪比慧公心隱隱帆檣外分明見法幢川光孤㫁石井脉割寒江折葦僧歸渡觀潮客倚窓一窺龍女偈坐使戰心降慿虚聊騁望面面荻蘆秋坐據三生石心隨萬里流黿鼉爭出沒樓舘定沉浮向夕烟氛歛珠光似可求法界元無着寥寥空水雲鐘聲潮外住佛相鏡中分經爲魚龍說人将鸛鶴群慈航如可借不厭徃來勤宿荆溪上塘菴述懷余向曾㳺此匆匆十年矣園令還多病東方更少徒㝷山只獨徃到寺即吾廬酬答慙居士衣冠謝鄙儒冥心偶有㑹木榻小跏趺禪棲吾所好來徃亦隨縁信宿還今夕支離又十年病身寜禮束懶性已書捐興到成開口逢人更黙然海上倭方急雲中虜又侵纓冠本非分抱膝復何心樹冷秋前寺篁齊雨後林此郷非楚澤濯足亦成吟委形堪落魄任性絶安排得失浮生夣閒忙造物差平湖踈野樹㣲雨寂山齋欲證空王偈猶嫌落幾階家園只百里幾月不知歸飯合山僧竈眠分漁父磯貌衰非示病才拙似忘機雖然㫁葷酒不惹獨醒譏山房夜雨歇簷溜響空堦叔夜惟貪睡榮趎又孰偕廢梳同祝髮厭肉類持齋轉覺人情隔岩僧却可儕登常山山亭次壁間韻二首關通百粤㑹地帶上游雄車馬年年客塵埃滚滚中憂時譏䘮狗逃世托冥鴻出處将誰是徒令懷古風平生好竒士撫景氣還雄棧度盤蛇際灘行磨蟻中客心南北水世事去來鴻聞說仙山近冷然欲馭風過清溪荘值主人不在岸岸夾叢竹清溪幾許深君從城市隱余向碧山㝷翳翳孤村景刁刁衆木吟還看題壁字想見閉關心題清溪荘三首贈顧副使阮生常避俗平子正歸田種秫供生事爲樓佇列仙沙行隨鷺跡湖泛趂漁船月下聞高咏應多感興篇城郭徃來乆獨憐湖上居素封千樹橘白首一牀書山客秋分蜜溪甿夜捕魚横金豈不貴此樂復何如地即梁鴻宅溪連范蠡湖霜天榮橘柚秋水戯鷗鳬從宦元非巧名丘亦是愚欣君遂始願遶屋樹枌榆答陳澄江僉事村居韻八首畨嫌結社閙獨徃築秋塲已謝二千石何湏八百桑站站夕時鳥欣欣雨後秧感時聊一適不是阮生狂昔歳理人術今朝種樹書太恩畨是累非種亦湏鋤身老兼栽藥家貧待畜魚求羊還愧我肯許叩精廬酒隠君能慣青天白眼寛貌肥占道勝禄去易身安鳥跡携書對藤花倚樹看枋榆非不樂何用羡扶摶君徃惬幽意吾留厭市聲園廬本相接諠寂不同情𥚹心違請謁病骨廢耘耕出處兩無着空慚大隠名城市終當徙開軒向緑疇老知學稼好窮帶著書愁野燕登蚕箔山雞雊麥秋村甿無曲調出口自成謳南國頻饑後飡麩勝酪酥比閭雖麥穗盗賊尚􅍉蒲闔室供繅繭分溝競轆轤田家莫厭苦試看荷戈夫樗散甘爲笑逢迎已覺迷漸能諳豕牧寜復舞雞啼村居隣北郭野語學東齊此是潜夫宅吾将爲子題葺屋纔支漏新茅不用添風清田叟鼓雨應社神籖野蔭炎還冷村醪酸亦甜高人方對卷晒麥也能兼贈王山人自笑乆磷緇還真已是遟偶㝷赤松子更結白雲期短褐身将老㣲言世莫知吾生同智北從此問無爲贈山隂陳千戸病卧毘陵三首陳故毘陵人也問子來何處云從剡水隂越吟多病客吳語故鄉心尺牘人争羡一言余所欽由來絶絃意今日爲知音到處能驚座知君是姓陳小言工作賦大隱不違親倒篋酬寒士投書絶貴人吾将從汝去共醉若耶春高牙将門子何事老蓬蒿坦蕩從吾好浮沉任所遭行窮五名岳家住一漁舠尚覺雄心在逢人脫寳刀周蓮渠以詩問病次韻詩書能作祟齒髮自多愁且效􅃮園放還同蓮社投樗材非世用藥石拙身謀脉脉淹時序空貽知已憂載疊前韻二首贈蓮渠十年不入市一飲復何愁秘籙時堪展華簮乆已投只有歸田賦曾無問舎謀營營憐俗子得失盡成憂字許門生問詩從海上求養真人伴鶴寄傲屋如舟得䘮驚蕉夢榮華覺梗浮邑中有耆舊應使俗囬偷憲副饒湖田見過陳渡草堂賦此爲贈皂㡌棲遲日掩扉方灌園豈知繡斧客還過雀羅門絲繭東南急羽書邊徼繁憂時在君軰野老復何言贈郡倅綱運之子從王事秋江曉問津泛舟千里役行篋一官貧淮海雄畿服瑶琨貢國珍聖明如有問正可繪流民時江南早甚送人赴真定幕幕下繡鞍來滹沱氷未開股肱稱大郡帷幄選名才鴈起分秦塞雀棲辨魏臺雲山自可樂况得庾公陪贈馮午山提學吳俗今應變楚材昔共聞試看鑄人術豈尚雕虫文驄馬廻江樹絃歌散海雲史書徴德化更是一馮君漢史大馮君小馮君政如魯衛徳化均贈吳賔湖幽棲謝俗客相對只清湖野服裁芳芰時𬞞剪緑蒲行吟向漁父著論比潜夫前洲雙白鳥識得主人無題徐君淵泉號磊磊長髯客人間乆避名獨因南澗賞遂與北山盟流處玉琴響繞來茅屋清風流堪此地今古一徐生贈王思東號王君祖爲中舎以兹百年感東望一欷歔氏族王孫後弓裘世澤餘時攀臯上樹獨對齋中書尚說傳竒字知君辯魯魚贈熊南沙郡倅入賀萬壽節三首去去朝元使先年漢署郎遥将華封祝再惹御爐香近侍陳鴻寳仙人捧御床試看舊朋軰多在弭貂行畫省何年别頻驚江上楓因兹萬國㑹還向五雲宫恩承天語潤班許近臣同自信真心在羞言藉子公一朝辭寵辱終歳事沉冥只可群麋鹿那能出戸庭北胡頻候月南紀正占星時火守斗長䇿湏君軰将何獻帝庭壬子陸生南陽禇生滔赴試與之叙别不覺坐至夜分因作二首齒長愧一日經傳在兩生攝衣常共席連茹亦同征夜露澄杯氣秋河澹月明忘言吾已乆欵欵見深情汨沒嗟來乆前儒與後生争矜腐䑕得誰逐冥鴻征黙坐蛩秋語窺書螢夜明舊游看籍湜應悉此時情韓子云籍湜軰屢指教能不叛去否常山懷羅念菴本爲窮幽賞非因避世氛鄉心吳水盡客路粤山分名姓休相問漁樵乆作群忽思鸞掖侣日暮倚停雲壽詩早謝浮名絆生涯常宴如春來江上棹老去枕中書東郭閒居慣南榮世慮踈看君足道貌自與俗人殊董進齊壽詩自愛懸車早經今十歳餘薄遊滄海客大隱市城居坐閱人間世時翻肘後書里中問耆舊羡爾更誰如蔡南村壽詩蔡㤗伯里人瀛之父我識南村叟臞然一逸民卜居三讓里擊壤百年身城府入來少桑麻樂處眞一經今有子環堵豈嫌貧壽王生革母之子門生秀傳經契獨深還因飲氷志更識和丸心貧供江水饌詩獻柏舟吟古來推善養尹母復如今法慕菴六十暟之父家世法眞餘清名人不如高年推亥字大隱寄㕓居逸客閒相過機心老更踈多君能教子餘慶在詩書贈徐學琴六十大復之父改歳周正月推年綘老人山田新刈秫茅屋乆藏珍白雪絃中意青衫物外身贏金亦何羡有子不爲貧題孤山林隱居祠二首孤山春欲半猶及見梅花笑踏王孫草言㝷處士家塵心瑩水鏡野服映山霞岩壑長如此榮名豈足誇碧水年年色幽人復此遊不因同所好那得獨相求山鳥矜春語湖烟淡夕流思君忽自笑信矣一生浮岳將軍墓二首國耻猶未雪身危亦自甘九原人不返萬壑氣長寒豈恨藏弓早終知借劍難吾生非壮士於此髮衝冠誰將三字獄墮此萬里城北望真堪淚南枝空自榮國随身共殞相與虜俱生落日松風起猶聞劍㦸鳴吳江三忠祠祠在太湖東畔三忠伍太宰張睢陽岳武穆也廟枕洞庭波招魂薦楚歌靈風䑕雀避落日鹿麋過東國終爲沼南兵不渡河江淮形勝地保障近如何墓檟幾經秋興亡一鐲樓死應爲厲鬼生肯共金酋吳越車書混江淮戰伐休幸逢全盛世此地弄扁舟松關蠡南雜詩爲吳頥山副使作月出照松關松隂正滿地恐有山僧歸終夜不湏閉梅塢層氷結平川積雪埋高樹無處寄幽情但到梅花塢筠徑靣靣隔深竹茅齋在何處遥聞犬吠聲試從此路去石丈自是太古人一身衣百草年年只在山憐爾亦枯槁蒼翠亭風來松濤生風去松濤罷雖非叅禪客暫此學觀化㑹逺樓層樓對廻溪溪邊草新緑不是傷春人聊騁千里目元陽洞混沌遇儵忽誤𬒳鑿一竅寄語談玄人此中可觀妙小虹橋採花與汲澗幽事俱在山朝向橋上去暮向橋上還迎仙舘空齋寂無人草木自森蔚不因羽客遊安得有雲氣禮星臺昔在明光宫日侍北斗傍此時卧空谷頻望北斗光靈芬精舎山人愛長生辟榖亦云乆何以濟朝饑紫芝大如手山田從横亂峯裡忽此見平田不湏抱甕汲自有峯頂泉山池百泉自奔注更不費䟽鑿雨歇天氣清臨池看洗鶴茅亭孤亭簇群岫宴坐增悄然主人何所作多應草太玄良友軒竹里中耆舊多談笑毎相聚日暮各自歸此君獨不去聴鶯閣春催金谷曉一望百花齊不作遼西夢從渠着意啼賀陳吏部父母榮贈二首歳月生涯短詩書世澤長今看墓木拱猶自𬒳恩光翠鸐裁新服丹沙駐舊容爲問天書寵何如石窌封己酉八月十八日觀潮作秋空忽爾色黯黲萬竅怒號山震盪冥冥混沌一氣來游人共指潮頭上𥘉時映海色尚㣲及至摧山力漸壮􅐓洞吳越懼一壑幻戯人獸驚殊状滿空烟霧走玉龍萬里川源豗白象雷鼓鞺鞳馮夷舞日車出沒鮫綃漾海神珍寳不自惜歳與江妃一相餉湏臾漲盡勢稍歇依然宇宙囬清亮昔人說此已愈疾何况臨流恣踈放賀金翁夫婦雙壽詩翁舉人子韶庠生子聲之父也金家兄弟早空群倚馬便作萬言文玉樹輝輝照前後弱冠英名在人口黌舎同遊愧我先相見毎稱吾小友曾說而翁好避諠隱身西郭如鄉村一生愛誦逺公偈累歳不識縣令門夫婦齊年人共羡九月開筵對歸鴈請看二子接翅飛好将文繡作斑衣題贈喬僉事兼爲乃翁封君壽使君昂藏關西客弱冠聲名已籍籍著書毎欲凖盤誥作賦時能擲金石爲郎幾歳歴金華還聞建節度褒斜錦水秋霜看避馬杜陵春草正思家君家住近谷口東而翁亦有子眞風游宦勿言親舎逺金牛元自接秦中希周兄八十三十年前事未遥兄時鄉杖我垂髫豈識負剱從長者惟解戲雞逐馬誇輕蹻三十年後事已更驚看鏡裡白髭生問兄何爲却少壮應是黄金鑄已成石湖王傅辱觀拙集見贈長句二十三韻奉答一首少年文苑恣捜集每得異書心喜懌或時一日來束閣輙覺無聊少顔色偶熟草木鳥獸經充貢王廷叨簡廸眉目可醜非世用依然歸來事藿食荒廬四壁豈嫌陋敝帚千金徒自嚇不能屈蠖事深藏尚爾雕蟲餘故習苦思疾書寒燈伴㣲吟骨立長松側言語能工詫鸚鵡心田耳穢驚狐蜮已知壮夫决不爲況有良朋相羽翼㫪陵無極只一語此是尼山真血脉汙背幾枉過一生焚棄筆硯甘守黒囬頭可笑瓿堪覆後生謬謂玄非白秪合篋笥掩瑕垢誰寫竹帛露狂易雲間長史有古風三江五湖襟期隔下里因風忽傳去幸逢知音寛我責謂余朋舊徃復書惷戅頗比他山石百卅餘言拜嘉句坐令枯槁生潤澤夫君清標逺俗姿矯矯忽向我前立轉覺側身感四愁何時開徑延三益東海此日多君子有如塤箎逓戞擊寄聲林莫兩楊君努力與世掃蘙塞題偶耕書屋送謝右溪西歸兼東左溪長君昔挂西曹冠青風漠漠滄江寒少君復謝薇省吏身世飄颻忽如棄歸來對坐四壁居篋中一卷種樹書誰言丘壑足枯稿折腰昔日今何如五月黄梅雨茅屋麥苗滿田蠶上族童稚欣欣笑相語但免饑寒百事足吳國樗生少好游三仕無成感四休巳道栖栖非我事将從沮溺問良謀題夏中書畫竹古來畫竹多少人葉葉枝枝輳成幅獨有中書似老文解道胸中有成竹辛苦欲得此君意屢歳清齋㫁葷肉偶然興到始一灑萬壑寒聲忽滿屋秋殺春生併一時幾株抽葉幾株秃披紛蛇蠖爭屈伸數寸巳覺千㝷足中書醉墨滿人間此幅風神更不俗勸君風雨好収拾葛陂恐與蛟龍逐卓小仙草書歌莆守寄我卓仙書北窓閒佇時玩展吳人本慣見龍蛇對此真形驚走轉瓌譎東海黄公符蒼古太廟姫王瑑曲處素娥欹舞腰勁來壮夫摐狼銑藤纒老樹千尺挂鷹攫寒厓百鳥愞巳覺人間出草聖却訝空中墮雲篆古來草書誰擅塲酒旭僧素頗中還漏痕釵股那足竒脫㡌露頂空漫衍雖然奔放不可覊筆墨蹊徑未盡遣傳聞卓仙形貌異蓬頭濶口足爪跣胸中光恠秘不得漏洩機緘在此卷軒轅道士罵俗書寫出靈文世不辨卓仙作字不用手唐生識字亦非眼說到手眼兩忘處作者識者俱一莞幾時杖䇿入武夷試問仙郎叩金簡楊教師鎗歌老楊自是關東客短衣長軀棗紅面千里隨身丈八矛到處㝷人闘輕徤謂余儒生頗好武一揖滚滚發美人昔日開匣時兩面含嬌自矜戯一朝委世抛珠玉獨殉此物不忍離埋沒土中幾何年大塊爲工再鑪鞴砂精永火日夜蒸噴作丹朱滿身痣中凝一點秋露珠宿世銅胎盡銷棄有如鍊骨老臞仙血肉都捐秪靈氣神物安能乆藏匿化作白蜺躍出地銀鏤細細髲髢縈瓜皮津津流水漬山人何處得此寳王孫逺自夷門寄良工爲我重開闢一鈎剖出千齡閟𥘉時混沌蟠玄黄倐忽晦明分面背清輝逼人心髓寒驚詫蟾蜍墮簷際却憶朝朝鏡裡人巳謂衰容止如是今朝覽鏡咄自驚短髪絲絲見凋敝濕灰餘色轉分明皺縠新紋大髣髴雲臺勲業巳如夢名山著書安可冀本欣始識真面目囬首壮心一憔悴照罷還如未照時好醜依然都不記峩嵋道人拳歌浮屠善幻多技能少林拳法世希有道人更自岀新竒乃是深山白猿授是日茆堂秋氣高霜薄風㣲静枯栁忽然竪髮一頓足崖石迸裂驚砂走去來星女擲靈梭夭矯天魔飜翠䄂舑舕含沙鬼戯人髬䰄磨牙贙捕獸形人自詫我無形或將跟絓示之肘險中呈巧衆盡驚拙裡藏機人莫究漢京㝷撞未趫捷海國眩人空抖擻畨身直指日車停縮首斜鑚鍼眼透百折連腰盡無骨一撒通身皆是手猶言技癢試賈勇低蹲更作獅子吼興䦨顧影却自惜肯使天機俱洩漏餘竒未竟已収埸鼻息無聲神氣守道人變化固不測跳上蒲團如木耦日本刀歌有客贈我日本刀魚鬚作靶青絲綆重重碧海浮渡來身上龍文雜藻荇悵然提刀起四顧白日高高天冏冏毛髪凛冽生雞皮坐失炎蒸日方永聞道倭夷𥘉鑄成幾歳埋藏擲深井日淘月煉火氣盡一片凝氷闘清冷持此月中斫桂樹顧兎應知避光景倭夷塗刀用人血至今班點誰能整精靈長與刀相隨清宵恍見夷鬼影邇來韃靼頗驕黠昨夜三關又聞警誰能將此向龍沙奔騰一斬單于頸古來神物用有時且向囊中試韜頴劒井行時有白氣属天仙人擲劒不記年至今光恠猶未歇薄蝕日月騰金晶青天倒挂雙白蜺曾斬妖蛟帶腥氣寒泉滿甃誰敢汲只恐仙人求故物但看水底飛露靂爲謝叅政與槐題青白蓮畫紛紛滿眼盡紅粧忽然見此青白色並挺孤標出倫類豈特中通并外直不縁太㓗遭染汗自爾天然去雕飾西山賊夫㫁煙火南州高士力稼穡對花疑是此二人良工託物象其德寫貞直欲空諸相詎肯輕着一點墨世人只將肉眼看道是紅粧正堪翫金陵謝兄善識花每對此花再三嘆謝兄卓犖不俗状已有聲名動藩翰願言永保金石心不負此花長作伴悼僕鈕才昨日装書書滿箱恰如鳥盡良弓藏臼中餘藥正在搗猶似平生事未了幻泡本是無常期咄哉一病不週時游塘風冷白楊樹堪記年年課租處重刋荆川先生文集卷之二
