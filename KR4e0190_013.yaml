body:
  text: 說晉齋說并跋聖人作易以隂陽别淑慝至於晉之象曰明出地上晉夫日出於積隂之下而升於至陽之位如人之破乎障塞而極乎高明此非強徤有力者不能晉之所以次大壯也然而大壯之象以雷晉之象也以日夫雷蟄於深冬寂然無聲至於春也劃然而萬物皆鼓日麗乎天而含於地見乎南而濳乎北故其韜歛而若無所事者乃所以厚畜其力而用其壯者也君子之於學也本之以深沉有所不爲而發之以果决有所必為是以能伐其隂慝而長其陽德其於進也幾矣華子師魯以晉名其齋蓋有志於進也華子好學而謙其所蓄不以暴於人人亦不能窺也可謂近於深沉者未知其果决何如耳雖然未有畜而不能發者也余故兼大壯晉之義而爲之說師魯以晉名其齋也先君子水西先生實命之而余爲之說也亦水西實為之請後余文成而水西已不及見矣不知其有當于水西所以命師魯之意否也水西績學練故而用不究乎其才年不副乎其志式榖以似其在後之人乎顧余文何能爲師魯朂之而已鄭氏三子字說崑山鄭士魯名其三子應龍應麟應鸞而問字於余天文左為蒼龍禮家以天地温和之氣在左故坐主於左又曰君子尚左龍淵潛而天騰隂則蟄而陽則升是純於温和之氣者也故位於左為之字龍曰左卿麟有趾而以不踐草與蟲之生者為仁其在人也伐一木殺一獸不以其時則亦爲不仁觀於此義而一體萬物之心可以油然生矣為之字麟曰趾卿鸞鳥之聲和故樂家象之以恊於律吕君子載之在輿而聽焉以消其非僻躁戾之心是和氣之應也為之字鸞曰聲卿夫君子之學以求仁也仁渾然者也左者仁之嚮也趾者仁之履也聲者仁之感也所謂各指其所之也士魯嘗學魏莊渠先生而以是名其三子蓋望之以求仁之學也僧承基字說虎丘聴泉老僧以其徒承基請字於予予為之字之曰有住佛氏言無所住而生其心而予以有住字承基者無乃與經㫖相悖乎蓋不空者真空也無住者真住也是法非相則謂之無住可也是法即相則謂之有住亦可也儒者之說既曰變動不居周流六虚矣是無住也而又曰艮其止止其所也是有住也知止而后有定基也其務先明所住哉續猫相乳說猫相乳古未之有也自唐以來至今僅兩見耳然在馬北平家特以異母而乳無母之子猶曰憐其無所於乳也而乳之云耳而在博士呉君家特以二母交相爲乳焉是尤可異也夫此二者其爲和氣之致信矣余竊以爲唐德宗﨑嶇兵戈間内輯外捍合暌爲同用武功致天下之和故其爲瑞也特見于武臣之家矧今天子歛福錫極匝洽胎卵以文德致天下之和故其爲瑞也亦特見于儒臣之家然則謂其爲天下之瑞焉可也昌黎以爲一家之瑞狹矣雖然和氣之寓乎宇宙也其發也必有以起之其凝也必有以鍾之譬如醴泉朱草不擇地而出然據其所出之地固自有以鍾之也且夫武臣多懻忮喜闘而史稱北平爲將獨先拊循至殫家以賞士甘苦與同之使德宗能以武功致天下之和者北平寔多力焉其獲兹瑞也宜無足恠而呉君豈弟而不陂諸兄弟之子更相子也友譲之義信乎其家而長者之風行乎其官以能不負天子菁莪育材之意若然者其亦可謂有斯猫之誼也歟余知其獨瑞于二氏也豈其自有以鍾之歟由此言之雖謂其一家之瑞亦可也抑聞之史氏又言北平後與李抱真爲隙遂以私忿隳其前功是北平終有愧于兹瑞也巳而吳君方且益崇令德協恭僚宷以倡諸生而陶之太和則兹瑞也其將專于呉氏矣乎書以望之銘象梳銘翠則羽象有齒材之美身之否磋爲櫛髪乃理處不才鑒於此鏡銘吾杜吾德鬼神莫測有動乎中遂徴于色匪曰形模是爲心則維瞭與眊維晬與墨宜鑒於兹其永無忒銅雀硯銘昔維瓦藏歌女貯舞馬今維硯侑圖史承鉛槧嗚呼其為瓦也不知其爲硯也然則千百年之後委擲零落又安知其不復爲瓦也盖雄豪武人不得而有之子墨客卿不得而有之吾嗒然有感於物化也鼎硯銘嗤爾者謂爾無腹不可以承公餗識爾者謂爾有靈而可以辟妖精尚從我於深山之中魑魅魍魎其莫之逢半月硯銘并序月硯一吾家故物也毁於地中分焉因其形礲而爲半月者二銘曰誰謂其毀維毁乃全其全謂何不盈以弦盈則蝕晦則窮眀晦相息兩弦其中君子觀象謙謙爾躬又礲而塋之出其礏也則以爲明之半生墨而傳之含其垢也則以爲魄之半死死與生與爭於其所也其孰綱維乎此黒石硯銘硯之未琢石即是墨硯之既琢墨即是石問於道人道人守黑是亦一石是亦一墨既已爲石與墨矣而烏能辨石之與墨宛山石硯銘小引宛山石硯者硯之最下且易得者也既而山擅於鉅家工不得穴乃取故時所為碓碾磨硱者硯焉得之者艱而價亦遂高嗟乎物之貴賤何常之有哉銘曰山屬於公衆工所攻其出不窮山屬於豪封閉以牢其價乃高嗚呼碓碾磨石遂登几席亦繋其遭方硯銘汝之量足以茹垢納汗而不攖於慳也汝之守足以砥㢘峻隅而不刓於頑也盖既惠且夷可否之間也方圎硯銘惡方喜圎常物之情喜方惡圎幽人之貞皆物我之相笑無益損乎爾形小硯銘大者凝然利以居小者扁然利以行不有居者墻壁户牖誰與供十年之著述不有行者蒼山白水誰與収五嶽之精英又昔人有言一斛臭水而藏蛟龍是維㳙滴視之正黒或蟄其中忽然躍出雲滃電掣文章滿空斧硯銘謂爾為藝苑之精吾疑乎其形謂爾爲凶門之揮吾疑乎其才形則允武而才之文誰云國容可以入軍荷葉硯銘葉無染此有染葉有卷此無卷其孰知淨染之為一而卷舒之無辨也吾許女具隻眼誄王御史毅齋誄余讀毅齋公事而傷之嗟乎瑾之禍烈矣然瑾竟不能殺公于虐𦦨橫𬒳之日而公所劾侍郎某者乃能扼公於衆正彚征之後遂至擯棄以死然則柰何獨罪奄哉余既高公之節又與公之子挻相友善乃為之誄曰丙寅𥘉元是生孽牙誰爲其虺忽焉為蛇金陵鳯陽以及宫禁星隕雷撃爲國妖䜟公爲御史執法臺端謂此不言焉用豸冠披腹呌閽變豈虚來匪實不應請絶内批奄見之怒碎而投地公再上章其氣彌厲弗預爲防噬臍何益黨錮甘露豈一朝夕虎豹狺狺九關帝居獻忠不足賈禍有餘彼奄熏灼口出詔制爵人族人專行弗忌長跪者誰金玉其帶桓桓台司望塵亦拜大杖高枷惨於炮烙公竟不免筋絶骨鑠始繋詔獄免歸故郡謂奄可矣而又欲甚再加之罪百計捃摭罰米輸邊積二百石鄰貸里質猶不及額書籍亦空何况田宅害氣有盡彼奄即誅公復其官抜茅以茹臺章薦公暨劉及謝東山木齋次且其行竟终牖下繄何人斯賑而匿米公爲御史上章露詆時維秉鈞盡力以扼此士人也奄又何責在奄煽虐冤骨縱橫曷賢不及而公猶生迨奄既誅彈冠生氣曷賢不及而公以廢則奄之虐猶尚可逭彼奸之毒其誰能挽嗚呼孽狐鼫鼠何世蔑有天熒日晶潛形縮首雨晦風冥紛出為醜公也不辰獨罹其否小大徃來隂陽纒紏再拜誄公我心孔疚贊隋司徒毘陵陳侯像贊嗚呼奸雄欲發必先所忌其始或同終則必異文若于曹演芬于李雖暫相託卒繼以死法興𥘉起寔附隋室侯與同事左提右挈匪沈是同維隋之故忽圖不軌中道乖牾一賊一臣勢豈兩並非沈殺侯則侯誅沈兇數未盡侯卒就屠其身則亡義氣炳然雲頭墜矢聖所不言杜伯之事理盖有焉維侯精爽千載勿渝後有奸者視侯隂誅杭中丞雙溪像贊巋然者其位望之隆也而退然其有寒士之風也􅉳然者其若愚之容也而蔚然其爲詞人之宗也惟其呐于口而辨于文崇于位而卑其躬也是以海内操觚之士惟見公逸思麗藻之不可及而溪叟山孺惟見公悃愊眞率之可與狎而同也丁近齋叅政像贊弱冠超遷或快其早龎眉作尉或惜其遲然駟也既沈身于郎署而誼也竟墮䜛于湘湄則遲宦者不逮通顯而蚤遇者亦或數竒先生重厚長者贍于文辭盖自少傳經巳顒然而為人師乃淹蹇次且至于年五十矣則始釋屩褐而閶闔是披然自是揚聲樹績出入乎郎曹潘臬之間者二十有餘年而後返林泉以遨嬉此則屈伸倚伏之不可知而先生獨逢其時者哉古菴毛先生像贊順之昔以通家子弟日侍扵公也盖嘗見公貌古而氣清偶披圖而載拜驚面目之如生䆒公所立自堪不朽豈必恃此而後能乆惟忠信以爲基而䋲尺之是守善積扵生前譽光乎身後将使嗣子篤其孝思而郷人望之如斗則雖有像無像或像之似與不似其何足以繋公之存與否然而有慨乎老成之不可作者則未嘗不快然扵典刑之尚有嗚呼古之所謂郷先生者公其人歟公其人歟弘齋黄先生像贊弘齋公教授扵常者三年順之時在諸生中公爲人温厚平易多士樂而親之其去也空學舎而送之百里後來代公者匪人力爲威虐以漁獵肆毒於多士多士厭苦弗忍則益相與思公公自教授遷宜黄令病歸以卒始公在常時子冏寔從後二十餘年冏復來游吾常多士喜於見冏如復見公也而冏属余爲公贊余乃本多士之所以思公者為之贊而以勸夫爲儒師者曰嶺之南儒以發身江之南儒以淑人淑人維何色笑相與舎有絃歌庭無夏楚繼公者誰或肆之毒其稍不饜鞭血相屬遂令膠庠化爲圜獄不有虐者孰顯公慈匪我私公多士之思蒋雲壑像贊人見其以貲起家則以爲力田致豐而傾身交游冠盖過從則又有俠士之風人望其高冠獸𥙷則以為武人之容而丹青詞藻摸冩之工則又與墨客而爭雄蓋是數者多不能兼而足以知翁之才無所不通也王思東像贊游閒而委蛇者其世冑之餘也氷雪而婥約者其山澤之臞也尊酒竹石者其所以自放而爲逸也詩書禮法者其所以自検而為儒也然余所取於思東子者世冑而無紈綺之習臞於外而中之腴也逸而不違乎俗儒而不類乎迂者也呉南圃像贊呉生集父衆競錐刀以貨易心誰能爲譲市有還金終日執籌夜苦不足誰能為逸庭有象局其譲也逺于欺其逸也近于止嗚呼南圃可贊在此吳南洲像贊吴生槃父伯及季偕自出少同孤行亦埓克厥家匱以腴不自纎割其餘藥與粥及囹圄舟于河登溺徒贊南洲視南圃徴叔銘我非詡運使黄慎齋像贊户郎憲卿之祖嗚呼丞倅宦歸珍貝滿屋公二千石廪不贏粟郷吏跑哮亦猛于虎公官四品歛若處女倚勢浚賄沒身則止門衰祚薄亦有餘耻公没卅年淸風未已誰克嗣之不在孫子殷教官石城像贊八舉不第而貢於庠一官不試而歸於郷胡為乎其進之逡廵其所不能必者人胡爲乎退之銳果其所可必者我逡廵其進非才之病銳果其退維志之遂盖我之可必者終不以易乎人之不可必者也某教官像贊爲隱士不如爲校官爲校官不如為顯宦世人之論則然而君去彼而取此者豈其數竒則然盖君之心則亦以爲高牙大纛之榮不足以易其詩書庠序之樂詩書庠序之樂又不足以易其清泉白石之適也耶是君之所以去彼而取此也歟祭文啓聖祠祭文維公濬哲淵靜胄衍神明饘粥承家永有令名孕靈儲秀篤生聖子地維天柱頼以弗圯五帝避德三王譲功窮本反始誰爲之宗若古祭川先河後海因委遡源厥義攸在于王建極隆師象賢廢禮允興必公焉先昔也蒸嘗不出闕里今也新宫徧彼寰宇昔也二丁祀止素王今也父子爼豆兩堂兩堂伊何于泮之水儒林有輝素襟咸喜釁噐用幣兹惟一𥘉來格來歆用奠厥居仰徼神休作我士氣父教子率三綱永繋永州祭栁子厚文代父作竊惟山川之與人文同於擅天地之靈秘顧若有神物愛惜乎其間深扄固鑰而不輕以示永之山水天作地藏經幾何年埋没于灌莽蛇豕之區至公始大發其壞偉而搜剔其荒翳公之文章開陽闔隂固所自得至於縱其幽遐詭譎之觀而邃其要眇沉鬰之思則江山不爲無助而公之窮愁困阨豈造物者亦有深意盖公之自記鈷鉧小丘也嘗以賀兹丘之有遭而韓退之亦以公窮不乆斥不極或不能以文自見於世歴千載而較失得亦何尤乎偃蹇而擯棄某少而誦公之文見其模冩物状則巳爽然神遊黄山之顚冉溪之涘今來吏兹土周覽四顧而親覩其所謂廻竒獻巧者則又恍然若見乎公之文而挹其餘波之綺麗自顧樗散之才未能庶幾乎公之愚而戒貪于鼠懲猛干蛇敢不因公言以自勵睠風景之如昔想公之神恒徃來于斯地聊奠觴而陳詞尚彷彿其來至祭萬古齋文庚寅之歳余客陽羡公來顧余寔始識面識面之𥘉遂以知心朱絃白雪相與賞音惟公老成行方志古余也何人自知踈鹵豈足禆公辱公節取過則相規善則相許一日過余奉幣以告余有二子煩君教詔佛廬仙洞水曲山窈携壺擔盒與余相邀花木玲瓏禽鳥啾啁流目傾耳永日遊遨或時閉門對坐一室竒文共賞疑義與析淸言不足或繼以奕晨食相逢忽焉日昳余有所徃不告於僮僮來相㝷知必在公公命家人爲具客食家人不問知余爲客綢繆徃復踰四五年曾無一日曠不周旋公訓桐廬余赴宫寮心豈不邇其地則逢逮公解官余亦屏居握手一笑歡言如𥘉通家之誼婚媾自此公有女孫以字吾子朋友或言師生之拘公曰何傷古有蔡朱尚期白首頼公劘礪公不我留忽焉厭世属纊以前神氣清皛顧謂二子事豈有了荆溪山水昔陪公游余今復來愴公其休死生常理抑又何恠不敢負公恃此心在與公二子敢忘切磋尊聞行知矢言勿磨窀穸在兹舉我觴奠叙徃悵命公其我鑒祭萬希菴文昔夫子之有訓曰觀過以知仁求無過於過中故忠原而孝申嗟惟君之為儒宿誦習乎禮經在節哀以順變不毀性而危生胡聞訃而一慟竟疾疢乎膏盲始三日而絶漿遂五月而云亡固衷情之獨感不自知其何因雖俯就之有違亦仁可以殺身繄㗸哀而入骨諒雖死而不化命縗絰以為歛見先君於地下惟君質之敦厚宿余心之所契始吊君於由土覺形神之頓異余旣已為君而心憂君猶尚慷慨而竟氣苟一息之未亡尚前修之可冀復謂予以乆要期規我而無棄曾晤語之幾時忽憑棺而殞涕兹日月之有期從先君以即竁寄一哀以陳詞亦何盡乎余意祭白洛原文國重世臣郷推世胄兩葉八座公承其後蚤謝紈綺之習遂擅文儒之右課詞非鮑謝不談論文則漢秦是䆒爰揮霍乎藻思蔚朝華而夕秀雖字畫之細㣲亦鍾王其歩驟故白氏自尚書公以來賔客滿海内而公少年聲價遂籍籍乎人口及卅四而登第衆已謂其屈乆歴春曹與青官惟才藝之堪授忽賜玦而逺投何竒數之見遘幾逡廵乎州郡復郎署之入又晚稍遷乎璽卿近龍光於密宥謂天衢之既亨痛長駕之中覆惟令子兮承芳可謂死而不朽憶先給事之與尚書中丞兩公寔同朝而契厚及愚父子蒙先人之業復與公仕途而相邂逅禁門鐘漏幾廻聮珮而追隨郷園花月累歳慇懃乎杯酒兹就賔位而恍惚猶疑音容之在覯廼寄詞于一哀兼特牢以爲侑惟公其鑒之祭丘思菴文自余少時頗負迂僻空濶乎寥廓之翔而泥滓乎鄊人之處糠粃乎世故而蠓蠛乎禮法然間以語人則人漫不省爲何說余見世人所爲小者計刀錐之獲大者競旂常之勲粗者土偶乎衣帽履綦細者筆舌乎儒墨是非零碎乎米鹽甕盎劻勷於吊慶酒餔熬鼎旋蟻無頃時休則余亦不省為何事以是踽然四顧幾成恠人里閈之間一見吾子遂託金石以為可與同心者在古惟􅃮園生在今惟子而已自是徃還且必建燭宵必及鐘或子言而我喏或我嘲而子􅛐或談鋒競起或閴然一黙子既晲空一世而偶余余亦塊然獨居而偕子然不知者則以為吾兩人皆若狂其知者則以爲相與切劘文章砥礪節氣而已至其散髪而箕踞瞬目而跳嘯其所快然㑹意處雖余兩人亦不能自知也但覺吾見子則然見人則不然耳及余以雕蟲末技得厠聲利之塗餂腥染膏終日攅眉而子以樗櫟託跡遂志寂寞之野茹菽齒氷終日嬉嬉然子在寂寞之野而余未嘗羡子之高余渉聲利之塗而子未嘗疑我之膩以為猶是心也余以踈率果非適用屢進屢黜得返𥘉服以從子子見余且泣且笑曰不意子之能自全也自是相與過從議論如曩時而情好有加焉子自三十以外則已决意絶進取然子重㢘耻故不能妄得一錢子性高簡故又不能治生居常授書為生卒以懶罷已而賣藥為生又以懶罷而獨注意攻古文詞上摹秦漢然復以病罷棲棲環堵饘粥不聊既乃從禄仕得寜陽教諭雖非素所好然亦以謂此官可隱也盖莊生所云蒿目而憂世决性命以饕富貴此兩者皆謂之天弢而子皆解之余趣向雖與子同然能解其一而猶未能脫然於其一常以愧子而子乃更以余爲是也余近年懶病亦如子乃始不復蒿目於世而子不及見矣不知子尚以余爲是邪爲非是耶子交游甚簡然人或託以事最忠信可伏余嘗中夜與子卧偶論一二心事妻子不得聞者子曰吾恨不爲浣沙女余笑曰子之信豈待投瀬哉嗟乎自子之存吾於郷曲得友一人焉自子之沒則一人亦盡矣雖然子子桑扈也吾豈敢以慟累子之魂聊述吾兩人平生所以相與於世外者以告子嗚呼子死矣其無有發余之狂言乎雖然子有不死者其尚能聽余之狂言矣乎祭楊細林文禮郎豫孫之父禮經有兄弟越在他國而生不相識死則爲位而哭之之禮同年之誼比於兄弟惟僕與公辱同登於戊子而未嘗展賔階之儀未嘗通束修之問聞公死而哀之亦可比於兄弟不相識而哭之之禮矣乎僕雖不獲奉教於公而交於公之子祠部君祠部君尚友四方之士而尤綣綣於余盖公家庭議論不鄙夷余之故祠部君嘗自南都歸公刻期而望之過期而不至則公形之夣曰吾子留唐君所也巳而果然夫公意其子之留吾所而至於形諸夣祠部君果留吾所而至於符公之夣則公父子之於余可知矣然則公之知余非特以同年之故而余之哀公盖亦不專於以同年之故矣公博雅爲儒宜其可以俯拾青紫而竟蹶於南宫之試㢘敏爲吏宜其可以坐致通顯而卒困於州郡之職盖所謂厚積而薄發以遺其諸後宜乎禮部君之蔚爲聞人而諸子之克世其家學也然則公其可以無憾矣余之文非特以哀公其亦以慰公也夫祭孫南野太僕文代有懷翁作公之先人以侯樹勲侯雖不嗣猶大其門數世之後遂以儒顯顯惟邁跡亨衢是踐人皆謂公出自紈袴公之居官一如寒窶馬羸衣敝何履之素約巳奉法䋲地而歩問公之官囊無餘蓄問公之家亦有夏屋公瘠於官不繋其家晏嬰鉅族豆無掩猳公𥙿於家不繫其官子荆居室苟合而完刑曹郡守外臺大㒒孰云宦成節則愈確公無渝節衆有好醜一忤於世自反何疚欣然歸來燕居恂恂室無姬侍庭無雜賔尤避名勢逍遙角巾鄉人見之不知貴人余辱於公爰締婚媾婚媾則新交誼則舊兩家相望里閈之間匪朝伊夕載徃載還余厭紛囂公耽恬寂真率之會兩心莫逆方期與公共保歲寒胡奪之速忽焉盖棺公之云亡論在鄉評請祭於社曰鄉先生死而不朽公則何憾老失良朋能不我嘆表公之墓豈足彰公庶無愧詞僉言實同春還隴樹公窆有期陳此薄奠文以侑之祭胡評事省齋文嗚呼事有至急者病而需艾溺而需瓠是也然當其膏盲無虞則三年之艾等於腐草舟楫足恃則千金之瓠輕於敝箒自公之存東南承平且二百年戴白老儂不識兠鍪殳㦸爲何物縉紳學士相與弄筆墨婉孌嬉㳺而已公方且日夜經營乎縱横韜鈐之變毎賔客滿座談鋒迅發真若旗鼓相對霆雹交繳何其壮也然持三年之艾而貫於飽食徤歩之人懐千金之瓠而衒於安流穩楫之時則言者類於迂濶聴者厭其強聒一旦盗駭海隅毒滿郡國上官諸公乃始倚公以計謀而公頺乎老且病矣公旣死海氛益張謀夫喑啞于是向之婉孌嬉㳺目公為迂濶者皆凛凛愁不保其孥相與注心聚耳冀公之一強聒而不可得嗚呼此何以異於膏肓亟矣而適䘮其蓄艾中流失船而又碎其一瓠也哉其時之不遭乎公公之不遭乎時也然公之子亘公嘗教之武舉而習聞乎家庭韜鈐之說則夫效三年之用而収千金之賞又安知不在後人也耶某因祭公而叙公之存没繋乎時事者若此他可畧也惟公享之祭有懷府君文順之不孝罪惡深重居常不能承順顔色臨病不能盡心醫藥以致先考殞殁終天之痛無所復言每一哀至恨不即死早侍先考於地下行復自念先考百年門戸付托之重苟活至今顧平生頗無富貴之心年垂五十用世一念亦漸冷落不圖䘮期内外兩承朝命臣子之義不敢逡廵謹於三月間赴京顧世事之安危休戚不敢知此身之禍福利害不敢知苟時有可爲不敢不竭駑鈍之才時遇多艱不敢忘致身之義時或可退不敢昩保身之幾此先考之所以垂教而順之之所以自立者也祭祖廟文伏惟我祖宗世以忠厚傳家永嗣至我先考克繼世德而益修之順之少事先考見其孜孜惻怛雖一螻蟻草木亦不忍傷順之欽承敕命視師浙直顧生殺誅宥有天命君師在順之不敢專但念祖宗一脉之緒必不肯輕以人命易已功名至于不得已而後殺之謹此告知祖宗伏惟昭鑒祭弓矢文天實生乎五材人爰作乎五兵顧明昏之異用則或替而或興惟及逺而洞堅尤弓矢之爲利有事則以戰勝無事用諸禮義匡四方之宿心竊有冀乎斯技少多疾而未能深自慚於㳺藝屬園田之再返幸旅力之既閒謝冠簮于北闕學馳獵於南山審機括於心契獲縱送於口傳既耽玩而忘倦遂拈弄以經年頼明靈之黙贊似有牖乎余衷時絃鵠之應聲若迅呼于順風兹歳終而告成嚮明靈以徼福雙有適于力巧一無誤于手目尚進藝於德途中此心而爲鵠惟明靈其享之祭六纛司旗牌司刀之神文生者陽道殺者隂道天生天殺雖云並用而上帝好生不得已而殺之上帝不得已而以司殺之權寄之天子天子不得已而以司殺之權付之閫外之臣必不得已而後殺所以體天心也上古有罪者一人不殺則千萬人不能生故殺人所以生人也今臣獲亂兵六人實爲殺人之始敢告上帝不得已之意伏惟照鑒祭刀文嗚呼上帝厭亂此刀不敢不用上帝好生此刀不可輕用某欽承朝命給有旗牌今殺亂兵是爲用刀之始敢告司刀之神伏惟照鑒重刋荆川先生文集卷之十三
