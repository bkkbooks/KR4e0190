body:
  text: 答顧東橋少宰順之竊聞昔人以名譽不聞歸過朋友者謂其實溢乎內而譽不副之者耳非謂本無可以致譽而朋友為之賁飾以私于其好也沈別駕至辱賜手書奉亟驚愧竊不自知所以先容於左右者開亟讀之乃知以陳王二友之故眀公過信而不疑耳是二友無乃私於其好故忘其醜而飾成其所長眀公亹亹好士故博取於朋友之譽而不暇究乎其實也然在㒒何敢當也僕自為諸生時得眀公之文而讀之雖不能窺其精意然竊嚮往焉及從遊薦紳間又獲聞眀公髙誼傾海內而求士甚于士之求公且不在古人之後則心益慕之然蓄之數年而不敢通姓名于左右則亦有説夫玉工好玉則琨吾于闐之産非不欲盡而收之然有所不能收者碔砆耳瓊瑰碔砆亦莫不欲自獻于玉人之前然而有所不敢獻自知其為碔砆耳僕迂戅無能人也過不自量嘗從諸友人學為古文詩歌追琢刻鏤亦且數年然材既不近又牽于多病遂不成而罷去及屏居山林自幸尚有餘日將以遊心六籍究賢聖之述作鑒古今之沿革以進其識而淑諸身又牽於多病輒復罷去既無一成則惟欲逃虛息影以從事於莊生所謂墮體黜聰以為世間一支離之人耕食鑿飲以畢此生而不敢有覬乎其外蓋亦所自量者審也又何敢以求知於左右也哉即使朋友欲為僕文飾計亦無以過于僕之所自量者矣不知二友之所以譽僕于眀公者何語而眀公又何從而過信之也此僕之所自愧且懼而不敢當也伏惟眀公與世卷舒向也遵晦丘園時也於公一不以為損及出而秉鈞軸時也於公一不以為喜然而海內之士於公之退處則皆眷焉望其復用及其既用則皆望其秉鈞軸及公之秉鈞軸則皆欣然以喜何也僕竊觀聖人繫易于否泰初爻皆有彚征之説焉至于泰之以鄰否之疇祉則皆繫之於四四者大臣之位近君而任重者也近世之士愞熟狷巧之習日工而羔羊素絲之節或衰矣而任重之人所指以為才且賢者又往往在彼而不在此蓋士習既然而示之以好惡者則又然何怪乎靡靡一風也是以雖淸眀平泰之世而包羞匪人或不勝參錯乎其間雖否泰之幾未必繫此而士習隆汚則亦可知必有大人君子任當世之重以身範物離祉其疇以長君子之道而默消隂邪彚征之氣此海內所以致望於眀公而非眀公不能赴海內之望也則如僕僻處山林亦將拭目以觀盛德不徒為知已之私感而已迂疏病廢之人本不宜開口及世事縱言至此恃眀公之知也惶恐惶恐前辱雄文垂示此眀公所以誘誨僕者至深也謹拜教草草作載酒亭一詩用致嚮往之懷更希教之答張甬川尚書順之粗頑非畜德之器迂疏非適用之才徒以粗頑近乎質木迂疏類乎淡泊以此幸不見絶於大君子之門自入山中稍欲收斂精神擺脫習氣庶幾少有所聞以酬宿志且以不負長者拳拳教愛之至意而間靜中轉見種種欲根起滅不斷雖暫隨氣機歇息終非拔本塞源工夫益覺實病之難除實功之難進也承教中庸不可能乃在聲臭之表此喫緊要言中庸所謂無聲無臭實自戒謹不覩恐懼不聞中得之本體不落聲臭工夫不落聞見然其辨只在有欲無欲之間欲根銷盡便是戒謹恐懼雖終日酬酢云為莫非神眀妙用而未嘗涉於聲臭也欲根絲忽不盡便不是戒謹恐懼雖使棲心虛寂亦是未離乎聲臭也明公之致力於道而自得之也久矣而猶云老且望洋日有愧嘆此豈眀公之過為避讓哉蓋常存不及之心而後可以言戒謹恐懼而後可以間未萌之欲古之聖賢所以競業此心至老益強類如此也放失如順之輩竊因此更有省矣承示欲修飭武僃此明公為國家之深慮也世人作事較計成敗利鈍畏首畏尾自為之念重而任責之意踈所以弊多積於循襲而事每牽于掣肘以明公之素望與其素養居其位而行之因則因革則革誰能撓之雖然武僃其一事也昔周命周公畢公以東郊之治欲其彰善疸惡以淑人心至於世變風移而後已今之民風士習其淪胥抑可知矣而畿甸為尤甚此俗吏之所謂迂緩而有識之士所為深憂而懼無以善其後者也然而明公今日之任周畢之任也且夫東郊雖周之東都也而實染殷之餘風者也經周畢而一變其俗況南都固祖宗之所肇基而風動之者也以明公之素望與其素養居其位而行之明示好惡提醒人心而挽之禮義廉恥之域使四方之有風俗自畿甸始畿甸之有風俗自明公始非明公今日之責而誰望乎聞太夫人巳就養是明公入則承歡於內出則宣力於外其承歡於內也益所以蓄其效忠之心其宣力於外也益所以推其養志之施蓋兩不相妨而交相益也此深可為明公賀矣養齋翁考滿歸遂欲乞休但山林中得此翁於鄉俗極有益仕途中又少却此翁為可惜耳然其意已決矣趙兄相逺問書頗稀羅兄則時有書承念及敢復諸惟台照不宣又曩承手教諄切皆道義肝膈之語感幸感幸至於所論學術之虛誕與其毫釐之差則皆足以惑世而害道此切中當世學者之膏盲鄙人亦嘗深憂之而未及面請也先行其言而後從之言非君子之所急而況其誕者乎若羅兄則雖不知其近來所見與所論何如然其人平素篤行之士明公亦深知之矣承示大學小傳蓋發於􅉼養之真而多自得之説至於身心意之別以正心為主靜之學雖或異於朱傳而實合乎濂洛之微旨矣其曰正心者不屬於意不屬於身者也是心之無所發動事物未交於視聽時也斯時也心惟存其恂栗而巳凝然中居而外誘不敢千也是則然矣但不知事物既交既有視聽之時其凝然中居而外誘不敢干者與前時有異乎與前時無異乎豈所謂凝然中居者只主於靜時而為之者乎抑亦無分於動靜而皆在者乎更願教之寄劉南坦自前年奉教後每切馳情去年獲奉手教再三捧誦知愛僕之深望僕之厚未有如明公者亟欲過霅上登長者之堂一扣謝且請益焉而未果也僕稟氣素弱兼以早年馳騁於文詞技藝之域而所恃以立身者又不過強自努力於氣節行義之間其於古人性命之學蓋殊未之有見也至如所謂心似蛛絲遊碧落身如蜩甲化枯枝以耗散其精神於故𥿄間不知返者則日夜有之是以未老而病無病亦衰蓋明公之所以為僕慮者真可謂先得我心矣年近四十疾疢憂患之餘乃始稍見古人學問宗旨只在性情上理會而其要不過主靜之一言又參之養生家言所謂歸根復命云云者亦止如此是以數年來絶學捐書息遊默坐精神稍覺有收拾處然宅舍摧塌修輔為難譬如敗家蕩子早年縱浪於聲色狗馬糜費百端及至轉頭而囊篋􅑎然矣此老氏之德所以貴於早服而重積也奈何雖然程升子自言吾受氣甚弱年四十而始強七十而益精明人問之則曰吾以忘生徇欲為深恥僕誠不敢不以此自勉亦不敢負明公之愛之望也貧子元有寶珠或者只恐不轉頭耳承明公至意敢布衷曲至於凝神聚氣喫緊處長者固有經驗方容積誠面請也文從過常州僕以屏居荒村不及知知時則文從已往荆溪矣謹令人問候得在容操履杖以從與王龍溪郎中世人之不能不疑於吾輩也久矣近有士夫自浙中來者云及吾兄以佃奪之故使憲司有言且云兄以寺地據風水之勝欲作令先大夫墓地上官某人者既豫之矣而憲使持之故若此紛紛也僕聞而竊嘆以為如兄安得有此此乃傳言之誤耳不然則必俗吏欲汚衊善人託為此説就使非傳言之誤非俗吏欲汚衊善人則在兄必自有説固不敢以世人之疑吾輩者而亦疑兄姑笑而置之不欲煩諸齒頰間也既又復念以為孔子以詩禮教子而陳亢疑其異聞孟子不見儲子而屋廬子以為得間古者師友之間既洞然肝膽相信矣而亦若不免以世俗之疑相疑者何也無乃故為迂其問以剔抉聖賢之隱曲而白之於世也乎今僕幸得兄之間而可以有請安知兄之隱曲不因以白而僕亦冀有陳亢得三之喜與屋廬子之恱者乎且夫人之意兄者則曰兄之請寺是世人之請寺巳兄之徇風水是世人之徇風水巳而僕之意殊不然也夫兄爽朗超脫得之性成僕每竊嘆以為即使兄不學不知道亦當作物外髙流如弘景和靖之徒絶非食煙火輩人而或謂其請寺以自便占風水以規後蔭此真坐井之見且不足以闖兄之藩宜乎兄之不屑與較也然而兄之為是必有説也僕竊觀於兄矣惟兄篤於自信是故不為形迹之防以包荒為大是故無淨穢之擇以忠厚善世不私其身是故或與人同過而不求自異此兄之所以生深信深慕於相知者亦所以生微疑於不相知者也寺田出上官之豫何必固郤以為潔風水有事機之便何必固避以逺嫌以是闖兄或者得其藩乎然僕竊以兄之意亦稍偏矣孔子惡行怪而願人亦譏其同乎流俗合乎汙世夫曰同乎流俗則非其自流也特同之耳曰合乎汙世則非其自汚也特合之耳其設心亦豈不善而聖賢甚以為不可者其説可知也且夫本以包荒忠厚而其影或近於願人此僕之所懼也然則世人望影而疑亦何怪歟古人有放君而代之者而人不疑其富天下有放君而又反之者而人不疑其專蓋古人舉大事冒大不韙而猶不蒙人之疑如此今吾輩出格作一小事而人已群然疑之雖古今人眼孔不同計亦不應如此隔絶也毋乃不邇不殖所以自信與素信於人者有不如古人乎不顧不視不取不豫所以自信與素信於人者有不如古人乎且夫以湯之聖宜其脫然於聲色貨利之外也而秪曰不邇不殖真若聲色貨利之足以移湯而湯真若與聲色貨利之相持然若何也以尹之所樂者堯舜之道也而秪銖稱寸量於一介取豫之間若硜硜小人然者何也兄所論伊川金楪子之説以此施於點檢形迹之人則為對病要藥矣向非其人則如以蓍參治肺癰藥豈不甚美或以助穴而長病也向時諸友所處陽明老先生家事或者造為玉碗之謗此言極俚鄙可笑宜不足以紿三尺之童子然王僉事竟以此解官去有志者至今痛惜之夫毁譽利害不足計然得無吾黨亦有過乎苟非過於自信而疏於事情無乃所謂素信於人者之未至耶君子行有不得反求諸已則工夫日緊日精至於已日乃孚是人之疑我者所以精進我也兄意其以為何如然僕非敢謂此言可以少禆於兄亦將以叩兄之隱曲而得聞所未聞耳幸亮之答王南江提學奉別經年不能通一字以為率然道離合問無恙之泛語既不宜施之於兄而思竭其疲駑以效一言之獻則又茫乎其無所得故遂缺然至此又復以為既疲駑無以自效而有數字以道離合問無恙亦足以通殷勤而舒繾綣之懷不猶愈於經年無一字矣乎故於李君使者來草草作此大抵所謂率然之泛語耳然僕竊誦吾兄前後見惠兩書知吾兄痛懲既往之悔直欲洗刷腸胃不肯若世之蓋頭換面作好人者至於用心獨苦處則雖兄口不能自言而僕於筆札間亦稍窺見焉未嘗不撫然而嘆以為兄之力能自振拔如此兄之不自護如此即使僕竭其疲駑而有以自效亦何所加也人心存亡不過天理人欲之消長而理欲消長之幾不過迷悟兩字然非努力聚氣決死一戰則必不能悟或不知所戰或戰而不力則往往終其身而不悟故佛家有認賊作子與葛藤絆路之説而兵家亦曰名其為賊敵乃可滅又曰一日縱敵數世之患此佛家之可通於吾儒而治戎之道可用以治心者也儒者以交戰為子夏之病而不能戰是所以為子夏也雖顔子亦有戰矣曰不逺復夫不戰何以有復也雖天地亦有戰矣曰龍戰於野其血玄黃夫隂既疑於陽矣陽安得晏然而無戰乎惟戰而不勝故血而至於玄黃戰而勝則血可以不玄而陽可以亨也是能戰之效也今兄知所以戰戰又能力矣僕自入官得請見於當世士大夫蓋三年而後見兄一見則駭然異之而兄亦過以僕為知已夫兄雄俊之文博辨之才邁往之氣無一人不知之而獨謂僕為知巳者豈僕之知兄止於世人之所知而已也抑亦有不止於世人所知而已也僕之於兄不為不深知已然竊有少怪於兄以為世間種種嗜好凡人之所可玩可喜者多足以挂兄之胸臆而動其挹慕不捨之意此其中於心也微而不知其植根也膠而難解苟一不解則微者或橫潰而著矣根者或引蔓而枝矣就使能戒而不潰不蔓則其為力甚勞而為功亦寡譬如聚千百不逞於深叢巨莽之間按而不發而時出其一二騎以鈔於路幸不為大憂然而授首獻俘之期恐終不可冀也而況其猖蹶之不可料歟雖然兄何如人也豈敢謂其有溺於此歟或者當時年少而氣鋭以為雖小有所嗜好而固無損於吾之大者抑亦知其嗜好之不可不欲快於一鬭而以積漸消去之歟且夫以嗜好為無損者無乃不知所戰之過歟以為積漸消去者無乃戰而不力之過歟夫嗜好之中人也亦必有因必非以為漫然無所用也必以為人之資於天地間者一物不可少也孟子之書所以提挈此心者至著矣而尤著於生我所欲一篇蓋其不悟也則自宮室妻子之奉至於種種若無一焉可少者其悟也則雖簟食豆羹之切於死生若無一焉不可少者藉令有人焉始不悟而今也悟則自今日無一物不可少者而追視向時所為無一物可少者未始不啞然自笑也慵工道丏之人徼幸得十數錢則買殽市酒一醉大呌自以天下之樂莫踰於已而千金之子苦身仡仡以程錙銖日夜若不足藉令此二人易地而觀焉亦未始不啞然自笑也人之所甚愛而至不可少者莫如七尺之軀也其住於世也能泣能笑能挈能擎能徙能倚無一不能無一不有而其聚諸有以住於世也則又有修有短而卒無不腐為野土化為瓦鑠而後巳者則此七尺之軀亦終不得自有矣以其終不得自有則當其暫而有之固亦不可據而私之以為真有矣而況於種種嗜好其不如七尺之軀之不可少者又不啻千百倍歟古之聖賢所以超形氣而獨存至於同死生齊得喪漠然無一動乎其心者非誕也既悟則自知之耳如此乃可以語知性知天乃可以語謹獨誠意之學而其初必始於力戰未有不力戰而能如此者也約之嗜好更不少於兄而僕相聚時數以為言然於兄獨罕及者約之性柔須待有人夾持而兄剛果雄毅氣魄甚大始雖暫牽其必一朝躍然自脫於此無疑也顧所不知者早與不早耳今兄果然知所以戰戰而又力以自脫於此不出吾素所料者如是而又早則吾之所不能知而深為兄喜者也僕不肖聰明百不逮於兄雖僅守繩墨常恐失之兄謂我戰勝而肥今臞然故吾也此足以知戰之不勝之效矣雖然敢不勉耶幸兄常不鄙而教之僕於文字素非所長然以猥嘗受教於兄且幽居少事欲以灌園餘力時一為之又以為既樗散無所用世幸未即老死二三年之後或為天所牖使少有知識尚當托之於文字雖不敢望於行逺庶幾達鄙陋之意焉是以不能息心於此然往時朝夕於兄尚不能竊其緒論今去兄既逺誰為開之固知終必罷廢矣今往近作數篇冗散無可採至如贈彭通判與李郎中墓文亦稍見巳志故敢請教耳僕今年寓居陽羡挈妻子以行有一二童子相與講章句自以此身不量而為人師雖不責我以道而所講者章句然至於收拾放心正容謹節以率之者亦不敢不力自謂於此頗有分寸之益因是知吾兄以道為人師而所教者又非一二童子乃齊魯五六郡豪傑之士則其所以率之者宜何如而其為益又何如也然僕所謂一二童子者自章句外亦以內外輕重義利可否時時與之一談則或如鑽礦而不入僕教不過一二童子而又日夕與之處然猶如此兄雖善於作人然以一人督率五六郡之士而又不能日夕與之處則其頑然而無得於兄者固亦有之歟僕竊為兄慮也夫為此五六郡得一良師孰與為此五六郡得百十良師故為提學者莫急於凬勵學官今學官自卑其身無恥而嗜利甚矣誠欲有以凬勵之又恐非一僉事之力與三年之間所得為也奈何家父言某縣某人者在亰師百計詆兄此甚可為勇於任事者笑也然在齊東得無亦有如某者乎此在兄亦惟自信自為而已何較於彼者哉家父又言兄有薦僕之書於亰師貴人此兄之愛我甚而忘其醜也雖然僕之與兄以善交聞於人久矣兄之薦我何異於僕之自薦乎僕年來自計已熟大抵人用之不敢以隱人不用必不敢以求亦必不敢以悔終吾身而已矣然兄素已知我矣何待僕自言也在菴兄過常不及一會殊為悒怏並以相白答俞教諭得所示書知執事望我甚厚教我甚至感激感激蓋學病於博雜而量病於不廣此鄙人膏盲之證過承發藥敢不盡飲然僕之此心亦不敢不悉於執事也夫士之於世苟無志於為善則已果有志於善則世之人未嘗不欲其入於善己之善未嘗不欲與人共為之所謂衆生病即是巳病此萬物一體之心必不能自巳者也僕於甲科人才固未嘗專有眷眷搜羅之心其於岩穴之士之賢者亦何嘗敢忘相與切磋之心哉其於卑鄙齷齪越禮放法者固未嘗敢有雷同隨俗之心而其間尚可告語轉移者亦豈敢遂無憫惜愛護之心而遽疾之如讐者哉甲科之與岩穴本無㨂擇而感應則隨其所遇峻拒之與憫惜本無作好惡而曲成則因乎物情此天則不容人加減者也夫業無定習而心有轉移苟真有萬物一體之心則雖從事於舉業以進身未嘗不為義塗也若使有獨為君子之心則雖從事於飭躬勵行以退處未嘗不為利塗也經義策試之陋稍有志者莫不深病之矣雖然春誦夏弦秋禮冬書固古之舉業也固未嘗去誦與書也茍無為巳之心則弦誦禮書亦秪為千祿之具苟真有為已之心則經義策試亦自可正學以言昔人妨功奪志之辨此定論也至於以舉業為教則稍有志者亦知深病其陋矣吕伯恭以舉業教浙中而朱子以書規之伯恭答書以為若不開此一路則法堂前草深一丈僕嘗誦而竊嘆以為此極是前輩苦心非特後之人未能知雖當時同志者亦未能盡知也僕年來則巳決意絶去舉業之教矣而猶瑣瑣為執事言者蓋亦自知今之不教舉業未為脫灑而向之教舉業未為粘帶也今之不教舉業未必足以閉人之利塗而向之教舉業未必不引人一二於義塗也至於道德性命技藝之辨古人雖以六德六藝分言然德非虛器其切實應用處即謂之藝藝非粗迹其精義致用處即謂之德故古人終日從事於六藝之間非特以實用之不可缺而姑從事云耳蓋即此而鼓舞凝聚其精神堅忍操鍊其筋骨沉潛縝密其心思以類萬物而通神眀故曰灑掃應對精義入神只是一理藝之精處即是心精藝之粗處即是心粗非二致也但古人於藝以為聚精會神極深研幾之實而今人於藝則以為溺心玩物爭能好勝之具此則古與今之不同而非所以為藝與德之辨也執事所舉堯舜夫堯舜之所未聞與若罔聞云云者此道也羲和之曆象夷夔之禮樂臯之刑名至於垂工和矢伯益鳥獸孰非道哉然諸子為之而堯舜若罔聞云云者蓋君逸臣勞道則然耳若謂堯舜以道自處而以藝士諉之人何其自待者厚而待人者薄也臯以刑名自處而乃為其君陳迪德之謨夔以擊石拊石自處而乃教胄子以簡廉直溫之德性則是以藝士自處而以德望之人又何其自責之薄而責人之厚也曆象禮樂藝也修五玉如五器張施五采在璣衡獨非藝哉則堯舜亦屑屑矣孟子曰堯舜之智而不遍物急先務也若在羲和則曆象便為先務在夔則擊石拊石便為先務又安得以堯舜之所不遍者而遂不急也執事以好博雜技藝為㒒之病此則不敢不承而至於分技藝與德為兩事則辨之亦不敢以不明也蓋儒者慕古之論莫不以為必絶去舉業而後可以復古之德行道藝此則不務變更人心而務變更法度將有如王介甫所謂本欲變學究為秀才不謂變秀才為學究者矣儒者務髙之論莫不以為絶去藝事而別求之道德性命此則藝無精義而道無實用將有如佛老以道德性命為上一截色聲度數為下一截者矣是以鄙意不敢不盡於執事也雖然執事憫時病俗之意則亦深且切矣今執事固有教人之責矣今之教以舉業縱欲罷之而勢有不能即使復古之教則六藝固亦不廢執事之隱居修行㒒聞之膠陽諸兄亦久矣㒒所願執事之於諸生即舉業之中而示之以窮經反躬明理著巳之路而默消其干名好進之心則是舉業中德行道誼也即古六藝之中而引之於聚精會神極深研幾之實而默消其爭能務勝之心則是藝事中道德性命也方且順而導之正不必逆而沮之也大率今之世舉業技藝種種猶未足為心病所為心術大蠧者在於義利之辨不明執事教人欲明義利之辨則必以身率之以身率之則自取與辭受進退至於纎微必精察之果義歟利歟所取與辭受進退至於纖微盡義矣尤必精察之果有為歟無為歟一毫不自遮蔽一毫不使潛伏精神可透金石成人材動風俗之責固有在矣敢以是少效愛助之意以為執事報也無由面晤極論臨書馳懷嗣後更望時惠盡言此僕之所汲汲而求也答戚南玄來書滿𥿄無一字非膏肓之病無一字非瞑眩之藥兄之惠我極厚極厚非言可為謝也論語曰據於德遊於藝記曰德成而上藝成而下德之與藝説作一個不得説作二個不得才提起處色色總在面前才放下處了了更無一物自是人心本來之妙而不容增減也古人終日從事於琴瑟羽籥操縵安弦種種曲藝之間既云終日從事矣然特可謂之遊而不可謂之溺今之人其於琴瑟羽籥操縵安弦種種曲藝即便偶一為之則亦可謂之溺而不可謂之遊何也為其有欣猒心也為其有好醜心也為其有爭長兢短之心也欣猒心好醜心長短心此兄之所謂即是塵機也然則所謂藝成而下者非是藝病乃是心病也掃除心病用息塵機弟敢不自力以承兄之教也雖然塵機息盡渾淪道心亦願兄之無忽斯言也答王生宗道唐君誠志節之士所惜平生未與之接不能得其心胸面目之詳只是據𥿄上語套説一遍殊覺精神不暢不足以發潛德之光且如德州接遞一事乃是據宗道口説故敘事中此一段稍覺精明若使前時宗道盡將此君平生首末行事委曲口説一番或能更有發揮耳今不及矣然竹溪剛介之士其言亦自足以傳信不待豫也既已為唐君作銘為之投筆三嘆志士苦心曠世相感且唐君在當時淹蹇不得一第而老於郎署又年不滿六十其清修絶俗亦自足以結裹此身而風沒世彼世間取髙第為大官享耆壽勢力赫奕不知幾何人即其沉酣飽滿於聲利間當時莫不自以為最得意然才汲身便與臭腐糞土何異若此者其於唐君何如哉此孔子所以較量於齊景公夷齊千駟餓死之間其於提醒人心最切切也清寒之士可以無所待而自立矣宗道素有志向更願於義利緊關處極力研析使不為一切俗情所轉乃是挺挺自作豪傑亦所以不負唐君衣鉢云耳勉之勉之與唐一庵書使者來弟往洞庭歸時乃見尊柬讀罷不覺悽然之甚吾兄盛德人也造物者既窮其躬而又夭其嗣也哉為善者其亦不可以自信矣雖然自古聖賢能就人所不能就之德則必有能堪人所不能堪之情昔者卜子夏哭子喪明失之過延陵三號而行失之不及東門吳則蕩而非人情也兄篤於信道久矣試于此尋究真源則雖極哀極苦中本心了然自明所謂哀之發而中節而未嘗失其為中也寄黎知州辱來教云歆羡畔援之無也易意必固我之無也難淡泊者無所愛而自井髙明者有所主而自執此意自前人未有發之者非吾兄真實體會不能了了至此僕謹聞教矣甚幸甚幸夫粗塵細塵總來一塵心是活物周流六虛本來如是意必固我安從生哉畢竟歆羡畔援潛根內伏有纎毫洗刷不盡處也既曰意必固我矣則未可語畔援之無也僕間居自咎惜從前意向之未真覺一切妄念之為纍近來工夫惟有默默知過而巳兄所過獎令人赧然不敢當豈所謂誘之而欲其至於道也東城篤行堅至在朋友中絶少于比顧僕也淺陋何足以發潛德之光謹據狀參以同遊時所見聞從實書之不敢為諛墓之詞亦所以體東城之志也中有踈略與不當處更望痛為抹削惟吾兄勿讓與鄭淡泉文選別兄久矣僕居間無事時取晦菴先生之書讀之至答陳永嘉書義利雙行王霸並用之説不覺慨然發嘆以謂三代以下人材與三代以上劃然隔作兩截其隱微深錮之病只是如此然同甫亦是豪傑豈肯便自坐落利霸窠子裏去只緣差却些子其流遂至於此有志者真不可不愼於毫釐也試以請於兄兄試教之答洪方洲王事承示關政藹然寬恤禮讓之意至於節用惠商以身先之非吾兄雅志古道不能為此中間意有偏重處亦稍為指摘一二以復來命自嘆草野書生不能識知榷場事體終為目論耳萬不如吾兄身歷其地而斟酌之之為精也雖然山人所知者去榷場中弊病猶易去心術中弊病則難昔人謂有意為不善與有意為善皆能纍心如瓦石屑金玉屑皆能障眼惟愼獨二字是千古正法眼藏若於此參透則終日履道只是家常茶飯平平坦坦不作一毫聲色世間一切好題目惡題目皆不能纍我矣吾兄向善甚篤持身甚嚴迥在流俗之外僕一見而知敬之如瓦石屑自是不能障兄第恐所謂金玉屑者不謂無一點半點尚著眼中耳二程全書近曾留意否冬來獨居思兄為切杭城多事僕恐不能來蓋山人之道宜爾也俟面奉報與王湛泉文選兄之為文選也海內端人節士莫不張目吐氣以為三代直道復出兄之退而西歸也海內端人節士莫不悵悵然失望僕於兄之為文選也則竊與海內之士同其慶喜而於兄之退也獨不與海內之士同其悵悵者何也莊生有言風之積也不厚則其負大翼也無力水之積也不厚則其負大舟也無力後之君子道德功業不如古人正坐積之不厚發之太驟耳古人限之以四十而仕豈古人才力智慧不如今人蓋以厚積而薄試之也今兄去古人強仕之年猶未也願兄益自恢廓勿以三代以下功名為可足勿以古聖賢精一之學為不可至乘此山林多暇專精致神使反之於身心情性者益邃以精而究於古今成敗理亂之故者益練以熟積之於優遊而發之於劻勷所以任天下之重有餘裕矣豈止為今日第一文選而巳哉此僕所以不暇為兄悵悵而敢為兄賀也海內同心如兄能幾自屏歸後以兄在文選嫌不敢奉書今兄既還山又吳兾南北相去且五六千里無由一相切磋耿耿如何僕也樗散無似自別兄後毫髮無所長進惟舊來靣目兢兢不敢變壞此可用以少慰知已之懷耳至於驅馳當世非惟才有所不可抑亦性有所不宜也兄在文選時乃獨勤勤推轂故人之意則厚矣與陳後岡參議別後戀慕不捨與久病衰頽之狀大略具之葉紹興通判所寄書中今家人來亦當口能道之矣每每念昔與兄同住亰師日夕相砥淬受教不為不深且愧愚踈無以承之不謂此後渺然相隔蓋三四年而僅得一兩日之聚方其離思孤懷十未展其二三而鷁首已南矣亦何暇於吐心曲談道德以交助所不及者乎兄去閩越不知復以何時為聚首之期非惟僕蓬蒿之質不能藉直於麻中而兄之德器如玉亦不暇置諸頑石之間以自攻此其可思可悵豈特以酒食文字之故也僕嘗聞兄緒論大意以為必雜用王霸乃可以適時而濟務而僕則多執泥古方戞戞乎如以舟而行諸陸然兄既以此自信而不疑僕亦以此自膠而不悔是以自承教以來契分雖甚投而論議常至左右古人云去短集長此僕之所以不可無藉於麻中之直而兄顧亦謂有取於頑石焉其可也兄在湖藩清修之節剸繁之才自與時流迥別雖然亦願兄母見化城而遽住耳今奉去讀書記乙集一部僕意欲以此廣兄不知兄肯降心而觀焉否也僕竊謂三代人材皆從心性上磨鍊故其經綸參贊之業不出户庭而得之後世反躬之學不傳而其人所以經綸於世者率亦踈鹵求其繫國之輕重如孔明李泌陸贄之從則其於道雖未醇而本其天資之所暗合亦往往開誠而不欺恬淡而少欲其經綸雖未必盡出於道而竭其才之所及亦往往淵源而有本闊大而無漏固不可謂無其人焉而非謭謭然功名自喜者可以跋而望也蘇子有言士之不以天下之重自任久矣兄其有意乎僕居間無事欲得國朝諸名臣奏議讀之且以尚論其人與其所以經綸於世者何如顧僻處山居苦不能多致煩兄為我留意至於北宋以前諸儒解經之書世多散軼不存亦煩兄試博求之菽園雜記諸書兄向欲録一副本見與亦願兄母忘之也若夫詩辭之學則僕自知力之決不足以進此向巳告疲於兄矣兄母更以此望我俟他日有持後岡先生集示我者我當望洋而嘆或尾後作一二句跋語是則可耳兄許我以暮年買田同住之説如何如何諺云癡人前不得説夢吾巳執此作左劵矣幸兄母使我為癡人也失兄於東隅得兄於桑榆竊以為怏草􅋄白答屠漸山諭德自聞兄有疾時以為懷夏間富生于德來學每因富生問起居則知既已勿藥矣甚慰甚慰浮屠家稱缺陷世界故物忌於盈吾兄之才與其所享可謂完矣乘除消息天行則然吾兄之疾豈造物者將以是少損虧焉而大受於其後也乎兄平生意氣甚髙聰明甚慧夫髙者不可柔而雌也慧者不可藏而晦也兄罹此疾疢則寂寥枯淡之中靜思默視種種世界種種伎功無可恃不朽者必將於幻身之外別求所謂本來面目者而從事焉則兄之學將日以精而其所得於病者不既多乎此僕始為兄憂而竟為兄賀也故曰惟其病病是以不病兄勿以為濶論如何弟年來奔走荆溪今歲始買小莊去縣十四五里妻子始有定居衣食稍能自給一身幸為天地間一間人矣藥餌之暇亦欲講習故業兾少有得焉以畢宿志而海內知交皆散在四方昔人取多聞而恨於獨學之難每以為嘆而知交如兄者則尤往來於懷也向嘗託南江道此意而兄不能來僕又不能往奈何今蹉跎又經歲矣後復如何使來承委令兄祠堂文字緣㒒素病羸自鄉居以來欲節省言語文字以完心氣故凡親知之託一切謝免而吾兄數百里相命似不宜以此為解然復自念平生未獲請見於九峯先生既無以測知精神意向所在而欲為之敘論若深言之則近於諛墓之嫌淺言之則不足以發潛德而違於銘以稱美之義不滿於愛弟孝子之心是懼欲辭去則又重以違長者之命而不敢也又復自念兄之所不逺數百里而託於不文之辭者蓋以迂戅之人不能為諛其言或可以信於後來者耳今以平生未嘗請見而深言淺言兩無所措乃嚅囁而為之言是無以自信乎其心而又何以信乎其人非兄所以欲相託之意也是以敢直心而辭於將命者且其人之相知而言之足以信者則既有東郭少湖在矣幸兄亮之冬中南遊必淂登兄之堂傾寫所懷不盡與田巨山提學約之過敝邑寄到手書嘉惠多謝雅意僕自送約之至姑蘇觸暑積勞遂爾發瘧迄今伏枕未及能強起也病歸以來生平交遊一時雨散空山獨坐每每念之令人無以為懷此豈惟握手殷勤日夕之歡不能解之于心而獨學無友則昔人所以深病於孤陋也奈何近會約之稍能道吾兄所新得慰甚慰甚約之又言吾兄以好畫之故至欲手自摹拓則僕之迂滯所不能解者然吾兄專凝純靜豈謂沉溺于此或者居間無事遊息之時聊以此為戲耳僕竊謂遊藝之與玩物適情之與喪志荖別只在毫芒間如六藝皆古人養性而理心自此便可上達天德今人學射學書學數則不過武辨之粗材與胥史之末技是以戴記分為德藝上下之説而子夏亦譏其不能致逺況又不在六藝之科者乎且古之善畫不過如鄭虔王維輩何足學也況學之終身有竟不能似其一水一石者平陳履常之詩曰晚知書畫真有益却悔歲月來無多僕嘗誦而笑之以為履常知書畫之有益而為益有甚于書畫者履常不知也履常自悔其歲月之不足以給書畫而書畫祗足以縻費歲月者履常不知也吾輩年巳長大雖籠聚精神早夜矻矻從事于聖賢之後尚懼枉却此生則雖詩文與記誦便可一切罷去況更有贅日剩力為此舐筆和墨之事乎然僕聞之畫家之説亦不以舐筆和墨者之為工而必解衣盤薄之為上乃知畫家不貴能畫正在能不畫耳若此者所以凝神而不分其志也兄之畫品能通乎此則僕之所不敢知而所以諷兄者不乃為土苴末論乎幸兄一笑而擲之可也僕自別後携家至陽羡謝去世事牽纏時時閉門默坐始知平日沒于多𡵨蕩精搖神之過每讀邵子勞多未有收功處踏盡人間間路𡵨之語則憮然大悔者久之是以奕棋賦詩博聞強記皆昔所甚好或終歲不對局或經月不成一韻或數旬不展卷雖或為人所強與自強為之亦竟如嚼蠟了然絶無滋味也觀尊卷所書數作則荒落踈懶之態可盡見之僕之為此其志亦欲發憤刋落收功一源而力必不能逮也惟兄有以教之與二弟正之行者居者形迹各別然理道無二致也日用功夫無二致也汝兄在山中若不能謝遣世緣澄徹此心或止遊玩山水笑傲度日是以有限日力作却無益靡費即與在家何異汝在家若能忍節嗜欲痛割俗情振起十數年懶散氣習將精神歸併一路使讀書務為心得則與在山中何異艱哉艱哉各各弩力居常只見人過不見巳過此學者切骨病痛亦學者公共病痛此後讀書做人須苦切點檢自家病痛蓋所惡於人許多病痛若真知反身則色色有之也與薛方山郎中為别甚久可勝耿耿時迫歲暮百感俱集自惟年垂四十已蹈無聞之戒世間事既幸不復關涉一箇身子又自不能了終日碌碌竟是何事回頭一看不覺􅛐笑以此來歲更欲作一閉關之計生徒盡巳謝遣交遊亦且息絶非敢望於坐進此道亦庶幾作天地間一間人不落閙攘套中儘有受用矣康節云豈謂此身井老杇尚無間地可盤桓每誦此語悵然太息文詞技能種種與心為鬪亦從生徒交遊之例盡謝遣之盡息絶之不然猶是閙攘套子也山林之士終是入山深入林密乃是安穩地面而日侍老父必須居城中如前所説欲效古人隱身􅒡市陸沉於俗者不識能乎否耳吾兄方為時樹䇿勳名勉旃山人雖不與人間事亦當傾耳以聽下風也與張西磐尚書伏惟明公清苦之節直方之氣蓋得之天稟而孳孳好學老而彌篤此海內後生之所慕望而興焉者也人者天地之心人心原是與天同運頃刻有息則便不相似程叔子曰人不學則老而衰衛武公作抑戒使人日誦以自警其喫緊全在不愧屋漏一語是時武公年九十餘矣其學之勤而密也如是竊惟明公家居以來所以專精致神究極髙明而深入古人之閫奧者固益知非淺夫之敢窺矣北冀南吳何日得一奉教左右藉針砭以自淑耶某少頗不敢自棄今年且四十益覺進德之難此身在欲界中頭出頭沒乃知古人寡欲慎獨工夫真未敢􅋄草論也奈何奈何承命􅋄堂記久不敢虛長者數千里之托所愧文字踈陋不足以發揮道眼之所觀聊述平生自念此心通塞存放之機以就正焉而巳幸塗抹教之吾人在宇宙間不論進退隱顯自有事在成巳與成物原非兩事明公之德風于鄉而信于天下久矣鄉里後輩中有可與言者時與提撕使趨正路此亦所以接續天地間善人氣脈于無窮也何如何如風便惟不靳逺教是望與王體仁體仁與吾别且三年知工夫當更有入細處至於世路利鈍一功不足道也吾數年來日用操鍊中頗見古人學問頭腦四十年散亂精神儘從收拾自此發憤努力或可不辜負此生耳學問雖是人人本分事然非豪傑不能志非刻苦不能成當世學者悠悠只是説好看話做好看事過却一生到底終無結果可時時將忘食忘寢舊案參對便見得吾人今日工夫較古人踈密何如也如雞抱卯如龍養珠仙家煉幻形者猶然況人為真性命者乎便間聊此致愛助之意容相約過毗陵一相切磋也與王堯衢書抱病懶慢久缺書問知執事不謂我踈簡也春來卜居陽羡此中山水絶清無車馬迎送之煩出門則從二三子登山臨水歸來閉門食飲寢夢尚有餘間復稍從事於問學然詩文六藝與博雜記問昔嘗強力好之近始覺其羊棗昌歜之嗜不足飢飽千人非古人切問近思之義于是取程朱諸先生之書降心而讀焉初未嘗覺其好也讀之半月矣乃知其旨味雋咏字字發明古聖賢之藴凡天地間至精至妙之理更無一間句間語所恨資性蒙迷不能深思力踐於其言焉耳然一心好之固不敢復奪焉此類之書皆近世英敏材辨之士以為老生爛語至束閣不肯觀雖其苦心敝精於文字間而竟不免老而無所聞有可痛者僕之自陳其愚蓋過不知量亦欲執事同所嗜好也何如何如近日當事者所去取投間之臣僕巳先知其去與取之必如此矣不足為怪且平生亦頗能自為主張不敢跟人哭笑不敢以鴟鳶之所爭蝸角之所戰者以動吾心而纍吾守此亦執事所素鑒無待僕自明而猶自明云云者有説也父子至情恐以此上纍吾父之心須吾執事解喻耳當今之士隱居篤學修名砥節如湖州唐子平涼趙子輩者凡若干人㒒之駑駘十不從其二三然此輩皆淪胥流落淹滯巳十數年少者壯壯者且老以衰或餒凍無以存活又其初皆以盡力國事誤觸網而抵禁非如僕之自以私罪去也此輩尚不得為當事者所與則僕得與此輩同陸沉焉固無憾也更何有所覬乎凡人出處利鈍數固不偶始言官謬相薦時㒒固知終必且棄去以為萬一不棄去則僕之自為處亦有甚難者何也若使僕復如舊時隨逐行隊進退以旅趦趄囁嚅于明時無粟粒之輔則將毀平生而辨髦之且向惟不能為此所以井心去官而無所悔耳不然則柳士師所謂何必去父母之邦者也若使不如此而如彼守其愚戅固陋而不變恐日月漸久積嫌積忤自作禍孽更有甚於向時既不能為邯鄲之步竟當匍匐而歸耳是以中夜思之進退狼狽乃今得自脫於此固可謂之幸而不可謂之不幸也古人有言人各有能有不能懸釡帶索枯稿丘壑雖窮死而不肯悔者僕自謂能之隨逐行隊進退以旅以徼幸於衣錦乘軒之華僕非不欲勉強學焉恐竟不能也僕自生齒以來百種嗜欲頗少於人亦絶不知人間有炫耀顯赫事獨不能淡於飲食乃始痛為節損或四五日不肉食始而苦之久且井之矣間飲食於冨貴之家腥膏滿案且噦之而投筯矣所以苦身自約如此者以為既不能改于其固陋以徇時好則貧賤自是此生常事諺曰畏水者不乘橋恐其動心也且夫自處不當違其所能而強其所不能處人當成就其長而護其所短安知當事者之非深憂我乎僕幸未衰敗苟自不樹立則已耳若夫假之以二三年孜孜早夜敏行而不敢怠則子輿所謂獨善兼善與退之所謂行道為書化今傳後或者不能兩讓矣豈有不得於進又不得於退者乎執事知我故不慙大言且非此無以解吾父之懷也吾父之所以戀戀於㒒者亦非以今時富貴人望㒒也王良有言父子情深或意僕之以是為憂也而亦憂焉耳㒒固不憂也又或者以自少教之讀書不忍遽見其廢錮於聖世矣乎雖然成敗失得且當要之久逺母遽為僕戚戚也望吾執事早晚間曲為寬慰則數千里外人子懸望之心亦稍舒矣是執事之賜也客居無事二三子時時以舉業文字強相問訊亦殊妨靜坐與讀書但念此身為宇宙中人其於塵俗奔走縟禮煩儀之事既以其溷擾而獨避之于此不當更有所厭耳舍妹并甥女想皆康吉餘懷不盡生平最懶作書更懶作真書書又多差與執事書既不可假手於人又不能不差又不及更録輒以呈上并希亮之答周約菴中丞某自屏居以來自以罪隸不敢復齒於薦紳之後故居當南北孔道非逃虛者所宜遂館於陽羡山間坐此去人益逺親知往來一切罷廢雖最辱知愛如明公亦尚未能繼掃門之役以承教語敘衷曲此其懶慢之罪僕猶自知況長者乎以為宜麾而棄之矣不謂過辱記録逺勤使人且手書慰諭尚欲納僕於古人之域捧書自激竊感且嘆固知長者之度不肯輕棄一物欲曲而成之若此然來書所教尚以僕早年受知之故蓋見僕少時意氣可以竊古人之尺寸焉而未知僕今憊駑樗散雖欲比於今之人而有不逮也僕少不自揆亦嘗有四方之志而才器迂滯本不適時加以弱冠從仕重以負氣學未及成而驟試之且少年負氣不識忌諱以迂滯之氣而試未成之學重以負氣之習此其動輒罹咎也豈足怪哉猶幸免誅僇得齒編氓且少嬰疾疢三十以後齒髮漸衰委形既然志亦隨之即如讀書為文本是嗜好近或挾册讀未數行輒眊然而睡矣旬月不一御鉛墨時或為之輒終日汗漫申𥿄舐筆竟不能成十數字而遂以罷夫外則廢於親知之往來內則廢於文史之玩即此一兩事則其衰頽弛靡不比於人也可盡見矣此其意蓋欲攪形灰心自同木石豕鹿之間使宇宙廣闊著此一間人足矣淮隂南陽之事固萬不敢一冀焉至如象緯地形諸家之學如來書所稱管鄧所長亦何敢不自量而攬焉以為可幾乎且夫淮隂南陽其始皆櫝其器而不輕以試袖手而觀天下之勢如良醫之隔垣而洞五臟也故其壇而拜焉廬而顧焉則以造次一二語而圖王致伯之略遂以定況齷齪如僕輩者所謂以迂滯之器而試未成之學如弋者以百發而徼於一中故屢試屢蹶此其大巧大拙之效已見於前事矣乃欲以倦遊息機之後而自比於古人隱居求志之前雖強自鞭策固知其不類也然則明公教督之厚其何以承之甚自激也甚自愧也雖然自平居以來澄慮默觀亦既久之乃稍稍窺見古之儒者所以為學之大端竊以其實乃在於身心性情之際而不以事功技術揭耳目為也故其退藏於密者甚約其究可以窮神而立命古固有豪傑之士而不知學者衆矣是以事功流而為權計技術流而為小道凝靜致逺南陽其幾乎其雜於申韓則擇術之過也淮隂烈矣竟以矜能伐功殞其軀以輅之才局於方技僅於華駝朱建平醫相為伍鄧征西以所長濟事以所長殞身與淮隂同此數子者不可不謂豪傑之士也然其擇術則可謂不審矣僕功名韁鎖已獲斬斷至於象緯地形種種諸家之學往時亦頗嘗注心焉今盡以懶病廢竊以為絶利於百途固將籍此餘間聚精蓄力洞極本心洗濯愆過以兾收功於一原而未知竟當何如耳近來每觀伊洛之書及六經之旨覺有毫髮悟入則終日欣然忘其居之陋而形之憊也所苦習氣纒繞欲障起滅未能痛與掃除使之光大然不敢不勉焉以為古來儒者所以自淑其身之學其命脈或不外此而無有乎窮逹今古之異者也若乃進僕於抱膝髙吟之儔則心不敢當謂僕為今之腐儒鄙儒賤儒也其亦可幾乎以是少酬明公之知明公其許我乎辱愛之深故不敢隱其愚且狂也今邊陲多難兵財窘急明主側席正豪傑展效之時為社稷計維公輩一二蓍舊隆中之業是有在矣其何讓焉山壄鄙人其旴而望之矣答周七泉通判僕自來家居多是謝却一切應務或閉門讀書或宴坐山水間稍能擺脫便謂胸中無事其實種種欲根濳伏不曾露出頭面既不得頭面則不知下手著實掃除蓋悠悠之為患久矣近來乃於一切應務不敢避過始覺敗露漸多然一番敗露則一番煆鍊從此工夫頗為近實乃知濂洛主靜與教人靜坐之説亦在後人善學不然儘能誤人非特攘閙汩沒中能誤人也禪家之絶去塵緣一蒲團了却此生此所謂果哉未之難矣吾與羅兄近來工夫不得一面證奈何然此心清時未嘗不對二兄也與兩湖書兄自少才名巳滿海內而六家九流之書幾乎無所不誦莊騷太史之文亦無所不摹晝而操縱之矣即使海內奇才偉士欲傲兄以所不知而亦不能也況如僕者才至駑下向在亰師每同平涼趙景仁過兄論文久之兄慨然曰二子之言是也遂欲盡棄其舊學而更張之然當時猶謂兄之急於奬善而以口語相推云耳已而視兄之文則果脫然盡變於舊矣夫文人相傾在古則然景仁於兄未知何如也至於僕之讀書則豈能若兄之博而其為文也亦安能望如兄之古哉然兄不憚降心屈已而從之推兄是心也設使不徒用之於文而用之反躬為已之間即古人所謂勇撤臯比一變至道者在兄亦何讓乎僕未始不嘆兄之髙明不可及而亦每每惜兄有可以一變至道之力而僅用之於文也雖然此亦未有人焉以反躬為已之説而磬咳於吾兄之側耳設使有人焉以反躬為巳之説而磬咳於吾兄之側如吾二子之論文也又安知兄之不降心而從之而翻然變於其舊之之為尤速也乎又未始不自罪吾二子者不能為古人反躬為己之説以告兄而徒以文士雕蟲篆刻之論投兄之好也兄今之所謂狂者也而豁豁磊磊率情而言率情而貌言也寧觸乎人而不肯違乎心貌也寧野于文而不色乎莊其直以肆則亦古之所謂狂者也是兄有可以一變至道之力而又有狂以進道之資也兄其能無意乎然兄之意必曰吾􅊭生好適吾性而已矣吾不能為拘儒迂儒苦身縛躰如尸如齋言貌如土木人不得動搖云耳夫古之所謂儒者豈盡律以苦身縛躰如尸如齋言貌如土木人不得動搖而後可謂之為學也哉天機儘是圎活性地儘是灑落顧人情樂率易而惡拘束然人知安恣睢者之為率易矣而不知見天機者之尤為率易也人知任佚宕者之為無拘束矣而不知造性地者之尤為無拘束也人之病兄亦或以其樂率易苦拘束而僕則以為惟恐兄之不樂率易不苦拘束也如使果樂率易苦拘束也則必真求率易與無拘束之所在矣真求率易與無拘束之所在也則舍天機性地將何所求哉使兄不以㒒為迂也願繼此而更進其説也㒒自少亦頗不忍自埋沒侵尋四十更無長進惟近來山中間居體念此心於日用間覺意味比舊來頗深長耳以應酬之故亦時不免於為文每一抽思了了如見古人為文之意乃知千古作家别自有正法眼藏在蓋其首尾節奏天然之度自不可差而得意於筆墨溪徑之外則惟神解者而後可以語此近時文人説秦説漢説班説馬多是寱語耳莊定山之論文曰得乎心應乎手若輪扁之斫輪不疾不徐若伯樂之相馬非牡非牝庶足以形容其妙乎顧自以精神短少不欲更弊之於此故不能窮其妙也何時得以吾兄一面談之兄有近作可寄我兄向云家居有暇將來江東今能果此約否念菴兄時相會否弟數年間頗夢寐於江西之行今日侍家君百里之外亦無意矣會念菴兄并煩道鄙懷漢書批抹約四五十傳亦頗盡之并奉返以全信寄黃士尚弟也奉職無狀幸蒙寬恩得歸田里不然則從兄於遼海之濵亦所願也易之蹇不云乎君子以反身修德夫身何待蹇而後反德何待蹇而後修蓋寂寥枯淡之中其所助於道心者為多也自儒者不知反身之義其髙者則激昻於文章氣節之域而其下者則遂沉酣濡首於蟻羶鼠腐之間如兄之志氣固巳塵垢一世而與古之志士為徒矣不知近來反身之學得之于蹇者何如幸以教我張舜舉言兄自戍遼以來作詩幾四五本兄何以致多如此豈將以是自鳴其習坎心亨之樂耶或者窮愁羈旅無聊之思而姑託以自遣耶抑以寫其江湖之憂而致其去國繾綣不忘之愛如古離騷之作耶其無亦自擬於鏡歌鼓吹遼東都護之曲而與塞垣橫槊之士同其慷慨而謳吟耶不然則枝葉無用之辭其足以溺心而愒日也久矣兄何取焉日課一詩不如日玩一爻一卦日玩一爻一卦不如默而成之此之謂反身而又奚取於枝葉無用之詞耶弟近來深覺往時意氣用事腳根不實之病方欲洗滌心源從獨知處著工夫待其久而有得則思與鄉里後進有志之士共講明焉一洗其蟻羶鼠腐爭勢兢利之陋而還其青天白日不欲不為之初心此鄙人之所不自量而竊有兾焉者也天子仁聖在宥天下兄豈久於海濵哉弟獨學無朋將籍兄為助日日望之近來應酬文字每不敢作而年嫂志文則不敢辭蓋以昭天子之寬仁而發海外孤臣心事之一二焉非特為應酬故也嘉幣謹辭果酒則拜賜矣廣寧有賀黃門醫閭先生者忠信髙節之士也其風尚在否兄試詢之士人亦可為旅中蓄德之一助也與項甌東郡守索居既久益嘆朋友合并之難而知昔日相聚之為樂也然又有可感慨者念昔日從兄於杯酒談笑間此時弟甚踈鹵不能有所切磋於兄而兄之善言惇行弟亦不能竊之以自淑不過如世間所謂好友者而已求如古人切切偲偲講學輔仁則未也自去官歸家閉門諍坐大抵人窮則反本霜降水涸天根始見於是大悔曩時孟浪痛自磨刮直欲掃去枝葉文飾從根本上著力久之亦漸覺有灑灑處但苦此心出入幾微之際殊廢檢防然亦漸覺有灑灑處此時欲見兄相與印證一畨了不可得則向者朝夕相聚反自錯過虛却光隂豈不可惜惟吾兄質實純明古所謂腳踏實地人也此不惟吾兄能自信而友朋亦無不以此信兄者別後想淵然深造非鄙陋之所敢窺測以舊時所見吾兄則尚有葑菲可以少贊於吾兄者何也兄得之資稟者持守有餘而充拓未至資稟有餘於毅而力量不足於弘其得處乃是氣質最美而其不及古人處乃是學問不能變化氣質也古人為學皆是百磨百鍊工夫如書臯陶論九德寬而能於栗直而能於溫沉潛能剛髙明能柔斯則磨鍊已至氣質變化之效也夫弟所謂充拓者亦非如由赤子之心擴而充之説蓋赤子之心夲自充擴得去本自能大有一分不能充拓皆是未盡此心之量耳中庸曰致廣大而盡精微極髙明而道中庸德性本自廣大本自精微本自髙明夲自中庸人惟為私欲障隔所以不能復然故必須道問學以尊之耳此千古學問之的也據吾兄舊日規模且未免作世間一種寡過之人其於賢聖作用尚是有間學問須先定其基故孔子不取謹願之士而取狂狷為有基也狂者固不待言至於謹願之士與狷者其不為不善亦較相似但狷者氣魄大矯世獨行更不畏人非笑謹願之士氣魄小拘拘謭謭多是畏人非笑狷者必乎已而謹願者役於物大不同耳今人多以謹願者為狷此亦問學不明之過也交遊可望者殊少得如吾兄者尤少如弟踈鹵尚不敢自棄以吾兄之純明甚於道翻然易耳願聞兄之所安整理民事皆是吾人切實工夫而兩郡之治如何并願聞之邇來士風澆薄而江南重以侈靡浮蕩比之他所尤甚大抵富貴功利之習糊人心目如處豐蔀之中舉眼皆蔀也蔀外更不見一物矣是以迷惑顚倒莫知所止非有先知先覺者孰能出之溷穢而轉之清流乎提學馮先生觀其論議行事亦不為無意於此矣詞華本實之間稍有軒輊便足鼓舞人心吾兄相會得從容聚語幸委曲一贊之答江五坡提學海內交遊如兄者幾人而交遊中能重意氣不輕然諾如兄者又幾人與兄一別至今幾時中間問訊能相通者有幾眷言思之可為悵悵李中溪使來辱手書惓惓殊自慰幸又辱寄到十三經注疏此大惠也僕於此書去歲在山中偶嘗讀之而於三禮者讀之頗詳竊以為王鄭諸儒雖未能深究乎先王之精藴至於形聲器度之間比較同異參量古今其功最多學者欲因筌蹄以求魚兔則此書不可不觀惜其舊板訛謬既多模糊又甚故雖素好學者或􅌒於觀焉兄之刻此學者可為幸矣而僕山野之人顧先得之不尤為幸歟中溪又欲刻杜佑通典恐此亦須刻也兄可贊之伏惟兄之蒞閩且三年矣八閩之士固巳丕然向下風矣而兄猶以人才風俗轉移變化之故未得其端為言者此足以知兄之志也夫今之為提學者苟博識善文及程較諸士子文字之精與否而一無所失則已赫然足以收士心取髙譽矣至於人才風俗轉移變化則提學不以是自責而人亦不以是責之也兄獨慨然有意乎此固不以世人所超尚與兄素所精詣者為可滿而必以不如古人之善作人者為可歉歟古之道推其自洽者以教人故德修而教以尊教而後知困知困而後能自反故因其教人也而德益修所謂教學相半也人之性行牽柔暗伏者多而果決雄毅者固少矣得其果決雄毅而能為剛中者又加少耳故臯陶之論九德曰剛而塞強而義而箕子亦曰髙明柔克兄固雄毅果決者剛者強者髙明者也持之以動心忍性之力致之以收斂凝靜之實克之以柔養之以中使剛者必塞而不近於露強者必義而不過乎激積之也厚而蓄之也密則兄之所以自進與其所以教人至於人才風俗轉移變化恐無以易此矣然此在兄之材力亦何難也嗟乎士之蕩於紛華兢於馳騖而不歸其根也久矣閩固多文少實之域也非兄孰能振之而欲振之豈在聲色文字之間哉固有道矣若其次則莫切於風勵學官僕竊謂今之提學以一人督率六七郡之士即使如古之善作人者則善矣雖然則勢固亦不能人人而薰之與日日而礲之也不能人人而薰之與日日而礲之則其所𬒳者淺矣古之教者自萬二千五百家為鄉鄉有師而至于五百家為比比有師豈特教萬二千五百家者則賢哉彼其教五百家者亦盡賢人也即使今之提學如古之善作人者亦不過六七郡共得一良師耳為此六七郡得一良師孰與為此六七郡得百十良師故為提學者莫急於風勵學官今學官璅尾自卑嗜利無比人人相師靡然一風雖有一二材俊之士出乎其間猶懼其隨而偃也誠欲有以風勵之又恐非一提學之官與四三年之間所得為耳然以兄之材必能有以處此竊願聞教焉曩與王道思書亦曾及於提學之説大抵不出所請教於兄者矣僕今歲移家荆溪此中山水清絶頗能恱人在病夫尤宜也邇來儘善飯羸弱之軀可以自支惟學不加進殊愧知巳然於動心忍性收斂凝靜此僕之所請教吾兄者亦不敢自棄也更顧兄時督教之所示讀書太苦蕩搖精魄之説此兄之甚愛我敢不拜教尊作儒學記文最古雅然此自兄素所精詣不俟贊也山中亦有一二拙言更容繕寫求教草􅋄白答廖東雩提學㒒於吾兄雖相晤之日頗淺而相知之誼甚深兄之於僕則亦然也兩辱書惠深為空谷之慰又辱兩示髙文讀之喜躍夫亰師都會也綴文之士比肩僕曩皆獲與之交而皆獲見其文焉然僕之所最傾意者乃獨在兄則數與傅少岩言之以為東雩之文氣骨甚勝無一點纖靡愞散之態後來可冀於作者東雩而巳春間讀兄所為文視亰師所見則加勝焉近復得讀兄所為文視春時所見又益加勝焉駸駸乎作者之堂矣頗自謂曩之所知於兄者之不妄也雖然文與道非二也更願兄完養神明以探其本原浸􅉼六經之言以博其旨趣而後發之則兄之文益加勝矣兄志潔而識偉行方而氣和僕固一見而知兄為任道之器矣嗟乎古聖賢之道其不講於世久矣聲利之欿薰塞宇宙日夜馳鶩寡廉而鮮耻儒生習見以為當然其有以講學為事者又或崇意見而乖實際競口耳而寡心得聽其言則美而考其實亦無以甚異於所習見以為當然自非精一自信卓然不惑流俗之士則未可以兾於斯者也僕竊有望於兄輩矣山西古帝王之都其人有茅茨土階之風而假干木卜子夏居西河其人化之凛然有節槩今不知其遺俗視古所稱何如而王文中與近代薛敬軒亦出於河汾之間豈其俗固有近古者耶吾兄以身任作人之責兄之所以淑諸其身即其所以淑諸其人者也篤志力行極深研幾求古人之真血脈路以淑諸身以淑諸其人因其近古之俗而登之於道此其責在吾兄矣連年虜騎入太原蹂􅏳之慘二百年來晉人所未見僕聞之序詩者小雅廢而四夷侵夫小雅何與於夷此其言疑若甚迂蓋昔人精究天人之際而類人事於隂陽則以小人為君子之隂夷狄為中國之隂隂則銷陽陽則銷隂隂則致隂陽則致陽其相銷也若鐵炭之不爽其相致也若酸漿之感蠓蠛其幾微矣長君子之氣即所以銷小人之氣長君子之氣而銷小人之氣即所以長中國之氣而夷狄之氣銷故曰真勝者氣也勢與形不與焉其幾微矣此莘有所以豫見於伊川而序詩者之説不為迂也今也觀之薦紳之所崇尚觀之學校之所趨向如前所謂習見以為當然者其為隂為陽與其銷長之幾亦略可覩矣大揚旌沙漠之陲而尺組繫單于之頸此非兄之責也若乃大敷古先之道以淑諸其人使人洞然於隂陽淑慝之辨而斷不惑於所趨此其責在兄矣僕自屏居以來牽於多病齒髮日衰非惟不敢復有四方之志而詩書亦多束閣惟兀坐一室所耿耿不忘者尚兾修省補過以不負此心與不負海內知巳者而已與應警菴郡守僕迂戅無能人也伏惟君侯蓄兼人之才且居郡侯之尊而與僕又素無一日之雅乃自下車以來虛心降色所以獎進禮遇於僕者皆出乎常格之外此雖古之髙流如蓋公任棠之徒當此猶宜三讓而避焉而況草茅迂戅如僕者乎所以敢偃然而當之者以成君侯下士之髙義固不自量其身之卑賤與才之短劣也自是以後綢繆日接蓋無夾旬不相往來不相與從容盡談者此其形迹似為煩瀆矣雖然非若侯不能亮僕之深至此而非君侯亮僕之深僕又安敢以是處君侯哉公門無鄙人之迹庭中無長者之車亦已久矣豈特樗散之性不欲溷擾於人亦以相知相信之難耳惟在荆溪時與石屋彭君相切磋石屋之為人君侯之所深與也伏惟君侯住山中既且一年釋塵鞅之勞而就清池白石之安去簿書之煩而縱其清逺間散之適昔人所謂霜降水涸天根乃見惟捍彼物纍全我真機此時工夫此時意氣不知復何如耳僕嘗竊謂今世人才未便不如古人惟古人為學堅苦磨鍊忍嗜欲以培天根久之則此心凝靜百物皆通而今人則未免粘帶未免牽引粘帶之根固于中而牽引之勢搖於外所以精神力量趣見不如古人僕每觀君侯治郡自是近世才傑何可當也雖然以君侯之志詎止欲為近世才傑而巳乎意者必欲為古人而後已乎如必欲為古人則堅苦磨錬正在此時若自此以後固知君侯不能久間而塵鞅簿書之煩且勞又復不免相纍恐不得如山中多暇可以進兼力而收全功矣君侯得無意乎僕質夲頑鈍惟不敢惰窳以負相知然寸進或至退尺恐竟不能有所樹立耳亦願君侯教之君侯來歲或宜早出進退自是兩途此身既繫於官而欲結泉石之盟亦未為可也以相知故並及之南直隸廣西湖廣三省地圖已付馮丞繕寫不識寄到否西洲公奏稿偶檢出並奉上不宣又時警菴為提學今之職守令者苟有能飾簿書清獄訟者則為賢有司矣至於為百姓根本之慮則未之及也今之司學校者苟有能品藻文字嚴督程課則為好提學矣至於為學校根本之慮則未之及也吾丈之為守郡也既已能為百姓根本之慮而不徒以簿書訟獄為功矣今之為提學也亦何患其不能為學校根本之慮而惟文字程課之為務也哉向辱手書具見惓惓欲興起士習之至意顧責之人不若盡乎已蓋言聲色號令之間不若求之身心性情之實惟反躬自盡益愼以密力行古道不落流俗則此身所舉動即是士子所師法可以不言而諭嘗見近時提學教條何嘗不言道德何嘗不言仁義然只成一畨講説只成一番門面而於士習絲髮無輔者無其實也務實者反躬之謂而所以為根本之慮也辱吾丈知愛竊敢以是望之今士子中有實行者多不長於文字工文字者多不修於實行蓋淳朴之與浮華往往相病然糊名之制行則不得不一一徴之於文一一徵之於文則其文可以與選而其行或不齒於市人者亦不容不取髙第而登顯仕是以詩書為世流毒莊生至有發冡之説豪傑士扼腕太息無可奈何竊以為低昻輕重其權實在提學蓋提學可以知諸士之文而又可以知諸士之行非如科場之為糊名所蔽雖欲品藻其行而無所從也抑此伸彼示之意嚮非吾丈又誰望之曩時使節寓郡中僕時承教語以時免於大過罪今離索日久奈何年且四十益深無聞見惡之
