body:
  text: 序石屋山志序凡情攖於物者未有不纍於中而喪失其所樂者也有人焉知夫軒裳圭組之足以為纍而欲自逃於山顚水涯之外以為得所樂不攖于物矣然不知方其有羡於山水而莫之致也則或煩勞而悵望而其既得也則或嗜深玩竒窮乎幽絶勞精神而不知止其據而私之也則一丘一壑悉以自占而若恐其或奪也其久而將去也則躊蹰顧戀而其既去也則或悵然有失如遷客之思其故鄉罥於懷而不能已此其患得患失於山水與夫患得患失於軒裳圭組者淸濁有間矣其决性命之情以攖於物而喪失其所樂則一也孔子不云乎知者樂水仁者樂山知者動仁者靜仁則所見無非山者然非待山而後為樂也知則所見無非水者然非待水而後為樂也非待山水而後為樂者非遇境而情生非遇境而情生則亦非違境而情歇矣故境有來去而其樂未嘗不在也苟其樂未嘗不在則雖仁者之于水知者之于山亦是樂也雖入金石蹈水火不足為礙至於軒裳圭組不足為紲亦是樂也君子所以欲自得者以此而巳石屋者安成山水之勝處也彭君隱焉而樂之既官於四方而恨不能與俱於是纂為圖若干卷凡巖洞之嶔崟飛泉之噴薄草木禽魚之窈窕朝靄夕霏之變化不假登頓不勞騁望而宛然坐得于此不離乎軒裳圭組之間渺然自縱乎幽遐詭異蕭散之觀雖人之未嘗至石屋者亦將於是焉可以神游而意到也君信可謂能樂于山水矣然吾不知君之樂豈以厭軒裳圭組之為纍而欲自逃于此歟或悵然于懷而不能自已歟抑其中固有可樂聊以寄于此歟君苦志好學而從事于仁知不欲為亢世高蹈之士而欲為中行君子其必有不攖于物者矣其必有不待山水而後為樂矣因叙以問之贈彭石屋序君子之仕也非以為利也其苦身以為人至于手足胼胝而不敢以為勞其忘身以從王事至于終窶且貧室人交謫而不敢怨此豈有一毫利之也哉宋儒程伯子之言曰孔子曰古之學者為己今之學者為人吾以謂古之仕者為人今之仕者為己其學也為己則其仕也必為人其學也為人則其仕也必為己順之讀其說而有感焉又嘗觀太史公循吏傳至公儀休則獨述其拔園葵辭饋魚一二細事而略不及乎其他竊意休之所以能垂世而立名者必有經國之大計而此二事乃匹夫之小廉耳何太史公舍彼經國之大計而取其匹夫之小廉也其意可知矣蓋以為苟不自利必能利人苟不為巳必能為人也歟余從縉紳之後見世所謂賢士大夫者多矣未見有一毫無所利於官者也夫世之潔清好修者不啻幾人而余以為未能無所利者非過歟蓋檢于耳目之所及而或忽于所不及慎于大或忽于細此僅愈于黷冒無耻者則可耳其去古之循吏不亦逺乎今夫以小民供有司之飮食器具而不以為有司之浚我以有司受小民飲食器具之供而不以為小民之過奉我其來也久其習之也熟而恬然莫之怪也嗚呼此豈非所謂耳目之所不及與其細者歟宜興山縣也里胥之供官歲為金者以百計通判彭侯來署縣事公曰吾廪祿之外一錢亦私也况百金乎且我書生所須幾何安用百金亟去之或謂侯曰公則可矣得無病後來者侯曰吾知自盡而已遑恤其後乎且後來者賢必不非我不然吾亦安能預為不賢者地乎侯為人貌古而氣凝恬淡而寡欲其居處苦約有寒士所不能堪者推侯之志雖枯槁山澤對四壁之居亦可軒然無求于世而顧有一毫利于官也哉侯治宜興數月有惠愛其利害所興革多可書而余獨稱侯之節且侯之節其大者多矣而余獨舉其細者亦太史公載公儀休之意也以侯之仕不為巳而其仕必為人者可知己以侯之仕能為人而其學必為巳者又可知己或謂小節不足以觀人豈其然耶于是新令且至侯還郡有日矣學官某與諸生某輩欲留侯不得則求豫文為侯贈余不能辭也遂因侯之節而及于儒者為己為人之說以告于世之仕者非獨以告為宜興者也送太平守江君序嘉靖中交人篡其君貢獻不通天子議將用師于是命庭臣推擇諸臣中才望尤異者使為廣東西雲南三省撫臣而三省之吏自藩臬至于州郡縣必精其人有不稱者更而置之而廣西之太平與廣東之欽廉雲南之廣南諸郡尤綰三省之口為中國出兵之戶其地與交南相齒錯故其選人尤重于他郡而江君適以戶部郎出守太平君練逹而沉毅氣偉而志雄士大夫以是賀太平之得其人而知君之能勇于立功名以自見也會余以省父至南都君之僚某君輩因求余文以為君贈余惟交南距中國萬里許且夫以北土能寒之人而爭騖于毒利暑濕瘴癘之域以轉餉之艱而當自食其地之逸以不習地形之勢而當當關拒險陡崖深篝之塞此兵家之忌罪人未可以必得而中國且騷然敝矣故征交之議士夫多難之雖然固有不煩兵不費糧而可以有功者則漢人所謂州郡足任者也今廣東西雲南諸郡所轄諸土兵其長技固與交人無以異其巢窟于徙崖深篝之中固與出入于交人之地無以異也往時徼上之氓多竊出與交人相市近以通夷禁之夫此正不必禁也貴在因而用之耳誠欲刺其隂事而疑散其黨則足以備間諜欲奪其險厄則足以供鄉導何不可哉且莫氏以篡得國交人雖蠻夷固未必盡肯甘心為篡人役也其左右之劫于凶虐欲自拔而不能者計亦多矣聞故王子孫尚有據國之半而爭之者而占城壓交人之胸世仇國也此皆可借其報怨之憤而資其夾攻之力顧為計者未知出此誠使此諸郡迭相臂指潜形蓄鋭蹈瑕而動用其長技與熟于地形之兵加之以間諜鄉導之便因其故王子孫與左右欲自拔之人以為內間因其仇國以為外掎使彼備多而力寡然後陽壁于其所備而隂襲其所不備其國中固宜有嚮應者然則兵不必傅其都而篡之首可以懸而馘之矣其與勞師匱糧以犯兵家之忌者不亦逺乎故以為天子苟赦而不誅則巳誅之則宜委其責于州郡而毋出內兵苟委其責于州郡則太平其宜率先諸郡者也嗟乎士患不遇時彼慷慨躍馬䇿勳銅柱之外者世固不可無若人吾將以君之行觀之又古之仕者比閭族黨之長皆不去乎其鄉積而至于公卿大夫皆不去乎其邦出有祿位之榮而入有桑梓之歡其委贄而效之君也未嘗一日違乎其親其戮力于國也未嘗一日捐乎其家其或銜命而使蓋亦不過乎友邦侯服之間而非有蠻陬海徼之逺且艱也然而四牡祈父之詩上之所以深悉乎下下之所以自鳴于上者且眷然而不釋也是故上不敢恃其勢之所易以使而下不必矯其情之所難以安上不忍奪人之私以蘄乎事之所必集而下不必自割其私以殉乎公之所必急于此之時士之不樂于仕者其亦鮮矣後世之仕者不然徼于一命之寄則不得不去乎其鄉羈於畫土之守則不得不違乎其親其所冒而歷者或絶棧驚波翳瘴毒霧夢寐之所駭而虞焉者也其所群而縻者或侏􅍣猩語豕竄鹿視耳目之所怪而愕焉者也此其勞逸愈悴與古已大異矣而上之人方且據其勢之所易以使而惟靳乎其事之所必集下之人方且割其情之所難以安而惟殉乎其公之所必急然則今之仕者其亦有所不樂乎否耶白石江君歙人也乃今為天子出守太平當南徼之絶去鄉萬里之外涉瘴癘之地與夷獠雜處君雖慷慨不畏艱阻然而君有老母在顧力不能偕也豈亦有不樂者乎君既不得如古士大夫各用于其鄉而其勢又不得以其情自請近地而朋友間亦無有能以栁易播如古人而又無有能代為之請者其亦有所不樂乎否耶雖然太平為南徼雄鎮外拊交人之背內理綏諸蠻酋其為地也最要而其欲得良吏也甚急君負材練逹氣偉而志雄意者太平固非君不可而君不宜以親為辭耶抑以天子方有事南陲欲借豪雋於鎖鑰之用而暫試之盤錯之效以待旦夕而事定則遂還君于內地以便君之私也歟余固知君非久淹邊郡者也然則君其可以慨然請行而祈父之歌余知其不必作于他日矣送彭通判致仕序代府官作古者僚友之間其相須至殷而其相比至勤也其去者則居者曲為之挽而留之于是有以去者從居者而居者不患于無與共勳伐焉則君奭之書是也其居者則去者曲為之引而致之于是有以居者從去者而去者不患于無與共泉石焉則北風之詩是也其或去者不能為居者留則居者為之盛祖帳車數十百兩至作為詠歌倡而和者數十百人于是居者慨然有羡于去者以其絶塵而不可及而去者亦待居者以為重然後風聲奕奕耀人耳目至於久而益章則漢人之于二疏唐人之于賀監是也自余官于常而得與石屋彭君為同僚君溫雅純粹行潔而材𥙿雖在僚佐中而隱然係一郡之重輕余方幸于得君竊以為彌縫缺失實惟君是賴曾不幾時而君謝病以去余為之悵然自失既自愧其力不能留君且以余之迂拙無所用于世其去不宜在君後又自愧其縻于此而不能從也獨知慨然羡乎君之不可及而欲載之詩歌使君之風聲耀人耳目如古人者而又不能也則請聊述余所聞以贈君可乎夫去就有二途而仕隱無兩道在易之漸之上九既已漸于逵矣而孔子曰其羽可用為儀不可亂也觀之上九可以肆志矣而孔子曰志未平也由此言之君子所以蚤夜孜孜蘄盡乎巳而𬒳乎物者豈獨蹩蹩于世者則然雖肥遁高尚之士亦固有責焉耳且君之居官清逺閒散翛然絶不以聲利自汙則仕固無異乎其隱今君之去也將益盡乎巳而𬒳乎物使其志未平而其羽可用則隱固亦無異乎其仕矣故曰去就有二途而仕隱無兩道苟徒枕石嗽流嘲弄烟月以為曠逹而曰世與我既相違矣則余又何敢以此望君且非君所以自待也君行矣其亦有以處豫也哉贈竹嶼吕通判還郡序今之為蠲災之說者余知之矣有司以災上之計府主計者量其所災而上下其所蠲之數宜乎所災與所蠲必相當也然主計者疑于有司之不信也而必裁其數于三分之內有司者亦逆知主計者之不吾信也而必溢其數于三分之外大率主計者之蠲災也十裁而為七有司之上災也七溢而為十然後有司之所溢與主計之所裁較足相𥙷而所蠲與所災適得如其分數而無盈乏若使據實而上焉則是所蠲常不能如其分數也然災自七分以下皆中飢小飢也猶得溢其虛分以求不失乎實分之蠲若夫大飢則其實分已盈乎十而十之外有司固不得復溢其虛分之三以待主計者之所裁矣其所蠲亦不得過七而止則是大飢之所蠲常不能如其分數也夫所蠲既已不能當其所災矣况所蠲之分數云者又非通而計之也其法曰留者蠲解者不蠲大率一州邑之稅解者十居七八而留者十不能二三也顓計留者二三分之中而蠲其十之七乃通計留者解者十分之中僅得蠲其十之一二耳則是十蠲其七者虛也而十蠲其一二者實也若使其所虛蠲者未及乎七則其所實蠲又當遞少於一二也夫災之數溢于十而蠲之數裁於一二此如遍體殘矣而益之以一毛然尚有一毛之益也而况所謂一毛者又未必在民也其或有司不能皆賢也胥吏實操其散斂之柄蠲詔下矣匿而不布也鞭笞競行程期轉迫至于一無所負而後出詔而揭之壁則固無用于蠲矣是蠲之公囷者虛也注之私囷者實也有十分之災而卒至于無一毛之蠲嘻其亦可嘆矣章丘吕君判于吾常以督稅為司者也君操履修潔饋遺一無所受可謂嚼然不涅於緇其才精于勾稽胥吏不能欺也而窺其志蓋若不欲以繭絲為功者豈古所謂撫字于催科者非耶巳亥之歲將入京師既成事將返郡求余言以贈是時東南諸郡大災斗米百錢而羡中家以上不能具饘食其野人或剝樹而啖之余不知主計者將如其分數而蠲之耶抑猶不免乎裁其三分如曩時耶將通其留者解者之算而蠲耶抑猶不免乎不蠲解者如曩時耶吕君以督稅為司則固曰知受成主計者而巳矣知盈算而轉輸之而巳矣主計者之所裁也解者之所不可蠲也此吕君之所不得專焉者也若夫裁𥙷乎官私贏朒而操縱乎貧富豫奪踈其鞭笞而緩與之期使所蠲者雖一毛必逹於民而所不蠲者不至乎棘以厲民此吕君之所得專焉者也君為其所得專者而已矣君之所得專焉者余既以告於君而君且信而行之矣則君之所不得專焉者又安知不有以吾說而告之主計者耶安知主計者不且信而行之耶然則東南之民其亦庶幾乎飢而不害也歟贈蔡年兄道卿序嘉靖己丑余始識道卿於同年中巳而同事於吏部後數年道卿為刑部郎余見之京師又數年道卿謫為廣德同知余游金陵而道卿適在焉於是又見之於金陵自始見道卿則貌朴而氣溫如良金之藴於礦也再見之其貌煒然其氣充然問之以古人之書無所不通間或作為文辭率能與一時文士相馳騁上下如虎豹之不肯自晦其章而蔚炳時見乎外也又再見之則貌之煒然者以凝氣之充然者以虛與之語非六經之藴不以言從而叩之非君子之儒不以存諸胸中如草木之將落其華斂其元氣而㱕乎其根也道卿年未三十而余三見道卿亦不過四五年間耳既巳屢變不可涯涘而且卓然有志於道借使過此數十年余不知幾見道卿不知道卿容貌辭氣又何如而其於道何如也其所謂速化者歟夫學者非其才之足貴而聞道之難聖賢之道易以簡而學者每病其難聞何也其母乃多岐誤之歟故學者必一其所志而後精乎其進百家衆藝莫不皆有可喜可慕而皆可以附託於聖賢之道後生耳目好竒而不擇方其力蓄而氣鋭力蓄則必有所湧泄非泛濫不足以肆氣鋭則耻於一藝之不及又安能奪其可喜可好而專事於淡乎無味之至道哉其習之也惟恐其不博而不知博之適足以溺心其羅而張之也惟恐其不文而不知文之適足以喪質及其力刓於無所不搜氣竭於無所不恢于是向之可喜可慕者或如搏影而不可得或得之又不足以理身而養性而適以溺乎其心喪乎其質于是始欲反之于道則力已刓而不能果氣巳竭而不可鼓大率少年剛鋭之士不患乎進之難精而常患乎志之不一至於力刓而氣竭則雖或不患乎志之不一而常患乎進之難精道卿既巳落其華㱕其根以一乎其志矣夫聚其全氣與力無所滲泄而一以輸之於道至於久而未有聞焉者吾不信也在道卿精進之而已于是道卿遷官廬州將行廣德諸生彭某輩來求余文以贈余欲堅道卿之志而勵乎其進也故耶為之言以俟異日更見道卿云爾贈宜興尹林君序宜興環山為邑所産多竹木名材熊狶異獸柿栗茶荈之饒其民人工織屨治絲葛善獵射自食其土不為游賈於四方而四方賈人亦以僻絶罕至其地其民終身不見都會之綺麗與竒邪之人而自老於岩壑之間是以其俗儉陋而木戅畏吏而簡訟山澤之稅不待督而入為吏者既樂其土風之醇而又無賔客送迎得以優游而養尊又有回溪峻嶺飛泉石竇皆帶郭數十里內以其暇時游娛其間以極幽人逸士之所玩好而忘其身之為吏也蓋凡宦於東南者莫不以宜興為善地豈不然哉其後敦龎之風漸泯而機利之習稍興其民之巧於捭闔既無以異於大都喧市之人而豪家富人競為浮侈與吳㑹爭勝山谷之氓往往憑險以逃稅或擊鑼聚群持木挺格捕者急則竄入鄰境不可禁甚者或與長吏相詬訟獨其山溪泉石之勝不改於曩時而為吏者亦苦於簿書之煩且勞而不暇以娛也其風俗之變遷不同者如此余嘗登銅棺泛荆溪歷二洞周覽其山川之故庶幾復見古者敦龎之風而不可得為之慨然太息其老人為余言往時吏多長者善拊循其民後為吏者見民之饒給又蠢蠢易籠也則多張網絡侵漁之故民生日以殫蹙而奸僞萌起由此言之風俗之趨大率在長吏矣於今乃見林侯林侯蓋所謂長者也侯本以經術取高第其恂恂儒雅不類於法吏為政潔巳而恕人未嘗取辦於𫾣朴鈎擲以為能然而其期月之間民巳四嚮而慕之其政平訟理尤出於法吏之所不及豈邑之古風其尚有存者乎何侯之致理之速也夫民之於吏如金鐡之在爐冶惟其所鑄南陽好商賈而召信臣富以本業頴川好告訐而韓延壽教以禮讓南陽頴川非素善俗也𬒳二君之化翕然為之改觀易聽而况宜興舊稱醇風者乎在侯之所潜轉而默導之者而巳若是余知宜興之民復於敦龎而余得以與觀其盛也可幾矣余於侯有同年之誼又與宜興鄰邑也故不徒頌侯之政而有所深望於侯焉贈邑侯王春巖奬勸序始侯之入覲也余嘗贈之以詩其詩曰無言似桃李有志笑鷹鸇得暇即開卷長貧不受錢自余為此詩流聞士大夫間其士大夫之素知余者則曰是戇不妄譽人者其所譽者必其人也而因以知侯其素知侯者則曰是不為鷹鸇者是不受錢者其譽之者必其不妄譽人者也而因以知余然是時侯之為邑僅踰年耳侯為人悃愊不皎以近名又不善候刺人意而迎之故當時雖有知侯者然尚少也上之人其知侯者又加少矣或抑而挫之侯亦恬然而甘之蓋不汲汲于求知也至是侯之為邑也三年矣其政之平易于其𥘉者則益以精明于其後其守之不可緇于其始者則益以不可渝于其終于是上之人其不知侯者亦少矣其飛章而薦焉與其馳檄而奬焉者屬而至也夫侯能恬然於其抑而挫之者則亦豈有欣然于其薦而獎之者哉而余獨喜為侯道焉者亦喜余所譽之益有所試耳所謂馳檄而奬者御史巡江鍾君其一人也於是侯之寮罹丞輩將奉鍾君之檄而行事焉而相率求余文以張之余觀鍾君所以奬侯之語固曰公而謹也勤而廉也其公而謹也無乃余所謂不為鷹鸇者耶其勤而廉也無乃余所謂不受錢者耶甚矣鍾君之知侯而其言之有似于余也然以邑人譽邑大夫則是上交之分而其為言也近諂以監司譽屬吏則是下臨之勢而其為言也必公余方且援鍾君以自信焉而羅丞輩乃欲張之以余文豈以豫之言為有加于鍾君之檄也歟雖然監司之于其屬也終歲而不一二涉其地焉則多得之于耳剽邑人之于其令也朝夕而薰焉則多得之于目注故悶悶之政可以孚乎其邑未必可以獲乎其上察察之政可以市乎其上未必可以愚乎其邑之人然則較吏治于上人之口宜不若巷處街談之口尤為親且詳也矧余與侯又相知最深者哉且余譽侯于踰年之前與上之人抑而挫之之時人固不以豫為妄而信之也矧余譽侯於三年之後與上之人薦而獎之之時人其有不余信者哉侯好學而志古之道則其所樹立將不止如施之一邑者而古之良吏所居常不赫赫而去則見思侯行且去矣人之思侯也其將何如故余預為言之以俟他日又當有信余者贈宜興令馮少虛序君子近于靜而逺於囂近於簡而逺於煩非以便乎靜與簡之為逸而憚乎囂與煩之為勞也靜則可以致一而極其精爽之思簡則可蓄其有餘不盡之力以待其有為是以神凝而幾决氣完而務濟易不云乎君子安其身而后動莊生亦云室無虛空而婦姑勃磎今之言治者何其轇轕而好多事也麗省之邑上承監司部使而監司部使一省率數十人此數十人者滿其意皆若欲得一令而為之役而令以一身而役於數十人拜跪唯諾之所承應米鹽瑣屑之所責辦率常以星出以星入然炬而後視邑事中夜而治文書雞鳴而寢睫未及交耳聞鐘聲而心巳紛馳於數十人之庭矣驛道之令蚤夜飭厨傳戒廩餼走而候于水陸之衝賔旅之往來者如織迎於東而懼其或失於西豐於南而歡其或儉於北以為得罪幸其無呵望􅌚然而出境則驟馬而㱕未及脫鞅而疆候又以賔至告矣此兩者煩文縟禮之疲其形惕讒畏譴之鬪其心雖有強幹之資剸割之才且耗然而眊矣何暇清管庫察獄訟注意於刀筆筐篋之間而為俗吏之所必為者乎而又何暇蓄其力精其思毣毣然為百姓根本計慮而出於俗吏之所不能為者乎非其人之所不能勢使之然也宜興地僻以遐賔客之所不通監臨之吏或數歲而一至故其令常逸而尊又其人山採而澤漁其食衣易給而徭梲易完也非有確瘠啙窳剪瓜及膚之艱其俗椎朴而尚親重於去田畝而怯於犯法非有椎埋告訐之奸非有武斷睚眦殺人之豪非有探丸鳴桴之警故其錢榖訟獄盜賊諸課常省於他邑然則地之靜以簡而為君子之所便近者宜無過於此而邑令馮君又所謂有強幹之資剸割之才者也雖使之騖於最囂且煩如前之云者猶或未有不濟而况其靜與簡者乎夫因其強幹之資而試之於簡則其力益厚用其剸割之才而養之於靜則其思益精馮君行哉豫將踴躍以觀宜興之政矣送柯僉事之椘序承天故郢都據江漢上游扼襄沔荆鄂之喉自古為巨鎮今天子起漢沔則承天為湯沐邑且先帝寢陵所在天子既肇建園邑備規制金堆之藏焜耀山石將與紫金天壽相望無極故其地視昔尤重于是撫按之臣請于上曰承天故荆南巡屬地遼濶守巡吏歲不能一二至且權分非所以重寢園世請自為一道割沔陽隸之設守巡吏各一人詔報曰可其以承天為荆西道鑄印置吏如所請而柯君遷之自戶部貟外郎擢拜按察司僉事奉敕往巡其地柯君以學問幹局顯郎署間及是行士大夫皆以為荆西得人也其友人武進唐某送而謂之曰柯君知斯職之不易乎蓋在漢時諸陵邑習俗龎雜豪猾所窟穴故天子常為選用強察能治劇吏以附循而芟剃之其所以銷奸萌擁護陵寢之計甚至然是時諸陵邑近在輦轂下耳今承天界在南服地故阻險又楚人啙窳無積聚以剽悍相鼓扇其習俗視漢時諸陵邑何如也顯陵之工為費巨矣去年楚大饑流人聚而藪於承天左右僵者日幾何人丘墟之間刳而市其胔可謂廩廩夫以杼軸既空之後而斂之以日溢無限之費以轉徙罷弊之人而率之以趣期就辦之役此在素沃土重厚之民亦難矣况于啙窳剽悍之俗乎欲以銷奸萌護陵寢安得不深慮也詩曰滔滔江漢南國之紀柯君其無忽也哉贈郡侯郭文麓升副使序廉吏自古難之雖然今之所謂廉者有之矣前有所慕於進而後有所懼於罪是以雖其嗜利之心不勝其競進之心而其避罪之計有甚於憂貧之計慕與懼相持於中則勢不得不矯強而為廉其幸而恆處於有可慕有可懼之地則可以終其身而不至於壞而世遂以全節㱕之其或權位漸以極泄然志盈而氣盛則可慕者既已得之而無復有懼於罪至如蹉跎淪落不復自振則可慕者既巳絶望萎然志銷而氣沮且將甘心冒罪而不辭是故其始也縮腹鏤骨以自苦而其後也甚或出於叨餮之所不為人見其然則曰若人也而今乃若是而不知始終固此一人也雖然此猶自其既壞言之也方其刻意為廉之時而其萌芽固已露矣苟捐之足以為名而得之足以為罪則千金有所必割苟捐之不足以為名而得之不足以為罪則錐刀有所必算人見其千金之捐乃其竒節而不知錐刀之算其真機也從而謂之曰廉嗟乎是安知古之所謂廉者哉古之所謂廉者必始於不見可欲不見可欲故其奉於身者薄奉於身者薄故其資於物者輕雖其一無所慕與無所懼而未嘗不廉蓋雖欲不廉而無所用之也郭侯治吾常以平易豈弟與民休息為政而尤以清苦繩約自律余始見侯如是則亦以為今之所謂廉者耳徐而與侯處聽其議論察其志之所存乃知侯非今之所謂廉者也侯性本淡泊苦厭紛華又嘗講於歐陽南野先生蓋知從事於無求飽無求安之學者嘗言曰我𬞞食則喜肉食則不喜布䄄則寢乃安紵䄄則寢不安其奉身率如此然則雖欲不廉而無所用之也侯蓋古之廉者也聞侯之夫人亦樂於糲食敝衣與侯所嗜好無異然則古之廉者猶或不免於室人交謫于是益知侯之為難能也侯居常三年升山東副使以去侯之僚霍君裘君與其屬武進尹楊君徴余文為侯贈夫侯之廉人既已盡知之而奚俟乎余之言耶雖然余知侯之廉非出於慕與懼而方其為守則猶在有可慕有可懼之地也自今以往官益峻而望益隆將可慕者得而可懼者去矣侯之廉猶是也而後人信之曰侯果非慕與懼者也然則知侯者莫如余先也而烏得無言乎送邑令李龍罔擢戶部主事序嘉靖甲辰至丙午東南連歲大祲先是為戶部者疑有司之緩于其賦而私於其民於是水旱霜蝗之奏十不一聽而沮抑推勘之令嚴軍儲國需窘乏常在目前而里閭疾苦常在千萬里外于是蠲租發帑之請十不一得而督責迫促之綱密李侯為武進既遭大祲則計以為戶部之不信有司非其壅膏以自潤之為咎而患在不盡知有司之急有司之不見信於戶部非其籍災以庇民之為罪而患在不盡通戶部之情如使為戶部者知有司之急則固可越法破例以為貸而曲全乎有司為有司者通戶部之情則亦可據法奉例以為請而無逆於戶部然而有司常冒求於法與例之外而不知裁請於法與例之內戶部不能靳恩於法與例之內而亦不能借恩於法與例之外是以其勢常相左然則戶部之不信有司非戶部之拒有司亦有司之自拒于戶部也今縱不敢望戶部設以身處有司之地而為之計猶可使有司設以身處戶部之地而為之計於是日夜搜檢故牘及訪之邑中士大夫家得戶部支運折兊故事絲髮無耗於國而百萬有益於民者凡四五條為疏以請於撫按撫按以請於朝而下之戶部戶部果以為便不終歲而奏行之自武進一邑得免米若干萬石及東南諸郡邑共得免米若干萬石三數年間東南連遭大祲而民不盡捐溝壑者李侯之功為多居久之李侯以政最擢戶部主事夫李侯之為有司也既巳能辨戶部之事為戶部也其必不忘有司之心為有司也能設以身處戶部之地而為之計為戶部也有不能設以身處有司之地而為之計乎韓退之以為天下之事成於自同而敗於自異余以為其自同者始於氣脉之相貫其自異者始於氣脉之相壅蓋在周時司徒主國計而州長縣正實受法焉安有為有司而不能通戶部之情司徒斂財賄而荒政聚民尤必先焉安有為戶部而不能知有司之急如今日者乎然而司徒之屬有司救一官實周旋于上下之間凡嵗時有天患民病則以節巡於州縣以告之司徒而施惠焉是以長正與司徒氣脉恆相通惟司牧焉是賴今之世無是官而戶部郎出為郡守縣令入為戶部郎則猶有通融之意且國家財賦委之戶部而源于東南諸郡縣李侯佐戶部倘尚書有問錢榖盈縮與國計民力之孰利孰害李侯必且舉所嘗治縣者以對至於異日四方水旱凡有請焉而無不得者必李侯為之周旋其間也贈訓導丘君序古之職於學者皆其鄉與國之老其體貌也甚尊而其廩餼也甚豐其在國學天子至為之饋醬酳爵而鄉學則鄉之大夫嚴而事之如師其子弟之不心服而安其教者少矣今之職於學者則異矣饋醬酳爵之禮其廢於國也既久而其職於郡邑之學者日數溢之廩月朔而望抑首促步揖且伏於守與令之庭候顔色怒喜為欣戚雖其子弟有不貌而師背而嘲者少矣故古之職於學者常易而今之職於學者常難雖然古者非苟隆其禮而巳固責之以德行道藝之備乎其身軌物化導之善乎其俗弟子執經而雜問以觀吾之所應郡邑之鄉大夫有大事從而乞言焉以决其所疑茍一之不副則其責不可以諉而今也課書升散之外一無所于貴矣于于然飽且卧而已矣故今之職於學者常易而古之職於學者常難然則今之所謂難者顧待之者則為薄耳而居其職者未嘗不自以為便也古之所謂易者顧待之者則為厚矣而居其職者未嘗不自以為懼也古之易者果易耶今之難者果難耶雖然抑今有所甚難者古之道不以責於今之人而今之官古之官也人雖不以古之道責之而吾古之官也則亦安得不以古之道自責乎以古之道自責則是食今之食而任古之事其勢將益齟齬而不行且夫古者據至隆重之勢以御其心服之子弟其教之行也豈不易然然猶有一再三不變而移之郊與遂而屏之逺者是其責尚有所不盡而况據至卑䙝之勢以御其面而師背而嘲之子弟欲驅之帖帖以就吾教以冀於育才善俗如古人而無負乎其所自責其必能乎否耶然則古之所謂難者猶或有所易而今之所謂易者終有所甚難也雖然亦在乎自盡而巳苟德行道藝之在我者備則雖勢有所不行而吾固巳無愧於古之人矣自余為諸生所見不啻幾何人矣求一二人焉幾於自盡者而不可得也及往來仕途則以詢於天下不啻幾何人矣求一二人焉幾於自盡者而不可得也豈古今人不相及往往如此耶抑其待之者薄則亦不能自為才耶若丘君者其幾於自盡而為吾之所求者乎丘君卑而無所屈於身貧而無所緇於利于今之䔩䔩齪齪之態丘君一無有焉其德與藝不知於古何如耳夫因乎待者之厚薄以為其人之隆汙者有之矣因乎其人之隆汙以為待者之厚薄者有之矣向使齪齪者而出乎古古亦未必不以薄待之向使德行道藝者而出於今亦安知不以隆且厚者符之耶余嘗問丘君於學之諸弟子群然曰丘先生吾師也則既異乎貌而師背而嘲焉者矣古不云乎教學相長也自今以往丘君德益成藝益進而譽日益流也然則所謂嚴而事之與就而乞言焉者安知不在丘君余既有感於古今之難與易而喜於丘君為余之所求又冀於古道之復自丘君始也因諸弟子之請遂書之以為贈丘君序時嘉靖丙午秋七月也贈李司訓遷官臨安序古今之變其可怪也歟古者任官以才雖無所不擇然自一藝而上皆可以器而使也至於學校之師則規規而謀之曰彼有道者乎彼有德者乎彼道隆而德純者乎何其求備之至也古者或委之以卿相而不懾投之以盤錯而不避至於命之為師則逡巡而若驚焉曰吾不堪也雖亞聖大賢猶不敢輕也而曰人之患在好為人師何其遜避之至也今則不然不量其人之能與不能也率然而援之為師曰彼無不可焉不自量其身之能與不能也傲然而當乎為師曰吾無不可焉嗚呼古之所靳而不以與有道而未隆有德而未純者今不問其人而可以與者也古亞聖大賢之所遜者今人人之所不遜也其亦可怪也歟或者曰今學校之師誠無難焉勾稽廩食督促升散如是而巳耳其高者講章句課文字如是而巳耳夫使師之為師如是而巳也則誰不可也如曰不如是而巳耳則必修教化興禮樂而後可以無愧然則有志之士居是官者能不畏且懼歟又安得傲然而已乎且夫不量其人而率然授之者是謂失人不自量其身而傲然當之者是謂失己失人者則既失於人矣不可以有𥙷也失己者則所失者巳耳可以勉而𥙷也說命曰惟教學半古人之於教未嘗不學而其學未嘗不資乎教此所謂可勉而𥙷焉者也嘉靖丁酉余始識司訓李君於宜興會君調臨安教諭于是諸生愛君不忍其去也因相與求余文以贈余知君為忠實長者氣溫而語確能自異乎時之為師者可謂有志之士也司訓與教諭雖同為學官然司訓於官為二其勢不可以專不專則其責猶輕教諭於官為長而一學之事皆專焉專則其責益以重矣君固且傲然當之而已歟其亦畏且懼歟吁君其自勉而務學以有𥙷焉可也曰如是而巳耳如是而已耳則余又奚說以贈君哉送陸訓導序六籍之教之廢也久矣而詩為最甚何哉六籍皆以文傳而詩獨以聲傳也昔者孔子患鄭衛之聲亂于雅頌乖刺無所從正乃周流四方聞韶樂於齊不知肉味又得文王之操於萇弘乃始默然自信曰吾六十而耳順然後反魯正樂命太師歌關雎而曰皎如也繹如也洋洋乎盈耳哉自是刪詩定其中聲得三百篇皆𬒳之管絃而雅頌各得其所其于門人弟子亦往往教以詩歌其尤有得者聲若金石而子貢聞聲歌所宜之說於師乙則夫子樂而與之曰賜也可與言詩矣然則詩之為詩不專以其文以其聲也自漢而下詩之文徒在而其聲盡亡然其時樂師尚能譜鹿鳴伐檀文王騶虞四詩又不久而廢韓毛諸家號為專經竭其力以爭草木蟲魚至問其音節不能解也今三百篇具在學官諸生誦習其文與諸經同然絶無有能繹而歌之者而弦匏琴瑟諸器因此遂不列於學官其鹿鳴諸詩則賔興鄉飲酒學官命弟子時一歌之然有聲而不成調噶噶然若擊土鼓然不知其於槁木貫珠之義安在乎若是而欲以陶養性靈風化邦國人知其難也然則詩之存者其亦少矣余少而受詩說於邑人陸文禎先生嘗病不得其聲而亦未暇請於先生也今先生之弟文祥為海鹽訓導文祥亦善說詩以詩貢為是官是官蓋古司樂之遺以六詩為教者以其人之素善於詩而又當乎以詩為教之官竊以為發古六義之意以長育人材而興起菁莪之化非習其文而兼通其聲則不可此其責在文祥宜無所讓故余推舉詩之興廢以為說然余少時聞今之歌有越曲者越人類能歌之而尤著於海鹽之間余亦不能辨其聲也文祥之行也其將能辨之耶豈所謂詩之遺耶抑亦浮艷要眇繁音促節悲而助欲者耶南風柔而靡近寶而民佚以宕海鹽故濵海之沃而柔靡奢慢之俗也豈其俗之發乎其音者固然耶里謡巷謳采詩者以觀風焉其信然耶夫古聲詩之義不傳而艷詞麗曲譁于民間此最教化者之所禁也嘻文祥其尚能以雅而易淫也哉贈何沈兩公㱕蜀廣序嘗聞石鐘之說乎江自蜀走海數萬里寂然未嘗有聲一經石鐘山下則噌吰鞺鞳驟發而駭作夫聲藏於水本非無聲偶遇空洞之石與之相得而一露其竒耳使數萬里間不一遇空洞之石則遂終無聲矣使其為空洞之石者不止石鐘一處為然而瀕江處處多有之則聲當滿天地矣終於無聲與聲滿天地而聲之在水者自如也人之遇於世亦若此矣柏村何將軍之在蜀紫江沈將軍之在廣以身繫兩鎮安危國家倚長城者二十年松茂線路闢百餘年之塞而牂牁兩江熢燧帖息蓋柏村之沉毅如太阿之在匣而不可測紫江之敏鋭如太阿之出匣而不可擬兩將軍意氣不同而同為一時名將頃倭冦起東南駑帥數蹶事人人以為非二老將不可而廟堂亦遂召之及兩將軍之來俯仰諸當路間則舌若膠噤而不能謀臂若踡縮不能展謀焉而率不見竒展焉而率不如意賈勇而來垂翅而去何其智於蜀與廣而拙於東南也倭奴恣睢豈必徑於西畨南猺江海沮洳豈必險於松茂牂牁而利鈍頓異人或以此歉兩將軍兩將軍亦未必不以此自歉昔者李郭兩公專制一靣則挫安史方張之鋭而有餘及與九節度逡巡相州之役則熄朝義既灰之燼而不足此一人也何哉權之在不在焉而巳矣使今兩將軍於東南其所遇如蜀與廣得自專制安知不且為東南長城使向在蜀與廣所遇一不得自專制如東南即毫毛之功未可必立况能以身繫兩鎮安危耶嗚呼士不能自為材豈不信乎兩將軍㱕矣松茂牂牁之間人人相迎曰我公㱕矣吾鎮無事矣兩將軍亦感於東南之垂翅而慨然於故所立功處將不有技癢而心動曰我思用趙人乎否也然則人其可無歉兩將軍而兩將軍可以無自歉矣贈張方士序儒者詆老氏有生於無之說而聖人無聲無臭之密㫖遂亦不傳于世於是修之而為名檢氣節文之而為辭章經術雖華實不同其失聖人之㫖均矣竊疑二氏專求之靜虛縱不能無毫釐之差其去聖學要之較世儒為近於是讀其書問其說於其徒則往往旁門曲見狥象執有蓋亦失所謂老與佛之㫖矣非特儒者為然也巳而因西蠡蔣駕部以會蜀人張方士自言常遇異人於襄陽叩其所傳一以無為為宗得其神氣出入之門而守之以至於坐忘而後為妙參之隂符道德無不吻合可謂得老氏之髓其於楞嚴圎覺諸佛氏言亦若符契然則為二氏學者蓋未嘗無人也吾聖人無聲無臭之㫖倘亦可求乎余是以贈之以言使為老氏學者其無疑於張君之說而學聖人者其尚求所謂不傳之密㫖而母徒安於名節文辭之學也送苐上人度海謁觀音大士序自三十二相至于種種恆河沙相謂之曰皆觀音大士焉可也遍微塵國土謂之曰皆𥙷陀焉可也昔諸菩薩未見多寶佛時多寶佛乃在寶淨國諸菩薩既見多寶佛時多寶佛即不離娑婆世界多寶佛無在無不在而人有見不見耳由此言之求觀音大士者不必𥙷陀求𥙷陀者不必海然而大士見身獨𥙷陀為著而為其徒者往往必跨海以求而後得焉何也吾聞佛家之說以塵勞為苦海以解脫為彼岸非離苦海不能到彼岸如非跨海不能見𥙷陀或者大士假此以度世而其徒又假此以自度也弟之意其出于此乎然則世豈真有𥙷陀者耶其亦化城火聚之寓言耳𥙷陀之事其誕與信無足深究吾特有激于第之行也以𥙷陀之眇然大洋之外絶不見蹤影至使其徒莫不翕然醉心焉不憚驚波之險颶母蛟魚之毒冀一至焉而後為快蓋其信之篤而趨之果如此今儒者學于孔氏孔氏之宫巋然可目量而趾援也其醉心焉與冀一至焉而後為快者何其少歟嗚呼孔氏之與佛不待較而知也然彼能奔走人于窮海不可蹤影之境而此不能奔走人于可以目量趾援之間彼不憚措身于蛟魚之窟而此畫地于坦坦之途是何詭之易溺而正之難㱕耶豈吾儒言義利乃不如佛氏言死生足以關斯人而鍵之耶藉令第始者不為彼而為此其能必至于孔氏之宫如今之必至𥙷陀見大士否耶諺曰雀翼不能伏鵠卵吾才薄不能熾吾儒以柅第之行而回其轅于孔氏也第兹行過山隂見吾友王君汝中者其必有以語第矣葉包菴先生壽序嘉靖壬寅之歲先生年六十門生若干人相與謀贈先生以言順之諗于衆曰蓋嘗觀於漢儒林傳矣乎漢𥘉六經始出秦火齊魯諸老先生大率各以其意治經凡數十家自是諸生各自名其師說而固守之終其身不敢變一字一句以為家法又各自以其師說轉相授受雖文派分擘莫不繩然以世迭譜生徒之盛一家或至千有餘人其傳且十數輩矣猶然名其首傳之人而曰此某氏易也此某氏之書若詩與春秋也在元封間表顯六藝取其說之盛行者立為博士自餘諸家則或以其無師與無書可傳也遂罷不列自是之後諸博士弟子多以經至大官國家有大議論必令傳經義以對至勤人主親自問其師何人師說云何則對曰臣師某也臣師之說云云蓋其重也若是故當其時經生之為業也專而篤經師之為功也尊而信以久今吾包菴先生其古所謂經為人師者非耶先生行修而志潔其於書無不涉也而尤攻于詩先生治詩且三十年雖一以傳注為宗然訓詁名物之外往往能深探古人之精微而發之于文自邑中諸先輩故多以詩名家至先生乃益精先生之出邑子以詩為業者大半多先生弟子先生為學者說詩絲聮髮比關竅開解音節洞朗學者俯而聽之如身殷周之間而聆猗那關雎之響也先生古慤自信故其宦不逹順之碌碌在弟子中進不能張大先生之教以行于世退復不能推衍先生之說以淑于人顧獨知守所聞不敢變而巳然諸弟子中固且多顯者若夫精于其業而轉相授受者固巳不可籍記矣安知不有以經義為國家决大議論引師說以對如昔人者乎又安知不有史氏傳儒林者且將家而列之曰葉氏詩焉然則先生之壽固逺矣若乃壽先生于年齒間不其未歟衆曰然請以為先生壽薛翁八十壽序古者鄉有耆老父兄則率其一鄉之子弟蒸蒸然皆勸之于善而况于其子弟乎至於後世雖其子弟亦莫有勸之于善者而况于其鄉之子弟乎若此者非古人遍愛其鄉之子弟而今人不自愛其子弟也何者其為愛一而其所以愛之之道異也古者貴義而賤利愛之必以其所貴者則固日夜望其子弟之趨於道德仁義也是為愛之而已矣後世貴利而賤義愛之必以其所貴者則固日夜望其子弟之趨於冨貴利逹也是為愛之而巳矣嗟乎人情固憚乎趨道德仁義也雖督之弗率也而又不足以悅其父兄之心則將益怠而肆人情固競乎趨富貴利逹也雖牽之弗止也而又非此不足以悅其父兄之心則將日鋭而堅蓋風俗之靡而古道之缺然也久矣非有志之士孰能自拔于此薛君圖南其始之所目為與其父始之所以望之者固亦猶夫人耳巳而圖南游學于四方得聞仁義道德之說于鄒東郭先生于是惕然有悟快然如遷客之反乎其家則又講求於鄉先生毛古菴與其鄉人朱信夫唐希古之間乃益以自信始欲剝落枝葉㱕其本根既而語其父薛翁曰南也將為此而不為彼矣翁亦惕然知始之所以教其子者之非也于是惟恐其子之不為道德仁義與為之而不底於成也圖南益感其父之愛巳則日夜淬勵惟恐其不為道德仁義與為之而不底于成也吾見薛氏父子之交相成也可不謂能自拔于今之人者歟於是翁年八十圖南與其弟某欲壽翁而問其說於余余曰夫古之所謂不朽與所謂有子者可知已且薛氏父子既有聞於仁義道德之說矣則較修短于彭𥅆殤子之間豈足以為翁壽而鞲臂曲膝饋漿酳爵亦何足以壽其親也哉薛氏居夫椒山夫椒眇然在五湖中土狹而人輳其富人則通魚鹽逐什伍之利其貧者鼓刀筆工獄書家為胥史以機變囂訟為常故其所爭不能錐七而骨肉且反目矣斯固貴利賤義之甚者歟由此言之薛氏父子能自拔于今之人尚不為難其能自拔于其所居尤足多也夫風俗之靡也其𥘉一二人焉倡之而已其反之於古也其𥘉亦一二人焉倡之而巳夫椒之俗之至于是也吾不知其𥘉孰為倡之者而其不能反之于古也吾知其惟無有倡之者耳使薛翁之所以望于圖南與圖南之所以自為者繼此而必底於成彼鄉人之聞薛氏之風安知不有感而興焉者乎然則異日夫椒五湖之曲有稱鄉先生能風其鄉人者必薛翁矣乎是謂翁之能自壽而圖南之能壽其親也巳羅君八十壽序先王所以養老者何其厚而尊也饋漿而酳爵非無人也而天子親之割牲而總干非無人也天子至自袒焉冕焉而為之天子事老者踧踧然如子弟之事其師而無敢肆也老者受天子之奉衎衎然如自受其子弟之奉而無所讓也若然者豈先王以為天下之子弟不足以尊事天下之老者而至于以身代天下子弟之役哉蓋王化必始于孝弟而孝弟之行于下非自上率之不可則尊有所伸固不得而降敬有所隆固不得而殺也周衰而此禮廢矣綘縣老人有白首而從征役者雖洙泗禮義之鄉至于齗齗然少肩其老老下其少而莫之正也由此言之則自諸侯之國鄉黨之間亦不復知齒之可貴矣而况于朝廷之上哉嗟乎王教興則老者尊于朝王教廢則老者不得尊于鄉蓋其勢之使然歟老者于古今誠未有以異也尚不能不隨世為貴賤如此而况於懷珍抱器之士又安得不貴於古而賤於今也歟此君子所為深嘆乎古今之際也夫後世天子之勢益尊而欲其屈體以事匹夫之老者如古之時其勢誠必不能然而老者固鄉人耳以鄉之少者而讓乎鄉之老者使少不肩其老老不下其少力役勞苦先少者飽暖安逸先老者此不過以鄉之人而讓乎其鄉之人耳豈亦有不能者哉然而自周之衰既巳不盡然在後世其又何說則是老者既不尊于朝又不尊于鄉獨所謂稱壽之禮今鄉人行之而不廢也夫稱壽不過飲酒獻酬之間其為禮至末也然而為子弟者曰吾父若兄老矣吾酌而賀焉可也為鄉人者曰吾鄉丈人老矣吾酌而賀焉可也是尚齒之遺也以此意推之老者其亦可以尊於鄉矣孔子觀于鄉而知王道之易易豈非飲酒獻酬之間而其俗猶有近古者歟歙人方生大中從余游求余文以壽其外家雙溪羅君而余不靳為之言者以為是尚齒之遺風俗之近古者也君本衣冠之後而隱于商梁宋吳楚舟車之輳無所不游四方名士無所不交及其晚年息機以㱕老蕭然一室若不知有門外事者蓋方生之語君如此則固老而有行者歟吁有如君者以生于古而親遇三王之盛安知其不在祝鯁祝噎之列也歟奈何使君尊於鄉而巳也然而吾猶幸君之尊于鄉也李封君七十序代人作古今語父子之盛者必推蜀陳氏自文惠公既登將相兩兄弟亦為大官至尊重而其父秦公是時尚無恙每秦公與客坐則文惠公兄弟左右侍立坐客局蹐不安求去秦公笑曰此兒子輩耳今副使五石李侯出則提方寸之印專制一道數千里之地操縱豫奪在其手中而匍匐十餘州郡縣綰綬束帶之吏呼吸十餘萬乘城守障虓雄之士鞭笞深箐絶峝鳥言獸面之蠻夷而莫不如志四方之望之也虎峙而嶽聳其人則奉其怡齊封君於內帣韝而鞠􅎽獻漿而酳爵傴僂而候起居欵密而承色語宛轉嬉歔于尊爼祍席間若嬰兒孺子然此其事與陳氏何異雖侯之祿位勳業其後來未知與文惠公孰上下而封君之壽考榮遇則既巳無歉於秦公封君與秦公又同為蜀人蓋歷四五百年而兩家父子起而相望于岷峨大江之間嘻何其竒也然史稱文惠公居官有節概不妄進取自為小官積十餘年不調一時翕然以恬靜㱕之而文惠出入內外歷典方鎮其在官雖以精嚴立事而其意要㱕於忠厚未嘗按黜一下吏人以為得于秦公之教為多李侯自兵曹主事為御史前後郎署十餘年較其資與望宜在臺省而侯逡巡出就方鎮其故寮多至公卿者而侯坦然無幾微不平見乎色詞此其與沾沾競于勢利者逺甚侯嘗以御史巡江南又巡閩所居雖以憲度從事而溫厚博大未嘗作威福以捃托刻峭為能及為副使則益鎮以清靜數千里內吏承寧一之化民荷悃愊之仁軍戴醪纊之賜而蠻夷亦息戈負耒喁喁然自嚮于亭徼之外然則侯之行巳蒞官大率有似乎文惠公而祿位之同不同有不足論者至于卦君之教其子雖非外人之所得聞然亦知其大率無以異于秦公之所以教也于是封君年七十有二余父與侯為同年封君余大父行也道逺不能走賀堂下嘻倘余得走賀堂下而見侯之侍立左右將有局蹜求去如秦公之客者乎陳封君六十壽序貟外崇度之父封君年六十而王君懋中為說以贈之其論黃冶變化非老子事信矣至以老子為長生久視之學而謂其與吾儒不類則亦未為得老子之精者吾以為老子之書其為㫖也閎而奧其象于物也曲而賾故讀之者卒未能解然世多稱老子為養生家則不過以其玄牝嬰兒之說為魏葛諸人所勦襲而云耳若是則以竒用兵固當屬之兵家而翕張豫取又當為縱橫家耶然則老子之言其亦厖矣莊生以吐故納新熊經鳥伸㱕之彭祖絶不及老子其論老子聞風于古之道術又絶不及長生吐納事明老子彭祖各自為一家不相入也黃冶變化非所以語老子而長生久視亦豈盡老子之精也哉蓋孔子西遊而見老聃有猶龍之嘆而聃之言曰良賈若虛盛德若愚以是參之其所著書多相貫穿出入乃知老子之㫖固在于此至讀孔子繫易之謙以為天道之所虧益人道之所好惡地道之所流變鬼神之所福禍皆不出乎謙盈二者其于老子亦有同乎否耶老氏長生久視之學余不能信而其謙虛不爭持滿守柔以逺禍邇福則老氏之所長而儒者不能易也故嘗以耳目所及質之大易老氏所稱吉凶禍福真若執左劵以要于後者夸詡之子一旦逢機藉勢氣滿而意得極其力之所可獵取漁奪而窮其志之所欲馳騁矜耀居則盛歌舞出則侈僮騎狼藉閭巷間閭巷之人曩與等夷者莫不奔走伏謁喘汗不暇然曾未幾而景響銷歇所謂伏謁喘汗閭巷之人且將徘徊乎其高臺曲池之間相與追其盛而詫乎其衰以豫耳目所及若此者幾何人矣豈其倚伏乘除之數物理固然而不可逃歟其無乃驕汰盈溢犯大易老氏之戒然後至于此歟余觀封君其貌俯然而敕其氣藹然而溫其裏坦然而無所營豈所謂君子終吉而持滿有道者耶老子長生久視之學余雖未知封君之有得焉與否而其謙虛守柔則竊疑其出于老子封君其以余言為然耶為不然耶陸慎齊先生壽序走曩以童子侍先生先生授之書課之文字觀其進止動靜往往奬嘆以為逺器是時先生方日夜治經史綜百家之言期以奮乎身而措之事業然竟齟齬而走也竊先生之口說數年遂以經中第為翰林未幾而拙疾罷㱕時先生尚留滯庠序中比走起為春坊再罷㱕而先生亦已去其業而老于家既獲拜先生于環堵間因復思童子從游時事奄忽二十餘年則先生既颯然成翁而走亦且髮種種矣先生既齟齬以老走亦旅進旅退于是既為先生抱井泄之惻而又深以自愧有負乎先生國士之期也雖然古所謂鄉先生者非其祿與位之謂也古者耆年道藝之士尊則為三老五更以為王侯之師下不失為閭胥族師以教誘化誨其鄉人是以雖居無位之地而各有以致于用先生志行愊實其取與有狷士之節今年益高行益修而益以信乎其鄉縱不得為老與更其所以式是鄉人宜不在古閭胥族師之後然則先生之自致於用固在此而不在彼歟且夫世固有履顯赫之位而身妾婦之行瞿瞿然終日伺人面目為喜戚至於腰脊傴僂老且疲矣而不知止先生少而讀書老而投閒蘧然自足於隴畝而一無所俯仰于其外兩者相較豈得以此而易彼即走雖駑拙無所樹立于世尚幸以山中餘力因先生早歲之說以上泝古人為學之大方冀洗滌宿愆而因淑其身然則所以報國士之期者固亦將在彼而不在此也先生年六十其子維新來請文維新好學能繼先生之志者也遂次其說以授維新使持以為先生壽而因以自朂又以朂維新云爾書水西集華師魯刻其父水西君所為詩文凡八卷曩余與君同在兵曹而君為職方郎是時西北邉數𬒳虜職方頗號多事君據案草奏或一日四五上莫不切中機宜每赤囊才入尚書立召問君君口對甚辨無留滯者於是遂以才稱頃之君坐言者所中免官家居而余時亦罷㱕每嘗候君則見君悄然獨閉一室盡取古儒先所疏注箋纂六經文字凡百餘家精髓糟粕咸在所謂纍世不能殫其說者君獨悉力標駁參伍毫釐同異要於融而聮之以上究六經之㫖而成一家之說若小戴書則既有端緒矣未幾而遂卒自君居劇曹與家居治經亦時以餘力作為詩文蓋君為人徑挺有精力其志甚鋭而用心最苦其試于世則欲以才具功名自振即使枯稿山澤亦欲自託於經術以靳於後世有知我者詩文雖贍切可喜然要非君志之所存也顧其才既遭抑塞而經術所著述亦未克就是以其所志者若或靳之而泯焉無傳其非志之所存者獨尚足以傳於世若此余恐讀是編者以為是足以盡君也故為發君之平生雖然昔人謂容貌祿位不能動人人安肯傳其書然則書之傳者亦往往祿位能動人者也即如世所傳經注百餘家者雖其山澤之儒祿位不顯則以附於六經與之並行而人不能廢之舍是而傳焉者寡矣君既不得顯于功名而又不及託於經術彼其泯焉無傳者則既巳矣其所謂足傳於世者亦焉可知其何如也哉此余所以重悲君之志而為之言者冀後世有因余言而知君者也書錢遇齊高尚卷豫自為編修罷㱕是時邑中士大夫謝事而居者十數人此十數人者里閭丘壑遨遊燕笑之歡日相聚也彬彬乎有佚老之遺焉而余適以罷㱕得厠其間時時從諸君子游相與為樂然諸君子多以久宦致通顯而余亦逡巡郎署者數年而後㱕獨遇齊始挂仕籍不赴官即解去遇齊解官既先于諸君子而年又最高于是諸君子相與推而尊之至相率為詩歌以贈而題其卷首曰高尚其意若有羡于遇齊而歉然以為不可及者夫諸君子既巳與遇齊同其所樂而無間矣顧若有羡于彼而不可及者何也夫士大夫馳騁于功名之門而逍遙乎泉石之娛使兩者各據其方而不相為謀則莫不皆自以為快意然至課其盈虧倚伏之數則泉石之士或病其枯槁而功名之士至以為頭顱可知自悔而無所及方遇齊之抱利器而不售以至于老也則諸君子亦或未始不悲其窮然諸君子之出而用于世也雖無窮愁抑塞之患然而傴僂趦趄日疲乎其形寵辱譽毀日鬪乎其心者宜亦不少矣如是者十數年或三四十年而後得與遇齊同其樂于此譬如賈人歲歲出沒于驚濤駭浪之中既抵于岸而得晏然當此之時亦未有不自笑其稅駕之晚者矣而奚啻有羡于遇齊而已歟然則功名之門此遇齊之所不能與諸君子爭焉者也而泉石之娛此遇齊所以不易其樂而諸君子能同之于終不能同之于始者也易不云乎壯趾則凶遁尾則厲蓋言進而趨時者利于後退而息機者利于先也諸君子之退而息機也比之遇齊則已後矣矧余又誤不自量始弱冠而巳得官未既其根而繁其葉又逡巡其間不早自解去則是諸君子之中其不為遁尾者莫如遇齊其為壯趾者莫如余也余退則既後于遇齊其進也又不幸而早于諸君子噫嘻幾何而不為凶與厲之萃也歟然猶幸得罷㱕以與諸君子相從于泉石之閒雖高尚之風不可以冀矣然莊生所謂樗櫟以不材得全余今亦庶幾焉耳書地理鶴岡况君卷叩巫卜星相堪輿之家而問焉曰吉乎未必然也而聞者驟然喜叩巫卜星相堪輿之家而問焉曰凶乎未必然也而聞者驟然悲則是巫卜星相堪輿常􅍾吉人凶人悲人喜人之權以奔走乎其人而其人之吉凶悲喜一繫于巫卜星相堪輿之口而聽焉若是何也人情常喜希覬乎其所不可必而常揣摩乎其所不可知而術家憑鬼神以自神故多言而或信巧發而竒中􅋵希覬之心與摩揣之見而叩之憑鬼神之人而投之巧發竒中之說宜其入之深也諸家之中其尤熾者曰堪輿其指畫天地支離五行八卦竒中之說尤多而人尤尊之堪輿家吾不知其所始吾意其𥘉本以候土驗氣測量水脉以寧死者而贊慈孝如是而巳蓋未始有鬼䕃之說也自兹說之行至使子孫露其先人不葬以待吉地與吉日致其人而不免於水火者有矣或取土中數十年之陳胔非有山崩水齧而好數徙之甚者豫章饒歙之間盜地以葬往往至於殺人而不止然則堪輿家之說吾懼其不為祥而為孽也夫儒者之論殃慶㱕之積善與惡其說至精猶或半驗半不驗則天道之逺也而謂既朽之骨叢禍叢福若呼谷而響答焉其亦未必然歟鶴岡况君精於術而能竒中者也曩余葬母實藉於君然余之藉君非其吉凶禍福之謂也君間嘗請文於余嗚呼挾君之術以游於世其有不能奔走乎其人而其人之悲喜有不惟君之為聽者歟然則余言何能輕重君耶君如有意乎余言也則君其務為候土驗氣以寧死者母務為吉凶禍福以邀生者而孝子慈孫有溺於吉凶之說其亦以余言解之而巳矣書王氏傳家録後文皇起北藩靖內難一時雲合之士其首功既皆裂土而王矣其斬馘自一級以上至于執殳樵㸑亦莫不授武功爵世其子孫至萬餘然王氏自長史公以儒生首事文皇于藩至其子彥昭兩世矣長史左右夾輔不幸老死及靖難兵起彥昭實與居守其兩世皆不可謂無功然顧不得與一時雲合之士同裂土而又不得一介之爵以世其子孫若是何也豈其翊贊于遵晦之日者不及乎純熙大介之會其居而守社稷者固不如行而扞牧圉之為勞也歟自漢而下拜侯徹爵率以戰功為重文皇之意其或在于此歟雖然裂土之封孰與詩書之澤之可以長久使其子孫飽祿而驕佚孰與使其子孫苦約而思以自立也夫世祿之族驕驕則舉其纍世之所遺者或一朝而禠之儒生之族發憤自立則其先世雖無所遺而猶可以自振自國𥘉以來所謂世祿之族其盛衰可數巳而王氏子孫讀書好禮彬彬然以儒名其家者相望而東齊公以能文官至太常卿東皋公克世其學不墜厥聲其來者猶未艾也然則儒術之與戰功王氏之所以遺其子孫與文皇之所以報王氏者又孰多而孰少耶于是長史公幾世孫稷纂其先人之行事自長史公而下凡幾世題曰王氏傳家録蓋詩書之澤在焉余嘗讀唐李鄴侯家傳侯遇肅宗于潜龍之時及其起事李郭諸人皆以百戰裂土而鄴侯雖幃幄謀臣然不得與其列其事頗與王氏類鄴侯之子繁積書至三萬軸而當世推其文雅此亦偶類于王氏且夫李郭諸人不能世其家也久矣而鄴侯之事至今獨著于世者則以家傳在也然則後有欲觀王氏者其在兹録矣乎此稷之所為纂也重刋荆川先生文集卷之十一
