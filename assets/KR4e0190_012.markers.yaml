  - {type: variant, offset: 15341, length: 678, content: 胡貿棺記書傭胡貿龍㳺人父兄故書賈貿少乏資不䏻賈而以善錐書徃来諸書肆及士人家余不自揆嘗取左氏歷代諸史及諸大家文字所謂汗牛塞棟者稍刪次之以従蕳約既披閱點竄竟則以付貿使裁焉始或篇而離之或句而離之甚者或字而離之其既也篇而聮之句而聮之又字而聮之或聮而復離離而復聮錯綜經緯要扵各㱕其類而止盖其事甚淆且碎非特他書傭徃徃束手雖士人細心讀書者亦多不䏻為此貿扵文義不甚觧曉而獨䏻為此盖其天竅使然余之扵書不䏻及古人蚕絲牛毛之萬一而貿所為則蚕絲牛毛之事也嗟乎書契之不䏻還於結绳書契又繁而不䏻還於蕳也固也然余所以編書之意逺矣非貿則予事無與成然貿非予則其精技亦無所用豈亦所謂各致其䏻者哉貿平生無他嗜好而獨好酒傭書所得錢無少多皆盡扵酒所傭書家不問傭錢必問酒䏻饜否貿無妻與子傭書数十年居身無一壠之瓦一醉之外皆不復知也其顓若此宜其天竅之亦有所發也予年近五十兀兀如病僧益知捐書之樂視向所謂披閱點竄若讎我者盖始以為甘而味之也甚深則覺其苦而絕之也必過其勢然也余既不復一有所披閱點竄貿雖尚以傭書糊口諸士人家而其精技亦虚聞而無所用然則古所謂不䏻自為才者豈獨士之遇世然哉此余與貿之相與始終可以莞然而一笑者也予既不復有所披閱點竄世事又已一切無所與則置二杉棺以待長休貿無妻與子無一錢之蓄死而有棺無棺不可知念其爲我従事乆也亦以一棺卑之而書此以為之劵云嗚呼百餘年後其書或行于世而又或偶有好之者慨然追論其故所刪次之人則予之勤因以不没而貿乃無以自見是余專貿之功也余之書此亦以還功扵貿也雖然余既以披閱點竄為讎而豈欲後人又以披閱點竄知余也哉然則貿之硉硉勤苦從事於割截離合而一付之無何有之鄉也與一醉亦無以異也其亦何憾之有, WYG: ''}
