  - {type: indent, offset: 3685, content: 　　　, id: KR4e0190_krp_012-bkkind6}
  - {type: variant, offset: 3685, length: 985, content: 常州新建関矦祠記嘉靖三十四年倭宼繼亂東南天子命督察趙公文華統師討之師駐嘉興軍中若見関矦靈響助我師者已而師大捷趙公請於朝立廟於嘉興以祀矦事具公所自為廟碑中明年倭寇復亂趙公再統師討之師過常州軍中復若見矦靈響如嘉興趙公喜曰必再捷矣未幾趙公協謀于總督胡公宗憲渠魁徐海等悉就擒趙公益神矦之功命有司立廟于常州侯之廟盛于北而江南諸郡廟矦自今始或謂江南古呉地呉矦讐國呉不宜祀矦矦亦未必歆呉祀此未為知矦之心與鬼神之情状者也先儒有言人皆謂曹操為漢賊不知孫權真漢賊也按矦所事與所同事當時所謂豪傑明於大義者先主孔明而巳孔明猶以為呉可與為援而不可圖先主亦甘與之結婚而不以為嫌惟矦忿然絶其婚罵其使擯不與通竊意當時䏻知呉之為漢賊志必滅之者侯一人而巳權遜君臣亦自知鬼蜮之資必不為侯所容非呉斃侯則矦滅呉此真所謂漢賊不兩存之勢也矦不死則襄樊之戈将轉而指於建業武昌之間矣然則滅呉者矦志也矦之志必滅呉豈有所私讐于呉㢤誠不忍衣冠禮樂之民困于奸雄亂賊之手力欲拯之于鼎沸之中而涼濯之使呉民一日尚困于亂雄矦之志一日未巳也然則矦非讐呉讐其為亂賊于呉者也讐其為亂賊于呉者所以深為呉也矦本欲為呉民斃賊而先斃于賊賫志以没矦之精靈宜其眷眷于呉民矣由此言之矦之所讐莫如亂賊其所最讐而不䏻忘尤莫如為亂賊于呉者倭夷恣兇稔惡以毒螫我呉民是亂賊之尤未有甚焉者也其為侯所震怒而隂誅之所必加翼王師而助之攻也亦何怪乎神人之情不相逺未可以為杳冥而迂之也竊謂呉人宜廟矦矦亦必歆呉之祀於是郡守金君豪以趙胡二公命擇地得城東隅巍然一突下視城郭方可二畝相傳所謂中軍帳者曠無人居君以為廟矦莫此地宜於是樹以穹宫而地益勝古樹數株適當官前森隂倐忽若矦降止郡人来觀莫不喜躍强者賈勇弱者思奮抵掌㦸手若神惎之然則諸公之為此舉非特以荅矦之功其所以作郡人敵愾之氣以待宼者所助不小也久之金君遷去邵君惟中代守有嘉成蹟増之式廓爰勒碑以紀其成而請文於郡人唐順之其詞曰朅朅関矦惟萬人敵天禀義姿志必殱賊北向揮戈七将皆殪匪曰後呉勢有未及欲拯呉民為賊所先精靈在呉死而炳然隂隲呉民至千餘年東南不㳤天墮妖星島酋海宄兇遜再生競為長蛇薦食我呉矦靈在焉䏻無怒乎夷刀如雪手攣不展渠魁倔强悉就烹臠帥臣避讓豈我之力隂有誅之寔徼矦福徼福維何作廟以祀東南廟矦自今其始毘陵巽隅古稱將壇若有待侯鬼兵踞蟠天隂髣髴長刀大旗生欲拯呉没而来思矦徳呉民無間生死么麽小醜永鎮不起郡人入廟踊躍歡喜競如赴敵强跳弱起誰鼔舞之侯有生氣, WYG: ''}
