  - {type: variant, offset: 15319, length: 0, content: '', WYG: 集巻十一欽定四庫全書荆川集巻十二明唐順之撰雜著讀春秋春秋王道也天下無二尊是王道也禮樂征伐㑹盟朝聘生殺之權一出於天子而無有一人之敢衡行無有一人之敢作好惡作威福是王道也是故大宗伯以賓禮親邦國而以間㑹發四方之志天子廵守諸侯既朝則設方明而盟是㑹盟者天子之權也其或不出於天子而私㑹私盟者罪也故春秋凡書㑹書盟者皆罪之諸侯朝於天子而諸侯之自相與也有聘禮無朝禮凡其不朝於天子而私相朝者罪也故凡春秋之書如書朝者皆以罪其朝者與其受朝者九伐之法掌於司馬而天子賜諸侯弓矢斧鉞然後得顓征伐雖其顓之亦必其臨時請命於天子而後行是侵伐者天子之權也其不出於天子而私侵私伐者罪也故凡春秋之書侵書伐者皆罪之諸侯之大夫公子雖其有罪必請於天子而後刑殺焉其不請於天子而顓殺者罪也故凡春秋書殺大夫殺公子者皆罪之夫侵伐有貪兵有憤兵有應兵有討不睦有以籓國侵王朝有以王朝征籓國有以王臣借籓國而戕王朝者故戰有彼善於此者要之無義戰盟㑹有解讎有固黨有同欲相求有同力相援有同患相恤有以呉楚受盟有以呉楚主盟者故㑹盟有彼善於此者而要之無義㑹義盟殺大夫有誅叛有討貳有愎諫有借以説於大國有為强臣去其所忌故殺大夫有彼善於此者要之無義殺是故春秋自于稷澶淵兩㑹之外並不書其故而至於盟㑹侵伐則絶無一書其故者非略也以為其㑹其盟其侵其伐其戰既足以著其罪矣不必問其故也殺大夫必名亦有不名而但書其官如宋人殺其大夫司馬者亦有併其官不書如曹殺其大夫者此非略也以為義繫乎其殺之者而不繫乎其殺者義繫乎其殺之者則其殺也足以著其罪矣義不繫乎其殺者則不必問其為何人與其為有罪無罪焉可也説春秋者不達其意而瑣為之説曰其㑹也以某故殺某大夫也以某故至於盟戰侵伐亦然是皆無益於春秋也而徒為蛇足之畫者夫春秋經世之書也其經世也以正亂賊也易曰臣弑其君子弑其父非一朝一夕矣不早辨也説春秋者亦云人臣無將夫人臣而竊其君侵伐㑹盟刑殺之權其為將也甚矣人臣竊其君侵伐㑹盟刑殺之權而久假焉而莫之歸也其為漸也甚矣故臣子至於推刃於其君父而春秋書其國弑其君某某人弑其君某者是弑之成也是春秋之所痛也人臣而竊其君㑹盟侵伐刑殺之權是弑之漸也將也是春秋之所辨也孔子嘗自言之矣曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出無道而至於自大夫出無道而至於陪臣執國命嗚呼是春秋之勢也挈其漏於陪臣大夫者而還之諸侯挈其漏於諸侯者而還之天子是春秋之撥其亂而反之正也夫周自東遷以前雖王室已不競矣而其權固在也幽弑而平徙岐豐之地委為草莽瀍洛之外聲教阻絶于是尾大之勢成而諸侯横變易禮樂馮衆暴寡大小相朝強弱相刼無一不出於諸侯者而天子曾不得尺寸之權矣盖周之盛王道行頌聲作而其可見者莫如詩雅蓼蕭湛露是諸侯之㑹同於天子者也彤弓是諸侯聽征伐之命於天子者也出車采薇是天子之自為征伐而四海不敢侵叛者也故曰詩亡而春秋作詩未亡天子之權存詩亡天子之權喪春秋收既喪之權而還之天子者也春秋所以接詩亡之後雖一日不得緩也文宣而下則諸侯又不能自執其權而大夫之交政於中國者攘攘矣三桓六卿七穆孫寗魚華陳鮑擁兵樹黨而主勢孤矣葬原仲而私交始矣作三軍舍中軍而魯之權罄於大夫矣盟溴梁盟宋而天下之權罄於大夫矣衎出奔孫陽州孫越入彭城入朝歌入晉陽而大夫之為禍烈矣盖天下之勢愈下而春秋之治之也愈詳桓僖以前列國之大夫惟特使而與魯接者則名之而㑹盟侵伐則大夫未有以名見者夫救徐大夫特將也翟泉大夫特盟也春秋第曰人曰大夫而已不以名見也若此者非略也以為不繫大夫也文宣而下侵伐㑹盟大夫未有不以名見者雖溴梁之㑹其君在也而大夫盟書雞澤之盟君既盟也而大夫盟書若此者非煩也以為繫乎大夫也不繫乎大夫雖夷吾隰朋狐偃趙衰之勲且賢未嘗以名見焉繫乎大夫雖劣如欒黶荀偃髙厚華閲則瑣瑣以名見焉不繫乎大夫雖其君不在而大夫特盟則亦弗詳焉翟泉是矣繫乎大夫雖其君在而大夫綴盟則亦詳焉溴梁雞澤是矣不繫乎大夫雖主帥亦略而人之桓僖以前侵伐書人者是矣繫乎大夫雖偏裨亦牽連而名之鞍之戰是矣其弗詳大夫者以專治諸侯之為亂賊也其詳大夫者以併治大夫之為亂賊也説春秋者不達其義而日人大夫貶也夫書人為貶彼黶閲之徒以名見者乃為褒也耶惟曹薛滕許之大夫始終書人説春秋者曰小國無大夫非也夫此數君者且為人役之不暇而未嘗敢執天下之權也而况其大夫乎盖不繫乎其大夫是以終始人之而弗詳今曰書人為貶則曰齊晉諸大國之大夫偏受褒而曹薛滕許之大夫偏受貶耶侯犯南蒯弗狃陽虎之徒出則大夫又不能自執其權而陪臣實執之矣墮郈書墮費書圍成弗克書竊寶玉大弓書得寶玉大弓書而春秋之正陪臣者又詳矣故孔子欲往公山佛肸之召而曰吾為東周云者即春秋書墮費墮郈意也是春秋之終也或曰盟葵邱盟踐土師於召陵城濮説春秋者以為聖人予之也今亦曰是禮樂征伐自諸侯出也而奪焉可乎曰是不然矣桓文之未出也權雖不在天子而諸侯亦未能盡得天子之權也盖其權散桓文之既出也則權既不在天子又不在他諸侯而桓文獨盡得天子權也盖其權聚譬之主人有千金焉而竊之者十人雖金已不在主人矣然十人而人得百金焉尚未足以當主人也而竊之者一人苟一人而併千金焉則是疑於主人也權之散臣悖於主權之聚臣疑於主故較利害則權之散而交鬬猶不若權之聚而可以紓禍息民語王道則權之聚而疑主猶不若權之散而未有所屬隨之屯曰隨有獲人隨而我獲之未害也而謂之凶豫之坤曰由豫由我致豫未害也而六五以為貞疾故桓文者臣之凶而主之所以貞疾者也且桓文以前諸侯固有相朝者則亦一二小邦而已猶未有六服羣然相朝者固有私盟㑹擅侵伐者則亦一國兩國相讎相結而已未有舉中國而聽於一人未有十餘國而共攻一國者是天子之權未有所屬也桓文之興五年一朝三年一聘而諸侯之玉帛相率而走於其庭天子黼扆之前乃不得一人秉圭而北面者彼齊晉亦偃然受諸侯之朝已而終其身未嘗一涉天子之庭也衣裳之㑹兵車之㑹未嘗有一介請於天子也是故紏合諸侯同奬王室未有如葵邱踐土者諸侯之羣然役屬臣僕於諸侯亦未有如葵邱踐土之甚者荆蠻攘斥中夏乂安未有如召陵城濮者而摟諸侯以伐諸侯亦未有如召陵城濮之甚者説春秋者不達其意而曰㑹於某盟於某是聖人以諸侯授之齊晉也夫王室之不競也諸侯既已盡折而入於齊晉矣聖人不能挈而還之天子也其又推而授之以益其逼也耶夫權自諸侯出不問其如何而均謂之無道敵國相征不問其如何而均謂之無義不知禮樂征伐之出於桓文也其為道耶其為無道耶桓文之戰其為義耶其為無義耶使桓文而誠於勤王誠於禦敵急病而其柄則倒持也其分則上陵也聖人猶必律之以法而桓文且將為法受惡矣况其借名勤王而實則自殖陽為急病而陰欲養亂哉滅譚滅遂本以自肥執曹畀宋為譎已甚桓之末年侈然有封禪革命之心而文至於請隧以葬此其去問鼎者無㡬耳乂何以責楚也然則聖人所稱民受賜一匡而仁之何也曰是聖人之顓論功也而春秋者顓以明道也穀梁氏曰仁不勝道存王室也然則説春秋者曰謹華夷之辨何也曰此誅亂賊之一也夫春秋之所夷者吳與楚楚之先鬻熊為姬文師國於江漢之間而太伯端委以臨吳盖皆神明之胄矣荆人不道間周之亂革子以王叢毒上國吳亦相效而王是亂賊之尤也是以春秋從而夷之春秋諸侯中其顯然為逆者莫如楚吳其陰逆而陽順者莫如齊晉如斷獄之家吳楚則功意俱惡齊晉則功遂意惡功意俱惡故聖人顯誅之顯誅之故其辭直如卒不書葬君臣同詞之類凡皆直辭也功遂意惡故聖人陰奪之陰奪之故其詞微如邢遷於儀夷城楚邱狩河陽之類凡皆微辭也夫小雅未廢而四夷不敢交侵小雅盡廢而後四夷交侵春秋始書荆入蔡以獻舞歸則其跋扈之勢已見桓文奮而扼之其鋒稍阻文也沒而晉霸衰而楚人之圖北方者遂日長而不可制是故春秋書荆入蔡此霸之未興而楚猾中國之始春秋書次于厥貉此霸之既衰而楚窺中國之始盖桓文之所以扼楚者其力有難易而楚與中國之所以盛衰其㡬有倚伏桓起於海濱而所從者宋衞陳蔡皆弱國故謀之十餘年結江結黄連十二國之師而後能服楚於召陵文據表裏山河之固而所從者齊秦皆勁國故反國一年僅連三國之師而遂能克楚於城濮一戰而殺其專兵之將然晉之克楚也得策於結秦而晉之不競於楚也失策於讐秦自殽之役而秦晉相讐殺者厯四五世戰彭衙戰令狐戰河曲積十餘戰而不解是晉人自失一強援自生一强敵失一強援則其氣力不完强敵伺近則其勢不暇於略逺故晉霸之衰而楚益横者殽之役實然説春秋者乃曰殽之役春秋許晉襄繼霸吾不知也夫楚莊者又蠻酋之雄耳而逺交秦巴近攻陳鄭則是晉之讐秦非特生一强敵乃又借盗以兵也春秋書楚人秦人巴人滅庸而楚之謀益狡矣書楚子圍鄭而中國虎牢之險淪於夷矣書宋人及楚人平而南北衡矣天下之勢一變也雖然于時諸侯固有附楚者而猶未敢公然附楚也晉雖已不能盡得諸侯而猶未肯甘心以諸侯委之楚也蜀之盟謂之匱盟盖諸侯猶惴晉人知之也弭兵之説倡而南北之從交見於是中國諸侯公然朝楚向之玉帛於齊晉者盡在楚矣申之㑹空中國而聽焉齊晉之所連以扼楚者今楚人連之以扼中國矣申之㑹諸侯獻六王之禮宋之㑹虢之㑹長楚於晉則是諸侯甘心為夷役而晉人甘心以諸候委於夷也天下之勢又一變也至於吳越交兵而夷禍極矣書伐剡入州来㑹黄池入吳而春秋所以治夷者又詳矣是春秋之終也或曰楚横而齊晉扼之則是中國果不可無桓文也今曰禮樂征伐自諸侯出也而奪焉夫頼人之功以紓患靳人之權以資敵是責鷹鶻之搏而縶其足也不亦迂乎曰不然吾又有以譬之今有僕於此鳩黨鑄兵而主人弗能令也然盗夜入其室則其僕揭兵嘯黨而逐之以僕為不善也然而足以逐盗以僕為善也然而足以抗主故天下無霸而至於四夷縱横而莫之禁者非天下之幸也天下有霸而至於臣疑於主而莫之怪者非天下之幸也夫春秋之事齊桓晉文是也齊桓晉文之功定而王道明矣王道明而亂賊懼矣或謂春秋誅亂賊者誅其弑君者也曰若是則春秋所誅者止於弑三十六君之人耳其亦狹矣然則所謂誅亂賊者何也曰治弑也治諸侯之專也治大夫也治陪臣也治蠻也凡無王者皆亂賦之道也鴈訓執徐之歲有鴈集于顧舍人第舍人筮之得小過焉其繇曰飛鳥遺之音大吉博物}
