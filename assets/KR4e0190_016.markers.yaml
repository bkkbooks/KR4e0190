  - {type: page-break, offset: 15321, content: '', id: KR4e0190_WYG_012-13b, image: WYG1276/WYG1276-0476d.png}
  - {type: variant, offset: 15322, length: 0, content: '', WYG: 獸眎皮珍禽辨羽爾乃披黼戴黻純緅雜緇纎毳似鬒温氄方綈甑􅀈􅨎翨翷翾差池濯冷波以修容颺輕颸而整儀若夫東海獻朱上林呈白匪恒理之所窺亦云極態而盡飾于是使鸚鵡羞綠山鷄讓錦此盖羽儀之至文也舍人綰銀垂黄錯以絺藻顧步流暉折周展耀若是何如公子曰古之言章服者特以殊等威别上下而已非以為侈榮極觀也且令聞被躬安事文繡哉先生曰鬱埜茂林平皋廣澤罻羅無所安施矰繳爾迺頡之頏之翔而後}
  - {type: page-break, offset: 15322, content: '', id: KR4e0190_WYG_012-14a, image: WYG1276/WYG1276-0477a.png}
  - {type: variant, offset: 15323, length: 1, content: 卷, WYG: 輟雲霄}
  - {type: variant, offset: 15325, length: 1, content: 十, WYG: 勁翰指天地以假息故易著漸磐詩詠遵渚豈比夫􅀈鳩蹌踰乎榆枋鷾鴯卑棲于簾廡者哉此盖居處之至適也舍人待詔石渠之庭侍直承明之闥栖遲雲陛偃仰華榱若是何如公子曰儒者以禮義為安居未聞文軒夏屋之為快也且夫東方朔陸沈金馬奚足道哉先生曰神頡作書實始鳥跡而鴈以字稱焉觀其隊矯朋騫翕趿紏紛一從一横乍合乍分既錯落而成㸃亦聫綴而為畫拂素霓以施鉛依𤣥霜以和墨於是掩蝌蚪之竒形奪蝸蜒之巧篆此盖法象之至章也舍人搦碧玉之管操文犀之觚斯籕是摹鍾王為徒若是何如公子曰書者}
