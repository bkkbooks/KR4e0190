  - {type: variant, offset: 15327, length: 0, content: '', WYG: 藝之一耳且夫餘墨成池敝頴成塚固已勤矣無迺非古人所游藝者哉先生曰秋空泬㵳金波皎晶川原䆗窱百籟收聲爾迺揚吭鼔頬載飛載鳴啁哳嗑􅊱嘹嚦呷軋或趂羣而響駛或候侣而聲遲或雙呼而雝雝或单噭而悽悽或中斷而更續比律吕之相諧于是鸛鶴為之罷唳􅀈鴡為之噤舌覊旅聞之而遐思離妻聞之而於邑此盖聲音之至極也舍人擅中吳之逸韻汛下里之煩吟攡篇掜句鍧玉鏘金若是何如公子曰歌賦尚矣然雕蟲篆刻哲人刺焉願先生少益其説也先生曰積石草腓交河凍合蛾蛾層氷皚皚疉雪爾迺審圓方之闔闢謝坎維而向離服匪垂翅于寒門爰晞羽于暘谷異往来于元鳥類屈伸于尺蠖此盖消息之大時也舍人始焉豹隠吳門迺今遘休際昌連茹彚征以應鴻漸豈徒曰好爵是嬰若是何如公子迺俛首深思而未荅也先生遂推而進之曰夫鴈有六德焉知時寒燠智也時去時来若有約劑而不爽者信也銜蘆以避戈慎也締偶不亂者介也能羣者仁也羣而有序者禮也舍人偹姱葆真襲華振若畜茲六德協于禎祥若是何如公子乃雀躍而起喟然而嘆曰嘻吁休哉夫晰萬物之情者不以通塞異觀究天人之際者不以幻化眩見故履㡬莫如謙謙承符莫如兢兢謙謙者人益之兢兢者天庇之然則来鴈之為瑞也盖亦主人之自求多福哉詎不閎哉彼諦圖測諜以覬靈者末矣于是舍人再拜謝先生先生乃去書岳將軍題大營驛莊子以子之於父為命之不可解以臣之於君為義之無所逃意若以君臣為强合予嘗疑其不然觀岳侯所題大營驛壁其處心積慮未嘗一日不在於復中原迎二帝眷眷然若赤子之於慈母然此豈無所逃而為之其亦有所不可解者乎侯之言曰君臣大倫根於天性此侯之所以自狀而吾之所謂異乎莊生者耶彼髙宗者乃忍於㤀父臣敵其獨何心且已既已忍於忘父矣有臣焉為之急於其父如侯者亦竟殺之又獨何心嗚呼綱常萬古事也其磨滅與不磨滅只在此心之死與不死而已髙宗之為心何如也宜侯之竟以殺身而中原卒不可復二帝卒不可還也大營驛故在永州侯所題字久而湮沒余父為是州乃勒之石而併侯所題廣德金沙寺勒之盖侯之心尚炯然在宇宙間未死也固不係乎石之勒不勒雖然使忠臣孝子英雄之士過而讀焉其將慷慨泣下沾襟而繼之以怒髪衝冠者乎書醫施氏婦事語曰物反嘗為妖腥穢之氣薫積世界乃有賊殺其大父者及其弟之婦與弟之婦之大父凡殺者三人其兩人即時死婦尚喘息未絶始某殺大父時婦奔呼某怒其呼也追而斷其頸至骨又刲其口婦忍死齧刀賊以手椎刀至齒根骨乃止刀前後所輳其不絶者一線耳見者莫不憐之亦莫不以為必死㑹余往無錫知金創徐君素有神効而婦家貧甚不能請醫余邀徐君謂之曰君能一往乎徐君激於義舉遂欣然請行曰我不求一錢必活此婦是我心也因與余俱至則婦勢已亟矣徐君視之曰無恙也醫三日而腐肉盡新肉生又二日而口輔上下肉合頸肉起如蓓蕾狀徐君曰生矣始余迎徐君至時余兩弟及親友劉宗堯左升甫徐子初輩聞之亦嘉甚曰是吾輩之心也至是徐君告歸諸友請醵錢為贈不約而合者若干人得銀二兩有竒徐君曰非吾所為来意也余强之曰固知非君意也雖然願少抑君之意以成諸君之義可乎徐君乃不能固辭嗟乎此可以觀人心矣徐君慨然不逺百里而来也其何所為哉諸君之慨然醵錢以醫婦也其何所為哉方徐君欲行時其妻適及月産子且徐君坐市肆可計得厚糈君乃舍其妻之急而徇乎人之妻之急舍其有所利於市肆之間而奔走其無所利於百里之外亦何心哉鄉鄰之鬬雖聖賢亦謂可以無救而簟食之費雖好名者亦所必惜以必惜之費而投之可以無救之鬬至於不約而響應若有所踴躍而不能已者亦何心哉孟子曰人皆有不忍人之心此其機在乎通與塞耳塞則骨肉胡越通則四海我闥或謂今人之非古人之心吾不信也遂書之以貽徐君而且以風世之好義者則古昔相保相愛相䘏相周之俗其亦可以興於今矣瘞河壖枯骨誌髑髏完毁凡若干具其髆髃髀䯒脊脅諸雜骨無算盖出乎犬猪烏鳶所饜飽與夫日炙燹燒風銷水囓之餘而僅有存者自癸夘至乙巳東南荐飢流尸順河而下多於河中之船逮水落不能浮尸尸遂積疊河壖久之維古昔時遇飢饉疾疫則有荒政以聚民其不幸死而暴露則又有掩骼埋胔之令惜哉其不遭乎此時也褚生滔書舍在河壖余與弟正之數往焉每相與散歩河壖之上則見泥滓間圜者如破甌撱者如枯株碎者如沙礫紛然彌望白日照之星星玭玭若尚有光怪余三人者哀其澌滅且盡也命役夫裒而坎焉嗟乎古者葬則旌之以銘旌者别也銘者自名也若曰是其人之骸云耳雖後百千年有得之者亦識之曰是某人之骸云耳古人之于骨骸嚴而别亦不欲其混也若是今乃以五方四裔雜流異業之人而又以殘毁不完之尸爾髆我股甲脊乙脅輳于一坎若藂葦亂蓬然亦重可悲矣然余嘗見元人發宋諸陵事火其尸以其餘骨雜牛馬骨而埋之今此猶尚人骨也嗟乎彼生時何等人也尚不免與牛馬骨同葬况此輩莩丐之餘猶得以人骨附人骨復何憾焉使髑髏果有知如莊生之説必且一噱于吾言矣坎之以嘉靖戊申春二月是掩骼埋胔之時也}
