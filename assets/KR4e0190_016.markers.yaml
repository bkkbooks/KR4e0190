  - {type: variant, offset: 15321, length: 0, content: '', WYG: 聞而往賀之至則蹠華公子在焉公子謂先生曰鄙人聞之人事占㡬天事占符㡬㒺舛盩而能垢符㒺闇沕而弗彰盖昔者元鳥集㦸黄雀投環游龜像紐墜鵲化印斯瑞𦕈乎瑣哉然猶薦紳動色焜焜燿燿若天授幽契而神畀秘寶焉者矧夫鴈抱陽背隂羽蟲最靈者也迺今歛翮戢翼翩然来賓斯亦異矣於舍人何所當焉願先生為舍人鋪張而揚摧之可乎先生曰唯唯可乎哉可乎哉請摭僕所聞而公子選焉夫陸杜隰黍春粟吳粳芬馨狼藉穰穰滿塍爾乃呼儔命侣唼喋蹂踐一飽恒餘羣啗每饜此盖飲食之至樂也舍人嘗羮内饔割肉大官滑脆脭膿溢腹盈飡若是何如公子曰夫繫稻粱之謀者㤀冥冥之志沈豢養之適者違性命之和老子曰五味令人口爽願聞其他先生曰}
