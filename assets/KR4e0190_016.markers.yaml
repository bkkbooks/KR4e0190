  - {type: variant, offset: 14894, length: 0, content: '', WYG: 獨纎於治生蚤起育雛食豕釀酒造醯翦裳滌器染􅀈湅縤僕僕迨燭不自休至見美麗服器飾輒閉目斥去以是能殖其家不獨容菴居積貿遷之故也母雖以纎治産至於振里族之乏繕橋甃衢粥餓槥胔縱解簮珥亦無所嗇容菴慷慨行義傾貲結賔客盖不獨容菴之能施也女夫死無子命子澗為之立後其父母死無子又無可後者則以義立主奉之别室而烝嘗之其知大計往往若此母性凝重訓御諸婦諸女如師門内無嘻嘻聲尤謹嫡庶主僕之分僮婢三百餘指飽饑逸勞人人自以為得也其教諸子有}
