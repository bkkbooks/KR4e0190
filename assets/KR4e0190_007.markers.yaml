  - {type: variant, offset: 0, length: 181, content: 重刋荆川先生文集卷之七與季彭山僕不慧自少亦嘗有志於治經漢宋諸儒先以解經名家者亦頗􅍱其津焉至於當世諸先輩以治經名家者亦嘗承下風而問之葢乆之而不得其說則又將脫去聞見洗刷此心而獨求之於遺經又乆之而竟未之得也偶游㑹稽獲聞髙論則爽然自失先生之於經關竅開解掐擢膓胃若秦越人之隔垣而洞五藏也剖破傳註專門之學辭鋒所向決古人所未決之疑而開今人所不敢開之口如荆卿慷慨擊筑睥睨於燕市之, WYG: ''}
