  - {type: indent, offset: 11286, content: 　, id: KR4e0190_krp_011-bkkind21}
  - {type: variant, offset: 11286, length: 889, content: 贈何沈兩公㱕蜀廣序嘗聞石鐘之說乎江自蜀走海數萬里寂然未嘗有聲一經石鐘山下則噌吰鞺鞳驟發而駭作夫聲蔵於水本非無聲偶遇空洞之石與之相得而一露其竒耳使數萬里間不一遇空洞之石則遂終無聲矣使其爲空洞之石者不止石鐘一處爲然而瀕江處處多有之則聲當滿天地矣終於無聲與聲滿天地而聲之在水者自如也人之遇於世亦若此矣栢村何将軍之在蜀紫江沈将軍之在廣以身繋兩鎮安危國家倚長城者二十年松茂線路闢百餘年之塞而牂牁兩江熢燧帖息盖栢村之沉毅如太阿之在匣而不可測紫江之敏銳如太阿之出匣而不可擬兩將軍意氣不同而同爲一時名将頃倭冦起東南駑帥數蹶事人人以爲非二老将不可而廟堂亦遂召之及兩将軍之來俯仰諸當路間則舌若膠噤而不能謀臂若踡縮不能展謀焉而率不見竒展焉而率不如意賈勇而來垂翅而去何其智於蜀與廣而拙於東南也倭奴恣睢豈必勁於西畨南猺江海沮洳豈必險於松茂牂牁而利鈍頓異人或以此歉兩将軍兩将軍亦未必不以此自歉昔者李郭兩公專制一靣則挫安史方張之銳而有餘及與九節度逡廵相州之役則熄朝義既灰之燼而不足此一人也何哉權之在不在焉而巳矣使今兩将軍於東南其所遇如蜀與廣得自專制安知不且為東南長城使向在蜀與廣所遇一不得自專制如東南即毫毛之功未可必立况能以身繋兩鎮安危耶嗚呼士不能自為材豈不信乎兩将軍㱕矣松茂牂牁之間人人相迎曰我公㱕矣吾鎮無事矣兩将軍亦感於東南之垂翅而慨然於故所立功處將不有技癢而心動曰我思用趙人乎否也然則人其可無歉兩将軍而兩将軍可以無自歉矣贈張方士序儒者詆老氏有生於無之說而聖人無聲無臭之密㫖遂亦不傳扵世於是修之而為名檢氣節文之而為辭章經術雖華實不同其失聖人之㫖均矣竊疑二氏專求之静虚縱不能無毫釐之差其去聖學要之較世儒為近於是讀其書問其說於其徒則徃徃旁門曲見狥象執有盖亦失所謂老與佛之㫖矣非特儒者為然也巳而因西蠡蔣駕部以會蜀人張方士自言常遇異人於襄陽叩其所傳一以無為為宗得其神氣出入之門而守之以至於坐忘而後為妙参之隂符道徳無不脗合可謂得老氏之髄其於楞嚴圎覺諸佛氏言亦若符契然則為二氏學者盖未嘗無人也吾聖人無聲無臭之㫖倘亦可求乎余是以贈之以言使為老氏學者其無疑於張君之說而學聖人者其尚求所謂不傳之密㫖而母徒安於名節文辭之學也, WYG: ''}
