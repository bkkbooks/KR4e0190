  - {type: variant, offset: 3455, length: 262, content: 運使黄慎齋像贊户郎憲卿之祖嗚呼丞倅宦歸珍貝滿屋公二千石廪不贏粟郷吏跑哮亦猛于虎公官四品歛若處女倚勢浚賄沒身則止門衰祚薄亦有餘耻公没卅年淸風未已誰克嗣之不在孫子殷教官石城像贊八舉不第而貢於庠一官不試而歸於郷胡為乎其進之逡廵其所不能必者人胡爲乎退之銳果其所可必者我逡廵其進非才之病銳果其退維志之遂盖我之可必者終不以易乎人之不可必者也某教官像贊爲隱士不如爲校官爲校官不如為顯宦世人之論則然而君去彼而取此者豈其數竒則然盖君之心則亦以爲高牙大纛之榮不足以易其詩書庠序之樂詩書庠序之樂又不足以易其清泉白石之適也耶是君之所以去彼而取此也歟, WYG: ''}
