  - {type: variant, offset: 6834, length: 693, content: 不孝罪惡深重居常不能承順顔色臨病不能盡心醫藥以致先考殞殁終天之痛無所復言每一哀至恨不即死早侍先考於地下行復自念先考百年門戸付托之重苟活至今顧平生頗無富貴之心年垂五十用世一念亦漸冷落不圖䘮期内外兩承朝命臣子之義不敢逡廵謹於三月間赴京顧世事之安危休戚不敢知此身之禍福利害不敢知苟時有可爲不敢不竭駑鈍之才時遇多艱不敢忘致身之義時或可退不敢昩保身之幾此先考之所以垂教而順之之所以自立者也祭祖廟文伏惟我祖宗世以忠厚傳家永嗣至我先考克繼世德而益修之順之少事先考見其孜孜惻怛雖一螻蟻草木亦不忍傷順之欽承敕命視師浙直顧生殺誅宥有天命君師在順之不敢專但念祖宗一脉之緒必不肯輕以人命易已功名至于不得已而後殺之謹此告知祖宗伏惟昭鑒祭弓矢文天實生乎五材人爰作乎五兵顧明昏之異用則或替而或興惟及逺而洞堅尤弓矢之爲利有事則以戰勝無事用諸禮義匡四方之宿心竊有冀乎斯技少多疾而未能深自慚於㳺藝屬園田之再返幸旅力之既閒謝冠簮于北闕學馳獵於南山審機括於心契獲縱送於口傳既耽玩而忘倦遂拈弄以經年頼明靈之黙贊似有牖乎余衷時絃鵠之應聲若迅呼于順風兹歳終而告成嚮明靈以徼福雙有適于力巧一無誤于手目尚進藝於德途中此心而爲鵠惟明靈其享之祭六纛司旗牌司刀之神文生者陽道殺者隂道天生天殺雖云並用而上帝好生不得已而殺之上帝不得已而以司殺之權寄之天子天子不得已而以司殺之權付之閫外之臣必不得已而後殺所以體天心也上古有罪者一人不殺則千萬人不能生故殺人所以生人也今臣獲亂兵六人實爲殺人之始敢告上帝不得已之意伏惟照鑒祭刀文嗚呼上帝厭亂此刀不敢不用上帝好生此刀不可輕用某欽承朝命給有旗牌今殺亂兵是爲用刀之始敢告司刀之神伏惟照鑒重刋荆川先生文集卷之十三, WYG: 撰墓誌銘}
