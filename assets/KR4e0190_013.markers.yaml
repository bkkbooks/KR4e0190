  - {type: variant, offset: 1921, length: 464, content: 誄王御史毅齋誄余讀毅齋公事而傷之嗟乎瑾之禍烈矣然瑾竟不能殺公于虐𦦨橫𬒳之日而公所劾侍郎某者乃能扼公於衆正彚征之後遂至擯棄以死然則柰何獨罪奄哉余既高公之節又與公之子挻相友善乃為之誄曰丙寅𥘉元是生孽牙誰爲其虺忽焉為蛇金陵鳯陽以及宫禁星隕雷撃爲國妖䜟公爲御史執法臺端謂此不言焉用豸冠披腹呌閽變豈虚來匪實不應請絶内批奄見之怒碎而投地公再上章其氣彌厲弗預爲防噬臍何益黨錮甘露豈一朝夕虎豹狺狺九關帝居獻忠不足賈禍有餘彼奄熏灼口出詔制爵人族人專行弗忌長跪者誰金玉其帶桓桓台司望塵亦拜大杖高枷惨於炮烙公竟不免筋絶骨鑠始繋詔獄免歸故郡謂奄可矣而又欲甚再加之罪百計捃摭罰米輸邊積二百石鄰貸里質猶不及額書籍亦空何况田宅害氣有盡彼奄即誅公復其官抜茅以茹臺章薦公暨劉及謝東山木齋次且其行竟终牖下繄何人斯賑而匿米公爲御史上章露詆時維秉鈞盡力以扼此士人也奄又何責在奄煽虐冤骨縱橫曷賢不及而公猶生迨奄既誅彈冠生氣曷賢不及而公以廢則奄之虐猶尚可逭彼奸之毒其誰能挽嗚呼孽狐鼫鼠何世蔑有天熒日晶潛形縮首雨晦風冥紛出為醜公也不辰獨罹其否小大徃來隂陽纒紏再拜誄公我心孔疚, WYG: ''}
