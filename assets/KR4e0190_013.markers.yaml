  - {type: substitution, offset: 5970, original: 夣, replacement: 夢, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19960}}
  - {type: variant, offset: 5976, length: 856, content: 君所也巳而果然夫公意其子之留吾所而至於形諸夣祠部君果留吾所而至於符公之夣則公父子之於余可知矣然則公之知余非特以同年之故而余之哀公盖亦不專於以同年之故矣公博雅爲儒宜其可以俯拾青紫而竟蹶於南宫之試㢘敏爲吏宜其可以坐致通顯而卒困於州郡之職盖所謂厚積而薄發以遺其諸後宜乎禮部君之蔚爲聞人而諸子之克世其家學也然則公其可以無憾矣余之文非特以哀公其亦以慰公也夫祭孫南野太僕文代有懷翁作公之先人以侯樹勲侯雖不嗣猶大其門數世之後遂以儒顯顯惟邁跡亨衢是踐人皆謂公出自紈袴公之居官一如寒窶馬羸衣敝何履之素約巳奉法䋲地而歩問公之官囊無餘蓄問公之家亦有夏屋公瘠於官不繋其家晏嬰鉅族豆無掩猳公𥙿於家不繫其官子荆居室苟合而完刑曹郡守外臺大㒒孰云宦成節則愈確公無渝節衆有好醜一忤於世自反何疚欣然歸來燕居恂恂室無姬侍庭無雜賔尤避名勢逍遙角巾鄉人見之不知貴人余辱於公爰締婚媾婚媾則新交誼則舊兩家相望里閈之間匪朝伊夕載徃載還余厭紛囂公耽恬寂真率之會兩心莫逆方期與公共保歲寒胡奪之速忽焉盖棺公之云亡論在鄉評請祭於社曰鄉先生死而不朽公則何憾老失良朋能不我嘆表公之墓豈足彰公庶無愧詞僉言實同春還隴樹公窆有期陳此薄奠文以侑之祭胡評事省齋文嗚呼事有至急者病而需艾溺而需瓠是也然當其膏盲無虞則三年之艾等於腐草舟楫足恃則千金之瓠輕於敝箒自公之存東南承平且二百年戴白老儂不識兠鍪殳㦸爲何物縉紳學士相與弄筆墨婉孌嬉㳺而已公方且日夜經營乎縱横韜鈐之變毎賔客滿座談鋒迅發真若旗鼓相對霆雹交繳何其壮也然持三年之艾而貫於飽食徤歩之人懐千金之瓠而衒於安流穩楫之時則言者類於迂濶聴者厭其強聒一旦盗駭海隅毒滿郡國上官諸公乃始倚公以計謀而公頺乎老且病矣公旣死海氛益張謀夫喑啞于是向之婉孌嬉㳺目公為迂濶者皆凛凛愁不保其孥相與注心聚耳冀公之一強聒而不可得嗚呼此何以異於膏肓亟矣而適䘮其蓄艾中流失船而又碎其一瓠也哉其時之不遭乎公公之不遭乎時也然公之子亘公嘗教之武舉而習聞乎家庭韜鈐之說則夫效三年之用而収千金之賞又安知不在後人也耶某因祭公而叙公之存没繋乎時事者若此他可畧也惟公享之祭有懷府君文, WYG: ''}
