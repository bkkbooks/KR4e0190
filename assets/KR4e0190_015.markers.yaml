  - {type: indent, offset: 10945, content: 　, id: KR4e0190_krp_015-bkkind24}
  - {type: variant, offset: 10945, length: 899, content: 封孺人荘氏墓志銘孺人病踰三年嘉靖戊申冬十一月二日而卒年四十有一孺人之病也積扵驚發扵悲蹙扵欝庚子冬余以狂謬俟罪者二十七日孺人寤寢惕惕若其夫蹈不測而已不能以生然者既蒙恩免歸孺人抱餘驚就途抵家熱蒸骨如是者數年熱漸解而瘠則不復肉矣未幾母陳孺人卒臨尸而驟淋盖醫家悲動肺之證也每淋輙暈死如是者又二年淋既止而生氣耗矣自是䐜腫瘕泄百痛間作既病甚則念其二女未有所歸又以爲女縱得所歸而已且旦暮死不能終其奩具䄜帨之事以爲欝欝雖其病必不起而其蹙之也則若以是然者叢三不可解之情以竟成三不可藥之疾嗚呼其可哀也巳孺人荘氏河間守鶴溪公之女孫静思翁之女永州守有懐翁之婦其夫余順之也年十七而嫁二十六而夫爲編修以恩例封孺人孺人始嫁見扵舅姑舅曰所嘱婦者無他第閨外不聞婦聲足矣自是舅徃來閨外竟廿餘年不識孺人聲舅每嘆以爲能婦余癖扵書平生不一開口問米塩耕織事則以孺人爲之綜理也余最迂僻寡合入門則歡然若得朋以孺人素能得余心事也其與余處者則然而其鍾情母子間也特甚自父母之慕雖男子或移扵妻子而女子扵父母家記禮者亦外而不内孺人雖以與余廿餘年之歡未嘗一日輟其母子之戀其所爲父母家計者黾黾焉悉其乏而排其難較其家事未嘗少内外之也其教二女也愛不廢嚴其教子也嚴過扵予其封十五六年余未嘗爲置一翠冠其所享率如是孺人固不少讁望我而余所居官每不能過慎以速咎則孺人口不敢止也而心切苦之故余嘗謂孺人女也而任子之事母也而兼父之嚴未嘗過享其夫有官之奉而蹙于其夫有官之累然則所謂三不可解扵情者盖不獨其致疾時自其居常則然也孺人卒扵鷄鳴時燭入則漸矣自其夫及其女與妾與女奴皆有囑囑余者曰吾身後而當爲計則然又曰篋中衣以歸二女餘衣以與妾已而曰田五畆以遺吾家然則其不可解者又不獨其疾時及瞑猶尚不能解也孺人有烈性居常不媚笑語如荘士又每聞余死生之說若有契焉故其卒也精明若此葬且迫不及請銘扵當世之君子而余又茹痛不能詳也謹述其死生大致以見孺人之平生子一人鶴徴聘萬氏禮部主事思節之女女二其長者以字行太僕卿孫公南野之孫臬則卒之前一月也葬以卒之年十二月十九日祔扵姑任宜人之墓而先一年則余弟婦窆焉孺人事姑六年而姑卒其妯娌間姊妺也余既已載之弟婦誌中矣故扵孺人之葬也爲之辭以慰之曰姑扵是只娌于是只生苦離只死相隨只, WYG: ''}
