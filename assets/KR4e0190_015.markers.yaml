  - {type: variant, offset: 13537, length: 1192, content: 程少君行狀程少君者新安岑川里人也諱楷字良式遺拙其號也新安程氏之先名靈洗者仕蕭梁時有功封侯死謚忠壮公凡新安之程皆本忠壮公而徙岑川者則自誠始誠四世孫瑞瑞生祚祚以子官封御史自忠壮公至封御史君支派散别移徙母常居然世次則可謂云封御史君娶曹氏而生三子長君名相仲君名材爲御史而少君最少子少君㓜樸魯人以爲不慧大父瑞獨心竒之曰是兒類我我少嘗如是少君稍長益踈散不喜事獨常之沼上觀所蓄魚爲樂封御史君弗善也然心念大父言欲試之乃使之應鄉中役以㣲觀其能已而鄉中役稱辦鄉人以爲少君不苛而事辦則始相與推擇少君而封御史君亦始喜少君之能任事也後封御史君老聵仲君宦長君且多疾家事一决于少君少君有所規畫無弗當封御史君意封御史君又益喜新安土磽狹田蓄少人庶仰賈而食即閥閱家不憚爲賈而程長君少君亦間出爲賈他賈人率婁藪重錢心計極毫釐然占所進貲顧或反薄少君兄弟長者大度尠筭計嘗東賈吴北賈魯廼吳魯人皆樂與少君兄弟㳺益就之故程氏賈行吳魯間占所進貲更多他賈人長君賈張秋乆人或言巳死是時少君罷賈休家聞之亟徃訊長君則長君故無恙大驚喜竟與俱歸長君歸而後復賈清泉少君則又從長君居清泉𥘉仲君爲御史時勾檢内帑財籍至是仲君死内帑財物失闌出入事覺主者窮本坐程御史事下歙縣案御史罪狀而御史已前死法當原有司誤論程御史家坐徙廼悉逮繫程御史家扵歙縣獄鞠之而少君時在吳吳人欲謀匿少君母徃俱縶爲也少君曰父兄在吾焉所匿且我家故無臯廼有司謬論之我左右營救可竟白也即不白我何愛一死以狥父兄亟馳歸抵家㑹事以前解少君即靣數有司有司不能難其戅直如此少君之居清泉也病痺歸且愈矣後繼徃復病痺歸歸益病不治竟死少君死於嘉靖甲申五月十六日死時年五十有六矣少君爲人淳質無所猜對人輙見肝膈人或愚之終不爲變諸嘗與人言事恣意語無隱人隂属之曰若母泄我語乃君竟泄其語用是觸人忌諱人亦㢘少君無他腸不深疾之而少君亦不以語洩故遂自懲閉口也他事又恣意語無隱如故而人乃益推少君性直云聞宦氏子弟矜耀者則曰唉我兄爲御史時我常恐人謂我御史弟指目我我廼深自避匿廼今何爲詡詡然若揚錦而招扵市者吾羞之家僮嘗病疫或請禳少君怒曰疫無鬼即禳何益使疫有鬼吾且刄之遂不禳疫亦竟止少君雖㳺于賈中然喜文雅自爲兒子受論孟小學書扵塾師誦熟之及㳺吳時慕張君東海之爲人也張君者松江人善詩字字尤工程少君乃學張君字至或罷眠食居常以手畫腹及堵間作鈎剔狀即又學張君所爲詩諷詠之其妻宋安人誚曰君寕當作老博士耶少君笑曰汝謂必作博士始事詩書耶少君死後四年有子曰烈始舉進事爲工部主事㑹天子加恩海内廼贈程少君爲工部主事如其子官云始烈少而材少君教之書烈性剛負氣少君教之曰汝治汝性即不治汝性讀書奚益故烈爲工部有聲少君之教也少君子三人點烈黔一女妻某人孫男三人應軫應陽應彩少君既得贈官烈乃涕泣而言曰嗟乎先人卒烈㓜賤不能以有章顯也廼今䝉先人餘業與從縉紳先生之後又幸徼天子恩澤光我先人苟又墮先人之懿行不載罪莫大焉扵是捜戢徃事口授其友人唐某某受而書之如右重刋荆川先生文集卷之十五, WYG: ''}
