  - {type: variant, offset: 12096, length: 1602, content: 鈐山堂詩集序毛鄭說詩有詩譜以譜詩人之世也作詩者豈亦自譜其世矣乎至如羔羊之委蛇自公兎罝之好逑公侯碩人之隱扵公庭考槃之遁扵澗谷其人之進退隱顯徃徃自見扵詩而說詩者為之譜其世則因其人之進退隱顯而時之休明衰替變化而蕃閉塞而隱亦因可見故曰誦其詩知其人是以論其世也少師介谿嚴公少稱神童弱冠舉進士入翰林在正德間同時諸僚莫不優㳺玉廬而公獨引身鈐山之隩堅苦績學以邃其所蓄如是者十有餘年故其為詩多道岩壑幽居之趣而公之跡則疑扵隱至嘉靖𥘉公起南院歴遷南吏書是時公負相望乆矣徃時諸僚及後軰多巳聮翩秉鈞軸而公猶廻翔散地如是者又十五六年故其為詩多紀留都冠盖之盛公雖已位上卿而志未大得也則又疑扵隱顯之間聖眀御極垂二十年顧前所用内閣諸臣罕能稱上心者而獨注意扵公遂自南宫入内閣未幾遂首内閣上下之交深故其積之也乆經綸之業厚故其發之也遲自是禮樂典章属公協賛煥然以備北虜南倭時有兵革舉賢援能宻授廟算罔不奏功徃徃自為詩以紀其盛至于一時人才公所獎抜而布列者亦彬然畢見扵公之詩公詩有翰苑稿使粤稿留院稿使郢稿留省稿南銓稿南宮稿直廬稿公扵詩文各極其工而尤喜為詩公所寓必有詩若以自紀其進退隱顯之跡而讀詩者則以論世也杜少陵一老拾遺偃蹇無所與扵世以其忠義所發為詩多紀時事故謂詩史而唐人又為少陵詩譜以論其世况公詩所紀當世之國家大事皆身所歷而自為之者少陵詩謂之詩史然則公之詩謂為時政記亦可也毛鄭詩譜以譜衆人則詳扵其世而人繋之少陵詩譜以譜一人則詳扵其人而世繋之必有譜公之詩者則公進退隱顯之跡益以明而世益可論矣公既以全詩授胡梅林總督使刻之而属某為之序某竊以文詞受知扵公公頗謂可與言詩者嘗侍公扵苑直公示之近稿曰吾少扵詩務鍜錬組織求合古調今則率吾意而為之耳某對曰公南都以前之詩猶煩䋲削也至此則不煩䋲削而合矣公頷之已而曰吾不與後軰談詩恐以詩人目我而敝精扵無益語也夫公之詩雄深古雅渾密天成有商周郊廟之遺知音者自當得之然公既不欲以此自著而某又敢以此仰賛扵公哉特舉公之詩係扵談世故之大者使論世者有考焉遂書以爲鈐山詩集序公之諸稿隱顯備矣總而題之曰鈐山集盖處貴顯而不忘隱約者公之志而讀詩者則以爲公之詩鈐山深蓄之力也夫董中峯侍郎文集序喉中以轉氣管中以轉聲氣有湮而復暢聲有歇而復宣闔之以助開尾之以引首此皆發扵天機之自然而凡為樂者其不能然也最善為樂者則不然其妙常在扵喉管之交而其用常潜乎聲氣之表氣轉扵氣之未湮是以湮暢百變而常若一氣聲轉扵聲之未歇是以歇宣萬殊而常若一聲使喉管聲氣融而為一而莫可以窺盖其機㣲矣然而其聲與氣之必有所轉而所謂開闔首尾之節凡為樂者莫不皆然者則不容異也使不轉氣與聲則何以為樂使其轉氣與聲而可以窺也則樂何以為神有賤工者見夫善為樂者之若無所轉而以為果無所轉也扵是直其氣與聲而出之戛戛然一徃而不復是撃腐木濕鼓之音也言文者何以異此漢以前之文未嘗無法而未嘗有法法寓扵無法之中故其爲法也密而不可窺唐與近代之文不能無法而能毫釐不失乎法以有法為法故其為法也嚴而不可犯密則疑扵無所謂法嚴則疑扵有法而可窺然而文之必有法出乎自然而不可易者則不容異也且夫不能有法而何以議扵無法有人焉見夫漢以前之文疑扵無法而以為果無法也扵是率然而出之决裂以為體餖飣以爲詞盡去自古以來開闔首尾經緯錯綜之法而别爲一種臃腫侰澁浮蕩之文其氣離而不属其聲離而不節其意卑其語澁以爲秦與漢之文如是也豈不猶腐木濕鼓之音而且詫曰吾之樂合乎神嗚呼今之言秦與漢者紛紛是矣知其果秦乎漢乎否也中峯先生之文未嘗言秦與漢而能盡其才之所近其守䋲墨謹而不肆時出新意扵䋲墨之餘盖其所自得而未嘗離乎法其記與序文章家所謂法之甚嚴者先生尤長先生在翰林三十餘年嘗有聞扵弘治以前諸先軰老儒而潜思以至之故其所為若此然今之為先生之文者盖少其知先生之文而好之者又少矣先生之子近思将刻集以傳而請序扵余近思豈亦以為世之言秦與漢者未必能知先生之文而余之愚陋稍知之也晋江王道思平凉趙景仁其文在一時文人中最有法皆先生丙戌為考官時所取士近思試以先生之文與吾言質之其必有合乎否也重刋, WYG: ''}
