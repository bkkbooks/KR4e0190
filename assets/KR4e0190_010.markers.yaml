  - {type: variant, offset: 6545, length: 1624, content: 右編序古今宇宙一大棊局也天時有從逆地理有險易人情有愛惡機事有利害皆棊局中所載也古聖人經天緯地畫野肇州設官分職正外位内幽明人鬼不相凟擾奸良淑慝鳥獸戎夷各止其所所以界棊局也至扵奕數之變縱橫翻覆紛然不齊雖其紛然不齊而至扵千百億局則其變亦幾乎盡而其法亦畧備矣自三代之末至扵有元上下二千餘年所謂世事理亂愛惡利害情偽㐫吉成敗之變雖不可勝窮而亦幾乎盡經國之士研精畢智所以因勢而曲為之慮者雖不可為典要而亦未嘗無典要也語云人情世事古猶今也豈不然哉奏議者奕之譜也師心者廢譜拘方者泥譜其失均也有見乎背立之說則以病背水之軍有見乎死地之說則以置背水之軍然而二說同出扵十三篇中焉可泥也而焉可廢也余之纂右編特以爲譜之不可廢而已而未及乎不泥譜之說也右編者古者右史記言也左編附序左編者爲治法而纂也非關扵治者勿録也關扵治者則妃后外戚儲宗宦倖奸篡方鎮夷狄草莽之亂而總之将與相而總之君亦云備矣然周官治典所􅕄曰師曰儒師儒何與扵治典也君與相與将行之師儒講而眀之故云師道立則善人多而朝廷正言師儒之係乎治者重也故纂前史儒林道學諸傳為諸儒傳經生訓詁文詞筆劄儒之别也故次之諸儒之後隱士不事王侯而志可則深處巖壑而龍光扵朝英主亦徃徃尊禮其人以風世所謂以無用為用也故纂隱逸傳至扵前史有方技傳盖巫史宗祝所以左右人君而星暦醫藥百工皆有國者之不可缺以漢一時論之東方之詼諧滑稽而要之引君扵正丘子明之卜毛延壽之畫與巫蠱之禍則其為奸不可窮詰其人所係殆若此故纂方技傳三代而下儒術與二氏相盛衰亦世道之變也馬遷傳老子范史始紀西域沙門夫二氏之書各五千餘卷其說侈矣則其人宜不可以無紀也且以觀儒術之盛衰焉纂二氏傳而總之為左編附云文編序歐陽子述楊子雲之言曰㫁木為棊梡革為鞠莫不有法而况扵書乎然則又况扵文乎以為神明乎吾心而止矣則之畫亦贅矣然而畫非贅也神眀之用所不得已也畫非贅則所謂一與言為二二與一爲三自兹以徃巧歷不能盡而文不可勝窮矣文而至扵不可勝窮其亦有不得巳而然者乎然則不能無文而文不能無法是編者文之工匠而法之至也聖人以神明而逹之扵文文士研精于文以窺神眀之奥其窺之也有偏有全有小有大有駁有醇而皆有得也而神明未嘗不在焉所謂法者神明之變化也易曰剛柔交錯天文也文明以止人文也學者觀之可以知所謂法矣雜編序易不云乎言天下之至賾而不可惡也曾子論道之所貴者三而㱕籩豆扵司存以反本也論者猶以為頗析道噐而二之莊生云道在稊稗在瓦礫在尿溺其說靡矣儒者顧有取焉以為可以語道噐之不二也語理而盡扵六經語治而盡扵六官蔑以加之矣然而諸子百家之異說農圃工賈毉卜堪輿占氣星暦方技之小道與夫六藝之節脉碎細皆儒者之所宜究其說而折衷之未可以為賾而惡之也善學者由之以多識蓄徳不善學者由之以溺心而㓕質則繋乎所趨而已史家有諸志雜編者廣諸志而爲之者也以為語理而不盡扵六經語治而不盡扵六官也故名之曰雜編福建郷試録後序代作竊聞化之隆也候扵逺治之衰也候扵近周文王壽考作人而汝濆江沱之間至扵田野武夫皆可爲干城腹心及周之衰則自溱洧之郊密邇王畿且學校堕壞士人挑闥而缺扵禮故詩人本王道之興廢兎罝子衿並列于風豈非以逺近爲候與今閩粤去畿甸最遙乃士人蔚然有章採禮樂之華掇仁義之精其經術直與鄒魯相抗而文采或過焉扵戯此所謂候諸逺者乎盖自我高皇帝取閩時曾不血刄而八郡嚮風山珍海錯海外竒寳方軌而走扵中國下至蠻谿蜑􅊤皆得脫去桴鼓之警而修其爼豆之業者且百餘年今天子又方懋徳建中以仁義禮樂鼓鑄區宇漸濡煦沫冐于海隅是其人文之化欝扵古而盛扵今有不然與說者謂文王國扵岐豐而江沱汝墳正直其南故詩人歌之謂之二南言王化自北而究扵南今京師古幽薊之墟當中國艮維閩粤當巽維亦直其南觀之天文北極執斗樞以旋轉六合而閩粤在東甌之宿近太㣲明堂之位北直斗柄又大海首起于東北而其委在東南潮汐相應天地呼吸之氣相通由此言之天運人事殆有符應者乎故必以閩粤之盛為天下文明之候而不敢以繋之一方之開塞也夫多士者不啻古兎罝野人之儔也既與山珍海錯並輸扵天子豈不有魁梧瓌偉之噐可以當干城腹心如兎罝野人者與則世有歌頌天子作人之化其必以閩粤為二南矣多士則永有聞扵世矣乎, WYG: ''}
