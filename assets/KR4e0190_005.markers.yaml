  - {type: variant, offset: 10753, length: 9490, content: 來無多僕嘗誦而笑之以為履常知書画之有益而為益有甚于書画者履常不知也履常自悔其歲月之不足以給書画而書畫祗足以縻費歲月者履常不知也吾軰年巳長大雖籠聚精神早夜矻矻從事于聖賢之後尚惧枉却此生則雖詩文與記誦便可一切罷去況更有贅日剰力爲此䑛筆和墨之事乎然僕聞之畫家之說亦不以䑛筆和墨者之為工而必解衣盤薄之爲上乃知画家不貴䏻画正在䏻不画耳若此者所以凝神而不分其志也兄之画品䏻通乎此則僕之所不敢知而所以諷兄者不乃爲土苴末論乎幸兄一笑而擲之可也僕自別後携家至陽羡謝去世事牽纏時時閉門黙坐始知平日没于多𡵨蕩精揺神之過毎讀邵子勞多未有收功處踏盡人間閒路𡵨之語則憮然大悔者乆之是以奕棋賦詩博聞强記皆昔所甚好或終歲不對局或經月不成一韵或數旬不展卷雖或為人所强與自强為之亦竟如嚼蠟了然絕無滋味也觀尊卷所書數作則荒落踈懶之態可盡見之僕之為此其志亦欲發憤刋落收功一源而力必不䏻逮也惟兄有以敎之與二弟正之行者居者形跡各別然理道無二致也日用功夫無二致也汝兄在山中若不能謝遣世縁澄徹此心或止游玩山水笑傲度日是以有限日力作却無益靡費即與在家何異汝在家若䏻忍節嗜慾痛割俗情振起十數年懶散氣習將精神㱕併一路使讀書務爲心得則與在山中何異艱哉艱哉各各弩力居常只見人過不見巳過此學者切骨病痛亦學者公共病痛此後讀書做人須苦切點檢自家病痛葢所惡於人許多病痛若真知反身則色色有之也與薛方山郎中爲别甚乆可勝耿耿時迫歲暮百感俱集自惟年垂四十已蹈無聞之戒世間事既幸不復關渉一箇身子又自不䏻了終日碌碌竟是何事囘頭一看不覺􅛐笑以此來歲更欲作一閉關之計生徒盡巳謝遣交游亦且息絶非敢望於坐進此道亦庶幾作天地間一閑人不落閙攘套中儘有受用矣康節云豈謂此身丼老杇尚無閒地可盤桓毎誦此語悵然太息文詞技能種種與心為闘亦從生徒交㳺之例盡謝遣之盡息絶之不然猶是閙攘套子也山林之士終是入山㴱入林宻乃是安穩地面而日侍老父必須居城中如前所說欲効古人隐身􅒡市陸沉於俗者不識能乎否耳吾兄方為時樹䇿勳名勉旃山人雖不與人閑事亦當傾耳以聴下風也與張西磐尚書伏惟明公清苦之節直方之氣葢得之天禀而孳孳好學老而彌篤此海内後生之所慕望而興焉者也人者天地之心人心原是與天同運頃刻有息則便不相似程叔子曰人不學則老而衰衞武公作抑戒使人日誦以自儆其喫緊全在不愧屋漏一語是時武公年九十餘矣其學之勤而宻也如是竊惟明公家居以來所以專精致神究極髙明而㴱入古人之閫奥者固益知非淺夫之敢窺矣北冀南呉何日得一奉敎左右藉鍼砭以自㳤耶某少頗不敢自棄今年且四十益覺進徳之難此身在欲界中頭出頭沒乃知古人寡欲慎獨工夫眞未敢􅋄艸論也奈何奈何承命􅋄堂記乆不敢虚長者數千里之托所愧文字踈陋不足以發揮道眼之所觀聊述平生自念此心通塞存放之機以就正焉而巳幸塗抺敎之吾人在宇宙間不論進退隐顕自有事在成巳與成物原非兩事明公之徳風于鄉而信于天下乆矣鄉里後軰中有可與言者時與提撕使趨正路此亦所以接續天地閒善人氣脈于無窮也何如何如風便惟不靳逺敎是望與王體仁體仁與吾别且三年知工夫當更有入細處至於世路利鈍一功不足道也吾數年來日用操鍊中頗見古人學問頭腦四十年散亂精神儘從收拾自此發憤努力或可不辜負此生耳學問雖是人人本分事然非豪傑不䏻志非刻苦不䏻成當世學者悠悠只是說好看話做好看事過却一生到底終無結果可時時将忘食忘寝舊案叅對便見得吾人今日工夫較古人踈宻何如也如鷄抱卯如龍養珠仙家煉幻形者猶然況人為眞性命者乎便間聊此致愛助之意容相約過毘陵一相切磋也與王堯衢書抱病懶慢乆缺書問知執事不謂我踈簡也春來卜居陽羡此中山水絶清無車馬迎送之煩出門則從二三子登山臨水歸來閉門食飲寝梦尚有餘閒復稍從事於問學然詩文六藝與博襍記問昔嘗强力好之近始覺其羊棗昌歜之嗜不足饑飽千人非古人切問近思之義于是取程朱諸先生之書降心而讀焉初未嘗覺其好也讀之半月矣乃知其㫖味雋咏字字發明古聖賢之藴凡天地間至精至玅之理更無一閒句閒語所恨資性蒙迷不䏻㴱思力踐於其言焉耳然一心好之固不敢復奪焉此類之書皆近世英敏材辨之士以為老生爛語至束閣不肯觀雖其苦心敝精於文字間而竟不免老而無所聞有可痛者僕之自陳其愚盖過不知量亦欲執事同所嗜好也何如何如近日當事者所去取投閒之臣僕巳先知其去與取之必如此矣不足為恠且平生亦頗能自為主張不敢跟人哭笑不敢以鴟鳶之所爭蝸角之所戰者以動吾心而累吾守此亦執事所素鑒無待僕自明而猶自明云云者有說也父子至情恐以此上累吾父之心須吾執事觧喻耳當今之士隐居篤學修名砥節如湖州唐子平涼趙子軰者凡若干人㒒之駑駘十不从其二三然此軰皆淪胥流落淹滯巳十數年少者壯壯者且老以衰或餒凍無以存活又其初皆以盡力國事誤觸網而抵禁非如僕之自以私罪去也此軰尚不得為當事者所與則僕得與此軰同陸沉焉固無憾也更何有所覬乎凡人出處利鈍數固不偶始言官謬相薦時㒒固知終必且棄去以為萬一不棄去則僕之自為處亦有甚難者何也若使僕復如舊時随逐行隊進退以旅趦趄囁嚅于明時無粟粒之𥙷則将毀平生而弁髦之且向惟不能爲此所以丼心去官而無所悔耳不然則柳士師所謂何必去父母之邦者也若使不如此而如彼守其愚戅固陋而不變恐日月漸乆積嫌積忤自作禍孽更有甚於向時既不䏻為邯鄲之步竟當匍匐而㱕耳是以中夜思之進退狼狽乃今得自脫於此固可謂之幸而不可謂之不幸也古人有言人各有䏻有不䏻懸釡帶索枯槁丘壑雖窮死而不肯悔者僕自謂能之随逐行隊進退以旅以徼幸於衣錦乘軒之華僕非不欲勉强學焉恐竟不䏻也僕自生齒以來百種嗜欲頗少於人亦絶不知人間有炫耀顯赫事獨不䏻淡於飲食乃始痛為節損或四五日不肉食始而苦之乆且丼之矣間飲食於冨貴之家腥膏滿案且噦之而投筯矣所以苦身自約如此者以為既不䏻改于其固陋以狥時好則貧賤自是此生常事諺曰畏水者不乘橋恐其動心也且夫自處不當違其所䏻而强其所不䏻處人當成就其長而䕶其所短安知當事者之非㴱憂我乎僕幸未衰敗苟自不樹立則已耳若夫假之以二三年孜孜早夜敏行而不敢怠則子輿所謂獨善兼善與退之所謂行道為書化今傳後或者不䏻兩讓矣豈有不得於進又不得於退者乎執事知我故不慙大言且非此無以解吾父之懷也吾父之所以戀戀於㒒者亦非以今時富貴人望㒒也王良有言父子情㴱或意僕之以是為憂也而亦憂焉耳㒒固不憂也又或者以自少敎之讀書不忍遽見其廢錮於聖世矣乎雖然成敗失得且當要之乆逺母遽為僕戚戚也望吾執事早晚間曲為寛慰則數千里外人子懸望之心亦稍舒矣是執事之賜也客居無事二三子時時以舉業文字强相問訊亦殊妨静坐與讀書但念此身爲宇宙中人其於塵俗奔走縟禮煩儀之事既以其溷擾而獨避之于此不當更有所厭耳舍妹并甥女想皆康吉餘懷不盡生平最懶作書更懶作眞書書又多差與執事書既不可假手於人又不䏻不差又不及更録輒以呈上并希亮之答周約菴中丞某自屏居以來自以辠隷不敢復齒於薦紳之後故居當南北孔道非逃虚者所宜遂舘於陽羡山間坐此去人益逺親知徃來一切罷廢雖最辱知愛如明公亦尚未能繼掃門之役以承敎語叙衷曲此其懶慢之罪僕猶自知況長者乎以為宐麾而棄之矣不謂過辱記録逺勤使人且手書慰諭尚欲納僕於古人之域捧書自激竊感且嘆固知長者之度不肯輕棄一物欲曲而成之若此然來書所敎尚以僕早年受知之故葢見僕少時意氣可以竊古人之尺寸焉而未知僕今憊駑樗散雖欲比於今之人而有不逮也僕少不自揆亦嘗有四方之志而才器迂滯本不適時加以弱冠從仕重以負氣學未及成而驟試之且少年負氣不識忌諱以迂滯之氣而試未成之學重以負氣之習此其動輒罹咎也豈足恠㦲猶幸免誅僇得齒編氓且少嬰疾疢三十以後齒髪漸衰委形既然志亦隨之即如讀書為文本是嗜好近或挾冊讀未數行輒眊然而睡矣旬月不一御鉛墨時或為之輒終日汗漫申𥿄䑛筆竟不能成十數字而遂以罷夫外則廢於親知之徃來内則廢於文史之玩即此一兩事則其衰頽弛靡不比於人也可盡見矣此其意葢欲搞形灰心自同木石豕鹿之間使宇宙廣闊着此一閒人足矣淮隂南陽之事固萬不敢一冀焉至如象緯地形諸家之學如來書所稱管鄧所長亦何敢不自量而攬焉以為可幾乎且夫淮隂南陽其始皆匵其器而不䡖以試䄂手而觀天下之勢如良毉之隔垣而洞五臟也故其壇而拜焉廬而顧焉則以造次一二語而圖王致伯之略遂以定況齷齪如僕軰者所謂以迂滯之器而試未成之學如弋者以百發而徼於一中故屢試屢蹶此其大巧大拙之効已見於前事矣乃欲以倦遊息機之後而自比於古人隐居求志之前雖强自鞭策固知其不類也然則明公敎督之厚其何以承之甚自激也甚自愧也雖然自平居以來澄慮黙觀亦既久之乃稍稍窺見古之儒者所以爲學之大端竊以其實乃在於身心性情之際而不以事功技術掲耳目爲也故其退藏於宻者甚約其究可以窮神而立命古固有豪傑之士而不知學者衆矣是以事功流而爲權計技術流而爲小道凝靜致逺南陽其幾乎其襍於申韓則擇術之過也淮隂烈矣竟以矜能伐功殞其軀以輅之才局於方技僅於華駝朱建平毉相爲伍鄧征西以所長濟事以所長殞身與淮隂同此數子者不可不謂豪傑之士也然其擇術則可謂不審矣僕功名韁鎻已獲斬㫁至於象緯地形種種諸家之學徃時亦頗嘗注心焉今盡以懶病廢竊以為絶利於百途固將籍此餘間聚精蓄力洞極本心洗濯愆過以兾收功於一原而未知竟當何如耳近來毎觀伊洛之書及六經之㫖覺有毫髪悟入則終日欣然忘其居之陋而形之憊也所苦習氣纒繞欲障起㓕未䏻痛與掃除使之光大然不敢不勉焉以爲古來儒者所以自㳤其身之學其命脈或不外此而無有乎窮逹今古之異者也若乃進僕於抱膝髙吟之儔則心不敢當謂僕為今之腐儒鄙儒賤儒也其亦可幾乎以是少酬明公之知明公其許我乎辱愛之㴱故不敢隐其愚且狂也今邊陲多難兵財窘急明主側席正豪傑展効之時為社稷計維公軰一二蓍舊隆中之業是有在矣其何讓焉山壄鄙人其旴而望之矣答周七泉通判僕自來家居多是謝却一切應務或閉門讀書或宴坐山水間稍䏻擺脫便謂胷中無事其寔種種欲根濳伏不曾露出頭面既不得頭面則不知下手着寔掃除葢悠悠之為患久矣近來乃於一切應務不敢避過始覺敗露漸多然一番敗露則一番鍜鍊從此工夫頗為近實乃知濂洛主静與敎人静坐之說亦在後人善學不然儘䏻誤人非特攘閙汩沒中能誤人也禪家之絕去塵縁一蒲團了却此生此所謂果㢤未之難矣吾與羅兄近来工夫不得一面證奈何然此心清時未嘗不對二兄也與兩湖書兄自少才名巳滿海内而六家九流之書㡬乎無所不誦荘騷太史之文亦無所不摹晝而操縦之矣即使海内奇才偉士欲傲兄以所不知而亦不能也況如僕者才至駑下向在亰師毎同平涼趙景仁過兄論文久之兄慨然曰二子之言是也遂欲盡棄其舊學而更張之然當時犹謂兄之急於奨善而以口語相推云耳已而視兄之文則果脫然盡変於舊矣夫文人相傾在古則然景仁於兄未知何如也至於僕之讀書則豈能若兄之博而其為文也亦安能望如兄之古㢤然兄不憚降心屈已而從之推兄是心也設使不徒用之於文而用之反躬為已之間即古人所謂勇撤臯比一変至道者在兄亦何讓乎僕未始不嘆兄之髙明不可及而亦毎毎惜兄有可以一変至道之力而僅用之於文也雖然此亦未有人焉以反躬為已之說而磬欬於吾兄之側耳設使有人焉以反躬為巳之說而磬欬於吾兄之側如吾二子之論文也又安知兄之不降心而從之而翻然変於其舊之之為尤速也乎又未始不自罪吾二子者不能為古人反躬為己之說以告兄而徒以文士雕虫篆刻之論投兄之好也兄今之所謂狂者也而豁豁磊磊率情而言率情而貌言也寕觸乎人而不肯違乎心貌也寕野于文而不色乎荘其直以肆則亦古之所謂狂者也是兄有可以一変至道之力而又有狂以進道之資也兄其䏻無意乎然兄之意必曰吾􅊭生好適吾性而已矣吾不䏻爲拘儒迂儒苦身縛躰如尸如齋言貌如土木人不得動揺云耳夫古之所謂儒者豈盡律以苦身縛躰如尸如齋言貌如土木人不得動摇而後可謂之爲學也㢤天機儘是圎活性地儘是灑落顧人情樂率易而悪拘束然人知安恣睢者之爲率易矣而不知見天機者之尤爲率易也人知任佚宕者之爲無拘束矣而不知造性地者之尤爲無拘束也人之病兄亦或以其樂率易苦拘束而僕則以爲惟恐兄之不樂率易不苦拘束也如使果樂率易苦拘束也則必眞求率易與無拘束之所在矣眞求率易與無拘束之所在也則舍天機性地將何所求哉使兄不以㒒為迂也願繼此而更進其說也㒒自少亦頗不忍自埋沒侵㝷四十更無長進惟近來山中閒居體念此心於日用間覺意味比舊來頗深長耳以應酬之故亦時不免於為文毎一抽思了了如見古人為文之意乃知千古作家别自有正法眼藏在盖其首尾節奏天然之度自不可差而得意於筆墨溪徑之外則惟神解者而後可以語此近時文人說秦說漢說班說馬多是寱語耳荘定山之論文曰得乎心應乎手若輪扁之斵輪不疾不徐若伯樂之相馬非牡非牝庶足以形容其妙乎顧自以精神短少不欲更弊之於此故不能窮其妙也何時得以吾兄一面談之兄有近作可寄我兄向云家居有暇將來江東今能果此約否念菴兄時相會否弟數年間頗梦寐於江西之行今日侍家君百里之外亦無意矣㑹念菴兄并煩道鄙懐漢書批抺約四五十傳亦頗盡之并奉返以全信寄黄士尚弟也奉職無狀幸蒙寛恩得歸田里不然則從兄於遼海之濵亦所願也易之蹇不云乎君子以反身修徳夫身何待蹇而後反徳何待蹇而後修盖寂寥枯淡之中其所助於道心者爲多也自儒者不知反身之義其髙者則激昻於文章氣節之域而其下者則遂沉酣濡首於蟻羶䑕腐之間如兄之志氣固巳塵垢一世而與古之志士爲徒矣不知近來反身之學得之于蹇者何如幸以敎我張舜舉言兄自戍遼以来作詩幾四五本兄何以致多如此豈將以是自鳴其習坎心亨之樂耶或者窮愁覊旅無聊之思而姑託以自遣耶抑以冩其江湖之憂而致其去國繾綣不忘之愛如古離騷之作耶其無亦自擬於鏡歌鼓吹遼東都護之曲而與塞垣横槊之士同其慷慨而謳吟耶不然則枝葉無用之辭其足以溺心而愒日也乆矣兄何取焉日課一詩不如日玩一爻一卦日玩一爻一卦不如黙而成之此之謂反身而又奚取於枝葉無用之詞耶弟近来深覺徃時意氣用事脚根不實之病方欲洗滌心源從獨知處着工夫待其久而有得則思與鄉里後進有志之士共講明焉一洗其蟻羶䑕腐争勢兢利之陋而還其青天白日不欲不為之初心此鄙人之所不自量而竊有兾焉者也天子仁聖在宥天下兄豈久於海濵㢤弟獨學無朋將籍兄為助日日望之近來應酬文字毎不敢作而年嫂誌文則不敢辭盖以昭天子之寛仁而發海外孤臣心事之一二焉非特為應酬故也嘉幣謹辭果酒則拜賜矣廣寧有賀黄門毉閭先生者忠信髙節之士也其風尚在否兄試詢之士人亦可為旅中蓄徳之一助也與項甌東郡守索居既久益嘆朋友合并之難而知昔日相聚之為樂也然又有可感慨者念昔日從兄於杯酒談笑閒此時弟甚踈鹵不䏻有所切磋於兄而兄之善言惇行弟亦不能竊之以自㳤不過如世間所謂好友者而已求如古人切切偲偲講學輔仁則未也自去官㱕家閉門諍坐大抵人窮則反本霜降水涸天根始見於是大悔曩時孟浪痛自磨刮直欲掃去枝葉文餙從根本上着力久之亦漸覺有洒洒處但苦此心出入㡬㣲之際殊廢檢防然亦漸覺有洒洒處此時欲見兄相與印証一畨了不可得則向者朝夕相聚反自錯過虚却光隂豈不可惜惟吾兄質實純明古所謂脚踏實地人也此不惟吾兄能自信而友朋亦無不以此信兄者別後想渊然㴱造非鄙陋之所敢窺測以舊時所見吾兄則尚有葑菲可以少賛於吾兄者何也兄得之資禀者持守有餘而充拓未至資禀有餘於毅而力量不足於弘其得處乃是氣質最美而其不及古人處乃是學問不䏻變化氣質也古人為學皆是百磨百鍊工夫如書臯陶論九徳寛而䏻於栗直而䏻於温沉潜能剛髙明能柔斯則磨鍊已至氣質變化之効也夫弟所謂充拓者亦非如由赤子之心擴而充之說葢赤子之心夲自充擴得去本自能大有一分不䏻充拓皆是未盡此心之量耳中庸曰致廣大而盡精㣲極髙明而道中庸徳性本自廣大本自精㣲本自髙明夲自中庸人惟為私欲障隔所以不能復然故必須道問學以尊之耳此千古學問之的也據吾兄舊日規模且未免作世間一種寡過之人其於賢聖作用尚是有間學問須先定其基故孔子不取謹愿之士而取狂狷為有基也狂者固不待言至於謹愿之士與狷者其不為不善亦較相似但狷者氣魄大矯世獨行更不畏人非笑謹愿之士氣魄小拘拘謭謭多是畏人非笑狷者必乎已而謹愿者役於物大不同耳今人多以謹愿者為狷此亦問學不明之過也交游可望者殊少得如吾兄者尤少如弟踈鹵尚不敢自棄以吾兄之純明甚於道翻然易耳願聞兄之所安整理民事皆是吾人切實工夫而两郡之治如何并願聞之邇來士風澆薄而江南重以侈靡浮蕩比之他所尤甚大抵富貴功利之習糊人心目如處豐蔀之中舉眼皆蔀也蔀外更不見一物矣是以迷惑顚倒莫知所止非有先知先覺者孰能出之溷穢而轉之清流乎提學馮先生觀其論議行事亦不為無意於此矣詞華本實之間稍有軒輊便足鼓舞人心吾兄相㑹得從容聚語幸委曲一賛之答江五坡提學海内交㳺如兄者幾人而交㳺中能重意氣不䡖然諾如兄者又幾人與兄一別至今幾時中間問訊能相通者有幾眷言思之可爲悵悵李中谿使来辱手書惓惓殊自慰幸又辱寄到十三經註疏此大惠也僕於此書去歲在山中偶嘗讀之而於三禮者讀之頗詳竊以爲王鄭諸儒雖未能深究乎先王之精藴至於形聲器度之間比較同異叅量古今其功最多學者欲因筌蹄以求魚兎則此書不可不觀惜其舊板譌謬既多模糊又甚故雖素好學者或􅌒於觀焉兄之刻此學者可為幸矣而僕山埜之人顧先得之不尤為幸歟中谿又欲刻杜佑通典恐此亦須刻也兄可賛之伏惟兄之蒞閩且三年矣八閩之士固巳丕然向下風矣而兄猶以人才風俗轉移變化之故未得其端為言者此足以知兄之志也夫今之為提學者苟博識善文及程較諸士子文字之精與否而一無所失則已赫然足以收士心取髙譽矣至於人才風俗轉移變化則提學不以是自責而人亦不以是責之也兄獨慨然有意乎此固不以世人所超尚與兄素所精詣者為可滿而必以不如古人之善作人者為可歉歟古之道推其自洽者以教人故徳修而教以尊教而後知困知困而後能自反故因其教人也而徳益修所謂教學相半也人之性行牽柔暗伏者多而果決雄毅者固少矣得其果決雄毅而能為剛中者又加少耳故臯陶之論九徳曰剛而塞强而義而箕子亦曰髙明柔克兄固雄毅果決者剛者强者髙明者也持之以動心忍性之力致之以收歛凝静之實克之以柔養之以中使剛者必塞而不近於露强者必義而不過乎激積之也厚而蓄之也宻則兄之所以自進與其所以教人至於人才風俗轉移變化恐無以易此矣然此在兄之材力亦何難也嗟乎士之蕩於紛華兢於馳騖而不歸其根也乆矣閩固多文少實之域也非兄孰能振之而欲振之豈在聲色文字之間㢤固有道矣若其次則莫切於風勵學官僕竊謂今之提學以一人督率六七郡之士即使如古之善作人者則善矣雖然則勢固亦不能人人而薰之與日日而礲之也不能人人而薰之與日日而礲之則其所𬒳者淺矣古之教者自萬二千五百家爲鄉鄉有師而至于五百家爲比比有師豈特教萬二千五百家者則賢㢤彼其教五百家者亦盡賢人也即使今之提學如古之善作人者亦不過六七郡共得一良師耳為此六七郡得一良師孰與為此六七郡得百十良師故為提學者莫急於風勵學官今學官璅尾自卑嗜利無比人人相師靡然一風雖有一二材俊之士出乎其間猶惧其随而偃也誠欲有以風勵之又恐非一提學之官與四三年之間所得為耳然以兄之材必能有以處此竊願聞教焉曩與王道思書亦曾及於提學之說大抵不出所請教於兄者矣僕今歲移家荆溪此中山水清絶頗能恱人在病夫尤宐也邇来儘善飯羸弱之軀可以自支惟學不加進殊愧知巳然於動心忍性收歛凝靜此僕之所請教吾兄者亦不敢自棄也更頋兄時督教之所示讀書太苦蕩揺精魄之說此兄之甚愛我敢不拜教尊作儒學記文最古雅然此自兄素所精詣不俟賛也山中亦有一二拙言更容繕寫求教艸􅋄白答廖東雩提學㒒於吾兄雖相晤之日頗淺而相知之誼甚深兄之於僕則亦然也两辱書惠㴱爲空谷之慰又辱两示髙文讀之喜躍夫亰師都㑹也綴文之士比肩僕曩皆獲與之交而皆獲見其文焉然僕之所最傾意者乃獨在兄則數與傅少岩言之以為東雩之文氣骨甚勝無一點繊靡愞散之態後來可冀於作者東雩而巳春間讀兄所為文視亰師所見則加勝焉近復得讀兄所為文視春時所見又益加勝焉駸駸乎作者之堂矣頗自謂曩之所知於兄者之不妄也雖然文與道非二也更願兄完養神明以探其本原浸􅉼六經之言以博其㫖趣而後發之則兄之文益加勝矣兄志潔而識偉行方而氣和僕固一見而知兄為任道之器矣嗟乎古聖賢之道其不講於世久矣聲利之欿薰塞宇宙日夜馳鶩寡廉而鮮耻儒生習見以為當然其有以講學為事者又或崇意見而乖實際競口耳而寡心得聴其言則美而考其實亦無以甚異於所習見以為當然自非精一自信卓然不惑流俗之士則未可以兾於斯者也僕竊有望於兄軰矣山西古帝王之都其人有茅茨土階之風而叚干木卜子夏居西河其人化之凛然有節槩今不知其遺俗視古所稱何如而王文中與近代薛敬軒亦出於河汾之間豈其俗固有近古者耶吾兄以身任作人之責兄之所以㳤諸其身即其所以㳤諸其人者也䔍志力行極㴱研幾求古人之真血脈路以㳤諸身以㳤諸其人因其近古之俗而登之於道此其責在吾兄矣連年虜騎入太原蹂􅏳之慘二百年來晉人所未見僕聞之序詩者小雅廢而四夷侵夫小雅何與於夷此其言疑若甚迂葢昔人精究天人之際而類人事於隂陽則以小人為君子之隂夷狄為中國之隂隂則銷陽陽則銷隂隂則致隂陽則致陽其相銷也若鐵炭之不爽其相致也若酸漿之感蠓蠛其幾微矣長君子之氣即所以銷小人之氣長君子之氣而銷小人之氣即所以長中國之氣而夷狄之氣銷故曰真勝者氣也勢與形不與焉其幾微矣此莘有所以豫見於伊川而序詩者之說不爲迂也今也觀之薦紳之所崇尚觀之學校之所趋向如前所謂習見以爲當然者其爲隂爲陽與其銷長之幾亦略可覩矣大揚旌沙漠之陲而尺組繫單于之頸此非兄之責也若乃大敷古先之道以淑諸其人使人洞然於隂陽㳤慝之辨而㫁不惑於所趋此其責在兄矣僕自屏居以來牽於多病齒髪日衰非惟不敢復有四方之志而詩書亦多束閣惟兀坐一室所耿耿不忘者尚兾脩省補過以不負此心與不負海內知巳者而已與應警菴郡守僕迂戅無能人也伏惟君侯蓄兼人之才且居郡侯之尊而與僕又素無一日之雅乃自下車以來虚心降色所以獎進禮遇於僕者皆出乎常格之外此雖古之髙流如葢公任棠之徒當此猶宜三讓而避焉而況草茅迂戅如僕者乎所以敢偃然而當之者以成君侯下士之髙義固不自量其身之卑賤與才之短劣也自是以後綢繆日接葢無夾旬不相往来不相與從容盡談者此其形迹似爲煩瀆矣雖然非若侯不能亮僕之㴱至此而非君侯亮僕之㴱僕又安敢以是䖏君侯㢤公門無鄙人之迹庭中無長者之車亦已久矣豈特樗散之性不欲溷擾於人亦以相知相信之難耳惟在荆溪時與石屋彭君相切磋石屋之為人君侯之所㴱與也伏惟君侯住山中既且一年釋塵鞅之勞而就清池白石之安去簿書之煩而縱其清逺閒散之適昔人所謂霜降水涸天根乃見惟捍彼物累全我眞機此時工夫此時意氣不知復何如耳僕嘗竊謂今世人才未便不如古人惟古人為學堅苦磨鍊忍嗜欲以培天根久之則此心凝靜百物皆通而今人則未免粘帶未免牽引粘帶之根固于中而牽引之勢揺於外所以精神力量趣見不如古人僕毎觀君侯治郡自是近世才傑何可當也雖然以君侯之志詎止欲爲近世才傑而巳乎意者必欲為古人而後已乎如必欲為古人則堅苦磨錬正在此時若自此以後固知君侯不能久閒而塵鞅簿書之煩且勞又復不免相累恐不得如山中多暇可以進兼力而收全功矣君侯得無意乎僕質夲頑鈍惟不敢惰窳以負相知然寸進或至退尺恐竟不能有所樹立耳亦願君侯敎之君侯来歲或宐早出進退自是兩途此身既繫於官而欲結泉石之盟亦未為可也以相知故倂及之南直隷廣西湖廣三省地圖已付馮丞繕寫不識寄到否西洲公奏稿偶檢出幷奉上不宣又時警菴為提學今之職守令者苟有能餙簿書清獄訟者則為賢有司矣至於為百姓根本之慮則未之及也今之司學校者苟有能品藻文字嚴督程課則為好提學矣至於為學校根本之慮則未之及也吾丈之為守郡也既已能為百姓根本之慮而不徒以簿書訟獄為功矣今之爲提學也亦何患其不能爲學校根本之慮而惟文字程課之爲務也哉向辱手書具見惓惓欲興起士習之至意顧責之人不若盡乎已盖言聲色號令之間不若求之身心性情之實惟反躬自盡益愼以宻力行古道不落流俗則此身所舉動卽是士子所師法可以不言而諭嘗見近時提學敎條何嘗不言道徳何嘗不言仁義然只成一畨講說只成一番門面而於士習絲髪無𥙷者無其實也務實者反躬之謂而所以爲根本之慮也辱吾丈知愛竊敢以是望之今士子中有實行者多不長於文字工文字者多不修於實行葢淳樸之與浮華徃徃相病然糊名之制行則不得不一一徴之於文一一徵之於文則其文可以與選而其行或不齒於市人者亦不容不取髙第而登顯仕是以詩書為世流毒荘生至有發冡之說豪傑士扼腕太息無可奈何竊以為低昻輕重其權寔在提學盖提學可以知諸士之文而又可以知諸士之行非如科塲之為糊名所蔽雖欲品藻其行而無所從也抑此伸彼示之意嚮非吾丈又誰望之曩時使節寓郡中僕時承教語以時免於大過罪今離索日乆奈何年且四十益㴱無聞見悪之, WYG: ''}
