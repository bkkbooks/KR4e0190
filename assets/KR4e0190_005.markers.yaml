  - {type: variant, offset: 0, length: 10763, content: 重刋荆川先生文集卷之五答顧東橋少宰順之竊聞昔人以名譽不聞㱕過朋友者謂其實溢乎內而譽不副之者耳非謂本無可以致譽而朋友爲之賁餙以私扵其好也沈別駕至辱賜手書奉亟驚愧竊不自知所以先容於左右者開亟讀之乃知以陳王二友之故眀公過信而不疑耳是二友無乃私於其好故忘其醜而餙成其所長眀公亹亹好士故博取於朋友之譽而不暇究乎其實也然在㒒何敢當也僕自爲諸生時得眀公之文而讀之雖不能窺其精意然竊嚮往焉及從㳺薦紳間又獲聞眀公髙誼傾海内而求士甚扵士之求公且不在古人之後則心益慕之然蓄之數年而不敢通姓名扵左右則亦有說夫玉工好玉則琨吾于闐之産非不欲盡而收之然有所不能收者碔砆耳瓊瑰碔砆亦莫不欲自獻扵玉人之前然而有所不敢獻自知其爲碔砆耳僕迂戅無能人也過不自量嘗從諸友人學爲古文詩歌追琢刻鏤亦且數年然材既不近又牽扵多病遂不成而罷去及屏居山林自幸尚有餘日将以㳺心六籍究賢聖之述作鑒古今之沿革以進其識而淑諸身又牽於多病輒復罷去既無一成則惟欲逃虚息影以從事於荘生所謂墮體黜聰以爲世間一支離之人耕食鑿飲以畢此生而不敢有覬乎其外葢亦所自量者審也又何敢以求知於左右也哉即使朋友欲爲僕文餙計亦無以過扵僕之所自量者矣不知二友之所以譽僕扵眀公者何語而眀公又何從而過信之也此僕之所自愧且懼而不敢當也伏惟眀公與世卷舒向也遵晦丘園時也於公一不以爲損及出而秉鈞軸時也於公一不以爲喜然而海内之士於公之退處則皆眷焉望其復用及其既用則皆望其秉鈞軸及公之秉鈞軸則皆忻然以喜何也僕竊觀聖人繫易于否㤗初爻皆有彚征之說焉至扵㤗之以隣否之疇祉則皆繫之於四四者大臣之位近君而任重者也近世之士愞熟獧巧之習日工而羔羊素絲之節或衰矣而任重之人所指以爲才且賢者又徃徃在彼而不在此葢士習既然而示之以好惡者則又然何恠乎靡靡一風也是以雖淸眀平㤗之世而包羞匪人或不勝參錯乎其間雖否㤗之幾未必繫此而士習隆汚則亦可知必有大人君子任當世之重以身範物離祉其疇以長君子之道而默消隂邪彚征之氣此海内所以致望於眀公而非眀公不䏻赴海内之望也則如僕僻處山林亦将拭目以觀盛徳不徒爲知已之私感而已迂疎病廢之人本不宐開口及世事縱言至此恃眀公之知也惶恐惶恐前辱雄文垂示此眀公所以誘誨僕者至㴱也謹拜敎艸艸作載酒亭一詩用致嚮徃之懷更希敎之答張甬川尚書順之麄頑非畜徳之器迂疎非適用之才徒以麄頑近乎質木迂疎類乎澹泊以此幸不見絶於大君子之門自入山中稍欲收歛精神擺脫習氣庶幾少有所聞以酬宿志且以不負長者拳拳教愛之至意而間靜中轉見種種欲根起滅不㫁雖暫隨氣機歇息終非㧞本塞源工夫益覺實病之難除實功之難進也承教中庸不可䏻乃在聲臭之表此喫緊要言中庸所謂無聲無臭實自戒謹不覩恐懼不聞中得之本體不落聲臭工夫不落聞見然其辨只在有欲無欲之間欲根銷盡便是戒謹恐懼雖終日酬酢云爲莫非神眀玅用而未嘗渉於聲臭也欲根絲忽不盡便不是戒謹恐懼雖使棲心虚寂亦是未離乎聲臭也明公之致力於道而自得之也乆矣而猶云老且望洋日有愧嘆此豈眀公之過爲避譲㢤葢常存不及之心而後可以言戒謹恐懼而後可以閑未萌之欲古之聖賢所以競業此心至老益彊類如此也放失如順之輩竊因此更有省矣承示欲修飭武僃此明公爲國家之㴱慮也世人作事較計成敗利鈍畏首畏尾自爲之念重而任責之意踈所以弊多積於循襲而事毎牽扵掣肘以明公之素望與其素養居其位而行之因則因革則革誰䏻撓之雖然武僃其一事也昔周命周公畢公以東郊之治欲其彰善瘅惡以㳤人心至於世變風移而後已今之民風士習其淪胥抑可知矣而畿甸爲尤甚此俗吏之所謂迂緩而有識之士所爲㴱憂而懼無以善其後者也然而明公今日之任周畢之任也且夫東郊雖周之東都也而寔染殷之餘風者也經周畢而一變其俗況南都固祖宗之所肇基而風動之者也以明公之素望與其素養居其位而行之明示好惡提醒人心而挽之禮義廉恥之域使四方之有風俗自畿甸始畿甸之有風俗自明公始非明公今日之責而誰望乎聞太夫人巳就養是明公入則承歡於内出則宣力於外其承歡於内也益所以蓄其效忠之心其宣力於外也益所以推其養志之施葢兩不相妨而交相益也此㴱可爲明公賀矣養斋翁考滿㱕遂欲乞休但山林中得此翁於鄉俗極有益仕途中又少却此翁爲可惜耳然其意已決矣趙兄相逺問書頗稀羅兄則時有書承念及敢復諸惟台照不宣又曩承手敎諄切皆道義肝膈之語感幸感幸至於所論學術之虚誕與其毫厘之差則皆足以惑世而害道此切中當世學者之膏盲鄙人亦嘗㴱憂之而未及面請也先行其言而後從之言非君子之所急而況其誕者乎若羅兄則雖不知其近來所見與所論何如然其人平素篤行之士明公亦㴱知之矣承示大學小傳葢發於􅉼養之眞而多自得之說至於身心意之別以正心爲主靜之學雖或異於朱傳而寔合乎濂洛之微㫖矣其曰正心者不屬於意不屬於身者也是心之無所發動事物未交於視聴時也斯時也心惟存其恂慄而巳凝然中居而外誘不敢千也是則然矣但不知事物既交既有視聴之時其凝然中居而外誘不敢干者與前時有異乎與前時無異乎豈所謂凝然中居者只主於靜時而爲之者乎抑亦無分於動靜而皆在者乎更願敎之寄劉南坦自前年奉敎後毎切馳情去年獲奉手敎再三捧誦知愛僕之㴱望僕之厚未有如明公者亟欲過霅上登長者之堂一扣謝且請益焉而未果也僕稟氣素弱兼以早年馳騁於文詞技藝之域而所恃以立身者又不過强自努力於氣節行義之間其於古人性命之學葢殊未之有見也至如所謂心似蛛絲遊碧落身如蜩甲化枯枝以耗散其精神於故𥿄間不知返者則日夜有之是以未老而病無病亦衰葢明公之所以爲僕慮者眞可謂先得我心矣年近四十疾疢憂患之餘乃始稍見古人學問宗㫖只在性情上理㑹而其要不過主靜之一言又參之養生家言所謂㱕根復命云云者亦止如此是以數年來絶學捐書息㳺嘿坐精神稍覺有收拾處然宅舍摧塌修𥙷爲難譬如敗家蕩子早年縱浪於聲色狗馬糜費百端及至轉頭而囊篋􅑎然矣此老氏之徳所以貴於早服而重積也奈何雖然程升子自言吾受氣甚弱年四十而始強七十而益精明人問之則曰吾以忘生狥欲爲㴱恥僕誠不敢不以此自勉亦不敢負明公之愛之望也貧子元有寶珠或者只恐不轉頭耳承明公至意敢布衷曲至於凝神聚氣喫緊處長者固有經騐方容積誠面請也文從過常州僕以屏居荒村不及知知時則文從已徃荆溪矣謹令人問候得在容操履杖以從與王龍溪郎中世人之不能不疑於吾軰也久矣近有士夫自浙中來者云及吾兄以佃夺之故使憲司有言且云兄以寺地據風水之勝欲作令先大夫墓地上官某人者既予之矣而憲使持之故若此紛紛也僕聞而竊嘆以爲如兄安得有此此乃傳言之誤耳不然則必俗吏欲汚衊善人託爲此說就使非傳言之誤非俗吏欲汚衊善人則在兄必自有說固不敢以世人之疑吾軰者而亦疑兄姑笑而置之不欲煩諸齒頰間也既又復念以爲孔子以詩禮敎子而陳亢疑其異聞孟子不見儲子而屋廬子以爲得間古者師友之間既洞然肝膽相信矣而亦若不免以世俗之疑相疑者何也無乃故爲迂其問以剔抉聖賢之隐曲而白之於世也乎今僕幸得兄之間而可以有請安知兄之隐曲不因以白而僕亦冀有陳亢得三之喜與屋廬子之恱者乎且夫人之意兄者則曰兄之請寺是世人之請寺巳兄之狥風水是世人之狥風水巳而僕之意殊不然也夫兄爽朗超脫得之性成僕毎竊嘆以爲即使兄不學不知道亦當作物外髙流如弘景和靖之徒絶非食烟火軰人而或謂其請寺以自便占風水以規後䕃此眞坐井之見且不足以闖兄之藩宐乎兄之不屑與較也然而兄之爲是必有說也僕竊觀於兄矣惟兄篤於自信是故不爲形迹之防以包荒爲大是故無淨穢之擇以忠厚善世不私其身是故或與人同過而不求自異此兄之所以生㴱信㴱慕於相知者亦所以生微疑於不相知者也寺田出上官之予何必固郤以爲潔風水有事機之便何必固避以逺嫌以是闖兄或者得其藩乎然僕竊以兄之意亦稍偏矣孔子惡行恠而愿人亦譏其同乎流俗合乎汙世夫曰同乎流俗則非其自流也特同之耳曰合乎汙世則非其自汚也特合之耳其設心亦豈不善而聖賢甚以爲不可者其說可知也且夫本以包荒忠厚而其影或近於愿人此僕之所懼也然則世人望影而疑亦何恠歟古人有放君而代之者而人不疑其富天下有放君而又反之者而人不疑其專葢古人舉大事冐大不韙而猶不蒙人之疑如此今吾軰出格作一小事而人已群然疑之雖古今人眼孔不同計亦不應如此隔絕也毋乃不邇不殖所以自信與素信於人者有不如古人乎不顧不視不取不予所以自信與素信於人者有不如古人乎且夫以湯之聖宜其脫然於聲色貨利之外也而秪曰不邇不殖眞若聲色貨利之足以移湯而湯眞若與聲色貨利之相持然若何也以尹之所樂者堯舜之道也而秪銖穪寸量於一介取予之間若硜硜小人然者何也兄所論伊川金楪子之說以此施於點檢形跡之人則爲對病要藥矣向非其人則如以蓍參治肺癰藥豈不甚羙或以助穴而長病也向時諸友所處陽明老先生家事或者造爲玉碗之謗此言極俚鄙可笑宜不足以紿三尺之童子然王僉事竟以此解官去有志者至今痛惜之夫毁譽利害不足計然得無吾黨亦有過乎苟非過於自信而疎於事情無乃所謂素信於人者之未至耶君子行有不得反求諸已則工夫日緊日精至於已日乃孚是人之疑我者所以精進我也兄意其以爲何如然僕非敢謂此言可以少禆於兄亦将以叩兄之隐曲而得聞所未聞耳幸亮之答王南江提學奉別經年不能通一字以爲率然道離合問無恙之泛語既不宐施之於兄而思竭其疲駑以效一言之獻則又茫乎其無所得故遂缺然至此又復以爲既疲駑無以自效而有數字以道離合問無恙亦足以通殷勤而舒繾綣之懷不猶愈於經年無一字矣乎故於李君使者來艸草作此大抵所謂率然之泛語耳然僕竊誦吾兄前後見惠兩書知吾兄痛懲既徃之悔直欲洗刷腸胃不肯若世之葢頭換面作好人者至於用心獨苦處則雖兄口不䏻自言而僕於筆札間亦稍窺見焉未嘗不撫然而嘆以爲兄之力能自振㧞如此兄之不自䕶如此即使僕竭其疲駑而有以自効亦何所加也人心存亡不過天理人欲之消長而理欲消長之幾不過迷悟兩字然非努力聚氣決死一戰則必不能悟或不知所戰或戰而不力則徃徃終其身而不悟故佛家有認賊作子與葛藤絆路之說而兵家亦曰名其爲賊敵乃可滅又曰一日縱敵數世之患此佛家之可通於吾儒而治戎之道可用以治心者也儒者以交戰爲子夏之病而不能戰是所以爲子夏也雖顔子亦有戰矣曰不逺復夫不戰何以有復也雖天地亦有戰矣曰龍戰於埜其血玄黄夫隂既疑於陽矣陽安得晏然而無戰乎惟戰而不勝故血而至於玄黄戰而勝則血可以不玄而陽可以亨也是䏻戰之效也今兄知所以戰戰又䏻力矣僕自入官得請見於當世士大夫葢三年而後見兄一見則駭然異之而兄亦過以僕爲知已夫兄雄俊之文博辯之才邁徃之氣無一人不知之而獨謂僕爲知巳者豈僕之知兄止於世人之所知而已也抑亦有不止於世人所知而已也僕之於兄不爲不㴱知已然竊有少恠於兄以爲世間種種嗜好凡人之所可玩可喜者多足以掛兄之胸臆而動其挹慕不捨之意此其中於心也微而不知其植根也膠而難解苟一不解則微者或横潰而著矣根者或引蔓而枝矣就使能戒而不潰不蔓則其爲力甚勞而爲功亦寡譬如聚千百不逞於㴱叢巨莽之間按而不發而時出其一二騎以鈔於路幸不爲大憂然而授首獻俘之期恐終不可冀也而況其猖蹶之不可料歟雖然兄何如人也豈敢謂其有溺於此歟或者當時年少而氣銳以爲雖小有所嗜好而固無損於吾之大者抑亦知其嗜好之不可不欲快於一鬭而以積漸消去之歟且夫以嗜好爲無損者無乃不知所戰之過歟以爲積漸消去者無乃戰而不力之過歟夫嗜好之中人也亦必有因必非以爲漫然無所用也必以爲人之資於天地間者一物不可少也孟子之書所以提挈此心者至著矣而尤著於生我所欲一篇葢其不悟也則自宮室妻子之奉至於種種若無一焉可少者其悟也則雖簟食豆羹之切於死生若無一焉不可少者藉令有人焉始不悟而今也悟則自今日無一物不可少者而追視向時所爲無一物可少者未始不啞然自笑也慵工道丏之人徼幸得十數錢則買殽市酒一醉大呌自以天下之樂莫踰於已而千金之子苦身仡仡以程錙銖日夜若不足藉令此二人易地而觀焉亦未始不啞然自笑也人之所甚愛而至不可少者莫如七尺之軀也其住於世也能泣能笑能挈能擎能徙能倚無一不能無一不有而其聚諸有以住於世也則又有修有短而䘚無不腐爲埜土化爲瓦鑠而後巳者則此七尺之軀亦終不得自有矣以其終不得自有則當其暫而有之固亦不可據而私之以爲眞有矣而況於種種嗜好其不如七尺之軀之不可少者又不啻千百倍歟古之聖賢所以超形氣而獨存至於同死生齊得喪漠然無一動乎其心者非誕也既悟則自知之耳如此乃可以語知性知天乃可以語謹獨誠意之學而其初必始於力戰未有不力戰而能如此者也約之嗜好更不少於兄而僕相聚時數以爲言然於兄獨罕及者約之性柔須待有人夾持而兄剛果雄毅氣魄甚大始雖暫牽其必一朝躍然自脫於此無疑也顧所不知者早與不早耳今兄果然知所以戰戰而又力以自脫於此不出吾素所料者如是而又早則吾之所不能知而㴱爲兄喜者也僕不肖聰明百不逮於兄雖僅守繩墨常恐失之兄謂我戰勝而肥今臞然故吾也此足以知戰之不勝之效矣雖然敢不勉耶幸兄常不鄙而敎之僕於文字素非所長然以猥嘗受敎於兄且幽居少事欲以灌園餘力時一爲之又以爲既樗散無所用世幸未即老死二三年之後或為天所牖使少有知識尚當托之於文字雖不敢望於行逺庶幾達鄙陋之意焉是以不䏻息心於此然徃時朝夕於兄尚不能竊其緒論今去兄既逺誰為開之固知終必罷廢矣今徃近作數篇冗散無可採至如贈彭通判與李郎中墓文亦稍見巳志故敢請敎耳僕今年寓居陽羡挈妻子以行有一二童子相與講章句自以此身不量而為人師雖不責我以道而所講者章句然至於收拾放心正容謹節以率之者亦不敢不力自謂於此頗有分寸之益因是知吾兄以道為人師而所敎者又非一二童子乃齊魯五六郡豪傑之士則其所以率之者宐何如而其為益又何如也然僕所謂一二童子者自章句外亦以内外輕重義利可否時時與之一談則或如鑚礦而不入僕敎不過一二童子而又日夕與之處然猶如此兄雖善於作人然以一人督率五六郡之士而又不能日夕與之處則其頑然而無得於兄者固亦有之歟僕竊為兄慮也夫為此五六郡得一良師孰與為此五六郡得百十良師故為提學者莫急於凬勵學官今學官自卑其身無恥而嗜利甚矣誠欲有以凬勵之又恐非一僉事之力與三年之間所得為也奈何家父言某縣某人者在亰師百計詆兄此甚可為勇於任事者笑也然在齊東得無亦有如某者乎此在兄亦惟自信自為而已何較於彼者㢤家父又言兄有薦僕之書於亰師貴人此兄之愛我甚而忘其醜也雖然僕之與兄以善交聞於人乆矣兄之薦我何異於僕之自薦乎僕年來自計已熟大抵人用之不敢以隐人不用必不敢以求亦必不敢以悔終吾身而已矣然兄素已知我矣何待僕自言也在菴兄過常不及一㑹殊為悒怏幷以相白答俞敎諭得所示書知執事望我甚厚敎我甚至感激感激葢學病於博襍而量病於不廣此鄙人膏盲之証過承發藥敢不盡飲然僕之此心亦不敢不悉於執事也夫士之於世苟無志於爲善則已果有志於善則世之人未嘗不欲其入於善己之善未嘗不欲與人共爲之所謂衆生病即是巳病此萬物一體之心必不䏻自巳者也僕於甲科人才固未嘗專有眷眷捜羅之心其於岩穴之士之賢者亦何嘗敢忘相與切磋之心哉其於卑鄙齷齪越禮放法者固未嘗敢有雷同隨俗之心而其間尚可告語轉移者亦豈敢遂無憫惜愛䕶之心而遽疾之如讐者哉甲科之與岩穴本無㨂擇而感應則隨其所遇峻拒之與憫惜本無作好惡而曲成則因乎物情此天則不容人加減者也夫業無定習而心有轉移苟眞有萬物一體之心則雖從事於舉業以進身未嘗不爲義塗也若使有獨爲君子之心則雖從事於飭躬勵行以退處未嘗不爲利塗也經義策試之陋稍有志者莫不㴱病之矣雖然春誦夏弦秋禮冬書固古之舉業也固未嘗去誦與書也茍無爲巳之心則弦誦禮書亦秪爲千祿之具苟眞有爲已之心則經義策試亦自可正學以言昔人妨功奪志之辨此定論也至於以舉業爲敎則稍有志者亦知㴱病其陋矣吕伯恭以舉業敎浙中而朱子以書規之伯恭答書以爲若不開此一路則法堂前草㴱一丈僕嘗誦而竊嘆以爲此極是前軰苦心非特後之人未能知雖當時同志者亦未能盡知也僕年來則巳決意絶去舉業之敎矣而猶瑣瑣為執事言者葢亦自知今之不敎舉業未為脫洒而向之敎舉業未為粘帶也今之不敎舉業未必足以閉人之利塗而向之敎舉業未必不引人一二於義塗也至於道徳性命技藝之辨古人雖以六徳六藝分言然徳非虚器其切實應用處即謂之藝藝非麄跡其精義致用處即謂之徳故古人終日從事於六藝之間非特以實用之不可缺而姑從事云耳葢即此而鼔舞凝聚其精神堅忍操鍊其筋骨沉潜縝宻其心思以類萬物而通神眀故曰洒掃應對精義入神只是一理藝之精處即是心精藝之麄處即是心粗非二致也但古人於藝以為聚精㑹神極㴱研幾之實而今人於藝則以爲溺心玩物争能好勝之具此則古與今之不同而非所以為藝與徳之辨也執事所舉堯舜夫堯舜之所未聞與若㒺聞云云者此道也羲和之曆象夷䕫之禮樂臯之刑名至於垂工和矢伯益鳥獸孰非道㢤然諸子為之而堯舜若罔聞云云者葢君逸臣勞道則然耳若謂堯舜以道自處而以藝士諉之人何其自待者厚而待人者薄也臯以刑名自處而乃為其君陳迪徳之謨䕫以擊石拊石自處而乃敎胄子以簡廉直温之徳性則是以藝士自處而以徳望之人又何其自責之薄而責人之厚也曆象禮樂藝也修五玉如五器張施五采在璣衡獨非藝哉則堯舜亦屑屑矣孟子曰堯舜之智而不徧物急先務也若在羲和則曆象便為先務在䕫則擊石拊石便為先務又安得以堯舜之所不徧者而遂不急也執事以好博襍技藝為㒒之病此則不敢不承而至於分技藝與徳為兩事則辨之亦不敢以不明也葢儒者慕古之論莫不以爲必絶去舉業而後可以復古之徳行道藝此則不務變更人心而務變更法度將有如王介甫所謂本欲變學究爲秀才不謂變秀才爲學究者矣儒者務髙之論莫不以爲絶去藝事而別求之道徳性命此則藝無精義而道無實用將有如佛老以道徳性命爲上一截色聲度數爲下一截者矣是以鄙意不敢不盡於執事也雖然執事憫時病俗之意則亦㴱且切矣今執事固有敎人之責矣今之敎以舉業縱欲罷之而勢有不能即使復古之敎則六藝固亦不廢執事之隐居修行㒒聞之膠陽諸兄亦久矣㒒所願執事之於諸生即舉業之中而示之以窮經反躬明理着巳之路而嘿消其干名好進之心則是舉業中徳行道誼也即古六藝之中而引之於聚精㑹神極㴱研幾之實而嘿消其争能務勝之心則是藝事中道徳性命也方且順而導之正不必逆而沮之也大率今之世舉業技藝種種猶未足爲心病所爲心術大蠧者在於義利之辨不明執事敎人欲明義利之辨則必以身率之以身率之則自取與辭受進退至於纎微必精察之果義歟利歟所取與辤受進退至於繊微盡義矣尤必精察之果有為歟無為歟一毫不自遮蔽一毫不使潜伏精神可透金石成人材動風俗之責固有在矣敢以是少效愛助之意以為執事報也無由面晤極論臨書馳懷嗣後更望時惠盡言此僕之所汲汲而求也答戚南玄來書滿𥿄無一字非膏肓之病無一字非瞑眩之藥兄之惠我極厚極厚非言可為謝也論語曰據於徳游於藝記曰徳成而上藝成而下徳之與藝說作一个不得說作二个不得纔提起處色色總在面前纔放下處了了更無一物自是人心本来之玅而不容增減也古人終日從事於琴瑟羽籥操縵安弦種種曲藝之間既云終日從事矣然特可謂之游而不可謂之溺今之人其於琴瑟羽籥操縵安弦種種曲藝即便偶一爲之則亦可謂之溺而不可謂之游何也爲其有欣猒心也爲其有好醜心也為其有爭長兢短之心也欣猒心好醜心長短心此兄之所謂即是塵機也然則所謂藝成而下者非是藝病乃是心病也掃除心病用息塵機弟敢不自力以承兄之敎也雖然塵機息盡渾淪道心亦願兄之無忽斯言也答王生宗道唐君誠志節之士所惜平生未與之接不能得其心胸面目之詳只是據𥿄上語套說一遍殊覺精神不暢不足以發潜徳之光且如徳州接逓一事乃是據宗道口說故叙事中此一段稍覺精明若使前時宗道盡將此君平生首末行事委曲口說一番或能更有發揮耳今不及矣然竹溪剛介之士其言亦自足以傳信不待予也既已為唐君作銘為之投筆三嘆志士苦心曠世相感且唐君在當時淹蹇不得一第而老於郎署又年不滿六十其清修絶俗亦自足以結裹此身而風沒世彼世間取髙第爲大官享耆壽勢力赫奕不知幾何人即其沉酣飽滿於聲利間當時莫不自以爲最得意然纔汲身便与臭腐糞土何異若此者其於唐君何如哉此孔子所以較量於齊景公夷齊千駟餓死之間其於提醒人心最切切也清寒之士可以無所待而自立矣宗道素有志向更願於義利緊關處極力研析使不爲一切俗情所轉乃是挺挺自作豪傑亦所以不負唐君衣鉢云耳勉之勉之與唐一庵書使者來弟徃洞庭歸時乃見尊柬讀罷不覺悽然之甚吾兄盛徳人也造物者既窮其躬而又夭其嗣也哉爲善者其亦不可以自信矣雖然自古聖賢能就人所不能就之徳則必有能堪人所不能堪之情昔者卜子夏哭子喪明失之過延陵三號而行失之不及東門吳則蕩而非人情也兄篤於信道乆矣試于此㝷究眞源則雖極哀極苦中本心了然自明所謂哀之發而中節而未嘗失其爲中也寄黎知州辱来敎云歆羡畔援之無也易意必固我之無也難澹泊者無所愛而自丼髙明者有所主而自執此意自前人未有發之者非吾兄眞實體㑹不能了了至此僕謹聞敎矣甚幸甚幸夫麄塵細塵總来一塵心是活物周流六虚本来如是意必固我安從生哉畢竟歆羨畔援潛根内伏有纎毫洗刷不盡處也既曰意必固我矣則未可語畔援之無也僕閒居自咎惜從前意向之未眞覺一切妄念之為累近來工夫惟有嘿嘿知過而巳兄所過獎令人赧然不敢當豈所謂誘之而欲其至於道也東城篤行堅至在朋友中絶少于比顧僕也淺陋何足以發潜徳之光謹據狀叅以同遊時所見聞從實書之不敢爲䛕墓之詞亦所以體東城之志也中有踈略與不當處更望痛爲抹削惟吾兄勿讓與鄭淡泉文選別兄久矣僕居閒無事時取晦菴先生之書讀之至答陳永嘉書義利雙行王霸並用之說不覺慨然發嘆以謂三代以下人材與三代以上劃然隔作兩截其隐微㴱錮之病只是如此然同甫亦是豪傑豈肯便自坐落利覇窠子裏去只縁差却些子其流遂至於此有志者眞不可不愼於毫厘也試以請於兄兄試敎之答洪方洲王事承示關政藹然寛恤禮讓之意至於節用惠商以身先之非吾兄雅志古道不䏻爲此中間意有偏重處亦稍爲指摘一二以復來命自嘆艸埜書生不䏻識知榷塲事體終爲目論耳萬不如吾兄身歷其地而斟酌之之爲精也雖然山人所知者去榷塲中弊病猶易去心術中弊病則難昔人謂有意爲不善與有意爲善皆能累心如瓦石屑金玉屑皆能障眼惟愼獨二字是千古正法眼藏若於此參透則終日履道只是家常茶飯平平坦坦不作一毫聲色世間一切好題目惡題目皆不能累我矣吾兄向善甚篤持身甚嚴迥在流俗之外僕一見而知敬之如瓦石屑自是不能障兄第恐所謂金玉屑者不謂無一點半點尚著眼中耳二程全書近曾留意否冬來獨居思兄爲切杭城多事僕恐不能来葢山人之道宜爾也俟面奉報與王湛泉文選兄之為文選也海内端人節士莫不張目吐氣以為三代直道復出兄之退而西歸也海内端人節士莫不悵悵然失望僕於兄之為文選也則竊與海内之士同其慶喜而於兄之退也獨不與海内之士同其悵悵者何也莊生有言風之積也不厚則其負大翼也無力水之積也不厚則其負大舟也無力後之君子道徳功業不如古人正坐積之不厚發之太驟耳古人限之以四十而仕豈古人才力智慧不如今人葢以厚積而薄試之也今兄去古人强仕之年猶未也願兄益自恢廓勿以三代以下功名為可足勿以古聖賢精一之學為不可至乗此山林多暇專精致神使反之於身心情性者益邃以精而究於古今成敗理亂之故者益練以熟積之於優游而發之於劻勷所以任天下之重有餘裕矣豈止為今日第一文選而巳哉此僕所以不暇為兄悵悵而敢為兄賀也海内同心如兄䏻幾自屏㱕後以兄在文選嫌不敢奉書今兄既還山又呉兾南北相去且五六千里無由一相切磋耿耿如何僕也樗散無似自別兄後毫髪無所長進惟舊來靣目兢兢不敢變壊此可用以少慰知已之懷耳至於驅馳當世非惟才有所不可抑亦性有所不宜也兄在文選時乃獨勤勤推轂故人之意則厚矣與陳後岡叅議別後恋慕不捨與乆病衰頽之狀大略具之葉紹興通判所寄書中今家人来亦當口䏻道之矣毎毎念昔與兄同住亰師日夕相砥淬受敎不爲不㴱且愧愚踈無以承之不謂此後渺然相隔葢三四年而僅得一兩日之聚方其離思孤懷十未展其二三而鷁首已南矣亦何暇於吐心曲談道徳以交助所不及者乎兄去閩越不知復以何時爲聚首之期非惟僕蓬蒿之貭不䏻藉直於麻中而兄之徳器如玉亦不暇置諸頑石之間以自攻此其可思可悵豈特以酒食文字之故也僕嘗聞兄緒論大意以爲必襍用王覇乃可以適時而濟務而僕則多執泥古方戞戞乎如以舟而行諸陸然兄既以此自信而不疑僕亦以此自膠而不悔是以自承敎以來契分雖甚投而論議常至左右古人云去短集長此僕之所以不可無藉於麻中之直而兄顧亦謂有取於頑石焉其可也兄在湖藩清修之節剸繁之才自與時流迥別雖然亦願兄母見化城而遽住耳今奉去讀書記乙集一部僕意欲以此廣兄不知兄肯降心而觀焉否也僕竊謂三代人材皆從心性上磨鍊故其經綸叅贊之業不出户庭而得之後世反躬之學不傳而其人所以經綸於世者率亦踈鹵求其繫國之輕重如孔明李泌陸䞇之從則其於道雖未醇而本其天資之所暗合亦徃徃開誠而不欺恬淡而少欲其經綸雖未必盡出於道而竭其才之所及亦徃徃渊源而有本闊大而無漏固不可謂無其人焉而非謭謭然功名自喜者可以跋而望也蘇子有言士之不以天下之重自任乆矣兄其有意乎僕居閒無事欲得國朝諸名臣奏議讀之且以尚論其人與其所以經綸於世者何如顧僻處山居苦不能多致煩兄為我畱意至於北宋以前諸儒解經之書世多散軼不存亦煩兄試博求之菽園雜記諸書兄向欲錄一副本見與亦願兄母忘之也若夫詩辭之學則僕自知力之決不足以進此向巳告疲於兄矣兄母更以此望我俟他日有持後岡先生集示我者我當望洋而嘆或尾後作一二句䟦語是則可耳兄許我以暮年買田同住之說如何如何諺云痴人前不得說梦吾巳執此作左劵矣幸兄母使我爲痴人也失兄於東隅得兄於桑榆竊以為怏艸􅋄白答屠漸山諭徳自聞兄有疾時以爲懷夏間富生于徳來學毎因富生問起居則知既已勿藥矣甚慰甚慰浮屠家稱缺陷世界故物忌於盈吾兄之才與其所享可謂完矣乘除消息天行則然吾兄之疾豈造物者將以是少損虧焉而大受於其後也乎兄平生意氣甚髙聰明甚慧夫髙者不可柔而雌也慧者不可藏而晦也兄罹此疾疢則寂寥枯淡之中靜思黙視種種世界種種伎功無可恃不朽者必將於幻身之外別求所謂本來面目者而從事焉則兄之學將日以精而其所得於病者不既多乎此僕始為兄憂而竟為兄賀也故曰惟其病病是以不病兄勿以為濶論如何弟年來奔走荆溪今歲始買小庄去縣十四五里妻子始有定居衣食稍能自給一身幸爲天地間一閒人矣藥餌之暇亦欲講習故業兾少有得焉以畢宿志而海内知交皆散在四方昔人取多聞而恨於獨學之難毎以為嘆而知交如兄者則尤徃來於懷也向嘗託南江道此意而兄不能來僕又不能徃奈何今蹉跎又經歲矣後復如何使来承委令兄祠堂文字縁㒒素病羸自鄉居以來欲節省言語文字以完心氣故凡親知之託一切謝免而吾兄數百里相命似不宐以此爲觧然復自念平生未獲請見於九峯先生既無以測知精神意向所在而欲爲之叙論若深言之則近於䛕墓之嫌淺言之則不足以發潜徳而違於銘以穪羙之義不滿於愛弟孝子之心是惧欲辭去則又重以違長者之命而不敢也又復自念兄之所不逺數百里而託於不文之辭者葢以迂戅之人不能爲䛕其言或可以信於後來者耳今以平生未嘗請見而㴱言淺言兩無所措乃嚅囁而爲之言是無以自信乎其心而又何以信乎其人非兄所以欲相託之意也是以敢直心而辭於將命者且其人之相知而言之足以信者則既有東郭少湖在矣幸兄亮之冬中南游必淂登兄之堂傾寫所懷不盡與田巨山提學約之過敝邑寄到手書嘉惠多謝雅意僕自送約之至姑蘇觸暑積勞遂爾發瘧迄今伏枕未及䏻强起也病㱕以來生平交遊一時雨散空山獨坐毎毎念之令人無以為懷此豈惟握手殷勤日夕之懽不䏻解之于心而獨學無友則昔人所以㴱病於孤陋也奈何近㑹約之稍能道吾兄所新得慰甚慰甚約之又言吾兄以好畵之故至欲手自摹搨則僕之迂滯所不䏻觧者然吾兄專凝純静豈謂沉溺于此或者㞐閒無事游息之時聊以此爲戯耳僕竊謂遊藝之與玩物適情之與䘮志荖別只在毫芒間如六藝皆古人養性而理心自此便可上達天徳今人學射學書學數則不過武弁之粗材與胥史之末技是以戴記分為徳藝上下之說而子夏亦譏其不䏻致逺況又不在六藝之科者乎且古之善画不過如鄭虔王維軰何足學也況學之終身有竟不䏻似其一水一石者平陳履常之詩曰晚知書畫眞有益却悔歲, WYG: ''}
