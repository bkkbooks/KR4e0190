  - {type: variant, offset: 0, length: 1770, content: 重刋荆川先生文集卷之三詩病中秋思八首閒對江楓誦楚騷病容秋色偶相遭一身萎薾同衰葉雙鬢稀踈似毨毛衣冠巳禠甘牛馬文字終捐是粕糟但使盡空諸所有不妨一醉笑如陶宿生軰血病來消掃室焚香意自超坐與蜻蜓俱歇午吟隨蟋蟀共鳴宵看雲种放終踈散嗜酒楊雄只寂寥巳覺閉關成僻性公車何處欲相招法宫侍從昔承恩班列貂璫近至尊字辨豕魚繙帝典曾校寶訓實録筆廻星漢注詞源獻書開閣三公第校射分朋七貴園俟罪江潭今幾歳清秋囬首㤗堦垣塞垣萬里事防秋選將分兵出帝州白馬幽并㳺俠客金兠肺腑冠軍侯請纓曾抱迂儒志借筯誰當幃幄謀巳酉年來堪竊憤翩翩胡騎入關游液池梧月冷金沙戸綰天河織女家蘭麝氖氲知賜浴芙蓉撩亂覺分花龍舟習戰鐃中曲虎旅傳更馬上笳老去張鶱皮骨在秋來猶憶舊時槎學仙曾欲訪王喬中夜頻將一氣調杳杳洞房開禁鑰㣲㣲面目上清潮色濕灰時人莫識夢鈞天處語難描悵望新秋蒲栁思塵縁猶絆鬢先凋何年海上入妖氛滿地樓臺盡一焚刃露雪霜驚壮士陣翻蛺蝶掃疲軍倭夷有蛺蝶陣星河避影宵烽逼砧杵停聲哭巷聞野老無能效籌䇿空彈長鋏對秋雲逺㳺當日意何如楚越風烟一棹餘湖斬鯨鯢先帝跡山圍龍虎異人居閒坐清谿談劍術深探古穴訪仙書試問同行相憶否一秋多病閉茅廬病中秋日作四首藥褁牽纒歳半徂秋風先自到江湖榮枯草色占鶗鴂深淺潮頭候荻蘆吳地連年盡豺虎野人何處覔蓴鱸亦知不是獨醒客與世浮沉糟可酺扁舟繋䌫且休徂秋旱川流未灌湖衰齒病多諸品藥貧家薪少半圩蘆稍能鄙事催孳豕偶戯仙方看釣鱸自署醉侯常是醉君王不待賜恩酺一身之外不知謀若道謀身病未瘳居並野僧方結夏身隨稿葉又經秋肥猶似鬼臞何状少不如人老合休忽報吳門兵燹盡古來佳麗說南州愚公本自拙于謀癖在烟霞况未瘳蟬響蛩鳴分晝夜寒灰稿木混春秋毉方百試增身病藿食終年與世休責守一無聊自慰且忘倭㓂過蘇州有感百歩飛刀賊勢雄連城刮地泣途窮誰供秋稅畊農盡將授寒衣杼柚空星孛仲尼書北斗兵交師曠訝南風六州節制慿元老㑹剪兇渠早奏功道家人說道中語開口便是先天後天無極太極兵亂中人說兵亂中語開口便是干戈搶攘之狀盖亦各㑹其所遭也使兵亂中人讀道人之詩則雞狗殺戮之憤躍馬除兇之氣便當一笑灰冷使道人讀兵亂中人之詩其亦有愀然而攢眉勃然而扼腕者否耶陳渡草堂二首皂衣非復漢庭郎蔽緼深冬卧草堂貧薄不羞畜牸計沉浮也逐闘雞行殘書閣盡經旬病異味嘗來百草香獨愧頑心猶未化十年學道幾亡羊近市偏逢食有魚閉門不問出無車牛衣聊自對妻子蜡酒時將洽里閭世網幸踈如野馬㣲名猶在愧山樗亦知農圃真吾事春至頻翻種樹書小樓宴坐二首不入名山不世間㗳然隱几置遺編身名瓦礫宜居後人事蚊䖟任過前抱樹蛻蟬司化運隔窓風竹發真詮未登道域終難罷㣲管還湏學測天渉世已如入夢蝶居身未作脫鞲鷹自疑戾契戾契見韓文俗呼捩及終爲病欲學墨杘墨杘見列子俗呼眉西又不能金老相逢知法噐慈公頗訝似禪僧牛乎馬也從人喚惟一迂儒是本稱嘉興金道士三十年不下牀亦三十年不開口冬夏一絮𬒳自擁余叩之以指畫卓許余入道慈舟者蘓之名僧也余見之不告以姓名渠深嘆異以余爲頭陀相也又疊前韻二首到處迷陽不記年村中暦本逐時編寒烏滿野成禾後社燕辭人落木前戒酒劉伶終酒性遣言摩詰亦言詮青天自是無逃處何事靈均更問天混合高低齊鷃鳯經過老少變鳩鷹屈伸禽戯慿何訣篆刻蟲雕誤謂能盡日閉關非酒聖文中子稱劉伶古閉關人廿年猜謎是畨僧余與翠峯僧徃來酬對者廿年此身本自無觔兩月旦先生若麽稱荘中作帶郭頃田屋一㝷歸畊自許力能任浮沉袁盎嗤驅狗㢘侈王陽訝化金貯麥舊庾將易榖行鞭新竹漸成林計然七䇿皆無用小試經綸底似今自述避人不敢厭高深逃影何如學息隂楚客又成蕉鹿夢􅃮園未了是非心紛紛世事看花發黙黙天機聽鳥吟可笑維摩真病在無言說處是金鍼有相士謂余四十六歳且死者詩以自笑古人云死生亦大矣此謂趂日力以進道者言之也苟不進道總是虚生修短何辨焉苟干道有見處夕死可矣然則死生詎足爲大哉本是癯然山澤士衰年況自不勝衣色常帶墨縁辭肉形或如灰似杜機睢于乆謝偕來衆蹇拙何心知我希世人莫詫方皋眼相馬由來失痩肥殤子彭聃誰夭壽百骸九竅孰踈親若過顔氏十四歳便了王孫一祼身三載濫叨金馬客幾人共坐綘紗春即今已似前生事何待他年跡始陳人情世事古猶今寂寞空林寄此心賢聖不分聊中酒虧成忘盡一開琴有書終日只掩卷無病長年亦擁衿即使癃然似桑戸未逢點也是知音學道曾窺天壌意寒儒又是膝攣人只言蔡澤有限壽誰見壺丘不定身賁客懶迎長謝病薄田可飽敢稱貧後來不用問修短已占溪山四十春囊癰卧病作三首節候經春日日隂寒衿獨擁閉門深終朝錬液非仙氣幾歳懸疣是雨滛焦, WYG: ''}
