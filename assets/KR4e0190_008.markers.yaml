  - {type: variant, offset: 5194, length: 1, content: 且, WYG: 而致其去國繾綣不忘之愛如古離騷之作耶其無自擬於鐃歌鼔吹遼東都䕶之曲而與塞垣横槊之士同其慷慨而謳吟耶不然則枝葉無用之辭其足以溺心而愒日也久矣兄何取焉日課一詩不如日玩一爻一卦日玩一爻一卦不如黙而成之此之謂反身而又奚取於枝葉無用之詞耶弟近來深覺往時意氣用事脚根不實之病方}
