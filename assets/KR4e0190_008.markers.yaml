  - {type: variant, offset: 22248, length: 1, content: 澤, WYG: 人不若盡乎已盖言聲色號令之間不若求之身心性情之實惟反躬自盡益慎以宻刀行古道不落流俗則身所舉動即是士子所師法可以不言而喻甞見近時提學教條何甞不言道徳何甞不談仁義然只成一畨講說只成一畨門面而於士習絲毫無補者無其實}
