  - {type: variant, offset: 20133, length: 1608, content: 子隱爲副帥討氐齊萬年萬年料之曰周府君文武全材若專制而来不可當也若受制於人祗速禍敗耳後子隱果及禍敗如萬年言公之爲將於江南也不專制而受制然保全功名以還西蜀免於子隱之禍敗所得多矣西還之後兩川復有長城公亦角巾私第徘徊浣花之曲自有餘樂可知也因後峯舍親之便草率奉𧺫居伏惟垂照不宣與俞總兵虚江僕迂愚人也屏廢以来機縁盡息惟寤寐海内才賢一念猶未盡泯及東南遭倭變以来僃見生靈塗炭之苦日夜痛心奔告無所欲亟圖見敵愾戡亂之人旣乃聞執事忠足以盡瘁智足以決勝則其人也心竊慕之曾作四詩以寄嚮往之懷然嫌于無交而相凟非山林之士所以自處之義遂不敢奉呈而心又不能已也乃託之孫兵憲先生轉達去年冬以先人行狀之故會王南江于武夷備述執事平生忠義機略之詳且知執事素垂意於鄙人亦不减於鄙人之慕執事也於是而通一書則不爲無交而凟矣梅林公今世豪傑又得執事勠力其間不徒以一時戰勝爲功而相與圖百年善後之策東南更得安枕知可望也僕滿先人服後且復移家武夷作終老之計彼時或當過寧波圖一奉晤以遂夙心伏惟亮之二每欲見虚江寤寐爲期前月已發家人徃麾下而又中止竟爲来書所先真謂先施之未䏻也今前書并往聊見積誠而已適誦来書推獎過厚非所敢當但聲氣之同則不敢辭耳僕雖未獲奉教於虚江自謂頗足以知虚江者竊窺虚江之立心制行與用兵方略葢深有得于橫渠旣見范公以後之中庸而非所謂橫渠未見范公以前之談兵者僕向詩中所稱儒術深明計轉工也數月前淂讀續武經總要知虚江兵家授受本之河洛夫中庸無聲無臭之宗旨實圖書五居中之遺也則中庸之旨虚江已深得之而措之用矣而猶歉然以爲未足葢其篤于求道之心若是異日相晤當盡鄙儒迂濶之說求一商確也僕少不自量嘗妄意于古之所謂不朽者思欲爲國家効毛錐之用奈何樸樕拘謭之才旣不足以濟時褊狹野拙之性又不堪于處俗况多病蚤衰今年過五十短髮種種牙齒半脫槁木形骸老醜盡見武夷結廬將畢此生若夫爲國家出氣力擔當大任有虚江輩在山人可以安枕矣適病餘草草奉伏惟亮之與李石麓少宰向居京師辱明公念舊僚之誼委曲垂愛臨行又辱寵餞自南役以来奔走海上日無寧居乆疏候問于門下然鳴鏑宵歇時倚海艦望玉衡泰階諸星想玉堂於天上則未嘗不如挹清光也東南倭患一歲一来如燕鴻之不失其信茫然未有了期而民間膏髓暗裏抽盡明公憂先天下又是桑梓之鄉不知何以爲計也幸教之淮揚軍旅重寄非迂儒所堪恐不勝任以至顚蹶辱在知愛并惟垂教適重病之餘草率裁書并惟台照與呉筠泉宗伯某居京師一年雖不䏻時候𧺫居數奉敎語至于明公拳拳道義之愛則心獨知之南役以来跋涉海上奔走行間又不䏻數通候問于門下惟有瞻望台階時切馳慕耳東南年年禦倭茫然未有了期卽使戰而常勝主客兵糧首級之費江北江南浙江三鎮一年丢却二百萬餘銀子民間膏髓暗暗抽盡深恐生出別病若欲斷盡倭賊来路則又澷無長策或以爲十年一貢自是祖宗故事貢路若通國王或有禁戢屬夷之理今三十八年恰是日本十年貢期去年山口豐後不宜貢而求貢旣巳阻回而日本國王該依期入貢者却又不見求貢此其故皆不可曉故冒昧開此一欵以備明公之裁奪幸恕其迂愚而教之與楊虞坡司馬已丑同榜中多爲國家宣力者其尤著者若公北門鎖鑰方溪公樞府調度弟至迂疎亦忝戎行海壖經畫每懼貽二公之羞心則不敢以不盡而才竟有所不逮也奈何奈何風便幸公出其緒餘逺賜敎之薊州土兵怯弱不減江南拒險扼虜殊無足倚况傷殘之餘振𧺫為難所賴李光弼一至軍中而旌旗變色即時轉弱爲強公自有妙手耳弟嘗從事薊門夷情軍情亦頗知之身雖在南敢忘北門根本之慮哉三衛夷情正古所謂御得其道徂詐作使御失其道狙詐作敵公自有權也風濤兵戈倥偬中因差人入京謝恩謹託陳職方轉候門下㐲惟台照二伏惟門下簡在帝心勲階峻秩逺道聞之深爲國家慶也江北將領絶無可靠兩畨苦詞僣凟門下計巳蒙垂察矣短中之長僅有一楊縉如一寳物又奪之往浙西而掘港泗州二守備一沿海一腹裏皆繫極緊要之官至今尚未有補者狼山之總鹽城之叅皆全不可托不得已止論狼山之總亦殊未見處分消息也春汛將動近獲一二真正奸細則海賊内侵之期計亦不逺財與將無一可恃者弟不敢自惜若江南百萬生靈何哉昔人所謂情隘詞廹搪突門下多罪多罪伏惟矜而恕之荅喻呉臯, WYG: ''}
