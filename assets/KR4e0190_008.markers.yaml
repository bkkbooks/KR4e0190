  - {type: variant, offset: 21757, length: 1, content: 能, SBCK: 􅀎}
  - {type: variant, offset: 21762, length: 442, content: 如公者毎于朋友間得公清􅋯道貌寤寐如見之公之于僕其亦然乎惟公華實兼茂資望並深當軸注心寄以北門鎖鑰僕亦何言足重輕於公過承相推見公謙徳之至而僕甚不敢安也承示出處一節深荷同心相知但世間眼孔甚小其卑者則旣戀戀以保惜富貴爲生涯其髙者則又以兢兢守護名節爲大事而古人饑溺由已溝中之推由已此一叚學問漫然不復知矣平生此心不敢求信於流俗而敢求信於豪傑縱不敢求信於人而天日炯然在也草衣木食已過一生果哉末難亦何哉公知我最深聊一發其狂愚耳不敢爲他人道也正欲遣人候門下并請教歲例調兵事辱書惠乃先之感謝感謝即專人趨候不盡欲言惟台照與王稚川少卿某辱公道義之愛最深昨歲南来擬得一奉敎於棲霞牛首之間以新耳目之見聞而海上南北奔走更無寧日殊乖始望乃辱書惠逺及獎進過厚非所克堪愧謝愧謝縉紳及同志皆言翰苑中惟公宏才大略素抱經濟之長内外重寄無所不宜仍使之迴翔於佩玉雍容間袖手以觀當世之劻勷於吏治戎務間而力不逮者然使公之深扃邃蓄正以大發於宻勿絲綸之地也某才本疎濶至于軍旅一未有聞強所不能如支離疏之攘臂竟非本相可自笑也吾丈過爲奬進而不敢, WYG: ''}
