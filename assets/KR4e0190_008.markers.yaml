  - {type: variant, offset: 17, length: 0, content: '', WYG: 善言惇行弟亦不能竊之以自淑不過如世間所謂好友者而已求如古人切切偲偲講學輔仁則未也自去官歸家閉門静坐大抵人窮則反本霜降水涸天根始見於是大悔曩時孟浪痛自磨刮直欲掃去枝葉文飾從根本上著力久之亦漸覺有洒洒處但}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 此}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 出入幾微之際殊廢檢防}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 亦漸覺有洒洒處此時欲見兄相與印証一畨了不可得則向者朝夕相聚反自錯過虚却光隂豈不可惜惟吾兄質實純明古所謂脚踏實地人也此不惟吾兄能自信而友朋亦無不以此信兄者别後想淵然深造非鄙陋之所敢窺測以舊時所見吾兄則尚有葑菲所以少贊於吾兄者何也兄得之資禀者持守有餘而充拓未至資禀有餘於毅而力量不足於𢎞其得處乃是氣質最美而其不及古人處乃是學問不能變化氣質也古人為學皆是百磨百錬工夫如書臯陶論九德寛而能於栗直而能於温沉潛能剛髙明能柔斯則磨錬已至氣質變化之効也夫弟所謂充拓者亦非如由赤子之心擴而充之説葢赤子之心本自充擴得去本自能大有一分不能充拓皆是未盡此心之量耳中庸曰致廣大而盡精微極髙明而道中庸德性本自廣大本自精微本自髙明本自中庸人惟為私欲障隔所以不能復然故必須道問學以尊之耳此千古學問之的也據吾兄舊日規模且未免作世間一種寡過之人其於聖賢作用尚是有間學問須先定其基故孔子不取謹愿之士而取狂狷為有基也狂者固}
