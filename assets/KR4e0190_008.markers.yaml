  - {type: variant, offset: 8211, length: 312, content: 有兩說清修之士好言貧無厭之徒好言貧僕兩不然上無清修之行而下不敢爲無厭之徒是以曩時有田僅百畝口中未常言貧今則每對人輒曰家有薄田數且盈千田舍翁得此深過望矣至見之於詩曰薄田可飽敢稱貧今刻之小集人人見之可考也一笑一笑乃承明府憐僕之貧爲之捐俸于齎憑之人夫齎憑之人宜與之多寡僕自有說非敢吝財若使有千畝之田而不能捐數兩之銀以償一齎憑之人至以累明府則其人平生之慳吝饕餮無行大率可知矣謹此如數奉償千萬見亮明府固知不肯獨爲君子也與曹子泰評事聞軍門諸公欲相薦紛紛有金革無避之說聞之令人驚慚無地若無此事而先言之則爲躁妄若有此事而後言則又無及故不得不以托之子泰也僕固陋之人所以自立于世者守區區之禮義而已如老嫠守節葢亦幾十年苦心若一旦忘哀冐利恬不知恥則, WYG: ''}
