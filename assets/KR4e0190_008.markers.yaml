  - {type: line-break, offset: 5276, content: '', id: KR4e0190_SBCK_008-14b08}
  - {type: variant, offset: 5277, length: 1, content: 露, WYG: 醉夢流浪之後四五年來種種世味種種酬應種種思慮能盡不醉夢不流浪否抑時有醉夢流浪處否醉夢流浪處當時便能覺得既覺便能撥轉得否抑亦有恍惚不便覺得牽掣不便覺得牽掣不便撥轉得否如把筆作詩時自覺淡然一無喜心否既有喜心其于好醜贊毁種種勝心能不藂然而動否覺有動處便能銷化否抑亦有牽掣不便銷化否其不把筆為詩時喜心勝心能不潛伏否不止作詩一節凡一切外馳習心能銷化否不潛伏否細細照察細細洗滌一些不得瞞過一些不得放過乃是真知痛癢既真知痛癢即境界不論静閙工夫不論頓漸静閙一境界也頓漸一工夫也兄以避北而就南舍頓而即漸為説夫閙處不得力即静處未可謂之得力不究竟所謂頓亦安有所謂漸乎收攝精神併歸一路漸即是頓即此一路接續不斷頓即是漸非二致也然吾兄討方便處用力亦未嘗不是也既真用力則静閙漸不患其不一矣來書所病世之君子以聖學之名習江左之實是非頓之為患也正坐自瞞過自放過麻木不識痛癢耳來書所病}
  - {type: page-break, offset: 5277, content: '', id: KR4e0190_WYG_004-59b, image: WYG1276/WYG1276-0271d.png}
  - {type: page-break, offset: 5277, content: '', id: KR4e0190_WYG_004-60a, image: WYG1276/WYG1276-0272a.png}
  - {type: variant, offset: 5280, length: 0, content: '', WYG: 血氣害事亦正坐不識痛癢耳弟之不肖年來痛癢頗漸自知追尋病根大率苦血氣之為累血氣薫成習氣不能自脱詩文之障亦時尚往來胸中第争分數重輕而已此不能以欺兄者自顧齒髪漸衰痛癢心切既稍有知不敢不竭力爬搔䕶藥使此生甘為麻痺人也來書提出小心兩字誠是學者對病靈藥但如前所説細細照察細細洗滌使一些私見習氣不留下種子在心裏便是小心}
  - {type: page-break, offset: 5280, content: '', id: KR4e0190_WYG_004-60b, image: WYG1276/WYG1276-0272b.png}
  - {type: variant, offset: 5281, length: 0, content: '', WYG: 小心非矜持把捉之謂也若以為矜持把捉則便與鳶飛魚躍意思相妨矣江左諸人任情恣肆不顧名檢謂之脱洒聖賢胸中一物不礙亦是脱洒在辨之而已兄以為脱洒與小心相妨耶惟小心而後能洞見天理流行之實惟洞見天理流行之實而後能脱洒非二致也弟之不肖正程子所謂墮在沉滯執泥坑裏者自愧脱洒之未能也惟兄教之}
  - {type: page-break, offset: 5281, content: '', id: KR4e0190_WYG_004-61a, image: WYG1276/WYG1276-0272c.png}
  - {type: variant, offset: 5282, length: 17, content: 嘗迂論古稱伊吕伊尹將則將相則相渾然, WYG: 之所請教于兄大要只是一言願兄時時}
