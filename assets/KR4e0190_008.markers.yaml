  - {type: variant, offset: 7313, length: 0, content: '', WYG: 泰之以隣否之疇祉則皆繫之於四四者大臣之位近君而任重者也近世之士愞熟獧巧之習日工而羔羊素絲之節或衰矣而任重之人所指以為才且賢者又徃徃在彼而不在此盖士習既然而示之以好惡者則又然何恠乎靡靡一風也是以雖清明平泰之世而包羞匪人或不勝參錯乎其間雖否泰之機未必繫此而士習隆汙則亦可知必有大人君子任當世之重以身範物離祉其疇以長君子之道而黙消隂邪彚征之氣此海内所以致望於明公而非明公不能副海内之望也則如僕僻處山林亦将拭目以觀盛徳不徒為知己之私感而已迂踈病廢之人本不宜開口及世事縱言至此恃明公之知也惶恐惶恐前辱雄文垂示此}
