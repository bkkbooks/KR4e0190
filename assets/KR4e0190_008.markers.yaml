  - {type: variant, offset: 3429, length: 4, content: 夜襲敵營, WYG: 已至於馬因地異性人因地異習銜勒有緩急飼秣有燥濕不窮其力不失其性則在善牧者虚心而調劑之僕又何言哉與吳令峻伯書前使者冐進瞽言自分必且見絶於吾友矣適㑹陳户曹道及吾友欲相顧是吾友舊愛之深不遽以瞽言為辠也即令人往候使節於白氏則已行矣悵惘竊惟論治者先體故按督之體異乎州縣風憲之職異乎拊循而州縣之所以拊循其民惟其平易豈弟大小畢輸其情使民之入公門者如入乎其家見守令者如見其父母是之為貴耳使民見威而不見德敢怨而不敢言則雖一時或能收整頓撡切之效而其所斲喪者多矣書云髙明柔克可省也向孫文卿在江隂嘗過僕僕問之曰兄素講學學問不是空談即如大學論平天下如保赤子此便是真心便是明明德兄試自省百姓到面前時可與自家兒子一般文卿應曰此意却似有之僕當時不以為然曰兄得無太容易説了久之詢其所以蒞民果無甚愧乎其言僕是以心慕而敬焉文卿方於事上而圓於撫下是以雖或惡而謗之而不勝其愛而譽之者之多也眼中亦曽見一人為江隂使百姓膝行而前俯伏戰慄不敢仰視此輩者何足多哉吾友清才雅志僕何用喋喋若此}
  - {type: page-break, offset: 3429, content: '', id: KR4e0190_WYG_004-47a, image: WYG1276/WYG1276-0265c.png}
  - {type: page-break, offset: 3429, content: '', id: KR4e0190_WYG_004-47b, image: WYG1276/WYG1276-0265d.png}
  - {type: page-break, offset: 3429, content: '', id: KR4e0190_WYG_004-48a, image: WYG1276/WYG1276-0266a.png}
  - {type: variant, offset: 3434, length: 5, content: 譎詐凶狡虜, WYG: 柔克之説為髙明者發耳傳曰善人受盡言僕素以豪傑望吾友豈獨善人已也相念甚勤未知使節何時更入郡耳懸懸素不遣人持書入府縣中今特遣此以謝兩次不得相見之故且恃吾友之知我也有持賤名到貴治者必偽無疑預言之與二弟書行者居者形跡各别然理道無二致也日用工夫無二致也汝兄在山中若不能謝遣世縁澄徹此心或止游玩山水笑傲度日是以有限日力作却無益縻廢即與在家何異汝在家若能忍節嗜慾痛割俗情振起十數年懶散氣習將精神歸併一路使讀書務為心得則與山中何異艱哉艱哉各各努力居常只見人過不見已過此學者切骨病痛亦學者公共病痛此後讀書做人須苦切㸃檢自家病痛葢所惡于人許多病痛若真知反身則色色有之也與田柜山提學書約之過敝邑寄到手書嘉惠多謝雅意僕自送約之至姑蘇觸暑積勞遂爾發瘧迄今伏枕未及能强起也病歸以來生平交遊一時雨散空山獨坐毎毎念之令人無以為懐此豈惟握手殷勤日夕之懽不能解之于心而獨學無友則昔}
  - {type: page-break, offset: 3434, content: '', id: KR4e0190_WYG_004-48b, image: WYG1276/WYG1276-0266b.png}
  - {type: page-break, offset: 3434, content: '', id: KR4e0190_WYG_004-49a, image: WYG1276/WYG1276-0266c.png}
  - {type: page-break, offset: 3434, content: '', id: KR4e0190_WYG_004-49b, image: WYG1276/WYG1276-0266d.png}
  - {type: variant, offset: 3440, length: 1, content: 所, SBCK: 􅀁}
  - {type: variant, offset: 3441, length: 0, content: '', WYG: 以深病于孤陋也奈何近㑹約之稍能道吾兄所新得慰甚約之又言吾兄以好畫之故至欲手自摹搨則僕之迂滯所不能解者然吾兄專凝純静豈謂沉溺於此或者居閒無事游息之時聊以此為戲耳僕竊謂游藝之與玩物適情之與喪志差别只在毫芒間如六藝皆古人養性而理心自此便可上達天德今人學射學書學數則不過武人之麤材與胥史之末技是以戴記分為德藝上下之説而子夏亦譏其不能致逺况又不在六藝之科者乎且古之善畫不過如鄭䖍王維輩何足學也况學之終身有竟不能似其一水一石者乎陳履常之詩曰晩知書畫真有益却悔歲月來無多僕常誦而笑之以為履常知書畫之有益而為益有甚于書畫者履常不知也履常自悔其歲月之不足以給書畫而書畫祗足以縻費歲月者履常不知也吾輩年已}
  - {type: page-break, offset: 3441, content: '', id: KR4e0190_WYG_004-50a, image: WYG1276/WYG1276-0267a.png}
  - {type: variant, offset: 3442, length: 1, content: 且, WYG: 大雖籠聚精神早夜矻矻從事于聖賢之後尚懼枉却此生則雖詩文與記誦便可一切罷去况更有贅日剰力為此䑛筆和墨之事乎然僕聞之畫家之説亦不以䑛筆和墨者之為工而必解衣盤薄為之上乃知畫家不貴能畫正在能不畫耳若此者所以凝神而不分其志也兄之畫品能通乎此則僕之所不敢知而所以諷兄者無乃為土苴末論乎幸兄一笑而擲之可也僕}
  - {type: page-break, offset: 3442, content: '', id: KR4e0190_WYG_004-50b, image: WYG1276/WYG1276-0267b.png}
  - {type: variant, offset: 3444, length: 6, content: 我兵形旣露虜, WYG: 别後携家至陽羡謝去世事牽纏時時閉門黙坐始知平日没于多岐蕩精揺神之過必讀邵子勞多未有收功處踏盡}
