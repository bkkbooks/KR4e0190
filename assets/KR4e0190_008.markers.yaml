  - {type: variant, offset: 928, length: 518, content: 患而後求非常之材有非常之材而後立非常之功公固其人也豈特一時掃蕩廓清將来數百年長城保障之計實於公賴之矣僕竊聞之古者將受命之日則忘其家臨桴鼓則忘其身是閫外效忠之道則然軍功爵賞皆決于外不從中覆是廟堂委任之道則然不然則鋒鏑交於原野而決策於廟堂機㑹變於斯須而制勝於九重此自古豪傑之士所以每患於掣时而功之難成也今閫外效忠之道在公能自信之而天下亦以此信公矣不識廟堂之所以委任其亦必有以異乎前時所謂總制者否也聞前總制在邊以請糧一事不合於某閣老遂不乆而去若爾則其所以專行者亦無幾矣夫自古未有不淂非常之人而能立非常之功亦未有不托之以不御之權而能用非常之人者也雖然托之以不御之權而或不能立非常之功則其責固有在矣公務盡其爲之在我者而已矣前時爲總制者其委任旣然至其自爲又大率顧忌利害畏縮首尾怵惕譏讒日夜以保功名冨貴爲事不肯以身蹈天下之難而爲苟利社稷生死以之之計是逡廵歲月至於喪其成功而往往被罪以去葢其所以喪功者生於保功之計太重而其所以被罪者生於畏罪之意太深公豪傑也轟轟烈烈做却一塲可則進不可則退奚顧慮之有哉僕又聞督府之任不在于自用而在于用人且夫西北邊固多沉謀鷙扞之士矣公廣詢而博咨之使文武長材盡在幕下至於負瑕故將守墩老卒苟有一長亦得自効期於群策畢舉此開府第一義也, WYG: 説如}
