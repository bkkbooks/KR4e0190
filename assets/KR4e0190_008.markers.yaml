  - {type: variant, offset: 5337, length: 0, content: '', WYG: 答茅令鹿門書來書論文一段甚善雖然秦中劎閣金陵吳㑹之論僕意猶疑於吾兄之尚以眉髪相山川而未以精神相山川也若以眉髪相則謂劍閣之不}
  - {type: page-break, offset: 5337, content: '', id: KR4e0190_WYG_004-61b, image: WYG1276/WYG1276-0272d.png}
  - {type: variant, offset: 5338, length: 0, content: '', WYG: 秦中而金陵吳㑹之不如劎閣可也若以精神相則宇宙間靈秀清淑瓌傑之氣固如秦中所不能盡而發之劎閣劎閣所不能盡而發之金陵吳㑹金陵吳㑹亦不能盡而發之遐陋僻絶之鄉至於舉天下之形勝亦不能盡而卒歸之於造化者有之矣故曰有肉眼有法眼有道眼語山川者於秦中劎閣金陵吳㑹苟未嘗探竒窮險一一歴過而得其逶迤曲折之詳則猶未有得於肉眼也而况於法眼道眼者乎願兄且試從金陵吳㑹一一而涉歴之當有無限妙處無限難處耳雖然懼兄且以我吳人而吳語也與茅鹿門主事書熟觀鹿門之文及鹿門與人論文之書門庭路徑與鄙意殊有契合雖中間小小異同異日當自融釋不待喋喋也至如鹿門所疑於我本是欲工文字之人而不語人以求工文字者此則有説鹿門所見於我者殆故吾也而未嘗見夫槁形灰心之吾乎吾豈欺鹿門者哉其不語人以求工文字者非謂一切抹摋以文字絶不足為也葢謂學者先務有源委本末之别耳文莫猶人躬行未得此一段公案姑不敢論只就文章家論之雖其繩墨布置竒正轉摺自有專門師法至於中間一段精神命脉骨髓則非洗滌心源獨立物表具今古隻眼者不足以與此今有兩人其一人心地超然所謂具千古隻眼人也即使未嘗操紙筆呻吟學為文章但直據胸臆信手寫出如寫家書雖或疎鹵然絶無煙火酸餡習氣便是宇宙間一様絶好文字其一人猶然塵中人也雖其顓顓學為文章其於所謂繩墨布置則盡是矣然翻來覆去不過是幾句婆子舌頭話索其所謂真精神與千古不可磨滅之見絶無有也則文雖工而不免為下格此文章本色也即如以詩為喻陶彭澤未嘗較聲律雕句文但信手寫出便是宇宙間第一様好詩何則其本色髙也自有詩以來其較聲律雕句文用心最苦而立説最嚴者無如沈約苦却一生精力使人讀其詩祗見其綑縳齷齪滿巻累牘竟不曾道出一兩句好話何則本色卑也本色卑文不能工也而况非其本色者哉且夫兩漢而下文之不如古者豈其所謂繩墨轉折之精之不盡如哉秦漢以前儒家者有儒家本色至如老莊家有老莊家本色縱横家有縱横家本色名家墨家隂陽家皆有本色雖其為術也駁而莫不皆有一段千古不可磨滅之見是以老家必不肯勦儒家之説縱横必不肯借墨家之談各自其本色而鳴之為言其所言者其本色也是以精光注焉而其言遂不泯於世唐宋而下文人莫不語性命談治道滿紙炫然一切自託於儒家然非其涵養畜聚之素非真有一段千古不可磨滅之見而影響勦説葢頭竊尾如貧人借富人之衣庄農作大賈之飾極力裝做醜態盡露是以精光枵焉而其言遂不久湮廢然則秦漢而上雖其老墨名法雜家之説而猶傳今諸子之書是也唐宋而下雖其一切語性命談治道之説而亦絶不傳歐陽永叔所見唐四庫書目百不存一焉者是也後之文人欲以立言為不朽計者可以知所用心矣然則吾之不語人以求工文字者乃其語人以求工文字者也鹿門其可以自信我矣雖然吾槁形而灰心焉久矣而又敢與知文乎今復縱言至此吾過矣吾過矣此後鹿門更見我之文其謂我之求工於文者耶非求工於文者耶鹿門當自知我矣一笑鹿門東歸正欲待使節西上時得一面晤傾倒十年衷曲乃乗夜過此不已急乎}
