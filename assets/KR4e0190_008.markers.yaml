  - {type: variant, offset: 5201, length: 1, content: 踈, WYG: 拙而無成也追思向日請教於兄詩必唐文必秦與漢云云者則已茫然如隔世事亦自不省其為何語矣所以久而不能請教於兄者正以村俗匠人不敢呈技於輪扁}
  - {type: variant, offset: 5203, length: 1, content: 見, WYG: 前也今既與兄開口説破容繕寫一兩篇奉以為笑耳蔡白石今之名家也僕向來頗不謂然近得其詩讀之則已洗盡鉛華獨存本質幽𤣥雅澹一變而得古作者之精僕雖非知音亦三嘆不能自已竊謂此兄當與吾兄並驅辭場矣雖然以兄之髙明磊磊若以一生之精力盡之於此即盡得古人之精微猶}
