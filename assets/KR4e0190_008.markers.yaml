  - {type: variant, offset: 22568, length: 0, content: '', WYG: 其身之卑賤與才之短劣也自是以後綢繆日接盖無浹旬不相徃来不相與從容盡談者此亦形迹似為煩凟矣雖然非君侯不能亮僕之深至此而非君侯亮僕之深僕又安敢以是䖏君侯哉公門無鄙人之迹庭中無長者之車亦已久矣豈特樗散之性不欲溷擾於人亦以相知相信之難耳惟在荆溪時與石屋彭君相切磋石屋之為人君侯之所深與也伏惟君侯住山中既且一年釋塵鞅之勞而就清池白石之安去簿書之煩而縱其清逺閒散之適昔人所謂霜降水涸天根乃見惟捍彼物累全我真機此時工夫此時意氣不知復何如耳僕甞竊謂今世人才未便不如古人惟古人為學堅苦磨錬忍嗜欲以培天根久之則此心凝静百物皆通而今人則未免粘帶未免牽引粘帶之根固於中而牽引之勢揺於外所以精神力量輙見不如古人僕每觀君侯治郡自是近世才傑何可當也雖然以君侯}
