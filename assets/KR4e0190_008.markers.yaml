  - {type: variant, offset: 5274, length: 0, content: '', WYG: 無痛癢之為貴而以真知痛癢為先知痛則不能不䕶而藥之知癢則不能不爬而搔之今之學者病在徧身麻木全然不痛不癢所以更不得力然知痛癢若不是真知其更不可忍處亦是不知痛癢縱使爬搔䕶藥亦悠悠不得力也來書云詞章為聰明之害又云於苫土中覺得曩時醉夢流浪此是吾兄一口説著平生痛癢一些不自瞞一些不瞞人即此一些不自瞞不瞞人處何等光明何等直截便是起凡入道真根子也雖然昔人謂舊習如落葉既掃}
  - {type: page-break, offset: 5274, content: '', id: KR4e0190_WYG_004-59a, image: WYG1276/WYG1276-0271c.png}
  - {type: variant, offset: 5275, length: 1, content: 昔, WYG: 積兄試觀之既覺得曩}
