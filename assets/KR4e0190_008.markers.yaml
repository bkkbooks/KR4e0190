  - {type: variant, offset: 22, length: 0, content: '', WYG: 言至於謹愿之士與狷者其不為不善亦較相似但狷者氣魄大矯世獨行更不畏人非笑謹愿之士氣魄小拘拘謭謭多是畏人非笑悁者必乎已而謹愿者役於物大不同耳今人多以謹愿者為狷此亦問學不明之過也交游可望者殊少得如吾}
  - {type: variant, offset: 23, length: 4, content: 書亦深知, WYG: 者尤少如弟疎鹵尚不敢自棄以吾}
