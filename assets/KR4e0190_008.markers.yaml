  - {type: variant, offset: 18707, length: 1425, content: 兵僃兩隻船經月在海洋中嚴督水陸將士日夜防守僅圏得住千餘倭子在一塊沙上至于楠巢之舉則以賊在死地我兵素怯見賊便走苗兵狼兵亦復如是是以雖曾獲有首級二十四顆而殺傷奔走之餘士氣益不振當別選勁兵伺隙圖之此事不知是難是易向所示江北避難之說吾去江北時江北之賊勢巳摧敗又巳搶有船隻包裹勢不擒則走矣吾之去江北而来江南乃去易就難非去難就易也一笑一笑平生不自量吃虧處正是欲㨂難事做朝廷原用我做視軍情官我是看人幹事的假如我只髙坐省城或蘇州今日一道文書江北督總兵明日一道文書江南督兵僃誰論得我者矢石馳驅風波漂蕩豈是人情所樂今日惹出許多議論皆吾之好難非𧺫于吾之避難也自出山以来看盡世事只少一寗武子之愚聖人此一句議論千古少不得也至如三沙之役尤有不淂巳者撫公告病候代巡公丁憂巡江自五月交代至今未至蘇松皆缺正官江南無一上司吾若又推脫擔子賊未必不登老岸矣然賊登老岸人却又責不得我我非守一處地方官也此等使乖處五十歲外老人豈便智不䏻及此念平昔素是愚人只幹愚人事耳成敗利鈍不敢計也調兵無益而有損費盡江南幾萬錢粮竟不䏻得其一戰之用而去至于地方騷擾幾如宼至此深可以爲創而不忍言也大軍之後必有凶年今歲江南旱荒數十年所無民命將益不堪奈何幸吾友千萬爲生靈留念此大隂徳也三三十餘年中第一老翁偶得一淮揚都堂世間便有許多摇撼所幸胸中若有砥柱在揺撼不動所謂可富可貴可生可殺可貧可賤而不可亂也今日在淮揚爲建牙開府只是這光景明日還常州山中衣木葉茹草根亦只是這光景人爲我豪傑只這個人謂我盗跖亦只是這個人何有於我哉真不足以發逹者之一笑也獨念蒙恩拔擢縱欲康濟此身亦開口不得若人言必不相容驅逐使去乃是與我一條好路不亦可乎條陳事誠見東南倭患茫然未有了期百姓骨髓漸漸抽盡不無隱憂故言之縷縷所恨辭不䏻達意惟吾友議之請兵請糧事亦甚緊急不得已知吾友之爲我委曲也鄙事之累吾友費心多矣道義之愛至親之情且以大家了却宇宙一畨公事故不敢以言爲謝吾友能亮之與陳蘇山職方東南視師一年自知絲髮無補連次轉官連次受賞捫心可愧葢深荷知已居中調護之力也條陳事自從經歷海上審究病源知東南倭患茫然未有了期而民間膏髓漸抽漸盡恐生出別病故言之縷縷殊愧詞不能達意也吾丈素先天下之憂者况身當其事乎幸賜裁酌而節取之江北請兵請糧亦甚緊急不淂巳至于狼出將領葢部中只見其報功而不知其爲衰庸闒懦一籌莫展之人也使當春汛必大誤事雖韓范爲督帥亦當坐累况弟之庸才乎故不淂已而極言之望吾丈速為換一善戰驍將見賊身輕的漢子葢江北局面與江南浙福不同靠不得水戰止靠陸戰也近得一重病精氣甚損以蒙恩拔擢未敢言病奈何奈何伏枕草率裁書仰惟台照與陸東湖錦衣都督謝中軍至辱手書嘉惠而謝中軍又口傳雅意委曲非道義之知則不及此淮揚重地非綿力所堪督府要官非迂才所及過辱吹嘘不虞其將不勝任以至顚蹶也奈何東南倭患茫然未有了期歲歲防倭民間膏髓暗裏抽盡若欲斷絶賊路則亦澷無長策一年推過一年畢竟有推不過日子公先天下之憂而憂浙西又是桑梓之邦仰仗經略使閒臣得有所藉手焉切望切望明歲江北倭患旣未可料而流莩滿野深恐嘯聚生盜然師旅饑饉正是古人學問實用處愧僕非其人耳然不敢不努力也適重病之餘伏枕草率裁書并惟台照二謹凟班軍漸漸屯聚飢民漸漸餓死海宼漸漸聲息賑荒供軍之費一無所出江北軍需正額地方所供計十六萬克齋在此上年年終已催得八九萬今無一二萬解到者某州来討預處軍餉銀三萬某縣来討預處兵餉五萬而三千五千亦無以應之事之窘急未有難于此時某自到維揚後更不得京中一信兩次差人入京兩月間亦無一人回報者誠不知所爲處也素辱門下知愛敢一道之伏惟台照與何總兵栢村晉, WYG: ''}
