  - {type: variant, offset: 3239, length: 164, content: 適臥病草草伏惟垂亮三曩者草率奉書未悉所懷兹又辱示大疏并營圗則分合進止奇正迭用熊虎之韜如承面授而士馬騰躍旂幟精明之狀如獲目觀古所謂節制之兵何以過此真足以立於不敗之地而不失敵人之敗發舒華夏之氣而掃空百餘年狐鼠之巢穴有不待捷書之上而知之矣兵家之變不可盡言而疏中所論用間設伏與夜斫營掎角八九條則大約僃之用間使其自相疑而自爲鬬最是攻夷上䇿, WYG: 雖}
