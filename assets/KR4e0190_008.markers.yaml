  - {type: variant, offset: 5196, length: 4, content: 劇談草野, WYG: 洗滌心源從獨知處著工夫待其久而有得則思與鄉里後進有志之士共講明焉一洗其蟻羶䑕腐争勢競利之陋而還其青天白日不欲不為之初心此鄙人之所不自量而竊有冀焉者也天子仁聖在宥天下兄豈久於海濵哉弟獨學無朋將藉兄為助日日望之近來應酬文字毎不敢作而年嫂誌文則不敢辭葢以昭天子之寛仁而發海外孤臣心事之一二焉非特為應酬故也嘉幣謹辭果酒則拜賜矣廣寧有賀黄門醫閭先生者忠信髙節之士也其風尚在否兄試詢之土人亦可為旅中蓄德之一助也答皇甫柏泉郎中書前得方山書知與兄日相切磨必多有妙論恨不能往㕘其間而與聞之也僕之不獲奉教於兄而索居也其亦久矣僕之懶病而廢學也其亦久矣藝苑之門久已掃迹雖或意到處作一兩詩及世縁不得已作一兩篇應酬文字率鄙陋無一足觀者其為詩也率意信口不調不格大率似以寒山擊壤為宗而欲摹効之而又不能摹効之然者其於文也大率所謂宋頭巾氣習求一秦字漢語了不可得凡此皆不為好古之士所喜而亦自笑其}
  - {type: page-break, offset: 5196, content: '', id: KR4e0190_WYG_004-55b, image: WYG1276/WYG1276-0269d.png}
  - {type: page-break, offset: 5196, content: '', id: KR4e0190_WYG_004-56a, image: WYG1276/WYG1276-0270a.png}
