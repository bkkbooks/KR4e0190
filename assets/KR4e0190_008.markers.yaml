  - {type: variant, offset: 4326, length: 321, content: 外又未嘗一見虜情離合虜勢虚實而鑿空言之宜甚可笑然以吾丈屈群策而立大功雖塞垣老卒竈下厮養亦宜無不得畢智効計於其前者是以鄙人不敢避其迂濶耳平涼趙子生長邊陲又素以兵事自許吾丈亦曾一盡其說否近見邸報得吾丈條陳邊事一疏竊以萬全之算多具此中而邸報止載條綱願淂全疏一觀之并三鎮巡撫所議與河套詳細地圗俱望一見示或更有以請敎也冒瀆伏祈亮恕胡宣赴麾下意甚慷慨一夫之奮勇可以觀三軍精銳之氣矣寄趙浚谷別兄十餘年何能一時忘兄近舍親萬禮部寄兄書知兄慷慨許國之志自顧榆枋之棲不䏻爲南溟之翼少助一毛風力耳一笑一笑聞兄僉憲山東以操練民兵爲事靑齊勁卒教之以有勇知方以僃一切不虞之變自是兄所素長不待贅也古云視卒如愛子可與同死生此輩須寛處銀糧豐其犒給或別異其軍中之豪傑機警者而優待之, WYG: ''}
