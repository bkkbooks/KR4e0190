  - {type: variant, offset: 15157, length: 2939, content: 渉若論事體只須各有司自解至軍門而軍門另發至弟處弟各項用過後與軍門算一細帳明白便了今布政司吏必欲取僕印信收管批迴附卷則僕原非領用錢糧之官布政司只見一千兩銀子解到僕處不相照㑹何從勾銷也弟非是尚㝷舊套子逺避嫌疑葢事體當如此耳幸公笑而教之十一前有書凟門下言浙直福祐未艾聖明自有裁斷適得公所示何其暗合也快甚快甚尸祝食肉之說當發千古之一笑矣又過承公慰諭以爲僕欲窮討三沙餘孽智慮深逺弟當時竊量事勢賊心未饜必不肯干休勢必拚命跳上老岸以爲宜必戰而不宜不戰宜速戰而不宜緩戰若使緩攻逺圍決守不住今日猶是江北代江南受災人強馬壯漸就殲夷若使一千倭子跳上老岸蘇松城下今何如矣今將官不免失事僕亦具奏自劾然賊之突走僕雖以此取誚于流俗亦竟以此見諒於豪傑苟心事見諒於豪傑足矣利鈍成毁不計也弟至江北後四五次奉書門下及走報賊情不識俱已達否克齋辭援兵甚力渠已自移咨門下不得不爲止之況今歲餘賊不止一半殘蹙之餘沿海潜踪已至廟灣勢窮數極不殺必走只在數日間援兵亦趕不上也公觀潮可預增我一席此時便得奉教十二脾脹之病非旬日所積亦非旬日可遣淹淹牽牽半死半活人也春汛逼矣何以堪之平生每欲督陣血戰今遭阨如此雄心徒在猛氣盡銷眞可自笑也逺承書問乗念拳拳深感一體之愛龍溪兄已到此數日議論可以代藥真如来教使還力疾布謝掘港守僃王楹專望速遣病中復書殊不盡情十三東至狼山北至廟灣沿海廵歷一遍則江北又是一樣局面土著鹽徒隨處儘有驍勇可用者稍聯屬之亦不甚費衣糧但是絶無一好水陸將官至於徵調之兵不特老營邊卒保河長箭可用其毛睢曹沂各兵亦儘驍銳但是無糧賞養之今歲十倍艱於往歳克齋去歲年終丁田銀巳僅得一半今無一二百兩解到揚州只望京師撥與銀米打頭一奏至今更無消息不知四五萬軍輳聚何處乞米兼之江北風俗素無宿儲一荒便餓一餓便盜至有一縣之倉無五升之米者故僕以爲今歲救荒須費七分精神只留得三分精神禦倭雖以髙才處之猶恐甚難况迂庸如僕者乎望公題奏間稍爲一援手也向所借鳥銃手葢是欲乆假數月者知朱尚禮一枝公所必須願且勿遣俟急更借也倘已即路則遂遣之耳聞戚繼光有禦鳥銃牌屢索之不得望公爲取一面見付作式然亦不知其果䏻禦銃而珍閟之若此也此處需水將甚急邵應魁若不甚當緊要公可暫借何如江北亦公地方也海上歸来一身骨立勉強過一畨春汛若不苦苦乞歸則王芳湖真笑人也掘港廟灣諸海險處不論有倭子未有倭子之時自来無撫廵到其地土人見之以爲駭僕似前生欠却水陸路程債可一笑也與王芳湖中丞正與梅林公計若四月内浙直無賊僕當以鎭溪土兵數千自隨至閩中効麾下一隊之用且海上經略必待面請於公而後有所藉手以復命葢賊之根本實在閩中海上經略此第一義誠如来教況一海相通喘息閩賊亦浙直賊也敢以職守所不及而忘共濟之義哉議旣有定不謂北洋之賊忽然彌海淮揚醜類幾將滿萬浙東亦接艦而至揚府告急之使幾如秦庭之哭矣僕適至崇明嚴督諸將海僃江南目下暫爾無虞後来尚未可料也即與梅林公計北援淮揚南備蘇松上陣下海皆不敢辭僕誠不自量其疎才小官僅如螳臂之當車兾盡其力之所至而已矣是以未能即走奉教南望不勝耿耿秋来定當躬賀麾下平宼此時閩與浙直妖氛掃蕩與公鶴敞華陽杯酒談笑于武夷九曲之間又是一畨光景也某自南役以来涉海者凡三乃得形格勢禁之大略江南控扼在崇明浙東控扼在舟山天生此兩塊土大海中以障蔽浙直門户諸哨船皆自此分而南北總㑹於洋山若會哨嚴緊遇船即打賊何從入信國廢昌國故縣而内徙之恐是千慮之一失未可謂昔人盡是而今人非也愚意方欲經營而来教適及此豈古謂所見略同者乎曾叅將荷督府國士之知可勉樹奇功以酬素志見時爲道僕意努力努力蜀扇佩劒來惠過厚不敢當但扇以示九夏驅氛劒以示萬里誅妖僕非其人而雅意不敢不承也多謝多謝與陳黄潭巡撫僕本山人一宜歸衰殘多病二宜歸才無所用于世三宜歸三宜歸莫如僕者而乃爲公所先愧羡愧羨公東南福星東南正不可無公公不宜歸而竟抗疏求歸況三沙正在緊急用兵之時雖仗公餘威足了此賊然願公少駐以待事寧以終惠東南何如此不過遲公十數日山中之樂而東南利害關係甚大公甘棠深愛諒不忍遽去也至望至望来書見教具悉雅意軍旅所羈不䏻面候并祈台照與朱肅菴巡按奉別後承手教嘉惠乆未及面候且謝時抱耿耿適往呉淞南望旌節殊切馳情即今海氛頗惡賊復猖獗江南江北海洋一帶盡是賊船軍志云擊蛇者先擊其首東南利害只在海中邀擊一着縦之上岸則毒禍必如往年甚難措手矣某謹馳至呉淞催督諸將官海戰伏煩門下督責劉顯儘力把截金山陸路一帶使賊不得登岸可也黄潭公以明公同心共濟之義欲乞明公少助糧賞僣言及之事急矣非此不能鼓舞人盡死力也僕原奉勑書亦有軍門糧賞缺乏聽爾與總督胡某計議措處便宜而行之文謹預告案下事若更急亦當於州縣量有所處也大率今日用得一錢而有功勝如賊上岸後用得百錢而無益總不免費財顧先後著何如耳惟髙明自有裁度勿罪瑣瑣呉淞事稍閒即過松江面領教言也與翁見海中丞近得邸報見兵部覆翁疏巳得旨不勝欣躍之至葢聖明逺鑒廟堂主張信公之深而委公之專也東南真可謂有福若使公稍搖動則奸賊得計東南之禍將来更不可言僕之拳拳而不能忘于懷偶深見地方利害如此非爲公也病體荷公垂念更感同心乎生真自笑一付賤骨頭初到揚州尚奄奄欲死及百勞僃嘗乃漸將復舊可笑可笑但兩足之腫如故来歲恐妨于躍馬先登耳箭手劉希孟等乆叨廩食感謝感謝僕歲底及春初且往狼山欲度福山約公一㑹或奉攀旌節一同度江共登狼山此江南江北巡撫大勝事也公其許我乎俟能戒行即當馳報荅萬思節叅政近得書知吾友爲衰朽謀者甚厚然書中所言鄙意尚有未然者如書中所言葢有見於委曲狥人者之爲非而無見于自牖于巷者之爲是也有見於鴻飛㝠㝠者之爲是而無見于匏繫果哉者之爲非也天下一舟也天下之人一同舟之人也猝然而遇風浪大作縦知其無可柰何其攔頭把拕之人焉得不盡其氣力以呼號同舟之人之有氣力者而爲之助其同舟之人亦焉得不聽攔頭把柁者之呼號而盡其氣力以兾其必濟乎又况未至于必不可柰何者乎此蹇之所以匪躬而大過之所以過渉也時行時止我一付之無心人用人舍吾友亦何必爲我有意哉苟爲我急急求解脫其與爲我汲汲于求進雖題目不同其有意則一也二日夜望思節之歸兾得披寫衷曲適得来書始知到任消息悵然悵然平生心事冷暖自知自古豪傑皆是忘其身以爲世界忘其身者毀譽利害一切盡忘之謂也得吾友書云獨有剖破藩籬一意以爲天下國家此最爲難不謂思節之過信我若此思節謂我數年以前無此識見恐思節數年以前亦不能過信我若此也刻書事其說亦長然思節旣信吾之大者則其細者亦可以不疑也偶荅喻呉臯一書稍發此意及諸書皆關心事特抄寄一覽但切不可示人也諭及麻陽土兵及領兵官之說領兵官嗜利無行本是常事而蠻夷官長爲尤甚雖無功而多罪昔人所謂簡節而踈目似亦不必窮治之也經略海防煩仔細一看見報所差百戸欲其頻頻往来以通彼此之信特與一火牌回往諸事儘力支持但病覺日深此身一切付之國家夀命亦一切付之數也與楊朋石祠祭朋石往京師有許多要面與劇論處僕在海上而朋石待我於蘇州兩不相輳竟成悵望僕往来海上辛苦艱難頗謂僃嘗心則不敢不盡而迁儒本相原非經略手叚才則竟不䏻強暑月鹽潮烝熱積勞乆之吐血幾至殞生然則所謂心之不敢不盡者秪足自損夀命之源而才之竟不可強者於地方漫無絲粟之補似此拙人不早求閒員可自笑宜其不免於紛紛之議也然誤爾蒙恩拔擢只得又強所不能且向前擔却一條擔子待防過一番春汛庶幾陽羨山水之間可仍舊作一閒散人耳人便草率布情惟亮之伯倫想日夕相議論之也與白伯倫儀部吾才質本迂骨相又薄非惟力不能與人爭榮進之途素心亦甚恥與人爭榮進之途天日可鑒也入官以来特以諸, WYG: 㳺}
