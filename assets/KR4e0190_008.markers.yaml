  - {type: variant, offset: 7883, length: 327, content: 復蒙賜如前僕旣逺出不能面拜辭於使者老父之心亦甚不安于此而不可以代僕爲辭是以又復如春祭之受之也夫胙者昔人所謂飲福受昨者也明公神人之主也明公之盡力干神人者至矣牲體貴首牲貴鹿壇廟之祭奉牲首以獻于祭主是神之所福也祭主熟而饗之以妥嘉福神人之心安焉顧僕何人乃僣食此非惟人病其饕餮而神亦且譴之自往時得與科苐郡邑諸公以常例賜胙僕毎赧然對之以爲身非陪祭何功何德可消受此然常例賜胙者不過三數觔猪羊肉耳僕之心猶不安焉然而不敢辭者以爲與衆同之而于義又無甚不可不欲苟違衆以甚矯激之議也賜同于衆者旣不可辭矣賜異于衆者復偃然而受之此何說乎以此特布鄙懷于左右此後復以常例見賜所謂三數觔猪羊肉者則必不敢辭當毎歲兩饜飽焉以至沒齒其深戴諸公之惠若常例之外更加毫末必不敢當兾安此心而謝神譴云耳二, WYG: ''}
