  - {type: variant, offset: 22209, length: 0, content: '', WYG: 深感知愛無量僕自去嵗移家至陽羡與世益踈濶此昔人所謂懶與病相成雖僅守固陋不敢墜失至於讀書窮理冀有新得則甚不能也其何以仰副明公教督之勤耶知愧知愧兹啓僕友人有項喬者其人温雅純實雖自處若謙退而其志常欲為古人雖其貌樸野而其中實耿耿然雖多卧疾若不任事而實蹇蹇奉職不肯一日尸乎其官僕於交㳺中知之最深而資其切磋之益亦最久矣又自羅翁當國為縉紳所輻輳而永嘉之人根株附麗攫美官鼔聲勢者尤衆喬與羅翁又有葭莩之親乃獨泊然自守不亂於羣甘心隱約不覬}
  - {type: page-break, offset: 22209, content: '', id: KR4e0190_WYG_005-8a, image: WYG1276/WYG1276-0280a.png}
  - {type: variant, offset: 22210, length: 0, content: '', WYG: 望然此士人居身之常不足以稱喬而喬之不苟大率可見也此不惟如僕軰與之素交㳺者能知喬而士夫亦多知喬者夫以僕素辱明公之知則固可以薦人而不為僣以僕知喬之深則固可以薦之於明公而不為黨自喬在屬下二三年間僕不敢以一字稱喬於左右者豈僕過避嫌疑使喬之名譽不通於上而歸朋友之過於僕耶竊以為明公精鑑近世希有又素以汲引人材為心而喬之為人必能在處有}
  - {type: page-break, offset: 22210, content: '', id: KR4e0190_WYG_005-8b, image: WYG1276/WYG1276-0280b.png}
  - {type: variant, offset: 22211, length: 0, content: '', WYG: 樹立則明公自将知喬而喬自足以受知於明公又何藉乎僕為人媒也昨得邸報見明公薦三郡守獨不及喬則始憮然異之既而思之何僕所料之不中耶豈喬之失其故歩耶或喬之㢘靖宜於郎署而不宜於郡守耶抑僕秪見喬前日之善而明公秪見喬今日之未善耶不然則或有間之者耶不然則以明公精鑑照物無遺而喬也日夕在左右而獨不得借餘光焉豈其命耶夫人情翻覆不常旬日異態固有匿情為善而後或敗露者矣亦有始雖强於為善而後不免改節者矣僕又何敢以四五年前所見過信故人耶雖然喬悃愊可信人也以喬之素能蹇蹇奉職則其為郡守不肯闒茸或可知也以喬之素不肯奔競以覬非望則其在郡不肯自汙或可知也又未敢以過疑故人也雖然僕所取信者明公之鑑也明公之黜喬而不舉必有説也則是喬固可信者少而可疑者多耶果飾於前而壊於後耶不然何為其見黜於明公也耶明公非不憐材則是喬果敗露與改節也僕之心不能觧也使喬之賢而偶未見知於明公則僕固不敢黙矣使喬果不賢以自取戾焉亦宜一請教於明公而與之絶可也是以不量狂妄而有是説焉伏惟亮而恕之幸甚答江五坡提學書海内交㳺如兄者幾人而交㳺中能重意氣不輕然諾如兄者又幾人與兄一别至今幾時中間問訊能相通者有幾眷言思之可為悵恨李中谿使来辱手書惓惓殊自慰幸又辱寄到十三經註䟽此大惠也僕於此書去嵗在山中偶甞讀之而於三禮者讀之頗詳竊以為王鄭諸儒雖未能深究乎先王之精藴至於形聲器度之間比較同異參量今古其功最多學者欲因筌蹄以求魚兎則此書不可不觀惜其舊板譌謬既多糢糊又甚故雖素好學者或倦於觀焉兄之刻此學者可謂幸矣而僕山野之人顧先得之不尢為幸歟中谿又欲刻杜佑通典恐此亦須刻也兄可賛之伏惟兄之蒞閩且三年矣八閩之士固已丕然向風矣而兄猶以人材風俗轉移變化之故未得其端為言者此足以知兄之志也夫今之為提學者苟博識善文及程較諸士文字之精與否而一無所失則已赫然足以收士心取髙譽矣至於人材風俗轉移變化則提學不以是自責而人亦不以是責之也兄獨慨然有意乎此固不以世人所趨尚與兄素所精詣者為可滿而必以不如古之善作人者為可歉歟古之道推其自治者以教人故徳修而教以尊教而後知困知困而後能自反故因其教人也而徳益修所謂教學相半也人之性行牽柔闇伏者多而果决雄毅者固少矣得其果决雄毅而能必為剛善且為剛中者又加少耳故臯陶之論九徳曰剛而塞强而義而箕子曰高明柔克兄固雄毅果决者剛者强者高明者也持之以動心忍性之力致之以收歛凝静之實克之以柔飬之以中使剛者必塞而不近於露强者必義而不過乎激積之也厚而蓄之也宻則兄之所以自進與其所以教人至於人材風俗轉移變化恐無以易此矣然此在兄之材力亦何難也嗟乎士之蕩于紛華競于馳騖而不歸其根也久矣閩固多文少實之域也非兄孰能振之而欲振之豈在聲色文字之間哉固有道矣若其次則莫切於風厲學官僕竊謂今之提學以一人督率六七郡之士即使如古之善作人者則善矣雖然其勢固亦不能人人而董之與日日而礲之也不能人人而董之與日日而礲之則其所被者淺矣古之教者自萬二千五百家為郷郷有師而至於五家為比比有師豈特教二千五百家者則賢哉彼其教五家者亦盡賢人也即使今之提學如古之善作人者亦不過六七郡共得一良師耳為此六七郡得一良師孰與為此六七郡得百十良師故為提學者莫急于風厲學官今學官𤨏尾自卑嗜利無耻人人相師靡然一風雖有一二材俊之士出乎其間猶懼其隨而偃也誠欲有以風厲之又恐非一提學之官與四三年之間所得為耳然以兄之材必能有以處此竊願聞教焉曩與王道思書亦甞及於提學之説大抵不出所以請教於兄者矣僕今嵗携家至荆溪此中山水清絶頗能恱人在病夫尢宜也邇来儘善飯羸弱之軀可以自支惟學不加進殊愧知已然於動心忍性收歛凝静此僕之所請教吾兄者亦不敢自棄也更願兄時督教之所示讀書太苦蕩揺精魂之說此兄之甚愛我敢不拜教尊作儒學記文最古雅然此自兄素所精詣不俟賛也山中亦有一二拙言更容繕冩求教答廖東雩提學書僕於吾兄雖相晤之日頗淺而相知之誼甚深兄之於僕則亦然也兩辱書惠深為空谷之慰又辱兩示髙文讀之喜躍夫京師都㑹也綴文之士比肩僕曩皆獲與之交而皆獲見其文焉然僕之所最傾意者乃獨在兄則數與傅少巖言之以為東雩之文氣骨甚勝無一㸃纎靡愞散之態後来可冀於作者東雩而已春間讀兄所為文視京師所見則加勝焉近復得讀兄所為文視春時所見又益加勝焉駸駸乎作者之堂矣頗自謂曩之所知於兄者之不妄也雖然文與道非二也更願兄完飬神明以深其本原浸涵六經之言以博其旨趣而後發之則兄之文益加勝矣兄志潔而識偉行方而氣和僕固一見而知兄之為任道之器矣嗟乎古聖賢之道其不講於世久矣聲利之燄薫塞宇宙日夜馳騖寡㢘而鮮耻儒生習見以為當然其有以講學為事者又或崇意見而乖實際競口耳而寡心得聼其言則美而考其實亦無以甚異於所習見以為當然者自非精一自信卓然不惑流俗之士則未可以冀於斯者也僕竊有}
