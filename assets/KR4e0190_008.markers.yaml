  - {type: variant, offset: 22305, length: 110, content: 知如何設法至于軍需一節尤更難處淮揚軍需自来止靠丁田銀子更無別途承兄丈㽞下揚州庫銀萬兩歲終已不彀止靠今歲新催丁田銀如懸鼓待椎之不可緩然百姓方望我賑濟而我方催并軍需國家方照分免荒而軍需必欲全徵無欠勢如錐鑿奈何奈何不知十數萬餓, WYG: 齒於市}
