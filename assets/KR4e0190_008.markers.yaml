  - {type: variant, offset: 177, length: 0, content: '', WYG: 不謂此後渺然相隔葢三四年而僅得一兩日之聚方其離思孤懐十未展其一二而鷁首已南矣亦何暇於吐心曲談道德以交助所不及者乎兄去閩越不知復以何時為聚首之期非惟僕蓬蒿之質不能藉直於麻中而兄之德器如玉亦不暇置諸頑石之間以自攻此其可思可恨豈特以酒食文字之故也僕嘗聞兄緒論大意以為必雜用王覇乃可以適時而濟務而僕則多執泥古方戛戛乎如以舟而行諸陸然兄既以此自信而不疑僕亦以此自謬而不悔是以自承教以來契分雖甚投而議論常至左右古人云去短集長此僕之所以不可無藉於麻中之直而兄顧亦謂有取於頑石焉其可也兄在湖藩清修之節剸繁之才自與時流迥别雖然亦願兄毋見化城而遽住耳今奉去讀書記乙集一部僕意欲以此廣兄不知兄肯降心而觀焉否也僕竊謂三代人才皆從心性上磨錬故其經綸㕘贊之業不出户庭而得之後世反躬之學不傳而其人所以經綸於世者率亦疎鹵求其繋國之輕重如孔明李泌陸贄之徒則其於道雖未醇而本其天資之所暗合亦往往開誠而不欺恬澹而少欲其經綸雖未必盡出於道而竭其才之所及亦往往淵源而有本濶大而無漏固不可謂其無人焉而非謭謭然功名自喜者可以跂而}
