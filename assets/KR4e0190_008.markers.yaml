  - {type: variant, offset: 22213, length: 0, content: '', WYG: 兄軰矣山西古帝王之都其人有茅茨土階之風而叚干木卜子夏居西河其人化之凛然有節概今不知其遺俗視古所稱何如而王文中與近代薛敬軒亦出於河汾之間豈其俗固有近古者耶吾兄以身任作人之責兄之所以淑諸其身即其所以淑諸其人者也篤志力行極深研幾求古人之真血脉絡以淑諸身以淑諸其人因其近古之俗而登之於道此其責在吾兄矣僕自屏居来牽於多病齒髪日衰所耿耿不忘者尚冀省身補過以不負此心與不負海内知己者而已與應警菴提學書今之職守令者苟有能飾簿書清獄訟者則為賢有司矣至於為百姓根本之慮則未之及也今之司學校者苟有能品藻文字嚴督課程則為好提學矣至於為學校根本之慮則未之及也}
