  - {type: variant, offset: 7, length: 1, content: 来, WYG: 葢其真心如此所謂懼也懼與不懼之間是忠臣孝子亂臣賊子之大機括反復如翻掌大易之所謂辨而春秋之所以震無咎也如善醫者下針中其竅穴則麻痺之人即時便知痛癢春秋一言中却亂臣賊子痛癢處即亂臣賊子便自囘心是以能懼然知痛癢者乃其血氣之固然知懼者乃其人心之固然也善醫者特與遇之春秋特與提醒之而已春秋如化工言隨機提醒人也舊説據春秋所}
  - {type: page-break, offset: 7, content: '', id: KR4e0190_WYG_004-24b, image: WYG1276/WYG1276-0254b.png}
  - {type: substitution, offset: 7, original: 来, replacement: 來, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16500}}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 而言懼吾亦據春秋所書而言懼此無異者但舊説以為亂臣賊子懼于見書而知懼則所懼者既是有所為而非真心且其所懼能及于好名之人而不及于勃然不顧名義之人以為春秋書其名脅持恐動人而使之懼此又只説得董狐南史之作用而非所以語于聖人撥轉人心之妙用且如其説其弊將使亂臣賊子彌縫益宻以逃名而避跡為害不小此其説起自漢儒宜不待智者而知其謬然更千年無有覺其謬者亦無有致疑者何也其悉更待面論善説春秋者無如孟子亂臣賊子懼與春秋天子之事此數句真得聖人微㫖其春秋天子之事一句儒者亦説不通久矣一麐可深思之面㑹言之春秋一部書無一句不為亂臣賊子而作非特書弑君}
  - {type: page-break, offset: 9, content: '', id: KR4e0190_WYG_004-25a, image: WYG1276/WYG1276-0254c.png}
  - {type: page-break, offset: 9, content: '', id: KR4e0190_WYG_004-25b, image: WYG1276/WYG1276-0254d.png}
  - {type: variant, offset: 10, length: 3, content: 復感歎, WYG: 十六條也答汪生書逺道走使詢及繼祖母喪服}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 謹禮之意然此在禮經甚分曉本非有疑似相聚訟也只為不解承重兩字而惑於俗人代父相沿為服之説是以其論紛紜而難通耳承重者禮之所謂受重也如何謂之重謂祭統也古者立主謂之重宗廟謂之重禮曰為人後者三年解之者曰為人後者受重於人受重者必以為服服之也禮曰父卒然後為祖後者斬解之者曰為祖後者受重於祖受重者必以為服服之也為人後者以傍枝後其大宗為祖後者以嫡孫後其祖雖其本末疏戚不同而其所以必為之三年者則皆以為後之故為後者受重之謂也不獨如是而已禮經固有為曽祖後云者為髙祖後云者為曽祖後者謂若父與祖或以疾廢與先曽祖而死者也為髙祖後者謂若父與祖與曽祖或以疾廢與先髙祖而死者也為曽祖後則為曽祖斬為髙祖後則為髙祖斬若以代父為説則是父之所齊期者吾代為之斬父之所齊五月者吾代為之斬此其本末倒置甚矣又何以為代乎為曽祖斬則謂之代祖也可為髙祖斬則為之代曽祖也可代父之説又何施乎此其鄙野舛駁絶不可凖於經典然世耆儒老生亦往往以此為説余竟不知其何所起也禮經十七章中無此説雖漢宋諸儒生論禮者數千家亦絶無此説余竟不知其何所起也禮為祖後者服斬不言服祖之妻何服非略之也葢發凡於為人後者章中矣曰為人後者為所後之妻若子以傍枝後其族人猶服其所後之妻若子况以嫡孫後其祖而不以若子之服服其祖之妻者乎由此言之為其祖加服云者自為受重也非為父也為其祖母加服云者自為祖也亦非為父也此祖母也禮曰繼母如母則繼祖母如祖母也為祖而服其繼祖母豈繫乎父之及見與不及見乎為祖而服其繼祖母豈論其有出無出乎且謂之繼則是不論其有出無出而為之服者固非其所出以繼母之服不問其有出無出而隆殺之也何獨疑於繼祖母焉夫有出而加服無出而降服此古所以制媵妾之等然非所以施之於嫡也禮已之妻嫡子之妻不敢以無出降而况於祖母乎以吾友有好古謹禮之意不敢不悉所聞更與知禮者計之禮後喪有前喪中其服後但據後喪始日為斷不據前喪滿日為繼也假而前喪小祥遇喪則兩喪共服之四年并以白與宜興諸友書古禮饋奠則從主人而服則從族戚朋友各以親疎輕重自製之是故主人饋奠而族戚朋友助之執事則有之矣在禮未聞有族戚朋友供奠物之文也主人勞族戚朋友以執事則有之矣在禮未聞有主人散麻散縞散絹于親戚朋友之文也今一切反是族戚朋友為之饋奠是以族戚朋友而代主人之所自盡也主人為之散麻散縞散絹是以主而擅族戚朋友之所自備也此禮不知始何時古所謂野于禮者其此類之謂乎且近世喪葬日奢日靡富貴人家一日至享十家之奠自啟殯至葬數日間大牲小牲刳割狼籍且百千計鬼神情狀與人情不相逺鬼而無餒所食幾何今若此不惟生者靡費抑亦使死者不忍且夫放生以資冥福則儒者所不信殺生以重冥咎則理未必無是以痛為亡妻謝此業債族戚朋友則相信者多矣而一麐自宜興歸乃聞諸友復欲醵金為奠且殺生靡費於有所用所必受猶尚不可况施于所必無用所必不敢受其謂之何如諸友以為情有未盡但逺來臨𦵏此亦足矣即使吾身後諸友亦只須如是行之但能相體不為無情也答萬思節主事書承示途中遇險及當局冷眼之説足知新功甚慰甚慰熱處冷得絶勝冷處冷得然險處惶惑原是易處錯過不曽做得功夫也易論學毎以涉川為説故曰作易者其有憂患乎所謂終身之憂也吾友閒居少過却是不曽抖擻提醒精神吾固預憂吾友涉川之難今吾友自知之矣自此𦂳著功夫常常從危處操心常如與夭吳河伯對壘毁譽利害諸闗悉與照破即世間一切大川何所不利涉也先輩云聖人於困險中有至樂於安平中却是有至憂然哉吾毎欲與大洲兄相㑹乃欲相與證明絶學非厯數之謂也然厯數自郭氏以來亦成三百餘年絶學矣國初搜得一元統僅能於守敬下乗中下得幾句註脚監中二百餘年拱手推讓以為厯祖吾向來病劇中於此術偶有一悟頗得神解而自笑其為屠龍之技無所用之亦嘆世無可語者近得來書乃知復有透曉如大洲者在也一快一快但不知大洲所謂透曉而厯官所不解者何所指耶豈所謂厯理者七政盈縮遲疾之所以然如元史所載王恂李謙厯議及縁督氏革象書之類獨能洞其精微是厯官祗知其數而吾輩獨能明其理遂指此為透曉而厯官所不解者耶葢昔者太史造厯既已測定日躔盈縮月離遲疾去極逺近渾淪得一天體在胸膈中而欲傳之形氣之間以為厯本則是以數寸算子握住萬古宇宙轉運葢甚難下手此子長所謂太初厯既已測候而姓與都等不能為算之時也古厯大衍為精一行和尚藏却金針世徒傳其鴛鴦譜耳于是守敬獨得一法曰弧矢圜算如所謂横弧矢立弧矢赤道變為黄道黄道變為白道者最為圓機活法自此黄赤白三道之畸零可齊而氣朔之差可定此法不惟儒生不曉而三百年來厯官亦盡不曉矣今監中有一書頗秘名曰厯源者郭氏作法根本所謂弧矢圜術頗在焉試問之厯官亦樂家一啞鐘耳豈大洲所謂透曉而厯官所不曉者葢謂此耶若所指如前説雖極精微幽眇猶是儒生套子所指如後説雖若九九綴術乃是實得也煩問之大洲求一轉語見示當更有請教夫六藝之學昔人以為數可陳而義難知在今日厯家却是義可知而數難陳葢得其數而不通其義者有之矣若謂得其理而不得其數則施之實用既無下手處而并其所謂義者亦脱空影響非真際也雖然今厯家自謂得其數矣今厯家相傳之數如厯經立成通軌云云者郭氏之下乘也死數也弧矢圜術云云者郭氏之上乗也活數也死數言語文字也活數非言語文字也得其活數雖掀翻一部厯經不留一字盡創新法亦可以不失郭氏之意得其死數則挨牆傍壁轉身一步倒矣夫知厯理又知厯數此吾之所以與儒生異也知死數又知活數此吾之所以與厯官異也理與數非二也數者理之實致用處也活數死數非二也死數者活數之所寄也近見一二儒者亦有意象數之學然不得其傳則往往以儒者範圍天地之虚談而欲葢過疇人布算積分之實用不知豈便吃爾葢過了也後世儒生所論六藝往往而然不特厯也大洲其於吾言有合耶否耶楊子雲曰通天地人曰儒通天地而不通人曰伎通乎天地之厯數而未必通乎身心之厯數者又一行守敬輩之所以為蔽也今未暇論也雖然所欲請教於大洲者其大者百未一舉也而輒𤨏𤨏及此毋乃以我不知務乎縱言至此一笑吾友欲吾舉厯家一二𦂳要語與大洲印証如步日躔中盈初縮末限用立差三十一平差二萬四千六百此死數也又如步月離中用初末限度一十四度六十六分此死數也厯家知據此死數布算而已試求其所以為平差立差之原與十四度六十六分之數從恁處起則知活數矣似此只舉一兩件更不費辭也活數者如揲蓍求卦之初參伍錯綜而隂陽未分者也死數者如卦畫已成之後為九為六而隂陽既定者也又來書謂趙大洲主測候吾主布算此説未之盡也布算未有不始於測候測候未有不寄之布算而可以造厯者兩者相須如足與目但測候之法元史所載簡仰二儀今疇人子弟亦稍能用之而學士大夫亦有曉者及趙縁督革象書測經度測緯度之法尤更分曉吾是以略而不言且吾前書所引史記厯書中語太初厯既已測定而姓等不能為算自古造厯亦毎病布算之難此一行守敬所以獨擅專長司馬公是星厯專家其史記厯書是説自家屋裏説話細讀其叙作太初厯始末其意可識也雖然使人皆輸班自可以目定方圓而不必規矩使人皆羲和自可隨時測候而不必布算以成厯故布筭以成厯者令後可繼也此堯典中亦自了了其暘谷昧谷四段則測候也其閏月成歲數語則布算虚盈以造厯也但古文簡約不詳今渾天儀象自漢相傳以為羲和之遺則測候之器尚在而布算之法獨不傳竊意其法若傳比之一行守敬當更簡易密緻葢古人心學精微圍範天地與後世術家自别今所傳周髀經託之周公雖真贗不可知豈亦有羲和布算之遺乎而後世曉了者亦少矣與顧箬溪中丞書僕居閒多暇時或留意於數藝將向所聞之左右者時為紬繹其於古人象數之精意雖或有齟齬難通處亦多有欣然㑹心處其㑹心處既恨不得與明公相印証其齟齬處又恨不得就明公而為之發矇解縳也竊意六藝之學皆先王所以寄精神心術之妙非特以資實用而已傳曰其數可陳也其義難知也顧得其數而昧於其義則九九之技小道泥於致逺是曲藝之所以藝成而下也即其數而神明其義則參伍錯綜之用可以成變化而行鬼神是儒者之所以游於藝也顧先王六藝之教既寢而算書之傳於世者往往出於六藝之士之所為儒者絶不知其説而知其説又多非儒者是以其數存其義隱矣而藝士之著書者又往往以秘其機為竒所謂立天元一云爾如積求之云爾者雖算師亦多不省為何語復著書者之意葢若恐緘藏之不密而示人以金鍼也是以其數雖存而數之所以為數者亦隱矣伏惟明公以當世耆儒玩心神明之學而出其緒餘於藝數之間明公之於數葢古所謂進乎技而入於道以神遇而不以器求者也且小子辱不倦之教久矣是以敢更有請焉謹具如别紙與裘剡溪推府書昨承示欲賜徐醫扁額謹因尊教輳成兩字曰占恒何如恒者人心本常理古今凡聖不減不増惟其有占不占是以有能恒不能恒之别而恒道實未嘗去人也古聖賢教人雖一曲藝未甞不與心學相通人能得此常理設使為醫則必能究性命之源為巫則必能極鬼神之情狀一徹萬融所謂因源而得委也古如農轅重黎之徒以聖賢精微之學而為醫巫師是也若使為巫醫者知無恒之不可則必反而求之於心念念在有恒上著工夫則庶幾性命之源鬼神之情狀可得而無愧于巫醫葢本欲精其藝而因以達乎其德所謂自委而泝源也如古巫咸醫和之徒因巫醫而知道是也聖人提醒人心只在一占字易曰君子居則觀其象而玩其辭動則觀其變而玩其占所謂占者豈是揲蓍布卦乃為占哉此恒心之存主處則為居此恒心之應用處則為動神明在我知幾而動是無時無處不是占也不占則神明失矣幾微昧矣是可謂之恒乎而又何醫巫之可謂乎與項甌東郡守書索居既久益嘆朋友合并之難而知昔日相聚之為樂也然又有可感慨者念昔日從兄於杯酒談笑間此時弟甚疎鹵不能有所切磋於兄而}
