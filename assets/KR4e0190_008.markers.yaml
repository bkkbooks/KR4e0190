  - {type: variant, offset: 0, length: 4, content: 重刋荆川, WYG: 也與季彭山書僕不慧自少亦嘗有志于治經漢宋諸儒先以解經名家者亦頗涉其津焉至於當世諸先輩以治經名家者亦嘗承下風而問之葢久之而不得其説則又將脱去聞見洗刷此心而獨求之于遺經又久之而竟未之得也偶游㑹稽獲聞髙論則爽然自失}
  - {type: page-break, offset: 0, content: '', id: KR4e0190_WYG_004-23a, image: WYG1276/WYG1276-0253c.png}
  - {type: variant, offset: 6, length: 3, content: 文集卷, WYG: ''}
  - {type: variant, offset: 10, length: 7, content: 八荅徐存齋相公, WYG: 于經闗竅開解搯擢腸胃若秦越人之隔垣而洞五藏也剖破傳注專門之學辭鋒所向决古人所未决之疑而開今人所不敢開之口如荆卿慷慨撃筑睥睨于燕市之中而旁無一人也目論古事又如身揖讓乎虞周禮樂之間憑軾以觀晉楚齊秦鬭爭之域也而聽之者且不自知其忽焉躍然以喜忽焉瞿然以愕而卒果然以飽亦雄矣哉世未之有也雖然願先生益深所養使此心虚壹而静自所獨然不必盡是也衆所共然不必盡非也却意見以融真機則古聖賢之精將于是乎在而况其經乎然則六經之道其卒于先生有明也已僕敢以是少効愛助焉答姪孫一麐書一麐問衛州吁弑其君完倉卒未能悉吾意當時簒弑之人必有自見已之為是而見君父之甚不是處又必有邪説以階之如所謂邪説作而弑君弑父之禍起者春秋特與辨别題目正其為弑如州吁弑完一句即曲直便自了然曲直了然即是非便自分曉亂臣賊子其初為氣所使昧了是非迷却本來君父秉彞之心是以其時惡力甚勁於此之時刑戮且不懼又何暇怕見書但有人一與指㸃是非中其骨髓則不覺回心一回心後手脚都軟便自動彈不}
