  - {type: variant, offset: 9187, length: 5969, content: 某之最迂濶無用而相公猶且拳拳引而致之則人將曰相公之急於求士而不責以僃若此相公之恐失一士焉而包荒不遺乎遐若此相公之舉用無書抵政府之士動如古人若此則是相公疇昔得士之効不因某一人之迂濶無用而少有所損而相公急於求士之心乃更因某一人之迂濶無用而益以章矣此某之所以稍自解其媿且懼竊敢以不肖之身而仰承相公之高誼也頃奉新命待罪南曹古云召不俟駕禮也況聖恩用之罪隸之餘豈敢次且以速大戾但以鳥獸躑躅之慕甫及禫除狗馬疾疢之憂未離牀席形魂枯盡不齒人羣此亦相公之所憫念也恐稽朝廷授官之成命且負廟堂推轂之盛舉謹布鄙懐伏惟俯賜教之二順之此行荷國寵靈并承門下指教深懼不䏻稱任使乃跋履塞垣夙夜戎馬間才有不及而力不敢不盡也薊鎮主兵積敝乆矣據閱過四區以十分為率逃故居見在之四三其見在者老弱又居丁壯之四三其丁壯者又多是未經訓練之人大率明旨所謂專倚邊兵不練土兵者一言盡之爲今之計若欲求其速効非有如光弼至軍而旗幟一畨變色若欲責其逺功非有如抱真之在山西孳孳訓練三年而後䏻變弱卒爲雄兵則薊兵誠未見有可以應敵之期而逺戍之兵誠未見有息肩之日也王總督自明旨切責以来過爲疑畏誠如尊諭適承慰語深知明公鼓舞邊臣之至意欲其展布四體以盡力於防秋重務也馬廵撫不日相見謹致尊教但王總督相去已逺容更託的當人轉逹尊教耳伏惟台照不宣三薊鎭主兵舊額所以逃亡數多者大率衞所官爲逋逃淵藪至於垜充招募之軍只縁當時處置欠當將東人補西軍而西人却補東軍人情不便以至於逃順之始行即開首逃之路今至馬蘭則首逃者糜至矣草草并附梗槩四前託白郎中奉一書大略言薊兵積疲之餘因循日乆必有能練之才而又苦心勞力有必練之志而廟堂又時時從中督勵之乃可冀於成功不然又如往年故事也此書不知巳達門下否薊兵所以多逃一由於營官之剥削一由於衛官利逃軍與餘丁之納錢爲之淵藪不肯解補其所以不練之故一諉於牆工歲不休歇無可練之時一諉於將官傳舍數易無專練之人而當事者又因循而莫之處也若使衛官不爲逋逃淵藪營官不得剥削而在上之人又寛其工役足其月廩以慰藉之則薊鎮兵額原自足充而垜集招募皆爲第二義矣大虜尚未有的報也東關已閱過六區惟一區未完也奉教有期先此𧺫居不宣五竊惟薊鎮之兵自内地衛所抽往邊關譬如貨泉衛所乃其出産而是其轉輸處其逃邊關而潜囘衛所則衛所又寔淵藪轉輸不足責之出産逋逃不獲問之淵藪但自来邊關軍政已覺疎濶而衛所經理尤更鹵莽一衛欠逃軍不解者徃往千名以上順之輩昨歷邊關其缺軍之數官巳量行責治今還經衞所若不稍爲查理則邊上愈難勾軍矣是以到處須稍停留葢不敢避遲事之罪以干誤事之罪也該鎮自督撫而下事權悉在各兵僃道前時若得勑内載却督同該道一語則事尤有統紀而易集今竭駑鈍於其間用力煩而見効少者則以不䏻督同該道故也適巳西還至玉田矣途次草率奉候伏惟台照不宣六竊惟薊鎮查閱一節軍數寔是多缺不敢妄謂之不缺軍容寔是未練不堪以戰不敢妄謂之練而堪戰若夫門下愛惜人材念邊材之尤難而代者之又難其人矜其不及而責其後功則廟堂自有權衡而查閱之臣只知據實以對而巳至於𥙷兵一節眼下便要三萬五千人纔勾舊額頗費周折葢邊關與腹裏相持衡之勢一鎮之財與力止有此數舊額雖在積弊寔深難以毛舉不損邊關則損腹裏損邊關以寛腹裏是謂捨急算而就緩圗損腹裏以益邊關亦爲空膓胃以奉肢體邊關空缺其慮在近腹裏耗竭其慮在逺且如今年運三四萬米於遼東薊鎮州衞僦車賃騾之費至賠貱銀六七萬兩又是抽却一畨骨髓而近来建議之臣因薊鎮兵數缺乏無可爲處乃有改州縣爲衛所與垜民爲兵之說改州縣爲衞所則畿甸之間頓成荒塞垜民爲兵則無故而加之重罪以憂其子孫二者旣駭観聽且非事體故順之之意欲多方以圖使軍實旣可足於邊關而財力不盡煩於薊鎮所恨才不足以稱心詞不䏻以達意但以承命悉心區畫夙夜思惟技止此矣惟門下大經略但一運掌間自當使腹與邊軍與民兩受其福也若夫直從薊鎮根本上做得一著工夫細心緩圗如管仲范蠡之謀國幾年作内政通鹽米輕重之權與十年生聚以富邊境此則薊鎮長乆之策然議者必以爲此書生極迂濶語故未敢言而轉糓通水足食之說亦稍發其端然亦頗不悖於救急之計并望賜敎也其練兵事宜與夷情一節繕寫未了容更請教荅馬巡撫書逃軍許其自首隨處收捕一節向嘗請教於思質公而公之論尤更明快直截僕輩亦同此意葢與其逃而無用不若就近補之猶淂一軍之用也旣而思之深有未便者苦寒磽硧之地人甚不樂居嚴法羈管嚴法清勾然猶住者多逃而逃者不獲若逃軍即許改編則雖素不逃之軍亦孰不逃焉以冀改編樂地乎是今日逃軍之補見役所以釀成異日見役者之作逃軍也竊恐利少而害多矣是以不敢便宜區處亦不敢遽有題請只將狀發與縣官而曰務須不失開誘首逃之初意亦不墮猾軍規避之私心使具由上請尊裁惟公一爲處兮自當去其害而收其利也與董後峯憲副野人一入仕途百般悔吝禪家所謂猢孫入布袋真可一笑也塞上風塵寒侵病骨逺憶姊夫坐享園池之樂何如何如不乆亦當圖解韁脫鎖之計葢樓築至栽花種樹布滿園中雖不能與東鄰爭勝亦與公各適其適而時相過從也興言及此已覺神馳行至居庸小价回草草附此不盡與李兵僃曩承問及民兵一節僕之原題雖以徵兵解銀而部之覆題則主於照舊徵兵僕別後一路思之解銀兩雖便於薊鎮而徵兵實便於山東葢山東兵額素定此背衣食於官乆矣一旦欲徵銀以解邊旣於人情不便尤恐緩急無濟且使薊鎮有銀而無兵山東出銀而缺兵則兩鎮亦皆不宜不若只照舊規遇有聲息徵兵入衛之爲便也且部堂江翁司張正郎皆山東人也彼必斟酌地方利害故其爲說如此不得以僕之說而廢彼之說也惟髙明更叅以人情土俗之所宜而熟計之至於腹裏减存民壯則係嘉靖三十年鄢劒泉原題葢通腹裏地方言之不指山東也便中草草附復佳章承教并謝與劉南坦尚書翁之病非真病也不爲淨名之示疾則爲壷丘之杜德機也神光獨照真可想見一笑一笑某世網所攖南北奔走北出塞南踰海顧執殳之役分不敢辭軍旅未習柰何奈何回首故山可爲太息不久圖返初服奉侍屨杖當有日也圜中秘訣大約略傳示以少潤枯朽否乎與張龍坪兵僃獲侍同途又獲侍同舟日夕奉教皆出邂逅非素所期然公乆垂念於僕而僕未之知僕亦乆欲晤公而公未之知則又不可謂非素所期也維揚班荆自此奉晤下邳分轡自此奉別長川舉杯同於歡笑驚風折檣同於險阨數日之間而聚散驚喜之不可常世事大率如此達人觀之可一解頗也别後承遣使致手書殊感相念兹過臨清使者蔣繼先王清等還附謝伏惟垂照與羅念菴當路必欲以兵事相處使人不顧所不能僕亦不得已而効支離疏之攘臂不暇自顧其所不能而強承之徒使山洞髙臥之士袖手旁觀不知如何發笑也海上事稍閒仍欲如今春故事更約兄於饒郡或信郡兩處孰便有便人可先寄數字當特遣人奉約知兄亦不能巳於情也非不知兄石洞之安閒而道路跋渉亦苦但弟自入京師病脾骨立扶病往薊門兩月間登馳絶徼峭壁三數千里之途閣過鐵靴銅面之輩十萬餘人一一欲辦其弱強腥風酸鼻驚沙煖面歸来席未暖也又復將荷戈渡海冒驚波而鬬鬼夷兄寍使我獨苦而不能爲我分一些苦耶并書此以發山中人一笑當路欲用浚谷甚切行將及矣荅王鑑川兵僃伏讀所寄澄江后峯諸君書論及鄙人罪過知公之愛我以德而責我以禮也已而奉所寄鄙人書又知公之愛人無已而不輕於絶人也語云人不幸不聞過僕何幸得此於公哉某迁疎木戇但知分在草莽固守古人不見諸侯及今時不入公門之戒執泥不通遂至得罪於門下若此然於公之髙節行誼未嘗不知慕于公之盡心保障未嘗不知戴也此僕之于公心非敢相疎也公提兵出入居郡之日少矣某自葬先人後即屏居荆溪還郡之日少矣此所以每不相值也公枉駕垂弔在先人窀穸旣畢之後公遭喪逺歸適鄙人荆溪卧病之餘此又所以不相值也此僕于公心非敢相疎而跡又非相避也公亦可以相亮矣知我罪我惟公裁之僕年過五十顚毛種種一身百病待盡有期即且携家逺去㝷一人跡不到之山結裹此身世間一切是非毀譽不惟不敢計亦不暇計矣樗材頑石斤削何施殊自悼也殊自笑也惟公盛年宏才行當爲時樹勳公位益髙僕入山益深衰病益迫雲泥相隔負荆無日故敢一陳鄙懷異日若天假之縁淂一面悟出于望外所欲請教者未敢悉也抑又聞古之人有跡若相背而道則相成者矣繆公能容泄柳之閉門不貶繆公之賢文侯不責叚千之踰垣益顯文侯之義兩諸侯不嫌人之慢已而布衣不自嫌于慢人此所謂古之道所以相成也漢時大將軍尊重公卿見者皆拜黯獨揖或以誚黯黯曰大將軍有揖客顧不重耶大將軍聞之益賢黯人皆謂黯能重大將軍大將軍能自重以相成也公專制一道凡屬吏鄕宦取憐乞寵奔走伺候摩肩側足于門牆而不淂見者旦夕幾何人使如僕一布衣老翁奔走伺侯其間譬九牛增一毛豈足加重惟以公之威望無人不趨有一不奔走伺候之老布衣是公之所以爲古人也然則僕之奔走公不足爲敬公重公而固陋自守乃所以敬公重公也公以我爲慢豈惟不亮僕母乃異乎古之道也寄内閣及本兵諸老書擊賊海中以奇功論雖有平倭事例但兮别淂来船去船欠明且水中首級一槩以十五兩論賞不知打来船之難十倍於打去船也去船殺人劫財巳厭其毒殺一賊是止于一賊而巳若殺却来賊一人是全了幾個好人性命其功不可同日語也若得部中題覆打来船真倭首級雖不能同之陸地首級三十兩亦可量增銀五七兩則人人爭奮打来船者益衆而賊之登岸者少矣與東南事體絶與西北諸邊不同西北諸邊雖是兵財殫弱而成法具在儲糧畜兵歲有畫一只是廢墜不舉耳若東南事體一則以海宼猝𧺫事屬于草創一則以連年被宼力盡于支吾取辦一切未慮經乆其大者臂指相使之體統未明唇齒應援之機宜莫辨至如浙直所募之兵則朝南而暮北有今日在浙江應募明日在淮揚應募者如暫時顧倩之人主人不淂而有之又安得而用之軍需則移東以補西一年之財只彀半年支用無名之費百出于民而軍人告缺四月五月缺糧者往往而是大率昔人所謂不終歲之計也祖宗時備倭規制沿海屯田水寨諸法漫然無跡可考矣故西北諸邊莫急于振舊廢東南海僃莫急于定新規此其大較也然往時浙直軍需多倚各省恊濟自例罷協濟之後而窘急甚矣胡總督近有乞留運米借鹽銀之奏葢以軍需無處甚不得巳全仰此一著救急望曲成之以幸東南其經乆之策容共酌處奉聞也與胡梅林總督山中雲臥遥瞻棨㦸不勝馳情海氛清淨東南賴以無虞乗此閒暇恰好汲汲料理彌縫微密使百十年間海隅内外更無一鏬可乗知公此時必有長算不徒所謂救頭救脚之說而已古人經綸手大率忙時閒做閒時忙做知公亦然也承示鹿門所敘勦倭本末具悉公之運籌所委拙文向已相許不敢復辭謹候大祥後也兩度承公惠茶深見氣味之同多謝多謝二伏聞道體稍覺違和恨不能一侍左右葢一體之義公病亦吾病也東南有福比時計已勿藥懸望懸望灘山滸山有賊係浙直諸總㑹哨所在而李希賢孤軍獨往餘皆坐觀不相爲援及烏沙門洋山一帶有賊定海兵船亦互相觀望待其登岸噬臍何及葢守港將官全然不以㑹哨㑹勦爲意賊迫近島機㑹可乗輒以風潮不便爲解縱之登岸陸地失事則又罪坐陸戰官兵彼亦不與其責習成套子牢不可破明旨近例所謂邀之于海徒爲空言不淂巳而陸戰在我爲舍易圖難在賊得護其所短而用其所長兵家之忌我則犯之然則倭賊何時可平公亦何時可息肩也興言及此秪有疚心承公指教不自量力謹往呉淞督戰一畨若賊仍在灘滸洋山之間諸將官仍守舊套不肯㑹哨㑹勦僕止有以身先之而巳呉淞事機稍緩即星馳侍教左右爲快亦有所面請教也聞薊州虜情尚緊南北事勢若此臣子之心卧不安席奈何奈何浙西江南陸戰之兵俱無足恃僕所親見成敗只在海勦一著賊一上岸必然復如往年之事矣故憂之不得不深但公方在調攝中不宜以繁言相瀆念無可與爲言者故不得不爲翁言也三崇明沙上實有賊一千三四百人登岸立柵已檄盧總兵不可離崇明一歩盧鏜旣不可離崇明張四維又不可不還浙東則江北督將戰將皆弟身自任之而已江北了賊後即擬浮海了沙上之賊然後轉戰而南擣舟山一帶海賊告成幕府此語誠昔人所謂初若落落難合仗公神算更觀其後何如也但隨身銀子殊恨其少公所給銀謹先發一半往崇明而以一半自隨弟亦搜括家貲并借貸僅得銀五百兩通公所給共是千金而已弟承遣命至地方半年並未有一題奏今欲并崇明江北勝負賊情及請發糧賞特題一本公崇明捷奏千萬上緊早發勿緩也四書生操未嘗一日拊循之兵領八九枝素非同心之將以攻據巢之賊而監將戰將皆身當之真可謂不自量而任之太過矣仗公成算初二初四兩日將士賈勇入巢斬獲共得首級四十二顆皆係真倭無從者衝鋒則鳥銃手溆浦兵之力也生獲免狼狽爲幸多矣餘賊據巢者尚繁有徒戰後鎮溪兵乃至將復用之勦平餘賊此後容再報也弟以崇明事緊恐有疎虞不淂不急歸而銃手皆隨僕還矣區處崇明後即往杭州候公計相晤只在半月也此中賊勢似已有定恐不乆當走公書中云欲題本可且緩之更看消息何如承教歩歩檯營立於不敗此公老將經略甚愜鄙見弟以造下行營三座決然可以制賊而諸將尚不能用之所謂或執抝不肯相聽或愚闇不能相聽此亦其一節也若不用檯營之說明日再戰恐又如前之奔耳雖十戰亦復然所謂浪戰也弟所造行營當携至杭州演之公與弟當一笑耳五此時遊魂餘賊浙直間止有廟灣及三沙兩巢皆係窮宼勝勢在我徼國家鴻福仗督府勝算殲盡此二巢浙直可數年無事弟區處三沙後尚欲直從海路往通狼而上處廟灣殘孽適得公書知閩中緊急若此奈何奈何不知僕區處三沙後將往江北乎將往閩中乎幸示教克齋臨别相約事急則一日一報事緩則兩日一報今將半月矣而更不得一兩報也豈廟灣賊已走耶督府時有江北報更望傳示三沙之役盧總兵劉顯劉堂高㵓等分四營於十八日已登岸立柵賊伏無聲息多只在一兩日間鏖戰也張空兵亦已到在十九日登岸水陸分布俱各嚴備但賊巳多置小船二十二三月黒以後防之爲難督令諸將不敢不仔細草草先復六竊料此賊若得突走必不東還必上老岸不便流劫必又結巢是移沙上之巢於老岸如柘林川沙故事圖之更難萬一若此奈何何本源及江北之兵若至諸將或更有一畨㑹勦意欲借麾下梁守隅千兵以往若沙賊有可圖之機則見可而進若櫗不可圖則知難而退不敢必用千兵當全璧以還麾下也何如何如七三沙緊急用兵之時而黃潭撫公謝病去矣弟所賴者黄潭公委心相聽儘力相應今去矣奈何蘇松更無一上司巡江替換巡按丁憂獨弟與熊兵僃在海洋内地無人料理兵食蘇松府縣有司素蠻皮一時提掇他不動使成悞事如何爲處弟今日認真幹事督將官督有司全賴朝廷委任新勑書尚未見到不知齎人停滯何處也弟積熱又飲鹽海痢病頓作不能食者三日幸而遂愈然精神甚弱也廟灣攻巢一戰得眞倭首四十六顆弟心竊少之昨得克齋書半月之内數戰止得首十三顆今三沙一戰止得八顆乃知攻巢之難也八昨差人具三沙節略奉報適承委曲垂示并齎至賞功銀正應急用廟灣賊累挫之餘據巢不敢出計不走則剿矣公奏稿可速進也然無處不是公之妙略而公乃歸功于僕甚愧甚愧刪之何如太平又有此一捷更爲公賀也盧總兵不復遣往北謹如尊教閩中事體以收人心爲要機非公大經略不能為此言恐非弟亦不能領略此意也弟處三沙後當細承指授或更爲公南中一行耳蘇松之兵全不堪陸戰誠然誠然髙湜張空等兵已隨弟到此王遊擊兵已到太倉未渡海也李忱兵未見消息計此時只好到蘇州耳弟病痢數日幸而速愈更可督戰矣公勞心經畫道體又復小恙聞之深覺懸情幸公自愛勿太勞心可也布袋已領亦甚切時用弟異日還山竟作一布袋和尚可也并一笑卽刻上沙督戰草甚草甚九昨因大汎料賊必於潮滿時放小船搶我船急促將官半夜候之港口則賊已放八隻小叭喇烏船將出港沙蒼等船皆昏睡若不先遣候使彼小船得衝上我船則禍不可言弟與兵僃船亦謹與賊對港夜間儘費力防守也進大兵只在數日間更不可緩矣但與賊畫地對壘非木城不可因造木城及收拾火藥未得便完且各枝兵未齊今諸事皆已有次第可進兵矣十僕所用之財皆公之財所賞之人及他用處皆禀公之命弟如牙行只是爲兩邊過財與巳原無, WYG: ''}
