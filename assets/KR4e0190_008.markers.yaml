  - {type: variant, offset: 1991, length: 2, content: 曩過, WYG: 浮屠家稱缺陷世界故物忌于盈吾兄之才于其所享可謂完矣乗除消息天行則然吾兄之疾豈造物者將以是少損虧焉而大受于其後也乎兄平生意氣甚髙聰明甚慧夫高者不可柔而雌也慧者不可藏而晦也兄罹此疾疢則寂寞枯淡之中静思黙視種種之世界種種之伎功無可}
  - {type: page-break, offset: 1991, content: '', id: KR4e0190_WYG_004-44a, image: WYG1276/WYG1276-0264a.png}
  - {type: variant, offset: 1994, length: 0, content: '', WYG: 以不朽者必將于幻身之外别求所謂本來面目者而從事焉則兄之學將日以精而其所得於病者不既多乎此僕始為兄憂而竟為兄賀也故曰惟其病病是以不病兄勿以為濶論如何弟年來奔走荆溪今歲始買小庄去縣十四五里妻子始有定居衣食稍能自給一身幸為天地間一閒人矣藥餌之暇亦欲講習故業冀少有得焉以畢宿志而海内}
  - {type: variant, offset: 1995, length: 0, content: '', WYG: 交皆散在四方昔人取多聞而恨于獨學之難毎以為嘆而知交如兄者則尤往來于懐也向嘗託南江道此意而兄不能來僕又不能往奈何今蹉跎又經歲矣後復如何使來承委令兄祠堂文字縁僕素病羸自鄉居以來欲節省言語文字以完心氣故凡親知之託一切謝免而吾兄數百里相命似不宜以此為解然復自念平生未獲請見于九峰先生既無以測知精神意向所在而欲為之叙論若深言之則近于諛墓之嫌淺言之則不足以發潛德而違于銘以稱美之義以不滿于}
  - {type: page-break, offset: 1995, content: '', id: KR4e0190_WYG_004-44b, image: WYG1276/WYG1276-0264b.png}
  - {type: page-break, offset: 1995, content: '', id: KR4e0190_WYG_004-45a, image: WYG1276/WYG1276-0264c.png}
  - {type: variant, offset: 1996, length: 1, content: 僣, WYG: 弟孝子之心是懼欲辭去則又重以違長者之命而不敢也又復自念兄之所不逺數百里而託於不文之辭者葢以迂戅之人不能為諛其言或可以信于後來者耳今以平生未嘗請見而深言淺言兩無所措乃嚅囁而為之言是無以自信乎其心而又何以信乎其人非兄所以相託之意也是以敢直布腹心而辭于將命者且其人之相知而言之足以信者則既}
  - {type: 'kr:newline', offset: 1998, content: '

      ', id: KR4e0190_krp_008-bkkkrnewl116}
  - {type: line-break, offset: 1998, content: '', id: KR4e0190_SBCK_008-6a07}
  - {type: variant, offset: 1998, length: 3, content: 陳述然, WYG: 東郭少湖在矣幸兄亮之與吕通竹嶼書執事佐郡六年清苦直方之節衆共知之而山人之知執事獨深執事亦謂山人臭味之相同也日夕所}
  - {type: page-break, offset: 1998, content: '', id: KR4e0190_WYG_004-45b, image: WYG1276/WYG1276-0264d.png}
  - {type: variant, offset: 2002, length: 11, content: 章句腐儒而敢與知金革之, WYG: 拳拳于山人者亦深且厚今執事行有日矣山人非仁人也不能贈執}
  - {type: variant, offset: 2015, length: 3, content: 東南鄙, WYG: 言山}
