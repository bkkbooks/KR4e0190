  - {type: variant, offset: 2081, length: 649, content: 氣旣足以鞭撻四夷而深計逺慮又真足以繫單于之頸雖推轂不御之權與魏弱翁所以主張營平侯故事今未可以盡望于廟堂但在吾丈則願一切不計成敗利鈍只論爲之在我者當如是耳葢古之成大事者多出跅􅕟不羈之才而樸樕謹細多不可與度外之功是以豪傑之說往往亦出於此若至于活變宛轉則是失却自已面目且自古未有務爲自容之計而可以成度外之功也營平建屯田之策璽書切責者再三彼終不易其說而迄以成功况肯活變宛轉乎來敎云擺邊爲自困之道須是以攻爲守誠然誠然今秋虜人不敢南牧知籌邊之力也自此益爲不可勝之僃以待可勝之虜如眺生所謂一大治則終身創矣必勝之旅必攻之謀非吾丈將誰諉哉雲中乆蓄癰疽今復有宗室搆虜之變即此事勢誠可寒心其破敗擒獲雖出募下効力亦㑹有天幸也善後之道如何如何以吾丈斡旋宇宙手叚須䏻爲彼中人轉換得一畨心腹腎腸消其亂源而誘之忠義此非智力駕馭之所能及亦非苟安無事而幸其一時平定以塞責者之可與也機括所在吾丈籌之熟矣山野鄙人每以爲韃靼不足慮而國家可慮者乃在于此浚谷論邊事時不知曾及此否荅曾石塘總制使節蒞東土兩辱惠書至山中深感道誼之愛山人于世故無所知然竊觀近事内則闈中之變外則夷狄之患推之天下事其可隱憂者多矣側聞去年虜騎入上黨齊魯之民奔走逃匿賴吾兄百方鎮定始安堵如故吾兄弭亂之略始試于遼左而綏輯之效再見于山東者若此使繼此而進以秉鈞持軸則夫不動聲色而坐銷天下之隱憂就使或及可憂而能圖善其後以不至於甚壊者非兄輩之望而誰望乎夫有實志而後有實學有實學而後有實事後世道術不明故其所謂事業者多就其才力知慧之所及而不能盡純乎天理之正多出于一身功名之計而不本干忠誠愛國, WYG: 情}
