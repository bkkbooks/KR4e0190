  - {type: variant, offset: 8897, length: 288, content: 奉台光者且廿年矣然而不敢通一書於門下者非敢自踈也誠自度其最迂濶樗散無用不足以煩材館之記存也某誠自知其無用而相公誤以爲可用曲爲推轂拳拳引而致之於朝然知相公非私乎其人也相公之心恐一官之不任乎其職恐一士之不究乎其用固且爲官而擇士固且爲天下國家而用其人也某亦非敢私爲謝以凟相公也相公爲天下國家而用乎其人其人宜爲天下國家謝相公也爲天下國家謝相公則莫如以身謝之以身謝之則莫如致其身以爲天下國家之用以上稱相公以人事主之素心而明相公得士之効于當世則庶乎可以爲謝而巳其如某最迂濶樗散徒有蹈矩踐墨之小節本無經時理物之長才自知寔不堪爲當世之用以累相公知人之哲而或以少損得士之効此某之所甚媿而甚懼也雖, WYG: 文}
