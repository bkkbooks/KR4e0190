  - {type: line-break, offset: 3449, content: '', id: KR4e0190_SBCK_008-10a03}
  - {type: variant, offset: 3451, length: 0, content: '', WYG: 間閒路岐之語則憮然大悔者久之是以奕棊賦詩博聞强記皆昔所甚好或終歲不對局或終月而不成一韻或數旬不展巻雖或為人所强與自强為之}
  - {type: page-break, offset: 3451, content: '', id: KR4e0190_WYG_004-51a, image: WYG1276/WYG1276-0267c.png}
  - {type: variant, offset: 3452, length: 4, content: 日夜爲僃, WYG: 竟如嚼蠟了然絶無滋味也觀尊巻所書數作則荒落疎懶之態可盡見之僕之為此其志亦欲發憤刋落收功一原}
  - {type: substitution, offset: 3454, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 3457, length: 11, content: 匿實示虚匿近示逺匿精壯, WYG: 力又不能逮也惟兄有以教之與陳兩湖主事書兄自少才名已滿海内六家九流之書幾乎無所不誦莊騷太史之文亦無所不摹畫}
