  - {type: variant, offset: 29, length: 0, content: '', WYG: 純明其於道翻然易耳願聞兄之所安整理民事皆是吾人切實工夫而兩郡之治如何并願聞之邇來士風澆薄而江南重以侈靡浮蕩比之他所尤甚大抵富貴功利之習糊人心目如處豐蔀之中舉眼皆蔀也蔀外更不見一物矣是以迷惑顛倒莫知所止非有先知先覺者孰能出之溷穢而轉之清流乎提學馮先生觀其論議行事亦不為無意於此矣詞華本實之間稍有軒輊便足鼔舞人心吾兄相㑹得從容聚語幸委曲一贊之與張士宜書近承來諭同志中往往夢中作醒語誠然誠然其下者假公濟私其髙者以意見所到為實際葢原始初發心原不曽種下真種子所以頭出頭没轉來轉去竟不出人意見科臼中方且認賊作子自謂超悟誑已誑人以迷指迷道之不明不行深可太息僕亦夢中人也雖然自數年來益覺掃除私意之難益信古人備嘗艱}
