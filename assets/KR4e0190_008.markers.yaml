  - {type: variant, offset: 3469, length: 5, content: 示羸弱百計, WYG: 操縱之矣即使海内竒才偉士欲傲兄}
  - {type: variant, offset: 3475, length: 2, content: 疑我, WYG: 所不知而亦不能也况如僕}
  - {type: variant, offset: 3478, length: 1, content: 宜, WYG: 才至駑下曩在京師毎同平凉趙景仁過兄論文久之兄慨然曰二子之言是也遂欲盡棄其舊學而更張之然當時猶謂兄之急於奬善而以口語相推云云已而視兄之文則果脱然盡變於舊矣夫文人相笑在古則然景仁於兄未知何如也至於僕之讀書則豈能若兄之博而其為文也}
  - {type: variant, offset: 3480, length: 2, content: 深矣, WYG: 安敢望如兄之古哉然兄不憚降心屈已而從之推兄是心也設使不徒用之於文而用之反躬為己之間即古人所謂勇徹臯比一變至道者在兄亦何讓乎僕未始不嘆兄之髙明不可及而亦毎毎惜兄有可以一變至道之資力而僅用之於文也雖然此亦未有人焉以反躬為己之説而謦欬於吾兄之側耳設使有人焉以反躬為己之説而謦欬於吾兄之側如吾二子者之論文又安知兄之降心而從而翻然變於其舊也之不為太速乎}
  - {type: page-break, offset: 3480, content: '', id: KR4e0190_WYG_004-52a, image: WYG1276/WYG1276-0268a.png}
  - {type: variant, offset: 3483, length: 5, content: 得敵情爲難, WYG: 又未始不}
