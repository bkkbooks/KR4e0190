  - {type: variant, offset: 5271, length: 0, content: '', WYG: 苦心也學之不加益也正坐不能損耳更願聞所以望之之説也與蔡子木郎中書往年辱兄知愛謂可與共}
  - {type: page-break, offset: 5271, content: '', id: KR4e0190_WYG_004-57b, image: WYG1276/WYG1276-0270d.png}
  - {type: variant, offset: 5272, length: 1, content: 徳, WYG: 於文藝之門今忽忽齒髪漸衰兀然成一秃翁向來伎倆剥落且盡雖誦人詩句亦如羅刹國人驟聞中華語音駭不省其何説况能自有所著以自見於世也朋友間往往言及兄之垂意於僕豈特以故人之故耶抑亦謂其可與進於文藝之門耶豈知僕之衰颯剥落至此哉雖然以兄愛我之意其知我之衰颯剥落至此也豈不為僕惜之以僕之愛兄之意亦竊謂兄以聰明絶世之資而消磨剥裂於風雲月露蟲魚草木之間以景差唐勒曹植蕭統為聖人而冀為其後此其輕重豈特隋侯之珠彈雀而已亦可惜也曩與兄相聚時兄年最少而僕亦壯年今壯者衰則少者亦壯矣由壯入衰能幾何時四十無聞則僕既自蹈之矣自惜之矣倘兄以為宇宙内事與吾分内事盡於風雲月露草木蟲魚之間則足矣不然則亦不可以不深思君子進德脩業欲及時也兄苟不以僕言為戅繼此尚有所請不然且閉口耳辱愛多談亮之又曩承答教深慰素懐且自笑僕之所知于兄者淺也僕嘗謂學者}
  - {type: page-break, offset: 5272, content: '', id: KR4e0190_WYG_004-58a, image: WYG1276/WYG1276-0271a.png}
  - {type: page-break, offset: 5272, content: '', id: KR4e0190_WYG_004-58b, image: WYG1276/WYG1276-0271b.png}
