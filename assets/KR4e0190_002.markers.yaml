  - {type: variant, offset: 7064, length: 379, content: 盡一片凝氷闘清冷持此月中斫桂樹顧兎應知避光景倭夷塗刀用人血至今班點誰能整精靈長與刀相隨清宵恍見夷鬼影邇來韃靼頗驕黠昨夜三關又聞警誰能將此向龍沙奔騰一斬單于頸古來神物用有時且向囊中試韜頴劒井行時有白氣属天仙人擲劒不記年至今光恠猶未歇薄蝕日月騰金晶青天倒挂雙白蜺曾斬妖蛟帶腥氣寒泉滿甃誰敢汲只恐仙人求故物但看水底飛露靂爲謝叅政與槐題青白蓮畫紛紛滿眼盡紅粧忽然見此青白色並挺孤標出倫類豈特中通并外直不縁太㓗遭染汗自爾天然去雕飾西山賊夫㫁煙火南州高士力稼穡對花疑是此二人良工託物象其德寫貞直欲空諸相詎肯輕着一點墨世人只將肉眼看道是紅粧正堪翫金陵謝兄善識花每對此花再三嘆謝兄卓犖不俗状已有聲名動藩翰願言永保金石心不負此花長作伴悼僕鈕才昨日装書書滿箱恰如鳥盡良弓藏臼中餘藥正在搗猶似平生事未了幻泡本是無常期咄哉一病不週時游塘風冷白楊樹堪記年年課租處重刋荆川先生文集卷之二, WYG: ''}
