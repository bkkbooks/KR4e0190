  - {type: variant, offset: 6516, length: 0, content: '', WYG: 雄辨坐驚平地起波濤蠕蠕龍蛇手中現撥開雙龍分海嬉攢簇兩蛇合穴戰爭先儘教使機闗縮退誰知賣破綻目上中眉左傳事猶自哂綿中裹銕那能見滿身護著不通風百步攛來激流電飛上落下九㸃丸放去收回一條線問君何為技至此使我憑軒神􅀈眩答言少小傳授時五步七步畫地踐邇來操弄三十年渾身化作枯樹簳心却忘手手忘鎗眼前只見天花旋乃知熟處是通神解牛斲輪安足羡因君亦解草書訣君鎗豈讓公孫劍古鏡歌瞿翰林來自汴西亭王孫寄此}
