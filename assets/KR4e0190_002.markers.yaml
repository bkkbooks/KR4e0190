  - {type: variant, offset: 2992, length: 331, content: 答陳澄江僉事村居韻八首畨嫌結社閙獨徃築秋塲已謝二千石何湏八百桑站站夕時鳥欣欣雨後秧感時聊一適不是阮生狂昔歳理人術今朝種樹書太恩畨是累非種亦湏鋤身老兼栽藥家貧待畜魚求羊還愧我肯許叩精廬酒隠君能慣青天白眼寛貌肥占道勝禄去易身安鳥跡携書對藤花倚樹看枋榆非不樂何用羡扶摶君徃惬幽意吾留厭市聲園廬本相接諠寂不同情𥚹心違請謁病骨廢耘耕出處兩無着空慚大隠名城市終當徙開軒向緑疇老知學稼好窮帶著書愁野燕登蚕箔山雞雊麥秋村甿無曲調出口自成謳南國頻饑後飡麩勝酪酥比閭雖麥穗盗賊尚􅍉蒲闔室供繅繭分溝競轆轤田家莫厭苦試看荷戈夫樗散甘爲笑逢迎已覺迷漸能諳豕牧寜復舞雞啼村居隣北郭野語學東齊此是潜夫宅吾将爲子題葺屋纔支漏新茅不用添風清田叟鼓雨應社神籖野蔭炎還冷村醪酸亦甜高人方對卷晒麥也能兼, WYG: ''}
