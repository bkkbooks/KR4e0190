  - {type: variant, offset: 5696, length: 314, content: 石湖王傅辱觀拙集見贈長句二十三韻奉答一首少年文苑恣捜集每得異書心喜懌或時一日來束閣輙覺無聊少顔色偶熟草木鳥獸經充貢王廷叨簡廸眉目可醜非世用依然歸來事藿食荒廬四壁豈嫌陋敝帚千金徒自嚇不能屈蠖事深藏尚爾雕蟲餘故習苦思疾書寒燈伴㣲吟骨立長松側言語能工詫鸚鵡心田耳穢驚狐蜮已知壮夫决不爲況有良朋相羽翼㫪陵無極只一語此是尼山真血脉汙背幾枉過一生焚棄筆硯甘守黒囬頭可笑瓿堪覆後生謬謂玄非白秪合篋笥掩瑕垢誰寫竹帛露狂易雲間長史有古風三江五湖襟期隔下里因風忽傳去幸逢知音寛我責謂余朋舊徃復書惷戅頗比他山石百卅餘言拜嘉句坐令枯槁生潤澤夫君清標逺俗姿矯矯忽向我前立轉覺側身感四愁何時開徑延三益東海此日多君子有如塤箎逓戞擊寄聲林莫兩楊君努力與世掃蘙塞, WYG: ''}
