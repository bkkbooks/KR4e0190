  - {type: variant, offset: 11876, length: 1193, content: 之資求之於身又非所以爲養生之地是以深自媿悔葢絶筆不敢爲文者四年於兹將以少緩餘生爲天地間一枯木朽株而巳方欲盡取前槁燒毀以銷宿愆不意爲人抄録而無錫卜君殊不相信謬行刋刻再三以書止之而不能不知其何說也然亦賴有此刻可查平生無一篇文字不在其中執事試考其年月皆四年以前胡說也若今日復勉強承命則後来更不可復辭於人人矣二三年間亦有一二府縣諸公索文者僕不敢爲枝辭相誑但據本心以告曰自今以後更有爲府縣及朋友間作一篇應酬文字則今日誠得罪於執事矣今於諸公亦不敢爲枝辭亦但據本心以告曰自今以後更有爲郡縣及朋友間作一篇應酬文字則今日誠得罪於諸公亦誠得罪於太府矣伏惟諸公矜而恕之荅王遵巖兩得兄書拳拳以病體爲念真意懇惻令人讀之堪爲涕下非兄死生之交不能至此感激感激人傳言吾病過重者葢有兩說一則以木腎爲患痰火時作不得不閉戸調理人以我經年病不見人則以我病不可支矣不知我貌則槁矣而精神尚可不死葢近於養生家稍稍得一歸根法也其一說則自以早年有志今四十外矣而猶然醉夢人也葢非特文章氣節平生所劼力而從事者旣於眞性不切及所聞於經書師友與意見之所窺測而自以爲道者亦竟如隔壁聽話全無交涉近年来痛苦心切死中求活將四十年前伎倆頭頭放捨四十年前意見種種抹摋於清明中稍見得些影子原是徹天徹地靈明混成的東西生時一物帶不来此物却原自帶来死時一物帶不去此物却要完全還他去然以爲有物則何睹何聞以爲無物則參前倚衡瞻前忽後非胸中不卦世間一物則不能見得此物非心心念念晝夜不捨如養珠抱卵下數十年無滲漏的工夫則不能收攝此物完養此物自古宇宙間豪傑經多少人而聞道者絶嘆其難也好仁者無以尚之此真消息也終日如愚終日忘食此真工夫也無以尚之則有一物可尚便不是此物矣忘食則於閒事有不睱者矣如愚則於才技有不使者矣孔顔一生工夫所以完養收攝此寳藏也僕近稍悟得此意而深恨年已過時雖知其無成然本是自家寳藏不得不有冀於萬一也是以痛爲掃抹閒事收斂精神之計則不得不簡於應接欲簡于應接不得不託於病不可支以謝客是以人知吾之病甚而不知吾之别有意也此意更不敢露於人以兄念我太厚憂我太深故特披露之兄萬無洩我秘密重增嘵嘵之口也安友爲求序淂託雄文以不朽甚幸過望僕舊從兄學爲文章有一二僅得處盡是兄之指教但才旣不長又不能竭精力以從事是以遂成廢罷韓子所謂徙業者不嚌其胾者也獨覺兄之奔逸絶塵而已矣近来自觀舊稿支離叛道之言篇篇有之理旣不當文亦未工赧然盡欲焚燒而後爲快縁頗爲人抄録無可奈何葢以吾今日文字伎倆須并却三四年精力專專幹此一事自謂可望於古人閫域今自度必無此閒精神可以了此也旣自知不了則豈欲以不了者而信今傳後乎亦愚矣貴鄕洪子因信兄而過信我遂亦以我爲可與斯文也與安友謀刻之而請序於兄僕旣而聞之愧汗駭愕葢吾文未成吾自知之且不欲此生爲言語文字人也居常以刻文字爲無廉恥之一節若使吾身後有閒人作此業障則非吾敢知至於自家子弟則須有遺囑說破此意不欲其作此業障也僕居閒偶想𧺫宇宙間有一二事人人見慣而絶是可笑者其屠沽細人有一碗飯喫其死後, WYG: ''}
