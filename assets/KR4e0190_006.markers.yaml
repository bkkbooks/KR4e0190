  - {type: variant, offset: 13264, length: 942, content: 何待於人爲之媒㢤以爲吾文苟有成則當求兄不成則不敢以累兄知人之明也及得兄序讀之令人益増慙汗呉下自古来文人正不少以爲僕葢過二千年呉下詞人而接札游之文統旣使兄爲私於所好又若使僕與人爭名爭先然者非兄之所以愛僕也使兄今日爲僕作序則亦宜道兄與僕昔以文相切磋以才弱志隳幾成而罷之意句句道却實事庶使兄爲不誣而吾亦可以不愧耳至於兄之雄文則千百年自有定價倘吾文稍進乃敢爲兄作序今且不欲羔袖於狐裘也刻板事旣巳力止兄序遂亦寳藏之未敢示人也與聶雙江司馬吾丈講學之書僕於明友間窺見一二而念菴兄多舉吾丈之說以相教僕獲聞之竊以爲幸乃今辱吾丈盡以相示是悉所以教諸同志者而教僕也爲愛何如爲幸何如承敎愛之殷鄙懷有不敢不盡於左右者僕素迂愚人耳然不敢不謂有志於學也自年近四十則心益苦葢嘗叅之閉門靜坐之中叅之應接紛擾之中叅来叅去如是者且十年而茫乎未之有得也雖其茫乎未之有得而隱約之間若或有一罅之見焉則亦不敢自昧也蓋嘗驗得此心天機活物其寂與感自寂自感不容人力吾與之寂與之感只自順此天機而已不障此天機而已障天機者莫如欲若使欲根洗盡則機不握而自運所以爲感也所以爲寂也天機即天命也天命者天之所使也故曰天命之謂性立命在人人只是立此天之所命者而巳白沙先生色色信他本来一語最是形容天機好處若欲求寂便不寂矣若有意于感非真感矣聖人固以寂感對言亦有以寂感分言者矣易曰復其見天地之心乎關閉不行是寂也是天地萬物之心也則不消幫𥙷一感字而感在其中矣又曰觀其所感而天地萬物之情可見矣是感也是天地萬物之心也則不消幫𥙷一寂字而寂在其中矣易明言閉關不行而先儒以爲動而見天地之心是以爲寂異於感而幫𥙷一感字也易明言感即天地萬物之心而先儒以爲咸卦六爻皆以有感而多凶是以爲感異於寂而幫補一寂字也是未知聖人對言寂感未始爲完語而各言寂感未始爲剰語也一陽成震何以謂之非動也曰陽氣潜萌于黄鍾之宫其潜萌焉所以爲寂也咸之六爻何以多凶也曰非感之爲害乃害於感焉而凶也故曰未感害也吾丈與念菴又謂心有定體而辨心無定體之說僕亦竊謂孔子嘗言心矣出入無時莫知其向此真心也非妄心之謂也出入本無時欲有其時則強把捉矣其向本無知欲知其向則強猜度矣無時即此心之時無向即此心之向無定體者即此心之定體也有定體故曰寂不動則有定體也故謂之寂無定體故曰寂無時無向則無定體也故謂之寂動則有時有向有時有向則動也雖然僕於吾丈, WYG: ''}
