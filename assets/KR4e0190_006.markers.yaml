  - {type: variant, offset: 1, length: 1, content: 刋, WYG: 褥自今始而余素戒肉養病乃肉食頻年䘮我几堪隱到處逢人席任爭疣贅勿嫌能侈性支離畨笑足全生野蔬入口勝甘脆病骨先時卜雨晴苦訝道人長好懶如今懶病果相成濕入病骨覺爽然則晴覺痛楚則隂雨至矣瘧病作跰􅓷柳肘盡欣然深隱烏皮也自便金冶由他不由我狼胡是病亦是天身先辭宦猶中熱衣未經秋已著綿炎凉反覆須臾事一疾畨令悟世縁小集為人所刻文學從來本不長隱居辭説半猖狂徒令後世能疑孟祗覺前身似姓莊𤣥白何分終覆瓿穀臧奚事總亡羊從今已息掞天口只著農桑一兩章靈芝寺同童元功宴坐湖上髙樓縱逺心復沿湖岸過東林身閒似覺煙霞氣地冷兼無鐘磬音衣裏寳珠應自信苑中靈草試相尋坐來忽散千峰雪對爾無言意轉深登屠翰林仍臺作二首太史仙臺多勝槩正臨檇李古城東五色雲生知海近四圍山逺覺天空閒居作賦青春後幾歲鳴絃明月中不是掖垣同宦侣閉闗那許得相逢一上髙臺興不孤望中總總入虚無煙霏春變隂晴氣草樹天輸海客圖對酒笑將花是伴銷憂誰問土非吾知君苦厭文園卧此地能令肺病蘇時屠久卧疾次人憂旱作歲歲吳儂事水耕朝朝占雨愁雲輕澤中不聞鳩語合田際但見龜文生野老䑛糠猶自得書生炊桂亦何情東南生計已如此聞道山西又㸃兵再遊清溪莊值主人不在次韻桃樹臨溪思不禁扁舟重問草堂隂西湖水落黿鼉石南國霜清橘柚林壟際流泉宜稻性窓前過鹿解人心憶君剪徑相迎處今日蓬蒿又已侵至常熟陳中丞白訓導邀登福山看海二首春早吳山雨半晴有客邀我觀滄瀛澤國冥冥蒸海氣石灘淺淺鬭江聲日月迴旋一島小金銀色相十洲明微風向夕送清響應是仙人吹玉笙久縁迫陿悲時俗海嶠春臨思若何地湧龍蛇爭起陸天投星斗横翻波封疆坐攬風濤壯氣候常看霧雨多才謝枚生能作賦觀潮恰對曲江阿金澤寺中寄松江友人登湖昨夜雨初霽驟覺春衫寒意多逺浦草青送歸鴈夕陽潮上生微波戲窺佛偈翻金字静卧巖扉掩緑蘿伊人只在蒹葭外獨對清尊奈爾何松江金澤寺四首東南巨浸五湖深古寺維舟正夕隂客到山僧罷清磬雀喧晴日下髙林夾洲煙火三家市滿目蒹葭萬里心徙倚不知餘興盡月明還擬聽龍吟三江抱處勢如環野客探竒住不還一望樓臺疑海上稍聞雞犬覺人間幸無漁父知名姓且望山僧共閉闗自笑歸來張季子春時蓴葉未堪攀何年此地開金刹宋代流傳直到今聽法石將山作幻䕶經龍與水増深爐煙裊裊知塵性栢樹青青見佛心可是攀縁渾未盡天花猶自惹衣襟水國餘寒芳草稀偶隨煙艇問山扉窓中怪石如人立天際孤帆伴鳥飛髙齋盡日逢僧語短褐經春換客衣吳江亦是垂綸地笑指星文愧少微天寧寺塵外樓四首瞰郭棲臺誰共登偶携仙客對山僧林煙渺渺人家盡堦日微微花氣蒸浮世閒看飛鳥過機心不遣白猿騰平生自笑支離甚散髪行歌此又曾名山不用逺攀登暫借繩牀我亦僧幾樹鳴禽助禪寂一藂修竹散炎蒸捻花不盡心傳妙對塔嗟將口説騰俛仰百年成滚滚乾坤隻眼更誰曽金門十載笑重登歸去仍依白社僧虚館静聽宵蟻戰逺山時見夏雲蒸已甘樗散終年計恥逐鴻冥萬里騰為問洛城冠葢侣鬢毛銷盡得閒曽閒裏香臺盡日登嘿然一笑又逢僧衣裁野薜緇塵浄飯試山精石鼎蒸大士西方談實相仙人東海説飛騰人間多少亡羊路一一行來也未曽題湖上廢寺禪宫舊枕清湖曲與客尋幽試共登獨樹春深初著蕋空山行遍不逢僧臺荒曽與施烏食城化徒聞駐鹿乘惟有松房明月影年年長似為然燈題龍池菴三首相傳伏虎禪僧開山處山頂有龍井蜥蝪見則雨逺逰為訪白雲巖轉盡孤峰路更南龍見小身時出井虎馴大士舊開菴禪心客思俱潭水古佛寒松共石龕坐對老僧無一事夜深相與説楞嚴精廬原寄北山巖新築髙齋過嶺南谷窈窕間還宻樹石孤危處更虚菴聽經野鹿頻窺户宴坐山僧不出龕客欲逃禪無可醉逺公於酒禁方嚴霽後嵐光散曉巖望中佳麗盡東南三春蘭蕙堪成畹千里湖山併在菴馴鴿下時呈佛性飛鷹宿處見僧龕維摩今日還多病酬答誰將究妙嚴贈菴中老僧僧解相人術少嘗遊歴江南晩歸菴中早從祝髪事棲巖為禮名師毎向南用華嚴事業淨六根成慧眼身無一物寄茆菴厨邊引澗寧須汲松下翻經幾到龕若使焚香能證道前身應説是香嚴嘉靖丁未春余以病客荆溪遂同杭子宣登龍池僧居嵌巖中如鳥巢梯其門以登值二老僧相對煨笋遂以笋供余二人因留宿與老僧坐至夜分談説楞嚴因縁事老僧意甚樸野可愛也明日曉起嵐氣滿山乾坤如混沌狀堦前竹柏亦在摩蕩中咫尺不可物色日且午始開霽則諸峰歴歴澄湖隱映樓觀草樹百里之外若在几前葢宇宙間晦明不常若此既午出往石屑石屑兩山夾澗山高百餘仞而澗道僅闊四五十步人家縁澗以居惟亭午則見日色葢其勝又與龍池異觀矣既午飯遂從西霞步入舟意興悠然如有得也嗚呼此豈可與沉酣聲利者道哉遂書以貽子宣使藏之贈黄子晦故黄教授子黌舍相逢憶聚星予慚入室爾趨庭子長能繼先人業王吉曽承博士經萬里風煙還命駕廿年踪跡已如萍衰顔重感青衿日一笑尊前喜愧并寄周臺官二首時余將往南郡南臺分署沐恩初官是疇人世業餘龍吐珠璣天地轉星塗黄赤石甘書泰階平處瞻雲闕玉漏清時直禁廬應有道人扣闗者試看紫氣近何如文史元隨供奉間南都祕省更清嚴抄書暗譯西畨厯草奏多陳南極占日下有雲朝紀瑞臺中無事晝垂簾倘覩少微思處士漁樵已判此生淹家居喜袁芳洲相過賦此為贈三首相逢京國最情深休沐歸來毎共尋異品對飡呈海味道衣便坐解朝簪迂疎北闕上書日寂寞江潭俟罪心已分與君成契濶一杯還此幸同斟憶昔曽同念菴子歲寒訪汝深雪邊别開閒館屏人語不解朝衣藉草眠琴意相傳中散後𤣥言毎到漆園前正是江東暮雲處再逢携手一悽然四十支離一老夫衰顔恰比列仙臞鑄金不驗身多病種樹無能圃半蕪長日閉闗聊嘿嘿短衣迎客笑拘拘知君昔日探𤣥意定有真詮肯示予次韻贈薛仲常山林鍾鼎性俱安官舍寧非在澗槃此日心情真似水平生臭味本如蘭閲世方臯誰牝牡認真桑户且衣冠祗應黄馬泰泉溪田頻來往春日江楓共倚欄歲暮有懐諸子歲暮蕭條只自如南州髙士久無書達夫樗材在野大何用種髪經年短不梳剡水驚心溪雪後汝中隴山飛夢嶺梅初景仁祠郎消息憑誰問萬里昆明是謫居叔仁贈張贑州致仕還吳次達夫韻田園舊在海東頭海上新歸張翰舟種菊不辭三徑晚採蓴將及五湖秋人情歴盡惟看奕世事忘來獨好樓剰有著書心尚在知君原不為窮愁贈宜興王丞次韻王蒲州人官粟還能五斗無年來只是憶樵漁道知戰勝臞猶在詩為身窮思獨殊耕稼吾非徐孺子才華爾亦阮元瑜他年更向龍門隱為念江臯一腐儒答朱刑部士南見寄清齋偃息灌園餘囀盡春禽又夏初對客不須妨蠟屐占年常自檢農書六經註脚吾焉敢五岳行踪或可如宣室正須公等在野人只合掩荒廬同萬鹿園宿工文菴次韻有贈何處尋山不厭深淡煙歸鳥暮鐘音去家百里訝如客别爾經年尚此心宴坐清香滋夜氣閉門殘雪映寒林相從一宿應堪覺機事何須問漢隂次葉師與諸生講書鐘樓寺聞鐘作早歲傳經髪已斑寄身精舍渺人寰苔邊屨跡堪盈户花外鐘聲正掩闗驟覺海潮生静夜却隨仙梵響空山先生嘿嘿隱几坐試問諸生醒夢間養病道院忽張君見訪不值奉寄生涯歲歲藥囊間已息交游亦未閒土木形骸真覺槁蓬蒿庭院只常關偶隨道侣學禽戲忽枉髙人題鳳還此夕知君向何處多應弄月卧江灣答贈胡栢泉赤囊前日奏邊書皂帽何時掩故廬鳴劍豈知孤憤切請纓爭笑少年疎自甘淡泊看松菊恥學浮沉逐里閭春日黄鸝西澗草憶君歸去灌園初送郭無錫擢南曹主事郭侯齊魯推名士暫屈清才綰縣符折獄一言驚老吏洗心終歲比冰壺南曹已應郎官宿東國常懐仙令鳬野老殷勤何以贈益崇明德永嘉譽夜歸陳渡草堂時新與諸子别去有懐二首野夫也復到城市日暮還尋四壁廬蛩響露餘將入户人歸月裏又離居坐憑烏几都忘我起對流螢且廢書正憶青衿同舍子别來秋興各何如自擬身名如鄭圃宫環半畝日長扄褐衣頗笑非懐玉茆屋何因却聚星樹底蟬聲希鼓瑟燈前鳥字一談經試言吾易將東去未識何人是姓丁癸卯送仲弟正之赴試偶因今日送行處尚憶當年聽鹿鳴馬氏白眉占仲子吳門霜鬢愧難兄秋來一雁寒江影天外三山古帝城此去騫騰非所羡期無温飽負平生己酉送兩弟正之立之赴試秋水芙蓉映緑衫殷勤送爾到江潭人能鳴世慙三鳳家有遺經是二南文入妙來無過熟書從疑處更須㕘逺遊他日看之子下澤欵段吾已堪送諸從游應試二首一壑謀身世所疎幾人相伴此閒居月懸山館談經處雪壓林臯宴坐餘向來衣鉢吾將付先輩文章子孰如亦知雅志輕青紫好及明時早上書幾年山澤共淹留今日公車且見求楊柳扁舟吳苑夕梧桐雙闕漢京秋清時元不棄寒士白璧誰將笑暗投都下相逢説論語莫言師授是張侯送馮子聲赴試與君硯席辱周旋義理蠶絲毎共研頴悟最居德祖後聲名愧出照鄰前身同槁木甘吾隱賦就凌雲羡爾賢莫道孫𢎞曽不遇漢庭推轂在兹年送褚生滔赴試久撤臯比絶來往褚生時復欵柴門文有波瀾堪得髓座無笙管只清言客心落葉秋江繞别思平蕪夕鳥翻此去期君戰勝後歸來正對菊花尊鄱陽别道友户庭不出已多年千里隨君意豁然飲醉或歌還或泣鬢蓬疑鬼又疑仙詎知衰鳳堪為笑且學塗龜得自全今日别離何足恨終期共住白雲巔中秋夜同陳澄江張夢麟城壕泛月森爽秋逢三五中霜天雲物坐來空河灌百川還小艇寺藏荒野亦疎鐘客嘯忽聞清唳鴈月圓真訝吐珠龍疑君與我皆仙骨身世何須更挂胸和張尚書甬川新修池亭奉母登憩作聖朝耆舊位登三綵服公餘樂更堪東洛撫師雙玉節西園奉母一茆菴春暉映處花侵户冬笋成時竹上簷聞道閒居新作賦承歡養性此能兼贈蔣璞山封君主事宗魯之父早游鄉校已知名曽與賔興聽鹿鳴修行明經為博士夏絃春誦課諸生官無鼎食千鍾願老有鄉園十畝情更笑籯金何所用仙郎作吏比冰清贈張通政五湖舟楫是家居篋裏惟携老氏書幾日陸沉門下省一生心跡海東漁賔常滿座嫌猶少行不齎糧任所如陽羡山靈相望久獨能無意命巾車用韻自述南村北郭任吾居懶散何心更著書小酌或能稱酒隱直鈎聊復事溪漁童時篆刻堪為笑病後形骸漸不如若道猖狂今又甚窮途猶自未迴車夀張通政蚤耽𤣥寂謝塵氛身隱猶嫌名可聞自著道衣辭漢闕因尋仙籙禮茅君行隨勝跡曽無住藏向名山更有文南國夜來占氣色少微渺渺動江雲曹霜崖六十曹生恬之父舊官御史道人容色自臞然幾歲江臯躡紫煙謝氏家兒如玉樹周時柱史是神仙鼎成靈藥方皆驗書貯名山世未傳懶散自憐蒲柳質相從擬欲學長年司訓殷龍巖夀詩文東之父白頭博士早懸車鳩杖扶身八十餘甲子暗占絳老歲今文口授伏生書清尊只許通門客隱几何心出里閭應笑籝金無所用仙郎才藻更誰如楊醫士六十衣裁鶴氅鶡為冠數巻方書一草菴絳縣老人知幾歲太倉仙令却多男不為避人居郭外毎因採藥到山南年來頻訝嬰兒色道術從知宿所探禇怡閒六十滔之父古來仙客説長髯今日髯翁亦是仙家近縣門不識令身居城郭亦耕田鳩形正可供扶杖亥字還堪紀歲年共羡髙門將有待賢郎文藻更翩翩贈宜興閔翁八十夀詩上舍伋之父古貌翛然山澤臞力田還是漢人餘久諳汜勝齊民術閒讀周侯風土書桑榆曖曖隨行徑弟子訢訢與燕居駟馬從來足憂患羡君身世更何如周子隱有陽羡風土記贈天寧寺僧八十化城東畔駐三乘祝髪從師記昔曽頻著袈裟迎上客自分齋飯與遊僧談經幾夜窓飛雨削杖先年手種藤因笑馬鳴身已老欲憑弟子為傳燈懐竹叔夀詩叔善畫傳自乃翁門傍清溪長自扄隂隂藂竹繞幽庭地偏南郭人堪隱秋盡東籬菊正馨笑傲百年惟稼圃風流兩世擅丹青不須海上求靈藥元是江邊老歲星楊醫士夀詩東亭先生富道術隱居城郭似江湖隨身長挾雙白鹿入市只懸一玉壺社中漸覺推前輩門外從教滿病夫予亦文園髙卧客年來肺氣為君蘇喇嘛翠峰老僧輓詩三首枯木寒巖亦未真走盤珠子自精神三飡煮籺一生事翠峰毎食糠餅屢歲齋僧幾萬人鑄冶金容瞻氣象圓通天眼悟根因翠峰得師傳天眼訣欲上伏牛心未了了心應待再來身不事钁頭不坐禪揚眉瞬目見雄談净體髪鬚元不礙翠峰不去鬚髪煉心妻妾宿曽㕘翠峰為僧後入俗曽有妻妾者三年殿壓滄溟功九仞爐開色相佛千龕翠峰一生鑄佛造無梁殿于浦陀未成也年年航海精誠在垂没魂還到海南自愧迂儒厭俗葷毎游香室藉思薰别來常似一臂失用莊子話久寧容六耳聞人去忽驚函谷展錫飛無復海東雲憐君鑄佛經千億欲借餘銅一鑄君錢心漁輓詩心漁先生不可見尚憶吹簫卧草堂垂綸老作江潭客得姓元從吳越王貧病一生心自足雲山千里興難忘更聞治命真堪紀人世空矜石槨藏讀東坡詩戲作東坡卒于武進顧塘橋去余家數十步公詩句句寫胸臆一滴冰成大海翻方臯牝牡無定相曼倩滑稽有至言掃除李杜芻狗語出入鬼神傀儡門異代或疑後身在告終此地招其魂雪詩和蘇韻十首隂風吹隴麥芽纎歲盡𤣥冥令更嚴園圃未春先綴蕋乾坤如海欲生鹽不妨積處堪髙卧預想晴來好曝簷縱是未能堅作玉漸看冰柱已垂尖大地文章散縞纎小堂風物倍清嚴灑來竹裏迷人徑積向巖前訝虎鹽但使曉寒欺短褐獨宜夕影泛虚簷瓊花柳絮皆無用誰擬新詞一鬭尖寒江我亦弄纎纎豈是羊裘人姓嚴履處幸不露足趾嚙餘真覺厭酸鹽紫雲黄竹千年調白屋朱門一様簷髙岫儘教遮葢盡物情元自礙孤尖寒臯白草尚餘纎墐户村村似戒嚴飛舞千峰山吐練粧成幾樹木蒸鹽滇蜀有木鹽病多消渇宜調茗老已捐書莫映簷强欲摛毫追小謝謝惠連有雪賦詞鋒久避六朝尖宛轉素娥腰帶纎迴颷似應舞節嚴三冬怪事驚粤客古語粤人不見雪一夜凄風結解鹽解地鹽遇風則結厭説炰羔歡錦帳思分挾纊到窮簷懸軍此日堪乘便誰奪祈連萬仞尖李靖因雪擒頡利蕭蕭凍樹晩喧鵶門外誰來長者車入夜俄驚千里月開簾相對滿空花東郭先生猶敝履西闗遷客正思家最憐漁父滄江畔閒倚孤舟獨挺义一片寒原滿樹鵶幽人掩户罷柴車聊憑濁酒延春色試向疎梅問臘花草閣映來書幾巻江城積處月千家此時忽憶荆溪道雲際雙峰聳玉义初看朝采颺金鵶倐見𤣥雲隱日車恰似幻師能作霧却驚翳眼驟生花緗編暫借簷前影銀閣常思夢裏家笑道非鹽亦非白禪機一指為君义空城無粟噪饑鴉陌上紛紛正滿車積磵暗隨泉並滴入簾應與筆争花芻米驟髙新歲價柴扉旋掃野人家客來此日須沽酒梁上青錢那得义巢風欲動好占鴉空裏愁翻百寳車葱嶺未消阿耨水珠林忽散鬘陀花故氊猶在能禁冷好客相尋懶卧家且似瞿曇逃世網雪山跏坐足為义家僮自野田携黄菊二株至軒中感而有作三首曠野隂隂萬木霜誰携數蕋到茒堂冷質本非堪競秀閒情敢謂愛孤芳在野寧辭衆草掩入簾聊作滿庭香自笑吾生花興少欣然對爾亦相忘余素不好花見此不覺有喜意豈真所謂花之隱逸者耶已􅂸寒谷不須媒讓寵何嫌並朶開花意幽閒當艶麗天心霜霰是栽培潯陽逸客瞢騰醉姑射仙人綽約來寂寞於人誠少用試將服食制齡頽不沾春色也穠纎小院疎籬秘靚嚴人比孤花清入聖天然真味淡非鹽未須採摘供調藥為嗅馨香置近簷落英好護餘根在來歲還看茁玉尖此詩用坡公雪詩韻海上凱歌贈湯將軍九首湯侯猿臂猛虎鬚少小曽窺𤣥女符明主親頒手中劎直交跨海斬天吳紛紛盗竊爾何知岸上斫人水上嬉自咤一身都是膽欲將巨海作潢池偃旗休角寂無猜百丈樓船泊不開夜半賊營流矢滿纔驚漢將是飛來水軍隊隊黄頭郎迎潮直上凌扶桑已知海若先清道萬里滄波定不揚海上秋髙海氣清營中賈勇競先鳴疊嶼亂翻旌幟影驚濤盡作鼓鼙聲沉船斬馘海為羶潭底潛蛟噴血涎髑髏帶箭逐波去可道孫恩是水仙錦紈愛子亦從軍長鬛蒼頭總策勲誰奪强王萬金首帳前齊説小郎君五千長㦸下淮邳自是沙洲命盡時將軍欲置平戎鼓須借鯨鯢腹下皮湯侯以渠賊王艮皮製鼓㨗上彤庭寵數優詔分玉帶與名裘麾下偏禆盡稽首貂蟬笑看出兠牟南征歌十二首五嶺烽煙久未平君王習戰幸昆明却説將軍多勝算不須文士請長纓詔錫彤弓出禁城良家六郡總從行將軍舊佩平蠻印校尉新開横海營漢皇有道握黄圖南粤何知擅一隅萬里出師將問罪不因大海富明珠獨承節鉞控南州親寵由來冠列侯昨夜輕寒生幕府賜衣初著紫貂裘晴原羽騎簇油幢繡帽爭先蹋鞠場不惜千金收猛士欲將尺組繫名王月明吹笛武陵川馬上行人望跕鳶莫怕炎洲饒毒癘一冬飛雪浄高天軍書插羽速星奔卭僰夷王盡欵門殺氣三秋清瘴海輕兵一夜襲崑崙草木千山鼓角風將軍牧馬夜郎東靈臺向夕占星色已報欃槍墮海中圍合孤城海氣昏紛紛失木泣窮猿何如銜璧歸天闕幸荷明王不死恩牂牁南去亂峰連滇海藤江一帶懸縱謂蠻封堪畫地不知漢將若從天奏凱歸來拜冕旒霍家襁褓更封侯因風為報南荒外漢闕方梟越尉頭千羣椎髻競來王聲教南流盡越裳但使文犀通貢獻不將銅柱隔封疆塞下曲贈翁東厓侍郎總制十首四月旌旂出白狼千山晴雪照油幢預知水草軍無乏試辨風雲陣欲降三晉連年苦被兵九重拊髀憶豪英詔書更不從中御萬里長城一委卿詩書禮樂古人風開闔機鈐又不窮得一降人如愛子用三敗將立竒功山前山後兵馬雄斧鉞衣裳在掌中俠士獻刀承賜酒貴侯免胄為趨風灅川冰盡水泱泱堡堡人家唤蒔秧田中每得鳥獸骨云是單于舊獵場君侯生長在炎洲塞外層冰草木愁祗憐軍士猶寒色臘盡轅門不御裘太師昔日定南荒親把長纓繫莫王寄語健兒須自愛射飛休得近邊墻邊人謂大官為太師畫㦸森森清晝閒指揮只是笑談間收將黄犢教耕去捕得蒼鷹命縱還營平謀國最深忠毎與公卿見不同但使湟中無牧馬不須麾下有邊功青青塞草羽書稀士女鼾眠畜牧肥戲看侍兒呈舞馬醉邀幕客對彈碁題贈段紫峰仙人宿處紫煙孤一片峰隂散玉湖今日隱身城郭裏閉門常寫廬山圖秋日書客童君見過賦此為贈有客扁舟問草廬窓前梧葉正蕭疎山人已得忘筌意不復從君乞異書題陳推官羅江號二首髙卧曾分白鷺沙清谿深處採三花總為徵書出空谷衣裳猶自染雲霞三山江畔入雲齊紫氣千年鎖石堤便欲學仙從此去與君同聽夜猿啼題寳華和尚巻幻目由來見幻華飲光何事又拈華兩華舉似知華客為有别差無别差贈王和尚住善巻偃栢垂蘿古洞春上人飛錫此何因非闗福地尋仙侣自向青山認法身自述贈寫真毛君津黑尚餘山澤氣委蛇又似列仙臞他年太史徵圖畫為識乾坤一腐儒贈周筠臯母七十夀詩髙堂有白髪掩映明春暉七十古來少一陽今又歸瑶池青鳥狎石室紫芝肥令子能承色還看戲綵衣送使人歸蜀蜀吳萬里説殊方總是江流一帶長暫醉𤓰州能幾日乘風忽又過瞿塘題畫山空夜静猿一鳴磴轉雲深鳥不度幽人何事長獨棲只為此中有佳處㢘使廖東雩喪後開所惠地黄酒臨觴慘然尺書滿篋故人情想像荒丘宿草生祗餘此日開尊意堪作山陽聽笛聲贈儀真沙君葭菼蒼蒼水國秋髙樓明月古揚州二十四橋雲霧裏看君騎鶴上天遊贈史君漁沙號問君何處挂漁蓑予亦垂綸坐緑波他日相逢應一笑不知若箇得魚多華補菴三度惠酒而此畨所惠參酒者絶清冽可人雖味甚濃厚而置之杯中淡若無色可謂嘉品因劇飲至醉遂成口號奉謝三首磁杯寫盡只疑空秋月寒潭意頗同隱几偶然成獨酌夜凉白露滿庭中毎甘樗散惟須酒欲補虚羸却藉參瘵疾陶生兼好飲舉杯深見故人心淵明素瘵疾絶無色相傾明水只有馨香藉白茅此夕飲醇􅂸一醉恰如把臂與公交贈曹星士一江號春雨蘭陵江草生江流恰與道心清門前車馬日來往閒坐江城説子平自述并贈曹君少讀隂符恥未工青山偃仰漸成翁人間炎冷都忘盡聽話流年一笑中曉起觀猫捕鼠起來隱几坐朝暾深謝當闗早閉門簷角偶欣猫捕鼠反觀尚覺殺心存贈華君一竹號華生可徵之父巗居無俗好惟與此君知千畝亦何羡一枝聊自怡迎風響獨奏照月影相隨願比幽人節貞柯貫四時補翠峰上人挽詩一首四大于今已各離屈伸猶復似生時𢎞景遺顔常不改翠峯死後四體屈伸如常陶𢎞景傳中亦載此事惠能去路定非迷棺蘄速朽寧辭瓦翠峯以瓦棺身不留名豈用碑亦知繪塑終難像聊使門徒寄爾思詠橘杯二首余過荆溪萬為菴訪余舟中時風雪驟甚欲共飲索杯不可得乃剖橘作盃劇飲至醉相約各賦詩紀之客中酒具愁難得戲幻霜柑當羽觴破處何妨鑿混沌醉來偏覺助馨香古風豈讓匏尊儉佳味何須鬱鬯芳更笑玉盃真俗物朱門豪客漫猖狂天生竒器無人識剖破鴻濛笑我狂醇酎坐令増藥味碧筒徒爾薦荷香持來或訝成金盞寫滿猶疑是橘漿靈均若也知兹意楚頌還應記醉鄉}
