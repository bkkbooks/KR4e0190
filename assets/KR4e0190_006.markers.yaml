  - {type: variant, offset: 0, length: 0, content: '', WYG: 煉火氣盡一片凝冰鬭清冷持此月中斫桂樹顧兎應如避光景倭夷塗刀用人血至今班㸃誰能整精靈長與刀相隨清宵恍見夷鬼影邇來邊圉頗驕黠昨夜三闗又聞警誰能將此奠龍沙邊氓萬戸忻安枕古來神物用有時且向囊中試韜頴劎井行時有白氣屬天仙人擲劎不記年至今光怪猶未歇薄蝕日月騰金晶青天倒挂雙白蜺曽斬妖蛟帶腥氣寒泉滿甃誰敢汲只恐仙人求故物但看水底飛霹靂陳渡草堂二首皂衣非復漢庭郎敝緼深冬卧草堂貧薄不羞畜牸計沉浮也逐鬭雞行殘書閣盡經旬病異味嘗來百草香獨愧頑心猶未化十年學道幾亡羊近市偏逢食有魚閉門不問出無車牛衣聊自對妻子蜡酒時將洽里閭世網幸疎如野馬微名猶在愧山樗亦知農圃真吾事春至頻翻種樹書小樓宴坐不入名山不世間嗒然隱几置遺編身名瓦礫宜居後人事蚊䖟任過前抱樹蜕蟬司化運隔窓風竹發真詮未登道域終難罷微管還須學測天涉世已如入夢蝶居身未作脱鞲鷹自疑戾契戾契見韓文俗呼捩及終為病欲學墨杘墨杘見列子俗呼眉西又不能金老相逢知法器慈公頗訝似禪僧牛乎馬也從人喚惟一迂儒是本稱嘉興金道士三十年不下牀亦三十年不開口冬夏一絮被自擁余叩之以指畫卓許余入道慈舟者蘇之名僧也余見之不告以姓名渠深嘆異以余為頭陀相也又疊前韻到處迷陽不記年村中厯本逐時編寒烏滿野成禾後社燕辭人落木前戒酒劉伶終酒性遣言摩詰亦言詮青天自是無逃處何事靈均更問天混合髙低齊鷃鳳經過老少變鳩鷹屈伸禽戲憑何訣篆刻蟲雕誤謂能盡日閉闗非酒聖文中子稱劉伶古閉闗人廿年猜謎是畨僧余與翠峯僧往來酬對者廿年此身本自無觔兩月旦先生若麽稱莊中作帶郭頃田屋一尋歸耕自許力能任浮沉袁盎嗤驅狗㢘侈王陽訝化金貯麥舊庾將易穀行鞭新竹漸成林計然七策皆無用小試經綸底似今自述避人不敢厭髙深逃影何如學息隂楚客又成蕉鹿夢漆園未了是非心紛紛世事看花發黙黙天機聽鳥吟可笑維摩眞病在無言説處是金鍼有相士謂余四十六歲且死者詩以自笑古人云死生亦大矣此謂趂日力以進道者言之也苟不進道總是虚生修短何辨焉苟于道有見處夕死可矣然則死生詎足為大哉本是癯然山澤士衰年况自不勝衣色常帶墨縁辭肉形或如灰似杜機睢于久謝偕來衆蹇拙何心知我希世人莫詫方臯眼相馬由來失瘦肥殤子彭耼誰夭夀百骸九竅孰疎親若過顔氏十四歲便了王孫一祼身三載濫叨金馬客幾人共坐絳紗春即今已似前生事何待他年跡始陳人情世事古猶今寂寞空林寄此心賢聖不分聊中酒虧成忘盡一開琴有書終日只掩巻無病長年亦擁衿即使癃然似桑户未逢㸃也是知音學道曽窺天壤意寒儒又是膝攣人只言蔡澤有限夀誰見壺丘不定身貴客懶迎長謝病薄田可飽敢稱貧後來不用問修短已占溪山四十春囊癰卧病作三首節候經春日日隂寒衿獨擁閉門深終朝錬液非仙氣幾歲懸疣是雨淫焦火凝冰鐫瘦骨兒痴女長試灰心總縁病裏悲歌意不為離鄉也越吟春半忽驚狗馬疾年來似是龍蛇辰謝醫少錢長卻藥煖骨累裀聊借人味為補虚一試肉事求如意屢生嗔正愁未了形骸外生老病苦只此身余平生無厚褥止一褥既薄且敝病骨覺冷硬不堪也乃從親人家借一褥襯之平生有厚褥與}
