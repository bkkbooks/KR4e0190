  - {type: line-break, offset: 3364, content: '', id: KR4e0190_SBCK_006-10a04}
  - {type: variant, offset: 3364, length: 0, content: '', WYG: 與葛藤絆路之説而兵家亦曰名其為賊敵乃可滅又曰一日縱敵數世之患此佛家之可通於吾儒而治戎之道可用以治心者也儒者以交戰為子夏之病不知能戰是所以為子夏也雖顔子亦有戰矣曰不逺復夫不戰何以有復也雖天地亦有戰矣曰龍戰于野其血𤣥黄夫隂既疑於陽矣陽安得晏然而無戰乎惟戰而不勝故血而至於𤣥黄戰而勝則血可以不𤣥而陽可以亨也是能戰之效也今兄知所以戰戰又能力矣僕}
  - {type: page-break, offset: 3364, content: '', id: KR4e0190_WYG_004-10b, image: WYG1276/WYG1276-0247b.png}
  - {type: variant, offset: 3365, length: 0, content: '', WYG: 入官得請見於當世士大夫葢三年而後見兄一見則駭然異之而兄亦過以僕為知己夫兄雄俊之文博辨之才邁往之氣無一人不知之而獨}
  - {type: variant, offset: 3366, length: 3, content: 超悟誑, WYG: 僕為知己者豈僕之知兄止於世人之所知而}
  - {type: variant, offset: 3370, length: 1, content: 誑, WYG: 也抑亦有不止於世}
  - {type: variant, offset: 3372, length: 0, content: '', WYG: 所知而已也僕之於兄不為不深知己然竊嘗有少怪於兄}
  - {type: page-break, offset: 3372, content: '', id: KR4e0190_WYG_004-11a, image: WYG1276/WYG1276-0247c.png}
  - {type: variant, offset: 3373, length: 4, content: 迷指迷道, WYG: 為世間種種嗜好凡人之所可玩可喜者多足以掛兄之胸臆而動其挹慕不捨之意此其中於心也微而不知其植根也膠而難解苟一不戒則微者或横潰而著矣根者或引蔓而枝矣就使能戒而不潰不蔓則其為力甚勞而為功亦寡譬如聚千百不逞於深叢巨莽之間按而不發而時出其一二騎以鈔於路幸不為大憂然而授首獻俘之期恐終不可冀也而况其猖獗}
  - {type: variant, offset: 3374, length: 1, content: 指, SBCK: 􅃌}
  - {type: variant, offset: 3379, length: 1, content: 明, WYG: 可料歟雖然兄何如人也豈敢謂其有溺於此歟或者當時年少而氣鋭以為雖小有所嗜好而固無損於吾之大者抑亦知嗜好之}
  - {type: page-break, offset: 3379, content: '', id: KR4e0190_WYG_004-11b, image: WYG1276/WYG1276-0247d.png}
  - {type: variant, offset: 3381, length: 2, content: 行㴱, WYG: ''}
  - {type: variant, offset: 3382, length: 1, content: 㴱, SBCK: 􅅧}
