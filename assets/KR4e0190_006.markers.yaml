  - {type: line-break, offset: 3384, content: '', id: KR4e0190_SBCK_006-10a05}
  - {type: variant, offset: 3384, length: 5, content: 太息僕亦夢, WYG: 不欲快於一鬭而以積漸消去之歟且夫以嗜好為無損者無乃不知所戰之過歟以為積漸消去者無乃戰而不力之過歟夫嗜好之}
  - {type: variant, offset: 3392, length: 0, content: '', WYG: 亦必有因必非以為漫然無所用也必以為人之資於天地間者一物不可少也孟子之書所以提挈此心者至著矣而尤著於生我所欲一篇葢其不悟也則自宫室妻子之奉至於種種若無一焉可少者其悟也則}
  - {type: page-break, offset: 3392, content: '', id: KR4e0190_WYG_004-12a, image: WYG1276/WYG1276-0248a.png}
  - {type: variant, offset: 3393, length: 0, content: '', WYG: 簞食豆羹之切於生死若無一焉不可少者藉令有一人焉始不悟而今也悟則自今日無一物不可少者而追視向時所為無一物可少者未始不啞}
  - {type: variant, offset: 3395, length: 0, content: '', WYG: 笑也傭工道丐之人徼幸得十}
  - {type: variant, offset: 3396, length: 6, content: 年来益覺掃除, WYG: 錢則買殽市酒一醉大叫自以天下之樂莫踰於已而千金之子苦身仡仡以程錙銖日夜苦不足藉令此兩人易地而觀焉亦未始不啞然自笑也人之所甚愛而至不可少者莫如七尺之軀也其住於世也能泣能笑能挈能擎能徙能倚無一不能無一不有而其聚諸有以住於世也則又有修有短而卒無不腐為野土化為瓦礫而後已者則此七尺之軀亦終不得自有矣以其終不得自有則當其暫而有之固亦不可據而}
  - {type: page-break, offset: 3396, content: '', id: KR4e0190_WYG_004-12b, image: WYG1276/WYG1276-0248b.png}
  - {type: substitution, offset: 3397, original: 来, replacement: 來, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16500}}
  - {type: variant, offset: 3403, length: 0, content: '', WYG: 之以為真有矣而况於種種嗜好其不如七尺之軀之不可少者又不啻千百倍歟古之聖賢所以超形氣而獨存至於同死生齊得喪漠然無一動乎其心者非誕也既悟則自知之耳如此乃可以悟知性知天乃可以語謹獨誠}
  - {type: page-break, offset: 3403, content: '', id: KR4e0190_WYG_004-13a, image: WYG1276/WYG1276-0248c.png}
