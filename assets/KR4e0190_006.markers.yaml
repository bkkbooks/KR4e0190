  - {type: variant, offset: 3490, length: 3, content: 畨意見, WYG: 二童子相與講章句自以此身不量}
  - {type: variant, offset: 3494, length: 8, content: 已謝上蔡云今之學, WYG: 為人師雖不責我以道而所講}
  - {type: variant, offset: 3503, length: 67, content: 何足道能言真如鸚鵡耳透淂名利關此是小歇脚此古人自驗過不誑語也兄邇来自考處何如天理愈窮則愈見其精微之難致人欲愈克則愈見其植根之甚深彼其易, WYG: 章句然至於收拾放心正容謹節以率}
