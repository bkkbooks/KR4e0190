  - {type: variant, offset: 3683, length: 0, content: '', WYG: 所教者又非一二童子乃齊魯五六郡豪傑之士則其所以率之者宜何如而其為益又何如也然僕所謂一二童子者自章句外亦稍以内外輕重義利可否時時與之一談則或如鑽礦而不入僕所教不}
