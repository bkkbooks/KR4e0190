  - {type: variant, offset: 11609, length: 266, content: 於狂也學問不極力振奮則不能大有所擺脫不能擺脫則雖爲寡過而病根習氣或有潜藏而未融化者耳故曰大人虎變愈變則愈得力如兄髙志豈肯以今日見在爲至哉故敢進其狂言耳弟駁雜甚多别兄四五年猶舊人也奈何與劉寒泉通府荒莊重辱枉駕縁病體就醫不及擁篲耿耿承委送太府先生文字以郡人頌郡公非特分所宜然抑亦情不能已雖然鄙意有不敢不達之左右者僕少不知學而溺志於文詞之習加以非其才之所長徒以耽於所好而苦心矻力窮日夜而強爲之是以精神耗散而不能收筋骨枯槁而不能補積病成衰年及四十尩羸卧牀已成廢人此皆諸公所共親見所共垂憫者僕平日傷生之事頗能自節獨坐文字之爲累耳反之於心旣非畜, WYG: ''}
