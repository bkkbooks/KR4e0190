  - {type: substitution, offset: 3268, original: 毎, replacement: 每, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20789}}
  - {type: variant, offset: 3272, length: 1, content: 任, WYG: 以佃寺之故使憲司有言且云兄以寺地據風水之勝欲作令先大夫墓地上官某人者既予之矣而憲使持之故若此紛紛也僕聞而竊嘆以為如兄安得有此此乃傳言之誤耳不然則必俗吏欲汚衊善人託為此説就使非傳言之誤非俗吏欲汚衊善人則在兄必自有説固不敢以世人之疑吾輩者而亦疑兄姑笑而置之不欲煩諸齒頰間也既又伏念以為孔子以詩禮教子而陳亢疑其異聞孟子不見儲子而屋廬子以為得間古者師友之間既洞然肝膽相信矣而亦若不免以世俗之疑相疑者何也無乃故為迂其問以剔抉聖賢之隱曲而白之於世也乎今僕幸得兄之間而可以有請安知兄之隱曲不因以白而僕亦冀有陳亢得三之喜與屋廬子之悦者乎且夫人之意兄者則曰兄之請寺是世人之請寺己兄之徇風水是世人之徇風水已而僕之意殊不然也夫兄爽朗超脱得之性成僕毎竊嘆以為即使兄不學不知}
  - {type: page-break, offset: 3272, content: '', id: KR4e0190_WYG_004-6b, image: WYG1276/WYG1276-0245b.png}
  - {type: page-break, offset: 3272, content: '', id: KR4e0190_WYG_004-7a, image: WYG1276/WYG1276-0245c.png}
  - {type: variant, offset: 3274, length: 0, content: '', WYG: 亦當作物外高流如𢎞景和靖}
  - {type: variant, offset: 3275, length: 3, content: 勇别来, WYG: 徒絶非食煙火輩人而或謂其請寺以自便占風水以規後䕃此真坐井之見且不足以闖兄之藩宜乎兄之不屑與較也然而兄之為是必有説也僕竊觀於兄矣惟兄篤於自信是故不為形跡之防以包荒為大是故無净穢之擇以忠厚善世不私其身是故或與人同過而不求自異此兄之所以生深信深慕於相知者亦所以生微疑於不相知者也寺田出上官之予何必固卻以為潔風水有事機之便何必固避以逺嫌以是闖兄或者得其藩乎然僕竊以兄之意亦稍偏矣孔子惡行怪而愿人亦譏其同乎流俗合乎汙世夫曰同乎流俗則非其自流也特同之耳曰合乎汙世則非其自汙也特合之耳其設心亦豈不善而聖賢甚以為不可者其説可知也且夫本以包荒忠厚而其影或近於愿人此僕之所懼也然則世人望影而疑亦何怪歟古人有放君而代之者而人不疑其富天下有放君而}
  - {type: page-break, offset: 3275, content: '', id: KR4e0190_WYG_004-7b, image: WYG1276/WYG1276-0245d.png}
  - {type: page-break, offset: 3275, content: '', id: KR4e0190_WYG_004-8a, image: WYG1276/WYG1276-0246a.png}
  - {type: substitution, offset: 3277, original: 来, replacement: 來, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16500}}
  - {type: variant, offset: 3279, length: 1, content: 聞, WYG: 反之者而人不疑其專葢古人舉大事冐大不韙而猶不䝉人之疑如此今吾輩出格作一小事而人已羣然疑之雖古今人眼孔不同計亦不應如此隔絶也毋乃不邇不殖所以自信與素信於人者有不如古人乎不顧不視不取不予所以自信與素信於人者有不如古人乎且夫以湯之聖宜其脱然於聲色貨利之外也而祗曰不邇不殖真若聲色貨利之足以移湯而湯真若與聲色貨利相持然者何也以尹之所樂者堯舜之道也而祗銖稱寸量於一介取予之間若硜硜之小人然者何也}
  - {type: page-break, offset: 3279, content: '', id: KR4e0190_WYG_004-8b, image: WYG1276/WYG1276-0246b.png}
  - {type: variant, offset: 3281, length: 0, content: '', WYG: 所論伊川金楪子之説以此施於㸃檢形跡之人則為對病要藥矣向非其人則加以蓍參治肺癰藥豈不甚美或以助火而長病也曩時諸友所處陽明老先生}
  - {type: variant, offset: 3282, length: 1, content: 居, WYG: 事或有造為玉碗之謗此言極俚鄙可笑宜不足以紿三尺之童子然王僉事竟以此解官去有志者至今痛惜之夫毁譽利害不足計然得無吾黨亦有過乎苟非過於自信而疎於事情無乃所謂素信於人者之未至耶君子行有不得反求諸已則}
  - {type: page-break, offset: 3282, content: '', id: KR4e0190_WYG_004-9a, image: WYG1276/WYG1276-0246c.png}
  - {type: 'kr:newline', offset: 3284, content: '

      ', id: KR4e0190_krp_006-bkkkrnewl196}
  - {type: line-break, offset: 3284, content: '', id: KR4e0190_SBCK_006-9b10}
  - {type: variant, offset: 3285, length: 0, content: '', WYG: 日𦂳日精至於己日乃孚是人之疑我者所以}
  - {type: variant, offset: 3287, length: 1, content: 殊, WYG: 我也兄意其}
  - {type: variant, offset: 3289, length: 9, content: 爲慰近承来諭同志中, WYG: 為何如然僕非敢謂此言可以少禆於兄亦將以叩兄之隱曲而得聞所未聞耳幸亮之答王南江提學書奉别經年不能通一字以為率然道離合問無恙之泛語既不宜施之於兄而思竭其疲駑以效一言之獻則又茫乎其無所得故遂缺然至此又復以為既疲駑無以自效而有數字以道離合問無恙亦足通殷勤而舒繾綣之懐不猶愈於經年無一字乎故於李君使者來草草作此大抵所謂率然之泛語耳然僕竊誦吾兄前後見惠兩書知吾兄痛懲既往之悔直欲洗刷腸胃不肯若世之葢頭換面作好人者至於用心獨苦處則雖兄口不能自言而僕於筆扎間亦稍窺見焉未嘗不憮然而嘆以為兄之力能自振㧞如此兄之不自護如此即使僕竭其疲駑而有以自效亦何所加也人心存亡不過天理人欲之消長而理欲消長之幾不過迷悟兩字然非努力聚氣决死一戰則必不能悟或不知所戰或戰而不力則}
