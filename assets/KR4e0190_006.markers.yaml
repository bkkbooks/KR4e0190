  - {type: variant, offset: 3405, length: 4, content: 難益信古, WYG: 學而其初必始於力戰未有不力戰而能如此者也約之嗜好更不少於兄而僕相聚時數以為言然於兄獨罕及者約之性柔須待有}
  - {type: variant, offset: 3410, length: 8, content: 備嘗艱苦動心忍性, WYG: 夾持而兄剛果雄毅氣魄甚大始雖暫牽其必一朝躍然自脱於此無疑也顧所不}
  - {type: variant, offset: 3419, length: 1, content: 險, WYG: 者早與不早耳今兄果然}
  - {type: variant, offset: 3421, length: 1, content: 阻, WYG: 所以戰戰而又力以自脱於此不出吾素所料者如}
  - {type: variant, offset: 3423, length: 57, content: 細細磨鍊細細降伏此心處方欲強勉從事銖寸積累十數年庶幾少有所進不敢自負也若謂認淂本體一超直入不假階級竊恐雖中人以上有, WYG: 而又早則吾之}
