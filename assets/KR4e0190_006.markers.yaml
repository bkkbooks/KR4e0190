  - {type: variant, offset: 14216, length: 1154, content: 至於念菴所以懇切用工與其懇切爲人憫時病俗之深意則知之矣知念菴之心則知吾丈之心矣今之學者種種欲障絶未擺脫世間薰天塞地無非欲海學者舉心動念悉是欲根而往往託無寂無感無善無惡之說以覆其放逸無所忌憚之私所謂終身役役行盡如馳而莫之能止亦可哀矣夫此心原無放逸則不必論主寂有放逸則不可不論主寂學者此心原不放逸者能有人哉譬如人元氣原無病則不必論服藥有病則不可不論服藥嘗有人問伊川無病何須服藥伊川云只爲開眼卽是病此語道盡學者膏盲處吾丈所舉程門靜坐與未發之前求中之說皆所謂頂門之針而膏盲之藥也雖至上古聖人成湯周公坐以待旦髙宗恭黙思道三年孔子嘗終日不食終夜不寢至於三月而不知味所以求之枯寂之中如是其堅苦然者葢雖聖人亦自覺此心未能純是天機流行故不容不如此着力也然學者用却有寂有感的工夫却是於此中欲識得無寂無感的本心欲復得無寂無感的夲心而非以此妨彼之謂也譬如有人患積熱藴結必假芩連諸冷藥以解其毒而復其元氣非以爲冷氣即元氣亦非以爲冷氣異元氣而不服藥之謂也僕自覺欲障纏縛之深而放逸之乆矣方欲入空山枯坐蒲團兀然作一活死人如是者十餘年庶幾識得本来面目然則僕方且竊執事之教以自㳤而其言乃若與執事相牾然者葢以爲不如是則不可以得間於長者而聞其教也與姜編脩廷善世人始入仕途便思肥家吾友厲志清脩非義不取禦人之盜乃不求彼而求此可見義盜之少也一笑一笑雖然囊巳罄矣盜之所得止於如是而吾友之清脩益彰吾友之盜不乃爲王參元之火矣乎更有一說清脩者志也損益者數也以吾友之清脩而尚不能逃乎招損之數使更似他人作肥家之計其招損當何如矣此君子所以安于義命而益厲乎其志也適自閩中歸聞吾友將行因疲於道路遂就荆溪山中棲息不及一别耿耿崇安建陽之間誠是仙靈窟宅昔人蛻骨在在有之不特武夷一奇也吾僦居此中已有次弟即且移家遂往與世長辭陶潜所謂縱浪大化中㑹盡便須盡者此外更無所望矣京師相知故人偶尚有問我者只以此荅之而已與華郞中補菴僕不能爲義而竊好人之爲義古者有無相通以成一體二記文中頗盡之嘗見世間富人惜財如惜血苟出其槖中朽腐棄餘尚足以活宗戚閭里無限垂絶之命乃暌暌相視不少動乎其心以爲生財之道宜如此葢財生而心死焉乆矣以此僕於執事義田及史君荒渰二事心竊慕之凡求余文者多莫之與而此二文者雖兩君不以余諉而余固樂爲之役也況其見求之殷乎但筆力凡駑不能發揚盛事以風厲世人是可愧耳雖然聞方洲謂吾文勝錢公輔此或不敢虚讓執事眼中自當得之但裴晉公奉酬皇甫持正文價故事不知執事如何爲處耳生平未嘗敢受潤筆之資聊書此發吾文一笑與陸五臺儀部草堂枉駕山寺把袂兩畨劇論辨難往復殊豁心曲即使朋友相聚毎若此何患乎道術之不明也五臺亦以爲然乎雖然千言萬語與嘿然處是同是别若謂之别語從何𧺫嘿從何止若謂之同何不相與嘿然而千言萬語當其諠然時若一句不可少者畢竟是同是别五臺試更叅之别後㑹大洲公更有談諭否又恨不得時時相與證法也重刋荆川先生文集卷之六, WYG: ''}
