  - {type: line-break, offset: 4153, content: '', id: KR4e0190_SBCK_006-12a06}
  - {type: variant, offset: 4159, length: 0, content: '', WYG: 容人加減者也夫業無定習而心有轉移苟真有萬物一體之心則雖從事於舉業以進身未嘗不為義塗也若使有獨為君子之心則雖從事於飭躬勵行以退處未嘗不為利塗也經義䇿試之陋稍有志者莫不深病之矣雖然春誦夏絃秋禮冬書固古之舉業也固未嘗廢誦與書也苟無為己之心則絃誦禮書亦祗為干禄之具苟真有為己之心則經義策試亦自可正學以言昔人妨功奪志之辨此定論也至於以舉業為教則稍有志者亦知深病其陋矣吕伯恭以舉業教浙中而朱子以書規之伯恭答書以謂若不開此一路則法堂前草深一丈僕嘗誦而竊嘆以為此極是前輩苦心非特後之人未能知雖當時同志者亦未能}
  - {type: page-break, offset: 4159, content: '', id: KR4e0190_WYG_004-16b, image: WYG1276/WYG1276-0250b.png}
  - {type: variant, offset: 4160, length: 0, content: '', WYG: 知}
  - {type: variant, offset: 4161, length: 0, content: '', WYG: 僕年來則已決意絶去舉業之教矣而猶𤨏𤨏為執事言者葢亦自知今之不教舉業}
  - {type: page-break, offset: 4161, content: '', id: KR4e0190_WYG_004-17a, image: WYG1276/WYG1276-0250c.png}
  - {type: variant, offset: 4162, length: 0, content: '', WYG: 為脱洒而向之教舉業未為粘帶也今之不教舉業未必足以閉人之利塗而向之教舉業未必不引人一二於義塗也至於道德性命技藝之辨古人雖以六德六藝分言然德非虚器其切實應用處即謂之藝藝非粗跡其精義致用處即謂之德故古人終日從事於六藝之間非特以實用之不可缺而姑從事云耳葢即此而鼔舞凝聚其精神堅忍操錬其筋骨沉潛縝密其心思以類萬物而通神明故曰灑掃應對精義入神只是一理藝之精處即是心精藝之粗處即是心粗非二致也但古人求藝以為聚精㑹神極深研}
  - {type: page-break, offset: 4162, content: '', id: KR4e0190_WYG_004-17b, image: WYG1276/WYG1276-0250d.png}
  - {type: variant, offset: 4163, length: 0, content: '', WYG: 之實}
  - {type: variant, offset: 4164, length: 5, content: 兄去蜀矣爲, WYG: 今人於藝則以為溺心玩物爭能好勝}
