  - {type: variant, offset: 3483, length: 2, content: 竟成, WYG: 知而深為兄喜者也僕不肖聰明百不逮於兄雖僅守繩墨常恐失之兄謂我戰勝而肥今臞然故吾也此足以知戰之不勝之效矣雖然敢不勉耶幸兄常不鄙而教之僕於文字素非所長然以猥嘗受教於兄且幽居少事欲以灌園餘力時}
