  - {type: variant, offset: 4207, length: 3, content: 墮落髙, WYG: 古與今之不同而非所以為藝與德之辨也執事所舉堯舜夫堯舜所未聞與若罔聞云云者此道也羲和之厯象夷䕫之禮樂臯之刑名至於垂弓和矢伯益鳥獸孰非道哉然諸子為之而堯舜若罔聞云云者葢君逸臣勞道則然耳若謂堯舜以道自處而以藝士諉之人何其自待者厚而待人者薄也臯以刑名自處而乃為其君陳迪德之謨䕫以撃石拊石自處而教胄子以簡亷直温之德性則是以藝士自處而以德望之人又何其自責之薄而責人之厚也厯象禮樂藝也修五玉如五器而彰施五采在璣衡獨非藝哉則堯舜亦屑屑矣孟子曰堯舜之知而不徧物急先務也若在羲和則厯象便為先務在䕫則撃石拊石便為先務又安得以堯舜之所不徧者而遂不急也執事以好博雜技藝為僕之病此則不敢不承而至於分技藝與德為兩事則辨之亦不敢以不}
