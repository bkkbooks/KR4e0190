  - {type: variant, offset: 10275, length: 1, content: 所, SBCK: 􅀁}
  - {type: variant, offset: 10275, length: 759, content: 所以自忘其不肖而深欲致愛助於執事也亮之與洪方洲郎中逺渉一遍轉覺求友之難毎切思平日與兄臭味真不偶然邇来懷兄較切兄之念我亦然否耶胸中讀書作文擬少覺輕省否若精神尚只在此科臼中盤桓沿洄則是於本来面目未可謂真有見也近来講學多是游談至於爲巳工夫入細處則其說頗長瞻望金陵奮飛未能歲云暮矣何日得與兄一研究之江湖衷曲亦無可披寫處又恨不得對兄一披寫也近来江山之間偶見一二方外勇人漆園枯木寒灰之語不圖眼前得之又見莆田小卓子字書及聞其言議風旨意其必爲磊落奇偉超脫不羈之士而俗人往往以能言禍福奇之淺淺乎知之矣學士大夫間所謂人才者兄大略聞之矣而所謂磊落超脫者往往多出於黄冠草服之間豈所謂禮失而求之野者耶一笑二古者朋友散在四海九州則汲汲於欲相㑹之殷者非專爲情好也有疑焉則欲相與決之有得焉則欲相與推而同之而已與兄相别三年知兄之學旣已無疑而有得焉乆矣毫髪無所待朋友而決者獨不能與朋友推而同之乎往返兩遍皆可以来而不一来非所望於兄也南都縉紳所聚非山人可来来亦不敢見客僕有積疑待朋友而決者謹俟異日使節便道過此當一請教耳非敢自棄也所示濟南生文字黄口學語未成其見固然本無足論但使吾兄爲人所目攝此亦豐干饒舌之過也且崆峒強魂尚爾依草附木爲祟世間可發一笑耳文章之說其明不明無足關繫於世向固不喜吾兄之多言也孟子之所好辨是天地間何等語言此外豈足多辨㢤荅殷生原學来書推奬鄙人甚非倫比頭陀僣謂佛子法王此大罪過也雖然亦足見吾友向往之殷矣僕不自量竊痛世人汨于利欲迷失真種絶去天理自墮鬼蜮是以在群衆中往往不惜齒頰一與破迷雖至速侮招尤亦不爲悔至于同游諸子尤更不敢惜齒頰然察其中如聞古樂而思睡者固亦多矣亦不爲悔葢冀有一二人能深信吾說而共行之以究乎其精則宇宙間氣脉尚有所寄不至盡冺爛此吾人大功徳也敢自愛乎今吾友乃不見謂迂濶直欲相從于湖海寂寞之域信之甚眞而志之甚篤則交戰勝負之機固已決矣是余, WYG: ''}
