  - {type: variant, offset: 3486, length: 2, content: 畨議, WYG: 為之又以為既樗散無所用世幸未即老死二三十年之後或為天所牖使少有知識尚能託之於文字雖不敢望於行逺庶幾達鄙陋之意焉是以不能息心於此然往時朝夕於兄尚不能竊其緒}
  - {type: variant, offset: 3489, length: 0, content: '', WYG: 今去兄既逺誰為開之固知終必罷廢矣今往近作數篇冗散無可採至如贈彭通判與李郎中墓文亦稍見已志故敢請教耳僕今年寓居陽羡挈妻子以行有}
