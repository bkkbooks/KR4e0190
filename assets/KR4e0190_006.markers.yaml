  - {type: variant, offset: 4241, length: 2, content: 先儒, WYG: 鄙意不敢不盡於執事也雖然執事憫時病俗之意則亦深且切矣今執事固有教人之責矣執事之隱居修行僕聞之膠陽諸兄亦久矣今之教}
  - {type: variant, offset: 4244, length: 5, content: 爲學莫先于, WYG: 舉業縱欲罷之而勢有不能即使復古之教則六藝固亦不廢僕所願執事之於諸生即舉業之中而示之以窮經明理反躬著已之路而黙消其干名好進之心則是舉業中德行道誼也即古六藝之中而引之於聚精㑹神極深研幾之實而黙消其争能務勝之心則是六藝中道德性命也方且順而導之正不必逆而沮之也大率今之世舉業技藝種種猶未足為心病所為心術大蠧者在乎}
