  - {type: variant, offset: 4356, length: 5765, content: 則本體流行乃是合下了當弟願以此終身而從事焉兄得無以爲固滯之見乎荅洪方洲主事別乆殊勞我思近朱刑部過草堂頗能道吾兄𧺫居爲慰曩承手教諸凡所處事體比舊俱覺穩當是以更不必細爲條荅而鄉居僻逺使者亦遂不至以是不及復書多罪兄言以前行事俱失于寛則僕前己略言之矣大率有意于爲寛與有意于爲嚴皆是中間有病根在昔虞廷之論旣云罔咈百姓以從已之欲而又云罔違道以干百姓之譽此隱微之間不可不深察也減免一節僕不能知其中事體如何大率吾兄清徳則旣自信而人亦信之矣其有未然則一畨擊撞是一畨工夫若覺因此稍有揺動則平生爲善之志猶是從世界上轉移而未可以言真心爲善者也然雖不因此稍有揺動而反身修徳自懼自省則又益精以密是物議之興其爲吾進德之助多矣且夫豪傑之士出頭幹事矯衆特立則易以招尤惟閉關括囊則可以無咎譽然君子不辭自立于多凶多懼之地者將以自驗也僕輩幸在閒田地然悠悠過日徳不加修未必不由乎此吾兄何以敎之與蔡白石郞中往年辱兄知愛謂可與共進於文藝之門今忽忽齒髪漸衰兀然成一秃翁向来伎倆剥落且盡雖誦人詩句亦如羅刹國人驟聞中華語音駭不省其何說况能自有所著以自見於世也朋友間往往言及兄之垂意於僕豈特以故人之故耶抑亦謂其可與進於文藝之門耶豈知僕之衰颯剥落一至此哉雖然以兄愛我之意其知我之衰颯剥落一至此也豈不爲僕惜之以僕之愛兄之意亦竊謂兄以聰眀絶世之資而消磨剥裂於風雲月露蟲魚草木之間以景差唐勒曹植蕭統爲聖人而冀爲其後此其輕重豈特隋侯之珠彈雀而巳亦可惜也曩與兄相聚時兄年最少而僕亦壯年今壯者衰則少者亦壯矣由壯入衰能幾何時四十無聞則僕旣自蹈之矣自惜之矣倘兄以爲宇宙内事與吾分内事盡於風雲月露草木蟲魚之間則足矣不然則亦不可以不深思君子進德脩業欲及時也兄苟不以僕言爲戇繼此尚有所請不然且閉口耳辱愛多談亮之二曩承荅教深慰素懷且自笑僕之所知於兄者淺也僕嘗謂學者非無痛痒之爲貴而以眞知痛痒爲先知痛則不能不護而藥之知痒則不能不爬而搔之今之學者病在徧身麻木全然不痛不痒所以更不得力然知痛痒若不是真知其更不可忍處亦是不知痛痒縱使爬搔護藥亦悠悠不淂力也来書云詞章爲聰明之害又云於苫土中覺得曩時醉夢流浪此是吾兄一口說著平生痛痒一些不自瞞一些不瞞人即此一些不自瞞不瞞人處何等光明何等直截便是超凡入道真根子也雖然昔人所謂舊習如落葉旣掃復積兄試觀之旣覺得曩時醉夢流浪之後四五年来種種世味種種酬應種種思慮能盡不醉夢不流浪否抑時有醉夢流浪處否醉夢流浪處當時便能覺得旣覺得便能撥轉淂否抑亦有恍惚不便覺得牽掣不便撥轉淂否即如把筆作詩時自覺淡然一無喜心否旣有喜心其於好醜贊毀種種勝心能不藂然而動否覺有動處便能銷化否抑亦有牽掣不便銷化否其不把筆爲詩時喜心勝心能不濳伏否不止作詩一節凡一切外馳習心能銷化否不濳伏否細細照察細細洗滌一些不得瞞過一些不得放過乃是真知痛痒旣真知痛痒即境界不論靜閙工夫不論頓漸靜閙一境界也頓漸一工夫也兄以避北而就南舍頓而即漸爲說夫閙處不得力卽靜處未可謂之得力不究竟所謂頓亦安有所謂漸乎收攝精神倂歸一路漸即是頓即此一路接續不斷頓即是漸非二致也然吾兄討方便處用力亦未嘗不是也旣真用力則靜閙頓漸不患其不一矣来書所病世之君子以聖學之名襲江左之寔是非頓之爲患也正坐自瞞過自放過麻木不識痛痒耳弟之不肖年来痛痒頗漸自知追尋病根大率苦血氣之爲累血氣薰成習氣不能自脫詩文之障亦時尚往来胸中弟爭分數重輕而已此不能以欺兄者自顧齒髪漸衰痛痒心切旣稍有知不敢不極力爬搔䕶藥使此生甘爲麻痺人也来書提出小心兩字誠是學者對病靈藥但如前所說細細照察細細洗滌使一些私見習氣不留下種子在心裏便是小心矣小心非矜持把捉之謂也若以爲矜持把捉則便與鳶飛魚躍意思相妨矣江左諸人任情恣肆不顧名檢謂之脫灑聖賢胸中一物不礙亦是脫灑在辨之而巳兄以爲脫灑與小心相妨耶惟小心而後能洞見天理流行之寔惟洞見天理流行之寔而後能脫灑非二致也弟之不肖正程子所謂墮在沉滯執泥坑裏者自愧脫灑之未能也惟兄教之僕之所請教於兄大要只是一言願兄時時無忘苫土中所見如何如何答皇甫百泉郎中前得方山書知與兄日相切磨必多有妙論恨不能往叅其間而與聞之也僕之不獲奉教於兄而索居也其亦乆矣僕之懶病而廢學也其亦乆矣藝苑之門乆已掃迹雖或意到處作一兩詩及世縁不得已作一兩篇應酬文字率鄙陋無一足觀者其爲詩也率意信口不調不格大率似以寒山擊壤爲宗而欲摹効之而又不能摹効之然者其於文也大率所謂宋頭巾氣習求一秦字漢語了不可得凡此皆不爲好古之士所喜而亦自笑其迂拙而無成也追思向日請教於兄詩必唐文必秦與漢云云者則已茫然如隔世事亦自不省其爲何語矣所以乆而不敢請教於兄者正以村俗匠人不敢呈技於輪扁之前也今旣與兄開口說破容繕寫一兩篇奉以爲笑耳蔡白石今之名家也僕向来頗不謂然近得其詩讀之則巳洗盡鉛革獨存本質幽玄雅淡一變而得古作者之精僕雖非知音亦三嘆不能自已竊謂此兄當與吾兄竝驅辭塲矣雖然以兄之髙明磊落若以一生之精力盡之於此即盡淂古人之精微猶或不免乎以珠彈雀之諭向曾寓一書於蔡兄不知蔡兄曾與兄泛論及之否又不知方山之所謂與兄日相切磨者抑亦止於藝文之間而巳也抑亦不止於藝文之間而已也更願聞之来教道未就損學不加益之說雖兄之謙亦足以知兄之苦心也學之不加益也正坐不能損耳更願聞所以損之之說也南沙兄𬒳劾令人益有感於行路之難此兄在内在外皆不見容若此其自爲計獨欠拂衣一往耳俟此兄反常時欲以此相勸不知能自決乎否也與與槐謝翰林數辱書問且教誨拳拳如吾兄真能愛我以德者也感激感激所諭東城誌文中間附載師友一節弟方屬稿時亦知此叚議論多爲世所不喜而兄書示亦以爲所不喜也果然果然僕何敢以一人之獨論而干什百人之公喙哉但東城兄平生所尊若人也而爲之師所親若人也而爲之友意思懇懇真是如此寧使自已蹈世人所不喜而不忍不爲旣死之友一寫心事此鄙人之意也閉門厭事此是鄙人前身宿病近来力自懲創以庶幾乎吾非斯人之徒而誰與之意但性旣褊狹又素羸瘠毎入空山則不免仍有喜心毎遇人事迎送繁擾跛踦從事則不免仍有厭心耳雖然兄真愛我以徳者也敢不圖所以承教林君與吉吾兄屢屢示及僕亦慕其爲人嘗至松江一訪之與之有山中同事之約然此兄尤似厭事過我者又愧僕之謭劣不能致此兄也僕多病之軀年入四十已更衰落不覺塵心灰盡枯坐素食兀然一老瞿曇矣非學力使然葢不得不然也宿負書債亦已乞休兄向所示諸書不煩㽞意矣兄母笑母笑兄所示景仁書將多買僮爲猗頓之業其戲耶其誠然耶古来磊落奇崛之士多是歇手不下如范蠡本非俠徒亦非貨殖葢自以計然之策不盡用于越而發之居積盈縮隂陽予奪之間以寄其馳騁不羈之氣與其弛張不窮之能而已是所謂技癢者耶趙子其亦然耶其戲耶雖然趙子其必能戲也雖然兄謂趙子之疑於俠而僕謂趙子之非俠也其爲技癢者也是吾兩人者亦戲也嘻如此解者宇宙間事孰爲戲耶孰爲非戲耶荅喻呉臯御史執事之爲令也子惠孚于百姓爲御史也風采動于朝端至其發爲詞章則又與古之騷人墨士爭馳騁上下然竊窺執事之意皆不以是爲足而卓然有意于古人儒者性命之學葢不造于精微不已也紫陽子曰豪傑而不聖賢者有之未有聖賢而不豪傑者也僕竊爲執事望之承諭失職圯剥之說深見閔時病俗之至意執事正色立朝側目者幾何直道君子神明扶持即使往復消長之幾未能盡如人意然周旋其間整頓得一分亦是宇宙間一分禆補大易所以小利貞也若夫事之有拯隨而身之有屈伸在君子自能與道委蛇而動靜不失其時耳讀所寄諸詩歌其調雅以古其氣雄以鬯而慷慨許國攬轡請纓之氣復見于言語之外葢不敢以詞人之詩目之也謝教謝教賦篇偉麗但摹擬選賦太似而真意或稍不融暢耳僕過承知愛自顧迂踈褊陋素非適用之器惟競競自守庶幾少有所進以無負于夲来面目顧年垂四十塵機與老態漸長道心與壯氣銷落葢巳蹈無聞見惡之戒矣奈何奈何緬想海内同心何日得奉教語展心曲而相與切磋印證也向使節寓呉時殊欠一㑹至于抱悵無巳臨書重爲繾綣有便更賜教多幸與李中溪知府居間毎一思兄忽如隔世適奉手教又如聞隔世人語而神遊于崆峒藐姑之間也慰幸何可言不求復性終坐流浪来教甚警切足徴吾兄近来所淂僕自四十外非特世事灰心向来一切詩文伎倆亦從掃抹于閒靜中稍有窺見本来面目處惜道逺不淂一致之也楞嚴維摩圓覺諸經十年前亦曾看此若謂從此悟入則于對面孔竅尚隔一層百過誦持正落理障世間文字與出世間文字一有著處其病同也不若併耳目口鼻作用頓然放下便見眞我如何如何好名爲病只是眞性命心不切無足道者自悞自耳兄與五岳乆㽞意方外之學倘曾遇一二異人否乎便中幸以示我與胡栢泉叅政天下事魚爛極矣非特邊陲戎狄之患然也愚夫知其必有隱憂而恃祿固寵之士無人敢出一口氣間有一人慷慨言之而出身任事則衆共惡之必擠去之而後巳嗟乎此禍機之所以成于壅蔽而志士之所爲扼腕也山中偶淂大疏時取讀之大覺太息雖然進退時也于兄何有哉若兄之自爲計則願以康濟斯世者康濟此身以除戎攘寇手叚用之懲忿窒欲克巳復禮之間此古之所謂真正英雄也兄之有志于此亦乆矣敢進一言以贊山中内修之策與李少卿中麓自吕竹嶼去後與兄遂如隔世毎思京都舊歡可勝耿耿今金攝山之在章丘也是竹嶼之在常彼此消息之便甚慰甚慰昨得兄書知䘮内之戚吾與兄與南江同之悵然悵然又聞兄巳淂子及後娶復有孕極爲兄喜一身輕萬事足兄兼得之矣復何所求於世也哉弟數年来閉門鄉居謝遣業縁交游旣簡鉛槧亦踈暖暖虚里桑梓滿眼自是天壤間樂事時復據小樓隱几兀坐一種枯木寒灰趣味更别乃知造物者置我於此意良不薄且端居多暇更有丹丘羽人之想聞牢山海島仙靈窟宅甚欲一往焉且將道齊魯之間得與兄一劇談而老父髙年勢難逺出㑹稽禹穴之間龍門太史蹤迹所在兄倘亦有意乎兄書中言章丘凋敝思得良牧攝山敝鄕最有志向之士也律已清苦蒞民豈弟兹調亦以直道致其爲章丘必有可觀且賴兄爲邑人當如古澹羽任常之徒上禆有司之見聞下以善道化誘鄕里非兄之責而誰責也弟何能爲助哉荅姪孫一麟數日間始能下鄕自驗病後此心覺淂凝定一畨從此可更有進歩處是造物者往往以病幸我也得来書言吾姪孫之病此心惻惻不能專精致神溺書冊羨技能以爲養身養心之累此說誠是若使盡捐書冊盡棄技能兀然槁形灰心此亦非大難事而精神無凝聚處亦自不免暗路漏洩若就從觀書學技中將此心苦煉一畨使觀書而燥火不生學技而妄念不𧺫此亦對病下針之法未可便廢也燥火不因觀書而有特因觀書而發耳妄念不因學技而有特因學技而發耳旣不因觀書學技而有則雖不觀書不學技亦安得謂之無乎吾子雖乆事于學至于學問頭腦如先立其大等語其實未有自信自作主宰處今在病中且只可收攝精神并歸一路俟面㑹更商量也宋奏亦可從容看之白沙先生以我觀書以書博我之說甚可理㑹以我觀書則意常閒閒自不欲速以生燥火可試之荅洪方洲僕囊癰卧病百餘日潰出濃水過多足髓流耗至今未能𧺫立一歩恐因此遂成癰軟作一支離活死人卧牀遂與世相隔絶亦未爲非幸也大率幻軀一切付之造化不復有所計較於其間矣病中幽閴毎念吾兄且訝兄音信乆疎而不知兄之病甚亦如我也適讀来書旣駭且慰兄習讀過勞思索太苦願兄常教此心虚閒以完精神此病未可專委之血氣也神氣精一而爲三故有神病氣病精病病有三而神病爲重兄言夢裏飛揚正屬神不收攝多記苦思正是神的對頭冤家若終日用神而神不耗此非有道術者不能吾輩則在時時收攝而已僕之病亦坐此葢乆而稍有覺悟耳使者逺来深感兄之念我枕上草草不盡欲言荅王龍溪郎中伏枕中讀来教甚慰甚慰告子不可謂非力量此吾兄有見之言也大率種種疑懼由自心生由自心斷張弧脫弧盡從心造遇雨之吉群疑乃亡人須信得一生吉凶利鈍莫不有定命在則種種可疑可懼盡如空華無若我何此乃無意於却疾而實却疾之要藥也老莊家亦言大患有身金注成惑若於此處稍叅不破則昔人所謂壁間蛇影足以生疑而致病葢自以爲可疑可懼者未必能病吾身而終日自擾於虚疑虚懼之中乃真足以病吾身是非人能病我而我自病之也兄達人也於此可以一笑而解矣與羅念菴脩撰自與兄别後數年間齒髮日衰念來日之苦短而問學之無成邇來省身自克性命一念儘切於往時居閒靜坐即常如見兄面目常見兄面目即常如寄書於兄也至如夢寐間亦徃往見兄僕方訝蹤跡與兄太密而兄乃以我爲踈乎一笑所示夏游記中間辨析精切深有憂於近世鹵莾之學力與破除可謂有益世教不小然以此驗兄近来所淂則尚有論在葢猶未免落於文義意見之間而自巳真精神不盡見有灑然透露處豈兄對世人說法故然耶兄自謂此物未得到手此是真實不誑語弟近来用力益見此物到手之難不且死心塌地抛棄萬縁下十餘年死功則不可妄想古人不言思道三年終日終夜不食不寢此真公案也後世儒者只是說話度日而巳况在近世乎近偶㑹一二方外人見其用心甚專用工最苦慨然有嘆於吾道之衰葢禪家必欲作佛不坐化超脫則無功道人必欲成仙不留形住世則無功此兩者皆假不得惟聖賢與人同而與人異故爲其道者皆可假託混帳自誤誤人竊意當時聖賢用心專而用功苦者豈獨百倍方外人之修鍊而已必有啞子吃苦瓜與你說不得者而世人乃欲安坐而得之以其世間功名富貴之習心而髙談性命之學不亦逺乎寥寥宇宙所望于兄者不淺弟亦不敢自棄於吾兄教誨之外但與吾兄不得合并最是苦事以僕愚見非特僕之鹵莽朝夕不可離兄雖以兄之髙明純粹亦不能離我若得天假之縁同處數年不假言說日夕以真精神相感發如此乆之彼此皆可望於有成不然則徒抱此生耿耿而巳奈何兄近有秋来九華之約兄之能来與不能来不可知而僕今秋則不能出門矣僕自春徂秋外腎癰瘍出膿今癰愈矣因出膿水四五碗傷却筋髓足力尚軟未能𧺫牀也若病體能復舊當爲来春相晤之約耳一晤尚難况乆處乎可悵可悵死生一事巳一切任之無足深掛意者毎聞兄亦時有小恙不知何恙也便中示之年来世事擾擾憂國一念未能弭忘而浚谷以一僉事當古北口之衝尤爲此友憂之知兄亦同此懷也蔡可泉兄使人之便草草寄此言何能悉與楊蕉山執事豪傑士也忘身許國不囬不撓使滿世間脂韋淟涊全軀保祿之士聞風縮頸羞媿不暇執事之志則然而才足濟之自丹陽奉晤令人嘆羨不已然竊有少致愛助於執事者頗覺慷慨激發之氣太勝而含蓄沉幾之力或不及焉施爲欲似千鈞弩磨礪當如百鍊金願益㽞意則不朽之業終當在執事且夫直前太銳近於用壯取必太過近於浚恒在易固有戒矣惟幾也能通天下之志惟深也能成天下之務自古欲以成務而或僨焉者未必盡是庸人或豪傑與有責焉耳僕少頗負意氣屏廢以来槁形灰心之餘化爲繞指柔焉乆矣以此自量乃欲以此量豪傑固知必且爲笑然以敬慕執事之至也故不敢不盡其愚荅楊小竹僕嘗聞於方州而淂執事之爲人以爲惇樸勵行篤信古道恬淡有守不樂仕進時則已心慕之毎以無由淂一奉教爲恨適枉千里書札益感同聲氣之義也甚幸甚幸但辱推奬過厚深非鄙陋所敢當又甚自媿耳所示後言巳十閱其五六尤見髙志逺識雖然中夜有得隨即劄記尚不免揣量探索其與黙而識之者意思自别此二程所以不滿于横渠也若使急于立言以明道則是所謂有迫切發露之象而妨於沉潜涵蓄之實此又昔賢之所以致疵于文中也聖學終日發憤只是一事若, WYG: ''}
