  - {type: variant, offset: 507, length: 2139, content: 不遺餘力不責近効不狥人情不爲文飾庶幾有一番變動耳如僕輩只求作一自了漢足矣人情進學一節本非大事但近年以来士夫以此請囑罔利後生以此奔兢忘恥風俗不美此其一端願吾丈始終杜塞此門葢因吾丈昔所巳行之美而竊敢贊於始終者也與王北涯蘇州曩中秋玄都對月坐覺此心灑然別来時時興懷顧清風朙月未始不常在宇宙間特人心不能常似此灑然耳兄試驗之簿書坌冗之時爲是一箇光景爲是兩箇光景也適承来教深知志士之懷夫易而易知簡而易能者道也愚夫愚婦與知與能而聰明才智之士乃終身役役竭其心思而竟不可冀于有聞者此有說矣非特聲色貨利之能爲心累而種種聰明種種才技種種功業皆足以漏洩精神而障入道之路自非痛與刋落絶利一原則非所以語七年之病而求三年之艾也程子曰今之學者無可添只有减减盡便無事試舉似于兄以爲何如二兄之不言而飲人以和毎一見則眷眷不能别去旣别去則忽忽若有所失而若將繼見之者辱來教知兄之念我則亦然也四明陳約之自同第時便爲肺腑之交後在郎署間無歳日不與之同亦有白首同歸之約不謂此兄便爾長逝心切痛之此兄心事峻潔惜世人知之少其志所欲樹立于世又以早死不及自見獨生􅊭喜爲詩其用心甚苦亦以早死不及究意以與古人作者爲徒也故其所可存者僅此若干首而巳吾兄雅意憐才欲爲入椊嗟乎死者有知其亦可以無恨于埋沒矣乎更欲得兄一言冠諸其首則斯文終當賴兄以長價也僕亦謹拜兄之賜矣約之尚有文字一卷俟更查出寄上西原乃兄物故則其遺稿未及流傳人間者當益零落奈何西原集序文俟少從容須興到乃作之今未能也世事日新江湖之憂殊不可言何日更與兄一面談也然湛泉得此結裹不失爲好男子矣三請教之私積于隔歲㑹使節不在郡中我懷耿耿遂往候荘渠先生之疾不謂此翁捐館三日矣感慨平生可勝悲怛至於殄瘁之嘑則海内志士之所同也去年失一涇野今年失一莊渠海内若而人者有幾生成之難而凋謝之易若此悲哉悲哉其家以遺言見示敢奉兄覽竊惟吾兄以正直自持人或以爲落落而宦跡所至則西原莊渠兩公獨爲相知兩公立心操行卓然共爲一世偉人其死而無後亦復相同西原之死也吾兄爲之悉力經紀其後事有如骨肉是以同志中皆推吾兄之髙誼今之所以處莊渠者豈異西原哉聞之其家此翁且死亦自欲以後事面託之兄然兄之心豈以其嘗面託與未嘗面託爲異也遺言所載望吾兄爲之主張其間本朋友之情行之以官府之法以爲可乆之計此不惟見死生之交其所以扶持善類者意亦深矣諸淂欲面請者萬萬不能悉與胡青厓同知向承枉顧草堂極荷見教兄之蒞民事也又三四月矣不知一體之愛今日真實試驗處自覺何如平時意見議論試之煩瑣艱難處自覺已是實受用否古人問學只從實地著工夫不渉言說亦無玄妙不弄聰明不卑階級苦心志勞筋骨庸言信庸行謹是真實不誑語也兄之髙明願更有以教我二閶門分手後歸坐草堂計日以待兄之来而未得也兄言虎丘之遊時時返觀滲漏尤甚又云臨事自覺常常有之即此數語深見吾兄用工之密至於滲漏二字則一口道破後學者公共病痛如僕尤宜深省者也雖然卽此返觀自覺處便是撥轉機關脫凡入道之路兄更自驗之返觀自覺後常常意思如何能接續不斷否頻復敦復正在此處辨之耳兄之治孳孳職事無一點謫官之態人知之兄自知之僕不能贊也兄所謂返觀自覺處亦兄自知之僕不能贊也僕之意頗以爲兄於世間伎倆世間好事不免有多掛胸中處且夫滲漏多正坐兜攬多耳此昔人所以貴於絶利一原不如是則不足以收斂精神而凝聚此道也弟葢亦沉溺扵彼者年来漸自知非欲痛於埽除而習氣纏繞擺脫未能今復爲是言以請於兄所謂病人解說病也惟兄教之嘉香拜惠常如奉明徳之馨不敢不自力洗刷胸中宿穢以承雅意也荅林鎭江㢲峯承示乞休一著奪於當道之不能相體奈何旣不能自遂則勢不得不且聽之大抵此心有礙則進退維谷此心無礙則進退皆宜前書所說冷熱自知可北則北可莆則莆可視事則視事可攝則攝亦何所固必也龍溪之說不知所指但衆口雌黄何所不至且不幸處嘵嘵之地則易缺固其勢然耳不計較毀譽墮不自考計較毀譽墮不自信此兩路頭從何調停謂名節者道之藩籬名節與道是一是二謂之藩籬則所藩籬者其中要是何物吾丈於此固具隻眼乆矣容細請教也自吾丈莅潤以来江鱘萵筍楮筆不知幾畨拜賜矣辭之則疑于自疎不辭則饕餮已甚今復勉顏登領此後一魚一筍不敢更煩使者尤見吾丈之知愛也荅茅知縣鹿門兄始至邑而㢲峯公有所齟齬僕深疑于兩賢之不相厄故嘗懇懇以下交之說勸之㢲峯而復以上交之說爲吾兄言之旣而同心共濟歡然無間則旣免于暌孤之吝而果獲利元夫之吉矣不謂中路乃復猜嫌如兄所示令人太息則是旣脫之弧而又張之弧也若有鬼神焉交鬭其間奈何雖然在㢲峰則不免爲不能容才在吾兄則不失爲動心忍性之大助也自古上下相順則爲益猶少惟上下相忤則操心慮危委曲相濟爲益尤多此昔人以愛惡比之藥石美炙而益之爲卦益用凶事反勝于益之以十朋之龜也兄更叅透此關則何往而非受益之地哉乞歸一節雖所謂冷暖自知非人所能勸阻然願兄更忍性其間而審處焉勿輕爲去就也不能得一面談耿耿何極與裘剡溪推官書昨承示欲賜徐醫扁額謹因尊命輳成兩字曰占恒何如恒者人心之常理古今凡聖不减不增惟其有占不占是以有能恒不能恒之别而恒道實未嘗去人也古聖賢教人雖一曲藝未嘗不與心學相通人能淂此常理設使爲醫則必能究性命之源爲巫則必能極鬼神之情狀一徹萬融所謂因源而得委也古如農轅重黎之徒以聖賢精微之學而爲醫巫師是也若使爲巫醫者知無恒之不可則必反而求之於心念念在有恒上著工夫則庶幾性命之源鬼神之情狀可得而無愧于巫醫葢本欲精其藝而因以達乎其德所謂自委而泝源也如古巫咸醫和之徒因巫醫而知道是也聖人, WYG: ''}
