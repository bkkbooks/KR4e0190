  - {type: variant, offset: 2650, length: 7, content: 只在一占字易曰, WYG: 而挽之禮義亷恥之域使四方之有風俗自畿甸始畿甸之有風俗自明公始非明公今日之責而誰望乎聞太夫人已就養是明公入則承歡於内出則宣力於外其承歡於内也益所以畜其效忠之心其宣力於外也益所以推其養志之施葢兩不相妨而交相益也此深可為明公賀矣養齋翁考滿歸遂欲乞休但山林中得此翁於鄉俗極有益仕途中又少却此翁為可惜耳然其意已决矣又曩承手教諄切皆道義肝膈之語感幸感幸至於所論學術之虚誕與其毫釐之差則皆足以惑世而害道此切中當世學者之膏肓鄙人亦嘗深憂之而未及面請也先行其言而後從之言非}
