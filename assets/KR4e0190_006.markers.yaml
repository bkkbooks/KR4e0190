  - {type: variant, offset: 4144, length: 13, content: 及焉以爲非得更奉周旋三兩日, WYG: 心其於巖穴之士之賢者亦何嘗敢忘相與切磋之心哉其於卑鄙齷齪越禮放法者固未嘗敢有雷同隨俗之心而其間尚可告語轉移者亦豈敢遂無憫惜愛䕶之心而遽疾之如讐者哉甲科之與巖穴本無揀擇而感應則隨其所遇峻拒之與憫惜本無作好惡而曲成則因乎物情此天}
