  - {type: line-break, offset: 0, content: '', id: KR4e0190_SBCK_001-1a01}
  - {type: variant, offset: 0, length: 2, content: 重刋, WYG: 耳目薰染親相授受故其興起為易而瑄獨崛起絶學之後故其樹立為難其連茹而出也不得不擇其尤者而祀之其崛起也不得不援而進之譬如繁星麗空非五緯不能耀芒而晨星相望則維參與昴嘒然而見微顯闡幽之義也安得牽彼以例此乎此又瑄之無礙於祀典者也故臣以為宜如御史臣瞻臣得仁所疏臣愚昧死謹言}
  - {type: page-break, offset: 2, content: '', id: KR4e0190_WYG_001-13b, image: WYG1276/WYG1276-0191d.png}
  - {type: variant, offset: 4, length: 3, content: 先生文, WYG: ''}
  - {type: variant, offset: 8, length: 1, content: 卷, WYG: 巻一欽定四庫全書荆川集巻二明唐順}
  - {type: page-break, offset: 8, content: '', id: KR4e0190_WYG_002-1a, image: WYG1276/WYG1276-0192a.png}
  - {type: variant, offset: 10, length: 678, content: 一賦游盤山賦薊州名山也羅戶部邀逰惟隂陽之陶冶冥賴倒乎兩儀天星殞而爲石駭滿山之置棊捜萬象以效珍何殊状而相亞或藉草而羊眠諒仙術之幻詐或負嵎而虎蹲詫飲羽之神射或危臬危臬而欲走類靈鞭之叱咤或屹立而不動豈思婦之所化既簇隊以縱横亦累卵而髙下紆十歩而九曲枉矢乎石鏬逮礧磈之歷盡忽㧞起乎孤峯俯子孫之千億儼髙峙而稱宗倚禪宫而凝睇曠天宇之澄空向之紛紛恠石忽若懷寳而藏弓但見夫萬木蓊翳而青䓤一勺之泉大旱而不竭兮人言其下潜乎蛟龍女蘿薜荔紛披而交映兮七十二寺隱見森羅乎其中疑有悲歌慨慷之士不得志而自隱與夫仙靈逸客徃來而相從欲即之而無路兮時見一二野僧啓巖扉而鳴鍾侈佛廬之繁夥歷歳乆而不蕪饒萬樹之梨栗以衣食乎其徒何藂木之岑欝無一鳥之孤棲餘邊城之殺氣警羽鏃而遐躋泉觸石而鳴筝松受風而響濤時琤琮而乍噎倐悲吟而怒號憶連旬之廵歷饜金鼓之嘈嘈審聞性之不異任羣籟之相遭適儻而延佇忽四山之暝色謝耳目扵送迎向僧齋而偃息恍夢景之如醒覺餘興之未極晨起歷乎上盤境逾竒而路逾棘方踳躬而俯穿又縮足而仰捫驚半踵之在外愁欲度之猱猨得平柯扵髙頂接雲間之飛翼山童秃而無木響草蟲之唧唧岫逺拱而㦸森岡近繞而弧彎乃下瞰乎城郭曾不盈扵一環類黄鵠之再舉見紆曲而覩圎方悲人生之局促恒豐蔀以自藏眺溟渤之南匯子碣石之中巉轉秔稻扵東吳駛萬里之雲㠶笑卅鍾而石致曾不及乎凌波之艬連岡北矚天設梐枑列墉分戍隔限戎虜把都打來孰敢予侮嗤熟夷之桀黠乞哨卒之餘爼雖㷭火之暫虞嶷金城之永固惟山勢之既極俄湧塔之天造顯佛牙之光恠騰麗空之硨碯覽小道其若斯信精神之爲寳胡俛仰而成陳忽徬徨以囬歩悵中心之有違足屢却而返顧與流泉以偕逝睠巖阿而長憶豈淹留之無心畏簡書之偪仄, WYG: 撰}
