  - {type: variant, offset: 3637, length: 280, content: 狂歌行贈孟中丞有涯我生苦纏縳雅志在泉石不嫌歩兵散翻笑中散窄前年奏賦天北隅頗道君王愛子虚衣冠對日趨香署劒佩通宵過紫衢紫衢香署千官聚五陵豪氣徤如虎鸚鵡何曾慣錦籠爰居元不識鍾鼓焉能俛首學侏儒局促羞爲轅下駒從古長安誇巧宦張湯爲智汲黯愚以兹謝病且歸去釣竿逺拂富春樹終日遭逢眼未青三年塵土衣猶素今日亦何日忽如入塵門公也襄陽夫子之耳孫升堂更不問寒温寫盡肝膈相與論朝看賢隱山暮折申臺栁坐我白玉筵勸我青荷酒談詩公作指南車對局誰看射雕手君不見中郎倒屣迎王生又不見北海忘年交禰衡相知何必結交早一言合意千金輕狂歌未㫁壺未傾門外驚聞征馬鳴落葉東還西亂雲縱復横花間月下儻相憶請公誦我狂歌行, WYG: ''}
