  - {type: variant, offset: 0, length: 16618, content: 重刋荆川先生文集卷之十七雜著鴈訓執徐之歲有鴈集于顧舎人第舎人筮之得小過焉其繇曰飛鳥遺之音大吉博物先生聞而徃賀之至則蹠華公子在焉公子謂先生曰鄙人聞之人事占幾天事占符幾罔舛盩而能垢符罔闇沕而弗彰蓋昔者玄鳥集㦸黄雀投環游龜像紐墜鵲化印斯瑞眇乎瑣哉然猶薦紳動色焜焜燿燿若天授幽契而神卑秘寳焉者矧夫鴈抱陽背隂羽蟲最靈者也廼今歛翮戢翼翩然來賔斯亦異矣於舎人何所當焉願先生爲舎人鋪張而揚搉之可乎先生曰唯唯可乎哉可乎哉請摭僕所聞而公子選焉夫陸杜隰黍秦粟吳粳芬馨狼藉穣穣滿塍爾乃呼儔命侶唼喋蹂踐一飽恒餘群㗖每饜此盖飲食之至樂也舎人嘗羮内饔割肉大官滑脆脭膿溢腹盈飡若是何如公子曰夫繫稻梁之謀者忘冥冥之志沈豢養之適者違性命之和老子曰五味令人口爽願聞其他先生曰文獸眎皮珍禽辨羽爾乃披黼戴黻純緅雜緇纎毳似鬒温氄方綈甑翃􅨎翨翷翾差池濯泠波以修容颺輕颸而整儀若夫東海獻朱上林呈白匪恒理之所窺亦云極態而盡飾于是使鸚鵡羞緑山雞讓錦此盖羽儀之至文也舎人綰銀垂黄錯以絺藻顧歩流暉折周展耀若是何如公子曰古之言章服者特以殊等威别上下而巳非以為侈榮極觀也且令聞𬒳躬安事文繡哉先生曰欝埜茂林平皋廣澤罻羅無所安施矰繳爾廼頡之頏之翔而後集輟雲霄之勁翰指天地以假息故易著漸磐詩詠遵渚豈比夫鳩蹌踰乎榆枋鷾鴯卑棲于簾廡者哉此盖居處之至適也舎人待詔石渠之庭侍直承明之闈栖遟雲陛偃仰華榱若是何如公子曰儒者以禮義為安居未聞文軒夏屋之為快也且夫東方朔陸沉金馬奚足道哉先生曰神頡作書實始鳥跡而鴈以字稱焉觀其隊矯朋騫翕趿紏紛一從一横乍合乍分既錯落而成點亦聮綴而為畫拂素霓以施鉛依玄霞以和墨於是掩蝌蚪之竒形奪蝸蜒之巧篆此盖法象之至章也舎人搦碧玉之管操文犀之觚斯籕是摹鍾王為徒若是何如公子曰書者六藝之一耳且夫餘墨成池敝頴成塜固已勤矣無廼非古人所游藝者哉先生曰秋空泬㵳金波皎晶川原􅌄窱百籟収聲爾廼楊吭鼓頰載飛載鳴啁哳嗑􅊱嘹嚦呷軋或趂群而響駚或候侣而聲遟或雙呼而雝雝或单噭而悽悽或中㫁而更續比律吕之相諧于是􅔏鶴為之罷唳鳱鴡為之噤舌羈旅聞之而遐思離妻聞之而扵邑此盖聲音之至極也舎人擅中吳之逸韻汛下里之煩吟攡篇掜句鍧玉锵金若是何如公子曰歌賦尚矣然雕蟲篆刻哲人刺焉願先生少益其說也先生曰積石草腓交河凍合峨峨層氷皚皚疊雪爾廼審圎方之闔闢謝坎維而向離服匪垂翅于寒門爰晞羽于暘谷異徃來于玄鳥類屈伸于尺蠖此盖消息之大時也舎人始焉豹隱吳門廼今遘休際昌連茹彚征以應鴻漸豈徒曰好爵是嬰若是何如公子廼俛首深思而未答也先生遂推而進之曰夫鴈有六徳焉知時寒燠智也時去時來若有約劑而不爽者信也御籚以避戈慎也締偶不亂者介也能群者仁也群而有序者禮也舎人俻姱葆真襲華振若畜兹六徳協于禎祥若是何如公子乃雀躍而起喟然而嘆曰嘻吁休哉夫晰萬物之精者不以通塞異觀究天人之際者不以幻化眩見故履幾莫如謙謙承符莫如兢兢謙謙者人益之兢兢者天庇之然則來鴈之為瑞也盖亦主人之自求多福哉詎不閎哉彼諦圖測諜以覬靈者末矣于是舎人再拜謝先生先生乃去讀春秋春秋王道也天下無二尊是王道也禮樂征伐㑹盟朝聘生殺之權一出於天子而無有一人之敢衡行無有一人之敢作好惡作威福是王道也是故大宗伯以賔禮親邦國而以間㑹發四方之志天子廵守諸侯既朝則設方明而盟是㑹盟者天子之權也其或不出於天子而私㑹私盟者罪也故春秋凡書㑹書盟者皆罪之諸侯朝於天子而諸侯之自相與也有聘禮無朝禮凡其不朝扵天子而私相朝者罪也故凡春秋之書如書朝者皆以罪其朝者與其受朝者九伐之法掌於司馬而天子賜諸侯弓矢斧鉞然後得顓征伐雖其顓之亦必其臨時請命於天子而後行是侵伐者天子之權也其不出於天子而私侵私伐者罪也故凡春秋之書侵書伐者皆罪之諸侯之大夫公子雖其有罪必請於天子而後刑殺焉其不請於天子而顓殺者罪也故凡春秋書殺大夫殺公子者皆罪之夫侵伐有貪兵有憤兵有應兵有討不睦有以夷狄侵中國有以中國攘夷狄有以中國借夷狄而戕中國者故戰有彼善扵此者要之無義戰盟㑹有解讐有固黨有同欲相求有同力相援有同患相恤有以夷狄受盟有以夷狄主盟者故㑹盟有彼善扵此者而要之無義㑹義盟殺大夫有誅叛有討貳有愎諌有借以說扵大國有為強臣去其所忌故殺大夫有彼善扵此者要之無義殺是故春秋自于稷澶淵兩㑹之外並不書其故而至扵盟㑹侵伐則絶無一書其故者非畧也以為其㑹其盟其侵其伐其戰既足以著其罪矣不必問其故也殺大夫必名亦有不名而但書其官如宋人殺其大夫司馬者亦有併其官不書如曹殺其大夫者此非畧也以為義繫乎其殺之者而不繫乎其殺者義繫乎其殺之者則其殺也足以著其罪矣義不繫乎其殺者則不必問其為何人與其為有罪無罪焉可也說春秋者不逹其意而瑣為之說曰其㑹也以某故殺某大夫也以某故至於盟戰侵伐亦然是皆無益於春秋也而徒為蛇足之畫者夫春秋經世之書也其經世也以正亂賊也易曰臣弑其君子弑其父非一朝一夕矣不早辨也說春秋者亦云人臣無将夫人臣而竊其君侵伐㑹盟刑殺之權其為将也甚矣人臣竊其君侵伐㑹盟刑殺之權而乆假焉而莫之㱕也其為漸也甚矣故臣子至於推刄於其君父而春秋書某國弑其君某某人弑其君某者是弑之成也是春秋之所痛也人臣而竊其君㑹盟侵伐刑殺之權是弑之漸也将也是春秋之所辨也孔子嘗自言之矣曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出無道而至於自大夫出無道而至於陪臣執國命嗚呼是春秋之勢也挈其漏於陪臣大夫者而還之諸侯挈其漏於諸侯者而還之天子是春秋之撥其亂而反之正也夫周自東遷以前雖王室巳不競矣而其權固在也幽弑而平徙岐豐之地委為草莽瀍洛之外聲教阻絶于是尾大之勢成而諸侯横變易禮樂馮衆暴寡大小相朝強弱相刼無一不出於諸侯者而天子曾不得尺寸之權矣盖周之盛王道行頌聲作而其可見者莫如詩雅蓼蕭湛露是諸侯之㑹同於天子者也􅊮弓是諸侯聴征伐之命於天子者也出車采薇是天子之自為征伐而四夷不敢侵叛者也故曰詩亡而春秋作詩未亡天子之權存詩亡天子之權䘮春秋収既䘮之權而還之天子者也春秋所以接詩亡之後雖一日不得緩也文宣而下則諸侯又不能自執其權而大夫之交政於中國者攘攘矣三桓六卿七穆孫寗魚華陳鮑擁兵樹黨而主勢孤矣葬原仲而私交始矣作三軍舎中軍而魯之權罄於大夫矣盟溴梁盟宋而天下之權罄於大夫矣衎出奔孫陽州孫越入彭城入朝歌入晋陽而大夫之為禍烈矣盖天下之勢愈下而春秋之治之也愈詳桓僖以前列國之大夫惟特使而與魯接者則名之而㑹盟侵伐則大夫未有以名見者夫救徐大夫特将也翟泉大夫特盟也春秋第曰人曰大夫而已不以名見也若此者非畧也以為不繫乎大夫也文宣而下侵伐㑹盟大夫未有不以名見者雖溴梁之㑹其君在也而大夫盟書雞澤之盟君既盟也而大夫盟書若此者非煩也以為繫乎大夫也不繫乎大夫雖夷吾隰朋狐偃趙衰之勲且賢未嘗以名見焉繫乎大夫雖劣如欒黶荀偃高厚華閱則瑣瑣以名見焉不繫乎大夫雖其君不在而大夫特盟則亦弗詳焉翟泉是矣繫乎大夫雖其君在而大夫綴盟則亦詳焉溴梁雞澤是矣不繫乎大夫雖主帥亦畧而人之桓僖以前侵伐書人者是矣繫乎大夫雖偏禆亦牽連而名之鞍之戰是矣其弗詳大夫者以專治諸侯之為亂賊也其詳大夫者以併治大夫之為亂賊也說春秋者不逹其義而曰人大夫貶也夫書人為貶彼黶閱之徒以名見者乃為褒也耶惟曹薛滕許之大夫始終書人說春秋者曰小國無大夫非也夫此數君者且為人役之不暇而未嘗敢執天下之權也而况其大夫乎盖不繫乎其大夫是以終始人之而弗詳今曰書人為貶則曰齊晋諸大國之大夫偏受褒而曹薛滕許之大夫偏受貶耶侯犯南蒯弗狃陽虎之徒出則大夫又不能自執其權而陪臣寔執之矣墮郈書墮費書圍成弗克書竊寳玉大弓書得寳玉大弓書而春秋之正陪臣者又詳矣故孔子欲徃公山佛肸之召而曰吾為東周云者即春秋書墮費墮郈意也是春秋之終也或曰盟葵丘盟踐土師於召陵城濮說春秋者以為聖人予之也今亦曰是禮樂征伐自諸侯出也而奪焉可乎曰是不然矣桓文之未出也權雖不在天子而諸侯亦未能盡得天子之權也盖其權散桓文之既出也則權既不在天子又不在他諸侯而桓文獨盡得天子權也盖其權聚譬之主人有千金焉而竊之者十人雖金巳不在主人矣然十人而人得百金焉尚未足以當主人也而竊之者一人茍一人而併千金焉則是疑於主人也權之散臣悖於主權之聚臣疑於主故較利害則權之散而交闘猶不若權之聚而可以紓禍息民語王道則權之聚而疑主猶不若權之散而未有所属隨之屯曰隨有獲人隨而我獲之未害也而謂之凶豫之坤曰由豫由我致豫未害也而六五以為貞疾故桓文者臣之凶而主之所以貞疾者也且桓文以前諸侯固有相朝者則亦一二小邦而已猶未有六服群然相朝者固有私盟㑹擅侵伐者則亦一國兩國相讐相結而巳未有舉中國而聴於一人未有十餘國而共攻一國者是天子之權未有所属也桓文之興五年一朝三年一聘而諸侯之玉帛相率而走扵其庭天子黼扆之前乃不得一人秉圭而北面者彼齊晉亦偃然受諸侯之朝巳而終其身未嘗一渉天子之庭也衣裳之㑹兵車之㑹未嘗有一介請于天子也是故紏合諸侯同奨王室未有如葵丘踐土者諸侯之群然役属臣僕於諸侯亦未有如葵丘踐土之甚者戎狄攘斥中夏乂安未有如召陵城濮者而摟諸侯以伐諸侯亦未有如召陵城濮之甚者說春秋者不逹其意而曰㑹於某盟於某是聖人以諸侯授之齊晉也夫王室之不競也諸侯既巳盡折而入於齊晉矣聖人不能挈而還之天子也其又推而授之以益其逼也耶夫權自諸侯出不問其如何而均謂之無道敵國相征不問其如何而均謂之無義不知禮樂征伐之出於桓文也其為道耶其為無道耶桓文之戰其為義耶其為無義耶使桓文而誠於勤王誠於攘夷急病而其柄則倒持也其分則上陵也聖人猶必律之以法而桓文且将為法受惡矣况其借名勤王而實則自殖陽為急病而隂欲養亂哉㓕譚㓕遂本以自肥執曹卑宋為譎巳甚桓之末年侈然有封禪革命之心而文至於請隧以葬此其去問鼎者無幾耳又何以責楚也然則聖人所稱民免於左衽而仁之何也曰是聖人之顓論功也而春秋者顓以明道也榖梁氏曰仁不勝道存王室也然則說春秋者曰謹華夷之辨何也曰此誅亂賊之一也夫春秋之所夷者吳與楚楚之告鬻熊為姬文師國於江漢之間而太伯端委以臨吳盖皆神明之胄矣荆人不道間周之亂革子以王叢毒上國吳亦相效而王是亂賊之尤也是以春秋從而夷之春秋諸侯中其顯然為逆者莫如楚吳其隂逆而陽順者莫如齊晉如㫁獄之家吳楚則功意俱惡齊晋則功遂意惡功意俱惡故聖人顯誅之顯誅之故其辭直如卒不書葬君臣同詞之類凡皆直辭也功遂意惡故聖人隂奪之隂奪之故其辭㣲如邢遷於儀夷城楚丘狩河陽之類凡皆㣲辭也夫小雅未廢而四夷不敢交侵小雅盡廢而後四夷交侵春秋始書荆入蔡以獻舞㱕則其躅蹢之勢巳見桓文奮而扼之其鋒稍阻文也沒而晉覇衰而楚人之圖北方者遂日長而不可制是故春秋書荆入蔡此覇之未興而楚猾中國之始春秋書次于厥貉此覇之既衰而楚窺中國之始盖桓文之所以扼楚者其力有難易而楚與中國之所以盛衰其幾有倚伏桓起於海濵而所從者宋衛陳蔡皆弱國故謀之十餘年結江結黄連十二國之師而後能服楚於召陵文據表裡山河之固而所從者齊秦皆勁國故反國一年僅連三國之師而遂能克楚於城濮一戰而殺其專兵之将然晋之克楚也得䇿於結秦而晋之不競於楚也失䇿於讐秦自殽之役而秦晋相讐殺者歴四五世戰彭衙戰令狐戰河曲積十餘戰而不解是晉人自失一強援自生一強敵失一強援則其氣力不完強敵伺近則其勢不暇於畧逺故晋覇之衰而楚益横者殽之役實然說春秋者乃曰殽之役春秋許晋襄繼覇吾不知也夫楚荘者又蠻酋之雄耳而逺交秦巴近攻陳鄭則是晋之讐秦非特生一強敵乃又借盗以兵也春秋書楚人秦人巴人㓕庸而楚之謀益狡矣書楚子圍鄭而中國虎牢之險淪於夷矣書宋人及楚人平而南北衡矣天下之勢一變也雖然于時諸侯固有附楚者而猶未敢公然附楚也晋雖已不能盡得諸侯而猶未肯甘心以諸侯委之楚也蜀之盟謂之匱盟盖諸侯猶惴晋人知之也弭兵之說倡而南北之從交見於是中國諸侯公然朝楚向之玉帛於齊晋者盡在楚矣申之㑹空中國而聴焉齊晋之所連以扼楚者今楚人連之以扼中國矣申之㑹諸侯獻六王之禮宋之㑹虢之㑹長楚於晋則是諸侯甘心為夷役而晉人甘心以諸侯委於夷也天下之勢又一變也至於呉越交兵而夷禍極矣書伐郯入州來㑹黄池入吳而春秋所以治夷者又詳矣是春秋之終也或曰楚横而齊晉扼之則是中國果不可無桓文也今曰禮樂征伐自諸侯出也而奪焉夫頼人之功以紓患靳人之權以資敵是責鷹鶻之搏而縶其足也不亦迂乎曰不然吾又有以譬之今有僕於此鳩黨鑄兵而主人弗能令也然盗夜入其室則其僕掲兵嘯黨而逐之以僕為不善也然而足以逐盗以僕為善也然而足以抗主故天下無覇而至於四夷縦横而莫之禁者非天下之幸也天下有覇而至於臣疑於主而莫之恠者非天下之幸也夫春秋之事齊桓晋文是也齊桓晋文之功定而王道明矣王道明而亂賊懼矣或謂春秋誅亂賊者誅其弑君者也曰若是則春秋所誅者止於弑三十六君之人耳其亦狹矣然則所謂誅亂賊者何也曰治弑也治諸侯之專也治大夫也治陪臣也治夷也凡無王者皆亂賊之道也書河圖洛書卦未畫書契未作而造物者巳出此二圖示人盖天機之始洩而數之所由肇也元氣醖醸而滋潤生焉其𥘉一泡形也故一為水滋潤者氣必煖故二為火氣煖者必鬯逹故三為水鬯逹者必堅凝故四為金萬物始土終土者冲氣也此五氣者一氣也非相待而生也故圖書皆以五居中一冲氣也一得土而六成二得土而七成三以八成而四以九成也亦然四氣一冲氣也洛書緃横皆十五一冲氣也河圖虚中五而以十數均之四隅則西北二老為朋得二十五東南二少為偶得二十五一冲氣也冲氣也者所謂人受天地之中以生者也聖人則之而畫卦得中則多吉不中則多㓙悔吝取乎此也河圖圎而洛書方邵子曰圎者天也紀暦之數其起于此乎方者地也畫野分州之法其起于此乎貟為天而陽下隂上者在天則地道上行故陽不亢隂也方為地而隂隅陽正者在地則不居成功故隂不疑陽也貟左旋而方右行天水違行之象也使皆左旋而皆右行也其不相遇乆矣故曰易逆數也天地暌而其事同也男女睽而其志同也萬物暌而其事類也在人則懲忿窒欲與復其赤子之心皆逆之用也其用逆而其機則順也圖書皆以五居中而一居下者此尤造化之精意至於天地之數五十有五而大衍之數五十既虚其五其用四十有九又虚其一其五者中之五其一者下之一也此尤聖人代造化洩盡精意處也故曰其用四十有九則五與一皆勿用也一點在下者即五中之一點也萬物發用在中而根荄在下以天地言則雷復地中以鍾律言則元聲潜萌于黄鍾之𬋩在修養家則陽氣發于下元隂極在聖人之學則洗心退蔵於密是故聖人係乾以見天地之心乾者一數也而尤慎重於乾之𥘉爻曰潜龍勿用而聖人又係之曰陽氣潜蔵曰陽在下也其蔵潜者非謂有時而發用也即發用而常潜蔵也在其下者非謂有時而在上也其上者不離乎下也乾卦所謂勿用之潜龍者大衍所謂勿用之一也四十有九之用至矣而未始離乎一也見躍飛亢六位成矣而未始離乎潜也勿用則神矣故六子有事而乹坤無為也此圖書之所以一居乎下而數之所以始乎一也嗚呼非知徳者孰可與言勿用之妙哉書秦風蒹葭三章後嘉靖戊申秋七月廿五日夜雷雨大作萬艘震蕩平明開霽則河水増高四五尺矣余與禇生泛小舠如陳渡臨流歌嘯渺然有千里江湖之思因詠秦風蒹葭三章則宛如目前風景而所謂伊人者猶庶幾見之且秦時風俗不雄心於戈矛戰闘則癢技於獫歇射獵至其聲利所驅雖豪傑亦且側足於寺人媚子之間方以爲榮而不知愧其義士亦且沈酣豢養與君爲殉而不可贖葢靡然矜俠趨勢之甚矣而乃有遺世獨立澹乎埃壒之外若斯人者豈所謂一國之人皆若狂而此其獨醒者歟抑亦以秦之不足與而優游肥遁若後來鑿坏羊裘之徒者在當時固已有人歟余獨惜其風可聞而姓名不著不得與鑿坏羊裘之徒並列隱逸傳然鑿坏羊裘之徒以其身而逃之蒹葭伊人者乃并其姓名而逃之此又其所以爲至也噫嘻士固有不慕乎當世之榮而亦何心於後世之名也哉因慨然爲之一笑遂書以示褚生書王明齋卷王君明齋精史頡氏之學愽通諸家於易尤多所自得嘗以古文書六十四卦名以還科斗之舊而稍爲之訓注使讀者觀於卦名即卦爻之義了然葢不待觀象而後思過半也余見而恱之君因書一𥿄遺余而索余爲之草書舊詩於册用以相報君始以欲學余論易故擕所注易自姑蘇來寓天寕僧舍者半閱歳余雖頗竭鄙陋以請於君君所注易與余之說兩人或相印可或不相印可或始不相印可而卒相印可或始卒竟不相印可然率余得之君者爲多而余自知竟不能少禆君也至於詩歌盖昔人所謂雕䖝末伎宜為談經者所不道而草書出東漢芝象以後昌黎氏鄙之以為俗書逞姿媚者也况余於此兩者又素不工哉且夫君以經易教余余竟投之以雕䖝之技君惠我以科斗頡氏大古之書而余乃報之以效近俗姿媚之書其不相稱甚矣然不知君又何所取也漫書以㱕之書丁近齋示孫卷後丁生輈從予遊出其大父近齋翁家教之語凡二𥿄其一教之以勤讀書取科第盖世俗教子弟之常其一教之以决擇於君子小人兩儒之間則固以古道望之而有世間家人語之所不及者矣然翁所教輈以勤讀書寔舉予為况盖余之少也或然其後年既長大則已知記誦佔俾詞章之習非所以反身而崇徳况今益衰且病精力日减於是經年束書不一觀與絶不為文者亦徃徃有之則是余之壮且老也既已與翁所責輈少時懶散廢書之状幾無以異矣其尚足以為輈之所取法而無愧於翁之所稱述者哉然至於君子之儒則未嘗不竊有志焉而願與輈共勉焉其可也書王龍溪致知議畧世間茅葛議論已自充塞更無一片寸草不生地歩王老於其間又畨窠倒臼又撰出一種馭氣攝靈一息一息等語又是一塲孽怪且三教之說正苦分也分不清曰其息深深曰反息還虚曰向晦入宴息扯來扯去又却攪做一團糟此等語言自謂洩却单傳秘蔵却起世間鉅儒諸老先生無限争端不止如曩時實格物而虚致知之說也昔時已病其推儒入佛今且病其推儒入道異日王老又将費力分䟽越分䟽不下此時當服老拙屢中之億耳王老試觀為此語者其㑹得王老宗㫖其㑹不得王老宗㫖題大營驛荘子以子之於父為命之不可解以臣之於君為義之無所逃意若以君臣為強合予嘗疑其不然觀岳侯所題大營驛壁其處心積慮未嘗一日不在於復中原迎二帝眷眷然若赤子之於慈母然此豈無所逃而為之其亦有所不可解者乎侯之言曰君臣大倫根於天性此侯之所以自状而吾之所謂異乎荘生者耶彼高宗者乃忍於忘父臣虜其獨何心且已既已忍於忘父矣有臣焉為之急於其父如侯者亦竟殺之又獨何心嗚呼綱常萬古事也其磨㓕與不磨㓕只在此心之死與不死而巳高宗之為心何如也宜侯之竟以殺身而中原卒不可復二帝卒不可還也大營驛故在永州侯所題字乆而湮没余父為是州乃勒之而因并侯所題廣徳金沙寺勒之盖侯之心尚炯然在宇宙間未死也固不係乎石之勒與不勒雖然使忠臣孝子英雄之士過而讀焉其将慷慨泣下沾襟而繼之以怒髪衝冠者乎書醫施氏婦事語曰物反嘗為妖腥穢之氣薰積世界乃有賊殺其大父者及其弟之婦與弟之婦之大父兄殺者三人其兩人即時死婦尚喘息未絶始某殺大父時婦奔呼某怒其呼也追而㫁其頸至骨又刲其口婦忍死齒刀賊以手椎刀至齒根骨乃止刀前後所輳其不絶者一線耳見者莫不憐之亦莫不以爲必死㑹余徃無錫知金創徐君素有神効而婦家貧甚不能請醫余邀徐君謂之曰君能一徃乎徐君激於義舉遂欣然請行曰我不求一錢必活此婦是我心也因與余俱至則婦勢巳亟矣徐君視之曰無恙也醫三日而腐肉盡新肉生又二日而口輔上下肉合頸肉起如䔒蕾状徐君曰生矣始余迎徐君至時余兩弟及親友劉宗尭左升甫徐子𥘉軰聞之亦喜甚曰是吾軰之心也至是徐君告㱕諸友請醵錢為贈不約而合者若干人得銀二兩有竒徐君曰非吾所為來意也余強之曰固知非君意也雖然願少抑君之意以成諸君之義可乎徐君乃不能固辭嗟于此可以觀人心矣徐君慨然不逺百里而來也其何所為哉諸君之慨然醵錢以醫婦也其何所為哉方徐君欲行時其妻適及月産子且徐君坐市肆可計日得厚糈君乃舎其妻之急而狥乎人之妻之急舎其有所利於市肆之間而奔走其無所利於百里之外亦何心哉郷鄰之闘雖聖賢亦謂可以無救而簞食之費雖好名者亦所必惜以必惜之費而投之可以無救之闘至於不約而響應若有所踴躍而不能已者亦何心哉孟子曰人皆有不忍人之心此其機在乎通與塞耳塞則骨肉胡越通則四海我闥或謂今人之非古人之心吾不信也遂書之以貽徐君而且以風世之好義者則古昔相保相愛相䘏相周之俗其亦可以興扵今矣瘞河壖枯骨誌髑髏完毀凡若干具其髆髃髀䯒脊脇諸雜骨無筭盖出乎犬猪烏鳶所饜飽與夫日炙燹燒風銷水嚙之餘而僅有存者自癸夘至乙巳東南荐飢流尸順河而下多于河中之船逮水落不能浮屍屍遂積疊河壖乆之維古昔時遇飢饉疾疫則有荒政以聚民其不幸死而暴露則又有掩骼埋胔之令惜哉其不遭乎此時也禇生滔書舎在河壖余與弟正之數徃焉每相與散歩河壖之上則見泥滓間圜者如破甌撱者如枯株碎者如沙礫紛然彌望白日照之星星玼玼若尚有光恠余三人者哀其澌㓕且盡也命役夫裒而坎焉嗟乎古者葬則旌之以銘旌者别也銘者自名也若曰是其人之骸云耳雖後百千年有得之者亦識之曰是某人之骸云耳古人之于骨骸嚴而别亦不欲其混也若是今乃以五方四裔雜流異業之人而又以殘毀不完之尸爾髆我股甲脊乙脇輳于一坎若藂葦亂蓬然亦重可悲矣然余嘗見元虜發宋諸陵事火其尸以其餘骨雜牛馬骨而埋之今此猶尚人骨也嗟乎彼生時何等人也尚不免與牛馬骨同葬况此軰莩丐之餘猶得以人骨附人骨復何憾焉使髑髏果有知如荘生之說必且一噱于吾言矣坎之以嘉靖戊申春二月是掩骼埋胔之時也書瘞枯骨志碑隂始余與禇生之欲瘞枯骨也盖偶有感扵所見而未暇徧所不及見也偶盡一二人之力所能及以無歉乎此心之所感而非有意扵人之我同也偶以河壖不毛之隙地可以瘞焉而非有擇扵其地也巳而朋軰聞是舉者競出錢相助而禇生父怡閒又以河壖地卑濕逼水非所以棲骨乃割菜地之一隅以瘞之於是城旁枯骨得盡瘞焉而又得高燥地以免扵後日水嚙之患嗚呼此可見惻隱怵惕人人所同惟無所感而亦無為之倡者耳使義舉更有大扵此者而有人焉倡之人其有不翕然而趍之若是者哉君子是以知善俗之有機也因書出錢人姓名扵碑隂而附著其說云䟦自書康節詩送王龍溪後玉臺翁云子美詩之聖尭夫更别傳後來操翰者二妙罕能兼古今能知康節之詩者玉臺翁一人而已雖然所謂别傳者則康節所自得而少陵之詩法康節未嘗不深入其奥也康節可謂兼乎二妙者也南江王子深于詩法者也間以余言質於南江南江曰然龍溪王子盖有得乎别傳之意者而亦未嘗不深於詩法也索予章草余為舉似擊壌集數首龍溪盖素以余論詩為然者也雖然詩心聲也字心畫也字亦詩也其亦有别傳乎有草聖之法乎而余兩無得也龍溪亦何取乎䟦周東村長江萬里圖後少陵詩云華夷山不㫁吳蜀水常通只此二語冩出長江萬里之景如在目中可謂詩中有畫今觀周生所畫長江萬里圖又如見乎少陵之詩可謂畫中有詩詩中有畫長江在詩畫中有詩長江在畫然則長江属之詩耶属之畫耶盖嘗登金焦之顛俯江流而太息其将謂之詩耶畫耶書黄山谷詩後黄豫章詩真有慿虚欲仙之意此人似一生未嘗食烟火食者唐人盖絶未見有到此者也雖韋蘓州之高㓗亦湏譲出一頭地耳試具眼參之吾若得一片静地非特㫁葷當湏絶粒矣盖自覺與世味少縁矣然非為作詩計也䟦李懐琳書絶交書後大則虞庭禹水稷穡皋刑以至䕫石益獸各致其能而相資以成治細則匠人審曲靣勢斧斵斤削鋸解鑢磨各致其能而相資以成室其致一也始予見文氏所刻帖中載李懐琳所書絶交書後乃見孫氏所蔵宋刻本則精神相去十倍書之者非有異而刻之者異也雖有善書非善刻者固不能發其精神而傳於世也釋氏亦云譬如箜篌非有妙指不發妙音字刻亦然䟦趙松雪書道徳經後老氏書漢世謂之老易言老與易並也而後世儒者絀之史所記孔子問禮與所稱猶龍之說雖未可盡信然老氏書絶去枝葉還㱕太樸之意則與易上白賁魯論從先進之㫖同其說固不可廢也學者以其見絀扵儒先遂不暇盡心焉余婿白伯望買得邑人卞氏所蔵趙松雪書老氏道經四十二章松雪字畫精絶爲儒家所寳玩而此卷尤得意之書則學者以其所寳玩而因以讀其所不暇盡心昔人謂買櫃而還珠今因櫝而得珠未可知也爲之書其後䟦異僧書心經碑後余始聞江隂觀音寺有異僧書心經碑甚竒恠既欲徃觀之則巳火矣巳而麟陽趙邑侯購得摹本余始得而觀之則如昌黎子從登太華之顛危峯怵目愁不能下眩慄欲死少焉神氣稍定又如東廓隱几而聴天籟之作萬竅怒號口鼻盡奮而各騁其趣之所極而後止吁所謂技盖至此哉雖顛素之奔放狂譎比之此書猶為拘攣䋲墨而不能展矣雖然其竒怪若此而草法未嘗不在也世固有不反經則不合道者非圎機之士誰能信之此書碑既大而摹本亦絶少盖俗眼鮮好之者麟陽既得此本乃付黄生道使再刻石寺中以還其舊嗚呼神物之顯晦固自有時哉數論六篇勾股測望論勾股所謂矩也古人執數寸之矩而日月運行朓朒遲速之變山谿之高深廣逺凡目力所及無不可知盖不能逃乎數也勾股之法横為勾縦為股斜為弦勾股求弦勾股自乗相併為實平方開之得弦勾股求股勾弦自乗相减為實平方開之得股股弦求勾同法盖一弦實蔵一勾一股之實一勾一股之實併得一弦實也數非兩不行因勾股而得弦因股弦而得勾因勾弦而得股三者之中其兩者顯而可知其一者蔵而不可知因兩以得三此勾股法之可通者也至如逺近可知而高下不可知如卑則塔影高則日影之類塔影之在地者可量而人足可以至於戴日之下而日與塔高低之數不可知則是有勾而無股弦三者缺其二數不可起而勾股之法窮矣於是有立表之法盖以小勾股求大勾股也小勾股每一寸之勾為股長幾何則大勾股每一尺之勾其長幾何可知矣此以人目與表與所望之高三相直而知之也人目至表小弦也人目至所望之高大弦也又法表爲小股其高幾何與至塔下之數相乗以小勾除之則得塔高盖横之則爲小股至塔之積縦之則爲小勾至塔頂之積縦横之數恰同是變勾以爲股因横而得縦者也勾股弦三者有一可知則立表之法可得而用若其高與逺之數皆不可知而但目力可及如隔海望山之類則勾股弦三者無一可知而立表之法又窮矣於是有重表之法盖兩表相去幾何爲影差者幾何因其差以求勾股亦可得矣立表者以通勾股之窮也重表者以通一表之窮也其實重表一表也一表勾股也無二法也勾股容方圎論凡竒零不齊之數凖之於齊圎凖之於方不齊之圎凖於齊之圎不齊之方凖於齊之方勾股容圎凖於勾股容方假令勾五股五弦七有竒此為整方均齊無較之勾股其容方徑該得勾之半盖容方積得勾股全積四分之一其取全積時勾股分在兩㢘則勾五股五五五二十五内一半為勾積一半為股積其求容方則併勾股為縦一㢘得十為長之數得濶二五與原勾相半盖始𥘉則一半勾積一半股積横列之而為正方及取容方則股積在上勾積在下而為長方矣其容方所以止得半勾者則以勾股之數均也若勾短股長則容方以漸而濶不止扵半勾矣故大半為股積小半為勾積其始横列時勾積與股同長而不同濶其從列時則股積之濶如故而勾積截長以為濶則濶與股積同而長與股積異與横列正相反此變長為濶而取容方之法也其謂之勾積股積者從容方徑與勾股相乗之數而名之也若取容圎徑則用勾股自之而倍其數以勾股與弦併為法盖容圎之徑多於容方方有四角與弦相礙故其數少圎循弦宛轉故其數多若以求容方與求容圓相比則積中恰少一叚圎徑與半弦和較相乗之數弦和較者勾股併與弦相較之數也假令勾五股五相乗亦倍之得五十如求容方則亦倍勾股為法得二十亦恰得二寸五分之徑如求容圎則不用倍勾股為法而用一勾股併與一弦是以一弦代一勾股併也以一弦代一勾股併恰少一弦和較加一弦和較則亦兩勾股矣假令一勾股得十倍勾股得二十是取容方之徑一勾股得十一弦得七恰少一弦和較三是取容圎之徑其所以少一弦和較者圎徑多於方徑也假令取容圎不用勾股倍積而止用勾股本積則宜用勾股併為㢘而除去半弦和較亦得或約得圎徑之後與半弦和較相乗添積而以勾股并為㢘不除亦得或用勾股倍積用兩勾股相併為㢘而以全弦和較與約得圎徑相乗添積亦得此改方為圎之妙其機括只寓之於弦和較間也至於勾股積與弦積亦只於勾股較中求之盖數起於參伍參伍起於畸零不齊也假令股五勾五齊數之勾股則勾股幕倍之即得弦幕盖兩勾股積而成弦積也至於勾短股長相乗之積則成一長方倍之而弦側不當中徑亦不成弦幕惟以一勾股較積補之乃能使長方為一正方而得弦積盖勾股之差愈逺則長方愈狹長方愈狹則勾股之差積愈多故勾股差者所以權長方不及正方之數以相𥙷輳此補狹為方之法也弧矢論凡弧矢筭法凖之於矢而參之於徑背徑求矢之法先求之背弦差而半背弦差蔵之矢冪與徑相除之中倍矢冪與徑相除則全背弦差也半法簡捷故用其半冪者方眼也自乗之數必方故謂之冪假令徑十寸截矢一寸一寸隅無開方即以一寸為矢冪而以十寸之徑除之該得一分是半背弦差一分若二寸矢開方得四寸是為一寸者四半背弦差得四分三寸矢開方得九是為一寸者九半背弦差得九分皆凖之於十寸之徑故一寸之冪而差一分逓而上之視其冪以為差之多少又假令徑十三寸矢冪一寸則以十三寸之徑與一寸相除每寸該差七釐七毫弱以為半背弦差若二寸矢開方得四該四箇七釐七毫併之得三分八毫以為二寸矢半背弦差此凖之十三寸之徑亦逓而上之視其冪以為差之多少盖徑長則背弦之差减故一寸矢而差止七釐有竒徑短則背弦之差増故一寸矢而差及一分雖其數有增减而凖之扵一寸之冪與徑相除而以漸開之每得一寸則得元差而相併以為背弦之差則其法之一定不可易者也背徑求矢矢背求徑諸法消息管於是矣至於徑積求矢一法古法以倍截積自乗為實四因截積為上㢘四因直徑為下㢘五為負隅與矢相乗以减下㢘而以上下㢘與矢除實今立一法但以截積自乗為實而遂以截積為上㢘直徑為下㢘每一寸矢帶二分五釐二寸矢則帶五分四分而增其一以减徑其倍積四因之法悉去不用頗為簡捷盖徑積求矢凖於矢徑之差矢徑差者矢徑互為升降也矢一寸則該减徑一寸二分五釐矢二寸則該减徑二寸五分而矢徑之差起於積數之不足且夫圎凖於方而畸零之圎又凖於均齊之圎以方為率徑十寸矢一寸則積必是十寸矢二寸則積必是二十寸但得積為實只約矢與徑為從平方開之足矣盖方無虚隅也又以整圎為率徑十寸矢五寸則圎積必居方積四分之三而以四之一為虚隅足矣盖雖有虚隅而其數易凖也惟是矢以漸而短則積以漸而减有不能及四分之三虚隅以漸而加有不止於四分之一者矣於是平方法與四分而一爲虚隅之法皆不可用惟自乗平方之積爲三乗而以四分之矢减五分之徑則不問矢之長短積與虚隅之多寡而其數皆至此而均齊猶之平方之法數有多寡而减來减去必得一均齊之數以爲凖而後不齊者皆齊此天然之妙也夫積自乗而爲三乗方之實則一整方耳而矢數蔵焉及立法求矢則分爲上下兩㢘而矢數著焉盖整方所以聚積而分㢘所以散積𥙷短截長而方圎斜直通融爲一此亦天然之妙也假令徑十寸矢一寸積該三寸五分自乗該十二寸二分五釐上㢘三寸五分下㢘十寸以三乗方開之而一寸無開方則上下㢘如元數共得十三寸五分為㢘法與一寸矢相乗除實恰少一寸二分五釐是為負隅之數所以用每矢一寸則帶二分五釐為凖以减徑然後法實相當也又如徑十寸矢二寸積該十寸自乗該百寸上㢘十寸下㢘亦十寸以三乗方開之則湏以矢數乗上㢘上㢘該得二十寸盖長十寸而高二寸之數以矢數自乗得四而乗下廉下㢘該得四十寸盖高十寸而濶四寸之數上下㢘共得六十寸又以矢二寸為方面與上下㢘相乗除實共二箇六十寸該得一百二十寸其數乃足而元數止得百寸恰少積二十寸所以用二寸五分以除下㢘則該止得七寸五分為下㢘其下廉减去高二寸五分中濶該四寸則四箇二寸五分該得十寸方面二寸與十寸相乗共二十寸恰勾負隅之數所以二寸矢則用二寸五分减法也逓而上之每寸以二分五釐為凖盖雖徑有極長極短而一寸寸矢帶二分五釐减徑之法則定數也徑積求矢矢積求徑徑矢求積諸法消息管於是矣然此二法者背弦之差則隨徑而不隨矢所以均為一寸之矢而其差則有多寡之不齊矢徑之差則隨矢而不隨徑所以但得一寸之矢則不問徑之長短而一例為差此二法之異也若以今法與舊法相通今法不倍積所以不用四因四因者生於倍積也古法之五為負隅即今之一寸帶二分五釐也盖以五乗之矢除四因之徑則亦一寸矢而减一寸二分五釐之徑也然有㢘而無方隅者盖截積止得㢘數也即此二法可見截弧截積之法皆從邊起而凖之於邊以漸消息之矣既得一寸之定差則雖倍蓰十伯錯綜變化而皆不能出乎範圍之外此天然之妙也故曰握其機而萬事理矣其弦矢求徑法半弦自乗為實而以矢除之加矢得徑是徑之數蔵於半弦冪與矢相除而加矢之中也今環而通之以為背弦求矢諸法背弦求矢其半背冪中蔵一箇半弦冪與矢相除而加矢之徑數蔵一箇矢冪以徑數相除為背弦差之數二數消息恰得半背冪本數則矢數見矣假令徑十寸矢一寸半背弦差一分半背數三寸一分自乗得九寸六分一釐其九寸為弦冪所謂中蔵半弦冪與矢相除而加矢之徑數其六分一釐乃是兩半背冪而空其一差亦名差與半背相開方之數即以與其差一分相乗之數所謂一箇矢冪以徑數相除為背弦差之數也二數消息以盡背冪而法可立矣其背矢求弦法若背矢先求出徑而後以矢徑求弦則為簡捷盖半背冪中所蔵弦冪與背弦差冪今以矢冪約徑而以徑除矢冪為背弦差又以矢截徑以矢乗之為半弦冪二數消息恰得半背冪本數則徑數見矣得徑而弦在其中矣其矢弦求背亦湏先得徑而後得背盖半弦冪為實乃以矢約徑以矢减之以矢乗之恰得半弦冪本數則徑數見矣得徑而背在其中矣假令矢一寸半弦三寸自乗九寸為半弦冪為實以矢約徑得十寸以矢一寸减之得九寸以矢一寸乗之得九寸恰與半弦冪相同則為徑十寸矣此背弦矢徑四者相乗除循環無窮之妙也至於徑積求矢則既然矣因而通之積矢求徑假令徑十寸矢一寸積三寸五分自乗該十二寸二分五釐乃以原積三寸五分為上㢘一寸之矢為下㢘以除自乗之積餘數得八寸七分五釐加矢帶數一寸二分五釐則為徑十寸矣又如徑十寸矢二寸積十寸自乗寸百為實矢乗積得二十寸為上㢘再矢自乗得八為下㢘以二乗上㢘消積四十以八消餘積六十得七寸五分加入矢帶數二寸五分則徑十寸矣徑積求矢則積為上㢘而徑為下㢘矢積求徑則亦積為上㢘而矢為下㢘此其縦横徃來相通之妙而一乗上㢘再乗下㢘則三乗開方之定法也積矢求弦則倍其積以矢除積而减矢弦矢求積則并矢扵弦以矢乗積而半其積盖矢弦井之為長以矢乗之而得兩積故半之而積可見也倍之則為矢弦相併之積以矢除之而得矢弦相併之本數除矢而弦可見也徑矢求積則先得弦而後得積盖以矢减徑以矢乗之四因得數而弦冪蔵扵其中平方開之得弦乃以矢自乗以矢與弦相乗合二數而半之則得積矣此又積矢徑弦四者相乗除循環無窮之妙也其徑背求矢法則以半背自乗為實而約矢以减徑以矢乗之為半弦冪而平方開之以减背其減餘之數恰與矢之背弦差數相當則矢數見矣盖半背數中蔵一半弦數蔵一背弦差數故合二數而消息之也徑十寸矢一寸半背三寸一分十寸之徑每一寸矢該差二分二寸矢該差四分為定差今約矢一寸以减徑得九寸以矢乗亦得九寸平方開之得三寸為半弦以除半背而餘一分恰勾一寸差數則矢之為一寸也無疑矣又如徑十寸半背四寸四分約得矢二寸以减徑餘八寸以矢乗得十六寸爲弦冪平方開之爲四寸以减半背四寸而餘四分恰得二寸矢之定差則矢之爲二寸也無疑矣又法半背冪自乗爲實中蔵一箇半弦自乗之數一箇背弦差與兩半背而空出一差相乗之數亦名背弦差與背相開方之數以此兩數與實相消而矢數見矣假令徑十寸半背三寸一分其半背冪該九寸六分一釐約矢一寸與徑相减相乗如前法得九寸以除實九寸而以一寸之差一分與兩半背而空出一差之數得六寸一分與上差一分相乗得六分一釐并二數九寸六分一釐除實恰盡以是知矢之為一寸也又如半背四寸四分自乗得十九寸三分六釐為實約矢二寸與徑相减相乗如前法得十六寸以除十六寸而以二寸之差四分與兩半背而空出一差之數得八寸四分與上差四分相乗得三寸三分六釐併二數十九寸三分六釐除實恰盡以是知矢之為二寸也此其法亦始扵先得定差而約矢與徑兩相消息以得矢也其徑數有長短差數有多寡亦凖此法而通之也在先得定差而已又法半徑自乗為徑冪半背目乗為背冪二冪相乗為實乃約矢以减徑以矢乗之為半弦冪與徑冪相乗以除實又以徑冪除其餘實恰得矢數之定差則矢可得矣盖二冪相乗中蔵一箇徑冪與弦冪相乗之數蔵一箇徑冪與半背弦差冪相乗之數而背弦差者矢之所蔵也假令徑十寸矢二寸背差八分半徑自乗得二十五寸半背自乗得十九寸三分六釐相乗得四百八十四寸為實及約矢得二寸以减徑而乗之得十六寸為弦冪與徑冪相乗得四百以除實餘八十四寸又以徑冪除之得三寸三分六釐恰與二寸矢之定差相合然二寸矢之定差四分而乃有三寸三分六釐者盖始求背冪之時以兩背數相乗則四分寓其間恰得此數所謂差與背相開方之數也以四分與八寸四分相乗得三寸三分六釐故定差四分而其積則三寸三分六釐也以八寸四分除之則定差本數也夫背弦差者矢之所蔵也以差立法古未有之而實求矢之大機也差徑求矢以差與徑相乗平方開之得矢差矢求徑矢自乗以差爲從平方開之得徑而差與弦亦可以求矢徑半弦之冪矢除徑而矢乗徑之數也差者矢冪而徑除之之數也先約徑矢數與弦冪相同而又以徑除矢冪與差數同則得矢徑差與背求矢徑减差則得弦即差弦求矢徑也積者矢與弦并以矢除而半之之數也積弦求矢倍積為實約矢而加之扵弦為從方以矢為法除之則得矢也矢積求弦矢自乗而置虚積與元積相當然後减去矢自乗之冪而以矢除其虚積與元積之并則得弦也假令矢一寸積三寸五分矢自乗得寸添積二寸五分乃與元積相當然後减去矢自乗之寸餘六寸以矢除之得弦六寸也矢二寸積十寸矢自乗得四寸加虚積六寸與元積相當减去矢自乗之寸餘十六寸以矢除之得弦八寸也如不以矢徑求弦得積而遂以矢徑求積則矢每寸截徑寸二分五釐而以矢自乗再乗以乗截餘之徑為徑積然後以徑約積而以積與矢自乗之數相乗添入徑積合為積冪而復以約積自乗亦與前積冪同數則積亦可得矣然不如得弦而後得積之為簡捷也至扵殘周與弦求矢則亦用半弦自乗為實而約出矢數以除半弦冪而加矢為徑乃以徑𥙷出全周之數而以半背數除半弦數餘為半背弦差恰得矢之定差則矢可得矣假令弦六寸殘周二十三寸八分則以半弦自乗得九為實而約出矢一寸以除實而加之得十寸爲徑該周三十寸除殘周數得半背三寸一分除半弦三寸而餘一分恰得一寸矢之定差則矢一寸也又如弦八寸殘周二十一寸二分半弦自乗得十六爲實約出矢二寸以除實而加之得十寸爲徑該周三十寸除殘周數得半背四寸四分除半弦四寸而餘四分恰得二寸矢之定差則矢二寸也數雖如是而起算極周折惟求之弦矢徑三相權則其數可凖盖徑矢求弦則以矢减徑以矢乗之爲半弦冪徑弦求矢則以半弦自乗爲實而以徑爲益方以矢减益方而相乗除實亦是以矢减徑以矢乗之而得半弦冪也弦矢求徑則以半弦自乗以矢除之加矢而得徑由是三者輾轉求之則是半弦冪中蔵却以矢减徑以矢乗之之定數以是約出矢徑而因徑以爲周减其殘周而得背以半背與半弦相較而得差恰與矢之定差相同則矢數無所失矣其有不合則更約之此數雖若眇茫然凖之扵以矢减徑即以矢乗必湏與半弦冪相當則亦未嘗無繩墨也此意玄之又玄非至神莫知也積也矢也徑也弦也背也殘周也差也凡七者轉相爲法而轉相求共得三百二十六法而後盡渾然一圎圈而中含錯綜變化乃至扵此嗚呼豈非所謂至妙至妙者哉分法論差分方程盈朒粟米總是一分法也物有多寡價有貴賤兩物相形巳知物之孰貴孰賤各有定價矣若使兩物總共若干兩價亦總共若干則兩物混雜雖則兩物混雜而總價固相差也於是以價權物則因價之貴賤而差之也未知兩物之孰貴孰賤而但知兩物相參伍之總價若使此三而彼五則價共增若干此五而彼三則價共减若干則兩價混雜而物數固相形也扵是以物權價則因物之参伍而推出價之貴賤謂之方程方程者言物價相檢括有定式而不可亂也差分方程之所不能盡扵是有盈朒盈者有餘朒者不足盈朒者因其外露畸零可見之數而推知其中蔵隱雜不可見之數以㨿末頴而窺全錐也假令物共若干兩價共若干兩兩物混雜而法有不盡扵差分也扵是而盈朒之假令總是貴物則原搃價不足若干總是賤物則原總價有餘若干扵是推乗以齊其數以不足之數乗賤物以有餘之數乗貴物兩物各得其所乗之數以為實而并有餘不足之數以為法而各歸之則物之多寡可得矣此差分之盈朒也未知兩物之孰貴孰賤而但知此三而彼五則價共增若干此五而彼三則價共减若干兩價混雜而法有不盡扵方程也扵是而盈朒之假令此賤若干彼貴若干則原總價有餘幾何此貴若干彼賤若干則原總價不足幾何扵是維乗以齊其數以有餘乗此貴彼賤亦以不足乗彼貴此賤令兩賤自相减兩貴自相减為實有餘不足亦自相减為法則價之貴賤可得矣此方程之盈朒也差分以價權物方程以物權價差分露價而混物方程露物而混價露價而混物故以價相轄露物而混價故以物相参而盈朒通乎其間矣至扵物有以多而易寡價有以貴而易賤扵是有粟米則乗除互換之間而多遂與寡相當賤遂與貴相當而其數齊矣以粟易米則以粟率乗以米率除以米易粟則以米率乗以粟率除以貴物易賤物則以貴率乗以賤率除以賤物易貴物則以賤率乗以貴率除以賤物易皆以本率乗以所易之率除謂之粟米者因粟米以名諸物也六分論數欲以繁而從簡而數之有分者不可以常法約也扵是有約分之法則以子减母以母减子至扵等而後止等數者母子之數所共止齊也必相减而後得之所謂减損求原也然後以等約母以等約子而繁者簡矣數有以少而合多以聚其零散亦有以少而减多以較其多寡而數之有分者不可以常法合而减也扵是有合分課分之法分母不同分子亦異扵是母互乗子以齊其數假令二分之一與三分之二相乗二分之母數本少也與子之二數相乗而為四則雖少而多三分之母數本多也與子之數相乗而為三則雖多而少一互乗而褒多益寡之義著矣諸分皆母互乗子而合分則相併以為實所以為合也課分則相减以爲實所以爲减也其實有相乗相减之異而其法則皆以母相乗盖其始皆母互乗子以爲實則其母亦互相乗以爲法也合分觀其所總而聚散著矣减分觀其所餘而多寡著矣數有多寡損益以取平而數之有分者不可以常數平也扵是有平分之法亦母互乗子而副置之其一相併以爲平實其不相併而㨿諸分之位數凡幾謂之列數名以列數乗其不相併之分子以爲列元是三位相併則以三爲列數原是四位相併則亦以四爲列數以三數乗不相併則亦與三數相併相當矣以四數乗不相併則亦與四數相併相當矣但相併則諸分總得其相乗之數不相併則諸分各得其相乗之數耳以各較總而有餘不足見矣故平實者總也列實者各也非總無以凖各非各無以自凖有總有各而有餘不足見矣列實有餘者以平實凖之而得其减數列實不足者以平實凖之而得其益數减有餘之列實益不足之列實皆齊于平實而後止是若齊扵總也扵是以諸母相乗猶之母互乗子也亦以列數乗諸母之相乗者猶之列數乗諸分子也則分母恰與分子相當以為法以命平實而諸分平矣乗分者乗法之有分者也除分者除法之有分者也其乗分除分皆用通分法假如有銀十兩三分兩之二則無分之全數與有分之零數相碍而不相通扵是以分母三乗全兩其十兩得三十分帶分子二共三十二分所謂分母乗其全分子從之也通分則全數與零數均為一法而不相碍通分之後乗分則以各通分相乗為實分母相乗為法除分則以實分母乗法以法分母乗實而法與實之數始相當而無偏亦所謂變而通也筭經曰學者不患乗除之為難而患分法之為難然必精扵無分之乗除而後能通扵有分之乗除非二致也法有淺深而已矣天地之間聚散分合而巳天氣下降地氣上騰而天地合天氣上騰地氣下降而天地判合則氣發洩扵其外判則氣凝結扵其中其分所以爲合也兵之用聚散分合而巳矣分不分謂之縻軍聚不聚謂之孤旅然聚易而分難其分所以爲聚也韓信多多益辨兵家以爲分數明也數之用聚散分合而巳矣聚小以爲大謂之乗散大以爲小謂之除聚小以爲大則無畸零不盡之數散大以爲小則多有畸零不盡之數矣是以乗法省而除法繁乗法易而除法難也可知矣重刋荆川先生文集卷之十七, WYG: ''}
