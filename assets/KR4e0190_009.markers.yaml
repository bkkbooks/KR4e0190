      ', id: KR4e0190_krp_009-bkkkrnewl902}
  - {type: line-break, offset: 15721, content: '', id: KR4e0190_SBCK_009-42a01}
  - {type: variant, offset: 15728, length: 2, content: 兢兢, WYG: 愧耳至於兄之雄文則千百年自有定價倘吾文稍進乃敢為兄作序今且不欲羔䄂於狐裘}
  - {type: variant, offset: 15731, length: 2, content: 使乆, WYG: 刻板事既已力止兄序遂亦寳藏之未敢示人也不具與卜無錫書僕支離床席已成廢人久不能一奉晤言殊深耿耿近敝邑一刻字人云執事欲刻鄙言雖或傳言之妄然聞之殊不自安盖執事與善之過雖淺陋言語猶不欲遺之此在執事則為盛心然本非立言之人}
  - {type: page-break, offset: 15731, content: '', id: KR4e0190_WYG_005-65b, image: WYG1276/WYG1276-0308d.png}
  - {type: substitution, offset: 15732, original: 乆, replacement: 久, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3214}}
  - {type: variant, offset: 15734, length: 2, content: 益精, WYG: 徒為覆瓿之用此在鄙人則甚可愧且今世所謂文集者徧滿世間不為少矣其實一字無用彼其初作者莫不妄意于不朽之圗而適足以自彰其陋以取誚於觀者徒所謂木災而已僕每為彼愧之而復自效尤之乎昔人論文章家惟見理明而用功深者乃能得之此未易言}
