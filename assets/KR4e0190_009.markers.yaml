  - {type: line-break, offset: 15435, content: '', id: KR4e0190_SBCK_009-41a06}
  - {type: variant, offset: 15436, length: 5, content: 雖或惡而謗, WYG: 書止}
  - {type: variant, offset: 15444, length: 1, content: 勝, WYG: 能不知}
  - {type: variant, offset: 15446, length: 4, content: 愛而譽之, WYG: 何說也然亦賴有此刻可查平生無一篇文字不在其中執事試考其年月皆四年以前胡說也若今日復勉强承命則後来更不可復辭於人人矣二三年間亦有一二府縣諸公索文}
  - {type: page-break, offset: 15446, content: '', id: KR4e0190_WYG_005-61a, image: WYG1276/WYG1276-0306c.png}
  - {type: variant, offset: 15451, length: 24, content: 之多也眼中亦曾見一人爲江隂使百姓膝行而前俯伏戰慄, WYG: 僕}
