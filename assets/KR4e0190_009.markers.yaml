  - {type: indent, offset: 9691, content: 　　　, id: KR4e0190_krp_009-bkkind22}
  - {type: variant, offset: 9691, length: 1046, content: 與徐養齋向承敎以所不及深感道義之愛皦皦嶢嶢昔人有明戒矣敢不奉教以求進於若虗若愚之學也伏聞位晉司徒足占泰道之亨矣周時敷五典擾兆民故事可復見於今乎斯民無禄連歳凶飢自冬徂春溝中之瘠在在有之毎一郊行露骴滿目爲之不能下食幸賴撫巡諸公郡縣有司薄征散積悉力其間不然民其無孑遺矣乎今幸及麥秋可以續食然連朝霧雨二麥之腐壞者又幾半矣去歲緩征之額若欲於麥内取盈則恐民不堪命奈何且二麥無收之處雖征之亦何所出而其薄有所收之虎彼方圖救目前之飢猶且不足而尚有餘粒能補其去年之逋竊恐鞭笞日用而故額未必能足則是昔日緩征之惠乃爲今日急征之困也非不知上供之定數必不可缺但得稍遲數月併於秋糧内帶徵則有司省却一畨催科閭閻省却一畨煩擾在國計一無所損在民力亦無不堪而巡公孜孜愛飬救災恤患之盛心於是爲有始有終矣此其事只在數月早晚之間耳非有損上益下之難也僕僻處山林未嘗獲奉敎於撫公是以不敢徑以書達而以聞於執事且此固百姓之公言也惟明公亮之與人論旱荒蘇松常鎮並爲鄰郡而地利之髙下水勢之淺深迥然不同或遇水荒則蘇松特甚而常鎮尚可或遇旱荒則常鎮爲劇而蘇松得利試以運河測之則常州水止尺許而蘇松尚有至于丈餘者此其地利水勢顯然可見恐明公以爲蘇松未嘗告荒而常州獨若嘵嘵然者不以民之僥倖于免税則以爲有司之私于其民而其實旱與不旱有不同也是以蘇松荒而得常州以相𥙷常州荒而得蘇松以相補民實國稅兩相消息造化者亦有裁成之意云耳與吕沃洲巡按同心之誼悵然逺别以兄之不能忘情于僕亦知僕之不能忘情于兄也江臯逺送尚有瞻望弗及之感趨而避之豈人情哉顧事體有所不可者僕自兩度廢罷歸来前此巡公如趙舒周諸公皆未嘗有一面之識雖同年如徐何陳諸公亦未之敢見豈特狷狹之性以此自守兼亦山澤之分不敢踰越且省事省勞亦病夫之所便至於吾兄則有不然平日於兄旣辱道義兄弟之愛而兄之来也又以同心之故拳拳相求僕亦欲如故事引避深覺於情有甚不自安者然初意止謂一見可矣繼而再見三見四見焉日不足而繼之以夜焉然在兄無私於故人之譏在僕無奔走形勢之嫌所恃者平生所自守能自信而巳矣好事者不疑其干請被罪者不猜其毀言所恃者平生所自守能自信而已矣所謂惟吾與兄可也夫兄行部之日旣巳破格相與矣而兄去部之日乃獨不能破格相送哉所謂事體有所不可者何也正恐見之者以爲僕之與兄綢繆若此也不知出於故舊必不容己之情而槩以爲山人所以事上官之常禮則送故者必不可以不迎新新故相仍息肩何日若夫一賢一否則昔人所謂爲罪滋大者也欲稍自息機以返初服不得不自兄始之矣近龍溪相過與之盤桓山中數日别去已訂他年之約若兄有便還山則奉教之日長在今日且割逺别之情以爲山人自便之圖其亦可也荅, WYG: 答}
