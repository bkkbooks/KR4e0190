  - {type: variant, offset: 15375, length: 3, content: 卿應曰, WYG: 字以郡人頌郡公非特分所宜然抑亦情不能已雖然鄙意有不敢不逹之左右者僕少不知學而溺志於文詞之習加以非其才之所長徒以耽於所好而苦心矻力窮日夜而强為之是以精神耗散而不能收筋力枯槁而不能補積病成衰年及四十尫羸卧床已成廢人}
  - {type: page-break, offset: 15375, content: '', id: KR4e0190_WYG_005-60b, image: WYG1276/WYG1276-0306b.png}
