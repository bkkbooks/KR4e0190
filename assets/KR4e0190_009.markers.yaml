      ', id: KR4e0190_krp_009-bkkkrnewl869}
  - {type: line-break, offset: 15135, content: '', id: KR4e0190_SBCK_009-40b01}
  - {type: variant, offset: 15136, length: 0, content: '', WYG: 則朽株為用遂得再塵金馬之署更聮羽翼之班自揣既為不堪衆謂何以至此惟天下信明公之端直而知其嚬笑不以假人惟當宁信明公之激揚而知其顧盻必能得士偶因㧞茹及此彚征雖荐人常恐其知在明公絶不以言于口而受知思所以報在鄙人則竊有愧于心惟當勉䇿愚蒙益精學問其或馳驅于世則庶以罄葵藿之心縱}
  - {type: page-break, offset: 15136, content: '', id: KR4e0190_WYG_005-42b, image: WYG1276/WYG1276-0297b.png}
  - {type: variant, offset: 15137, length: 0, content: '', WYG: 委棄于時則永以堅溝壑之素期少礪頑鈍之器庶不貽冰鑑之羞而已敢因来惠敬布腹心伏惟俯賜覽觀庶以知鄙志之所存焉耳與歐陽巡撫書僕樗散無似黽勉赴官將圖所以效明公國士之知}
  - {type: variant, offset: 15138, length: 0, content: '', WYG: 而未能也竊有所懼者山林之士閒居而静處其寡過則易或出而馳驅於世當毁譽得失之衝誠欲有所樹立則難故古之人修之于家而多不免壊之于庭者况僕之所以修之于家者固未至耶昔韓持國薦處士常夷甫後夷甫改其平生而韓公亦深以是為薦士之悔不知若何可以使鄙人不為夷甫明公不為持國之悔也幸左右終教之辭免坊牌一事向已面請此非敢矯情近名盖以此生苟不至於飢餓則毫髪不敢有所取于世庶幾伐檀詩人之所謂耳承明公欲置買學田此盛舉也更望明公始終其事中間委曲區畫使異日不為人所侵漁則受賜于明公多矣然此舉必湏出自明公使鄙人若無所與焉者乃為善也不然則鄙人雖不以是為利而更欲以是為名亦非鄙志之所安也敢併以奉凟伏惟明公晉擢樞府辱在知愛殊深慶幸與郭似菴巡按書僕經春常病移家住村塢中居閒自念不奉末光者久矣近聞使檄下府過旌鄙人命有司建牌坊示優崇之意且期之永久此執事盛心豈不感激既而自惟有甚不敢當者恐}
  - {type: page-break, offset: 15138, content: '', id: KR4e0190_WYG_005-43a, image: WYG1276/WYG1276-0297c.png}
  - {type: page-break, offset: 15138, content: '', id: KR4e0190_WYG_005-43b, image: WYG1276/WYG1276-0297d.png}
  - {type: page-break, offset: 15138, content: '', id: KR4e0190_WYG_005-44a, image: WYG1276/WYG1276-0298a.png}
  - {type: variant, offset: 15139, length: 3, content: 進瞽言, WYG: 昧以累左右知人之明故敢畢陳其愚左右試垂聼焉書曰彰善癉惡樹之風聲近世牌坊之製盖倣此意古者不以法私人所章必善而人廼勸所所癉必惡而人乃懲不然則懸曲木求直影也僕少不知學中嵗蹉跎即鄉黨}
  - {type: variant, offset: 15143, length: 2, content: 分必, WYG: 好者正恐不如也執事乃欲以之風鄉人而矯漓俗僕豈不自知此如以迷人指迷不亦踈乎罪莫大于盗名詬莫大于詆罔僕非敢辭此也将以讓詬而辟辠也僕甞厠侍從之列㑹才志紕繆又夙罹疢疾不能效官荷天子明聖不戮瘝曠僅奪官罷歸田里此覆載厚恩詎可勝量僕聞之仕隱二道仕者則蜚聲竹帛或立旄纛表閥閱}
  - {type: page-break, offset: 15143, content: '', id: KR4e0190_WYG_005-44b, image: WYG1276/WYG1276-0298b.png}
  - {type: variant, offset: 15146, length: 0, content: '', WYG: 不為侈隱人則深林窈谷杜門棧徑羣木石鹿豕且不為陋况僕含瑕積垢以此終世惟應躬耕灌園矢溝壑之志保桑榆之路補東隅之失庻幾不為田夫野人􅀈笑此僕私心萬一者也介子推曰身隠矣焉用文之陶生亦云迷塗未逺今是昨非苟又冒執事此賜為華觀則是違溝壑之素叨焜燿之飾忘廢黜之後責襲官寵之前榮戾大易補過之訓犯中庸素位之戒無一可者也僕幸交于執事久矣且積愛生妍積憎生醜古来共然别嫌明㣲先軰所慎雖以李絳之賢亦有議其私于同年者矣自執事持憲江左于人無所假于法無所貸薦紳間咸稱頌據經秉直無與左右比者夫激揚清濁與衆為公執事豈以公法私一交㳺僕豈得以交㳺故干執事公法雖執事諉曰吾以旌賢誰能信之一牌坊之費四五十金計工二十人有竒一工計役三四旬則是二十餘人計役七八十旬有竒崇虛跡捐實費無禆絲髪有損尋丈此僕為暴殄已過矣僕己丑與第時曾隨例給牌坊直百金且僕既有牌坊直矣又有牌坊是兩饕也有司既給僕牌坊直矣又爲僕建牌坊是兩費也柰何使一人兩費有司凡此數事實所不敢當非敢匿心矯跡多為枝辭以徼避譲之名重獲辠有道之門伏惟執事鑒亮命有司停止前事則幸甚理宜走謝面布悃𠂻坐病不能謹以書致答舒雲川巡按書使節之蒞于南土也且訖事而還之朝矣鄙人之所以伺候于左右者一未能展而左右之所以垂愛于不肖者顧數數有加焉既不敢以草莾蹤跡溷擾公府念無可為謝者其於盛徳但知中心藏之而已兹辱賜坊牌價五十金再拜感激益不自堪曩時郭徐諸公按于兹土亦甞以此惠}
  - {type: page-break, offset: 15146, content: '', id: KR4e0190_WYG_005-45a, image: WYG1276/WYG1276-0298c.png}
  - {type: page-break, offset: 15146, content: '', id: KR4e0190_WYG_005-45b, image: WYG1276/WYG1276-0298d.png}
  - {type: page-break, offset: 15146, content: '', id: KR4e0190_WYG_005-46a, image: WYG1276/WYG1276-0299a.png}
  - {type: page-break, offset: 15146, content: '', id: KR4e0190_WYG_005-46b, image: WYG1276/WYG1276-0299b.png}
  - {type: variant, offset: 15147, length: 1, content: 絶, WYG: 及僕時尚蒙恩在致仕之後然于諸公之惠亦未之敢當也今為編氓則又異矣夫郭徐}
  - {type: variant, offset: 15149, length: 2, content: 吾友, WYG: 鄙人同年也而左右乃以此施之於山野踈逖素未嘗交際之人此其為厚施益過于諸公然使僕不敢當於致仕之先而顧敢當于編氓之後其為凟尊者之賜益大}
  - {type: variant, offset: 15152, length: 16, content: 適會陳戸曹道及吾友欲相顧是吾友舊, WYG: 此僕之所甚不敢也謹告返于使人辱左右知}
  - {type: 'kr:newline', offset: 15155, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl870}
  - {type: line-break, offset: 15155, content: '', id: KR4e0190_SBCK_009-40b02}
  - {type: substitution, offset: 15155, original: 戸, replacement: 戶, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4495}}
  - {type: variant, offset: 15171, length: 0, content: '', WYG: 當}
  - {type: variant, offset: 15172, length: 1, content: 遽, WYG: ''}
  - {type: variant, offset: 15174, length: 1, content: 瞽, WYG: 不恭為罪耳請謝未期臨書不勝馳望伏惟亮之與陳巡按遜齋書某迂拙無似然至於慕徳嚮賢之心未嘗不與人同而交際務施報尚徃来之誼亦未嘗不與人同也自使節惠臨江南躬清苦之行以率先屬吏嚴激揚之政以整齊習俗某雖在山澤亦竊聞風而慕焉久矣且使節蒞敝邑兩辱垂問野人之廬而士夫間亦每傳}
  - {type: page-break, offset: 15174, content: '', id: KR4e0190_WYG_005-47a, image: WYG1276/WYG1276-0299c.png}
  - {type: 'kr:newline', offset: 15175, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl871}
  - {type: line-break, offset: 15175, content: '', id: KR4e0190_SBCK_009-40b03}
  - {type: variant, offset: 15176, length: 2, content: 爲辠, WYG: 執事以道義相愛因復自念僕未嘗一日得奉教於左右而乃辱降意先施若此則又竊感且愧焉久矣然則僕於執事不為無所嚮徃而執事於僕不為無所下交矣其於所謂慕義之心報施之禮皆宜奔走自効於左右而乃缺然至今焉者非甚踈狂當不若是故敢以鄙懐布於左右某被罪為民人}
  - {type: page-break, offset: 15176, content: '', id: KR4e0190_WYG_005-47b, image: WYG1276/WYG1276-0299d.png}
  - {type: substitution, offset: 15176, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
  - {type: substitution, offset: 15177, original: 辠, replacement: 罪, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1362}}
  - {type: variant, offset: 15179, length: 1, content: 即, WYG: 諸公髙誼雖過以士禮相遇而固陋之私則不敢不以民禮自居編甿之役既非所以僣於縉紳之交稼穡之論亦非所以參於政事之間是以八九年来其於公門未嘗敢窺焉盖非敢自為偃蹇誠不敢以凟尊者也草莾之不敢見孟子之所謂不敢也且某多病早衰去冬復感隂寒遂成末疾兩足痿痺卧不能起䬃然摧朽已成廢人惟屏跡村庄少藉藥物支持是以執事之門既未及躬候而執事枉頋又不及擁篲以迎盖坐此也然則僕於執事交際之禮既拘於分之不敢自盡嚮徃之殷又牽於病之不能自致惟有捫心懐慙而已念無以逹於左右故敢以書上并以為謝幸垂亮焉與徐少初邑侯書某罪𨽻之餘禮不宜復齒於縉紳交際之間是以每逺引而去之竊以為姓名不通於諸公久矣兹又辱巡倉巡江二公之賜}
  - {type: page-break, offset: 15179, content: '', id: KR4e0190_WYG_005-48a, image: WYG1276/WYG1276-0300a.png}
  - {type: page-break, offset: 15179, content: '', id: KR4e0190_WYG_005-48b, image: WYG1276/WYG1276-0300b.png}
  - {type: variant, offset: 15182, length: 4, content: 往候使節, WYG: 愧悚益不自勝欲作書辭謝又難}
  - {type: variant, offset: 15183, length: 1, content: 候, SBCK: 􅀱}
  - {type: variant, offset: 15187, length: 0, content: '', WYG: 為說是以敢有所請教於明公也夫諸公之賜其名則幣帛果酒也而叩其實則}
  - {type: variant, offset: 15188, length: 1, content: 氏, WYG: 金也欲以辭幣帛果酒為說}
  - {type: variant, offset: 15190, length: 1, content: 巳, WYG: 悖於其實欲以辭銀為説則悖於其名是以措詞之難也古者禮存于幣帛之先後世以幣帛為禮此其實則亡矣而其名尚存也若夫市道之交則錢貨而已矣雖然如公古道君子也如諸公古道君子也豈不欲}
  - {type: page-break, offset: 15190, content: '', id: KR4e0190_WYG_005-49a, image: WYG1276/WYG1276-0300c.png}
  - {type: variant, offset: 15192, length: 0, content: '', WYG: 古之道而以市道歟豈以為若某軰人者其好潔操行之心不能勝其嗜利無耻之心故幣帛虛名也金錢實利也而特以此厚之歟其特以此愧之歟頑鄙之人可以省}
  - {type: variant, offset: 15193, length: 29, content: 悵惘竊惟論治者先體故按督之體異乎州縣風憲之職異乎拊循而州縣, WYG: 是諸公}
  - {type: 'kr:newline', offset: 15195, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl872}
  - {type: line-break, offset: 15195, content: '', id: KR4e0190_SBCK_009-40b04}
  - {type: variant, offset: 15204, length: 1, content: 督, SBCK: 􅇂}
  - {type: 'kr:newline', offset: 15215, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl873}
  - {type: line-break, offset: 15215, content: '', id: KR4e0190_SBCK_009-40b05}
  - {type: variant, offset: 15223, length: 1, content: 所, SBCK: 􅀁}
  - {type: variant, offset: 15225, length: 2, content: 拊循, WYG: 㢘頑也某罪𨽻也賜之幣帛不敢當賜之金錢不敢當豈}
  - {type: variant, offset: 15228, length: 1, content: 民, WYG: 能自處以㢘乎盖古之所謂不敢也然而為嘵嘵者竊懼名實之亂也公古道君子必且有以教我矣某山野鄙人於當道諸公辱顧不敢答辱賜不敢拜非以為簡也禮不敢也答與拜既不敢不答不拜又鄙心所甚不自安也曩曽奉凟乞命吏人於鄉官掲帖中除去賤名以安編氓之分豈未蒙亮察耶恃在知愛乞如前所凟則上官可以不知鄙人姓名而交際之間可以冺然無跡矣附凟又讀清獄申文深知仁人之用心至悉謹篋而藏之以告後之君子以延長者之惠於無窮更承示區處牌坊事徃時所辭諸坊牌銀只為未有所處遂至久而不知所用之矣今用以修理書院不}
  - {type: page-break, offset: 15228, content: '', id: KR4e0190_WYG_005-49b, image: WYG1276/WYG1276-0300d.png}
  - {type: page-break, offset: 15228, content: '', id: KR4e0190_WYG_005-50a, image: WYG1276/WYG1276-0301a.png}
  - {type: variant, offset: 15230, length: 0, content: '', WYG: 此銀得有所着落且于風教有補焉甚善甚善但中間稱奨鄙人太過讀之且甚自愧也某嘗以為今日吾軰之病大率在于實行未修而虛名先著閫域不務而門面是張是以書院講學一節多為具文而非彼此感應之真機而}
  - {type: variant, offset: 15231, length: 0, content: '', WYG: 志之不相同者則遂指摘以為口實誠所謂吾黨有過焉者也况如僕者極踈且陋何敢當此乞於申文中自見今買荘一所以下至僦船以居數句及因以禮敦請講學一句敢勞削去是所以免僕于名浮之耻而亦左右相愛以徳之素心也幸亮之與王堯衢編修書抱病懶慢久缺書問知執事不謂我踈簡也春来卜居陽羡此中山水清絶無車馬送迎之煩出門則從二三子登山臨水歸来閉門食飲寝夢尚有餘閒復稍從事于問學然詩文末藝與博雜記問昔嘗强力好之近始自覺其如羊棗昌歜之嗜不足飢飽于人非古人切問近思之義于是取程朱諸老先生之書降心而伏讀焉初亦未嘗覺其好也讀之且半月矣乃知其㫖味雋永字字發明古聖賢之藴凡天地間至精至妙之理更無一閒句閒語所恨資性蒙迷不能深思力踐於其言焉耳然一心好之固不敢復奪焉此類之書皆近世英敏材辨之士以為老生爛話至束閣不肯觀雖其苦心敝精于文字間而竟不免老死而無所聞有可痛者僕之自陳其愚盖過不知量亦欲執事之同所嗜好也何如何如近日當事者所去取投閒之臣僕已先知其去與取之必如此矣不足為恠且}
  - {type: page-break, offset: 15231, content: '', id: KR4e0190_WYG_005-50b, image: WYG1276/WYG1276-0301b.png}
  - {type: page-break, offset: 15231, content: '', id: KR4e0190_WYG_005-51a, image: WYG1276/WYG1276-0301c.png}
  - {type: page-break, offset: 15231, content: '', id: KR4e0190_WYG_005-51b, image: WYG1276/WYG1276-0301d.png}
  - {type: variant, offset: 15232, length: 7, content: 易豈弟大小畢輸, WYG: 生亦頗能自為主張不敢跟人哭笑不敢以鴟鳶之所争蝸角之所戰者以動吾心而累吾守此亦執事所素鑒無待僕自明也無待僕自明而猶自明云云者有說也父子至情恐以此上累吾父之心湏吾執事觧喻耳當今之士隱居篤學修名砥節如湖州唐子平凉趙子軰者凡若干人僕之駑駘十不及}
  - {type: page-break, offset: 15232, content: '', id: KR4e0190_WYG_005-52a, image: WYG1276/WYG1276-0302a.png}
  - {type: 'kr:newline', offset: 15235, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl874}
  - {type: line-break, offset: 15235, content: '', id: KR4e0190_SBCK_009-40b06}
  - {type: variant, offset: 15240, length: 1, content: 情, WYG: 二三然此軰皆淪胥流落淹滯已十數年少者壮壮者且老以衰或餒凍無以存活又其初皆以盡力國事誤觸綱而抵禁非如僕之自以私罪去也此軰尚不得為當事者所與則僕得與此軰同陸沉焉固無憾也更何有所覬乎凡人出處利鈍數固不偶始言官謬相薦時僕固知終必且棄去以為萬一不棄去則僕之自為處亦有甚難者何也若}
  - {type: variant, offset: 15242, length: 1, content: 民, WYG: 僕復如舊時隨逐行隊進退以旅趦趄囁嚅于明時無粟粒}
  - {type: page-break, offset: 15242, content: '', id: KR4e0190_WYG_005-52b, image: WYG1276/WYG1276-0302b.png}
  - {type: variant, offset: 15244, length: 16, content: 入公門者如入乎其家見守令者如見其, WYG: 補則將毁平生而弁髦之且嚮惟不能為此所以甘心去官而無所悔耳不然則桞士師所謂何必去}
  - {type: 'kr:newline', offset: 15255, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl875}
  - {type: line-break, offset: 15255, content: '', id: KR4e0190_SBCK_009-40b07}
  - {type: variant, offset: 15262, length: 1, content: 是, WYG: ''}
  - {type: variant, offset: 15264, length: 3, content: 爲貴耳, WYG: 邦者也若}
  - {type: substitution, offset: 15264, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
  - {type: variant, offset: 15268, length: 3, content: 民見威, WYG: 不如此而如彼守其愚戅固陋}
  - {type: variant, offset: 15273, length: 4, content: 見徳敢怨, WYG: 變恐日月漸久積嫌積忤自作禍孽更有甚於嚮時既不能為邯鄲之歩竟當匍匐而歸耳是以中夜思之進退狼狽乃今得自脱於此固可謂之幸而不可謂之不幸也古人有言人各有能有不能懸釡帶索枯槁丘壑雖窮死而不肯悔者僕自謂能之隨逐行隊進退以旅以徼幸於衣錦乘軒之華者僕非不欲勉强學焉恐竟不能也僕自生齒以来百種嗜欲頗少於人亦絶不知人間有炫耀顯赫事獨不能淡於飲食乃始痛為節損或四五日不肉食始而苦之久且甘之矣間飲食於富貴之家腥膏滿案且噦之而投筋矣所以苦身自約如此者以為既不能改于其固陋以狥時好則貧賤自是此生常事諺曰畏水者不乗橋恐其動心也且夫自處不當違其所能而强其所不能處人當成就其長而䕶其所短安知當事者之非深愛我乎僕幸未衰敗苟自不樹立則已耳若夫假之以二三年孜孜早夜敏行}
  - {type: page-break, offset: 15273, content: '', id: KR4e0190_WYG_005-53a, image: WYG1276/WYG1276-0302c.png}
  - {type: page-break, offset: 15273, content: '', id: KR4e0190_WYG_005-53b, image: WYG1276/WYG1276-0302d.png}
  - {type: substitution, offset: 15274, original: 徳, replacement: 德, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4493}}
  - {type: 'kr:newline', offset: 15275, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl876}
  - {type: line-break, offset: 15275, content: '', id: KR4e0190_SBCK_009-40b08}
  - {type: variant, offset: 15280, length: 0, content: '', WYG: 怠則子輿所謂獨善兼善與退之所謂行道為書化今傳後或者不能兩讓矣豈有不得於進又不得於退者乎執事知我故不慙大}
  - {type: variant, offset: 15281, length: 0, content: '', WYG: 且非此無以解吾父之懐也吾父之所以戀戀於僕者亦非以今時富貴人望僕也王良有言父子情深或意僕之以是為憂也而亦憂焉耳僕固不憂也又或者以自少教之讀書不忍遽見其廢錮於聖世矣乎雖然成敗失得且當要之久逺毋遽為僕戚戚也望吾執事早晩間曲為寛慰}
  - {type: page-break, offset: 15281, content: '', id: KR4e0190_WYG_005-54a, image: WYG1276/WYG1276-0303a.png}
  - {type: variant, offset: 15282, length: 0, content: '', WYG: 數千里外人子懸望之心亦稍紓矣是執事之賜也客居無事二三子時時以舉業文字强相問訊亦殊妨静坐與讀書但念此身為宇宙中人其於塵俗奔走縟禮煩儀之事既以其溷擾而厭避之于此不當更有所厭耳舍妹并甥女想皆康吉餘懐不盡生平最懶作書更懶作真書書又多差與執事書既不可假手於人又不能不差又不及更錄輙以呈上并希亮之答周約菴尚書書某自屏居以来自以罪𨽻不敢復齒於薦紳之後故居當南北孔道非逃虛者所宜遂舘於陽羡山間坐此去人益逺親知徃来一切罷廢}
  - {type: page-break, offset: 15282, content: '', id: KR4e0190_WYG_005-54b, image: WYG1276/WYG1276-0303b.png}
  - {type: variant, offset: 15283, length: 0, content: '', WYG: 最辱知愛如明公亦尚未能繼掃門之役以承教語叙𠂻曲此其懶慢之罪僕猶自知况長者乎以為宜麾而棄之矣不謂過辱記錄逺勤使人且手書慰諭尚欲納僕於古人之域捧書自激竊感且歎固知長者之度不肯輕棄}
  - {type: page-break, offset: 15283, content: '', id: KR4e0190_WYG_005-55a, image: WYG1276/WYG1276-0303c.png}
  - {type: variant, offset: 15284, length: 0, content: '', WYG: 物欲曲而成之若此然来書所教尚以僕早年受知之故盖見僕少時意氣可以竊冀人之尺寸焉而未知僕今憊駑樗散雖欲比於今之人而有不逮也僕少不自揆亦嘗有四方之志而才器迂滯本不適時加以弱冠從仕重以負氣學未及成而驟試之且少年負氣不識忌諱以迂滯之器而試未成之學重以負氣之習此其動輙罹咎也豈足恠哉猶幸免誅戮得齒編氓且少嬰疾疢三十以後齒髪漸衰委形既然志亦隨之即如讀書為文本是素所嗜好近或挟册讀未數行輙眊然而睡矣旬月不一御鉛墨}
  - {type: page-break, offset: 15284, content: '', id: KR4e0190_WYG_005-55b, image: WYG1276/WYG1276-0303d.png}
  - {type: variant, offset: 15286, length: 6, content: 䏻收整頓撡切, WYG: 為之輙終日汗漫申紙䑛筆竟不能成十數字而遂以罷夫外則廢於親知之徃来内則廢於文史之玩即此一兩事則其衰頺弛靡不比於人也可盡見矣此其意盖欲槁形灰心自同木石豕鹿之間使宇宙廣濶着此一閒人足矣淮隂南陽之事固萬不敢一冀焉至如象緯地形諸家之學如来書所稱管鄧所長亦何敢不自量而攬焉以為可幾乎且夫淮隂南陽其始皆匵其器而不輕以試䄂手而觀天下之勢如良醫之隔垣而洞五臟也故其壇而拜焉廬而顧焉則以造次一二語而圖王致伯之畧遂以定况齷齪如僕軰者所謂以迂滯之器而試未成之學如弋者百發而徼於一中故屢試屢蹶此其大巧大拙}
  - {type: page-break, offset: 15286, content: '', id: KR4e0190_WYG_005-56a, image: WYG1276/WYG1276-0304a.png}
  - {type: variant, offset: 15294, length: 0, content: '', WYG: 已見于前事矣乃欲以倦逰息機之後}
  - {type: 'kr:newline', offset: 15295, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl877}
  - {type: line-break, offset: 15295, content: '', id: KR4e0190_SBCK_009-40b09}
  - {type: variant, offset: 15295, length: 0, content: '', WYG: 自比於古人隱居求志之前雖强自鞭策固知}
  - {type: page-break, offset: 15295, content: '', id: KR4e0190_WYG_005-56b, image: WYG1276/WYG1276-0304b.png}
  - {type: variant, offset: 15296, length: 1, content: 所, SBCK: 􅀁}
  - {type: variant, offset: 15296, length: 0, content: '', WYG: 不類也然則明公教督之厚其何以承之甚自激也甚自愧也雖然自屏居以来澄慮黙觀亦既久之乃稍稍窺見古之儒者}
  - {type: variant, offset: 15297, length: 2, content: 斵喪, WYG: 以為學之大端竊以其實乃在於身心性情之際而不以事功技術掲耳目為也故其退藏於宻}
  - {type: substitution, offset: 15297, original: 斵, replacement: 斫, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1806}}
  - {type: variant, offset: 15300, length: 0, content: '', WYG: 甚約其究可以窮神而立命古固有豪傑之士而不知學者衆矣是以事功流而為權計技術流而為小道凝静致逺南陽其幾乎其雜於申韓則擇術之過也淮隂烈矣竟以矜能伐功殞其軀以輅之才局於方技僅與華佗朱建平醫相為伍鄧征西以所長濟事以所長殞身與淮隂同此數子者不可不謂豪傑之士也然其擇術則可謂不審矣僕功名韁鎖已獲斬㫁至於象緯地形種種諸家之學徃時亦頗嘗注心焉今盡以懶病廢竊以為絶利於百途固将藉此餘閒聚精蓄力洞極本心洗濯愆過以冀収功於一原而未知竟當何如耳近来每觀伊洛之書及六經之㫖覺有毫髮悟入則終日欣然忘其居之陋而形之憊也所苦習氣纏繞欲障起滅未能痛與掃除使之光大然不敢不勉焉以為古来儒者所以自淑其身之學其命脉或不外此而無有乎窮逹古今之異者也若乃進僕於抱膝髙吟之儔則必不敢當謂僕爲今之腐儒鄙儒賤儒也其亦可幾乎以是少酬明公之知明公其許我乎辱愛之深故不敢隱其愚且狂也今邉陲多難兵財窘急明主側席正豪傑展効之時為社稷計維公軰一二耆舊隆中之業是有在矣其何譲焉山野鄙人其盱而望之矣與賈鳳陽書史生還獲聞起居與徳政之詳甚慰素仰弟迂踈無似自屏居以来四方知舊絶不敢通書或有書見及則答之而已以為山林屏廢杜門省過之人其禮自宜如是且亦平生自守其固陋而不敢失者也今春偶有素不相識鄉人名孫伸者持兄書惠見及當時姑奉答一書後或言此人先造贋書以誤左右之聼聞之不勝惶悚弟自己丑偕兄登第至今十餘年雖至親未嘗敢為之請屬雖在敝郡縣諸公亦素不敢有一字相屬乃為素不識面之人請屬于千里之外亦可笑矣且弟縦不才亦素知兄之剛正豈宜以私干之既以自愧又以自訟豈平生心事不能見信于一鄉此人所以至此也若果有此煩兄發其事治其人以為作偽之戒并将原所造贋書發下一覽感感答殷生原學書来書推奨鄙人甚非倫比頭陀僣謂佛子法王此大罪過也雖然亦足以見吾友向徃之殷矣僕不自量竊痛世人汩於利欲迷失真種絶去人理自墮鬼蜮是以在羣衆中徃徃不惜齒頰一與破迷雖至速侮招尢亦不為悔至於同游諸子尢更不敢惜齒頬然察其中如聞古樂而思睡者固亦}
  - {type: page-break, offset: 15300, content: '', id: KR4e0190_WYG_005-57a, image: WYG1276/WYG1276-0304c.png}
  - {type: page-break, offset: 15300, content: '', id: KR4e0190_WYG_005-57b, image: WYG1276/WYG1276-0304d.png}
  - {type: page-break, offset: 15300, content: '', id: KR4e0190_WYG_005-58a, image: WYG1276/WYG1276-0305a.png}
  - {type: page-break, offset: 15300, content: '', id: KR4e0190_WYG_005-58b, image: WYG1276/WYG1276-0305b.png}
  - {type: page-break, offset: 15300, content: '', id: KR4e0190_WYG_005-59a, image: WYG1276/WYG1276-0305c.png}
  - {type: variant, offset: 15302, length: 7, content: 書髙明柔克可省, WYG: 亦不為悔盖冀有一二人能深信吾說而共行之以究乎其精則宇宙間氣脉尚有所寄不至盡泯爛此吾人大功徳}
  - {type: variant, offset: 15310, length: 2, content: 向孫, WYG: 敢復自愛乎今吾友乃不見謂迂濶直欲相從於湖海寂寞之域信之甚真而志之甚篤則交戰勝負之機固已决矣是余之所汲汲而求者也但湖上之行本欲絶去言語}
  - {type: page-break, offset: 15310, content: '', id: KR4e0190_WYG_005-59b, image: WYG1276/WYG1276-0305d.png}
  - {type: variant, offset: 15313, length: 17, content: 卿在江隂嘗過僕僕問之曰兄素講學學問, WYG: 字於萬緣}
  - {type: 'kr:newline', offset: 15315, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl878}
  - {type: line-break, offset: 15315, content: '', id: KR4e0190_SBCK_009-40b10}
  - {type: variant, offset: 15331, length: 7, content: 是空談即如大學, WYG: 染時黙悟此心今與吾友同行不免更費一畨酬酢耳然来意不欲固違也到無錫時當相約所云議}
  - {type: 'kr:newline', offset: 15335, content: '

      ', id: KR4e0190_krp_009-bkkkrnewl879}
  - {type: page-break, offset: 15335, content: '', id: KR4e0190_SBCK_009-41a}
