  - {type: variant, offset: 8017, length: 292, content: 荅曹巡鹽僕迂疎固陋之士也惟山澤屏跡則其所宜不謂過辱左右之知未及傾葢而先惠以教音勤之以下問此古者觀風之使不憚身先施之巖壑自養之士則可矣顧僕豈其人哉雖然由是足以知左右之急於奬善不暇擇乎其人切於好問故不睱擇乎其言也竊奉下風感慰感慰今呉粤薦饉村墟之間鷄狗無聲草根樹皮亦憂其不繼矣流莩露胔所在如積天心仁愛不知竟何以善其後伏惟左右雖不在撫巡之責而同於觀風之任者也君子一體萬物固不論於職守之所及與所不及也而况在觀風之任哉幸而今之司國計者督率守令力舉荒政以全活溝中之瘠葢不徒阜財足課通惠恤竈爲於職守之所及而孜孜體綏瘦人湲計國家根本之慮以爲職守之所不及以盡吾一體之心固知左右之有意乆矣辱厚意之殷敢布愚悃, WYG: ''}
