  - {type: line-break, offset: 15515, content: '', id: KR4e0190_SBCK_009-41a10}
  - {type: variant, offset: 15518, length: 6, content: 素以豪傑望吾, WYG: 與兄何等朋}
  - {type: variant, offset: 15525, length: 162, content: 豈獨善人已也相念甚勤未知使節何時更入郡耳懸懸素不遣人持書入府縣中今特遣此以謝兩次不淂相見之故且恃吾友之知我也此後有持名到貴治者必僞無疑預言之與金攝山縣尹金入於大冶數經火力愈鍜鍊則愈精純而授新馬於舊牧之圉試其熟技則人與馬益相習雖然其雜金固有一火焉則耗者矣其牧馬如東野之御固有始則善而乆則馬逸焉者矣攝山之凛坎於世也是金之數經於火, WYG: ''}
