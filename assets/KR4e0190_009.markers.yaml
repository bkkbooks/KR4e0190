  - {type: variant, offset: 15477, length: 2, content: 仰視, WYG: 為枝辭相誑但據本心以告曰自今以後更有為府縣及朋友間作一篇應酬文字則今日誠得罪於執事矣今於諸公亦不敢為枝辭亦但據本心以告曰自今以後更有為郡縣及朋友間作一篇應酬文字則今日誠得罪於諸公亦誠得罪於太府矣伏惟諸公矜而恕之答王遵巖書兩得兄書拳拳以病體為念真意懇惻令人讀之堪為涕下非兄死生之交不能至}
  - {type: page-break, offset: 15477, content: '', id: KR4e0190_WYG_005-61b, image: WYG1276/WYG1276-0306d.png}
  - {type: variant, offset: 15480, length: 1, content: 輩, WYG: 感激感激人傳言吾病過重}
  - {type: variant, offset: 15482, length: 0, content: '', WYG: 盖有兩說一則以木腎為患痰火時作不得不閉戸調理人以我經年病不見人則以我病不可支矣不知我貌則槁矣而精神尚可不死盖近於養生家稍稍得一歸根法也其一說則自以早年有志今四十外矣而猶然醉夢人也盖非特文章氣節平生所劼力而從事者既於真性不切及所聞於經書師友與意見之所窺測而自以為道者亦竟如隔壁聼話全無交渉近来痛苦心切死中求活将四十年前伎倆頭頭放捨四十年前見解種種抹摋於清明中稍見得些影子原是徹天徹地靈明混成的東西生時一物帶不来此物却原自帶来死時一物帶不去此物却要完全還他去然以為有物則}
  - {type: page-break, offset: 15482, content: '', id: KR4e0190_WYG_005-62a, image: WYG1276/WYG1276-0307a.png}
  - {type: variant, offset: 15483, length: 1, content: 足, WYG: 睹何聞以為無則參前倚衡瞻前忽後非胸中不掛世間一物則不能見得此物非心心念念晝夜不捨如養珠抱卵下數十年無滲漏的工夫則不能收攝此物完養此物自古宇宙間豪傑經}
  - {type: page-break, offset: 15483, content: '', id: KR4e0190_WYG_005-62b, image: WYG1276/WYG1276-0307b.png}
  - {type: variant, offset: 15485, length: 1, content: 哉, WYG: 少人而聞道者絶歎其難也好仁者無以尚之此真消息也終日如愚終日忘食此真工夫也無以尚之則有一物可尚便不是此物矣忘食則於閒事有不暇者矣如愚則於才技有不使者矣孔顔一生工夫所以完養收攝此寳藏也僕近稍悟得此意而深恨年已過時雖知其無成然本是自家寳藏不得不有冀於萬一也是以痛為掃抹閒事收歛精神之計則不得不簡於應接不得不托於病不可支以謝客是以人知}
  - {type: page-break, offset: 15485, content: '', id: KR4e0190_WYG_005-63a, image: WYG1276/WYG1276-0307c.png}
  - {type: variant, offset: 15487, length: 0, content: '', WYG: 之病甚而不知吾之别有意也此意更不敢露於人以兄念我太厚憂我太深故特披露之兄萬無洩我秘宻重増嘵嘵之口也安}
  - {type: variant, offset: 15488, length: 1, content: 清, WYG: 為我求序得託雄文以不朽甚幸過望僕舊從兄學為文章有一二僅得處盡是兄之指教但}
  - {type: variant, offset: 15490, length: 2, content: 雅志, WYG: 既不長又不能竭精力以從事是以遂成廢罷韓子所謂徙業者不嚌其胾者也獨覺兄之奔逸絶塵而已矣近来自觀舊稿支離叛道之言篇篇有之理既不當文亦未工赧然盡欲焚燒而後為快緣頗為人抄錄無可柰何盖以吾今日文字伎倆湏并却三四年精力専専幹此一事自謂可望於古閫域今自度必無此閒精神可以了此也既自知不了則豈欲以不了者而信今傳後乎亦愚矣貴鄉洪子因信兄而過信我遂亦以我為可與斯文也與安友謀刻之而請序於兄}
  - {type: page-break, offset: 15490, content: '', id: KR4e0190_WYG_005-63b, image: WYG1276/WYG1276-0307d.png}
  - {type: variant, offset: 15493, length: 0, content: '', WYG: 既而聞之愧汗駭愕盖吾文未成吾自知之且不知此生為言語文字人也居常以刻文字為無㢘耻之一節若使吾身後有閒人作此業障則非吾敢知至於自家子弟則湏有遺屬説破此意不欲其作此業障也僕居閒偶想起宇宙間有一二事人人見慣而絶是可笑者其屠沽細人有一碗飯吃其死後則必有一篇墓誌其逹官貴人與中科第人稍有名目在世間者其死後則必有一部詩文刻集如生而飲食死而棺槨之不可缺此事非特三代以上所無雖漢唐以前亦絶無此事幸而所謂墓誌與詩文集者皆不乆泯滅然其徃者滅矣而在者尚滿屋也若皆存在世間即使以大地為架子亦安頓不下矣此等文字倘家藏人畜者盡舉祖龍手叚作用一畨則南山煤炭竹木當盡減價矣可笑可笑僕又}
  - {type: page-break, offset: 15493, content: '', id: KR4e0190_WYG_005-64a, image: WYG1276/WYG1276-0308a.png}
  - {type: page-break, offset: 15493, content: '', id: KR4e0190_WYG_005-64b, image: WYG1276/WYG1276-0308b.png}
