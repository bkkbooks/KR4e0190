  - {type: line-break, offset: 15335, content: '', id: KR4e0190_SBCK_009-41a01}
  - {type: variant, offset: 15339, length: 29, content: 平天下如保赤子此便是真心便是明明徳兄試自省百姓到面前時可與, WYG: 牴牾且勿尢人豪逹宼盗亦且勿尢人盖}
