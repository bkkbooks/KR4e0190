  - {type: variant, offset: 211, length: 3885, content: 去相之微意所以勵不可奪之節立天下廉恥之坊而有禆于聖明之治者葢亦多矣易有之漸于逵之上六不居其位者也其繇曰其羽可用爲儀固不獨自潔其身而已人皆謂明公進而當軸以濟時也某謂明公退而髙尚以濟時也雖然明公與國爲體恐未能忘江湖之憂而聖主眷懷耆舊亦恐不能淂乆遂東山之卧耳謝歐陽石江巡撫伏惟明公負康濟之碩材當東南之重寄振恤瘡痍如春風所扇不間於隂谷寒門搜拔幽滯如藥籠所儲無間于牛溲馬渤如順之者早不自立少嘗薄遊巳甘屏跡于山林豈敢更求于聞達且誦習徒知泥古儕輩多謂之鄙儒而局器難與適時明公誤以爲國士收于衆棄揚彼王庭況自来無門館賔客之交豈所取在牝牡驪黄之外夫不采而佩雖幽蘭亦捐苟有因而前則朽株爲用遂淂再塵金馬之署更聯羽翼之班自揣既爲不堪衆謂何以至此惟天下信明公之端直而知其嚬笑不以假人惟當宁信明公之激揚而知其顧盻必能得士偶因拔茹及此彚征雖荐人常恐其知在明公絶不以言于口而受知思所以報在鄙人則竊有愧于心惟當勉策愚蒙益精學問其或馳驅于世則庶以罄葵藿之心縱使委棄于時則永以堅溝壑之素期少礪頑鈍之器庶不貽冰鑑之差而巳敢因来惠敬布腹心伏惟俯賜覽觀庶以知鄙志之所存焉耳二僕樗散無似黽勉赴官將圖所以効明公國士之知者而未䏻也竊有所懼者山林之士閒居而靜處其寡過則易或出而馳驅于世當毁譽淂失之衝誠欲有所樹立則難故古之人修之于家而多不勉壞之于庭者況僕之所以修之于家者固未至耶昔韓持國薦處士常夷甫後夷甫改其平生而韓公亦深以是爲薦士之悔不知若何可以使鄙人不爲夷甫明公不爲持國之悔也幸左右終教之辭免坊牌一事向已面請此非敢矯情近名葢以此生苟不至於飢餓則毫髪不敢有所取于世庶幾伐檀詩人之所謂耳承明公欲爲置買學田此盛舉也更望明公始終其事中間委曲區畫使異日不爲人所侵漁則受賜於明公多矣然此舉必須出自明公使鄙人若無所與焉者乃為善也不然則鄙人雖不以是爲利而更欲以是爲名亦非鄙志之所安也敢併以奉凟與郭似菴巡按僕經春常病移家住村塢中居閒自念不奉餘光者乆矣近聞使檄下府過旌鄙人命有司建牌坊示優崇之意且期之永乆此執事盛心豈不感激旣而自惟有甚不敢當者恐冒昧以累左右知人之明故敢畢陳其愚左右試垂聽焉書曰彰善癉惡樹之風聲近世牌坊之製葢倣此意古者不以法私人所章必善而人迺勸所癉必惡而人迺懲不然則懸曲木求直影也僕少不知學中嵗蹉跎即鄕黨自好者正恐不如也執事乃欲以之風鄉人而矯漓俗僕豈不自知此如以迷人指迷不亦踈乎罪莫大於盜名詬莫大於詆誷僕非敢辭此也將以讓詬而辟臯也僕嘗厠侍從之列會才志紕繆又夙羅疢疾不能效官荷天子明聖不戮瘝曠僅奪官罷歸田里此覆載厚恩詎可勝量僕聞之仕隱二道仕者則蜚聲竹帛或立旄纛表閥閱且不爲侈隱人則深林窈谷杜門棧徑羣木石鹿豕且不爲陋況僕含瑕積垢以此終世惟應躬耕灌園矢溝壑之志保桑榆之路補東隅之失庶幾不詒田夫野人訕笑此僕私心萬一者也介子推曰身隱矣焉用文之陶生亦云迷途未逺今是昨非苟又冒執事此賜爲華觀則是違溝壑之素叨焜燿之飾忘廢黜之後責襲官寵之前榮戾大易補過之訓犯中庸素位之戒無一可者也僕幸交於執事乆矣且積愛生妍積憎生醜古来共然别嫌明㣲先輩所慎雖以李絳之賢亦有議其私於同年者矣自執事持憲江左于人無所假於法無所貸縉紳間咸稱誦㨿經秉直無與左右比者夫激揚清濁與衆爲公執事豈以公法私一交友僕豈淂以交游故于執事公法雖執事諉曰吾以旌賢誰能信之一牌坊之費四五十金計工二十人有奇一工計役三四旬則是二十餘人計役七八十旬有奇崇虚跡捐寔費無禆絲髪有損尋丈此僕爲暴殄已過矣己丑與第時曾隨例給牌坊直百金且僕旣有牌坊直矣又爲僕建牌坊是兩費也奈何使一人兩費有司凡此數事寔所不敢當非敢匿心矯跡多爲枝辭以徼避讓之名重獲罪有道之門伏惟執事鑒亮命有司停止前事則幸甚理宜走謝面布悃衷坐病不能謹以書致荅舒雲川巡按使節之蒞于南土也且訖事而還之朝矣鄙人之所以伺候于左右者一未能展而左右之所以垂愛于不肖者顧數數有加焉旣不敢以草莽蹤跡溷擾公府念無可爲謝者其於盛德但知中心蔵之而已兹辱賜牌坊價五十金再拜感激益不自堪曩時郭徐諸公按于兹土亦嘗以此惠見及僕時尚蒙恩在致仕之後然于諸公之惠亦未之敢當也今爲編氓則又異矣郭徐於鄙人同年也而左右乃以此施之於山野疎逖素未嘗交際之人此其爲厚施益過于諸公然使僕不敢當於致仕之先而顧敢當于編氓之後其爲凟尊者之賜益大矣此僕之所甚不敢也謹告返於使人辱左右知愛之深當不以不恭爲罪耳請謝未期臨書不勝馳望伏惟亮之二執事之使於江南也輶車所至風裁凛然順之心竊慕焉乆矣然不敢一拜下風者葢守編氓之分不敢自齒於縉紳往来之禮也側聞薦章猥及鄙陋顧某迂贛無能人也硜硜自守雖僅不失繩墨豈敢謂有聖賢之志至於樗散抱病雖康濟一身猶且不足豈敢謂有經時之策而執事過采不虞之論未暇察其不肖遂以列於薦剡縱僕不自知愧其若左右知人何哉是以深用祗懼雖然左右之薦賢以爲國也而先於平生未嘗識面之人卽此舉動巳足以勵恬退之節而激貪競之士其所以繋世風者不少矣顧僕非其人焉是無以成左右之盛美耳雖然不敢不勉也所謂經時之策非山人所敢出位以思然聖賢之學則嘗聞之於載籍而講之於師友之間矣尚當以山中餘日竭此駑鈍反躬克己以㳤諸其身而免於大不韙焉則所以報荅知己者亦將於是乎在敢布鄙衷呉越密邇更容翹首再覩激揚之政如何如何與陳遜齋巡按某迂拙無似然至於慕德嚮賢之心未嘗不與人同而交際務施報尚往来之誼亦未嘗不與人同也自使節惠臨江南躬清苦之行以率先屬吏嚴激揚之政以整齊習俗某雖在山澤亦竊聞風而慕焉乆矣且使節莅敝邑兩辱垂問野人之廬而士夫間亦毎傳言執事以道義相愛因復自念僕未嘗一日淂奉教於左右而乃辱降意先施若此則又竊感且愧焉乆矣然則僕於執事不爲無所嚮往而執事於僕不爲無所下交矣其於所謂慕義之心報施之禮皆宜奔走自効於左右而乃缺然至今焉者非甚疎狂當不若是故敢以鄙懷布於左右某被罪爲民人也諸公髙誼雖過以士禮相遇而固陋之私則不敢不以民禮自居編甿之役旣非所以僣於縉紳之交稼穡之論亦非所以參於政事之間是以八九年来其於公門未嘗敢一窺焉葢非敢自爲偃蹇誠不敢以凟尊者也草莽之不敢見孟子之所謂不敢也且某多病早衰去冬復感隂寒遂成末疾兩足痿痺臥不能𧺫䬃然摧朽已成廢人惟屏跡村莊少藉藥物支持是以執事之門旣未及躬候而執事枉顧又不及擁篲以迎葢坐此也然則僕於執事交際之禮旣拘於分之不敢自盡嚮往之殷又牽於病之所不能自致惟有捫心懐慙而已念無以自達於左右故敢以書上并以爲謝幸乗亮焉與賈太守書史生還獲聞𧺫居與徳政之詳甚慰素仰弟迂疎無似自屏居以来四方知舊絶不敢通書或有書見及則荅之而已以爲山林屏廢杜門省過之人其禮自宜如是且亦平生自守其固陋而不敢失者也今春偶有素不相識鄕人名孫伸者持兄書惠見及當時姑奉荅一書後或言此人先造贗書以誤左右之聽聞之不勝惶悚弟自己丑偕兄登第至今十餘年雖至親未嘗敢爲之請囑雖在敝郡縣諸公亦素不敢有一字相囑乃爲素不識面之人請囑于千里之外亦可笑矣且弟縱不才亦素知兄之剛正豈宜以私于之旣以自愧又以自訟豈平生心事不能見于信此一鄕人所以至此也若果有此煩兄發其事治其人以爲作僞之戒并將原所造􅎓書發下一覽感感荅李中谿御史兄之使閩也一年矣辱以書下問者數四矣而僕無一言之獻豈惟素性迂戇自度不能然亦以兄之才力自足辨此耳旣又自惟以爲兄之才力固不待人然屢問而屢無一言焉是亦不免有負相知乃輾轉思之竟無所得惟有一事可以少效悃而塞下問之勤者則言之適在此時然亦自度非迂則戇也惟兄亮之而已且夫撫按之權舉劾最重百官之所以勸懲公道之所以開塞其繫於撫按舉劾亦最重然而今世所謂舉劾者僕竊異焉僕嘗僃員郎署矣嘗得日聞邸報矣或曰今日某巡撫舉劾奏至矣僕不問而知之矣或曰今日某巡按舉劾奏至矣僕不問而知之矣何也其所舉者可不問而知其必藩臬方面大官也其所劾者可不問而知其必通判縣丞小官也其所舉者可不問而知其必牽朋聯位不數十人不止也其所劾者可不問而知其必寂乎寥乎纔三兩人也如此則是賢者盡大官而不賢者盡小官也則是賢者甚多而不賢者甚少也夫使賢者盡大官又使賢者甚多而不賢者甚少則宜其政平而訟理苞苴不行於上怨毒不結於下天下可以卧而帖帖矣而顧不能然則是大官不能盡賢與賢者不必甚多而不賢者不必甚少也大官不必盡賢而賢者不必甚多不賢者不必甚少則彼舉大而劾小者毋乃大官則足以樹恩而小官無傷於任怨也歟又毋乃勢弱者易凌而根固者難拔也歟而其所舉所劾之多與少又毋乃厚市恩而薄引怨也歟如此則人心奚而得勸懲公道奚而得不塞也雖然固亦有藩臬方面大官而不舉或及見劾者矣嘗駭而問其人焉則是非能劾藩臬方面大官也亦非其人之果不賢也或負氣倔強不善曲媚者也不然則受人指嗾爲之快忿者也亦有通判縣丞小官而不劾或反見舉者矣嘗駭而問其人焉則非能舉通判縣丞小官也亦非其人之果賢也或多援善鑚最有力者也不然則其親與故也如此則所劾者縱非小官則必負氣倔强與為人快忿者也所舉者縱非大官則必多援善鑚與親且故也然則人心又奚而得勸懲公道又奚而淂不塞也由此言之爲撫按者固不淂以能舉人能劾人爲榮而必舉劾之不稱爲可懼矣今兄之所屬其爲方面大官者誰乎其爲州縣小官者誰乎僕山澤之人耳其姓名且不知也大官賢乎不賢乎小官賢乎不賢乎僕固不知也賢者多乎少乎不賢者多乎少乎僕固不知也而爲是多口者亦據素所疑於人人者言之耳然以兄之志剛而識明秉正而嫉邪固必不同於人人矣必能示勸懲而彰公道矣又何藉於僕之言乎然僕之爲是言於兄亦非欲兄之不舉大官不劾小官也非欲兄之所舉必少而所劾必多也大官果賢矣或矯而不舉亦私也賢者果多矣或避收恩之名而欲矯之以少舉不賢果少矣或沽澄清之譽而欲矯之以多劾者亦私也雖然竊以爲莫如精舉而愼劾則劾者固少而舉者固不得多矣或曰舉劾皆少則是善有隱而不彰惡有徽而不屏也是不然矣夫天下中人多而最賢最不賢者少也舉劾所以出於常格以待最賢最不賢之人耳若夫小善小惡則固有考語矣又何慮善有不章而惡有不屏也故僕以爲莫如精舉而愼劾兄意何如一言之獻如是而已惟兄, WYG: ''}
