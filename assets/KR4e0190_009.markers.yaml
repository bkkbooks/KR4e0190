  - {type: variant, offset: 15689, length: 1, content: 再, WYG: 有所求吾自求之而何待於人為之媒哉以為吾文苟有成則當求兄不成則不敢以累兄知人之明也及得兄序讀之}
  - {type: variant, offset: 15691, length: 0, content: '', WYG: 人益增慙汗吳下自古来文人正不少以為僕盖過二千年吳下詞人而直接朴㳺之文統既使兄為私}
  - {type: page-break, offset: 15691, content: '', id: KR4e0190_WYG_005-65a, image: WYG1276/WYG1276-0308c.png}
  - {type: variant, offset: 15692, length: 2, content: 章丘, WYG: 所好人若使僕與人争名争先然者非兄之所以愛僕}
  - {type: variant, offset: 15695, length: 5, content: 是再牧馬也, WYG: 使兄今日為僕作序則亦宜道兄與僕昔以文相切磋以才弱志隳幾成而罷之意句句道却實事庻使兄為不誣而}
  - {type: 'kr:newline', offset: 15701, content: '

