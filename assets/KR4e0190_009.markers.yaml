  - {type: variant, offset: 5706, length: 1062, content: 止之而不及也與徐少𥘉縣尹某罪隷之餘禮不宜復齒於縉紳交際之間是以毎逺引而去之竊以爲姓名不通於諸公乆矣兹又辱巡倉巡江二公之賜令人愧懷益不自勝欲作書辭謝又難于爲說是以敢有所請敎於執事也夫諸公之賜其名則幣帛果酒也而叩其實則白金也欲以辭幣帛果酒爲說則悖于其實欲以辭銀爲說則悖于其名是以措詞之難也古者禮存乎幣帛之先後世以幣帛爲禮此其實則旣亡矣而其名尚存也若夫市道之交則錢貨而巳矣雖然如公古道君子也如諸公古道君子也豈不欲行古之道而以市道歟豈以爲若某輩人者其好潔操行之心不能勝其嗜利無恥之心故幣帛虚名也金錢寔利也而特以此厚之歟不然其特以此愧之歟頑鄙之人可以省矣是諸公之所以廉頑也某罪隷也賜之幣帛不敢當賜之金錢不敢當豈其能自處以廉乎葢古之所謂不敢也然而爲嘵嘵者竊懼名寔之亂也公古道君子必且有以敎我矣某山野鄙人于當道諸公辱顧不敢荅辱賜不敢拜非以爲簡也禮不敢也荅與拜旣不敢不荅不拜又鄙心所甚不自安也向曾奉凟乞命吏人于鄉官掲帖中除去賤名以安編氓之分豈未蒙亮察耶恃在知愛乞如前所凟則上官可以不知鄙人姓名而交際之間可以冺然無跡矣附凟二讀清獄申文深知仁人之用心至悉謹篋而藏之以告後之君子以延長者之惠于無窮也更承示區處牌坊銀事往時所辭諸牌坊銀只爲未有所處遂至乆而不知所用之矣今用以修理書院不惟此銀淂有所著落且于風教有補焉甚善甚善但中問稱奬鄙人太過讀之且甚自愧也某嘗以爲今日吾輩之病太率在於寔行未修而虚名先著閫域不務而門面是張是以書院講學一節多爲具文而非彼此感應之真機而其志之不相同者則遂指擿以爲口實誠所謂吾黨有過焉者也况如僕者極疎且陋何敢當此乞于申文中自見今買莊一所以下至僦船以居數句及固以禮敦請講學一句敢勞削去是所以免僕于名浮之恥而亦左右相愛以徳之素心也幸亮之荅符松巖郡守讀沃洲公論船隻事綜理精密最是得策更賴公潤色而行之可以無遺黠蒐慝矣曩曾請敎地圖一節此法可以檢田畝可以聯伍保助守望可以知險易障塞水陸襟喉之所在昔人所謂視都知野知國可乎據而知焉者也然明公亦旣行之矣更望于田畝多寡地理險易襟喉處再加詳註而明公自精核之不得只憑里胥之文具而已更望明公于政事之暇時往一二緊要村落特省農功而因以親驗其肥瘠險易與圖相叅若此法立得有下落則自此以後興徭作賦設僃追胥不知省却幾多氣力絶却幾多弊端然此惟明公之實心爲民與明公之精力能行之故僕敢以爲說不然則徒作一畨騷擾而後日竟委之故𥿄無用也昨承教以因革之說當時草草泛及他事未及悉心以請此事不嫌于遲遲熟思審處在明公必能爲百姓長乆之慮不徒以一時興利去弊爲功容日更聞緒論也前所興革已陳于沃洲公者及備邊疏中論兵民事皆䝉賜敎幸幸與吕沃洲巡按, WYG: ''}
