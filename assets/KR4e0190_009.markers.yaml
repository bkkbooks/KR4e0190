  - {type: indent, offset: 15129, content: 　　　, id: KR4e0190_krp_009-bkkind33}
  - {type: variant, offset: 15130, length: 5, content: 呉峻伯縣尹, WYG: 安子介書謹具布被一端奉為令愛送嫁之需布被誠至質且陋矣然以之而厠於刺繡結繪綾綺綃金綴翠𤣥朱錯陳之間則如葦簫土鼓而與朱絃玉磬金鐘大鏞相答響乃更足以成文又如貴介公子張筵邀客珠履貂冠狐裘豹褎聮翩雜座既美且都而有一山澤被褐老人逍遥曳杖其間乃更足以粧㸃風景而不失其為質且陋也且夫桓少君之事兄之所以飬成閨行而出乎習俗之外者豈足多讓古人哉素辱知愛敢以家之所常用者為獻而侑之以辭不然亦願兄受之而以畀之媵僕之用可也謝歐陽石江巡撫啟伏惟明公負康濟之碩材當東南之重寄振恤瘡痍如春風所扇不間于隂谷寒門搜㧞滯幽如藥籠所儲無間于牛溲馬渤如順之者卑不自立少甞薄遊已甘屏跡于山林豈敢更求于聞逹且誦習徒知泥古儕軰多謂之鄙儒而器局難與適時明公誤以為國士收于衆棄揚彼王庭况自来無門舘賔客之交豈所取在牝牡驪黄之外夫不采而佩雖幽蘭亦捐苟有因而}
  - {type: page-break, offset: 15130, content: '', id: KR4e0190_WYG_005-41b, image: WYG1276/WYG1276-0296d.png}
  - {type: page-break, offset: 15130, content: '', id: KR4e0190_WYG_005-42a, image: WYG1276/WYG1276-0297a.png}
