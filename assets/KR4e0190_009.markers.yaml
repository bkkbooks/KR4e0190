  - {type: variant, offset: 40, length: 168, content: 葢辱明公之節取而汲引其退也葢辱明公之委曲以保全雖明公陶鑄庶類本不私于一物而樗材淂此則竊自愧幸以為過分顧迂狂成性動自罹咎其始旣無以副節取汲引之心矣尚幸有犬馬餘生山林精力誦詩讀書竊古人而兾自㳤則所以報明公保全之厚者或在乎此而不敢不勉也順之竊聞古之大臣進也以道所以濟時而亦所以正志退也以道所以正志而亦所以濟時顧進則濟時之功顯而退則濟時之意微伏, WYG: ''}
