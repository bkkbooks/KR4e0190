  - {type: variant, offset: 15418, length: 2, content: 心慕, WYG: 深自愧悔盖絶筆不敢為文者四年於兹將以少緩餘生為天地間一枯木朽株}
  - {type: variant, offset: 15421, length: 4, content: 敬焉文卿, WYG: 已}
  - {type: variant, offset: 15424, length: 1, content: 卿, SBCK: 􅀸}
  - {type: variant, offset: 15426, length: 3, content: 於事上, WYG: 欲盡取前稿燒毁以銷宿愆不意為人抄錄}
  - {type: variant, offset: 15430, length: 5, content: 圎於撫下是, WYG: 無錫卜君殊不相信謬行刋刻再三}
