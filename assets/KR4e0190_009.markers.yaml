  - {type: variant, offset: 15495, length: 7, content: 喋喋若此但桑克, WYG: 更置一莖草于鄧林棼棼}
  - {type: variant, offset: 15503, length: 1, content: 說, SBCK: 􅀃}
  - {type: variant, offset: 15503, length: 14, content: 說爲髙明者發耳傳曰善人受盡言, WYG: 間哉至於求序於兄}
