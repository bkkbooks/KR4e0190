  - {type: variant, offset: 15370, length: 4, content: 兒子一般, WYG: 不知有幾多病痛在也今且只悉心洗刮自家病痛盡時更看感應處何如既已深知吾友之意此後當益盡吾言耳草草與劉三府寒泉書荒荘重辱枉駕緣病體就醫不及擁篲耿耿承委送太府先生}
