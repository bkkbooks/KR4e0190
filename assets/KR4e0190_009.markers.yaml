  - {type: variant, offset: 4099, length: 804, content: 周約菴中丞論項守數辱惠書敎督以所不及深感知愛無量僕自去歲移家至陽羨與世利益疎濶此昔人所謂懶與病相成雖僅守固陋不敢墜失至於讀書窮理冀有新淂則甚不䏻也其何以仰副明公教督之勤耶知媿知愧兹啓僕友人有項喬者其人温雅純寔雖自處若謙退而其志常欲爲古人雖其貌樸野而其中寔耿耿然雖多臥病若不任事而蹇蹇奉職不肯一日尸乎其官僕於交游中知之景深而資其切磋之益亦最乆矣又自羅翁當國爲縉紳所輻輳而永嘉之人根株附麗攫美官鼓聲勢者尤衆喬與羅翁又有葭莩之親乃獨泊然自守不亂於羣甘心隱約不覬非望然此士人居身之常不足以稱喬而喬之不茍大率可見也此不惟如僕輩與之素交游者能知喬而士大夫亦多知喬者夫以僕素辱明公之知則固可以薦人而不爲僣以僕知喬之深則固可以薦之明公而不爲黨自喬在屬下二三年間僕不敢以一字稱喬於左右者豈復過避嫌疑使喬之名譽不通於上而歸明友之過於僕耶竊以爲明公精鑑近世希有又素以汲引人材爲心而喬之爲人必能在處有所樹立則眀公自將知喬而喬自足以受知於明公又何藉乎僕爲人媒也昨得邸報見明公薦三郡守獨不薦及喬則始撫然異之旣而思之何僕所料之不中耶豈喬之失其故歩耶或喬之廉靖宜於郡署而不宜於郡守耶抑僕秪見喬前日之善而明公秪見喬今日之未善耶不然則或有間之者耶不然則以明公精鑑照物無遁而喬也日夕在左右而獨不得借餘光焉豈其命耶夫人情翻覆不常旬日異態固有慝情爲善而後或敗露者矣亦有始雖强於爲善而後不免改節者矣僕又何敢以四五年前所見過信故人耶雖然喬悃愊可信人也以喬之素能蹇蹇奉職則其爲郡守不肯闒茸或可知也以喬之素不肯奔競則其在郡不肯自汚或可知也又未敢以過疑故人也雖然僕所取信者明公之鑒也明公之黜喬而不舉必有說也則是喬果可信者少而可疑者多耶果飾於前而壞於後也不然何爲其見黜於明公也耶明公非不憐材則是喬果敗露與改節也僕之心不能解也使喬之賢而偶未見知於明公則僕固不敢黙矣使喬果不賢以自取戾焉亦宜一請教於明公而與之絶可也是以不量狂妄而有是說焉伏惟亮而恕之幸甚與魏立峯憲司論, WYG: ''}
