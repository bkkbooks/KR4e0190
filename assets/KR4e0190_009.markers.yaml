  - {type: variant, offset: 5074, length: 459, content: 縣冗散之間此其平生心事信於鄉人而尤見信於鄙人父子間者也葢世俗所謂矯激修飾之過則有之而謂其忍於自汙或未然也小心怕事之過則有之而謂其敢於賣法或未然也其所以或致踈虞者則亦有說葢廉靜之士多短於才而周防曲慮似非朋之所長耳夫網之以跡而不必信乎其心上官之所以行法也在朋亦何辭之有矜其所長而宥其所短上官之所以曲成也在朋亦或可以自雪矣此兩者皆在吾兄而已或曰吾兄則知朋矣如上官之不相信何夫秋厓公古道人也僕雖未識其人而知其爲人也吾兄古道人也古道如吾兄宜無不見信於秋厓公朋之區區清苦宜無不見信於吾兄然則矜下吏之長而貽上官曲成之美是在吾兄而已朋迍邅世途亦乆無宦情但惜其見幾不早而已去官居官無足論者以事關名節不得不一爲之白耳僕向僃員京師不能稍引此人毎用以爲愧今其在難不得不一爲之白耳然亦昔人所謂惟執事可以聞此言惟僕於執事可以此言進也不然則朋爲賄吏而僕亦爲受賄人囑罪者矣知我罪我亦惟兄而巳冒凟不任悚悚與葉東園御史王照磨還稍能道兄初政所設施則已凛凛風裁矣而來書猶以未能行一事爲說葢昔人云施爲欲似千鈞努言其不輕發也兄之慎重不肯倉卒此幹大事者自宜如是耳然, WYG: ''}
