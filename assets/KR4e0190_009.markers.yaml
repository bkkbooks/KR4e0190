  - {type: line-break, offset: 15701, content: '', id: KR4e0190_SBCK_009-41b10}
  - {type: variant, offset: 15701, length: 24, content: 見攝山之愈進於精純而章丘之民與攝山益相習也雖然不, WYG: 亦}
  - {type: 'kr:newline', offset: 15721, content: '

