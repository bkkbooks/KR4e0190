front:
  text: 重刋荆川先生文集卷之一
  hash: sha256:839ba3b293f6cc953ce5faffd3d0e8d2d9669dd272f63c45de582956464565a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_001-1a}
body:
  text: 賦游盤山賦薊州名山也羅戶部邀逰惟隂陽之陶冶冥賴倒乎兩儀天星殞而爲石駭滿山之置棊捜萬象以效珍何殊状而相亞或藉草而羊眠諒仙術之幻詐或負嵎而虎蹲詫飲羽之神射或危臬危臬而欲走類靈鞭之叱咤或屹立而不動豈思婦之所化既簇隊以縱横亦累卵而髙下紆十歩而九曲枉矢乎石鏬逮礧磈之歷盡忽㧞起乎孤峯俯子孫之千億儼髙峙而稱宗倚禪宫而凝睇曠天宇之澄空向之紛紛恠石忽若懷寳而藏弓但見夫萬木蓊翳而青䓤一勺之泉大旱而不竭兮人言其下潜乎蛟龍女蘿薜荔紛披而交映兮七十二寺隱見森羅乎其中疑有悲歌慨慷之士不得志而自隱與夫仙靈逸客徃來而相從欲即之而無路兮時見一二野僧啓巖扉而鳴鍾侈佛廬之繁夥歷歳乆而不蕪饒萬樹之梨栗以衣食乎其徒何藂木之岑欝無一鳥之孤棲餘邊城之殺氣警羽鏃而遐躋泉觸石而鳴筝松受風而響濤時琤琮而乍噎倐悲吟而怒號憶連旬之廵歷饜金鼓之嘈嘈審聞性之不異任羣籟之相遭適儻而延佇忽四山之暝色謝耳目扵送迎向僧齋而偃息恍夢景之如醒覺餘興之未極晨起歷乎上盤境逾竒而路逾棘方踳躬而俯穿又縮足而仰捫驚半踵之在外愁欲度之猱猨得平柯扵髙頂接雲間之飛翼山童秃而無木響草蟲之唧唧岫逺拱而㦸森岡近繞而弧彎乃下瞰乎城郭曾不盈扵一環類黄鵠之再舉見紆曲而覩圎方悲人生之局促恒豐蔀以自藏眺溟渤之南匯子碣石之中巉轉秔稻扵東吳駛萬里之雲㠶笑卅鍾而石致曾不及乎凌波之艬連岡北矚天設梐枑列墉分戍隔限戎虜把都打來孰敢予侮嗤熟夷之桀黠乞哨卒之餘爼雖㷭火之暫虞嶷金城之永固惟山勢之既極俄湧塔之天造顯佛牙之光恠騰麗空之硨碯覽小道其若斯信精神之爲寳胡俛仰而成陳忽徬徨以囬歩悵中心之有違足屢却而返顧與流泉以偕逝睠巖阿而長憶豈淹留之無心畏簡書之偪仄詩游西山碧雲寺作得恱字此下係翰林時作端居滯文翰乆與賞心闋出沐乗休豫尋幽展懽恱渉澗俯潺湲攀巒面􅏭嵲邈哉神臯奥居然靈境别夷峻䟽深池塞坎搆崇梲浴室盪陽泉冰井䕃隂穴躋險惕暝昡逃逈欣超軼密林嬉猿獮逺峯挂虹霓宵看朝旭升晝見昏星列蔀豐光乍熹崖懸曜先晣景㑹萬象昭跡暌百慮絶巖棲庶可希從兹謝塵轍慶壽寺齋宿獨坐花宫月踈鐘報暁晴地超三象外人覺萬縁清茹素分僧飯觀空入化城真詮今已悟寜畏毒龍驚寓城西寺中雜言五首金馬違朝謁雲林乆卧疴堦寒鳴蟪蟈庭古䕃藤蘿束帶知圍减觀書厭帙多無人來問疾獨坐似維摩少年好踈懶遂與性相安經月常忘沐逢人或不冠鼎裏金将化囊中玉可餐解言脫屣易豈憚拂衣難緇塵坐自染白社偶相㝷俗子慚玄度名僧即道林三生空有偈五藴本無心說法何湏難忘言悟已深誰言龍藏逺亦在鳯城旁塔湧金銀界筵開功徳埸常明瞻慧月利渉藉慈航沉痼還能遣齋心奉藥王秋來不覺早落葉忽已繁物化每相代吾生尚何存㣲材同樗櫟僻地當丘園竊慕東方子一官堪避諠同孟中丞游龍泉寺二首山深人不到僊侶暫相從金馬聮驄馬晴峯映雨峯竹嶼今棲鳯花潭舊伏龍方欣窺妙偈遽擬謝塵蹤寳地風塵絶琳宫日月偏鴈來還繞塔龍去尚留泉戸裏天花落空中𣑽樂傳逺師休禁酒客醉欲逃禪普濟寺同孟中丞作宛轉雲峯合㣲茫鳥路通閒來竹林下醉卧石房中隂磵泉先凍陽崖蕋尚紅攀蘿探虎穴憇石俯鮫宫上客思留帶山僧不避驄夜深清嘯發流響入寒空秋夜捲帷望秋月月皎心亦清牀下寒蟲響庭前落葉盈漢隂鮮機械河上多道情一適萬事畢栖栖何所營禁中遇雨紫閣肅隂隂重門寒意深忽看百里霧來作九秋霖灑道先清蹕霑花度禁林楯郎方夾陛雨立濕衣簮夜霽秋月澄𥘉霽退公方掩閨稍聞金柝動坐望玉繩低巢鳥喧餘濕庭花落故畦覊人驚候變燈下理寒綈十五夜旅懷暫輟明光草言從洛下遊塵沙兩河夕風雨二陵秋鏡有潘郎鬢囊無季子裘更堪三五夜獨自下西樓望太行北望太行山嶔岑霄漢間倚天開疊障畫地作重關車向羊腸轉人從鳥道還一爲苦寒曲淚下摧心顔山行即事息馬依叢薄褰裳渉淺沙桃源無俗轍雲谷有人家凍壑含朝雨晴峯聚晚霞相期白社裏共聴演三車泛黄河曾聞星宿海上與月波連西走昆侖坼東流碣石湮魚疑入舟躍馬似負圖傳今日臨秋水望洋私自憐息中山亭子相傳昔人醉千日酒之地日日塵沙裏深愁行路難孤亭自超曠過客暫盤桓霜重飄梧葉雲輕度石欄不能千日醉幸托一枝安雨霽約孟有涯中丞遊山孟先出郭追之不及碧宇隂霏歛青林曉霽分山中期共賞野外復離羣即擬追飛蓋猶疑隔片雲行行思無限寒葉落􅌭紛送焦提學徃貴州書生非法吏猶跨五花驄山徭迎漢使海國𬒳王風爼豆夷酋識侏離譯語通爾鄉有名宦好去學文翁送李推官赴高州天子念南陲君才况抱竒秪将經飾律不以吏爲師賈客多踰海居人半雜夷雖言持漢法謡俗自湏知送蔣藩幕赴閩中結束千金劒辛勤萬里遊諸侯門下客才子幕中籌風島鯨波湧寒城蜃氣収自公多暇日望海幾登樓休沐家居簡陳約之祗役趨東觀校讐良以疲偶乗青簡暇復與白雲期任性形骸豁忘機鳥雀知裘羊何不至三徑坐相思送王生歸蜀明經多不賤嗟子倦遊歸只解攀鱗易何言獻璧非路難装欲盡客乆鬢将稀狗監誰相薦成都一布衣送何學官徃金壇近來稱藝苑大率數江南作師君不忝問俗我能諳家擅靈蛇寳人馳白馬談彬彬諸士子莫是出於藍送陳學官徃福寜州陳生才亦竒年少舉宏詞自信五經笥堪爲一卷師衣冠閩俗變文字海人知莫即傷淹滯三鱣更不欺送莫子良擢舉東歸漢庭方貴少羡爾早翻飛始應公車召旋聞駟馬歸衝星看劒氣逼歳換貂衣想到還家日閨中爲下機答陳編修約之栢鄉見寄莵苑俱将命瓜期獨未歸忽傳千里札坐使寸心違鬒髪行來變丹楓别後稀時時通逺夢恍是薊門非送蔣尉赴金華分野應星躔金華婺女邊㣲官君勿嘆福地古來傳洞有成羊石山多醸酒泉即令不好飲猶得學神僊送程翰林松溪謫居朝陽四首窈窕玉堂仙漂零瘴海邊烟花違北署鴻雁隔南天水暗疑藏鱷峯髙欲跕鳶應聞前席召誰道去經年天連窮髪國地近卜雞鄉禁闕心偏遶關河望轉長翻飛看鳯隱消歇怨蘭芳此路饒荆棘思君欲㫁腸朝陽何所似雲水日氤氲白晝鮫珠落青天蜃閣分山魈迎客斾海若識人文瀟灑韓祠竹清風今到君南溟君汎棹北地我驅車忽作分飛鳥深慚比目魚啼猿三下淚明月兩離居嶺外梅花發逢人早寄書送孔上公助祭太學歸闕里時賜衮衣一襲國喜嘉賔至人攀上客行來觀周室禮去入魯王城新衮山龍炫餘堂金石鳴聖朝稽古意待爾示諸生春夕皇甫膳部見過索觀鄙作留夜坐蓬扉春色徧栢葉夜筵開愧乏凌雲賦徒煩結駟來踈鐘出長樂明月照章臺痛飲湏投轄何言興盡囬輓張舎人二首閣老羅峯之子少小侍中郎人稱張辟彊方隨雞樹息忽是鳯毛亡劒歇雲間氣珠沉掌上光一經何所託重爲相君傷象賢超世胄服禮並文儒共羡昂霄鶴翻悲過隙駒藏舟人事盡賜履帝恩孤太息張公子衰榮遂爾殊汲縣謁比干墓下馬登丘壠藂林曲隧通碑因元魏樹地是有周封酒散荒池上人行秀麥中故宫無可問徒此對松風中嶽巫閭控北戸䓗嶺奠西隅兹地隂陽合中天洞壑孤黄樞標正位紫氣䕶真圖近接浮丘宅深藏軒后符䟽峯連太乙列舘象清都圜宫猶漢築馳道尚秦除肅肅泥書秘森森羽蓋趨僊遊㣲見迹帝幸暗聞呼露洗千齡栢霜封九節蒲星榆臨砌發月莢應時敷将訪三山記猶迷七聖途今朝陪廣樂直擬到方壺游嵩山少林寺浄域龍巖上香臺鷲嶺邊山由巨靈闢教以法王傳二室圍蘭若三花接梵筵土中元此地檻外即諸天複岫低衡岱廻軒寫澗瀍雲衣披雜樹虹影度飛泉綴牖皆青壁縁堤盡白蓮神猿叅講幕馴鴿繞爐烟慧月秋逾徹泥珠夕更鮮谷将鍾迸響潭共鏡爭圎萬刼終成幻三生併是縁願假金箆力一爲照迷川冬至南郊明王敦大報㤗畤禮神君位以南離正宵從甲子分月臨太乙舘星動羽林軍除道疑登岱鳴簫異度汾聲容六變合海嶽百靈紛封檢㣲題字屏帷悉畫雲神光人共見天語帝親聞盛跡誰能賦多慚扈從群奉天殿慶成侍宴饗帝在仁人郊雍景命新方看受釐日即是賜脯辰警蹕諠黄道衣冠集紫宸宰夫稱燕主蕃國備王賔鵷鷺千班序魚龍百伎陳鈞天𥘉聴樂五食共分珍禮厚過三爵恩均洽四鄰小臣叨醉飽拜舞祝千春朝謁長陵赫赫我文皇恢恢廟筭長定鼎慿天險因山作地藏三泉䟽鴈海萬壑轉龍荒雲結蒼梧色峯成金粟岡寝園馴象守松栢孝烏翔清蹕傳虚谷靈旗隱洞房遺弓仙馭逺上食繐帷張臣生良已晚幸此拜冠裳奉命分祀孔廟作後聖禮先師斯文今在兹将陳百官富詎止一牢祠入室瞻遺器圜橋展盛儀樂堪三月聴奠想兩楹時執鬯元公肅捧璋髦士宜鄙儒叨小相端甫奉前規觀中州進賀長至表箋恭述時寓信陽子月開周正朝宗協禹方諸神将受紀四海共迎祥望日扳仙仗呼嵩繞御床天威臨下國星使入明光􅊮管書雲物黄鍾獻樂章欣逢陽道復願祝帝圖昌登孫登嘯臺即阮籍閒登嘯處晉時肥遁士長嘯此山隂自逺龍蛇跡能爲鸞鳯音清淨同河上沉冥異竹林坐超惟黙理妙契守雌心逸駕應難返荒臺尚可臨俯看恒衛水遥見太行岑砌冷踈花發扉扄落葉深寜知千載後更有阮生尋銅雀臺二首玉盌從兹閟銅臺空自寒分香留故愛同輦罷新懽急管銷魂易輕絲續命難何因作雲雨彷彿夢中看漠漠龍髯逺飄飄繐帳空自憐妾薄命不得奉君終望幸非前日棲靈是舊宫翠𥜗霑薤露錦瑟入松風鸞鏡時猶照蛾眉歳不同誰能更歌舞心折望陵中嵩陽宫栢乃漢武帝所封将軍栢嘉樹植崆峒年長勢更䧺已無秦帝幸尚有漢皇封榦比孤生竹根猶半死桐靈泉玉女灌甘雨嶽神通葉密鶯難度枝樛葛易䝉垂隂九華帳弄影五雲宫色掩重巖翠聲含衆竅風賔來虬蓋偃仙去鶴巢空非因不材壽春秋自無窮詠天壇梅花名卉來南土竒葩曜上方花遲疑避雪葉早爲迎陽靈液滋玄榦仙雲拂素裳無言恒歛笑不謝暗飄香夕伴芝房月朝承莵苑霜飛窺玉女鏡舞撲羽人觴擬結千年實先呈五出粧帝羮如可和持此奉明光詠蛺蝶花蜀地羅裁就蜀有蛺蝶羅漆園夢始通何言金翅色翻在碧林中未辨逍遥影爭矜點綴工採香蜂趂侣啄蕋鳥衘蟲易濕縁多粉難飛詎少風美人笑來撲誤使損芳藂狂歌行贈孟中丞有涯我生苦纏縳雅志在泉石不嫌歩兵散翻笑中散窄前年奏賦天北隅頗道君王愛子虚衣冠對日趨香署劒佩通宵過紫衢紫衢香署千官聚五陵豪氣徤如虎鸚鵡何曾慣錦籠爰居元不識鍾鼓焉能俛首學侏儒局促羞爲轅下駒從古長安誇巧宦張湯爲智汲黯愚以兹謝病且歸去釣竿逺拂富春樹終日遭逢眼未青三年塵土衣猶素今日亦何日忽如入塵門公也襄陽夫子之耳孫升堂更不問寒温寫盡肝膈相與論朝看賢隱山暮折申臺栁坐我白玉筵勸我青荷酒談詩公作指南車對局誰看射雕手君不見中郎倒屣迎王生又不見北海忘年交禰衡相知何必結交早一言合意千金輕狂歌未㫁壺未傾門外驚聞征馬鳴落葉東還西亂雲縱復横花間月下儻相憶請公誦我狂歌行皇陵行皇陵鬱鬱標淮甸泗上諸峯盡相面衣冠月出鬼前驅劍璽晝扄人不見銅井沉沉碧砌寒綵霞隱映紅闌干碧砌紅䦨松栢裏迢遥複道中天起石馬隂嘶萬歳山名雲靈風暗捲長淮水