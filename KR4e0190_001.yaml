含玉樹清古徃今來成悵望叢臺孤月向人明龍泉寺懐顧南田使君顧以公事不至復惠酒助看山之興琳宫窈窕碧峰隈歴盡巉巖更上臺不見踏花驄馬至虚看送酒白衣來山中泉石誰相賞天末烟雲望屢囬聞道使君能愛客習池還擬接仙杯詠崔後渠書屋碧山學士隱墻東叢菊蕭蕭卷幔中開逕自湏同蔣詡著書元不愧楊䧺分畦粳稻清溪注對戶峰巒翠靄通未許棲遲三畒宅還應密勿五雲宫題張學士仰宸樓樓藏賜書瀛洲别舘切清虚詔賜綈緗出石渠秘典自驚墳索上祥光遥映璧奎餘簷前烏下疑翻字草際螢來爲照書借問鄴侯三萬卷何如今日沐恩殊題張學士陽峰卷陽山秀色滿南州薜荔叢生楚客遊三峽猿聲偏入夜千巖楓葉早知秋仙人結宅雲烟近太史藏書洞壑幽便欲焚魚應未得共言明主待謨謀送張學士歸蜀省親曵履暫違金馬署承歡遥入錦官城欲從狄相雲間望却向王陽道上行旌轉層峰朝雨色舟廽極浦夜猿聲到家已是𥘉冬候聞道林中笋又生潞河别林汝雨提學浙江君去㑹稽何日到諸生湖上待花驄定因立雪知游酢不獨傳經似馬融行載圖書邀海月坐移帆舸信江風剡溪見說好山水苦欲相從柰轉蓬送黄叅政赴陜右黄子風流世絶倫翩翩江海謫仙人紫薇開府勞分陜白馬乗春逺入秦三輔烟花迎使節五陵豪傑望行塵丈夫得意應如此誰笑蹉跎白髪新送項膳部遷之南行兼呈劉祠部春流瀰瀰碧波深送逺其如南浦心魏闕幾年叨結綬江臯千里惜分襟君遊白下貪雲卧予滯金門笑陸沉郎署故交如問訊邇來惟有越人吟送高行人使琉球天王玉冊頒三殿漢使星槎下百蠻鬼國至今通象貢樓船何處度龍關海迷南北惟慿日雲起蓬壺忽見山壮志不愁經歳去安流應是計程還送王侍讀赴南都玉堂學士賦南征躍馬鳴騶出上京奉詔明光新佩印校書天禄早知名石頭城下春流滿白鷺洲邊芳草生此去周南異留滯看君到處即蓬瀛送樊大夫㑹朝長至中宵緹室吹葭管候曉玄堂駕鐡驂天子迎陽䟽玉戶群方獻壽拜金函預占黄道卿雲見慚覺朱城淑氣含擬欲從君觀盛典使星猶自滯周南送周雲卿之任通山湖南此去意何如緑浦清楓萬里餘地僻且看衡岳雁官貧豈食武昌魚千家鑿井分江水幾處開田傍石渠由來撫字惟良牧天子他年有賜書寄周中丞備禦關口牙旗高建白羊東鼓角殷殷瀚海空雪後錦裘行塞外月明清嘯滿樓中幕南五部思歸義薊北諸軍盡立功燕頷書生人共羡一朝投筆去平戎答周約菴中丞九日欒城道中見贈月卿仗節行燕甸星使乗槎向洛陽傾盖偶從黄菊候開軒共醉紫茰觴樓臺塞接風雲變巖谷迎寒草樹荒戯馬新詞重康樂踈才何以答揄揚送施貢士子羽南行何用相逢歌莫疑感君落魄不勝悲長鳴自許驊騮並高志寜求燕雀知已道群公能倒屣也應天子幸同時金陵樓閣秋雲裡肅肅遥瞻鴻漸儀送人上陵作玉園霜露向秋澄節序𥘉臨祀事興恭將圭璧朝群帝遥奉馨香薦五陵祠壇眇眇神光下路寢熒熒燎火升宣室于今敦孝感還歸早慰聖情凝覽任少海吏部慶都留題悵然懐人因次其韻帝京冠盖同遊日曾忝聲名李杜齊碧樹不堪思逺道綵毫河意覩新題書傳劒閣鴻猶阻月滿燕關鵲未棲尊酒論文那更得暮雲囬首雪峰西贈袁御醫芳洲家本東南海上村翻因避世向金門熊經自信窺真訣鴻寳還将獻至尊鳴佩偶隨供奉侣下簾長對道家言山人不厭少生事種橘年來滿故園張相公壽詩帷中運䇿九州清共說留侯在漢京賜第近連平樂觀入朝新給羽林兵儒生東閣承顔色酋長西蕃識姓名却望上台多氣象年年長傍紫宸明趙州懐古千秋覇業消沉盡風俗猶傳趙武靈市上美人揮錦瑟埸中俠客舞青萍鴈門北去通沙磧鳥道西來入井陘欲向平原訪公子蕭蕭賔舘戸長扄吕翁祠堂世所傳邯鄲夢者也吕翁祠堂漳水曲高秋爽氣何氤氲松間隱隱鳴仙樂簷際時時駐彩雲浮生一夢誰能度羽客千年不可群未湏白首牽朱􅌧欲向丹丘訪赤文題劉蕡祠歳暮江山揺落時客來下馬入荒祠獨傷徃事堪流涕欲問遺墟不可知璧玉無因終易棄龍鱗有逆竟難披今日登科還我軰對君顔厚更何辭朱仙鎮觀岳將軍廟丹青畫壁閃旌旂想像勤王轉戰時黄屋未歸南狩駕金牌已罷北征師平蕪漠漠前朝隔曠野隂隂暮鳥悲惟有西湖原上樹春來猶發向南枝和陳編修約之禁中雪詩二首建章今旦滿清輝朔雪􅌭紛應候飛忽飄九陌從風散漸積千門待日晞素影偏摇宫女扇輕花欲上侍中衣最是相如能獻賦霑恩新向莵園歸靄靄同雲覆帝畿銀宫玉宇特相宜飛花遍入披香苑積絮㣲消太液池三署暁光凝劒佩九門寒色映旌旗亦知聖主揮天藻不羡周家黄竹詞詠夾竹桃海南有桃枝竹故首句云云桃竹舊傳生碧海竹桃今見映朱欄春至芬香能共逺秋來花葉不同殘踈英灼灼分藂發密蕋菲菲對節攅不信千年將結子錯疑竹實待棲鸞和詠霧中榴花仙曹飛霧暁氤氲幾樹珍花望不分纎蕚蒙茸俱襲錦高枝撩亂稍披雲𥘉疑葉上緇塵染轉覺叢中淑氣薫爲問江頭歌綘采何如玄女裛清芬江淹石榴賛曰紅花綘采九月晦日鈞州公舘見菊天涯已逼三冬候客舎仍開九日花無那繁香經雨歇獨看踈蕋向風斜飡英實有騷人興送酒虚疑陶令家想像故園揺落盡倍令遊子惜年華村居二首此下係前家居時作偶然灌園興不是學於陵醉卧松間月行攀巖下藤睢于竊自愧捭闔又無能惟應白社梩談笑共高僧山人頗好事蓬戸掩還開四野緑禾滿三秋白雁來授衣裁短褐飲蜡獻新醅即此堪投老栖栖竟何哉村夜纎月生西浦流光照北林群喧一以息百籟相與吟始悟丘園裏能生清浄心悠悠何所嘆獨坐撫瑶琴同皇甫子循遊横山二首曲磴行來盡松隂轉寂寥不知茅屋近却望石梁遥葉響疑聞雨渠寒未上潮夫君軒冕客此地欲相招常時思獨徃坐爲塵事攖幸接金門客相攀桂樹榮峰㣲片雲度谷静衆禽鳴何年將結社與子共逃名夜宿王氏莊微月掛孤壁四山何悄然因穿蘿徑去忽造竹林邊叢木深寒氣平蕪淡野烟徘徊興復盡還就茅齋眠暮春游陽羡南山四首清谿知幾曲惟見白雲深一入蘼蕪徑欣聞樵採吟春鶯未停囀夏葉始繁隂乗此縱長嘯悠然物外心洞口石縱横流泉復有聲柴門何處入雞犬自相迎靈草知昏暁時禽識雨晴非因罷官乆誰得此閒行到處暗杉松多言路不通却從青嶂外轉入緑園中谷口逢茶女溪邊狎釣童勿嫌踈散甚吾亦是愚公花落已成蹊村村緑葉齊一園通蝶戯千嶂隔鶯啼澗草多名蕙山人舊姓嵇窮歡猶未返忽是夕陽西同林尹遊會真菴言㝷仙子宅窈窕傍清溪望氣行應近穿雲路屢迷人閒多歔鹿樹老更棲雞願得使君姓留將石上題游馬跡山宿許道士房有贈二首獨仕水中央言修不死方開簾見白鳥隔院度清香機息何妨奕神全可却糧偶來分半席遽使世情忘四週環積水信此羽人居鳥下忘機後猿窺搗藥餘閒㝷漁父伴自註道家書笑我勞生甚逍遥爾不如題閻泉川副使莊閻侯貧已甚尚有種瓜田潭巖相映帶農圃與周旋刈秫盡供酒賣𬞞時得錢躬耕豈不苦所貴無牽纏謝病贈别高叅政子業逝將歸舊林復此別知音綰魚慚分薄解劒感交深目送三河使身分十畆吟從兹一相失長嘆隔飛沉罷病歸訪王山人含真一與山翁别年華每自傷還因解龜後重問養雞郷蘿薜窓中影鉛砂枕上方鴻蒙常不語何以答雲將送王良醫徃岷府獻方曾待詔何事向江干帝側無人薦王門且自安青楓連逺道白首寄㣲官莫惜囊中秘淮南欲合丹贈王潼谷出守保定王尊仍出守躍馬上金臺共說股肱郡湏慿鎻鑰才雄兵六蕃擁天險一關開不爲長城寄誰令高蓋來贈春巖王尹朝京赤縣神明宰如君最少年無言似桃李有志笑鷹鸇得暇即開卷長貧不受錢此行人共羡名在御屏前送白尉徃湖州君家太湖北作吏太湖南驛路雞鳴近山城樹影含萬川䟽沃野百室競春蠶幸此猶吾土㣲官也自堪送胡主事榷稅荆州南州饒齒革此去豈徒然言徴山海賦用助水衡錢井邑千金市江門百丈船錐刀未可筭寛大見君賢丹陽别王道思三首乆已廢逢迎蕭然世外情因君訪茅屋相送到江城逺岫雪中緑寒流冰下行可堪此時别獨自返柴荆卧病不知乆見君三徙官還將鶡冠賤來伴豸衣歡秉燭驚宵曙同衾屬夜寒平生學禪寂猶自别離難書生多落魄羡子最逢時繡服官方顯青衿職所司鑄人稱道術倚馬見文辭徒抱彈冠意迂踈自可嗤夏日聴沈君彈琴詩三首山居足清賞獨恨不能琴偶接青谿客因聴白雪音寒暄乍飜復丘壑轉深沉誰道嵇中散風流更可㝷知君技入神一歇一畨新撥處疑非指聲中似有人空山鳴落葉暗水躍潜鱗何獨吹簫客能生隂谷春忽聴使人驚空山迸一聲能令草樹裏齊作秋蟲鳴暫與松風逺還同石磵清曲終人欲散纎月照南楹贈宜興張醫二首翛然一逸民山郭徃來頻乞藥從貧士傳方自異人草間收伏莵澗畔煑香蓴嘆息市中客誰知百歳身生長白雲巖仙書宿所探千金方不惜百草味俱諳採藥行山外藏身住市南獨抱文園病逢君試一談次韻贈陳后岡昔日京華居同君直玉廬蛾眉寜見妬樗散自知踈佩印紫薇署垂綸滄海魚爲農吾已矣作吏子何如送李文與赴河南郡倅任去謁河南尹期收幕下勲地當分陜處官是古叅軍閒就繁臺宴晴瞻嵩岳雲諸公誰不愛怒喜定隨君次韻答張戶部羽卿自笑如山木何言是國琛一丘幸有托百事已無心敝褐寒增絮新詩病懶吟非君重交好誰念碧山深送董兩峯應舉小年同硯席惜别自依依此日獻書去何時負弩歸亦知予偃蹇不共爾翻飛爲報吾翁道於今戰勝肥九月八日作日日閉門坐今朝復如斯窓中見風雨始知重陽期海燕已辭主黄花未滿籬余心乆委化何用惜良時送真州蔣生至宜興親迎歸相門甥館得才郎文藻翩翩貌復掦十年乆著鳴金賦一笑今游射雉埸江南江北路非逺幾月辭家猶未返他郷芳草自相留今夕佳期未爲晚歸去春洲漲緑濤滿川桃李送蘭橈若使長江作天漢應言仙女度星橋送莆田方生自宜興歸應試聞君誦詩滿三百十年落魄常自惜書生只是數多竒俗子空嘲玄尚白那能環堵事窮愁乗興飄然賦逺游荆溪山水清且美屢月貪歡猶未休荆溪茂宰君妻弟思君不謂君能至山拗水曲日追隨相對渾忘郷土異君不見荆人刖足售良玉好醜由來隨世俗期君此去早揚眉一戰能亡三敗辱送林宜興遷官南部移家偶愛山中静地主何煩重相敬吾生耻學茂陵郎如君豈是臨卬令誰言陋巷不容車勞君擁盖常造廬誰言簿書日紛紏勞君爲我頻置酒五月清溪暑氣㣲淹留竹裏共忘歸乍看朝霞𥘉冐嶺忽驚夕露欲沾衣清才自合飜飛早一朝西上金陵道請君别後數寄書山中相識日應少題東石草堂圖贈黄松江連山㫁若缺一溪百餘折古松三四株爪秃骨半枯聞道閩山乃有此誰將輦載來東吳松江太守好静者迹在風塵心在野苦欲還山未得還故託良工爲摹寫太守昔年卧茅荆日日看山無俗情醉來向東拜白石誓與此石同死生豈謂金門被覊束復向名藩分虎竹横金衣錦世無比太守只言非所欲乃知碧山不負吾駟馬高盖胡爲乎有時吏散重門閉焚香獨隱鳥皮几披圖相對一莞然不覺逍遥數峰裏樵人漁子似相識手招兩鶴勢欲起扁舟却在窓戸間便欲乗虚泛清泚真邪假邪何足問世間萬事亦寄耳雙壽圖歌爲叚翁作是誰寫此大椿樹爪牙縮張相攫吞輪菌偃蹇據絶壁氣凌萬木皆兒孫似鼻似口挺竒幹半枯半嫩蟠靈根千年神物照魑魅滿山精恠爭崩奔樹上懸泉始一線飛洒樹裡成千片匡廬瀑布不可㝷忽向今朝眼中見立石復似五老峰雲氣糢糊露頭面可憐此樹與雲石蒼然一色誰能辨石間異草何其多紫芝㐲兎森交羅仙萱自是百草長緋葩翠葉呈婀娜上承老樹頼嘉䕃亦如松栢掛女蘿蕭然相伴歳月晚長養齊霑雨露和吾郷叚翁住東郭夫妻七十鬢未秃翁家猶子擅丹青手揮絹素爲翁祝一枝一莖亦有情五百春秋逓相續請翁披圖應自笑形固可使如槁木贈王君五十歳君家城市裡終歳常閉關青松白石滿庭内不許俗人相徃還看君本是山澤臞年來戰勝身亦肥但道龎公堪自老何湏蘧瑗更知非題龍圖世人畫龍得龍皮叔也畫龍得龍髓當其停手凝思時青天颯颯生風雨却恠三年不點睛那知一日飛騰去山莊閒居身名幸自謝籠樊白首爲農誓不諼慣住山中知鹿性數行樹下識禽言巾車每許鄰翁借書帙間同道士翻醉後漸看松月上滿村雞犬寂無喧遊神墩寺次壁間韻二首新兩郊原草木柔葛巾黎杖此尋幽藤垂小徑蟬聲滿苔合荒庭鳥跡留隱几翻經聊習静慿高望逺一銷憂相逢更是烟霞客携手同爲汗漫遊古藤千尺猶自柔布葉垂隂滿院幽楓樹暗隨清磬響山人欲去白雲留談玄幸有飡霞侣違世已無食肉憂不識老僧蓮社裏可容携酒日來遊登墩此墩可望茅山藂竹裊裊迎風柔古墩掩映清湖幽㫁烟白鳥雙洲逺落日青山半景留耳聴鳴蟬知換節坐移芳草覺忘憂興來更望華陽頂想見仙人駕鶴遊廣德道中蒼山百轉見炊烟茅屋高棲古樹顛細雨薜蘿侵石逕深秋稉稻滿山田雲中望影迷遥岫草裏聞聲覺暗泉倘遇秦人應不識只疑誤入武陵川泊淮上作楓林望盡見蒼山桐栢飛流入楚關潮散海門孤島出月明渡口數帆還客夢祗驚青瑣逺滄波長羡白鷗閒聞道淮南多桂樹朝來杖䇿一相攀淮上五日泛湖同蔣别駕世和青蘋裊裊漾㣲風輕舸逍遥暫此同客裏緑蒲驚節換尊中清酒覺愁空一徑荻蘆行不盡數洲魚鳥歔相通向晚前川簫鼓發猶疑風景似江東聞復官報寄京師友人姓名不復挂朝叅魚鳥由來性所耽篋裡符經都已廢山中藥草漸能諳踈狂自分三宜黜懶病其如七不堪深謝故人推轂意莫將陽羡比終南代柬寄京中舊游莫湏彈鋏嘆無魚自愛山東搆草廬雨後亂蛙生敝竈秋深落葉伴閒居身隨老圃偏能慣論學濳夫愧不如故人休訝無相訊中散從來懶作書寄贈曾郎中再入禮部文昌秘省倍光輝傳道仙郎去復歸三署㑹應尋舊草五時猶得賜新衣官閒常似遊丹壑賦罷多堪獻紫㣲徒使昔年同宦侶頻於清夜想音徽家居贈别陳僉事約之已甘蹤跡滯丘樊蹔逐行麾思欲翻才薄最宜明主棄身貧獨感故交存蒼苔掩徑誰相過芳草懷人未敢言知君王事方鞅掌不記於陵長灌園臨清十五夜柬陳太史約之行人向月占消息一望雲端百感并南去關山猶未半東升蟾兎已先盈乗槎且傍魚龍宿繞樹那堪鳥鵲驚憶與仙郎當此夜幾囬聮珮侍承明贈陳僉事約之生日青春綉服儼神仙早歳爲郎霄漢邉問齒方知散騎後論才已是洛陽前官遷栢府多推望經絶韋編不待年衰病無能真自棄慢將犬馬愧君先崔鎮道中晚望懐陳約之郊原極目思依依楚水連天楚樹㣲逺浦潮生人獨徃寒林風静鳥雙歸泥塗自覺朋遊好日月偏催旅鬢稀念爾同爲南竄客烟波何事更相違贈别義興林尹遷官移家本爲採山薇茂宰風流更可依滿逕蓬蒿頻問訊開尊竹石幾忘歸高才豈得淹黄綬野性惟甘卧薜衣今日河梁送君後柴關車馬又應稀次韻贈施道人御氣曾聞老氏柔寄身偏愛水雲幽道書數卷只自註生計一錢常不留賣藥人間應是謫挂瓢樹下復何憂猶言妻子能相累自戴黄冠學逺遊寄題顧東橋侍郎戴酒亭後世還聞有子雲爲耽寂寞卧江濵門前即是尋山路座上偏多載酒人禄位已非執㦸賤文章真與太玄鄰欲比侯芭應自笑不知何日望清塵送樊醫歸南昌山人自小愛遊方尚說懷歸意不忘别友因留隔歳藥還家試解百金裝澄江盡處聞郷語暮雪深時到草堂願爾常如秋後鴈一年好是一來翔贈張地官督賦江南皇家財賦重江淮浮濟逾河歳歳來豈謂司農方告匱故煩節使逺相催舳艫接水通千里齒革盈筐備五材民力東南已如此因君一爲獻蘭臺贈南都莫工部子良夏至齋宿署中萬乗親郊幸北宫千官齋祓兩都同靈光正想泥封上清夢遥依輦路通烟散玉爐知晝永星分銀燭坐宵中聞君已就汾隂賦猶向周南嘆不逢送彭府倅進賀聖節表曾叨執㦸侍楓宸猶記呼嵩拜舞辰獻壽頻將金鏡拂入班許覩玉顔真自憐拙疾辭明主因卧丘園作外臣今日送君何所道祝尭長比華封人宜興舟中讀徐養齋詩稿因思奉别之乆悵然有懷二首清溪南望五湖連竹樹隂隂兩岸間桃李孤村春欲盡蒹葭逺水思俱閒散帙曲中驚白雪卷帷天末見青山故郷共是投簮客猶恨高蹤不可攀昨歳相逢冰雪深忽看春色獨驚心清風每憶人如玉嘉句堪言字比金四壁荒廬拚自老連洲芳草共誰吟思君坐惜年華暮明月扁舟試一尋覽徐養齋見懷毛古菴及小子之作存沒感懷和韻早歳曾陪履杖遊遥思墓木已三秋美人去後空聞笛芳草歸時獨倚樓世上玉顔還易老山中石髓杳難求却慚司馬頻相許擬向清湖共釣舟和徐養齋移居二首何年挂却侍中冠新築山居一畆寛種黍聊爲終歳計移花應待早春看門依緑樹人稀到身謝紅塵夢亦安更是謝家兄弟好長吟池草對江干窈窕巖阿叢桂秋清谿一曲草堂幽荒園自向閒中翦靈藥多從病裏収葉上題詩應滿樹沙邊載酒不驚鷗莫道東山淹謝傅蒼生日夕待嘉謀題贈施心菊醫士聞道仙翁昔種菊君今對菊獨凄神蕭條三徑猶含露悵望深秋似有人肘後傳方多已試鼎中留藥不嫌貧相從何日東籬下願乞餘香慰病身贈江隂陳君幽棲選地傍江濆高士風流宿所聞身着薜衣稱隱吏園多橘樹比封君琴尊不厭丘中賞魚鳥堪爲物外群恠爾眉間多道氣年來曾讀五千文寄劉範東提學不材因得返園廬窮巷猶存四壁餘生計十年思種樹病身終歳強移書山僧白社容相徃長者高車日與踈疇昔虚蒙國士待於今樗散更無如題伯祖平樂守素齋翁像國史已収循吏名蠻方猶憶使君清祀留桐縣如朱邑文諭南夷比陸生公有華夷解諭交趾湘江又見棠花發公嘗令零陵而余父於公爲從孫又守永州灕浦還聞爼豆成清白傳家自公始高門大纛豈爲榮吾鄉自國𥘉以來中科第爲逹官者幾何人而以名宦見録於國志如平樂公者不數人焉何其囏也嗚呼非其誠心愛民㓗已何以及此今其子孫雖淡泊然清白吏子孫也固有餘榮焉使公當時亦與衆同汙其子孫紈綺驕侈如他仕宦之家則有之矣安能垂名皦日如今日也哉此孔子所以致辨于齊景夷齊之間有志者必不以彼易此而吾唐百世子孫所宜鑒也既題公祠因志所感於後和朱子學遷居辛勤四十有此居生事蕭條只晏如行李隨身一長鋏踈藤挂壁數椽廬愧無厚禄堪助汝寔有高文能起予獨惜楊䧺名位薄世人誰識太玄書程副使輓詩同年舜敷之父帝里風烟幾度逢此行復與仙郎同傾城冠盖通家後故國江山對酒中老憶舊遊經畫省閒㝷芳草到禪宫亦知今日遊魂處多在清淮白露東嘉靖丁酉秋余始見公於金陵公留余飲酒自言少時爲太學生始遊金陵後官於郎曹居此者十餘年自閒居以來常思雨花牛首之勝輙爲之慨然已分此生且休矣今老且病誠不自意復能至此每過舊遊處歴歴如昨日事乃知江山長在而人命有極牛山之淚可復下乎語畢公掀髯而笑余亦歡飲盡醉别去至冬而公卒盖别公後纔四月也嗟乎公而有知尚能復來金陵矣乎故予作詩以哀公叙金陵事特詳云元夕詠冰燈正憐火樹闘春妍忽見清輝映夜䦨出海蛟珠猶帶水滿堂羅䄂欲生寒燭花不礙空中影暈氣疑從月裏看爲語東風暫相借來宵還得盡餘歡重刋荆川先生文集卷之一
