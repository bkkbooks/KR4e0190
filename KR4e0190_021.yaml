front:
  text: 新刋荆川先生外集卷之三
  hash: sha256:20453f585e740e50b10e72fec86350be85b15d5c12959fc3131c851a19e5f0f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_021-1a}
body:
  text: 公移咨總督都御史胡照得江北賊勢始因副總兵鄧城等諸将官不能禦之於海延賊登岸繼因諸将官不能遏之海岸延入内地四散猖獗前後積至六七千人廵撫李因見賊勢重大移咨貴院及移書本司請發援兵一日再至比時本司巡歴崇眀海沙方督諸兵船出洋打賊聞報驚惕馳詣浙省會同貴院計議深惟陵寢留都之重稍有震驚不敢辭罪先是貴院㑹同本司具題用銀一萬兩募山東兵三千名至江南防禦比因江北事急蒙貴院及本司各遣牌與原募沂州兵都司何本源青州兵把總邢鎮即令統兵駐劄淮揚聴廵撫李調遣殺賊隨發守備高湜溆浦兵五百名賛畫沈遷桂汝攀鳥銃手五百名周衝箭手一百名鎗手二十名葉燦處州兵三百名繼發指揮彭鶴年土指揮張空等鎮溪兵一萬二千名四月十四日牌遣副總兵盧鏜統領諸軍徃江北應援貴院以抱恙𥘉愈不及自行本司監督以徃比十六日至嘉興忽得廵撫李止發援兵牌面土兵萬餘陸續已到崇徳等處俱各驅囘貴院深恐賊情難定止将張空等七千名調發台温殺賊而令彭鶴年一枝仍舊徃江北應援盧鏜以圍賊扵崇明三沙不及依期赴調本司遂将諸兵以行二十日馳至揚州是時賊分南北兩枝其北枝蟠據廟湾塲其南枝蟠據如皋其北枝直衝淮安巡撫李躬督官兵分為三哨參将曹克新領廵撫中軍為中哨沂兵為左哨青兵為右哨大敗賊扵姚家蕩共斬眞從倭首千餘級餘賊尚據廟湾巢四面流刼者又復竄入巢中是時南枝賊勢張甚殺趙千户韓鎮撫及毛葫蘆兵殺傷頗多海防副使劉景韶屢屢告急廵撫李即囘揚州本司亦適至相與會議南北分擊本司擊如皋之賊而巡撫李擊廟湾之賊二十三日本司行過湾頭十餘里北得報廟湾賊復張殺蕭千户蘓百户官軍亦多𬒳殺傷廵撫李即移書邀本司同徃廟湾擊賊而以南賊付之劉海防二十九日巡撫李與本司發淮安駐馬邏去賊巢七十里而軍五月初一日廵撫李以主客兵付本司而身駐馬邏調發兵食本司移營至新溝東去賊巢十五里而軍露宿何本源營先是何本源及淮揚中軍指揮倪禄别領沂州班兵千户王皋及南京兵部尚書張所遣家丁白虎等四十名已營新溝參将朱仁千總苗騰與廟湾賊巢及諸軍隔河而營高湜沈遷桂汝攀葉燦周衝等五軍及邢鎮所部青州兵則随本司徃營眀日午時本司率諸軍覘賊零賊適徃北路刼掠而㱕諸軍奮勇入巢鳥銃手先縱溆浦處州兵繼之主客馬軍鎗箭左右翼巢賊多中鉛彈馳𬒳賊拖入巢不能得首級遂抽軍還營是時廟湾之巢墻厚如堅城樓居平屋延袤三里深房曲巷險如設阱皆平時塩塲富商所築以禦宼徃年及今賊皆據之以禦我軍賊又燒絶外屋止留空墻以防火攻其背據大河搶船五十餘隻聮營浮橋通南北走路本司遂與廵撫李約㑹曹荘村計議非南北水陸夾攻不可打船破墻非火器不可巡撫李又與本司會議賞格有能破巢先入者賞銀一千兩本司還至營部署諸軍所從入高湜何本源等五枝客兵及主兵倪禄等由西大路填溝而入朱仁苗騰由南路入仁素細為賊挫故恇怯又督發千總沈儒馬兵一百八十名潜師度河貼仁與苗騰戰又夜遣徤士潜褁大母砲二子砲三十使詣朱仁營隔河擊賊船密票令朱仁埋木樁於下流淺狹處以斷賊船走海之路又以廟湾北通雲梯關賊走要路令邢鎮率青州兵一枝當北路邀賊令管火藥周需齎将軍砲子母砲佛郎機等火器以俟部署既定黎明諸軍移營本司自擐甲胄通巢而營諸軍既為本司激發又貪重賞爭先闖巢沈遷領鳥銃先入溆浦兵跳賊柵而入處州兵繼之所舁将軍砲等器亦至巢而徤士亦已齎砲至朱仁營兩河大砲與鳥銃齊發聲殷原野墻毀船摧賊中鉛丸死者尸疊墻壁間頃之賊出衝陣𬒳銃打箭射囘囘而復衝者頃刻十餘合驍賊四人升樓頂而望一鉛丸落其一人餘賊滚霤而下賊益奪氣先是覘之賊伏兵於北路林木中俟戰合将繞出我兵後賊毎恃此得志本司恐青州兵不能獨當貼以鳥銃手四十名丁有徳白虎等馬兵九十餘騎搜林木出賊不意賊駭奔巢官兵邀之斬首獨多日過午戰益酣賊盡銃突出青州兵小却塵起軍奔本司據鞍整衆而㱕賊不能躡是役也諸軍共得首級四十六顆内從倭三顆而已南北共燒擊船沉者十三隻鳥銃手溆浦處州兵以戰於巢中沂州兵以翼入巢兵後故皆不能多得首級而驍兵爲賊死傷者獨多青州兵及馬軍以搜林戰野故多得首級而死傷獨少沈儒故驍將從南路入水手燒賊船賊鉛彈中死眀日將休兵復戰㑹江南兵備熊桴報至言崇明沙賊將有變本司身兼江南北之責且料廟灣賊已無能爲不旦暮擒則走耳適㑹彭鶴年所領鎮溪兵五千名新到淮安遂并留青沂兵共八千名與主兵同聴巡撫李調度攻巢都司李忱所募土兵五千亦奉貴院牌遣駐儀真以待本司又檄守備盧相領海舠五十餘艘自雲梯關東下備賊走海邀擊本司身率髙湜等軍千二百名徃崇明先是本司攻巢而通泰㨗報亦至兵備副使劉景韶身督遊擊丘陞等兵沿路逐賊日夜鏖戰賊遂大敗凡得首級三百六十餘顆其詳具劉景韶掲帖中兹不煩述竊謂本司素書生未經軍旅驅未嘗一日拊循之兵率主客十餘營素不同心之將以攻據巢死闘之賊幸有小捷此皆仰仗貴院面授方畧千里决勝之筭與廵撫李調度兵食運籌之力也本司南北奔走深愧無功其廟湾留兵攻巢後事及崇明賊情處置容續具外理合先咨貴院煩為查照施行湏至咨者行總督軍門胡手本為軍情事照得倭賊泛海入寇至崇明三沙職督率副總兵盧鏜都司楊尚英於四月十一日海上邀擊斬獲首級一百十四顆干時職應援江北之急留盧鏜等攻圍沙賊職至江北攻廟湾賊巢獲首級四十六顯俱經具題外職正在廟湾攻賊忽得蘓松兵備熊桴手本言沙上賊乆将有變而諸将推延猶未上沙剿賊續又得總督軍門書促職過江至三沙督兵職即發江北五月十五日至三沙是時賊巳蟠據一月而諸将未有一人上沙攻賊者兵法宜乗其新至飢疲營壘未成撃之失此機會使賊得以鳩粮立柵為堅持計而又得造有小船數十隻以備突走矣職即督盧鏜與叅将劉顯劉堂等於十八日率兵上岸立營而職帶守備高㵓等兵五枝及土官張空所部鎮溪兵亦續至聮營而居職議立賞格出銀示衆以為懸賞二十一日黎明合兵盧鏜率鳥銃先逼巢賊多𬒳彈傷不能得首級賊分勁銳先衝劉顯兵顯素驍将率部下郭成車梁等鏖戰抵賊得首級六顆而盧鏜部下得首級二顆賊復衝劉堂兵堂部下田應山兵最後不交鋒而先奔劉堂兵逼巢者多為賊殺餘兵亦奔其部下王如澄廣兵以苦戰亦多殺死盧鏜亦遂還營劉顯高㵓等尚戰于巢門頃之亦収兵㱕衆議以劉顯将先鋒而盧鏜将老營兵駐後各營罄選鋒付劉顯是時蘓松廵撫陳以告病候代於蘓州猶調度兵食時遣牌督戰而廵按朱以憂去廵江江任滿去交代未至職止與兵備熊桴從事海中至六月𥘉一日劉顯率選鋒攻巢賊閉巢不出是時賊四靣起土墻障箭銃墻内鎗齊立賊衆時出環墻而趨官軍不敢逼巢賊亦不敢躡官軍竟不接刃而還是時總督軍門遣遊擊王應𡵨率兵五千應援又遣都司李忱所募土官吴九韶鎮溪土兵四千赴三沙是日王應岐全軍至呉九韶兵四百先至𥘉六日㑹兵合戰劉顯将前鋒與王應岐等分路入而盧鏜劄老營在後盧鏜選鋒兵攻巢得首級三顆劉顯兵得首級一顆賊衝右哨王應岐兵賛畫生貟李應春𬒳殺先鋒亦多殺傷者應岐子光祖棄馬奔而免餘兵數千不顧主帥而先潰右哨張窖兵亦潰是役也以老營堅故賊不能逺躡而潰兵得徐還營劉顯亦収兵㱕明日呉九韶兵盡至名爲四千實不及二千也盖土兵張虚數以冒粮賞大率如此衆議𥘉六日進兵劉顯仍率前鋒攻賊賊多爲銃打死蜂擁出張窖兵先奔盧鏜斬其一人開銃自打潰兵亦不能定賊數戰頗輕易我兵徑追至諸營勢甚張盧鏜營舉放發熕佛狼機連倒七賊各營亦發銃擊賊賊纔退㱕各營共斬真倭首級十二顆是役也不藉火器老營幾不守先是職攻廟湾皆躬自擐甲陣中及至三沙以盧鏜劉顯有名宿将可仗又國家方用以為總兵副總兵遂不復自擐甲而但與兵備熊桴居老營督戰至是知諸将易進易退不足盡倚乃復自擐甲入陣中至十一日復戰分布陣勢指揮伍惟統把總田應山為誘兵布賊巢門吳九韶劉顯苗兵分伏左右王應𡵨選鋒與張窖兵左右綴為副伏兵欲誘賊入伏而夾擊之盧鏜札老營王應𡵨餘兵及王如澄兵左右翼以防賊東西衝陳既定職擐甲徧廵諸軍促營中傳餐食誘兵伏兵賊甚狡先為四層木巢以覘我軍一動静十里必見揣知我有伏誘之不出劉顯請撤兵職曰合兵甚難少忍半時賊且出矣顯謬言軍飢疲職曰適傳餐何言飢伏兵䕃草木間未嘗戰何言疲也顯不能答而專欲収兵職遂前至誘兵所見誘兵亦怯甚去巢尚三箭逺不能怒賊又畀火噐至巢邉火亦不能入巢賊以故不出應之職過誘兵而前下焉獨㧞刀歩行過鱭魚港去巢二箭盧鏜劉顯與左右爭向前抱持職曰柰何若此職曰吾不能督諸将惟有自徃死闘耳二将誓以必㓕賊遂扶職上馬還未半時兵竟撤矣明日復戰布陣如前吴九韶土兵感激遂攻巢川苗兵次後賊先戰頗得我鳥銃手至是穴墻以通銃眼項鎻銃手一人使彈土兵土兵一人死六人傷遂退究我軍所以不能破賊之故有三札營太逺出軍五六里而至巢賊閉門而卧開門而衝賊逸我勞其弊一也立營既逺又無行營其弊二也烏合不同心之将雜勇怯不齊之兵怯者先潰勇者不能支其弊三也職督諸将移營近賊諸将以為營逺尚畏賊刼奈何近之又為諸将造行營木城三座進兵又不肯用其所以宜急圖而不宜緩攻之故亦有三賊巳造有小船五六十隻勢必乗月黒潮満之夜出海搶船突上老岸則江南北之禍又自此始其不宜緩一也陸兵進攻水兵守海職與兵備熊桴晝夜風濤中者巳及一月毎見大風潮則福蒼等船必壊數隻今入秋風惡乆之船将盡壊誰與守賊其不宜緩二也江南大旱禾苗稿死聚兵太多饋餉難繼一日計口粮行粮火藥諸費不下二千金萬一不給軍自生變其不宜緩三也職才不足以料敵制勝權不足以督勵諸将致此殘宼尚緩天誅負罪負罪除一面候新降敕書奉行一面調生力兵上沙會剿外為此合用手本前去貴部院煩為查照施行照得本部欽奉敕命欲圖長䇿湏得兵粮數月詳細查筭除各叅将所管細數已經具呈外至扵一鎮總數未及併㱕一處仰中軍官即行查照要見該鎮主兵之數水兵共是幾何陸兵共是幾何歳用軍需幾何其軍需原用何項錢粮措辦船隻共是幾何原打造用銀幾何毎年修理用銀幾何各具大數囘報不必細開花名至扵客兵雖無常數及難預定但以每年通計之亦可見其大畧仰查自倭宼以來某年調過客兵幾枝某年减調或添調客兵幾枝其客兵或係徴調或係招募及毎年用過募兵銀幾何供給客兵錢粮幾何今年該調客兵幾何度用錢粮幾何逐欵查報以憑本部會同巡撫李斟酌區處畫一奏請此係緊急軍情且本部復命在邇母得稽遲誤事一通行各屬行巡江御史手本為飛報賊情事本年四月𥘉一日丑時據管理福山港把總陳文麟呈本年三月二十八日辰時據本港右哨武舉生王桂飛報本月二十七日未時據沙船耆民王敬禀稱武舉生王燿哨至料角嘴外洋遇見蒼船二隻係乍浦捕盗吴邦興水天源說伊十九日在滸山寄船遇見倭船八隻槳船一隻白艕船一隻共十隻亦湾在滸山果見真倭五百餘人上山至二十二日被乍浦把總李希賢駕領兵船前來攻剿圍在滸山思得滸山逼近吴淞誠恐半夜脫走乗潮駕風瞬息可到合就呈報伏乞轉行各港隄防仍乞添船益兵運粮并火藥前來協助施行等因具呈到部據此切照自來禦倭之䇿無人不言禦之於海則易禦之扵陸則難是以海上㑹哨㑹剿事例甚嚴所以圖難扵易也滸山去乍浦金山吴淞江三處各是一潮道里適均係㑹哨所在今乍浦李希賢自二十二日圍賊滸山甚好機㑹除金山原不泊船外而吴淞江坐隔一潮遷延八日不發一船一兵策應又希圖掩餙不早申報合干上司不知吴淞設許多将官許多兵船何用若使希賢孤軍獨克猶尚可說萬一船寡力弱𬒳賊脫走或日乆復有賊船繼至裡外合勢使希賢獨䧟虎口致前賊逸出登岸禍不忍言則是吴淞諸將官之罪不容於死計今巳失機㑹本部冀望或尚可為星夜奔馳前徃吴淞親督兵船下海䇿剿用消燎原之禍於爝火之間縁本部才踈任㣲自恐無能為力伏望旌節俯臨前地督率官軍乗機殱賊不使兹蔓地方幸甚本部幸甚合用手本前去煩為查照施行湏至手本者咨南京兵部尚書張為緊急軍情事照得海中餘賊蟠據三沙官軍圍賊巳經兩月本司自江北應援還至沙上日夜風濤矢石間者亦将一月本司才迂智短諸将怯賊連戰止得首級二十四顆未見成功誠恐前賊併命奔突四出則江南江北貽患不小本司前在廟湾督戰親見貴部家丁白虎李廷玉等四十名驍勇善戰每陣衝鋒獲有首級數多除巳為給賞題奏外貴部保釐南都視江南江北原同一體三沙地平亦湏馬軍乞遣白虎等前來應援立有竒功自當從重給賞又江南素少馬匹有焉亦甚不堪戰仍煩貴部多方區處借撥太僕寺種馬或動支馬價銀買馬四十匹給與騎坐前來事完還官此皆貴部軫念地方同心共濟之義亮所不辭也事在緊要為此具咨其白虎等除江北巡撫李給有重賞及筭首級給銀外本司分給與衝鋒銀四十兩令淮安府轉解不知已到否湏至咨者咨鳯陽巡撫都御史李為緊急軍情事照得海中餘賊蟠據三沙官軍攻圍巳經兩月本司自江北應援還至沙上日夜風濤矢石間者亦将一月本司才迂智短諸将怯賊連戰止得首級二十四顆未見成功誠恐前賊併奔突四出貽患不小江北江南事例互相應援况南北共海賊若搶船上岸不宼江南則宼江北是江北之援江南亦自援也若不會兵殱之扵海中何以獨力禦之於岸上除貴院巳遣盧相領水兵防禦外其貴院原調逰擊丘陞邉兵煩分遣一千過江南至崇眀截殺設使邊兵巳還或勢有不便則煩遣義勇官丁有徳等馬軍百名連人馬前來及苗騰陳忠等驍銳歩兵四百名至崇明應援在江南則爲恤憐救急之義在江北則爲先事預防之圖寔爲兩便事在緊急千萬速發湏至咨者牌示仰舟山倭夷人等爾軰竊據彈丸一隅之地若朝廷動調大兵即時盪㓕何足爲難縱不殺死盡了日長月乆亦當餓死盡了何處可逃得死但朝廷至仁矜念尔軰此來原非做賊只是各齎本錢欲做買賣但是不奉王命私通買賣此則尔軰之罪然終是與尋常做賊倭子大叚不同又有一起原是求貢之人又與做買賣的倭子不同又有一起係是中國人偶與倭子私通買賣被其刼制剃光頭髪一同做賊又有一起係是我兵為彼虜去亦被刼制做賊凢此數等雖情状不同皆是原非有意做賊只是事勢激成至于負固險阻敵殺官兵罪惡雖重情非得已外圍既合求生無路本職本無才能未練兵事只是平昔慈悲心重二十年守不殺生之戒雖一螻蟻蟲豸亦不忍傷况于人命不論吾人賊人苟有一線可與求生之路豈肯輕有殺戮尔軰亦多直隷浙江沿海人在其間豈不知我平生為人伏惟玄天好生皇帝好生所以不遣他人特遣本職非為其能殺人正為其能生人也本職出京巳禀廟筭尔軰若能舉衆束手自㱕本職當力請于朝貸其死命係倭國人該送還者便與送還本國該安揷者便與安揷好處係中國人發還本郷與父母妻子完聚天日在上吾不尔欺出死得生豈不快活若復不信吾言錯此機㑹執迷不悟魚逰釡中謂可長乆尔軰雖愚不應至此則是我雖盡心為尔求生尔乃自甘必死我亦無如尔何朝廷必将動調邉兵苗兵狼兵各處勁兵前來焚巢盪穴不留一人乃已尔軰亦何利焉宜深思吾言無貽後悔牌為緊急軍情事訪得烏沙門洋山一帶海中處處已有賊船中軍官因何不行早報且福蒼等船布滿各港各哨平時飬兵正欲得其一日之用若以守港為辭互相觀望不肯開洋邀擊坐失機㑹延冦登岸致令縱横罪将何諉除本部親徃吴淞江督戰即徃定海廵歴閱視外謹遵敕書嚴督之文為此牌仰中軍官即呈俞總兵督率各哨跡賊所在相機擊剿乃見本官平生義氣将畧勉之勉之各哨諸将官有逡廵避難不肯用命者可密切轉呈以慿遵敕參奏從重處治庶幾威克厥愛功可速成及據報到譚副使催督傳應嘉等象山殺賊功次乃縁譚副使素習韜畧練兵有方傳應嘉亦克用命成此陸戰之功深可嘉尚但報内不開賊船元從何港突入及稱王家登岸係是源派何官兵巡哨把守及斬首未經查數有碍題奏仰中軍官即便查明囘報一行總兵官中軍官傳應嘉為緊急賊情事除本部謹遵敕書嚴督之文即日親徃吴淞督戰外本官速催各哨諸将官即時開洋跡賊所在合力勦除毋得以虚文應故事自取失機重罪具職名船隻并開港日期囘報及據本官禀稱各哨兵粮自正月到今未給齎褁無措而火藥鉛彈之類俱各缺乏照得兵粮火藥各有司存倘若海上失事将官坐罪有司亦不得辭其責但打賊如救焚不得於此時尚以兵粮不足火藥缺少為推調也本部即會同提督軍門陳計議兵粮自當速處火藥不俱所有多少亦當速發本官即催督各哨向前殺賊若得一船軍門自有重賞本部即當題奏功次其或遷延觀望坐失事機以致上岸滋蔓本部决不敢雷同隱蔽一行副總兵盧鏜為緊急賊情事賊船接至事勢可虞從來說禦之於水猶易禦之於陸甚難此時各兵船不盡力擊賊豈欲待其登岸乎都司楊尚英素稱才将總領逰兵一帶海防千係甚重若能打破賊船數隻本部當以竒功論薦其失事本部亦不敢隱蔽努力努力其打破賊船賞格提督軍門巳有定議可激勵各哨儘力向前兵書云追賊如求亡子母得賊東躱西賊西躱東至賊上岸貽害不小此時莫謂水将可以避罪而專罪陸将也事急矣特盡苦言一行統領逰都司楊尚英為緊急賊情出格給賞事照得本部㑹議軍門賞格即今營前沙湾泊賊船二隻各官兵船有能打破一隻連人船拿獲者當即賞銀五百兩内衝鋒船加賞其斬獲首級數多或至三十顆以上真正倭賊首級者另行給賞賞銀見在必不踰時為此牌仰本官即出告示通行暁諭各将領兵船人等知悉務期盡力向前母失機會一牌仰統領逰兵都司楊尚英為緊急軍務事照得本部親徃崇明巡歴督戰見得倭船前後六十餘隻連檣接艦盡徃江北去訖江南自吴淞江以北至福山一帶本部親督盧副總兵官及都司楊尚英等密布福蒼等船截港哨海晝夜隄俻庶可無虞惟吴淞以南至金山一帶沿海兵船難泊巡哨或踈深恐賊人乗隙登岸此宜責之陸兵本部會同總督軍門陳将浦東至金山一帶專責叅将劉顯同知羅拱辰分地截殺照得劉參将驍勇智畧素稱才将羅同知义立軍功素稱儒将仰本官将金山柘林青村川沙南匯一帶海塘嚴設隄俻哨得賊船一到湏乗其新至飢勞整兵邀擊大挫其鋒專以截住海塘爲責若使賊人越過悔塘一歩以致流却内地滋蔓無巳豈惟本官自損威名本部定以失機從重叅論若兵力不足可即申呈總督軍門及本部量議添兵相助毋得延緩誤事至緊至緊一行參将劉顯同知羅拱辰奉敕賞功事據盧副總兵官報稱海賊泊崇明縣三爿沙船至二十餘隻人至二千甚是緊急本官統領逰兵都司楊尚英把總邵應魁等運謀設䇿諸船賈勇奪船至七隻斬獲真倭首級至百餘若使此賊登岸不知流毒多少地方殺掠多少百姓縻費多少財用保障江南在此一舉成功甚竒本部愛莫能助除即為録功題奏外仰太倉州作速動支海防銀十五兩其七兩買辦花紅羊酒送盧副總兵處其五兩買辦花紅羊酒送楊尚英處其三兩買辦花紅羊酒送邵應魁處少見本部同心共濟之義且以激勵後來本部原奉敕軍門粮賞聴與總督胡計議措處便宜而行有司即時奉行毋得遲誤不便取囘呈并繳一行太倉州為緊急軍情事照得平倭事例江南江北互相應援本部原奉欽依㑹同總督軍門江南江北督撫軍門經理海防即今江北賊情緊急理合督兵赴援仰吳江縣速撥水兵一百名給文差的當頭目押送跟随本部前徃江北殺賊母得遲誤自取重罪一行呉江縣為軍務事照得自來海中打賊只打去船不打來船習成常套貽患地方乆矣今盧副總兵督率都司楊尚英把總邵應魁等觸冐風潮之險殱銳賊於大洋成此駿功從來未有于本部幾畨下海之意甚有光焉除具本奏功及以禮旌奬外又據報崇明沙上有續到賊船十六隻登岸燒刼乃是天心助順使此賊送死輳成諸将全功也本部以江北事緊提兵徃援不得親閱諸将破賊盧副總兵可嚴督諸将衝鋒䇿應各要盡力向前毋使此賊更得下海以致貽患别處地方若是功上加功朝廷自有重賞若一踈虞是墮前功而招後罪也努力努力一行副總兵盧鏜為軍務事照得昔人言諸侯之守在于四隣今春汛時月倭患雖熾然禦之於海禦之扵江又禦之於海塘禦之于江岸豈至盡是無䇿國家平時飬兵設官将何用之而稍聞警報只有塞城門塞水關風縫不通委城外於虎口遂為竒策甚至不論有害無害輕易将城外房屋折毀除塞城塞門任從有司自行本部不敢干預外其近城房屋苟非倭患逼近及與城垣委實干碍不許輕易折毀使民無所棲若因不折屋以致失事本部自任其罪不以累有司一行各属為攻圍殘冦事照得崇明舊縣沙上打殘遺賊千餘人此係窮冦即使未能遽縛四面皆海船隻焚盡亦㫁無從容逸去之理若得逸去不上北岸必上南岸貽患不小為此遵照敕書遣指揮楊𣏌賫牌嚴督盧副總兵兵備道轉督各該會勦官貟著晝夜隄備相機戰守母致踈虞一應兵粮火藥應時急需等項作速查給毋得違錯未便一牌行浙直盧副總兵蘓松兵備道為軍務事照得賞功一節湏參衆論乃協人情提督軍門李原㑹同本司出示賞格有能衝鋒向前打破賊巢先入者賞銀一千兩此賞只以入巢為重當時本司在營中理合會同提督軍門聚衆集将查係是何将官部下何軍首先入巢衆論難掩則一舉而事定今本司既辭提督軍門南去崇眀勦賊而官軍十數枝亦分為兩處前銀乃獨解至本司憑何斟酌衆情㱕於一與理合送還軍門以俟廵撫都御史李細訪衆論㱕一自行給散仰府轉呈都御史李處查照施行一行淮安府為軍務事照得本司原奉勅書㑹同總督及江南江北巡撫經理海防江北賊情緊急理合應援行至淮揚等處地方除巡按御史陳行海防道巳給賞過土兵頭目銀六十兩外漕運都御史傳齎發助軍米一百石廵塩御史李齎發助軍銀六十二兩本司若欲辭之則非所以承其同心共濟之美意若欲受之則本司於錢粮毫髪原不經手理合轉發軍前給餉同知党淳即呈提督軍門李収作軍前給賞支銷則軍士皆荷諸上司投醪之惠而本司亦愛賜多矣一行淮安府同知党淳為軍務事照得倭夷作孽自干天誅一戰於姚蕩而斬首千級再戰於廟湾而巢穴震盪賊膽巳破勝勢可乗仰諸營将士各宜環繞賊巢築立堅柵第一㫁其宼鈔之路第二截其走海之路相機合擊務期殄㓕以収全功毋得踈虞致賊脫走本司暫徃江南區處軍需即星馳至营中會同提督軍門李嚴督諸将剪㓕此賊諸营将士宜悉此意為此牌仰中軍倪禄即便傳逓各营将士一体遵守施行一行各将領為緊急軍情事照得官軍逼賊巢立营隔上套港東西四营湏要互相策應賊犯西营則東营䇿應東营則西营䇿應其策應兵以三分為率二分過港截殺一分伏賊㱕路邀擊遇夜尤湏緊防每近夜諸营各定暗號為約賊發舉號則䇿應兵速進聞號不行䇿應者依軍法又訪得賊人一半在老巢一半在蘆葦儘着我兵扎营儘着我兵放火毫釐聲色不動此其中必有謀士其事必有深機夜中緊防各营湏遣驍兵埋伏要路母堕賊計一行盧總兵參将劉顯劉堂守俻高湜為緊急軍情事照得陸兵即已上岸劄营進逼賊巢水軍恃陸兵上岸則衆心必懈賊計以陸兵上岸則水防必踈勢必乗夜用小船衝突水兵諸船仰水上諸将遇夜尤湏嚴俻其緊防時候昨已遣牌慎之愼之毋堕賊計内中邵應魁陳文麟分守老鶴嘴南北二角尤是賊小船必衝之處更緊更緊一行鄧總兵都司楊尚英把總邵應魁陳文麟鎮撫包守正為緊急軍務事仰太倉州遇逰擊王應岐兵到支十日行粮定要都給與本色米以便食用不許折與銀子柴鮝亦要給與一半本色一半折色不許全給折色如違以失誤軍機論罪一票行太倉州為緊急軍務事即㨿太倉州哨探人囘報李忱吳州同所領土兵並無消息縱使極快計非十日不能到此今據參将劉顯所呈諸将所議此不過将官共作捱延之計而已賊已開港通老􅔏嘴此必乗昏夜連䑸小船衝出或搶奪福蒼等船或上老岸事勢在旦夕之急而欲待合兵于十日之外不知一有踈虞獨使水将任其咎乎抑陸将亦分其罪也除已經票行外仰本官禀盧副總兵督同諸将再加詳議事機遲速囘報一票行參将劉顯示倭夷人等汝等背逆天道侵犯天朝皇天震怒送汝死地今朝廷命大将統兵十萬剿㓕汝等陸續抽換先遺一萬上沙殺汝等一畨抽囘再換一萬上沙換了十遍汝等不殺盡了何處逃死近日小小一戰汝等頭領一箇已𬒳我殺了汝等殺了一箇便是一箇我兵朝添暮換無有盡時我兵火銃千萬管火藥千百擔不盡殺汝决不肯罷汝等已在必殺之地不消我兵上陣殺汝但四靣逺逺守住汝等粮食勾得幾時雖不殺死亦當餓死盡了况汝等倭夷今年盡遭厄運江北浙東今年𬒳我大将統兵俱殺盡了一箇不曾逃得汝等豈不聞知今大将憐憫汝等雖是惡氣亦是天地間並生並育之物特為汝等開一條生路汝等肯聴吾言各自求活第一盡數送出中國𬒳擄人口第二将内中作惡的倭子斬却首級二百顆來獻其首級湏要箇箇真倭不許将被擄人充數吾自認得汝等依得吾言然後許汝進誓状永不敢侵犯天朝放汝囘去以彰聖朝遍覆至仁汝若不聴吾言必有後悔再三思之作速來報為軍務事照得賞功惟當亦貴惟均據淮安府呈廵撫都御史李批詞深見該院謙不自居以主譲客之美意但賞功之典係一軍耳目衆情勸沮不得妄争亦不得妄譲廵撫李所定八巢功次以沈遷桂汝攀鳥銃為第一高湜兵次之葉燦兵又次之據當時實事誠亦如此但諸将得言入巢不得言破巢既無全功豈宜全賞況馬軍擁護入巢之兵豈得㮣謂無功而何本源沂兵以護入巢兵後死傷獨多皆宜量與分賞今沈遷桂汝攀高湜葉燦等兵共一千四百餘名領銀七百兩挨次分給以成巡撫李功疑惟重賞不踰時之義其馬軍白虎李廷玉等驍銳不羣衝鋒有素當時攔轉迯退之兵尤為有力合分銀六十兩每人給銀一兩伍錢丁有徳等馬軍五十六名居白虎等之次濮竒領馬軍四十騎擁護本司亦為有劳每人各分與銀五錢丁有徳濮竒各一兩共銀五十兩何本源頭目将繼先等給與銀二十兩其七兩禀廵撫李分給中軍倪禄等與各营馬軍則賞功當而且均矣已上共銀二百兩其一百兩合㱕之軍庫以待巡撫李賞後次有功人役共該發囘銀三百兩俱付原差吏収領并仰該府轉呈巡撫李知會如白虎等已囘南京該府即将前銀六十兩轉鮮南京兵部尚書張處分給黒夜拿洇水之人不𬋩是兵是賊也深見本官督率勤敏部兵効力除廵夜官并捕盗量與給賞外今給賞本官銀牌一面少見嘉奬之意可更加意隄防也票行把總邵應魁為緊急軍情事照得盧副總兵參将劉顯等已刻期六月𥘉一日統率各营兵萬餘進剿賊巢懸賞銀亦已發訖二千兩至期又以待逰撃王應岐官兵都司李忱土兵會齊合勦為詞若待兩枝兵㑹齊合勦不知又是幾時今圍賊已經月餘事勢緊急據走囘𬒳據人口皆稱賊已造有小船七八十隻賊人自知必死勢必冐死求生若乘月黒潮滿之夜駕船衝出港門及扛船随處下海或搶奪我福蒼等船或徑上平洋等處老岸是謂縱虎出匣禍豈勝言今盧副總兵已陞浙直總兵劉參将已陞副總兵均有地方水陸之責不知二總兵能保必無踈虞乎請具連名押字結状囘繳一行牌差徤歩沈元為緊急軍務事照得明日合戰攻賊守俻盧相兵從北路入仰盧副總兵分撥麾下選鋒二百名協助其把總陳習領兵三百名與盧相會合并仰盧相與南路兵将約齊同進臨時以號砲火箭等為信毋得先後誤事一分泒各将領進兵為緊急軍情事照得都司李忱𬋩領土千戸呉九韶等土兵四千四百名驍勁精悍素冠諸軍李忱自請獨當一戰銳志可尚仰盧副總兵多方調度其原駐扎各营自行照舊聮合進兵不許逗遛觀望外待李忱督兵進攻之日諸营自駐营中遥為聲援不得混亂同進争功其土兵若能奮勇掃空巢穴殱盡醜類依提督軍門原定賞格銀一萬兩首級獲多另筭其都司李忱本司當以竒功論薦若或逗遛退縮失機誤事罪亦有㱕决不輕貸硃筆批李忱進兵之日恐鄉導無中用者仰生貟顧國帶領周文昂及家丁等聴候水官土兵分路進攻其鳥銃手用些與否李忱自禀盧副總兵計較為嚴督水将防賊事都司楊尚英把總邵應魁陳文麟千户濮大有鎮撫包守正等四月間水戰獲賊本司巳将竒功論奏及議增水戰撃來賊加扵撃去賊銀巳奉㫖下兵部題覆外今賊在三沙欲駕小船乗潮奔突勢甚急危仍是楊尚英等督船防守湏念本司不敢負諸将之功諸将亦宜不敢負本司一叚苦心晝夜巡邏母致踈虞一或致賊奔突生禍是墮前功而招後罪也努力努力毋怠毋怠為懸賞以激立功事除提督軍門陳另自懸賞外今差千户李錫指揮童華發去總督軍門胡差官齎到銀五百兩付盧總兵营内以為懸賞之用當即同都司李忱會齊官吳九韶等傳示仍收盧副總兵营内待土兵立有竒功即行給賞仰州縣照依發去木城式様作速造完聴候取用毋得遲悞常熟長洲縣呉縣崑山縣呉江縣嘉定縣太倉州俱一百架華亭縣二百架上海縣一百五十架仰盧副總兵劉副總兵只除各营守老营兵不開外即具各营選鋒及随征兵數并謀官兵分謀路進攻限即時囘報各營官軍有能協力進攻焼盡賊巢一屋不留者雖無首級賞銀三千兩均分若止是燒毀一處兩處三處大賊巢與給賞不在此例其有能掃蕩巢穴殺盡賊衆除首級一一另算外仍賞銀一萬兩的不虚示官兵臨陣退縮者斬兵官搶奪首級者先割耳記號後行軍法處斬本司因接勅暫至大倉州仰盧副總兵督同參將劉顯等整飾官兵固守緊要母致疎虞責有所㱕一牌差百户趙恩為緊急軍務事照得守備高㵓等兵跟随本司南北䇿應已經兩月理合休息況已離營入船暫撤至太倉州養其銳氣聴候本司即調殺賊外常鎮參將劉堂昨具呈請撤兵回江隂遊擊王應岐兵五千亦宜漸次撤回但一兵撤動人人各思休息止靠盧副總兵參将劉顯主兵二枝誰與共防劇賊若不量爲撤减則又供餉艱難且暑月聚衆疾病易生仰盧副總兵蘓松劉參将㑹同蘓松兵備道詳細計議先将呉九韶張窖麻兵二枝措揮朱尚禮銃手三百四十名量給牛酒令其與主兵協力固守務期破巢成功外其劉堂兵該撤與否王應岐兵該撤幾何定下該撤之數一面發遣一靣呈繳本司不拂人情不誤兵機乃爲允當本司一面區處新兵過沙其劉顯馬兵八十及海防同知羅拱辰尚有廣兵在上海各宜陸續取至沙上以待併力合勦毋違一行盧副總兵三沙之賊造有船隻勢将突走諸将莫謂如舟山廟湾賊迯也罷了不知三沙局靣正與廟湾舟山不同舟山之賊富賊也廟湾之賊飽賊也又搶得造得有好船隻所以一迯就出大洋去了三沙之賊窮飢甚不特巢中並無數兩銀子飯米亦不彀還郷且造有小船亦甚不堪出洋所以一迯必拚死搶我船隻突上老岸如機虎出檻必不肯揺尾去了勢必噬人以飽我若不預先說破諸将慮不及此恐錯做舟山廟湾看了悔之無及仔行細細一行示諸将官宻語再三沉思制賊小船衝突之說灘淺處多釘暗樁薄皮船遇之必碎此一說也昨巳奉告矣先發制人一着惟有望斗上做工夫然必湏以利使人惜不得銀子每夜楊都司邵把總盧守俻等各水軍編定福船十隻毎一隻望斗人一夜給與銀一兩使一夜常有人坐在斗上看賊動静雖月黒之夜賊若擡船撑船未必無一把兩把火光我船便可做手脚不患於大船赶賊不上也月明之夜則斗上纎悉必見正與彼四層望樓是對手本事至如小船叭喇唬八漿船宜多置銳手既不戰亦宜量與給賞多布之八漿叭喇唬中火器既多賊來便死打又有望斗内人先報賊動静不患扵小船制賊不下也一隻船望斗人毎夜與銀一兩毫釐不可少就是一月浪費銀三百兩亦說不得支得一月賊必擒矣恐公惜費誤了大事今先遣牌在太倉州将我原寄銀先支一百兩用之一笑一笑望斗人若報賊的當水軍因以成功則望斗人即當給與衝鋒重賞若有誤事定以軍法斬首盖賞重則罰亦重也每夜與銀一兩分毫不可與頭目人尅落必使望斗人一一得實惠至嘱至嘱江南楊尚英等船定八隻或七隻或江北盧相等船定二隻或三隻一體給賞此事并與盧總兵議之行各将領論三沙賊势鳥銃手不許割首級亦不暇割首級其賞與餘軍照數分給假如百人為率或鳥銃手十名餘軍九十名鳥銃手居餘軍十分之一或餘軍内得一首級該銀三十兩則鳥銃手得銀亦十分之一共分銀三兩或鳥銃手五十名餘軍五十名鳥銃手居餘軍二分之一餘軍得一首級則鳥銃手亦得銀二分之一共分銀十五兩人數搭得多寡分銀數多寡率照此例筭照得三沙巢賊於七月十六日夜間潰走而本司巳於六月十二日咨督撫軍門李云若不會兵殱之扵海中何以獨力禦之于岸上賊一突走江北江南必兩受其害若必知有今日之事者屢有牌調丘陞過江㑹勦既推調不赴及有牌催曹克新接管㑹圍兵船又不赴今賊竟突走公然上岸深入刼畧更無攔阻若使江南将官能禦之干海則賊不得渡江北将官能禦之扵岸則賊不得上今江南将官失機之罪巳萬無所辭江北将官若不能竭力堵截致使四散衝突罪又何逃又聞廟湾一帶仍有賊船若兩賊合夥害不可言本司謹遵敕書嚴督總副𠫭将廵海兵俻守巡等官巳至揚州督戰為此牌仰副總兵曹克新嚴督俻倭把總等官将餘東倭上緊殺截不許西過通州一歩及遏㫁兩賊不得合夥如違定以失機從重叅奏奏仰副總兵劉顯上緊領兵至揚州截殺立功贖罪母得時刻遲誤仰盧總兵駐劄鎮江以遏南北之衝毋得遲悮為軍務事照得三沙賊情緊急于時廵撫陳以告病候代於丹楊廵按朱以憂去廵江交代未至蘓松無上司本司以地方保障干係不自揣分僣承人乏謹遵敕書進勦機宜而行欽此牌仰原領兵生貟茫士清耆民嚴峦嚴大年等選募驍兵三百人以俻衝鋒之用當時並不曾給有顧募銀兩止令太倉州給與半月口粮共銀一百八十兩今賊去而兵無所用原兵住劄蘓州半塘寺本司又方在我躬不閲遑䘏我後之時仰該道即便呈巡撫都御史翁欽依南北會哨事例况属貴院與本院同心并力各請嚴督三處領水兵官整俻船艦晝夜緊守三門勤勤會哨以防春汛毋得一時懈怠則門戸既固堂奥自安若三門稍有踈虞至不得巳而守金焦兩岸斯為下䇿與無策矣為此理合移咨貴院煩為查照施行并乞為咨湏至咨者仰蒙聖恩給發餘塩銀賑濟飢饉撫臣若不能奉宣德意着實舉行豈惟上負聖恩抑亦得罪百姓溝壑之推誠自巳致除前巳行文府州縣著令先儘在倉米糓多方逼處賑飢煮粥及近又行捐捧事例外今本院特發餘塩銀散給各府從公轉發極災次灾州縣揚州先發二千五百兩淮安先發二千八百兩鳯陽二千兩廬州一千三百兩滁州六百兩徐州四百兩和州四百兩此銀或給本色或糴米煑粥務使毫釐絲忽一一盡到飢民身上若有州縣官忍心害理逆天妬民那移别用侵尅入巳豈惟憲典所不容抑亦鬼神所不恕陽誅隂譴理無可逃本院本欲到處廵歴務察奸弊以行實惠即今卧病沉重無可柰何爲此特託四府良有司上前兵或仍留用或即行散遣或令劉副總兵帶至江北截殺一候廵撫翁明文准上毋得遲誤一行蘓松兵俻道據劉副總兵差人來報提督廵撫李手本前去淮安殺賊巳悉即今隂雨連綿陸地成澤若奔走泥淖是賊折長我兵兵馬歩俱難着力況劉副總兵江北道路險要未曾熟諳進兵之時宜自仔細慎重湏問本處兵俻官討精熟地理好郷導仍自斟酌若料賊所必走之路預發一枝勁兵遣一小将夜伏逰擊可成竒功盖賊必謂我雨夜無人防禦他亦是出其不意也百凡仔細仔細務筭萬全無得輕敵爲緊急軍務事照得廟湾勦賊之路原有兩條一條從寳應柂船過垻水路自清溝喻口進攻則兵勢既便而饋餉亦易一路從淮安至馬邏陸路進攻則兵勢既迂而饋餉亦難况今雨水連綿馬邏陸路必成沮洳則從水攻之似無可疑但兵难遙度賊情多变廵撫軍門李既調劉副總兵與本道同事本道乆在地方熟知地理險要諳練賊情宜何處邀截何處設伏仔細與劉副總兵協心計較共期成功豈不美歟其精熟地理郷導夜不收人等可遣七八人付劉總兵為緊急事照得前賊既被官軍摧拉困蹙沿海潜踪勢必搶船開洋仰本道嚴行各該沿海守禦将官務要先将各港民船盡數抽開毋為㓂資沮洳之塲設伏邀擊水火并攻期盡殱之非止殄目下之兇𦦨兼絶将來之垂涎如昔人所謂除惡務本殄殱乃仇者事在垂成可不勉歟本司亦定以竒功論不敢負也昨本司督副總兵劉顯領兵過江㑹剿蒙軍門李巳調徃廟湾等處一應兵機有該彼此䇿應去處仰本道徑自約㑹夾勦務期協心戮力無分彼此其丘參将原領兵馬交承之間擇人湏謹不知今係何人管領可具名囘報一行淮揚海防道照得賊爲江北官兵殺敗沿海逃命勢必搶船開洋但兵家有窮㓂難追困獸死閗之說況沮洳之塲尤湏擇地本總毋得自恃驍将貪進輕敵一應設伏邀擊務求萬全不堕賊詐且本司近得廵撫翁書陳山報有賊船金山一帶不無可虞若賊已渡淮北出或下海開洋本總即便撥兵南㱕毋得失誤兵機至嘱至嘱照得本司新奉敕書專以訓練土兵爲重而訓練土兵之官莫要於廵海兵俻守廵況即今已及秋半轉眼又是明年春汛若不及時訓練有警何以待敵爲此牌仰按察司轉行各廵海兵俻分廵遵照勅書事理将見在水陸土兵造成二冊其一冊開具各兵年貌籍貫每年工食銀若干其一册湏要從新簡閱分為上中下三等編為隊伍每二十五人為一隊立一隊長百人立一百長千人為一哨立一哨長務要強強有辨體統相聮及至臨戰庶不誤事造成二册後乗此秋冬間隙各該道親自下塲操練母得轉委飬尊操練兩月之後本司陸續調操及巡歴各地方閱視其有仍前虚應故事不堪應敵者本司决不敢姑息不待臨戰事敗先行從重參奏其二册俱限半月以裡送本司查審毋得遲悞一本司原籍武進人去杭城僅四百餘里本司職掌皆係兵馬機密尤不得不嚴為關防況近來鎮江拿使雕刻本司關防罪犯係是蘓常之人雖自干重法旋即抵罪然人情易於詐偽大畧可見本司原籍止有二弟一子俱係生貟家人宗族亦並無人出外經商買賣敢有指稱本司家人郷里親識在於地方肆行詐偽誆騙財物者應捕人役即便擒拿送司審問得實依軍律治罪捕人重賞其有通同容隱及容留之家一体治罪不饒一本司平素未習案牘然不敢不盡心焉雖軍書旁午之時一牌一票悉是自行起稿吏書人等止是謄寫抄録並無一字干與及一應聴㫁悉是本司自行主張並無採問左右之言所属文武職官宜各相信若有窺伺間隙交通内外漏洩軍情者訪出依軍律從重治罪據該道報稱劉荘一塲将次成巢賊雖摧殘巳甚而蹢躅可虞若巢穴一成則四突之勢在彼劉荘去興化百里而逺西路之防不可不嚴仰該道益展竒畧一面把截要路一面嚴督諸将相機進勦火攻夜擊皆所必用務在早平殘賊以靖地方仍行劉副總兵知會為奨勵効劳将官事照得原任守俻高㵓西楚南吳千里報効浙東江北幾歳横行紏我同𫀆修我戈矛廟湾險巢而争進撫義旅均其醪纊溆浦乆戍而忘㱕罪本可原功亦足録分給與江北巡撫李解到八巢銀二十兩見本司優奬之意為專委任省繁文以省繁費事照得各衙門倒換循環勾稽錢粮本是巡撫職掌但事体則湏自上而下該道治目本院治綱乃為得体今各道既有循環簿倒換本院又有循環簿倒換至各上司及本府又各有循環簿倒換文移雜沓遂使書手敗筆成塚無非為謄冩循環之故公差徃返如織無不是倒換循環之人𥿄札盤纒使用不知一年費却幾多銀兩且海防兵俻等官國家託以一道户刑兵馬之重豈有本院不可託以查考數本循環之理為此仰各道轉行所属衙門以前造循環三副一送本院一送各道者今止造一副并送該道一季通完之後止開具一手本某衙門循字簿一扇錢粮收放共若干某月某日到道倒換訖某衙門環字簿一扇錢粮收放共若干某月某日到道倒換訖每季差人送院以慿查䆒則是一張𥿄抵却百十本簿子一次差人抵却百十次差人事体既悉從簡便而奸弊亦未嘗不革豈不痛快為照潰兵之亂止因三四兇徒縱酒斫傷隊長遂至畏罪脇衆奔突搶擄兵船勢頗猖獗本院恐其将東下海則罪人難得且沿海兵船多其黨類萬一鼓衆事未可知是以本院密布下江兵船及行南北兩岸并力夾勦又身至瓜洲㫁其海路賊知勢窮争縛首惡餘黨束身投降一人不逸此皆将士之力地方之福也本院不能弭亂幾先自知愧罪理合移咨一各道餘塩銀子及截粮事不蒙准行終不然任從數十萬生靈餓死只得别有區處湏預筭下難靠臨期一通州屯下重兵若有冦則又有客兵屯聚計筭通州所出粮彀得兵喫否恐臨期不免騰貴則通州該何路糴買或是先将軍餉銀上江糴米從江路運至通州積下若米價騰貴則銀米兼支與軍家為便何如柴薪亦湏預處一飢民煮粥湏要各處開場官不彀用該用何官料理一佃户飢餓責在本田主身上稍稍借貸度日有收之年送還田主諺所謂羊毛出在羊身上亦免其流移荒白田土田土佃户俱便何如一查各道及所属犯罪有力之家情有可矜與力能出榖百石以上者議免罪名量准穀贖所謂失一人之不經以全百人之命何如一贓罰原為糴穀俻賑今三院贓罰齊出賑飢上年巳有事例今年之飢比上年不知幾倍三院贓罰不知便可議處給散或仍用題本否一總兵卧病通州屯下七八千重兵控扼最險江海之冲眼下何人可以權攝攝官與真官不同湏得才望可鎮壓者何處㝷來不然誤事不小一總兵部下官目平日稍有幹才可託得一臂之力者水陸是何人一萬一飢民嘯聚本鎮西北不免盗起東南又有倭子則兩頭俱動其緩急輕重機宜雖在臨期斟酌應之然有湏預筭者西北盗起用何将何兵支當倭賊起全靠何将何兵支當一若倭賊早發平時所恃制倭者馬軍耳山西馬軍既不得來潁曹馬軍亦調未到歩兵亦未整齊船未修艌彼先發制人我如何支當一江北保伍之法前院經畧深合古人節制之意但行軍湏預選鋒一隊或抽去三五人則不免折動保伍之法或選鋒之後重編保伍則又急促而煩擾然則選鋒與保伍相碍如何爲處一泗州守俻居鳯二府之中本院欲駐劲兵一枝所謂以無用爲用也原有一千人必湏沙汰疲弱增補精壮至於更欲添兵一千不知合該何處補足若就近招募則恐人情難托若用客兵則守俻管不下合作何處一各處只見今年馬兵取勝紛紛討馬不知馬兵只是兵家一竒且本院費盡氣力止買得二百匹馬亦不知得完與未就使得完亦不彀𥙷上年虧欠之數馬還是該添與不該添若是該添何處取馬如塩城參将呈請添馬二百匹從何取給若添二百或别用騎将或不别用一今年大旱百姓受了苦官兵討了便宜倭子失了利若明年雨水調匀則江北江南十日半月下雨亦是常事今年燥地盡作沮茹若使如此不特馬兵且高閤起歩兵亦無處措手倭子如老䑕一歩嗊進一歩乗雨漸漸深入作何區處一有其勢必然難屯軍馬守望官兵所必躱而其地又極險要賊人所必登如丁美舎是其一處他處多有類此者既靠不得人守作何區處照得調兵必有勘合過関必有文引今山東無藉之徒假以投軍為名或詐稱係是浙江江北軍門調遣既無統領又無文驗少則三四十多則二三百閧然成群各執長鎗短棍閒時則安行徐歩伺便則搶擄刼掠到各處軍門挨投做軍若受之則來者紛紛不已若拒之則去者沿路愈肆刼掠或潜躱地方一意為盗近來江北獲住大夥強賊多係此軰盖山東皆然而青州為甚近有山東兩司的當士夫過此極言青州素係耕田之民今盡抛荒田地皆徃東南投軍亦無意殺賊只在擄得一飽而㱕耳如此不已釀成禍亂不言可知為此合咨貴部院出給榜文嚴行禁止張挂山東江北界上徐沛之間及移咨山東巡撫一同禁約非有明文調發不許擅出百里之外違者從重䆒治庶幾軍政以肅禍本潜消為第一緊急軍務南北㑹哨事照得江海之防除海洋廵哨外其海賊入江由江兩岸登陸之路廖角嘴营前沙南北相對海靣約濶一百四五十里為第一重門户狼山福山相對江面濶一百二十里為第二重門户周家橋與圖山相對周家橋北岸至順江洲與江南分界江靣約濶六七里順江洲至新洲夾江而約濶七八里新洲夾至圖山南岸江面約濶十四五里為第三重門户謹遵屢奉欽依南北㑹哨事例况属貴院與本院同心并力各請嚴督三處領水兵官整俻船艦晝夜緊守三門勤勤會哨以防春汛毋得一時懈怠則門户既固堂奥自安若三門稍有踈虞至不得已而守金焦兩岸斯為下䇿與無策矣為此理合移咨貴院煩為查照施行并乞為咨湏至咨者仰蒙聖恩給發餘塩銀賑濟飢饉撫臣若不能奉宣徳意着實舉行豈惟上負聖恩抑亦得罪百姓溝壑之推誠自已致除前已行文府州縣着令先儘在倉米榖多方逼處賑飢煮粥及近又行捐捧事例外今本院特發餘塩銀散給各府從公轉發極災次灾州縣揚州先發二千五百兩淮安先發二千八百兩鳯陽二千兩廬州一千三百兩滁州六百兩徐州四百兩和州四百兩此銀或給本色或糴米煮粥務使毫釐絲忽一一盡到飢民身上若有州縣官忍心害理逆天􅗜民那移别用侵尅入已豈惟憲典所不容抑亦鬼神所不恕陽誅隂譴理無可逃本院本欲到處廵歴務察奸弊以行實惠即今卧病沉重無可柰何為此特託四府良有司上體朝廷矜恤窮民之意下體本院不得巳之情務察奸弊以行實惠先具派到各州縣銀數繳來為賑濟事據整飾淮揚海防兵備按察使劉呈議賑粥活民事宜到院又該本院覆議詳悉合行刋刻仰各有司及委官查照着實遵奉施行毋得違錯計開一作粥之法第一便者必窮餓之甚方肯赴食若能自营壹食者决不甘此故荒政非壹首先此焉一活民以粥財窘而經費有節民衆而赴食有限事簡而姦偽難容壹舉而數善具焉今若散錢遣㱕即如此舉巧計者伸手可得㱕郷者食盡何倚此苟應目前非始終全活之計也一救荒者救其不死而巳今賑以粥正欲死者得不死焉一作粥宜散不宜聚聚則人衆而患生散則人少而患免徃因處之無術布之不廣或傳染瘟疫或轉加凍餓死者愈多且生他患以致一二大家欲施捨而不敢賢能有司将擔戴而未能今散布諸縣保無他虞一設粥州縣有大小不同合議小縣每縣設粥八處中縣每縣設粥一十二處大縣每縣設粥一十六處一設粥處所每一日早晚二飡一人每飡該米三合二飡六合一日二升四合可給四人二石四斗可給四百人中間若有才力知州知縣雖無官銀亦能自處况今尚有官銀此法之行特易易耳一将萬人如使一人分數明白耳今計宜賑州縣實該幾處合用錢粮總該若干一縣得好官一人一人選用十人舉此無難矣一三等縣分設粥處所或擬八處或十二處或十六處每處每日計米二石四斗此其大㮣如此中間每縣或减二三或増一二每日每一處用米儘人多寡或日二石以上或日二石以下各該有司聴各酌處施行一設粥處所若集人衆所賑之粥未免冷熱不等給散不均今議每厰不過五六百人薪水易辦照管自周人人得所矣一各縣設粥處所宜編天地玄黃等字號名曰天字粥厰或玄字粥厰食粥厰内先要定立規矩編排次第席地而坐坐東者面西坐西者面東不許動移縱有官府廵視亦不許令起身免其搶亂每二十五人一竈一鍋一桶毎一鍋用米七升五合可給二十五人毎百人四鍋四百人十六鍋每日該時分入厰坐定不湏逐一遍數起眼之間即知為若干人計用若干竈多則加竈少則减竈晚飡亦同至該時分東邉頭一行放出次放西邉頭一行其二行三行次第魚貫而出一本州縣置文簿二扇一付管事人一付在官人每日公同查該本日内食粥人若干用過米若干眼同登寫附簿毎五日十日掲呈本縣立案在官事畢造冊繳報查考毎日止寫某處某里男婦總若干不必通寫以致繁擾一毎早飡於辰巳之交晚飡於申未之交早飡限於辰𥘉即入巳時方出晚飡限扵未𥘉即入申後方出每日少受拘束使能营食者不肯混入一起首作粥湏同一日使人不得偏聚一處各厰毎日二飡俱同時刻使飢民不得既食於此又顧之他一合用鍋水桶木盆俱在本郷村借用附寄簿籍事畢給還碗筯各人隨帶一設粥厰分遇有下雨之日如或房舎褊淺分布三四處擺列成行挨次大口給米五合小口三合各㱕自食無雨之日仍舊設粥聴各管事人随便宜處之一作粥之米務要碾簸得所淘洗極净汲取清水煮令濃熟母致生冷汙穢切不可臨時加水致生疾病縣官丁寜管事人如待自生子女毎日不拘某鍋内取一甌先食巡視官貟至此亦取自食以驗可否一飢民有餓死尫羸或有時疾者令其别坐一處無致傳惹諸人内有死者責令地方理瘞一起首食粥三四日間乆飢之人乍食乍飽未免多有死亡不可因而驚怕疑阻過十日後自然無死者一餓損之人𥘉食止許給粥半碗次食一碗以後漸加可免死亡一擬作粥州縣普濟窮飢之人不專為本縣而設其半荒州縣若有窮飢之人聴各随便移食設粥州縣一不設粥州縣正官若有才力處置設粥三二處將境内境外窮餓之人給賑一足以見仁民之政一足以見有為之才本院自當旌奬一管粥之人不拘在城在鄉或僧或道素有行止善施憐貧富實長者或一人二人分理一處一設粥處所或於寺觀教塲馬厰及各寛閑之處各要門户關欄若在寺觀就令僧官住持管理一煑粥柴薪用官銀買辦事定之日或令飢民少壮者各令採柴草一束一飢民出外不許作踏田禾搶奪柴草摘取𬞞果若有一二喇虎強徒或在厰爲首搶食或出外搶物管事人就便拿送本縣用大枷號令厰門外三四箇月毎日照數給粥滿日不死踈放庶可止亂不得姑息一外來趂食之人各於神廟寺觀寄宿如寺觀難容毎人家各安挿二人三人令於房簷或門樓下各得草薦一條或稻草亂草上卧下盖以免寒凍如有死者地方眼同看視深埋不許刁徒騙頼寄住之家一得過之家不許縱令家下厮飬之徒入内與飢民一槩混食有此之人聴管事之人責治逐出一本郷社有積粮之家許臨期照依時價出米就在本郷社作粥一各縣或有一二富貴之家願施食者或一人自設一處或二人朋設一處州縣具名先申本院知㑹事畢以禮奬勸以勵為善之心一府州縣官賑濟有方所活民衆事畢之日具奏旌舉一各厰委用全在得人苟非其人或至僨事謂之法不善者誤矣一設粥時月正係汛侯萬一奸細乗機混入作變豈能逆料合行各該州縣每厰務要擇選能幹官一貟嚴督里老執事人役留心識辯以防奸偽不得踈虞新刋荆川先生外集卷之三畢
