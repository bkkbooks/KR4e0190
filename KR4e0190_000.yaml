body:
  text: 萬曆元年孟春吉旦重刻于純白齊重刋荆川先生文集目録卷之一賦遊盤山賦薊州名山也羅户部邀逰詩遊西山碧雲寺作得恱字此下係翰林時作慶壽寺齊宿寓城西寺中雜言五首同孟中丞遊龍泉寺二首普濟寺同孟中丞作秋夜禁中遇雨夜霽十五夜旅懷望太行山行即事泛黃河息中山亭子相傳昔人醉千日酒之地雨霽約孟有涯中丞逰山孟先出郭追之不及送焦提學往貴州送李推官赴高州送蔣藩幕赴閩中休沐家居簡陳約之送王生歸蜀送何學官往金壇送陳學官往福寧州送莫子良擢舉東歸答陳編修約之柏鄉見寄送蔣尉赴金華送程翰林松溪謫居朝陽四首送孔上公助祭太學歸闕里時賜衮衣一襲春夕皇甫膳部見過索觀鄙作留夜坐挽張舍人二首閣老羅峯之子汲縣謁比干墓中嶽遊嵩山少林寺冬至南郊奉天殿慶成侍宴朝謁長陵奉命分祀孔廟作觀中州進賀長至表箋恭述時寓信陽登孫登嘯臺即阮籍聞登嘯處銅雀臺二首嵩陽宫柏乃漢武帝所封將軍柏詠天壇梅花詠蛺蝶花狂歌行贈孟中丞有涯皇陵行從軍行送吕兵曹募兵遼海送朱建陽送陳貢士刺上思州滎陽行金臺行結客少年埸行歌風臺同院寮觀閣中芍藥作南苑午日庭宴登毗盧閣遊龍門龍泉寺對雨永年公館夜宿龍泉寺懷顧南田使君顧以公事不至復惠酒助看山之興詠崔後渠書屋題張學士仰宸樓樓藏賜書題張學士陽峰卷送張學士歸蜀省親潞河别林汝雨提學浙江送黃參政赴陜右送項膳部遷之南行兼呈劉祠部送高行人使琉球送王侍讀赴南都送樊大夫㑹朝長至送周雲卿之任通山寄周中丞備禦關口答周約菴中丞九日欒城道中見贈送施貢士子羽南行送人上陵作覽任少海吏部慶都留題悵然懷人因次其韻贈袁御醫芳洲張相公壽詩趙州懷古吕翁祠堂世所傳邯鄲夢者也題劉蕡祠朱仙鎮觀嶽將軍廟和陳編修約之禁中雪詩二首詠夾竹桃和詠霧中榴花九月晦日鈞州公館見菊村居二首村夜同皇甫子循遊橫山二首夜宿王氏莊暮春遊陽羡南山四首同林尹遊㑹真菴游馬跡山宿許道士房有贈二首題閻泉川副使莊謝病贈别高參政子業罷病歸訪王山人含真送王良醫往岷府贈王潼谷出守保定贈春巖王尹朝京送白尉往湖州送胡主事榷稅荆州丹陽别王道思三首夏日聽沈君彈琴詩三首贈宜興張醫二首次韻贈陳后岡送李文與赴河南郡倅任次韻答張戶部羽卿送董兩峯應舉九月八日作送真州蔣生至宜興親迎歸送莆田方生自宜興歸應試送林宜興遷官南部題東石草堂圖贈黃松江雙壽圖歌為假翁作贈王君五十歲題龍圖山莊閒居遊神墩寺次壁間韻二首登墩廣德道中泊淮上作淮上五日泛湖同蔣别駕世和聞復官報寄京師友人代柬寄京中舊游寄贈曾郎中再入禮部家居贈别陳僉事約之臨清十五夜柬陳太史約之贈陳僉事約之生日崔鎮道中晚望懷陳約之贈别義興林尹遷官次韻贈施道人寄題顧東橋侍郎載酒亭送樊醫歸南昌贈張地官督賦江南贈南都莫工部子良夏至齊宿署中送彭府倅進賀聖節表宜興舟中讀徐養齊詩稿因思奉别之久帳然有懷二首覽徐養齊見懷毛古菴及小子之作存沒感懷和韻和徐養齊移居二首題贈施心菊醫士贈江隂陳君寄劉範柬提學題伯祖平樂守素齊翁像和朱子學遷居程副使挽詩元夕詠冰燈卷之二詩庚子歲海印寺再舉同年㑹紀事四首得薛君所寄三游紀興刻中有楊方洲見懷之作蓋别去已十餘年矣撫卷慨然用韻奉答送黃翠巖赴松江推官任送沈君守寧波送陸舍人調遼府長史送王舍人往崑山為顧相公營墓聞石屋彭君置生棺有感為賦四詩寺中訪後渠崔侍郎不遇次韻濟上别錢副使點蒼山歌贈雪屏趙考功李中麓文選藏書歌詹府宴集奉和上宰松皋公三首送王翰林浙江兵備副使送鄒東郭掌南院贈吳山人歸自京師贈許太宰宿雙塔寺林東城羅念菴誤于郭外相尋不遇有作見寄用韻奉答次韻贈湯將軍自述宿游塘書懷二首題陳渡莊岊亭遇盜次韻病中試新茶泊舟郭外有感同禇生滔徐生大復夜過城濠水榭作二首遊永慶寺示諸友題金山寺付僧惠傑四首宿荆溪上塘菴述懷余向曾遊此匆匆十年矣登常山山亭次壁間韻二首過清溪莊值主人不在題清溪莊三首贈顧副使答陳澄江僉事村居韻八首贈王山人贈山隂陳千户病卧毗陵三首周蓮渠以詩問病次韻載疊前韻二首贈蓮渠憲副饒湖田見過陳渡草堂賦此為贈贈郡倅綱運送人赴真定幕贈馮午山提學贈吳賔湖題徐君淵泉號贈王思東號王君祖為中舍贈熊南沙郡倅入賀萬壽節三首壬子陸生南陽禇生滔赴試與之叙别不覺坐至夜分因作二首常山懷羅念菴壽詩董進齊壽詩蔡南村壽詩壽王生革母法慕菴六十暟之父贈徐學琴六十大復之父題孤山林隱居祠二首嶽將軍墓二首吳江三忠祠松關梅塢筠徑石丈蒼翠亭㑹逺樓元陽洞小虹橋迎仙館禮星臺靈芬精舍山田山池茅亭良友軒聽鶯閣賀陳吏部父母榮贈二首已酉八月十八日觀潮作賀金翁夫婦雙壽詩翁舉人子韶庠生子聲之父也題贈喬僉事兼為乃翁封君壽希周兄八十石湖王傅辱觀拙集見贈長句二十三韻奉答一首題偶耕書屋送謝右溪西歸兼東左溪題夏中書畫竹卓小仙草書歌楊教師鎗歌古鏡歌峩嵋道人拳歌日本刀歌劒井行時有白氣屬天為謝參政與槐題青白蓮畫悼僕鈕才卷之三詩病中秋思八首病中秋日作四首有感小樓宴坐二首又疊前韻二首莊中作自述有相士謂余四十六歲且死者詩以自笑古人云死生亦大矣此謂趂日力以進道者言之也茍不進道總是虛生修短何辨焉茍于道有見處夕死可矣然則死生詎足為大哉囊癰卧病作三首瘧病作小集為人所刻靈芝寺同童元功宴坐登屠翰林仍臺作二首次人憂旱作再遊清溪莊值主人不在次韻至常熟陳中丞白訓導邀登福山看海二首金澤寺中寄松江友人松江金澤寺四首天寧寺塵外樓四首題湖上廢寺二首題龍池菴三首相傳伏虎禪僧開山處山頂有龍井􅔼蝪見則雨贈菴中老僧僧解相人術少嘗遊歷江南晚歸菴中遊宜興海㑹寺作贈黃子晦寄周臺官二首家居喜袁芳洲相過賦此為贈三首次韻贈薛仲常歲暮有懷諸子贈張贑州致仕還吳次逹夫韻贈宜興王丞次韻答朱刑部士南見寄同萬鹿園宿工文菴次韻有贈次葉師與諸生講書鐘樓寺聞鐘作養病道院忽張君見訪不值奉寄答贈胡柏泉送郭無錫擢南曹主事贈督府張半洲兼柬周中丞石崖四首尹洞山祭酒枉顧草堂有作見贈次韻二首又疊二首贈都督萬鹿園四首次思節韻詠俞虛江參將四首送曹子泰自大理出守漳郡萬思節以集中無名作詩見貽二首萬思節工于詩而近又學射次韻答之次萬思節韻贈蕭芝田二首題王世新一枝窩三首夜歸陳渡草堂時新與諸子别去有懷二首癸卯送仲弟正之赴試已酉送兩弟正之立之赴試送諸從游應試二首送馮子聲赴試送禇生滔赴試鄱陽别方道人中秋夜同陳澄江張夢麟城壕泛月和張尚書甬川新修池亭奉母登憩作贈蔣璞山封君贈張通政用韻自述壽張通政壽陸師慎齊七十曹霜崖六十司訓殷龍巖壽詩楊醫士六十禇怡閒六十贈宜興閔翁八十壽詩贈天寧寺僧八十懷竹叔壽詩楊醫士壽詩贈丹湯孺人壽詩謁文敏楊太師墓次江提學韻北郭謁宋鄒道鄉文忠公墓讀東坡詩戲作東坡卒於武進顧塘橋去余家數十步喇嘛翠峰老僧挽詩三首錢心漁挽詩雪詩和蘇韻十首家僮自野田携黃菊二株至軒中感而有作三首漂布架二首襪架二首病中食江魚作弟兒次江魚詩韻深不稱意偶坐水榭無事再疊前韻教之次韻題王孟端春流出峽圖山居讀王遵巖所為拙集序文自嘲四首紀夢有司查腳色二首遊塘候巡公四首海上凱歌九首贈湯將軍南征歌十二首塞下曲贈翁東崖侍郎總制十八首偶感十一首觀道士祈雨二首歸自金陵宿白土酬徐養齊尚書見懷之作亦以少頌盛德并為扣關先容云耳二首送楊訓導擢曹州掌教二首贈徐愛杏山人詩有序題贈假紫峰秋日書客童君見過賦此為贈題陳推官羅江號二首題寶華和尚卷贈王和尚住善卷自述贈寫真毛君贈曹星士一江號自述并贈曹君曉起觀猫捕鼠題畫廉使廖東雩喪後開所惠地黃酒臨觴慘然贈儀真沙君贈史君漁沙號華𥙷菴三度惠酒而此畨所惠參酒者絶清冽可人雖味甚濃厚而置之杯中淡若無色可謂嘉品因劇飲至醉遂成口號奉謝三首食石首魚又得勒二魚喜作口號向時石首每至郡鯧勒亦不至也非海氛漸息何以有此卷之四詩三屯營閲兵薊鎮總兵開府處喜峯口觀三衛貢馬自乍浦下海至舟山入舟風惡四鼓發舟風恬日霽波面如鏡舟人以為海上罕遇是日行六百五十餘里謁夷齊廟二首古北口觀降夷步射復戲馬馳射至夜山海關陳職方邀登觀海亭作盧龍行詠田疇卧病作至職方作余𥘉釋褐𥙷官武選主事今適三十年再官京師懷趙浚谷中丞嚴介溪相公見示戊午紀年詩次韻四首奉贈密雲閲兵作度潮河夜上石塘嶺關石塘道中古北口城此城雄據山頂蓋徐武寧之經略也宿黃崖營游遵化湯泉登喜峯古城時三衛貢馬散牧塞外曉發喜峯入秋久矣餘熱尚在閏月十五日太平寨始見秋色月下小坐書懷寄姜白二子薊鎮憶弟正之試南都還姜白二子衣副總兵馬芳芳陷虜中十二年而歸在虜中亦稱為驍將謁夷齊廟八月五日順義道中望闕一首時近順義公館次壁間韻登懷柔城二首黃花鎮拜介溪相公見贈次韻月夜渡蛟門三沙抱病夜坐柬梅林督府和陳黃潭柬歸一首浙中流言王逰擊喪師二三千者又聞總督梅林公將至太倉詩以自咎并以志喜云耳三沙病後夜起玩月書懷海上歸來病手足瘡兼血疾伏枕赴官揚州與左妹夫兩弟鶴兒白壻登金山坐禪房一首題墻子嶺公署中偃松署本參將府也遊湯泉四首宿七家嶺驛次壁間韻食蒜題豐潤寺中古鐘遊鐵壁銀山寺說法臺橫嶺七夕公館憶海上卷之五書答顧東橋少宰答張甬川尚書又寄劉南坦與王龍溪郎中答王南江提學答俞教諭答戚南玄答王生宗道與唐一庵書寄黎知州與鄭淡泉文選答洪方洲主事與王湛泉文選與陳後岡參議答屠漸山諭德與田提學書與二弟正之與薛方山郎中與張西磐尚書與王體仁與王堯衢書答周約菴中丞答周七泉通判與兩湖書寄黃士尚與項甌東郡守答江五坡提學答廖東雩提學與應警菴郡守又時警菴為提學卷之六書答馮午山提學與王南岷蘇州與胡青崖同知又答林鎮江巽峰答毛知縣鹿門與裘剡溪推府書答吕沃洲與張本靜又與薛畏亝副使答洪方洲主事與蔡白石郎中又答皇甫柏泉郎中與與槐謝翰林答喻吳皋御史與李中溪知府與胡柏泉參政與李少卿中麓答姪孫一麟答洪方洲答王龍溪郎中與羅念菴修撰與楊蕉山答楊小竹與洪方洲郎中又答殷生原學與程松溪司成與沈石山僉事與劉寒泉通府答王遵巖與聶雙江司馬與姜編修廷善與華郎中𥙷菴與陸五臺儀部卷之七書與季彭山答姪孫一麟答徽州汪子問繼祖母之喪辭宜興諸友為亡妻舉奠與人論祀鄉賢與莫子良主事答茅鹿門知縣又與洪方洲書又與王遵岩參政與楊朋石祠祭與萬思節主事又與顧箬溪又與卜益泉知縣答華秿菴郎中答蔡可泉與吕通竹嶼書與安子介書與白伯倫主事與萬思節僉事與董后峯主事與洪方洲主事與雷古和提學卷之八書答徐存齊相公又答翁東崖總制答