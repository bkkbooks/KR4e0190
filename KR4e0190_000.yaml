front:
  text: 重刋挍正唐荆川文集序吳之有文學舊矣諸樊為國斷髮之治未變蓋方甚陋而公子札已能盡通易詩書禮樂六藝之文以觀于中國則名卿碩士有愧于其所知悅其說之博雅而慕之如不及孔子教于洙泗來四方之學者則言偃踰江蹈淮而往遊焉辛以文學列于大賢之科南方之精華為之盡發而孔氏之道資其言之有文以行于逺至于今為烈蓋其盛如此畫長江大湖以為國方地千餘里林麓川澤之美殆不可如而光英冲粹之所漸涵磅礴於其問二人而已雖其甚盛而亦豈非難哉吾于二人讀其書觀其言尚而友之而庶幾知其人于今所見而及與之為友又淂一人馬毗陵唐應德也君于學蓋所謂得其精華其于言可謂有文而必行于逺者也其文具在學者苟讀焉而思思焉而有以得之則知其心之所通于季札孰為淺深言之所成于子游孰為先後有不可得而辨者矣君仕爲翰林編修復為太子司諫皆以守道直已之志棄去不啻弊蓰有吳公子輕千乘之國之節其文之以禮樂得言氏之傳而廉隅操行必謹于一介之取豫剛果自斷不可以威武利祿誘屈也尤足以闢夫偷懦憚事無廉耻而嗜飲食之誚上下二千餘歲之間吾謂吳有文學三人焉不為過也季扎之生其國雖尚陋然先君端委之遺教猶存而子游得仲尼為之依㱕其成此非難也唐君獨起于千載之後追二人者而與之並豈不為尤難哉君行年四十其學將進而不止其為文將日益冨而且精豫之所見如此巳可傳也無錫安君如石子介慕君之學得其所為詩文彚而刻之以與同好者共安君之趣尚如此豈凡人之所及哉嘉靖巳酉冬十月望晉江遵巖居士王慎中思甫序
