body:
  text: 卷之一䇿誥議表廷試䇿一道工部侍郎顧璘誥辭故禮部左侍郎薛瑄從祀議奉敕視軍情升通政司右通政謝表謝賜銀幣表謝升巡撫表謝賜銀幣表卷之二奏告病疏請皇太子受朝疏覆勘薊鎮邉務首疏條陳薊鎮輔兵足食事宜條陳薊鎮練兵事宜條陳水運事宜閲視軍情首疏三沙報捷疏海賊分道侵突疏三沙賊遁疏條陳海防經略事疏乞留餘鹽疏鳯陽等處災傷疏清逰兵疏擒獲潰兵及姦細事疏卷之三
