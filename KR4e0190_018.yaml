body:
  text: 卷之一䇿誥議表廷試䇿一道工部侍郎顧璘誥辭故禮部左侍郎薛瑄從祀議奉敕視軍情陞通政司右通政謝表謝賜銀幣表謝陞廵撫表謝賜銀幣表卷之二奏告病䟽請皇太子受朝䟽覆勘薊鎮邉務首䟽條陳薊鎮𥙷兵足食事宜條陳薊鎮練兵事宜條陳水運事宜閱視軍情首䟽三沙報捷䟽海賊分道侵突䟽三沙賊遯䟽條陳海防經畧事䟽乞留餘塩䟽鳯陽等處灾傷䟽清逰兵䟽擒獲潰兵及奸細事䟽卷之三
  hash: sha256:59fa79499e444f1ad1b4df834402bc93e2c25b75fcc6be896e01928cdc6a9fd6
