  text: 新刋荆川先生外集卷之一
  hash: sha256:8235bc58377d0060a68e4931dd6a11b83f2e1e69ae1c42849698b66cd9703913
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_019-1a}
body:
  text: 廷試䇿一道御批條論精詳殆盡臣唐順之臣對臣聞保民所以格天也正百官所以保民也振紀綱所以正百官也何則君者代天理物者也百官者行君之令而致之民以共亮天工者也百官弗正則下有倒懸之危而莫爲之恤上有子惠之仁而莫爲之施而欲民之安也不可得矣紀綱弗振則憸邪者或以矯飾取容循良者或以朴魯見黜任者不必賢賢者不必任而欲百官之正也不可得矣故曰君得臣而萬化行言安民在乎能官人也曰正朝廷以正百官言官人在乎振紀綱也立法以任人任人以安民則人心和而天地之和亦應矣于此見上下交修之責焉見天人合一之理焉蓋自古帝王敬天勤民以致天下之治者其要端在乎此而不可易也我皇帝陛下上畏天變下究民隱臨軒一詔于知人安民二者拳拳焉臣知陛下此心即殷湯桑林自責之心也即高皇帝仲夏不雨席藁露坐之心也臣雖至愚其于官吏賢不肖與夫民生利病之原則草茅之下甞有感於中乆矣况當清問之勤敢不悉心以對乎臣謹稽之洪範徴之春秋大抵政善民安則嘉祥生政荒民困則災沴作天降災祥在徳吉凶不僣在人陛下敬一以昭事中和以立極宜乎休徴至而六沴消矣而顧有不可以常理測者盖雖天心仁愛欲以助陛下宵旰之憂而隆嘉靖之治意者民之危苦無聊所以感傷和氣者亦容有之乎陛下蠲租以阜民財賑貸以周民急恤刑以蘓民命天下之至仁也其爲安民計者至矣親賢去奸以别取舎行乆任之法以圖治效天下之至明也其爲官人計者至矣而民未必皆安官未必皆得其人者意者賢否倒置授任失宜勸懲未著如聖䇿所慮者亦容有之乎則夫振紀綱以正百官以安萬民信不容緩也臣觀知人安民之謨始自虞廷發之臯陶之告舜曰在知人在安民禹曰知人則哲能官人安民則惠黎民懐之分之以三徳六徳皆以廣知人之㫖也詳之以惇典庸禮皆以廣安民之㫖也要之官得其人則善政行而天下䝉其福官匪其人則横政行而天下受其害約而言之非二致也哲也者成其惠者也知人非哲弗能知人而至於能官人則非紀綱之振亦弗能也紀綱也者濟其哲者也雖哲如尭舜而三載考績三考黜陟幽明内則九官十六相以爲岳牧之倡外則四岳十二牧以任總領之責規爲精密斯哲有所寄而其爲哲也大矣哲大而惠斯大矣仁急親賢知急先務此之謂也勲格上下治底平成由此其致也是故陛下欲弭災沴則莫若安民矣欲安民則莫若正百官矣欲正百官則莫若振紀綱矣紀綱之所以振者臣雖不能悉舉請得以其㮣言之其一曰精監司以察守令臣按永樂中太宗皇帝諭蹇義陳瑛等曰爲國牧民莫切於守令吏部選授皆出倉卒未能悉其才行必察所行乃見賢否其令廵按御史及按察司凡府州縣官到任半歳之上者悉察其能否㢘貪之實以聞臣願陛下光昭大訓精擇監司或得於群臣之公舉或得於睿鑑之獨照必其風采素著秉節剛烈者而後任之其既也果能激濁揚清不畏強禦者量加旌奨其狥私容奸及蔽賢不舉者量行黜責不但以得官吏之賢否而因以為監司之殿最監司憚憲典之嚴孰敢不竭力於旬宣官吏恃監司之公孰敢不勞心於撫字監司賢而守令亦賢矣其二曰清銓法以彰黜陟臣按成化中大學士丘濬議曰朝制三年天下官吏賫冊來朝六部都察院查其行事未完報者劾奏之以行黜陟後因選調積滯設法䟽通之輙慿廵按考語不復稽其實迹録其罪状立為貪暴不謹等名以黜退之殊非祖宗𥘉意况貪者未必暴暴者未必貪素行不謹不知何所指名何以厭服其心哉臣願陛下修復舊典申戒銓司核功過勿循毁譽量才能以責名實曰貪暴必指其爲貪暴者何如曰不謹必指其為不謹者何如則人不得飾名以求功而亦不得巧文以避罪矣其三曰信賞罸以激人心臣聞之有官而無賞罸是無官也有賞罸而不足以奔走天下是無賞罸也今也循資而擢之累勞而進之人将曰我資我勞固宜然也富貴爵禄皆若其身之所自致而效報之心薄矣奸吏浚財大刻於民而恒幸其不敢露也不幸而敗露也則止以罷免而幸其不及於戮辱也則徼幸之心滋而莫知懲創矣臣願陛下離照旁通乾剛獨㫁政績顯著雖待以不次之位而不嫌於躐等貪汙有状雖加以五刑之誅而不嫌於傷恩或璽書勸勵如漢家故事以收其全功或戴罪供職如大誥中所以處置朝臣者以責其後效用不測之刑用不測之賞以奔走天下而後可也其四曰信命令以敷實惠書曰慎乃出令令出惟行易曰渙汗其大號臣竊謂陛下有䘏民之美意而有司奉行者之未至也陛下嘗下詔曰蠲租矣賑貸矣䘏刑矣然有司之於民也則徴催之苦極矣民之斃於饑斃於刑者過半矣上徳隱而靡宣下情迫而莫救凡以此也臣願陛下嚴慢令之戒重沮格之罪限某日至某所于某日蠲租于某日賑貸慢違者必坐以罪而不少姑息焉則庶乎不爲虚文而民皆霑實惠也此四者皆以振紀綱而盡官人之道以爲安民之本者也若夫除盗賊禦夷狄固爲安民者之所當務臣以爲其要亦在扵得人而巳夫民之爲盗賊者豈其本心哉迫於不得巳或䧟於不知耳故曰豐世無盗者足也治世無盗者化也陛下得良吏如龔遂如虞詡者而任之威信所孚則足以折其氣仁恩所𬒳則足以結其心勸相有方則足以安其業盗賊不期息而自息矣天子有道守在四夷今之諸夷乗間竊發侵擾我邊陲䖍劉我民人信可患也臣則謂所患者不在夷狄而在我中國之無将耳盖今之所謂将者取諸世胄取諸武舉非不可得人也惟紈綺之習或未熟於經畧弓馬記誦之材或未足於竒正之變也臣請陛下行蘓洵之說令大臣各舉所知勇而有謀可以出入險阻者然後嘗之以治兵寄之以邊障養其望專其任而良将可得矣将良則士練而邊備飭矣至於財充而食足此亦百官有司之事耳百官得其人則經理有道儲畜有方而邦之財可充歛散得宜𥙷助以時而民之食可足要不足以煩陛下也以此言之紀綱克振百官之所以正者此也民之所以安者此也天心之所助順而反災為祥者亦此也抑臣猶有獻焉中庸曰為政在人取人以身則人固立政之本而身尤取人之本也朱熹曰紀綱不能以自立必人主之心公平正大無偏黨反側之私然後紀綱有所係而立則心者尤立紀綱之本也臣伏讀陛下敬一之箴則于尭舜禹湯文武之心法而為知人安民之要機者固自有在矣惟陛下始終此心弗以隱顯異其功弗以乆暫易其守弗以宴安荒其志必講學以涵養此心必親近君子以維持此心由是心純而賢才輔已正而物自正将不待於慶賞黜陟之及其身而風聲氣習之所加衆正遂彚征之願群邪沮窺睨之心亦其勢之必至者矣故以之知人則其知如神者也以之安民則其仁如天者也以之除盗賊則如舜之玄徳在上而冦賊奸究者自消也以之禦夷狄則所謂無怠無荒四夷來王明王慎徳四夷咸賔而禦戎之上䇿在乎此也即董仲舒所謂正心以正朝廷正朝廷以正百官正百官以正萬民逺近一于正而罔有邪氣干其間者也即公孫弘所謂心和則氣和氣和則形和而天地之和應者也即劉向所謂衆賢和於朝萬物和於野而和氣致祥者也由是而三光全寒暑時天地位萬物育天不愛其道地不愛其寶諸福之物畢致而王道終矣則夫知人安民以臻盛治又在陛下此心轉移間耳臣不勝拳拳忠愛之至幸陛下垂聴焉臣謹對誥工部侍郎顧璘誥辭朕祗承二聖懋建寢陵雖徙邑置園已擴藩維之舊而豐碑大隧未崇無上之規義取必誠朕不敢儉顧式昭軌物裁自朕心而董課章程須資石畫爾工部左侍郎兼都察院右副都御史顧璘以宏才素勁逸氣望于江東邇者伏節褰惟奠兹南服飾吏事以文學衆論乆㱕借小宰於司空朕心簡在昔灞上之役僅及因山不墳而曲亭之營至于㸐火夜作或靡而不就或約而難遵惟爾節贏縮以輸材量簡繁而作衆遂使三泉下錮倏若鬼工百雉外環屹爲天險鳴呼豐沛湯沐之邑昔頼底綏鼎湖劔舄之藏兹惟鞏固恪勤屢著報賚用彰特進爾階通議大夫錫之誥命爾尚底於厥績慰朕孝思經營告成爰効股肱之力大僚有報益輸夾輔之勲徃惟欽哉父昔詩人美召虎宣力江漢之間本之文武而當時䇿勲懋賞亦上及召祖著於大雅以為美談朕嘗嘉悅此道今工部左侍郎璘為朕經營顯陵是璘有勞于我二聖也爾封吏部主事某則璘之父朕不忘詩人召祖之義是用有以報爾惟爾含章可貞積善是寳不當其身發之于子翊我國家特贈爾通議大夫云爾其有知尚欽承朕命母惟爾封安人楊氏乃某官某之母􅈺于内則以有人子朕曩者祔安慈聖懋建寝園傳不云乎帝王親以及親以廣孝也矧璘寔董兹役懋著勞績慈聖之靈亦昭鍳爾是用推及其母贈爾楊氏為淑人錫類之恩惟璘亦有劬勞之報時乃休哉祖傳不云乎積厚者流光高門之祥效於三世爾顧誠乃某官某之祖操行郷閭不求聞逹亦既有孫服勞王家朕兹贈爾為工部兼云嗚呼積善之慶豈惟其身是圖惟其子孫之紹匪躬之勤豈惟其國是為惟其祖先之光爾尚服兹休命祖母令甲自三品而上得推恩其祖父母以優勞臣廣孝道也爾陸氏乃某之祖母隂徳克俻高年令終列鼎之養沾於生前􅊮管之褒乆而無斁兹特贈爾為淑人尚歆承之妻昔在周時諸侯累功積行以致爵位夫人起家而居有之鵲巢之詩所為作也爾某官某之妻某氏嫓徳君子閑於厥家有雞鳴解佩之誼朕用嘉爾兹封為淑人嗚呼闕狄之錫既彰爾賢石之賢尚期于後議故禮部左侍郎薛瑄從祀議陛下懋建皇極身作君師惠然留意理學之臣博採於庶官之論欲以定祀典而彰潜徳甚盛心也夫瑄之為人諸臣論之詳矣臣可無說也臣請折衷之祀典以答明詔可乎臣聞聖人之道有宗傳有羽翼盖孔門身通六藝者七十人其徳行稱者纔四人而夫子獨許囬庶幾其三人又不與也一貫語之參賜而性與天道賜又自以為不可得聞則其精㣲之際心授心受毫釐不差者固亦難矣所謂宗傳者也然文學政事言語亦得與徳行分科而居而皆不失為聖人之一體至於門人之辨之勇之藝聖人亦自譲以為賢於我也且曰自吾得某也而惡聲不入於耳自吾得某也而門人加親是聖人與人之周也所謂羽翼者也此孔門人物之衡也亦後世論孔門從祀者之衡也如使必其宗傳而後可以從於祀也則顔曾思孟而下及於濂洛四三鉅儒而足矣雖七十子亦有在所畧者矣而况於經師之口傳與王韓軰之疵而未醇者乎然且群然而爼豆焉則羽翼之故也故曰與其過而廢之寜過而存之至如瑄者以復性為䆒竟以持敬凝静為工夫非聖人之道不以志而學非濂洛關閩之說不以尊而信雖其於所謂精㣲之際未知其何如也而歴其平生其背於聖人者亦少矣謂其為聖門之羽翼也復何疑乎此瑄之可附於祀典者一也臣聞衆心安定而成俗俗必有尚衆志鼓舞而成尚尚必有倡倡之者始之也祭之為言報也以報本而反其始也我朝理學彬彬乎盛矣然自瑄以前儒者猶泪於辭章事功之習而未有能卓然於道徳性命之㱕者也而瑄實倡之矣自瑄以後其有如瑄者繼踵而出乎未可知也其有能直接孔氏之心傳者出乎未可知也而瑄實倡之矣是則瑄其我朝理學之一闢也比之濂洛倡道於宋雖其所自得或有深淺而功則並之此瑄之可附於祀典者二也臣聞之記曰凡釋奠者必有合也有國故則否解之者曰國故云者若虞則䕫伯夷周則周公魯則孔子也此代各自釋奠於其代之人之証也而國又自釋奠於其國之人之証也又曰春官釋奠於其先師解之者曰若漢高堂生制氏毛公伏生也此漢代釋奠於漢之人之證也故夔伯夷周公孔子雖不能接世而生而高堂生制氏毛公伏生固亦非曠世之所希有然而與於釋奠者代有其人則自建學以來皆然未有空一代而絶無其人也明興且二百年弦歌之化暢乎逺近豎子皆知誦法孔氏而壁宫之側至今無一人得爼豆其間者非所以鼓士氣而彰聖朝棫樸之盛也元之世且推其臣許衡而從祀焉我明乃無一人之幾於衡者其不然矣由此言之苟為聖人之徒者猶宜援而進之而况如瑄之真可以羽翼聖門者乎如是而曰我國之故也而祀焉以比於漢高堂生制氏毛公伏生許衡其亦可以無愧矣乎况今之所謂祀者乃其偃然於累代群儒之後而非如記所謂特祀以為先師者也奚不可哉此瑄之可附於祀典者三也臣聞周禮大司樂曰凡有徳者有道者使教焉沒則以為樂祖祭於瞽宗瞽宗者殷學也此學宫祀其能為師者之證也其釁噐舎菜而神之者乃其攝齋鼓篋而師之者也瑄嘗督學於齊魯而諸生翕然尊之曰吾薛夫子也故其時師道之尊而庠序之飭始自齊魯而風於天下盖在勝國時許衡實為祭酒勝國時之能尊師道而作人材者莫如衡而我朝之能尊師道而作人材者莫如瑄其亦近乎樂祖瞽宗之義否耶此瑄之可附於祀典者四也然或者謂瑄於六經少所著述宜不得與從祀臣竊以為不然夫聖人所為作經者何也以摹冩此心而巳儒者求諸心而有得也是真能發揮六經者也且自古儒者說經之多莫如馬融其體認本心絶不肯為六經註脚者莫如陸九淵陛下嘗進九淵而黜融則聖明照鑒固有取於躬行妙悟之實而不徒以聞見講解為功矣况瑄所著讀書録且十餘萬言固濂洛關閩之緒而六經之㫖也其為著述則亦巳繁此瑄之無礙於祀典者也然宋儒之賢若尹焞羅從彦李侗黄幹皆不得與今瑄所得未知其與數子何如乃得與或者亦有是說臣又以為不然夫瑄之所得誠未知其與數子何如也然自濓洛倡道之後群儒連茹而出耳目薫染親相授受故其興起為易而瑄獨崛起絶學之後故其樹立為難其連茹而出也不得不擇其尤者而祀之其崛起也不得不援而進之譬如繁星麗空非五緯不能昴芒而晨星相望則維參與昻嘒然而見㣲顯闡幽之義也安得牽彼以例此乎此又瑄之無礙於祀典者也故臣以為宜如御史臣曕臣得仁所䟽臣愚昧死謹言表奉敕視軍情陞通政司右通政謝表經畧海隅外則瓜牙之寄出納帝命内維喉舌之司愧以㣲才叨兹重任竊念島夷為寇海邦荐驚庚戌戊午首尾垂及十年南粤東齊繹騷且亘萬里數戰數勝我雖巳獲百全之謀一歳一來賊竟未有終身之創相機剿撫秪謂權宜大計兵財莫如經制向非識時務而可致諸用何能佐督府而克咸厥功臣頃以兵戎起於罪謫薊門閱武未封松谷之關舟山視師莫繫島酋之頸介胄兩窺敵壘作士氣之凌騰樓船五渉驚波窮賊踪之來去雖不敢愛身而辱命亦安能决䇿以除殘顧賊尚據於三沙功未收於一鼓罪戾是懼任使奚堪悉中機宜誤督臣之特薦同經兵務荷聖筆之親題峻其階資俾之展布在古文臣建閫或以權任輕淺而僨師大将臨戎或以章奏壅隔而敗事臣任同總帥官係納言錫命俯頒董熊貔之八校轅門仰矚通虎豹之九關戎衣真挿侍中之貂朝位已厠諸卿之棘處益非據恩則逾涯兹盖伏遇皇上并包華夷如天地之能容庶類旁招俊乂如江海之不擇細流經營四方有臣曰虎傳宣九命任官惟龍詎意樗材亦塵噐使臣敢不仰體聖明之異眷期與督帥而同心勉竭短才共圖長筭土著可練不用徴兵於四方倉粟有儲亦免饋糧於千里百艘萬隊永清東海之波三島十洲並獻南山之壽建牙責重敢忘枕甲於師中戀闕情深猶兾鳴環於門下謝賜銀幣表簡書将命慚江海之無功御府賜珍忽帑笥之兼至謹服用而勿替示将士以為榮臣感激感激頓首頓首恭惟皇上模範兩儀文明六合行健不息乾坤垂黄帝之裳凝命無疆法象式禹王之鼎四夷酋長咸襲衣冠九牧荒遐舉脩職貢蠢兹島寇竊敢弄兵上厪廟堂亦爲旰食祼身突髪毒我東南者十年濡首焚舟殱之海隅者百級是皆帝謨之丕冒日出豈云人力之敢貪天功况於㣲臣尤居末品廿年丘壑巳甘衣白之夫一旦遭逢猥𬒳横金之寵分符閫外兩轉銀臺錫命師中三章赤芾誓清豕突幾渉鯨波方圖稍效於㳙埃詎意仰承乎濡霈顧将士之勲可紀臣則安有㣲勞督撫之賜有差臣亦濫叨上賞褭蹏出職金之篋非布非泉鴈𥙷分司服之蔵載緋載緑頓増中戸三家之産且適窮海四時之温昔漢帝寵帷幄謀臣徒誇金溢宋祖賜征南将帥祗羡貂衣獨以庸流雙承寵賚遂使散金酬士不藉私財衣繡臨戎争看命服臣竊愧恩深力淺任重才踈敢忘伏弢益思敵愾金常在槖與貞心百鍊而弗移服不離身恍天威咫尺而如見至於捐貲購敵挾纊撫軍奮不為家今日未敢出賜金而買宅服以拜賜他時尚當肅容觀以趍朝謝賜銀幣表馳南騖北㣲勞未效於㳙埃函一襲三恩賜特昭乎法象身雖逺闕忽承咫尺之天顔禄巳浮人載頒服用於御府臣感激感激頓首頓首竊惟蠢兹島寇敢肆狂圖幾年搆亂於東南今歳寔繁於淮海雖師武臣力卒就殄殱而豕突鯨奔已深荼毒民之𥜗緼為賊褁包民之貨錢充賊囊槖臣奉簡書而視軍情同總督而理兵事未能為百姓保𥜗緼而乃賜服於司衣未能為百姓護貨錢而乃賜金於内帑加以幄中勝筭閫外擒戎則總督宗憲之遣援應機提督李遂之臨陣决䇿顧臣何力之有亦叨克咸厥功感不勝慙勞豈堪録兹盖伏遇皇上包天地以為度使人不求備於寸長體尭舜而用中勸功特致重扵疑賞凡在曾援枹之列均獲不踰時之恩六幣相承本出染人之朱緑一鎰有半叨分土貢於荆揚貯以滿籯既生壮士之顔色服以耀武式増繡使之威容臣敢不賦無衣而脩戈矛永夜不忘乎敵愾懸重價以収䇿畫群力畢屈於紆籌集諸将校射而分金尚恐䙝乎天賜廵三軍深寒而挾纊或能廣乎聖恩伏願陶鑄華夷黄河帶而㤗山礪彌綸造化玉衡正而台階平提督軍務兼廵撫鳯陽等處地方都察院右僉都謝表温綸洊錫歳敢冀於三遷雄鎮特分官遂叨於獨座仰思恩賚之深厚益懼才力之迂踈臣感激感激頓首頓首竊惟國家託重而恃力要在撫臣人臣緯武而經文更如提督但事體一同所職而建置各有攸司浙福兩臺本非為盗而祗以禦夷鄖贛二閫無與于夷而專以弭盗特承兼勅維是此官加以陵寝尊嚴畿輔要害二山狼福分南北惟今海賊咽喉兩州徐宿亘東西自古姦豪窟穴非得熊羆不二心之士曷堪鎻鑰寄千里之邦臣樗櫟散材䇿非韜虎章縫寒士力不傳雞秪縁兵事而起家遂欲行間以自效義同解闘寕辭𬒳髮而纓冠憤切除兇恨不寝皮而食肉敢謂過家門而忘入徒然對郊壘以多慚視師無功顧臣自知其罪轉官太驟惟皇上入聖克優勤民愈切無外之治既守四夷有征之師不忘一怒時聽鼓鼙而思将帥遂賜節鉞以寵儒臣臣敢不益竭愚忠上酬殊遇但以閭閻之杼軸巳盡恐桴鼓之易鳴島嶼之氛祲未銷懼海波之再沸終歳急攘夷之備百方塞致盗之源受牛羊而求牧芻敢云立視其斃戮鯨鯢以為京觀更耻與之俱生撫順摧強誓竭股肱之力清河宴海冀寛宵旰之憂錦繡名城拱極常瞻乎京闕欝葱佳氣周廬永護於寝園謝賜銀幣表神功黙運醜類雖既遁而復擒天賚寵頒臣子獲記功而宥過對賜函而感涕捧在笥以驚慙臣感激感激頓首頓首伏念臣鉛刀㣲噐襪線短才謬承韋弁之司忝屬金戈之役南沙逸賊雖云帥臣之失律而臣則厥罪惟均劉荘破巢實維驍将之先登而臣則何功之有僅免鑠黄金於衆口秪堪裭鞶帶於一朝忽荷璽書之洊加禮先諸将兼承金幣之三錫數並督臣褭號出御府之珍永以為寳豸繡炫天孫之錦豈曰無衣用餙軍容敢希方叔之命服以収諜間詎比陳平之賜金幸免不衷更慙浮食兹盖伏遇皇上垂衣衍有道之長凝鼎弘無外之治皮服卉服悉是􅊢臣荆金揚金咸修禹貢獨此倭夷之倡亂特厪淵衷俯念文武之宣勞式頒大賚遂令末品亦荷殊恩臣敢不仰戴鴻慈益圖㳙報懐金勵志縱百錬而不渝挾纊推仁雖一寒而必顧冀膚功之可奏豈憚祍金儻暮齒之未衰尚期褁革伏願蠻夷戎狄盡㱕神化之鑪錘禮樂文章益廣聲明之衣𬒳新刋荆川先生外集卷之一
