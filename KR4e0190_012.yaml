front:
  text: 荆川先生文集卷之十二
  hash: sha256:096f0270a825a56ee2353938dcdc67272f527ad24fff71db3c9422a6dc1bc737
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_012-1a}
body:
  text: 記重修宜興縣學記先王因人情而施之教知夫人情所不樂則不可以從事於久不可以從事於久則不可以責其器之備而業之精也是故學校以教士而養之以禮樂以柔伏其速成躁進之心使其終日從事於爼豆筐篚象勺干籥盤辟綴兆之容與其弦匏摶拊笙磬雅頌吹擊歌詠之聲盤辟綴兆其文郁如吹擊詠歌其音鏗如是耳目之所恱而血氣之所暢也天機與器數相觸而不自知是以能終身安焉而不慕乎外上之人九年而後視其成四十而後試之仕而士不自以為滯也故其器之備也則自蕳廉直溫剛塞恭願至于中和孝友皆能盡其微妙而無有粗疏傲戾之氣其業之精也則自虞夏商周之典章鞮譯象寄之語言至於射御操縵雜服之技凡可以為家國天下之用者能貫而通之而無有乎鹵莽生澀之習蓋其磨揉之久而其勢不得不至乎此也今也禮壞而樂廢先生之所以為教弟子之所以為學者何也朝擊柝而聚之而課之書夕擊柝而聚之而校之文口吻刓於蠧編之誦記而思慮敝於遊詞之剽綴夫士者之為世其不得已而應有司之求則可耳豈人情之所樂而况聲利之焰薰心炫目又雜然而日出以非可樂之習驅之以必可奪之誘則宜其有厭苦學校之心惟恐其去之不速亦何怪乎業之不精而器之不備也蓋孔門諸子嘗言志矣點獨不願仕也浴沂風雩鼓瑟詠歌以適其意而子夏亦云出見紛華盛􅻫而恱有鼓瑟詠歌浴沂風雩之樂則點也可以自足於洙泗之濵而無所慕有紛華盛麗蕩之於外則子夏不能自必於其中今也無禮樂以養之有聲利以驅之而欲使之終身安焉而不去豈非勢之難者歟宜興有學舊矣歲久不葺通判泌陽焦君希程來署縣事斥贖金之餘凡若干兩鳩工庀材以繕其事又立名宦鄉賢兩祠於櫺星門之旁以祀宦於其縣與其鄉先生之賢者而學之制于是為備既訖工教諭張君某訓導某君率其學之弟子來請記嗚呼禮樂以飬士古之道其不可復矣雖然無體之禮無聲之樂流乎宇宙而著乎人心不假器數而傳則古之道固未嘗不在也誦書綴文以應有司之求士生於今不可以已矣雖然其誦書也務於約而不汨於百家傳注之煩其綴文也盡乎已而不牽于時俗好醜之説則今之法固不能為纍也古之所謂可樂者未嘗不在而今之所謂非可樂者不能為纍則亦可以無用於速而去之矣宜興溪深而谷窈石峭而泉冽自古宦遊之士多欲徙而家焉蓋隱然有舞雩沂水之風而地僻以蕳冠蓋文繡之所不衝大賈重裝之所不輳故其俗鮮見紛華盛麗之習然則有點也之樂而無子夏之誘宜莫如此地者噫嘻諸君子其務求古人之所可樂以自足于其間以修其器與其業而無急急于務去其學也哉重修涇縣儒學記先王本道德禮樂經術以造士而以士大夫耆老之優於道德禮樂經術者命之以為庠序之師至于閭胥族師什伍之所鼓篋而從焉者亦無不命干上而一閭一族之間亦無非以道德禮樂經術相磨切是以上無私師下無私學周衰王道廢缺齊魯列國學校猶在不過粉色潤飾而易象春秋十六國之樂徒以誇于諸侯賔客為古物玩具而未嘗以教諸弟子所謂學官與弟子云者詡詡禮樂徒能習其鏗鏘鼓舞而絶莫知其義其士大夫之有道德者抱其器而私相與教授于山澤之間不出户庭而自成庠序蓋觀於洙泗之濵欣欣侃侃弦歌鼓瑟者至數千人雖數百餘年諸生以時就其家習禮焉而使觀者低徊不能去此其最盛然孔子在當時非有司樂象胥之職沒不與瞽宗之祭而弦歌數千人者亦非所謂司徒俊士之選也自是之後西河鄒嶧傳易授詩紛然彌衆然皆與庠序無預漢興立博士置辟雍橋門觀聽縉紳動色蕃夷武卒莫不受經然秪以為太平之榮觀而當時所謂師弟子者不在也濟南關西琅琊千乘世傳經術隱居教授生徒至萬餘人然亦不屬之庠序由此言之王教興則道德禮樂經術之寄在庠序而師道為公王教廢則道德禮樂經術之寄在山澤而師道為私雖其所寄無以異者而世之升降繫之矣國家建學遍宇內蠻陬海徼莫不有學生徒多者七八百人少者百人可謂至盛然而道德禮樂經術之寄其在焉否也所習者不過乎章句占俾所志者不過乎聲利榮名其所謂髙等者亦惟騖文詞之博而秪以為溺心滅質之資矜廉隅之飾而秪以成詭激矯誕之習是以豪傑之士往往病之而相與修身治心詠詩習禮考業講德干岩居燕處之間先王之禮樂經術亦稍稍賴以不墜然庠序為虛器而師弟子為私名論世者亦太息于斯焉涇于寧國為屬邑而學宫圮壞不葺午山馮公為提學嘗欲新之未克也而再為提學則以屬之知府尹宇葉令祥率其民之好義者使出財鳩工不足則濟以贖金之餘董其役于主簿某而視其成於學官董汝礪鍾維揚曹鸞于是戟門辟池筍簴在列登其堂者如入孔室而聞金石絲竹之聲丹雘黼黻儼而髙居挹其象者如見聖人而親申如天如之容其與古之庠序亦幾無以異矣而午山公端軌物樹風聲其於為師又非徒以其位焉者涇之俗古稱和柔而涇之士以余所知其有聞先生長者之風志于修身治心而深病乎占俾聲利之為陋者固且有人焉而在乎庠序之間自是淬磨砥礪融習氣之偏而歸之渾化破意見之障以致乎精微相噓相染而成風俗使人皆曰先王道德禮樂經術之寄不在山澤在庠序者涇之學則然豈不盛歟古者首善自亰師始故司樂象胥之教尤詳於閭胥族師涇為甸服去南都三百里而近是國家之所首善也涇之士相與務乎先王道德禮樂經術而風流乎四旁使人皆曰道德禮樂經術之興于庠序者涇之學始又豈不盛歟于是午山公使學官維揚與諸生張鑜來請記余樂為之記以告于多士而朂其成云午山公名天馭字應房蘄人修學始嘉靖某年某月成于某月重修瓜州鎮龍祠記龍之祠不秩於三代之典記禮者謂之四靈蓋以為鱗蟲之靈者耳其祀始見於封禪書朝那龍湫今天下大水之濵無處不有龍祠宋之儒者論大河之治以為不宜祀龍曰是天地之功也龍何力之有然余竊以為未盡也夫天地無為而百物之肖像於其間者莫不各致其能以效其功而天地未嘗與之爭功然而百物之功孰非天地之功也至於昔人之制為祀典也凡有功德於天地之間者不問細大莫不群然秩而祀之以致其報而未嘗疑于與天地分功然而所以報百物之功亦孰非所以報天地之功也吾觀於蠟而見古人通乎鬼神之情而悉於幽明之故矣夫生成百榖以粒民孰非天地之功若是則古人為之禋為之社以報之可矣至於大索鬼神而蠟焉者何為也其蠟也先農先嗇庸與坊焉可矣而至於迎貓迎虎而昆蟲亦登焉者何為也惟天地之生成百榖雖一貓虎昆蟲亦使之盡其能於食鼠食豕之間而無遺利焉於此見天地之功為甚大人欲報天地之功而無由則雖貓虎之效一能於天地者亦秩之祀而無遺靈焉於此見人之所以報天地之功者為甚深凡百物之靈固莫不肖氣於隂陽五行而龍得隂陽五行之氣之精故其變化尤靈貓虎未嘗無功於田而謂龍盡無功於水乎祀貓祀虎未嘗疑於與天地分功而獨疑於龍乎且夫天地之間大者不自擅其大而寄於小小者各務致其小以歸於大其為力也大者常逸而小者常勞其功之成也小者易以為德而其大者常不可名故耕鑿之民不知帝力之何有而至於一社之長一邑之令則人煦煦然而嚮之死則為之尸祝而爼豆之此豈可謂忘大君之功德而顓顓於一社長一邑令之為報哉又豈可謂一社長一邑令之功德而非大君之功德也哉然則龍何疑焉而不祭於古也曰百物之祭古矣又安知古之不祭龍耶古有豢龍氏豢龍氏之於龍安知其非如伊耆氏之於蠟實掌其祭者耶所謂豢龍者其無乃羞飲食以祀龍之謂而好怪者遂以豢龍為畜龍也歟龍乎可畜其亦非所以為龍矣古今大水凡四而河與江為最河移徙潰決不常而江獨為安流意必有宰乎其間者而龍之奔走以效其靈也亦不可謂無瓜州據江之衝則其建祠以祀龍也亦宜祠不知所始歲久圯壞嘉靖癸卯奉化王侯杏始為揚州府同知署府事乃斥贖金之餘修之而使道士某來請記王侯儒者也其為是舉也必有以通乎鬼神之情而悉于幽明之故矣余懼後之人泥於舊説而以為非經之祀也為之著論如此使龍其安且食於此而無慚焉且使讀者其亦無以余為語怪也重修解州關侯廟開顔樓記嗚呼漢建安迄今二千餘年而侯之烈自縉紳先生與小孺子皆能道之赫赫若目前事其廟侯而尸祝之者自都會以至一井一聚且遍天下而解人之慕矦尤深蒸嘗伏臘尤虔以勤者以矦之為其鄉人也解人之廟矦也久矣而為樓以棲樂者則始於國朝弘治時其扁曰開顔而樓蔽東西南三面若張幄然其南樓撤於正德間東西兩樓亦久且壞鄉人某某等復醵金葺之又樹坊其南以承樓之缺而矦之居益崇且嚴矣矦以死事於法得祀又侯故為將軍封列矦漢制列矦將軍得賜鐃歌鼓吹其沒而葬也得用軍陳凱樂則鄉人備樂舞祀矦宜也於是某等因其鄉之士大夫員外郎丘君某來請文按矦始識玄德於草莽卒然之遇而遂授之以肝膽死生之信至於崎嶇顛沛西東奔竄而其志愈不可奪窘於俘虜之中而其志愈眀蓋矦之大節磊磊如此而論者特稱矦之雄勇冠世而深惜其功之不就以為矦之兵不先加於腹心之吳而先加於肘腋之魏不先加於藏戈背伺之吳而先加於露刃面拒之魏故其勝魏也未足以肥蜀而其信吳也乃足以自斃且操權之不敵也久矣操也且懾於矦之威至欲徙都以相避使矦當時先吳之未發而圖之豈不可以得志噫此亦有數焉耳然使矦為摧鋒拔城之將孰與使矦為伏劍死綏之將也矦始遇玄德固相許以死而已幸而得死矦又何求且夫摧鋒拔城之將勳庸著於當時伏劍死綏之將風采傳於後世勳庸在當時者身沒而響微風采在後世者既逺則人愈悲而思之此固世之所以尸祝於侯而解人所以慕矦之深者也不然古之雄勇如侯而能摧鋒拔城者豈少哉皆身沒而響微可以觀人心矣解之為州在太行上黨之間肯人論五方之俗以為山西懻忮而好氣而慷慨毅武竒節之士多出於其間若介子推先軫狼瞫藺相如馬服君諸人雖或死或不死皆耿然如寒水皎日不負其志所謂偉男子者也矦從玄德於﨑嶇顛沛之中似子推威震乎敵國似相如馬服其賈勇死敵又偶與軫瞫相類豈慷慨竒節之士多出於山西而侯其傑然者歟今之山西古之山西也吾不知其俗之懻忮而好氣於古何如而慷慨竒節之士抑豈無有出乎其間如古人者歟然則解人之所以拳拳於矦者非徒為矦也蓋將以鼓其所趨而成其秉節倡義親上死長之風也夫書以侯之常州新建關矦祠記嘉靖三十四年倭寇繼亂東南天子命督察趙公文華統師討之師駐嘉興軍中若見關矦靈響助我師者已而師大捷趙公請於朝立廟於嘉興以祀矦事具公所自為廟碑中明年倭寇復亂趙公再統師討之師過常州軍中復若見矦靈響如嘉興趙公喜曰必再捷矣未幾趙公協謀于總督胡公宗憲渠魁徐海等悉就擒趙公益神矦之功命有司立廟于常州侯之廟盛于北而江南諸郡廟矦自今始或謂江南古吳地吳矦讐國吳不宜祀矦矦亦未必歆吳祀此未為知矦之心與鬼神之情狀者也先儒有言人皆謂曹操為漢賊不知孫權真漢賊也按矦所事與所同事當時所謂豪傑明於大義者先主孔明而巳孔明猶以為吳可與為援而不可圖先主亦甘與之結婚而不以為嫌惟矦忿然絶其婚罵其使擯不與通竊意當時能知吳之為漢賊志必滅之者侯一人而巳權遜君臣亦自知鬼蜮之資必不為侯所容非吳斃侯則矦滅吳此真所謂漢賊不兩存之勢也矦不死則襄樊之戈將轉而指於建業武昌之間矣然則滅吳者矦志也矦之志必滅吳豈有所私讐于吳哉誠不忍衣冠禮樂之民困于姦雄亂賊之手力欲拯之于鼎沸之中而涼濯之使吳民一日尚困于亂雄矦之志一日未巳也然則矦非讐吳讐其為亂賊于吳者也讐其為亂賊于吳者所以深為吳也矦本欲為吳民斃賊而先斃于賊賫志以沒矦之精靈宜其眷眷于吳民矣由此言之矦之所讐莫如亂賊其所最讐而不能忘尤莫如為亂賊于吳者倭夷恣凶稔惡以毒螫我吳民是亂賊之尤未有甚焉者也其為侯所震怒而隂誅之所必加翼王師而助之攻也亦何怪乎神人之情不相逺未可以為杳冥而迂之也竊謂吳人宜廟矦矦亦必歆吳之祀於是郡守金君豪以趙胡二公命擇地得城東隅巍然一突下視城郭方可二畝相傳所謂中軍帳者曠無人居君以為廟矦莫此地宜於是樹以穹宫而地益勝古樹數株適當官前森隂倐忽若矦降止郡人來觀莫不喜躍強者賈勇弱者思奮抵掌戟手若神惎之然則諸公之為此舉非特以答矦之功其所以作郡人敵愾之氣以待寇者所助不小也久之金君遷去邵君惟中代守有嘉成迹增之式廓爰勒碑以紀其成而請文於郡人唐順之其詞曰朅朅關矦惟萬人敵天稟義姿志必殱賊北向揮戈七將皆殪匪曰後吳勢有未及欲拯吳民為賊所先精靈在吳死而炳然隂隲吳民至千餘年東南不淑天墮妖星島酋海宄凶遜再生競為長蛇薦食我吳矦靈在焉能無怒乎夷刀如雪手攣不展渠魁倔強悉就烹臠帥臣避讓豈我之力隂有誅之實徼矦福徼福維何作廟以祀東南廟矦自今其始毗陵巽隅古稱將壇若有待侯鬼兵踞蟠天隂髣佛長刀大旗生欲拯吳沒而來思矦德吳民無間生死么麼小醜永鎮不起郡人入廟踊躍歡喜競如赴敵強跳弱起誰鼓舞之侯有生氣常熟縣二烈祠記昔人論女子從一於夫比於臣從一於君之義自古姦人篡竊而其故臣不幸以才見籍録于斯之時彼有棄瑕用讐之圖而我有佯合觀釁之便苟其黨有可携事有可濟則逞於一擊以誅讐而復國若王司徒之於卓假司農之於泚此其勢逆而其事之難以必者也彼有棄瑕用讐之圖而我堅委質䇿名之誼寧死而不二其心寧死而不二其君若豫讓王蠋之説此其勢順而其事之可以必者也二者其所處不同而其要於自盡則一也是故生也而無迂身於徼幸之嫌死也而無自經於無濟之愧女子之於夫則亦有然者矣嘗讀史所載孫翊妻之事而壯之當二凶貪於翊妻之色而殺翊也妻既見窘逼於是藏機匿哀陽許二凶以婚而緩其期隂結故將為援須二凶以婚入而遂刃之雪不共天之憤於閨闥杯酒之間斯亦可快矣若夫二烈之事則異於是其夫以羈旅浮寄江壖非有可以豫藉之勢環而指者皆凶人之黨也非有肘腋可結之援方張島之誣其夫以盜而沉之於江島遂欲室其婦而島之黨欲室其女於是婦與其女倉惶闔門自刃以死嗚呼可謂烈矣雖然二人者豈不欲手揕讐人之胸如孫妻之為以報夫與父哉而勢有不能也則一死而其事辨矣故嘗合孫妻與二烈之事論之苟機有可乘而速忿以必死則殺身而無益苟事無可濟而濡忍以有俟則危逼而近辱此亦其所處不同而其要於自盡則一也二烈死時凶黨裒其尸而焚之其事祕無人能發之者後數年巡按陳君蕙詗得其事島與其黨始伏辜此蓋足以見節義之氣有時而必伸淫凶之誅有時而必不能逭也歟二烈者固不必手揕讐人之胸而後為快矣事既白於是知縣羅君鴻為之立祠以祀扁之曰二烈而無錫安君如石請余為之記嗚呼此義行不特所以勸節其亦深所以懼凶也歟是有關於世教大矣烈婦某姓其夫某姓而逸其名相傳自通州而徙常熟之某鎮也零陵縣知縣題名記名者其起於古之所以勵世乎古之所以勵世其法莫僃於史史之法莫巖於春秋史家者將以紀善惡而垂法戒而千百年之善與惡不可勝書也則舉而寄其詞於名姓稱謂之間春秋之法微者名姓不登於册書其非微者則槩而登之是史家之常法而無所擇乎其人焉者也其有不然者或微而名或非微而不名或書其姓而奪乎其名或書其名而又奪乎其姓其靳靳不肯輕豫人以名姓也如此而後得登名姓於册書者足以為重是史家之變例也今夫人望其容貌而問其人之善與惡者有之矣過其室廬而問其人之善與惡者有之矣識其姓名而問其人之善與惡者有之矣故古之圖容貌表室廬紀姓名使善者因之以久其善惡者因之以久其惡其為教一也零陵楚之南徼也邑乎郴桂之間瘴癘之所濡苗僚之所鄰往往不能得善吏而邑之譜諜亦散佚無可考自余父有懷公少時則已聞先伯祖平樂公名復者始宰是邑有惠愛及為永州欲按其故迹詢其姓與名雖邑之耆老亦無知者考之郡志所載零陵令之姓與名亦無有也已而更索民間所藏景泰中所撰舊志則稍具其姓名政事歷官大略而其名亦已誤復為福矣有懷公為之慨然而嘆因復思國家二百年之間其邑之善令多亦有如􅊭樂公或僅存其姓名而又誤或并其姓名而湮沒焉者當不啻幾人而其奷回叨餮乘令之威肆毒吾民者亦幸而逃其名於後世豈非志於懲勸者之所悼歟于是搜輯散逸得某君而下若干人以為是皆令也則槩登其姓名于石以著于世雖然後之人過而指其名有不就而問其為令之善與惡者乎問焉而知其令之善也雖百世有不愛而慕之如其人之存焉者乎問焉而知其令之惡也雖百世有不唾而噍之如其人之存焉者乎是則其為令也善而名之也甚於旗常之載焉其為令也惡而名之也甚於鼎象之鑄焉所謂美惡同詞其亦春秋之法也嗚呼其善者蓋不忍欺乎其民而蘄以自盡乎其心𥘉豈有意身後之名也哉其不善者蓋亦偷快意於一時自計以為其去官與其身沒之後且影響銷盡人無復指之者豈知更千百年其姓名並彰著而不掩若此嘻其可懼也已廣德州同知蔡侯政績碑記蔡矦之始去州也州人哭而送之境後十餘年矦以宦遊過江南有傳言矦將取道于州州人喜於復見矦也逆諸境數日矦從他道去州人哭而歸則相與謀紀矦之政於石於是署州事判官張君遣陳生潘生來請為之書石余辭謝後一年知州歐陽君繼遣陳生濮生來復以請曰先生與蔡矦相知為深宜為之書余復謝曰余惟與蔡矦相知之深也是以未敢為之書夫蔡矦者居乎今而學古之道者也古之道盡乎巳而不蘄乎人先其實而深避乎其名不然畏壘之民規規然感慕而爼豆之此庚桑子之所為懼而逃去者也且古之以循吏書於其傳者有之矣其在當時權任既重且專其居官也又久而信是以能為百姓立殊絶可紀之功而後史氏因書之為傳若蜀郡以興學書南陽以溉田書書渤海也以弭劇盜書膠東也以增户至十餘萬自漢時得書者才數人而一人又各以一事殊絶自見而巳自此之外其緣俗而治者豈遂少哉則以其事無殊絶故不書也蔡矦蒞州之日淺矣又州佐也操柄所不在故其所可見者大率緣俗而治矦之心且自謂不能有殊絶功德加於細民而歉然不以為足也矦之所不自以為足而州之人乃欲為矦張而侈之不亦拂乎抑古之以循吏書於其傳者非特以殊絶之故亦以位不至通顯其所樹立施設止於一郡一邑而不究乎其大者故史氏亦從一郡一邑書之而謂之循吏傳若黃潁川薛馮翊其治績尤異固不在於蜀郡渤海之後以其事業有大焉者則不得從一郡一邑書之故不以循吏而别自為傳蔡矦行完而才巨以方顯庸於時其勒之竹帛而銘之鼎彛固將有待若夫一州邑之績豈足為矦書之由前言之殆非矦所以致謙之意由後言之殆非州人所以尊矦之意也二生起而對曰先生為蔡矦言之則可矣而未始為州人慮之也廣德負山之州也往時為吏者患州人獷悍多豪黠齘齘不可理以柔道于是一切爭為嚴峻深文痛法以繩督之而人亦遂相傳以為非刻深不可治廣德蓋州人之蒙兹詬而病焉者久矣蔡矦乃獨先教化而後誅罰事無劇易處之一以鎮靜人無姦良御之一以誠慤是以矦既去而人懷思之至今嗚呼此豈深文峻法之所及也哉由此言之州之所以為治者蓋在此而不在彼也是故州之人欲為之書以示後之為吏者使知州之所以為治者在此而不在彼也余曰若是則可以書矣蔡矦名克廉字道卿泉之晉江人中嘉靖巳丑進士今為江西提學僉事其同知廣德也以刑部郎中坐獄事謫以某年至州某年遷廬州府同知以去皆宜書鎮江丹徒縣洲田碑記古者與天下為公而泉布其利然山川林麓天地之産金石鉛錫萑蒲鹽蜃鳥獸翎革之瑣細莫不為之厲禁而名山太澤雖封諸矦不以及者非自封植也懼夫利孔不窒而爭獄滋繁則是以其利人者為人害也其慮可謂深矣丹徒環江為邑沿江上下多有蘆洲其為利甚巨而新故之洲時沒時長故不入版籍而人據以為私每一洲出則大豪宿猾人人睥眤其間畢智殫賄百計求請或連勢人以搖官府必得乃已及不可得則讐其得者而相與為私鬪甚者搆亡命挺矛矟隂賊公閧於叢葦髙浪之間相殺或數十人官司逮捕輒反覆解脫獄案滿筐篋積十數年不可詰絶故洲之爭未巳而新洲之爭又起於是丹徒之視蘆洲如懸疣枝指之著體非特其懸與枝而巳且痛連於骨體而怵於心畜為瘇蠱不治日深而丹徙綰水陸之口厨傳日費數十金謂之班支郡邑公私筵燕諸所狼籍歲費且數千金謂之坊支閭里騷然苦焉不可以已也莆田林矦既蒞郡日夜問民所利病除所不便深知班坊苦民而未有以處也適會有洲田之訟於是慨然諗於衆曰吾欲祛兩害以興兩利可乎且夫古者山澤之利其權一歸於上而今擅於下古有遺人掌容道路委積賔旅廪餼之奉其費一出於官而今役乎民權宜歸於上者而􅓠於下則孔漏孔漏者啓姦而人以殃費宜出乎官者而役乎民則斂重斂重者積蠧而人以貧今若一切反此二敝使擅乎下者歸之於上役乎民者出之於官塞其漏孔而蠲其重斂因天地之贏以濟人事之乏收豪民之腴以代貧人之瘠是蘆洲之果為兹邑利也而又何病乎衆歡然曰侯議是矦又以丹陽水陸之衝與丹徒同而並練湖田為豪民所擅與蘆洲同思推所以處丹徒者處丹陽也乃并二議以請於巡撫公巡撫公是之請於巡按公巡按公是之既得請於是痛繩其豪之爭洲者與其侵湖者而歸之官而兩邑廢寺之田附焉總洲與湖田寺田之所入而勾其贏縮以伐故時班坊之所出裁其濫而存其不可已者於是出入之數大略相均以嘉靖癸卯九月而計籍成如其籍而行之遂以為故事邑人既深德矦而恐後之人不能守矦之法也而又恐豪者惡是之病巳而欲壞之也相率請於邑令茅君而鑿石以記凡洲田與寺田之在丹徒者為畝共五千三百九十五歲入租二千九百石有奇易金可若千兩蘆薪歲易金可百兩山薪歲易金二十六兩以代故時班坊之所出㝎其額凡為金四百兩而羡凡湖田與寺田之在丹陽者為畝共三千四百五十有奇歲入租千七百石有奇易金可若干兩湖魚歲易金可二十兩以代故時班坊之所出定其額凡為金四百兩而羡藏其羡以待歲收之所不及而間出其羡以賑凶飢自癸卯九月至乙巳五月總羡金九百八十二兩米千五百九十石有奇其纎悉列之碑隂其區畫出入則計籍具存林矦名華字廷份篤志古道為政一本經術余嘗為序其口義者其惠愛在民多可書兹以記洲田也故不及裕州均田碑記裕州于春秋隸楚蓋楚屈完對齊桓公之言曰方城為城今方城山在裕州境山旁有楚壁壘斥堠云地故阻險然四衝西脅武關東挾江淮北綰河洛南隙宛鄧四方輻轃其民平居則奔走送往迎來諸費轇轕百出天下有難則往往首先受兵野多陂陀磽確上雜砂石不純可田種以故俗罕土著苦窳寡畜藏輕剽數徙無錫安矦來牧𥙿既爬剔宿蠧拊循疲瘵與𥙿人更始先是主計之臣議括天下田檄至裕安侯矍然曰此吾治𥙿首務哉且夫平瘠沃清錢榖息訟爭在此舉矣未幾檄復下止之安侯曰人茍利矣吾專焉可也亟請於參政劉君副使傅君各是之於是經土畫野則耆艾董其役縱橫廣袤則量人展其能方弓勾股則算人竭其思迹阡驗畛則區長程其事因區制畝因畝凖稅區為綱畝為目綱以麗目則無漏畝𤱔為母稅為子母以權子則無逋稅以衍原隰膏腴之田一而當一平石岡田二而當一岡石山田三而當一山石陡坡四而當一陂池林麓廨宇鋪舍㕓市之稅例蠲除田溢稅則從增稅溢田則從減咨詢遍故人無遁情版籍明故上有定徴疆土别故下有定輸計田凡一萬三千二百四十頃有畸計稅凡九千二百六十石有奇侯規畫精密動中肯綮此其大凡也史氏曰孟軻有言仁政必經界始自衛鞅首禍壞井田開阡陌以迄於今其間經國之臣憂時之士曷嘗不言經界然卒莫能行何也蓋亦難焉守令歲月更改各懷一切無慮經久一難也語曰天降雨澤農夫悅而行旅怨豪強兼并率不以均田為便謗讟朋興多口可畏二難也守令不能履畝而較之則必寄於吏胥則有上下其手者矣豪右售賕得為蔽匿貧弱抑勒無以自明名曰均田實滋一弊孔也此三難也夫安矦可不謂明察深慮者哉安矦初舉事時裕人亦多訿訿者曰將無擾我安矦不為動既訖事乃人人樂業矣民可與成難與圖始顧不信哉安矦名如山己丑進士其為裕多善政兹不書重均田也建陳渡石槗記陳渡槗去郭南十里而近當邑西南諸鄉與宜興金壇孔道近郭而又當孔道故往來于其上者踵相踐也槗故以石為之其始作與其既毁而易之以木皆不知在何時今獨有石趾在耳而槗木又不一二歲又壞壞則輒更而作之夫屢壞則病行者屢作則勞居者而費且不勝計非石不可以久而莫之能任也會有浮圖人德山至遂慨然諗於槗旁之人曰吾力能辦此衆皆曰然因請山為主而相與以貧富為率出錢若干緍不足則山使其徒募錢於四方共得若干緍買石若干募石工凡若干其財取諸碩助之家而不費官帑之一錢其力取諸傭食之夫而不勞公徭之一卒始于某甲子某月訖工于某月嘻可謂易矣蓋山之為人吾知之有粟必以施餓者而終歲自食粳籺有錢可以易衣而嘗衣碎衲行雨雪中其苦行有足動人者是以募人而人爭應之役人而人不敢愛其力宜其成之若是易也於是友人蔣君英玉吳君鎮之為之請書其事夫槗梁王政之所有事也徒杠缺而國僑致譏川梁墮而單公以刺然特語夫長民者耳矧所謂浮圖者固與世漠然絶不相值者也山口不粒粟身無全衣以此自足而絲髮無所假于世亦可矣乃復能急人之病而閔閔於一槗之成也如此則彼長民者固衆之所跂而望以庇焉者耽耽而居飽祿以嬉其於人之疾疹阽苦則瞀瞀而莫知蓋先王一切所以捍災備害生人之道泯然盡矣其所缺者寧獨一槗也哉嗚呼此不為而彼或為之其亦可以觀世也已德山某所人其槗旁居人出錢者凡若干人華氏義田記義田者其古道之遺乎其起於古道之廢乎古有之大宗者收族者也義田者其大宗之遺乎雖然有大宗則無義田故義田者其起於大宗之廢乎古者因族而立之宗族人有餘財則歸之宗不給也則資之宗其族人如腰膂手足之相與為一體其財賄如津液之經緯滎灌于其間惟其所虛則注焉而無有乎臃腫羸乏之處是以舉族無甚貧甚富之家而天下之為族者莫不有宗是以天下無甚貧甚富之人豈非所謂人人親其親而天下平者哉井田廢也而始有以資甲於鄉宗法廢也而始有以資甲於族甚則有童奴猒臛肉而族人操瓢者仁人君子惻然隱之於是以其力之所及為之義田以贍其族蓋猶有大宗之遺焉然義田立而大宗之名益隱矣要之義田非甚厚有力之人不可以為而宗法則百金之産亦可以相通義田非仁人與族為體者不能以相公而宗法雖纎嗇鄙薄之嗣亦不得而相吝是以義田之為制也狹而偏大宗之為制也均而溥然仁人君子其知既足以及乎此矣卒莫有推而及乎彼者豈古今之勢然耶抑亦以義田出於力之可以自為而宗法非上之人為之制則固莫能相聮屬耶何其宜及焉而莫之及也吾友無錫華君從龍積學好古之士也晚舉進士不數年遂請歸其於人間事既已屏絶不挂意而獨不能忘族人之飽飢乃割近郭田千畒為義田推其逺胄自十一世祖録事君而下之子孫皆籍之其不能自業者給口食其婚娶槥瘞給各有差略如范氏故事自十二世祖而上其族踈人衆則惟視其窶甚不能就孰與過時不能嫁者娶者槥者瘞者則量助之其管鑰以付録事君宗子而推擇族人之賢者一二人專理其事不稱則易其人而君之子孫則將别有處焉不使分給其中大君之為此舉其可謂仁人君子之用心矣又能寓宗子法於其間豈不尤為近古者乎余是以本宗法之與義田相興廢之説而為之記史君之知足以及乎此者其尚益推之而及乎彼也哉救荒淹記嘉靖癸卯至乙巳東南荐飢溧陽使君恭甫既三捐榖七千五百石以助公家之䀼而飢者猶不給也邑故多淹以匯水其沙漲淹在邑西北十餘里潦溢旱縮不障不陂棄為曠土久不可艾君既隱民之飢則計之曰古蓋有興役以救飢者吾試行之且夫歲凶土荒民不足於食而有餘於力以力易食是民以不足為有餘也吾今日出粟於廩而異日取粟於淹是吾以故粟為新粟也人力地利兩易而各得不亦可乎乃度淹之東南隅廣長各三百五十丈可潴可防測水以凖而強焉遂請於官募民興工民携老弱就役者踵至君環堤而茇焉以居之每役一人日給米二升銀一分薪一束時米貴甚民以半米易牟菽而雜食之計一夫赴役自食可兼食其老弱瘠病之不能役者二人於是民之棲於堤者㸑煙飯飶列舍相接蓊然如處村落之間日出則畚者鍤者築者救者汲者㸑者蟻旋於堤上夜則婦子飽哺嬉嬉而臥又晏然如在樂土而忘其為流徙飢饉之時也其始因淹之底深之為中池以蓄水出池之土環之為堤堤之外又環之為外堤以捍水外堤之北更深之為北池而竇其東西陲以通中池之水半北池之土更築北堤又於外堤之外並淹三面而溝之出其土更築小堤以捍淹之暴水內堤之內三面為池出其土髙築之以為架屋之所自乙巳八月至明年四月畢工而麥適登民歡然散歸曰史君活我最其費為銀若干兩米若干石大率日役若干人計所全活若干人共墾田四百餘畝為墟者三潦則水礙堤不得壞田旱則引堤內之水灌田可四千餘畝並淹而田之家多賴以濟自是百年沮洳鬱為沃壤水降土升不相溷瀆各效其職以宜地産萑藋既去生我稻梁堤之隙地亦樹𬞞豆緣堤蔭池夾植榆桞池中畜魚蝦蟹蠯螺生生不淰於是即其地立為義莊歲計田與堤之入與池之魚利易榖可得千石歲儲之以待荒嵗之賑一不以給家用君又將築書舍其間以待鄉之來學者而未及也因更名其淹曰救荒淹以其邑人進士繆君所為紀實來請記蓋周禮上有荒政以聚民而下復有閭相受黨相收州相恤以通其嬴乏猶懼其未也則又使世祿地主之有力者與其廣瀦巨野之可以利民者曰主以利得民曰藪以富得民以是彌逢上下之所不及其民遇凶札或不見聚于上必見收恤於閭里不見收恤於閭里必見得於地主廣瀦巨野之間其生路為甚多而天災地沴欲死之而不能也民生其時豈不幸歟後世有司救荒之法既踈濶不講又無古鄰保之義以鳩民民有飢饉疾疫日夜祈死而已余親見乙巳之災流莩滿野民之不忍為盜賊而自經死與糜其子而食者日幾何人余思欲上下強聒而不能而又無力可以及人也徒惻然傷之而巳今之世無周禮所謂主者然貴家大族之有力而望於鄉者則亦有主之誼而瀦野間田則往往有之然非有力不能興是以主與藪相聮而成功今觀史君所為而益信古之所謂利與富得民者其不為迂濶也然古之所謂主者皆與有長人之責而世其祿食其責既無所諉而祿又有可藉故其行之則易君既居間無所責於世而纎毫皆割已之有乃殫力經營若家人之飢然者以是知君之為尤難也嗟乎使有力者皆如君其所以興起禮俗而有禆於國家休息生飬之效豈小也哉余既自以其無力而有感於史君乃樂為之記史君名際嘉靖壬辰進士磊落多才略嘗為吏部主事不究其用而去故其施諸家者若此云大觀草堂記尚書西磐張公既歸老於家以書來屬余記其大觀草堂者曰願子為我言大觀之義我雖老矣而不敢不勉也蓋余嘗獲聞公之為人進無驚於寵辱而退無詘於隕獲躬盛德之容而謙乎其若不足甘委順之節而坦乎其若有餘其幾乎古之與天遊者歟竊意所謂大觀者公既巳獨得之於心而人不能知而余也執器而不通於方曲學而不見乎天地之全是儒之陋者也而惡足以知公之大觀矧公之所謂大觀蓋得乎心而寄之草堂者也公之得乎心者既深乎其不可窺而想像乎公之草堂之景則其戴形肖貌露情獻態森然而萃以縱乎公之所觀者吾又未能即而登焉以觀公之所觀也而惡足以知公之大觀而又惡能為公記之雖然余未能登公之草堂以觀公之所觀而嘗登吾之草堂以觀吾之所觀矣方吾之心間而無事以逍遙乎草堂而觀于魚鳥之飛鳴而潛泳煙雲之出沒而隱映融然若有凝于精爽然若有釋於神是以物無逆于目目無逆於心而心無逆於物一旦情隨事以遷勃焉而有鬪於是而心逐逐焉而目昏昏焉凡向之飛泳而出沒若有凝於精而釋於神者舉皆不知所在矣徐徐焉鬪解而機息乃始還而觀之則草堂向之草堂而煙雲魚鳥向之煙雲魚鳥也於是為之憮然而一笑嗟乎嗜欲有蔽乎其中則凡物舉皆得而匿乎其外物舉皆得而匿乎其外則雖與之遊乎瀛海之表而騁乎塊漭憑虛之域亦窅然若無覩也而况於草堂乎夫大觀者通宇宙而為觀也故謂吾草堂之景非公草堂之景不可謂吾所觀於吾之草堂非公所觀於公之草堂者不可則願以我所觀于吾之草堂者而記公之所觀於公之草堂者以為公之能得其大觀蓋不蔽於欲而物不能匿也西峪草堂記靈寶陜洛之衝也環而山者以數十而西原獨當其僻處西原蔽秦山之南委蛇數百里散而藪者以數十而西峪又獨當其最深處峪口逼仄始疑路窮忽然中開更出異境茂樹淺草森隂蔽虧水泉㶁㶁若驚蛇出沒草間其人鹿視而穴居可二十餘家於是詩君廷議遊而樂之乃即峪口作草堂於其上仰而眺秦山俯而顧西峪煙雲竹樹隱見千態不下席而盡取之其勝又於是為最己亥歲豫見許君於京師君為人鬯逹魁岸尤以兵自雄余固意其必且為國家建萬里勳也一日與余論草堂之勝且曰吾將去而休於此矣余笑而詰之曰君不聞馬文淵昆弟之相笑者乎夫嵬才傑士其所寄意必於奔漰洶湧之川巑岏崔巍之峰泱漭千里之野極世間險怪瓌偉超曠之觀然後足以饜其耳目而發其跌宕濩落不羈之氣若夫耽水竹之清幽蔭樹石之蘙薈此則窮愁枯稿之人漠然無所振于世而有以自足其樂於此夫固各自為尚而不能兩得也今君試料才氣與文淵少遊竟何似國家且北收河南南繫交酋之頸假令據鞍躍馬今之人孰能先君者乃欲乘欵假優遊閭里自比少遊其寧可得耶三門之間洪河巨石怒而抵擊砰砰磕磕若戰鼓然百里之外有聲而殽函又秦漢以來百戰故處過而覽者莫不躊蹰慨然想見乎揮戈濺血虓虎喑嗚之雄此皆險怪瓌偉世所駭詫且近在君衣帶間君何不寄意於此乃欲自託於寂寞背嵬才傑士之好而就窮愁枯稿之所樂此又何説耶噫嘻吾知之矣君居河上豈嘗受河上公語耶故曰飬辨于其訥藏勇於其怯然則君之欲為彼而姑為此也其有意乎倐而蠖屈焂而虎躍則余不能窺也巳任光祿竹溪記余嘗遊於京師矦家富人之園見其所蓄自絶徼海外奇花石無所不致而所不能致者惟竹吾江南人斬竹而薪之其為園亦必購求海外奇花石或千錢買一石百錢買一花不自惜然有竹據其間或芟而去焉曰母以是占我花石地而京師人茍可致一竹輒不惜數千錢然才遇霜雪又稿以死以其難致而又多稿死則人益貴之而江南人甚或笑之曰京師人乃寶吾之所薪嗚呼奇花石誠為京師與江南人所貴然窮其所生之地則絶徼海外之人視之吾意其亦無以甚異於竹之在江以南而絶徼海外或素不産竹之地然使其人一旦見竹吾意其必又有甚於京師人之寶之者是將不勝笑也語云人去鄉則益賤物去鄊則益貴以此言之世之好醜亦何常之有乎余舅光祿任君治園於荆溪之上遍植以竹不植他木竹間作一小樓暇則與客吟嘯其中而間謂余曰吾不能與有力者爭池亭花石之勝獨此取諸土之所有可以不勞力而蓊然滿園亦足適也因自謂竹溪主人甥其為我記之余以謂君豈真不能與有力者爭而漫然取諸其土之所有者無乃獨有所深好於竹而不欲以告人歟昔人論竹以為絶無聲色臭味可好故其巧怪不如石其妖艷綽約不如花孑孑然孑孑然有似乎偃蹇孤特之士不可以諧於俗是以自古以來知好竹者絶少且彼京師人亦豈能知而貴之不過欲以此鬪富與奇花石等耳故京師人之貴竹與江南人之不貴竹其為不知竹一也君生長於絲華而能不溺乎其中裘馬僮奴歌舞凡諸富人所酣嗜一切斥去尤挺挺不妄與人交凛然有偃蹇孤特之氣此其於竹必有自得焉而舉凡萬物可喜可玩固有不能間也歟然則雖使竹非其土之所有君猶將極其力以致之而侈快乎其心君之力雖使能盡致奇花石而其好固有不存也嗟乎竹固可以不出江南而取貴也哉吾重有所感矣永嘉袁君芳洲記介乎永嘉左右者若天台鴈宕之怪巧瓌麗甲天下其間嘉卉美木蓊然雜植雖博物者亦半不識其名品故自古好逰之士輒以永嘉山水物産為第一宗喬以為是非吾好之所存也吾獨好橘於是種橘數十本於洲上逰而樂焉因以為號曰橘洲主人又曰芳洲主人視其意孟極世間名山水自以莫如吾洲一切嘉卉美木自以莫如吾橘也而間請記於余余始亦訝其迂且僻而笑之既而歎曰宗喬可謂自足其樂而不羡乎外者矣夫趣有所適則不必其地之所勝意有所鍾則不必其土之所珍嘗試觀于草木之生雖其奇花異卉至不易生之物或絶逺生在海外苟以人力移之而樹藝擁灌之如其法則東西南北惟所徙焉既久而炎冷燥濕之性亦隨變矣而橘也確然獨異乎是蓋昔騷人為之頌曰受命不徙生此南國是草木中之專一耿介者也夫騷人彚萃天下之香草美木以况其幽馨窈窕之思然皆未有特為之頌者其于橘也特為之頌豈偶然感觸而假物以發興也哉取其臭味之深有合焉耳宗喬少業儒而以醫自進其志行耿介又雅慕王喬羡門子之道翩然有迫隘斯世輕舉逺逰之思窺其貌蓋未嘗以肉食之故而變其山澤之臞也其自寄于橘也殆亦有騷人之意乎余愧無橘之德亦頗以迂戅不通于俗余家故鄰太湖太湖橘藪也余將買山種橘于洞庭之上而老焉清秋霜落搔首而歌楚頌欲以招宗喬宗喬其許我乎否也吳氏墓記昔范蠡所自稱述得計然之策七其五用以霸越其餘用以起家而白圭之徒至自比于吕尚孫吳其言頗近誇誕然迹其料穰惡節嬴縮權取豫亦有道焉蓋足多也自子貢取譏於孔子而儒生遂不敢言治産不知人固不能祼形而􅑎腹則亦不能無所營而取給且夫公卿大夫修仁義躬教化以導氓俗庶人勤膂力盡山澤之利阜貨賄以給公上各有常業不能相廢而儒生欲槩以一説則過矣吾鄊吳翁衆所指為朴忠長者然翁自少工治産纍數十年遂以資椎邑中觀翁所為大率能取人所棄與人所取能知子之為取能擇人而任時往往與古人暗合所謂修其常業儒者不能訾者也翁始家邑之南隅既老則治别業于徐湖之上穿池養魚優遊其間又于其旁度地為葬所雜植材木蓊然塋竁羡道室廬門垣既周以固朝夕往逰而樂之以待其終而葬焉嗚呼死者人之所必不免也而世俗多諱言死至以石火易盡之身而枉苦其心神豫憂逆數動輒為門户千百年計慮皆若可以目睹而足履曾不量其身之不待及形氣衰枯死徵已見而尚持籌操鑰勾較米鹽斤斤如不及不自虞其死至于病且死也徘徊顧慕周覽其家之所有戀戀不能舍一物而去此又世之殖産者恆態吳翁乃于生時預為葬地其營壙也如營其室家其植木于墓也如植于園圃往來松楸墟攏之間不為之悽愴悲懷而顧以為適頗似能視死為歸而知生之不可貪死之不足患庶幾委命而順化者其與沒溺牽纏于厚利不能自反者固有間歟墓可數畝材木可數百株土石之工皆朴而不華祀田若于畝帶墓左右以翁之力能自侈其墳墓而所為僅若此此又可為世之破産厚葬虛地上以實地下者之一勸乎翁葬後幾年而其孫嵩與嶽求余記其墓余不能辭也為之書若其世系履歷子孫之詳則銘鋕具存而支隴向背起伏風氣散聚此堪輿家之事儒生所不窺故皆不書休寧陳氏墓廬記墓祭非古也其起于人之情乎禮起于情之不能巳故雖好古執禮之士亦未有能非之者也休寧陳氏墓在某地于墓左個有廬若干楹歲時上冢則血牲而祭于廬環廬有祭田若干畝作廬者陳君萬秀葬而奉以祭焉者萬秀之父筠軒翁也萬秀故客武進與余父遊至是走其子憲以狀詣余請記且寓以書曰嗚呼萬秀先人在布衣中非有奇莭偉行可以不朽然子孫煢煢之志竊願徼惠于君子録其一二事可記者而鑱於廬之壁庶幾使我後之人其無忘乎按狀筠軒翁名帥英字希武父名原以行誼著鄉曲陳氏之先自唐末始家歙之休寧其里曰滕溪若干世又自滕溪徙宣仁翁今所居也陳故有顯人在宋有為翰林學士者勝國時儒人定宇先生櫟實生其族載在譜諜翁為人俶儻好義歙人多賈而翁故亦以賈業翁在儔輩中岸然長者魁傑之氣正德癸酉間洞源姚賊群起流劫徽郡以旁近賊故檄民為兵守險扼鋒翁與在行間師克捷翁以功多有司給銀牌一為賞􅉝巳歲今上即位迎母后於藩道江徽當遣役人供張往江上徽郡守推擇部民為衆信者使督以往遂以屬翁時暑甚翁老且憊觸熱旦暮馳至大洪嶺病死郡守愍然遣人舁其棺還之家休寧令給銀為埋具以旌之翁以氓庶凡兩從王之役然桃源之役縱橫鋒鏑間去死鄰耳翁竟生歸且受賞江上之役其事不過奔走輸將之間絶非險厄然竟以死固可謂之數也翁卒以某月某日年幾十有幾葬以卒之某年月日徽之俗羯喜鬪小睚䀝則叢然挺而相擊然用之於義亦往往慷慨前死不避其氣然也翁豈其人乎春秋之義以王事出疆而死則為之加等此固為有列於朝者言也其亦可以通之庶人矣乎余既哀陳翁死役之義而矜萬秀之志故為之記翁子三人萬玉萬瑾萬秀其李而孫憲來求余文者也吳氏石亭埠新阡記石亭埠在郭南五里蓋陽羡一小山耳而發其奇者自頤山吳公始陽羡諸山多峭拔而是山獨蹲伏蜿蜒以其伏也而峭拔者乃若環而揖焉諸山皆競秀而是山獨若不見其秀者然登是山則諸山之秀可盡攬而有之如人之謙而尊又如人之深藏不自炫露而萃衆文以文其身也公遊焉以為奇于是出之灌莽豺狐之窟而築之室以居因其泉甃而曲之以為池間則與客即而觴焉自是石亭之勝聞於邑中而地理家亦以是為吉也即山居之旁而壤樹之以為生墓及公之卒也則遂葬乎其中而賔從戚友嘗從公遊者于是又以送公之葬而至焉以公之所嘗遊而綣然于公之不可作也則為之悽愴而悲懷順之言曰夫公逹人也豈有所介介于生死往來之間哉昔者公之來遊也當其朝煙方散而夕霏又凝春華始歇而夏木載隂宇宙之景既日新而不窮投壺賦詩惟意所適鳴琴角奕分曹更進人事之樂亦遞代而不厭于斯之時孰不以為此樂未極而公則巳僬僬然亟為身後之圖培壠樹檟若恐後之以公之逹蓋不待奏雍門之曲而知樂之必有盡其從公遊者又不待聞山陽之笛而知聚之必有散矣夫葬者藏也藏者息也此其無知而不可以生致者也雖然髙臺未傾曲池如故果木花卉手植猶存其有知而可以生致者又安知其不且往來嬉戲乎其間春猿之與吟而秋鶴之與飛矣乎以公之生而遊也有不忘乎其死之圖孰知公之死而息也有不遺乎其生之樂者耶此可與通乎幽明生死之故者道也故余為此言以慰公而且以慰夫嘗從公遊而悽愴悲哀于公者公諱仕字克學為人剛重有廉隅博學而文少發解南畿舉進士歷官提學副使其為副使也坐不能俯仰故早乞身焉而足其樂于溪山泉石之間公晚而有二子騂驊其所交多當世豪傑在同鄊中與飬齊徐公相交尤深以余之無似公亦忘年而與交焉余寓陽羡時公數邀余飲于兹山之上而公之營墓嘗埋雞卵榖芽五色線以驗其氣則余及見之蓋公嘗屬余記其所謂山居者而未果也及葬公之弟儔以新阡記為請嗚呼不及記其山居而記其阡焉其亦可以復于公矣胡貿棺記書傭胡貿龍遊人父兄故書賈貿少乏資不能賈而以善錐書往來諸書肆及士人家余不自揆嘗取左氏歷代諸史及諸大家文字所謂汗牛塞棟者稍刪次之以從蕳約既披閲點竄竟則以付貿使裁焉始或篇而離之或句而離之甚者或字而離之其既也篇而聮之句而聮之又字而聮之或聮而復離離而復聮錯綜經緯要于各歸其類而止蓋其事甚淆且碎非特他書傭往往束手雖士人細心讀書者亦多不能為此貿于文義不甚解曉而獨能為此蓋其天竅使然余之于書不能及古人蠶絲牛毛之萬一而貿所為則蠶絲牛毛之事也嗟乎書契之不能還於結繩書契又繁而不能還於蕳也固也然余所以編書之意逺矣非貿則豫事無與成然貿非豫則其精技亦無所用豈亦所謂各致其能者哉貿平生無他嗜好而獨好酒傭書所得錢無少多皆盡于酒所傭書家不問傭錢必問酒能饜否貿無妻與子傭書數十年居身無一壠之瓦一醉之外皆不復知也其顓若此宜其天竅之亦有所發也豫年近五十兀兀如病僧益知捐書之樂視向所謂披閲點竄若讎我者蓋始以為甘而味之也甚深則覺其苦而絶之也必過其勢然也余既不復一有所披閲點竄貿雖尚以傭書糊口諸士人家而其精技亦虛聞而無所用然則古所謂不能自為才者豈獨士之遇世然哉此余與貿之相與始終可以莞然而一笑者也豫既不復有所披閲點竄世事又已一切無所與則置二杉棺以待長休貿無妻與子無一錢之蓄死而有棺無棺不可知念其為我從事久也亦以一棺卑之而書此以為之劵云嗚呼百餘年後其書或行于世而又或偶有好之者慨然追論其故所刪次之人則豫之勤因以不沒而貿乃無以自見是余專貿之功也余之書此亦以還功于貿也雖然余既以披閲點竄為讎而豈欲後人又以披閲點竄知余也哉然則貿之硉硉勤苦從事於割截離合而一付之無何有之鄉也與一醉亦無以異也其亦何憾之有敘廣右戰功紫江沈公自襲指揮使時未弱冠巳能馳馬手搏賊賊憚之未幾調征永安嘗以數百人搗陳村寨賊墻立山上公一人拍馬而登賊却下山誘公入淖中馬陷以吻拄淖中而騰其足及於陸三酋前趨淖劫公一酋鏢而左一酋刀而右夾馬一酋彀弩十步外公捩頸以過鏢而挑右足以讓刀鏢離頸寸而過創著於鐙鞺然斷鐡公射鏢者中缺項殪左挂弓而右掣刀斫刀酋於鐙間斷其頰車折齒殪弩者恟失弩僂而手行上山公又射之中膂既連斃三酋後騎至找其首公以二酋讓後騎而囊斷頰者自為功餘賊麋而入箐追兵戰於箐中斬酋若干級毒弩中公膊整軍而還驗功或以斷頰者非全首難之監軍吳布政怒曰賊豈伸頸而待斫乎命紀之以功遷都指揮僉事義寧賊寇臨桂掠而還巢公追之巢有兩隘賊伏兵丁嶺隘以伺使熟􅍹以某隘閉告而導公入丁嶺公策之斬所閉隘而入果無兵守於路擒販者數人以丁嶺之賊告遂牽以導巢而熟􅍹亦以公斬閉隘告丁嶺之賊賊還趨巢大破之賊奔公獨逐一酋酋騎而走崖窘釋騎跳而下澗公騎跳而下澗澗深沒顛馬浮而岸毛盡濕束濕馬於樹緣澗而求酋酋泅而逃矚水中影射之血縷水上入水斬之後騎相屬至崖望見公提人頭立水中崖峻不可跳乃尋路從公則賊遁巳遠公乘濕馬與諸騎追之猶斬數十級而還荔浦賊八千餘渡江而東寇諜者告公倉卒率五百人待於江岸駐白面寨去蛟龍滑石兩灘各數里諜者又告賊飽而歸將及江公以為滑石灘狹牽線而濟雖衆可薄也蛟龍灘濶成列而濟衆難圖矣吾欲奪其濶而致之狹令製旗軍中無尺布伐岸竹揭竿而編篾以為縿刻頃成數百旗插之蛟龍灘令羸卒數十人守之燃柴煙以疑賊賊至果避蛟龍趨滑石公分兵兩岸而潛以小艦載徑卒數十伏葭葦中賊營于中洲以護濟濟且半公以艦乘瀧急衝之兩岸軍譟而前有酋騎而水立挺鏢當艦公舍艦跳水斬鏢酋人騎皆踣洲上賊辟易賊濟者西奔巢未濟者却東走上山而復潛趨蛟龍灘以濟洲賊孤艦軍攻洲兩岸軍始至下水夾攻之洲賊後行擠墮淵溺死無算其前行盡俘之得生口首級若干收賊所掠牛畜之在兩岸者是役也以五百人破八千餘賊公用奇往往如是復以功遷都司同知嘉靖六年岑猛叛聚兵數萬人督府奏誅之一日督府召公計曰歸順岑璋猛婦翁也助猛奈何公素能得土官隂事曰璋女失寵而璋心恨猛徒貌合耳公復密語督府云云如此可使璋擒猛督府復曰猛乘上流之勢擁兵建瓴而下則雍梧諸郡危矣奈何曰此不足憂土官大率飽富貴戀巢穴所以叛者懼誅耳非有他志也猛離田州而子女玉帛皆在彼或乘虛襲之猛安得不慮乎督府又慮猛且走交趾曰猛走交趾則閉不能歸矣猛安得不慮乎猛果如公所料而岑璋雅敬公公潛使人于璋於是督府進兵分五哨入猛徑兵盡在工堯諸將死讓無敢當者公自請將中哨當工堯去工堯五里而軍進攻隘隘堅復退營五里而糧且盡湖兵五千人請於公願得一飽而死敵公時僅有自齎家糧五十石與湖兵人給之升而官軍縮腹張目以觀湖兵分米不敢言公無以為計時左哨將與公隔江而軍公潛濟江就左哨將乞糧而請并兵攻工堯左哨將以分地拒公公笑而還曰兵糧吾自有之姑試公耳左哨將慚公還軍乃夜分軍三百人緣山而右走間道三百人緣江而左上山並繞出工堯背插旗為號煮餘糧為稀糜食而遣之黎明合戰賊殊死鬪我軍却麾而進又却公親斬却者一人而提其頭以令軍復麾而進先所遣間道卒皆已至登山插旗𥘉岑璋既與公為約而遣兵二千人陽為助猛守工堯遣精卒千人以護女為名居猛左右璋兵在陳後望見山上旗大囂曰天兵得工堯矣潰而却猛軍見後陳却亦囂而却我軍乘之斬猛子邦彥于陳中蹂尸數里遂入隘得其積粟軍始飽乘勝攻田州猛聞工堯破窘急欲走交趾而障卒五百人護猛妻以歸五百人獨守猛指猛所欲走紿之曰此路皆天兵也不如且走歸順為後圖猛不得已從之璋待于境相見因相抱哭璋以子女歌舞飲食恣猛圈留之而潛遣其子報公于田州公入田州五日而諸哨始至璋所使報猛所在者事頗泄左哨將移軍壓歸順境索猛欲破敗公事自為功璋以二十牛百甕酒犒軍而謂左哨將曰猛誠有之公無急也於是醉猛而斬其首亟送督府斬他囚首貫猛尸而以與左哨將左哨將喜於得猛而抽軍獻猛首督府則猛首已梟一日矣猛死田州平安置猛子邦相於福建而議設流官公曰思恩設流官反側至今未憗田州復然兩賊且合從起矣督府不聽且調公守田州公請以他將假守三月而待希儀治裝他將守之一月而田州酋盧蘇果與思恩酋王受連兵劫城他將狼狽歸田州復為賊巢公又言於督府曰雨酋能用其衆以復故主為名今若返岑邦相于福建而置之南寧此奇貨也可使兩酋坐受縛矣督府復不聽而徵兵數十萬征之既而失利督府以罪罷新督府餘姚王公至其所以撫定兩酋公多與其謀因薦公右江參將右江故治桞州栁在萬山中城外皆賊巢軍民至無地可田而室廬妻子數𬒳焚劫知府劉璉殪於賊知府鄧鋐間出城弩中其膊自是諸軍民官必甲而後敢出城城兵又疲不足仗公為參將始議剿五都五都去城五六里而巢最險賊又最獗所虜獲人畜最富巢中不聞官兵者百餘年公乃以五百兵付百戶蔣紹宗使搗其巢賊蜂出裹我兵殺數十人而隘其入路使不得返我兵即賊巢為營固守而因賊糧以為食然氣奪不能戰賊亦欲坐踣之于是百户潛遣人茇而告急於公公即上馬復聚兵得五百人入巢為援既至聲銃者三因奮擊賊百户兵聞銃聲亦出奮擊賊賊分兵為二腹背戰我兵鼓譟斬級賊不支然尚橫鯁兩陳中守隘不肯散公使人茇而以勝告百户百户亦使人茇而以勝告公公因謂百戶曰汝且據巢母出待賊服乃巳不服更夾攻之可盡擒也賊素怯栁州兵最易與至是詗曰汝誰也敢入吾巢公使人紿曰是新參將老沈所率藤峽軍耳兩江賊熟老沈名而憚藤峽軍因咋舌曰吾固知栁州兵不及此相持數日賊不退然心懼因熟􅍹為解熟􅍹者界漢人生􅍹獞間陽附官軍而隂附賊或官軍勢盛附官軍賊勢盛附賊以為常於是熟猺間説於公曰請為兩家解鬪公度賊尚徑乃且聽其説而謂熟猺曰返我生口牛馬我兵乃去賊以所虜生口二十牛馬百四十為獻賊收衆奔山頂而空隘以通百戶兵公兵與百戶兵牽連行至城城中人歡始知栁州兵之能戰賊也公以為欲大破賊非狼兵不可右江狼兵惟那地最徑乃請于軍門以那地兵二千戍桞州桞之有戍狼兵自公始先是賊勢張甚而熟􅍹及城中黠吏民多為賊詗者賊耳目遍官府左右官府閨闥動色情性賊在溪洞千百里外輒知凡議大征或雕剿口語沓沓未及聚兵而手足盡露以是賊得隂為備或伏岩藪伺官兵殪之或先徙妻子畜聚于鄰巢而自空巢以待官兵官兵至徒手無所得甚者我所任為鄉導往往為賊誤我入死地崩墜崖谷不戰而糜爛者過半而賊以耳目故益知宫軍虛實與民積聚少多乘虛掠多所入無一當而所噬無不飽我兵築堡增戍則益紛然如刻穴守鼠而賊活脫不可蹤迹公以為圖勝算莫如得賊情得賊情則莫如諜而使官府人為諜則賊生疑於是隂求得素與􅍹人商販者數十人假以買物召至府密謂之曰吾素知若輩通猺吾不罪若更與若銀為販本若試為我詗賊衆感諾乃人給銀五兩使益買物散入諸洞中諸􅍹雖凶暴樂殺人然販者至則寨寨傳送護衛飲食恐損一販者則諸販不至是以雖絶棧深箐販者無所不歷每有動靜販者輒先知奔走報公公厚賞販者而祕其事雖肘腋親近絶不得聞至期鳴銃者三則諸兵皆聚第謂之曰今日出某門而遣心腹人為旗頭引諸軍諸軍貿貿行問旗頭旗頭不知曰然則汝何引我曰公強我往我漫往耳軍行千萬人其所往獨公與旗頭兩人知之而已頃之劄營設伏賊果至遇伏奔追殪之已而賊寇他所則公軍又已先在或絶逺村聚賊度官軍所必不至而潛冦則公軍又已先在賊始驚以為神而我軍亦不知公自何得之也公始至栁令諸猺得出入儥買遊嬉城中無禁諸􅍹時入府見公公兒女撫之久之稍稍擇其巧便曉事者結以厚賞使詗賊後賊發其火伍中輒報公公又厚賞之而間謂諸猺曰若見我若妻子何不來見夫人諸猺叩頭不敢公曰試令其來已而猺婦五六人來夫人好言慰勞賞之針線包帕諸物以銀簮簮其頭又命諸妾婢灌之以酒人數大碗察羣婦中其夫嘗以賊事報者則又隂摘之他所勞苦之曰若夫為吾大人盡力良苦私賞之包帕銀簮諸物倍於人前所賞者而益以珍果美物塞其袖中又隂戒之勿令人知也諸猺婦既多得賞又酒醉跟蹌舞手出府門猺夫望見之歡喜爭前掖而歸巢自是諸猺婦來者至數百人夫人傾筐篋針頭線尾皆盡猶不能給而猺婦相戒以勿令人知者猺婦又泄之以所獨得珍果美物誇諸猺婦以為夫人愛已諸􅍹婦皆怏怏心羡嗾其夫使報賊冀已入府得珍果美物而公間使人往諸巢中隂以夫人之命賜物諸􅍹婦自是賊中消息或諸􅍹不肯言則􅍹婦嗾之使言或諸猺竟不肯言者則諸􅍹婦自以使人至巢賜物時附耳語云云若勿向我老公語也公用兵風雨來去既得賊時率輕騎剿其尤劇者一二人兵至巢以管為繩繞記劇賊家示諸軍所捕繩之內老弱婦女牛畜無一免者繩之外老弱婦女牛畜無一及者遂出巢數里遇平地度賊援所不至則停軍審究其為劇賊家婦女牛畜者收之其雖獲于劇賊家而係鄰家與鄰巢者還之諸􅍹得完室家與見還者皆喜以為往時官軍入巢見人輒殺或賊遁則搜斬不為賊者以充級故賊詈我輩我雖為賊時得脫或保孥資汝輩雖不為賊時見殺或孥資為虜自今我輩乃有顔面詈賊矣公入巢有助賊戰者既還軍遣熟猺檄之曰若奈何助賊戰吾剿若無赦項之搗其巢盡殲之自是凡所雕剿歷數百巢竟無一人敢助賊戰者雕剿所過他巢或刀弩而門瞷既還軍則檄曰若奈何刀弩而門瞷今罰若五牛不者且剿自是所歷百數巢竟無一人敢刀弩而門瞷者所獲劇賊多不殺剜兩目刵兩耳賞銀數兩而還之巢自是他賊有所虜掠多不遣兵而用剜目者騎而一人牽以詣賊使徵所虜掠賊見之驚曰某巢某也震懾不敢隱盡還所虜掠而剜目者索不巳賊至出自所有與之公以給被虜者而以其余給剜目者剜目者每一入巢則利益多而為賊者所獲每不輔所償則益無利在栁州所剜目七人其六人皆為官用其還巢而復為賊者覃萬星一人而巳公竟以計擒殺之公始議發兵故制欲發兵必請督府督府檄下乃發公以為吾治文書吾椽史知之文書上府府檄下我府掾史知之多人知則泄又桞去督府千里待報踰時坐失機會而書檄往來水陸諸巢絡繹能保不為賊得於是凡率兵入巢未嘗先請既勝則上首虜督府而以邂逅追賊至巢為解于是督府不能以文法詰而兵謀得無泄公嘗欲剿一巢而恐其泄也乃佯病所部入問病公曰吾病思鳥獸肉若輩能從我獵乎因起出獵去賊二里而止營軍中始知其非獵也公耳目多賊不能藪率走之他巢他巢人又嚇之曰公且剿汝則又走之他巢他巢嚇之則又走跰血瘇以死或餒稿崖谷公又每以甚雨凄凍風冥之夜察賊所止宿處四散遣人齎火銃以筒貯火衣毯衣毳帽與草同色潛至賊所夜聲銃者三賊盡驚老沈至矣挈妻子裸而蒲伏上山頂兒啼女咷往往寒凍死或觸崖石死不者且為虎咬諸妻子更相嗟怨汝為賊之利至此黎明下山詗之則寂無人隂使其黨至城詗之時公所遣衣毯者四散諸巢同夜舉銃明日諸巢所使為詗者亦同會于城旁西巢人謂東巢人曰老沈昨夜來吾巢東巢人謂西巢人曰老沈昨夜來吾巢則固已更相怪駭巳而詗之城中人則老沈固安坐城中不出也益怪駭曰昨聲銃者誰耶鬼耶諸􅍹又自相嚇曰虎咬人者老沈所使也自此賊益膽落或易面為好􅍹獞而桞城四旁一童子牽牛行深山數百里無敢訶者其軍民往往寄牛於猺家以耕或索雞酒於􅍹猺不敢不與公在栁先後十三年名賊宿猾幾盡而韋扶諫者馬平四都徭賊弩中知府膊者也凶猾甚先是嘗七捕之不能得至公亦七捕之不能得會有報扶諫逃鄰巢三層巢者公潛率兵剿之至巢則扶諫又已與三層賊往劫他所而三層賊妻子獨在公盡俘以歸計七十餘人平時公所俘賊妻子盡以與狼兵為賞至是獨不與而閉之空室中善飲食之公又隂使狼兵數百人怒而挺刀狰獰入室恐諸婦女作欲搶狀公佯執鞭痛鞭狼兵使退如是者三欲以深德諸婦女而潛使諸􅍹聞之以繫其心公又使熟􅍹謂諸􅍹之亡妻者曰吾不害汝但得韋扶諫則還汝妻子矣諸􅍹四五人來投公公令入空室視其妻夫妻相持哭其小子牽其父哭妻曰非沈公吾為狼兵殺且搶久矣已而怨相詈曰咄扶諫非汝爹非汝娘何不縛以贖我諸猺心割而别復見公公曰欲得扶諫耳諸􅍹曰扶諫巳逃他巢圖之實難雖然願公切勿以吾妻子與狼兵也吾且為公緩圖之公曰諾因殺牛犒諸猺而去之諸猺蹤迹扶諫所在遂往以言惱扶諫曰還我妻子扶諫不應諸􅍹因曰我輩失妻子計窮惟有更隨汝作賊耳扶諫喜諸􅍹乃詭相與計曰今官府虜吾妻子而穿山驛與守堡百户與巡司俱在山中今往劫之三印可必得也官府懼失三印得重罪以易吾妻子可必得也扶諫曰善扶諫既離巢則黨益孤諸􅍹因醉扶諫與其黨而縛之置巖洞中而使熟􅍹報公曰得扶諫矣恐見賣可遣吾妻子於三十里外相易公以為吾不遣諸􅍹且謂吾怯於是鎖諸􅍹妻刃挾之以行至三十里使熟􅍹諭諸􅍹曰諸􅍹且劫妻子者先殺妻子然後戰諸􅍹請於公曰吾獻扶諫懼讐公可遣三十人至巖洞自取之公慮諸􅍹有變乃選健卒十五人賞而遣之曰得扶諫吾且賞汝若諸􅍹殺汝者吾且重賞汝家又以十五人付之熟􅍹而質熟􅍹妻子曰十五人者損一人汝妻子虀粉矣至巖洞中果得扶諫而出諸􅍹閉之五里外懼扶諫往而妻子不至復要公曰必相易于此公又曰吾不往諸􅍹且謂吾怯於是先遣諸􅍹中妻女四五人往言刃挾諸婦女狀諸􅍹吐舌懼殺妻子帖息不敢動遂易扶諫以歸剜扶諫目截耳剔心手足斬之而四懸諸城門諸􅍹出入城者見之無不股栗諸􅍹既熟公威信公嘗調一巢往征他巢雖懼讐然不敢不往牛畜盡俘以歸獨首虜生口視狼兵為少耳公亦盡以所俘牛畜賞諸􅍹其後復調而與之期會天大雨諸􅍹懼失期乘雨泅溪水沒者六人公勞苦之命沒者人三牛付其家其餘皆遣還之自廣西為將如韓觀山雲惟能使􅍹人不作賊至公能使􅍹攻􅍹則廣西所未有也十六年而有思恩岑金之變初思恩府土官岑濬叛𬒳誅而立流官以其酋二人徐五韋貴為土巡檢分掌其兵各萬餘人而聽于流官然夷民獷悍不樂漢法數十年間几數叛則數舉兵誅之而亦不能定也當破岑濬時調兵鎮安鎮安掠思恩生口以歸巳而其中一人長大而姣因託言岑濬子而名之曰金夷民益思亂鎮安乃潛召其酋長出金而與之盟曰汝小主也諸酋感泣擁金以歸鎮安因要之曰金立與我某地幾百里遂盟金而遣之諸酋聚兵五千人以奉金將攻城郭復故地諸夷多欲為響應者勢洶洶而先時濬既誅其酋楊留者無所歸乃率其黨千餘人詣賔州應募為打手賔州兵素弱故倚打手至是留欲往投金以逞時公與兵備皆在賔州留入言于公曰留小主人在請往公方慮岑金之危思恩未暇慮留之在肘腋也聞留言獨心駭以為金去賔州數百里而留應之表裡相扇賔州危矣賔州危則咽喉哽咽喉哽則廣右盡騷而何有于思恩此事大不可急圖宜以計欵之乃婉色好語謂留曰汝苐往我曩征田州調兵鎮安時巳聞有岑金在是岑濬苐九子也留聞是言固已刺心公因叩留曰聞鎮安縶金甚堅何因出乎留詭曰百計逃耳公低聲作自語狀曰岑氏其復乎欲以深動留而呼留至密所曰為我一言語金若𣣔官必母殺人劫城若𣣔殺人劫城任汝自為之金能聽我言可以狀訴我及諸上司留唯唯公遂與留銀十兩而以花紵方摺之納留懷中為我寄金得官後為衣衣之可常念我也公復紿留曰金欲官非賂我萬金不可留曰金誠當盡力然金方倥偬安能辦此公笑曰吾豈遽責金耶耳𣣔得一帖為信耳自是益信公無他腸矣留出公又呼還謂之曰我幾忘之韋貴徐五素仇汝亦仇金可善僃之無墮彼計也留詣金耳如公言金大喜真謂倚公可得官矣因率其兵五千人詣賔見公至城門門者懼而報公請無內金公怒罵曰金非賊奈何不內覘者以告金金心益安率其衆散入城而與留及其親信二十人皆衷甲見公公曰金來乎留曰來矣金叩頭潛以萬金帖子奉公公復笑曰若窮鬼安得此乎金曰賴公力得官不窮矣賴公力誠不敢忘報公子孫公戲曰汝土官多不知恩汝得官且忘我矣況子孫乎金唯唯不敢公乃令其姪出見金曰金汝兄弟也金得官他日每一出征乞金四功與汝公復為金計曰汝賂我兵僃公獨無賂乎金對不敢公曰苐寫帖子吾為汝致公以兩帖子示兵僃笑而火之於是遣金詣兵僃始金叛而留且往兵僃甚懼公潛與兵僃計此事大禍叵測公夷情未熟一語蹉跌敗矣不若一以聽我兵僃唯唯及見金伹言吾視金有福相以微動之且曰此事一聽沈公明日公詣金營犒之五牛酒五十尊又明日兵僃犒之如公公復召留與金謂曰倘兵馬殺金是吾殺金倘暗箭刺客殺金是貴五殺金非關我事今一以付留可無賺金也留乃日夜甲而擁金為僃公復遣其姪至金營與金同飲食臥起金自是心死於公矣公欲縳金而憚其衆時巡按在南寧將誘金至南寧乃縳之乃請兵僃先往密語巡按以故公謂金曰吾挈汝訴巡公吾代汝詞公為金作欣稿塗抹四五次以示忠於金復謂金曰吾與汝往南寧倘貴五伏人於路暗箭射汝不若易汝土官裝衣青衣雜椽史中而先我馬令五千人後行金如公言路中飲食公與金同席語金曰貴五以重賂賂吾庖使毒汝則奈何自今以後吾所食汝亦食吾所勿食汶亦勿食可也金如公言而益以公為愛已行七十里至思龍驛公晨起耳語金曰今往南寧南寧人皆言汝叛聲甚惡以五千人往則人益疑汝不若散遣三千人而選心腹從卒二千人以往是汝不撤衛而坐息人言也金以為然選二千人往復行一日去南寧百里公謂金曰汝至南寧久候而諸從人衣糧懼不給不若以千人營於此而以千人從為便金亦以為然從金至南寧者才千人金入見巡按巡按好語慰之曰吾為汝奏明日巡按遣人至金營犒其衆而留金以待奏居五六日公度金衆衣糧且盡復謂金曰思恩去南寧近耳何不遣其半取衣糧而坐待糧盡衆且散矣金𣸪遣其半衆行金所遣千人營百里外者久之亦以衣糧乏稍稍散去而獨五百人尚散處城中公欲縳金而又以為五百人者迫死而狠聞則殺傷幾何更欲為計而金所遣取衣糧者適至則從金者又千人矣公知金未可動間請於巡按公且往南寧而以金從可於路圖金也至思籠驛忽報韋徐將萬人在陽以迎巡按而隂襲金金驚而跳公與兵僃巡按聞之曰禍矣公謂巡按且陽為不知而聽希儀徐圖之公出呼韋徐罵曰汝安得擅兵至此金得官與不得官唯朝廷所命汝安得私讐之是時金尚駐近地覘伺而韋徐部中亦有為金耳目者金聞公言復還公行三十里金道伏候公公曰岑金耶汝尚不知死貴五兵至矣可疾入賔州匿吾參將府則貴五無如汝何矣金馳馬入賔州公復於巡按曰金入賔州矣巡按兵僃至是始有面色自金往南寧返賔州飲食起居無不隨公居數日韋徐復私公曰請甘心於金公又怒罵韋徐亦莫測公計所出也公密請於巡按散遣貴五衆而後圖金然是時金衆尚千餘人與楊留所統殺手千人皆在賔州內外公與兵備計公可遣楊留殺手百人護巡按往桞州公間謂金曰楊留殺手百人護巡按往桞州矣汝盍將百人護送四五十里以自結乎至五十里金欲返公又拉之行百餘里金又欲返公曰汝獨返勢弱倘貴五伏人待汝奈何今去桞且近汝何不與留偕至桞而偕還金遂以百人至桞其酋長十餘人皆金死黨驍健會金於路躍馬而墜公以機責其酋五六人曰何不護金而令至此痛抶之五六人皆病創卧然尚以公愛金故彼抶不敢恚公金至桞入參將府公命夫人見金曰金我兒子也金得官聽調往來貴縣吾縱不在汝必見之金益喜置酒勞金與其酋是時諸太酋其五六人既病扶卧獨四五人從金而留所部打手百人與金兵百人皆營於城外桞城故有狼兵二百人足以虞變公將縳金先以狼兵三千人護巡按三百人護兵僃而以三百人入參將府待事謀既定因酒中戲謂金曰癡兒子汝往時懼誅又懼貴五逼意常不樂今無事矣何不痛飲金與諸酋皆盡飲至醉其夜遣狼兵縳之黎明遣人召留於城外狼兵夾墀左右立留與其黨三十人見公公大言曰非楊留忠不能成我事以銀十兩勞留取紅紵挂留留愕然公曰汝為之而汝不知乎金國賊也非汝與吾同心誘金至此吾安得縛之留大駭泣下曰留小主人也公曰汝為之而𣣔誑衆乎公意又欲以疑留於其黨也留懼不能言其黨三十人皆股栗公復曰吾且為留奏功矣因見留於巡按巡按勞賞之如公見兵備兵備勞賞之如公勞城外二百人牛酒而令留率之還賔州遂令留齎牌散遣金衆之在賔州者曰所誅止金一人留既惶恐見紿又虞同行者猜巳賣金相讐見殺于路中日夜局蹐為備奔歸頃之遂發病死金兵聞金縳皆散去公乃以金與其酋之病抶者醉而縳者解巡按府而撲殺之思恩復安當是時使公不先𣢾留則金必不至而且攻城殺人使公在南寧賔州縳金則困獸之聞何所不噬使公聽韋徐甘心於金則兩客相閧而主受其釁惟公緩之又緩以漸脫金于五千人之手若剝笋然待其為一夫而後縳之人以是益多公之算而韋徐諸土酋亦益謂公不可測也公見督府於梧時鹽船八十餘阻峽賊不能前左江孫參將千人送之不能督府以􅒛公先時公泝峽峽中大酋侯公丁嘗謁公公寄六羊令公丁牧飬至是遣人取羊於公丁公丁奉羊至潯公命諸鹽船牛酒犒公丁與其從人謂公丁護船上峽公丁身居公舟尾􅒛其黨乘小舟護船囑曰吾以身質於沈公護不謹吾碎矣公因􅒛班首一人與公丁從人護船至武宣未返時孫參將與左江兵備聞公丁在公舟欲乘間捕之而密言于公公曰此斷不可人信我而我詐之不祥招而縛之不武且獲一人以疑諸夷將焉用之此斷不可公居常有所徴召雖其深溪絶洞未嘗不來其來雖桀猾宿惡未嘗輒殺其可諭者諭之其不悛者必遣還巢而後捕之故公以此語兩人兩人猶豫未決公乃􅶙公丁告之故曰可亟歸矣公丁大感泣去而公所遣班首護鹽船上峽者亦至不失升斗公以報督府督府笑曰孫參將千人乃不知沈參將一班首十八年七山之役奪兩參將於虎口功尤奇公膽勇機警善撫士其私財與所得俸祿賞賜半以給諸人為耳目者其出兵多齎私財以行有先登與斬首者就陳給賞不失頃刻故人爭盡死力公嘗笑曰人以資財積賄賂而博官吾以資財積首級而博官豈為非計哉其征陳村時染危疾所部皆自戕于神前以禱公刀穿手矛剚股鈎刺脊繫鐵鎖我之痛毒諸躰皆遍最後至者一人無所施乃箭貫喉為禱其得士心如此蓋余宦遊而得當世名將數人北則馬永梁震西則何卿南則公震與卿余未之識而識公與永永魁瓌長貌而氣特沉毅見人俯首下視寡言笑公短而精悍目炯炯燭人議論磊落激發皆所謂偉男子也公與余稍談及廣西事余是以得撰次之公戰功尚多余不盡聞也公謂余言當世固多良將患在牽掣齪齪不能展噫嘻若公者猶為未盡其用哉荊川先生文集卷之十二
