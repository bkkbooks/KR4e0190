  text: 重刋荆川先生文集卷之十五
  hash: sha256:063c7e9d455d2b8dee22763d37ca585e406bb3565cfe2df75fa3f5b7385bab6f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_015-1a}
body:
  text: 志銘封知府朱公墓志銘公姓朱氏諱某字某吳縣人也父東耕君諡以隱德為里中所推至公讀書為儒在縣學若干年以貢入大學在太學一年謝去歸老于家明年子鴻漸第進士歷官兵部武選主事于是天子封公武選主事後鴻漸為武選郎中巳而鴻漸守瑞州調守廣信又自廣信調守梧州而公復封鴻漸未去梧而公卒于家某年月日也公自少苦志讀書嘗寓蘇城北寶幢寺寺傍空室一區寺僧以寄棺槥其中歲久積疊墻壁間鬼氣觸人戶無履跡公喜曰此真吾讀書處矣因獨携一童子往讀書其中每夜中或晝風雨輒有聲隂隂若嘯若泣一童子者數以為鬼也竟驚病死而公讀書其中如故公既以老儒生精于治經又性喜為詩所著有草堂集凡十卷蘇人故多以詩名家而近時則迪功郎徐君昌榖最著昌榖嘗數過公論詩公曰詩貴成家格卑弱固不可若規規摹擬前人逼真亦詞家大忌也且夫古之為詩者以寓性情也得之于體裁而失之于性情亦安用詩昌榖深服其言故公之詩雖醖藉古人而要于自寫巳意略如所以對昌榖語然昌榖之詩則自海內藝文之士莫不喜道之而公之詩雖以吳之人士雅好為詩者亦多不能舉其詞豈公善韜蓄以為既隱矣不欲以言自文耶抑古所謂山澤之士必有待而後能施乎世耶彼其所謂有待者不獨操柄也雖文詞技藝若可以自振于世者固亦不能無待也耶公既以讀書至老無所遇而發之于其子副使君副使疆直有節槩不善與時上下其為宦也亦往往多鯁自為郎積若干年而始出守為守歷三郡積若干年其最後徙梧梧瘴癘窮徼地也副使君欣欣然曰吾所聞于家大人者如是吾何憾公亦欣欣然曰吾兒如是吾何憾公卒之三年某月日副使君始得地于陽山白墡塢之北麓乃克葬公先葬之日副使君具公行事為狀來請銘余雅善副使君其語當不誣為之叙而銘之公娶李氏繼娶鄒氏子五人其長副使君鴻漸也次鶴鳴虎文雉膏馬良孫男九人承家承烈承宣承武承文余未名曾孫男四人享年七十有九銘曰學古為儒委蛇步趨挹其容者以為此山澤之癯貤封自天有子則然署其墓者以為此梧州之阡封知縣張公墓志銘翁姓張氏諱獻可字廷諫號東涯世為無錫人給事中選之父也翁少頴敏嘗有志讀書矣以貧故資生事為急也故不得久從事于庠孰絃誦之業以貧故資生事以多途也故嘗博通于醫卜星曆堪輿佛老諸家之說然非其好也日奔走生事已至夜歸必篝燈讀經史不廢巳而更發憤習舉子業則年巳過矣家又無錢可行束修然經生碩儒以其志懇而禮謙也咸樂為講解翁自以其年過而學也則益勤苦習師說已而援筆為文輒數百言未嘗起草而㑹于經㫖可以自奮矣然竟以年限不得遊庠校而邑中右族則爭迎致以為孰師翁既每自惜其志之不就及子選為童子時而家故貧也則群之于諸弟子中而身自教之翁教子弟嚴而有法溫溫誨誘不專訶朴故諸子弟視翁以為其父兄其教選也嚴于其所以教諸子弟者不廢訶朴故選視翁以為其嚴師選既冠翁猶為之改所業課而選畏翁一如童時為孰師三十年諸弟子彬彬多成材者選以進士起家為邑令能愛其民為給事中有真節蓋翁之所以成就之者為深選令蕭山時翁嘗一往知民之安其令而令衙清冷如家故時則大喜居三日即歸曰吾非就養也選以言事杖闕下罷歸翁迎喜謂之曰顧吾與若母兩人老耳死諫是爾職不死是聖天子恩厚無量也翁以子官封蕭山縣知縣始翁涉艱苦其後子貴身為封官有輿厮可以代步而翁踽踽行步里巷中如故時翁居常遇人欣欣煦濡謙下後為封官年且高邑中推為耄耆而翁益欣欣煦濡謙下未嘗有自驕色于弟姪睦于夫婦無忤言待童僕如子女性慈惻既老則謂子選施無棺者棺畫圈于𥿄為圈者三千每施棺一則登其日月于圈者亦一期盡始圈之數而續圈焉傭丐者掩道旁露尸掩一尸與錢若干丐者每得露尸則喜以為貨也亟奔走告翁自是邑中幾無露尸者計所棺與所掩及翁之身巳數干人而翁且謂子選汝終身行之勿計數也煮藥膏以施瘡瘍者寒凍則為粥以食餓者曰掩死人又何如活生人嗚呼可謂厚矣云云銘曰少也食貧資不謀身既稍自餘乃謀及人及人謂何所重者喪誰骼誰胔贏死不藏我覆我掩我槥我棺水免鱉魚野避烏鳶古維有位方春掩骼翁隱人也而專是澤銘以頌翁義風可作鈍齊吳公墓碣銘嘉靖甲辰吳翁有子情舉進士第三授官編修翰林其明年閏正月十有九日翁病疽卒年六十有二情解官奔歸將以明年丙午月日葬翁青龍之原合于妻徐孺人之兆禮也先葬情既以墓中之銘請于尚書孫毅齊公而復介其姻給事中張君屬余書其墓道之碣情因涕泣謂余曰情少為郡諸生而大父始喪是時先君與諸兄弟分産而獨持門戶益落莫不自支惟時時撫情慟哭曰汝祖固日夜望汝汝奈何辛卯歲情中試南畿還先君望見情泣曰汝祖固日夜望汝乃今不及見汝之有立也未幾吾母疾作明年正月卒先君泣曰汝母與吾共甘苦三十年且余教汝嚴父也汝母悉吾意時時課汝讀書其嚴乃更過我今汝始漸進取而汝母不待矣情三試禮部不弟先君每慰籍之癸卯冬且就試先君語曰汝不須念我我近不到城市者十三四年朝夕惟唐詩數過杯酒五六行更無他望惟望汝勉強無愧古人耳甲辰情舉進士及第先君又痛吾祖與吾母之不及見也每語輒泣下時寓書于情輒舉㑹試時所命題先事後食為戒蓋欵欵望情以不愧先資之言也明年而先君遂卒矣嗟乎自吾舉于鄉先君方痛吾祖之不及見也孰意未幾而遽痛吾母也吾始及第先君方痛吾祖與吾母之不及見也孰意未幾而遽痛吾先君也情至孤孽不幸人也又曰先君終始布衣無他大行可紀獨念先君性剛直耻為譎祕媕婀之態其遇事雖不關巳利害亦公言激發無所避故嫉之者或乘其踣也相與搆而侮之先君挺挺自若也久之搆者亦知先君之無城府也相與愧而服焉先君自若也先君且死戒母得厚葬而獨因舅氏語情願得當世名人一言于墓吾即暝矣嗟乎情不及祿養吾先君而又墜其將絶之命是重情之不幸而不暝我先君也惟君其有意哀憐之始余未獲識翁而交于情也久自壬午歲與情同時入為郡諸生則已竒情之為人嘗竊嘆中世俗益薄士人稍得志輒恣巳矜物甚者怙侈叨餮其廉耻往往出市道人下情自中第後益務謹飭逺聲利侃然有志概間嘗過余操十斛舟從贏僮一兩人徐與之言而深察其意氣蓋絶與同為諸生時無異余益竒情知其志所向與其後來所樹立未可涯也是足以徴翁之教矣且夫以情之祖與母不及見其孫與子之舉于鄉與登第之為可哀也翁及見之矣乃又不及少見其後來所樹立其亦可哀也余哀之而許之銘翁諱云云銘曰維天之道猶弓斯張高者下之抑者乃揚維翁之晦其後之昌其昌謂何冠此多士冠此多士不獨其藝砥礪廉隅曰維先志以邁厥跡以顯厥世沿流泝源以為翁誄茅處士妻李孺人合葬墓志銘茅處士者進士坤之父也坤為青陽知縣數月有聲而奔處士之喪以歸歸而又喪其母李李之喪距處士喪僅三十五日而處士喪之日則嘉靖庚子八月二十二日也其三年癸卯四月十二日乃合葬于唐家村之原唐家村故處士所遊息處湖俗以桑為業而處士治生喜種桑則種桑萬餘唐家村上居常自言吾死第葬我于唐家村且死者有知吾得覩諸兒荷鋤携筐往來吾墓上何不樂之有哉處士死坤遍求地于湖之諸山不得及得卜之處士不吉後乃卜之唐家村遂吉坤曰此先君子意也于是葬之唐家村之原先是庚寅之歲處士嘗病幾死㑹有相者過處士曰翁相未死勿憂也已而私謂坤曰翁其死于鼠之歲乎後十年坤舉進士例得請歸省而歲在鼠坤家居頃之乃就選然心獨念相者言欲去處士則不忍欲留又難于為言而處士在布衣中雅喜為詩又耽好山水嘗欲邀諸詩客相與入天台鴈宕訪赤城佳處以為快于是坤即婉謂處士曰大人不記天台鴈宕之遊乎兒一旦綰印綬作吏縱欲歸必不可得何不令兒以此閒時奉大人往游其間坤意姑欲以是緩行耳于是處士揣知其意罵曰吾日夜固望女立功名幸始入仕奈何以吾故趦趄且吾欲往游即自往耳固不令女廢公家事從我坤不得已乃就選居青陽數月而處士死如相者言處士且死猶張目咄嗟以竟不得往遊天台鴈宕自恨而坤亦自以不能堅持𥘉說濡忍數月奉處士終言之輒嗚噎不自得至是且葬坤以其友人董吉士份所為狀來請銘按狀處士諱遷字于善號南溪以其居歸安之華溪也處士為人豐頰而髯魁岸自豪意氣軒軒若不可羈然槩其平生亦少所出入于繩約其面折人過若硜硜不少讓然善忍或睚眦之不為報也人亦竟無睚眦之者其少治生不業儒然喜談詩翩然有逸士之風其治生操縱出入心算盈縮無所爽然未嘗以錐毛吝惜為事而割田以衣食其族之人為屋以歸其族人之流而徙者坤之舉進士也處士為之破劵若干金妻李孺人有婦行處士魁岸意氣而孺人佐以和柔靜默尤善處嫡妾間掩瑕絶嫌人未嘗少見其隙𥘉處士同邑施翁隱居行義崔太史子鍾銘其墓曰古之鄉先生也處士每過翁墓輒慷慨低回久之嘆曰人生何必赫赫吾他日竊從遊于地下第為里隱君子不負此生矣間嘗語坤曰即吾死誰當銘我者坤跪而請曰唐司諫乎處士喜曰可矣故其卒也坤為之來請銘嗚呼處士其有意于身後之名也乎雖然此亦足以觀處士矣處士云云卒年五十有三孺人長處士兩歲而同時以卒茅氏故居邑之埭溪宋元間以治篾為業東往市海上經華溪飯而沉其碗以為祥曰天使我飯于此乎遂捨篾而家華溪八傳至處士家益饒子坤始以文儒進云銘曰唐村之原有鬱維桑兮生也游于斯死以為藏兮赤城之墟仙人所嬉兮生也不得遊于斯死而魂氣之兮秋野殷公墓志銘殷生邦靖從余游嘗與余言其大父秋野翁之行甚具余時獨心善翁未幾翁子文輝以吾友施子羽所為狀來請銘狀中事多與邦靖所說參合余往無錫問其邑之士大夫與其街衢巷陌之人皆曰翁長者也余益知邦靖所說與狀皆不虛余覽史傳所紀長者大抵多詭情以釣竒至償金不復辨認牛不復問諸如此類史家以為竒而列之長者然余以謂長者正不必然如秋野翁在族戚能無尤惡于族戚已矣在鄉曲能無尤惡于鄉曲已矣未嘗有意騖竒節為名高然其處心行巳亦往往多出于過厚一士人子負翁錢不能還自請以女婢翁翁不忍竟還其劵嘗亡金篋中踰年盜不得已而邏者踪跡盜盜乃故翁所舍客客囚而見翁翁駭愕若固盜耶且金安所用客跪吐實曰余之妻公之金也請得賣妻以償公幸不獄死足矣翁惻然更乃出錢以與邏者求脫客而私語客曰女吾客也雖以此十數金贈女不為過奈何以瑣瑣故絶汝夫婦之歡吾脫女女可自抆拭客叩頭涕泣謝去客本善星術故翁嘗客之後客竟為善士而以星故走江湖間數過無錫具土物候翁欵曲久之乃去翁所居並醫局嘗有海寇邑吏鳩工即局中高敞地繕軍器為備衆久役疫作人相枕翁乃日搗椒蒜和酒以遍飲不病者而大鑊煮藥以遍飲病者又日令不病者一人給事病者五人時其藥物而掖搔之已而不病者得不染其病者往往得活相與詣翁羅拜手加額為謝後數年有人與翁相讐翁子應試南京過毗陵驛讐者狙人驛旁伺翁子欲毆之沮其行翁子大宭忽有驛卒數人躍而前助翁子與之力鬪翁子由是免于難既免而詢諸躍鬪者乃故嘗役醫局中翁所活者于是翁子欲厚報之其人謝固不肯受競還家持果與雞饋翁子然後去此數事皆世所謂過厚然翁處心本如是未嘗矯而行之翁父病痰閉不可飲食屈伸翁夜禮北斗以禱已而夢一黃衣力士以刀刺其頸疑不祥甚明日驀有軍人黃姓者造門自言能醫此疾翁異之果以針刺喉中出穢痰而愈如所夢者然翁未嘗言于人人亦莫之稱也翁諱俊字時選殷氏自布政公以才見竒文皇帝而其後遂為文獻之族至翁以隱行著而翁之叔季子姓多為儒者翁始以輸粟授冠帶非其好也因自號秋野以寓其蕭散淡泊之志云布政公生璉璉生廣成廣成生翁殷氏之先自毗陵徙家無錫之嚴埭又自嚴埭徙家邑中其家邑中也自布政公始翁配三孺人有賢行先翁二十五年卒邵文莊為志其墓子一人文輝云云翁年九十歲乃卒嘗以耆老請為鄉飲賔者凡三十年應詔與賜老人粟帛者凡六墓在㠏􅣦山葬以嘉靖年月日其卒也先葬之一年八月十六日銘曰漢世論人必先長者寥寥誰哉嗚呼秋野蕭孺人墓志銘嘉靖巳亥冬南京浙江道御史臣正色奏言扈從章聖梓宫諸貴人不法事諸貴人奏列御史罪狀自辨天子逮御史于獄竟寬之使戍邊下兵部臣定戍所遣去而兵部臣故御史嘗所劾者于是御史戍遼之瀋陽御史家故在無錫其明年妻蕭孺人卒于家御史為人慷慨有氣自始為御史數獨自閉門草疏不令孺人知孺人時時從隙窺見之自念不能沮又不能忍則欵欵為好語解之且曰母騷瑣生事為也已而御史得罪御史既上疏則衷囚服而襲豸服以聽臺事後逮者至御史自臺囚服出不過家徑去孺人携諸子倉皇南歸且憂不測遂病聞戌遼報稍解矣久之竟以憂病死辛丑六月十日也年三十有九孺人父蕭愷母錢氏御史黃姓士尚其字孺人性謹厚其歸于黃也事後姑左右朝夕十余年竟後姑死未嘗有一違言愷有女弟老而寡且窶孺人迎以歸與共哺糜草餘年竟孺人死未嘗有一厭心人以為難𥘉士尚為仁和南海兩縣知縣孺人從士尚果决負才氣見事立斷無所避其于權勢人鯁鯁欲繩以法而孺人濟以和柔溫慎其所匡助為多士尚廉則孺人以儉約自律也在官中躬絲枲織布如村居子四人學詩邑庠生娶某女學禮聘某女學海聘張君舜舉女舜舉名選故給事中以言事罷為民與士尚同年其意氣同也于是乎姻孺人葬以卒之歲十月某日墓在某所將葬士尚自瀋陽以狀來請銘余觀漢史所載王仲卿戅而狂好數言事其妻每抑止之仲卿曰此非兒女子所知後仲卿竟殞妻子亦徙合浦余讀而悲之以為臣之娓娓于其國妻之娓娓于其夫皆期于自盡而已其事則若相睽然臣之于國耻其不言妻之于夫恐其有言嗚呼臣之難自古紀之矣今士尚幸遇天子至仁聖有仲卿之狂戅而免于仲卿之戮是孺人所遭過仲卿妻逺甚然史又載仲卿妻徙合浦後赦歸更以采珠為富人家今天子至仁聖且將脫士尚于伍藉而還之以與孺人相朝夕也有日矣孺人乃不幸死不得如仲卿之妻特蒙後凋之福吁其命也夫余哀而為之詞孺人以御史故得封御史在戍矣稱孺人者罪不及孥也詞曰謂媛之生兮處深閨兮心奚所思遼水之涯兮謂媛之死兮閟幽室兮魂奚所遊遼水之側兮盛孺人墓志銘盛孺人蘇之太倉人盛君諱某之女居庸山人顧君存仁之妻嘉靖丙申山人為給事中上疏笞于闕下謫為民保安州居居庸孺人從之居庸踰五年而歸歸至家幾月而卒辛丑某月某日也年三十有九𥘉孺人既字于顧而遭母喪于是童而婦于顧為童婦三年而室于山人孺人既以童而婦婉婉自屬于其姑錢孺人姑亦極意拊育之如其女孺人居常謂山人曰姑吾母也即姑百歲後願加服喪三年以報姑姑性好潔而嚴孺人所為縫紉漿酒糔餈滫瀡之具必以潔恐一不當姑意且得罪姑或不懌必跪而請罪不敢起及從山人于京師遇美飲食必思而泣居居庸時時與山人焚香南向拜且祝幸早見姑巳而聞姑病日夜泣遂辭山人歸歸而道病既至家強力羞藥物食飲于姑病且革憗而呼姑姑至與訣遂瞑數月而姑亦死孺人自少讀小學孝經書頗解意㫖故平生喜書然獨不喜佛書中饋有間則取小學日記故事稗官小說家誦說之每至古人壯節偉行則擊手詫嘆以為烈士當如是若自恨其不得為而隂以縱史山人然者其始娠山人且遊學慨然與之别曰君行矣謹母以室家為意别三日而産子山人且上疏與孺人對坐土榻上夜草疏忽若有鬼物嘯户外孺人巳心訝其不祥然竟不一語勸止及受笞以死報者三心苦之然不為動或怵曰事叵測奈何可蚤自脫不爾且及亦竟不為動山人舁居庸而孺人尚居京師時寒凍雖諸僮皆苦楚窮徼莫肯往孺人獨以一女子提衣糧觸風雪為諸僮先﨑嶇走塞上就山人㑹山人病瘡劇左右護持百方久之山人以不死其居居庸也雖以不得事姑為戚然未嘗有一日羈愁不可忍之色故山人亦安之既死且葬山人為之狀其行來請銘嗚呼士鮮慷慨之節久矣豈其素所自樹立者盡然或者鉤牽兒女子語故噎噎不能自割然則如孺人其可多得也于是許之銘子三人可立太學生次可大早卒次可興女一許聘陸某故冡宰公孫墓在太倉新安鄉祔錢孺人之兆其葬日為卒之又明年癸卯某月某日始山人為給事幾月而孺人封以恩也銘曰北瞻居庸崇山崔崔匪夫之故胡為乎來南望吳門既阻既逺匪姑之故胡為乎返間關而來間關而返今其休矣即安于坎楊孺人旌節碑銘嘉靖十有三年知常州府臣檟奏臣屬邑無錫無錫諸生棟等若干人父老廉等若干人詣臣言楊氏婦守節事甚具臣聞守令以興教化美風俗為職也臣謹以楊氏婦守節事上聞者婦故邑人俞暉之妻邑人楊復之女自少從父叔識字通書史大指歸暉六年而暉卒婦痛䀌幾死及葬俞氏墓故在惠山㑹風雨不能舟婦匍匐即路以身翼棺哭且走躑躅泥石間觀者皆欷歔有泣者凡十許里乃抵墓所以克葬事自暉死時婦始二十有八歲二子長者始五歲舅姑且老矣而暉故儒家無宿資可藉于是姻黨憐之欲奪其志而前時暉且死猶強起書雪操冰心四字與婦訣婦粘之寢壁坐卧瞻焉至是指而謂其二子曰而父知余心矣余即死敢二乎則又指二子而謂其人曰余所以忍死者為此而已不然余何愛焉姻黨諒其志遂絶口不復言也居常內外女姻宴好絶不往來曰我孀也宜然至老猶然姑嘗末疾踰屢歲湯藥禱祈拭掃溫扇至于頮盥櫛沐扶抱吮摩抑搔便液之事必自親之一不以屬僕人二子稍長親授句讀後雖巳就師每夜歸必篝燈火與相對以助其勤時時稱說暉之音容嗜好及其蹈履與其所志焉而不遂以待其後者幾以朂二子且使識勿忘也今二子皆強學有立其一為鄉試舉人曰憲其一為諸生曰寰者也臣謹按楊氏婦有不二之貞有撫孤之義宜旌婦今年及五十歲矣于旌格應臣檟昧死奏制曰下禮部禮部臣請命巡按御史核實御史臣蕙奏臣檟言不妄禮部臣覆奏制報曰如令于是禮部下常州府給錢立綽楔遂如令後四年而憲舉進士孺人從憲于京師病卒反柩于無錫將葬憲詣余請曰子其為憲母書墓隧之碑匪敢曰以嘉惠憲母其以對天子之寵命而章守臣之不蔽善也不亦可乎余既以許憲因自念嘗讀漢史黃霸傳霸為相課郡國計吏以郡國有孝子弟弟貞婦順孫者為一輩先上殿而張敞非之以謂此無益于廉貪貞忒之行而適足以導僞長謾霸敞皆世所指才吏其相反何也夫有善而不見褒賞謂之匿褒賞不當其善謂之誣匿且誣其敝也均今國家表崇節義之意至慎重也而草野委巷之間力不能自逹則或不列于褒賞其列于褒賞者參輿人之論乃或十一異同焉以古較今不甚逺乃知敞之言于漢要未為過余家武進往來無錫間問其邑人邑人之賢俞母者相屬也私論之與公褒可謂參合然則守臣檟之為此舉也其可以當黃霸之賞而免于張敞之譏矣乎余以是具載其文且為之銘曰于皇有明風軌是敦貞婦弟弟孝子順孫有一于此帝罔不聞大者祠祀小者樹門歲之甲午守臣檟言楊女俞婦孀三十年維居之艱維節之完維帝曰咨朕其試哉爰命巡吏其核以來御史蕙對守言不妄維帝曰咨朕心所貺乃按甲令乃表厥宅嗚呼豈一人之為來者是式王母繆孺人墓志銘余同年信陽王養之至京師携其兄所纂次其母繆孺人之行請余銘諸其墓余嘗往來信陽時孺人沒未久鄉人多有能道孺人事者余聞而善之又嘗㑹養之之兄及姪之為州學弟子者皆秀而有文蓋徴孺人之能教也遂許之銘而養之又言為其卜墓地時頗有竒怪始得二地堪輿師不能擇疑不决者久之忽一夕孺人夢若有告曰某形者吉蛇形者不吉覺而語諸子諸子駭之問堪輿師堪輿師𥘉亦不知其為某形某形也復至其地熟視之則某地果某形某地果蛇形一如夢中語乃徙某形者竟吉嗚呼聖人不語怪若此者何說耶則傳中所稱牛眠而馬嘶者其皆可信矣乎孺人信陽繆君諱家之女王君諱虎仲威之妻孺人嫁于仲威若干年而仲威先卒是時諸孤六人其幼者四人尚髫齔也孺人恐墜門戶督諸子稍長者使服田賈治生産不得游蕩擇其幼而敏者教之讀書而日課其程每漏下五鼓親叩寢戶使就燈火後諸子皆長大娶婦諸孫且斬斬孺人亦老且衰矣猶教之不弛于曩時有不率教者雖斑白必加誚讓或至鞭笞之不貸其嚴如此性素慧好聽古書列傳談說理道者惟恐不得聞至于里巷不雅之語惟恐聞之能薄飲食諸子有進重肉者輒不食至奉賔客未嘗不豐潔勞于治家能拓其業至于周恤貧匱為粥以食饉于歲者雖費無所惜此孺人之行其子所自為叙與余所聞于鄉人者大率近之矣孺人卒于嘉靖十有一年某月日年八十有七子男六鑑鎮欽鑰鎬鋭鑰州學生鋭余同年進士也今為武昌令鋭𥘉調崇明令以海道險不能迎養為憂孺人曰地之夷險惟君所命汝弟安之况有汝諸兄奉我汝母以我故阻抑其志且此未必非福也曾無戚容後鋭以能調曲周又調安邑孺人聞之曰當益慎其官則可亦竟無喜顔故鋭數為令多以能稱孺人教之也女二人與子某皆先孺人卒孫男十七人某某皆州學生𥘉余既許之銘久未有以應也後余家居而鋭為武昌令遣使來速銘乃克為之孺人葬以某年月日合于仲威君之兆故孺人所夢處也銘曰有崇斯墳神所惎也山鬼獲門辟魑魅也氣如春溫君子憩也生以為婚死不離也䕃彼後昆永無匱也蔡母鄒孺人墓志銘蔡生瀛喪其母鄒孺人將葬請銘于余因泣而言曰嗟乎吾母之生也備嘗艱苦而不獲享一日之逸吾母之殯且葬也僅于斂形無以厚其終而恔于心此昔人之所為痛心而自傷其貧者也瀛也奈何既而曰吾母雖鬱于生前庶幾可彰于身後雖葬不能備禮庶幾可藉此一片石而貽吾母以不朽也惟先生幸哀憐之𥘉生嘗學于豫豫固喜生之貧而有志也于是許生為銘其母取生所為狀而叙之云鄒孺人者無錫鄒君廷章之女蔡君元際之妻邑庠生瀛之母蔡君雖大族然資故貧君又倜儻不事畜藏囊篋屢空然而左綴右緝如𥙷敝衣僅而獲完者以孺人為之經營黽勉于其內也生瀛學古為儒不以貧故墯壞其業而隕獲其志以孺人為之母而教督之也孺人父卒母華孺人獨寡居使華孺人無子而有子以孺人為之女而迎之使就養于蔡也蔡君前所娶華孺人既殁而所遺子女無母而有母者以孺人為之後母而長養婚嫁之使與巳子女同也孺人之為婦也如夫有幹蠱之勤焉為女也如子有終養之孝焉為後母也如母有鳴鳩之均焉而享年止于四十有七不克與夫子偕老啜菽飲水之奉亦不克食報于其子於戲此瀛之所以重為悲痛而必求余銘者也孺人子女孫云云卒以嘉靖年月日葬以明年月日合于茅塘華孺人之兆禮也銘曰婦德含章弗耀厥美曷銘孺人吾識其子作銘者誰維太史氏銘如可滅石亦可毀賀氏孫楊二妻墓志銘代父作孫孺人者大學生賀君汝勉之妻而楊孺人者汝勉之繼妻也孫孺人卒于正德庚辰七月四日而楊孺人卒于嘉靖辛卯七月八日至是為嘉靖丁酉十一月二十一日始同葬于先塋之次其地曰官􅄵而汝勉因以二孺人之銘來請于余余有女嫁于賀而汝勉之女又妻于余甥余女與甥往往能道二孺人之行而况鄉進士姜君為之狀可信也乃不辭而許之孫孺人父承事郎諱堂楊孺人父承仕郎諱昺孫賀皆丹陽巨族而楊之族亦望于無錫故二孺人相繼歸于賀氏有朱陳之睦焉而二孺人者又皆柔惠婉娩克嫓厥美蓋若生于一家而非二姓之女偶然以聚為一人之婦者𥘉汝勉未有子是時汝勉與孫孺人年尚少可以有待而孺人巳為汝勉置側室且日夜冀其有子甚于自冀其有子也及病且死猶惓惓以賀氏無子為意而屬其妾曰汝無子吾不瞑矣又屬其女曰妾幸有子汝同胞也汝善視之其望深而慮逺如平常時而不自知其身之悲也孫孺人既沒而側室果有子其後楊孺人自有子與女矣楊孺人撫側室之子如孫孺人之志而均之于已子不曰吾子嫡也楊孺人嫁孫所遺二女悉其裝以遣之不曰留以嫁吾女也此凡婦人之所難而二孺人能之其操行大略相同而孫既無子楊有子矣又夭孫年止三十有七楊年止二十有七又皆不幸早世嗚呼此汝勉之所以悲慟而必求豫銘之使二孺人有傳也雖然顧豫不文其能使孺人有傳耶汝勉子二人楊孺人生一子九歲而夭其一曰某聘何氏側室劉出也為楊孺人所撫者而其母故孫孺人所置也女三其二嫁楊鋭周書皆孫出而鋭者余甥也其一尚幼楊出也為之銘曰其生也不相識而死其同宅以寧厥魄其死也不偕行而葬其同銘以垂厥聲楊母唐孺人墓志銘唐孺人者余大父給事中曾可公之女余父永州知府有懷翁之姊余順之之姑知冠縣晉齊公諱溢之婦太學生東墅君諱墉之妻給事公與知縣公同年也故孺人以字于楊孺人性孝而惠少從給事公于官給事公卒孺人從其母周孺人與弟有懷翁扶襯歸毀而嘔血幾不可藥積數年乃止及歸東墅而東墅嫡母金與生母潘孺人事之兩得其心中歲姑金與東墅君相繼卒孺人㷀煢遭兩喪哀慟積痞而痼晚年又遭叔父喪慟而又病病少間痞又作遂不起嘉靖壬寅八月𥘉四日也年六十有三自孺人始嫁時楊氏門戶方盛舅姑皆無恙家事一不以關孺人而衣食饒給周孺人又甚愛其女欲數見之孺人不數月輒一來每來必月留乃去既去則我饋遺問訊之使日不絶于路孺人亦數相報以為常當是時孺人不知為婦之勞而晏然有為女之樂後周孺人既沒舅知縣公亦物故東墅與其兄析産東墅又少讀書不善治生則家日落于曩時孺人上奉寡姑下釐家務井臼蠶績必自􅍾之而亦不能如曩之饒給也後東墅又死其子又析産為四則家又益落自周孺人之沒而孺人獨與其弟婦相際則歲乃一來其後又獨與其諸姪婦相際也或四三歲乃一來其饋遺問訊之使其數與踈亦率如其來之數孺人往來母家既稀濶諸子又各自謀生或携妻子往田廬治田或往贅于婦家孺人更悄然寡居而黽勉有無至老且病或不自休也蓋孺人所歷于夫家與母家凡三世而三變嗚呼此可以知人世之感矣有懷翁與孺人最友愛孺人病且死而有懷翁適官永州以是病不及候其藥沒不及慿其尸病則姪順之往候其藥沒則姪正之往慿其尸而以訃于永州𥘉孺人送弟往永州泣之甚曰吾其不及見吾弟乎至是竟死且死謂諸子曰汝諸兄弟幸輯睦吾不恨矣嗚呼諸子其終奉孺人之教以周旋乎諸子勉之諸子者鋭鎜鐈鉷也鎜太學生鐈鉷郡諸生賀氏周氏鄒氏沈氏其婦也鄒婦先孺人七月而卒遂與孺人同時以葬鄒于諸婦中最孝故其卒也孺人哭之極哀遂以病女一嫁郡諸生蔣瑫孫男五葬以十二月十五日墓在袁塘之原合于東墅君之兆將葬壻瑫既為之狀而順之乃銘曰夫竁其中旁有令婦孺人歸此其永不朽吳母唐孺人墓志銘吾唐氏之先以詩書長厚創其家子孫相與守之其女子亦往往有化于其風者若孺人其一人也性喜書自孝經女傳諸所常誦之外至于醫藥卜筮種樹之書顧不如專門家耳然未嘗不通其㫖其試之亦數數有效往來姻戚所或見有異書及諸稗官小說輒携取以歸旬日而還之則既誦習之矣既老尤喜佛與道兩家言日𬞞素食焚香宴坐或夜中起坐若有意乎齊心修觀之為者嗚呼使孺人不為女子其可以語于儒者性情之㫖矣乎不然亦當為博涉多藝能人無疑也其禔身不為矯飾然子女䙝御日在側未嘗見其袒衣與其見齒之笑其治家耕織纍積絲粟然施藥與棺饘粥餓者至不以脫簮賣衣為解其于族里雖其襫襏藍縷之微待之未嘗不如富貴人其于姻戚雖其幾世之逺姻歲時棗栗腵脯之問施之未嘗不如近姻以是族人皆曰孺人有德于我其姻戚皆曰孺人未嘗失禮于我性柔儉慈靜不色笑而其氣溫然其于父母舅姑尤篤既嫁至老數十年間每語及父母苦楚輒欷戲泣下舅姑既沒數十年間孺人亦已傳家事矣惟四時饋奠必躬滌濯羞殽蒸以為常孺人之卒也以歲祲避寇城郭痢疾五十日卒嘉靖乙已七月草有六日也享年六十九月十日返葬于董墅里合于其夫榆林衛經歷南墩公之兆禮也南墩諱靜夫姓吳氏舅曰七品散官水南翁諱良瑞姑曰張孺人父則余大父給事中贈奉訓大夫曾可公母則余大母贈太宜人周也子一人國平云云孺人同母三人余父永州守有懷翁其一人也姊一人嫁于楊先孺人三年卒姊病時孺人往候姊左右抑搔給事者月餘姊與之金墜胸為訣至是而孺人亦死蓋有懷翁三歲而遭二同母之喪哀之而不忍銘也謂順之曰小子銘之銘曰産于郭歸于鄉終于郭瘞于鄉蓋魂氣何所不之而骨肉兹其永藏王冡婦唐孺人墓志銘孺人姓唐氏常之武進人戶科給事中曾可公之孫永州守有懷翁之女禮部郎中無錫王君九岩之婦編修王懋中立道之妻而余順之之妹也孺人後其兄五歲而生于姊妹行為第三孺人幼頴慧紃組字書不煩于教而若素為之兄每曰惜女不為丈夫子而有懷翁亦為之擇壻後乃得懋中十有七歲而歸二十有六歲以懋中官編修故封三十有三歲而卒其婦于懋中者十有七年王氏故饒而懋中又少貴也孺人從于宦者十年然所服御一不改其素非賔燕不設兼肉或懋中偶飯于他所孺人輒為𬞞具問之曰吾適不喜肉耳惟為懋中肉必手調或一飯數起以為常懋中始未有子而孺人齒僅踰弱也然已數憂之一日自歸寧載一女子俱還顧謂懋中曰君大宗之後也不可以不亟圖此于卜相皆宜子故為君聘之既乃時時為理膏沐笄櫛飾容止惟恐不當懋中意者嗚呼吾母任宜人有少君裙布之儉是以諸女化之而孺人能淡泊撙約于既貴之後任宜人有小星逮下之慈是以諸女化之而孺人能委曲置妾于方盛之年蓋所濡染者然也孺人事其姑朱安人朱安人煦濡溫厚無與比孺人于諸姒中尤曲得其歡是以孺人每自喜以為其在姑之側也如在母之側也其事懋中懋中簡重詳慎內行修飭孺人揣其意所注輒婉為將順若恐傷之然懋中或有微過則終日不自得其有善未嘗不力從臾其間是以懋中每自喜以為吾得吾妻也如得吾友也孺人從懋中而北也其念朱安人數千里外欵欵然如在朱安人之側也其辭懋中于京師而歸事朱安人也則念懋中數千里外欵欵然如在懋中之側也既死且憒矣索杯羮嘗之以為甘也目女奴使進懋中所蓋猶如在懋中之側也嗚呼悲矣孺人卒于嘉靖甲辰五月二十一日𥘉懋中在京師欲請歸省令孺人先歸時暑月舟人病寒熱相染有死者孺人以一女子携數幼兒女與病者同載歷險數千里固已心恐憔悴幸不病抵家未一月病遂作再旬而卒其病亦寒熱也子一人化弘聘太學生安子介女女二人其一人者母故孺人歸寧時所載與俱還者也嗚呼吾宗自吾曾祖贈給事公而下其男子幸不絶衣冠而女子之貴則自孺人始孺人姊妹凡六人以夫貴者于今兩人其未三十而貴于室也獨孺人為然然卒奪之年以死豈其豐其嗇固皆適然而值之者耶抑亦數之定而不可益損者耶懋中將以丙午春正月三日葬孺人于前王村之新阡懋中既述孺人之行為狀矣而余為之銘曰史氏之妹史氏之妻史也狀之史也銘之後有考者其將在兹封孺人莊氏墓志銘孺人病踰三年嘉靖戊申冬十一月二日而卒年四十有一孺人之病也積于驚發于悲蹙于鬱庚子冬余以狂謬俟罪者二十七日孺人寤寢惕惕若其夫蹈不測而已不能以生然者既蒙恩免歸孺人抱餘驚就途抵家熱蒸骨如是者數年熱漸解而瘠則不復肉矣未幾母陳孺人卒臨尸而驟淋蓋醫家悲動肺之證也每淋輒暈死如是者又二年淋既止而生氣耗矣自是䐜腫瘕泄百痛間作既病甚則念其二女未有所歸又以為女縱得所歸而已且旦暮死不能終其奩具䄜帨之事以為鬱鬱雖其病必不起而其蹙之也則若以是然者叢三不可解之情以竟成三不可藥之疾嗚呼其可哀也巳孺人莊氏河間守鶴溪公之女孫靜思翁之女永州守有懷翁之婦其夫余順之也年十七而嫁二十六而夫為編修以恩例封孺人孺人始嫁見于舅姑舅曰所囑婦者無他第閨外不聞婦聲足矣自是舅往來閨外竟草餘年不識孺人聲舅每嘆以為能婦余癖于書平生不一開口問米鹽耕織事則以孺人為之綜理也余最迂僻寡合入門則歡然若得朋以孺人素能得余心事也其與余處者則然而其鍾情母子間也特甚自父母之慕雖男子或移于妻子而女子于父母家記禮者亦外而不內孺人雖以與余草餘年之歡未嘗一日輟其母子之戀其所為父母家計者黽黽焉悉其乏而排其難較其家事未嘗少內外之也其教二女也愛不廢嚴其教子也嚴過于豫其封十五六年余未嘗為置一翠冠其所享率如是孺人固不少謫望我而余所居官每不能過慎以速咎則孺人口不敢止也而心切苦之故余嘗謂孺人女也而任子之事母也而兼父之嚴未嘗過享其夫有官之奉而蹙于其夫有官之纍然則所謂三不可解于情者蓋不獨其致疾時自其居常則然也孺人卒于雞鳴時燭入則漸矣自其夫及其女與妾與女奴皆有囑囑余者曰吾身後而當為計則然又曰篋中衣以歸二女餘衣以與妾已而曰田五畝以遺吾家然則其不可解者又不獨其疾時及瞑猶尚不能解也孺人有烈性居常不媚笑語如莊士又每聞余死生之說若有契焉故其卒也精明若此葬且迫不及請銘于當世之君子而余又茹痛不能詳也謹述其死生大致以見孺人之平生子一人鶴徴聘萬氏禮部主事思節之女女二其長者以字行太僕卿孫公南野之孫臬則卒之前一月也葬以卒之年十二月十九日祔于姑任宜人之墓而先一年則余弟婦窆焉孺人事姑六年而姑卒其妯娌間姊妹也余既已載之弟婦志中矣故于孺人之葬也為之辭以慰之曰姑于是只娌于是只生苦離只死相隨只弟婦王氏墓志銘弟婦姓王氏尚書文肅公之曾孫女應天府經歷橫山文炳之女余父永州守有懷翁之中婦余弟郡學生正之之妻也年十八而來嫁其生而貴家女也既嫁而驟見余儒生家所尚一旦解去所御金簮珥悉易以銀而褧其華衣至于中饋女紅率常身先諸僮奴其所解去金簮珥又以之易銀為本而經營什一之息拮据勤生若素處窮約然者其性警慧爽豁故于人情世務不習而曉家人尊卑上下一無不宜其舅稱之曰余中婦最能潔茗精饌以適我意于是賔客茗饌有不盡以分屬之諸婦而多以屬之中婦者其母徐孺人聞之曰是在我側固然固知其能事舅也其姒余妻莊稱之曰吾嬸最能得我心事于是心腹委曲有不可以咨于其夫而必以咨之姆嬸間者其姊妹聞之曰是在姊妹中固然固知其能睦于其姒也其始歸余弟三歲而兩娠皆半胎而墮即以後嗣為急偶余弟從余自宜興歸入室見一女子訝問之知所置妾也余弟靳靳以年始弱冠為辭不御而遣之後五六年竟無子乃更為置妾至親為之膏髮整容惟恐不當余弟意居常夫婦間相得歡甚也及置妾則每割牀第之愛若使其妾得以時御焉而不以已故妨之者其在姊妹五人中最得其母徐孺人意𥘉橫山公卒母以意遺之二百金乃以母當總總時不忍受其後母病且卒以金簮分與諸女為訣其所分又獨倍諸女乃復以獨厚為嫌而併辭其所同得者嗚呼其能置妾于中年無子之日不足為難而能置妾于少年始婚之時則為難能辭金于母存之日不足為難而能辭金于終母之身則為難蓋其自少知書稗官小說終日未嘗去手每覽至古人竒節輒激烈自詫恨其不為男子余以為正使其為男子必能磊磊植立不􅎱妬以敗人之國不貨賄以自汙其身可知也與余弟夫婦間相得歡甚而警戒相成之者尤切始余父宦于外余獨與弟居弟或所過動也乃不喜而謂曰子縱不自愛其若汝兄何且又為之隱護不使人知蓋恐以是見尤于其兄而或至于相踈也弟有一善可稱也則喜而謂曰非子之能其汝兄薰染使然蓋以是深動余弟而欲其與兄相親善也以是余弟能知疆于為善而兄弟之好益密彌縫縱臾其間蓋有助焉以彼才且賢宜其多男子享高壽而竟以無子夭死其死也又以産此則理數之不可知者也自其始連娠而墮則已不專意于自娠矣既置妾固日夜以娠望之妾也及自娠矣衆且以不妬之報庶或在此而竟以是死謂之何哉謂之何哉其卒以嘉靖丁未六月𥘉五日年二十有九葬以卒之年十二月十三日祔于其姑余母任宜人兆之右方銘曰詩詠螽斯詵詵振振嗟彼淑媛罹此不辰讓娠于妾不欲自娠幸自有娠卒灾其身造物報施孰云可信惟其美行久而不泯伯氏銘之以垂家人行狀月樓唐翁行狀月樓唐翁武進人也諱世美字某月樓其號大父封寺副諱某者生五子仲子復為大理寺副後守平樂有宦績載在國志封寺副之少子贈給事中諱某號友蘭翁生四子長子為給事中翁其第三子翁貌魁岸為人倜儻負氣嘗從伯兄給事公指受章句能涉獵記誦然家故産薄而友蘭翁又病癱卧米鹽醫藥婚嫁百費叢于伯兄伯兄又方日夜治經史聚徒而教之其勢不相給也翁以故廢其學而營于家翁雖已不治經然不輟文墨其間時則作為草書遂窮極竒變闔闢閃縮上逼懷素詩歌有唐人風骨是時翁伯兄既以文雄于當世而季弟竹窗翁善畫尤以草蟲名一時言文章字畫歸唐氏云伯兄為給事中值敬皇帝在位言官甚見親幸有權給事公素小心慎事屢為書與翁大要教之謙下母輒入州縣門即入必傴僂不得騎閭巷往來戢族屬僮奴不得閙街市中翁遵其說而行之是以唐氏雖世宦然未嘗有子弟為鄉里所苦者後三十餘年嘉靖某甲子翁年七十餘郡太守請與蠟賔後若干年詔賜天下老人粟帛八十以上冠帶翁于是始冠帶然始一服之後不更服也嘗一與蠟賔後太守連歲以故事請然亦不更往其好省事如此始翁壯時唐氏以給事公故方盛給事公自為庠生有名聲已能盡致數邑客後為給事賔客益輳翁家居則應接賔客出則從親朋鄰里邀請酒殽之㑹投壺陸博遨逰宴笑之歡碌碌不絶翁每所過輒為上客議論常摧其一座人以是人益貌之後翁既老兄弟物故盡平生故人多不存存者亦衰且病不能相往來矣翁又失其壯子獨携二幼孫以居雖門外終歲率不一出甘脆滫滑所以輔老之具亦不能豐也時時有一二族子問起居翁據牀坐與之道說故事助遣歲時而已人謂翁由喧熱至落莫不能無介介翁獨翛然自得也然自翁而上友蘭翁年至四十有幾翁伯兄仲兄亦皆不及五十而卒竹窗翁卒以五十而翁在父子兄弟中獨巋然老壽至于八十有三其所得可不謂厚也歟翁配云云葬以卒後三月某甲子在黃塘祖塋之次于是一之圖所以不朽翁而𣣔請銘于立言君子乃謂順之述其事略順之于翁為姪孫而給事公之孫云程少君行狀程少君者新安岑川里人也諱楷字良式遺拙其號也新安程氏之先名靈洗者仕蕭梁時有功封侯死諡忠壯公凡新安之程皆本忠壯公而徙岑川者則自誠始誠四世孫瑞瑞生祚祚以子官封御史自忠壯公至封御史君支派散别移徙母常居然世次則可謂云封御史君娶曹氏而生三子長君名相仲君名材為御史而少君最少子少君幼朴魯人以為不慧大父瑞獨心竒之曰是兒類我我少嘗如是少君稍長益踈散不喜事獨常之沼上觀所蓄魚為樂封御史君弗善也然心念大父言欲試之乃使之應鄉中役以微觀其能已而鄉中役稱辦鄉人以為少君不苛而事辦則始相與推擇少君而封御史君亦始喜少君之能任事也後封御史君老聵仲君宦長君且多疾家事一决于少君少君有所規畫無弗當封御史君意封御史君又益喜新安土磽狹田蓄少人庶仰賈而食即閥閲家不憚為賈而程長君少君亦間出為賈他賈人率婁藪重錢心計極毫釐然占所進資顧或反薄少君兄弟長者大度鮮算計嘗東賈吳北賈魯乃吳魯人皆樂與少君兄弟遊益就之故程氏賈行吳魯間占所進資更多他賈人長君賈張秋久人或言巳死是時少君罷賈休家聞之亟往訊長君則長君故無恙大驚喜竟與俱歸長君歸而後復賈清泉少君則又從長君居清泉𥘉仲君為御史時勾檢內帑財籍至是仲君死內帑財物失闌出入事覺主者窮本坐程御史事下歙縣案御史罪狀而御史已前死法當原有司誤論程御史家坐徙乃悉逮繫程御史家于歙縣獄鞠之而少君時在吳吳人欲謀匿少君母往俱縶為也少君曰父兄在吾焉所匿且我家故無臯乃有司謬論之我左右營救可竟白也即不白我何愛一死以狥父兄亟馳歸抵家㑹事以前解少君即靣數有司有司不能難其戅直如此少君之居清泉也病痺歸且愈矣後繼往復病痺歸歸益病不治竟死少君死於嘉靖甲申五月十六日死時年五十有六矣少君為人淳質無所猜對人輒見肝膈人或愚之終不為變諸嘗與人言事恣意語無隱人隂屬之曰若母泄我語乃君竟泄其語用是觸人忌諱人亦廉少君無他腸不深疾之而少君亦不以語泄故遂自懲閉口也他事又恣意語無隱如故而人乃益推少君性直云聞宦氏子弟矜耀者則曰唉我兄為御史時我常恐人謂我御史弟指目我我乃深自避匿乃今何為詡詡然若揚錦而招于市者吾羞之家僮嘗病疫或請禳少君怒曰疫無鬼即禳何益使疫有鬼吾且刃之遂不禳疫亦竟止少君雖遊于賈中然喜文雅自為兒子受論孟小學書于孰師誦熟之及遊吳時慕張君東海之為人也張君者松江人善詩字字尤工程少君乃學張君字至或罷眠食居常以手畫腹及堵間作鈎剔狀即又學張君所為詩諷詠之其妻宋安人誚曰君寧當作老博士耶少君笑曰汝謂必作博士始事詩書耶少君死後四年有子曰烈始舉進事為工部主事㑹天子加恩海內乃贈程少君為工部主事如其子官云始烈少而材少君教之書烈性剛負氣少君教之曰汝治汝性即不治汝性讀書奚益故烈為工部有聲少君之教也少君子三人點烈黔一女妻某人孫男三人應軫應陽應彩少君既得贈官烈乃涕泣而言曰嗟乎先人卒烈幼賤不能以有章顯也乃今䝉先人餘業與從縉紳先生之後又幸徼天子恩澤光我先人苟又墮先人之懿行不載罪莫大焉于是搜戢往事口授其友人唐某某受而書之如右重刋荆川先生文集卷之十五
