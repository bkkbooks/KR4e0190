  text: 重刋荆川先生文集卷之十五
  hash: sha256:063c7e9d455d2b8dee22763d37ca585e406bb3565cfe2df75fa3f5b7385bab6f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_015-1a}
body:
  text: 志銘封知府朱公墓志銘公姓朱氏諱某字某吳縣人也父東耕君謚以隱德爲里中所推至公讀書爲儒在縣學若干年以貢入大學在太學一年謝去歸老扵家明年子鴻漸第進士歴官兵部武選主事于是天子封公武選主事後鴻漸爲武選郎中巳而鴻漸守瑞州調守廣信又自廣信調守梧州而公復封鴻漸未去梧而公卒于家某年月日也公自少苦志讀書嘗寓蘓城北寳幢寺寺傍空室一區寺僧以寄棺槥其中歳乆積疊墻壁間鬼氣觸人戸無履跡公喜曰此真吾讀書處矣因獨携一童子徃讀書其中每夜中或晝風雨輙有聲隂隂若嘯若泣一童子者數以爲鬼也竟驚病死而公讀書其中如故公既以老儒生精扵治經又性喜爲詩所著有草堂集凡十卷蘓人故多以詩名家而近時則迪功郎徐君昌榖最著昌榖嘗數過公論詩公曰詩貴成家格卑弱固不可若規規摹擬前人逼真亦詞家大忌也且夫古之爲詩者以寓性情也得之扵體裁而失之扵性情亦安用詩昌榖深服其言故公之詩雖醖藉古人而要扵自寫巳意畧如所以對昌榖語然昌榖之詩則自海内藝文之士莫不喜道之而公之詩雖以吳之人士雅好爲詩者亦多不能舉其詞豈公善韜蓄以爲既隱矣不欲以言自文耶抑古所謂山澤之士必有待而後能施乎世耶彼其所謂有待者不獨操柄也雖文詞技藝若可以自振扵世者固亦不能無待也耶公既以讀書至老無所遇而發之扵其子副使君副使疆直有節槩不善與時上下其爲宦也亦徃徃多鯁自爲郎積若干年而始出守爲守歴三郡積若干年其最後徙梧梧瘴癘窮徼地也副使君訢訢然曰吾所聞扵家大人者如是吾何憾公亦訢訢然曰吾兒如是吾何憾公卒之三年某月日副使君始得地扵陽山白墡塢之北麓乃克葬公先葬之日副使君具公行事爲狀來請銘余雅善副使君其語當不誣爲之叙而銘之公娶李氏繼娶鄒氏子五人其長副使君鴻漸也次鶴鳴虎文雉膏馬良孫男九人承家承烈承宣承武承文余未名曾孫男四人享年七十有九銘曰學古爲儒委蛇歩趨挹其容者以爲此山澤之癯貤封自天有子則然署其墓者以爲此梧州之阡封知縣張公墓志銘翁姓張氏諱獻可字廷諫號東涯世爲無錫人給事中選之父也翁少頴敏嘗有志讀書矣以貧故資生事爲急也故不得乆從事扵庠塾絃誦之業以貧故資生事以多途也故嘗博通扵醫卜星暦堪輿佛老諸家之說然非其好也日奔走生事已至夜歸必篝燈讀經史不廢巳而更發憤習舉子業則年巳過矣家又無錢可行束修然經生碩儒以其志懇而禮謙也咸樂爲講解翁自以其年過而學也則益勤苦習師說已而援筆爲文輙數百言未嘗起草而㑹扵經㫖可以自奮矣然竟以年限不得㳺庠校而邑中右族則爭迎致以爲塾師翁既每自惜其志之不就及子選爲童子時而家故貧也則群之扵諸弟子中而身自教之翁教子弟嚴而有法温温誨誘不專訶朴故諸子弟視翁以爲其父兄其教選也嚴扵其所以教諸子弟者不廢訶朴故選視翁以爲其嚴師選既冠翁猶爲之改所業課而選畏翁一如童時爲塾師三十年諸弟子彬彬多成材者選以進士起家爲邑令能愛其民爲給事中有真節盖翁之所以成就之者爲深選令蕭山時翁嘗一徃知民之安其令而令衙清冷如家故時則大喜居三日即歸曰吾非就養也選以言事杖闕下罷歸翁迎喜謂之曰顧吾與若母兩人老耳死諫是爾職不死是聖天子恩厚無量也翁以子官封蕭山縣知縣始翁渉艱苦其後子貴身爲封官有輿厮可以代歩而翁踽踽行歩里巷中如故時翁居常遇人欣欣煦濡謙下後爲封官年且高邑中推爲耄耆而翁益欣欣煦濡謙下未嘗有自驕色扵弟姪睦扵夫婦無忤言待童僕如子女性慈惻既老則謂子選施無棺者棺畫圏扵𥿄爲圈者三千每施棺一則登其日月扵圈者亦一期盡始圈之數而續圈焉傭丐者掩道旁露尸掩一尸與錢若干丐者每得露尸則喜以爲貨也亟奔走告翁自是邑中幾無露尸者計所棺與所掩及翁之身巳數干人而翁且謂子選汝終身行之勿計數也煑藥膏以施瘡瘍者寒凍則爲粥以食餓者曰掩死人又何如活生人嗚呼可謂厚矣云云銘曰少也食貧貲不謀身既稍自餘乃謀及人及人謂何所重者䘮誰骼誰胔贏死不藏我覆我掩我槥我棺水免鼈魚野避烏鳶古維有位方春掩骼翁隱人也而專是澤銘以頌翁義風可作鈍齋吳公墓碣銘嘉靖甲辰吳翁有子情舉進士第三授官編修翰林其明年閏正月十有九日翁病疽卒年六十有二情解官奔歸將以明年丙午月日葬翁青龍之原合扵妻徐孺人之兆禮也先葬情既以墓中之銘請扵尚書孫毅齋公而復介其姻給事中張君屬余書其墓道之碣情因涕泣謂余曰情少爲郡諸生而大父始䘮是時先君與諸兄弟分産而獨持門戶益落莫不自支惟時時撫情慟哭曰汝祖固日夜望汝汝奈何辛卯歳情中試南畿還先君望見情泣曰汝祖固日夜望汝乃今不及見汝之有立也未幾吾母疾作明年正月卒先君泣曰汝母與吾共甘苦三十年且余教汝嚴父也汝母悉吾意時時課汝讀書其嚴乃更過我今汝始漸進取而汝母不待矣情三試禮部不弟先君每慰籍之癸卯冬且就試先君語曰汝不湏念我我近不到城市者十三四年朝夕惟唐詩數過杯酒五六行更無他望惟望汝勉強無愧古人耳甲辰情舉進士及第先君又痛吾祖與吾母之不及見也每語輙泣下時寓書扵情輙舉㑹試時所命題先事後食爲戒盖欵欵望情以不愧先資之言也明年而先君遂卒矣嗟乎自吾舉于鄉先君方痛吾祖之不及見也孰意未幾而遽痛吾母也吾始及第先君方痛吾祖與吾母之不及見也孰意未幾而遽痛吾先君也情至孤孽不幸人也又曰先君終始布衣無他大行可紀獨念先君性剛直耻爲譎祕媕婀之態其遇事雖不關巳利害亦公言激發無所避故嫉之者或乗其踣也相與搆而侮之先君挺挺自若也乆之搆者亦知先君之無城府也相與愧而服焉先君自若也先君且死戒母得厚葬而獨因舅氏語情願得當世名人一言扵墓吾即暝矣嗟乎情不及禄養吾先君而又墜其將絶之命是重情之不幸而不暝我先君也惟君其有意哀憐之始余未獲識翁而交扵情也乆自壬午歳與情同時入爲郡諸生則已竒情之爲人嘗竊嘆中世俗益薄士人稍得志輙恣巳矜物甚者怙侈饕餮其㢘耻徃徃出市道人下情自中第後益務謹飭逺聲利侃然有志㮣間嘗過余操十斛舟從贏僮一兩人徐與之言而深察其意氣盖絶與同爲諸生時無異余益竒情知其志所向與其後來所樹立未可涯也是足以徴翁之教矣且夫以情之祖與母不及見其孫與子之舉扵鄉與登第之爲可哀也翁及見之矣乃又不及少見其後來所樹立其亦可哀也余哀之而許之銘翁諱云云銘曰維天之道猶弓斯張高者下之抑者乃揚維翁之晦其後之昌其昌謂何冠此多士冠此多士不獨其藝砥礪㢘隅曰維先志以邁厥跡以顯厥世沿流泝源以爲翁誄茅處士妻李孺人合葬墓志銘茅處士者進士坤之父也坤爲青陽知縣數月有聲而奔處士之䘮以歸歸而又䘮其母李李之䘮距處士䘮僅三十五日而處士䘮之日則嘉靖庚子八月二十二日也其三年癸卯四月十二日乃合葬扵唐家村之原唐家村故處士所㳺息處湖俗以桑爲業而處士治生喜種桑則種桑萬餘唐家村上居常自言吾死第葬我扵唐家村且死者有知吾得覩諸兒荷鋤携筐徃來吾墓上何不樂之有哉處士死坤徧求地扵湖之諸山不得及得卜之處士不吉後乃卜之唐家村遂吉坤曰此先君子意也扵是葬之唐家村之原先是庚寅之歳處士嘗病幾死㑹有相者過處士曰翁相未死勿憂也已而私謂坤曰翁其死扵䑕之歳乎後十年坤舉進士例得請歸省而歳在䑕坤家居頃之乃就選然心獨念相者言欲去處士則不忍欲留又難扵爲言而處士在布衣中雅喜爲詩又躭好山水嘗欲邀諸詩客相與入天台鴈宕訪赤城佳處以爲快扵是坤即婉謂處士曰大人不記天台鴈宕之㳺乎兒一旦綰印綬作吏縱欲歸必不可得何不令兒以此閒時奉大人徃游其間坤意姑欲以是緩行耳于是處士揣知其意罵曰吾日夜固望女立功名幸始入仕奈何以吾故趦趄且吾欲徃游即自徃耳固不令女廢公家事從我坤不得已乃就選居青陽數月而處士死如相者言處士且死猶張目咄嗟以竟不得徃㳺天台鴈宕自恨而坤亦自以不能堅持𥘉說濡忍數月奉處士終言之輙嗚噎不自得至是且葬坤以其友人董吉士份所爲狀來請銘按狀處士諱遷字于善號南溪以其居歸安之華溪也處士爲人豐頰而髯魁岸自豪意氣軒軒若不可羈然槩其平生亦少所出入扵繩約其面折人過若硜硜不少譲然善忍或睚眦之不爲報也人亦竟無睚眦之者其少治生不業儒然喜談詩翩然有逸士之風其治生操縱出入心算盈縮無所爽然未嘗以錐毛恡惜爲事而割田以衣食其族之人爲屋以歸其族人之流而徙者坤之舉進士也處士爲之破劵若干金妻李孺人有婦行處士魁岸意氣而孺人佐以和柔静黙尤善處嫡妾間掩瑕絶嫌人未嘗少見其隙𥘉處士同邑施翁隱居行義崔太史子鍾銘其墓曰古之鄉先生也處士每過翁墓輙慷慨低囬乆之嘆曰人生何必赫赫吾他日竊從遊扵地下第爲里隱君子不負此生矣間嘗語坤曰即吾死誰當銘我者坤跪而請曰唐司諫乎處士喜曰可矣故其卒也坤爲之來請銘嗚呼處士其有意扵身後之名也乎雖然此亦足以觀處士矣處士云云卒年五十有三孺人長處士兩歳而同時以卒茅氏故居邑之埭谿宋元間以治篾爲業東徃市海上經華溪飯而沉其碗以爲祥曰天使我飯扵此乎遂捨篾而家華溪八傳至處士家益饒子坤始以文儒進云銘曰唐村之原有欝維桑兮生也游扵斯死以爲藏兮赤城之墟仙人所嬉兮生也不得㳺扵斯死而魂氣之兮秋野殷公墓志銘殷生邦靖從余游嘗與余言其大父秋野翁之行甚具余時獨心善翁未幾翁子文輝以吾友施子羽所爲狀來請銘狀中事多與邦靖所說叅合余徃無錫問其邑之士大夫與其街衢巷陌之人皆曰翁長者也余益知邦靖所說與狀皆不虚余覽史傳所紀長者大抵多詭情以釣竒至償金不復辨認牛不復問諸如此類史家以爲竒而列之長者然余以謂長者正不必然如秋野翁在族戚能無尤惡扵族戚已矣在郷曲能無尤惡扵鄉曲已矣未嘗有意騖竒節爲名高然其處心行巳亦徃徃多出扵過厚一士人子負翁錢不能還自請以女婢翁翁不忍竟還其劵嘗亡金篋中踰年盗不得已而邏者踪跡盗盗乃故翁所舎客客囚而見翁翁駭愕若固盗耶且金安所用客跪吐實曰余之妻公之金也請得賣妻以償公幸不獄死足矣翁惻然更乃出錢以與邏者求脫客而私語客曰女吾客也雖以此十數金贈女不爲過柰何以瑣瑣故絶汝夫婦之歡吾脫女女可自抆拭客叩頭涕泣謝去客本善星術故翁嘗客之後客竟爲善士而以星故走江湖間數過無錫具土物候翁欵曲乆之乃去翁所居並醫局嘗有海寇邑吏鳩工即局中高敞地繕軍噐爲備衆乆役疫作人相枕翁乃日擣椒蒜和酒以徧飲不病者而大鑊煑藥以徧飲病者又日令不病者一人給事病者五人時其藥物而掖搔之已而不病者得不染其病者徃徃得活相與詣翁羅拜手加額爲謝後數年有人與翁相讐翁子應試南京過毘陵驛讐者狙人驛旁伺翁子欲毆之沮其行翁子大宭忽有驛卒數人躍而前助翁子與之力闘翁子由是免扵難既免而詢諸躍闘者乃故嘗役醫局中翁所活者扵是翁子欲厚報之其人謝固不肯受競還家持果與雞饋翁子然後去此數事皆世所謂過厚然翁處心本如是未嘗矯而行之翁父病痰閉不可飲食屈伸翁夜禮北斗以禱已而夢一黄衣力士以刀刺其頸疑不祥甚明日驀有軍人黄姓者造門自言能醫此疾翁異之果以針刺喉中出穢痰而愈如所夢者然翁未嘗言扵人人亦莫之稱也翁諱俊字時選殷氏自布政公以才見竒文皇帝而其後遂爲文獻之族至翁以隱行著而翁之叔季子姓多爲儒者翁始以輸粟授冠帶非其好也因自號秋野以寓其蕭散淡泊之志云布政公生璉璉生廣成廣成生翁殷氏之先自毘陵徙家無錫之嚴埭又自嚴埭徙家邑中其家邑中也自布政公始翁配三孺人有賢行先翁二十五年卒邵文莊爲志其墓子一人文輝云云翁年九十歳乃卒嘗以耆老請爲鄉飲賔者凡三十年應詔與賜老人粟帛者凡六墓在㠏􅣦山葬以嘉靖年月日其卒也先葬之一年八月十六日銘曰漢世論人必先長者寥寥誰哉嗚呼秋野蕭孺人墓志銘嘉靖巳亥冬南京浙江道御史臣正色奏言扈從章聖梓宫諸貴人不法事諸貴人奏列御史罪狀自辨天子逮御史扵獄竟寛之使戍邊下兵部臣定戍所遣去而兵部臣故御史嘗所劾者扵是御史戍遼之瀋陽御史家故在無錫其明年妻蕭孺人卒扵家御史爲人慷慨有氣自始爲御史數獨自閉門草䟽不令孺人知孺人時時從隙窺見之自念不能沮又不能忍則欵欵爲好語解之且曰母騷瑣生事爲也已而御史得罪御史既上䟽則衷囚服而襲豸服以聽臺事後逮者至御史自臺囚服出不過家徑去孺人携諸子倉皇南歸且憂不測遂病聞戌遼報稍解矣乆之竟以憂病死辛丑六月十日也年三十有九孺人父蕭愷母錢氏御史黄姓士尚其字孺人性謹厚其歸扵黄也事後姑左右朝夕十余年竟後姑死未嘗有一違言愷有女弟老而寡且窶孺人迎以歸與共哺糜廿餘年竟孺人死未嘗有一厭心人以爲難𥘉士尚爲仁和南海兩縣知縣孺人從士尚果决負才氣見事立㫁無所避其扵權勢人鯁鯁欲繩以法而孺人濟以和柔温慎其所匡助爲多士尚㢘則孺人以儉約自律也在官中躬絲枲織布如村居子四人學詩邑庠生娶某女學禮聘某女學海聘張君舜舉女舜舉名選故給事中以言事罷爲民與士尚同年其意氣同也扵是乎姻孺人葬以卒之歳十月某日墓在某所將葬士尚自瀋陽以狀來請銘余觀漢史所載王仲卿戅而狂好數言事其妻每抑止之仲卿曰此非兒女子所知後仲卿竟殞妻子亦徙合浦余讀而悲之以爲臣之娓娓扵其國妻之娓娓扵其夫皆期扵自盡而已其事則若相睽然臣之扵國耻其不言妻之扵夫恐其有言嗚呼臣之難自古紀之矣今士尚幸遇天子至仁聖有仲卿之狂戅而免于仲卿之戮是孺人所遭過仲卿妻逺甚然史又載仲卿妻徙合浦後赦歸更以采珠爲富人家今天子至仁聖且將脫士尚于伍藉而還之以與孺人相朝夕也有日矣孺人乃不幸死不得如仲卿之妻特蒙後凋之福吁其命也夫余哀而爲之詞孺人以御史故得封御史在戍矣稱孺人者罪不及孥也詞曰謂媛之生兮處深閨兮心奚所思遼水之涯兮謂媛之死兮閟幽室兮魂奚所遊遼水之側兮盛孺人墓志銘盛孺人蘓之太倉人盛君諱某之女居庸山人顧君存仁之妻嘉靖丙申山人爲給事中上䟽笞扵闕下謫爲民保安州居居庸孺人從之居庸踰五年而歸歸至家幾月而卒辛丑某月某日也年三十有九𥘉孺人既字扵顧而遭母䘮于是童而婦扵顧爲童婦三年而室扵山人孺人既以童而婦婉婉自屬扵其姑錢孺人姑亦極意拊育之如其女孺人居常謂山人曰姑吾母也即姑百歳後願加服䘮三年以報姑姑性好㓗而嚴孺人所爲縫紉漿酒糔餈滫瀡之具必以㓗恐一不當姑意且得罪姑或不懌必跪而請罪不敢起及從山人扵京師遇美飲食必思而泣居居庸時時與山人焚香南向拜且祝幸早見姑巳而聞姑病日夜泣遂辭山人歸歸而道病既至家強力羞藥物食飲扵姑病且革憗而呼姑姑至與訣遂瞑數月而姑亦死孺人自少讀小學孝經書頗解意㫖故平生喜書然獨不喜佛書中饋有間則取小學日記故事稗官小說家誦說之每至古人壯節偉行則擊手詫嘆以爲烈士當如是若自恨其不得爲而隂以縱史山人然者其始娠山人且㳺學慨然與之别曰君行矣謹母以室家爲意别三日而産子山人且上䟽與孺人對坐土榻上夜草䟽忽若有鬼物嘯户外孺人巳心訝其不祥然竟不一語勸止及受笞以死報者三心苦之然不爲動或怵曰事叵測柰何可蚤自脫不爾且及亦竟不爲動山人舁居庸而孺人尚居京師時寒凍雖諸僮皆苦楚窮徼莫肯徃孺人獨以一女子提衣粮觸風雪爲諸僮先﨑嶇走塞上就山人㑹山人病瘡劇左右䕶持百方乆之山人以不死其居居庸也雖以不得事姑爲慼然未嘗有一日覊愁不可忍之色故山人亦安之既死且葬山人爲之狀其行來請銘嗚呼士鮮慷慨之節乆矣豈其素所自樹立者盡然或者鉤牽兒女子語故噎噎不能自割然則如孺人其可多得也于是許之銘子三人可立太學生次可大早卒次可興女一許聘陸某故冡宰公孫墓在太倉新安鄉祔錢孺人之兆其葬日爲卒之又明年癸卯某月某日始山人爲給事幾月而孺人封以恩也銘曰北瞻居庸崇山崔崔匪夫之故胡爲乎來南望吳門既阻既逺匪姑之故胡爲乎返間關而來間關而返今其休矣即安扵坎楊孺人旌節碑銘嘉靖十有三年知常州府臣檟奏臣屬邑無錫無錫諸生棟等若干人父老㢘等若干人詣臣言楊氏婦守節事甚具臣聞守令以興教化美風俗爲職也臣謹以楊氏婦守節事上聞者婦故邑人俞暉之妻邑人楊復之女自少從父叔識字通書史大指歸暉六年而暉卒婦痛䀌幾死及葬俞氏墓故在惠山㑹風雨不能舟婦匍匐即路以身翼棺哭且走躑躅泥石間觀者皆欷歔有泣者凡十許里乃抵墓所以克葬事自暉死時婦始二十有八歳二子長者始五歳舅姑且老矣而暉故儒家無宿貲可藉于是姻黨憐之欲奪其志而前時暉且死猶強起書雪操冰心四字與婦訣婦粘之寝壁坐卧瞻焉至是指而謂其二子曰而父知余心矣余即死敢二乎則又指二子而謂其人曰余所以忍死者爲此而已不然余何愛焉婣黨諒其志遂絶口不復言也居常内外女婣宴好絶不徃來曰我孀也宜然至老猶然姑嘗末疾踰屢歳湯藥禱祈拭掃温扇至扵頮盥櫛沐扶抱吮摩抑搔便液之事必自親之一不以屬僕人二子稍長親授句讀後雖巳就師每夜歸必篝燈火與相對以助其勤時時稱說暉之音容嗜好及其蹈履與其所志焉而不遂以待其後者幾以朂二子且使識勿忘也今二子皆強學有立其一爲鄉試舉人曰憲其一爲諸生曰寰者也臣謹按楊氏婦有不二之貞有撫孤之義宜旌婦今年及五十歳矣扵旌格應臣檟昩死奏制曰下禮部禮部臣請命廵按御史核實御史臣蕙奏臣檟言不妄禮部臣覆奏制報曰如令于是禮部下常州府給錢立綽楔遂如令後四年而憲舉進士孺人從憲扵京師病卒反柩扵無錫將葬憲詣余請曰子其爲憲母書墓隧之碑匪敢曰以嘉惠憲母其以對天子之寵命而章守臣之不蔽善也不亦可乎余既以許憲因自念嘗讀漢史黄覇傳覇爲相課郡國計吏以郡國有孝子弟弟貞婦順孫者爲一軰先上殿而張敞非之以謂此無益扵㢘貪貞忒之行而適足以導僞長謾覇敞皆世所指才吏其相反何也夫有善而不見褒賞謂之匿褒賞不當其善謂之誣匿且誣其敝也均今國家表崇節義之意至慎重也而草野委巷之間力不能自逹則或不列扵褒賞其列扵褒賞者參輿人之論乃或十一異同焉以古較今不甚逺乃知敞之言扵漢要未爲過余家武進徃來無錫間問其邑人邑人之賢俞母者相屬也私論之與公褒可謂參合然則守臣檟之爲此舉也其可以當黄覇之賞而免扵張敞之譏矣乎余以是具載其文且爲之銘曰扵皇有明風軌是敦貞婦弟弟孝子順孫有一扵此帝罔不聞大者祠祀小者樹門歳之甲午守臣檟言楊女俞婦孀三十年維居之艱維節之完維帝曰咨朕其試哉爰命廵吏其核以來御史蕙對守言不妄維帝曰咨朕心所貺乃按甲令乃表厥宅嗚呼豈一人之爲來者是式王母繆孺人墓志銘余同年信陽王養之至京師携其兄所纂次其母繆孺人之行請余銘諸其墓余嘗徃來信陽時孺人沒未乆鄉人多有能道孺人事者余聞而善之又嘗㑹養之之兄及姪之爲州學弟子者皆秀而有文盖徴孺人之能教也遂許之銘而養之又言爲其卜墓地時頗有竒恠始得二地堪輿師不能擇疑不决者乆之忽一夕孺人夢若有告曰某形者吉蛇形者不吉覺而語諸子諸子駭之問堪輿師堪輿師𥘉亦不知其爲某形某形也復至其地熟視之則某地果某形某地果蛇形一如夢中語乃徙某形者竟吉嗚呼聖人不語恠若此者何說耶則傳中所稱牛眠而馬嘶者其皆可信矣乎孺人信陽繆君諱家之女王君諱虎仲威之妻孺人嫁扵仲威若干年而仲威先卒是時諸孤六人其㓜者四人尚髫齔也孺人恐墜門戸督諸子稍長者使服田賈治生産不得游蕩擇其㓜而敏者教之讀書而日課其程每漏下五鼓親叩寝戸使就燈火後諸子皆長大娶婦諸孫且斬斬孺人亦老且衰矣猶教之不弛扵曩時有不率教者雖斑白必加誚譲或至鞭笞之不貸其嚴如此性素慧好聴古書列傳談說理道者惟恐不得聞至扵里巷不雅之語惟恐聞之能薄飲食諸子有進重肉者輙不食至奉賔客未嘗不豐㓗勞扵治家能拓其業至扵周䘏貧匱爲粥以食饉扵歳者雖費無所惜此孺人之行其子所自爲叙與余所聞扵鄉人者大率近之矣孺人卒扵嘉靖十有一年某月日年八十有七子男六鑑鎮欽鑰鎬銳鑰州學生銳余同年進士也今爲武昌令銳𥘉調崇明令以海道險不能迎養爲憂孺人曰地之夷險惟君所命汝弟安之况有汝諸兄奉我汝母以我故阻抑其志且此未必非福也曾無戚容後銳以能調曲周又調安邑孺人聞之曰當益慎其官則可亦竟無喜顔故銳數爲令多以能稱孺人教之也女二人與子某皆先孺人卒孫男十七人某某皆州學生𥘉余既許之銘乆未有以應也後余家居而銳爲武昌令遣使來速銘乃克爲之孺人葬以某年月日合扵仲威君之兆故孺人所夢處也銘曰有崇斯墳神所惎也山鬼獲門辟魑魅也氣如春温君子憇也生以爲婚死不離也䕃彼後昆永無匱也蔡母鄒孺人墓志銘蔡生瀛䘮其母鄒孺人將葬請銘于余因泣而言曰嗟乎吾母之生也俻嘗艱苦而不獲享一日之逸吾母之殯且葬也僅于歛形無以厚其終而恔于心此昔人之所爲痛心而自傷其貧者也瀛也柰何既而曰吾母雖欝于生前庶幾可彰于身後雖葬不能俻禮庶幾可藉此一片石而貽吾母以不朽也惟先生幸哀憐之𥘉生嘗學于予予固喜生之貧而有志也于是許生爲銘其母取生所爲狀而叙之云鄒孺人者無錫鄒君廷章之女蔡君元際之妻邑庠生瀛之母蔡君雖大族然貲故貧君又倜儻不事畜藏囊篋屢空然而左綴右緝如𥙷敝衣僅而獲完者以孺人爲之經營黽勉于其内也生瀛學古爲儒不以貧故墯壊其業而隕獲其志以孺人爲之母而教督之也孺人父卒母華孺人獨寡居使華孺人無子而有子以孺人爲之女而迎之使就養于蔡也蔡君前所娶華孺人既殁而所遺子女無母而有母者以孺人爲之後母而長養婚嫁之使與巳子女同也孺人之爲婦也如夫有幹蠱之勤焉爲女也如子有終養之孝焉爲後母也如母有鳴鳩之均焉而享年止于四十有七不克與夫子偕老啜菽飲水之奉亦不克食報于其子於戯此瀛之所以重爲悲痛而必求余銘者也孺人子女孫云云卒以嘉靖年月日葬以明年月日合于茅塘華孺人之兆禮也銘曰婦徳含章弗耀厥美曷銘孺人吾識其子作銘者誰維太史氏銘如可㓕石亦可毀賀氏孫楊二妻墓志銘代父作孫孺人者大學生賀君汝勉之妻而楊孺人者汝勉之繼妻也孫孺人卒于正德庚辰七月四日而楊孺人卒于嘉靖辛卯七月八日至是爲嘉靖丁酉十一月二十一日始同葬于先塋之次其地曰官􅄵而汝勉因以二孺人之銘來請于余余有女嫁于賀而汝勉之女又妻于余甥余女與甥徃徃能道二孺人之行而况鄉進士姜君爲之狀可信也乃不辭而許之孫孺人父承事郎諱堂楊孺人父承仕郎諱昺孫賀皆丹陽鉅族而楊之族亦望于無錫故二孺人相繼歸于賀氏有朱陳之睦焉而二孺人者又皆柔惠婉娩克嫓厥美盖若生于一家而非二姓之女偶然以聚爲一人之婦者𥘉汝勉未有子是時汝勉與孫孺人年尚少可以有待而孺人巳爲汝勉置側室且日夜冀其有子甚于自冀其有子也及病且死猶惓惓以賀氏無子爲意而属其妾曰汝無子吾不瞑矣又属其女曰妾幸有子汝同胞也汝善視之其望深而慮逺如平常時而不自知其身之悲也孫孺人既沒而側室果有子其後楊孺人自有子與女矣楊孺人撫側室之子如孫孺人之志而均之于已子不曰吾子嫡也楊孺人嫁孫所遺二女悉其装以遣之不曰留以嫁吾女也此凡婦人之所難而二孺人能之其操行大畧相同而孫既無子楊有子矣又夭孫年止三十有七楊年止二十有七又皆不幸早世嗚呼此汝勉之所以悲慟而必求予銘之使二孺人有傳也雖然顧予不文其能使孺人有傳耶汝勉子二人楊孺人生一子九歳而夭其一曰某聘何氏側室劉出也爲楊孺人所撫者而其母故孫孺人所置也女三其二嫁楊銳周書皆孫出而銳者余甥也其一尚㓜楊出也爲之銘曰其生也不相識而死其同宅以寕厥魄其死也不偕行而葬其同銘以垂厥聲楊母唐孺人墓志銘唐孺人者余大父給事中曾可公之女余父永州知府有懐翁之姊余順之之姑知冠縣晉齋公諱溢之婦太學生東墅君諱墉之妻給事公與知縣公同年也故孺人以字扵楊孺人性孝而惠少從給事公扵官給事公卒孺人從其母周孺人與弟有懐翁扶襯歸毀而嘔血幾不可藥積數年乃止及歸東墅而東墅嫡母金與生母潘孺人事之兩得其心中歳姑金與東墅君相繼卒孺人㷀煢遭兩䘮哀慟積痞而痼晚年又遭叔父䘮慟而又病病少間痞又作遂不起嘉靖壬寅八月𥘉四日也年六十有三自孺人始嫁時楊氏門戸方盛舅姑皆無恙家事一不以關孺人而衣食饒給周孺人又甚愛其女欲數見之孺人不數月輙一來每來必月留乃去既去則我饋遺問訊之使日不絶扵路孺人亦數相報以爲常當是時孺人不知爲婦之勞而晏然有爲女之樂後周孺人既沒舅知縣公亦物故東墅與其兄析産東墅又少讀書不善治生則家日落于曩時孺人上奉寡姑下釐家務井臼蚕績必自􅍾之而亦不能如曩之饒給也後東墅又死其子又析産爲四則家又益落自周孺人之沒而孺人獨與其弟婦相際則歳乃一來其後又獨與其諸姪婦相際也或四三歳乃一來其饋遺問訊之使其數與踈亦率如其來之數孺人徃來母家既稀濶諸子又各自謀生或携妻子徃田廬治田或徃贅于婦家孺人更悄然寡居而黽勉有無至老且病或不自休也盖孺人所歴于夫家與母家凡三世而三變嗚呼此可以知人世之感矣有懐翁與孺人最友愛孺人病且死而有懐翁適官永州以是病不及候其藥沒不及慿其尸病則姪順之徃候其藥沒則姪正之徃慿其尸而以訃于永州𥘉孺人送弟徃永州泣之甚曰吾其不及見吾弟乎至是竟死且死謂諸子曰汝諸兄弟幸輯睦吾不恨矣嗚呼諸子其終奉孺人之教以周旋乎諸子勉之諸子者銳鎜鐈鉷也鎜太學生鐈鉷郡諸生賀氏周氏鄒氏沈氏其婦也鄒婦先孺人七月而卒遂與孺人同時以葬鄒扵諸婦中最孝故其卒也孺人哭之極哀遂以病女一嫁郡諸生蔣瑫孫男五葬以十二月十五日墓在袁塘之原合于東墅君之兆將葬壻瑫既爲之状而順之乃銘曰夫竁其中旁有令婦孺人歸此其永不朽吳母唐孺人墓志銘吾唐氏之先以詩書長厚創其家子孫相與守之其女子亦徃徃有化扵其風者若孺人其一人也性喜書自孝經女傳諸所常誦之外至扵毉藥卜筮種樹之書顧不如專門家耳然未嘗不通其㫖其試之亦數數有效徃來姻戚所或見有異書及諸稗官小說輙携取以歸旬日而還之則既誦習之矣既老尤喜佛與道兩家言日𬞞素食焚香宴坐或夜中起坐若有意乎齋心修觀之爲者嗚呼使孺人不爲女子其可以語扵儒者性情之㫖矣乎不然亦當爲博渉多藝能人無疑也其禔身不爲矯飾然子女䙝御日在側未嘗見其袒衣與其見齒之笑其治家耕織累積絲粟然施藥與棺饘粥餓者至不以脫簮賣衣爲解其扵族里雖其襫襏藍縷之㣲待之未嘗不如富貴人其扵姻戚雖其幾世之逺姻歳時棗栗腵脯之問施之未嘗不如近姻以是族人皆曰孺人有德扵我其姻戚皆曰孺人未嘗失禮扵我性柔儉慈静不色笑而其氣温然其扵父母舅姑尤篤既嫁至老數十年間每語及父母苦楚輙欷戯泣下舅姑既沒數十年間孺人亦已傳家事矣惟四時饋奠必躬滌濯羞殽烝以爲常孺人之卒也以歳祲避寇城郭痢疾五十日卒嘉靖乙已七月廿有六日也享年六十九月十日返葬扵董墅里合扵其夫榆林衛經歴南墩公之兆禮也南墩諱静夫姓吳氏舅曰七品散官水南翁諱良瑞姑曰張孺人父則余大父給事中贈奉訓大夫曾可公母則余大母贈太宜人周也子一人國平云云孺人同母三人余父永州守有懐翁其一人也姊一人嫁扵楊先孺人三年卒姊病時孺人徃候姊左右抑搔給事者月餘姊與之金墜胸爲訣至是而孺人亦死盖有懐翁三歳而遭二同母之䘮哀之而不忍銘也謂順之曰小子銘之銘曰産扵郭歸扵鄉終扵郭瘞扵鄉盖魂氣何所不之而骨肉兹其永藏王冡婦唐孺人墓志銘孺人姓唐氏常之武進人戸科給事中曾可公之孫永州守有懐翁之女禮部郎中無錫王君九岩之婦編修王懋中立道之妻而余順之之妺也孺人後其兄五歳而生扵姊妺行爲第三孺人㓜頴慧紃組字書不煩扵教而若素爲之兄每曰惜女不爲丈夫子而有懐翁亦爲之擇壻後乃得懋中十有七歳而歸二十有六歳以懋中官編修故封三十有三歳而卒其婦扵懋中者十有七年王氏故饒而懋中又少貴也孺人從扵宦者十年然所服御一不改其素非賔燕不設兼肉或懋中偶飯扵他所孺人輙爲𬞞具問之曰吾適不喜肉耳惟爲懋中肉必手調或一飯數起以爲常懋中始未有子而孺人齒僅踰弱也然已數憂之一日自歸寕載一女子俱還顧謂懋中曰君大宗之後也不可以不亟圖此扵卜相皆宜子故爲君聘之既乃時時爲理膏沐笄櫛飾容止惟恐不當懋中意者嗚呼吾母任宜人有少君裙布之儉是以諸女化之而孺人能淡泊撙約扵既貴之後任宜人有小星逮下之慈是以諸女化之而孺人能委曲置妾扵方盛之年盖所濡染者然也孺人事其姑朱安人朱安人煦濡温厚無與比孺人扵諸姒中尤曲得其歡是以孺人每自喜以爲其在姑之側也如在母之側也其事懋中懋中簡重詳慎内行修飭孺人揣其意所注輙婉爲將順若恐傷之然懋中或有㣲過則終日不自得其有善未嘗不力從臾其間是以懋中每自喜以爲吾得吾妻也如得吾友也孺人從懋中而北也其念朱安人數千里外欵欵然如在朱安人之側也其辭懋中扵京師而歸事朱安人也則念懋中數千里外欵欵然如在懋中之側也既死且憒矣索杯羮嘗之以爲甘也目女奴使進懋中所盖猶如在懋中之側也嗚呼悲矣孺人卒扵嘉靖甲辰五月二十一日𥘉懋中在京師欲請歸省令孺人先歸時暑月舟人病寒熱相染有死者孺人以一女子携數㓜兒女與病者同載歴險數千里固已心恐憔悴幸不病抵家未一月病遂作再旬而卒其病亦寒熱也子一人化弘聘太學生安子介女女二人其一人者母故孺人歸寕時所載與俱還者也嗚呼吾宗自吾曾祖贈給事公而下其男子幸不絶衣冠而女子之貴則自孺人始孺人姊妺凡六人以夫貴者于今兩人其未三十而貴于室也獨孺人爲然然卒奪之年以死豈其豐其嗇固皆適然而值之者耶抑亦數之定而不可益損者耶懋中將以丙午春正月三日葬孺人于前王村之新阡懋中既述孺人之行爲狀矣而余爲之銘曰史氏之妺史氏之妻史也狀之史也銘之後有考者其將在兹封孺人荘氏墓志銘孺人病踰三年嘉靖戊申冬十一月二日而卒年四十有一孺人之病也積扵驚發扵悲蹙扵欝庚子冬余以狂謬俟罪者二十七日孺人寤寢惕惕若其夫蹈不測而已不能以生然者既蒙恩免歸孺人抱餘驚就途抵家熱蒸骨如是者數年熱漸解而瘠則不復肉矣未幾母陳孺人卒臨尸而驟淋盖醫家悲動肺之證也每淋輙暈死如是者又二年淋既止而生氣耗矣自是䐜腫瘕泄百痛間作既病甚則念其二女未有所歸又以爲女縱得所歸而已且旦暮死不能終其奩具䄜帨之事以爲欝欝雖其病必不起而其蹙之也則若以是然者叢三不可解之情以竟成三不可藥之疾嗚呼其可哀也巳孺人荘氏河間守鶴溪公之女孫静思翁之女永州守有懐翁之婦其夫余順之也年十七而嫁二十六而夫爲編修以恩例封孺人孺人始嫁見扵舅姑舅曰所嘱婦者無他第閨外不聞婦聲足矣自是舅徃來閨外竟廿餘年不識孺人聲舅每嘆以爲能婦余癖扵書平生不一開口問米塩耕織事則以孺人爲之綜理也余最迂僻寡合入門則歡然若得朋以孺人素能得余心事也其與余處者則然而其鍾情母子間也特甚自父母之慕雖男子或移扵妻子而女子扵父母家記禮者亦外而不内孺人雖以與余廿餘年之歡未嘗一日輟其母子之戀其所爲父母家計者黾黾焉悉其乏而排其難較其家事未嘗少内外之也其教二女也愛不廢嚴其教子也嚴過扵予其封十五六年余未嘗爲置一翠冠其所享率如是孺人固不少讁望我而余所居官每不能過慎以速咎則孺人口不敢止也而心切苦之故余嘗謂孺人女也而任子之事母也而兼父之嚴未嘗過享其夫有官之奉而蹙于其夫有官之累然則所謂三不可解扵情者盖不獨其致疾時自其居常則然也孺人卒扵鷄鳴時燭入則漸矣自其夫及其女與妾與女奴皆有囑囑余者曰吾身後而當爲計則然又曰篋中衣以歸二女餘衣以與妾已而曰田五畆以遺吾家然則其不可解者又不獨其疾時及瞑猶尚不能解也孺人有烈性居常不媚笑語如荘士又每聞余死生之說若有契焉故其卒也精明若此葬且迫不及請銘扵當世之君子而余又茹痛不能詳也謹述其死生大致以見孺人之平生子一人鶴徴聘萬氏禮部主事思節之女女二其長者以字行太僕卿孫公南野之孫臬則卒之前一月也葬以卒之年十二月十九日祔扵姑任宜人之墓而先一年則余弟婦窆焉孺人事姑六年而姑卒其妯娌間姊妺也余既已載之弟婦誌中矣故扵孺人之葬也爲之辭以慰之曰姑扵是只娌于是只生苦離只死相隨只弟婦王氏墓志銘弟婦姓王氏尚書文肅公之曾孫女應天府經歴横山文炳之女余父永州守有懐翁之中婦余弟郡學生正之之妻也年十八而來嫁其生而貴家女也既嫁而驟見余儒生家所尚一旦解去所御金簮珥悉易以銀而褧其華衣至扵中饋女紅率常身先諸僮奴其所解去金簮珥又以之易銀爲本而經營什一之息拮据勤生若素處窮約然者其性警慧爽豁故扵人情世務不習而暁家人尊卑上下一無不宜其舅稱之曰余中婦最能㓗茗精饌以適我意扵是賔客茗饌有不盡以分属之諸婦而多以属之中婦者其母徐孺人聞之曰是在我側固然固知其能事舅也其姒余妻荘稱之曰吾嬸最能得我心事扵是心腹委曲有不可以諮扵其夫而必以諮之姆嬸間者其姊妺聞之曰是在姊妺中固然固知其能睦扵其姒也其始歸余弟三歳而兩娠皆半胎而堕即以後嗣爲急偶余弟從余自宜興歸入室見一女子訝問之知所置妾也余弟靳靳以年始弱冠爲辭不御而遣之後五六年竟無子乃更爲置妾至親爲之膏髪整容惟恐不當余弟意居常夫婦間相得歡甚也及置妾則每割牀第之愛若使其妾得以時御焉而不以已故妨之者其在姊妺五人中最得其母徐孺人意𥘉横山公卒母以意遺之二百金乃以母當總總時不忍受其後母病且卒以金簮分與諸女爲訣其所分又獨倍諸女乃復以獨厚爲嫌而併辭其所同得者嗚呼其能置妾扵中年無子之日不足爲難而能置妾扵少年始婚之時則爲難能辭金扵母存之日不足爲難而能辭金扵終母之身則爲難盖其自少知書稗官小說終日未嘗去手每覽至古人竒節輙激烈自詫恨其不爲男子余以爲正使其爲男子必能磊磊植立不􅎱妬以敗人之國不貨賄以自汙其身可知也與余弟夫婦間相得歡甚而警戒相成之者尤切始余父宦扵外余獨與弟居弟或所過動也乃不喜而謂曰子縦不自愛其若汝兄何且又爲之隠䕶不使人知盖恐以是見尤扵其兄而或至扵相踈也弟有一善可稱也則喜而謂曰非子之能其汝兄薰染使然盖以是深動余弟而欲其與兄相親善也以是余弟能知疆扵爲善而兄弟之好益密彌縫縱臾其間盖有助焉以彼才且賢宜其多男子享高壽而竟以無子夭死其死也又以産此則理數之不可知者也自其始連娠而墮則已不專意扵自娠矣既置妾固日夜以娠望之妾也及自娠矣衆且以不妬之報庶或在此而竟以是死謂之何哉謂之何哉其卒以嘉靖丁未六月𥘉五日年二十有九葬以卒之年十二月十三日祔扵其姑余母任宜人兆之右方銘曰詩詠螽斯詵詵振振嗟彼淑媛罹此不辰譲娠扵妾不欲自娠幸自有娠卒灾其身造物報施孰云可信惟其美行乆而不泯伯氏銘之以垂家人行狀月樓唐翁行狀月樓唐翁武進人也諱世美字某月樓其號大父封寺副諱某者生五子仲子復爲大理寺副後守平樂有宦績載在國志封寺副之少子贈給事中諱某號友蘭翁生四子長子爲給事中翁其第三子翁貌魁岸爲人倜儻負氣嘗從伯兄給事公指受章句能渉獵記誦然家故産薄而友蘭翁又病癱卧米鹽毉藥婚嫁百費叢扵伯兄伯兄又方日夜治經史聚徒而教之其勢不相給也翁以故廢其學而營扵家翁雖已不治經然不輟文墨其間時則作爲草書遂窮極竒變闔闢閃縮上逼懐素詩歌有唐人風骨是時翁伯兄既以文雄扵當世而季弟竹窓翁善畫尤以草蟲名一時言文章字畫歸唐氏云伯兄爲給事中值敬皇帝在位言官甚見親幸有權給事公素小心慎事屢爲書與翁大要教之謙下母輙入州縣門即入必傴僂不得騎閭巷徃來戢族屬僮奴不得閙街市中翁遵其說而行之是以唐氏雖世宦然未嘗有子弟爲鄉里所苦者後三十餘年嘉靖某甲子翁年七十餘郡太守請與蜡賔後若干年詔賜天下老人粟帛八十以上冠帶翁扵是始冠帶然始一服之後不更服也嘗一與蜡賔後太守連歳以故事請然亦不更徃其好省事如此始翁壯時唐氏以給事公故方盛給事公自爲庠生有名聲已能盡致數邑客後爲給事賔客益輳翁家居則應接賔客出則從親朋隣里邀請酒殽之㑹投壺陸博遨逰宴笑之歡碌碌不絶翁每所過輙爲上客議論常摧其一座人以是人益貌之後翁既老兄弟物故盡平生故人多不存存者亦衰且病不能相徃來矣翁又失其壮子獨携二㓜孫以居雖門外終歳率不一出甘脆滫滑所以輔老之具亦不能豐也時時有一二族子問起居翁據牀坐與之道說故事助遣歳時而已人謂翁由喧熱至落莫不能無介介翁獨翛然自得也然自翁而上友蘭翁年至四十有幾翁伯兄仲兄亦皆不及五十而卒竹窓翁卒以五十而翁在父子兄弟中獨巋然老壽至扵八十有三其所得可不謂厚也歟翁配云云葬以卒後三月某甲子在黄塘祖塋之次扵是一之圖所以不朽翁而𣣔請銘扵立言君子乃謂順之述其事畧順之扵翁爲姪孫而給事公之孫云程少君行狀程少君者新安岑川里人也諱楷字良式遺拙其號也新安程氏之先名靈洗者仕蕭梁時有功封侯死謚忠壮公凡新安之程皆本忠壮公而徙岑川者則自誠始誠四世孫瑞瑞生祚祚以子官封御史自忠壮公至封御史君支派散别移徙母常居然世次則可謂云封御史君娶曹氏而生三子長君名相仲君名材爲御史而少君最少子少君㓜樸魯人以爲不慧大父瑞獨心竒之曰是兒類我我少嘗如是少君稍長益踈散不喜事獨常之沼上觀所蓄魚爲樂封御史君弗善也然心念大父言欲試之乃使之應鄉中役以㣲觀其能已而鄉中役稱辦鄉人以爲少君不苛而事辦則始相與推擇少君而封御史君亦始喜少君之能任事也後封御史君老聵仲君宦長君且多疾家事一决于少君少君有所規畫無弗當封御史君意封御史君又益喜新安土磽狹田蓄少人庶仰賈而食即閥閱家不憚爲賈而程長君少君亦間出爲賈他賈人率婁藪重錢心計極毫釐然占所進貲顧或反薄少君兄弟長者大度尠筭計嘗東賈吴北賈魯廼吳魯人皆樂與少君兄弟㳺益就之故程氏賈行吳魯間占所進貲更多他賈人長君賈張秋乆人或言巳死是時少君罷賈休家聞之亟徃訊長君則長君故無恙大驚喜竟與俱歸長君歸而後復賈清泉少君則又從長君居清泉𥘉仲君爲御史時勾檢内帑財籍至是仲君死内帑財物失闌出入事覺主者窮本坐程御史事下歙縣案御史罪狀而御史已前死法當原有司誤論程御史家坐徙廼悉逮繫程御史家扵歙縣獄鞠之而少君時在吳吳人欲謀匿少君母徃俱縶爲也少君曰父兄在吾焉所匿且我家故無臯廼有司謬論之我左右營救可竟白也即不白我何愛一死以狥父兄亟馳歸抵家㑹事以前解少君即靣數有司有司不能難其戅直如此少君之居清泉也病痺歸且愈矣後繼徃復病痺歸歸益病不治竟死少君死於嘉靖甲申五月十六日死時年五十有六矣少君爲人淳質無所猜對人輙見肝膈人或愚之終不爲變諸嘗與人言事恣意語無隱人隂属之曰若母泄我語乃君竟泄其語用是觸人忌諱人亦㢘少君無他腸不深疾之而少君亦不以語洩故遂自懲閉口也他事又恣意語無隱如故而人乃益推少君性直云聞宦氏子弟矜耀者則曰唉我兄爲御史時我常恐人謂我御史弟指目我我廼深自避匿廼今何爲詡詡然若揚錦而招扵市者吾羞之家僮嘗病疫或請禳少君怒曰疫無鬼即禳何益使疫有鬼吾且刄之遂不禳疫亦竟止少君雖㳺于賈中然喜文雅自爲兒子受論孟小學書扵塾師誦熟之及㳺吳時慕張君東海之爲人也張君者松江人善詩字字尤工程少君乃學張君字至或罷眠食居常以手畫腹及堵間作鈎剔狀即又學張君所爲詩諷詠之其妻宋安人誚曰君寕當作老博士耶少君笑曰汝謂必作博士始事詩書耶少君死後四年有子曰烈始舉進事爲工部主事㑹天子加恩海内廼贈程少君爲工部主事如其子官云始烈少而材少君教之書烈性剛負氣少君教之曰汝治汝性即不治汝性讀書奚益故烈爲工部有聲少君之教也少君子三人點烈黔一女妻某人孫男三人應軫應陽應彩少君既得贈官烈乃涕泣而言曰嗟乎先人卒烈㓜賤不能以有章顯也廼今䝉先人餘業與從縉紳先生之後又幸徼天子恩澤光我先人苟又墮先人之懿行不載罪莫大焉扵是捜戢徃事口授其友人唐某某受而書之如右重刋荆川先生文集卷之十五
