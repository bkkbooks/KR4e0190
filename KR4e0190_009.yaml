  text: 重刋荆川先生文集卷之九
  hash: sha256:cd44b9e7fb30431934f1ff2942b2dd9b768b238459238fde46144ccc21de6831
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_009-1a}
body:
  text: 答夏桂洲相公順之至愚陋曩在畎畝蒙恩召用繼以狂瞽蒙恩罷歸皆在明公秉鈞之時則是其進也蓋辱明公之節取而汲引其退也蓋辱明公之委曲以保全雖明公陶鑄庶類本不私于一物而樗材淂此則竊自愧幸以為過分顧迂狂成性動自罹咎其始既無以副節取汲引之心矣尚幸有犬馬餘生山林精力誦詩讀書竊古人而兾自淑則所以報明公保全之厚者或在乎此而不敢不勉也順之竊聞古之大臣進也以道所以濟時而亦所以正志退也以道所以正志而亦所以濟時顧進則濟時之功顯而退則濟時之意微伏惟明公去相之微意所以勵不可奪之節立天下廉恥之坊而有禆于聖明之治者蓋亦多矣易有之漸于逵之上六不居其位者也其繇曰其羽可用為儀固不獨自潔其身而已人皆謂明公進而當軸以濟時也某謂明公退而髙尚以濟時也雖然明公與國為體恐未能忘江湖之憂而聖主眷懷耆舊亦恐不能淂久遂東山之卧耳謝歐陽石江巡撫伏惟明公負康濟之碩材當東南之重寄振恤瘡痍如春風所扇不間於隂谷寒門搜拔幽滯如藥籠所儲無間于牛溲馬渤如順之者早不自立少嘗薄遊巳甘屏迹于山林豈敢更求于聞達且誦習徒知泥古儕輩多謂之鄙儒而局器難與適時明公誤以為國士收于衆棄揚彼王庭況自來無門館賔客之交豈所取在牝牡驪黃之外夫不采而佩雖幽蘭亦捐苟有因而前則朽株為用遂淂再塵金馬之署更聯羽翼之班自揣既為不堪衆謂何以至此惟天下信明公之端直而知其嚬笑不以假人惟當寧信明公之激揚而知其顧盻必能得士偶因拔茹及此彚征雖荐人常恐其知在明公絶不以言于口而受知思所以報在鄙人則竊有愧于心惟當勉策愚蒙益精學問其或馳驅于世則庶以罄葵藿之心縱使委棄于時則永以堅溝壑之素期少礪頑鈍之器庶不貽冰鑑之差而巳敢因來惠敬布腹心伏惟俯賜覽觀庶以知鄙志之所存焉耳二僕樗散無似黽勉赴官將圖所以效明公國士之知者而未能也竊有所懼者山林之士間居而靜處其寡過則易或出而馳驅于世當毁譽淂失之衝誠欲有所樹立則難故古之人修之于家而多不勉壞之于庭者況僕之所以修之于家者固未至耶昔韓持國薦處士常夷甫後夷甫改其平生而韓公亦深以是為薦士之悔不知若何可以使鄙人不為夷甫明公不為持國之悔也幸左右終教之辭免坊牌一事向已面請此非敢矯情近名蓋以此生苟不至於飢餓則毫髮不敢有所取于世庶幾伐檀詩人之所謂耳承明公欲為置買學田此盛舉也更望明公始終其事中間委曲區畫使異日不為人所侵漁則受賜於明公多矣然此舉必須出自明公使鄙人若無所與焉者乃為善也不然則鄙人雖不以是為利而更欲以是為名亦非鄙志之所安也敢併以奉瀆與郭似菴巡按僕經春常病移家住村塢中居間自念不奉餘光者久矣近聞使檄下府過旌鄙人命有司建牌坊示優崇之意且期之永久此執事盛心豈不感激既而自惟有甚不敢當者恐冒昧以纍左右知人之明故敢畢陳其愚左右試垂聽焉書曰彰善疸惡樹之風聲近世牌坊之製蓋倣此意古者不以法私人所章必善而人乃勸所疸必惡而人乃懲不然則懸曲木求直影也僕少不知學中嵗蹉跎即鄉黨自好者正恐不如也執事乃欲以之風鄉人而矯漓俗僕豈不自知此如以迷人指迷不亦踈乎罪莫大於盜名詬莫大於詆誷僕非敢辭此也將以讓詬而辟臯也僕嘗厠侍從之列會才志紕繆又夙羅疢疾不能效官荷天子明聖不戮瘝曠僅奪官罷歸田里此覆載厚恩詎可勝量僕聞之仕隱二道仕者則蜚聲竹帛或立旄纛表閥閲且不為侈隱人則深林窈谷杜門棧徑羣木石鹿豕且不為陋況僕含瑕積垢以此終世惟應躬耕灌園矢溝壑之志保桑榆之路補東隅之失庶幾不詒田夫野人訕笑此僕私心萬一者也介子推曰身隱矣焉用文之陶生亦云迷途未逺今是昨非苟又冒執事此賜為華觀則是違溝壑之素叨焜耀之飾忘廢黜之後責襲官寵之前榮戾大易補過之訓犯中庸素位之戒無一可者也僕幸交於執事久矣且積愛生妍積憎生醜古來共然别嫌明微先輩所慎雖以李絳之賢亦有議其私於同年者矣自執事持憲江左于人無所假於法無所貸縉紳間咸稱誦據經秉直無與左右比者夫激揚清濁與衆為公執事豈以公法私一交友僕豈淂以交遊故于執事公法雖執事諉曰吾以旌賢誰能信之一牌坊之費四五十金計工二十人有奇一工計役三四旬則是二十餘人計役七八十旬有奇崇虛迹捐實費無禆絲髮有損尋丈此僕為暴殄已過矣己丑與第時曾隨例給牌坊直百金且僕既有牌坊直矣又為僕建牌坊是兩費也奈何使一人兩費有司凡此數事實所不敢當非敢匿心矯迹多為枝辭以徼避讓之名重獲罪有道之門伏惟執事鑒亮命有司停止前事則幸甚理宜走謝面布悃衷坐病不能謹以書致答舒雲川巡按使節之蒞于南土也且訖事而還之朝矣鄙人之所以伺候于左右者一未能展而左右之所以垂愛于不肖者顧數數有加焉既不敢以草莽蹤迹溷擾公府念無可為謝者其於盛德但知中心藏之而已兹辱賜牌坊價五十金再拜感激益不自堪曩時郭徐諸公按于兹土亦嘗以此惠見及僕時尚蒙恩在致仕之後然于諸公之惠亦未之敢當也今為編氓則又異矣郭徐於鄙人同年也而左右乃以此施之於山野疏逖素未嘗交際之人此其為厚施益過于諸公然使僕不敢當於致仕之先而顧敢當于編氓之後其為瀆尊者之賜益大矣此僕之所甚不敢也謹告返於使人辱左右知愛之深當不以不恭為罪耳請謝未期臨書不勝馳望伏惟亮之二執事之使於江南也輶車所至風裁凛然順之心竊慕焉久矣然不敢一拜下風者蓋守編氓之分不敢自齒於縉紳往來之禮也側聞薦章猥及鄙陋顧某迂贛無能人也硜硜自守雖僅不失繩墨豈敢謂有聖賢之志至於樗散抱病雖康濟一身猶且不足豈敢謂有經時之策而執事過采不虞之論未暇察其不肖遂以列於薦剡縱僕不自知愧其若左右知人何哉是以深用祗懼雖然左右之薦賢以為國也而先於平生未嘗識面之人即此舉動巳足以勵恬退之節而激貪競之士其所以繫世風者不少矣顧僕非其人焉是無以成左右之盛美耳雖然不敢不勉也所謂經時之策非山人所敢出位以思然聖賢之學則嘗聞之於載籍而講之於師友之間矣尚當以山中餘日竭此駑鈍反躬克己以淑諸其身而免於大不韙焉則所以報答知己者亦將於是乎在敢布鄙衷吳越密邇更容翹首再覩激揚之政如何如何與陳遜齋巡按某迂拙無似然至於慕德嚮賢之心未嘗不與人同而交際務施報尚往來之誼亦未嘗不與人同也自使節惠臨江南躬清苦之行以率先屬吏嚴激揚之政以整齊習俗某雖在山澤亦竊聞風而慕焉久矣且使節蒞敝邑兩辱垂問野人之廬而士夫間亦每傳言執事以道義相愛因復自念僕未嘗一日淂奉教於左右而乃辱降意先施若此則又竊感且愧焉久矣然則僕於執事不為無所嚮往而執事於僕不為無所下交矣其於所謂慕義之心報施之禮皆宜奔走自效於左右而乃缺然至今焉者非甚疏狂當不若是故敢以鄙懷布於左右某被罪為民人也諸公髙誼雖過以士禮相遇而固陋之私則不敢不以民禮自居編氓之役既非所以僣於縉紳之交稼穡之論亦非所以參於政事之間是以八九年來其於公門未嘗敢一窺焉蓋非敢自為偃蹇誠不敢以瀆尊者也草莽之不敢見孟子之所謂不敢也且某多病早衰去冬復感隂寒遂成末疾兩足痿痺臥不能起颯然摧朽已成廢人惟屏迹村莊少藉藥物支持是以執事之門既未及躬候而執事枉顧又不及擁篲以迎蓋坐此也然則僕於執事交際之禮既拘於分之不敢自盡嚮往之殷又牽於病之所不能自致惟有捫心懷慙而已念無以自達於左右故敢以書上并以為謝幸乘亮焉與賈太守書史生還獲聞起居與德政之詳甚慰素仰弟迂疏無似自屏居以來四方知舊絶不敢通書或有書見及則答之而已以為山林屏廢杜門省過之人其禮自宜如是且亦平生自守其固陋而不敢失者也今春偶有素不相識鄉人名孫伸者持兄書惠見及當時姑奉答一書後或言此人先造贋書以誤左右之聽聞之不勝惶悚弟自己丑偕兄登第至今十餘年雖至親未嘗敢為之請囑雖在敝郡縣諸公亦素不敢有一字相囑乃為素不識面之人請囑于千里之外亦可笑矣且弟縱不才亦素知兄之剛正豈宜以私于之既以自愧又以自訟豈平生心事不能見于信此一鄉人所以至此也若果有此煩兄發其事治其人以為作偽之戒并將原所造􅎓書發下一覽感感答李中溪御史兄之使閩也一年矣辱以書下問者數四矣而僕無一言之獻豈惟素性迂戇自度不能然亦以兄之才力自足辨此耳既又自惟以為兄之才力固不待人然屢問而屢無一言焉是亦不免有負相知乃輾轉思之竟無所得惟有一事可以少效悃而塞下問之勤者則言之適在此時然亦自度非迂則戇也惟兄亮之而已且夫撫按之權舉劾最重百官之所以勸懲公道之所以開塞其繫於撫按舉劾亦最重然而今世所謂舉劾者僕竊異焉僕嘗僃員郎署矣嘗得日聞邸報矣或曰今日某巡撫舉劾奏至矣僕不問而知之矣或曰今日某巡按舉劾奏至矣僕不問而知之矣何也其所舉者可不問而知其必藩臬方面大官也其所劾者可不問而知其必通判縣丞小官也其所舉者可不問而知其必牽朋聯位不數十人不止也其所劾者可不問而知其必寂乎寥乎才三兩人也如此則是賢者盡大官而不賢者盡小官也則是賢者甚多而不賢者甚少也夫使賢者盡大官又使賢者甚多而不賢者甚少則宜其政平而訟理苞苴不行於上怨毒不結於下天下可以卧而帖帖矣而顧不能然則是大官不能盡賢與賢者不必甚多而不賢者不必甚少也大官不必盡賢而賢者不必甚多不賢者不必甚少則彼舉大而劾小者毋乃大官則足以樹恩而小官無傷於任怨也歟又毋乃勢弱者易凌而根固者難拔也歟而其所舉所劾之多與少又毋乃厚市恩而薄引怨也歟如此則人心奚而得勸懲公道奚而得不塞也雖然固亦有藩臬方面大官而不舉或及見劾者矣嘗駭而問其人焉則是非能劾藩臬方面大官也亦非其人之果不賢也或負氣倔強不善曲媚者也不然則受人指嗾為之快忿者也亦有通判縣丞小官而不劾或反見舉者矣嘗駭而問其人焉則非能舉通判縣丞小官也亦非其人之果賢也或多援善鑽最有力者也不然則其親與故也如此則所劾者縱非小官則必負氣倔強與為人快忿者也所舉者縱非大官則必多援善鑽與親且故也然則人心又奚而得勸懲公道又奚而淂不塞也由此言之為撫按者固不淂以能舉人能劾人為榮而必舉劾之不稱為可懼矣今兄之所屬其為方面大官者誰乎其為州縣小官者誰乎僕山澤之人耳其姓名且不知也大官賢乎不賢乎小官賢乎不賢乎僕固不知也賢者多乎少乎不賢者多乎少乎僕固不知也而為是多口者亦據素所疑於人人者言之耳然以兄之志剛而識明秉正而嫉邪固必不同於人人矣必能示勸懲而彰公道矣又何藉於僕之言乎然僕之為是言於兄亦非欲兄之不舉大官不劾小官也非欲兄之所舉必少而所劾必多也大官果賢矣或矯而不舉亦私也賢者果多矣或避收恩之名而欲矯之以少舉不賢果少矣或沽澄清之譽而欲矯之以多劾者亦私也雖然竊以為莫如精舉而愼劾則劾者固少而舉者固不得多矣或曰舉劾皆少則是善有隱而不彰惡有徽而不屏也是不然矣夫天下中人多而最賢最不賢者少也舉劾所以出於常格以待最賢最不賢之人耳若夫小善小惡則固有考語矣又何慮善有不章而惡有不屏也故僕以為莫如精舉而愼劾兄意何如一言之獻如是而已惟兄亮之與周約菴中丞論項守數辱惠書教督以所不及深感知愛無量僕自去歲移家至陽羡與世利益疏濶此昔人所謂懶與病相成雖僅守固陋不敢墜失至於讀書窮理冀有新淂則甚不能也其何以仰副明公教督之勤耶知愧知愧兹啓僕友人有項喬者其人溫雅純實雖自處若謙退而其志常欲為古人雖其貌朴野而其中實耿耿然雖多臥病若不任事而蹇蹇奉職不肯一日尸乎其官僕於交遊中知之景深而資其切磋之益亦最久矣又自羅翁當國為縉紳所輻輳而永嘉之人根株附麗攫美官鼓聲勢者尤衆喬與羅翁又有葭莩之親乃獨泊然自守不亂於羣甘心隱約不覬非望然此士人居身之常不足以稱喬而喬之不茍大率可見也此不惟如僕輩與之素交遊者能知喬而士大夫亦多知喬者夫以僕素辱明公之知則固可以薦人而不為僣以僕知喬之深則固可以薦之明公而不為黨自喬在屬下二三年間僕不敢以一字稱喬於左右者豈復過避嫌疑使喬之名譽不通於上而歸明友之過於僕耶竊以為明公精鑑近世希有又素以汲引人材為心而喬之為人必能在處有所樹立則眀公自將知喬而喬自足以受知於明公又何藉乎僕為人媒也昨得邸報見明公薦三郡守獨不薦及喬則始撫然異之既而思之何僕所料之不中耶豈喬之失其故步耶或喬之廉靖宜於郡署而不宜於郡守耶抑僕秪見喬前日之善而明公秪見喬今日之未善耶不然則或有間之者耶不然則以明公精鑑照物無遁而喬也日夕在左右而獨不得借餘光焉豈其命耶夫人情翻覆不常旬日異態固有慝情為善而後或敗露者矣亦有始雖強於為善而後不免改節者矣僕又何敢以四五年前所見過信故人耶雖然喬悃愊可信人也以喬之素能蹇蹇奉職則其為郡守不肯闒茸或可知也以喬之素不肯奔競則其在郡不肯自汚或可知也又未敢以過疑故人也雖然僕所取信者明公之鑒也明公之黜喬而不舉必有説也則是喬果可信者少而可疑者多耶果飾於前而壞於後也不然何為其見黜於明公也耶明公非不憐材則是喬果敗露與改節也僕之心不能解也使喬之賢而偶未見知於明公則僕固不敢默矣使喬果不賢以自取戾焉亦宜一請教於明公而與之絶可也是以不量狂妄而有是説焉伏惟亮而恕之幸甚與魏立峯憲司論吕提舉曩獲與兄同事吏曹且辱兄意氣相許顧奉别十四五年而不獲一晤又十四五年間不能以一字通殷勤乃今輒有言於左右者亦恃兄之能以意氣相信我也敝鄉人提舉吕朋以夷人事獲罪上官雖其一時踈虞或不能免而其平生心事則固可亮東南風俗鮮識廉恥而朋自少獨刻苦植立勵一介之操又恬靜不妄干進惟其刻苦自立是以歷官十七年而家無一椽一壠之增惟其恬靜不求是以受旌薦者十餘而竟回翔乎州縣冗散之間此其平生心事信於鄉人而尤見信於鄙人父子間者也蓋世俗所謂矯激修飾之過則有之而謂其忍於自汙或未然也小心怕事之過則有之而謂其敢於賣法或未然也其所以或致踈虞者則亦有説蓋廉靜之士多短於才而周防曲慮似非朋之所長耳夫網之以迹而不必信乎其心上官之所以行法也在朋亦何辭之有矜其所長而宥其所短上官之所以曲成也在朋亦或可以自雪矣此兩者皆在吾兄而已或曰吾兄則知朋矣如上官之不相信何夫秋崖公古道人也僕雖未識其人而知其為人也吾兄古道人也古道如吾兄宜無不見信於秋崖公朋之區區清苦宜無不見信於吾兄然則矜下吏之長而貽上官曲成之美是在吾兄而已朋迍邅世途亦久無宦情但惜其見幾不早而已去官居官無足論者以事關名節不得不一為之白耳僕向僃員京師不能稍引此人每用以為愧今其在難不得不一為之白耳然亦昔人所謂惟執事可以聞此言惟僕於執事可以此言進也不然則朋為賄吏而僕亦為受賄人囑罪者矣知我罪我亦惟兄而巳冒瀆不任悚悚與葉東園御史王照磨還稍能道兄初政所設施則已凛凛風裁矣而來書猶以未能行一事為説蓋昔人云施為欲似千鈞努言其不輕發也兄之慎重不肯倉卒此幹大事者自宜如是耳然巡按體要本無瑣瑣其喫緊只在激揚一著而激揚大體亦不專在任滿舉劾一疏但隨所巡厯明示好惡其愞熟承迎者雖善于集事而不加喜其直抗悃愊者雖近于迂鈍而在所恕其矯詭欺誕者雖在大吏而有所必懲其忠實為民者雖在小吏而無所蔽蓋虗己無我以臨之訪酌民言以盡之則風裁所在自足以撥轉人心矣何如青州鎗手膽勇趫捷誠徑兵也居常固之以恩而齊之以軍律雖蹈湯火可矣但勞此兩人逺來甚艱苦前有書止之而不及也與徐少𥘉縣尹某罪隸之餘禮不宜復齒於縉紳交際之間是以每逺引而去之竊以為姓名不通於諸公久矣兹又辱巡倉巡江二公之賜令人愧懷益不自勝欲作書辭謝又難于為説是以敢有所請教於執事也夫諸公之賜其名則幣帛果酒也而叩其實則白金也欲以辭幣帛果酒為説則悖于其實欲以辭銀為説則悖于其名是以措詞之難也古者禮存乎幣帛之先後世以幣帛為禮此其實則既亡矣而其名尚存也若夫市道之交則錢貨而巳矣雖然如公古道君子也如諸公古道君子也豈不欲行古之道而以市道歟豈以為若某輩人者其好潔操行之心不能勝其嗜利無恥之心故幣帛虛名也金錢實利也而特以此厚之歟不然其特以此愧之歟頑鄙之人可以省矣是諸公之所以廉頑也某罪隸也賜之幣帛不敢當賜之金錢不敢當豈其能自處以廉乎蓋古之所謂不敢也然而為嘵嘵者竊懼名實之亂也公古道君子必且有以教我矣某山野鄙人于當道諸公辱顧不敢答辱賜不敢拜非以為簡也禮不敢也答與拜既不敢不答不拜又鄙心所甚不自安也向曾奉瀆乞命吏人于鄉官揭帖中除去賤名以安編氓之分豈未蒙亮察耶恃在知愛乞如前所瀆則上官可以不知鄙人姓名而交際之間可以泯然無迹矣附瀆二讀清獄申文深知仁人之用心至悉謹篋而藏之以告後之君子以延長者之惠于無窮也更承示區處牌坊銀事往時所辭諸牌坊銀只為未有所處遂至久而不知所用之矣今用以修理書院不惟此銀淂有所著落且于風教有補焉甚善甚善但中問稱奬鄙人太過讀之且甚自愧也某嘗以為今日吾輩之病太率在於實行未修而虛名先著閫域不務而門面是張是以書院講學一節多為具文而非彼此感應之真機而其志之不相同者則遂指擲以為口實誠所謂吾黨有過焉者也况如僕者極疏且陋何敢當此乞于申文中自見今買莊一所以下至僦船以居數句及固以禮敦請講學一句敢勞削去是所以免僕于名浮之恥而亦左右相愛以德之素心也幸亮之答符松巖郡守讀沃洲公論船隻事綜理精密最是得策更賴公潤色而行之可以無遺黠搜慝矣曩曾請教地圖一節此法可以檢田畝可以聯伍保助守望可以知險易障塞水陸襟喉之所在昔人所謂視都知野知國可乎據而知焉者也然明公亦既行之矣更望于田畝多寡地理險易襟喉處再加詳注而明公自精核之不得只憑里胥之文具而已更望明公于政事之暇時往一二緊要村落特省農功而因以親驗其肥瘠險易與圖相參若此法立得有下落則自此以後興徭作賦設僃追胥不知省却幾多氣力絶却幾多弊端然此惟明公之實心為民與明公之精力能行之故僕敢以為説不然則徒作一畨騷擾而後日竟委之故𥿄無用也昨承教以因革之説當時草草泛及他事未及悉心以請此事不嫌于遲遲熟思審處在明公必能為百姓長久之慮不徒以一時興利去弊為功容日更聞緒論也前所興革已陳于沃洲公者及備邊疏中論兵民事皆蒙賜教幸幸與吕沃洲巡按别久瞻望甚勞每苦俗套拘人不能一棹於婁江虎丘之間與兄相傾倒也悵悵東南州郡連歲旱災即今苗未盡稿遇雨之吉尚有可望倘更三數日不雨則數十萬生靈未知死所山人亦不免於焦枯是懼不知天心仁愛竟何如也前年大祲尚賴滄源公與吾兄勤恤民隱不遺餘力而有司務於仰承兩公德意蠲租賑粟是以百姓幸有孑遺焉然莩死疫死亦既不忍言矣惟今年事勢又異往時何者閭閻積連嵗之飢則一歲艱於一歲矣官廩捐連歲之賑則一歲空於一歲矣蓋承兩年大飢之後而又飢焉故據今年分數雖止是一年之飢其實一年併受三年之飢也其為事勢難易可知况兩公一時代去又若故奪之所恃賴然者夫粟不必其盈於倉而有所可轉錢不必其盈於帑而有所可通此其便宜之權惟撫按則然亦惟撫按有真實為民之心者乃能操其便宜之權以御其變而使不至於窮若夫有司則雖憫雨恤災儘力周旋顧其力能行於法守之所及而不能行於法守之所不及能為於官民之藏之所有餘而不能為於官民之藏之所不足若使官民盡匱固亦無如之何俗所謂好媳婦做不得沒米不飥也雖然官民之匱憂之誠是也至於憂兩公之將代則竊自笑以為過矣兩公者一日居乎其位一日心乎其民者也去之日如始至者也計兩公代期尚旬月有餘以旬月盡瘁之精力而全活東南數十萬溝壑之命兩公豈憚為之自古救荒無奇策亦無多説只是措錢米一法耳誠得兩公以旬月盡瘁之精力從事其間隱度於公私之用而均平其斂散之宜至於粟不必於倉而有所可轉錢不必於帑而有所可通諸如此類可專行也速行之不可專行也速請之則前之所憂官民盡匱者亦可以化而為豐也不難矣曩時所奉救荒條例併東湖撫公奏疏中間區處錢米事頗具當時以麥熟無所用之不知今有可採而行者否有可采而陳請者否或可因兄以達於滄源公採而行之與採而陳請之否聞南都倉粟其羡至四百萬以上可勾十年之支而有餘滄源公去歲所奏平糴一法此軍民公私凶豐兼利之術奈何當事者議論不同遂使滄源公美意不竟然此法終不可罷也不知滄源公再能以此意陳請否繼滄源公撫巡者又能以此意陳請否願兄力贊之近聞之一戶部長官言此法有三利云云其説可謂曲盡縱使諸郡盡荒但得京倉糶粟三數十萬石分散諸郡諸郡每發官帑銀萬兩為糴本輸之京倉則可得米二萬石平歲人食米一升凶嵗則減之是二萬石者二三萬人百日之命也是官帑不過出銀萬兩而續二三萬人百日之命以待來歲之熟也三數十萬石者五六十萬人百日之命也京倉糶粟三十萬石而得銀十五萬兩是國家不過錢米互換之間實未嘗費斗糧損一錢而賜五六十餘萬人百日之命以待來歲之熟也其為利害較然可知其議論不同者不過以苟有緩急京儲缺之為説耳夫糶三數十萬石之米於四百餘萬石羡餘之中特十餘分之一耳且今江東雖災而江西湖廣頗聞豐熟則京倉歲額本色之入固將源源而來矣豈預憂十年之後之不足而輟旦夕之所必救哉故願兄之力贊其説而佐為之請也至於有司所請逺糴一節蓋慮異日榖既不登而遠商又不來則雖積錢盈篋坐而待斃矣故救荒惟是預處錢粟而變錢為粟尤是先事預處之善者也計吾兄亦已聞而可之矣雖然此皆人力之可為者也若使皇天果無悔禍之期雨澤終不可冀則人力必有所不及而地方意外之變亦不可不先圖願兄更以旬月盡瘁之精力且遍巡諸郡間延見吏民身親其利害而曲為之處且使車一臨視數十𥿄文書督促為益多矣兄其圖之答曹巡鹽僕迂疏固陋之士也惟山澤屏迹則其所宜不謂過辱左右之知未及傾蓋而先惠以教音勤之以下問此古者觀風之使不憚身先施之巖壑自養之士則可矣顧僕豈其人哉雖然由是足以知左右之急於奬善不暇擇乎其人切於好問故不睱擇乎其言也竊奉下風感慰感慰今吳粵薦饉村墟之間雞狗無聲草根樹皮亦憂其不繼矣流莩露胔所在如積天心仁愛不知竟何以善其後伏惟左右雖不在撫巡之責而同於觀風之任者也君子一體萬物固不論於職守之所及與所不及也而况在觀風之任哉幸而今之司國計者督率守令力舉荒政以全活溝中之瘠蓋不徒阜財足課通惠恤竈為於職守之所及而孜孜體綏瘦人湲計國家根本之慮以為職守之所不及以盡吾一體之心固知左右之有意久矣辱厚意之殷敢布愚悃與李龍岡邑令歲凶民莩賢侯為之心惻而百方圖之者深矣輕齎一説向巳面白兹復具之於書以為可以佐百姓之急而禆萬一於賢侯百方之圖則不敢以出位為嫌也竊惟國家之賦其水旱可得而減免者兊運以外之數也雖水旱必不可得而減免者兊運以內之數也水旱不可以不恤而兊運又必不可減免於是有輕齎之法蓋米自江南而輸於京師率二三石而致一石則是國有一石之入而民有二三石之輸若是以銀折米則是民止須一石之輸而國巳不失一石之入其在國也以米而易銀一石猶一石也於故額一無所損其在民也以輕而易重今之輸一石者昔之輸二三石者也於故額則大有所減矣國家立為此法蓋於不可減免之中而寓可以通融之意不必制其正賦之盈縮而但制其腳價之有無不必裁之以豐凶之斂散而但裁之以本折之低昻一無損於國而萬有利於民此其法之盡善而可久者也以武進一縣言之歲該儧運米五萬四千五百八十一石三斗四合此其入於國之正額也本色正耗水腳平米七萬九千六百八十三石七斗三合八勺四抄折色銀九千一百五十一兩四錢六分五釐五毫二絲此其費於民之羡數也若以銀而權米石以直五錢為率米七萬九千六百八十三石有奇為銀四萬九千八百四十兩有奇與折色銀共五萬八千九百兩有奇若得從輕齎之例石折銀五錢計銀二萬七千二百兩有奇而足縱使加折至於六錢七錢計三萭七千八百兩有奇而足則是民每歲出五萬八千九百兩有奇之中而今出其三萬七千餘兩之數以不失國家之定額而實私其二萬餘之羡以自潤也夫五錢者江南之平價也七錢者折色之極則也若使江南米貴自五錢以上而蒙恩折色或減至七錢以下則其所私之羡固當倍之且蓯矣倍之為四萬則是十萬人凶年一月之食也則是國家不出一粟不費一錢而為凶年十萬人續一月之命也為民父母者何憚而不以告乎司國計者亦何靳而不為乎且夫國家漕運四百萬石之中固嘗定有輕齎四十萬石以待四方之以水旱來告者矣蓋其歲之凶與否與歲凶所在之地不可知而所謂輕齎歲四十萬之額以待四方之以水旱來告者將安用之況自古經費其本折之權率視緩急而為之操縱今國家所以逺輸於江南不憚二三石而致一石者正以江南米賤而京師米貴耳近聞京師之米直自七錢而減至四錢而江南米直自七錢而增至九錢其為貴賤特異常時則是江南以二三石致一石而又不當一石之用也今若取銀於江南而用銀以給京軍之當給米者江南無逺輸之費京軍無賤糶之困此正今日之便宜耳然則非惟無損於國蓋深有利於國而得乎操縱緩急之權者也夫損國以益民猶且為之國家發內帑以賑災者往往有之矣又況無損於國而有利於民而又況國與民並受其利者乎此事在不疑而必可行者也為民父母者何憚而不以告乎司國計者何所靳而不為乎嘉靖十數年間江南屢告災國家亦屢嘗以輕齎與之此其近例試求之故籍可覆案也查得嘉靖十四年蘇松等處災傷巡撫侯都御史等奏戶部覆準除蠲免外兊運四百萬石內準折銀糧一百五十萬石兊運米每石折銀七錢改兊米每石折銀六錢其被災尤重者量準十萬石于臨德二倉支運每石止徴腳價銀一錢五分自此而上嘉靖十二年折兊一百萬石十年折兊二百一十萬石八年折兊一百七十萬八千石無歲不有災傷則無歲不有折兊此其因災傷而折兊者常例也又伏讀嘉靖九年詔書兊運米以十分為率量準五分是時常州一府該淂折兊八萬一千石此其不因災傷而折兊者例外之恩也由此言之蓋有因災傷而行支運以大寬民力者矣未有災傷而不行折兊以重困吾民者也蓋有不因災傷而折兊以廣例外之恩者矣未有災傷而不行折兊以嗇於例外之恩者也此祖宗之良法美政聖天子之深恩厚澤於豐時足國之中而寓救災恤患之至意雖旱乾水溢而民免為溝中瘠者誠戴聖澤之厚於無窮也與徐養齋向承教以所不及深感道義之愛皎皎嶢嶢昔人有明戒矣敢不奉教以求進於若虗若愚之學也伏聞位晉司徒足占泰道之亨矣周時敷五典擾兆民故事可復見於今乎斯民無祿連歲凶飢自冬徂春溝中之瘠在在有之每一郊行露胔滿目為之不能下食幸賴撫巡諸公郡縣有司薄征散積悉力其間不然民其無孑遺矣乎今幸及麥秋可以續食然連朝霧雨二麥之腐壞者又幾半矣去歲緩征之額若欲於麥內取盈則恐民不堪命奈何且二麥無收之處雖征之亦何所出而其薄有所收之虎彼方圖救目前之飢猶且不足而尚有餘粒能補其去年之逋竊恐鞭笞日用而故額未必能足則是昔日緩征之惠乃為今日急征之困也非不知上供之定數必不可缺但得稍遲數月併於秋糧內帶徵則有司省却一畨催科閭閻省却一畨煩擾在國計一無所損在民力亦無不堪而巡公孜孜愛飬救災恤患之盛心於是為有始有終矣此其事只在數月早晚之間耳非有損上益下之難也僕僻處山林未嘗獲奉教於撫公是以不敢徑以書達而以聞於執事且此固百姓之公言也惟明公亮之與人論旱荒蘇松常鎮並為鄰郡而地利之髙下水勢之淺深迥然不同或遇水荒則蘇松特甚而常鎮尚可或遇旱荒則常鎮為劇而蘇松得利試以運河測之則常州水止尺許而蘇松尚有至于丈餘者此其地利水勢顯然可見恐明公以為蘇松未嘗告荒而常州獨若嘵嘵然者不以民之僥幸于免稅則以為有司之私于其民而其實旱與不旱有不同也是以蘇松荒而得常州以相輔常州荒而得蘇松以相補民實國稅兩相消息造化者亦有裁成之意云耳與吕沃洲巡按同心之誼悵然逺别以兄之不能忘情于僕亦知僕之不能忘情于兄也江臯逺送尚有瞻望弗及之感趨而避之豈人情哉顧事體有所不可者僕自兩度廢罷歸來前此巡公如趙舒周諸公皆未嘗有一面之識雖同年如徐何陳諸公亦未之敢見豈特狷狹之性以此自守兼亦山澤之分不敢踰越且省事省勞亦病夫之所便至於吾兄則有不然平日於兄既辱道義兄弟之愛而兄之來也又以同心之故拳拳相求僕亦欲如故事引避深覺於情有甚不自安者然初意止謂一見可矣繼而再見三見四見焉日不足而繼之以夜焉然在兄無私於故人之譏在僕無奔走形勢之嫌所恃者平生所自守能自信而巳矣好事者不疑其干請被罪者不猜其毀言所恃者平生所自守能自信而已矣所謂惟吾與兄可也夫兄行部之日既巳破格相與矣而兄去部之日乃獨不能破格相送哉所謂事體有所不可者何也正恐見之者以為僕之與兄綢繆若此也不知出於故舊必不容己之情而槩以為山人所以事上官之常禮則送故者必不可以不迎新新故相仍息肩何日若夫一賢一否則昔人所謂為罪滋大者也欲稍自息機以返初服不得不自兄始之矣近龍溪相過與之盤桓山中數日别去已訂他年之約若兄有便還山則奉教之日長在今日且割逺别之情以為山人自便之圖其亦可也答施武陵方田一法不難於量田而最難於核田蓋田有肥瘠難以一槩論畝須於未丈量之前先核一縣之田定為三等必得其實然後丈量乃可用折算法定畝如周禮一易之田家百畝再易家二百畝三易家三百畝此為定畝起賦之準亦嘗觀國初折畝定稅之法腴鄉田必窄瘠鄉田必寬亦甚得古意今兹不先核田便行丈量則腴鄉之重則必減瘠鄉之輕則必加非均平之道也量田之難全在乎此至於丈量法其簡易者具之九章算法中須兄自明此意乃可付之下人為之庶無弊也痛楚中略具梗概奉答華生所刻書則兄已見之如更查得有書容續奉耳與鄭戶部執事此行國儲民命繫焉伏聞下車以來仁風所宣里閭相慶益自來督賦之使多以徵斂裒聚為功而執事獨以寬大行之是以始及下車而應感已若此矣變産一節其利病更僕未易數也大率姦民始初莫不上耗國儲下蝕良民以肥其身及其敗露至勤冠蓋逺出猶或憑姦民之攀扯而逼迫良民代為之償則是國家懲姦之法未及行於親手欺盜之人而推膚剝髓鬻妻賣子之苦已波毒於窮簷無告之小民矣是姦民重得志而良民重受困也執事仁人也必自有以處此山澤鄙人出位妄言并希亮之與王北崖郡守東南州郡侈靡日長而虛耗亦日甚譬如病火之人頺色澤然而血氣稿矣吾北崖以古人之節淸化源以古人之政撫罷氓期月則既效矣惟率是道而終始之則百姓之福而區區野人之望也催逋部使者且至僕自生長草萊僃見變産之害濫及無辜小民毒痛不忍言北厔仁人也必將有以處之夫素嘗侵欺之姧籍其資可也孥而繫纍之可也重戮以懲衆可也小民何罪焉而代為之償乎名曰變産實逼而奪之耳雖然昔人固有言矣成於自同而敗於自異部使者方以括財為功而守令欲以民瘼為事則勢固不同也於是處之為難惟執事悉心以慮之多方以圖之國與民兩無憾矣林鎮江先生亦好古君子也變産之説執事幸不見謂迂濶則可與林鎮江共論之蓋此非一人之私言也卷子索書鄙作僕於詩夲不工自稍知問學以來頗欲收斂精神會性情之實是以經年不復從事於此然恐重違吾丈之意當書舊作數首送上也讀衡山先生文字可以補鄙人疏漏之過矣謹謝教謹謝教六經之學邇年來稍嘗究心焉而苦未之有得也欲觀西原公所著甚勤便中幸速之奉教未期臨書但有馳情答王北崖郡守論均徭執事所病於均徭舊法之不可行者其説大槩有五大戶之詭寄也姦猾之那移也花分也賄買也官戶之濫免也大户之詭寄起於官戶之濫免則此二弊者其實一弊也夫濫免詭寄之弊謂某官例得免田千畞而自有田萬畞或自無田而受詭寄田萬畞則散萬畝於十甲而歲免千畝實則萬畝皆不當差也其説是矣雖然其以萬畝而散之各甲以歲歲幸免千畝者必非田甲皆是本官真名與皆注本官者也必將田甲詭為之名也使其甲甲皆是本官真名而不詭為之名則一人而十甲其為姦固易破矣若必是一甲為真名而諸甲詭為之名遇其真名與注官之甲則免其非真名與注官之甲不淂免即十年亦止免一年耳安得歲歲幸免也不然均徭册外别置一册注每嵗所嘗蠲免之數如某官例免田千畝而一甲內已免過田七八百畝縱或二甲三甲有田許撞足例免之數數外則役如此則雖甲甲免歲歲免亦止得一甲一歲該免之數又安得以千畝影免萬畝也此法在一強察吏執之雖真是官戶之田亦不得覬額外溫免況詭寄乎至於移甲之弊則執事所謂只據黃册或十假册足以革矣而又病於黃册與十假册之不可據者則固以為與每歲推收之法相礙也夫每歲推收宜於賦不宜於役十年定册宜於役不宜於賦役主戶賦主田賦則隨田流轉役則依戶擬注是以賦法則既準之每歲旋造之徵册所以便民之灌輸役法則宜準之十年併造之黃册所以便官之點差即此兩法本不相綰而執事又疑於據定册編差或有田既賣而差仍纍者則編差之際其人必且自言於官曰吾田巳賣之某人而某人宜頂吾差于是官為之按其實而以某人頂某人差如此則是以虛名編差者故賣主也以實力頂差者新買主也故賣主以虛名編差可以無亂乎定差之籍新買主以實力頂差可以無纍乎鬻田之人且夫役法上下其戶以差其甲之錢聚則稍重而散則稍輕花分者尺可花分子户以移稍重而就稍輕其實不得花分鬼名以移絶有而就絶無也且十年輪編不能禁人之花分而一年一編又安能使人必不花分欲使人必不花分則在嚴之於攢籍之始而非所以較於編差之際也賄買一説曩時輪歲編差則豪民以賄避力差而請銀差今時歲歲編差則豪民以賄避差頭而請貼戶曩時輪歲編差則户胥之家一年而集一甲豪民之金今時歲歲編差則户胥之家一年而集一縣豪民之金大抵論詭寄賄買兩弊則繫乎令長之強察與否不繫乎輪年與不輪年也論花分移甲兩弊則繫乎册籍之精核與否不繫乎輪年與不輪年也法無全利亦無全害以輪年一編為全害乎而可使小民一歲忍苦出錢九歲晏然坐食以一年一編為全利乎縱可以盡革詭寄賄買花分移甲之弊而不能不使窮僻小民歲歲裏糧集錢奔走城郭此其利病亦自相凖古有之利不百不變法先時有司激於官戶豪家之暗損小民然却不就舊法中調停裒益而驟變之以收一切之效以為此足以裁損官戶豪民而巳不知小民亦竟受其病今之萬口訿訿喧然稱不便者未必盡出於官戶豪民而往往多出於窮僻困厄之小民矣請試言小民之所最不便者大槩亦有數説且如一邑丁田以十分為率往時一歲編審一分其為數則狹令長耳目差易遍持籌而算之差易辦縱有弊焉而差易以察今一歲盡審十分則其為數頓濶於往時十倍令長一人耳目籌算所缺漏處必益多耳目籌算缺漏益多則戶書里胥之權益以重姦民益得以輸金於權之所重以為規避小民無金可輸則歲受苦役益無所訴而長令則益不能覺察若此者非曩之長令多精強而後之長令多鶻突也其繁簡濶狹之勢實然而執事乃謂輪年則胥猾多得售姦不輪年則胥猾多不得售姦豈别有説耶不然何其與吾所聞異耶又如一力差約銀十兩為率往時十年一編正戶約銀五兩貼戶約銀五兩則貼戶五而足矣人數既寡故其裒而斂之也不難今一年一編則曩率出銀一兩者今減而出十分兩之一曩用貼戶五者今必增而用貼戶之為五者十人數既廣其勢必散有差頭終歲物色尚不能遍識貼戶之門者何况能盡斂其錢是以往時所病正戶叨餮貼戶今時所病貼戶耗損正戶小民不幸𬒳點正戶則破家矣若此者非曩時之正戶皆強梁而今之正戶皆愞弱也其聚散零總之勢亦必至此而不足怪又如銀差曩之法歲總納銀一兩則今之法歲零納銀一錢納多者其倍稱之數稍輕納少者其倍稱之數必重納一兩縱倍之三兩而奇足以納矣納一錢非倍之四錢五錢或至八九錢不足以納也此其總納則費固輕而零納則費固重也不獨如是而巳以一兩總納之一年則是為一兩之銀一遍赴官守候交納一遍往來盤費設或交納不時公人一遍下鄉需索而巳今以一兩而散納之十年則是為一錢之銀亦一遍赴官守候交納一遍往來盤費設或交納不時公人亦一遍下鄉需索是今日一錢之纍並不減於一兩而曩日一年之纍乃浸淫於十年其為便耶其為不便耶其最不便者其為坊郭之豪民耶其為窮僻之細民耶此其為病不可枚舉恐不特如執事所謂似涉騷擾而已也則今法之當變理在不疑秋糧帶徵又説既格於復除之無定數而不可行矣惟用十假册法則可以革詭寄移甲諸弊而無一歲一役之擾然執事因黃册之不可行而疑於十假册之不可行者則亦有説夫黃册之不可行者黃册之法敝也黃册之法敝而邑之丁與田大半不登焉故十假册者為之括其欺隱以補黃册之不及以均平力征而巳使黃册果無弊乎則徑用黃册編差可也使黃册不能無弊乎則為之十假册以補黃册之不及而編差焉可也因黃册之不可行而併疑於十假册之不可行則過也執事又謂常州賦稍輕蘇州賦稍重則其法不可畫一故常州自宜從舊法蘇州自宜從新法夫賦自重輕而人情之好逸厭煩好省厭費則胡人度之越人固有不甚相逺執事其試察之竊恐蘇之民之情不甚逺乎常之民之情而法之可行於常者未必不可行於蘇也二別兄甚久耿耿提學公且至荆溪兄以提調當來可得一面晤也均徭法曩時所欲言於兄者不過只是一兩言蓋慮兄以新法為甚便民也今讀來教則兄已深知其不便而有意於革之也久矣大率十年一役雖極重亦甘心一年一役雖極輕亦不願此人之大情而新舊兩法之利病可以一兩言盡之者曾聞人言胡虜愚蠢只怕鞭朴更不怕殺蓋零零星星痛苦難忍也此言雖可笑然亦可以喻人情矣少時嘗讀衍義輔論均徭負米之喻亦深以其説為然及今日下老實行之乃見其害益知書生坐談真不可便以經世而差顧兩法在宋時亦甚紛然司馬公力主變顧為差而有識者亦甚病其講之不詳則以為司馬公少厯州縣之日淺也僕屏居草莽于民所便所不便則稍知之而稍能言之至於所以為之區處實以生平未嘗親在裏邊經厯雖以為常之民曾享十假册之利而其中委曲尚未能悉知又何以為蘇人謀也承兄下問草率奉對真似乎強其所不知矣竊惟賦役之最煩而敝最多者無如蘇州牧守有懇惻為民之心者無如兄沉潛善思精於處事者無如兄必能别出良法使新病故病一切掃去以幸蘇之人於百千年也是在心誠求之而巳豈待書生坐談如僕者之贊之也哉僕自稍涉世事乃知凡百變更之際極是難事即如曩時有司變十年均徭為一年本是愛民真心而講之不詳則其弊巳效於今日矣今欲變一年為十年而講之不詳又焉知不貽後日無窮之敝哉兄之遲遲其間不肯輕變極是不為而後可以有為大易所以致戒致慎於革也雖然革非得巳也昔荆公論顧役以為此法終不可罷僕亦以為一年均徭此法必不可不變顧其説如此耳至於利病之詳區處之宜則老吏積年總書中有知此者兄試虛心問之勿以其素曾作弊之人而拒之耆民中有知此者兄試虛心問之勿以其山野倨侮而忽之士大夫中有知此者兄試虛心問之勿以其必為一身一家之私説而先意逆之多方訪求再三斟酌使無一不宜乎人情而無一人不得盡其情則變之可通通之可久矣曩者敝郡更法時蓋應君為之守應君志在民者也其所更賦法最為精善可以百年無敝但役法則今日便不可行耳此二法雖同是一時事亦同在一書册中而利病相懸兩不相掩或因其役法而並訾其賦法或因其賦法之不可變而併謂其役法亦不可變皆偏辭也蘇郡其亦然乎聞部司文書督逋甚急則楊給事之説不行矣又纍賢使者區畫奈何奈何答蔡可泉判官白下本非有約顧奉清論同寢食者數日若大洞既有約矣謂必得奉清論同寢食如白下也乃竟爾茫然人事之不可料者如此然兄既絆於領簿不能來而僕江湖散漫之人宜可乘興一至大洞且淂徑造府下又以家君至家日侍定省莫遂兹懷乃知名山勝遊非特牽纓者常不能兼雖江湖漫散如僕者亦若有所繫而不可必遂矣奈何伏惟吾兄純明溫粹篤於向道以此為政必能近人然僕竊有願言於兄者大凡年少髙志之人於事未必僃嘗故或病於疏文藻雅逸之士多不奈煩至以簿書獄訟為溷褻故或病於華而無實而謫官遷客縱不怨尤又往往以簡曠不事事為得體故或病于惰窳而苟祿此三事雖號為賢士大夫者或不能免也以兄之篤於嚮道自然不墮落此弊然僕所望於兄亦惟兄不使毫髮有類於此而巳若使此處縝密即是學問縝密一有脫漏即是學問脫漏不當舍此更言學問也大學曰心誠求之孔子曰無倦惟兄留意焉僕自少隱居亦嘗痛百姓疾苦欲援手焉而惜無路也以為他日苟幸從薄宦庶幾得一社一民以自效雖才器駑鈍亦庶幾興起一兩事利人者除去一兩事病人者以少償所願焉及竊祿干朝浮沉郎署數年竟不能一獲素心雖巳罷官間居猶用此為歉兄初亦署郎也不謫則不為此官矣是僕昔所冀而不得者兄今得之兄之志豈與僕異耶則今日之謫固天所以拓兄之才成兄之志而試之實效也僕竊為兄幸之廣德之民以黠悍著聞久矣昔時治廣德者患其然也則必峻刑法以繩焉民見上刑法之峻也則益出於悍黠以求必避是以至於上下相賊刑罰益以峻而黠悍益不可勝曾不知君子長者雖無一時操切之效然每每能使人回心而率化乃知漢史馭惡馬者利其銜勒之説為未然而蘇洵以齊魯待蜀人之説益可信也兄意云何或能了大洞之約悉意請教當在此時故不盡言兄其亮之與吳峻伯縣尹前使者冒進瞽言自分必且見絶於吾友矣適會陳戶曹道及吾友欲相顧是吾友舊愛之深不遽以瞽言為罪也即令人往候使節於白氏則巳行矣悵惘竊惟論治者先體故按督之體異乎州縣風憲之職異乎拊循而州縣之所以拊循其民惟其平易豈弟大小畢輸其情使民之入公門者如入乎其家見守令者如見其父母是之為貴耳使民見威而不見德敢怨而不敢言則雖一時或能收整頓撡切之效而其所斫喪者多矣書髙明柔克可省也向孫文卿在江隂嘗過僕僕問之曰兄素講學學問不是空談即如大學論平天下如保赤子此便是真心便是明明德兄試自省百姓到面前時可與自家兒子一般文卿應曰此意却似有之僕當時不以為然曰兄得無太容易説了久之詢其所以蒞民果無甚愧乎其言僕是以心慕而敬焉文卿方於事上而圎於撫下是以雖或惡而謗之而不勝其愛而譽之者之多也眼中亦曾見一人為江隂使百姓膝行而前俯伏戰栗不敢仰視此輩者何足多哉吾友清才雅志僕何用喋喋若此但桑克之説為髙明者發耳傳曰善人受盡言僕素以豪傑望吾友豈獨善人已也相念甚勤未知使節何時更入郡耳懸懸素不遣人持書入府縣中今特遣此以謝兩次不淂相見之故且恃吾友之知我也此後有持名到貴治者必偽無疑預言之與金攝山縣尹金入於大冶數經火力愈煆鍊則愈精純而授新馬於舊牧之圉試其熟技則人與馬益相習雖然其雜金固有一火焉則耗者矣其牧馬如東野之御固有始則善而久則馬逸焉者矣攝山之凛坎於世也是金之數經於火也其再令於章丘也是再牧馬也吾見攝山之愈進於精純而章丘之民與攝山益相習也雖然不可以不兢兢也使久而益精也而無耗焉久而益相習也而無逸焉而後知攝山之果為良金與良牧也近得李中麓書言章丘凋弊甚須淂良吏拊循極有望於攝山僕以為在攝山舉定海之故事行之益加之意而已至於馬因地異性人因地異習銜勒有緩急飼秣有燥濕不窮其力不失其性則在善牧者虛心而調劑之僕又何言哉重刋荆川先生文集卷之九
