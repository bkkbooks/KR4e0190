front:
  text: 重刋荆川先生文集卷之三詩
  hash: sha256:54c1e5f70c7b6d5282fb70542ecfc41b346675806102e898685c11c346433a82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_003-1a}
body:
  text: 病中秋思八首閒對江楓誦楚騷病容秋色偶相遭一身萎薾同衰葉雙鬢稀踈似毨毛衣冠巳禠甘牛馬文字終捐是粕糟但使盡空諸所有不妨一醉笑如陶宿生輩血病來消掃室焚香意自超坐與蜻蜓俱歇午吟隨蟋蟀共鳴宵看雲种放終踈散嗜酒楊雄只寂寥巳覺閉關成僻性公車何處欲相招法宫侍從昔承恩班列貂璫近至尊字辨豕魚翻帝典曾校寶訓實録筆回星漢注詞源獻書開閣三公第校射分朋七貴園俟罪江潭今幾歲清秋回首泰階垣塞垣萬里事防秋選將分兵出帝州白馬幽并遊俠客金兜肺腑冠軍侯請纓曾抱迂儒志借筯誰當幃幄謀巳酉年來堪竊憤翩翩胡騎入關游液池梧月冷金沙戶綰天河織女家蘭麝氖氲知賜浴芙蓉撩亂覺分花龍舟習戰鐃中曲虎旅傳更馬上笳老去張鶱皮骨在秋來猶憶舊時槎學仙曾欲訪王喬中夜頻將一氣調杳杳洞房開禁鑰微微面目上清潮色濕灰時人莫識夢鈞天處語難描悵望新秋蒲栁思塵緣猶絆鬢先凋何年海上入妖氛滿地樓臺盡一焚刃露雪霜驚壯士陳翻蛺蝶掃疲軍倭夷有蛺蝶陳星河避影宵烽逼砧杵停聲哭巷聞野老無能效籌䇿空彈長鋏對秋雲逺遊當日意何如楚越風烟一棹餘湖斬鯨鯢先帝跡山圍龍虎異人居閒坐清溪談劍術深探古穴訪仙書試問同行相憶否一秋多病閉茅廬病中秋日作四首藥褁牽纒歲半徂秋風先自到江湖榮枯草色占鶗鴂深淺潮頭候荻蘆吳地連年盡豺虎野人何處覔蓴鱸亦知不是獨醒客與世浮沉糟可酺扁舟繫纜且休徂秋旱川流未灌湖衰齒病多諸品藥貧家薪少半墟蘆稍能鄙事催孳豕偶戲仙方看釣鱸自署醉侯常是醉君王不待賜恩酺一身之外不知謀若道謀身病未瘳居並野僧方結夏身隨稿葉又經秋肥猶似鬼臞何狀少不如人老合休忽報吳門兵燹盡古來佳麗說南州愚公本自拙于謀癖在烟霞况未瘳蟬響蛩鳴分晝夜寒灰稿木混春秋醫方百試增身病藿食終年與世休責守一無聊自慰且忘倭寇過蘇州有感百步飛刀賊勢雄連城刮地泣途窮誰供秋稅耕農盡將授寒衣杼柚空星孛仲尼書北斗兵交師曠訝南風六州節制慿元老㑹剪凶渠早奏功道家人說道中語開口便是先天後天無極太極兵亂中人說兵亂中語開口便是干戈搶攘之狀蓋亦各㑹其所遭也使兵亂中人讀道人之詩則雞狗殺戮之憤躍馬除凶之氣便當一笑灰冷使道人讀兵亂中人之詩其亦有愀然而攢眉勃然而扼腕者否耶陳渡草堂二首皂衣非復漢庭郎蔽緼深冬卧草堂貧薄不羞畜牸計沉浮也逐鬪雞行殘書閣盡經旬病異味嘗來百草香獨愧頑心猶未化十年學道幾亡羊近市偏逢食有魚閉門不問出無車牛衣聊自對妻子蠟酒時將洽里閭世網幸踈如野馬微名猶在愧山樗亦知農圃真吾事春至頻翻種樹書小樓宴坐二首不入名山不世間嗒然隱几置遺編身名瓦礫宜居後人事蚊虻任過前抱樹蛻蟬司化運隔窗風竹發真詮未登道域終難罷微管還須學測天涉世已如入夢蝶居身未作脫鞲鷹自疑戾契戾契見韓文俗呼捩及終為病欲學墨杘墨杘見列子俗呼眉西又不能金老相逢知法器慈公頗訝似禪僧牛乎馬也從人喚惟一迂儒是本稱嘉興金道士三十年不下牀亦三十年不開口冬夏一絮𬒳自擁余叩之以指畫卓許余入道慈舟者蘇之名僧也余見之不告以姓名渠深嘆異以余為頭陀相也又疊前韻二首到處迷陽不記年村中曆本逐時編寒烏滿野成禾後社燕辭人落木前戒酒劉伶終酒性遣言摩詰亦言詮青天自是無逃處何事靈均更問天混合高低齊鷃鳯經過老少變鳩鷹屈伸禽戲慿何訣篆刻蟲雕誤謂能盡日閉關非酒聖文中子稱劉伶古閉關人草年猜謎是畨僧余與翠峯僧往來酬對者草年此身本自無斤兩月旦先生若麼稱莊中作帶郭頃田屋一尋歸耕自許力能任浮沉袁盎嗤驅狗廉侈王陽訝化金貯麥舊庾將易榖行鞭新竹漸成林計然七䇿皆無用小試經綸底似今自述避人不敢厭高深逃影何如學息隂楚客又成蕉鹿夢􅃮園未了是非心紛紛世事看花發默默天機聽鳥吟可笑維摩真病在無言說處是金針有相士謂余四十六歲且死者詩以自笑古人云死生亦大矣此謂趂日力以進道者言之也苟不進道總是虛生修短何辨焉苟干道有見處夕死可矣然則死生詎足為大哉本是癯然山澤士衰年況自不勝衣色常帶墨緣辭肉形或如灰似杜機睢于久謝偕來衆蹇拙何心知我希世人莫詫方皋眼相馬由來失瘦肥殤子彭聃誰夭壽百骸九竅孰踈親若過顔氏十四歲便了王孫一祼身三載濫叨金馬客幾人共坐綘紗春即今已似前生事何待他年跡始陳人情世事古猶今寂寞空林寄此心賢聖不分聊中酒虧成忘盡一開琴有書終日只掩卷無病長年亦擁襟即使癃然似桑戶未逢點也是知音學道曾窺天壤意寒儒又是膝攣人只言蔡澤有限壽誰見壺丘不定身賁客懶迎長謝病薄田可飽敢稱貧後來不用問修短已占溪山四十春囊癰卧病作三首節候經春日日隂寒襟獨擁閉門深終朝錬液非仙氣幾歲懸疣是雨淫焦火凝冰鐫瘦骨兒癡女長試灰心總緣病裏悲歌意不為離鄉也越吟春半忽驚狗馬疾年來似是龍蛇辰謝醫少錢長郤藥暖骨纍䄄聊借人味為𥙷虛一試肉事求如意屢生嗔正愁未了形骸外生老病苦只此身余平生無厚褥止一褥既薄且敝病骨覺冷硬不堪也乃從親人家借一褥襯之平生有厚褥與重褥自今始而余素戒肉養病乃肉食頻年喪我几堪隱到處逢人席任爭疣贅勿嫌能侈性支離畨笑足全生野𬞞入口勝甘脆病骨先時卜雨晴苦訝道人長好懶如今懶病果相成濕入病骨覺爽然則晴覺痛楚則隂雨至矣瘧病作跰躃栁肘盡欣然深隱烏皮也自便金冶由他不由我狼胡是病亦是天身先辭宦猶中熱衣未經秋已著綿炎凉反覆須臾事一疾畨令悟世緣小集為人所刻文學從來本不長隱居辭說半猖狂徒令後世能疑孟秪覺前身似姓莊玄白何分終覆瓿榖臧奚事總亡羊從今巳息掞天口只著農桑一兩章靈芝寺同童元功宴坐湖上高樓縱逺心復沿湖岸過東林身閒似帶烟霞氣地冷兼無鐘磬音衣裏寶珠應自信苑中靈草試相尋坐來忽散千峰雪對爾無言意轉深登屠翰林仍臺作二首太史仙臺多勝槩正臨擕李古城東五色雲生知海近四圍山逺覺天空閒居作賦青春後幾歲鳴絃明月中不是掖垣同宦侣閉關那許得相逢一上高臺興不孤望中總總入虛無烟霏春變隂晴氣草樹天輸海嶽圖對酒笑將花是伴銷憂誰問土非吾知君苦厭文園卧此地能令肺病蘇時屠久卧疾次人憂旱作歲歲吳儂事水耕朝朝占雨愁雲輕澤中不聞鳩語合田際但見龜文生野老䑛糠猶自得書生炊桂亦何情東南生計巳如此聞道山西又點兵再遊清溪莊值主人不在次韻桃樹臨溪思不禁扁舟重問草堂隂西湖水落黿鼉石南國霜清橘柚林壟際流泉宜稻性窗前過鹿解人心憶君剪徑相迎處今日蓬蒿又已侵至常熟陳中丞白訓導邀登福山看海二首春早湖山雨半晴有客邀我觀滄瀛澤國冥冥蒸海氣石灘淺淺鬪江聲日月廽旋一島小金銀色相十洲明微風向夕送清響應是仙人吹玉笙久緣迫狹悲時俗海嶠春臨思若何地湧龍蛇爭起陸天投星斗橫翻波封疆坐覺華夷并氣候常看霧雨多才謝枚生能作賦觀潮恰對曲江阿金澤寺中寄松江友人澄湖昨夜雨𥘉霽驟覺春衫寒意多逺浦草青送歸鴈夕陽潮上生微波戲窺佛偈翻金字靜卧巖扉掩緑蘿伊人只在蒹葭外獨對清尊奈爾何松江金澤寺四首東南巨浸五湖深古寺維舟正夕隂客到山僧罷清磬雀喧晴日下高林夾洲烟火三家市滿目蒹葭萬里心徙倚不知餘興盡月明還擬聽龍吟三江抱處勢如環野客探竒住不還一望樓臺疑海上稍聞雞犬覺人間幸無漁父知名姓且與山僧共閉關自笑歸來張季子春時蓴葉未堪攀何年此地開金剎宋代流傳直到今聽法石將山竹幻護經龍與水增深爐烟裊裊知塵性柏樹青青見佛心可是攀緣渾未盡天花猶自惹衣襟水國餘寒芳草稀偶隨烟艇問山扉窗中怪石如人立天際孤帆伴鳥飛高齊盡日逢僧語短褐經春換客衣吳江亦是垂綸地笑指星文愧少微天寧寺塵外樓四首瞰郭樓臺誰共登偶携仙客對山僧林烟渺渺人家盡階日微微花氣蒸浮世閒看飛鳥過機心不遣白猿騰平生自笑支離甚散髮行歌此又曾名山不用逺攀登暫借繩牀我亦僧幾樹鳴禽助禪寂一藂修竹散炎蒸捻花不盡心傳妙對塔空將口說騰俯仰百年成滚滚乾坤隻眼更誰曾金門十載笑重登歸去仍依白社僧虛館靜聽宵蟻戰逺山時見夏雲蒸巳甘散櫟終年計耻逐冥鴻萬里騰為問洛城冠蓋侶鬢毛銷盡得閒曾閒裏香臺盡日登默然一笑又逢僧衣裁野薜緇塵淨飯試山精石鼎蒸大士西方談實相仙人東海說飛騰人間多少亡羊路一一行來也未曾題湖上廢寺二首禪宮舊枕清湖曲與客尋幽試共登獨樹春深𥘉著蕊空山行遍不逢僧臺荒曾與施烏食城化徒聞駐鹿乘惟有松房明月影年年長似為然燈古寺無人盡日開隂廊寂寂長莓苔何年飛錫老僧云此度折梅狂客來迸水乍如聞梵樂踈松猶自繞香臺人間俯仰成今古何必昆明有劫灰題龍池菴三首相傳伏虎禪僧開山處山頂有龍井􅔼蝪見則雨逺遊為訪白雲巖轉盡孤峰路更南龍見小身時出井虎馴大士舊開菴襌心客思俱潭水古佛寒松共石龕坐對老僧無一事夜深相與說楞嚴精廬原寄北山巖新築高齊過嶺南谷窈窕間還密樹石孤危處更虛菴聽經野鹿頻窺戶宴坐山僧不出龕客欲逃禪無可醉逺公於酒禁方嚴霽後嵐光散曉巖望中佳麗盡東南三春蘭蕙堪成畹千里湖山併在菴馴鴿下時呈佛性飛鷹宿處見僧龕維摩今日還多病酬答誰將䆒妙嚴贈菴中老僧僧解相人術少嘗遊歷江南晚歸菴中早從祝髮事棲巖為禮名師每向南用華嚴事業淨六根成慧眼身無一物寄苑菴厨邊引澗寧須汲松下翻經幾到龕若使焚香能證道前身應說是香嚴嘉靖丁未春余以病客荆溪遂同杭子宣登龍池僧居嵌巖中如鳥巢梯其門以登值二老僧相對煨笋遂以笋供余二人因留宿與老僧坐至夜分談說楞嚴因緣事老僧意甚朴野可愛也明日曉起嵐氣滿山乾坤如混沌狀階前竹柏亦在摩蕩中咫尺不可物色日且午始開霽則諸峰歷歷澄湖隱映樓觀草樹百里之外若在几前蓋宇宙間晦明不常若此既午出往石屑石屑兩山夾澗山高百餘仞而澗道僅闊四五十步人家緣澗以居惟亭午則見日色蓋其勝又與龍池異觀矣既午飯遂從西霞步入舟意興悠然如有得也嗚呼此豈可與沉酣聲利者道哉遂書以貽子宣使藏之遊宜興海會寺作徑路緣溪不知逺忽然身已入峯腰深山怪石如懷寶暗谷懸泉訝聽潮僧比封君千頃竹人稀農畝萬家樵逺公不厭踈狂客試結茅廬共寂寥贈黃子晦故黃教授子黌舍相逢憶聚星豫慚入室爾趨庭子長能繼先人業王吉曾承博士經萬里風烟還命駕草年踪跡已如萍衰顔重感青襟日一笑尊前喜愧并寄周臺官二首時余將往南都南臺分署沐恩𥘉官是疇人世業餘龍吐珠璣天地轉星塗黃赤石甘書泰階平處瞻雲闕玉漏清時直禁廬應有道人扣關者試看紫氣近何如文史元隨供奉間南都祕省更清嚴沙書暗譯西蕃曆草奏多陳南極占日下有雲朝紀瑞臺中無事畫垂簾倘覩少微思處士漁樵已判此生淹家居喜袁芳洲相過賦此為贈三首相逢京國最情深休沐歸來每共尋異品對餐呈海味道衣便坐解朝簮迂踈北闕上書日寂寞江潭俟罪心已分與君成契濶一杯還此幸同斟憶昔曾同念菴子歲寒訪汝深雪邊别開閒館屏人語不解朝衣藉草眠琴意相傳中散後玄言每到漆園前正是江東暮雲處再逢携手一悽然四十支離一老夫衰顔恰比列仙臞鑄金不驗身多病種樹無能圃半蕪長日閉關聊默默短衣迎客笑拘拘知君昔日探玄意定有真詮肯示豫次韻贈薛仲常山林鍾鼎性俱安官舍寧非在澗槃此日心情真似水平生臭味本如蘭閲世方皋誰牝牡認真桑戶且衣冠秪應黃馬春泉溪田頻來往春日江楓共倚欄歲暮有懷諸子歲暮蕭條只自如南州高士久無書逹夫樗材在野大何用種髮經年短不梳剡水驚心溪雪後汝中隴山飛夢嶺梅𥘉景仁祠郎消息慿誰問萬里昆明是謫居叔仁贈張贑州致仕還吳次逹夫韻田園舊在海東頭海上新歸張翰舟種菊不辭三徑晚採蓴將及五湖秋人情歷盡惟看奕世事忘來獨好樓剩有著書心尚在知君原不為窮愁贈宜興王丞次韻王蒲州人官粟還能五斗無年來只是憶樵漁道知戰勝臞猶在詩為身窮思獨殊耕稼吾非徐孺子才華爾亦阮元瑜他年更向龍門隱為念江皋一腐儒答朱刑部士南見寄清齊偃息灌園餘囀盡春禽又夏𥘉對客不須妨蠟屐占年常自檢農書六經注腳吾焉敢五嶽行踪或可知宣室正須公等在野人只合掩荒廬同萬鹿園宿工文菴次韻有贈何處尋山不厭深淡烟歸鳥暮鐘音去家百里訝如客别爾經年尚此心宴坐清香滋夜氣閉門殘雪映寒林相從一宿應堪覺機事何須問漢隂次葉師與諸生講書鐘樓寺聞鐘作早歲傳經髮已斑寄身精舍渺人寰苔邊屨跡堪盈戶花外鐘聲正掩關驟覺海潮生靜夜却隨仙𣑽響空山先生默默隱几坐試問諸生醒夢間養病道院忽張君見訪不值奉寄生涯歲歲藥囊間已息交游亦未閒土木形骸真覺稿蓬蒿庭院只常關偶隨道侶學禽戲忽枉高人題鳯還此夕知君向何處多應弄月卧江灣答贈胡柏泉赤囊前日奏邉書皂帽何時掩故廬鳴劍豈知孤憤切請纓爭笑少年踈自甘淡泊看松菊耻學浮沉逐里閭春日黃鸝西澗草憶君歸去灌園𥘉送郭無錫擢南曹主事郭侯齊魯推名士暫屈清才綰縣符折獄一言驚老吏洗心終歲比冰壺南曹已應郎官宿東國常懷仙令鳬野老殷勤何以贈益崇明德永嘉譽贈督府張半洲兼柬周中丞石崖四首威名昔日動南荒斧鉞重分定海疆八鎮大臣承節制六千君子備戎行若營內險無如海但練沙兵略用狼師老寇深為日久佇看石畫一更張壯猷元老舊文儒羽戚雍容禮樂餘吳起援抱休進劔韋卿對壘只肩輿撫士嚴冬挾重纊屏人半夜草隂符復道降人為我用三吳深雪正擒俘無知醜虜恣炮虓誰識元戎廟略饒七䇿謀臣陪後乘三鏢蠻騎護前茅計藏處女深堅壁勢激驚雷迅搗巢民夷連結禍未已上計由來是伐交插羽飛書入建章帝親推轂任才良東南大略輸公墐尊爼竒謀仗子房人家半是焚燒後禾黍又成荆棘場為將先須固根本諸公深計在民瘡尹洞山祭酒枉顧草堂有作見贈次韻二首相思幾度夢中迷却望金門隔石溪騏驥合馳千里足鷦鷯分老一枝棲門才通水勞移棹篋尚藏書借照黎更羡君如逺祖喜談玄一派自關西獨持鳴鐸啓群昏南北諸儒盡在門身繫蒼生人望久道行世子國師尊過憂治世常如病冥契真詮不著言别後知公心事在每占台斗坐孤村又疊二首感時愁見海氛迷抱拙空知卧一溪秋盡龍蛇還起陸月明烏鵲正驚棲儒冠本不間軍旅肉食誰能念藿藜對子𣏌憂方一寫明朝車馬又東西樗散無能任醉昏蕭然帶索掩衡門荒庭久已無綦履上客何期共酒尊籌國賴君三寸舌著書強我五千言擁衾相對渾忘寢弦月微微上逺村贈都督萬鹿園四首次思節韻幾年枯寂學全真一握兵機運鬼神驕養義兒皆判死灰心禪客亦投身獨承利鏃生如剩遍散黃金家益貧直欲填橋跨滄海先聲萬里走波臣暫脫荷衣事鼓鼙從軍亦復有新詩犯難甘為智士笑還山肯顧道人期申胥自信知天定李廣何心計數竒尊爼運籌今巳就潢池跳躍欲奚為許國誰能似爾真每憂時變幾傷神試看養亂偷生將共是腰金拖玉身杼軸千家愁命盡轉輸萬里嘆師貧饑饉干戈今並急謨謀全仰二三臣寒宵清嘯雜征鼙撫劒劉琨本善詩開幕待降收死力隔江遣諜刻還期功須因敗畨成巧算恰當機不見竒長子帥師今在爾道傍築室莫輕為詠俞虛江參將四首將軍意氣敻無倫感激寧辭血戰頻手摶鬼夷嘗百種身懸鯨海歷三春掃空巢穴多深夜奪得艅艎秪數人此日渠魁當授首䇿勳早見上麒麟知君兵計原儒術儒術深明計轉工洞識天符非候氣妙窮火力不因風巨魚射處波神遁雄劒鳴時水怪空却笑賊徒能負險幾人􅽮􅮚劫灰中昔破交夷尚少年祕經曾自白猿傳一軍盡署滄溟裡百戰常居士卒先龍為求群窺劒匣蜃因吐氣護樓船尋常嚙齒非無為不蕩三韓誓不旋絶鳥諸蠻次第芟中宵蓐食理征衫艙通木井三年水檣轉銅烏萬里帆軍斗稀鳴人莫犯身衣常解士爭銜功成他日誰能頌海上磨崖大字嵌送曹子泰自大理出守漳郡兵戈南徼方多事佩印特煩良牧來于公治獄元無枉孟綽持廉也有才山稅積荒勞撫字海氓負險費招徠要使經營收異績未宜拘謭按常裁萬思節以集中無名作詩見貽二首學道頻年慕屢空支離猶墮語言中不是班生表人物徒然楊子戲雕蟲書字書名吾豈敢得皮得髓子應同他年郊畤傳中說倘借名卿孰過公臯北三載愧儀刑學術那堪立戶庭顧我自知太玄白如君本是出藍青老去門徒多謝遣病來意緒轉沉冥高賢豈訝無名藉十哲由來是俗稱萬思節工於詩而近又學射次韻答之衣鉢寂寥吾且老文章煆錬子能工一源已謂出天稷六義還須繼國風深窮别趣元關理力造竒言不露鋒便是詩家射雕手何須射藝又兼通勉和原韻稍復著意亦竟不工豈造物者欲讓子出一頭地耶一笑往往來來多值婚嫁牙檣錦纜蒼頭廬兒照耀河衢而吾內人與令愛乘一葉之舟可謂蕭然雖然若使吾與思節肯借力於有司及親戚富人奚啻與傭兒較一冷暖哉易所謂不如其姊之𬒮良轉覺彼為俗吾為雅也雖然此猶有計量心在也各歸其家則路中冷暖雅俗俱渡川之筏矣俱忘之矣要之有求之便宜㑹盡而不求之志常在也世間大事小事一切何以異此然不知者其無謂我為解嘲戲語乎書此以奉思節知思節之意與吾同也次萬思節韻蕭芝田二首屠龍老巳知無用一遇時艱見術精焠就戈矛皆吐火幻成獅象總疑兵空中墮語人無跡地底藏雷賊不驚戰勝何心邀重賞由來只欲賭聲名共說火攻為上䇿祕方誰復似君能石飛陡使晴鳴雹機轉真疑夏造氷魯國雲梯猶自拙楚人燧象未須驚么麼倭鬼那堪算破虜橫行記昔曾題王世新一枝窩三首蕭然環堵傍湖坳半瓦參差半覆茅鍾鼎相傳精古字戶庭不出玩𥘉爻紛華燕雀窺金屋空曠鶢鶋占海郊榮寂兩忘非所事一枝聊爾寄吾巢自笑名場久脫羈敝廬歲歲理新茨試看繞樹空三匝何似巢林寄一枝閒行蓬藋孤飛處晏坐榆枋斂翼時寂寞􅃮園千載後心期應只許君知希世從來謝不能虛閒每與道心增交遊息處孤松對今昔忘來一几慿夜讀隂符羞說劍醉過白社偶同僧如君自以鷦鷯比借問何人是大鵬夜歸陳渡草堂時新與諸子别去有懷二首野夫也復到城市日暮還尋四壁廬蛩響露餘將入戶人歸月裏又離居坐慿烏几都忘我起對流螢且廢書正憶青襟同舍子别來秋興各何如自擬身名如鄭圃宫環半畝日長扄褐衣頗笑非懷玉茆屋何因却聚星樹底蟬聲希鼓瑟燈前鳥字一談經試言吾易將東去未識何人是姓丁癸卯送仲弟正之赴試偶因今日送行處尚憶當年聽鹿鳴馬氏白眉占仲子吳門霜鬢愧難兄秋來一雁寒江影天外三山古帝城此去騫騰非所羡期無溫飽負平生己酉送兩弟正之立之赴試秋水芙蓉映緑杉殷勤送爾到江潭人能鳴世慙三鳯家有遺經是二南文入妙來無過熟書從疑處更須參逺游他日看之子下澤欵假吾巳堪送諸從游應試二首一壑謀身世所踈幾人相伴此閒居月懸山館談經處雪壓林皋宴坐餘向來衣鉢吾將付先輩文章子孰如亦知雅志輕青紫好及明時早上書幾年山澤共淹留今日公車且見求楊桞扁舟吳苑夕梧桐雙闕漢京秋清時元不棄寒士白璧誰將笑暗投都下逢人說論語莫言師授是張侯送馮子聲赴試與君硯席辱周旋義理蠶絲每共研頴悟最居德祖後聲名愧出照鄰前身同槁木甘吾隱賦就凌雲羡爾賢莫道孫弘曾不遇漢庭推轂在兹年送禇生滔赴試久撤臯比絶來往偖生時復欵柴門文有波瀾堪得髓座無笙管只清言客心落葉秋江繞别思平蕪夕鳥翻此去期君戰勝後歸來正對菊花尊鄱陽别方道人戶庭不出巳多年千里隨君意豁然飲醉或歌還或泣鬢蓬疑鬼又疑仙詎知衰鳯堪為笑且學塗龜得自全今日别離何足恨終期共住白雲巔中秋夜同陳澄江張夢麟城壕泛月森爽秋逢三五中霜天雲物坐來空河灌百川還小艇寺藏荒野亦踈鐘客嘯忽聞清唳鴈月圎真訝吐珠龍疑君輿我皆仙骨身世何須更挂胸和張尚書甬川新修池亭奉母登憩作聖朝耆舊位登三綵服公餘樂更堪東洛撫師雙玉節西園奉母一茅菴春暉映處花侵戶冬笋成時竹上簷聞道閒居新作賦承歡養性此能兼贈蔣璞山封君主事宗魯之父早游鄉校巳知名曾與賔興聽鹿鳴修行明經為博士夏弦春誦課諸生官無鼎食千鍾願老有鄉園十畝情更笑嬴金何所用仙郎作吏比冰清贈張通政五湖舟楫是家居篋裡惟携老氏書幾日陸沉門下省一生心跡海東漁賔常滿座嫌猶少行不齎糧任所如陽羡山靈相望久獨能無意命巾車用韻自述南村北郭仕吾居懶散何心更著書小酌或能稱酒隱直鈎聊復事溪漁童時篆刻堪為笑病後形骸漸不如若道猖狂今又甚窮途猶自未回車壽張通政蚤耽玄寂謝塵氛身隱猶嫌名可聞自著道衣辭漢闕因尋仙籙禮茅君行隨勝跡曾無住藏向名山更有文南國夜來占氣色少微渺渺動江雲壽陸師慎齊七十草年不向市城行閒看桑麻自長成道貌肥來知戰勝儒冠挂後覺身輕北窗意味人千古西序聲名子一經髫齓門生今白首稱觴還聽後堂笙曹霜崖六十曹生恬之父舊官御史道人容色自臞然幾歲江皋躡紫烟謝氏家兒如玉樹周時柱史是神仙鼎成靈藥方皆驗書貯名山世未傳懶散自憐蒲栁質相從擬欲學長年司訓殷龍巖壽詩文東之父白頭博士早懸車鳩杖扶身八十餘甲子暗占綘老歲今文口授伏生書清尊只許通門客隱几何心出里閭應笑嬴金無所用仙郎才藻更誰如楊醫士六十衣裁鶴氅鶡為冠數卷方書一草菴綘縣老人知幾歲太倉仙令却多男不為避人居郭外每因採藥到山南年來頗訝嬰兒色道術從知宿所探禇怡閒六十滔之父古來仙客說長髯今日髯翁亦是仙家近縣門不識令身居城郭亦耕田鳩形正可供扶杖亥字還看紀歲年共羡高門將有待賢郎文藻更翩翩贈宜興閔翁八十壽詩古貌翛然山澤臞力田還是漢人餘久諳汜勝齊民術閒讀周侯風土書桑榆曖曖隨行徑弟子欣欣與燕居駟馬從來足憂患羡君身世更何如周子隱有陽羡風土記贈天寧寺僧八十化城東畔駐三乘祝髮從師記昔曾頻著袈裟迎上客自分齊飯與遊僧談經幾夜窗飛雨削杖先年手種藤因笑馬嗚身巳老欲慿弟子為傳燈懷竹叔壽詩叔善畫傳自乃翁門傍清溪長自扄隂隂藂竹繞幽庭地偏南郭人堪隱秋盡東籬菊正馨笑傲百年惟稼圃風流兩世擅丹青不須海上求靈藥元是江邊老歲星楊醫士壽詩東亭先生富道術隱居城郭似江湖隨身長挾雙白鹿入市只懸一玉壺社中漸覺推前輩門外從教滿病夫豫亦文園高卧客年來肺氣為君蘇贈丹陽湯孺人壽詩少年為婦舅姑前及見黃門正拜官喬木門前經幾世曾孫膝下且勝冠中厨列鼎堪調膳永夜真心憶和丸聞道仙郎拜嘉慶沾恩新自五雲端謁文敏楊太師墓次江提學韻野狐三度扈王師諸將從公受指麾賜解御裘冬學暖詔裁密㫖夜常隨前籌不數貔貅力末命仍歸喉舌司萬里回鑾驚駕晏軍中未有一人知北郭謁宋鄒道鄉文忠公墓宋代巳經三易世忠公遺墓尚嶙峋敢言有志成慈母公母張𣣔公為諫官報國逮罪何期及故人公謫故友王田輩以祖公𬒳罪黃閣十年終賣主瘴烟萬里合投身已分此生堪客死魂歸猶是故鄉春讀東坡詩戲作東坡卒於武進顧塘橋去余家數十步公詩句句寫胸臆一滴水成大海翻方皋牝牡無定相曼倩滑稽有至言掃除李杜芻狗語出入鬼神傀儡門異代或疑後身在告終此地招其魂喇嘛翠峰老僧挽詩三首枯木寒岩亦未真走盤珠子自精神三餐煮籺一生事翠峰每食糠餅屢歲齊僧幾萬人鑄冶金容瞻氣象圎通天眼悟根因翠峯得師傳天眼訣欲上伏牛心未了了心應待再來身不事钁頭不坐禪揚眉瞬目見雄談净體髮鬚元不礙翠峰不去頭髮煉心妻妾宿曾參翠峯為僧後入俗曾有妻妾者三年殿壓滄溟功九仞爐開色相佛千龕翠峯一生鑄佛造無粱殿于浦陀未成也年年航海精誠在垂沒魂還到海南自愧迂儒厭俗葷每游香室藉思薰别來常似一臂失用莊子話久寧容六耳聞人去忽驚函谷履錫飛無復海東雲憐君鑄佛經千億欲借餘銅一鑄君錢心漁挽詩心漁先生不可見尚憶吹簫卧草堂垂綸老作江潭客得姓元從吳越王貧病一生心自足雲山千里興難忘更聞治命真堪紀人世空矜石槨藏雪詩和蘇韻十首隂風吹隴麥芽纎歲盡玄冥令更嚴園圃未春先綴蕊乾坤如海欲生鹽不妨積處堪高卧預想晴來好曝簷縱是未能堅作玉漸看氷柱巳垂尖大地文章散縞纎小堂風物倍清嚴灑來竹裡迷人徑積向巖前訝虎鹽但使曉寒欺短褐獨宜夕影泛虛簷瓊花栁絮皆無用誰擬新詞一鬪尖寒江我亦弄纎纎豈是羊裘人姓嚴履處幸不露足趾嚙餘真覺厭酸鹽紫雲黃竹千年調白屋朱門一樣簷高岫儘教遮蓋盡物情元自礙孤尖寒臯白草尚餘纎墐戶村村似戒嚴飛舞千峰山吐練粧成幾樹木蒸鹽填蜀有木鹽病多消渴宜調茗老巳捐書莫映簷強欲摛毫追小謝謝惠連有雪賦詞鋒久避六朝尖宛轉素娥腰帶纎回颷似應舞節嚴三冬怪事警粵客古語粵人不見雪一夜凄風結解鹽解地鹽遇風則結厭就包羔歡錦帳思分挾纊到窮簷擒胡此日堪乘便誰奪祈連萬仞尖李靖因雪擒頡利蕭蕭凍樹晚喧鴉門外誰來長者車入夜俄驚千里月開簾相對滿空花東郭先生猶敝履西關遷客正思家最憐漁父滄江畔閒倚孤舟獨挺義一片寒原滿樹鴉幽人掩戶罷柴車聊慿濁酒延春色試向踈梅問臘花草閣映來書幾卷江城積處月千家此時忽憶荆溪道雲際雙峯聳玉義𥘉看朝采揚金鴉倐見玄雲隱日車恰似幻師能作霧却驚翳眼驟生花緗編暫借簷前影銀閣常思夢裏家笑道非鹽亦非白禪機一指為君義空城無粟噪饑鴉陌上紛紛正滿車積澗暗隨泉並滴入簾應與筆爭花芻米驟高新歲價柴扉旋掃野人家客來此日須沽酒梁上青錢那得義巢風欲動始占鴉空裏悡翻百寶車葱嶺未消阿耨水珠林忽散鬘陀花故氊猶在能禁冷好客相尋懶卧家且似瞿曇逃世網雪山跏坐足為義家僮自野田携黃菊二株至軒中感而有作三首曠野隂隂萬木霜誰携數蕊到苑堂冷質本非堪競秀間情敢謂愛孤芳在野寧辭衆草掩入簾聊作滿庭香自笑吾生花興少欣然對爾亦相忘余素不好花見此不覺有喜意豈真所謂花之隱逸者耶巳拚寒谷不須媒讓寵何嫌並朵開花意幽閒當艷麗天心霜霰是栽培潯陽逸客瞢騰醉姑射仙人綽約來寂寞於人誠少用試將服食制齡頽不沾春色也穠纎小院踈籬祕靚嚴人比孤花清入聖天然真味淡非鹽未須採摘供調藥為嗅馨香置近簷落英好護餘根在來歲還看茁玉尖此首用坡公雪詩韻漂布架二首皎皎亦知塵易染置身特在半虛空素娥罷浴仍餘濕靚女慿高欲御風潮翻净練江樓上霧捲輕綃海市中不向太陽蒙一暴剪裁誰使得成功姢姢素質寄孤標出浴仙娥濕未銷弄影自知迎日早慿虛特覺去塵遙將乘灝氣晞氷骨一任輕颸揚舞腰移向海傍堪望處錯疑鮫室挂寒綃襪架二首氄毛水打𥘉成襪餘濕還應待日消禦冷何辭居下體負暄早巳託高標似隨仙舄乘雲近未蹍芳塵去地遙却訝緣橦諸侲子倒投絶足試輕趫襪材溫厚剪羔群絨袎𥘉勻濕未熏就日且須緣峻木凌波將不讓羅紋色迷玉磬齊懸簴影伴仙鳬半入雲終屬美人施錦系畫簷風起暫􅌭紛病中食江魚作自海寇亂此魚不至者六年矣腥風暫說靜鮫潭石首新嘗到草菴常味畨令食指動病身未覺水鮮甘試和芹子心仍在欲薦椿庭恨豈堪莫謂有無關口腹安危消息繫江南弟兒次江魚詩韻深不稱意偶坐水榭無事再疊前韻教之罟舶夷舟遞占潭凌人忽為啓氷菴百船十死衆爭利一尾半金人買甘偶嘗貧士已知足數飽豪家亦未堪遙憶金盤充貢處九重當食念江南次韻題王孟端春流出峽圖錦江一派自天開誰寫春流映翠臺萬木深中疑欲斷千崖裂處訝還來蒸成暖浪魚翻尺繞向仙家客渡杯瀑挂玉龍如起蟄沫飛野馬似吹埃探源詎識臨河意乘木誰堪涉險才近水人家巢鸛鶴逺山天際落莓苔趂流蜀賈回輕舸燒野巴僮墾廢萊萬里風烟真縮地丹青枝蓋至此哉滿屋春流訝眼開丹青倣佛見章臺曉經神女和雲度寒盡天山帶雪來合勢兩涯誰辨馬潜行一線僅勝杯戲暖魚龍恰不夜潄川花竹總無埃沿洄欲問幽人住險絶堪矜蹈水才荆巫信有四時雨灔澦全銷一點苔祠識黃牛多古木城迷白帝半荒萊吾生本是東吳客萬里西逰亦壯哉孔明送蜀使故事山居槍榆徙海鵬鳩笑續短截長鳬鶴悲山翁未解稽生癖垢面蓬頭也自宜讀王遵巖所為拙集序文自嘲四首嘐嘐妄意空千載沒沒安能蓋一鄉江東若問如卿比車載還應更斗量文章未出風土外人品猶纒習氣中只可清狂慣吳語却令識字笑吳蒙札也能輕千乘國蹈道無能早見譏公羊氏曰札可謂輕千乘之國蹈道則未也三十年來持戒意於今四十已知非力希顔氏何能望竊比言遊未敢安老大漸知親灑掃試將妙用此中參紀夢萬里歸心促曉雞滿巖寒月正街西道人久謝天台夢也學劉郎一度迷有司查腳色二首道士原無鑑湖賜山人敢署醉侯封猶查腳色煩官府陳渡橋邊一老農逃名最喜稱無姓抱病還應厭有身說著宦遊如一夢不知猶是籍中人遊塘候巡公四首公門幾歲罷趦趄俯仰衡茅每晏如豈謂鬢毛蕭瑟久尚隨疆吏路傍趨沙堤月色曉朦朧曾向朱門候相公逢迎不意猶能慣回首當年似夢中樗散空知慕鑿壞柴關終歲更慵開今日偶成蝴蝶夢也隨花氣過墻來禰生狂態復如何一刺懷中半滅磨縱令罄折謁官長猶勝詩人詠荷戈海上凱歌九首贈湯將軍湯侯猿臂猛虎鬚少小曾窺玄女符明主親頒手中劒直交跨海斬天吳紛紛盜竊爾何知岸上斫人水上嬉自咤一身都是膽欲將巨海作潢池偃旗休角寂無猜百丈樓船泊不開夜半賊營流矢滿才驚漢將是飛來水軍隊隊黃頭郎迎潮直上凌扶桑巳知海若先清道萬里滄波定不揚海上秋高朝氣清營中賈勇競先鳴疊嶼亂翻旌幟影驚濤盡作鼓鼙聲沉船斬馘海為羶潭底潜蛟噴血涎髑髏帶箭逐波去可道孫恩是水仙錦紈愛子亦從軍長鬛蒼頭總䇿勳誰奪強王萬金首帳前齊說小郎君五千長㦸下淮邳自是沙洲命盡時將軍欲置平戎鼓須借鯨鯢腹下皮湯侯以渠賊玉艮皮製鼓捷上彤庭寵數優詔分玉帶與名裘麾下偏禆盡稽首貂蟬笑看出兜牟南征歌十二首五嶺烽烟久未平君王習戰幸昆明却說將軍多勝算不須文士請長纓詔錫􅊮弓出禁城良家六郡總從行將軍舊佩平蠻印校尉新開橫海營漢皇有道伏羌胡南粵何知擅一隅萬里出師將問罪不因大海富明珠獨承節鉞控南州親寵由來冠列侯昨夜輕寒生幕府賜衣𥘉著紫貂裘晴原羽騎簇油幢繡帽爭先踏鞠埸不惜千金收猛士欲將尺組繫名王月明吹笛武陵川馬上行人望跕鳶莫怕炎洲饒毒癘一冬飛雪似胡天軍書插羽速星奔卭𤏡夷王盡欵門殺氣三秋清瘴海輕兵一夜襲崑崙草木干山鼓角風將軍牧馬夜郎東靈臺向夕占星色巳報攙搶墮海中圍合孤城海氣昏紛紛失木泣窮猿何如銜璧歸天闕幸荷明王不死恩牂牁南去亂峰連滇海藤江一帶懸縱謂蠻封堪畫地不知漢將若從天奏凱歸來拜冕旒霍家襁褓更封侯因風為報單于道漢闕方梟越尉頭千群椎髻競來王聲教南流盡越裳但使文犀通貢獻不將銅柱隔封疆塞下曲贈翁東崖侍郎總制十八首四月旌旗出白狼千山晴雪照油幢預知水草軍無乏試辨風雲虜欲降三晉連年苦𬒳兵九重拊髀憶豪英詔書更不從中御萬里長城一委卿詩書禮樂古人風開闔機鈐又不窮得一胡兒如愛子用三敗將立竒功山前山後兵馬雄斧鉞衣裳在掌中狹士獻刀承賜酒貴侯免胄為趨風赤氣氤氲夜指天旄頭落地如火然曉來西山一鏖戰奪得牛羊歸滿川千金買士却何為一間過于十萬師黠虜欲逃頭可購名王未獵客先知太師昔日定南荒親把長纓繫莫王寄語老胡須自愛射飛休得近邊墻虜中謂大官為太師梯懸半綆哨臺高胡漢鄰家隔一壕數日虜中無動靜吉囊東去戰黃毛虎翼龍蟠大將旗逆驅流電走妖魑陳前捉得胡王女賜與營中厮養兒灅川冰盡水泱泱堡堡人家喚蒔秧田中每得鳥獸骨云是胡王舊獵埸馬邑邊胡數𬒳胡王黃叛漢更通胡帷中妙算能先發奪得黃旗與繡𥜗健兒白馬紫金鞦不向沙埸便酒樓夜來一賭青錢盡尚有囊中血髑髏邊人大半能胡語胡騎年來亦漢裝誰向青紅氊帳裏單身縳得不花王少年意氣王千斤鐡棒曾穿萬虜群壯士從來不病死孤兒今屬羽林軍君侯生長在炎洲塞外層冰草木愁祗憐軍士猶寒色臘盡轅門不御裘畫㦸森森清晝閒指揮只是笑談間收將漢地教耕去捕得蕃酋命縱還營平謀國最深忠每與公卿見不同但使湟中無寇盜不須麾下有邊功青青塞草羽書稀士女鼾眠畜牧肥戲看侍兒呈舞馬醉邀幕客對彈碁偶感十一首蓋屋曾無一把茅姑蘇城外盡荒郊行人欲識郵亭處問是軍燒是賊燒賊來窺戶正臨粧虜得吳娃似孟姜簫鼓滿船催送酒大王今夜作新郎毒藥本能攻毒病病瘳藥發更堪論借問苗兵誰駕御逺觀元季近桃源勝敗於今自可明不調琴瑟也須更滿地髑髏多祝髮紛紛猶尚說僧兵詎道狼兵能賈勇渾身褁鐡怯如何不似江東輕俊子袒衣黃帽去揮戈袒衣黃帽去揮戈一潰奔騰湧血河滿目更無刀箭孔背心攢簇似蜂窠諸城連接控吳中群賊無知枉見攻誰識主人多勝算關門閉得不通風匹夫亦足關輕重好共軍門仔細論吳楚不知收劇孟夏人還解欲驗藏錢用水澆挖開錢谷地無毛首插片旗紅的的鄉人一一去挑包眉目粗頑髮指冠鄉人權作大王看鐵燒醋灌俱嘗盡笑殺無鬚是宦官奸細紛紛遍群國丹陽奸細獲偏多舟人魚子應回避賈客胡商孰敢過觀道士祈雨二首星壇步處雲隨合里邑喧呼道士功四海正需霖雨急卧龍何日起隆中巫舞商陽古有之神靈風雨灌壇時隂陽燮理輸誰力秪遣兒童頌法師歸自金陵宿白土長路緇塵欲上衣暫投客館亦如歸不因野老來爭席豈解山人久息機酬徐養齊尚書見懷之作亦以少頌盛德并為扣關先容云耳二首卜居秪為謝塵緣三尺繩床亦穩眠縱是炎天非雪夜終須乘興到前川柴門長日閉青山薜荔衣裳氷雪顔愧我未能分半榻藥囊書卷共消閒送楊訓導擢曹州掌教二首傳魁之世久知名君作師儒更有聲巳道江東桃李遍春風還𬒳魯諸生臯比幾歲卧江城綘帳談經復此行廣文不厭青氊冷京兆猶傳白雪聲君先人尚書公嘗為京兆尹有清名為奄瑾所禍贈徐愛杏山人詩有序壬寅秋七月余偶識山人于錫山山人善醫尤精金瘡以為其父傳之異人也山人治病投一匙于垂絶無不應手愈余因思南史所載一人因斫蛇而獲靈藥自是出入行陳金創𬒳體以藥塗之盡效相傳以為竒雖然使其人當時得遇如山人者又何假于孽蛇之餘也哉邇者戎馬蹂􅏳鳴鏑遍野邊人之橫罹于毒者何可勝數向使致山人於塞垣軍旅之間人且爭忍死而趨之以丐命焉者如織矣而乃漠然自老於江南無事百年不見兵革之墟則抱其技而寂寂焉固其理也諺云士視其所遇茍不在中流雖五石之瓠奚所用之嘻豈獨醫哉㑹山人來求余詩而吾友靜思武陵二君皆介為之請率爾賦此且序以見余意而詩次句用南史事云一卷禁方誰與傳雙童搗藥經幾年園中種杏今多少疑爾前身是董仙題贈假紫峰仙人宿處紫烟孤一片峰隂散玉湖今日隱身城郭裏閉門常寫廬山圖秋日書客童君見過賦此為贈有客扁舟問草廬窗前梧葉正蕭踈山人巳得忘筌意不復從君乞異書題陳推官羅江號二首高卧曾分白鷺沙清溪深處採三花總為徴書出空谷衣裳猶自染雲霞三山江畔入雲齊紫氣千年鎖石堤便欲學仙從此去與君同聽夜猿啼題寶華和尚卷幻目由來見幻華飲光何事又拈華兩華舉似知華客為有别差無别差贈王和尚住善卷偃柏垂蘿古洞春上人飛錫此何因非關福地尋仙侶自向青山認法身自述贈寫真毛君津黑尚餘山澤氣委蛇又似列仙臞他年太史徴圖畫為識乾坤一腐儒贈曹星士一江號春雨蘭陵江草生江流恰與道心清門前車馬日來往閒坐江城說子乎自述并贈曹君少讀隂符耻未工青山偃仰漸成翁人間炎冷都忘盡聽話流年一笑中曉起觀猫捕鼠起來隱几坐朝暾深謝當關早閉門簷角偶欣猫捕鼠反觀尚覺殺心存題畫山空夜靜猿一鳴磴轉雲深鳥不度幽人何事長獨棲只為此中有佳處廉使廖東雩喪後開所惠地黃酒臨觴慘然尺書滿篋故人情想像荒丘宿草生秪餘此日開尊意堪作山陽聽笛聲贈儀真沙君葭菼蒼蒼水國秋高樓明月古楊州二十四橋雲霧裏看君騎鶴上天遊贈史君漁沙號問君何處挂漁簑豫亦垂綸坐緑波他日相逢應一笑不知若箇得魚多華𥙷菴三度惠酒而此畨所惠參酒者絶清冽可人雖味甚濃厚而置之杯中淡若無色可謂嘉品因劇飲至醉遂成口號奉謝三首磁杯寫盡只疑空秋月寒潭意頗同隱几偶然成獨酌夜凉白露滿庭中每甘樗散惟須酒欲𥙷虛贏却藉參瘵疾陶生兼好飲舉杯深見故人心淵明素瘵疾絶無色相傾明水只有馨香藉白茅此夕飲醇拚一醉恰如把臂與公交食石首魚又得鯧勒二魚喜作口號向時石首每至郡鯧勒亦不至也非海氛漸息何以有此昔年食首又成羹鯧勒相隨亦就烹應是鯨鯢先授首紛紛水族盡亡生凶狀腹前排劍㦸勒凶謀腹裡漲彭亨鯧二魚狀亦最可惡罟師自有截江網性命惟堪一筯輕重刋荆川先生文集卷之三
