front:
  text: 重刋荆川先生文集卷之八
  hash: sha256:72fb7857ac2a834eab47c563a9884bb6be2713740808afd6bc18248f7b8ccfa8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_008-1a}
body:
  text: 答徐存齊相公得來書三復感歎深知兄之苦心然不待兄書亦深知兄之苦心也河上公之言曰圖難者於易為大者於細故勢有所不可必行則有拯有隨歸於委曲從宜以成天下之務事有所不可不豫則或迂其身歸於彌縫微密以濟天下之幾是以天下隂受其福而不見其功此非古之所謂誠與才合者不能而後世喜功之士與務為名髙之人皆不足以及此也平生固嘗以誠與才合屬之兄矣願以不計利鈍鞠躬盡力之義苦心其間此同志之望也僕今年自種數畝薄田始識稼穡滋味至於少日雄心不覺漸自灰冷或記及往事則巳忽忽如夢中今讀兄書亦如聞人說夢中事今復饒舌奉答亦如夢中又自說夢也幸笑而置之漁石公豁達開朗一見而知其非今人遂不覺開口論世事然亦甚自笑宿昔老婆心有未盡拋却處也別兄後多病廢學惟有閉關謝客一事只欲走還舊路此駕遂不可回亦自念不免負兄拳拳相教之意奈何稽生所云性有所不可强也吕與叔大臨蔡顯道良佐程門之選也吕有玉溪文集或版在陜中謝有上蔡文集或版在河南煩兄一為求之即使今世無版兄求之多藏書家亦或可淂能以相寄為山中讀書之助亦大惠也二吾丈負天下之望久矣僕誠迂愚無識亦竊嘗以誠與才合屬之吾丈者今居相位將為國家起百年太平之業蓋非吾丈之誠與才不克有濟非得盡吾丈之誠與才亦不克有濟也山澤病夫願少須臾焉以觀盛績吾丈其將使民無失望哉使吾無失望哉一二士人自北來多道吾丈拳拳垂念鄙人雖然吾丈知吾之昔而不知吾之今非昔人矣樗散闒茸百念盡冷巳作一方外人矣追思曩與吾丈及浚谷相聚謬負意氣欲攘臂於經時之略真如說夢可發一笑更有可自笑者閉門縮首幽其影響以避咎而卒不免于每速衆口之咎槁形灰心毀棄廉隅以逃名而卒不免于每冒不情之名乃知犬易發無咎無譽一爻所以教戒山林之士意至深逺初看若甚易然仔細求之非混化形迹同而能異異而能同處世人之問不特不使人見有一毫可憎嫉處亦不使人見有一毫可稱述處則誠不足以及此耳東南海寇出沒於國家雖為疥癬而百姓則不堪荼毒非特蘇松為然敝郡亦凜凜于鄰之震矣傳聞賊酋復有造船大舉之說不知何以為善後計也曩者變起倉卒蔡操江以身任之雖無成功亦儘支撑劾非其罪有足惜者草草及之諸惟台照答翁東崖總制自乙未歲奉别于京師十數年間吾執事設施磊落聲望益崇蓋嘗深謀極慮為天子建南平交夷之績而又起而膺北伐玁狁之任是天子以方叔召虎屬公而公能以方叔君虎自任也三晉連被殘破醜虜之患一二百年所未有蓋有非常之患而後求非常之材有非常之材而後立非常之功公固其人也豈特一時掃蕩廓清將來數百年長城保障之計實於公賴之矣僕竊聞之古者將受命之日則忘其家臨桴鼓則忘其身是閫外效忠之道則然軍功爵賞皆決于外不從中覆是廟堂委任之道則然不然則鋒鏑交於原野而決策於廟堂機㑹變於斯須而制勝於九重此自古豪傑之士所以每患於掣時而功之難成也今閫外效忠之道在公能自信之而天下亦以此信公矣不識廟堂之所以委任其亦必有以異乎前時所謂總制者否也聞前總制在邊以請糧一事不合於某閣老遂不久而去若爾則其所以專行者亦無幾矣夫自古未有不淂非常之人而能立非常之功亦未有不托之以不御之權而能用非常之人者也雖然托之以不御之權而或不能立非常之功則其責固有在矣公務盡其為之在我者而已矣前時為總制者其委任既然至其自為又大率顧忌利害畏縮首尾怵惕譏讒日夜以保功名冨貴為事不肯以身蹈天下之難而為苟利社稷生死以之之計是逡巡歲月至於喪其成功而往往被罪以去蓋其所以喪功者生於保功之計太重而其所以被罪者生於畏罪之意太深公豪傑也轟轟烈烈做却一場可則進不可則退奚顧慮之有哉僕又聞督府之任不在于自用而在于用人且夫西北邊固多沉謀鷙扞之士矣公廣詢而博咨之使文武長材盡在幕下至於負瑕故將守墩老卒苟有一長亦得自效期於群策畢舉此開府第一義也何如何如宣大與三關地圖敢求見寄為惠往時邊關圖本大率只是丹青一幅而巳試之實用直如畫餅近見劉松石公陜西諸鎮圗稍為精密古之籌邊者虜之所從入與吾之所以制虜皆可以按圗而坐籌之是以守固而戰克人皆言虜人來去如風雨此亦未必盡然且虜人非萬騎不能大舉騎不可一日無水草沙磧少水而水草可飲食萬騎者尤為難得虜人擁騎南下須是覘得水草便利處然後可入其無水草處虜人亦不能以饑渴馬致千里也是以邊城雖綿亘千萬里虜人雖是風雨來去而其所從入大約可以先定其小小隘口零騎可入處雖不可數而其大舉之路大約不過數條而已禦虜者常患僃多而力分苟圖畫分明可以必虜之所入與所不入知虜所入與所不入則僃可以不多而力可以不分列屯築堡駕梁按伏者却大半氣力矣公在廣西時僕嘗索藤峽圖於公後聞屠漸山言公嘗寄我藤峽圗矣竟不及領教不知當時寄之誰也近日所徵材官射士逺及南國此於名則美矣但東南柔脆且素未見虜恐費衣糧無益實事不若以其費募土人之豪勇者則一人逺戍之費可得土丁兩三人土丁䏻險阻識虜情得一人可當戍兵兩三人韓退之與柳中丞書曰徵兵滿萬不若召募數千此實語也山澤鄙人經年臥病百念灰盡承公舊愛不覺放言至此惶恐惶恐俟公破虜功成當以向時雕蟲末伎作為鐃歌鼓吹曲以繼采芑江漢之餘嚮以彰我明天子任賢使能之效公其許我乎三讀來教并所寄邊圖忽如置身于塞垣鼓鼙之間而聽鳴劒抵掌之雄談也甚慰甚慰曩過恃知愛僣有陳述然以章句腐儒而敢與知金革之事以東南鄙人而敢與知西北之僃此如支離疏攘臂于壯士之間竊可自笑而吾丈乃不以為迂曲賜教答推是心也則安有不能集衆思廣忠益而屈群策者手伏惟吾丈之氣既足以鞭撻四夷而深計逺慮又真足以繫單于之頸雖推轂不御之權與魏弱翁所以主張營平侯故事今未可以盡望于廟堂但在吾丈則願一切不計成敗利鈍只論為之在我者當如是耳蓋古之成大事者多出跅􅕟不羈之才而朴樕謹細多不可與度外之功是以豪傑之說往往亦出於此若至于活變宛轉則是失却自已面目且自古未有務為自容之計而可以成度外之功也營平建屯田之策璽書切責者再三彼終不易其說而迄以成功况肯活變宛轉乎來教云擺邊為自困之道須是以攻為守誠然誠然今秋虜人不敢南牧知籌邊之力也自此益為不可勝之僃以待可勝之虜如眺生所謂一大治則終身創矣必勝之旅必攻之謀非吾丈將誰諉哉雲中久蓄癰疽今復有宗室搆虜之變即此事勢誠可寒心其破敗擒獲雖出募下效力亦㑹有天幸也善後之道如何如何以吾丈斡旋宇宙手假須䏻為彼中人轉換得一畨心腹腎腸消其亂源而誘之忠義此非智力駕馭之所能及亦非苟安無事而幸其一時平定以塞責者之可與也機括所在吾丈籌之熟矣山野鄙人每以為韃靼不足慮而國家可慮者乃在于此浚谷論邊事時不知曾及此否答曾石塘總制使節蒞東土兩辱惠書至山中深感道誼之愛山人于世故無所知然竊觀近事內則闈中之變外則夷狄之患推之天下事其可隱憂者多矣側聞去年虜騎入上黨齊魯之民奔走逃匿賴吾兄百方鎮定始安堵如故吾兄弭亂之略始試于遼左而綏輯之效再見于山東者若此使繼此而進以秉鈞持軸則夫不動聲色而坐銷天下之隱憂就使或及可憂而能圖善其後以不至於甚壞者非兄輩之望而誰望乎夫有實志而後有實學有實學而後有實事後世道術不明故其所謂事業者多就其才力知慧之所及而不能盡純乎天理之正多出于一身功名之計而不本干忠誠愛國不能自已之情是以雖其所立甚偉而與三代以上作用敻隔絶矣兄之有志于道也久矣願益求之性情之間以培乎其根時觀古聖賢之所以本乎身而措之事業者以自鏡焉盛德大業豈遠乎哉素辱知愛敢以是致愛助之意弟自還山以來懶病相成惟幸此心不敢自昧而新淂殊未之能也有便更望時教督之二不奉光儀八年於兹朔雲邊月時為馳望自來總帥往往以戰事委之麾下而自以擁兵閉城坐談為得計是以動多敗衄獨吾丈擐甲仗鉞身自督戰出入塞垣戎馬間蹀血斬馘使黠虜名酋百年來至是始識大帥風采而介胄之士於是亦不敢謂文儒怯於冒矢石逺道聞之猶能使懦夫抵掌生氣而况在指麾之間乎旌旗鼓角改聽易觀固可知也射手胡宣回承惠手書及疏稿邊圗披圖誦書疏則朔方形勢既厯厯在目而雄略勝算又得竊聞一二極以為慰承諭河套之役自古舉大事者其初每若落落難合及其成功往往如取諸寄自吾丈始為復套之議士大夫多以為時勢之非便蓋不惟醜虜未遁之前為尤難而山澤鄙人之見亦不䏻無慮於此雖然至金城而上方略營平要非苟然指山川而畫兵形陳湯固有奇策非常之事固常人之所疑也惟吾丈內料國家財力之盈縮兵馬之虛實外料虜人部落之離合敵勢之瑕堅不徒為犂庭掃穴一時快意之功而必為以全取勝百年善後之計使戎馬既不敢渡河而中國財力亦不因之困憊既弭近患又無遠憂則社稷之福也適臥病草草伏惟垂亮三曩者草率奉書未悉所懷兹又辱示大疏并營圗則分合進止奇正迭用熊虎之韜如承面授而士馬騰躍旗幟精明之狀如獲目觀古所謂節制之兵何以過此真足以立於不敗之地而不失敵人之敗發舒華夏之氣而掃空百餘年狐鼠之巢穴有不待捷書之上而知之矣兵家之變不可盡言而疏中所論用間設伏與夜斫營掎角八九條則大約僃之用間使其自相疑而自為鬬最是攻夷上䇿然非深得敵情則不能用間非熟於地形則不可以成掎角之勢而夜襲敵營但譎詐凶狡虜人所長且自我兵形既露虜人亦日夜為僃而匿實示虛匿近示逺匿精壯而示羸弱百計以疑我者宜亦深矣則得敵情為難自百餘年來中國無一人一騎入套中者此路閉塞已久則得地形為難而今之所謂淂敵情地形者秪是據降胡偵卒一二人之口萬一實事未必盡傳傳事未必盡實則聽信之際毫髮少有差池至於當機合刃呼吸便有安危此其多方參伍使較若畫一全在吾丈勝算耳雖然此猶是攻戰之說而未及乎經營善後之計也大率今日之事不惟一戰逐虜掃空巢穴之為難而虜人既遁之後城堡未立之前軍士經時曠日野處露宿散布於二千里空虗之地能使戀巢殘虜一無所窺伺突發乘間之為難又非特杜塞虜人窺伺乘間之為難而一時遷徙二千里之軍民一時創築二千里之牆堡以填實二千里百餘年空虛之地能使內境一無憊敝騷動之為難故不難於攻而難於守守之所以難者不足虞於敵人而足虞於內境者人謂平吳之後更勞區畫今勝虜之後更勞區畫耳守之所以難者姑未暇言而攻戰之難則敢竊陳迂闊之論或可以少僃勝算之採擇大略以為千里而襲人必濳形匿影乘其不僃而後可以得志復套之議兩年於兹矣我之兵形既露而彼之為僃亦密我之間諜雖精而彼之窺伺亦熟我䏻分兵以相攻而彼亦能并兵以相待春夏之虜馬以乏草瘠而我馬於此時固亦不能籍草於敵虜弓以春夏解膠而春夏多雨濕我之火藥火器亦有時而不適於用我恃火器以攻虜而輜車絡繹於深草叢莽之間亦宜防敵人火攻之便且夫兵法非十不圍非五不攻萬一虜人自知不敵結連套外之虜并聚於套中合力以抗我其騎兵必且十餘萬計而我六萬之兵分為五六路彼於地利既熟知其何路為險而於我兵且窺覘其何路為虛彼將空其諸路以疑我而并力一路以邀我是以彼之十萬而當我之萬據彼之險而擊我之虛或一路稍有疏虞則諸路聞之搖動如宋人燕雲五路之役可虞也或我出則彼遁我歸則彼復躡之如吳人所以疲楚人之術可虞也或彼逺其輜重部落誘我深入如趙信教虜之計可虞也蓋必我知虜所以聚兵之處而彼不知我所以出兵之路我䏻散敵黨之合而敵不能乘我兵之散我常得重地可據之利以扼虜人輕地易走之勢然猾虜窮寇之情兵凶戰危之慮出於意料之外者殊不止此蓋寧可過為多算而愼之不得少算而輕之也然以吾丈老成持重深謀石畫則於建議之初凡今日之所以攻與後日之所以守固巳得萬全之算久矣弟迂儒既不足以知兵事而坐談數千里外又未嘗一見虜情離合虜勢虛實而鑿空言之宜甚可笑然以吾丈屈群策而立大功雖塞垣老卒竈下厮養亦宜無不得畢智效計於其前者是以鄙人不敢避其迂濶耳平涼趙子生長邊陲又素以兵事自許吾丈亦曾一盡其說否近見邸報得吾丈條陳邊事一疏竊以萬全之算多具此中而邸報止載條綱願淂全疏一觀之并三鎮巡撫所議與河套詳細地圗俱望一見示或更有以請教也冒瀆伏祈亮恕胡宣赴麾下意甚慷慨一夫之奮勇可以觀三軍精鋭之氣矣寄趙浚谷別兄十餘年何能一時忘兄近舍親萬禮部寄兄書知兄慷慨許國之志自顧榆枋之棲不䏻為南溟之翼少助一毛風力耳一笑一笑聞兄僉憲山東以操練民兵為事靑齊徑卒教之以有勇知方以僃一切不虞之變自是兄所素長不待贅也古云視卒如愛子可與同死生此輩須寬處銀糧豐其犒給或別異其軍中之豪傑機警者而優待之不然則不能結其心不䏻結其心則威不可必行而緩急亦不可得力但不知供軍之需可能勾得吾兄使用否雖然世間可虞者不獨在夷狄而世間急務不獨在兵事而巳然此非兄職守之所及而亦非山人之所敢知也但耿耿之憂則彼此同之耳弟三年為木腎所苦今偶潰膿幾至殞生然向來所苦亦漸减盡顚趾出否猶為幸也承兄分俸之惠逺及家君多謝多謝弟以家君老年不能逺出不然則當訪兄於山東且淂一觀軍容矣老嫂亦棄世可歎可歎趙道長過此尚在伏枕草草不盡念菴兄家居後甚有進益此兄自是腳踏實地一毫不肯放過的人眼前人物少見其比者弟亦稍稍尋得一安身立命處山林終老當不盡虛却此生耳趙道長相知最深兄欲知我別後蹤跡問之此兄如面相對也適作此書欲寄而莫提學所寄兄書適至乃知養兵之財甚不足緩急何以使人奈何二舍姪歸道兄起居即如見兄一畨殊慰殊慰兄履危而獲安處疑而獲信蓋天為社稷也僕多病早衰年乘五十齒牙半巳搖落每誦陶潜世短意恆多斯人樂久生之語輒為一笑四十歲時此心巳成灰冷及虜騎入京師激于臣子大義不覺熱中一番數年來此心又漸銷歇蓋不待世人棄我亦自知分量之所定矣康濟事業有兄等在僕之不能從兄游者其亦數也兄為張德遠有餘力異日僕亦可以無愧蘇雲卿也乎前年病幾危時耿耿此心獨以不得見兄與念菴為憾去年必欲到江西乃了㑹念菴心事獨未得見兄耳見兄之心無時忘之此非特朋遊之私自以此身雖不與世事亦欲對兄一寫江湖之憂且欲劇談草野迂踈之見或可為兄濟時少助而已但僕既為老親羈絆而念菴出門亦頗惉滯若今歲不果訪兄則須待三年五十歲之外作一游方道人見兄耳舍姪言兄氣象和平藹然可掬知兄進德非復昔時露英氣矣僕嘗迂論古稱伊吕伊尹將則將相則相渾然無跡可言至若老吕以鷹揚稱以發揚蹈勵稱未免露出將才氣象此老吕不及老伊處也何如何如僕近來參同一路儘有入門俟兄功成身退時相聚深山中一談未晚也舍姪曾傳兄兩竅踵息之說僕亦巳知之此非面論不能悉與河南李中丞石疊濠上一晤竊自附于海內相知之後自淮隂奉別忽忽十年餘非惟踪跡曠不復接而音問亦遂踈濶每一念之令人耿耿即今時事多艱太原歲歲被虜鳴鏑及于上黨太行以外則撫相懷衛盡當其衝即使虜騎必不能越太行而兵糧策應掎角相援河南是第一步吾兄以素望起而任磁鎮之計若太原再警勢須鼓行而前不淂閉境自守而巳也蓄方固境急鄰輯民靖虜諸凡勝算必有在矣不識山人亦可與聞其一二乎僕也樗散本非適用之器且多病早衰自屏居以來齒髮漸變非惟不敢復有當世之志至于詩詞末藝吾兄向以為可教者亦經年不復䏻措一字真成一支離人矣每􅍦行樹下誦康節當年志氣欲橫秋今日看來甚可羞之語不覺自笑也因梁丞還家之便草率奉起居與萬兩溪吏部千里逸足混之皂櫪羣伍中雖不待馳騁康莊而精神溢出敻然自别俗眼猶能識之不特孫陽九方也僕甚無似每竊有感於才難之嘆而時物色之學士大夫間類多朴樕拘謭牽陋守常之習而少廓落跅跎可屬重事之氣漢人所謂羽檄輻輳軍書狎至事更有上於此承當幾何人今海寇之警未為大變而用兵數年人才大略見矣僕向游南都獲見兩溪於諸士大夫中所謂精神溢出敻然自别竊自喜俗眼頗能識之而得慰素所欲物色者退而質於大洲大洲云然是以雖相見之日淺而相慕之情深相與之言有盡而相期之意無窮也久欲作一書道此意以為屏廢之人雖遇相知亦宜閉口乃辱來書先施令人深慰深愧僕少不自知駑鈍亦不知世間行路之難而妄有四方之志自四十以前雖屢經廢錮至於為國為民一念每飯未之敢忘當世之務一切不敢廢習逮年近五十衰病逼人精氣耗盡料此殘軀理無久生且更事漸深自知迂𥚹疏僻之性必不可諧於世所謂五十而始知四十九年非也於是遂欲逃之方外以畢餘齒向來習業一切捐盡向來念頭一切掃盡居常兀坐奄奄如墟墓中人每聞人語及世事輒塞耳却走以避咎而已又擊壤老人所謂當年志氣欲橫秋今日看來甚可羞也形既槁矣心亦灰矣前時偶見執事逸氣及與執事談見執事􅈤􅈤悱悱憂時感事之意令人壯心頓覺戚戚相與援弓握槊聊為歡笑如磊砢老骨久甘伏櫪鞭之不動一旦偶經駿馬之櫪見其髤䰄蹀躞騰驤汗血自顧雖足躓而不禁心癢亦蹴蹄鼓噭仰首一鳴以泄其氣及退歸本櫪頺然如故向來激發惛惛都忘之矣相馬者以為肉與骨與神三相稱也不淂其肉當得其骨不得其骨當得其神若滅若沒言有神也若僕者縱使骨未朽盡而神已銷礫盡矣此豈可復有所馳驅於世哉執事尚有虞於僕也故敢一盡其愚蓋駿馬亦偶見老馬之一鳴以為猶可相與並馳而不知其本櫪頽然鞭不能動之狀也若果欲異日相與馳驅必并誤駿馬事矣故不敢不盡其愚也今世事多故摧輈駭駟有甚於上太行之阪其須千里逸足甚急而執事之才又已為世所知千金上價誰䏻先之僕倘未即老死行將見執事任重致逺過都厯塊以耀當世僕且嘖嘖心口相語以為向來所期之不謬亦足快矣亦足快矣更願執事於此閒時深其養進其學益廣大受之地如千里逸足雖自天生而飭其銜勒節其和鑾間其輿衛日愼日習所以自試畜力畜德所以成驥也願執事益加意焉異日執事徙官道經毗陵當相邀過山中靜坐一兩日迂鄙之見更有所欲請教者譬如老馬雖巳不能與駿馬並馳而道路險易山川迂回曲拆嘗所諳習與夫雖無德無力而畜德畜力之方嘗稍有聞者尚當一二為執事言之未必不可為過都厯塊之小助也令姪廷言足稱名駒何萬氏之多才也居喪言不文禮也念執事相知故縷覼言之愧悚愧悚與趙甬江司空承欲為鄙人修葺先墓且感且愧有深不自安者不敢不徑情達于左右也先墓之葬久矣苟有崩齧圯毀在所必葺子孫非有貧乏不能自存也乃不能自葺而至重煩上官葺之其為忘本而不孝甚矣子孫非甚貧乏而不為先人葺墓則是先墓可不必葺也可不必葺而至重煩上官葺之其為瀆尊而妄費亦甚矣夫葬者藏也期于人之不見而已上古不封不樹非以為薄也其用意深且逺矣中古封之樹之已寖失此意矣今先人之墓問其封則既穹如矣問其樹則既拱如矣若欲過為之制繚以石垣崇以巨屋儼然象生人之居明于始終之義者猶以為踰禮示侈而莫之為也漢劉更生氏言之詳矣彼特為王侯言之也况匹夫乎然則子孫自為之猶病其踰禮而示侈乃以重煩上官其謂之何且公之勞苦兵間傾公庫竭私財以激賞戰士常苦不給蓋一壷醪足以廣恩則一敝袴足以為惜也今為先人葺墓其費豈特一壷醪一敝袴哉乃至使公輟賞戰士之財為故人葺私墓在公謂之過厚可也鄙人乃以先人私墓之故至叨餮公之所以賞戰士之財其又謂之何然則有費于公而有益于僕猶不可為也今有費于公而顧以彰僕不孝妄費示侈之三罪亦安用之然而公之為此則有說矣不過以鄙人辱交于公之故必欲捐金以厚之然卑之以金則鄙人素不敢受惟以葺先墓為說則鄙人義不可辭而已此公之用意至厚也夫人之相知貴相知心故曰或與人以千金而人未必感或與人以一飯而人終身德之此知心與不知心之說也僕之與公竊敢附于心相知也久矣豈待于外物為厚薄者哉向巳託龍溪懇切轉辭尚恐公之不信我也故復喋喋萬望即賜停罷庶使僕異日尚可以奉教耳不然是公非以厚之乃絶之也徑情干瀆不勝悚仄與尚仰山巡按某山澤鄙人雖未獲奉教於左右然於明公清德雅望未嘗不心知敬慕至於明公所以拳拳相愛之情亦未嘗不心知感激也兩辱手教更荷不遺某迂疏非濟用之才𥚹狹非適時之器向來從仕數遭廢黜罪皆自取况今縗絰才終哀魂未返兼之年過五十老醜盡見寒灰槁木久甘不齒於人羣束帶整冠豈宜再塵於仕路辱公髙誼檄下郡縣過為推轂且感且愧向領部檄亦知鄙人衰病程期頗寬俟來年看病體何如當議行止耳若使赴官敝鄉去南都三舍而近道途之費不過數錢之銀則不敢煩驛人矣况敢借此叨明公重賜益增愧感謹此謝辭固知有道君子必能心亮也面奉有日不盡欲言二處漆園材與不材之間久甘散地辱古靈薦而又薦之草多愧虗名雖明公匪私於其人顧迂朽亦安能為役過承推轂不敢俟車謹豫望後赴職尚圖面請不既與趙尋齊巡撫古之義士有一言相信而千金不辭者矣公古人也亦以古人待僕者也百金之賜辭之豈足為廉而受之豈足為濫所以屢承命而不敢當者豈其與古異義哉鄙人固陋自中進士三十年不曾敢受常州府庫一分銀子今老且待盡矣不欲又破此戒此心事也故敢直言于公不然公未必不以僕為自疏也僕與公以心相信久矣不在今日也又不在此物之受與辭也若公欲致相愛之意則一紵一絹遠以相寄僕當裁以為衣常如見公可也冒瀆悚仄悚仄亦知公之必䏻見亮也餘情容前途更具答金前淙郡守竊惟交際之間有于義雖無可不可而于心有不安然心之所安不安即義之所可不可也胙之賜與受于義宜無可不可者然而心之所不安則亦不敢不達于左右也春間承明公過厚賜以鹿猪羊三首于時謂偶一見賜不為常格遂不敢固辭今復蒙賜如前僕既逺出不能面拜辭於使者老父之心亦甚不安于此而不可以代僕為辭是以又復如春祭之受之也夫胙者昔人所謂飲福受昨者也明公神人之主也明公之盡力干神人者至矣牲體貴首牲貴鹿壇廟之祭奉牲首以獻于祭主是神之所福也祭主熟而饗之以妥嘉福神人之心安焉顧僕何人乃僣食此非惟人病其叨餮而神亦且譴之自往時得與科苐郡邑諸公以常例賜胙僕每赧然對之以為身非陪祭何功何德可消受此然常例賜胙者不過三數斤猪羊肉耳僕之心猶不安焉然而不敢辭者以為與衆同之而于義又無甚不可不欲苟違衆以甚矯激之議也賜同于衆者既不可辭矣賜異于衆者復偃然而受之此何說乎以此特布鄙懷于左右此後復以常例見賜所謂三數斤猪羊肉者則必不敢辭當每歲兩饜飽焉以至沒齒其深戴諸公之惠若常例之外更加毫末必不敢當兾安此心而謝神譴云耳二世有兩說清修之士好言貧無厭之徒好言貧僕兩不然上無清修之行而下不敢為無厭之徒是以曩時有田僅百畝口中未常言貧今則每對人輒曰家有薄田數且盈千田舍翁得此深過望矣至見之於詩曰薄田可飽敢稱貧今刻之小集人人見之可考也一笑一笑乃承明府憐僕之貧為之捐俸于齎憑之人夫齎憑之人宜與之多寡僕自有說非敢吝財若使有千畝之田而不能捐數兩之銀以償一齎憑之人至以纍明府則其人平生之慳吝叨餮無行大率可知矣謹此如數奉償千萬見亮明府固知不肯獨為君子也與曹子泰評事聞軍門諸公欲相薦紛紛有金革無避之說聞之令人驚慚無地若無此事而先言之則為躁妄若有此事而後言則又無及故不得不以托之子泰也僕固陋之人所以自立于世者守區區之禮義而已如老嫠守節蓋亦幾十年苦心若一旦忘哀冒利恬不知恥則所謂舉其平生而盡棄之生不如死也若既有成命而咨趄前却不肯即赴則罪且不測是諸公之愛之者乃深禍之也若無此疏則已若軍門諸公或撫按或操江但有一疏到亰言及鄙人姓名煩即持此字到少湖處一陳愚鄙委曲少湖公在今時最號為維持風教保全人才者雖一介之士苟可以全其名檢而遂其素履亦必留意況僕素以頗識廉恥受知最深者乎金革無避之說蓋指當時如魯伯禽有社稷重寄者言之此只可為大臣任兵事者之例非可為小臣無關輕重者例也只可為見在金革不當因喪而廢事之例不可為見在閒散之人乃却去喪而任事之例也有可有必不可此辨禮家之所死守也見在金革不以喪廢猶為甚不得巳見在閒散去喪從事更何說乎若有此舉相及從之則死有不䏻不從則罪或不測煩吾友委曲轉言必使得免于此只當救一性命也情切詞迫勿以為怪異日服滿之後國家但有驅使臣子之義自不當辭但在喪中則必不可也必不能也與嚴介溪相公某不肖嘗辱與進焉而承一言之教於左右久矣邇來不奉台光者且草年矣然而不敢通一書於門下者非敢自踈也誠自度其最迂濶樗散無用不足以煩材館之記存也某誠自知其無用而相公誤以為可用曲為推轂拳拳引而致之於朝然知相公非私乎其人也相公之心恐一官之不任乎其職恐一士之不究乎其用固且為官而擇士固且為天下國家而用其人也某亦非敢私為謝以瀆相公也相公為天下國家而用乎其人其人宜為天下國家謝相公也為天下國家謝相公則莫如以身謝之以身謝之則莫如致其身以為天下國家之用以上稱相公以人事主之素心而明相公得士之效于當世則庶乎可以為謝而巳其如某最迂濶樗散徒有蹈矩踐墨之小節本無經時理物之長才自知實不堪為當世之用以纍相公知人之哲而或以少損得士之效此某之所甚愧而甚懼也雖然以某之最迂濶無用而相公猶且拳拳引而致之則人將曰相公之急於求士而不責以僃若此相公之恐失一士焉而包荒不遺乎遐若此相公之舉用無書抵政府之士動如古人若此則是相公疇昔得士之效不因某一人之迂濶無用而少有所損而相公急於求士之心乃更因某一人之迂濶無用而益以章矣此某之所以稍自解其愧且懼竊敢以不肖之身而仰承相公之高誼也頃奉新命待罪南曹古云召不俟駕禮也況聖恩用之罪隸之餘豈敢次且以速大戾但以鳥獸躑躅之慕甫及禫除狗馬疾疢之憂未離牀席形魂枯盡不齒人羣此亦相公之所憫念也恐稽朝廷授官之成命且負廟堂推轂之盛舉謹布鄙懷伏惟俯賜教之二順之此行荷國寵靈并承門下指教深懼不䏻稱任使乃跋履塞垣夙夜戎馬間才有不及而力不敢不盡也薊鎮主兵積敝久矣據閲過四區以十分為率逃故居見在之四三其見在者老弱又居丁壯之四三其丁壯者又多是未經訓練之人大率明旨所謂專倚邊兵不練土兵者一言盡之為今之計若欲求其速效非有如光弼至軍而旗幟一畨變色若欲責其逺功非有如抱真之在山西孳孳訓練三年而後䏻變弱卒為雄兵則薊兵誠未見有可以應敵之期而逺戍之兵誠未見有息肩之日也王總督自明旨切責以來過為疑畏誠如尊諭適承慰語深知明公鼓舞邊臣之至意欲其展布四體以盡力於防秋重務也馬巡撫不日相見謹致尊教但王總督相去已逺容更託的當人轉逹尊教耳伏惟台照不宣三薊鎮主兵舊額所以逃亡數多者大率衛所官為逋逃淵藪至於垜充招募之軍只緣當時處置缺當將東人補西軍而西人却補東軍人情不便以至於逃順之始行即開首逃之路今至馬蘭則首逃者糜至矣草草并附梗槩四前託白郎中奉一書大略言薊兵積疲之餘因循日久必有能練之才而又苦心勞力有必練之志而廟堂又時時從中督勵之乃可冀於成功不然又如往年故事也此書不知巳達門下否薊兵所以多逃一由於營官之剝削一由於衛官利逃軍與餘丁之納錢為之淵藪不肯解補其所以不練之故一諉於牆工歲不休歇無可練之時一諉於將官傳舍數易無專練之人而當事者又因循而莫之處也若使衛官不為逋逃淵藪營官不得剝削而在上之人又寬其工役足其月廩以慰藉之則薊鎮兵額原自足充而垜集招募皆為第二義矣大虜尚未有的報也東關已閲過六區惟一區未完也奉教有期先此起居不宣五竊惟薊鎮之兵自內地衛所抽往邊關譬如貨泉衛所乃其出産而是其轉輸處其逃邊關而潜回衛所則衛所又實淵藪轉輸不足責之出産逋逃不獲問之淵藪但自來邊關軍政已覺疏濶而衛所經理尤更鹵莽一衛缺逃軍不解者往往千名以上順之輩昨歷邊關其缺軍之數官巳量行責治今還經衛所若不稍為查理則邊上愈難勾軍矣是以到處須稍停留蓋不敢避遲事之罪以干誤事之罪也該鎮自督撫而下事權悉在各兵僃道前時若得勑內載却督同該道一語則事尤有統紀而易集今竭駑鈍於其間用力煩而見效少者則以不䏻督同該道故也適巳西還至玉田矣途次草率奉候伏惟台照不宣六竊惟薊鎮查閲一節軍數實是多缺不敢妄謂之不缺軍容實是未練不堪以戰不敢妄謂之練而堪戰若夫門下愛惜人材念邊材之尤難而代者之又難其人矜其不及而責其後功則廟堂自有權衡而查閲之臣只知據實以對而巳至於𥙷兵一節眼下便要三萬五千人才勾舊額頗費周折蓋邊關與腹裏相持衡之勢一鎮之財與力止有此數舊額雖在積弊實深難以毛舉不損邊關則損腹裏損邊關以寬腹裏是謂捨急算而就緩圗損腹裏以益邊關亦為空腸胃以奉肢體邊關空缺其慮在近腹裏耗竭其慮在逺且如今年運三四萬米於遼東薊鎮州衛僦車賃騾之費至賠貱銀六七萬兩又是抽却一畨骨髓而近來建議之臣因薊鎮兵數缺乏無可為處乃有改州縣為衛所與垜民為兵之說改州縣為衛所則畿甸之間頓成荒塞垜民為兵則無故而加之重罪以憂其子孫二者既駭觀聽且非事體故順之之意欲多方以圖使軍實既可足於邊關而財力不盡煩於薊鎮所恨才不足以稱心詞不䏻以達意但以承命悉心區畫夙夜思惟技止此矣惟門下大經略但一運掌間自當使腹與邊軍與民兩受其福也若夫直從薊鎮根本上做得一著工夫細心緩圗如管仲范蠡之謀國幾年作內政通鹽米輕重之權與十年生聚以富邊境此則薊鎮長久之策然議者必以為此書生極迂濶語故未敢言而轉穀通水足食之說亦稍發其端然亦頗不悖於救急之計并望賜教也其練兵事宜與夷情一節繕寫未了容更請教答馬巡撫書逃軍許其自首隨處收捕一節向嘗請教於思質公而公之論尤更明快直截僕輩亦同此意蓋與其逃而無用不若就近補之猶淂一軍之用也既而思之深有未便者苦寒磽硧之地人甚不樂居嚴法羈管嚴法清勾然猶住者多逃而逃者不獲若逃軍即許改編則雖素不逃之軍亦孰不逃焉以冀改編樂地乎是今日逃軍之補見役所以釀成異日見役者之作逃軍也竊恐利少而害多矣是以不敢便宜區處亦不敢遽有題請只將狀發與縣官而曰務須不失開誘首逃之初意亦不墮猾軍規避之私心使具由上請尊裁惟公一為處兮自當去其害而收其利也與董後峯憲副野人一入仕途百般悔吝禪家所謂猢孫入布袋真可一笑也塞上風塵寒侵病骨逺憶姊夫坐享園池之樂何如何如不久亦當圖解韁脫鎖之計蓋樓築至栽花種樹布滿園中雖不能與東鄰爭勝亦與公各適其適而時相過從也興言及此已覺神馳行至居庸小價回草草附此不盡與李兵僃曩承問及民兵一節僕之原題雖以徵兵解銀而部之覆題則主於照舊徵兵僕別後一路思之解銀兩雖便於薊鎮而徵兵實便於山東蓋山東兵額素定此背衣食於官久矣一旦欲徵銀以解邊既於人情不便尤恐緩急無濟且使薊鎮有銀而無兵山東出銀而缺兵則兩鎮亦皆不宜不若只照舊規遇有聲息徵兵入衛之為便也且部堂江翁司張正郎皆山東人也彼必斟酌地方利害故其為說如此不得以僕之說而廢彼之說也惟髙明更參以人情土俗之所宜而熟計之至於腹裏减存民壯則係嘉靖三十年鄢劒泉原題蓋通腹裏地方言之不指山東也便中草草附復佳章承教并謝與劉南坦尚書翁之病非真病也不為淨名之示疾則為壷丘之杜德機也神光獨照真可想見一笑一笑某世網所攖南北奔走北出塞南踰海顧執殳之役分不敢辭軍旅未習奈何奈何回首故山可為太息不久圖返初服奉侍屨杖當有日也圜中祕訣大約略傳示以少潤枯朽否乎與張龍坪兵僃獲侍同途又獲侍同舟日夕奉教皆出邂逅非素所期然公久垂念於僕而僕未之知僕亦久欲晤公而公未之知則又不可謂非素所期也維揚班荆自此奉晤下邳分轡自此奉別長川舉杯同於歡笑驚風折檣同於險厄數日之間而聚散驚喜之不可常世事大率如此達人觀之可一解頗也别後承遣使致手書殊感相念兹過臨清使者蔣繼先王清等還附謝伏惟垂照與羅念菴當路必欲以兵事相處使人不顧所不能僕亦不得已而效支離疏之攘臂不暇自顧其所不能而強承之徒使山洞髙臥之士袖手旁觀不知如何發笑也海上事稍閒仍欲如今春故事更約兄於饒郡或信郡兩處孰便有便人可先寄數字當特遣人奉約知兄亦不能巳於情也非不知兄石洞之安閒而道路跋涉亦苦但弟自入京師病脾骨立扶病往薊門兩月間登馳絶徼峭壁三數千里之途閣過鐵靴銅面之輩十萬餘人一一欲辦其弱強腥風酸鼻驚沙暖面歸來席未暖也又復將荷戈渡海冒驚波而鬬鬼夷兄寧使我獨苦而不能為我分一些苦耶并書此以發山中人一笑當路欲用浚谷甚切行將及矣答王鑑川兵僃伏讀所寄澄江后峯諸君書論及鄙人罪過知公之愛我以德而責我以禮也已而奉所寄鄙人書又知公之愛人無已而不輕於絶人也語云人不幸不聞過僕何幸得此於公哉某遷疏木戇但知分在草莽固守古人不見諸侯及今時不入公門之戒執泥不通遂至得罪於門下若此然於公之髙節行誼未嘗不知慕于公之盡心保障未嘗不知戴也此僕之于公心非敢相疏也公提兵出入居郡之日少矣某自葬先人後即屏居荆溪還郡之日少矣此所以每不相值也公枉駕垂弔在先人窀穸既畢之後公遭喪逺歸適鄙人荆溪卧病之餘此又所以不相值也此僕于公心非敢相疏而跡又非相避也公亦可以相亮矣知我罪我惟公裁之僕年過五十顚毛種種一身百病待盡有期即且携家逺去尋一人跡不到之山結裹此身世間一切是非毀譽不惟不敢計亦不暇計矣樗材頑石斤削何施殊自悼也殊自笑也惟公盛年宏才行當為時樹勳公位益髙僕入山益深衰病益迫雲泥相隔負荆無日故敢一陳鄙懷異日若天假之緣淂一面悟出于望外所欲請教者未敢悉也抑又聞古之人有跡若相背而道則相成者矣繆公能容泄柳之閉門不貶繆公之賢文侯不責假千之踰垣益顯文侯之義兩諸侯不嫌人之慢已而布衣不自嫌于慢人此所謂古之道所以相成也漢時大將軍尊重公卿見者皆拜黯獨揖或以誚黯黯曰大將軍有揖客顧不重耶大將軍聞之益賢黯人皆謂黯能重大將軍大將軍能自重以相成也公專制一道凡屬吏鄉宦取憐乞寵奔走伺候摩肩側足于門牆而不淂見者旦夕幾何人使如僕一布衣老翁奔走伺侯其間譬九牛增一毛豈足加重惟以公之威望無人不趨有一不奔走伺候之老布衣是公之所以為古人也然則僕之奔走公不足為敬公重公而固陋自守乃所以敬公重公也公以我為慢豈惟不亮僕母乃異乎古之道也寄內閣及本兵諸老書擊賊海中以奇功論雖有平倭事例但兮别淂來船去船缺明且水中首級一槩以十五兩論賞不知打來船之難十倍於打去船也去船殺人劫財巳厭其毒殺一賊是止于一賊而巳若殺却來賊一人是全了幾個好人性命其功不可同日語也若得部中題覆打來船真倭首級雖不能同之陸地首級三十兩亦可量增銀五七兩則人人爭奮打來船者益衆而賊之登岸者少矣與東南事體絶與西北諸邊不同西北諸邊雖是兵財殫弱而成法具在儲糧畜兵歲有畫一只是廢墜不舉耳若東南事體一則以海寇猝起事屬于草創一則以連年被寇力盡于支吾取辦一切未慮經久其大者臂指相使之體統未明唇齒應援之機宜莫辨至如浙直所募之兵則朝南而暮北有今日在浙江應募明日在淮揚應募者如暫時顧倩之人主人不淂而有之又安得而用之軍需則移東以補西一年之財只彀半年支用無名之費百出于民而軍人告缺四月五月缺糧者往往而是大率昔人所謂不終歲之計也祖宗時備倭規制沿海屯田水寨諸法漫然無跡可考矣故西北諸邊莫急于振舊廢東南海僃莫急于定新規此其大較也然往時浙直軍需多倚各省協濟自例罷協濟之後而窘急甚矣胡總督近有乞留運米借鹽銀之奏蓋以軍需無處甚不得巳全仰此一著救急望曲成之以幸東南其經久之策容共酌處奉聞也與胡梅林總督山中雲臥遙瞻棨㦸不勝馳情海氛清淨東南賴以無虞乘此閒暇恰好汲汲料理彌縫微密使百十年間海隅內外更無一鏬可乘知公此時必有長算不徒所謂救頭救腳之說而已古人經綸手大率忙時閒做閒時忙做知公亦然也承示鹿門所敘勦倭本末具悉公之運籌所委拙文向已相許不敢復辭謹候大祥後也兩度承公惠茶深見氣味之同多謝多謝二伏聞道體稍覺違和恨不能一侍左右蓋一體之義公病亦吾病也東南有福比時計已勿藥懸望懸望灘山滸山有賊係浙直諸總㑹哨所在而李希賢孤軍獨往餘皆坐觀不相為援及烏沙門洋山一帶有賊定海兵船亦互相觀望待其登岸噬臍何及蓋守港將官全然不以㑹哨㑹勦為意賊迫近島機㑹可乘輒以風潮不便為解縱之登岸陸地失事則又罪坐陸戰官兵彼亦不與其責習成套子牢不可破明旨近例所謂邀之于海徒為空言不淂巳而陸戰在我為舍易圖難在賊得護其所短而用其所長兵家之忌我則犯之然則倭賊何時可平公亦何時可息肩也興言及此秪有疚心承公指教不自量力謹往吳淞督戰一畨若賊仍在灘滸洋山之間諸將官仍守舊套不肯㑹哨㑹勦僕止有以身先之而巳吳淞事機稍緩即星馳侍教左右為快亦有所面請教也聞薊州虜情尚緊南北事勢若此臣子之心卧不安席奈何奈何浙西江南陸戰之兵俱無足恃僕所親見成敗只在海勦一著賊一上岸必然復如往年之事矣故憂之不得不深但公方在調攝中不宜以繁言相瀆念無可與為言者故不得不為翁言也三崇明沙上實有賊一千三四百人登岸立柵已檄盧總兵不可離崇明一步盧鏜既不可離崇明張四維又不可不還浙東則江北督將戰將皆弟身自任之而已江北了賊後即擬浮海了沙上之賊然後轉戰而南搗舟山一帶海賊告成幕府此語誠昔人所謂初若落落難合仗公神算更觀其後何如也但隨身銀子殊恨其少公所給銀謹先發一半往崇明而以一半自隨弟亦搜括家資并借貸僅得銀五百兩通公所給共是千金而已弟承遣命至地方半年並未有一題奏今欲并崇明江北勝負賊情及請發糧賞特題一本公崇明捷奏千萬上緊早發勿緩也四書生操未嘗一日拊循之兵領八九枝素非同心之將以攻據巢之賊而監將戰將皆身當之真可謂不自量而任之太過矣仗公成算初二初四兩日將士賈勇入巢斬獲共得首級四十二顆皆係真倭無從者衝鋒則鳥銃手溆浦兵之力也生獲免狼狽為幸多矣餘賊據巢者尚繁有徒戰後鎮溪兵乃至將復用之勦平餘賊此後容再報也弟以崇明事緊恐有疏虞不淂不急歸而銃手皆隨僕還矣區處崇明後即往杭州候公計相晤只在半月也此中賊勢似已有定恐不久當走公書中云欲題本可且緩之更看消息何如承教步步檯營立於不敗此公老將經略甚愜鄙見弟以造下行營三座決然可以制賊而諸將尚不能用之所謂或執拗不肯相聽或愚暗不能相聽此亦其一節也若不用檯營之說明日再戰恐又如前之奔耳雖十戰亦復然所謂浪戰也弟所造行營當携至杭州演之公與弟當一笑耳五此時遊魂餘賊浙直間止有廟灣及三沙兩巢皆係窮寇勝勢在我徼國家鴻福仗督府勝算殲盡此二巢浙直可數年無事弟區處三沙後尚欲直從海路往通狼而上處廟灣殘孽適得公書知閩中緊急若此奈何奈何不知僕區處三沙後將往江北乎將往閩中乎幸示教克齊臨别相約事急則一日一報事緩則兩日一報今將半月矣而更不得一兩報也豈廟灣賊已走耶督府時有江北報更望傳示三沙之役盧總兵劉顯劉堂高㵓等分四營於十八日已登岸立柵賊伏無聲息多只在一兩日間鏖戰也張空兵亦已到在十九日登岸水陸分布俱各嚴備但賊巳多置小船二十二三月黑以後防之為難督令諸將不敢不仔細草草先復六竊料此賊若得突走必不東還必上老岸不便流劫必又結巢是移沙上之巢於老岸如柘林川沙故事圖之更難萬一若此奈何何本源及江北之兵若至諸將或更有一畨㑹勦意欲借麾下梁守隅千兵以往若沙賊有可圖之機則見可而進若櫗不可圖則知難而退不敢必用千兵當全璧以還麾下也何如何如七三沙緊急用兵之時而黃潭撫公謝病去矣弟所賴者黃潭公委心相聽儘力相應今去矣奈何蘇松更無一上司巡江替換巡按丁憂獨弟與熊兵僃在海洋內地無人料理兵食蘇松府縣有司素蠻皮一時提掇他不動使成誤事如何為處弟今日認真幹事督將官督有司全賴朝廷委任新勑書尚未見到不知齎人停滯何處也弟積熱又飲鹽海痢病頓作不能食者三日幸而遂愈然精神甚弱也廟灣攻巢一戰得真倭首四十六顆弟心竊少之昨得克齊書半月之內數戰止得首十三顆今三沙一戰止得八顆乃知攻巢之難也八昨差人具三沙節略奉報適承委曲垂示并齎至賞功銀正應急用廟灣賊纍挫之餘據巢不敢出計不走則剿矣公奏稿可速進也然無處不是公之妙略而公乃歸功于僕甚愧甚愧刪之何如太平又有此一捷更為公賀也盧總兵不復遣往北謹如尊教閩中事體以收人心為要機非公大經略不能為此言恐非弟亦不能領略此意也弟處三沙後當細承指授或更為公南中一行耳蘇松之兵全不堪陸戰誠然誠然髙湜張空等兵已隨弟到此王遊擊兵已到太倉未渡海也李忱兵未見消息計此時只好到蘇州耳弟病痢數日幸而速愈更可督戰矣公勞心經畫道體又復小恙聞之深覺懸情幸公自愛勿太勞心可也布袋已領亦甚切時用弟異日還山竟作一布袋和尚可也并一笑即刻上沙督戰草甚草甚九昨因大泛料賊必於潮滿時放小船搶我船急促將官半夜候之港口則賊已放八隻小叭喇烏船將出港沙蒼等船皆昏睡若不先遣候使彼小船得衝上我船則禍不可言弟與兵僃船亦謹與賊對港夜間儘費力防守也進大兵只在數日間更不可緩矣但與賊畫地對壘非木城不可因造木城及收拾火藥未得便完且各枝兵未齊今諸事皆已有次第可進兵矣十僕所用之財皆公之財所賞之人及他用處皆禀公之命弟如牙行只是為兩邊過財與巳原無交涉若論事體只須各有司自解至軍門而軍門另發至弟處弟各項用過後與軍門算一細帳明白便了今布政司吏必欲取僕印信收管批回附卷則僕原非領用錢糧之官布政司只見一千兩銀子解到僕處不相照㑹何從勾銷也弟非是尚尋舊套子逺避嫌疑蓋事體當如此耳幸公笑而教之十一前有書瀆門下言浙直福祐未艾聖明自有裁斷適得公所示何其暗合也快甚快甚尸祝食肉之說當發千古之一笑矣又過承公慰諭以為僕欲窮討三沙餘孽智慮深逺弟當時竊量事勢賊心未饜必不肯干休勢必拚命跳上老岸以為宜必戰而不宜不戰宜速戰而不宜緩戰若使緩攻逺圍決守不住今日猶是江北代江南受災人強馬壯漸就殲夷若使一千倭子跳上老岸蘇松城下今何如矣今將官不免失事僕亦具奏自劾然賊之突走僕雖以此取誚于流俗亦竟以此見諒於豪傑苟心事見諒於豪傑足矣利鈍成毁不計也弟至江北後四五次奉書門下及走報賊情不識俱已達否克齊辭援兵甚力渠已自移咨門下不得不為止之況今歲餘賊不止一半殘蹙之餘沿海潜踪已至廟灣勢窮數極不殺必走只在數日間援兵亦趕不上也公觀潮可預增我一席此時便得奉教十二脾脹之病非旬日所積亦非旬日可遣淹淹牽牽半死半活人也春汛逼矣何以堪之平生每欲督陳血戰今遭厄如此雄心徒在猛氣盡銷真可自笑也逺承書問乘念拳拳深感一體之愛龍溪兄已到此數日議論可以代藥真如來教使還力疾布謝掘港守僃王楹專望速遣病中復書殊不盡情十三東至狼山北至廟灣沿海巡歷一遍則江北又是一樣局面土著鹽徒隨處儘有驍勇可用者稍聯屬之亦不甚費衣糧但是絶無一好水陸將官至於徵調之兵不特老營邊卒保河長箭可用其毛睢曹沂各兵亦儘驍鋭但是無糧賞養之今歲十倍艱於往歲克齊去歲年終丁田銀巳僅得一半今無一二百兩解到揚州只望京師撥與銀米打頭一奏至今更無消息不知四五萬軍輳聚何處乞米兼之江北風俗素無宿儲一荒便餓一餓便盜至有一縣之倉無五升之米者故僕以為今歲救荒須費七分精神只留得三分精神禦倭雖以髙才處之猶恐甚難况迂庸如僕者乎望公題奏間稍為一援手也向所借鳥銃手蓋是欲久假數月者知朱尚禮一枝公所必須願且勿遣俟急更借也倘已即路則遂遣之耳聞戚繼光有禦鳥銃牌屢索之不得望公為取一面見付作式然亦不知其果䏻禦銃而珍閟之若此也此處需水將甚急邵應魁若不甚當緊要公可暫借何如江北亦公地方也海上歸來一身骨立勉強過一畨春汛若不苦苦乞歸則王芳湖真笑人也掘港廟灣諸海險處不論有倭子未有倭子之時自來無撫巡到其地土人見之以為駭僕似前生缺却水陸路程債可一笑也與王芳湖中丞正與梅林公計若四月內浙直無賊僕當以鎮溪土兵數千自隨至閩中效麾下一隊之用且海上經略必待面請於公而後有所藉手以復命蓋賊之根本實在閩中海上經略此第一義誠如來教況一海相通喘息閩賊亦浙直賊也敢以職守所不及而忘共濟之義哉議既有定不謂北洋之賊忽然彌海淮揚醜類幾將滿萬浙東亦接艦而至揚府告急之使幾如秦庭之哭矣僕適至崇明嚴督諸將海僃江南目下暫爾無虞後來尚未可料也即與梅林公計北援淮揚南備蘇松上陳下海皆不敢辭僕誠不自量其疏才小官僅如螳臂之當車兾盡其力之所至而已矣是以未能即走奉教南望不勝耿耿秋來定當躬賀麾下平寇此時閩與浙直妖氛掃蕩與公鶴敞華陽杯酒談笑于武夷九曲之間又是一畨光景也某自南役以來涉海者凡三乃得形格勢禁之大略江南控扼在崇明浙東控扼在舟山天生此兩塊土大海中以障蔽浙直門户諸哨船皆自此分而南北總㑹於洋山若會哨嚴緊遇船即打賊何從入信國廢昌國故縣而內徙之恐是千慮之一失未可謂昔人盡是而今人非也愚意方欲經營而來教適及此豈古謂所見略同者乎曾參將荷督府國士之知可勉樹奇功以酬素志見時為道僕意努力努力蜀扇佩劒來惠過厚不敢當但扇以示九夏驅氛劒以示萬里誅妖僕非其人而雅意不敢不承也多謝多謝與陳黃潭巡撫僕本山人一宜歸衰殘多病二宜歸才無所用于世三宜歸三宜歸莫如僕者而乃為公所先愧羡愧羡公東南福星東南正不可無公公不宜歸而竟抗疏求歸況三沙正在緊急用兵之時雖仗公餘威足了此賊然願公少駐以待事寧以終惠東南何如此不過遲公十數日山中之樂而東南利害關係甚大公甘棠深愛諒不忍遽去也至望至望來書見教具悉雅意軍旅所羈不䏻面候并祈台照與朱肅菴巡按奉別後承手教嘉惠久未及面候且謝時抱耿耿適往吳淞南望旌節殊切馳情即今海氛頗惡賊復猖獗江南江北海洋一帶盡是賊船軍志云擊蛇者先擊其首東南利害只在海中邀擊一著縱之上岸則毒禍必如往年甚難措手矣某謹馳至吳淞催督諸將官海戰伏煩門下督責劉顯儘力把截金山陸路一帶使賊不得登岸可也黃潭公以明公同心共濟之義欲乞明公少助糧賞僣言及之事急矣非此不能鼓舞人盡死力也僕原奉勑書亦有軍門糧賞缺乏聽爾與總督胡某計議措處便宜而行之文謹預告案下事若更急亦當於州縣量有所處也大率今日用得一錢而有功勝如賊上岸後用得百錢而無益總不免費財顧先後著何如耳惟髙明自有裁度勿罪瑣瑣吳淞事稍閒即過松江面領教言也與翁見海中丞近得邸報見兵部覆翁疏巳得旨不勝欣躍之至蓋聖明逺鑒廟堂主張信公之深而委公之專也東南真可謂有福若使公稍搖動則奸賊得計東南之禍將來更不可言僕之拳拳而不能忘于懷偶深見地方利害如此非為公也病體荷公垂念更感同心乎生真自笑一付賤骨頭初到揚州尚奄奄欲死及百勞僃嘗乃漸將復舊可笑可笑但兩足之腫如故來歲恐妨于躍馬先登耳箭手劉希孟等久叨廩食感謝感謝僕歲底及春初且往狼山欲度福山約公一㑹或奉攀旌節一同度江共登狼山此江南江北巡撫大勝事也公其許我乎俟能戒行即當馳報答萬思節參政近得書知吾友為衰朽謀者甚厚然書中所言鄙意尚有未然者如書中所言蓋有見於委曲狥人者之為非而無見于自牖于巷者之為是也有見於鴻飛冥冥者之為是而無見于匏繫果哉者之為非也天下一舟也天下之人一同舟之人也猝然而遇風浪大作縱知其無可奈何其攔頭把拖之人焉得不盡其氣力以呼號同舟之人之有氣力者而為之助其同舟之人亦焉得不聽攔頭把柁者之呼號而盡其氣力以兾其必濟乎又况未至于必不可奈何者乎此蹇之所以匪躬而大過之所以過涉也時行時止我一付之無心人用人舍吾友亦何必為我有意哉苟為我急急求解脫其與為我汲汲于求進雖題目不同其有意則一也二日夜望思節之歸兾得披寫衷曲適得來書始知到任消息悵然悵然平生心事冷暖自知自古豪傑皆是忘其身以為世界忘其身者毀譽利害一切盡忘之謂也得吾友書云獨有剖破藩籬一意以為天下國家此最為難不謂思節之過信我若此思節謂我數年以前無此識見恐思節數年以前亦不能過信我若此也刻書事其說亦長然思節既信吾之大者則其細者亦可以不疑也偶答喻吳臯一書稍發此意及諸書皆關心事特抄寄一覽但切不可示人也諭及麻陽土兵及領兵官之說領兵官嗜利無行本是常事而蠻夷官長為尤甚雖無功而多罪昔人所謂簡節而踈目似亦不必窮治之也經略海防煩仔細一看見報所差百戶欲其頻頻往來以通彼此之信特與一火牌回往諸事儘力支持但病覺日深此身一切付之國家夀命亦一切付之數也與楊朋石祠祭朋石往京師有許多要面與劇論處僕在海上而朋石待我於蘇州兩不相輳竟成悵望僕往來海上辛苦艱難頗謂僃嘗心則不敢不盡而遷儒本相原非經略手假才則竟不䏻強暑月鹽潮蒸熱積勞久之吐血幾至殞生然則所謂心之不敢不盡者秪足自損夀命之源而才之竟不可強者於地方漫無絲粟之補似此拙人不早求閒員可自笑宜其不免於紛紛之議也然誤爾蒙恩拔擢只得又強所不能且向前擔却一條擔子待防過一番春汛庶幾陽羡山水之間可仍舊作一閒散人耳人便草率布情惟亮之伯倫想日夕相議論之也與白伯倫儀部吾才質本迂骨相又薄非惟力不能與人爭榮進之途素心亦甚恥與人爭榮進之途天日可鑒也入官以來特以諸相知之意逡巡半年不敢求歸因求外𥙷求外不淂因而求差求輕差不得乃得重差皆非素心所望也近承吾友及可泉見示皆言有欲以兵僃相玉成之意此蓋不欲強其力之所不堪不欲乖其志之所不便可謂相體相愛之至也古語曰人之相知貴相知心豈必以好官相處而後為厚哉因思去年冒暑入京內則飲食之違其常外則人事之苦其形吐瀉交作遂發脾疾臍突腹腫惡症盡見衆謂必死徼幸得生痛定思痛可為寒心若使其時奄然客死雖家人亦未必不歸怨吾友之不能保全至親也自入鄉園水土便習病雖暫愈臍突未消飲食尚减如病瘧之人寒熱有歇病根終在若仍復冒暑入京則去年之病安知不復發于今日今廟堂既有玉成外官之意願吾友乘此機會亟為一處不拘逺近得過暑月勉強赴官使衰病之身得保餘生皆吾友賜之也不然徒欲使之強力以待好官縱得好官何身受享昔人所謂非甚仇疾則不至此情切詞迫惟吾友亮之早處而密圗之吾友平生道誼至愛骨肉至情在此一舉此外更不敢有他望也元翁處今且不敢通書俟得外補後當遣人奉謝也若以差上不可轉官人復作難則巡按巡鹽審録監兊等官差上轉官者多矣只在吾友為我盡心而已更有一說向時僕之跪人深非得巳既免入京跪人則雲貴僉事亦不敢辭此亦至情苦情也平生迂僻之性不能委曲處人雖有一二相知而卒無以免于群猜衆怒是以深自隱避不特保全病軀亦以少避入宫之妬耳此尤不能盡言之苦情也一身之便不便既如彼人情之宜不宜又如此吾友亦可以為吾擇處矣二三沙之賊千二三百人不曾虜得中國一些財帛皆如餓虎若防守稍不嚴一登老岸禍豈可言吾自家親到賊老巢邊滿牆倭子只隔一箭地吾與兵僃兩隻船經月在海洋中嚴督水陸將士日夜防守僅圈得住千餘倭子在一塊沙上至于楠巢之舉則以賊在死地我兵素怯見賊便走苗兵狼兵亦復如是是以雖曾獲有首級二十四顆而殺傷奔走之餘士氣益不振當別選徑兵伺隙圖之此事不知是難是易向所示江北避難之說吾去江北時江北之賊勢巳摧敗又巳搶有船隻包裹勢不擒則走矣吾之去江北而來江南乃去易就難非去難就易也一笑一笑平生不自量吃虧處正是欲㨂難事做朝廷原用我做視軍情官我是看人幹事的假如我只髙坐省城或蘇州今日一道文書江北督總兵明日一道文書江南督兵僃誰論得我者矢石馳驅風波漂蕩豈是人情所樂今日惹出許多議論皆吾之好難非起于吾之避難也自出山以來看盡世事只少一寧武子之愚聖人此一句議論千古少不得也至如三沙之役尤有不淂巳者撫公告病候代巡公丁憂巡江自五月交代至今未至蘇松皆缺正官江南無一上司吾若又推脫擔子賊未必不登老岸矣然賊登老岸人却又責不得我我非守一處地方官也此等使乖處五十歲外老人豈便智不䏻及此念平昔素是愚人只幹愚人事耳成敗利鈍不敢計也調兵無益而有損費盡江南幾萬錢糧竟不䏻得其一戰之用而去至于地方騷擾幾如寇至此深可以為創而不忍言也大軍之後必有凶年今歲江南旱荒數十年所無民命將益不堪奈何幸吾友千萬為生靈留念此大隂德也三三十餘年中第一老翁偶得一淮揚都堂世間便有許多搖撼所幸胸中若有砥柱在搖撼不動所謂可富可貴可生可殺可貧可賤而不可亂也今日在淮揚為建牙開府只是這光景明日還常州山中衣木葉茹草根亦只是這光景人為我豪傑只這個人謂我盜跖亦只是這個人何有於我哉真不足以發逹者之一笑也獨念蒙恩拔擢縱欲康濟此身亦開口不得若人言必不相容驅逐使去乃是與我一條好路不亦可乎條陳事誠見東南倭患茫然未有了期百姓骨髓漸漸抽盡不無隱憂故言之縷縷所恨辭不䏻達意惟吾友議之請兵請糧事亦甚緊急不得已知吾友之為我委曲也鄙事之纍吾友費心多矣道義之愛至親之情且以大家了却宇宙一畨公事故不敢以言為謝吾友能亮之與陳蘇山職方東南視師一年自知絲髮無補連次轉官連次受賞捫心可愧蓋深荷知已居中調護之力也條陳事自從經歷海上審究病源知東南倭患茫然未有了期而民間膏髓漸抽漸盡恐生出別病故言之縷縷殊愧詞不能達意也吾丈素先天下之憂者况身當其事乎幸賜裁酌而節取之江北請兵請糧亦甚緊急不淂巳至于狼出將領蓋部中只見其報功而不知其為衰庸闒懦一籌莫展之人也使當春汛必大誤事雖韓范為督帥亦當坐纍况弟之庸才乎故不淂已而極言之望吾丈速為換一善戰驍將見賊身輕的漢子蓋江北局面與江南浙福不同靠不得水戰止靠陸戰也近得一重病精氣甚損以蒙恩拔擢未敢言病奈何奈何伏枕草率裁書仰惟台照與陸東湖錦衣都督謝中軍至辱手書嘉惠而謝中軍又口傳雅意委曲非道義之知則不及此淮揚重地非綿力所堪督府要官非迂才所及過辱吹噓不虞其將不勝任以至顚蹶也奈何東南倭患茫然未有了期歲歲防倭民間膏髓暗裏抽盡若欲斷絶賊路則亦漫無長策一年推過一年畢竟有推不過日子公先天下之憂而憂浙西又是桑梓之邦仰仗經略使閒臣得有所藉手焉切望切望明歲江北倭患既未可料而流莩滿野深恐嘯聚生盜然師旅饑饉正是古人學問實用處愧僕非其人耳然不敢不努力也適重病之餘伏枕草率裁書并惟台照二謹瀆班軍漸漸屯聚飢民漸漸餓死海寇漸漸聲息賑荒供軍之費一無所出江北軍需正額地方所供計十六萬克齊在此上年年終已催得八九萬今無一二萬解到者某州來討預處軍餉銀三萬某縣來討預處兵餉五萬而三千五千亦無以應之事之窘急未有難于此時某自到維揚後更不得京中一信兩次差人入京兩月間亦無一人回報者誠不知所為處也素辱門下知愛敢一道之伏惟台照與何總兵柏村晉周子隱為副帥討氐齊萬年萬年料之曰周府君文武全材若專制而來不可當也若受制於人祗速禍敗耳後子隱果及禍敗如萬年言公之為將於江南也不專制而受制然保全功名以還西蜀免於子隱之禍敗所得多矣西還之後兩川復有長城公亦角巾私第徘徊浣花之曲自有餘樂可知也因後峯舍親之便草率奉起居伏惟垂照不宣與俞總兵虛江僕迂愚人也屏廢以來機緣盡息惟寤寐海內才賢一念猶未盡泯及東南遭倭變以來僃見生靈塗炭之苦日夜痛心奔告無所欲亟圖見敵愾戡亂之人既乃聞執事忠足以盡瘁智足以決勝則其人也心竊慕之曾作四詩以寄嚮往之懷然嫌于無交而相瀆非山林之士所以自處之義遂不敢奉呈而心又不能已也乃託之孫兵憲先生轉達去年冬以先人行狀之故會王南江于武夷備述執事平生忠義機略之詳且知執事素垂意於鄙人亦不减於鄙人之慕執事也於是而通一書則不為無交而瀆矣梅林公今世豪傑又得執事勠力其間不徒以一時戰勝為功而相與圖百年善後之策東南更得安枕知可望也僕滿先人服後且復移家武夷作終老之計彼時或當過寧波圖一奉晤以遂夙心伏惟亮之二每欲見虛江寤寐為期前月已發家人往麾下而又中止竟為來書所先真謂先施之未䏻也今前書并往聊見積誠而已適誦來書推獎過厚非所敢當但聲氣之同則不敢辭耳僕雖未獲奉教於虛江自謂頗足以知虛江者竊窺虛江之立心制行與用兵方略蓋深有得于橫渠既見范公以後之中庸而非所謂橫渠未見范公以前之談兵者僕向詩中所稱儒術深明計轉工也數月前淂讀續武經總要知虛江兵家授受本之河洛夫中庸無聲無臭之宗旨實圖書五居中之遺也則中庸之旨虛江已深得之而措之用矣而猶歉然以為未足蓋其篤于求道之心若是異日相晤當盡鄙儒迂濶之說求一商確也僕少不自量嘗妄意于古之所謂不朽者思欲為國家效毛錐之用奈何朴樕拘謭之才既不足以濟時褊狹野拙之性又不堪于處俗况多病蚤衰今年過五十短髮種種牙齒半脫槁木形骸老醜盡見武夷結廬將畢此生若夫為國家出氣力擔當大任有虛江輩在山人可以安枕矣適病餘草草奉伏惟亮之與李石麓少宰向居京師辱明公念舊僚之誼委曲垂愛臨行又辱寵餞自南役以來奔走海上日無寧居久疏候問于門下然鳴鏑宵歇時倚海艦望玉衡泰階諸星想玉堂於天上則未嘗不如挹清光也東南倭患一歲一來如燕鴻之不失其信茫然未有了期而民間膏髓暗裏抽盡明公憂先天下又是桑梓之鄉不知何以為計也幸教之淮揚軍旅重寄非迂儒所堪恐不勝任以至顚蹶辱在知愛并惟垂教適重病之餘草率裁書并惟台照與吳筠泉宗伯某居京師一年雖不䏻時候起居數奉教語至于明公拳拳道義之愛則心獨知之南役以來跋涉海上奔走行間又不䏻數通候問于門下惟有瞻望台階時切馳慕耳東南年年禦倭茫然未有了期即使戰而常勝主客兵糧首級之費江北江南浙江三鎮一年丢却二百萬餘銀子民間膏髓暗暗抽盡深恐生出別病若欲斷盡倭賊來路則又漫無長策或以為十年一貢自是祖宗故事貢路若通國王或有禁戢屬夷之理今三十八年恰是日本十年貢期去年山口豐後不宜貢而求貢既巳阻回而日本國王該依期入貢者却又不見求貢此其故皆不可曉故冒昧開此一欵以備明公之裁奪幸恕其迂愚而教之與楊虞坡司馬已丑同榜中多為國家宣力者其尤著者若公北門鎖鑰方溪公樞府調度弟至迂疏亦忝戎行海壖經畫每懼貽二公之羞心則不敢以不盡而才竟有所不逮也奈何奈何風便幸公出其緒餘逺賜教之薊州土兵怯弱不減江南拒險扼虜殊無足倚况傷殘之餘振起為難所賴李光弼一至軍中而旌旗變色即時轉弱為強公自有妙手耳弟嘗從事薊門夷情軍情亦頗知之身雖在南敢忘北門根本之慮哉三衛夷情正古所謂御得其道徂詐作使御失其道狙詐作敵公自有權也風濤兵戈倥偬中因差人入京謝恩謹託陳職方轉候門下伏惟台照二伏惟門下簡在帝心勳階峻秩逺道聞之深為國家慶也江北將領絶無可靠兩畨苦詞僣瀆門下計巳蒙垂察矣短中之長僅有一楊縉如一寶物又奪之往浙西而掘港泗州二守備一沿海一腹裏皆繫極緊要之官至今尚未有補者狼山之總鹽城之參皆全不可托不得已止論狼山之總亦殊未見處分消息也春汛將動近獲一二真正奸細則海賊內侵之期計亦不逺財與將無一可恃者弟不敢自惜若江南百萬生靈何哉昔人所謂情隘詞迫搪突門下多罪多罪伏惟矜而恕之答喻吳臯中丞海內相知未有神交二十餘年而未能一奉面教如公者每于朋友間得公清􅋯道貌寤寐如見之公之于僕其亦然乎惟公華實兼茂資望並深當軸注心寄以北門鎖鑰僕亦何言足重輕於公過承相推見公謙德之至而僕甚不敢安也承示出處一節深荷同心相知但世間眼孔甚小其卑者則既戀戀以保惜富貴為生涯其髙者則又以兢兢守護名節為大事而古人饑溺由已溝中之推由已此一假學問漫然不復知矣平生此心不敢求信於流俗而敢求信於豪傑縱不敢求信於人而天日炯然在也草衣木食已過一生果哉末難亦何哉公知我最深聊一發其狂愚耳不敢為他人道也正欲遣人候門下并請教歲例調兵事辱書惠乃先之感謝感謝即專人趨候不盡欲言惟台照與王稚川少卿某辱公道義之愛最深昨歲南來擬得一奉教於棲霞牛首之間以新耳目之見聞而海上南北奔走更無寧日殊乖始望乃辱書惠逺及獎進過厚非所克堪愧謝愧謝縉紳及同志皆言翰苑中惟公宏才大略素抱經濟之長內外重寄無所不宜仍使之回翔於佩玉雍容間袖手以觀當世之劻勷於吏治戎務間而力不逮者然使公之深扃邃蓄正以大發於密勿絲綸之地也某才本疏濶至于軍旅一未有聞強所不能如支離疏之攘臂竟非本相可自笑也吾丈過為奬進而不敢督以所不及非所望於吾丈也與李克齊侍郎從人回數承手教深感兄丈子文忠告之至意及為淮揚留去後之澤也今歲淮揚灾傷特異幸賴兄丈早請發得折兊十五萬石民命稍得蘇醒但該部責巡撫以賑濟使發倉粟及多方設法今倉粟所在空虛又不知如何設法至于軍需一節尤更難處淮揚軍需自來止靠丁田銀子更無別途承兄丈留下揚州庫銀萬兩歲終已不彀止靠今歲新催丁田銀如懸鼓待椎之不可緩然百姓方望我賑濟而我方催并軍需國家方照分免荒而軍需必欲全徵無缺勢如錐鑿奈何奈何不知十數萬餓人三五萬戍卒如何打發往時淮陽救荒動發內帑二三十萬截留運米二三十萬今僕所請銀甚少亦不知得賜准行否也惟兄丈為朋友計為地方計百凡方略不吝詳悉示教感愛多矣與章陽華中丞姜判回領公答教不覺感涕公去矣吾又將安歸乎山中二三十年心事公所素悉吾豈戀戀一官者哉亦知時世多虞後來且日艱一日庶幾竭股肱之力以圖少有所濟而已此迂愚不自量之志也然公去矣吾又將安歸乎恐竟當從公于三茅五湖之間耳留兊事正欲請教而手札先之僕題稿原定淮揚地方而部覆奉欽依亦專言江北惟江北為便江南他處則有許多不便者折兊自腳價輕齎解部之外尚有些餘米可算所以寧出銀七錢亦以為利今若以江南運米充數則餘米一粒亦無部中欲解七錢銀子反是吃虧不若不折之為便耳且賑飢軍餉兩事皆在燃睂而江南運米何日可到諺語所謂遠水不救近火也必得四萬石盡在揚州截留則窮民與窮軍皆受公之惠不淺矣若不然只可分淂一萬石在淮安其揚州必得三萬石可也千萬台照即如煮粥一節有司百方破調不肯奉行此常事耳況欲為出格之事乎奈何奈何與萬兩溪少卿適以追潰兵從瓜洲至儀真與公相望一水不能渡江至龍潭棲霞之間相與一談笑為快潰兵始末具之咨稿中此事若以智士處之則塞其西突之路縱其趨海之路趨海則踪跡易泯西突則流毒著聞僕之愚計竊不然之以為下海則罪人徜徉逺出西奔則縱使流毒一處而罪人必不得脫是以寧自被罪而不敢使國家失罪人也至於不血刃而事濟則誠出徼幸耳大率此輩不知紀律久矣往年用銃打死兵部家丁川兵十許人者即此輩也僕雖被却一畨苦楚自此紀律有可施之地所謂顚趾出否耳承公知愛敢一道之重刋荆川先生文集卷之八
