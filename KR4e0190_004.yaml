front:
  text: 重刋荆川先生文集卷之四詩
  hash: sha256:07265f5ea9de3e9b97f4b5fea7052bf246c6a609c11ca449819d7183567b6422
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_004-1a}
body:
  text: 三屯營閲兵薊鎮總兵開府處此下係職方併兩奉使作股肱北平郡烽火度遼營特以郎官節來巡都護兵槖駝參陳馬虜中得三槖駝擺陳用之為衝􅓋篥應軍鉦三令先庚後八門死地生妖星枉矢墮殺氣蓐收行象綴吳都燧營中火器頗整羊分宋士羔生羌休近塞熟虜敢渝盟閲罷時登眺虹螺憶古城虹螺山舊大寧都司喜峯口觀三衛貢馬貢道走東胡關門控北都每逢金鏡節來獻玉驄駒酋長花當後山川松漠紆天衣沾蚪蟒國馬出騊駼乞賞孫隨祖大酋挈子孫十餘人討賞專兵婦代夫有四五婦女領部落入貢珥璫珠落錯襁褓錦氍毹槃舞呈鞮革侏言譯象胥白狼回右祍黑水作通衢黑水靺鞨明堂端拱日王㑹正堪圖自乍浦下海至舟山入舟風惡四鼓發舟風恬日霽波面如鏡舟人以為海上罕遇是日行六百五十餘里島夷頻不靜玉節逺何之誓清萬里冦敢憚一身危閩卒精風候吳兒慣水嬉黃頭紛百隊白羽揚千旗擊鼓靈鼉應揮戈海若隨龍驚冬不蟄鮫畏晝停絲昨夜波潮怒中宵雲霧披天澄鏡光發風嫩縠紋滋鄒衍瀛洲數莊生秋水詞乾坤元莽闊人世自牽羈已傍漁山泊還尋馬跡期日升看晷轉途變識針移雙嶼崖門險半洋礁石竒從來惟賊路今日有王師待獻經營績三山勒一碑雙嶼港半洋礁皆海中謁夷齊廟二首未訪箕山塜來經孤竹墟精光猶日月冠冕肯泥塗國合歸中子心元避獨夫千年北海轍還見盍歸乎歸周仍避紂渭叟况同襟叩馬何饒舌採嶶還苦吟當年諫武意昔日事殷心生死知音在明夷用獨深叩馬之說不經見而詳于太史氏夫子止稱伯夷求仁得仁而孟軻氏以為夷與太公同避紂歸周而倡天下以從周然則助成周之王業者夷與太公也太公鷹揚而夷諫與夫既已身逺避之而又諫伐之者既已助成其王業而又復諫止之皆疑于不類此王臨川輩所以據孟氏以征史遷之誣也嘗思之而得其說夷之歸周歸文王也文王終身事殷伯夷叩馬而諫然則始終與伯夷同心者文王也文武父子一道然夫子稱文王至德而未盡善于武則微意亦可知矣夷之歸周不嫌于同其父而不同其子其與太公亦不嫌于始同而終異也遷之說其亦未可以為誣哉古北口觀降夷步射復戲馬馳射至夜古北有降夷十數家男婦可四五十人並潮河墻內居潮河北來幾千里夾岸穹廬雜軍壘傳聞漢官旌節至驚咄歡迎競羅跪抹額貂皮并繫腰胡婦赤腳胡兒履中有老胡能漢語辮髮一條銀鼠尾告言天暖弓力弱箭垜乞移三四咫胡精于射而不能逺又弓解膠之時跪告移垜稍近蓋模寫實也蹲腰搊目滿彎弧箭箭齊奔月兒裏當軒賜與錦纒頭漢人喝采胡人喜自矜長技正未竭一躍上馬事馳突珠帽半仄賣欹邪鐡驄驕嘶弄危臬危瓦可憐人馬如爭巧人藏馬腹馬人立翻身倒卧馬背上馬尾鬅鬆亂人髮忽然馬去不聞聲一路驚塵向空沒滿眼流星透烟霧道是胡兒飛箭發想見天山射鵰時意氣雄豪誰可越騎歸人散悄無喧缷却牙旗捲秋月山海關陳職方邀登觀海亭作萬里羣山盡海頭誰築關城控上游巨靈劈山鬼鞭石英雄作事與神謀此關徐武寧築水壓蛟龍蟄深窟陸斷豺虎濳遐陬司馬分符來作鎮坐銷奸究護神州夜半鳴雞空獻計槖中置人仍𬒳搜魏冉故事深秋邀我觀海樓水潦𥘉清海霧收風恬浪細魚鱗起隔岸隱隱見東牟百年海禁頗嚴密烟波莽闊無行舟聖明弛禁濟饑窘米船銜尾浮羣鷗時遼人大飢弛海禁載米百船到岸一船覆大利小害誰能周遼人生不識舟楫雲帆錯指旗上遊午炊且飽盈瓶粟夜卧免唱量沙籌幾時醜虜忽東徙遼薊騷然鬪不休關外胡笳關內柝婦女乘障夫䖍劉鴟蹲蛆食安可長瘜肉不剪成懸疣㑹須驅逐逺漠北安得猛士挺長矛昔人失却渝關險腥穢中華千古羞盧龍行詠田疇公孫昔日據玄莵北連踏頓騁狼顧曹公萬里動征師到此沮洳不得渡田生義俠久知名駐車虛左親邀迎屏人慷慨談心腹兵家詭道先虛聲盧龍小路才一騎佯言返斾濳度兵夜半遂斬名王首一矢不折鯨鯢清功成笑擲封侯印依然𬒳褐返茅荆當時䇿士如雲擁竒謀却屬一書生山川寂歷霸圖歇薜蘿滿眼高蹤絶瀚海隂風鼓角悲燕山寒月挂旌旗秪餘今人守塞處猶似昔人出塞時俯仰乾坤一回首賢逹伏藏何不有不見華隂鬻屐生詎識平原賣漿叟自憐局促畏簡書安得停車訪巖藪卧病作二首孤踪原自與時屯兩月郎官半閉門藥石畨為二孺笑精華秪覺百骸存魯門未慣爰居性楚客愁窺虎豹閽却憶扁舟秋泛處洞庭木葉水波翻閒情已覺釣非釣末路久居才不才燭武本非食肉相無鹽亦𬒳入宫猜雍容珮玉身難置馳騁兵戈心又灰擊劍讀書堪自笑昨非今是好歸來至職方作余𥘉釋褐𥙷官武選主事今適三十年畫省棲遲已卅年今來似有再生緣署郎馮叟何言晚薄望東坡半是仙心事江湖思報主兵戈南北愧籌邊簿書若謂真成懶日畫先天幾箇圈再官京師懷趙浚谷中丞江潭詎意復修門舊侶京華訝幾存跡比孤雲難有託心思公子欲何言太白幾時還避晝鬼方計日想稱藩李廣鴈門今罷守短衣獵騎正秋原嚴介溪相公見示戊午紀年詩次韻四首奉贈黃閣成功久宴然問齡才及卜熊年俯躬忘却絲綸貴臞貌真疑山澤仙賜直內庭頻守歲公每歲除夕亦不休沐獻謀前席幾回天更待風烟靜南北九重還見錫爰田精神海鶴羡翩然一入瀛洲五十年朝野共推黃髮老身名何必赤松仙經綸不廢烟霞咏寢食常嚴咫尺天歲歲續成時政記豈同先輩録歸田老臣丰度自凝然夷使趍朝竦望年帝劄不名多署字歲星應象或稱仙膝前欵語驚忘食禁裏乘輿訝上天知公不忍庖厨意九野春回是寸田某嘗俟食于公語及人與物同之說公慨然有逺庖厨之戒故云又黃庭經云寸田尺宅遊絲掖戶對悠然猶似鈐山靜卧年雅性好文兼好士修齡非藥又非仙夜調羽檄消多壘晝接龍光切九天自愧樗材虛汲引秪宜仍舊種瓜田密雲閲兵作亭徼逢秋鵰羽輕良家六郡試雄兵一夫天險盧龍塞萬炬星飛翼虎營清笳乍歇聞鳴鏑突騎才回見伏旌有道四夷方設守年年長此護神京度潮河流淺沙明自可憐未經秋潦轉澄然馬腹浮河仍飲水甲光映日更搖川幾處穹廬移就草有屬夷並河居數家甌脫曲依泉沿堤猶見青楊栁秪覺南州鄉思懸夜上石塘嶺關白河入口石塘城上流元自古開平巖立星辰孤墮影野清刁斗空傳聲戍樓倚月橫吹動虜帳燒腥逺火明魏將殞身曾此地邊人語及尚沾纓正德末魏年參將祥難𬒳於此石塘道中高城落月鴈飛斜數畝沙田稻亦花路繞曲河十八度人棲􅾞石兩三家堠烟山靄爭明滅戍笛秋聲并慘嗟聞道松亭遣探騎時時愁𬒳熟夷遮古北口城此城雄據山頂蓋徐武寧之經略也諸城皆在山之窈此城冠山如鳥巢鼓角千峯虎旅散漢胡一路犬牙交薊鎮一道漢地與虜盡相交乂如之字熟夷生虜遞畨覆怪石崩川爭怒號到此令人思猛士天山萬里縱鳴弰宿黃崖營棲棲終日旅邊城夜向黃崖問古營幾家戍鼓漁陽撡聮騎鐃歌薊北行漁陽撡薊北行皆樂名峽束雨湫高怒水山凹樹竅激秋聲躍馬壯年微志在不緣此地客心驚唐人薊門詩云燕臺一去客心驚故反其言以為結游遵化湯泉絶塞逢秋已覺凉此中氣候訝非常流金每似臨三伏晞髮真成向九陽山烟靉靉分朝潤草色青青敵夜霜我亦臨流堪一笑稽生盥浴久相忘余有稽康之癖不沐者矣草年登喜峯古城時三衛貢馬散牧塞外絶頂孤峯見廢關短衣落日試躋攀三秋豹旅方乘障萬里龍媒正滿山候鴈似隨鄉思去寒花將送使臣還籌邊迂薄真無𥙷空望伊吾抵掌間曉發喜峯客心流水與爭馳寒壘踈星度峽時未返王孫猶草色𥘉來戍卒是瓜期去鄉秪覺蟬聲似出塞方知馬脊危辛苦下情何計逹早年曾誦采薇詩入秋久矣餘熱尚在閏月十五日太平寨始見秋色漫漫嵐氣半晴隂摵摵庭柯葉亂吟始覺孟秋雲物至因知宴歲旅情深孤鳶影跕寒巖草鳴蟈聲連野戍砧戈甲滿山乘塞卒天驕何處欲相侵月下小坐書懷滿庭圎月坐孤松聊息塵機長道容任俠早知同盡虎談兵晚更笑屠龍支離避疾猶分粟洴澼乘時亦請封蕙帳故山應待久尚從長樂聽鳴鐘寄姜白二子日閲軍容夜馬蹄孤懷猶畏簡書稽眼中親識皆夷貊處處多是虜悵夢裏經營亦鼓鼙畫省薰香行載槖石渠校籍坐然藜寄語雍容鳴玉子可能相念到遼西薊鎮憶弟正之試南都伏櫪衰年久自甘爾兄迂濶爾偏諳心窺祕算逢人噤篋貯隂符向夜探犀渚青楓烟際棹犀渚近金陵龍沙白草露中驂鴈行正笑難如鴈飛去飛來北又南狗馬病多經絶塞棣華室逺隔南天每思原上聽鳴􅜇始訝山頭望跕鳶可以去乎仍戀祿無能為也更籌邊頭顱長盡山林骨木食莎衣信有緣還姜白二子衣試整戎裝出漢宫解衣何意故人同野容聊免披顚倒命服堪將襯􅉳葱孔陽為映朱旗色借姜緋衣稍敝因經紫塞風今日還君篋笥裡依然搖曵禁垣中副總兵馬芳芳陷虜中十二年而歸在虜中亦稱為驍將穹廬元以射雕稱一騎常先萬馬騰意氣肯甘胡地老勳名終屬漢壇登斫殘右臂方揮刃殪盡追鋒未釋氷歸自虜中還破虜古來名將亦誰曾謁夷齊廟方道長邀逰為仰風流百世希長歌招隱坐漁磯昔人何處羣麋鹿此地深秋尚蕨薇征誅揖遜有今古餓顯祿隱無是非但使斯人皆可侣不妨到處坐朝衣八月五日順義道中望闕一首時近萬壽節四日也幾時承遣出彤闈寒暑俄驚節候非霜隕塞門猶葛屨風凄朔野亦絺衣中秋誕聖金晶㑹百里曕天紫氣圍日與長安俱近處莫陪鵷列轉依依順義公館次壁間韻虜入山前山後州控弦萬騎此屯留四郊壘壁猶餘警十載瘡痍尚未收野長蒿萊仍課馬兵僉子弟更防秋使臣多愧詢民瘼自詠小東誰為酬登懷柔城塞下孤城古白檀半臨平野半依山秋來亭徼無㷭火官馬千家苜蓿閒小邑蕭條恰似村日中市井巳扄門山田砂礫希禾黍只有城西種果園黃花鎮拜聖誕珥貂拗砌曾為吏握節封彊又此行日近長安無百里星廽帝座正三更簫韶律應軍中樂羽衛光搖塞上旌草載違顔江海逺却因咫尺重含情詩奉命視師浙直介溪相公見贈次韻不才黽勉從王事戎馬驅馳南北仍意氣本非投筆客生涯聊似出山僧兵謀豈足窺韜豹國士猶慚賦大鵬李太白感司馬子微知遇作大鵬賦故引以為况賴有廟謨曾密授海氛應見計時澄月夜渡蛟門海人相傳蛟門波浪最惡如江之峽也大洋萬里無拳石却見羣山亘海中忽然石壁開雙峽坐覺樓船聳半空島以戶寬延滿月潮緣口窄弄驚風誰能一矢穿蛟窟秪憶樅陽漢武雄漢武射蛟樅楊江中三沙抱病夜坐柬梅林督府領軍韋睿本清癯藥褁常隨倚劍餘日御短衣巡壁壘夜支倦體閲軍書莫愁深葦難搜剃試算窮巢易掃除虎將眼中誰可仗佇聞幕府䇿何如和陳黃潭東歸一首吾亦欲歸讓公早此行不異登仙好試看苦戰東海塵何似高眠北窗曉宦情鳬鶴任短長世事鵲鳩誰拙巧他年約訪祝融峯爛煮青精相對老浙中流言王逰擊喪師二三千者又聞總督梅林公將至太倉詩以自咎并以志喜云耳後總督細查王遊擊喪兵之數止是九十四人也可為一笑兵略元非素所聞踈才多愧薦書勤自知薄相難成事共笑狂謀易僨軍雄閫豈堪分玉節岩扉秪合伴松雲東山繡斧深懸望佇看神機靜海氛三沙病後夜起玩月書懷軍中元不解衣裳夜倚危檣歌慨慷巳慣羸軀常食少從教短髮尚心長海能儘月空無水潮定期風颯有鋩不為督師經逺涉何由此地玩清光朝長落至三分以上必起猛風一畨每潮汐皆然蓋潮自生風非關大塊噫氣與虎嘯而風冽一理此非久在海上者不能知所以儒家未之言及惟潮與月與風與隂類然則潮之應月又何疑也海上歸來病手足瘡兼血疾伏枕瘦骨迂才堪竊笑豈能萬里事橫行一身自試妖狐穴三沙入賊巢與賊對靣止隔一箭餘地六月深驅瘴海兵陳湯攣痺緣西域韋睿虛羸為北征我愧古人無萬一却令二病偶然并赴官揚州與左妹夫兩弟鶴兒白壻登金山坐禪房一首衰顔久𣣔寄名山江國征師幾往還隔水空知戀桑梓紆籌豈足靜夷蠻淮天鶴唳軍聲壯海戍烏棲戰舸閒時倭寇剿盡海氛暫息用左傳齊幕有烏故事縱是維揚迎帥急道人且坐白雲關題墻子嶺公署中偃松署本參將府也塞垣飽歷雪霜寒直上無枝只屈盤邊人自識將軍樹我來權喚大夫官遊湯泉四首幽都自古號寒門重纊年年亦不溫信有燭龍蟠地底亂泉噴出火珠翻湯池皆珠泉古詩燭龍棲寒門坐看池底絢霞光疑是蓮花火裡藏借問幻師誰㑹此乾坤爐冶炭隂陽用賈生賦語戎馬驅馳未息鞍春風沂曲一盤桓試慿活水洪爐暖暫解儒生徹骨寒萬樹不知霜信至兩崖時見火雲升一就薰蒸聊可喜久來還想玉壺氷宿七家嶺驛次璧閒韻莽莽沙河水分流亦有涯瓶罌開小市蓬蓽擁寒沙去縣無百里依山僅七家偶然成一宿聊喜息紛華食蒜三餐韲粥猶嫌穢百味葷腥久不嘗頃來食蒜如餐密已換山中一副腸題豐潤寺中古鐘腰下巳磨鳬氏舞頂間僅屬禹王堆外國竒文翻不出山僧道是海中來遊鐵壁一峯特竦如削鐵古松根透石紋裂我欲峯頭看八荒安得手中慿九節銀山寺說法臺秋山面面翠屏回孤石支撑說法臺想見高僧開口處諸峯曾與點頭來橫嶺一畚石與一畚錢懸綆千尋未及泉吹玉往時猶可詫汲金此地更堪憐七夕公館憶海上二首牛女雙星隔水明一年一渡尚心驚天河風浪何如海海上征人晝夜行一水盈盈幾許遙猶煩靈鵲為填橋千年精衛空銜石漲海烟波只自饒重刋荆川先生文集卷之四
