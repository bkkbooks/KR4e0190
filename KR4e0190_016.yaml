  text: 重刋荆川先生文集卷之十六
  hash: sha256:5a9d9c1cf342e368ece1fc5aca107b62d49f80dd5e1da03acb3a8ea59a74dee2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_016-1a}
body:
  text: 墓表春坊中允方泉李君墓表方泉李君既卒其父推官公謂余與君同寮相好也以書來請余表君之墓君姓李氏諱學詩字正夫世爲萊州府平度州人大父諱琮父推官公慧也生二子而君爲長君少頴異沉静治經通尚書乙酉秋郡守李君霆夢桃花洞中一少年得雋已而君中試君結廬讀書處則桃花洞之麓也丙戌第進士爲永平府推官法麗扵情數决滯獄三年以薦召入爲稽勲司主事頃之陞考功司貟外郎㑹朝覲考察君與有司佐其長僚黜陟用精已而調文選貟外郎君之在考功也而余亦入爲考功主事始與君相識君爲人豐肉踈眉目進止雍容與人接婉婉若處女腹中坦坦不蓄鱗甲以此能在處協于僚友間其治獄也未嘗以鉤距爲巧其考課也未嘗以按吏爲功是時都御史王浚川公有物望不輕一言假人自君爲諸生而浚川公爲提學則已竒君後君居吏部浚川公熟視君益以爲逺噐數言扵諸公卿間諸公卿自是知君亦以爲逺噐也君居閒獨喜爲詩然在衆中絶口未嘗言詩其自晦多如是在文選未幾改官爲翰林院編修頃之丁母楊宜人憂既葬廬扵墓側産芝三本高尺許然君不自以爲瑞而亦不言扵人服除赴官戊戌春同考㑹試事巳亥東朝建君拜左春坊左中允兼翰林院修撰未幾充經筵講官庚子秋主順天府鄉試踰年以病卒嘉靖辛丑六月某日也年三十有九君之入翰林也是時與君同入先後十有一人皆取之科道與諸部属而君與余則皆自吏部入居二年余罷歸而編修鄞陳君束出爲按察僉事是年編修山陽盧君淮卒明年修撰東平王君汝孝出爲按察副使又三年余起爲春坊司諫是年中允閩陳君節之卒明年陳君束以副使卒是年余再罷歸明年而君又卒嗚呼維昔官翰林者進士高甲與庶吉士兩塗而巳今天子在位以爲此不足以博求碩士遂改其制癸巳之歳乃得君等十有一人于是此十有一人者入則陪侍經幄退則校讐東觀景從響附人思自竭以報殊恩暇則相與接杯酒或限韻賦詩分曹壺奕或雜以詼諧嘲笑以極文儒墨士之樂于此之時彬彬雅雅争先恐後何其盛耶七八年間在鬼録者幾及其半出者罷者亦又幾人其尚在院者纔兩三人耳嗚呼何其有終之鮮與自古文儒之士委棄于草野者不少乃其間得自致扵金馬玉堂之列以桀然自見其才者千百而一兩人耳其遇不可謂不幸天子度常格而用人亦冀以得魁梧瓌偉之雋盖蒐扵千百庶僚之中獲此數人其致之不可謂不艱而淪落銷歇若此其奄忽也豈非憐才者之所嘆與故爲表君之墓而并名其人以志余之所感云戸部主事陳君墓表嘉靖巳丑歳吾郡之士同舉進士者凡八人于是此八人者得群然咸聚于京師未幾則或去或留或去者復留而留者又踵以去其間得相聚京師者率不過四五人或三二人再不能及于八人之數而其後無錫張君舜舉與余相繼罷去則此八人之中罷其兩人其後江隂陳君又卒于京師則八人之中喪其一人矣嗚呼是可嘆也憶昔此八人相與日夕具杯酒相歡笑此時固亦知其聚者終不能不散然殊不意其遽然遽散去猶冀且復聚縱使散去不復聚亦不意升沉存没邈然分隔遽至于此然此猶七八年之間耳使更復此七八年或數十年則人事之錯迕消息愈益不齊而其聚散升沉存沒之感計亦不止如此而巳嗚呼此可以知人生之若浮與天地之爲逆旅矣而亦何恠其然也歟然方其聚也則爲之歡然以喜其散也則爲之慨然以憶其罷而去也則或爲之悵然以唁其沒而不可作也則或爲之欷嘘流涕以悲亦有情者之所不能巳歟然則子逹之亡此七人者莫不悲焉而余獨有所深悲于子逹者以子逹有樸茂愿慤之質有務爲君子之志而學未及充乎其質力未及竟乎其志非惟大官老壽限于命而不可得而問學事業之可以自致者亦若有所限焉而未究乎其止也此子逹之所以爲悲歟彼區區聚散升沉存沒之感固又不足較矣子逹諱詞自號茶丘居士以進士授戸部山東司主事歴官若干年而卒卒時年纔三十有六陳氏故饒于貲而君能刻苦自植立其在衆人中衣裳言貌絶不類紛華子弟而其在官絶不營營然廣交㳺借聲譽爲富人事其爲戸部嘗監太倉軍儲又監淮安清江浦漕務最後檢校諸司章奏皆精鍊謹㓗能于其官而君自少孤事其叔青田始事父之禮友其從兄子和如其親弟兄家之筦鑰一總于青田而君不知焉君出入必禀于青田翁而後從事觀君居家與其居官而予所稱君之質與其志大率可知也君始有二子而夭後君卒之八月其妻吳安人始生一子名之曰之才安人系出恭靖侯良之後有賢行而青田又爲之綱紀于外其必能相與立孤以成君志也嗚呼陳氏之以善聞也久矣而君父敔山公既舉于鄊又不顯以死至君且顯矣而天又嗇之固将以昌其後乎曩癸已之歲余再官京師㑹君亦継至于是所謂八人者獨予與君二人在京師後雖継有至者又不久以去而君與予至再更寒暑而後别且以余之迂戅無似幸不爲此七人所棄斥而君尤若以予爲可與者盖君于余交深而信篤如此君之没予安得黙然無一言也君墓志行状既自属于學士張公與戶部主事曹君獨墓表未有所属青田翁以請于予盖君未嘗有言而青田翁揣知君之意或在予也君世譜履歴則誌已詳故予獨序交游始終以道君之可悲者以掲于君之墓而又将以貽諸此六人者云都察院都事秦君墓表錫之言孝弟篤行有家法者必㱕秦氏秦氏之先貞静先生諱旭隱居行誼既没而鄊人私謚貞静先生以長子䕫官封中憲大夫然鄊人不稱其官而稱之曰貞静先生貞静次子永孚以孝子旌弟仲孚亦孝郷人稱之曰雙孝秦氏君諱鏜字國和號類樗山人貞静先生之孫而孝子公之子也自少爲邑諸生治所謂時文者最精每御史歳試諸生諸生心擬甲乙多目君君亦每自負及案出卒無前君者然六試扵郷而後第五試扵㑹皆不第已而罷試家居若干年嘉靖辛丑即家授南京都察院都事以卒年七十有九君之罷試也以親老且病故竟二親死君亦遂不仕也曰吾禄不及吾親乃欲以衰年爲子孫竊禄耶𥘉孝子公事其父貞静與其母殷恭人惟其志而不忍傷至扵刺血吮瘡不憚爲之及君事孝子公一如其所以事貞静者其事母張孺人一如其所以事殷恭人者孝子公仁慈儉朴君爲是群下不輕鞭呵中堂無叱咤之聲平生自饗七筯不出𬞞豆之外懼少失孝子公意張孺人嘗病癱不能起又瘖不能言君以意揣其寒温飽飢而時食衣之便溺起坐必君自扶抱朝夕必側如是者十九年雖女使亦不以属然此盖君之所謂孝者即甚勞勩亦不過乎煦愉抑搔人子之常事獨念君束髪即以文自奮人亦期君扵當時所謂功名顯榮縱不有得扵前必有得扵後而君乃銳然自割扵強盛之年非孝愛純至一不中熱扵世味有所不能是無難耳抑人亦有言子而仕雖有離憂樂也子而在側雖無離憂不樂也人情豈異是哉君乃能使其親忘乎人情之所樂而深樂乎人情之所不樂者其必有委曲感移乎親之心而人不能知是尤所以爲難也君事寡姊曲有恩禮姊亦以節見旌君爲人悃愊無表暴之飾然重節槩厲㢘隅不妄交游不輕謁扵有司君既自以詩書行誼守爲家法扵教子孫也尤篤子孫化之街衢之間褒衣矩歩不問可知其爲君家弟子庚子歳子涵孫禾舉扵郷癸夘孫梁又舉郷之人不以子孫之堦扵榮進爲秦氏賀而以子孫恂恂謹譲守家法爲秦氏賀也盖吾友施君子羽狀君之行而爲之說以比扵漢石氏其說然矣然石氏自建慶而下不再世孝謹遂衰豈非其質行有餘而詩書問學之澤不足以維持之耶有石氏之孝弟矣而又能從事乎齊魯諸儒之所謂文學者以益修乎其所未至則秦氏孝謹之風其将不衰矣乎余故因表君之墓而并書之以詔其後之人普安州判杭君墓表嗚呼是爲吾友宜興杭君錫賢之墓杭君諱封錫賢其字號日惺布政澤西公之子都御史雙溪公之兄子也乙未歳余罷官歸客宜興寔舘扵君余性𥚹且戅在郷曲孑孑不能與人爲同然獨嘗心善君君自少以宦游子弟著文行其所結納多海内知名之士顧余何取然君與余獨深相好也以是于君乎舘余所舘距君所居五六十里君數數徃來候余或相對一室講論經史或邀余游東西溪及銅官諸山所至輙盤桓竟日或相與賦詩爲樂余是時居常以病謝客然扵君之來未嘗不喜余扵山水亦雅不甚好然扵君之請未嘗不從與君處乆而益津津有味而亦益知君之爲人君外和而中介其遇事小心能忍待人依扵謙厚扵好善尤篤甚扵世之嗜勢利者其臭味茍同雖其四海九州之人君縱不能徧與之接然其心未嘗不慕而求之其臭味苟不同雖其里閈姻戚之人君縱強與之接然其心未嘗不踈而逺之其慕而求之也然未嘗翕翕以相驩其踈而逺之也然未嘗悻悻以相忤余以是益信君爲長者余既居宜興兩年㑹有春坊司諌之命去如京師未幾君亦以選入就試北畿復得與君日夕往來如宜興時君居京師尤自守不妄與人交獨余所善吉水羅達夫富順熊叔仁平涼趙景仁君介余徧與之㳺甚狎至於大官勢人之門雖君力能自通然絶不往也始君少時從澤西公在京師學於翰林諸先生其爲文有矩矱爲縣諸生已能出名聲然數試不利後爲太學生師事湛甘泉吕涇野鄒東郭三先生三先生亦㴱器君君益思自奮及余與君㑹宜興則君年且五十矣而其氣不少衰時時作爲文章包羅馳騁沛如也旣試北畿又不利於是始有選將選有勸以賂者君艴然曰吾父吾叔並以直節蒞官吾縱不能似柰何以此爲吾父吾叔羞竟不肯於是選普安州判官歸至淮病卒年五十有七自君在京師而余以狂言再謫為民君送我於崇文門外眤眤不能別且謂余曰君去吾亦歸矣與君結廬㴱山以老焉可也未幾而君竟死嗚呼余烏得無情哉乃爲叙始終游從之故與君爲人之大畧而書之於其墓按察司照磨吳君墓表文字之變於今世極矣古者秉是非之公以榮辱其人故史與銘相並而行其異者史則美惡兼載銘則稱羙而不稱惡羙惡兼載則以善善為予以惡惡為奪予與奪並故其為教也章稱美而不稱惡則以得銘為予以不得銘為奪奪因予顯故其為教也㣲義主於兼載則雖家人里巷之碎事可以廣異聞者亦或採焉故其為體也不嫌扵詳義主於稱美則非勞臣烈士之殊迹可以繫世風者率不列焉故其為體也不嫌於簡是銘較之史猶嚴也後世史與銘皆非古矣而銘之濫且誣也尤甚漢蔡中郎以一代史才自負至其所為碑文則自以為多愧辭豈中郎知嚴扵史而不知嚴扵銘耶然則銘之不足據以輕重也在漢而巳然今又何恠余兩為史官皆以不稱罷而姻戚閭里以其嘗職史故徃徃以銘辭見属嗚呼試點撿前後所為銘其如中郎之愧辭者有之乎無也余進而位扵朝不能信予奪扵其史退而處扵鄊不能信予奪扵其銘是余罪也雖然予奪非予之所敢也是以欲絶筆扵銘焉其或牽扵一二親故之請有不能盡絶者則謹書其姓名里宦系世卒葬月日此外則不敢輕置一言雖不盡應古銘法亦庶幾從簡近古之意焉墓有銘有表表亦銘也今予所為表者是維按察司照磨吳君之墓據君之族孫進士禎所為状君諱文字從周號鯁齋世為無錫之閭江大父諱某云云君少讀書為邑諸生後援例入太學凡兩試不中第巳而選福寕州幕官陞山東按察司照磨不赴任遂乞致仕家居凡幾年病脾一歳卒嘉靖某年月日也年七十有五墓在閭江第二湾祖塋之次葬以卒之又明年某月某日将葬君之二子忞慰詣余請文而君族弟從夏實為之先二子且致君遺言曰吾死汝必扵唐太史乞言焉從夏為吾母任宜人後母之弟其人恬静有守余雅重之故其為君請不可辭而余嘗兩㑹君扵京師其氣温然謙厚人也始改官而乞身賢乎冐競不知返者君之遺言又如此嗚呼君豈以余不能為愧辭也乎故余叙所以不敢輕為銘之說及所以銘君之故而謹書君之姓名里宦系世卒葬月日為文而授之忞慰使鑱諸墓上華三山墓表華三山翁諱從智字克禎按察副使金之父也副使為戸部主事時封翁以其官副使㢘静樸木有古人之風余心敬慕其為人後乃稍聞三山公之行事而知副使之樹立有自也則又敬慕三山翁已而得翁所為佘山百詠詩其語類古之隱君子自足扵一丘一壑而不奸扵物者余嘗𣣔走佘山訪翁以庶幾獲見所謂山澤之臞而未能也嘉靖壬寅四月十有四日翁以病卒年八十有二扵是副使來請余表翁之墓嗚呼余扵翁有感矣翁生為富人而以子貴為封官諸富人率隂陽予奪多其綱絡以力争錐刀其貴人父兄或慿其氣力漁獵其人饜其谿心翁乃約巳而豐人一切屏機穽不事賈田宅從其贏歛租息從其朒衣食人也從其贏自衣食也從其朒又諸富人與貴人父兄率飾冠帶都騶奴日夜碌碌以刺候造請結納為事以厚其交而多其勢或時節徃來府縣門入則僂僂柔色詞以媚出則詡詡張眉目以矜翁獨一切謝去塞竇自蔵在佘山三十年束帶見賔客之日可數也盖翁之泊于利而䟽于勢若此宜其發之詩歌而特有類乎古之隱君子也哉余是以諾副使君之請而表扵其墓翁墓在佘山翁所自營也翁少嘗力扵治生以逸其父西野翁後西野翁没翁遂去其故居而老于佘乃自為塋塜因山而壘植一木必其材甃一石必其無泐費可若干金以上經營勤瘁且數十年而後完雖然古有說矣聲利腐䑕也形骸委蛻也故逹者解焉翁能不恡情扵其一乃若不能不恡情扵其一焉者何耶且夫役其一生之力營營焉以計其身後委蛻之蔵與彼役其一生之力營營焉以計其身前腐䑕之奉其較亦何能大相逺而翁乃躭之不置其亦未可以為逹欤或曰唐司空生嘗為之矣司空生逹人也故逹乎死生之際則王孫之祼葬可也司空生之自為塋塜而飲酒賦詩其中可也翁父西野翁諱某祖某家扵無錫之鵝湖華氏自翁十五世祖當宋南渡始自汴徙無錫居某地幾世祖自某地徙某地而五世祖又自某地徙鵝湖其墓亦随所徙族大而墓散徃徃蔽草莽間翁遂為巨碑數通各題小傳碣諸其墓為識而翁始墓扵佘翁配云云莆田林氏先墓表莆田林君華𫐠其先人之行而請余為之表扵其墓曰少而為儒老而投間其績文強記推扵士人而好施善忍著扵郷曲自少孤獨與母居母或不懌輙卧不食則跪俯牀下求親黨慰解百方母懌然後跪為之起母食然後食是吾大父洗心公之行也雖不為儒生章句然喜誦詩書旁及簫管歌曲卜筮星暦之學尤精康節易數而時諷其所為擊壤詩故其平生遇歡愉窮窘悲愁死生之變以為是數也嗒然絶不以逆順生心少䘮母䘮哭之目盡腫數至失明後遭父䘮窶不能給則躬負尸扵牀而鬻衣質屋以供含襲其後繼母寡居而家又窶甚滌瀡𥜗緼之奉有豐無缺是吾父敬菴公之行也寒煖飽飢起居盥頮事關舅姑者以身任之不以勞相遺井汲竈燎噐滌衣澣棗栗挑剥家之瑣細事關妯娌者以身先之不以難相推諸妯娌見其卑柔或侮以非意則善解遣之復有煦濡翕䚹者又正色拒之乆之諸妯娌皆服而舅姑則益喜是吾母周安人之行也嗟乎華不幸十三而䘮吾大父十七而䘮吾母二十而䘮吾父空乏顚沛不能存然思先人之義即以不忘溝壑自厲嘗乏食竟日危坐讀易或雪夜衣絺覆草獨處慷慨歌聲逹旦益奮激不改以先人遺教在不敢背也華自壬辰登第至扵今十有四年而任今職所居官處患難臨民益思砥礪名節深以罔上殘下冐進壊道爲耻以先人遺教在不忍玷也大懼先人之善泯墜不紀是以日夜悼心惟君與華相知深敢以累君華之請余文也盖在知鎮江之二年余諾之而未有以應也後二年御史奏華激變事𬒳逮京師華以書別余曰苟君不遺余先人而終賜之華即死瞑矣華發鎮江哭而送之江者幾萬人擁傳車不能行逮者愕眙且笑曰是可以為激變矣華至京師上奏自辨天子以為直而京師諸貴人亦多言華枉者扵是天子竟不深罪華而罷為民以㱕華于道遣其弟苹以書來曰華誠不自意復奉先人丘墓惟君所以嘉惠先人者願終賜之嗚呼余扵是益感渉世之難也将為籧篨戚施嚘吚唯阿苞苴承迎之行可以無譴訶憎疾扵人然或不免譴訶憎疾扵鬼神而且遺先人以悪名将為矯世厲俗捐私奉公嶄崖狷㓗之行可以無譴訶憎疾扵鬼神然或不免譴訶憎疾扵人甚者為世戮辱以憂丘壠是兩者不知其孰可也以華之自處固以謂可以無譴訶憎疾扵鬼神而貽先人以令名然卒不免譴訶憎疾扵人既觸法矣然猶得免僇辱以奉先人丘壠以不為譴訶憎疾者所快盖非天子明聖至仁保全善類則不及此故特為紀之以著扵世且使世之人知種徳積行雖壈坎其身必發之扵其子孫如林氏之先人秉道守正雖遭罹䜛疾終獲保全如華者以為仁人志士之勸其扵世教未必無𥙷云彭翠岩處士墓表古之人有書其人之墓者必其知足以知其人者也智不足以知其人而據其所傳聞書之雖其當實君子且以為近誣而况其不當實者乎雖或知不足以知其人而知其子弟則為之書其父兄者今徃徃有之然其不失實者亦或少矣自余稍知為文惟書人之墓則尤不敢不謹知不足以知其人不敢書雖或知其子弟而亦不敢以書其父兄今余既未足以知處士而又未獲㳺扵處士之子郡推君而特為之書者盖郡推君之僚扵余父也最乆而余父之知郡推君也最深則因余父以知郡推君之為人而因郡推君之所稱述者以知處士之為人其亦庶乎可以不失實焉否也按状處士諱顥遵道其字處士居常自言曰拙可以勤𥙷而窘可以儉𥙿故其俯拾仰取凡所以家人生産之計未嘗不出于勤而其服食噐具凡其所以自奉未嘗不出于儉然至貧不能屋者為之屋貸而不能償者還其劵或遇賢士君子其将迎而贈送之也必㳟其貌而豐其儀故士君子樂與之游而郷之人不病其為纎嗇也其更徭賦役凡所以急公家之事者先扵所以謀其私至扵體其同室之休戚通其布無而孔懐其死䘮其所以為其父母之子者先扵所以為其子處士既自以不能讀書為儒而獨属意扵郡推君郡推君之少也擇師教之而時督之曰若頼祖父餘業幸無飢寒而不刻骨自植立而惰窳以敗是羞余也嘉靖壬午郡推君舉扵郷處士且喜且督之曰更志其大者可也盖郡推君述處士之行大略如此而余父為余言郡推君之為人縮縮謹甚其治獄多所貸舎不以鍜錬為能雖鞭楚常恐傷之是殆有聞扵處士長者之教乎余是以因余父以知郡推公因郡推公以知處士而為之記之也處士祖希載父徳甫自處士祖父而上皆不仕而處士有子澄始舉扵郷今為永州府推官配晏孺人状以為安祥雍肅能助處士之不逮者也子三人長即澄次渾太學生皆晏出也次深側出也孫男六人天禄天𥘉天視天祐而天禄天𥘉天祐皆邑庠生天視太學生其二也㓜未名處士卒扵嘉靖某年月日年六十有三晏孺人卒扵某年月日年五十有九至嘉靖丙申十一月日始合葬扵萬載縣北九子石之崗處士系出宋待制忠肅公龜年之後世居臨江之清江至六世祖始徙袁之萬載城東而翁又搆别業扵城北龍溪之滸龍溪迤南有岩積翠作亭其上而自號曰翠岩處士余因為之表曰是維翠岩處士之墓云傳周㐮敏公傳公姓周氏諱金字子庚號約菴其先武進人也國𥘉有彦居者以閭右徙南京因家焉至公為都御史復還居武進彦居生贈户部尚書道信妻贈夫人董氏扵公為祖妣道信生贈戸部尚書廣妻贈夫人張氏扵公為考妣墳墓皆在南京而公始賜葬扵武進之惠化郷公自弱冠為應天學生弘治甲子舉郷試正徳戊辰舉進士擢給事中陞太僕少卿僉都御史轉副都御史致仕家居六年以薦起為副都御史陞兵部侍郎轉右都御史㝷轉左陞尚書南京南京公所生長也因得焚黄先人之墓南京人以為榮公之始為給事也扵戸右扵工左扵兵復都扵戸凡歴三科為都御史也僉扵延綏副扵宣府扵保定右左扵淮鳯凡歴四地為尚書也扵刑扵戸凡兩部公所歴多在錢榖刑名兵戎劇曹與邊腹要地公為人闊逹警敏自在科中則巳練習人情世務章數十餘上度可施行而後言不效迂生敢言而巳武廟數游幸晏朝公上䟽請復常朝之規退則躬覽章奏以總權綱亦頗見采納時貴寵用事國儲蠧扵冗食公言京粮歳入三百五萬而食者歳乃四百三萬乞痛加澄汰便又言中官以迎佛以織造濫討引鹽暴横道路又言都督馬昻納女弟後宫外議或云巳娠請誅昻而還其女後昻雖不罪而女竟𬒳黜及公沒禮部爲公請贈謚亦獨以公爲給事時能隂銷禍孽指此䟽也方是時奄幸相繼擅勢尤與言路爲仇不旦暮死則竄少能全者公在科九年卒以老成周慎免扵戮辱而以乆次得擢為太僕公貌瓌偉善議論其在科中每九卿廷議軍機大事邊境要害衆輙目属公公口對甚辨聞者莫不心愜壬申狼山之捷兵部議有功将士例陞三級公笑曰不然将士有實職有虚銜有正副叅遊實職大而虚銜反小有管哨管隊實職小而虚銜反大今一例陞級則管哨以下皆可為督府而叅副以上或止扵都司首尾倒置非便衆是之癸酉廷議用兵土魯復哈密公極言西邊虚憊而土魯險逺且青海之賊窺伺西寕乃欲逺拯哈密譬之人家囊篋空虚子弟臧獲疲死而盗賊滿門庭将拯門庭之寇乎抑急比鄰之災乎衆曰是則然矣如土魯索金幣何公曰彼能效順國家何愛扵賞不然勦之未晚也巳而卒從公議于是衆以公可属邊事推延綏則推公推宣府則推公公既家居廷臣交口薦猶尚以邊事也公在兩鎮值寕夏甘肅大同三變之後公既素豁逹不拘謭有帥臣體裁又善煦愉接下邊人見公色詞既巳心安公公益務寛簡繩法以休懊熨帖之嘗欲笞一二走卒時窮冬多不袴公見之惻然曰邊人窘乃若是遂不忍笞而百方為之招商聚粟廣屯積芻以時給其食使人人有重生之心又為之葺墩墻以衛其居䟽石渠以足其水凡有規畫期扵利盡而人不勞邊人益愛公嘉靖甲申公在延綏㑹大同殺都御史報至公愕然因入静室蹰踟乆之喜曰吾得之矣乃開門召諸将吏軍卒盡入環列庭下謂之曰若軰知大同殺都御史乎衆曰知之公曰若軰以殺之為得巳耶非得巳耶衆叩頭曰狂賊自取族耳尚何道公曰不然邊人勞苦甚矣而又虐使之是趣之殺也假令上下素相愛若父子彼将倚以為命縱授之刄使殺焉其誰忍乎衆大􅌚呼叩頭退當是時以片言立解上下疑阻公自喜得應機之知居家時數嘗為余言之其在宣府總督馮侍郎以苛刻失衆心公數争之不能得侍郎又以引鹽數萬與其私人為市而平時商人無能得一引者衆固甚怨㑹諸軍詣侍郎請粮不得且欲鞭之衆遂憤轟然面罵因圍帥府公時以病告諸属奔竄入院泣告公公曰吾在也母恐即便服出坐院門召諸把總官陽罵曰是若軰剥削之過不然諸軍豈不自愛而至此欲盡痛鞭之軍士聞公不委罪若属也則氣固已平乃擁跪而前為諸把總請曰非若軰罪也是總制者罔利不䘏我衆耳公從容懇諭以利害衆囂曰公生我始解散去而總制自是亦心愧公延宣皆虜衝公内撫軍情外䇿強敵關城晏閉邊甿緩帶兩鎮四五年訖無敗事人益以為才然公他所施設其與公不同趣者或不能不以好惡為賛毀至論公長扵治邊則莫得而訾也自公去宣府八年而大同復殺總兵據城亂公時起廵撫保定矣遂徃扼紫荆擒大同諜者數人送京師㑹真定廵按李者有疑疾入某邑聞銃聲驚以邑令謀巳欲扶死之廣平守争之又以守亦謀巳至遣吏發卒圍廣平捕守一城盡空公聞變星馳徃撫定之上章露廵按罪状而臺長庇其属為之訟冤公復上章力辨廷論竟直公而黜御史廵按扵廵撫為同事而臺長又扵公寮長也公本通逹不務為崖異立磽磽名然利害大體所在不肯茍為媕婀此盖公所難者其以都御史出鎮淮淮當士大夫南北衢地過者或不愜所望則益易為謗然公自如也丙申章聖梓宫南祔始奉㫖由江而諸護行大臣至儀真議從陸諸官心知不可而惮扵以身任江行之險悒慴不敢出語公獨力争之極言沿江山險路不可通状且奉玉體馳峻坂上下撼頓萬一聖情聞之悲惻柰何議論徃返數日而諸大臣亦密遣人探沿江路果險如公言乃决從江之議以銕絙維舟行如期至承天遂如期以葬沿江千里居人免扵伐樹發屋役夫數萬人得無走死山谷中公扵是有力焉及為刑部尚書轉戶部益能扵其官乙巳致仕歸武進歸年餘而病卒年七十有四公性喜讀書雖稗官小史亦用以資其經畧尤喜為詩歌羽檄倥􅘓中率不廢詩上谷榆陽稿皆成帙也善字書有晋人風骨其罷宣府家居好奨進後軰與人言娓娓不厭與士人言言讀書與俗人言言勤業莫不取其有益是時余以諸生候公公過待以為國噐及入仕途公每遺書誨以經世之學顧樗散無能自效扵公者公且死以傳文見属余不得辭也公平生儉樸既巳貴其自奉如居約時獨祀先欵客則極豐㓗曰賔客重事也年五十遂獨居未嘗畜媵妾教諸子愛而有法一飲食必有訓自公既沒天子賜之葬祭贈公太子太保謚曰㐮敏嗚呼可謂有始有終者矣妻夫人吳氏子二人仕為都督府都事偉太學生皆好禮譲能世公之家者也暘谷吳公傳公名傑字士竒武進人也其為醫始公之髙祖肇父寕贈太醫院判公之學自青鳥氏書風角雲氣占經李虚中子平之術金丹内外秘訣無所不通醫特其一技耳然竟以醫至大官其扵醫精䆒古方書而善脉其治病不純主古方書而一切以脉消息之有𥘉若與証相反而卒無不効者其餘竒疾尤効也弘治間以明醫徴至京師遂以醫㳺諸公卿間公醫既精而儀觀磊落濶逹善談說頴然見鋒鍔于是諸公卿争迎致為上客京師諸老醫與公同時所徴諸郡國醫莫不望風下之是時都御史王鉞鎮大同奏乞吳某調治邊軍未及行御史顔頥壽給事中李良度皆奏言吳某宜在供奉不宜棄之邊地下禮部禮部尚書集所徴郡國醫試之卒無踰公者故事高等入御藥房中等入院最下遣還郡而當遣者若干人公為之請曰國家三四十年纔一徴醫耳若等幸𬒳徴又待次都下十餘年而又遣還誠流落可憫願不入御藥房而與若等同入院尚書義而許之正徳幾年掌院事李宗周竟薦公入御藥房而同薦者凡八人有與宗周同官争權者因左右䜛之上曰宗周所薦多私人且通賄實不能醫上曰吾當自試之時上病喉痺遂按名召公一藥而愈上喜甚嘆曰有醫若此乃不以醫朕耶因厚賜公詰責䜛者而謂宗周為忠公自是得幸扵上上每病未嘗不属公公治之未嘗不立愈一日上獵射還憊甚感血疾公進犀角湯愈命進一官賜彪虎衣一嘗幸虎圈虎騰而驚公療之愈命進一官賜銀五十兩表裏一頃之試馬御馬監腹卒痛公進理中湯立愈賜繡春刀一銀三十兩自是上所㳺幸公必從嘗侍上卧至以肩倚上或摩撫玉體有不以属左右近幸而以屬公其分御膳啖公有左右近幸所不能得而公得之自醫士十日而遷御醫自御醫三月而遷院判凡一愈病則一遷爲院判當遷者數矣公固讓三年而遷院使上親寵益篤嘗欲以禁衛銜公賜蟒衣公謝曰臣以藥囊侍陛下此非臣職也上乃止某年上南巡公以醫諫且泣曰聖體尚未安不宜逺行上怒曰汝醫官也敢乎叱左右掖出公畱京師駕行至淮漁於清江浦遂病還臨清夢見公急遣校尉召公公馳至臨清見上上泣曰而不憶我耶公亦泣遂扈從還通州時權彬握兵在左右見上病一旦不諱懼誅欲據窟穴爲亂力請復幸宣府公脉已驚甚密言諸大奄曰疾亟矣幸可及還内耳脫至宣府不諱吾與若輩即死寧有葬地乎奄以爲然乘間百方說上上意動而彬亦數從公覘問上病何如即詭言曰且愈矣勿憂也已而駕還京師崩彬坐誅毅皇崩之幾月而公亦致仕去矣既致仕畱居京師遣其二子徧從翰林諸名公㳺壬辰子希孟舉進士以才廉擢給事中於是以恩進公階朝列大夫甲午子希魯舉於鄉自某年公還武進稍葺室廬治田園爲終焉之計公既老居鄉不復爲人治病而親戚故人有奇症或病危甚衆醫所不治者乃以請公公亦間往往則應手愈居閒誦老莊氏書益究金丹内外秘訣以冀所謂長生者其自號暘谷谷者谷神也或曰暘谷海東仙人所廬歳時與里中故人雅歌彈碁飲酒爲樂酒酣數語及毅皇時事出所賜衣物未嘗不泫然流涕也久之希孟爲廣信知府懇乞致仕歸養歸數月而公卒始公每自詫得丹訣指其小腹謂人曰此中有物矣先卒之一日余往候公公紫色瑩然如平生希孟曰唐翰林在公點頭卒時神氣不亂整衣端坐口云好好遂卒年七十有八嗟乎公信多奇矣哉希孟居鄉有志嚮師事徐養齋先生而友余余是以得備聞公之行事爲傳而叙公在毅皇時事獨詳焉以見公之遭遇以俟國史傳方技者有考云萬古齋公傳宜興萬氏相傳徙自鳳陽始徙者曰勝三傳至雄雄兄弟六人皆強力殖産結豪傑而萬氏始大於邑中雄生政政有弟盛爲九江推官以學行推髙一時而萬氏於是爲文獻家政生璵璵生公諱吉字克修爲人方嚴剛峻可望而知其爲莊士自少從盛學盛爲人亦方嚴公心效慕之盛亦喜公類已公為學以為非有㢘隅墻壁不能自植立扵是歛束筋骨刻意以古人為師讀書觀古人忠孝大節輙掲之壁間自恐不如平生自禮義㢘耻大界限至扵拱揖進趨冠履食飲之節畫線而蹈終始相較不失毫髪善戯之謔露齒之笑未嘗一出扵口撥衣蹶足箕踞跛倚之小過未嘗一加乎身其事父母視寝視膳視藥恪有儀節深心欵然父母病不解帶自始病竟病愈以為常父暴病一夕卒每痛不及藥哭輙殞絶病尫然骨立年五十餘遭母䘮哀毀不衰扵䘮父時以是病衂至沒齒衂竟不愈也與弟善以友愛聞邑中病則共𬒳寝至老身長子未嘗異錢帛善亦謹厚有兄風教諸子寛而有法先志行而後文藝諸子烝烝雅飭規行矩歩孝謹一如公不衰其閨門化之娣姒雍睦自姻族朋友出入公家者不聞有誶語嘻嘻之聲其諸子弟不聞有挑逹宕佚華矜之習邑人争相髙之以比扵漢石氏而以公比萬石君公面目清冷對人少寒温語若落落寡情然人乆與之處真意溢出外有邊幅而内朴無城府至其情所甚鍾處宗族姻戚間恩禮欵曲即素婉孌多兒女子情者不能及也其自奉泊然衣未嘗問新敝食未嘗問精惡室無媵妾舘無圖畫古噐伎藝之翫賔至時一奕而已然亦未嘗溺意求工也居家手不識握筭計帳之具口不問錢米盈縮雖以有弟足籍亦其素性扵財利䟽濶使然然獨喜施舎至歉歳家人節口而食遇窶人未嘗忘施也友人且死属其妻曰濟我後事者必某也已而果然其處宗族每誦范希文自吾祖宗視之無親踈之語嘆息者乆之族人有緩急既自罄其貲與力其所不及則醵其闔族之貲與力以濟其三族中待公飽饑衣凍婚子嫁女者若干人公恂恂儒生非欲以振急排難為豪舉其平生壈坎又非如希文有俸廪賜予可以収族其所為如是盖天性也以繩檢自律亦以繩檢律人人有善雖在後軰必稱嘆推引以為賢扵已人有過雖在同軰必面折或動色不少避扵義有違雖田夫野人女子之言皆為之屈服及引義爭是非雖遇逹官勢人鯁鯁反復必伸已說不少媕婀以是人或謂公激而知公者益以公樸直愛人如愛已也其有欲為不義懼公知之而止者較之面折者尤多居學中三十餘年學成行尊其儒生後軰有志節者雖不及公門亦心師公事公一如事師之禮公亦欵欵訓諭相勵以古道不降辭色既執古自信因以古名其齋諸儒生無背面必曰古齋先生而不敢字之其家子弟且冠必為之行古冠禮及婚葬祭率凖家禮從事不為苟簡在學中凡八試扵有司皆不第而提學林公有孚蕭公鳴鳯以徳行旌士每首公以風諸儒生公自少讀經史守儒先成說甚謹扵儒先中尤篤信晦翁氏然至疑難處輙掩卷自思及有所得多出儒先論㫁之外文字尚理致不為華言然諸儒生心服公之行故不以文名在學中獨與潘君松為厚交潘君踈爽坦易而公堅苦縝密兩人操行不同而各以所長相取至白首無間嘉靖丙申余始識公扵宜興公因遣二子從余㳺數過余相與講論有合有不合而卒㱕扵相得也盖公尊經傳甚篤而守格式甚謹然而黙成不言之㫖近扵破去經傳而易以為束書㳺談者之所便得心忘象之宗近扵脫落格式而易以為宕無忌惮者之所假故儒者徃徃因其似而疑其真余既與公交乆之乃稍稍扵經傳格式之外有所陳述大要以反求自得一不蹈襲獨操欛柄為說公聞而相與辯析亦乆之然公察余非敢不尊經傳非敢不謹格式者是以因其跡而諒乎其心知其人之不求為異而意其言之或不妄也先是公之友周君道通學于王陽明子得聞致良知之說㱕而以語公力縱臾之公以其說異朱子不肯信道通沒十餘年既與余相得則慨然謂其所善門人王革曰道通愛我今荆川子語固多與道通所述相合然固未嘗背扵朱子我恨不及道通之存也嗚呼以公之堅志勵行虚心從善使其早歳有聞且将由忠信而好學不知其何所止正使晚年所遇不至如余之迂駑而得一豪傑之士其感孚契合洒然冰解又不知何如此余所以愧公之知也然公之所自立者其亦足以見扵世矣居乆之以貢爲桐廬訓導桐廬地磽陿儒生溺扵習俗錐刀瑣瑣鮮志操公夙夜勸課爲之深明義利界限時時舉釣臺故事激發之曰若軰非子陵郷人耶諸生一時爲之爽爽心動時節或有饋遺却弗受間有所受則以振業諸生之貧者提學張君岳考之曰文足以範士行足以勵俗近得其實云未幾懇乞致仕㱕是時二子士亨士和舉進士公每遺書必曰願若軰爲好人不願若軰爲好官士和以翰林吉士出爲禮部主事公聞之喜以其能不干進如教指也在桐廬二年而㱕㱕六年而病卒病且亟余徃候之氣已徴矣猶披衣端坐作拱揖状謂余曰吾語言若顛倒者余曰湏静以飬之公曰正爲平日不能飬耳是卒之前七日也卒時爲嘉靖甲辰七月二十日年六十有三公蚤年剛方自立晚而氣象和易對人煦煦自桐廬㱕後軰益樂親之其行已類狷而意甚廣居常有志天下事自爲諸生地方利害休戚亹亹爲上官陳說既老無所施用然猶不忘時事聞一賢人進則喜見鬚眉爲天下賀或聞進一縮朒黨蕩者則蹙然改容當食爲之廢筯每得忠諫章䟽雖老必手録卒之前一月既已病半起坐間猶類聚平生所録拱手讀之其強扵好善至老益篤自桐廬㱕數入郡訪余相與講劘益切又邀余訪飬齋徐公慨然相見晚也故其卒也飬齋公誌其墓妻李氏封安人子三人士亨吏部貟外郎後公五月而死扵毀士安縣學生士和禮部主事孝謹一如公者也李宜人傳余讀同年友羅君洪先所為述其先人副使雙泉公與李宜人行事為之慨然而嘆盖嘆吏之漬扵墨而潰其防也然而㓗志好脩之士不宜如是其少豈亦有所累焉而不能自免歟且夫隂柔之性嗇而耽扵飾牀第之言眤而易以售向非剛士孰能自免于此即有能免扵此而或窺鏬揣空乗其耳目所不覺而隂入之賂幸而覺之又牽扵愛而有濡滯不忍之心徃徃壞名而失志以至扵敗可憐也已故内有采蘋之節則外有素絲之風内有交徧之讁則外有終窶之怨言所自者㣲也雙泉公固㓗志好脩剛而不惑者而宜人之助盖亦多焉雙泉始以諸生㳺學扵白河雙泉産故窶而旅中益無以為資宜人匍匐憔悴以佐朝夕之急然此猶迫扵無可柰何至如雙泉舉進士由兵曹郎歴鎮江淮安兩郡守官尊而俸入多人謂宜人有遭矣而此兩郡又夾江淮之衝漁鹽米榖重装大賈之輳多見可欲以是吏于兹者㓗志好修之士尤少而肥家以去者為多與所謂窺鏬而隂入之賂者亦時時有焉故為吏人妻者不饜扵肥家之公槖則饜扵窺鏬之私賂矣雙泉為此兩郡守其所入既不足以肥其妻子而宜人亦小心奉約束惟謹其苦楚淡泊如在白河時至雙泉解官㱕宜人篋中皆故貧時物也無一增者雙泉為兵曹郎是時奄瑾張甚雙泉以奉法數忤瑾瑾㗸之數使人伺雙泉雙泉扵是日夜留曹中治文書不敢㱕而宜人獨擁戸㸑馬矢買魚肉以餉雙泉而自與諸女奴食脫栗或雜以稷菽有旬日食不肉者瑾伺之數月亦竟無所得及雙泉在鎮江宜人携女奴日徃後圃掘野𬞞而食之雙泉既㢘不受錢又徃徃割俸錢以資過客宜人不謂迂也宜人扵是凡再受封矣至無錢買冠帔而嘗從諸寮婦飲諸寮婦皆冠珠翠冠明璫錦袿釧金纍然宜人既素不能具冠又獨衣故貧時衣以徃逡廵席間諸寮婦以爲苦也更密勸以賂宜人矍然曰若不知吾夫耶且吾安得聞此言諸寮婦因竊嘆笑已而女􅼷有私獻金噐飾者盖乗雙泉所不覺也宜人痛呵絶之曰若不知吾夫耶諸寮婦至是始赧然以賂為耻焉嗚呼使為吏人妻者盡如宜人則安有所謂牀第之言與窺鏬以敗其夫者即有然者使其盡得見宜人之事安知不有赧然耻如諸寮婦者乎此余之所深歎也宜人故長史李勲之女㱕雙泉若干年以卒有子一人而妾所生子二人其女二人則皆出扵妾宜人子獨洪先耳宜人均而字之尤善處嫡妾之間兩妾中其少者柔婉自媚扵宜人宜人愛而撫之其長者故窘宜人然弗為較也第拊心自泣而已亦不以言扵雙泉後雙泉自知而欲督過之宜人曲為救解乃已其或雙泉自以他事督過此兩人宜人曲為救解乃已此在宜人不為竒然亦人所難者宜人既卒洪先以書属余使為之傳余扵交游中雅慕洪先洪先凝重醇慤其志必欲為古人而後止可以觀雙泉與宜人之教也而宜人之事有足係世風者故余掇其一二大者著于篇而又以志余之所感云章孺人傳吕氏有賢母曰章孺人孺人讀書解道理有女士之行孺人之知書也自其父省菴翁翁先世累有顯人家故多書而翁尤好書日誦及六千字為凖日誦不及六千字不寝于書尤好誦五經自漢以來諸家之說五經者皆能通之為文博雅尤工騷選然冲澹不好仕進以布衣終翁無子而有女一人孺人也自㓜受句讀扵翁翁以為能既乃稍進孝經論語大學及史傳所載列女賢人孝弟之事種種能識其大指翁乃慨然而嘆曰惜乎使汝不為女子章氏文獻當在汝矣盖既以喜孺人又若自恚其無子可属然者孺人既㱕扵吕其夫為芝山君某芝山有祖母章與母趙母張皆在而芝山兄弟數人諸姒婦比屋居孺人奉一祖姑事兩姑處諸姒能壹不失其歡祖姑章者孺人同族亦謂為從祖姑者也年髙性嚴諸子孫婦莫能揣意嚮顧意獨在孺人然非以重親故也諸姒數因孺人進飲食問起居章即喜有賔祭宴饋之事章必以命孺人孺人唯唯受命然不敢專必以請扵兩姑退又謀之諸姒以故諸姒欵欵益和兩姑亦喜吾婦之能代事吾姑而章又益恱也孺人與諸姒居欵欵益和然慎重寡言笑即有内事相關渉數語而已或問及書史輙以不能對以為非婦人事也惟見芝山夜讀史間舉省菴所評史一二語以問于是芝山乃知孺人之嘗讀史也至扵訓授諸子書則縷縷竟朝夕其語有外傳所不能詳者孺人之生子洵也後洵既生而不娠者又七年洵又多病力請爲芝山納妾妾始娠孺人緝衣絮具湯沐親自舉兒兒死涕泣累日夜是年而孺人自有娠明年演生又明年泌生而洵病亦愈孺人之生洵與演泌也後洵又病恒愛而憐之然厪厪不爲姑息居常啖兒糈果勿與梁肉即與皆大人餕羞之餘未嘗爲兒烹一雛其所與襦袴皆澣衣爲之不爲製一新繒常曰兒福薄豈勝美衣肉食耶至扵割鮮烹焠之地與里巷謳歌劇戯之事皆閉勿令兒見即隣舎小兒倘蕩無状者戒勿與游狎洵少拂于孺人教㫖孺人視之甚愠然不忍箠撻又不欲聞諸芝山輙自懟爲之對案不食改之刀喜洵稍長知勤苦與兩弟夜讀書課文夜過半孺人即又慮其勞以病也輙令女奴趣就寝或自起滅其燭常謂洵兄弟曰汝先世賢人之裔也余家先人亦世世讀書宦顯余父雖布衣文學誼行伏一時余婦人也又不幸無兄弟先人之業絶扵余父矣兩家文獻在汝豎子可不慎與憶余父且死時汝曹尚㓜乃以先人田廬遺其嗣孫而以所藏圖籍文書卑汝父且謂余曰他日汝子可教教之讀吾書吾死不恨矣汝兄弟志之及洵為諸生嘗就舉弗第孺人慰之曰汝年少學未成爾且余與汝父教汝書固不願汝禄飬也汝能績學修行縱終身不遇如余父可也不然徒茍且富貴即鍾鳴鼎重亦何足道于是洵強學博問以儒有聞而章氏之書乃大行洵居官凛凛有名節其志師古人務䆒扵精㣲而止盖皆自孺人發之余觀前史女子能讀父之書者率載以為美談至扵有家之傳則徃徃以託遺書為重事是以重扵有子而伏姬班姬之属雖能讀父書然終不足以世兩家詩書之澤者其竟以女子故耶孺人奉其父之遺書與其遺言以教而成其子子洵強學飭行傑然以儒自見扵世人且望而慕之曰是得扵章氏之書者爲多是使章翁無子而有子其書無傳而有傳也盖人知孺人之爲賢母而不知乃其所以爲孝也余故爲之傳以著之孺人諱寳浙之新昌人子三人光洵光演光泌光洵舉進士今爲御史俞孺人傳俞孺人者玉山詹君諱某之妻訓導鈿之母也鈿生而孤時孺人年二十有五歲鈿伯兄某始三歳孺人居孀矢節至今凡若干年卒以植二子而觀其成自二子㓜學扵塾每夜㱕讀書輙篝燈火紡績與相對以爲常𬒳服食飲令母得擇所欲母得詈人出惡語言有過輙請扵其舅而呵責之一不爲掩故鈿自童孺時已恂恂若老生後舅氏沒而二子且長矣則使某業農以給而使鈿專業扵儒又縱鈿使日與邑之諸雋㳺處鈿痛自感奮日夜刮淬在諸生中數年以學行推擇超等爲貢士鈿居京師是時四方修行之士若鈿之同郡徐子直成都趙孟静軰相與群居講學鈿恱而從焉恐不得卒聞然世方騖于功利雖薦紳儒生皆不喜若軰說或相指笑以迂濶孺人詢知其子之所與㳺者某人某人而又詢知其所與㳺某人某人者如何人也乃獨心喜焉鈿為人愿而善藏其居衆中退然不見辭色而其介然有所不為既訓導扵常亦闇闇不自標幟時或舉其所聞于先生長者一兩端為諸生論說諸生相與服其行而信其言孺人以鈿之能惠于諸士也則又益喜鈿為訓導幾年諸生某某軰本其教之所自也相率請余為孺人傳余既傳其事而論之曰夫女子非立節之難而立孤之難然世所稱立孤者謂其不墜門戸或能以榮進顯云耳非有能教之以正而成之者也就有能教之以正者顧其為教也止于其母之身其教之所及也止于其子之身而足矣今孺人乃能使其子盡友四方之賢人君子以助乎其教之所不及又能使其子以身為諸士師以廣乎其教之所及盖其所以風世而軌物者逺矣噫嘻此豈婦人女子之所幾也哉葛母傳葛母李姓諱妙賢鳯陽李翁諱泰之女同邑葛翁容菴諱欽之妻貢士澗之母容菴翁豪雋有氣槩㳺扵商賈中能自見其竒嘗上書廵撫言鹽法河渠事利害甚具語在王文恪公所為傳始容菴之賈扵揚也母獨家居奉其舅姑服勤幹蠱兼子與婦之役容菴是以無逺賈之憂而舅姑亦忘其子之不在膝也其故廬災扵火容菴自揚輦石輸木而經理匠事皆属之母其居之成也至今族人聚而居之巳而從容菴徙扵揚則又助容菴構新居其經理視鳯陽時尤勤不踰時而寝堂言言遂如故家至今子姓聚而居之母家扵揚幾十餘年揚之俗呰窳浮麗男子㳺手末作其婦女鮮事織績而習為假髻侈䄂縁履之飾母法尤属意澗澗好聚古書購書數百金以上澗能為古文辭所交多四方名士舘榖饋遺諸費日出母恣之勿問也曰吾夫積金使吾子易以為善今吾散金以成吾子之善也不亦可乎巳而聞湛甘泉先生講道南廱則遣澗徃澗扵是聞體認天理之說未幾構甘泉書院扵揚費且數百金澗請扵母母曰此義事也亟圖之自是書院成而揚之士彬彬多嚮方者母年七十有五而卒其詳載在太僕盛公所為状而盛公又題其旌曰賢貞盖不誣云母五子澗洞澄江漢而澗最知名余亦知澗者扵是澗以傳属余盖余讀鄒東郭先生所為母阡表太息者乆之以謂伊洛先生在當時彼號為衣冠士子群咻衆狺乃不及一女子又謂葛母可方尹氏之母其說云然然余以謂尹母之所以能彰扵世者焞則貽之也伊洛之門其頴敏才辯者幾何人而確實堅苦言行必信能守師法則焞為第一是真能以善飬者而母之訓益因以彰澗所聞扵師者固伊洛語也澗也自是焉益落其華而収其實習其傳而反諸心求其所以為焞者則所以使其母之有傳者固無待扵人而惟盡乎巳而其所以盡乎已者固不在扵聲華辭藝之蔚然者而有在扵克已反躬之闇然者矣故因東郭之論而附著之重刋荆川先生文集卷之十六
