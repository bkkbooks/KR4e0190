front:
  text: 重刋荆川先生文集卷之七
  hash: sha256:a59b83d324262130aeb6bd9da5b0081c6e029a4b2f1e901af14b772eb30c0851
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_007-1a}
body:
  text: 與季彭山僕不慧自少亦嘗有志於治經漢宋諸儒先以解經名家者亦頗􅍱其津焉至於當世諸先輩以治經名家者亦嘗承下風而問之葢乆之而不得其􅀃則又將脫去聞見洗刷此心而獨求之於遺經又乆之而竟未之得也偶游㑹稽獲聞髙論則爽然自失先生之於經關竅開解掐擢膓胃若秦越人之隔垣而洞五藏也剖破傳註專門之學辭鋒􅀁向決古人􅀁未決之疑而開今人􅀁不敢開之口如荆􅀸慷􅁣擊筑睥睨於燕市之中而旁無一人也目論古事又如身揖讓乎虞周禮樂之間憑軾以觀晉楚齊秦鬬爭之域也而聽之者且不自知其忽焉躍然以喜忽焉瞿然以愕而卒果然以飽亦雄矣哉世未之有也雖然願先生益深􅀁養使此心虚壹而靜自􅀁獨然不必盡是也衆􅀁共然不必盡非也却意見以融真機則古聖賢之精將扵是乎在而況其經乎然則六經之道其卒於先生有明也巳僕敢以是少効愛助焉荅姪孫一麐一麐問衞州吁弑其君完倉卒未􅀎悉吾意當時􅆲弑之人必有自見巳之爲是而見君父之甚不是處又必有邪􅀃以階之如􅀁謂邪􅀃作而弑君弑父之禍􅁸者春秋特與辨别題目正其爲弑如州吁弑完一句即曲􅀡便自了然曲直了然即是非便自分暁亂臣賊子其􅀄爲氣􅀁使昧了是非迷了本来君父秉彞之心是以其時惡力甚勁有人一與指􅀧是非中其骨髓則不覺回心一囘心後手脚都輭便自動憚不得葢其眞心如此􅀁謂懼也懼與不懼之間是忠臣孝子亂臣賊子之大機括反復如翻掌大易之􅀁謂辨而春秋之􅀁以震無咎也如善醫者下針中其竅穴則麻痺之人即時便知痛癢春秋一言中却亂臣賊子痛癢處即亂臣賊子便自回心是以􅀎懼然知痛癢者乃其血氣之固然知懼者乃其人心之固然也善醫者特與遇之春秋特與提醒之而巳舊􅀃據春秋􅀁書而言懼吾亦據春秋􅀁書而言懼此無異者但􅃇􅀃以爲亂臣賊子懼于見書而知懼則􅀁懼者旣是有􅀁爲而非眞心且其所懼􅀎及于好名之人而不及于勃然不顧名義之人以爲春秋書其名脅持恐動人而使之懼此又只􅀃得董狐南史之作用而非􅀁以語于聖人撥轉人心之妙用且如其􅀃其􅁦將使亂臣賊子彌􅒌益密以􅏉名而避跡爲害不小此其􅀃􅁸自漢儒宜不待智者而知其謬然千年無有覺其謬者亦無有致疑者何也其悉更待面論善􅀃春秋者無如孟子亂臣賊子懼與春秋天子之事此數句真得聖人微㫖其春秋天子之事一句儒者亦􅀃不通乆矣一麐可􅅧思之面㑹言之春秋一部書無一句不爲亂臣賊子而作非特書弑君三十六條也荅徽州汪子問繼祖母之喪逺道走使詢及繼祖母喪服深知謹禮之意然此在禮經甚分曉本非有疑似相聚訟也只爲不解承重兩字而惑於俗人相􅆓代父爲服之􅀃是以其論紛舛而難通耳承重者禮之􅀁謂受重也如何謂之重謂祭統也古者立主謂之重宗廟謂之重禮曰爲人後者三年解之者曰爲人後者受重於人受重者必以尊服服之也禮曰父卒然後爲祖後者斬解之者曰爲祖後者受重於祖受重者必以尊服服之也爲人後者以旁支後其大宗爲祖後者以嫡孫後其祖雖其本末疏戚不同而其􅀁以必爲之三年者則皆以爲後之故爲後者受重之謂也不獨如是而已禮經固有爲曾祖後云者爲髙祖後云者爲曾祖後者謂若父與祖或以疾廢與先曾祖而死者也爲髙祖後者謂若父與祖與曾祖或以疾廢與先高祖而死者也爲曾祖後則爲曽祖斬爲高祖後則爲髙祖斬若以代父爲􅀃則是父之􅀁齊期者吾代爲之斬父之􅀁齊五月者吾代爲之斬此其本末倒置甚矣又何以爲代乎且爲曾祖斬則謂之代祖也可爲高祖斬則謂之代曾祖也可代父之􅀃又何施乎此其鄙野舛駁絶不可準於經典然世耆儒老生亦往往以此爲􅀃余竟不知其何􅀁􅁸也禮經十七篇中無此􅀃雖漢宋諸儒生論禮者數千家亦絶無此􅀃余竟不知其何􅀁􅁸也禮爲祖後者服斬不言爲祖後者服祖之妻何服非略之也葢發見於爲人後者章中矣曰爲人後者爲􅀁後之妻若子以旁支後其族人猶服其􅀁後之妻若子況以嫡孫後其祖而不以若子之服服其祖之妻者乎由此言之爲其祖加服云者自爲受重也非謂父也爲其祖父加服云者自爲祖也亦非爲父也此祖母也禮曰繼母如母則繼祖母如祖母也爲祖而服其繼祖母豈繫乎父之及見與不及見乎爲祖而服其繼祖母豈論其有出無出乎且謂之繼則是不論其有出與無出而爲之服者固非其􅀁出矣繼母之服不問其有出無出而隆殺之也何獨疑於祖母焉夫有出而加服無出而降服此古􅀁以制媵妾之等然非􅀁以施之於嫡也禮巳之妻嫡子之妻不敢以無出降而況於祖母乎以吾友有好古謹禮之意不敢不悉􅀁聞更與知禮者計之禮後喪有前喪中其服後喪但據後喪始日爲斷不據前䘮滿日爲斷也假而前䘮小祥遇後䘮則兩䘮共服之四年并以白辭宜興諸友爲亡妻舉奠古禮饋奠則從主人而服則從族戚朋友各以疎親輕重自製之是故主人饋奠而族戚朋友助之執事則有之矣在禮未聞有族戚朋友供奠物之文也主人勞族戚朋友以執事則有之矣在禮未聞有主人散麻散縞散絹於族戚朋友之文也今一切反是族戚朋友爲之饋奠是以族戚朋友而代主人之􅀁􅎧盡也主人爲之散麻散縞散絹是以主人而擅族戚朋友之􅀁自僃也此禮不知始何時古􅀁謂野於禮者其此􅀋之謂乎且近世䘮葬日奢日靡富貴人家一日至享數十家之奠自啓殯至葬數日間大牲小牲刳割狼藉且百千計􅀑神情狀與人情不相逺􅀑而無餒􅀁食幾何今若此不惟使生者靡費抑亦使􅂮者不忍且夫放生以資㝠福則儒者􅀁不信殺生以重㝠咎則理未必無是以痛爲亡妻謝此業債族戚朋友則旣相信者多矣而一麟自宜興来乃聞諸友復欲醵金爲奠且殺牲靡費於􅀁有用􅀁必受猶尚不可況施於􅀁必無用􅀁必不敢受其謂之何如諸友以爲情有未盡但至日臨葬此亦足矣即使吾身後諸友亦只湏如是行之但􅀎相體不爲無情也與人論祀鄕賢鄉賢之祀關閭巷萬口公論關國家彰癉大典非勢位可得而干非子孫可得而私若可以勢位干則魯國之祭鄉先生於社者當太牢於三桓而不當太牢於一棲棲伐樹削跡之人矣若子孫可得而私則三桓之有力皆當奉其祖父以從祭於社與祭於大烝矣孔子之作春秋以垂不朽當大書特書弗何叔紇之名於鄭僑呉札之上矣故曰稱足以誄之稱足以謚之此臣子事其君親如事天之心而不敢以一毫之私與焉者也此之謂古道也僕不􅀎自謀而􅀎爲人謀乎草草亮之鄉賢一􅀃大率出於有力子孫遮掩門戸及無恥生員餔啜之計相共成之絶無足爲重輕羅念菴以吉水鄉祠駁雜􅀁祀非􅀋恥其父與之同列欲奉其主以歸此仁人孝子事親如天之心亦事死如生之心也鄕黨自好者生時必不肯與鄕里無賴爲伍死而魂氣有知何獨不然乎旣作荅學中書因澷記其􅀃於後與莫子良主事日夕望吾子良之来淂􅀁􅀉書知㑹在閏月頗以爲慰富生逺来愧無以教之此生曩時讀書爲文皆未嘗入苦心但隨其資性之􅀁近爲之故其語意多淺弱而乏精錬之思今稍稍示以關鍵􅀁在然渠性亦敏終當有悟也至於爲人少年謹愿吾甚愛之亦時示以立志必爲古人之􅀃不知竟􅀎相信否耶幸為轉致意於令岳老先生千里之託不敢負也古人不讀非聖之書以致精也僕之馳騖於博雜也乆矣近稍知向裏自悟溺心滅質之爲病乃欲發憤而刋落之然亦自悔其歲月之晚矣大率讀書以治經明理爲先次則諸史可以僃見古人經綸之跡與自来成敗理亂之幾次則載諸世務可以應世之用者此數者其根本枝葉相輳皆爲有益之書􅀂但可以資文詞者則其爲􅀃固已末矣况好文字與好詩亦正在胸中流出有見者與人自别正不資藉此零星簿子也雖古之以詩文名家者其􅀃亦不過如此況識其大者乎向見子良舟中􅀁􅂝書多非要緊竊以今之世清脩自潔如子良䔍志好學如子良而或不免耗精力於無􅀁用至於􅀁最當㽞意者或且束閣而不暇也以與子良知愛之深乃不敢不盡其愚俟面悟時更有請也承嘉􅁑見惠客中適有一􅁑亦欲奉􅀉投李報李淂無爲笑乎閏月准望一来勿爽勿爽荅茅鹿門知縣来書論文一叚甚善雖然秦中劒閣金陵呉㑹之論僕猶有疑於吾兄之尚以眉髮相山川而未以精神相山川也若以睂􅄠相則謂劒閣之不如秦中而金陵呉㑹之不如劒閣可也若以精神相則宇宙間靈秀清㳤環傑之氣固有秦中􅀁不􅀎盡而發之劒閣劒閣􅀁不􅀎盡而發之金陵呉㑹金陵呉㑹亦不􅀎盡而發之遐陋僻絶之鄕至於舉天下之形勝亦不􅀎盡而卒歸之於造化者有之矣故曰有肉眼有法眼有道眼語山川者於秦中劒閣金陵呉㑹苟未嘗探竒窮險一一歷過而淂其逶迤曲折之詳則猶未有淂於肉眼也而況於法眼道眼者乎願兄且試從金陵呉㑹一一而渉厯之當有無限好處無限好處耳雖然懼兄且以我呉人而呉語也二熟觀鹿門之文及鹿門與人論文之書門庭路徑與鄙意殊有契合雖中間小小異同異日當自融釋不待喋喋也至如鹿門􅀁疑於我本是欲工文字之人而不語人以求工文字者此則有􅀃鹿門􅀁見於吾者殆故吾也而未嘗見夫槁形􅁅心之吾乎吾豈欺鹿門者哉其不語人以求工文字者非謂一切抺摋以文字絶不足爲也葢謂學者先務有源委本末之别耳文莫猶人躬行未得此一叚公案姑不敢論只就文章家論之雖其繩墨布置竒正轉摺自有專門師法至於中一叚精神命脉骨髓則非洗滌心源獨立物表具今古隻眼者不足以與此今有兩人其一人心地超然􅀁謂具千古隻眼人也即使未嘗操紙筆呻吟學爲文章但直據胸臆信手寫出如寫家書雖或疎鹵然絶無烟火酸餡習氣便是宇宙間一様絕好文字其一人猶然塵中人也雖其專專學爲文章其於􅀁謂繩墨布置則盡是矣然畨来覆去不過是這幾句婆子舌頭語索其􅀁謂眞精神與千古不可磨滅之見絶無有也則文雖工而不免爲下格此文章本色也即如以詩爲諭陶彭澤未嘗較聲律雕句文但信手寫出便是宇宙間第一等好詩何則其本色髙也自有詩以来其較聲律雕句文用心最苦而立􅀃最嚴者無如沈約苦却一生精力使人讀其詩秖見其綑縛齷齪滿卷累牘竟不曾道出一兩句好話何則其本色卑也本色卑文不􅀎工也而况非其本色者哉且夫兩漢而下文之不如古者豈其􅀁謂繩墨轉折之精之不盡如哉秦漢以前儒家者有儒家本色至如老莊家有老莊本色縱横家有縱横本色名家墨家隂陽家皆有本色雖其爲術也駁而莫不皆有一叚千古不可磨㓕之見是以老家必不肯勦儒家之􅀃縱橫必不肯借墨家之談各自其本色而鳴之爲言其􅀁言者其本色也是以精光注焉而其言遂不泯於世唐宋而下文人莫不語性命談治道滿紙炫然一切自託於儒家然非其涵養畜聚之素非真有一叚千古不可磨滅之見而影響勦􅀃葢頭竊尾如貧人借富人之衣莊農作大賈之飾極力裝做醜態盡露是以精光枵焉而其言遂不乆湮廢然則秦漢而上雖其老墨名法雜家之􅀃而猶傳今諸子之書是也唐宋而下雖其一切語性命談治道之􅀃而亦不傳歐陽永􅅩􅀁見唐四庫書目百不存一焉者是也後之文人欲以立言爲不朽計者可以知􅀁用心矣然則吾之不語人以求工文字者乃其語人以求工文字者也鹿門其可以信我矣雖然吾稿形而灰心焉乆矣而又敢與知文乎今復縱言至此吾過矣吾過矣此後鹿門更見我之文其謂我之求工於文者耶非求工於文者耶鹿門當自知我矣一笑鹿門東歸後正欲待使節西上時得一面晤傾倒十年衷曲乃乗夜過此不已急乎僕三年積下二十餘篇文字債許諾在前不可負約欲待秋冬間病體稍蘇一切塗抹更不敢計較工拙只是了債此後便得燒却毛頴碎却端溪兀然作一不識字人矣而鹿門之文方將日進而與古人爲徒未艾也異日吾倘得而觀之老耄尚􅀎識其用意處否耶并附一笑與洪方洲書令弟過此不􅀎相値有負兄命罪罪書中􅀁言舉業三十餘字法則平生無此活套葢傳者誤也讀兄􅀁􅀉如祭侯侍郞等諸文及諸詩皆雄􅅧有力勝扵舊作足徵多蓄之効至送鹿園文字雖傍理路終似蹈襲與自得處頗無交渉葢文章稍不自胸中流出雖􅀂不用别人一字一句只是别人字句差處只是别人的差是處只是别人的是也若皆自胸中流出則鑪錘在我金鐵盡鎔雖用他人字句亦是自已字句如四書中引書引詩之􅀋是也願兄且將理要文字權且放下以待完養神明將向來聞見一切掃抺胸中不留一字以待自已真見露出則横􅀃竪􅀃更無依傍亦更無走作也何如何如向曾作一書與鹿門論文字工拙在心源之􅀃兄曾見之否鄙人無意於文數年矣旣非才􅀁素長又非性􅀁素好獨吾兄謬嘗以爲可然僕自知其不可也向来諸人􅀁託不終􅀁事如借債不還錢無􅀁逃之然毎一奮筆如策跛驢耕石田轉覺苦澀復爾罷去念債限乆滿又無利息何時是了以是蹶然强作數篇雖稍有可意處只是庸淺以非精神􅀁注也然不敢不以呈於吾兄與鹿門也然僕以非素􅀁長之才而又當夜氣之惰兩君以才􅀁素長又當朝氣之銳苟見吾文當相與一噱而後信吾自知之不妄也此後尚有文債二十餘篇若便了此則四十餘年業障一時頓銷昔禪師不受隔宿之約病夫此後更不受文字約矣旣不自耕又不讀書爲文又不敎書又以病不􅀎行慶弔應人事自奉侍老親及與家庭子弟談􅀃閒話之外悄然更無一事若不喚作一閒道人便當作一疣贅廢物矣可爲快然倘天與樗年得至五六十外此時于本根稍有一二見處或當寫出數百字以記余之拙若自量一無􅀁見則不敢更煩毛頴公也文章之柄寔在兄輩朂之朂之承抄道書倘得一二語開明此心即兄之教但其中多浪漫如緊要語絶少此後不必重煩吏人可且輟之至如丘長春語録馬丹陽語録人云别有刻本或于藏經中檢出則願兄爲留意也又近来覺得詩文一事只是􅀡寫胸臆如諺語􅀁謂開口見喉嚨者使後人讀之如真見其面目瑜瑕俱不容掩􅀁謂本色此爲上乗文字揚子雲閃縮譎怪欲􅀃不􅀃不􅀃又􅀃此最下者其心術亦略可知眉山子極有見不知韓子荆國何取焉近来作家如吹畫壷小兒􅀁吹泥鼓俗謂之畫壺糊糊塗塗不知何調又如村屠割肉一片皮毛斯益下矣試質之兄其有㑹焉否與王遵巖叅政不會兄於武夷終是此生不了心事三年之間定當發興耳近来有一僻見以爲三代以下之文未有如南豐三代以下之詩未有如康節者然文莫如南豐則兄知之矣詩莫如康節則雖兄亦且大笑此非迂頭巾論道之􅀃葢以爲詩思精妙語奇格髙誠未見有如康節者知康節詩者莫如白沙翁其言曰子美詩之聖堯夫更别傳後来操翰者二妙罕􅀎兼此猶是二影子之見康節以鍜煉入平淡亦可謂語不驚人死不休者矣何待兼子美而後爲工哉古今詩庶幾康節者獨寒山靜節二老翁耳亦未見如康節之工也兄如以此言爲癡迂則吾近来事事癡迂大率􅀋此耳兄嘗謂非兄不􅀎序吾之文非吾不􅀎序兄之文誠然誠然仙道偪人筆墨乆廢然於兄終當果此約勿以乆近拘之也與楊朋石祠祭向獲奉光儀􅅧知任道之器更欲退處􅄫寞以深􅀁養尤見髙志後世學問􅀁以小成者皆由積之不厚而輕用之也此舉切爲執事願之􅀁示諸文皆清新紆徐有作者之意宜更渾雄以畜之昌博以發之則古調可幾也僕迂陋非知文者文詞之技亦未敢爲君子稱述聊一道之耳曾文奉覽􅀁索鄙人近作因適􅀉至洪方洲􅀁容取回􅀉上請教也與萬思節主事承示途中遇險及當局冷眼之􅀃足知新功甚慰甚慰􅀬處冷得絶勝冷處冷得然險處惶惑原是易處錯過不曾做得工夫也易論學毎以渉川爲􅀃故曰作易者其有憂患乎􅀁謂終身之憂也吾友閒居少過却是不曾抖擻提醒精神吾固預憂吾友渉川之難今吾友自知之矣自此緊着功夫常常從危處操心常如與天呉河伯對壘毀譽利害諸關悉與照破即世間一切大川何􅀁不利渉也先輩云聖人於困險中有至樂於安平中却是有至憂然哉吾毎欲與大洲兄相㑹乃欲相與證明絶學非曆數之謂也然曆數自郭氏以来亦成三百餘年絶學矣國􅀄搜得一元統僅􅀎於守敬下乗中下得幾句註脚監中二百餘年拱手推譲以爲曆祖吾向来病劇中於此術偶有一悟頗謂神解而自笑其爲屠龍之技無􅀁用之亦嘆世無可語者近淂来書乃知復有透曉如大洲者在也一快一快但不知大洲􅀁謂透暁而曆官􅀁不解者何􅀁指耶豈􅀁謂曆理者七政盈縮遲疾之􅀁以然如元史􅀁載王恂李謙曆議及縁􅇂氏革象書之􅀋􅍦􅀎洞其精微是曆官秖知其數而吾輩獨􅀎明其理遂指此爲透曉而曆官􅀁不解者耶葢昔者太史造曆旣已測定日躔盈縮月離遲疾去極逺近渾淪得一天體在胸膈中而欲傳之形器之間以爲曆夲則是以數寸算子握住萬古宇宙轉運葢甚難下手此子長􅀁謂太􅀄曆旣巳測候而姓與都等不􅀎爲算之時也古曆大衍爲精一行和尚藏却金針世徒傳其鴛鴦譜耳于是守敬獨淂一法曰弧矢圜算如􅀁謂横弧矢立弧矢赤道變爲黄道黃道變爲白道者最爲圓機活法自此黃赤白三道之畸零可齊而氣朔之差可定此法不惟儒生不暁而三百年来曆官亦盡不暁矣今監中有一書頗秘名曰曆源者郭氏作法根本􅀁謂弧矢圜術頗在焉試問之曆官亦樂家一啞鐘耳豈大洲􅀁謂透暁而曆官所不暁者葢謂此耶若􅀁指如前􅀃雖極精微幽􅆌猶是儒生套子􅀁指如後􅀃雖若九九綴術乃是實得也煩問之大洲求一轉語見示當更有請教夫六藝之學昔人以爲數可陳而義難知在今日曆家却是義可知而數難陳葢得其數而不通其義者有之矣􅀂謂得其理而不得其數則施之實用旣無下手處而并其􅀁謂義者亦脫空影響非真際也雖然今曆家自謂得其數矣今曆家相傳之數如曆經立成通軌云云者郭氏之下乗也死數也弧矢圜術云云者郭氏之上乗也活數也死數言語文字也活數非言語文字也淂其活數雖掀翻一部曆經不留一字盡創新法亦可以不失郭氏之意得其死數則挨牆傍壁轉身一歩倒矣夫知曆理又知曆數此吾之􅀁以與儒生異也知死數又知活數此吾之􅀁以與曆官異也理與數非二也數者理之實致用處也活數死數非二也死數者活數之􅀁􅀉也近見一二儒者亦有意象數之學然不得其傳則往往以儒者範圍天地之虚談而欲葢過疇人布算積分之實用不知豈便吃爾葢過了也後世儒生􅀁論六藝往往而然不特曆也大洲其於吾言有合耶否也揚子雲曰通天地人曰儒通天地而不通人曰伎通乎天地之曆數而未必通乎身心之曆數者又一行守敬輩之􅀁以爲蔽也今未暇論也雖然􅀁欲請教於大洲者其大者百未一舉也而輒瑣瑣及此毋乃以我不知務乎縱言至此一笑吾友欲吾舉曆家一二緊要語與大洲印證如歩日躔中盈初縮末限用立差三十一平差二萬四千六百此死數也又如歩月離中用初末限度一十四度六十六分此死數也曆家知據此死數布算而已試求其􅀁以爲平差立差之原與十四度六十六分之數從恁處􅁸則知活數矣似此只舉一兩件更不費辭也活數者如揲蓍求卦之初參伍錯縱而隂陽未分者也死數者如卦畫巳成之後爲九爲六而隂陽旣定者也又來書謂趙大洲主測候吾主布算此􅀃未之盡也布算未有不始於測侯測候未有不􅀉之布算而可以造曆者兩者相須如足與目但測候之法元史􅀁載簡仰二儀今疇人子弟亦稍􅀎用之而學士大夫亦有曉者及趙縁􅇂革象書測經度測緯度之法尤更分曉吾是以略而不言且吾前書􅀁引史記曆書中語太初曆旣已測定而姓與都等不􅀎爲算自古造曆亦毎病布算之難此一行守敬􅀁以獨擅專長司馬公是星曆專家其史記曆書是􅀃自家屋裏􅀃話細讀其敘作太初曆始末其意可識也雖然使人皆輸班自可以目定方圓而不必規矩使人皆羲和自可隨時測候而不必布算以成曆故布算以成曆者令後可繼也此堯典中亦自了了其暘谷四叚則測候也其閏月成歲數語則布算虚盈以造曆也但古文簡約不詳今渾天儀象自漢相傳以爲羲和之遺則測候之器尚在而布算之法獨不傳竊意其法若傳比之一行守敬當更簡易密緻葢古人心學精微圍範天地與後世術家自别今􅀁傳周髀經託之周公雖真贗不可知豈亦有羲和布算之遺乎而後世暁了者亦少矣與顧箬溪奉違忽忽三年辱遣使致手教又復兩年而音問乆疎於門下時抱耿耿伏惟明公山林髙卧之日長而道義之樂益真聲利喧囂之境逺而塵俗之縁盡解邇来胸次可想而知但不知充閭之兆今更何如耳某閒居多暇亦時留意於數藝將向􅀁聞之左右者時爲紬繹其於古人象數之精意雖或有齟齬難通處亦多有欣然意㑹處其意㑹處旣恨不得即與明公相印證其齟齬處又恨不得就明公而爲發蒙解縛也竊以六藝之學皆先王􅀁以寓精神心術之妙非特以資實用而已傳曰其數可陳也其義難知也顧得其數而昧於其義則九九之技小道泥於致逺是曲藝之􅀁以藝成而下也即其數而窮其義則參伍錯綜之用可以成變化而行􅀑神是儒者之􅀁以游於藝也游於藝則藝也者即􅀁謂德成而上也顧先王六藝之敎旣寢而算書之傳於世往往出於曲藝之士之􅀁爲是以其數存而其義隱矣而藝士之著書者又往往以秘其機爲奇􅀁謂立天元如一云爾積求之云爾者澷不省爲何語其意葢惟恐緘縢之不密而金針之或􅂥也是以其數雖存而數之􅀁以爲數者亦隱矣伏惟明公以當世􅂄儒玩心神明之學而出其緒餘扵藝數間明公之於數葢古􅀁謂進乎技而入於道以神遇而不以器求者也且小子辱不勌之教乆矣是以敢更有請焉謹具如别􅁓二易云形而上者謂之道形而下者謂之器聖人雖是爲性命眞機發此兩語其實百氏技術理數諸家之學精微緊要處悉在此矣􅀼􅀚明公演出測圓海鏡書自非明公細心絶識洞極神明之奥則不􅀎剖破此混沌也敬服敬服然鄙見竊以爲此書形下之數太詳而形上之義或略使觀之者尚不免有數可陳而義難知及示人以鴛鴦枕而不度與人以金針之疑僕意欲明公於緊要處提掇一二作法源頭出来使後世爲數學者識其大者得其義識其小者得其數則此書尤更覺精采耳何如何如承以序文見屬僕於數學稍有一二窺測皆是明公指授此委豈敢以不文爲辭但因乆病早衰近年稍從事於槁形灰心究意道家之􅀃是以文墨之事乆成廢閣雖然明公之託不論遲早終當有以相復也郭太史曆數冠絶古今然其作法孔竅亦只有兩事其歩日躔源頭在截矢求弦一法僕旣作爲弧矢論以請於明公而明公亦旣演之爲書矣其歩月離源頭則在容弧􅀡濶一法今亦偶然㑹意而得之并書其􅀃以請葢三百餘年絶學洞然明白即使郭太史復生亦自無躱閃處可爲古今一快僕豈敢謂有神解惟明公指授之力爲多也幸更覽而教之與卜益泉知縣僕支離床席巳成廢人乆不􅀎一奉晤言殊深耿耿近敝邑一刻字人云執事欲刻鄙言雖或傳言之妄然聞之殊不自安葢執事與善之過雖淺陋言語猶不欲遺之此在執事則爲盛心然本非立言之人而徒爲覆瓿之用此在鄙人則甚可媿且今世􅀁謂文集者徧滿世間不爲少矣其實一字無用彼其􅀄作者莫不妄意於不朽之圖而適足以自彰其陋以取誚於觀者徒􅀁謂木災而巳僕毎爲彼愧之而復自効尤之乎昔人論文章家惟見理明而用功深者乃􅀎得之此未易言也況僕平生本無立言以求不朽之意偶少年時隨一二友人强習世間綺語以才力滯鈍兼復懶病加以疎拙於身心而欲求工於筆札竟不􅀎工而罷閒中偶觀舊稿一二篇支離不經之言滿􅁓而是盡欲焚燒爲快又自悔向来錯用心力而一無􅀁成也若欲以此傳於人人則旣以自誤又復誤人且昔人云人短於自見僕自知猶然人又將謂之何執事苟以爲可而欲傳之是有累於執事之明苟不擇其可否而欲傳之是有傷於執事隱惡之義也承執事知愛敢布腹心萬望中止其事則執事之愛我更厚矣荅華補菴鄙人不敢刻文心事具見於􅀁與王南江書及與令壻安子介言之巳詳執事諒我此心乆矣而益泉大尹忽爲此迂濶之舉昨有書道心事於益泉如石沉水竟不見荅鄙人罪謫之餘也傳曰身隱矣焉用文之罪謫之人自合閉門杜口豈宜以文章自名又豈宜大書刻木以標榜於世且所謂罪謫之人者其於當世尤最得罪於勢要有力之輩而益泉爲之刋刻文字是昭其與罪人比而與􅀔要有力之輩異其好惡也豈惟非僕之福其爲貽累益泉亦甚矣平生本不􅀎爲文此心自知而一二相知偶以爲可虚聲􅀁集衆謗遂歸誠以文者豪士之􅀁兢而名者造物之最忌譬如支離侏儒之人本無拳勇不􅀎格鬬偶爾嬉戲冽首揺目舞腕曵脚而里人不解事者見其槃旋之影從而恱之恱而􅅄之以爲有拳法而道之於人至使當世拳師打手疑其鬭巳叢􅁸而譁之不知彼固支離侏儒人耳且彼固自知支離侏儒人也何嘗自謂有拳法其亦何心與人鬭勝負哉奬者逐影疑者附聲世俗可笑大率然也僕之得名與淂謗何以異此雖其疇昔知厚之人猶或不免睽目相猜怒僕自度本無可致猜怒於其人者秪以不合簸弄筆舌及不合盜虚名之故耳邇来深自悔其少時􅂐刻之技經年束書閣筆絶口不敢道文字以自附於村野不識字人而後爲快如佅儒矯前日嬉戲惹事之過手腕亦不一出袖口自謂庶幾免矣柳子厚云豈可使呶呶者復入吾耳而益泉乃方爲之刋刻行世以竪拳法之赤幟而滋拳師打手之疑譁旣與僕私心相戾其於益泉亦何益焉僕之私心尤有􅀁不可者平生􅀁與交游書札率如戸外二屨密相規告之言今乃大書刻木以翹人之過而彰已之訐直豈惟心􅀁不安其何以􅌤然與友人相視乎雖友人素多善􅀋不以受盡言爲諱然在僕則不可也内量之巳外量之人量之人者此書盡之量之已者與南江書及前與益泉書備矣量巳量人無一而可因知益泉之必相諒也荅蔡可泉别乆不勝懷念毎于士大夫往来間得聞兄政聲善譽爲慰僕自正月冒病今尚在牀也二月三月之間頻于死者三四巳分與世長别今漸有生意然精神則益耗矣葢外腎癰瘍痛楚不堪之故也来書􅀁示刻文一節正以此事爲錫尹卜君􅀁苦極費口舌近忽淂遵巖兄書又道及紀山刻文之􅀃方輾轉無可奈何欲託洪方洲百方止之而来使適至是造物者亮我之衷而賜之便也知我莫如兄豈待多言固知此事之必廢罷矣僕不才豈敢以文字市聲名於世者哉山澤迂僻之性毎閒静中得一適意形骸之外則覺此身亦是贅痝而虚名果是羶氣不􅀎早自晦匿使野人姓名尚有聞于世間以爲此身之累不及古之織簾箍筩之流使人不得知其姓名者毎自笑前生業障之厚也其又敢以文字市聲名于世也哉即使欲以文字市聲名于世亦其文之最工者而後可自古文人雖其立脚淺淺然各自有一叚精光不可磨滅開口道得幾句千古􅀃不出的􅀃話是以􅀎與世長乆惟其精神亦盡于言語文字之間而不暇乎其他是以謂之文人僕不􅀎爲文而􅀎知文毎觀古人之文退而自觀鄙文未嘗不啞然笑也半生簸弄筆舌只是幾句老婆舌頭語不知前人􅀃了幾徧有何新得可以闡理道而裨世敎者哉此皆肝膈之論非苟爲謙讓以欺兄者愛我如兄如曹君雖欲使吾文不朽吾文其􅀎不朽乎否也兄試觀世間糊牕櫺塞瓶甕塵灰朽腐滿牆壁間何處不是近時人文集有誰閒眼睛與之披閱若此者可謂之不朽否耶本無精光遂爾銷歇理固宜然設使其人早知分量將幾塊木板㽞却柴燒了豈不省事可笑可笑兄書中有發明性眞開示来學之􅀃僕又非其人也且􅀁以發性眞而示来學固絶不在言語文字間行已多缺而強飾之于言語文字此性眞􅀁以益鑿而先輩之􅀁以誤後學而眯其目者也僕自三十時讀程氏書有云自古學文鮮有􅀎至于道者心一局于此又安􅀎與天地同其大也則已愕然有省欲自割而未􅀎年近四十覺身心之鹵莽而精力之日短則􅁣然自悔捐書燒筆于靜坐中求之稍稍見古人塗轍可循處庶幾􅀘過桑榆不盡枉過此生居常毎自笑不􅀎敝却精力以求文之工然竊幸其文之不工而稍蓄餘力亦尚可以他爲也是以語及文字輒茫如隔世事或不淂已應酬一二篇亦信意打抹真􅀁謂老頭巾矣以少年欲求工于文而文猶未工況于今日意興若此則宜益淺陋無怪也不識曹君何取乎今曹君巳去此事行止皆在兄手相知如兄而復不􅀎信我此心必欲爲此業障以増牆壁間之一塵而後爲了事則與兄二十年之交便可告絶矣寫録多􅀃誠如兄言嘗欲稍改差字留一正本藏之于家又自以爲本無足關係于世訛不訛不論也且捐書燒筆亦巳多年旣無正本又無新稿誠無可以應兄命者奈何至如遵巖之文則必不可以僕爲比遵巖以絶世之資又用力專而且深故其文雄渾雅奥自北宋而後數百年間特然傑出以名其家􅀁謂􅀎不朽者也惟單刻此集足爲文章家指南而一洗近世文妖之􅁦正不必以吾疎庸之文溷之也尊翁老先生表文原有今春之約平生不敢與人不信而況敢不信于吾兄乎但自正月到今圖死不暇是以未􅀎執筆倘病體復得爲完人必于今年􅀉奉也與吕通竹嶼書執事佐郡六年清苦直方之節衆共知之而山人之知之也獨深執事亦謂山人臭味之相同也日夕􅀁以拳拳于山人者亦深且厚今執事行有日矣山人非仁人也不􅀎贈執事以言山人貧也不􅀎贈執事以財而繾綣之情不􅀎自巳聊具鹿靴一􅀟奉將别意靴者履也易不云乎素履之往獨行願也伏望執事率其素履獨行􅀁願不以夷險二其心不以終始渝其度用于世則爲羔羊素絲之風不用于世則勵蔬食飲水之志履道坦坦爲天地間一完人此其􅀁得較之壞名毁節以苟一時之富貴者雖在􅀸相知執事必不以彼易此矣山人敢以致愛助之意與安子介書謹具布被一端奉爲令愛送嫁之需布被誠至質且陋矣然以之而厠于刺繡結繪綾綺綃金綴翠玄朱錯陳之間則如葦簫土鼓而與朱絃玉磬金鐘大鏞相答響乃更足以成文又如貴介公子張筵邀客珠履貂冠狐裘豹褎聯翩雜座旣美且都而有一山澤被褐老人逍遥曵杖其間乃更足以粧􅀧風景而不失其爲質且陋也且夫桓少君之事兄之􅀁以養成閨行而出乎習俗之外者豈足多讓古人哉素辱知愛敢以家之􅀁常用者爲獻而侑之以辭不然亦願兄受之而以􅂌之媵僕之用可也與白伯倫主事曩與先公獲承聯佩之交遂􅀩解帶之惠顧向也忝趨朝於弱冠人巳訝其垂帶悸􅀆今也甘丘壑於衰年吾誠自知不稱其帶對塵匣而嘆仰思故人不衣冠而處俯慙身世若以自珍則秖爲韞匵而藏若以相奉則可謂不失舊物且吾子春􅀸濟美已是世官而君家通天滿篋豈無遺帶雖然受之於白氏之春􅀸而還之於白氏之春􅀸則是良􅃓之楚失而楚淂也以此旣贈人之帶而儷彼􅀁傳家之帶則是靈劒之􅀟離而􅀟合也況吾與子以通家之乆契辱道誼之新知則是帶也非特表屢世往還之情亦以著古人韋弦之義竊願吾子視􅀁不下兩如見乎父師束以立朝一矢心於忠孝與萬思節僉事萬子思節官江西而余適與之偕至廣信贈小甆瓶四枚爲别萬子職當外巡饒信饒公私甆器􅀁出外巡蒞焉而余乃以此爲贈可謂擔水河頭賣矣雖然古有宰端溪不持一硯者吾將贈硯于端溪宰可也萬子葢亦其人哉若蒞饒則有甆器蒞湖則有丹砂雌黃蒞廣則有名香珎藥此士大夫以爲家嘗茶飯官箴之􅀁不責而勵志之士之􅀁愼也豈惟官箴之􅀁不責世之髙明持達者聞此等言語亦以爲瑣屑而迂濶矣白沙先生曰人須有鳳凰翔于千仞之氣要自至麤至微者而充之萬子素不吾迂也故吾言云耳與董后峯主事曩時横山忍􅂮之託賴吾執事週旋其間僕用是激于公義不敢違命鄙人獲締姻好我執事寔然是執事之􅀎惠顧于王氏也今王氏孱然一綫之緒有甚于橫山忍􅂮之時而令姨􅇻勤之情豈異于横山忍􅂮之託也僕不自揣竊敢以僕之􅀁自爲者望之執事以執事髙誼豈以曩時􅀁以教僕者今日肯以身自讓之乎執事若不忘先大夫人姊妹之好照臨王氏而許之一言是執事之􅀎曲庇王氏也而僕之􅀁不􅀎終事于王氏者其亦可以無憾矣惟執事亮之與洪方洲主事申􅀸過常時吾不及與㑹偶游蘇州見其以就醫在焉此友病􅀔已亟多是􅀑迫促人矣僕毎見吾兄言申􅀸爲泉郡第一等勵行有廉恥之士令人對之愴然傷懷有人百其身之感且其囊篋將空問之止有銀五兩彼云歸資尚不足謝醫買樂一無􅀁處僕探囊中得銀五錢送之且勸之往鎮江就醫與方洲相聞彼云歸心急不􅀎北矣余曰南路有鄉里士夫乎彼云素寡交游余曰劉松江非君鄕里乎彼曰亦同年也余曰往依焉何如彼殊有難色曰素亦不甚相知余諭之曰此時尚守區區之孤介乎􅅏淂身子在宇宙間尚有許多好事可爲寧守區區之孤介乎慰諭再三始以余言爲然時門生蔡舉人同在坐僕與蔡生私語曰申􅀸極顚沛中亦不肯妄干人可見其平生也余是時作一書託富副使轉通之劉松江又不知劉君義氣何如耳特此遣人告吾兄兄可割俸銀一二兩并謀之同鄉士夫在南都有義氣者或得銀五六兩急遣衙門一的當人齎至松江與申􅀸若救淂此人一命使彼得以餘生更弩力做好人是宇宙間公共事倘遂不幸亦可使客途免於溝壑而已或南都無可處則兄更作一書并託之劉松江彼亦無難處者此事須速不然則挽西江以救涸轍也與雷古和提學執事仗節秉義當世之至不可干以私者也僕平生頗知守區區之孤介未嘗敢干人以私者也以平生不敢干人以私之人而輒干之於必不可干以私之上官而又未嘗有一面之識也雖愚者亦知其足以觸罪而無􅀁淂矣而僕乃不揣冒爲之則其情亦可察矣故河南提學陳后岡束者鄙人生􅂮之交也念其生􅂮之交而欲爲之庇其後此鄙人之私也陳君自束髪即知苦學砥節其爲翰林不肯諂屈於權貴人遂爲奸䜛􅀁中而權貴人斥之外藩繼以天殁今其棺槥浮􅀉客土歷十餘年而不􅀎葬以四十餘歲之病妻撫十六七歲之弱子兩口一家僮僕無􅀝伶仃牢落行道􅀁悲陳君厯官十四五年未嘗有百金之產止靠死後數百兩賻金僕不淂已爲之經營而歲還之息妻子生計如是而已且夫憫其以砥節遭蹇而欲爲之庇其後此亦觀風者之責而天下之公也今其子漸􅀎讀父書或厠之學校之中則庶可以不墜先人之業以僕愚昧豈不知奔競進學浙中風俗之大蠧而執事之􅀁最禁哉以爲好脩砥節陳君旣是善􅀋而士大夫妻子流落又未有如陳君者倘執事􅀎處其子於常格之外秪足以爲志士畸人之勸而不足以爲請囑貪兢之援例也此僕􅀁以不敢干之他人而必干之執事以爲執事􅀎􅀡道於炙手炎炎之軰必􅀎垂憐於清寒牢落之家􅀎必不爲世俗人之􅀁爲必􅀎爲世俗之􅀁不爲也知我罪我惟執事教之荆川文集卷之七
