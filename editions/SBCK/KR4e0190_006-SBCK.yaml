front:
  text: 重刋荆川先生文集卷之六
  hash: sha256:081255eed0e50a88bfb99827c6dcefad5b52e8be4d43167daea57f2c218df7ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_006-1a}
body:
  text: 荅馮午山提學自聞文旌再臨在多士深幸於得師在僕輩深幸於得朋而又深以山林之蹤不􅀎即時就見相與論證爲恨也讀来示志未堅貞學無透悟令人蹶然有感然即此數言足以知吾丈堅貞之志矣大率此學惟真根子最是緊要􅀁謂有基方築室也若是真根子則􅀄間雖是用工甚鈍乆之必自透悟若不是真根子則其下者樹門面髙者騖意見雖自謂頓悟竟成捕影即其意見􅀁究雖自謂已超無欲界然頭出頭沒此身竟不離欲界中葢雖髙眀之士亦往往而然矣皆是其初入頭根子有未真處􅀁差只在毫釐間是以志必論真志功必論實功葢爲自身痛痒不爲別人一切世間好看可抹摋盡也伏聞吾丈家居數年濳脩精進令僕輩聞風益羨慕之草茆如僕者年迫四十齒髮漸衰自念此身竟未有安頓處正坐其初入頭元不是真根子若不以此時痛自懲創倂歸一路重立樹根基則後来恐無日矣甚懼甚懼奈何吾丈又諭及東南士習此吾丈一體之心亦吾丈一體之責也嗟乎東南士習之壞也乆矣近年以来其壞者竟不可返而其山鄉僻邑頗號馴朴者亦漸澆訛如僕輩雖念此痛痒相關不􅀎無憫時病俗之意嗟乎亦安􅀎以一簣障江河也哉葢其紛華之誘已􅅧而其獧巧機利之習鼓煽又甚其植根也甚固其返之也實難韓退之􅀁謂非百年必世不可得而變也非知命不惑不可得而改也惟吾丈以自家真根子興􅁸衆人真根子於政令􅀁施章善癉惡明示好惡不遺餘力不責近効不狥人情不爲文飾庶幾有一番變動耳如僕輩只求作一自了漢足矣人情進學一節本非大事但近年以来士夫以此請囑罔利後生以此奔兢忘恥風俗不美此其一端願吾丈始終杜塞此門葢因吾丈昔􅀁巳行之美而􅀼敢贊於始終者也與王北涯蘇州曩中秋玄都對月坐覺此心灑然別来時時興懷顧清風朙月未始不常在宇宙間特人心不􅀎常似此灑然耳兄試驗之簿書坌冗之時爲是一箇光景爲是兩箇光景也適承来教深知志士之懷夫易而易知簡而易􅀎者道也愚夫愚婦與知與􅀎而聰明才智之士乃終身役役竭其心思而竟不可冀于有聞者此有􅀃矣非特聲色貨利之􅀎爲心累而種種聰明種種才技種種功業皆足以漏􅂥精神而障入道之路自非痛與刋落絶利一原則非􅀁以語七年之病而求三年之艾也程子曰今之學者無可添只有减减盡便無事試舉似于兄以爲何如二兄之不言而飲人以和毎一見則眷眷不􅀎别去旣别去則忽忽若有􅀁失而若將繼見之者辱來教知兄之念我則亦然也四明陳約之自同第時便爲肺腑之交後在郎署間無歳日不與之同亦有白首同歸之約不謂此兄便爾長逝心切痛之此兄心事峻潔惜世人知之少其志􅀁欲樹立于世又以早􅂮不及自見獨生􅊭喜爲詩其用心甚苦亦以早􅂮不及究意以與古人作者爲徒也故其􅀁可存者僅此若干首而巳吾兄雅意憐才欲爲入椊嗟乎死者有知其亦可以無恨于埋沒矣乎更欲得兄一言冠諸其首則斯文終當賴兄以長價也僕亦謹拜兄之賜矣約之尚有文字一卷俟更查出􅀉上西原乃兄物故則其遺稿未及流傳人間者當益零落奈何西原集序文俟少從容須興到乃作之今未􅀎也世事日新江湖之憂殊不可言何日更與兄一面談也然湛泉得此結裹不失爲好男子矣三請教之私積于隔歲㑹使節不在郡中我懷耿耿遂往候荘渠先生之疾不謂此翁􅂢館三日矣感􅁣平生可勝悲怛至於殄瘁之嘑則海内志士之􅀁同也去年失一涇野今年失一莊渠海内若而人者有幾生成之難而凋謝之易若此悲哉悲哉其家以遺言見示敢奉兄覽􅀼惟吾兄以正􅀡自持人或以爲落落而宦跡􅀁至則西原莊渠兩公獨爲相知兩公立心操行卓然共爲一世偉人其􅂮而無後亦復相同西原之􅂮也吾兄爲之悉力經紀其後事有如骨肉是以同志中皆推吾兄之髙誼今之􅀁以處莊渠者豈異西原哉聞之其家此翁且􅂮亦自欲以後事面託之兄然兄之心豈以其嘗面託與未嘗面託爲異也遺言􅀁載望吾兄爲之主張其間本朋友之情行之以官府之法以爲可乆之計此不惟見􅂮生之交其􅀁以扶持善類者意亦深矣諸淂欲面請者萬萬不􅀎悉與胡青厓同知向承枉顧草堂極荷見教兄之蒞民事也又三四月矣不知一體之愛今日真實試驗處自覺何如平時意見議論試之煩瑣艱難處自覺已是實受用否古人問學只從實地著工夫不渉言􅀃亦無玄妙不弄聰明不卑階級苦心志勞筋骨庸言信庸行謹是真實不誑語也兄之髙明願更有以教我二閶門分手後歸坐草堂計日以待兄之来而未得也兄言虎丘之遊時時返觀滲漏尤甚又云臨事自覺常常有之即此數語深見吾兄用工之密至於滲漏二字則一口道破後學者公共病痛如僕尤宜深省者也雖然卽此返觀自覺處便是撥轉機關脫凡入道之路兄更自驗之返觀自覺後常常意思如何􅀎接續不斷否頻復敦復正在此處辨之耳兄之治孳孳職事無一􅀧謫官之態人知之兄自知之僕不􅀎贊也兄􅀁謂返觀自覺處亦兄自知之僕不􅀎贊也僕之意頗以爲兄於世間伎倆世間好事不免有多掛胸中處且夫滲漏多正坐兜􅄃多耳此昔人􅀁以貴於絶利一原不如是則不足以收斂精神而凝聚此道也弟葢亦沉溺扵彼者年来漸自知非欲痛於埽除而習氣􅆞繞擺脫未􅀎今復爲是言以請於兄􅀁謂病人解􅀃病也惟兄教之嘉香拜惠常如奉明徳之馨不敢不自力洗刷胸中宿穢以承雅意也荅林鎭江㢲峯承示乞休一著奪於當道之不􅀎相體奈何旣不􅀎自遂則勢不得不且聽之大抵此心有礙則進退維谷此心無礙則進退皆宜前書所􅀃冷􅀬自知可北則北可莆則莆可視事則視事可攝則攝亦何􅀁固必也龍溪之􅀃不知􅀁指但衆口雌黄何􅀁不至且不幸處嘵嘵之地則易缺固其勢然耳不計較毀譽墮不自考計較毀譽墮不自信此兩路頭從何調停謂名節者道之藩籬名節與道是一是二謂之藩籬則􅀁藩籬者其中要是何物吾丈於此固具隻眼乆矣容細請教也自吾丈莅潤以来江鱘萵筍楮筆不知幾畨拜賜矣辭之則疑于自疎不辭則饕餮已甚今復勉顏登領此後一魚一筍不敢更煩使者尤見吾丈之知愛也荅茅知縣鹿門兄始至邑而㢲峯公有􅀁齟齬僕深疑于兩賢之不相厄故嘗懇懇以下交之􅀃勸之㢲峯而復以上交之􅀃爲吾兄言之旣而同心共濟歡然無間則旣免于暌孤之吝而果獲利元夫之吉矣不謂中路乃復猜嫌如兄􅀁示令人太息則是旣脫之弧而又張之弧也若有􅀑神焉交鬭其間奈何雖然在㢲峰則不免爲不􅀎容才在吾兄則不失爲動心忍性之大助也自古上下相順則爲益猶少惟上下相忤則操心慮危委曲相濟爲益尤多此昔人以愛惡比之藥石美炙而益之爲卦益用凶事反勝于益之以十朋之􅀛也兄更叅透此關則何往而非受益之地哉乞歸一節雖􅀁謂冷暖自知非人􅀁􅀎勸阻然願兄更忍性其間而審處焉勿輕爲去就也不􅀎得一面談耿耿何極與裘剡溪推官書昨承示欲賜徐醫扁額謹因尊命輳成兩字曰占恒何如恒者人心之常理古今凡聖不减不增惟其有占不占是以有􅀎恒不􅀎恒之别而恒道實未嘗去人也古聖賢教人雖一曲藝未嘗不與心學相通人􅀎淂此常理設使爲醫則必􅀎究性命之源爲巫則必􅀎極􅀑神之情狀一徹萬融􅀁謂因源而得委也古如農轅重黎之徒以聖賢精微之學而爲醫巫師是也􅀂使爲巫醫者知無恒之不可則必反而求之於心念念在有恒上著工夫則庶幾性命之源􅀑神之情狀可得而無愧于巫醫葢本欲精其藝而因以達乎其德􅀁謂自委而泝源也如古巫咸醫和之徒因巫醫而知道是也聖人提醒人心只在一占字易曰君子居則􅀚其象而玩其辭動則觀其變而玩其占􅀁謂占者豈是揲蓍布卦乃爲占㢤此恒心之存主處則爲居此恒心之應用處則爲動神明在我知幾而動是無時無處不是占也不占則神明失幾微昧矣是可謂之恒乎而又何醫巫之可謂乎荅吕沃州居鄉無朋友夾持深懼墮落得来教不覺􅋏然甚幸甚慰兄云暫時寧靜􅀂有端倪恍惚轉移復離本體自非兄之懇心眞實􅀡從心源上着工夫不􅀎爲此言然兄自謂未淂霸柄入手者正恐其病亦坐乎此大率此學只論有欲無欲不論寧靜擾動􅀂本無欲障則頃刻之間念念遷轉即是本體若欲障未盡則雖窮年黙坐􅀎使一念不􅁸亦只是自私自利根子白沙先生嘗言靜中養出端倪此語湏是活看葢世人病痛多縁隨波逐浪迷失真源故􅀤此耳若識淂無欲種子則意真源波浪本来無二正不必厭此而求彼也兄云山中無靜味而欲閉關獨卧以待心志之定即此便有欣羨畔援在矣請兄且母必求靜味只於無靜味中尋討毋必閉關只於開門應酬時尋討至於紛紜轇轕往来不窮之中更試觀此心何如其應酬轇轕與閉關獨臥時還自有二見否若有二見還是我自爲障礙否其障礙還是欲根不斷否兄更於此著力一畨若有得與有疑幸不惜見教也苟以爲多病羸弱精力不及閉關以養疾則可耳閉關以養心則不可也程子嘗曰習忘以養心則可習忘以求道則甚有害其辨之精矣然養生亦只在無欲上求之故曰飲食男女聖賢自這裏做工夫斯言至近而精兄有意於元氣之復乎則願兄毋忽斯言也弟亦多病羸體葢平生得效良方在此耳至於厭事之病弟亦素有之然舊未嘗自以爲病今幸知病矣何日得與兄共坐一室日夜相與磨勘洗濯此心臨書耿耿與張本靜曩奉清論毎服吾兄任道之勇别来又聞兄家居工夫精進殊以爲慰近承来諭同志中往往夢中作醒語誠然誠然其下者假公濟私其髙者以意見所到爲實際葢縁始􅀄發心原不曾下眞種子􅀁以頭出頭没轉来轉去竟不出人意料臼中方且認賊作子自謂超悟誑已誑人以迷􅃌迷道之不明不行􅅧可太息僕亦夢中人也雖然自數年来益覺掃除私意之難益信古人備嘗艱苦動心忍性知險知阻是細細磨鍊細細降伏此心處方欲強勉從事銖寸積累十數年庶幾少有所進不敢自負也若謂認淂本體一超直入不假階級竊恐雖中人以上有􅀁不􅀎竟成一畨議論一畨意見而已謝上蔡云今之學者何足道􅀎言真如鸚鵡耳透淂名利關此是小歇脚此古人自驗過不誑語也兄邇来自考處何如天理愈窮則愈見其精微之難致人欲愈克則愈見其植根之甚深彼其易之者或皆未嘗寔下手用力與用力末嘗懇切者也東南勢利之習薫塞宇宙腥穢人心葢未世氣習盡然而東南靡利之鄕則爲尤矣昔人􅀁謂非百年必世不可得而變也非知命不惑不可淂而改也巳乎奈何今但於後輩中視其一二有志者稍稍語之以義利賔主之辨然亦不敢深求而過責之但令其立定趨向儘力從事於清苦淡薄使日揩月磨庶有以奪其紛華盛麗之好而巳然亦不知後竟淂力否也令兄質地近樸愧不􅀎有以開發之且抱病亟歸又不􅀎乆相與也然家庭兄弟間自有餘師矣至舉業一節似亦未嘗苦心其間今但令其讀古􅚨先之書反之扵心稍稍窺見理路然後轉向舉業上去亦以速歸不及竟矣諸皆負其逺来歉歉秋間或得同舍弟至南都此時可得一奉教然未敢必也臨書馳情二得来書知執事爲性命心益覺真切􅀁云好話好事只在名利關中打翻轉尤切中近来學者病痛近来學者本不刻苦捜剔洗空欲障以玄悟之語文夾帶之心直如空花竟成自誤要之與禪家鬭機鋒相似使豪傑之士又成一畨塗塞此風在處有之而號爲學者多處則此風尤甚惟嘿然無􅀃坐斷言語意見路頭使學者有窮而反本處庶幾挽歸真實力行一路乃是一帖救急易方龍溪諸兄往江西􅆫以此意請教不知兄意云何也僕數年来終日在疾疢拂亂之域平日清虛意見到此更無􅏉躱處然真景相逼真機亦漸透露乃知外馳之與内主機括只在絲髪間昔人􅀁謂啞子喫苦瓜真是􅀃不得耳與薛畏齋副使使節歸自保定常得一奉清論然方以是爲請教之始至于中間委曲情切處􅀁欲就正與鄙人膏盲痛痒處􅀁欲求鍼砭者皆未之及焉以爲非得更奉周旋三兩日則不盡也未幾而兄去蜀矣爲之悵然兄向所面論誠是玄妙使懇切下工夫處或少有疎漏或自以從心􅀁欲可不事檢防此則墮落髙明人病痛窠臼去了恐不可以上達也非寔際也中庸曰極髙明而道中庸是以先儒以爲學莫先于義利之辨今人􅀃義利處太粗淺與􅀃辨義利處太容易了􅀁以工夫不着寔吃􅂃自聲色貨利種種病根以至于有意爲善皆利也自辭受取予之節以至于行一不義殺一不辜而得天下勿爲皆義也然人此心至神本無染著惟對境處斬截潔靜不使一毫牽扯與一毫濳伏則本體流行乃是合下了當弟願以此終身而從事焉兄得無以爲固滯之見乎荅洪方洲主事別乆殊勞我思近朱刑部過草堂頗􅀎道吾兄􅁸居爲慰曩承手教諸凡􅀁處事體比舊俱覺穩當是以更不必細爲條荅而鄉居僻逺使者亦遂不至以是不及復書多罪兄言以前行事俱失于寛則僕前己略言之矣大率有意于爲寛與有意于爲嚴皆是中間有病根在昔虞廷之論旣云罔咈百姓以從已之欲而又云罔違道以干百姓之譽此隱微之間不可不深察也減免一節僕不􅀎知其中事體如何大率吾兄清徳則旣自信而人亦信之矣其有未然則一畨擊撞是一畨工夫􅀂覺因此稍有揺動則平生爲善之志猶是從世界上轉移而未可以言真心爲善者也然雖不因此稍有揺動而反身修徳自懼自省則又益精以密是物議之興其爲吾進德之助多矣且夫豪傑之士出頭幹事矯衆特立則易以招尤惟閉關括囊則可以無咎譽然君子不辭自立于多凶多懼之地者將以自驗也僕輩幸在閒田地然悠悠過日徳不加修未必不由乎此吾兄何以敎之與蔡白石郞中往年辱兄知愛謂可與共進於文藝之門今忽忽齒髪漸衰兀然成一秃翁向来􅇊倆剥落且盡雖誦人詩句亦如羅刹國人驟聞中華語音駭不省其何􅀃况􅀎自有􅀁著以自見於世也朋友間往往言及兄之垂意於僕豈特以故人之故耶抑亦謂其可與進於文藝之門耶豈知僕之衰颯剥落一至此哉雖然以兄愛我之意其知我之衰颯剥落一至此也豈不爲僕惜之以僕之愛兄之意亦竊謂兄以聰眀絶世之資而消磨剥裂於風雲月露蟲魚草木之間以景差唐勒曹植蕭統爲聖人而冀爲其後此其輕重豈特隋侯之珠彈雀而巳亦可惜也曩與兄相聚時兄年最少而僕亦壯年今壯者衰則少者亦壯矣由壯入衰􅀎幾何時四十無聞則僕旣自蹈之矣自惜之矣倘兄以爲宇宙内事與吾分内事盡於風雲月露草木蟲魚之間則足矣不然則亦不可以不深思君子進德脩業欲及時也兄苟不以僕言爲戇繼此尚有􅀁請不然且閉口耳辱愛多談亮之二曩承荅教深慰素懷且自笑僕之􅀁知於兄者淺也僕嘗謂學者非無痛痒之爲貴而以眞知痛痒爲先知痛則不􅀎不護而藥之知痒則不􅀎不爬而搔之今之學者病在徧身麻木全然不痛不痒􅀁以更不得力然知痛痒若不是真知其更不可忍處亦是不知痛痒縱使爬搔護藥亦悠悠不淂力也来書云詞章爲聰明之害又云於苫土中覺得􅇮時醉夢流浪此是吾兄一口􅀃著平生痛痒一些不自瞞一些不瞞人即此一些不自瞞不瞞人處何等光明何等􅀡截便是超凡入道真根子也雖然昔人􅀁謂舊習如落葉旣掃復積兄試觀之旣覺得曩時醉夢流浪之後四五年来種種世味種種酬應種種思慮􅀎盡不􅋨夢不流浪否抑時有醉夢流浪處否醉夢流浪處當時便􅀎覺得旣覺得便􅀎撥轉淂否抑亦有恍惚不便覺得牽掣不便撥轉淂否即如把筆作詩時自覺淡然一無喜心否旣有喜心其於好醜贊毀種種勝心􅀎不藂然而動否覺有動處便􅀎銷化否抑亦有牽掣不便銷化否其不把筆爲詩時喜心勝心􅀎不濳伏否不止作詩一節凡一切外馳習心􅀎銷化否不濳伏否細細照察細細洗滌一些不得瞞過一些不得放過乃是真知痛痒旣真知痛痒即境界不論靜閙工夫不論頓漸靜閙一境界也頓漸一工夫也兄以避北而就南舍頓而即漸爲􅀃夫閙處不得力卽靜處未可謂之得力不究竟􅀁謂頓亦安有􅀁謂漸乎收攝精神倂歸一路漸即是頓即此一路接續不斷頓即是漸非二致也然吾兄討方便處用力亦未嘗不是也旣真用力則靜閙頓漸不患其不一矣来書􅀁病世之君子以聖學之名襲江左之寔是非頓之爲患也正坐自瞞過自放過麻木不識痛痒耳弟之不肖年来痛痒頗漸自知追尋病根大率苦血氣之爲累血氣薰成習氣不􅀎自脫詩文之障亦時尚往来胸中弟爭分數重輕而已此不􅀎以欺兄者自顧齒髪漸衰痛痒心切旣稍有知不敢不極力爬搔䕶藥使此生甘爲麻痺人也来書提出小心兩字誠是學者對病靈藥但如前􅀁􅀃細細照察細細洗滌使一些私見習氣不留下種子在心裏便是小心矣小心非矜持把捉之謂也若以爲矜持把捉則便與鳶飛魚躍意思相妨矣江左諸人任情恣肆不顧名檢謂之脫灑聖賢胸中一物不礙亦是脫灑在辨之而巳兄以爲脫灑與小心相妨耶惟小心而後能洞見天理流行之寔惟洞見天理流行之寔而後􅀎脫灑非二致也弟之不肖正程子􅀁謂墮在沉滯執泥坑裏者自愧脫灑之未􅀎也惟兄教之僕之所請教於兄大要只是一言願兄時時無忘苫土中􅀁見如何如何答皇甫百泉郎中前得方山書知與兄日相切磨必多有妙論恨不􅀎往叅其間而與聞之也僕之不獲奉教於兄而索居也其亦乆矣僕之懶病而廢學也其亦乆矣藝苑之門乆已掃迹雖或意到處作一兩詩及世縁不得已作一兩篇應酬文字率鄙陋無一足觀者其爲詩也率意信口不調不格大率似以寒山擊壤爲宗而欲摹効之而又不􅀎摹効之然者其於文也大率􅀁謂宋頭巾氣習求一秦字漢語了不可得凡此皆不爲好古之士􅀁喜而亦自笑其迂拙而無成也追思向日請教於兄詩必唐文必秦與漢云云者則已茫然如隔世事亦自不省其爲何語矣􅀁以乆而不敢請教於兄者正以村俗匠人不敢呈技於輪扁之前也今旣與兄開口􅀃破容繕寫一兩篇奉以爲笑耳蔡白石今之名家也僕向来頗不謂然近得其詩讀之則巳洗盡􅉢革獨存本質幽玄雅淡一變而得古作者之精僕雖非知音亦三嘆不􅀎自已竊謂此兄當與吾兄竝驅辭塲矣雖然以兄之髙明磊落若以一生之精力盡之於此即盡淂古人之精微猶或不免乎以珠彈雀之諭向曾寓一書於蔡兄不知蔡兄曾與兄泛論及之否又不知方山之􅀁謂與兄日相切磨者抑亦止於藝文之間而巳也抑亦不止於藝文之間而已也更願聞之来教道未就損學不加益之􅀃雖兄之謙亦足以知兄之苦心也學之不加益也正坐不􅀎損耳更願聞􅀁以損之之􅀃也南沙兄􅀍劾令人益有感於行路之難此兄在内在外皆不見容若此其自爲計獨欠拂衣一往耳俟此兄反常時欲以此相勸不知􅀎自決乎否也與與槐謝翰林數辱書問且教誨拳拳如吾兄真􅀎愛我以德者也感激感激􅀁諭東城誌文中間附載師友一節弟方屬稿時亦知此叚議論多爲世􅀁不喜而兄書示亦以爲􅀁不喜也果然果然僕何敢以一人之獨論而干什百人之公喙哉但東城兄平生􅀁尊􅀂人也而爲之師􅀁親若人也而爲之友意思懇懇真是如此寧使自已蹈世人􅀁不喜而不忍不爲旣死之友一寫心事此鄙人之意也閉門厭事此是鄙人前身宿病近来力自懲創以庶幾乎吾非斯人之徒而誰與之意但性旣褊狹又素羸􅇤毎入空山則不免仍有喜心毎遇人事迎送繁擾跛踦從事則不免仍有厭心耳雖然兄真愛我以徳者也敢不圖􅀁以承教林君與吉吾兄屢屢示及僕亦慕其爲人嘗至松江一訪之與之有山中同事之約然此兄尤似厭事過我者又愧僕之謭劣不􅀎致此兄也僕多病之軀年入四十已更衰落不覺塵心灰盡枯坐素食兀然一老瞿曇矣非學力使然葢不得不然也宿負書債亦已乞休兄向所示諸書不煩㽞意矣兄母笑母笑兄􅀁示景仁書將多買僮爲猗頓之業其戲耶其誠然耶古来磊落奇崛之士多是歇手不下如范蠡本非俠徒亦非貨殖葢自以計然之策不盡用于越而發之居積盈縮隂陽予奪之間以􅀉其馳騁不羈之氣與其弛張不窮之􅀎而已是􅀁謂技癢者耶趙子其亦然耶其戲耶雖然趙子其必􅀎戲也雖然兄謂趙子之疑於俠而僕謂趙子之非俠也其爲技癢者也是吾兩人者亦戲也嘻如此解者宇宙間事孰爲戲耶孰爲非戲耶荅喻呉臯御史執事之爲令也子惠孚于百姓爲御史也風采動于朝端至其發爲詞章則又與古之騷人墨士爭馳騁上下然竊窺執事之意皆不以是爲足而卓然有意于古人儒者性命之學葢不造于精微不已也紫陽子曰豪傑而不聖賢者有之未有聖賢而不豪傑者也僕竊爲執事望之承諭失職圯剥之􅀃深見閔時病俗之至意執事正色立朝側目者幾何􅀡道君子神明扶持即使往復消長之幾未􅀎盡如人意然周旋其間整頓得一分亦是宇宙間一分禆補大易􅀁以小利貞也若夫事之有拯隨而身之有屈伸在君子自􅀎與道委蛇而動靜不失其時耳讀􅀁􅀉諸詩歌其調雅以古其氣雄以鬯而慷􅁣許國攬轡請纓之氣復見于言語之外葢不敢以詞人之詩目之也謝教謝教賦篇偉麗但摹擬選賦太似而真意或稍不融暢耳僕過承知愛自顧迂踈褊陋素非適用之器惟競競自守庶幾少有所進以無負于夲来面目顧年垂四十塵機與老態漸長道心與壯氣銷落葢巳蹈無聞見惡之戒矣奈何奈何緬想海内同心何日得奉教語展心曲而相與切磋印證也向使節寓呉時殊欠一㑹至于抱悵無巳臨書重爲繾綣有便更賜教多幸與李中溪知府居間毎一思兄忽如隔世適奉手教又如聞隔世人語而神遊于崆峒藐姑之間也慰幸何可言不求復性終坐流浪来教甚警切足徴吾兄近来􅀁淂僕自四十外非特世事灰心向来一切詩文伎倆亦從掃抹于閒靜中稍有窺見本来面目處惜道逺不淂一致之也楞嚴維摩圓覺諸經十年前亦曾看此若謂從此悟入則于對面孔竅尚隔一層百過誦持正落理障世間文字與出世間文字一有著處其病同也不􅀂併耳目口鼻作用頓然放下便見眞我如何如何好名爲病只是眞性命心不切無足道者自悞自耳兄與五岳乆㽞意方外之學倘曾遇一二異人否乎便中幸以示我與胡栢泉叅政天下事魚爛極矣非特邊陲戎狄之患然也愚夫知其必有隱憂而恃祿固寵之士無人敢出一口氣間有一人慷􅁣言之而出身任事則衆共惡之必擠去之而後巳嗟乎此禍機之􅀁以成于壅蔽而志士之􅀁爲扼腕也山中偶淂大疏時取讀之大覺太息雖然進退時也于兄何有哉若兄之自爲計則願以康濟斯世者康濟此身以除戎攘寇手叚用之懲忿窒欲克巳復禮之間此古之􅀁謂真正英雄也兄之有志于此亦乆矣敢進一言以贊山中内修之策與李少􅀸中麓自吕竹嶼去後與兄遂如隔世毎思京都舊歡可勝耿耿今金攝山之在章丘也是竹嶼之在常彼此消息之便甚慰甚慰昨得兄書知䘮内之戚吾與兄與南江同之悵然悵然又聞兄巳淂子及後娶復有孕極爲兄喜一身輕萬事足兄兼得之矣復何􅀁求於世也哉弟數年来閉門鄉居謝遣業縁交游旣簡􅉢槧亦踈暖暖虚里桑梓滿眼自是天壤間樂事時復據小樓隱几兀坐一種枯木寒灰􅃐味更别乃知造物者置我於此意良不薄且端居多暇更有丹丘羽人之想聞牢山海島仙靈窟宅甚欲一往焉且將道齊魯之間得與兄一劇談而老父髙年勢難逺出㑹稽禹穴之間龍門太史蹤迹􅀁在兄倘亦有意乎兄書中言章丘凋敝思得良牧攝山敝鄕最有志向之士也律已清苦蒞民豈弟兹調亦以􅀡道致其爲章丘必有可觀且賴兄爲邑人當如古澹羽任常之徒上禆有司之見聞下以善道化誘鄕里非兄之責而誰責也弟何􅀎爲助哉荅姪孫一麟數日間始􅀎下鄕自驗病後此心覺淂凝定一畨從此可更有進歩處是造物者往往以病幸我也得来書言吾姪孫之病此心惻惻不􅀎專精致神溺書冊羨技􅀎以爲養身養心之累此􅀃誠是􅀂使盡捐書冊盡棄技􅀎兀然槁形灰心此亦非大難事而精神無凝聚處亦自不免暗路漏􅂥􅀂就從觀書學技中將此心苦煉一畨使觀書而燥火不生學技而妄念不􅁸此亦對病下針之法未可便廢也燥火不因觀書而有特因觀書而􅀤耳妄念不因學技而有特因學技而發耳旣不因觀書學技而有則雖不觀書不學技亦安得謂之無乎吾子雖乆事于學至于學問頭腦如先立其大等語其實未有自信自作主宰處今在病中且只可收攝精神并歸一路俟面㑹更商量也宋奏亦可􅀙容看之白沙先生以我觀書以書博我之􅀃甚可理㑹以我觀書則意常閒閒自不欲速以生燥火可試之荅洪方洲僕囊癰卧病百餘日潰出濃水過多足髓流耗至今未􅀎􅁸立一歩恐因此遂成癰軟作一支離活死人卧牀遂與世相隔絶亦未爲非幸也大率幻軀一切付之造化不復有􅀁計較於其間矣病中幽閴毎念吾兄且訝兄音信乆疎而不知兄之病甚亦如我也適讀来書旣駭且慰兄習讀過勞思索太苦願兄常教此心虚閒以完精神此病未可專委之血氣也神氣精一而爲三故有神病氣病精病病有三而神病爲重兄言夢裏飛揚正屬神不收攝多記苦思正是神的對頭􅁈家若終日用神而神不耗此非有道術者不􅀎吾輩則在時時收攝而已僕之病亦坐此葢乆而稍有覺悟耳使者逺来深感兄之念我枕上草草不盡欲言荅王龍溪郎中伏枕中讀来教甚慰甚慰告子不可謂非力量此吾兄有見之言也大率種種疑懼由自心生由自心斷張弧脫弧盡從心造遇雨之吉群疑乃亡人須信得一生吉凶利鈍莫不有定命在則種種可疑可懼盡如空􅂠無若我何此乃無意於却疾而實却疾之要藥也老莊家亦言大患有身金注成惑若於此處稍叅不破則昔人􅀁謂壁間蛇影足以生疑而致病葢自以爲可疑可懼者未必􅀎病吾身而終日自擾於虚疑虚懼之中乃真足以病吾身是非人􅀎病我而我自病之也兄達人也於此可以一笑而解矣與羅念菴脩􅁧自與兄别後數年間齒髮日衰念來日之苦短而問學之無成邇來省身自克性命一念儘切於往時居閒靜坐即常如見兄面目常見兄面目即常如􅀉書於兄也至如夢寐間亦徃往見兄僕方訝蹤跡與兄太密而兄乃以我爲踈乎一笑􅀁示夏游記中間辨析精切深有憂於近世鹵莾之學力與破除可謂有益世教不小然以此驗兄近来􅀁淂則尚有論在葢猶未免落於文義意見之間而自巳真精神不盡見有灑然透露處豈兄對世人􅀃法故然耶兄自謂此物未得到手此是真實不誑語弟近来用力益見此物到手之難不且死心塌地抛棄萬縁下十餘年死功則不可妄想古人不言思道三年終日終夜不食不寢此真公案也後世儒者只是􅀃話度日而巳况在近世乎近偶㑹一二方外人見其用心甚專用工最苦􅁣然有嘆於吾道之衰葢禪家必欲作佛不坐化超脫則無功道人必欲成仙不留形住世則無功此兩者皆假不得惟聖賢與人同而與人異故爲其道者皆可假託混帳自誤誤人竊意當時聖賢用心專而用功苦者豈獨百倍方外人之修鍊而已必有啞子吃苦瓜與你􅀃不得者而世人乃欲安坐而得之以其世間功名富貴之習心而髙談性命之學不亦逺乎寥寥宇宙􅀁望于兄者不淺弟亦不敢自棄於吾兄教誨之外但與吾兄不得合并最是苦事以僕愚見非特僕之鹵莽朝夕不可離兄雖以兄之髙明純粹亦不􅀎離我若得天假之縁同處數年不假言􅀃日夕以真精神相感發如此乆之彼此皆可望於有成不然則徒抱此生耿耿而巳奈何兄近有秋来九華之約兄之􅀎来與不􅀎来不可知而僕今秋則不􅀎出門矣僕自春徂秋外腎癰瘍出膿今癰愈矣因出膿水四五碗傷却筋髓足力尚軟未􅀎􅁸牀也若病體􅀎復舊當爲来春相晤之約耳一晤尚難况乆處乎可悵可悵死生一事巳一切任之無足深掛意者毎聞兄亦時有小恙不知何恙也便中示之年来世事擾擾憂國一念未􅀎弭忘而浚谷以一僉事當古北口之衝尤爲此友憂之知兄亦同此懷也蔡可泉兄使人之便草草􅀉此言何􅀎悉與楊蕉山執事豪傑士也忘身許國不囬不撓使滿世間脂韋淟涊全軀保祿之士聞風縮頸羞媿不暇執事之志則然而才足濟之自丹陽奉晤令人嘆羨不已然􅀼有少致愛助於執事者頗覺慷􅁣激發之氣太勝而含蓄沉幾之力或不及焉施爲欲似千鈞弩磨礪當如百鍊金願益㽞意則不朽之業終當在執事且夫直前太銳近於用壯取必太過近於浚恒在易固有戒矣惟幾也􅀎通天下之志惟深也􅀎成天下之務自古欲以成務而或僨焉者未必盡是庸人或豪傑與有責焉耳僕少頗負意氣屏廢以来槁形灰心之餘化爲繞指柔焉乆矣以此自量乃欲以此量豪傑固知必且爲笑然以敬慕執事之至也故不敢不盡其愚荅楊小竹僕嘗聞於方州而淂執事之爲人以爲惇樸勵行篤信古道恬淡有守不樂仕進時則已心慕之毎以無由淂一奉教爲恨適枉千里書札益感同聲氣之義也甚幸甚幸但辱推奬過厚深非鄙陋􅀁敢當又甚自媿耳􅀁示後言巳十閱其五六尤見髙志逺識雖然中夜有得隨即劄記尚不免揣量探索其與黙而識之者意思自别此二程􅀁以不滿于横渠也若使急于立言以明道則是􅀁謂有迫切發露之象而妨於沉潜涵蓄之實此又昔賢之􅀁以致疵于文中也聖學終日􅀤憤只是一事􅀂使精神稍有間便有􅂥漏此後世儒者之學􅀁以與入聖路頭猶隔一關也敬軒讀書録康齊日記此兩公行已大節誠是後學師法若求真血脉路恐絲毫不容異同處更當别論竊願執事且將向来言語意見一切埽去轉益收拾精神向裏直從無聲無臭處自家討箇消息念念不舍如此數年更看意味何如與今日􅀁劄記更看有同異否宇宙寥寥其真志實行可望以􅀉斯文者絶爲難得此僕􅀁以自忘其不肖而深欲致愛助於執事也亮之與洪方洲郎中逺渉一遍轉覺求友之難毎切思平日與兄臭味真不偶然邇来懷兄較切兄之念我亦然否耶胸中讀書作文擬少覺輕省否若精神尚只在此科臼中盤桓􅆓洄則是於本来面目未可謂真有見也近来講學多是游談至於爲巳工夫入細處則其􅀃頗長瞻望金陵奮飛未􅀎歲云暮矣何日得與兄一研究之江湖衷曲亦無可披寫處又恨不得對兄一披寫也近来江山之間偶見一二方外勇人漆園枯木寒灰之語不圖眼前得之又見莆田小卓子字書及聞其言議風旨意其必爲磊落奇偉超脫不羈之士而俗人往往以􅀎言禍福奇之淺淺乎知之矣學士大夫間􅀁謂人才者兄大略聞之矣而所謂磊落超脫者往往多出於黄冠草服之間豈􅀁謂禮失而求之野者耶一笑二古者朋友散在四海九州則汲汲於欲相㑹之殷者非專爲情好也有疑焉則欲相與決之有得焉則欲相與推而同之而已與兄相别三年知兄之學旣已無疑而有得焉乆矣毫髪無􅀁待朋友而決者獨不􅀎與朋友推而同之乎往返兩遍皆可以来而不一来非􅀁望於兄也南都縉紳􅀁聚非山人可来来亦不敢見客僕有積疑待朋友而決者謹俟異日使節便道過此當一請教耳非敢自棄也􅀁示濟南生文字黄口學語未成其見固然本無足論但使吾兄爲人􅀁目攝此亦豐干饒舌之過也且崆峒強魂尚爾依草附木爲祟世間可發一笑耳文章之􅀃其明不明無足關繫於世向固不喜吾兄之多言也孟子之􅀁好辨是天地間何等語言此外豈足多辨㢤荅殷生原學来書推奬鄙人甚非倫比頭陀僣謂佛子法王此大罪過也雖然亦足見吾友向往之殷矣僕不自量竊痛世人汨于利欲迷失真種絶去天理自墮􅀑蜮是以在群衆中往往不惜齒頰一與破迷雖至速侮招尤亦不爲悔至于同游諸子尤更不敢惜齒頰然察其中如聞古樂而思睡者固亦多矣亦不爲悔葢冀有一二人􅀎深信吾􅀃而共行之以究乎其精則宇宙間氣脉尚有􅀁􅀉不至盡冺爛此吾人大功徳也敢自愛乎今吾友乃不見謂迂濶直欲相從于湖海􅄫寞之域信之甚眞而志之甚篤則交戰勝負之機固已決矣是余之􅀁汲汲而求者也但湖上之行本欲絶去言語文字於萬縁不染時黙悟此心今與吾友同行不免更廢一番酬酢耳然来意不欲固違也到無錫時當相約􅀁云議論抵牾其勿尤人豪達寇盜亦且勿尤人葢自家不知有幾多病痛在也今者只悉心洗刮自家病痛盡時更看感應處何如旣已深知吾友之意此後當益盡鄙言耳與程松溪司成蘇州之變兄之至痛亦通家之􅀁痛也至今未􅀎以書奉弔旣而聞令孫生於遺腹此兄之至慶亦通家之􅀁慶也又未􅀎以書奉賀以弟之素屬知愛而慶弔兩爲缺然若此多罪多歉奈何奈何兄近過敝邑又以僻處空谷不􅀎奉一言之敎尤爲耿耿伏惟司成之擢知兄一不以爲喜而海内同志之士則莫不訢訢然以爲不失􅀁望夫習俗之􅀁以日薄生于正學之不明也正學之􅀁以不明者生於師儒之非其人也古之􅀁謂師云儒云者固􅀁謂以賢得民與以道得民者也今之人心士習大略可覩矣靡靡然沉酣于富貴聲利之樂則旣以道德仁義爲芻狗而有􅀎爲道德仁義之􅀃者又往往口耳而不中於實用是以淪胥愈下至於廉恥敦朴之道喪而獧利機械之俗成海内之賢人君子未嘗不思力挽而亟反之而況兄之居其位者乎數章敎條旣落言筌升堂䂓矩亦是常格惟兄等具教字轉移之實于躬行心得之間要必有在而弟之竊願聞其一二者也與沈石山僉事江臯一别奄忽過今歲月如馳不知各尊􅀁聞各行􅀁知處竟何如深欲一合併請教未得也此學之無成病在脚根不實未有水寒火􅀬處耳惟兄溫雅近道之資實心爲善又弟􅀁素信者雖然沉潜善矣何以又云剛克也狷者有􅀁不爲善矣何以次之於狂也學問不極力振奮則不􅀎大有􅀁擺脫不􅀎擺脫則雖爲寡過而病根習氣或有潜藏而未融化者耳故曰大人虎變愈變則愈得力如兄髙志豈肯以今日見在爲至哉故敢進其狂言耳弟駁雜甚多别兄四五年猶舊人也奈何與劉寒泉通府荒莊重辱枉駕縁病體就醫不及擁篲耿耿承委送太府先生文字以郡人頌郡公非特分􅀁宜然抑亦情不􅀎已雖然鄙意有不敢不達之左右者僕少不知學而溺志於文詞之習加以非其才之􅀁長徒以耽於􅀁好而苦心矻力窮日夜而強爲之是以精神耗散而不􅀎收筋骨枯槁而不􅀎補積病成衰年及四十尩羸卧牀已成廢人此皆諸公所共親見􅀁共垂憫者僕平日傷生之事頗􅀎自節獨坐文字之爲累耳反之於心旣非畜德之資求之於身又非􅀁以爲養生之地是以深自媿悔葢絶筆不敢爲文者四年於兹將以少緩餘生爲天地間一枯木朽株而巳方欲盡取前槁燒毀以銷􅀫愆不意爲人抄録而無錫卜君殊不相信謬行刋刻再三以書止之而不􅀎不知其何􅀃也然亦賴有此刻可查平生無一篇文字不在其中執事試考其年月皆四年以前胡􅀃也若今日復勉強承命則後来更不可復辭於人人矣二三年間亦有一二府縣諸公索文者僕不敢爲枝辭相誑但據本心以告曰自今以後更有爲府縣及朋友間作一篇應酬文字則今日誠得罪於執事矣今於諸公亦不敢爲枝辭亦但據本心以告曰自今以後更有爲郡縣及朋友間作一篇應酬文字則今日誠得罪於諸公亦誠得罪於太府矣伏惟諸公矜而恕之荅王遵巖兩得兄書拳拳以病體爲念真意懇惻令人讀之堪爲涕下非兄死生之交不􅀎至此感激感激人傳言吾病過重者葢有兩􅀃一則以木腎爲患痰火時作不得不閉戸調理人以我經年病不見人則以我病不可支矣不知我貌則槁矣而精神尚可不死葢近於養生家稍稍得一歸根法也其一􅀃則自以早年有志今四十外矣而猶然醉夢人也葢非特文章氣節平生所劼力而從事者旣於眞性不切及􅀁聞於經書師友與意見之􅀁窺測而自以爲道者亦竟如隔壁聽話全無交涉近年来痛苦心切死中求活將四十年前伎倆頭頭放捨四十年前意見種種抹摋於清明中稍見得些影子原是徹天徹地靈明混成的東西生時一物帶不来此物却原自帶来死時一物帶不去此物却要完全還他去然以爲有物則何睹何聞以爲無物則參前􅀝衡瞻前忽後非胸中不卦世間一物則不􅀎見得此物非心心念念晝夜不捨如養珠抱卵下數十年無滲漏的工夫則不􅀎收攝此物完養此物自古宇宙間豪傑經多少人而聞道者絶嘆其難也好仁者無以尚之此真消息也終日如愚終日忘食此真工夫也無以尚之則有一物可尚便不是此物矣忘食則於閒事有不睱者矣如愚則於才技有不使者矣孔顔一生工夫􅀁以完養收攝此寳藏也僕近稍悟得此意而深恨年已過時雖知其無成然本是自家寳藏不得不有冀於萬一也是以痛爲掃抹閒事收斂精神之計則不得不簡於應接欲簡于應接不得不託於病不可支以謝客是以人知吾之病甚而不知吾之别有意也此意更不敢露於人以兄念我太厚憂我太深故特披露之兄萬無􅂥我秘密重增嘵嘵之口也安友爲求序淂託雄文以不朽甚幸過望僕舊從兄學爲文章有一二僅得處盡是兄之指教但才旣不長又不􅀎竭精力以從事是以遂成廢罷韓子􅀁謂徙業者不嚌其胾者也獨覺兄之奔逸絶塵而已矣近来自觀舊稿支離叛道之言篇篇有之理旣不當文亦未工赧然盡欲焚燒而後爲快縁頗爲人抄録無可奈何葢以吾今日文字伎倆須并却三四年精力專專幹此一事自謂可望於古人閫域今自度必無此閒精神可以了此也旣自知不了則豈欲以不了者而信今傳後乎亦愚矣貴鄕洪子因信兄而過信我遂亦以我爲可與斯文也與安友謀刻之而請序於兄僕旣而聞之愧汗駭愕葢吾文未成吾自知之且不欲此生爲言語文字人也居常以刻文字爲無廉恥之一節若使吾身後有閒人作此業障則非吾敢知至於自家子弟則須有遺囑􅀃破此意不欲其作此業障也僕居閒偶想􅁸宇宙間有一二事人人見慣而絶是可笑者其屠沽細人有一碗飯喫其死後則必有一篇墓誌其達官貴人與中科第人稍有名目在世間者其死後則必有一部詩文刻集如生而飯食死而棺槨之不可缺此事非特三代以上􅀁無雖唐漢以前亦絶無此事幸而所謂墓誌與詩文集者皆不乆泯滅然其往者滅矣而在者尚滿屋也􅀂皆存在世間即使以大地爲架子亦安頓不下矣此等文字倘家藏人畜者盡舉祖龍手叚作用一畨則南山煤炭竹木當盡减價矣可笑可笑僕又何用更置一莖草于鄧林棼棼之間哉至於求序於兄僕與兄何等朋友也其有􅀁求吾自求之而何待於人爲之媒㢤以爲吾文苟有成則當求兄不成則不敢以累兄知人之明也及得兄序讀之令人益増慙汗呉下自古来文人正不少以爲僕葢過二千年呉下詞人而接札游之文統旣使兄爲私於􅀁好又􅀂使僕與人爭名爭先然者非兄之􅀁以愛僕也使兄今日爲僕作序則亦宜道兄與僕昔以文相切磋以才弱志隳幾成而罷之意句句道却實事庶使兄爲不誣而吾亦可以不愧耳至於兄之雄文則千百年自有定價倘吾文稍進乃敢爲兄作序今且不欲羔袖於狐裘也刻板事旣巳力止兄序遂亦寳藏之未敢示人也與聶􅀟江司馬吾丈講學之書僕於明友間窺見一二而念菴兄多舉吾丈之􅀃以相教僕獲聞之竊以爲幸乃今辱吾丈盡以相示是悉􅀁以教諸同志者而教僕也爲愛何如爲幸何如承敎愛之殷鄙懷有不敢不盡於左右者僕素迂愚人耳然不敢不謂有志於學也自年近四十則心益苦葢嘗叅之閉門靜坐之中叅之應接紛擾之中叅来叅去如是者且十年而茫乎未之有得也雖其茫乎未之有得而隱約之間若或有一罅之見焉則亦不敢自昧也蓋嘗驗得此心天機活物其􅄫與感自􅄫自感不容人力吾與之􅄫與之感只自順此天機而已不障此天機而已障天機者莫如欲若使欲根洗盡則機不握而自運􅀁以爲感也􅀁以爲􅄫也天機即天命也天命者天之􅀁使也故曰天命之謂性立命在人人只是立此天之􅀁命者而巳白沙先生色色信他本来一語最是形容天機好處若欲求􅄫便不寂矣若有意于感非真感矣聖人固以寂感對言亦有以寂感分言者矣易曰復其見天地之心乎關閉不行是寂也是天地萬物之心也則不消幫􅀘一感字而感在其中矣又曰觀其􅀁感而天地萬物之情可見矣是感也是天地萬物之心也則不消幫􅀘一􅄫字而􅄫在其中矣易明言閉關不行而先儒以爲動而見天地之心是以爲􅄫異於感而幫􅀘一感字也易明言感即天地萬物之心而先儒以爲咸卦六爻皆以有感而多凶是以爲感異於􅄫而幫補一􅄫字也是未知聖人對言􅄫感未始爲完語而各言􅄫感未始爲剰語也一陽成震何以謂之非動也曰陽氣潜萌于黄鍾之宫其潜萌焉􅀁以爲􅄫也咸之六爻何以多凶也曰非感之爲害乃害於感焉而凶也故曰未感害也吾丈與念菴又謂心有定體而辨心無定體之􅀃僕亦􅀼謂孔子嘗言心矣出入無時莫知其向此真心也非妄心之謂也出入本無時欲有其時則強把捉矣其向本無知欲知其向則強猜度矣無時即此心之時無向即此心之向無定體者即此心之定體也有定體故曰寂不動則有定體也故謂之􅄫無定體故曰􅄫無時無向則無定體也故謂之寂動則有時有向有時有向則動也雖然僕於吾丈未嘗得面領秘密之㫖也至於念菴􅀁以懇切用工與其懇切爲人憫時病俗之深意則知之矣知念菴之心則知吾丈之心矣今之學者種種欲障絶未擺脫世間薰天塞地無非欲海學者舉心動念悉是欲根而往往託無􅄫無感無善無惡之􅀃以覆其放逸無􅀁忌憚之私􅀁謂終身役役行盡如馳而莫之􅀎止亦可哀矣夫此心原無放逸則不必論主􅄫有放逸則不可不論主􅄫學者此心原不放逸者􅀎有人哉譬如人元氣原無病則不必論服藥有病則不可不論服藥嘗有人問伊川無病何須服藥伊川云只爲開眼卽是病此語道盡學者膏盲處吾丈􅀁舉程門靜坐與未發之前求中之􅀃皆􅀁謂頂門之針而膏盲之藥也雖至上古聖人成湯周公坐以待旦髙宗恭黙思道三年孔子嘗終日不食終夜不寢至於三月而不知味􅀁以求之枯􅄫之中如是其堅苦然者葢雖聖人亦自覺此心未􅀎純是天機流行故不容不如此着力也然學者用却有􅄫有感的工夫却是於此中欲識得無􅄫無感的本心欲復得無􅄫無感的夲心而非以此妨彼之謂也譬如有人患積􅀬藴結必假芩連諸冷藥以解其毒而復其元氣非以爲冷氣即元氣亦非以爲冷氣異元氣而不服藥之謂也僕自覺欲障纏縛之深而放逸之乆矣方欲入空山枯坐蒲團兀然作一活死人如是者十餘年庶幾識得本来面目然則僕方且竊執事之教以自㳤而其言乃􅀂與執事相牾然者葢以爲不如是則不可以得間於長者而聞其教也與姜編脩廷善世人始入仕途便思肥家吾友厲志清脩非義不取禦人之盜乃不求彼而求此可見義盜之少也一笑一笑雖然囊巳罄矣盜之􅀁得止於如是而吾友之清脩益彰吾友之盜不乃爲王參元之火矣乎更有一􅀃清脩者志也損益者數也以吾友之清脩而尚不􅀎􅏉乎招損之數使更似他人作肥家之計其招損當何如矣此君子􅀁以安于義命而益厲乎其志也適自閩中歸聞吾友將行因疲於道路遂就荆溪山中棲息不及一别耿耿崇安建陽之間誠是仙靈窟宅昔人蛻骨在在有之不特武夷一奇也吾僦居此中已有次弟即且移家遂往與世長辭陶潜􅀁謂縱浪大化中㑹盡便須盡者此外更無􅀁望矣京師相知故人偶尚有問我者只以此荅之而已與華郞中補菴僕不􅀎爲義而竊好人之爲義古者有無相通以成一體二記文中頗盡之嘗見世間富人惜財如惜血苟出其槖中朽腐棄餘尚足以活宗戚閭里無限垂絶之命乃暌暌相視不少動乎其心以爲生財之道宜如此葢財生而心死焉乆矣以此僕於執事義田及史君荒渰二事心竊慕之凡求余文者多莫之與而此二文者雖兩君不以余諉而余固樂爲之役也況其見求之殷乎但筆力凡駑不􅀎發揚盛事以風厲世人是可愧耳雖然聞方洲謂吾文勝錢公輔此或不敢虚讓執事眼中自當得之但裴晉公奉酬皇甫持正文價故事不知執事如何爲處耳生平未嘗敢受潤筆之資聊書此發吾文一笑與陸五臺儀部草堂枉駕山寺把袂兩畨劇論辨難往復殊豁心曲即使朋友相聚毎若此何患乎道術之不明也五臺亦以爲然乎雖然千言萬語與嘿然處是同是别若謂之别語從何􅁸嘿從何止若謂之同何不相與嘿然而千言萬語當其諠然時若一句不可少者畢竟是同是别五臺試更叅之别後㑹大洲公更有談諭否又恨不得時時相與證法也重刋荆川先生文集卷之六
