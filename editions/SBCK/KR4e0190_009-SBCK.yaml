  text: 重刋荆川先生文集卷之九
  hash: sha256:cd44b9e7fb30431934f1ff2942b2dd9b768b238459238fde46144ccc21de6831
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_009-1a}
body:
  text: 荅夏桂洲相公順之至愚陋曩在􅅵畝蒙恩召用繼以狂瞽蒙恩罷歸皆在明公秉鈞之時則是其進也葢辱明公之節取而汲引其退也葢辱明公之委曲以保全雖明公陶鑄庶􅀋本不私于一物而樗材淂此則竊自愧幸以為過分顧迂狂成性動自罹咎其始旣無以副節取汲引之心矣尚幸有犬馬餘生山林精力誦詩讀書竊古人而兾自㳤則􅀁以報明公保全之厚者或在乎此而不敢不勉也順之竊聞古之大臣進也以道􅀁以濟時而亦􅀁以正志退也以道􅀁以正志而亦􅀁以濟時顧進則濟時之功顯而退則濟時之意微伏惟明公去相之微意􅀁以勵不可奪之節立天下廉恥之坊而有禆于聖明之治者葢亦多矣易有之漸于逵之上六不居其位者也其繇曰其羽可用爲儀固不獨自潔其身而已人皆謂明公進而當軸以濟時也某謂明公退而髙尚以濟時也雖然明公與國爲體恐未􅀎忘江湖之憂而聖主眷懷耆舊亦恐不􅀎淂乆遂東山之卧耳謝歐陽石江巡撫伏惟明公負康濟之碩材當東南之重􅀉振恤瘡痍如春風􅀁扇不間於隂谷寒門搜拔幽滯如藥籠􅀁儲無間于牛溲馬渤如順之者早不自立少嘗薄遊巳甘屏跡于山林豈敢更求于聞達且誦習徒知泥古儕輩多謂之鄙儒而局􅄊難與適時明公誤以爲國士收于衆棄揚彼王庭況自来無門館賔客之交豈􅀁取在牝牡驪黄之外夫不采而佩雖幽蘭亦捐苟有因而前則朽株爲用遂淂再塵金馬之署更聯羽翼之班自揣既爲不堪衆謂何以至此惟天下信明公之端􅀡而知其嚬笑不以假人惟當宁信明公之激揚而知其顧盻必􅀎得士偶因拔茹及此彚征雖荐人常恐其知在明公絶不以言于口而受知思􅀁以報在鄙人則竊有愧于心惟當勉策愚蒙益精學問其或馳驅于世則庶以罄葵藿之心縱使委棄于時則永以堅溝壑之素期少礪頑鈍之􅄊庶不貽冰鑑之差而巳敢因来惠敬布腹心伏惟俯賜覽觀庶以知鄙志之􅀁存焉耳二僕樗散無似黽勉赴官將圖􅀁以効明公國士之知者而未䏻也竊有􅀁懼者山林之士閒居而靜處其寡過則易或出而馳驅于世當毁譽淂失之衝誠欲有􅀁樹立則難故古之人修之于家而多不勉壞之于庭者況僕之􅀁以修之于家者固未至耶昔韓持國薦處士常夷甫後夷甫改其平生而韓公亦深以是爲薦士之悔不知若何可以使鄙人不爲夷甫明公不爲持國之悔也幸左右終教之辭免坊牌一事向已面請此非敢矯情近名葢以此生苟不至於飢餓則毫髪不敢有􅀁取于世庶幾伐檀詩人之􅀁謂耳承明公欲爲置買學田此盛舉也更望明公始終其事中間委曲區畫使異日不爲人􅀁侵漁則受賜於明公多矣然此舉必須出自明公使鄙人若無􅀁與焉者乃為善也不然則鄙人雖不以是爲利而更欲以是爲名亦非鄙志之􅀁安也敢併以奉凟與郭似菴巡按僕經春常病移家住村塢中居閒自念不奉餘光者乆矣近聞使檄下府過旌鄙人命有司建牌坊示優崇之意且期之永乆此執事盛心豈不感激旣而自惟有甚不敢當者恐冒昧以累左右知人之明故敢畢陳其愚左右試垂聽焉書曰彰善癉惡樹之風聲近世牌坊之製葢倣此意古者不以法私人􅀁章必善而人迺勸􅀁癉必惡而人迺懲不然則懸曲木求􅀡影也僕少不知學中嵗蹉跎即鄕黨自好者正恐不如也執事乃欲以之風鄉人而矯漓俗僕豈不自知此如以迷人指迷不亦踈乎罪莫大於盜名詬莫大於詆誷僕非敢辭此也將以讓詬而辟臯也僕嘗厠侍從之列會才志紕繆又夙羅疢疾不􅀎效官荷天子明聖不戮瘝曠僅奪官罷歸田里此覆載厚恩詎可勝量僕聞之仕隱二道仕者則蜚聲竹帛或立旄纛表閥閱且不爲侈隱人則深林窈谷杜門棧徑羣木石鹿豕且不爲陋況僕含瑕積垢以此終世惟應躬耕灌園矢溝壑之志保桑榆之路補東隅之失庶幾不詒田夫野人訕笑此僕私心萬一者也介子推曰身隱矣焉用文之陶生亦云迷途未逺今是昨非苟又冒執事此賜爲華觀則是違溝壑之素叨焜燿之飾忘廢黜之後責襲官寵之前榮戾大易補過之訓犯中庸素位之戒無一可者也僕幸交於執事乆矣且積愛生妍積憎生醜古来共然别嫌明㣲先輩􅀁慎雖以李絳之賢亦有議其私於同年者矣自執事持憲江左于人無􅀁假於法無􅀁貸縉紳間咸稱誦㨿經秉􅀡無與左右比者夫激揚清濁與衆爲公執事豈以公法私一交友僕豈淂以交游故于執事公法雖執事諉曰吾以旌賢誰􅀎信之一牌坊之費四五十金計工二十人有奇一工計役三四旬則是二十餘人計役七八十旬有奇崇虚跡捐寔費無禆絲髪有損尋丈此僕爲􅁀殄已過矣己丑與第時曾隨例給牌坊直百金且僕旣有牌坊直矣又爲僕建牌坊是兩費也奈何使一人兩費有司凡此數事寔􅀁不敢當非敢匿心矯跡多爲枝辭以徼避讓之名重獲罪有道之門伏惟執事鑒亮命有司停止前事則幸甚理宜走謝面布悃衷坐病不􅀎謹以書致荅舒雲川巡按使節之蒞于南土也且訖事而還之朝矣鄙人之􅀁以伺候于左右者一未􅀎展而左右之􅀁以垂愛于不肖者顧數數有加焉旣不敢以草莽蹤跡溷擾公府念無可爲謝者其於盛德但知中心蔵之而已兹辱賜牌坊價五十金再拜感激益不自堪曩時郭徐諸公按于兹土亦嘗以此惠見及僕時尚􅀩恩在致仕之後然于諸公之惠亦未之敢當也今爲編氓則又異矣郭徐於鄙人同年也而左右乃以此施之於山野疎逖素未嘗交際之人此其爲厚施益過于諸公然使僕不敢當於致仕之先而顧敢當于編氓之後其爲凟尊者之賜益大矣此僕之􅀁甚不敢也謹告返於使人辱左右知愛之深當不以不恭爲罪耳請謝未期臨書不勝馳望伏惟亮之二執事之使於江南也輶車􅀁至風裁凛然順之心竊慕焉乆矣然不敢一拜下風者葢守編氓之分不敢自齒於縉紳往来之禮也側聞薦章猥及鄙陋顧某迂贛無􅀎人也硜硜自守雖僅不失繩墨豈敢謂有聖賢之志至於樗散抱病雖康濟一身猶且不足豈敢謂有經時之策而執事過采不虞之論未暇察其不肖遂以列於薦剡縱僕不自知愧其若左右知人何哉是以深用祗懼雖然左右之薦賢以爲國也而先於平生未嘗識面之人卽此舉動巳足以勵恬退之節而激貪競之士其􅀁以繋世風者不少矣顧僕非其人焉是無以成左右之盛美耳雖然不敢不勉也􅀁謂經時之策非山人􅀁敢出位以思然聖賢之學則嘗聞之於載籍而講之於師友之間矣尚當以山中餘日竭此駑鈍反躬克己以㳤諸其身而免於大不韙焉則􅀁以報荅知己者亦將於是乎在敢布鄙衷呉越密邇更容翹首再覩激揚之政如何如何與陳遜齋巡按某迂拙無似然至於慕德嚮賢之心未嘗不與人同而交際務施報尚往来之誼亦未嘗不與人同也自使節惠臨江南躬清苦之行以率先屬吏嚴激揚之政以整齊習俗某雖在山澤亦竊聞風而慕焉乆矣且使節莅敝邑兩辱垂問野人之廬而士夫間亦毎傳言執事以道義相愛因復自念僕未嘗一日淂奉教於左右而乃辱降意先施若此則又竊感且愧焉乆矣然則僕於執事不爲無􅀁嚮往而執事於僕不爲無􅀁下交矣其於􅀁謂慕義之心報施之禮皆宜奔走自効於左右而乃缺然至今焉者非甚疎狂當不若是故敢以鄙懷布於左右某被罪爲民人也諸公髙誼雖過以士禮相遇而固陋之私則不敢不以民禮自居編甿之役旣非􅀁以僣於縉紳之交稼穡之論亦非􅀁以參於政事之間是以八九年来其於公門未嘗敢一窺焉葢非敢自爲􅅯蹇誠不敢以凟尊者也草莽之不敢見孟子之􅀁謂不敢也且某多病早衰去冬復感隂寒遂成末疾兩足痿痺臥不􅀎􅁸䬃然摧朽已成廢人惟屏跡村莊少藉藥物支持是以執事之門旣未及躬候而執事枉顧又不及擁篲以迎葢坐此也然則僕於執事交際之禮旣拘於分之不敢自盡嚮往之殷又牽於病之􅀁不􅀎自致惟有捫心懐慙而已念無以自達於左右故敢以書上并以爲謝幸乗亮焉與賈太守書史生還獲聞􅁸居與徳政之詳甚慰素仰弟迂疎無似自屏居以来四方知舊絶不敢通書或有書見及則荅之而已以爲山林屏廢杜門省過之人其禮自宜如是且亦平生自守其固陋而不敢失者也今春偶有素不相識鄕人名孫伸者持兄書惠見及當時姑奉荅一書後或言此人先造贗書以誤左右之聽聞之不勝惶悚弟自己丑偕兄登第至今十餘年雖至親未嘗敢爲之請囑雖在敝郡縣諸公亦素不敢有一字相囑乃爲素不識面之人請囑于千里之外亦可笑矣且弟縱不才亦素知兄之剛正豈宜以私于之旣以自愧又以自訟豈平生心事不􅀎見于信此一鄕人􅀁以至此也若果有此煩兄􅀤其事治其人以爲作僞之戒并將原􅀁造􅎓書發下一覽感感荅李中谿御史兄之使閩也一年矣辱以書下問者數四矣而僕無一言之獻豈惟素性迂戇自度不􅀎然亦以兄之才力自足辨此耳旣又自惟以爲兄之才力固不待人然屢問而屢無一言焉是亦不免有負相知乃輾轉思之竟無􅀁得惟有一事可以少效悃而塞下問之勤者則言之適在此時然亦自度非迂則戇也惟兄亮之而已且夫撫按之􅁠舉劾最重百官之􅀁以勸懲公道之􅀁以開塞其繫於撫按舉劾亦最重然而今世􅀁謂舉劾者僕竊異焉僕嘗僃員郎署矣嘗得日聞邸報矣或曰今日某巡撫舉劾奏至矣僕不問而知之矣或曰今日某巡按舉劾奏至矣僕不問而知之矣何也其􅀁舉者可不問而知其必藩臬方面大官也其􅀁劾者可不問而知其必通判縣丞小官也其􅀁舉者可不問而知其必牽朋聯位不數十人不止也其􅀁劾者可不問而知其必􅄫乎寥乎纔三兩人也如此則是賢者盡大官而不賢者盡小官也則是賢者甚多而不賢者甚少也夫使賢者盡大官又使賢者甚多而不賢者甚少則宜其政平而訟理苞苴不行於上怨毒不結於下天下可以卧而帖帖矣而顧不􅀎然則是大官不􅀎盡賢與賢者不必甚多而不賢者不必甚少也大官不必盡賢而賢者不必甚多不賢者不必甚少則彼舉大而劾小者毋乃大官則足以樹恩而小官無傷於任怨也歟又毋乃勢弱者易凌而根固者難拔也歟而其􅀁舉􅀁劾之多與少又毋乃厚市恩而薄引怨也歟如此則人心奚而得勸懲公道奚而得不塞也雖然固亦有藩臬方面大官而不舉或及見劾者矣嘗駭而問其人焉則是非􅀎劾藩臬方面大官也亦非其人之果不賢也或負氣倔強不善曲媚者也不然則受人指嗾爲之快忿者也亦有通判縣丞小官而不劾或反見舉者矣嘗駭而問其人焉則非􅀎舉通判縣丞小官也亦非其人之果賢也或多援善鑚最有力者也不然則其親與故也如此則􅀁劾者縱非小官則必負氣倔强與為人快忿者也􅀁舉者縱非大官則必多援善鑚與親且故也然則人心又奚而得勸懲公道又奚而淂不塞也由此言之爲撫按者固不淂以􅀎舉人􅀎劾人爲榮而必舉劾之不稱爲可懼矣今兄之􅀁屬其爲方面大官者誰乎其爲州縣小官者誰乎僕山澤之人耳其姓名且不知也大官賢乎不賢乎小官賢乎不賢乎僕固不知也賢者多乎少乎不賢者多乎少乎僕固不知也而爲是多口者亦據素􅀁疑於人人者言之耳然以兄之志剛而識明秉正而嫉邪固必不同於人人矣必􅀎示勸懲而彰公道矣又何藉於僕之言乎然僕之爲是言於兄亦非欲兄之不舉大官不劾小官也非欲兄之􅀁舉必少而􅀁劾必多也大官果賢矣或矯而不舉亦私也賢者果多矣或避收恩之名而欲矯之以少舉不賢果少矣或沽澄清之譽而欲矯之以多劾者亦私也雖然竊以爲莫如精舉而愼劾則劾者固少而舉者固不得多矣或曰舉劾皆少則是善有隱而不彰惡有徽而不屏也是不然矣夫天下中人多而最賢最不賢者少也舉劾􅀁以出於常格以待最賢最不賢之人耳若夫小善小惡則固有考語矣又何慮善有不章而惡有不屏也故僕以爲莫如精舉而愼劾兄意何如一言之獻如是而已惟兄亮之與周約菴中丞論項守數辱惠書敎􅇂以􅀁不及深感知愛無量僕自去歲移家至陽羨與世利益疎濶此昔人􅀁謂􅂴與病相成雖僅守固陋不敢墜失至於讀書窮理冀有新淂則甚不䏻也其何以仰副明公教􅇂之勤耶知媿知愧兹啓僕友人有項喬者其人温雅純寔雖自處若謙退而其志常欲爲古人雖其貌樸野而其中寔耿耿然雖多臥病若不任事而蹇蹇奉職不肯一日尸乎其官僕於交游中知之景深而資其切磋之益亦最乆矣又自羅翁當國爲縉紳􅀁輻輳而永嘉之人根株附麗攫美官鼓聲勢者尤衆喬與羅翁又有葭莩之親乃獨泊然自守不亂於羣甘心隱約不覬非望然此士人居身之常不足以稱喬而喬之不茍大率可見也此不惟如僕輩與之素交游者􅀎知喬而士大夫亦多知喬者夫以僕素辱明公之知則固可以薦人而不爲僣以僕知喬之深則固可以薦之明公而不爲黨自喬在屬下二三年間僕不敢以一字稱喬於左右者豈復過避嫌疑使喬之名譽不通於上而歸明友之過於僕耶竊以爲明公精鑑近世希有又素以汲引人材爲心而喬之爲人必􅀎在處有􅀁樹立則眀公自將知喬而喬自足以受知於明公又何藉乎僕爲人媒也昨得邸報見明公薦三郡守獨不薦及喬則始撫然異之旣而思之何僕􅀁料之不中耶豈喬之失其故歩耶或喬之廉靖宜於郡署而不宜於郡守耶抑僕秪見喬前日之善而明公秪見喬今日之未善耶不然則或有間之者耶不然則以明公精鑑照物無遁而喬也日夕在左右而獨不得借餘光焉豈其命耶夫人情翻覆不常旬日異態固有慝情爲善而後或敗露者矣亦有始雖强於爲善而後不免改節者矣僕又何敢以四五年前所見過信故人耶雖然喬悃愊可信人也以喬之素􅀎蹇蹇奉職則其爲郡守不肯闒茸或可知也以喬之素不肯奔競則其在郡不肯自汚或可知也又未敢以過疑故人也雖然僕􅀁取信者明公之鑒也明公之黜喬而不舉必有􅀃也則是喬果可信者少而可疑者多耶果飾於前而壞於後也不然何爲其見黜於明公也耶明公非不憐材則是喬果敗露與改節也僕之心不􅀎解也使喬之賢而偶未見知於明公則僕固不敢黙矣使喬果不賢以自取戾焉亦宜一請教於明公而與之絶可也是以不量狂妄而有是􅀃焉伏惟亮而恕之幸甚與魏立峯憲司論吕提舉曩獲與兄同事吏曹且辱兄意氣相許顧奉别十四五年而不獲一晤又十四五年間不􅀎以一字通殷勤乃今輒有言於左右者亦恃兄之􅀎以意氣相信我也敝鄉人提舉吕朋以夷人事獲罪上官雖其一時踈虞或不􅀎免而其平生心事則固可亮東南風俗鮮識廉恥而朋自少獨刻苦植立勵一介之操又恬靜不妄干進惟其刻苦自立是以歴官十七年而家無一椽一壠之増惟其恬靜不求是以受旌薦者十餘而竟回翔乎州縣冗散之間此其平生心事信於鄉人而尤見信於鄙人父子間者也葢世俗􅀁謂矯激修飾之過則有之而謂其忍於自汙或未然也小心怕事之過則有之而謂其敢於賣法或未然也其􅀁以或致踈虞者則亦有說葢廉靜之士多短於才而周防曲慮似非朋之􅀁長耳夫網之以跡而不必信乎其心上官之􅀁以行法也在朋亦何辭之有矜其􅀁長而宥其􅀁短上官之􅀁以曲成也在朋亦或可以自雪矣此兩者皆在吾兄而已或曰吾兄則知朋矣如上官之不相信何夫秋厓公古道人也僕雖未識其人而知其爲人也吾兄古道人也古道如吾兄宜無不見信於秋厓公朋之區區清苦宜無不見信於吾兄然則矜下吏之長而貽上官曲成之美是在吾兄而已朋迍邅世途亦乆無宦情但惜其見幾不早而已去官居官無足論者以事關名節不得不一爲之白耳僕向僃員京師不􅀎稍引此人毎用以爲愧今其在難不得不一爲之白耳然亦昔人􅀁謂惟執事可以聞此言惟僕於執事可以此言進也不然則朋爲賄吏而僕亦爲受賄人囑罪者矣知我罪我亦惟兄而巳冒凟不任悚悚與葉東園御史王照磨還稍􅀎道兄初政所設施則已凛凛風裁矣而來書猶以未􅀎行一事爲􅀃葢昔人云施爲欲似千鈞努言其不輕發也兄之慎重不肯倉卒此幹大事者自宜如是耳然巡按體要本無瑣瑣其喫緊只在激揚一著而激揚大體亦不專在任滿舉劾一疏但隨􅀁巡厯明示好惡其愞熟承迎者雖善于集事而不加喜其􅀡抗悃愊者雖近于迂鈍而在􅀁恕其矯詭欺誕者雖在大吏而有􅀁必懲其忠實爲民者雖在小吏而無􅀁蔽葢虗己無我以臨之訪酌民言以盡之則風裁􅀁在自足以撥轉人心矣何如青州鎗手膽勇趫捷誠勁兵也居常固之以恩而齊之以軍律雖蹈湯火可矣但勞此兩人逺来甚艱苦前有書止之而不及也與徐少􅀄縣尹某罪􅀠之餘禮不宜復齒於縉紳交際之間是以毎逺引而去之竊以爲姓名不通於諸公乆矣兹又辱巡倉巡江二公之賜令人愧懷益不自勝欲作書辭謝又難于爲􅀃是以敢有􅀁請敎於執事也夫諸公之賜其名則幣帛果酒也而叩其實則白金也欲以辭幣帛果酒爲說則悖于其實欲以辭銀爲􅀃則悖于其名是以措詞之難也古者禮存乎幣帛之先後世以幣帛爲禮此其實則旣亡矣而其名尚存也若夫市道之交則錢貨而巳矣雖然如公古道君子也如諸公古道君子也豈不欲行古之道而以市道歟豈以爲若某輩人者其好潔操行之心不􅀎勝其嗜利無恥之心故幣帛虚名也金錢寔利也而特以此厚之歟不然其特以此愧之歟頑鄙之人可以省矣是諸公之􅀁以廉頑也某罪􅀠也賜之幣帛不敢當賜之金錢不敢當豈其􅀎自處以廉乎葢古之􅀁謂不敢也然而爲嘵嘵者竊懼名寔之亂也公古道君子必且有以敎我矣某山野鄙人于當道諸公辱顧不敢荅辱賜不敢拜非以爲簡也禮不敢也荅與拜旣不敢不荅不拜又鄙心􅀁甚不自安也向曾奉凟乞命吏人于鄉官掲帖中除去賤名以安編氓之分豈未蒙亮察耶恃在知愛乞如前􅀁凟則上官可以不知鄙人姓名而交際之間可以冺然無跡矣附凟二讀清獄申文深知仁人之用心至悉謹篋而藏之以告後之君子以延長者之惠于無窮也更承示區處牌坊銀事往時􅀁辭諸牌坊銀只爲未有􅀁處遂至乆而不知􅀁用之矣今用以修理書院不惟此銀淂有􅀁著落且于風教有補焉甚善甚善但中問稱奬鄙人太過讀之且甚自愧也某嘗以爲今日吾輩之病太率在於寔行未修而虚名先著閫域不務而門面是張是以書院講學一節多爲具文而非彼此感應之真機而其志之不相同者則遂指擿以爲口實誠􅀁謂吾黨有過焉者也况如僕者極疎且陋何敢當此乞于申文中自見今買莊一􅀁以下至僦􅂳以居數句及固以禮敦請講學一句敢勞削去是􅀁以免僕于名浮之恥而亦左右相愛以徳之素心也幸亮之荅符松巖郡守讀沃洲公論􅂳隻事綜理精密最是得策更賴公潤色而行之可以無遺黠蒐慝矣曩曾請敎地圖一節此法可以檢田畝可以聯伍保助守望可以知險易障塞水陸􅁭喉之􅀁在昔人􅀁謂視都知野知國可乎據而知焉者也然明公亦旣行之矣更望于田畝多寡地理險易􅁭喉處再加詳註而明公自精核之不得只憑里胥之文具而已更望明公于政事之暇時往一二緊要村落特省農功而因以親驗其肥瘠險易與圖相叅若此法立得有下落則自此以後興徭作賦設僃追胥不知省却幾多氣力絶却幾多􅁦端然此惟明公之實心爲民與明公之精力􅀎行之故僕敢以爲􅀃不然則徒作一畨騷擾而後日竟委之故􅁓無用也昨承教以因革之􅀃當時草草泛及他事未及悉心以請此事不嫌于遲遲熟思審處在明公必􅀎爲百姓長乆之慮不徒以一時興利去􅁦爲功容日更聞緒論也前􅀁興革已陳于沃洲公者及備邊疏中論兵民事皆䝉賜敎幸幸與吕沃洲巡按别乆瞻望甚勞毎苦俗套拘人不􅀎一棹於婁江虎丘之間與兄相傾倒也悵悵東南州郡連歳旱災即今苗未盡稿遇雨之吉尚有可望倘更三數日不雨則數十萬生靈未知死􅀁山人亦不免於焦枯是懼不知天心仁愛竟何如也前年大祲尚賴滄源公與吾兄勤恤民隱不遺餘力而有司務於仰承兩公德意蠲租賑粟是以百姓幸有孑遺焉然莩死疫死亦旣不忍言矣惟今年事勢又異往時何者閭閻積連嵗之飢則一歳艱於一歲矣官􅅒捐連歲之賑則一歲空於一歲矣葢承兩年大飢之後而又飢焉故據今年分數雖止是一年之飢其實一年併受三年之飢也其爲事勢難易可知况兩公一時代去又若故奪之􅀁恃賴然者夫粟不必其盈於倉而有􅀁可轉錢不必其盈於帑而有􅀁可通此其便宜之權惟撫按則然亦惟撫按有真寔爲民之心者乃􅀎操其便宜之權以御其變而使不至於窮若夫有司則雖憫雨恤災儘力周旋顧其力能行於法守之􅀁及而不􅀎行於法守之􅀁不及􅀎爲於官民之藏之􅀁有餘而不􅀎爲於官民之藏之􅀁不足若使官民盡匱固亦無如之何俗􅀁謂好媳婦做不得没米不飥也雖然官民之匱憂之誠是也至於憂兩公之將代則竊自笑以爲過矣兩公者一日居乎其位一日心乎其民者也去之日如始至者也計兩公代期尚旬月有餘以旬月盡瘁之精力而全活東南數十萬溝壑之命兩公豈憚爲之自古救荒無奇策亦無多􅀃只是措錢米一法耳誠得兩公以旬月盡瘁之精力從事其間隱度於公私之用而均平其斂散之宜至於粟不必於倉而有􅀁可轉錢不必於帑而有􅀁可通諸如此􅀋可專行也速行之不可專行也速請之則前之􅀁憂官民盡匱者亦可以化而爲豐也不難矣曩時􅀁奉救荒條例併東湖撫公奏疏中間區處錢米事頗具當時以麥熟無􅀁用之不知今有可採而行者否有可采而陳請者否或可因兄以達於滄源公採而行之與採而陳請之否聞南都倉粟其羡至四百萬以上可勾十年之支而有餘滄源公去歲􅀁奏平糴一法此軍民公私凶豐兼利之術奈何當事者議論不同遂使滄源公美意不竟然此法終不可罷也不知滄源公再􅀎以此意陳請否繼滄源公撫巡者又􅀎以此意陳請否願兄力賛之近聞之一戸部長官言此法有三利云云其􅀃可謂曲盡縱使諸郡盡荒但得京倉糶粟三數十萬石分散諸郡諸郡毎發官帑銀萬兩爲糴本輸之京倉則可得米二萬石平歲人食米一升凶嵗則减之是二萬石者二三萬人百日之命也是官帑不過出銀萬兩而續二三萬人百日之命以待来歳之熟也三數十萬石者五六十萬人百日之命也京倉糶粟三十萬石而得銀十五萬兩是國家不過錢米互換之間實未嘗費斗糧損一錢而賜五六十餘萬人百日之命以待来歳之熟也其爲利害較然可知其議論不同者不過以苟有緩急京儲缺之爲􅀃耳夫糶三數十萬石之米於四百餘萬石羨餘之中特十餘分之一耳且今江東雖災而江西湖廣頗聞豐熟則京倉歳額本色之入固將源源而来矣豈預憂十年之後之不足而輟旦夕之􅀁必救哉故願兄之力賛其􅀃而佐為之請也至於有司􅀁請逺糴一節葢慮異日榖旣不登而遠商又不来則雖積錢盈篋坐而待斃矣故救荒惟是預處錢粟而變錢爲粟尤是先事預處之善者也計吾兄亦已聞而可之矣雖然此皆人力之可爲者也若使皇天果無悔禍之期雨澤終不可冀則人力必有􅀁不及而地方意外之變亦不可不先圖願兄更以旬月盡瘁之精力且徧巡諸郡間延見吏民身親其利害而曲爲之處且使車一臨視數十􅁓文書􅇂促爲益多矣兄其圖之荅曹巡鹽僕迂疎固陋之士也惟山澤屏跡則其所宜不謂過辱左右之知未及傾葢而先惠以教音勤之以下問此古者觀風之使不憚身先施之巖壑自養之士則可矣顧僕豈其人哉雖然由是足以知左右之急於奬善不暇擇乎其人切於好問故不睱擇乎其言也竊奉下風感慰感慰今呉粤薦饉村墟之間鷄狗無聲草根樹皮亦憂其不繼矣流莩露胔􅀁在如積天心仁愛不知竟何以善其後伏惟左右雖不在撫巡之責而同於觀風之任者也君子一體萬物固不論於職守之􅀁及與􅀁不及也而况在觀風之任哉幸而今之司國計者􅇂率守令力舉荒政以全活溝中之􅇤葢不徒阜財足課通惠恤竈爲於職守之􅀁及而孜孜體綏瘦人湲計國家根本之慮以爲職守之􅀁不及以盡吾一體之心固知左右之有意乆矣辱厚意之殷敢布愚悃與李龍岡邑令歳凶民莩賢侯爲之心惻而百方圖之者深矣輕齎一􅀃向巳面白兹復具之於書以爲可以佐百姓之急而禆萬一於賢侯百方之圖則不敢以出位為嫌也竊惟國家之賦其水旱可得而减免者兊運以外之數也雖水旱必不可得而减免者兊運以内之數也水旱不可以不恤而兊運又必不可减免於是有輕齎之法葢米自江南而輸於京師率二三石而致一石則是國有一石之入而民有二三石之輸若是以銀折米則是民止須一石之輸而國巳不失一石之入其在國也以米而易銀一石猶一石也於故額一無􅀁損其在民也以輕而易重今之輸一石者昔之輸二三石者也於故額則大有􅀁减矣國家立爲此法蓋於不可减免之中而寓可以通融之意不必制其正賦之盈縮而但制其脚價之有無不必裁之以豊凶之斂散而但裁之以本折之低昻一無損於國而萬有利於民此其法之盡善而可乆者也以武進一縣言之歳該儧運米五萬四千五百八十一石三斗四合此其入於國之正額也本色正耗水脚平米七萬九千六百八十三石七斗三合八勺四抄折色銀九千一百五十一兩四錢六分五􅁵五毫二絲此其費於民之羡數也若以銀而權米石以􅀡五錢爲率米七萬九千六百八十三石有奇爲銀四萬九千八百四十兩有奇與折色銀共五萬八千九百兩有奇若得從輕齎之例石折銀五錢計銀二萬七千二百兩有奇而足縱使加折至於六錢七錢計三萭七千八百兩有奇而足則是民每歳出五萬八千九百兩有奇之中而今出其三萬七千餘兩之數以不失國家之定額而實私其二萬餘之羡以自潤也夫五錢者江南之平價也七錢者折色之極則也若使江南米貴自五錢以上而䝉恩折色或减至七錢以下則其􅀁私之羡固當倍之且蓯矣倍之爲四萬則是十萬人凶年一月之食也則是國家不出一粟不費一錢而爲凶年十萬人續一月之命也爲民父母者何憚而不以告乎司國計者亦何靳而不爲乎且夫國家漕運四百萬石之中固嘗定有輕齎四十萬石以待四方之以水旱來告者矣葢其歳之凶與否與歲凶􅀁在之地不可知而􅀁謂輕齎歳四十萬之額以待四方之以水旱来告者將安用之況自古經費其本折之權率視緩急而爲之操縱今國家􅀁以逺輸於江南不憚二三石而致一石者正以江南米賤而京師米貴耳近聞京師之米直自七錢而减至四錢而江南米􅀡自七錢而增至九錢其爲貴賤特異常時則是江南以二三石致一石而又不當一石之用也今若取銀於江南而用銀以給京軍之當給米者江南無逺輸之費京軍無賤糶之困此正今日之便宜耳然則非惟無損於國葢深有利於國而得乎操縱緩急之權者也夫損國以益民猶且爲之國家發内帑以賑災者往往有之矣又況無損於國而有利於民而又況國與民並受其利者乎此事在不疑而必可行者也爲民父母者何憚而不以告乎司國計者何􅀁靳而不爲乎嘉靖十數年間江南屢告災國家亦屢嘗以輕齎與之此其近例試求之故籍可覆案也查得嘉靖十四年蘇松等處災傷巡撫侯都御史等奏戸部覆准除蠲免外兊運四百萬石内准折銀糧一百五十萬石兊運米毎石折銀七錢改兊米毎石折銀六錢其被災尤重者量准十萬石扵臨德二倉支運毎石止徴脚價銀一錢五分自此而上嘉靖十二年折兊一百萬石十年折兊二百一十萬石八年折兊一百七十萬八千石無歲不有災傷則無歲不有折兊此其因災傷而折兊者常例也又伏讀嘉靖九年詔書兊運米以十分爲率量准五分是時常州一府該淂折兊八萬一千石此其不因災傷而折兊者例外之恩也由此言之葢有因災傷而行支運以大寛民力者矣未有災傷而不行折兊以重困吾民者也葢有不因災傷而折兊以廣例外之恩者矣未有災傷而不行折兊以嗇於例外之恩者也此祖宗之良法美政聖天子之深恩厚澤於豐時足國之中而寓救災恤患之至意雖旱乾水溢而民免爲溝中瘠者誠戴聖澤之厚於無窮也與徐養齋向承敎以􅀁不及深感道義之愛皦皦嶢嶢昔人有明戒矣敢不奉教以求進於若虗若愚之學也伏聞位晉司徒足占泰道之亨矣周時敷五典擾兆民故事可復見於今乎斯民無禄連歳凶飢自冬徂春溝中之􅇤在在有之毎一郊行露骴滿目爲之不􅀎下食幸賴撫巡諸公郡縣有司薄征散積悉力其間不然民其無孑遺矣乎今幸及麥秋可以續食然連朝霧雨二麥之腐壞者又幾半矣去歲緩征之額若欲於麥内取盈則恐民不堪命奈何且二麥無收之處雖征之亦何􅀁出而其薄有􅀁收之虎彼方圖救目前之飢猶且不足而尚有餘粒􅀎補其去年之逋竊恐鞭笞日用而故額未必􅀎足則是昔日緩征之惠乃爲今日急征之困也非不知上供之定數必不可缺但得稍遲數月併於秋糧内帶徵則有司省却一畨催科閭閻省却一畨煩擾在國計一無􅀁損在民力亦無不堪而巡公孜孜愛飬救災恤患之盛心於是爲有始有終矣此其事只在數月早晚之間耳非有損上益下之難也僕僻處山林未嘗獲奉敎於撫公是以不敢徑以書達而以聞於執事且此固百姓之公言也惟明公亮之與人論旱荒蘇松常鎮並爲鄰郡而地利之髙下水勢之淺深迥然不同或遇水荒則蘇松特甚而常鎮尚可或遇旱荒則常鎮爲劇而蘇松得利試以運河測之則常州水止尺許而蘇松尚有至于丈餘者此其地利水􅀔顯然可見恐明公以爲蘇松未嘗告荒而常州獨若嘵嘵然者不以民之僥倖于免税則以爲有司之私于其民而其實旱與不旱有不同也是以蘇松荒而得常州以相􅀘常州荒而得蘇松以相補民實國稅兩相消息造化者亦有裁成之意云耳與吕沃洲巡按同心之誼悵然逺别以兄之不􅀎忘情于僕亦知僕之不􅀎忘情于兄也江臯逺送尚有瞻望弗及之感趨而避之豈人情哉顧事體有􅀁不可者僕自兩度廢罷歸来前此巡公如趙舒周諸公皆未嘗有一面之識雖同年如徐何陳諸公亦未之敢見豈特狷狹之性以此自守兼亦山澤之分不敢踰越且省事省勞亦病夫之􅀁便至於吾兄則有不然平日於兄旣辱道義兄弟之愛而兄之来也又以同心之故拳拳相求僕亦欲如故事引避深覺於情有甚不自安者然初意止謂一見可矣繼而再見三見四見焉日不足而繼之以夜焉然在兄無私於故人之譏在僕無奔走形勢之嫌􅀁恃者平生􅀁自守􅀎自信而巳矣好事者不疑其干請被罪者不猜其毀言􅀁恃者平生􅀁自守􅀎自信而已矣􅀁謂惟吾與兄可也夫兄行部之日旣巳破格相與矣而兄去部之日乃獨不􅀎破格相送哉􅀁謂事體有􅀁不可者何也正恐見之者以爲僕之與兄綢繆若此也不知出於故舊必不容己之情而槩以爲山人􅀁以事上官之常禮則送故者必不可以不迎新新故相仍息肩何日若夫一賢一否則昔人􅀁謂爲罪滋大者也欲稍自息機以返初服不得不自兄始之矣近龍溪相過與之盤桓山中數日别去已訂他年之約若兄有便還山則奉教之日長在今日且割逺别之情以爲山人自便之圖其亦可也荅施武陵方田一法不難於量田而最難於覈田葢田有肥瘠難以一槩論畝須於未丈量之前先覈一縣之田定爲三等必得其實然後丈量乃可用折算法定畝如周禮一易之田家百畆再易家二百畝三易家三百畝此爲定畝􅁸賦之準亦嘗觀國初折畝定稅之法腴鄉田必窄瘠鄕田必寛亦甚得古意今兹不先核田便行丈量則腴鄉之重則必减瘠鄉之輕則必加非均平之道也量田之難全在乎此至於丈量法其簡易者具之九章算法中須兄自明此意乃可付之下人為之庶無􅁦也痛楚中略具梗㮣奉荅華生􅀁刻書則兄已見之如更查得有書容續奉耳與鄭戸部執事此行國儲民命繫焉伏聞下車以来仁風􅀁宣里閭相慶益自来􅇂賦之使多以徵斂裒聚爲功而執事獨以寛大行之是以始及下車而應感已若此矣變産一節其利病更僕未易數也大率奸民始初莫不上耗國儲下蝕良民以肥其身及其敗露至勤冠葢逺出猶或憑奸民之攀扯而逼迫良民代爲之償則是國家懲奸之法未及行於親手欺盜之人而推膚剥髓鬻妻賣子之苦已波毒於窮簷無告之小民矣是奸民重得志而良民重受困也執事仁人也必自有以處此山澤鄙人出位妄言并希亮之與王北厓郡守東南州郡侈靡日長而虚耗亦日甚譬如病火之人頺色澤然而血􅂔槁矣吾北厓以古人之節淸化源以古人之政撫罷甿朞月則旣效矣惟率是道而終始之則百姓之福而區區野人之望也催逋部使者且至僕自生長草莱僃見變産之害濫及無辜小民毒痛不忍言北厔仁人也必將有以處之夫素嘗侵欺之姧籍其貲可也孥而繫累之可也重戮以懲衆可也小民何罪焉而代爲之償乎名曰變産實逼而奪之耳雖然昔人固有言矣成於自同而敗於自異部使者方以括財爲功而守令欲以民瘼爲事則勢固不同也於是處之爲難惟執事悉心以慮之多方以圖之國與民兩無憾矣林鎮江先生亦好古君子也變産之􅀃執事幸不見謂迂濶則可與林鎮江共論之葢此非一人之私言也卷子索書鄙作僕於詩夲不工自稍知問學以来頗欲收斂精神會性情之實是以經年不復從亊於此然恐重違吾丈之意當書舊作數首送上也讀衡山先生文字可以補鄙人疎漏之過矣謹謝教謹謝教六經之學邇年来稍嘗究心焉而苦未之有得也欲觀西原公􅀁著甚勤便中幸速之奉敎未期臨書但有馳情荅王北厓郡守論均徭執事􅀁病於均徭舊法之不可行者其說大槩有五大戸之詭寄也奸猾之那移也花分也賄買也官戸之濫免也大户之詭􅀉􅁸於官戸之濫免則此二􅁦者其實一弊也夫濫免詭􅀉之􅁦謂某官例得免田千畞而自有田萬畞或自無田而受詭􅀉田萬畞則散萬畝於十甲而歲免千畝實則萬畝皆不當差也其􅀃是矣雖然其以萬畝而散之各甲以歲歲倖免千畝者必非田甲皆是本官真名與皆注本官者也必將田甲詭爲之名也使其甲甲皆是本官真名而不詭爲之名則一人而十甲其爲奸固易破矣若必是一甲爲真名而諸甲詭爲之名遇其真名與注官之甲則免其非真名與注官之甲不淂免即十年亦止免一年耳安得歳歲倖免也不然均徭冊外别置一冊注每嵗􅀁嘗蠲免之數如某官例免田千畝而一甲内已免過田七八百畝縱或二甲三甲有田許撞足例免之數數外則役如此則雖甲甲免歲歲免亦止得一甲一歳該免之數又安得以千畝影免萬畝也此法在一彊察吏執之雖真是官戸之田亦不得覬額外溫免況詭􅀉乎至於移甲之􅁦則執事􅀁謂只據黄冊或十叚冊足以革矣而又病於黄冊與十叚冊之不可據者則固以爲與毎歲推收之法相礙也夫毎歲推收宜於賦不宜於役十年定冊宜於役不宜於賦役主戸賦主田賦則隨田流轉役則依戸擬注是以賦法則旣準之每歲旋造之徵冊􅀁以便民之灌輸役法則宜準之十年併造之黄冊􅀁以便官之􅀧差即此兩法本不相綰而執事又疑於據定冊編差或有田旣賣而差仍累者則編差之際其人必且自言於官曰吾田巳賣之某人而某人宜頂吾差于是官爲之按其實而以某人頂某人差如此則是以虚名編差者故賣主也以實力頂差者新買主也故賣主以虚名編差可以無亂乎定差之籍新買主以實力頂差可以無累乎鬻田之人且夫役法上下其戸以差其甲之錢聚則稍重而散則稍輕花分者尺可花分子户以移稍重而就稍輕其實不得花分􅀑名以移絶有而就絶無也且十年輪編不􅀎禁人之花分而一年一編又安􅀎使人必不花分欲使人必不花分則在嚴之於攅籍之始而非􅀁以較於編差之際也賄買一􅀃曩時輪歲編差則豪民以賄避力差而請銀差今時歲歲編差則豪民以賄避差頭而請貼戸曩時輪歲編差則户胥之家一年而集一甲豪民之金今時歲歲編差則户胥之家一年而集一縣豪民之金大抵論詭􅀉賄買兩􅁦則繫乎令長之彊察與否不繫乎輪年與不輪年也論花分移甲兩􅁦則繋乎冊籍之精核與否不繫乎輪年與不輪年也法無全利亦無全害以輪年一編爲全害乎而可使小民一歲忍苦出錢九歲晏然坐食以一年一編爲全利乎縱可以盡革詭􅀉賄買花分移甲之􅁦而不􅀎不使窮僻小民歲歲裏糧集錢奔走城郭此其利病亦自相凖古有之利不百不變法先時有司激於官戸豪家之暗損小民然却不就舊法中調停裒益而驟變之以收一切之效以爲此足以裁損官戸豪民而巳不知小民亦竟受其病今之萬口訿訿喧然稱不便者未必盡岀於官戸豪民而往往多出於窮僻困阨之小民矣請試言小民之􅀁最不便者大槩亦有數􅀃且如一邑丁田以十分為率往時一歲編審一分其爲數則狹令長耳目差易徧持籌而算之差易辦縱有􅁦焉而差易以察今一歲盡審十分則其爲數頓濶於往時十倍令長一人耳目籌算􅀁缺漏處必益多耳目籌算缺漏益多則戸書里胥之權益以重奸民益得以輸金於權之􅀁重以爲規避小民無金可輸則歲受苦役益無􅀁訴而長令則益不􅀎覺察若此者非曩之長令多精彊而後之長令多鶻突也其繁簡濶狹之勢寔然而執事乃謂輪年則胥猾多得售奸不輪年則胥猾多不得售奸豈别有􅀃耶不然何其與吾􅀁聞異耶又如一力差約銀十兩爲率往時十年一編正戸約銀五兩貼戸約銀五兩則貼戸五而足矣人數旣寡故其裒而斂之也不難今一年一編則曩率出銀一兩者今减而出十分兩之一曩用貼戸五者今必増而用貼戸之爲五者十人數旣廣其勢必散有差頭終歲物色尚不􅀎徧識貼戸之門者何况􅀎盡斂其錢是以往時􅀁病正戸饕餮貼戸今時􅀁病貼戸耗損正戸小民不幸􅀍點正戸則破家矣若此者非曩時之正戸皆彊梁而今之正戸皆愞弱也其聚散零總之勢亦必至此而不足怪又如銀差曩之法歲總納銀一兩則今之法歲零納銀一錢納多者其倍稱之數稍輕納少者其倍稱之數必重納一兩縱倍之三兩而奇足以納矣納一錢非倍之四錢五錢或至八九錢不足以納也此其總納則費固輕而零納則費固重也不獨如是而巳以一兩總納之一年則是爲一兩之銀一遍赴官守候交納一遍往來盤費設或交納不時公人一遍下鄕需索而巳今以一兩而散納之十年則是爲一錢之銀亦一遍赴官守候交納一遍往来盤費設或交納不時公人亦一遍下鄕需索是今日一錢之累並不减於一兩而曩日一年之累乃浸淫於十年其爲便耶其爲不便耶其最不便者其爲坊郭之豪民耶其爲窮僻之細民耶此其爲病不可枚舉恐不特如執事􅀁謂似渉騷擾而已也則今法之當變理在不疑秋粮帶徵又􅀃旣格於復除之無定數而不可行矣惟用十叚冊法則可以革詭􅀉移甲諸􅁦而無一歲一役之擾然執事因黄冊之不可行而疑於十叚冊之不可行者則亦有􅀃夫黃冊之不可行者黃冊之法敝也黃冊之法敝而邑之丁與田大半不登焉故十叚冊者爲之括其欺隱以補黃冊之不及以均平力征而巳使黃冊果無􅁦乎則徑用黃冊編差可也使黄冊不􅀎無􅁦乎則爲之十叚冊以補黃冊之不及而編差焉可也因黃冊之不可行而併疑於十叚冊之不可行則過也執事又謂常州賦稍輕蘇州賦稍重則其法不可畫一故常州自宜從舊法蘇州自宜從新法夫賦自重輕而人情之好逸厭煩好省厭費則胡人度之越人固有不甚相逺執事其試察之竊恐蘇之民之情不甚逺乎常之民之情而法之可行於常者未必不可行於蘇也二別兄甚乆耿耿提學公且至荆溪兄以提調當来可得一面晤也均徭法曩時􅀁欲言於兄者不過只是一兩言葢慮兄以新法爲甚便民也今讀来教則兄已深知其不便而有意於革之也乆矣大率十年一役雖極重亦甘心一年一役雖極輕亦不願此人之大情而新舊兩法之利病可以一兩言盡之者曾聞人言胡虜愚蠢只怕鞭朴更不怕殺葢零零星星痛苦難忍也此言雖可笑然亦可以喻人情矣少時嘗讀衍義􅀘論均徭負米之喻亦深以其􅀃爲然及今日下老實行之乃見其害益知書生坐談眞不可便以經世而差顧兩法在宋時亦甚紛然司馬公力主變顧爲差而有識者亦甚病其講之不詳則以爲司馬公少厯州縣之日淺也僕屏居草莽于民􅀁便􅀁不便則稍知之而稍􅀎言之至於􅀁以爲之區處寔以生平未嘗親在裏邊經厯雖以爲常之民曾享十叚冊之利而其中委曲尚未􅀎悉知又何以爲蘇人謀也承兄下問草率奉對真似乎強其􅀁不知矣􅀼惟賦役之最煩而敝最多者無如蘇州牧守有懇惻爲民之心者無如兄沉潜善思精於處事者無如兄必􅀎别出良法使新病故病一切掃去以幸蘇之人於百千年也是在心誠求之而巳豈待書生坐談如僕者之賛之也哉僕自稍渉世事乃知凡百變更之際極是難事即如曩時有司變十年均徭爲一年本是愛民眞心而講之不詳則其􅁦巳效於今日矣今欲變一年爲十年而講之不詳又焉知不貽後日無窮之敝哉兄之遲遲其間不肯輕變極是不爲而後可以有爲大易􅀁以致戒致慎於革也雖然革非得巳也昔荆公論顧役以爲此法終不可罷僕亦以爲一年均徭此法必不可不變顧其􅀃如此耳至於利病之詳區處之宜則老吏積年總書中有知此者兄試虚心問之勿以其素曾作􅁦之人而拒之耆民中有知此者兄試虚心問之勿以其山野倨侮而忽之士大夫中有知此者兄試虚心問之勿以其必爲一身一家之私􅀃而先意逆之多方訪求再三斟酌使無一不宜乎人情而無一人不得盡其情則變之可通通之可乆矣曩者敝郡更法時葢應君爲之守應君志在民者也其􅀁更賦法最爲精善可以百年無敝但役法則今日便不可行耳此二法雖同是一時事亦同在一書冊中而利病相懸兩不相掩或因其役法而幷訾其賦法或因其賦法之不可變而併謂其役法亦不可變皆偏辭也蘇郡其亦然乎聞部司文書􅇂逋甚急則楊給事之􅀃不行矣又累賢使者區畫奈何奈何荅蔡可泉判官白下本非有約顧奉清論同寢食者數日若大洞旣有約矣謂必得奉清論同寢食如白下也乃竟爾茫然人事之不可料者如此然兄旣絆於領簿不􅀎来而僕江湖散漫之人宜可乘興一至大洞且淂逕造府下又以家君至家日侍定省莫遂兹懷乃知名山勝遊非特牽纓者常不􅀎兼雖江湖漫散如僕者亦若有􅀁繫而不可必遂矣奈何伏惟吾兄純明温粹篤於向道以此爲政必􅀎近人然僕竊有願言於兄者大凡年少髙志之人於事未必僃嘗故或病於疎文藻雅逸之士多不奈煩至以簿書獄訟爲溷䙝故或病於華而無實而謫官遷客縱不怨尤又往往以簡曠不事事爲得體故或病于惰窳而苟禄此三事雖號爲賢士大夫者或不􅀎免也以兄之篤於嚮道自然不墮落此􅁦然僕􅀁望於兄亦惟兄不使毫髪有􅀋於此而巳若使此處縝密即是學問縝密一有脫漏即是學問脫漏不當舍此更言學問也大學曰心誠求之孔子曰無勌惟兄留意焉僕自少隱居亦嘗痛百姓疾苦欲援手焉而惜無路也以爲他日苟幸從薄宦庶幾得一社一民以自效雖才器駑鈍亦庶幾興􅁸一兩事利人者除去一兩事病人者以少償􅀁願焉及竊禄干朝浮沉郎署數年竟不􅀎一獲素心雖巳罷官閒居猶用此爲歉兄初亦署郎也不謫則不爲此官矣是僕昔􅀁冀而不得者兄今得之兄之志豈與僕異耶則今日之謫固天􅀁以拓兄之才成兄之志而試之實效也僕竊爲兄幸之廣德之民以黠悍著聞乆矣昔時治廣徳者患其然也則必峻刑法以繩焉民見上刑法之峻也則益出於悍黠以求必避是以至於上下相賊刑罰益以峻而􅃛悍益不可勝曾不知君子長者雖無一時操切之效然毎每􅀎使人回心而率化乃知漢史馭惡馬者利其銜勒之􅀃爲未然而蘇洵以齊魯待蜀人之􅀃益可信也兄意云何或􅀎了大洞之約悉意請教當在此時故不盡言兄其亮之與呉峻伯縣尹前使者冒進瞽言自分必且見絶於吾友矣適會陳戸曹道及吾友欲相顧是吾友舊愛之深不遽以瞽言爲辠也即令人往􅀱使節於白氏則巳行矣悵惘竊惟論治者先體故按􅇂之體異乎州縣風憲之職異乎拊循而州縣之􅀁以拊循其民惟其平易豈弟大小畢輸其情使民之入公門者如入乎其家見守令者如見其父母是之爲貴耳使民見威而不見徳敢怨而不敢言則雖一時或䏻收整頓撡切之效而其􅀁斵喪者多矣書髙明柔克可省也向孫文卿在江隂嘗過僕僕問之曰兄素講學學問不是空談即如大學論平天下如保赤子此便是真心便是明明徳兄試自省百姓到面前時可與自家兒子一般文􅀸應曰此意却似有之僕當時不以爲然曰兄得無太容易􅀃了乆之詢其􅀁以蒞民果無甚愧乎其言僕是以心慕而敬焉文􅀸方於事上而圎於撫下是以雖或惡而謗之而不勝其愛而譽之者之多也眼中亦曾見一人爲江隂使百姓膝行而前俯伏戰慄不敢仰視此輩者何足多哉吾友清才雅志僕何用喋喋若此但桑克之􅀃爲髙明者發耳傳曰善人受盡言僕素以豪傑望吾友豈獨善人已也相念甚勤未知使節何時更入郡耳懸懸素不遣人持書入府縣中今特遣此以謝兩次不淂相見之故且恃吾友之知我也此後有持名到貴治者必僞無疑預言之與金攝山縣尹金入於大冶數經火力愈鍜鍊則愈精純而授新馬於舊牧之圉試其熟技則人與馬益相習雖然其雜金固有一火焉則耗者矣其牧馬如東野之御固有始則善而乆則馬逸焉者矣攝山之凛坎於世也是金之數經於火也其再令於章丘也是再牧馬也吾見攝山之愈進於精純而章丘之民與攝山益相習也雖然不可以不兢兢也使乆而益精也而無耗焉乆而益相習也而無逸焉而後知攝山之果爲良金與良牧也近得李中麓書言章丘凋􅁦甚須淂良吏拊循極有望於攝山僕以為在攝山舉定海之故亊行之益加之意而已至於馬因地異性人因地異習銜勒有緩急飼秣有燥濕不窮其力不失其性則在善牧者虚心而調劑之僕又何言哉重刋荆川先生文集卷之九
