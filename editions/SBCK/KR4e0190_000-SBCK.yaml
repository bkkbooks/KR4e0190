front:
  text: 重刋挍正唐荆川文集序吴之有文學舊矣諸樊為國㫁髮之治未變盖方甚陋而公子札已能盡通易詩書禮樂六藝之文以􅀚扵中國則名卿碩士有愧扵其所知悦其説之博雅而慕之如不及孔子教扵洙泗来四方之學者則言􅅯踰江蹈淮而徃㳺焉辛以文學列扵大賢之科南方之精華為之盡發而孔氏之道資其言之有文以行扵逺至于今為烈盖其盛如此畫長江大湖以為國方地千餘里林麓川澤之美殆不可如而光英冲粹之􅀁漸涵磅礴於其问二人而已雖其甚盛而亦豈非難㢤吾扵二人讀其書觀其言尚而友之而庶幾知其人扵今所見而及与之為友又淂一人馬毗陵唐􅀿德也君扵學盖所謂得其精華其扵言可謂有文而必行扵逺者也其文具在學者苟讀焉而思思焉而有以得之則知其心之所通扵季札孰為淺深言之所成扵子游孰為先後有不可得而辨者矣君仕为翰林編修復為太子司諫皆以守道直已之志棄去不啻弊蓰有吴公子輕千乗之國之節其文之以禮樂得言氏之􅀓而廉隅操行必謹扵一介之取予剛果自㫁不可以威武利禄誘屈也尤足以闢夫媮懦憚事無廉耻而嗜飲食之誚上下二千餘歳之間吾謂吴有文學三人焉不為過也季扎之生其國雖尚陋然先君端委之遗教猶存而子游得仲尼為之依㱕其成此非難也唐君獨起扵千載之後追二人者而与之並豈不為尤難㢤君行年四十其學􅀅進而不止其為文􅀅日益冨而且精予之􅀁見如此巳可傳也無錫安君如石子介慕君之學得其􅀁為詩文彚而刻之以與同好者共安君之趣尚如此豈凡人之􅀁及㢤嘉靖巳酉冬十月望􅀳江遵巖居士王慎中思甫序
