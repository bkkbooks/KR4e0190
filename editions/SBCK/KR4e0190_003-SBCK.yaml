front:
  text: 重刋荆川先生文集卷之三詩
  hash: sha256:54c1e5f70c7b6d5282fb70542ecfc41b346675806102e898685c11c346433a82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_003-1a}
body:
  text: 病中秋思八首閒對江楓誦楚騷病容秋色偶相遭一身萎薾同衰葉􅀟􅁂稀踈似毨毛衣冠巳禠甘牛馬文字終􅂢是粕糟但使盡空諸所有不妨一醉笑如陶􅀫生軰血病來消掃室焚香意自超坐與蜻蜓俱歇午吟隨蟋蟀共鳴宵看雲种放終踈散嗜酒楊雄只寂寥巳覺閉􅀜成僻性公車何處欲相招法宫侍從昔承恩班列貂璫近至尊字辨豕魚繙帝典曾校寶訓實録筆廻星漢注詞源獻書開閣三公第校射分朋七貴園俟罪江潭今幾歳清秋囬首㤗堦垣塞垣萬里事防秋選將分兵出帝州白馬幽并㳺俠客金兠肺腑冠軍侯請纓曾抱迂儒志借筯誰當幃幄謀巳酉年來堪竊憤翩翩胡􅀐入􅀜游液池梧月冷金沙戸綰天河織女家蘭麝氖氲知賜浴芙蓉撩亂覺分花龍舟習戰鐃中曲虎旅傳更馬上笳老去張鶱皮骨在秋來猶憶舊時槎學仙曾欲訪王喬中夜頻將一氣調杳杳洞房開禁鑰㣲㣲面目上清潮色濕􅁅時人莫識夢鈞天處語難描悵望新秋蒲栁思塵縁猶絆􅁂先凋何年海上入妖氛滿地樓臺盡一焚刃露雪霜驚壮士陣翻蛺蝶掃疲軍倭夷有蛺蝶陣星河避影宵烽逼砧杵停聲哭巷聞野老無能效籌䇿空彈長鋏對秋雲逺㳺當日意何如楚越風烟一棹餘湖斬鯨鯢先帝跡山圍龍虎異人居閒坐清谿談劍術深探古穴訪仙書試問同行相憶否一秋多病閉茅廬病中秋日作四首藥褁牽纒歳半徂秋風先自到江湖榮枯草色占鶗鴂深淺潮頭􅀱荻蘆吳地連年盡豺虎野人何處覔蓴鱸亦知不是獨醒客與世浮沉糟可酺扁舟繋䌫且休徂秋旱川流未灌湖衰齒病多諸品藥貧家薪少半圩蘆稍能鄙事催孳豕偶戯仙方看釣鱸自署醉侯常是醉君王不待賜恩酺一身之外不知謀􅀂道謀身病未瘳居並野僧方結夏身隨稿葉又經秋肥猶似􅀑臞何状少不如人老合休忽報吳門兵燹盡古來佳麗說南州愚公本自拙于謀癖在烟霞况未瘳蟬響蛩鳴分晝夜寒􅁅稿木混春秋毉方百試增身病藿食終年與世休責守一無􅂓自慰且忘倭㓂過蘇州有感百歩飛刀賊􅀔雄連城刮地泣途窮誰供秋稅畊農盡將授寒衣杼柚空星孛仲尼書北斗兵交師曠訝南風六州節制慿元老㑹剪􅇯渠早奏功道家人說道中語開口便是先天後天無極太極兵亂中人說兵亂中語開口便是干戈搶攘之狀盖亦各㑹其所遭也使兵亂中人讀道人之詩則雞狗殺戮之憤躍馬除􅇯之氣便當一笑􅁅冷使道人讀兵亂中人之詩其亦有愀然而攢眉勃然而扼腕者否耶陳渡草堂二首皂衣非復漢庭郎蔽緼深冬卧草堂貧薄不羞畜牸計沉浮也逐闘雞行殘書閣盡經旬病異味嘗來百草香獨愧頑心猶未化十年學道幾亡羊近市偏逢食有魚閉門不問出無車牛衣􅂓自對妻子蜡酒時將洽里閭世網幸踈如野馬㣲名猶在愧山樗亦知農圃真吾事春至頻翻種􅀣書小樓宴坐二首不入名山不世間㗳然隱几置遺編身名瓦礫宜居後人事蚊䖟任過前抱樹蛻蟬司化運隔窓風竹􅀤真詮未登道域終難罷㣲管還湏學測天渉世已如入夢蝶居身未作脫鞲鷹自疑戾契戾契見韓文俗呼捩及終爲病欲學墨杘墨杘見列子俗呼眉西又不能金老相逢知法噐慈公頗訝似禪僧牛乎馬也從人喚惟一迂儒是本稱嘉興金道士三十年不下􅇃亦三十年不開口冬夏一絮􅀍自擁余叩之以指畫卓許余入道慈舟者蘓之名僧也余見之不告以姓名渠深嘆異以余爲頭陀相也又疊前韻二首到處迷陽不記年村中暦本逐時編寒烏滿野成禾後社燕辭人落木前戒酒劉伶終酒性遣言摩詰亦言詮青天自是無逃處何事靈均更問天混合高低齊鷃鳯經過老少變鳩鷹屈伸禽戯慿何訣􅂐刻蟲雕誤謂能盡日閉􅀜非酒聖文中子稱劉伶古閉關人廿年猜謎是畨僧余與翠峯僧徃來酬對者廿年此身本自無觔兩月旦先生若麽稱荘中作帶郭頃田屋一㝷歸畊自許力能任浮沉􅀽盎嗤驅狗㢘侈王陽訝化金貯麥舊􅁃將易榖行鞭新竹漸成林計然七䇿皆無用小試經綸底似今自述避人不敢厭高深逃影何如學息隂楚客又成蕉鹿夢􅃮園未了是非心紛紛世事看花􅀤黙黙天機􅃪鳥吟可笑維摩真病在無言說處是金鍼有相士謂余四十六歳且死者詩以自笑古人云死生亦大矣此謂趂日力以進道者言之也苟不進道總是虚生修短何辨焉苟干道有見處夕死可矣然則死生詎足爲大哉本是癯然山澤士衰年況自不勝衣色常帶墨縁辭肉形或如􅁅似杜機睢于乆謝偕來衆蹇拙何心知我希世人莫詫方皋眼相馬由來失痩肥殤子彭聃誰夭壽百骸九竅孰踈親若過顔氏十四歳便了王孫一祼身三載濫叨金馬客幾人共坐綘紗春即今已似前生事何待他年跡始陳人情世事古猶今寂寞空林􅀉此心賢聖不分􅂓中酒虧成忘盡一開琴有書終日只掩卷無病長年亦擁衿即使癃然似桑戸未逢􅀧也是知音學道曾窺天壌意寒儒又是􅂰攣人只言蔡澤有限壽誰見壺丘不定身賁客􅂴迎長謝病薄田可飽敢稱貧後來不用問修短已占溪山四十春囊癰卧病作三首節􅀱經春日日隂寒衿獨擁閉門深終朝錬液非仙氣幾歳懸疣是雨滛焦火凝冰鐫痩骨兒痴女長試􅁅心總縁病裏悲歌意不爲離鄉也越吟春半忽驚狗馬疾年來似是龍蛇辰謝醫少錢長郤藥煖骨累䄄􅂓借人味爲􅀘虚一試肉事求如意屢生嗔正愁未了形骸外生老病苦只此身余平生無厚褥止一褥旣薄且敝病骨覺冷硬不堪也乃從親人家借一褥襯之平生有厚褥與重褥自今始而余素戒肉養病乃肉食頻年䘮我几堪隱到處逢人席任爭疣贅勿嫌能侈性支離畨笑足全生野􅂼入口勝甘脆病骨先時卜雨晴苦訝道人長好懶如今懶病果相成濕入病骨覺爽然則晴覺痛楚則隂雨至矣瘧病作跰躃栁肘盡欣然深隱烏皮也自便金冶由他不由我狼胡是病亦是天身先辭宦猶中􅀬衣未經秋已着綿炎凉反覆湏􅁷事一疾畨令悟世縁小集爲人所刻文學從來本不長隱居辭說半猖狂徒令後世能疑孟秪覺前身似姓荘玄白何分終覆瓿榖􅆇奚事總亡羊從今巳息掞天口只著農桑一兩章靈芝寺同童元功宴坐湖上高樓縱逺心復沿湖岸過東林身閒似帶烟霞氣地冷兼無鐘磬音衣裏寳珠􅀿自信􅁐中靈草試相㝷坐來忽散千峰雪對爾無言意轉深登屠翰林仍臺作二首太史仙臺多勝槩正臨擕李古城東五色雲生知海近四圍山逺覺天空閒居作賦青春後幾歳鳴絃明月中不是掖垣同宦侣閉􅀜那許得相逢一上高臺興不􅀌望中總總入虚無烟霏春變隂晴氣草􅀣天輸海岳圖對酒笑將花是伴銷憂誰問土非吾知君苦厭文園卧此地能令肺病蘓時屠乆卧疾次人憂旱作歳歳吳儂事水耕朝朝占雨愁雲輕澤中不聞鳩語合田際但見􅀛文生野老䑛糠猶自得書生炊桂亦何情東南生計巳如此聞道山西又􅀧兵再遊清溪荘值主人不在次韻桃􅀣臨溪思不禁扁舟重問草堂隂西湖水落黿鼉石南國霜清橘柚林壟際流泉宜稻性窓前過鹿解人心憶君剪徑相迎處今日蓬蒿又已侵至常熟陳中丞白訓導邀登福山看海二首春早湖山雨半晴有客邀我觀滄瀛澤國􅁳􅁳蒸海氣石灘淺淺闘江聲日月廽旋一島小金銀色相十洲明㣲風向夕送清響􅀿是仙人吹玉笙乆縁迫陿悲時俗海嶠春臨思若何地湧龍蛇爭起陸天投星斗橫翻波封􅆠坐覺華夷并氣候常看霧雨多才謝枚生能作賦觀潮恰對曲江阿金澤寺中􅀉松江友人澄湖昨夜雨􅀄霽驟覺春衫寒意多逺浦草青送歸鴈夕陽潮上生㣲波戯窺佛偈翻金字静卧巖扉掩緑蘿伊人只在蒹葭外獨對清尊柰爾何松江金澤寺四首東南巨浸五湖深古寺維舟正夕隂客到山僧罷清磬雀諠晴日下高林夾洲烟火三家市滿目蒹葭萬里心徙􅀝不知餘興盡月明還擬􅃪龍吟三江抱處􅀔如環野客探竒住不還一望樓臺疑海上稍聞雞犬覺人間幸無漁父知名姓且與山僧共閉􅀜自笑歸來張季子春時蓴葉未堪攀何年此地開金刹宋代流傳直到今􅃪法石將山竹幻護經龍與水增深爐烟裊裊知塵性栢􅀣青青見佛心可是攀縁渾未盡天花猶自惹衣􅁭水國餘寒芳草稀偶隨烟艇問山扉窓中恠石如人立天際􅀌帆伴鳥飛高齋盡日逢僧語短􅄄經春換客衣吳江亦是垂綸地笑指星文愧少㣲天寜寺塵外樓四首瞰郭樓臺誰共登偶携仙客對山僧林烟􅄅􅄅人家盡堦日㣲㣲花氣蒸浮世閒看飛鳥過機心不遣白猿騰平生自笑支離甚散髮行歌此又曾名山不用逺攀登暫借繩􅇃我亦僧幾􅀣鳴禽􅂇禪寂一藂修竹散炎蒸捻花不盡心傳妙對塔空􅀅口說騰俛仰百年成滚滚乹坤􅃗眼更誰曾金門十載笑重登歸去仍依白社僧虚舘静􅃪宵蟻戰逺山時見夏雲蒸巳甘散櫟終年計耻逐􅁳鴻萬里騰爲問洛城冠盖侶鬂毛銷盡得閒曾閒裏香臺盡日登嘿然一笑又逢僧衣裁野薜緇塵淨飯試山精石􅂦蒸大士西方談實相仙人東海說飛騰人間多少亡羊路一一行來也未曾題湖上廢寺二首禪宮舊枕清湖曲與客㝷幽試共登獨􅀣春深􅀄著蕋空山行遍不逢僧臺荒曾與施烏食城化徒聞駐鹿乗惟有松房明月影年年長似爲然燈古寺無人盡日開隂廊寂寂長莓苔何年飛錫老僧云此度折梅狂客來迸水乍如聞梵樂踈松猶自繞香臺人間俛仰成今古何必昆明有刼􅁅題龍池菴三首相傳伏虎禪僧開山處山頂有龍井􅔼蝪見則雨逺遊爲訪白雲巖轉盡􅀌峰路更南龍見小身時出井虎馴大士舊開菴襌心客思俱潭水古佛寒松共石龕坐對老僧無一事夜深相與說楞嚴精廬原􅀉北山巖新築高齋過嶺南谷窈窕間還密􅀣石孤危處更虚菴􅃪經野鹿頻窺戸宴坐山僧不出龕客欲逃禪無可醉逺公於酒禁方嚴霽後嵐光散曉巖望中佳麗盡東南三春蘭蕙堪成畹千里湖山併在菴馴鴿下時呈佛性飛鷹􅀫處見僧龕維摩今日還多病酬答誰將䆒妙嚴贈菴中老僧僧解相人術少嘗遊歴江南晚歸菴中早從祝髮事棲巖爲禮名師每向南用華嚴事業浄六根成慧眼身無一物􅀉􅈋菴厨􅁁引澗寜湏汲松下翻經幾到龕若使焚香能證道前身應說是香嚴嘉靖丁未春余以病客荆溪遂同杭子宣登龍池僧居嵌巖中如鳥巢梯其門以登值二老僧相對煨笋遂以笋供余二人因留􅀫與老僧坐至夜分談說楞嚴因縁事老僧意甚朴野可愛也明日曉起嵐氣滿山乹坤如混沌狀堦前竹栢亦在摩蕩中咫尺不可物色日且午始開霽則諸峰歴歴澄湖隱映樓觀草􅀣百里之外若在几前盖宇宙間晦明不常若此既午出徃石屑石屑兩山夾澗山高百餘仞而澗道僅闊四五十歩人家縁澗以居惟亭午則見日色盖其勝又與龍池異觀矣既午飯遂從西霞歩入舟意興悠然如有得也嗚呼此豈可與沉酣聲利者道哉遂書以貽子宣使藏之㳺宜興海會寺作逕路縁溪不知逺忽然身已入峯腰深山恠石如懷寳暗谷懸泉訝􅃪潮僧比封君千頃竹人稀農畆萬家樵逺公不厭踈狂客試結茅廬共寂寥贈黄子晦故黄教授子黌舎相逢憶聚星予慚入室爾趨庭子長能􅁇先人業王吉曾承博士經萬里風烟還命駕廿年踪跡已如萍衰顔重感青衿日一笑尊前喜媿并􅀉周臺官二首時余􅀅徃南都南臺分署沐恩􅀄官是疇人世業餘龍吐珠璣天地轉星􅂗黄赤石甘書㤗階平處瞻雲闕玉漏清時直禁廬􅀿有道人扣􅀜者試看紫氣近何如文史元隨供奉間南都祕省更清嚴沙書暗譯西蕃暦草奏多陳南極占日下有雲朝紀瑞臺中無事畫垂簾倘覩少㣲思處士漁樵已判此生淹家居喜􅀽芳洲相過賦此爲贈三首相逢京國最情深休沐歸來每共㝷異品對飡呈海味道衣便坐解朝簮迂踈北闕上書日寂寞江潭俟罪心已分與君成契濶一杯還此幸同斟憶昔曾同念菴子歳寒訪汝深雪􅁁别開閒舘屏人語不解朝衣藉草眠琴意相傳中散後玄言每到漆園前正是江東暮雲處再逢携手一悽然四十支離一老夫衰顔恰比列仙臞鑄金不驗身多病種􅀣無能圃半蕪長日閉􅀜􅂓嘿嘿短衣迎客笑拘拘知君昔日探玄意定有真詮肯示予次韻贈薛仲常山林鍾􅂦性俱安官舎寜非在澗槃此日心情真似水平生臭味本如蘭閱世方皋誰牝牡認真桑戸且衣冠秪􅀿黄馬春泉溪田頻來徃春日江楓共􅀝欄歳暮有懷諸子歳暮蕭條只自如南州高士乆無書逹夫樗材在野大何用種髮經年短不梳剡水驚心溪雪後汝中隴山飛夢嶺梅􅀄景仁祠郎消息慿誰問萬里昆明是謫居叔仁贈張贑州致仕還吳次逹夫韻田園舊在海東頭海上新歸張翰舟種菊不辭三徑晚採蓴將及五湖秋人情歷盡惟看奕世事忘來獨好樓剰有著書心尚在知君原不爲窮愁贈宜興王丞次韻王蒲州人官粟還能五斗無年來只是憶樵漁道知戰勝臞猶在詩爲身窮思獨殊耕稼吾非徐孺子才華爾亦阮元瑜他年更向龍門隱爲念江皋一腐儒答朱刑部士南見􅀉清齋偃息灌園餘囀盡春禽又夏􅀄對客不湏妨蠟􅄚占年常自檢農書六經註脚吾焉敢五岳行踪或可知宣室正湏公等在野人只合掩荒廬同萬鹿園􅀫工文菴次韻有贈何處㝷山不厭深淡烟歸鳥暮鐘音去家百里訝如客别爾經年尚此心宴坐清香滋夜氣閉門殘雪映寒林相從一􅀫􅀿堪覺機事何湏問漢隂次葉師與諸生講書鐘樓寺聞鐘作早歳傳經髮已斑􅀉身精舎􅄅人寰苔􅁁屨跡堪盈戸花外鐘聲正掩􅀜驟覺海潮生静夜却隨仙􅆊響空山先生嘿嘿隱几坐試問諸生醒夢間養病道院忽張君見訪不值奉􅀉生涯歳歳藥囊間已息交游亦未閒土木形骸真覺稿蓬蒿庭院只常􅀜偶隨道侶學禽戯忽枉高人題鳯還此夕知君向何處多􅀿弄月卧江灣答贈胡栢泉赤囊前日奏邉書皂㡌何時掩故廬鳴劍豈知􅀌憤切請纓爭笑少年踈自甘淡泊看松菊耻學浮沉逐里閭春日黄鸝西澗草憶君歸去灌園􅀄送郭無錫擢南曹主事郭侯齊魯推名士暫屈清才綰縣符折獄一言驚老吏洗心終歳比冰壺南曹已應郎官宿東國常懷仙令鳬野老殷勤何以贈益崇明德永嘉譽贈督府張半洲兼柬周中丞石崖四首威名昔日動南荒斧􅃏重分定海􅆠八鎮大臣承節制六千君子備戎行若營内險無如海但練沙兵畧用狼師老㓂深爲日乆佇看石畫一更張壮猷元老舊文儒羽戚雍容禮樂餘吳起援抱休進劔韋卿對壘只肩輿撫士嚴冬挾重纊屏人半夜草隂符復道降人爲我用三吳深雪正擒俘無知醜虜恣炰虓誰識元戎廟畧饒七䇿謀臣陪後乗三鏢蠻􅀐護前茅計藏處女深堅壁勢激驚雷迅擣巢民夷連結禍未已上計由來是伐交揷羽飛書入建章帝親推轂任才良東南大畧輸公墐尊爼竒謀仗子房人家半是焚焼後禾黍又成荆􅁄塲爲將先湏固根本諸公深計在民瘡尹洞山祭酒枉顧草堂有作見贈次韻二首相思幾度夢中迷却望金門隔石谿騏驥合馳千里足鷦鷯分老一枝棲門􅂊通水勞移棹篋尚藏書借照􅀺更羡君如逺祖喜談玄一􅂀自􅀜西獨持鳴鐸啓群昏南北諸儒盡在門身繋蒼生人望乆道行世子國師尊過憂治世常如病㝠􅆻真詮不着言别後知公心事在每占台斗坐􅀌村又疊二首感時愁見海氛迷抱拙空知卧一谿秋盡龍蛇還起陸月明烏鵲正驚棲儒冠本不閑軍旅肉食誰能念藿藜對子􅂎憂方一寫明朝車馬又東西樗散無能任醉昏蕭然帶索掩衡門荒庭乆已無綦履上客何期共酒尊籌國賴君三寸舌著書強我五千言擁衾相對渾忘寢弦月㣲㣲上逺村贈都督萬鹿園四首次思節韻幾年枯寂學全真一握兵機運􅀑神驕養義兒皆判死􅁅心禪客亦投身獨承利鏃生如剰徧散黄金家益貧直欲填橋跨滄海先聲萬里走波臣暫脫荷衣事鼓鼙從軍亦復有新詩犯難甘爲智士笑還山肯顧道人期申胥自信知天定李廣何心計數竒尊爼運籌今巳就潢池跳躍欲奚爲許國誰能似爾真每憂時變幾傷神試看養亂偷生將共是腰金拖玉身杼軸千家愁命盡轉輸萬里嘆師貧饑饉干戈今並急謨謀全仰二三臣寒宵清嘯雜征鼙撫劒劉琨本善詩開幕待降収死力隔江遣諜刻還期功湏因敗畨成巧筭恰當機不見竒長子帥師今在爾道傍築室莫輕爲詠俞虚江叅將四首將軍意氣夐無倫感激寕辭血戰頻手摶􅀑夷嘗百種身懸鯨海歴三春掃空巢穴多深夜奪得艅艎秪數人此日渠魁當授首䇿勲早見上麒麟知君兵計原儒術儒術深明計轉工洞識天符非候氣妙窮火力不因風巨魚射處波神遁雄劒鳴時水恠空却笑賊徒能􅀒險幾人􅽮􅮚刼􅁅中昔破交夷尚少年秘經曾自白猿傳一軍盡署滄溟􅂻百戰常居士卒先龍爲求群窺劒匣蜃因吐氣護樓船㝷常嚙齒非無爲不盪三韓誓不旋絶鳥諸蠻次第芟中宵蓐食理征衫艙通木井三年水檣轉銅烏萬里㠶軍斗稀鳴人莫犯身衣常解士争衘功成他日誰能頌海上磨厓大字嵌送曹子㤗自大理出守漳郡兵戈南徼方多事佩印特煩良牧來于公治獄元無枉孟綽持㢘也有才山稅積荒勞撫字海甿􅀒險費招徠要使經營収異績未宜拘謭按常裁萬思節以集中無名作詩見貽二首學道頻年慕屢空支離猶墮語言中不是班生表人物徒然楊子戯雕􅆉書字書名吾豈敢得皮得髓子􅀿同他年郊畤傳中說倘借名卿孰過公臯北三載愧儀刑學術那堪立戸庭顧我自知太玄白如君本是出藍青老去門徒多謝遣病來意緒轉沉㝠高賢豈訝無名藉十哲由來是俗稱萬思節工於詩而近又學射次韻答之衣鉢寂􅋁吾且老文章鍜錬子能工一源已謂出天稷六義還湏􅁇國風深窮别趣元􅀜理力造竒言不露鋒便是詩家射雕手何湏射藝又兼通勉和原韻稍復着意亦竟不工豈造物者欲讓子出一頭地􅁘一笑徃徃來來多值婚嫁牙檣錦纜蒼頭廬兒照耀河衢而吾内人與令愛乗一葉之舟可謂蕭然雖然若使吾與思節肯借力於有司及親戚富人奚啻與傭兒較一冷煖哉易所謂不如其姊之􅃑良轉覺彼爲俗吾爲雅也雖然此猶有計量心在也各歸其家則路中冷煖雅俗俱渡川之栰矣俱忘之矣要之有求之便宜㑹盡而不求之志常在也世間大事小事一切何以異此然不知者其無謂我爲觧嘲戯語乎書此以奉思節知思節之意與吾同也次萬思節韻蕭芝田二首屠龍老巳知無用一遇時艱見術精焠就戈矛皆吐火幻成獅象總疑兵空中墮語人無跡地底藏雷賊不驚戰勝何心邀重賞由來只欲賭聲名共說火攻爲上䇿秘方誰復似君能石飛􅈝使晴鳴雹機轉真疑夏造氷魯國雲梯猶自拙楚人燧象未湏驚么麽倭􅀑那堪筭破虜横行記昔曾題王世新一枝窩三首蕭然環堵傍湖㘭半瓦參差半覆茅鍾􅂦相傳精古字戸庭不出玩􅀄爻紛華燕雀窺金屋空曠鶢鶋占海郊榮寂兩忘非所事一枝􅂓爾􅀉吾巢自笑名塲乆脫覊敝廬歳歳理新茨試看繞􅀣空三匝何似巢林􅀉一枝閒行蓬藋􅀌飛處晏坐榆枋歛翼時寂寞􅃮園千載後心期􅀿只許君知希世從來謝不能虚閒每與道心增交㳺息處􅀌松對今昔忘來一几慿夜讀隂符羞說劍醉過白社偶同僧如君自以鷦鷯比借問何人是大鵬夜歸陳渡草堂時新與諸子别去有懷二首野夫也復到城市日暮還㝷四壁廬蛩響露餘將入戸人歸月裏又離居坐慿烏几都忘我起對流螢且廢書正憶青衿同舎子别來秋興各何如自擬身名如鄭圃宫環半畆日長扄􅄄衣頗笑非懷玉茆屋何因却聚星􅀣底蟬聲希鼓瑟燈前鳥字一談經試言吾易將東去未識何人是姓丁癸卯送仲弟正之赴試偶因今日送行處尚憶當年􅃪鹿鳴馬氏白眉占仲子吳門霜􅁂愧難兄秋來一雁寒江影天外三山古帝城此去騫騰非所羡期無温飽􅀒平生己酉送兩弟正之立之赴試秋水芙蓉映緑杉殷勤送爾到江潭人能鳴世慙三鳯家有遺經是二南文入妙來無過熟書從疑處更湏叅逺游他日看之子下澤欵叚吾巳堪送諸從游􅀿試二首一壑謀身世所踈幾人相伴此閒居月懸山舘談經處雪壓林皋宴坐餘向來衣鉢吾將付先軰文章子孰如亦知雅志輕青紫好及明時早上書幾年山澤共淹留今日公車且見求楊桞扁舟吳􅁐夕梧桐雙闕漢京秋清時元不棄寒士白璧誰將笑暗投都下逢人說論語莫言師授是張侯送馮子聲赴試與君硯席辱周旋義理蠶絲每共研頴悟最居德祖後聲名愧出照鄰前身同槁木甘吾隱賦就凌雲羡爾賢莫道孫弘曾不遇漢庭推轂在兹年送禇生滔赴試乆撤臯比絶來徃偖生時復欵柴門文有波瀾堪得髓座無笙管只清言客心落葉秋江繞别思平蕪夕鳥翻此去期君戰勝後歸來正對菊花尊鄱陽别方道人戸庭不出巳多年千里隨君意豁然飲醉或歌還或泣􅁂蓬疑􅀑又疑仙詎知衰鳯堪爲笑且學􅂗􅀛得自全今日别離何足恨終期共住白雲巔中秋夜同陳澄江張夢麟城壕泛月森爽秋逢三五中霜天雲物坐來空河灌百川還小艇寺藏荒野亦踈鐘客嘯忽聞清唳鴈月圎真訝吐珠龍疑君輿我皆仙骨身世何湏更挂胸和張尚書甬川新修池亭奉母登憇作聖朝􅂄舊位登三綵服公餘樂更堪東洛撫師􅀟玉節西園奉母一茅菴春暉映處花侵戸冬笋成時竹上簷聞道閒居新作賦承歡養性此能兼贈􅃽璞山封君主事宗魯之父早游郷校巳知名曾與賔興􅃪鹿鳴修行明經爲博士夏弦春誦課諸生官無􅂦食千鍾願老有郷園十畆情更笑嬴金何所用仙郎作吏比冰清贈張通政五湖舟楫是家居篋􅂻惟携老氏書幾日陸沉門下省一生心跡海東漁賔常滿座嫌猶少行不齎糧任所如陽羡山靈相望乆獨能無意命巾車用韻自述南村北郭仕吾居􅂴散何心更著書小酌或能稱酒隱直鈎􅂓復事溪漁童時􅂐刻堪爲笑病後形骸漸不如􅀂道猖狂今又甚窮途猶自未廻車壽張通政蚤躭玄寂謝塵氛身隱猶嫌名可聞自着道衣辭漢闕因㝷仙籙禮茅君行隨勝跡曾無住藏向名山更有文南國夜來占氣色少㣲􅄅􅄅動江雲壽陸師慎齋七十廿年不向市城行閒看桑麻自長成道貌肥來知戰勝儒冠挂後覺身輕北窓意味人千古西序聲名子一經髫齓門生今白首稱觴還􅃪後堂笙曹霜崖六十曹生恬之父舊官御史道人容色自臞然幾歳江皋躡紫烟謝氏家兒如玉􅀣周時柱史是神仙􅂦成靈藥方皆驗書貯名山世未傳􅂴散自憐蒲栁質相從擬欲學長年司訓殷龍巖壽詩文東之父白頭博士早懸車鳩杖扶身八十餘甲子暗占綘老歳今文口授伏生書清尊只許通門客隱几何心出里閭􅀿笑嬴金無所用仙郎才藻更誰如楊醫士六十衣裁鶴氅鶡爲冠數卷方書一草菴綘縣老人知幾歳太倉仙令却多男不爲避人居郭外每因採藥到山南年來頗訝嬰兒色道術從知􅀫所探禇怡閒六十滔之父古來仙客說長髯今日髯翁亦是仙家近縣門不識令身居城郭亦耕田鳩形正可供扶杖亥字還看紀歳年共羡高門將有待賢郎文藻更翩翩贈宜興閔翁八十壽詩古貌翛然山澤臞力田還是漢人餘乆諳汜勝齊民術閒讀周侯風土書桑榆曖曖隨行徑弟子訢訢與燕居駟馬從來足憂患羡君身世更何如周子隱有陽羡風土記贈天寜寺僧八十化城東畔駐三乗祝髮從師記昔曾頻着袈裟迎上客自分齋飯與遊僧談經幾夜窓飛雨削杖先年手種藤因笑馬嗚身巳老欲慿弟子爲傳燈懷竹叔壽詩叔善畫傳自乃翁門傍清溪長自扄隂隂藂竹繞幽庭地偏南郭人堪隱秋盡東籬菊正馨笑傲百年惟稼圃風流兩世擅丹青不湏海上求靈藥元是江􅁁老歳星楊醫士壽詩東亭先生富道術隱居城郭似江湖隨身長挾􅀟白鹿入市只懸一玉壺社中漸覺推前軰門外從教滿病夫予亦文園高卧客年來肺氣爲君蘇贈丹陽湯孺人壽詩少年爲婦舅姑前及見黄門正拜官喬木門前經幾世曾孫􅂰下且勝冠中厨列􅂦堪調膳永夜真心憶和丸聞道仙郎拜嘉慶沾恩新自五雲端謁文敏楊太師墓次江提學韻野狐三度扈王師諸將從公受指麾賜解御裘冬學煖詔裁密㫖夜常隨前籌不數􅆛貅力末命仍歸喉舌司萬里囬鑾驚駕晏軍中未有一人知北郭謁宋鄒道鄉文忠公墓宋代巳經三易世忠公遺墓尚嶙峋敢言有志成慈母公母張􅁒公爲諫官報國逮罪何期及故人公謫故友王田軰以祖公􅀍罪黄閣十年終賣主瘴烟萬里合投身已分此生堪客死魂歸猶是故鄉春讀東坡詩戯作東坡卒於武進顧塘橋去余家數十歩公詩句句冩胸臆一滴水成大海飜方皋牝牡無定相曼倩滑稽有至言掃除李杜芻狗語出入􅀑神傀儡門異代或疑後身在告終此地招其魂喇嘛翠峰老僧輓詩三首枯木寒岩亦未真走盤珠子自精神三飡煑籺一生事翠峰每食糠餅屢歳齋僧幾萬人鑄冶金容瞻氣象圎通天眼悟根因翠􅄘得師傳天眼訣欲上伏牛心未了了心􅀿待再來身不事钁頭不坐禪􅀭眉瞬目見雄談净體髮􅂡元不碍翠峰不去頭髮煉心妻妾􅀫曾叅翠峯爲僧後入俗曾有妻妾者三年殿壓滄溟功九仞爐開色相佛千龕翠峯一生鑄佛造無粱殿于浦陀未成也年年航海精誠在垂沒魂還到海南自愧迂儒厭俗葷每游香室藉思薰别來常似一臂失用荘子話乆寜容六耳聞人去忽驚凾谷履錫飛無復海東雲憐君鑄佛經千億欲借餘銅一鑄君錢心漁輓詩心漁先生不可見尚憶吹簫卧草堂垂綸老作江潭客得姓元從吳越王貧病一生心自足雲山千里興難忘更聞治命真堪紀人世空矜石槨藏雪詩和蘇韻十首隂風吹隴麥芽纎歳盡玄冥令更嚴園圃未春先綴蕋乹坤如海欲生鹽不妨積處堪高卧預想晴來好曝簷縱是未能堅作玉漸看氷柱巳垂尖大地文章散縞纎小堂風物倍清嚴灑來竹􅂻迷人徑積向巖前訝虎鹽但使曉寒欺短􅄄獨宜夕影泛虚簷瓊花栁絮皆無用誰擬新詞一闘尖寒江我亦弄纎纎豈是羊裘人姓嚴履處幸不露足趾嚙餘真覺厭酸鹽紫雲黄竹千年調白屋朱門一様簷高岫儘教􅃒盖盡物情元自碍􅀌尖寒臯白草尚餘纎墐戸村村似戒嚴飛舞千峰山吐練粧成幾􅀣木蒸鹽填蜀有木鹽病多消渇宜調茗老巳􅂢書莫映簷強欲摛毫追小謝謝惠連有雪賦詞鋒久避六朝尖宛轉素娥腰帶纎廻颷似􅀿舞節嚴三冬恠事警粤客古語粤人不見雪一夜凄風結解鹽解地鹽遇風則結厭就包羔歡錦帳思分挾纊到窮簷擒胡此日堪乗便誰奪祈連萬仞尖李靖因雪擒頡利蕭蕭凍􅀣晚諠鵶門外誰來長者車入夜俄驚千里月開簾相對滿空花東郭先生猶敝履西􅀜遷客正思家最憐漁父滄江畔閒􅀝孤舟獨挺义一片寒原滿􅀣鵶幽人掩戸罷柴車􅂓慿濁酒延春色試向踈梅問臘花草閣映來書幾卷江城積處月千家此時忽憶荆溪道雲際􅀟峯聳玉义􅀄看朝采颺金鵶倐見玄雲隱日車恰似幻師能作霧却驚翳眼驟生花緗編暫借簷前影銀閣常思夢裏家笑道非鹽亦非白禪機一指爲君义空城無粟噪饑鴉陌上紛紛正滿車積磵暗隨泉並滴入簾􅀿與筆争花芻米驟高新歳價柴扉旋掃野人家客來此日湏沽酒梁上青錢那得义巢風欲動始占鴉空裏悡翻百寳車葱嶺未消阿耨水珠林忽散鬘陀花故氊猶在能禁冷好客相㝷􅂴卧家且似瞿曇逃世網雪山跏坐足爲义家僮自野田携黄菊二株至軒中感而有作三首曠野隂隂萬木霜誰携數蕋到􅈋堂冷質本非堪競秀閑情敢謂愛􅀌芳在野寜辭衆草掩入簾􅂓作滿庭香自笑吾生花興少欣然對爾亦相忘余素不好花見此不覺有喜意豈真所謂花之隱逸者耶巳􅂸寒谷不湏媒譲寵何嫌並朶開花意幽閒當艶麗天心霜霰是栽培潯陽逸客瞢騰醉姑射仙人綽約來寂寞於人誠少用試將服食制齡頽不沾春色也穠纎小院踈籬秘靚嚴人比􅀌花清入聖天然真味淡非鹽未湏採摘供調藥爲嗅馨香置近簷落英好護餘根在來歳還看茁玉尖此首用坡公雪詩韻漂布架二首皎皎亦知塵易染置身特在半虚空素娥罷浴仍餘濕靚女慿高欲御風潮翻净練江樓上霧捲輕綃海市中不向太陽􅀩一暴剪裁誰使得成功姢姢素質􅀉孤標出浴仙娥濕未銷弄影自知迎日早慿虚特覺去塵遥將乗灝氣晞氷骨一任輕颸颺舞腰移向海傍堪望處錯疑鮫室挂寒綃韈架二首氄毛水打􅀄成韈餘濕還應待日消禦冷何辭居下體􅀒暄早巳託高標似隨仙舄乗雲近未蹍芳塵去地遥却訝縁橦諸侲子倒投絶足試輕趫韈材温厚剪羔群絨袎􅀄匀濕未熏就日且湏縁峻木凌波將不讓羅紋色迷玉磬齊懸簴影伴仙鳬半入雲終属美人施錦系畫簷風起暫􅌭紛病中食江魚作自海㓂亂此魚不至者六年矣腥風暫說静鮫潭石首新嘗到草菴常味畨令食指動病身未覺水鮮甘試和芹子心仍在欲薦椿庭恨豈堪莫謂有無􅀜口腹安危消息繋江南弟兒次江魚詩韻深不稱意偶坐水榭無事再疊前韻教之􅅈舶夷舟逓占潭凌人忽爲啓氷菴百船十死衆争利一尾半金人買甘偶嘗貧士已知足數飽豪家亦未堪遥憶金盤充貢處九重當食念江南次韻題王孟端春流出峽圖錦江一􅂀自天開誰冩春流映翠臺萬木深中疑欲㫁千崖裂處訝還來蒸成暖浪魚翻尺繞向仙家客渡杯瀑挂玉龍如起蟄沫飛野馬似吹埃探源詎識臨河意乗木誰堪渉險才近水人家巢鸛鶴逺山天際落莓苔趂流蜀賈囬輕舸燒野巴僮墾廢萊萬里風烟真縮地丹青枝盖至此哉滿屋春流訝眼開丹青彷彿見章臺曉經神女和雲度寒盡天山帶雪來合􅀔兩涯誰辨馬潜行一線僅勝杯戯暖魚龍恰不夜潄川花竹總無埃沿洄欲問幽人住險絶堪矜蹈水才荆巫信有四時雨灔澦全銷一􅀧苔祠識黄牛多古木城迷白帝半荒萊吾生本是東吳客萬里西逰亦壮哉孔明送蜀使故事山居槍榆徙海鵬鳩笑續短截長鳬鶴悲山翁未解稽生癖垢面蓬頭也自宜讀王遵巖所爲拙集序文自嘲四首嘐嘐妄意空千載没没安能盖一鄉江東若問如卿比車載還應更斗量文章未出風土外人品猶纒習氣中只可清狂慣吳語却令識字笑吳􅀩札也能輕千乗國蹈道無能早見譏公羊氏曰札可謂輕千乗之國蹈道則未也三十年來持戒意於今四十已知非力希顔氏何能望竊比言㳺未敢安老大漸知親灑掃試將妙用此中參紀夢萬里歸心促曉鷄滿巖寒月正街西道人乆謝天台夢也學劉郎一度迷有司查脚色二首道士原無鑑湖賜山人敢署醉侯封猶查脚色煩官府陳渡橋􅁁一老農逃名最喜稱無姓抱病還􅀿厭有身說着宦㳺如一夢不知猶是籍中人㳺塘候廵公四首公門幾歳罷趦趄俯仰衡茅每晏如豈謂􅁂毛蕭瑟乆尚隨􅆠吏路傍趨沙堤月色曉朦朧曾向朱門候相公逢迎不意猶能慣囬首當年似夢中樗散空知慕鑿坏柴􅀜終歳更慵開今日偶成蝴蝶夢也隨花氣過墻來禰生狂態復如何一刺懷中半㓕磨縱令罄折謁官長猶勝詩人詠荷戈海上凱歌九首贈湯將軍湯侯猿臂猛虎􅂡少小曾窺玄女符明主親頒手中劒直交跨海斬天吳紛紛盗竊爾何知岸上斫人水上嬉自咤一身都是膽欲將巨海作潢池偃旗休角寂無猜百丈樓船泊不開夜半賊營流矢滿􅂊驚漢將是飛來水軍隊隊黄頭郎迎潮直上凌扶桑巳知海若先清道萬里滄波定不􅀭海上秋高朝氣清營中賈勇競先鳴疊嶼亂翻旌幟影驚濤盡作鼔鼙聲沉船斬馘海爲羶潭底潜蛟噴血涎髑髏帶箭逐波去可道孫恩是水仙錦紈愛子亦從軍長鬛蒼頭總䇿勲誰奪強王萬金首帳前齊說小郎君五千長㦸下淮邳自是沙洲命盡時將軍欲置平戎鼓湏借鯨鯢腹下皮湯侯以渠賊玉艮皮製鼓捷上彤庭寵數優詔分玉帶與名裘麾下偏禆盡稽首貂蟬笑看出兠牟南征歌十二首五嶺烽烟乆未平君王習戰幸昆明却說將軍多勝算不湏文士請長纓詔錫􅊮􅃓出禁城良家六郡總從行將軍舊佩平蠻印校尉新開横海營漢皇有道伏羗胡南粤何知擅一隅萬里出師將問罪不因大海富明珠獨承節􅃏控南州親寵由來冠列侯昨夜輕寒生幕府賜衣􅀄着紫貂裘晴原羽􅀐簇油幢繡㡌争先蹋鞠􅂣不惜千金収猛士欲將尺組繋名王月明吹笛武陵川馬上行人望跕鳶莫怕炎洲饒毒癘一冬飛雪似胡天軍書挿羽速星奔卭􅈎夷王盡欵門殺氣三秋清瘴海輕兵一夜襲崑崙草木干山鼓角風將軍牧馬夜郎東靈臺向夕占星色巳報􅍴搶墮海中圍合􅀌城海氣昏紛紛失木泣窮猿何如銜璧歸天闕幸荷明王不死恩牂牁南去亂峰連滇海藤江一帶懸縱謂蠻封堪畫地不知漢將若從天奏凱歸來拜冕旒霍家襁褓更封侯因風爲報單于道漢闕方梟越尉頭千群椎髻競來王聲教南流盡越裳但使文犀通貢獻不將銅柱隔封􅆠塞下曲贈翁東厓侍郎總制十八首四月旌旂出白狼千山晴雪照油幢預知水草軍無乏試辨風雲虜欲降三晉連年苦􅀍兵九重拊髀憶豪英詔書更不從中御萬里長城一委卿詩書禮樂古人風開闔機鈐又不窮得一胡兒如愛子用三敗將立竒功山前山後兵馬雄斧􅃏衣裳在掌中狹士獻刀承賜酒貴侯免胄爲趨風赤氣氤氲夜指天旄頭落地如火然曉來西山一鏖戰奪得牛羊歸滿川千金買士却何爲一間過扵十萬師􅃛虜欲逃頭可購名王未獵客先知太師昔日定南荒親把長纓繋莫王􅀉語老胡湏自愛射飛休得近􅁁墻虜中謂大官爲太師梯懸半綆哨臺高胡漢鄰家隔一壕數日虜中無動静吉囊東去戰黄毛虎翼龍蟠大將旗逆驅流電走妖魑陣前捉得胡王女賜與營中厮養兒灅川冰盡水泱泱堡堡人家喚蒔秧田中每得鳥獸骨云是胡王舊獵􅂣馬邑􅁁胡數􅀍胡王黄叛漢更通胡帷中妙算能先發奪得黄旗與繡􅃭徤兒白馬紫金鞦不向沙􅂣便酒樓夜來一賭青錢盡尚有囊中血髑髏􅁁人大半能胡語胡􅀐年來亦漢装誰向青紅氊帳裏單身縳得不花王少年意氣王千斤鐡棒曾穿萬虜群壮士從來不病死􅀌兒今屬羽林軍君侯生長在炎洲塞外層冰草木愁祗憐軍士猶寒色臘盡轅門不御裘畫㦸森森清晝閒指揮只是笑談間収將漢地教耕去捕得蕃酋命縱還營平謀國最深忠每與公卿見不同但使湟中無㓂盗不湏麾下有􅁁功青青塞草羽書稀士女鼾眠畜牧肥戯看侍兒呈舞馬醉邀幕客對彈碁偶感十一首盖屋曾無一把茅姑蘇城外盡荒郊行人欲識郵亭處問是軍燒是賊燒賊來窺戸正臨粧虜得呉娃似孟姜簫鼓滿船催送酒大王今夜作新郎毒藥本能攻毒病病瘳藥發更堪論借問苗兵誰駕御逺觀元季近桃源勝敗於今自可明不調琴瑟也湏更滿地髑髏多祝髮紛紛猶尚說僧兵詎道狼兵能賈勇渾身褁鐡怯如何不似江東輕俊子􅃝衣黄㡌去揮戈􅃝衣黄㡌去揮戈一潰奔騰湧血河滿目更無刀箭孔背心攅簇似蜂窠諸城連接控吳中群賊無知枉見攻誰識主人多勝算􅀜門閉得不通風匹夫亦足􅀜輕重好共軍門仔細論吳楚不知収劇孟夏人還解欲騐藏錢用水澆挖開錢谷地無毛首挿片旂紅的的鄉人一一去挑包眉目粗頑髪指冠鄉人權作大王看銕燒醋灌俱甞盡笑殺無􅂡是宦官奸細紛紛徧群國丹陽奸細􅀗偏多舟人魚子􅀿廻避賈客胡商孰敢過觀道士祈雨二首星壇歩處雲隨合里邑喧呼道士功四海正需霖雨急卧龍何日起􅂭中巫舞商陽古有之神靈風雨灌壇時隂陽爕理輸誰力秪遣兒童頌法師歸自金陵􅀫白土長路緇塵欲上衣暫投客舘亦如歸不因野老來争席豈解山人乆息機酬徐養齋尚書見懷之作亦以少頌盛德并爲扣􅀜先容云耳二首卜居秪爲謝塵縁三尺䋲床亦穏眠縱是炎天非雪夜終湏乗興到前川柴門長日閉青山薜荔衣裳氷雪顔愧我未能分半榻藥囊書卷共消閒送楊訓導擢曹州掌教二首傳魁之世乆知名君作師儒更有聲巳道江東桃李徧春風還􅀍魯諸生臯比幾歳卧江城綘帳談經復此行廣文不厭青氊冷京兆猶傳白雪聲君先人尚書公嘗爲京兆尹有清名爲奄瑾所禍贈徐愛杏山人詩有序壬寅秋七月余偶識山人于錫山山人善醫尤精金瘡以爲其父傳之異人也山人治病投一匙于垂絶無不􅀿手愈余因思南史所載一人因斫蛇而􅀗靈藥自是出入行陣金創􅀍體以藥􅂗之盡效相傳以爲竒雖然使其人當時得遇如山人者又何假于孽蛇之餘也哉邇者戎馬蹂􅏳鳴鏑徧野􅁁人之横罹于毒者何可勝數向使致山人於塞垣軍旅之間人且争忍死而趨之以丐命焉者如織矣而乃漠然自老於江南無事百年不見兵革之墟則抱其技而寂寂焉固其理也諺云士視其所遇茍不在中流雖五石之瓠奚所用之嘻豈獨醫哉㑹山人來求余詩而吾友静思武陵二君皆介爲之請率爾賦此且序以見余意而詩次句用南史事云一卷禁方誰與傳􅀟童擣藥經幾年園中種杏今多少疑爾前身是董仙題贈叚紫峰仙人􅀫處紫烟􅀌一片峰隂散玉湖今日隱身城郭裏閉門常冩廬山圖秋日書客童君見過賦此爲贈有客扁舟問草廬窓前梧葉正蕭踈山人巳得忘筌意不復從君乞異書題陳推官羅江號二首高卧曾分白鷺沙清谿深處採三花總爲徴書出空谷衣裳猶自染雲霞三山江畔入雲齊紫氣千年鎻石堤便欲學仙從此去與君同􅃪夜猿啼題寳華和尚卷幻目由來見幻華飲光何事又拈華兩華舉似知華客爲有别差無别差贈王和尚住善卷偃栢垂蘿古洞春上人飛錫此何因非􅀜福地㝷仙侶自向青山認法身自述贈寫真毛君津黒尚餘山澤氣委蛇又似列仙臞他年太史徴圖畫爲識乹坤一腐儒贈曹星士一江號春雨蘭陵江草生江流恰與道心清門前車馬日來徃閒坐江城說子乎自述并贈曹君少讀隂符耻未工青山偃仰漸成翁人間炎冷都忘盡􅃪話流年一笑中曉起觀猫捕䑕起來隱几坐朝暾深謝當􅀜早閉門簷角偶欣猫捕䑕反觀尚覺殺心存題畫山空夜静猿一鳴磴轉雲深鳥不度幽人何事長獨棲只爲此中有佳處㢘使廖東雩䘮後開所惠地黄酒臨觴􅃤然尺書滿篋故人情想像荒丘􅀫草生秪餘此日開尊意堪作山陽􅃪笛聲贈儀眞沙君葭菼蒼蒼水國秋高樓明月古楊州二十四橋雲霧裏看君􅀐鶴上天遊贈史君漁沙號問君何處挂漁簑予亦垂綸坐緑波他日相逢􅀿一笑不知若箇得魚多華􅀘菴三度惠酒而此畨所惠參酒者絶清冽可人雖味甚濃厚而置之杯中淡若無色可謂嘉品因劇飲至醉遂成口號奉謝三首磁杯冩盡只疑空秋月寒潭意頗同隱几偶然成獨酌夜凉白露滿庭中毎甘樗散惟湏酒欲􅀘虚贏却藉參瘵疾陶生兼好飲舉杯深見故人心淵明素瘵疾絶無色相傾明水只有馨香藉白茅此夕飲醇􅂸一醉恰如把臂與公交食石首魚又得鯧勒二魚喜作口號向時石首每至郡鯧勒亦不至也非海氛漸息何以有此昔年食首又成􅃵鯧勒相隨亦就烹應是鯨鯢先授首紛紛水族盡亡生􅇯狀腹前排劍㦸勒􅇯謀腹􅂻漲彭亨鯧二魚狀亦最可惡􅅈師自有截江網性命惟堪一筯輕重刋荆川先生文集卷之三
