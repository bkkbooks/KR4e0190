body:
  text: 奏告病䟽翰林院編脩臣唐某謹奏為乆病乞恩放㱕調理以圖􅀘報事臣聞人主度能而官人人臣量力而任職是故上無虚授而下無曠事臣某本樗櫟粗材過蒙陛下甄録使得待罪翰林此寵榮之至極而臣子所宜悉意委身以效報稱之日也不幸臣有狗馬之疾徃年秋冬之交觸冐霜露始自皮毛轉客臓胃浸􅁋閼欝壅而不散痰火怔忡眴瞀諸證時時有之此時臣方奉隆㫖與􅀙史舘讐校之後故不敢遽以病為解廼不意沉痼日甚漸不自支臣嘗䆒醫家之􅀃大率言人身惟精氣神為主心動極則神馳神馳則精揺精揺則氣耗損廼至客邪于􅂩而入之百病作矣故云上醫醫未病若臣所坐病根抵深矣居嘗自念恐一旦顛隕上􅀒聖朝奨養㧞擢厚德故敢以㣲軀乞于陛下如蒙敕下吏部憐臣病状容臣㱕家稍就醫藥萬一仰徼天恩復得齒于完人則臣固當再覲清光竭奔走之力以効㳙涘之報如遂廢不可復用臣亦得没齒隴畆死無所恨臣冐瀆天威死罪死罪臣不勝欵欵願望之至為此具本請皇太子受朝䟽臣聞古者豫建太子所以重宗社也太子既立則有臨蒞之位有朝㑹之儀所以萃人心昭􅁤度也伏惟陛下聖謨獨運深惟宗社根本之重早正東宫儲二之位以繫宇内之心者貳載扵兹矣􅇮以儲躬冲㓜務存謙抑凢遇歳時令節及千秋慶賀暫令進箋内庭此盖禮出􅀙􅁠時􅀅有待今皇天廸保睿筭日昌雖龍德尚韜而麟姿益茂至扵來歳首春又當天下百官述職多士賔興衣冠咸萃扵天都􅂬欣交通扵萬國咸思望元良濬哲岐嶷之光以思報陛下曲成範圍之大德者其心寕有窮極哉而文華受朝之儀缺而未講臣民稽首之敬抑而未伸非所以彰主噐之殊尊荅群心之属望也臣愚伏願陛下俯鍳萬物作覩之誠大昭育震重暉之盛特敕各該衙門凢東宫朝㑹一􅀿儀注早為詳訂鑾輿麾伏一􅀿法物早為完繕所貴周慎豊美以飾采章而聳􅀚􅃪其青宫内外侍從禁衛一􅀿職属早為擇􅀘務求忠謹端亮以專羽翼而資保護儀物既修官聮既俻及兹正陽􅂂端之辰蒼龍􅀿律之候群臣詣奉天殿朝賀禮成即詣文華殿朝賀皇太子則離明之照盛扵兩作前星之曜憎輝紫極而内外官僚之衆四夷朝貢之臣咸扵快覩争覲之餘興起其愛戴趨附之忱各思恪共乃職以對􅀭聖天子詒謀燕翼之休命者必自兹益篤矣臣愚不勝惓惓祈望之至覆勘薊鎮􅁁務首䟽陛下洞鑒􅁁臣玩弛之弊欲􅀘兵練兵為􅁁境乆長之計甚盛舉也臣愚昩踈闊不足以備使令夙夜祗懼不敢自寕臣謹㑹同山海􅀜廵􅀜御史王漸從石塘嶺起東至古北口墻子嶺馬蘭谷又東過灤河至於太平寨燕河營盡石門寨而止凡為區者柒查得原額兵共七萬六百零四名見在四萬六千零三十七名逃亡二萬四千五百六十七名又㑹同居庸􅀜廵􅀜御史蕭九峯從黄花鎮起西至於居庸􅀜盡鎮􅁁城而止凡為區者叄查得原額兵共二萬三千二十五名逃亡一萬零一百九十五名總兩􅀜十區之兵原額共九萬三千八百二十四名見在五萬九千六十二名逃亡三萬四千七百六十二名此外又有天津河間等衛春秋兩班官軍二萬二千二百八十二貟名又有大水谷白羊口曹家寨遊兵三枝共九千名其各區原額見在逃亡老弱花名細數容臣等造冊奏繳外臣竊惟致弊之端兵之缺額之故易以見而兵之不練之故難以㝷至於救弊之䇿􅀘兵猶易而練兵則難故臣竊以兵之不練與練兵顚末為陛下陳之臣嘗讀史漢光武以漁陽突􅀐定天下以至於唐藩鎮專兵而盧龍一道常虎視河北唐人所謂其人慷慨勇悍而沉鷙者也薊兵稱雄其來乆矣比臣等至鎮則見其人物􅃈愞筋骨綿緩靡靡然有暮氣之惰而無朝氣之銳就而閱之力士徤馬什纔二三鈍戈弱􅃓徃徃而是其於方圎牡牝五陣分合之變既所不講劍盾槍箭五兵短長之用亦不能習老羸未汰紀律又踈守尚不及戰則豈堪其間伉壮可選者惟各􅀜寨夜不􅀵千餘人及三屯建昌兩營古北燕河兩區廵撫標下民兵射手數百人而已嘗竊恠之所謂漁陽突􅀐慷慨而沉鷙者今又安在也自國家定都燕京而薊鎮在甸服之内百餘年來雖熟夷時有小警無大兵革荷戈之夫含哺垂白故豢養偷惰之習日以成而激烈蹈厲之氣日以銷逮庚戌年間北虜諸酋合謀入寇又仰賴聖明主㫁廟堂贊議深惟北門管鑰之地山陵宫闕至慎至重不欲以􅀉於疲夫懦卒之手遂乃近檄宣遼逺徴延固十萬之師雲擁輻輳先聲所震醜虜喙息雖則甲胄蟣虱於道途杼軸匱竭於轉輸亦其時之不得不然也邇年寛佃流河之寇遼兵禦之猶不能遏其鋒竟至深入徃年土墻之寇賴延綏之兵極力抵塞虜纔遯去若以鎮兵當之誠不知其􅀔之所至矣然而事出從宜本非經制練主减客聖諭乆頒不謂自是之後􅁁兵徴􅀤歳以為常而督撫諸臣因循襲玩遂使鎮兵置而不理其居常秪以充運􅁅搬石築墻之役而未嘗教之坐作擊刺之節其有急秪以供守墩坐寨擺􅁁之用而未嘗責之臨陣禦敵之事八九年間為督撫者亦幾何人中間以練兵為􅀃謂不在增兵而在練兵者僅見總督楊博一䟽而已然則兵之積弱已非一日之故而兵之不練弊亦乆矣所謂專倚􅁁兵不練土兵者誠如明㫖不敢飾虚竊以為目今􅁠時之宜且可責鎮兵以為守量調客兵幾枝以為戰待鎮兵練得一枝精銳然後將客兵再减一枝至於舉軍盡練得精銳士爭抵掌人賈餘勇一旦遇虜必不退懾屹然足為北門􅀝重然後更議免調之期則望實不失而經􅁠兩得也軍額之曠缺既如彼練法之踈闊又如此副叅遊擊􅀽正等至千總提調以下俱合有罪但人之來去不常任之乆近不一合無勅下兵部備查前後諸臣在任日月分别輕重具奏至於督撫總兵諸臣職在總領􅀜係尤重自嘉靖三十年以後曾奉明㫖者俱屬誤事其去任諸臣合勅兵部查奏竊照今任總督王忬總兵歐陽安廵撫馬佩等既承明㫖􅁍昩壮猷但知番戍逺調足辨目前不思蒐乗詰兵用圖乆計一卒不練聖鑒甚明三萬缺籍典守安在遂使徴兵給餉役費無已勞師匱帑誰任其咎以上諸臣歴任則有淺深誤事俱屬有罪但近奉明㫖今防秋巳近責限王忬歐陽安等刻期嚴督操練防禦惟復防秋之後聖明自有定奪臣不敢擅議縁係遵舊規請明調遣以重防秋事理未敢擅便謹題請㫖條陳薊鎮􅀘兵足食事宜臣竊惟􅀘兵如􅀘敝衣敝壊則易而􅀘綴則難故叙􅀘兵之􅀃凡五條兵之與食喫􅂃相􅀜故附以築墻工食及􅁁粮之􅀃凡三條伏􅀩聖諭令臣悉心區畫來聞臣不敢不竭其愚伏惟聖明裁擇一清弊源以􅀵逃卒臣閱軍薊鎮究軍所以多逃亡之故皆曰􅁁墻之工卒歳不休轉石顛崖伐􅀣深澗力辦不及貸錢賠貱加之各􅀜夷人乞討無時旬撫月賞悉出窮軍􅀅官侵尅毛􅁵剥削文吏盤􅀧畨増漁擾窮軍生計止是月粮斗割升除而月粮得入軍腹者幾何矣至如召募之軍多非土著不縁身迫窮窘誰肯自同罪謫衣粮既不滿望工作又盡其力􅀔如鳥徙亦何足恠兼以石塘古北本號苦寒地旣虜衝土尤磽确哨守之勞已甚資生之計盡無原與逸肥之軍一切衣粮不異是以募軍之逃尤甚於他軍而石塘古北之逃又甚於他處也竊惟國家恩爪士以冀死力豈欲縮其口食以饜餓豕之私求而又奪其生計以佐設險之公費乎且國家歳出築􅁁銀數十萬兩而又令窮軍賠貱歳給撫夷銀三萬兩而又以累窮軍臣不知其􅀃也今欲抽軍操練則一身不能兩役墻工自須别議至於撫夷之費合令督撫諸臣仔細計算如國家歳給彀用則巳不彀則請於朝廷别為區處一毫不以累窮軍其将官文吏貪饕之軰重法禁治但使窮軍全得一石月粮長􅀌畜妻自然不走至於苦寒之軰縁軍士衣粮普天同例縱欲加厚其道無由臣思得一􅀃京􅁁折銀給軍皆是六錢五分薊鎮獨是四錢五分始者盖因本鎮米賤􅁠為節减原非經制且夫糴之貴賤因地膄􅇤假如腹􅂻糴價五錢六錢則窮􅁁㫁是八錢九錢柰何使苦寒與逸肥一様同折非稱物平施之義也合令户部量地均筭自薊鎮苦寒米貴之處照例給與折色銀六錢五分在國計則本分之外毫末不加在窮􅁁則同軰之中已稍優厚其逸肥米賤去處自不得援此為例􅀂謂銀不可増則如前時總制楊博所題鎮􅁁横嶺事例每年十二箇月悉與本色亦無不可如此百方體悉庶足繫屬其心不然雖終日攖以徽纆猶難保其不掊鎻而夜走也一專責任以嚴勾􅀘照得薊鎮之兵自内地衛所抽徃􅁁􅀜譬之泉貨衛所乃其出産而􅁁􅀜是其轉輸處其逃􅁁􅀜而潜囘衛所則衛所實淵藪之區轉輸有缺責之出産逋逃不􅀗問之淵藪然而逃軍徃徃不􅀘者盖是營衛互相推調營官則曰衛所窩逃軍納月錢而不肯解也衛官則曰營官剥削軍士以致之逃而我無柰何也營衛本為一體而矛盾若此則無官以兼制之之故也該鎮得兼制營衛者惟督撫而督撫大臣專理兵機􅀔不得親細事其下惟有兵備道合無請勅一道以􅀘軍責之兵備其營官之剥削與衛官之窩逃者兵備皆得重法治之營官以逃軍多少而輕重其罪衛官以􅀘軍多少而輕重其罪併論衛官􅀘軍之多少與營官逃軍之多少又以爲兵備功罪責任既專缺額自足其􅀘軍之法逃軍先儘本身故軍先儘子孫不足則均之同伍均之同隊以至通一衛之餘丁而􅀘之又不足則取之城操正軍於勾􅀘之中寓垜充之法大率務如原額而止然缺之於數十年而􅀘之於一旦太急則人情不堪合令督撫與兵備計議量其缺軍分數一年可􅀘完幾分年終如其分數而責之其亦可也一定班戍以便人情照得古北石塘一帶􅇮縁旁近州衛􅀍虜殘破因而垜募逺軍當時垜者迫於令而不敢不行募者貪於利而不顧其後及至戍所營房亦無􅄯錯云人情非有匹偶不能乆居其所此軰徃徃身􅀉窮􅁁家懸千里采􅅔之遣既乆及􅀲之代無期齎送屢空衣鞋莫􅁇始於潜返馴致乆逃揆之人情殊非得巳是以日逃日解隨解隨逃逃解相仍徒滋煩擾近者督撫開移逺就近之例臣亦有首逃區處之文因而首者紛然益可見其情矣臣以為不與區處則無以囘逃者之路􅀂與改編則又恐揺居者之心酌中二者頗得一􅀃但係六百里之外或分為兩班一班備春一班備秋或并為一班半年城操半年秋戍其在官則向之終身逃􅇡孰與得半軍之用其在軍則向之終歳浮􅀉孰與得半鄉之閒既可稍近人情又不改移原戍詢諸逃卒亦儘稱宜且戍軍在其鄉則食减支六斗在􅁁則食行粮四斗五升則是一軍止食半軍之米在􅁁扣其餘米亦足顧募半軍待本處募軍足彀原數然後将逺軍更議改編其五百里之内及舊額之軍不係以後垜募者自􅀘原戍處所絶不得援此為例一處民兵臣聞長民者貴因事以為功則民不困而事易成今薊鎮民力亦巳竭矣不可以加矣而薊鎮之兵與馬方患其不足也查得永平府志書所載本府原無民壮正統末胡虜冦􅁁僉設民壮二千五百名可見畿甸民兵原為􅀍虜而設也即以本府備虜之設還為本􅁁備虜之用閒時則州縣駐操有警則就近守􅁁度永順二府可得民兵六千人分為二枝每枝統以一逰擊督之兵備而􅊢於廵撫閒時止用原設工食守􅁁則給行粮而巳此為官不增粮民不増賦而坐得兵六千人也又查得山東有馬民兵三千名原為薊鎮而設今暫用之南征事巳則湏仍還薊鎮若使不用其人而徴其功食以為本鎮就近顧募之用則山東民兵每名歳該工食銀三十餘兩三千名歳徴銀九萬餘兩就近可顧募歩兵七八千人又查得薊鎮事例歳該取腹裏减存民壯工食以爲本鎮募兵之用今此銀不知積之何所但得銀三萬兩足顧募三千人此亦爲粮不増於官帑賦不加於薊民而坐得兵萬餘人也又查得薊鎮缺馬多從兵部兊給合永平一府歳該解備用馬九百餘匹􅀂停兩年該解之馬又貼以遵化等縣寄養馬一千餘匹以給薊鎮民兵足成馬兵三千人且京師之馬不必給薊薊鎮之馬免於解京互相抵兊兩爲便益其兩年之後自照例解京如故此所謂民不困而事易成者也一處班兵竊聞聚兵者先料其食薊鎮主兵若足原額将及十萬即使月粮一半折銀亦湏本色米六十萬石歳歳轉漕胡以辦此則是舊額不足正苦少兵舊額􅀂足又苦少米矣今􅀘主兵以免客兵也免客兵以省費也臣嘗計之客兵每歳防秋四月該支行粮一石八斗主兵一人每歳該支月粮十二石出戍百里行粮又在其外主兵一人之費足抵客兵七人之費而有餘主客之馬費亦如之然則調客兵代主兵計各處則爲增費在薊鎮則爲省費也􅀘主兵代客兵計各處則爲省費在薊鎮則為增費也今欲米不增於薊鎮兵不煩於逺調惟是班軍可以經乆查得薊鎮天津河間等衛春秋兩班官軍已有二萬二千八百八十二貟名或於京班中再撥一枝兩枝或於班軍原衛抽補餘丁一枝兩枝足成三萬人以充該鎮主兵之數而以逰擊十人分統之閒時則於原衛駐操防秋則於該鎮上班駐操則本處兵備監督上班則該鎮兵備監督其原衛官聴該管逰擊節制班軍如有老弱逃亡原衛即與僉􅀘此其粮不增而兵足所謂經乆之道也一築􅁁工費自來􅁁墻皆是軍民兼築今欲抽軍操練所謂墻工自湏别議其原編順天等八府民夫逺則徴銀顧募近則沠夫上工若以􅂀夫計之每夫一名一月該盤􅅶銀二兩百名該銀二百兩每夫百名一月止築墻二丈每墻二丈又該官給塩菜銀十兩則是二百十兩之費止彀築墻二丈若以顧募計之每墻一丈該銀十五兩則是銀二百十兩該築墻十四丈矣顧募十四丈之費止抵􅂀夫二丈之費是差却七倍來徃􅀂一築徴銀顧募則官得七倍之贏民免去家之擾墻􅀗早完徴􅀤亦息只是夫與價互換之間而其利如此一復本色以存乆計照得薊州倉粮遮洋總二十四萬石百餘年來元運本色並無升斗折色至正德末年始議折十萬石嘉靖十二年又議折四萬石彼時建議之臣偶見本鎮米賤糴價不上四五錢以爲九錢一石徴銀而以六錢一石給軍則國與軍皆有贏羡又省造船漕卒之費是以輕議變法曾不慮及歳有豐歉糴無常賤今年灤東饑饉一石折色不足以糴四斗本色諸軍坐困菜色至今况自古轉餉以人􅁠米以米􅁠銀必三相稱乃無偏重彼時薊鎮原無大虜聚兵甚少故减米增銀猶謂時宜今聚兵至十餘萬歳費主客銀七八十萬而米不及十四五萬一旦窘急無處糴買不得巳則穵運京師脚價轉多騷擾尤甚非得計也故臣以復本色為便又諸􅁁皆是陸運故致米為難薊州一路水運故致米則易至於造船漕卒諸費但取昔年未變折色以前之舊法即是今日欲復本色以後之定規故牘尚在無俟他求縦不能盡復本色亦可先復一半七萬石使該鎮每年給軍之外餘粮常有二十萬石在倉然後更議减本加折盖嘗覽史記貨殖傳載諸富家多積金帛而任氏獨窖倉粟遇歳饑諸富家金帛盡折而入於任氏趙充國亦言湟中糴米三十萬斛諸羗不敢動矣諺曰小可喻大田舎翁作家與老将籌􅁁未嘗不以多積粟為先務慮至深也一處轉般以便支給照得灤東一帶軍士原在永平山海等倉支粮後海運既罷始移在薊州倉薊州去灤東逺者五百餘里自來未有徃返千里而􅀒粮者甚至一石之米不足以償盤剥之費窮軍毒苦不能盡言前年虜酋入犯馬蘭谷止因墻軍逺出支粮嘹援不及竟至深入破堡殺􅀅其為􅁁境之害深矣􅁁境之害既如此窮軍之苦又如彼而卒莫有為之處者户部重惜脚價也臣竊計之灤東之運一歳湏米三萬石自薊州倉運至永平急則驢駝人􅀒度用脚價八九千兩緩則車載脚價可六千餘兩而足國家歳為薊鎮費銀百餘萬兩乃靳此百分之一至使軍苦無訴又使虜得乗􅂩則是所惜至小所損甚大合無置一戸部分司於永平使與薊州郎中相首尾歳增脚價六千兩其本色三萬石與折色銀數萬兩悉運至彼處支給軍無逺支􅁁不缺戍計亦甚便又臣所謂脚價者非必歳歳而用之也訪得灤東等處大率十歳而九収豐収之年不必運米但取銀於薊州而糴米三萬於永平本處則脚價亦自不用即以减存脚價亦作糴米本銀六千兩銀可得米萬四五千石􅀂十歳豐收則米當至十四五萬石即以此脚價所積之米賤則糴貴則糶收其羡利還充脚價而本米常在則十年之後所謂歳増脚價出於戸部者亦不必用矣此亦富􅁁之一䇿也則是國家所損至小所利甚大特在立法之􅀄户部擇一有心計司官經畫之而巳條陳薊鎮練兵事宜臣竊惟兵之精不精係薊􅁁安危薊􅁁安危係畿甸利害非可容易且夫薊鎮猶之家也以兵為墻垣而以屬夷為藩籬猶之身也以兵為爪牙而以屬夷為耳目故以夷情附練兵之後共九條臣欽奉敕令臣悉心區畫來聞臣迂闊書生軍旅未學豈足仰承聖意亦效愚者之一慮而巳伏惟聖明裁擇一責大帥以主練夫軍旅之事非可以人人而能也至於變疲卒為強兵卒能以積弱之餘雄冠一時者自古以來其人亦僅僅可數何者其規模闊大必有廓犖驅駕之氣其工夫精細必有沉鷙縝密之慮所謂精神折衝者而後可以語此耳薊鎮之兵積疲乆矣自庚戍虜寇以來所恃者􅁁兵而巳鎮兵止以充擺牆守垜之數如偶人之持挺耳今陛下責鎮臣曰練兵鎮臣亦唯唯曰練兵倘或異時􅁁兵既散虜患卒至而後知鎮兵之僨事也亦巳晚矣是則今日􅁁臣易以任其責而異時彊圉誰與同其患雖重罪􅁁臣其何益之有與其懲既徃之躭誤孰若慎􅀅來之責成請陛下聖明洞視督撫諸臣與廟堂再三斟酌其人必足以任此而後以付之使其人亦自以先資之言陳於上曰幾年而後鎮兵可精幾年而後􅁁兵可罷而陛下因以考其成則所謂勞神於選才端拱於委任者也一定區帥以分練夫官以乆任成功而彊圉之臣尤更不可數易臣至薊鎮問某叅将則曰到任纔數日也問某逰擊則曰到任􅂊一月也是時已逼防秋竊以為􅀅官朝來暮去􅀂此萬一虜入得無僨事難矣况欲練兵為長乆計乎請以防秋之後督撫諸臣遍閱叅遊等官區别具奏其不才者而黜之其宜於内地者調而徙之悉取各􅁁􅀅官結髪慣與虜戰有威名而識陣􅀔者一缺具三四人以聞而内地選愞未嘗見虜之輩與油猾鑚刺之人一不得與其間陛下下之兵部而每區各定叅逰一人以為區帥是謂以􅁁􅀅練鎮兵縦不得􅁁兵但得􅁁􅀅庶幾練鎮兵為􅁁兵也其人既定約以三年為率不許陞調非有大罪不得輙易小罪則戴罪供職大罪亦即於本處立功不得復還原衛三年大計其功罪而賞罰之下至提調􅀜寨等官亦准此為例如此則将官自知責無所諉而不敢不盡心於練士其士卒亦知􅀅有常屬而不敢不督率鼓舞以從其令矣其與朝來而暮去者功相百也一明賞罰以勵士夫肅隊而趨挺矛而舞非以為戯也􅀅責之以臨陣禦敵之實用也責之臨陣禦敵之實用而不以臨陣禦敵之賞罸施之則亦戯而已矣史傳所記子玉治兵鞭七人貫三人耳孫武以婦女試陣法而戮其女隊長二人然後鼓之而無不如志然則古之治兵者大畧可見也請於常廪之外多儲金錢以賞其用命者以作其投石超距之氣其不用命者縦不能盡如臨陣之刑而軍令所謂鞭抶貫耳等􅀋許􅀅官督操亦時一行之以示威或聮爲伍法罸及同伍紀律既明人心自肅至其臨陣庶幾畏我而不畏敵矣一雜􅁁兵以同技臣惟練鎮兵以代􅁁兵也􅀅以代􅁁兵而不教之以􅁁兵之法是織而不問婢者也今諸􅁁之兵後雖以漸减調而延綏逰兵則􅀔未能遽罷虜人所憚惟綏兵耳宜及綏兵之未罷雜之薊兵間而教之每薊兵百人雜綏兵二三十人授之以綏兵之長技而試之以綏兵下營走陣遇虜鏖戰之法至於號衣語言無一不效之而與之同又以其暇時使綏兵談􅀃虜人之情状與對敵勝敗之故事以熟習薊人之心而使之不懾則異時􅁁兵雖去鎮兵猶􅁁兵也且夫虜人憚綏兵而易薊兵也乆矣薊兵長枝號衣語言無一不與綏兵同使布滿薊􅁁者皆為綏兵一旦奪其所易而讋之以其所憚此亦攻心之一竒也一備選鋒夫諸軍雖是一般教練而力有勇怯心有靈蠢不能一律而強同故必有軼材異能為衆所服者兵家亦有輕足疾走翹􅀜􅀒重者聚為一卒㧞距伸鈎洞逺貫堅聚為一卒詞辦機巧能移人意者聚為一卒等􅀋其能既為衆所服人自不敢望與之同而􅀅官亦每厚遇之粮廩之外時有給賞解衣推食亦不自惜乎居則以倡率同軰踴躍赴功臨戰則以先登䧟陣出竒破敵此軍中鼓舞駕馭之術也昔李徳􅁉為劍南節度使建籌􅁁樓選異能之士取􅃓人於河中取弩手於宣潤一􅃓弩之技不憚數千里而致之此又在帥臣識量何如一練火噐虜所最畏於中國者火噐也國􅀄止有神機火槍一種天助聖明除兇滅虜而佛朗機子母砲快槍鳥嘴銳皆出嘉靖間鳥嘴銳最後出而最猛利以銅鐡為管木槖承之中貯鉛彈所擊人馬洞穿其􅀧放之法一如弩牙􅀤機兩手握管手不動而藥線已燃其管背施雌雄二臬以目對臬以臬對所欲擊之人三相直而後􅀤擬人眉鼻無不著者捷於神槍而准於快槍火技至此而極是倭夷用以肆機巧於中國而中國習之者也徃年京師亦嘗造數百管其鋉鑄既苦惡而又無能用之者是以遂為虚器請令東南軍門取其精者數十管而與善􅀧放者數人至京師陛下令大臣閱試之使知有此器而不用以保全虜人之腰領其亦可惜也一申閱法夫營寨官練成營寨兵而閱之區帥區帥練成區兵而閱之督撫其亦可矣乎未也臣竊􅀚高皇帝以武功定天下深慮承平之後武備寖弛以啓戎心而定為御前閱試之法千萬里外亦分番迭上躬自校閱而嚴賞罸之載於㑹典者可考也薊鎮近在輂􅂖下耳請於塞垣無事之時抽調鎮兵一枝兩枝至京師令大臣於教􅂣閱視其果練與否而明詔嚴賞罸之其機􅀤於堂陛之間而風震於塞垣之外其帥臣常如天威臨之而不敢不盡力於教練其士卒常如天威臨之而不敢不盡力於演習無有敢肆欺於聖鑒之所不及而虚􅀿故事者矣此所謂執一實以御百虚之道也一調戍􅁁以試練夫以􅁁将蒞之以􅁁兵雜而教之其亦可以為􅁁兵矣雖然猶未嘗見虜也見虜安知其不怯而却也宣遼二鎮與薊本相唇齒薊鎮有事則宣遼自宜戍薊異日薊鎮無事而宣遼有事請抽調灤東兵一枝兩枝戍遼灤西兵一枝兩枝戍宣居常則以經阻險而耐辛苦猝有虜患亦雜之戰兵之間而與為犄角既嘗搏虎不畏􅀒隅後與虜遇自然習慣且夫昔以􅁁兵戍薊今以薊兵戍􅁁是練兵之成也一薊鎮夷情照得三衛夷人與諸􅁁異諸􅁁之夷必闘之賊也三衛夷人則不然竊􅀚文皇帝出塞皆用三衛為前鋒所謂以夷攻夷是以所向如意而文皇帝亦豐金帛厚犒之至於累朝亦儘為不侵不叛之臣每盗北虜之馬以獻而時時為中國隂詗北虜累朝亦豐金帛厚犒之後來􅁁臣與之力争一馬一紵之利以失其心是以寇盗竊􅀤至於攻城堡殺叅􅀅而􅁁臣又不分逆順徃徃撲殺誘殺之是以激而導北虜殘中國皆􅁁臣不知大計不識祖宗羈縻畜養之深意激之變生以馴至此極也由此言之北虜得三衛則足以蔽中國之耳目而資其鄉導以窺中國中國得三衛則足以奪北虜之鄉導而更為中國隂詗北虜蠢兹小醜宜無足論而􅁁境安危之機亦畧可見矣陛下於貢馬常賜之外歳􅀤銀三萬兩與薊鎮為撫夷費此聖明并包夷夏神謨英畧同符成祖者也今三衛雖資北虜結婚之􅀔而亦戀中國歳賚之利雖或􅀍脇而鄉導北虜以攻為蝥賊亦每效順而送哨中國以私求貨賄雖或利北虜之内侵而拾其棄餘亦殊苦北虜之經過而殘其聚落所謂赤子蝪蛇􅀔未有定且我之􅁁備三衛纎悉必知而北虜信使無日不至三衛每夜不􅀵到三衛酋帳中無一次不見北虜使在其間此其事誠不可不深長思也誠使督撫諸臣震兵威以奪其心損財帛以結其心時用秘計以􅂝其交縦不能使之以夷攻夷亦可使必為我耳目而不為賊鄉導此在􅁁臣知大計者方畧何如耳御得其道狙詐作使此之謂也又臣竊見始者北虜寇秋今寇春以至無時不寇徃年之寛佃谷三月則寇前年之黒谷􅀜正月則寇昨年之河流口三月則又寇嘗竊恠之以為北虜在沙漠之外又春月馬弱之時縦是疾馳不􅀿至此及至薊鎮始得其􅀃盖把都兒打來孫二虜自嘉靖二十九年以後􅀵屬東夷而居其地遂巢穴遼薊間馬路不八九日而至牆下而屬夷一二不逞者又為之偵候鄉導是以遼之前屯薊之灤東其患日尋而不息也夫中國之與夷狄譬如大家與盗賊為隣不慮其強而慮其近近則我之防備無休而彼之抵􅂩又便河流寛佃之失可鑑也合令督撫諸臣詳議何計可以㫁屬夷北虜之交何計可以隔逺北虜使不得非時入寇務求長筭母辨目前庶􅁁境有金城之安而免於無時不備之困矣條陳水運事宜一通水運以便轉漕照得水運之費比陸運六分而减五國􅀄運道自登萊逹於遼東自直沽逹於山海永平薊州一運至五六十萬石今永平西門之外濵於灤河寔通漕舟故蹟猶在而舊倉亦多後因遼薊本處米賤而轉漕一石之費足糴本處三四石是以本色徃徃為折色變本色為折色是以海運遂無所用而罷不盡縁畏風波之故也然海運雖罷而民間之泛海輸貨於豐閏諸縣者則未嘗絶本稱小海不係大洋今歳夏間聖明念遼人之飢弛海禁運米賑之恩徳甚厚遼東海運既通則薊鎮已包在内永平故運之復寔惟其時但薊遼之人素不習海一遇蹉跌遂徴創請以厚直募東南海濵之人與直沽乆慣海商造為海船人慣船牢自然利渉又薊鎮東西無處不有巨川上通􅀜寨下流通海而未嘗有一葉之舟問之土人則曰淺灘峻石怒水􅁀漲盖臣嘗徃閩浙見閩浙人舟行石鏬間屈曲無碍或拖舟碎石之上亦不畏淺也至於水之漲緩有時水漲停運水緩通漕亦何不可前人未暇經理者特以地在窮荒不欲費財力於無用而已非果不可行舟之故也今密雲古北喜峯諸口皆屯重兵則聚粮不得不多聚粮多則咽喉不得不利河運之通亦惟其時縦不能通潮河於古北通灤河於喜峯而潮河可通密雲省陸運五十里則先時總制楊博䟽稿具存經理亦密灤河自永平可通灤陽營省陸運一百五十里則户部郎中羅廷紳嘗謂臣言之且水運一歩亦省陸運一歩脚價即以異日脚價所省扣為今日䟽鑿所費募閩浙之人造閩浙之船以教其土人河功一成盖有四利􅁁城積粟豐凶有備士嬉馬騰此一利也官漕既通商舟亦集昔時荒野遂成賈區此二利也穿渠溉田磽瘠之地淤為沃壌此三利也渠澮滿野因成水匱制限胡􅀐不得突越此四利也不然則鄴水在旁而不知引此西門豹之所以為笑於史起也閱視軍情首䟽題為議處倭冦懇乞天恩差官共圖安攘以保萬世治安事臣於嘉靖三十七年十月二十五日欽奉敕該兵部題稱浙江舟山餘冦未靖皆因文武職官水陸兵将不肯協心効力以致日乆財費欲要差官閱視催督進兵兹特命爾前去㑹同總督胡宗憲及嚴督總副叅將海道兵備守廵等官􅀅見在餘冦尅期蕩平各該文武職官敢有偏拗怠玩阻撓軍務不行一心平賊者爾即指名具實叅奏治罪其有内逆與賊交通接濟者著宗憲多方訪拏斬首梟示進剿機宜及軍門粮賞缺乏聴爾與宗憲相度措處便宜而行将來海防一應合行事務爾有所知見查照兵部原題條奏以聞朝廷以爾素􅀒才名諳練兵事特兹簡用爾宜益竭忠猷以禆東南安攘大計庶副委任爾其欽哉欽此臣受命驚􅅥不敢自寕星馳前徃於本年十一月二十八日至浙江省城㑹同總督胡宗憲行據總督軍門中軍署都指揮僉事戴冲霄呈報於十一月十四日官軍攻逼賊巢各賊畏懼棄巢奔舟倉皇潜遯去訖巢中巳無一賊等因到臣除攻巢節次及賊遯蹤跡該總督總兵諸臣自行奏報外其用兵以來文武職官功罪容臣查勘的實及一􅀿海防事宜容臣遵奉勅書嚴督總副叅将兵備等官詳細區畫俱另行具題外為此今􅀅到浙日期并前項縁由理合具本題知三沙報捷䟽題為仰伏天威官軍出海邀賊鏖戰克􅀗奇功事臣原奉敕書㑹同總督胡宗憲督剿舟山餘孽及本部題奉欽依一體㑹同江北江南廵撫經畧海防臣至浙江舟山賊以先遯謹具題知外及數月以來身歴江海一􅀿經畧亦漸知要領正欲起程復命間忽得海上警報南洋北洋盡是賊船臣即趨嘉興㑹同總督胡宗憲面議方畧又趨吳淞所㑹同廵撫陳錠亦面議方畧以為非禦之於海則不能制其衝突又以東南賴皇上恩徳海波平静閭閻休息二年有餘深恐人心玩愒賊鋒方銳非有出格賞罰則官兵未必用命謹遵勅書嚴督副總兵官盧鏜逰兵把總楊尚英邵􅀿魁等􅀂容一賊登岸定以失機叅奏從重治罪及與督撫兩軍門議定賞格有能打破賊船一􅃗連人船拏􅀗者當即賞銀五百兩内衝鋒船加賞其斬􅀗首級數多或一船至三十顆以上真正倭賊首級者另行給賞􅀅官打破賊船至三􅃗以上當以竒功論薦賞格既定又以非有監臨文官下海督戰猶恐諸􅀅士畏避潮險賊銳不肯出洋邀擊適報有賊船二􅃗泊崇明營前沙諸将擁兵􅀚望賊得逸去徃江北登岸臣知事急即從吳淞江口泛海至崇明縣爛沙洪時廵撫陳錠即遣主簿郝㙠齎懸賞銀二千兩随臣至海船開匣拆封徧示諸官軍諸官軍色動鼓舞踴躍思奮未幾總督軍門貼􅂇賞功銀一千兩亦解至而廵按御史朱綱廵江御史江北亦􅊧刷􅂍罸􅂇軍兵備僉事熊桴解到月粮火藥方船而至諸官軍則益踴躍正料理間江北連報海賊登岸前後積至七八千人廵撫李遂告急之書亦一日數至臣原奉欽依㑹同江北廵撫聞報驚惕懼􅀒委任遂以海事付托諸将嚴督盧鏜泊爛沙洪楊尚英泊三沙洪以候賊至不許退入港門一歩臣即馳徃杭州㑹同宗憲前後計􅀤援兵一萬八千餘人臣亦從後馳徃􅀭州督戰行至崇德地方得盧鏜報照得本職親統逰兵都司楊尚英等兵船出哨北洋四月􅀄九日哨至三爿沙適遇新到大倭船二十餘􅃗并随帶小船俱収本沙約賊二千餘衆随該本職分布各哨官兵船􅃗四路埋伏􅀄十日早各船奮勇齊進舉放佛狼機鳥銃噴筒火箭併力攻打犁翻賊船三􅃗打破四􅃗生擒真倭一名共斬真倭首級一百一十三顆倭噐倭衣共三百四十六件溺水死者不計其數餘賊荒張随潮沿灘収入三沙地方見今兵船圍剿等因臣竊照此二十餘船之賊若是不上南岸必上北岸若上南岸則江南方幸無賊豈堪此賊殘破若上比岸則陸賊巳将及萬又添此賊合夥如熾火加薪􅀔􅀅何止今聚而殱之海中雖云捍禦於江南實以分殺賊􅀔於江北海賊旣殱陸賊自然破膽且自來海中􅀗功止擊歸賊不擊來賊歸則賊氣已惰賊貲又滿人既樂擊擊之又易來則賊氣方銳賊船又空人不樂擊擊之又難擊賊之歸如虎㗖人而人殺虎虎斃而人巳殘擊賊之來如虎未㗖人而人殺虎人不傷而虎斃然自有倭患十餘年其間擊賊之來者僅徃年朱家尖之捷與今日三爿沙之捷而巳此實聖明玄威廣運廟堂成筭本兵調度督撫協謀諸􅀅用命之所致也臣誤􅀩任使適會成功皇上命臣為視軍情官理合題知上寛聖慮其有功官貟總兵官盧鏜僉事熊桴都司楊尚英把總邵􅀿魁楚􅌡陳文麟指揮濮大有鎮撫包守正等容臣㑹同督撫諸臣查實功次另行具奏外又前此打破賊船不分賊來賊去同是一様賞格人不知􅂆伏望勑下兵部㑹議擊賊之來委與擊賊之去難易不同另立竒功賞格鼓舞士氣此為伐謀之上䇿再照江北賊情十分􅂃急職奉勑徃視計非激賞則亦不能成功况􅀿援之兵四靣輳集平時㑹計原不及此若是軍門粮賞果係缺乏容臣遵照勑書查有漕運衙門積下輕齎銀兩廵塩衙門積下餘塩銀兩及各衙門無碍銀兩㑹同廵撫李遂便宜而行一􅆕借支數萬兩􅀿急一􅆕具本題知外縁係仰伏天威官軍出海邀賊鏖戰克􅀗竒功事理爲此具本謹題請㫖海賊分道侵突䟽題爲海賊分道侵突一枝斬􅀗幾盡一枝盤據未散事照得江北賊􅀔奔突始由狼山副總兵鄧城等不能嚴督兵船逺哨防禦以致登岸既而鄧城及守備楊縉等又不能設䇿剿捕致賊屯聚散刼及逰擊丘陞等斬􅀗堵截俱經總督及撫按諸臣節次具題外臣連得警報從崇明海上趨徃浙江省城㑹同總督胡宗憲計議深惟畿甸重地陵寝密邇星馳赴援不敢寜居前後計􅀤援兵萬餘先是宗憲㑹同臣題奉欽依用銀一萬兩分遣都司何本源把總指揮邢鎮募山東兵三千名防守江南及是尤恐江北事急援兵未到宗憲與臣各行文書将前兵截駐江北聴廵撫李遂調遣殺賊四月十四日臣督􅀤援兵至􅀭州得淮􅀭叅将曹克新報本月十四日奉提督軍門李都御史鈞票内開大夥倭賊已過塩城必趨廟灣仰職前赴聴調㑹同各路兵馬夾攻等因扵十八日行至地名姚家蕩與賊相近劄營十九日辰時大夥倭賊約二千餘突衝前來本職帶領􅃓箭家丁親身首先衝鋒迎敵奮勇齊進對陳斬殺賊首二百零三顆指揮倪鎮梅三錫部下共斬首級一百零八顆等因又據把總指揮邢鎮報􅀩總督胡軍門鈞牌及本部鈞票着令暫駐江北聴調殺賊行至淮安適㑹賊至􅀩李軍門調充左哨盡力夾攻部兵斬􅀗首級八十五顆等因又據原差募兵都司何本源報􅀩總督胡軍門鈞牌及本部鈞票着令暫駐江北聴調殺賊行至淮安適㑹賊至􅀩李軍門調充右哨盡力夾攻部兵斬􅀗首級五十七顆等因臣竊照廟灣之捷由都御史李遂分布得宜成此駿功擐甲臨戎盡敵而返至於左右兩哨官兵實由總督胡宗憲移江南之募以􅀿江北之急先期􅀤機㝠合符節此實皇上玄威廣運廟堂成筭本兵調度督撫同心協力之所致也又據淮􅀭兵備副使劉景韶報四月十六日如臯縣報續到倭冦三十餘船十六日早已到白蒲鎮約冦二千有餘竊照今歳倭冦先到者尚未剿盡後來者又復深入且賊􅀔更大官兵俱困等因又據劉景韶報續到倭冦十九日辰時毛兵交戰不利殺傷官兵百餘陣亡趙千户􅀍賊越過海安銳意西向鋒不可當本道見得事􅀔危迫督令逰擊丘陞把總賈勇夾攻毛兵止許劄營不得浪戰去後續據報稱各營從間道復又繞出賊前大戰數合斬􅀗首級四顆賊復退囘海安屯聚等因臣竊照江北之賊北路散入廟灣者殺戮幾盡南路流刼海安者屯聚未散其先時失事及近日􅀗功官軍容臣查䆒的實及未散餘賊方在併力㑹剿另行具題外縁係海賊分道侵突一枝斬􅀗幾盡一枝盤據未散事理為此具本謹其題知三沙賊遯䟽題為巢賊遯走将官失誤防禦事照得三沙軍情自本年六月十三日以前巳經廵撫都御史陳錠㑹題外臣於七月􅀄九日自崇明縣起身􅰯太倉州打􅀤湖廣土兵三枝囘還間十七日據整飭蘓松兵備僉事熊桴呈據逰兵都司楊尚英報三沙殘賊圍困窮逼於十六日四更時分風雨大作乗潮由三沙北􅆕􅘐港地方徃北洋遯走去訖等因到臣臣即星馳前徃江北體勘賊情行至鎮江府據鎮江衛報據􅀲州鎮廵檢司報准吕四􅂣報本月十七日餘東􅂣地方七星港西南江有小倭船四十餘􅃗登岸燒刼約倭七百餘人徃西近通州地方去訖隨報備倭把總張大義防禦外等因據此查得先據守備盧相呈抄􅀩狼山副總兵官曹克新紙牌奉提督李軍門鈞牌備仰副總兵官督同卑職相度各兵船損壊撤囘營前沙停泊修理仍分撥小船逺哨等因遵将各船於本月十五日駕囘營前沙停候副總兵官估計修理以防􅂃急之用其北岸信守已該兵備熊僉事􅀅邵把總部下兵船分有堵截外卑職仍選便利沙槳等船十餘􅃗親督在西沙觜一帶協守等因據此則三沙北􅆕􅘐港地方原係盧相邵􅀿魁􅂀管信地臣又查得先據盧鏜劉顯等禀稱賊已用居民車箱板造有小船數十􅃗􅀔􅀅衝突各􅀅官明知衝突理須嚴備及臣訪得賊已上岸放火江南水将􅅻知賊走江北陸􅀅亦􅅻知賊到縱稱風雨晦霧不􅀿冥然至此當時若使江南能禦之於海則賊不得走江北能禦之於岸則賊不得上叅照總兵官盧鏜副總兵官劉顯逰兵都司楊尚英把總邵􅀿魁守備盧相等既不能奮勇攻堅蕩平巢穴以􅀵一鼓之功又不能水陸協力晝夜嚴備以固四􅆕之守臣屢有牌行月黒潮滿風雨晦霧是賊突走之時而乃不遵約束畏避風汛掣船入港賊出巢不能知賊登岸不能躡致使匣中之虎復出噬人江北之民再罹荼毒三月防守於江南雖不無保障之勞一旦潰決於江北則方為貽禍之始鄰國為壑雖非本心罪坐所由亦将何諉再照江北諸港逼近三沙海路不及百里于鄰之震不為不切又方鑒鄧城失事之罪懲創不為不深既非猝然之冦且屬先事之防而狼山副總兵官曹克新淮􅀭叅将丘陞及備倭把總等官坐擁重兵全不設備海賊焚舟登岸照舊深入畧無攔阻人亦有言巢賊渡海如出無人之境海賊上岸如入無人之境則謂江南北将帥兩無人焉不亦可乎縱賊出與縱賊入之罪同臣職同總督官視軍情江北江南乃其兼總三沙之役臣與兵備熊桴日夜波潮中者月餘自擐甲臨陣中者凡二親叩賊巢者凡一亦欲以身激將士敵愾之氣㓕此朝食以報聖明而各總兵等官以怯賊爲故態以縱賊爲常套臣才不足以料敵制勝力不足以督勵諸􅀅有􅀒委任罪合首坐伏惟聖明矜察臣於二十一日星馳至􅀲洲㑹同廵撫都御史李遂嚴督曹克新丘陞進兵剿賊及催督劉顯楊尚英過江截殺外其總兵官盧鏜劉顯曹克新等乞敕該部論擬罪名從重處治惟復聖明俯念尚在􅂃急用人之際令其戴罪殺賊待江北事寕一併論奏内邵􅀿魁盧相失事重大容臣㑹同總督胡宗憲先行拏問以警其餘縁係巢賊遯走将官失誤防禦事理未敢擅便為此具本謹題請㫖條陳海防經畧事䟽題為條陳海防經畧事臣前任兵部職方清吏司署􅀰中事主事奉命差徃浙直地方視軍情官嘉靖三十七年十月二十五日節該欽奉勅書内開将來海防一􅀿合行事務爾有所知見查照兵部原題條奏以聞欽此欽遵行事外嘉靖三十八年四月二十七日准吏部照會該本部題奉聖㫖是唐順之陞右通政著㑹同胡宗憲經畫兵務欽此備照到臣本年七月二十五日又節奉敕書内開如逸賊奔散地方稍寕更宜訓練土著之兵以免征調之擾􅀅來海防一􅀿合行事務爾有所知見查照兵部原題條奏以聞欽此欽遵外臣兩奉敕書令臣條奏臣原籍常州府人也自待罪編民目擊倭賊之害海上事情亦頗得其大畧而未敢自信也奉命以來經歴海洋䟦履行陣老卒退校亦徧咨訪以所聞所見㑹同督撫胡宗憲等叅酌議論至如臣近奉敕書訓練土兵臣已行文各兵備有司令其著實舉行又如葺城堡繕噐械等項係督撫之臣從宜自為者今皆不敢􅃈􅃈謹據所知見條為九事以答􅀭休命之萬一今歳東南賴皇上威德廟堂賛議督撫運謀帥臣戮力醜􅀋盡殱惟福建尚有賊蟠據外至於浙直沿海數千里水陸之間已無一賊巢穴盡空海民晏卧盖十數年所未有然來歳春汛之防不可不預經乆之計不可不圖伏惟聖明矜臣之愚亮其心之不敢不盡而恕其詞之不能逹意臣不勝懇切願望之至縁係條陳海防經畧事理爲此具本專差舎人孫山親齎謹題請㫖計開一禦海洋照得禦倭上䇿自來無人不言禦之於海而竟罕有能禦之於海者何也文臣無下海者則􅀅領畏避潮險不肯出洋􅀅領不肯出洋而責之小校水卒則亦躱泊近港不肯逺哨是以賊惟不來來則登岸登岸殘破地方則陸􅀅重罪而水􅀅旁􅀚矣臣竊􅀚崇明諸沙舟山諸山各相聮絡是造物者特設此險以迂海賊入冦之路以蔽呉淞江定海内地港口也國􅀄設縣置衛最有深意而沈家門分哨之制至今可考合無春汛􅂃急時月蘇松兵備暫駐崇明寕紹兵備或海道内推擇一人暫駐舟山而總兵副總兵常居海中嚴督各總分定海靣南北㑹哨晝夜􅀭㠶環轉不絕其逺哨必至洋山馬蹟賊􅀂從某處海􅆕深入登岸者該總首先坐之論其登岸多少以次罪及總兵又罪及兵備海道而止至於海中擊賊􅀄至􅀅領以竒功論巳有事例惟軍士首級之賞尚未别白臣先具題擊來船與擊㱕船不同擊㱕船真倭首級一顆給銀十五兩自合如故擊來船真倭首級一顆合無量增銀十兩比陸戰首級尚少銀五兩巳足使水卒感恩懐利盡死擊賊再照臣􅀩聖恩遣視軍情臣雖不肖而此官之設切中機宜臣徃來海中奉􅀭國威諸􅀅不敢退縮近港旋有三爿之捷今臣雖轉任伏乞敕下吏兵二部詳議此官續設與否在京師諸官中差此一貟官不足多少在海上加此一貟官則甚有􅀜係伏乞聖裁一固海岸照得賊至不能禦之於海則海岸之守為􅂃􅀜第二義賊新至飢疲巢穴未成擊之猶易延入内地縱盡殱之所損多矣然自來沿海戍守莫不以擁城􅀚望幸賊空過謂可免罪而不顧内地之殘破内地戍守亦幸賊所不到而不肯䇿􅀿沿海今却不然宜分定沿海保護内地内地䇿􅀿沿海地方沿海力戰損兵折􅀅宜坐内地不能䇿􅀿之罪内地殘破沿海幸完宜坐沿海縱賊之罪又如密同是一様沿海地方賊由寕紹登岸寕紹却不殘破而殘破温台賊由温台登岸温台却不殘破而殘破寕紹自來只坐地方殘破者之罪今却不然宜并坐賊所從入其沿海文武􅀅吏有能連次鏖戰抵遏賊鋒阻賊下船不得登岸深入者雖無首級以竒功論一准平倭事例如此則人知謹於海岸之守不敢幸賊空過以覬免門户常扄堂奥自安矣伏乞聖裁一圖海外臣所謂圖海外者如招赦逋逃宣諭日本二事既屢奉明㫖平倭事例亦巳開載矣而臣復申之逋逃不特如王􅌯李華山洪迪珍等有名賊首力能搆倭爲亂者而巳以臣所親見三沙千餘倭子起自􅀲洲一􅀍虜人馮三嗾其􅀭州取寳遂至閧然逺來馮三之在中國不啻一蟣虱及在島中却作此一番風浪雖旋就誅殛而流毒巳多矣然則逋逃不㱕東南誠未可以息肩也至於宣諭日本則浙江軍門亦嘗請命遣使矣竟不能盡得其要領使者坐罪而其事遂罷嘗考平倭畧所載洪武永樂間遣使日本者不一而足高皇帝又嘗與劉基議以倭國重佛特遣僧徃諭古之玉者於四夷之不貢不臣則有威譲之令文告之辭兵交使在其間以深得敵情而處之切中其機也然自葉宗滿之坐重罪而逋逃欲自㱕者不免自疑自蒋洲之得罪而人以使絶域為諱或宜减宗滿之罪以示信於逋逃之徒寛蒋洲之獄以留使絶域詗敵情之一路臣又據總兵官盧鏜手本内一欵撫處夷情以尊國體開稱祖宗以來給與日本金印勘合十年一貢船不得過三􅃗人不得過百名既申逺夷慕義之情逺夷亦得交易中國之貨以為利而中國亦以羈縻逺夷使常馴服不為冦賊百餘年來自嘉靖二年宗設宋素卿等爭貢讐殺貽害地方因而絶貢至嘉靖十八年正使碩􅂦等齎獻貢物并進表文伏罪荷􅀩皇上擴天地之仁雖非貢期復准入貢嘉靖二十六年正使周良等坐船四􅃗復貢議者計方九年之期有違事例徑自阻囘從此貢路不通倭夷素性貪詐利我中國之貨既不與貢則無復望矣因此遂􅀍姦徒勾引同利為冦不止則以偶蹉一年貢期阻囘之故也為今之計乞題請聖裁行令各衙門遵照今後夷人復來求貢果有真正表印勘合别無詐偽姑不計其限例就與奏請起送赴京譯審來冦之端敕彼國王令其查治惡逆歛戢屬夷使不敢再犯則倭夷知有貢路之可通而詭計自銷黨􅀋自􅂝勾引之徒亦可暫縛矣鏜老将也三十餘年在海上熟暁夷情其言當不甚妄乞敕該部查議可行與否臣又聞先時陜西總制王瓊論西夷事以謂能絶其入貢之路不能絶其入冦之路今亦可借以爲喻也伏乞聖裁一定軍制自倭患以來東南軍制最爲不定盖以濟變未慮經乆梟猾之徒方􅀿募於江北忽􅀿募於浙東方以得募價而留忽以滿募限而去譬如借倩之人主人不得而羈之安得而練之至於逺方無頼託名土兵報効希圖鹵掠羣然麋至在此不由軍門之徴調在彼不由督撫之遣􅀤坐費粮餉騷擾地方是以人人争言調募不便而以練土兵為􅀃夫土兵之練誠是也然土兵之數不足安得不募募兵不足以當賊鋒之銳安得不調如前時王江涇數千倭子乗勝西上非永保之兵力挫其鋒則何所不至矣為今之計合以練兵為實事以募兵為􅁠宜以調兵為竒道募兵則逺募不如近募調兵則多調不如少調募兵先儘本地方驍銳若浙江處兵江南沙兵之􅀋其逺方驍銳􅀿募者亦湏土人保任優其募價什伍聮束而歳番上之不得自去自來如徃時則募兵亦土兵也總督軍門歳調麻兵立為定額直􅊢幾千浙江幾千專為衝鋒之用聴川湖軍門精選􅀤遣以憲司一貟監督前來有不能衝鋒及騷擾地方者罪及監督則調兵可以制其毒而得其用也俟土兵訓練有成然後募調俱罷伏乞聖裁一足軍食照得東南水陸兵粮徃徃有缺至三四月不給者軍士萬里􅂢生日望數升之米而已而又不時給之生心讟語亦何足恠此有故矣浙江軍餉銀四十七萬兩江南五十餘萬兩江北一十六萬兩其􅀄皆算兵而賦民原無嬴餘若民間拖欠十數兩則缺却一軍之食萬軍不能一軍空腹而萬兩不能銖兩無欠加之民賦有災傷减免而軍餉無贏餘處􅀘宜其不能時給而生怨讟也古者軍興之費不盡仰於民多取之山澤鼓鑄筦搉商賈之利故前史稱不加賦而用足今民間摉括巳盡無可處補而軍門亦無所謂山澤筦搉之利稍可處者惟有鹽法而已試舉一端如前時浙江廵鹽御史鄢懋卿小票事例歳亦可得銀數萬兩此皆不取之國與商而坐収贏利者也合無勅下户部轉行督撫等官㑹同淮浙廵塩御史委曲計議多方區處但使江北江南浙江每處得七八萬兩民賦若足則别儲之一有蠲欠即以處補此亦國民兩便之䇿也又各衙門原為大工􅂃急觧進􅂍罸多寡不等㐲惟聖明軫念東南兵荒相􅁇萬状艱苦勅下工部查得大工銀兩漸彀乞暫􅀅嘉靖三十九年浙直兩處贓罰照數觧與各軍門聴其處補軍餉以後年分自行觧京如故此外山澤筦搉之利有可興者合聴軍門從宜區處再照供給軍餉係有司職掌有司自以不與軍事之罰徃徃視為不干已事始則催徴不力􅁇則給發不時失誤軍機多由扵此此後􅀂有仍前怠玩者自布政總司管粮道及知府以下聴督撫諸臣從重叅劾治罪庶幾有司各知于已不敢誤事伏乞聖裁一鼓軍氣臣聞戰陣之所以精明與中國之所以勝四夷者氣也而非甲兵之謂也國家承平日乆文吏游談而飬尊武臣恬保而寳身閒雅雍容之習成而慷慨果銳之氣亦寖銷矣南倭北虜倐然内侵殆若昔人所謂氣􅆋以取之者賴皇上天縱神武赫然一怒誅遂偷惰㧞用英竒文臣督帥皆躬自臨戎有兎􅆯﨣﨣之氣自此倭虜不敢深入則氣之勝也以臣占於行陣之間猶有未盡然者臣視師東南備􅀚怯将情状一聞賊戰如澆冷水顔色可憐縱不便走股巳先慄雖亦未必盡然而然者固多矣至於倭賊渡洋談笑飲食若履平地而我􅀅棲泊近岸日遇海風則頭掉目眩夜聞海潮則耳讋心惕且夫倭賊有過藐我将之氣而我将無必吞倭賊之氣則是未戰而索然矣如此而望長驅海島掃清大懟臣猶以為難也此氣在宇宙間磨礲而時用之則鮮明置之不用則黯無精光謂宜文臣督帥時御戎服出入軍中􅀤􅀭蹈厲以作武􅀅之氣武臣大􅀅遇有賊戰戎服出入陣中以作偏禆小校之氣偏禆小校遇有賊戰戎服先登以作士卒之氣而督帥武将臨陣督戰間取潰校逃卒遵奉旗牌事例百萬軍中忽然斬却一二人以變士卒之耳目使我之氣日益精明則賊之氣自然銷沮此其言若迂闊而實勝敵之要機也李光弼蒞軍而旌旗變色每戰必勝氣之謂也伏乞聖裁一復舊制照得國􅀄防海規畫至為精密百年以來海烽乆熄人情怠玩因而隳廢國􅀄海島便近去處皆設水寨以據險伺敵後來将士憚於過海水寨之名雖在而皆自海島移置海岸聞老将言􅀟嶼烈港峿嶼諸島近時海賊據以爲巢者皆是國􅀄水寨故處向使我常據之賊安得而巢之今宜查出國􅀄水寨所在一一脩復及查沿海衛所原設出哨海船額數係軍三民七成造者照舊徴價貼􅂇打造福船之用此一事與臣所謂禦海洋者相􅀜舊制之當復者一也國􅀄沿海建設衛所聮絡險要今軍伍空缺有一衛不滿千餘一所不滿百餘者宜備查缺額之故而補足之其運粮班操等項原因海上無事撥借别用者可悉還之原衛所使自為守衛所之兵常足則他兵亦可不用此一事與臣所謂定軍制者相􅀜舊制之當復者二也國􅀄沿海衛所皆有屯田今埋没過半而圖冊故在宜按圖照冊儘數查出辦納屯粮及金塘玉環諸山膏膄幾萬頃皆是古來居民置郷之處今可墾為屯田設所戍守一以據險一以因粮此一事與臣所謂足軍食者相􅀜舊制之當復者三也國􅀄浙福廣三省設三市舶司在浙江者專為日本入貢帶有貨物許其交易在廣東者則西洋番船之輳許其交易而抽分之若福建既不通貢又不通舶而國􅀄設立市舶之意漫不可考矣舶之為利也譬之礦然封閉礦洞驅斥礦徒是為上䇿度不能閉則國収其利􅁠而自操之是為中䇿不閉不􅀵利孔􅂥漏以資奸萌嘯聚其人斯無䇿矣今海賊據峿嶼南㠗諸島公然擅番舶之利而中土之民交通接濟殺之而不能止則利􅁠之在也宜備查國􅀄設立市舶之意母􅂥利孔使奸人得乗其便此一事與臣所謂圖海外者相􅀜古制之當復者四也因舊時之寨因舊時之兵因舊時之粮因舊時之市舶一切紛紛之議可以省矣然其事重大壊之已甚復之則難若能復之則經乆之䇿也乞勅該部詳議轉行督撫諸臣選差有才力憲司一貟專管四事數年之後必有成功伏乞聖裁一别人才臣聞為政以人才為先至於兵事尤急人才臣視軍情一年其於官吏賢否非臣職事所􅀜不敢濫及外訪得淮􅀭海防兵備副使劉景韶英敏多謀臨機立㫁運籌足以破􅀑夷之筭賈勇足以汗懦将之顔今歳淮􅀭殺賊二千餘多頼其力巳與臣同推廵撫不敢更舉外又訪得浙江廵視海道副使譚綸雄姿勁氣法令必行賊與我軍見聞寒膽今歳浙東殺賊千餘多頼其力蘓松兵備僉事熊桴自倭事始起以至今日無一歳不在兵間忠實練事沉毅内明出入海潮艱危不避此二臣者皆宜乆其官而不易其任以待資望可為廵撫即以授之者也杭州府同知唐尭臣留心武備訓練有方紹興府通判吳成噐素識兵􅀔屢立軍功待尭臣歴任年乆成噐再立新功皆可當沿海兵備之選者也台州倭冦屢入兵凶相􅁇民瘠巳甚全在良有司撫循而知府黄大節貪黷有跡昏眊無能政成黠吏賄滿私槖所宜亟為罷黜者也又訪得浙直總兵官盧鏜老練善謀副總兵官劉顯驍雄善戰臣甞以三沙賊走劾其失事畢竟東南将官無過此二臣者所宜乆任責其立功者也然盧鏜善謀而怯於臨敵劉顯善戰而果於自用則其偏也若以使過之義則革任寕紹叅􅀅戚􅁇光先登敢勇立有新功見監原任通㤗叅􅀅黒孟陽遭蹶悔過尚餘勇氣皆堪策勵立功贖罪者也狼山第一􅂃要海口總兵第一江淮重任如狼山提督副總兵官曹克新偶因際㑹􅀗冐功陞臣見其人酖溺酒色常如昏睡謀勇俱無精氣已銷設有警急慿何决戰前任鄧城見以失機拏解克新異日誤事必不减於鄧城所當亟投閑散以全其功者也又訪得境内人才臣得三人焉原任僉事終養徐九皋老成練事熟諳夷情原任刑部主事為民唐樞經術優長才猷老練原任知府致仕嚴中警敏足智暁暢兵機皆可充異日兵備之用者也乞敕下吏兵二部再加查訪分别用舎則舉錯明而海備飭矣伏乞聖裁一定廟謨自海賊入寇以來十餘年矣東南雖苦其毒而賊之􅀍殺者亦積至幾萬矣今年寇江北冦浙東者且萬餘而寇福建者傳聞不下二三萬則是殺者不可勝紀而寇者不為少止夫南倭與北虜異口外砂礫之地從古以來原有韃子腹裏膏􅃾之地二十年前原無倭子今口外尚有一年兩年無寇而倭子却無一歳不來如此不巳非止外患将為内虞古云兵乆則變生近者呉淞定海之間水卒呼粮扶官縳吏則兵變之漸矣蘓城人素怯弱而游冶子弟懷毒蓄機日伺倭來裏外合􅀿幸早發之猶尚焼官寺刼獄囚閧然一逞則民變之漸矣此其萌芽也誠不可不深圖而熟慮之􅀂謂倭寇之來一歳支却一歳一番殺却一番便自了事則臣不敢知其所終也伏惟聖明敕下禮兵二部備講祖宗以來招懐撫諭之畧防海固圉之機及敕督撫諸臣徧訪倭情集議長䇿二十年前何以絶無倭患十年之間何以倭患􅀂此年年禦倭何時是了如何可以永㫁倭寇之路以復東南之舊苟可以利國不必爲身家顧慮苟可以便今不必以成􅀃拘牽外内臣工方畧畢上然後聖明與廟堂大臣從中主㫁而力行之期於三年四年㫁却此賊臣猶以爲遲也不然一歳一來一來一勝臣猶以爲浪戰伏乞聖裁乞留餘塩䟽題爲懇乞聖恩給發餘塩銀兩以備賑濟以􅀘軍餉事近准戸部咨該廵撫都御史李遂廵按御史陳志各題稱廬鳯淮揚四府徐滁和三州各所屬州縣旱災乞行勘實分數蠲免錢粮及将兊軍漕粮改折積年拖欠等項暫且停徴及災傷極重及􅀍倭地方給􅀤内帑欽遣大臣給賑該本部覆議即今銀庫十分匱竭無從給􅀤而各該廵撫本係大臣任重責專尤得便宜行事􅀂復再遣大臣秪恐滋擾無益合行各該撫按行令各府州掌印正官備查在倉預備粮米及庫貯無礙官銀􅀱冬春之時如果飢饉難存即行勘實酌量銀米選委廉能正官分投相兼賑濟如或不敷多方區處務使窮户均霑實惠等因題奉欽依備咨到臣照得今歳淮􅀭等處災傷委的十分重大百姓委的飢饉難存已經先任廵撫都御史李遂廵按御史陳志詳細具題伏􅀩聖恩既免租稅又賜賑濟臣不敢􅃈􅃈瀆陳外但李遂原請欽遣大臣給􅀤内帑該户部題奉欽依内帑匱乏無從給􅀤該臣備查各府州倉内積榖及庫内無礙官銀備賑縁自連年倭患以來窘急摉括倉庫處處空虚今内帑既不敢望而倉庫之積又極不彀賑濟委實難處臣又照得淮􅀭軍餉更無别途止靠民間田畆稅粮内帶徴銀十二萬兩儘數徴足尚且不彀給􅀤今各處稅粮聖恩巳在照數蠲免之例則地方軍餉必無盡數取盈之理查得􅀭州府庫軍餉銀止有萬兩臣到已􅀤三千餘兩見在庫内纔彀年終支用近時李遂請給餘塩銀四萬五千兩􅀘還􅀭州府借用銀二萬四千六百二十四兩零及􅀘還淮安府借用銀一萬兩給與首級銀一萬三百七十五兩零支銷巳盡亦無餘剰􅀂是來歳春汛将動各處官軍一齊上班民間催徴不前軍士皇皇待哺更覺兩難臣􅀩聖明㧞擢任使撫綏凋瘵料理軍機敢不夙夜竭盡犬馬之力少圖報效至於錢粮實是窘迫無處伏望聖恩憫念江淮重地賑飢餉軍皆是極􅂃要事敕下户部從長議處将餘塩銀十萬兩特􅀤濟急其七萬兩以􅀘軍餉之不足其三萬兩以備賑濟之用則溝中之瘠􅀗更生之望荷戈之士奮敵愾之氣江淮闔鎮軍民皆歌舞聖徳於無窮矣縁係懇乞聖恩給發餘塩銀兩以備賑濟以􅀘軍餉事理未敢擅便為此具本謹題請㫖鳯陽等處灾傷䟽題為地方災傷重大懇乞聖恩留米備賑事據海防兵備副使劉景韶呈稱照得江北地方今歳既遭重大倭患復罹異常旱災以致逺近農畆失収到處米價騰貴即今飢窘之民充斥道路嗷嗷望賑查得近􅀩撫按具題欲行請􅀤内帑欽遣大臣前來賑濟該户部以銀庫匱竭無從給􅀤若遣大臣恐滋勞擾議行本處廵撫賑濟除候勘合至日嚴督有司查審及􅀅􅀿行事宜另行條議詳報外及照江北今歳災傷十分重大各處飢民無慮數萬前在秋末尚有草子木實可頼充飢今值隆冬雖草木亦無可食強壮者則相聚爲盗老弱者則棄賣妻孥有司無日無盗刼之申地方無處無離散之苦溝壑莩屍遇目成悲道路啼號觸耳可慘言及於斯稍有人心者鮮不惻愴况爲民上者哉揆度事􅀔􅀅來􅀂非通行博賑恐江北赤子不免悉化爲溝渠之􅀑潢池之盗矣查得嘉靖二年江北災荒該撫按衙門奏行戸部議留漕粮二十萬石以賑四府飢民嘉靖三十三年又復截留􅀭州等府起運漕粮數萬以賑淮北是時江淮之民實頼存活今當兵戈擾攘災傷異常尤宜比例設處伏望本院再加裁酌如果可行仍乞早爲具題将起運粮米比照嘉靖二年事例截留十數萬石委官分投賑濟其虧欠額運之數於臨徳二倉兊支運納如此庶􅏇民有更生之望重地無意外之虞矣等因到臣據此臣查得舊卷嘉靖三十三年截留漕粮淮􅀭二府共是三萬七千八百石三十六年截留漕粮淮􅀭二府共是六萬五百九十餘石零彼時止縁軍乏粮餉非􅀜歳有凶飢况今兵荒相􅁇民命不堪流莩滿路傷心怵目溝壑既所不忍嘯聚不無可虞誠有如副使劉景韶之所云者臣前請餘塩銀十萬兩内七萬兩以補軍餉三萬兩以備賑濟儻􅀩聖恩盡數給􅀤竊計􅀍災廣闊三萬兩銀子不彀四府三州飢民一月之賑且江北人家素無積蓄今歳原是子粒不収起運京粮多從逺處糴買致之甚艱􅀂不得十數萬石米留貯地方不惟飢民無路求活加以來年春汛官軍一齊上班米價必太騰貴軍士日持二三分銀子亦不能勾糴米度日深為不便是以劉景韶不得已有截留漕粮之􅀃臣又查得舊卷嘉靖三年江淮大飢欽遣侍郎席書賑濟稅粮不拘起存盡數蠲免給與内帑銀二十萬兩彼時府縣倉庫尚多儲蓄而又多􅀤内帑席書因得大為展布極貧䰞粥次貧給與銀米凡所全活二十餘萬人江淮至今歌舞聖徳今歳凶災頗不减於彼時又連年用兵倉庫在在空虚今内帑既不敢望而起運錢粮又升合分毫不敢丐免惟有截留漕粮係是近年事例然今方在國儲缺乏之時臣亦何敢容易開口伏乞勅下户部俯念民艱從長計議或照嘉靖三十三年三十六年事例截留淮􅀭運米七八萬石或五六萬石又恐以為虧損國儲則乞照折兊事例江北原額運米三十二萬餘石近巳􅀩恩折銀十五萬石其餘運米或盡與折銀或量折一半九萬餘石則銀㱕内帑不失原額米留地方足支艱窘又恐以為折兊巳定不得再折則臣不敢言留亦不敢言折但容臣暫借淮􅀭漕米五六萬石待臣防過春汛半年之後収拾餘銀多方糴買運還京倉此只遲五六萬石半年之運臣必不敢虧誤凡此數說臣之請乞則愈下而愈少臣之用心則益苦而益切蓋上念國儲之重不敢輕易有請下念民窮之甚不敢隱蔽不請孟軻氏所謂有司莫以告是上慢而殘下也臣備貟撫臣近又奉命賑濟臣􅀂不言是不惟上􅀒聖明矜憫元元之深意而溝中之瘠真自臣推而納之矣臣不勝激切願望之至縁係地方災傷重大懇乞聖恩留米備賑事理未敢擅便為此具本謹題請㫖請逰兵䟽題爲遵照舊規催請遊兵以防春汛以保重地事據海防兵備副使劉景韶呈稱查得嘉靖三十六年五月内該兵部題奉欽依調山西遊擊丘陞領兵三千名跟隨提督軍務侍郎江東前到淮􅀭地方剿倭至九月内掣兵囘京該侍郎江東題該本部覆議准􅀤山西􅁁兵一千名保河民兵二千名彼處照例給與安家衣装銀兩并盔甲噐械於嘉靖三十七年前到􅀭州防過春汛回還訖又該前任廵撫都御史李遂題准亦調山西􅁁兵一千名保河民兵一千名於嘉靖三十八年前到􅀭州又行防過春汛囘還訖接連三年依期赴調外照得江北海防形􅀔固為險要地利多堪􅀐戰其土著之兵雖經選練頗精但用之設伏出竒邀擊擣巢馳逐於沮洳葭葦之地固其所長若平原廣野摧鋒䧟陣挫折其􅀄至方張之銳非西北馬兵無以取利故江北今歳収功克捷陵寝免於震驚運道不致梗阻倭奴輒為䘮膽者寔賴此一枝兵前驅折衝之力即今冬令巳深漸去春汛不逺所據前項兵馬雖奉欽依議定專官統領征倭之數但恐攝屬隔别挑選間非勁銳託言窵逺在途稍有遲緩則重地所恃者虚矣􅀿合預先催調如期前來防守及查􅁁兵一千名内止三百六十貟名彼處原給有馬其餘俱係歩卒故今歳破賊雖見成效然各兵長技猶未盡展必湏􅁁兵一千之内得給􅁁馬六百匹前來待敵當益著偉績等因具呈到臣據此卷查先准兵部咨該山西廵撫都御史􅁑縉題内一欵免征調以備重鎮該本部覆議看得本官欲􅀅入援薊鎮民兵三千征倭遊兵一千俱免征調存留本鎮防守似宜悉從所請但薊鎮之兵􅀘練未成東南之倭警報未息前項各兵遽難輕議合候命下移咨各該總督官在薊鎮者候主兵練成即􅀅山西民兵先行减調在浙直者候海防寕謐􅀅山西遊兵即爲掣放囘還本鎮等因題奉欽依備咨前來又准兵部咨爲缺官事該本部查得山西征倭遊擊貟缺推舉署都指揮僉事申紹祖堪任題奉欽依行令本官前來統領遊擊丘陞原領􅁁民兵二千名在於􅀭州等處戰守至八月中旬風汛巳過前兵掣囘外今據前因照得江北自有倭患以來徃徃深入地方殘破先該提督侍郎江東建議請􅀤老營堡􅁁兵及保河兵一枝前來充作征倭遊兵至今調用巳經三徧連年鏖戰所向成功倭賊見之䘮膽我兵􅀝之增氣此實聖明軫念陵寝畿甸之重廟堂大臣及本兵處置得宜之所致也近該兵部題覆山西廵撫之奏特留此一枝兵聴􅀱海上消息必待海防寕謐而掣免不得以倭警未息而輕議又推補統領遊兵專官使之及春汛而來罷春汛而去該部所處已為曲盡無容再議即今倭冦警報尚爾未息春汛之期轉眼便是賊􅀂登岸全在打頭一戰誠恐前兵雖來緩不及事乞敕該部查照前議早為題覆命下之後即便馬上差人齎文星馳付山西保定二廵撫處令其挑選精銳多給馬匹仍照例給與各兵安家衣装銀兩并盔甲􅄊械差委的當官貟押督前來庶不誤事再照今歳淮􅀭地方災傷重大深恐盗賊生􅀤兼臣所管宿亳等處切近河南地方白蓮賊黨驅散未盡風聲氣習易相鼓扇􅀂得此一枝勁兵前來駐劄誠足鎮壓盗賊暗銷不逞之心縱有竊􅀤撲㓕不難又所謂制變於無形者也縁係遵照舊規催請遊兵以防春汛以保重地事理未敢擅便為此具本謹題請㫖爲擒􅀗潰兵及奸細事竊照東南之兵平素不知紀律至如盧相所管鳥銃一枝徃年曾用銃打死南京兵部所遣川兵十餘人盧相巳􅀍叅劾一次今之各兵偶以争銀縱酒之故遂至持刀斫傷總甲脇衆鼓行搶船下海江北許多兵船㫁其東奔之路賊知路窮束手就縳臣以反仄未安人心􅀚望謹遂奉敕書許行軍法及處决叛軍律條斬其首惡二人蘓清林三以肅軍政而定衆志餘黨憐其􅀍脇既已投䧏悉從輕典理合題知再照海上之患起扵中國奸民以倭賊為爪牙倭賊以奸民為耳目合為一體醸成古今未有之變至扵倭賊所使中國之人為奸細者結成死黨牢不可破寕􅀒中國不肯􅀒倭夷伏惟聖明洞燭此弊臣前奉命丹山為視軍情官敕書内開載其有内逆與賊交通着宗憲多方訪拏斬首示衆今廣先等奸兇特甚􅀂不速誅無以示警且恐生變而臣今奉敕書内開載未明臣不敢專擅伏乞敕下該部查照臣先奉敕書着宗憲事理其有通賊及為向導奸細者令臣多方訪拏斬首示衆庶幾㫁絶禍本倭賊失却耳目之助自然不敢深入再照盧相鈐束不嚴本合有罪旋就擒䧏亦合准贖至如投䧏人汪林本係倭賊所使一夥奸細乃能渙其黨􅀋挺身自首更為中國擒賊􅀂不量加旌賞無以為効順之􅂆伏乞一并敕下該部議處臣不勝云云新刋荆川先生外集卷之二
