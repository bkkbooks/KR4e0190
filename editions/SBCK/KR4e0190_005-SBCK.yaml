  text: 重刋荆川先生文集卷之五
  hash: sha256:fe25431c686b46c2a4f79f92c920e8a684ac2b4957da3a427c90e66b0cec5a78
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0190_SBCK_005-1a}
body:
  text: 答顧東橋少宰順之􅀼聞昔人以名譽不聞㱕過朋友者謂其實溢乎內而譽不副之者耳非謂本無可以􅆀譽而朋友爲之賁餙以私扵其好也沈別駕至辱賜手書奉亟驚愧􅀼不自知􅀁以先容於左右者開亟讀之乃知以陳王二友之故眀公過信而不疑耳是二友無乃私於其好故􅁯其醜而餙成其􅀁長眀公亹亹好士故博取於朋友之譽而不暇究乎其實也然在㒒何敢當也僕自爲諸生時得眀公之文而讀之雖不能窺其精意然􅀼嚮往焉及從㳺薦紳間又􅀗聞眀公髙誼傾海内而求士甚扵士之求公且不在古人之後則心益慕之然蓄之數年而不敢通姓名扵左右則亦有􅀃夫玉工好玉則琨吾于闐之産非不欲盡而收之然有􅀁不􅀎收者碔砆耳瓊瑰碔砆亦莫不欲自獻扵玉人之前然而有􅀁不敢獻自知其爲碔砆耳僕迂戅無􅀎人也過不自量嘗􅀙諸友人學爲古文詩歌追琢刻鏤亦且數年然材既不近又牽扵多病遂不成而罷去及屏居山林自幸尚有餘日􅀅以㳺心六籍究賢聖之述作鑒古今之􅆓革以進其識而淑諸身又牽於多病輒復罷去既無一成則惟欲􅏉虚息影以從事於荘生􅀁謂墮體黜聰以爲世間一支􅄐之人耕食鑿飲以畢此生而不敢有覬乎其外葢亦􅀁自量者審也又何敢以求知於左右也哉即使朋友欲爲僕文餙計亦無以過扵僕之􅀁自量者矣不知二友之􅀁以譽僕扵眀公者何語而眀公又何從而過信之也此僕之􅀁自愧且懼而不敢當也伏惟眀公與世卷舒向也遵晦丘園時也於公一不以爲損及出而秉鈞軸時也於公一不以爲喜然而海内之士於公之退處則皆眷焉望其復用及其既用則皆望其秉鈞軸及公之秉鈞軸則皆忻然以喜何也僕􅀼觀聖人繫易于否㤗初爻皆有彚征之􅀃焉至扵㤗之以隣否之疇祉則皆繫之於四四者大臣之位近君而任重者也近世之士愞熟獧巧之習日工而羔羊素􅁝之節或衰矣而任重之人􅀁指以爲才且賢者又徃徃在彼而不在此葢士習既然而示之以好惡者則又然何恠乎靡靡一風也是以雖淸眀平㤗之世而包羞匪人或不勝參錯乎其間雖否㤗之幾未必繫此而士習隆汚則亦可知必有大人君子任當世之重以身範物􅄐祉其疇以長君子之道而默消隂邪彚征之氣此海内􅀁以􅃱望於眀公而非眀公不䏻赴海内之望也則如僕僻處山林亦􅀅拭目以觀盛徳不徒爲知已之私感而已迂疎病廢之人本不宐開口及世事縱言至此恃眀公之知也惶恐惶恐前辱雄文垂示此眀公􅀁以誘誨僕者至􅅧也謹拜敎艸艸作載酒亭一詩用􅆀嚮徃之懷更希敎之答張甬川尚書順之麄頑非畜徳之器迂疎非適用之才徒以麄頑近乎質木迂疎􅀋乎澹泊以此幸不見絶於大君子之門自入山中稍欲收歛精神擺脫習氣庶幾少有􅀁聞以酬宿志且以不􅀒長者拳拳教愛之至意而間靜中轉見種種欲根起滅不㫁雖暫隨氣機歇息終非㧞本塞源工夫益覺實病之難除實功之難進也承教中庸不可䏻乃在聲臭之表此喫􅂃要言中庸􅀁謂無聲無臭實自戒謹不覩恐懼不聞中得之本體不落聲臭工夫不落聞見然其辨只在有欲無欲之間欲根銷盡便是戒謹恐懼雖終日酬酢云爲莫非神眀玅用而未嘗渉於聲臭也欲根􅁝忽不盡便不是戒謹恐懼雖使棲心虚􅄫亦是未􅄐乎聲臭也明公之致力於道而自得之也乆矣而猶云老且望洋日有愧嘆此豈眀公之過爲避譲㢤葢常存不及之心而後可以言戒謹恐懼而後可以閑未萌之欲古之聖賢􅀁以競業此心至老益彊􅀋如此也放失如順之輩􅀼因此更有省矣承示欲修飭武僃此明公爲國家之􅅧慮也世人作事較計成敗利鈍畏首畏尾自爲之念重而任責之意踈􅀁以弊多積於循襲而事毎牽扵掣肘以明公之素望與其素養居其位而行之因則因革則革誰䏻撓之雖然武僃其一事也昔周命周公畢公以東郊之治欲其彰善瘅惡以㳤人心至於世變風移而後已今之民風士習其淪胥抑可知矣而畿甸爲尤甚此俗吏之􅀁謂迂緩而有識之士􅀁爲􅅧憂而懼無以善其後者也然而明公今日之任周畢之任也且夫東郊雖周之東都也而寔染殷之餘風者也經周畢而一變其俗況南都固祖宗之􅀁肇基而風動之者也以明公之素望與其素養居其位而行之明示好惡提醒人心而挽之禮義廉恥之域使四方之有風俗自畿甸始畿甸之有風俗自明公始非明公今日之責而誰望乎聞太夫人巳就養是明公入則承歡於内出則宣力於外其承歡於内也益􅀁以蓄其效忠之心其宣力於外也益􅀁以推其養志之施葢兩不相妨而交相益也此􅅧可爲明公賀矣養斋翁考滿㱕遂欲乞休但山林中得此翁於鄉俗極有益仕途中又少却此翁爲可惜耳然其意已決矣趙兄相逺問書頗稀羅兄則時有書承念及敢復諸惟台照不宣又曩承手敎諄切皆道義肝膈之語感幸感幸至於􅀁論學術之虚誕與其毫厘之差則皆足以惑世而害道此切中當世學者之膏盲鄙人亦嘗􅅧憂之而未及面請也先行其言而後從之言非君子之􅀁急而況其誕者乎若羅兄則雖不知其近來􅀁見與􅀁論何如然其人平素篤行之士明公亦􅅧知之矣承示大學小傳葢􅀤於􅉼養之眞而多自得之􅀃至於身心意之別以正心爲主靜之學雖或異於朱傳而寔合乎濂洛之微㫖矣其曰正心者不屬於意不屬於身者也是心之無􅀁􅀤動事物未交於視聴時也斯時也心惟存其恂慄而巳凝然中居而外誘不敢千也是則然矣但不知事物既交既有視聴之時其凝然中居而外誘不敢干者與前時有異乎與前時無異乎豈􅀁謂凝然中居者只主於靜時而爲之者乎抑亦無分於動靜而皆在者乎更願敎之􅀉劉南坦自前年奉敎後毎切馳情去年􅀗奉手敎再三捧誦知愛僕之􅅧望僕之厚未有如明公者亟欲過霅上登長者之堂一扣謝且請益焉而未果也僕稟氣素弱兼以早年馳騁於文詞技藝之域而􅀁恃以立身者又不過强自努力於氣節行義之間其於古人性命之學葢殊未之有見也至如􅀁謂心似蛛􅁝遊碧落身如蜩甲化枯枝以耗散其精神於故􅁓間不知返者則日夜有之是以未老而病無病亦衰葢明公之􅀁以爲僕慮者眞可謂先得我心矣年近四十疾疢憂患之餘乃始稍見古人學問宗㫖只在性情上理㑹而其要不過主靜之一言又參之養生家言􅀁謂㱕根復命云云者亦止如此是以數年來絶學􅂢書息㳺嘿坐精神稍覺有收拾處然宅舍摧塌修􅀘爲難譬如敗家蕩子早年縱浪於聲色狗馬糜費百端及至轉頭而囊篋􅑎然矣此老氏之徳􅀁以貴於早服而重積也奈何雖然程升子自言吾受氣甚弱年四十而始強七十而益精明人問之則曰吾以􅁯生狥欲爲􅅧恥僕誠不敢不以此自勉亦不敢􅀒明公之愛之望也貧子元有寶珠或者只恐不轉頭耳承明公至意敢布􅂨曲至於凝神聚氣喫􅂃處長者固有經騐方容積誠面請也文從過常州僕以屏居荒村不及知知時則文􅀙已徃荆溪矣謹令人問候得在容操􅂂杖以從與王龍溪郎中世人之不能不疑於吾軰也久矣近有士夫自浙中來者云及吾兄以佃夺之故使憲司有言且云兄以寺地據風水之勝欲作令先大夫墓地上官某人者既予之矣而憲使持之故若此紛紛也僕聞而竊嘆以爲如兄安得有此此乃傳言之誤耳不然則必俗吏欲汚衊善人託爲此􅀃就使非􅀓言之誤非俗吏欲汚衊善人則在兄必自有􅀃固不敢以世人之疑吾軰者而亦疑兄姑笑而置之不欲煩諸齒頰間也既又復念以爲孔子以詩禮敎子而陳亢疑其異聞孟子不見儲子而屋廬子以爲得間古者師友之間既洞然肝膽相信矣而亦若不免以世俗之疑相疑者何也無乃故爲迂其問以剔抉聖賢之隐曲而白之於世也乎今僕幸得兄之間而可以有請安知兄之隐曲不因以白而僕亦冀有陳亢得三之喜與屋廬子之恱者乎且夫人之意兄者則曰兄之請寺是世人之請寺巳兄之狥風水是世人之狥風水巳而僕之意殊不然也夫兄爽朗超脫得之性成僕毎􅀼嘆以爲即使兄不學不知道亦當作物外髙流如弘景和靖之徒絶非食烟火軰人而或謂其請寺以自便占風水以規後䕃此眞坐井之見且不足以闖兄之藩宐乎兄之不屑與較也然而兄之爲是必有􅀃也僕􅀼觀於兄矣惟兄篤於自信是故不爲形迹之防以包荒爲大是故無淨穢之擇以忠厚善世不私其身是故或與人同過而不求自異此兄之􅀁以生􅅧信􅅧慕於相知者亦􅀁以生微疑於不相知者也寺田出上官之予何必固郤以爲潔風水有事機之便何必固避以逺嫌以是闖兄或者得其藩乎然僕􅀼以兄之意亦稍偏矣孔子惡行恠而愿人亦譏其同乎流俗合乎汙世夫曰同乎流俗則非其自流也特同之耳曰合乎汙世則非其自汚也特合之耳其設心亦豈不善而聖賢甚以爲不可者其􅀃可知也且夫本以包荒忠厚而其影或近於愿人此僕之􅀁懼也然則世人望影而疑亦何恠歟古人有放君而代之者而人不疑其富天下有放君而又反之者而人不疑其專葢古人舉大事冐大不韙而猶不蒙人之疑如此今吾軰出格作一小事而人已群然疑之雖古今人眼孔不同計亦不應如此隔絕也毋乃不邇不殖􅀁以自信與素信於人者有不如古人乎不顧不視不取不予􅀁以自信與素信於人者有不如古人乎且夫以湯之聖宜其脫然於聲色貨利之外也而秪曰不邇不殖眞若聲色貨利之足以移湯而湯眞若與聲色貨利之相持然若何也以尹之􅀁樂者堯舜之道也而秪銖穪寸量於一介取予之間若硜硜小人然者何也兄􅀁論伊川金楪子之􅀃以此施於點檢形跡之人則爲對病要藥矣向非其人則如以􅆱參治肺癰藥豈不甚羙或以􅂇穴而長病也向時諸友􅀁處陽明老先生家事或者造爲玉碗之謗此言極俚鄙可笑宜不足以紿三尺之童子然王僉事竟以此解官去有志者至今痛惜之夫毁譽利害不足計然得無吾黨亦有過乎苟非過於自信而疎於事情無乃􅀁謂素信於人者之未至耶君子行有不得反求諸已則工夫日􅂃日精至於已日乃孚是人之疑我者所以精進我也兄意其以爲何如然僕非敢謂此言可以少禆於兄亦􅀅以叩兄之隐曲而得聞􅀁未聞耳幸亮之答王南江提學奉別經年不能通一字以爲率然道􅄐合問無恙之泛語既不宐施之於兄而思竭其疲駑以效一言之獻則又茫乎其無􅀁得故遂缺然至此又復以爲既疲駑無以自效而有數字以道􅄐合問無恙亦足以通殷勤而舒繾綣之懷不猶愈於經年無一字矣乎故於李君使者來艸草作此大抵􅀁謂率然之泛語耳然僕􅀼誦吾兄前後見惠兩書知吾兄痛懲既徃之悔􅀡欲洗刷腸胃不肯若世之葢頭換面作好人者至於用心獨苦處則雖兄口不䏻自言而僕於筆札間亦稍窺見焉未嘗不撫然而嘆以爲兄之力􅀎自振㧞如此兄之不自䕶如此即使僕竭其疲駑而有以自効亦何􅀁加也人心存亡不過天理人欲之消長而理欲消長之幾不過迷悟兩字然非努力聚氣決死一戰則必不能悟或不知􅀁戰或戰而不力則徃徃終其身而不悟故佛家有認賊作子與􅁑藤絆路之􅀃而兵家亦曰名其爲賊敵乃可􅌍又曰一日縱敵數世之患此佛家之可通於吾儒而治戎之道可用以治心者也儒者以交戰爲子夏之病而不􅀎戰是􅀁以爲子夏也雖顔子亦有戰矣曰不逺復夫不戰何以有復也雖天地亦有戰矣曰龍戰於埜其血玄黄夫隂既疑於陽矣陽安得晏然而無戰乎惟戰而不勝故血而至於玄黄戰而勝則血可以不玄而陽可以亨也是䏻戰之效也今兄知􅀁以戰戰又䏻力矣僕自入官得請見於當世士大夫葢三年而後見兄一見則駭然異之而兄亦過以僕爲知已夫兄雄俊之文博辯之才邁徃之氣無一人不知之而獨謂僕爲知巳者豈僕之知兄止於世人之􅀁知而已也抑亦有不止於世人􅀁知而已也僕之於兄不爲不􅅧知已然􅀼有少恠於兄以爲世間種種嗜好凡人之􅀁可玩可喜者多足以掛兄之胸臆而動其挹慕不捨之意此其中於心也微而不知其植根也膠而難解苟一不解則微者或横潰而著矣根者或引蔓而枝矣就使􅀎戒而不潰不蔓則其爲力甚勞而爲功亦寡譬如聚千百不逞於􅅧叢巨莽之間按而不發而時出其一二騎以鈔於路幸不爲大憂然而授首獻俘之期恐終不可冀也而況其猖蹶之不可料歟雖然兄何如人也豈敢謂其有溺於此歟或者當時年少而氣銳以爲雖小有􅀁嗜好而固無損於吾之大者抑亦知其嗜好之不可不欲快於一鬭而以積漸消去之歟且夫以嗜好爲無損者無乃不知􅀁戰之過歟以爲積漸消去者無乃戰而不力之過歟夫嗜好之中人也亦必有因必非以爲漫然無􅀁用也必以爲人之資於天地間者一物不可少也孟子之書􅀁以提挈此心者至著矣而尤著於生我􅀁欲一篇葢其不悟也則自宮室妻子之奉至於種種若無一焉可少者其悟也則雖簟食豆羹之切於死生若無一焉不可少者藉令有人焉始不悟而今也悟則自今日無一物不可少者而追視向時􅀁爲無一物可少者未始不啞然自笑也慵工道丏之人徼幸得十數錢則買殽市酒一􅋨大呌自以天下之樂莫踰於已而千金之子苦身仡仡以程錙銖日夜若不足藉令此二人易地而觀焉亦未始不啞然自笑也人之􅀁甚愛而至不可少者莫如七尺之軀也其住於世也能泣能笑能挈能擎能徙能􅀝無一不能無一不有而其聚諸有以住於世也則又有修有短而䘚無不腐爲埜土化爲瓦鑠而後巳者則此七尺之軀亦終不得自有矣以其終不得自有則當其暫而有之固亦不可據而私之以爲眞有矣而況於種種嗜好其不如七尺之軀之不可少者又不啻千百倍歟古之聖賢􅀁以超形氣而獨存至於同死生齊得喪漠然無一動乎其心者非誕也既悟則自知之耳如此乃可以語知性知天乃可以語謹獨誠意之學而其初必始於力戰未有不力戰而能如此者也約之嗜好更不少於兄而僕相聚時數以爲言然於兄獨罕及者約之性柔須待有人夾持而兄剛果雄毅氣魄甚大始雖暫牽其必一朝躍然自脫於此無疑也顧􅀁不知者早與不早耳今兄果然知所以戰戰而又力以自脫於此不出吾素􅀁料者如是而又早則吾之􅀁不能知而􅅧爲兄喜者也僕不肖聰明百不逮於兄雖僅守繩墨常恐失之兄謂我戰勝而肥今臞然故吾也此足以知戰之不勝之效矣雖然敢不勉耶幸兄常不鄙而敎之僕於文字素非􅀁長然以猥嘗受敎於兄且幽居少事欲以灌園餘力時一爲之又以爲既樗散無􅀁用世幸未即老死二三年之後或為天􅀁牖使少有知識尚當托之於文字雖不敢望於行逺庶幾達鄙陋之意焉是以不䏻息心於此然徃時朝夕於兄尚不能竊其緒論今去兄既逺誰為開之固知終必罷廢矣今徃近作數篇冗散無可採至如贈彭通判與李郎中墓文亦稍見巳志故敢請敎耳僕今年寓居陽羡挈妻子以行有一二童子相與講章句自以此身不量而為人師雖不責我以道而􅀁講者章句然至於收拾放心正容謹節以率之者亦不敢不力自謂於此頗有分寸之益因是知吾兄以道為人師而􅀁敎者又非一二童子乃齊魯五六郡豪傑之士則其􅀁以率之者宐何如而其為益又何如也然僕􅀁謂一二童子者自章句外亦以内外輕重義利可否時時與之一談則或如鑚礦而不入僕敎不過一二童子而又日夕與之處然猶如此兄雖善於作人然以一人督率五六郡之士而又不􅀎日夕與之處則其頑然而無得於兄者固亦有之歟僕竊為兄慮也夫為此五六郡得一良師孰與為此五六郡得百十良師故為提學者莫急於凬勵學官今學官自卑其身無恥而嗜利甚矣誠欲有以凬勵之又恐非一僉事之力與三年之間􅀁得為也奈何家父言某縣某人者在亰師百計詆兄此甚可為勇於任事者笑也然在齊東得無亦有如某者乎此在兄亦惟自信自為而已何較於彼者㢤家父又言兄有薦僕之書於亰師貴人此兄之愛我甚而􅁯其醜也雖然僕之與兄以善交聞於人乆矣兄之薦我何異於僕之自薦乎僕年來自計已熟大抵人用之不敢以隐人不用必不敢以求亦必不敢以悔終吾身而已矣然兄素已知我矣何待僕自言也在菴兄過常不及一㑹殊為悒怏幷以相白答俞敎諭得􅀁示書知執事望我甚厚敎我甚至感激感激葢學病於博襍而量病於不廣此鄙人膏盲之証過承􅀤藥敢不盡飲然僕之此心亦不敢不悉於執事也夫士之於世苟無志於爲善則已果有志於善則世之人未嘗不欲其入於善己之善未嘗不欲與人共爲之􅀁謂衆生病即是巳病此萬物一體之心必不䏻自巳者也僕於甲科人才固未嘗專有眷眷捜羅之心其於岩穴之士之賢者亦何嘗敢􅁯相與切磋之心哉其於卑鄙齷齪越禮放法者固未嘗敢有雷同隨俗之心而其間尚可告語轉移者亦豈敢遂無憫惜愛䕶之心而遽疾之如讐者哉甲科之與岩穴本無㨂擇而感應則隨其􅀁遇峻拒之與憫惜本無作好惡而曲成則因乎物情此天則不容人加減者也夫業無定習而心有轉移苟眞有萬物一體之心則雖從事於舉業以進身未嘗不爲義􅂗也若使有獨爲君子之心則雖從事於飭躬勵行以退處未嘗不爲利􅂗也經義策試之陋稍有志者莫不􅅧病之矣雖然春誦夏弦秋禮冬書固古之舉業也固未嘗去誦與書也茍無爲巳之心則弦誦禮書亦秪爲千祿之具苟眞有爲已之心則經義策試亦自可正學以言昔人妨功奪志之辨此定論也至於以舉業爲敎則稍有志者亦知􅅧病其陋矣吕伯恭以舉業敎浙中而朱子以書規之伯恭答書以爲若不開此一路則法堂前草􅅧一丈僕嘗誦而􅀼嘆以爲此極是前軰苦心非特後之人未􅀎知雖當時同志者亦未􅀎盡知也僕年來則巳決意絶去舉業之敎矣而猶􅃈􅃈為執事言者葢亦自知今之不敎舉業未為脫洒而向之敎舉業未為粘帶也今之不敎舉業未必足以閉人之利􅂗而向之敎舉業未必不引人一二於義􅂗也至於道徳性命技藝之辨古人雖以六徳六藝分言然徳非虚器其切實應用處即謂之藝藝非麄跡其精義致用處即謂之徳故古人終日從事於六藝之間非特以實用之不可缺而姑􅀙事云耳葢即此而鼔舞凝聚其精神堅忍操鍊其筋骨沉潜縝宻其心思以􅀋萬物而通神眀故曰洒掃應對精義入神只是一理藝之精處即是心精藝之麄處即是心粗非二致也但古人於藝以為聚精㑹神極􅅧研幾之實而今人於藝則以爲溺心玩物争􅀎好勝之具此則古與今之不同而非􅀁以為藝與徳之辨也執事􅀁舉堯舜夫堯舜之􅀁未聞與若㒺聞云云者此道也羲和之曆􅁚夷䕫之禮樂臯之刑名至於垂工和矢伯益鳥獸孰非道㢤然諸子為之而堯舜若罔聞云云者葢君逸臣勞道則然耳若謂堯舜以道自處而以藝士諉之人何其自待者厚而待人者薄也臯以刑名自處而乃為其君陳迪徳之謨䕫以擊石拊石自處而乃敎胄子以簡廉􅀡温之徳性則是以藝士自處而以徳望之人又何其自責之薄而責人之厚也曆象禮樂藝也修五玉如五器張施五采在璣衡獨非藝哉則堯舜亦屑屑矣孟子曰堯舜之智而不徧物急先務也若在羲和則曆象便為先務在䕫則擊石拊石便為先務又安得以堯舜之􅀁不徧者而遂不急也執事以好博􅇎技藝為㒒之病此則不敢不承而至於分技藝與徳為兩事則辨之亦不敢以不明也葢儒者慕古之論莫不以爲必絶去舉業而後可以復古之徳行道藝此則不務變更人心而務變更法度將有如王介甫􅀁謂本欲變學究爲秀才不謂變秀才爲學究者矣儒者務髙之論莫不以爲絶去藝事而別求之道徳性命此則藝無精義而道無實用將有如佛老以道徳性命爲上一截色聲度數爲下一截者矣是以鄙意不敢不盡於執事也雖然執事憫時病俗之意則亦􅅧且切矣今執事固有敎人之責矣今之敎以舉業縱欲罷之而􅀔有不􅀎即使復古之敎則六藝固亦不廢執事之隐居修行㒒聞之􅑟陽諸兄亦久矣㒒􅀁願執事之於諸生即舉業之中而示之以窮經反躬明理着巳之路而嘿消其干名好進之心則是舉業中徳行道誼也即古六藝之中而引之於聚精㑹神極􅅧研幾之實而嘿消其争􅀎務勝之心則是藝事中道徳性命也方且順而導之正不必逆而沮之也大率今之世舉業技藝種種猶未足爲心病􅀁爲心術大蠧者在於義利之辨不明執事敎人欲明義利之辨則必以身率之以身率之則自取與辭受進退至於纎微必精察之果義歟利歟􅀁取與辤受進退至於繊微盡義矣尤必精察之果有為歟無為歟一毫不自遮蔽一毫不使潜伏精神可透金石成人材動風俗之責固有在矣敢以是少效愛􅂇之意以為執事報也無由面晤極論臨書馳懷嗣後更望時惠盡言此僕之􅀁汲汲而求也答戚南玄來書滿􅁓無一字非膏肓之病無一字非瞑眩之藥兄之惠我極厚極厚非言可為謝也論語曰據於徳游於藝記曰徳成而上藝成而下徳之與藝􅀃作一个不得􅀃作二个不得􅅻提起處色色總在面前􅅻放下處了了更無一物自是人心本来之玅而不容增減也古人終日􅀙事於琴瑟羽籥操縵安弦種種曲藝之間既云終日􅀙事矣然特可謂之游而不可謂之溺今之人其於琴瑟羽籥操縵安弦種種曲藝即便偶一爲之則亦可謂之溺而不可謂之游何也爲其有欣猒心也爲其有好醜心也為其有爭長兢短之心也欣猒心好醜心長短心此兄之􅀁謂即是塵機也然則􅀁謂藝成而下者非是藝病乃是心病也掃除心病用息塵機弟敢不自力以承兄之敎也雖然塵機息盡渾淪道心亦願兄之無忽斯言也答王生宗道唐君誠志節之士􅀁惜平生未與之接不能得其心胸面目之詳只是據􅁓上語套􅀃一遍殊覺精神不暢不足以􅀤潜徳之光且如徳州接逓一事乃是據宗道口􅀃故叙事中此一段稍覺精明若使前時宗道盡將此君平生首末行事委曲口􅀃一番或能更有發揮耳今不及矣然竹溪剛介之士其言亦自足以傳信不待予也既已為唐君作銘為之投筆三嘆志士苦心曠世相感且唐君在當時淹蹇不得一第而老於郎署又年不滿六十其清修絶俗亦自足以結裹此身而風沒世彼世間取髙第爲大官享􅂄壽勢力赫奕不知幾何人即其沉酣飽滿於聲利間當時莫不自以爲最得意然􅅻汲身便与臭腐糞土何異若此者其於唐君何如哉此孔子􅀁以較量於齊景公夷齊千駟餓死之間其於提醒人心最切切也清寒之士可以無􅀁待而自立矣宗道素有志向更願於義利􅂃關處極力研析使不爲一切俗情所轉乃是挺挺自作豪傑亦􅀁以不􅀒唐君衣鉢云耳勉之勉之與唐一庵書使者來弟徃洞庭歸時乃見尊柬讀罷不覺悽然之甚吾兄盛徳人也造物者既窮其躬而又夭其嗣也哉爲善者其亦不可以自信矣雖然自古聖賢􅀎就人􅀁不􅀎就之徳則必有􅀎堪人􅀁不􅀎堪之情昔者卜子夏􅂘子喪明失之過延􅁜三號而行失之不及東門吳則蕩而非人情也兄篤於信道乆矣試于此㝷究眞源則雖極哀極苦中本心了然自明􅀁謂哀之發而中節而未嘗失其爲中也􅀉􅀺知州辱来敎云歆羡畔援之無也易意必固我之無也難澹泊者無􅀁愛而自􅅴髙明者有􅀁主而自執此意自前人未有􅀤之者非吾兄眞實體㑹不􅀎了了至此僕謹聞敎矣甚幸甚幸夫麄塵細塵總来一塵心是活物周流六虚本来如是意必固我安從生哉畢竟歆羨畔援潛根内伏有纎毫洗刷不盡處也既曰意必固我矣則未可語畔援之無也僕閒居自咎惜􅀙前意向之未眞覺一切妄念之為累近來工夫惟有嘿嘿知過而巳兄􅀁過􅅄令人赧然不敢當豈􅀁謂誘之而欲其至於道也東城篤行堅至在朋友中絶少于比顧僕也淺陋何足以􅀤􅇓徳之光謹據狀叅以同遊時所見聞􅀙實書之不敢爲䛕墓之詞亦􅀁以體東城之志也中有踈略與不當處更望痛爲抹削惟吾兄勿讓與鄭淡泉文􅃟別兄久矣僕居閒無事時取晦菴先生之書讀之至答陳永嘉書義利􅀟行王霸並用之􅀃不覺慨然發嘆以謂三代以下人材與三代以上劃然隔作兩截其隐微􅅧錮之病只是如此然同甫亦是豪傑豈肯便自坐落利覇窠子裏去只縁差却些子其流遂至於此有志者眞不可不愼於毫厘也試以請於兄兄試敎之答洪方洲王事承示關政藹然寛恤禮讓之意至於節用惠商以身先之非吾兄雅志古道不䏻爲此中間意有偏重處亦稍爲指摘一二以復來命自嘆艸埜書生不䏻識知榷塲事體終爲目論耳萬不如吾兄身歷其地而斟酌之之爲精也雖然山人􅀁知者去􅅦塲中弊病猶易去心術中弊病則難昔人謂有意爲不善與有意爲善皆能累心如瓦石屑金玉屑皆􅀎障眼惟愼獨二字是千古正法眼藏若於此參透則終日履道只是家常茶飯平平坦坦不作一毫聲色世間一切好題目惡題目皆不􅀎累我矣吾兄向善甚篤持身甚嚴迥在流俗之外僕一見而知敬之如瓦石屑自是不􅀎障兄第恐􅀁謂金玉屑者不謂無一􅀧半􅀧尚著眼中耳二程全書近曾留意否冬來獨居思兄爲切杭城多事僕恐不􅀎来葢山人之道宜爾也俟􅆕奉報與王湛泉文選兄之為文選也海内端人節士莫不張目吐氣以為三代􅀡道復出兄之退而西歸也海内端人節士莫不悵悵然失望僕於兄之為文選也則􅀼與海内之士同其慶喜而於兄之退也獨不與海内之士同其悵悵者何也莊生有言風之積也不厚則其􅀒大翼也無力水之積也不厚則其􅀒大舟也無力後之君子道徳功業不如古人正坐積之不厚􅀤之太驟耳古人限之以四十而仕豈古人才力智慧不如今人葢以厚積而薄試之也今兄去古人强仕之年猶未也願兄益自恢廓勿以三代以下功名為可足勿以古聖賢精一之學為不可至乗此山林多暇專精致神使反之於身心情性者益􅃉以精而究於古今成敗理亂之故者益練以熟積之於優游而􅀤之於劻勷􅀁以任天下之重有餘裕矣豈止為今日第一文􅃟而巳哉此僕􅀁以不暇為兄悵悵而敢為兄賀也海内同心如兄䏻幾自屏㱕後以兄在文􅃟嫌不敢奉書今兄既還山又呉兾南北相去且五六千里無由一相切磋耿耿如何僕也樗散無似自別兄後毫髪無􅀁長進惟舊來靣目兢兢不敢變壊此可用以少慰知已之懷耳至於驅馳當世非惟才有􅀁不可抑亦性有􅀁不宜也兄在文􅃟時乃獨勤勤推轂故人之意則厚矣與陳後岡叅議別後恋慕不捨與乆病衰頽之狀大略具之葉紹興通判􅀁寄書中今家人来亦當口䏻道之矣毎毎念昔與兄同住亰師日夕相砥淬受敎不爲不􅅧且愧愚踈無以承之不謂此後􅄅然相隔葢三四年而僅得一兩日之聚方其􅄐思􅀌懷十未展其二三而鷁首已南矣亦何暇於吐心曲談道徳以交􅂇􅀁不及者乎兄去閩越不知復以何時爲聚首之期非惟僕蓬蒿之貭不䏻藉􅀡於麻中而兄之徳器如玉亦不暇置諸頑石之間以自攻此其可思可悵豈特以酒食文字之故也僕嘗聞兄緒論大意以爲必襍用王覇乃可以適時而濟務而僕則多執泥古方戞戞乎如以舟而行諸陸然兄既以此自信而不疑僕亦以此自􅑟而不悔是以自承敎以來契分雖甚投而論議常至左右古人云去短集長此僕之􅀁以不可無藉於麻中之􅀡而兄顧亦謂有取於頑石焉其可也兄在湖藩清修之節剸繁之才自與時流迥別雖然亦願兄母見化城而遽住耳今奉去讀書記乙集一部僕意欲以此廣兄不知兄肯降心而觀焉否也僕􅀼謂三代人材皆􅀙心性上磨鍊故其經綸叅贊之業不出户庭而得之後世反躬之學不傳而其人􅀁以經綸於世者率亦踈鹵求其繫國之輕重如孔明李泌陸䞇之􅀙則其於道雖未醇而本其天資之􅀁暗合亦徃徃開誠而不欺恬淡而少欲其經綸雖未必盡出於道而竭其才之􅀁及亦徃徃渊源而有本闊大而無漏固不可謂無其人焉而非謭謭然功名自喜者可以􅉥而望也蘇子有言士之不以天下之重自任乆矣兄其有意乎僕居閒無事欲得國朝諸名臣奏議讀之且以尚論其人與其􅀁以經綸於世者何如顧僻處山居苦不能多致煩兄為我畱意至於北宋以前諸儒解經之書世多散軼不存亦煩兄試博求之菽園雜記諸書兄向欲錄一副本見與亦願兄母􅁯之也若夫詩辭之學則僕自知力之決不足以進此向巳告疲於兄矣兄母更以此望我俟他日有持後岡先生集示我者我當望洋而嘆或尾後作一二句䟦語是則可耳兄許我以暮年買田同住之􅀃如何如何諺云痴人前不得􅀃梦吾巳執此作左劵矣幸兄母使我爲痴人也失兄於東隅得兄於桑榆􅀼以為怏艸􅋄白答屠漸山諭徳自聞兄有疾時以爲懷夏間富生于徳來學毎因富生問起居則知既已勿藥矣甚慰甚慰浮屠家稱缺陷世界故物忌於盈吾兄之才與其所享可謂完矣乘除消息天行則然吾兄之疾豈造物者將以是少損􅃜焉而大受於其後也乎兄平生意氣甚髙聰明甚慧夫髙者不可柔而雌也慧者不可藏而晦也兄罹此疾疢則寂􅋁枯淡之中靜思黙視種種世界種種伎功無可恃不朽者必將於幻身之外別求􅀁謂本來面目者而從事焉則兄之學將日以精而其􅀁得於病者不既多乎此僕始為兄憂而竟為兄賀也故曰惟其病病是以不病兄勿以為濶論如何弟年來奔走荆溪今歲始買小庄去縣十四五里妻子始有定居衣食稍􅀎自給一身幸爲天地間一閒人矣藥餌之暇亦欲講習故業兾少有得焉以畢􅀫志而海内知交皆散在四方昔人取多聞而恨於獨學之難毎以為嘆而知交如兄者則尤徃來於懷也向嘗託南江道此意而兄不􅀎來僕又不􅀎徃奈何今蹉跎又經歲矣後復如何使来承委令兄祠堂文字縁㒒素病羸自鄉居以來欲節省言語文字以完心氣故凡親知之託一切謝免而吾兄數百里相命似不宐以此爲觧然復自念平生未􅀗請見於九峯先生既無以測知精神意向􅀁在而欲爲之叙論若深言之則近於䛕墓之嫌淺言之則不足以􅀤潜徳而違於銘以穪羙之義不滿於愛弟􅍿子之心是惧欲辭去則又重以違長者之命而不敢也又復自念兄之􅀁不逺數百里而託於不文之辭者葢以迂戅之人不􅀎爲䛕其言或可以信於後來者耳今以平生未嘗請見而􅅧言淺言兩無􅀁措乃嚅囁而爲之言是無以自信乎其心而又何以信乎其人非兄􅀁以欲相託之意也是以敢􅀡心而辭於將命者且其人之相知而言之足以信者則既有東郭少湖在矣幸兄亮之冬中南游必淂登兄之堂傾寫􅀁懷不盡與田巨山提學約之過敝邑􅀉到手書嘉惠多謝雅意僕自送約之至姑蘇觸暑積勞遂爾􅀤瘧迄今伏枕未及䏻强起也病㱕以來生平交遊一時雨散空山獨坐毎毎念之令人無以為懷此豈惟握手殷勤日夕之懽不䏻解之于心而獨學無友則昔人􅀁以􅅧病於􅀌陋也奈何近㑹約之稍􅀎道吾兄􅀁新得慰甚慰甚約之又言吾兄以好畵之故至欲手自摹搨則僕之迂滯􅀁不䏻觧者然吾兄專凝純静豈謂沉溺于此或者㞐閒無事游息之時聊以此爲戯耳僕􅀼謂遊藝之與玩物適情之與䘮志荖別只在毫芒間如六藝皆古人養性而理心自此便可上達天徳今人學射學書學數則不過武弁之粗材與胥史之末技是以戴記分為徳藝上下之􅀃而子夏亦譏其不䏻致逺況又不在六藝之科者乎且古之善画不過如鄭虔王維軰何足學也況學之終身有竟不䏻似其一水一石者平陳􅂂常之詩曰晚知書􅀞眞有益却悔歲月來無多僕嘗誦而笑之以為􅂂常知書画之有益而為益有甚于書画者􅂂常不知也􅂂常自悔其歲月之不足以給書画而書􅀞祗足以縻費歲月者􅂂常不知也吾軰年巳長大雖籠聚精神早夜矻矻􅀙事于聖賢之後尚惧枉却此生則雖詩文與記誦便可一切罷去況更有贅日剰力爲此䑛筆和墨之事乎然僕聞之􅀞家之􅀃亦不以䑛筆和墨者之為工而必解衣盤薄之爲上乃知画家不貴䏻画正在䏻不画耳􅀂此者􅀁以凝神而不分其志也兄之画品䏻通乎此則僕之􅀁不敢知而􅀁以諷兄者不乃爲土苴末論乎幸兄一􅀏而擲之可也僕自別後携家至陽羡謝去世事牽􅆞時時閉門黙坐始知平日没于多􅄮蕩精揺神之過毎讀邵子勞多未有收功處踏盡人間閒路􅄮之語則憮然大悔者乆之是以奕棋賦詩博聞强記皆昔􅀁甚好或終􅀊不對局或經月不成一韵或數旬不展卷雖或為人􅀁强與自强為之亦竟如嚼蠟了然絕無滋味也觀尊卷􅀁書數作則荒落踈􅂴之態可盡見之僕之為此其志亦欲發憤刋落收功一源而力必不䏻逮也惟兄有以敎之與二弟正之行者居者形跡各別然理道無二致也日用功夫無二􅃱也汝兄在山中若不􅀎謝遣世縁澄徹此心或止游玩山水笑傲度日是以有限日力作却無益靡費即與在家何異汝在家若䏻忍節嗜慾痛割俗情振起十數年􅂴散氣習將精神㱕併一路使讀書務爲心得則與在山中何異艱哉艱哉各各弩力居常只見人過不見巳過此學者切骨病痛亦學者公共病痛此後讀書做人須苦切􅀧檢自家病痛葢􅀁惡於人許多病痛若真知反身則色色有之也與薛方山郎中爲别甚乆可勝耿耿時迫歲暮百感俱集自惟年垂四十已蹈無聞之戒世間事既幸不復關渉一箇身子又自不䏻了終日碌碌竟是何事囘頭一看不覺􅛐笑以此來歲更欲作一閉關之計生徒盡巳謝遣交游亦且息絶非敢望於坐進此道亦庶幾作天地間一閑人不落閙攘套中儘有受用矣康節云豈謂此身􅅴老杇尚無閒地可盤桓毎誦此語悵然太息文詞技能種種與心為闘亦􅀙生徒交㳺之例盡謝遣之盡息絶之不然猶是閙攘套子也山林之士終是入山􅅧入林宻乃是安穩地面而日侍老父必須居城中如前􅀁􅀃欲効古人隐身􅒡市陸沉於俗者不識􅀎乎否耳吾兄方為時􅀣䇿勳名勉旃山人雖不與人閑事亦當傾耳以聴下風也與張西磐尚書伏惟明公清苦之節􅀡方之氣葢得之天禀而孳孳好學老而彌篤此海内後生之􅀁慕望而興焉者也人者天地之心人心原是與天同運頃刻有息則便不相似程叔子曰人不學則老而衰衞武公作抑戒使人日誦以自儆其喫􅂃全在不愧屋漏一語是時武公年九十餘矣其學之勤而宻也如是􅀼惟明公家居以來􅀁以專精致神究極髙明而􅅧入古人之閫奥者固益知非淺夫之敢窺矣北冀南呉何日得一奉敎左右藉鍼砭以自㳤耶某少頗不敢自棄今年且四十益覺進徳之難此身在欲界中頭出頭沒乃知古人寡欲慎獨工夫眞未敢􅋄艸論也奈何奈何承命􅋄堂記乆不敢虚長者數千里之托􅀁愧文字踈陋不足以􅀤揮道眼之􅀁觀聊述平生自念此心通塞存放之機以就正焉而巳幸塗抺敎之吾人在宇宙間不論進退隐顕自有事在成巳與成物原非兩事明公之徳風于鄉而信于天下乆矣鄉里後軰中有可與言者時與提撕使趨正路此亦􅀁以接續天地閒善人氣脈于無窮也何如何如風便惟不靳逺敎是望與王體仁體仁與吾别且三年知工夫當更有入細處至於世路利鈍一功不足道也吾數年來日用操鍊中頗見古人學問頭腦四十年散亂精神儘􅀙收拾自此􅀤憤努力或可不􅇳􅀒此生耳學問雖是人人本分事然非豪傑不䏻志非刻苦不䏻成當世學者悠悠只是􅀃好看話做好看事過却一生到底終無結果可時時􅀅忘食忘寝舊案叅對便見得吾人今日工夫較古人踈宻何如也如鷄抱􅆗如龍養珠仙家煉幻形者猶然況人為眞性命者乎便間聊此致愛助之意容相約過毘􅁜一相切磋也與王堯衢書抱病􅂴慢乆缺書問知執事不謂我踈簡也春來卜居陽羡此中山水絶清無車馬迎送之煩出門則􅀙二三子登山臨水歸來閉門食飲寝梦尚有餘閒復稍􅀙事於問學然詩文六藝與博􅇎記問昔嘗强力好之近始覺其羊􅀥昌歜之嗜不足饑飽千人非古人切問近思之義于是取程朱諸先生之書降心而讀焉初未嘗覺其好也讀之半月矣乃知其㫖味雋咏字字發明古聖賢之藴凡天地間至精至玅之理更無一閒句閒語􅀁恨資性蒙迷不䏻􅅧思力踐於其言焉耳然一心好之固不敢復奪焉此􅀋之書皆近世英敏材辨之士以為老生爛語至束閣不肯觀雖其苦心敝精於文字間而竟不免老而無􅀁聞有可痛者僕之自陳其愚盖過不知量亦欲執事同􅀁嗜好也何如何如近日當事者􅀁去取投閒之臣僕巳先知其去與取之必如此矣不足為恠且平生亦頗􅀎自為主張不敢跟人哭笑不敢以鴟鳶之所爭蝸角之􅀁戰者以動吾心而累吾守此亦執事􅀁素鑒無待僕自明而猶自明云云者有􅀃也父子至情恐以此上累吾父之心須吾執事觧喻耳當今之士隐居篤學修名砥節如湖州唐子平􅈵趙子軰者凡若干人㒒之駑駘十不从其二三然此軰皆淪胥流落淹􅆡巳十數年少者壯壯者且老以衰或餒凍無以存活又其初皆以盡力國事誤觸網而抵禁非如僕之自以私罪去也此軰尚不得為當事者􅀁與則僕得與此軰同陸沉焉固無憾也更何有􅀁覬乎凡人出處利鈍數固不偶始言官謬相薦時㒒固知終必且棄去以為萬一不棄去則僕之自為處亦有甚難者何也若使僕復如舊時随逐行隊進退以旅趦趄囁嚅于明時無粟粒之􅀘則􅀅毀平生而弁髦之且向惟不􅀎爲此􅀁以􅅴心去官而無􅀁悔耳不然則柳士師􅀁謂何必去父母之邦者也若使不如此而如彼守其愚戅固陋而不變恐日月漸乆積嫌積忤自作禍孽更有甚於向時既不䏻為邯鄲之􅇍竟當匍匐而㱕耳是以中夜思之進退狼狽乃今得自脫於此固可謂之幸而不可謂之不幸也古人有言人各有䏻有不䏻懸釡帶索枯槁丘壑雖窮死而不肯悔者僕自謂􅀎之随逐行隊進退以旅以徼幸於衣錦乘軒之華僕非不欲勉强學焉恐竟不䏻也僕自生齒以來百種嗜欲頗少於人亦絶不知人間有炫耀􅂋赫事獨不䏻淡於飲食乃始痛為節損或四五日不肉食始而苦之乆且􅅴之矣間飲食於冨貴之家腥膏滿案且噦之而􅄬筯矣􅀁以苦身自約如此者以為既不䏻改于其固陋以狥時好則貧賤自是此生常事諺曰畏水者不乘橋恐其動心也且夫自處不當違其􅀁䏻而强其􅀁不䏻處人當成就其長而䕶其􅀁短安知當事者之非􅅧憂我乎僕幸未衰敗苟自不􅀣立則已耳􅀂夫假之以二三年孜孜早夜敏行而不敢怠則子輿􅀁謂獨善兼善與退之􅀁謂行道為書化今傳後或者不䏻兩讓矣豈有不得於進又不得於退者乎執事知我故不慙大言且非此無以解吾父之懷也吾父之􅀁以戀戀於㒒者亦非以今時富貴人望㒒也王良有言父子情􅅧或意僕之以是為憂也而亦憂焉耳㒒固不憂也又或者以自少敎之讀書不忍遽見其廢錮於聖世矣乎雖然成敗失得且當要之乆逺母遽為僕戚戚也望吾執事早晚間曲為寛慰則數千里外人子懸望之心亦稍舒矣是執事之賜也客居無事二三子時時以舉業文字强相問訊亦殊妨静坐與讀書但念此身爲宇宙中人其於塵俗奔走縟禮煩儀之事既以其溷擾而獨避之于此不當更有􅀁厭耳舍妹并甥女想皆康吉餘懷不盡生平最􅂴作書更􅂴作眞書書又多差與執事書既不可假手於人又不䏻不差又不及更録輒以呈上并希亮之答周約菴中丞某自屏居以來自以辠隷不敢復齒於薦紳之後故居當南北孔道非􅏉虚者􅀁宜遂舘於陽羡山間坐此去人益逺親知徃來一切罷廢雖最辱知愛如明公亦尚未􅀎􅁇掃門之􅃥以承敎語叙衷曲此其􅂴慢之罪僕猶自知況長者乎以為宐麾而棄之矣不謂過辱記録逺勤使人且手書慰諭尚欲納僕於古人之域捧書自激􅀼感且嘆固知長者之度不肯輕棄一物欲曲而成之􅀂此然來書􅀁敎尚以僕早年受知之故葢見僕少時意氣可以􅀼古人之尺寸焉而未知僕今憊駑樗散雖欲比於今之人而有不逮也僕少不自揆亦嘗有四方之志而才器迂滯本不適時加以弱冠􅀙仕重以􅀒氣學未及成而驟試之且少年􅀒氣不識忌諱以迂滯之氣而試未成之學重以􅀒氣之習此其動輒罹咎也豈足恠㦲猶幸免誅僇得齒編氓且少嬰疾疢三十以後齒髪漸衰委形既然志亦隨之即如讀書為文本是嗜好近或挾冊讀未數行輒眊然而睡矣旬月不一御􅉢墨時或為之輒終日汗漫申􅁓䑛筆竟不􅀎成十數字而遂以罷夫外則廢於親知之徃來内則廢於文史之玩即此一兩事則其衰頽弛靡不比於人也可盡見矣此其意葢欲搞形􅁅心自同木石豕鹿之間使宇宙廣闊着此一閒人足矣淮隂南陽之事固萬不敢一冀焉至如􅁚緯地形諸家之學如來書􅀁稱管鄧􅀁長亦何敢不自量而攬焉以為可幾乎且夫淮隂南陽其始皆匵其器而不䡖以試䄂手而觀天下之勢如良毉之隔垣而洞五臟也故其壇而拜焉廬而顧焉則以造次一二語而圖王致伯之略遂以定況齷齪如僕軰者􅀁謂以迂滯之器而試未成之學如弋者以百􅀤而徼於一中故屢試屢蹶此其大巧大拙之効已見於前事矣乃欲以倦遊息機之後而自比於古人隐居求志之前雖强自鞭策固知其不􅀋也然則明公敎督之厚其何以承之甚自激也甚自愧也雖然自平居以來澄慮黙觀亦既久之乃稍稍窺見古之儒者􅀁以爲學之大端􅀼以其實乃在於身心性情之際而不以事功技術掲耳目爲也故其退藏於宻者甚約其究可以窮神而立命古固有豪傑之士而不知學者衆矣是以事功流而爲權計技術流而爲小道凝靜致逺南陽其幾乎其襍於申韓則擇術之過也淮隂烈矣竟以矜能伐功殞其軀以輅之才局於方技僅於􅂠駝朱建平毉相爲伍鄧征西以􅀁長濟事以􅀁長殞身與淮隂同此數子者不可不謂豪傑之士也然其擇術則可謂不審矣僕功名韁鎻已􅀗斬㫁至於􅁚緯地形種種諸家之學徃時亦頗嘗注心焉今盡以懶病廢􅀼以為絶利於百途固將籍此餘間聚精蓄力洞極本心洗濯愆過以兾􅀵功於一原而未知竟當何如耳近來毎觀伊洛之書及六經之㫖覺有毫髪悟入則終日欣然忘其居之陋而形之憊也􅀁苦習氣纒繞欲障起㓕未䏻痛與掃除使之光大然不敢不勉焉以爲古來儒者􅀁以自㳤其身之學其命脈或不外此而無有乎窮逹今古之異者也若乃進僕於􅈽􅂰髙吟之儔則心不敢當謂僕為今之腐儒鄙儒賤儒也其亦可幾乎以是少酬明公之知明公其許我乎辱愛之􅅧故不敢隐其愚且狂也今􅁁陲多難兵財窘急明主側席正豪傑展効之時為社稷計維公軰一二􅆱舊隆中之業是有在矣其何讓焉山壄鄙人其旴而望之矣答周七泉通判僕自來家居多是謝却一切應務或閉門讀書或宴坐山水間稍䏻擺脫便謂胷中無事其寔種種欲根濳伏不曾露出頭面既不得頭面則不知下手着寔掃除葢悠悠之為患久矣近來乃於一切應務不敢避過始覺敗露漸多然一番敗露則一番鍜鍊􅀙此工夫頗為近實乃知濂洛主静與敎人静坐之􅀃亦在後人善學不然儘䏻誤人非特攘閙汩沒中􅀎誤人也禪家之絕去塵縁一蒲團了却此生此􅀁謂果㢤未之難矣吾與羅兄近来工夫不得一面證奈何然此心清時未嘗不對二兄也與兩湖書兄自少才名巳滿海内而六家九流之書㡬乎無􅀁不誦荘騷太史之文亦無􅀁不摹晝而操縦之矣即使海内奇才偉士欲傲兄以􅀁不知而亦不􅀎也況如僕者才至駑下向在亰師毎同平涼趙景仁過兄論文久之兄􅁣然曰二子之言是也遂欲盡棄其舊學而更張之然當時犹謂兄之急於奨善而以口語相推云耳已而視兄之文則果脫然盡変於舊矣夫文人相傾在古則然景仁於兄未知何如也至於僕之讀書則豈能若兄之博而其為文也亦安能望如兄之古㢤然兄不憚降心屈已而􅀙之推兄是心也設使不徒用之於文而用之反躬為已之間即古人􅀁謂勇撤臯比一変至道者在兄亦何讓乎僕未始不嘆兄之髙明不可及而亦毎毎惜兄有可以一変至道之力而僅用之於文也雖然此亦未有人焉以反躬為已之說而磬欬於吾兄之側耳設使有人焉以反躬為巳之􅀃而磬欬於吾兄之側如吾二子之論文也又安知兄之不降心而􅀙之而翻然変於其舊之之為尤速也乎又未始不自罪吾二子者不􅀎為古人反躬為己之􅀃以告兄而徒以文士雕虫篆刻之論投兄之好也兄今之􅀁謂狂者也而豁豁磊磊率情而言率情而貌言也寕觸乎人而不肯違乎心貌也寕野于文而不色乎荘其􅀡以肆則亦古之􅀁謂狂者也是兄有可以一変至道之力而又有狂以進道之資也兄其䏻無意乎然兄之意必曰吾􅊭生好􅆘吾性而已矣吾不䏻爲拘儒迂儒苦身縛躰如尸如齋言貌如土木人不得動揺云耳夫古之􅀁謂儒者豈盡律以苦身縛躰如尸如齋言貌如土木人不得動摇而後可謂之爲學也㢤天機儘是圎活性地儘是灑落顧人情樂率易而􅁖拘束然人知安恣睢者之爲率易矣而不知見天機者之尤爲率易也人知任佚宕者之爲無拘束矣而不知造性地者之尤爲無拘束也人之病兄亦或以其樂率易苦拘束而僕則以爲惟恐兄之不樂率易不苦拘束也如使果樂率易苦拘束也則必眞求率易與無拘束之􅀁在矣眞求率易與無拘束之􅀁在也則舍天機性地將何􅀁求哉使兄不以㒒為迂也願􅁇此而更進其􅀃也㒒自少亦頗不忍自埋沒侵㝷四十更無長進惟近來山中閒居體念此心於日用間覺意味比舊來頗深長耳以應酬之故亦時不免於為文毎一抽思了了如見古人為文之意乃知千古作家别自有正法眼藏在盖其首尾節奏天然之度自不可差而得意於筆墨溪徑之外則惟神解者而後可以語此近時文人􅀃秦􅀃漢􅀃班􅀃馬多是寱語耳荘定山之論文曰得乎心應乎手若輪扁之斵輪不疾不徐􅀂伯樂之相馬非牡非牝庶足以形容其妙乎顧自以精神短少不欲更弊之於此故不能窮其妙也何時得以吾兄一面談之兄有近作可寄我兄向云家居有暇將來江東今􅀎果此約否念菴兄時相會否弟數年間頗梦寐於江西之行今日侍家君百里之外亦無意矣㑹念菴兄并煩道鄙懐漢書批抺約四五十傳亦頗盡之并奉返以全信􅀉黄士尚弟也奉職無狀幸蒙寛恩得歸田里不然則從兄於遼海之濵亦􅀁願也易之蹇不云乎君子以反身修徳夫身何待蹇而後反徳何待蹇而後修盖􅄫寥枯淡之中其􅀁􅂇於道心者爲多也自儒者不知反身之義其髙者則激昻於文章氣節之域而其下者則遂沉酣濡首於蟻羶䑕腐之間如兄之志氣固巳塵垢一世而與古之志士爲徒矣不知近來反身之學得之于蹇者何如幸以敎我張舜舉言兄自戍遼以来作詩幾四五本兄何以􅃱多如此豈將以是自鳴其習坎心亨之樂耶或者窮愁覊旅無聊之思而姑託以自遣耶抑以冩其江湖之憂而􅃱其去國繾綣不􅁯之愛如古􅄐騷之作耶其無亦自擬於鏡歌鼓吹遼東都護之曲而與塞垣横槊之士同其慷慨而謳吟耶不然則枝葉無用之辭其足以溺心而愒日也乆矣兄何取焉日課一詩不如日玩一爻一卦日玩一爻一卦不如黙而成之此之謂反身而又奚取於枝葉無用之詞耶弟近来深覺徃時意氣用事脚根不實之病方欲洗滌心源從獨知處着工夫待其久而有得則思與鄉里後進有志之士共講明焉一洗其蟻羶䑕腐争􅀔兢利之陋而還其青天白日不欲不為之初心此鄙人之所不自量而􅀼有兾焉者也天子仁聖在宥天下兄豈久於海濵㢤弟獨學無朋將籍兄為􅂇日日望之近來應酬文字毎不敢作而年嫂誌文則不敢辭盖以昭天子之寛仁而發海外􅀌臣心事之一二焉非特為應酬故也嘉幣謹辭果酒則拜賜矣廣寧有賀黄門毉閭先生者忠信髙節之士也其風尚在否兄試詢之士人亦可為旅中蓄徳之一􅂇也與項甌東郡守索居既久益嘆朋友合并之難而知昔日相聚之為樂也然又有可感慨者念昔日􅀙兄於杯酒談笑閒此時弟甚踈鹵不䏻有所切磋於兄而兄之善言惇行弟亦不􅀎􅀼之以自㳤不過如世間􅀁謂好友者而已求如古人切切偲偲講學輔仁則未也自去官㱕家閉門諍坐大抵人窮則反本霜降水涸天根始見於是大悔曩時孟浪痛自磨刮􅀡欲掃去枝葉文餙從根本上着力久之亦漸覺有洒洒處但苦此心出入㡬㣲之際殊廢檢防然亦漸覺有洒洒處此時欲見兄相與印証一畨了不可得則向者朝夕相聚反自錯過虚却光隂豈不可惜惟吾兄質實純明古􅀁謂脚踏實地人也此不惟吾兄􅀎自信而友朋亦無不以此信兄者別後想渊然􅅧造非鄙陋之􅀁敢窺測以舊時􅀁見吾兄則尚有葑菲可以少賛於吾兄者何也兄得之資禀者持守有餘而充拓未至資禀有餘於毅而力量不足於弘其得處乃是氣質最美而其不及古人處乃是學問不䏻變化氣質也古人為學皆是百磨百鍊工夫如書臯陶論九徳寛而䏻於栗􅀡而䏻於温沉潜􅀎剛髙明􅀎柔斯則磨鍊已至氣質變化之効也夫弟􅀁謂充拓者亦非如由赤子之心擴而充之􅀃葢赤子之心夲自充擴得去本自􅀎大有一分不䏻充拓皆是未盡此心之量耳中庸曰致廣大而盡精㣲極髙明而道中庸徳性本自廣大本自精㣲本自髙明夲自中庸人惟為私欲障隔􅀁以不􅀎復然故必須道問學以尊之耳此千古學問之的也據吾兄舊日規模且未免作世間一種寡過之人其於賢聖作用尚是有間學問須先定其基故孔子不取謹愿之士而取狂狷為有基也狂者固不待言至於謹愿之士與狷者其不為不善亦較相似但狷者氣魄大矯世獨行更不畏人非笑謹愿之士氣魄小拘拘謭謭多是畏人非笑狷者必乎已而謹愿者役於物大不同耳今人多以謹愿者為狷此亦問學不明之過也交游可望者殊少得如吾兄者尤少如弟踈鹵尚不敢自棄以吾兄之純明甚於道翻然易耳願聞兄之􅀁安整理民事皆是吾人切實工夫而两郡之治如何并願聞之邇來士風澆薄而江南重以侈靡浮蕩比之他􅀁尤甚大抵富貴功利之習糊人心目如處豐蔀之中舉眼皆蔀也蔀外更不見一物矣是以迷惑顚倒莫知􅀁止非有先知先覺者孰􅀎出之溷穢而轉之清流乎提學馮先生觀其論議行事亦不為無意於此矣詞華本實之間稍有軒輊便足鼓舞人心吾兄相㑹得􅀙容聚語幸委曲一賛之答江五坡提學海内交㳺如兄者幾人而交㳺中􅀎重意氣不䡖然諾如兄者又幾人與兄一別至今幾時中間問訊􅀎相通者有幾眷言思之可爲悵悵李中谿使来辱手書惓惓殊自慰幸又辱􅀉到十三經註疏此大惠也僕於此書去歲在山中偶嘗讀之而於三禮者讀之頗詳􅀼以爲王鄭諸儒雖未􅀎深究乎先王之精藴至於形聲器度之間比較同異叅量古今其功最多學者欲因筌蹄以求魚兎則此書不可不觀惜其舊板譌謬既多模糊又甚故雖素好學者或􅌒於觀焉兄之刻此學者可為幸矣而僕山埜之人顧先得之不尤為幸歟中谿又欲刻杜佑通典恐此亦須刻也兄可賛之伏惟兄之蒞閩且三年矣八閩之士固巳丕然向下風矣而兄猶以人才風俗轉移變化之故未得其端為言者此足以知兄之志也夫今之為提學者苟博識善文及程較諸士子文字之精與否而一無􅀁失則已赫然足以收士心取髙譽矣至於人才風俗轉移變化則提學不以是自責而人亦不以是責之也兄獨慨然有意乎此固不以世人􅀁超尚與兄素􅀁精詣者為可滿而必以不如古人之善作人者為可歉歟古之道推其自洽者以教人故徳修而教以尊教而後知困知困而後􅀎自反故因其教人也而徳益修􅀁謂教學相半也人之性行牽柔暗伏者多而果決雄毅者固少矣得其果決雄毅而􅀎為剛中者又加少耳故臯陶之論九徳曰剛而塞强而義而箕子亦曰髙明柔克兄固雄毅果決者剛者强者髙明者也持之以動心忍性之力􅃱之以收歛凝静之實克之以柔養之以中使剛者必塞而不近於露强者必義而不過乎激積之也厚而蓄之也宻則兄之􅀁以自進與其􅀁以教人至於人才風俗轉移變化恐無以易此矣然此在兄之材力亦何難也嗟乎士之蕩於紛華兢於馳騖而不歸其根也乆矣閩固多文少實之域也非兄孰能振之而欲振之豈在聲色文字之間㢤固有道矣􅀂其次則莫切於風勵學官僕􅀼謂今之提學以一人督率六七郡之士即使如古之善作人者則善矣雖然則勢固亦不􅀎人人而薰之與日日而礲之也不能人人而薰之與日日而礲之則其􅀁􅀍者淺矣古之教者自萬二千五百家爲鄉鄉有師而至于五百家爲比比有師豈特教萬二千五百家者則賢㢤彼其教五百家者亦盡賢人也即使今之提學如古之善作人者亦不過六七郡共得一良師耳為此六七郡得一良師孰與為此六七郡得百十良師故為提學者莫急於風勵學官今學官璅尾自卑嗜利無比人人相師靡然一風雖有一二材俊之士出乎其間猶惧其随而􅅯也誠欲有以風勵之又恐非一提學之官與四三年之間􅀁得為耳然以兄之材必􅀎有以處此竊願聞教焉曩與王道思書亦曾及於提學之􅀃大抵不出􅀁請教於兄者矣僕今歲移家荆溪此中山水清絶頗􅀎恱人在病夫尤宐也邇来儘善飯羸弱之軀可以自支惟學不加進殊愧知巳然於動心忍性􅀵歛凝靜此僕之􅀁請教吾兄者亦不敢自棄也更頋兄時督教之􅀁示讀書太苦蕩揺精魄之􅀃此兄之甚愛我敢不拜教尊作儒學記文最古雅然此自兄素􅀁精詣不俟賛也山中亦有一二拙言更容繕寫求教艸􅋄白答廖東雩提學㒒於吾兄雖相晤之日頗淺而相知之誼甚深兄之於僕則亦然也两辱書惠􅅧爲空谷之慰又辱两示髙文讀之喜躍夫亰師都㑹也綴文之士比肩僕曩皆􅀗與之交而皆􅀗見其文焉然僕之􅀁最傾意者乃獨在兄則數與傅少岩言之以為東雩之文氣骨甚勝無一點繊靡愞散之態後來可冀於作者東雩而巳春間讀兄􅀁為文視亰師􅀁見則加勝焉近復得讀兄􅀁為文視春時􅀁見又益加勝焉駸駸乎作者之堂矣頗自謂曩之􅀁知於兄者之不妄也雖然文與道非二也更願兄完養神明以探其本原浸􅉼六經之言以博其㫖􅃐而後􅀤之則兄之文益加勝矣兄志潔而識偉行方而氣和僕固一見而知兄為任道之器矣嗟乎古聖賢之道其不講於世久矣聲利之欿薰塞宇宙日夜馳鶩寡廉而鮮耻儒生習見以為當然其有以講學為事者又或崇意見而乖實際競口耳而寡心得聴其言則美而考其實亦無以甚異於􅀁習見以為當然自非精一自信卓然不惑流俗之士則未可以兾於斯者也僕􅀼有望於兄軰矣山西古帝王之都其人有茅茨土階之風而叚干木􅁲子夏居西河其人化之凛然有節槩今不知其遺俗視古􅀁稱何如而王文中與近代薛敬軒亦出於河汾之間豈其俗固有近古者耶吾兄以身任作人之責兄之􅀁以㳤諸其身即其􅀁以㳤諸其人者也䔍志力行極􅅧研幾求古人之真血脈路以㳤諸身以㳤諸其人因其近古之俗而登之於道此其責在吾兄矣連年虜騎入太原蹂􅏳之慘二百年來晉人􅀁未見僕聞之序詩者小雅廢而四夷侵夫小雅何與於夷此其言疑􅀂甚迂葢昔人精究天人之際而􅀋人事於隂陽則以小人為君子之隂夷狄為中國之隂隂則銷陽陽則銷隂隂則致隂陽則􅃱陽其相銷也若鐵炭之不爽其相致也若酸漿之感蠓蠛其幾微矣長君子之氣即􅀁以銷小人之氣長君子之氣而銷小人之氣即􅀁以長中國之氣而夷狄之氣銷故曰真勝者氣也勢與形不與焉其幾微矣此莘有􅀁以豫見於伊川而序詩者之􅀃不爲迂也今也觀之薦紳之􅀁崇尚觀之學校之􅀁趋向如前􅀁謂習見以爲當然者其爲隂爲陽與其銷長之幾亦略可覩矣大揚旌沙漠之陲而尺組繫單于之頸此非兄之責也若乃大敷古先之道以淑諸其人使人洞然於隂陽㳤慝之辨而㫁不惑於􅀁趋此其責在兄矣僕自屏居以來牽於多病齒髪日衰非惟不敢復有四方之志而詩書亦多束閣惟兀坐一室􅀁耿耿不􅁯者尚兾脩省補過以不􅀒此心與不􅀒海內知巳者而已與應警菴郡守僕迂戅無􅀎人也伏惟君侯蓄兼人之才且居郡侯之尊而與僕又素無一日之雅乃自下車以來虚心降色􅀁以􅅄進禮遇於僕者皆出乎常格之外此雖古之髙流如葢公任棠之徒當此猶宜三讓而避焉而況草茅迂戅如僕者乎􅀁以敢􅅯然而當之者以成君侯下士之髙義固不自量其身之卑賤與才之短劣也自是以後綢繆日接葢無夾旬不相往来不相與􅀙容盡談者此其形迹似爲煩瀆矣雖然非􅀂侯不􅀎亮僕之􅅧至此而非君侯亮僕之􅅧僕又安敢以是䖏君侯㢤公門無鄙人之迹庭中無長者之車亦已久矣豈特樗散之性不欲溷擾於人亦以相知相信之難耳惟在荆溪時與石屋彭君相切磋石屋之為人君侯之􅀁􅅧與也伏惟君侯住山中既且一年釋塵鞅之勞而就清池白石之安去簿書之煩而縱其清逺閒散之適昔人􅀁謂霜降水涸天根乃見惟捍彼物累全我眞機此時工夫此時意氣不知復何如耳僕嘗􅀼謂今世人才未便不如古人惟古人為學堅苦磨鍊忍嗜欲以培天根久之則此心凝靜百物皆通而今人則未免粘帶未免牽引粘帶之根固于中而牽引之勢揺於外􅀁以精神力量􅃐見不如古人僕毎觀君侯治郡自是近世才傑何可當也雖然以君侯之志詎止欲爲近世才傑而巳乎意者必欲為古人而後已乎如必欲為古人則堅苦磨錬正在此時􅀂自此以後固知君侯不􅀎久閒而塵鞅簿書之煩且勞又復不免相累恐不得如山中多暇可以進兼力而收全功矣君侯得無意乎僕質夲頑鈍惟不敢惰窳以􅀒相知然寸進或至退尺恐竟不􅀎有􅀁􅀣立耳亦願君侯敎之君侯来歲或宐早出進退自是兩途此身既繫於官而欲結泉石之盟亦未為可也以相知故倂及之南􅀡隷廣西湖廣三省地圖已付馮丞繕寫不識􅀉到否西洲公奏稿偶檢出幷奉上不宣又時警菴為提學今之職守令者苟有􅀎餙簿書清獄訟者則為賢有司矣至於為百姓根本之慮則未之及也今之司學校者苟有能品藻文字嚴督程課則為好提學矣至於為學校根本之慮則未之及也吾丈之為守郡也既已􅀎為百姓根本之慮而不徒以簿書訟獄為功矣今之爲提學也亦何患其不􅀎爲學校根本之慮而惟文字程課之爲務也哉向辱手書具見惓惓欲興起士習之至意顧責之人不􅀂盡乎已盖言聲色號令之間不􅀂求之身心性情之實惟反躬自盡益愼以宻力行古道不落流俗則此身􅀁舉動卽是士子􅀁師法可以不言而諭嘗見近時提學敎條何嘗不言道徳何嘗不言仁義然只成一畨講􅀃只成一番門面而於士習􅁝髪無􅀘者無其實也務實者反躬之謂而􅀁以爲根本之慮也辱吾丈知愛􅀼敢以是望之今士子中有實行者多不長於文字工文字者多不修於實行葢淳樸之與浮華徃徃相病然糊名之制行則不得不一一徴之於文一一徵之於文則其文可以與選而其行或不齒於市人者亦不容不取髙第而登􅂋仕是以詩書為世流毒荘生至有􅀤􅃁之􅀃豪傑士扼腕太息無可奈何􅀼以為低昻輕重其權寔在提學盖提學可以知諸士之文而又可以知諸士之行非如科塲之為糊名􅀁蔽雖欲品藻其行而無􅀁從也抑此伸彼示之意嚮非吾丈又誰望之􅇮時使節寓郡中僕時承教語以時免於大過罪今􅄐索日乆奈何年且四十益􅅧無聞見􅁖之
