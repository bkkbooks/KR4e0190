body:
  text: 序中庸輯畧序中庸輯畧凡二卷􅀄宋儒新昌石􅗐子重采兩程先生語與其高第弟子游楊謝侯諸家之􅀃中庸者爲集解凡幾卷朱子因而芟之為輯畧其後朱子既自采兩程先生語入集註中其千諸家則又著爲或問以辨之自集註或問行而輯畧集解兩書因以不著于世友人御史新昌吕信卿􅀫有志于古人之學且謂子重其鄕人也因購求此兩書而余以所藏宋板輯畧本授之已而吕子廵按江南則屬武進李令板焉而集解則不可復見矣序曰盖古之亂吾道者常在乎六經孔氏之外而後之亂吾道者常在乎六經孔氏之中昔者世教衰而方術競出隂陽老墨名法嘗與儒並立而為六家爲九流其道不相為謀而相與時爲盛衰佛最晚出其說最盛至與吾儒並立而爲儒佛然其不相謀而相盛衰也則亦與六家九流同夫彼之各駕其􅀃而其盛也至與儒亢而六而九而二也斯亦悖矣雖然其不相爲謀也則是不得相亂也嗚呼六經孔氏之教所以别于六家九流與佛而豈知其後也六家九流與佛之􅀃􅇡入于六經孔氏之中而莫之辨也􅀃易者以隂陽或以老荘是六經孔氏中有隂陽家有老家矣􅀃春秋者以法律􅀃禮者以刑名數度是六經孔氏中有名家有法家矣􅀃論語者以尚同之與兼愛尚賢明􅀑是六經孔氏中有墨家矣性不可以善惡言其作用是性之􅀃乎心不可以死生言其真心常住之􅀃乎是六經孔氏中有佛家矣六家九流與佛之與吾六經孔氏並也是門外之戈也六家九流與佛之􅀃􅇡入于六經孔氏之中而莫之辨也是室中之戈也雖然六家九流之􅇡于吾六經孔氏也其為􅀃也粗而其爲道也小猶易辨也佛之􅇡于吾六經孔氏也則其爲道也宏以濶而其爲􅀃也益精以密儒者曰體用一原佛者曰體用一原儒者曰顯㣲無間佛者曰顯㣲無間其孰從而辨之嗟乎六經孔氏之㫖與伊洛之所以講于六經孔氏之㫖者固具在也苟有得乎其㫖而超然自信乎吾之所謂一原無間者自信乎吾之所謂一原無間者而後彼之所謂一原無間者可識矣儒者于喜怒哀樂之發未嘗不欲其順而逹之其順而逹之也至于天地萬物皆吾喜怒哀樂之所融貫而後一原無間者可識也佛者于喜怒哀樂之發未甞不欲其逆而銷之其逆而銷之也至于天地萬物泊然無一喜怒哀樂之交而後一原無間者可識也其機常主于逆故其所謂旋聞反見與其不住聲色香觸乃在于聞見色聲香觸之外其機常主于順故其所謂不睹不聞與其無聲無臭者乃即在于睹聞聲臭之中是以雖其求之于内者窮深極㣲幾與吾聖人不異而其天機之順與逆有必不可得而強同者子程子曰聖人本天釋氏本心又曰善學者􅁍于已發之際􅀚之是中庸之㫖而百家之所不能駕其􅀃群儒之所不能亂其真也彼游楊謝侯諸家之􅀃其未免于疵矣乎吾弗敢知然而醇者大矣其未能不浸􅁋于老與佛乎吾弗敢知然而師門之緒言盖多矣學者精擇之而巳矣則是書其遂可廢乎是信卿所為刻以待學者之意也明道語畧序道致一而已矣學者何其多岐也盖聖人賛易模冩人心之妙與乹坤合體而蔽之以兩言曰忠信曰敬忠信者非他也吾心之無所欺焉者而已矣敬者非他也吾心之無所肆焉者而已矣此無所欺之心即此無所肆之心此無所肆之心即此無所欺之心此無所欺無所肆之心即渾然乹坤之心非二也乹坤之心不可見而見之扵復復之所以見乹坤之心也學者黙識其動而存之可矣是以聖人扵乹則曰其動也直扵坤則曰敬以直内乹坤一扵直也動本直也内本直也非直之而後直也盖其醖釀流行無㫁無續乃吾心天機自然之妙而非人力之可為其所謂黙識而存之者則亦順其天機自然之妙而不容纎毫人力叅乎其間也是故湛然常寂而非静也盎然常感而非動也退藏扵密而非内也曲成萬物而非外也不寢不食而非􅂇也不睹不聞而非忘也懲忿窒欲而未嘗損也改過遷善而未嘗益也是乹之所以為易而坤之所以為簡也如此則為敬以直内不如此則為以敬直内如此則為集義不如此則為義襲如此則為由仁義行不如此則為行仁義故曰道致一而已矣學者何其多岐也彼其所謂從事扵心者盖未嘗實有見乎天機流行自然之妙而徃徃欲以自私用智求之故有欲息思慮以求此心之静者矣而不知思慮即心也有欲絶去外物之誘而專求諸内者矣而不知離物無心也有患此心之無著而每存一中字以着之者矣不知心本無着中本無體也若此者彼亦自以為求之扵心者詳矣而不知其弊乃至扵别以一心操此一心心心相捽是以欲求寕静而愈見其紛擾也夫聖人論心之精莫如易之乹坤而善􅀤易之藴者莫如程先生之書先生之書得扵心而言之者也故其言曰鳶飛魚躍與必有事焉而勿正心之意同會得活潑潑地不會得只是弄精魂又曰未嘗致纎毫之力此其存之之道又曰以敬直内便不直矣然則彼之所謂􅀙事扵心者其為敬以直内者耶其為以敬直内者耶其為非力以存之者耶其為力以存之者耶其為活潑潑地者耶其為弄精魂者耶武進尹撫州徐君子弼自少有志扵心學盖讀先生之書而有會焉而懼學者求扵心者之差也則取二程全書採其要畧而刻之扵邑中以其出扵明道者為多也而題之曰明道語畧嗚呼學者患不知求之扵心知求之扵心矣而其多岐又如此故夫擇之果不可以不精也季彭山春秋私考序春秋之難明也其孰從而求之曰求之聖人之心聖人之心其孰從而求之曰求之愚夫愚婦之心春秋者儒者之所累世而不能殫其􅀃者也而曰求諸愚夫愚婦之心不亦迂乎孔子嘗自言之矣吾之扵人也誰毀誰譽斯民三代所以直道而行者也春秋者聖人有是非而無所毀譽之書也直道之所是春秋亦是之直道之所非春秋亦非之春秋者所以􅀉人人直道之心也人人之心在焉而謂其文有非人人之所與知者乎儒者則以為聖經不如是之淺也而徃徃謂之㣲辭是以說之過詳而其義益蔽且夫春秋之為春秋以誅亂討賊而已子而嚴父臣而敬君人人有不知其為是而弑君􅆲父人人有不知其為非者㢤人人知其為是非而或䧟于弑逆焉者昔人所謂以意為之也雖其以意䧟于弑逆而其直道而行之心固隱然而在也聖人早為之辨醒其隱然而在之心以消其勃然敢動扵邪之意是以亂臣賊子懼焉而能自還也其使之懼者不逆之扵勃然而動者之不可忍而牖之扵隱然而在者之不容息是以能使之懼也非書其弑以懼之之謂也其懼者但覺其隱然而在者之忽露而不覺其勃然而動者之暗消是以懼也非懼其書我而不敢為之謂也故曰孔子懼作春秋春秋成而亂臣賊子懼孔子之懼心斯人直道而行之心一也斯人直道而行之心亂臣賊子之懼心一也人人之心在焉而謂其文有非人人所與知者乎善􅀃春秋者則不然曰無義戰人人可以知其為無義戰也而奚問其有鐘鼓無鐘鼓云爾也曰某三王之罪人某五伯之罪人人人可以知其罪之在也而奚問其功與過云爾也曰亂臣賊子懼人人知其為討亂賊也而奚問其君之有以取之無以取之云爾也以是􅀃春秋豈不簡約而易知也哉可謂以愚夫愚婦之心求春秋而不蔽扵聖經者也或曰然則游夏何以不能賛也曰高與赤者世傳以爲㳺夏氏之徒也師􅀃固宜有在焉者其猶未免扵􅀃之過詳歟其諸家之紛紛者又可知矣可謂蔽扵聖經而不以愚夫愚婦之心求春秋者也余為是􅀃乆矣儒者皆牽扵舊聞迂焉而莫予信也間以語彭山季君君欣然是之于是出其所著春秋私考視余則公榖之義例左氏之事實諸家紛紛之􅀃一切摧破而獨身處其地以推見當時事情而定其是非雖其千載之上不可億知然以斯人直道而行之心凖之要無甚相逺者余是以益自信余之􅀃有合扵君也君嘗師陽明王先生聞致知之􅀃為能信斯人直道之心與聖人無毀譽之心同其春秋大㫖亦多本之師􅀃故其所見直截如此至扵地里古今之沿革姓各氏族之􅂀星暦之數度禘郊嘗社禮樂兵賦之纎悉古今之所聚訟皆辨析毫􅁵務極該實昔人所稱經師莫之及也以非大義所關故不擿之序中盖余嘗聞李原中言羅仲素􅀃春秋􅀄未甚暁然及住羅浮後其􅀃不知何如夫羅浮何與扵春秋也豈不以此心空洞無物而後能好惡與人同好惡與人同而後能􅀃春秋也歟君老矣方且隱雲門之􅃉猒文字之支離兀然洗心以㳺扵無物其所􅀃春秋又當有進扵是者余尚得而見之巽峰林侯口義序有逐末之學而後有反本之論盖有執噐而無得者論者曰盍反而求之乎道雖然未􅀂即噐而道之爲至也有稽古而無得者論者曰盍反而求之乎今雖然未􅀂即古而今之爲至也有滯經而無得者論者曰盍反而求之乎心雖然未􅀂即經而心之爲至也孔子不云乎興扵詩立扵禮夫詩之咏歌禮之數度豈非所謂噐而詩禮之爲經也豈非所謂古也哉試嘗觀之心之不能離乎經猶經之不能離乎心也自吾心之無所待而忽然有興則詩之咏歌關雎猗那之篇已隨吾心而森然形矣是興固不能離乎詩矣然自其讀詩而有得也未嘗不恍然神游乎關雎猗那之間相與倡和乎虞廷周廟而不知膚理血脉之融然以液也則是學詩之時固已興矣非既學詩而後反求所以興也自吾心之無所待而忽然有立則禮之數度玉藻曲禮之篇已隨吾心而森然形矣是立固不能離乎禮矣然自其讀禮而有得也未嘗不恍然神㳺乎玉藻曲禮之間相與揖譲乎虞廷周廟而不知膚理血衇之肅然以歛也則是學禮之時固巳立矣非既學禮而後反求所以立也安得以寓扵篇者之為經而隨吾心森然形者之不為經耶故即心而經是已安得以無所待者之為吾心而有所待而融然以液與有所待而肅然以歛者之不為吾心耶故即經而心是已然則何末非本而又何所逐耶何本非末而又何所反耶雖然善學者一之不善學者二之非獨今日然也在孔孟之門亦或不免扵二之矣子夏傳詩傳禮後世訓詁家宗之子夏非訓詁也然已􅁠輿子訓詁矣聖人懼其滯而無得也而曰女為君子儒君子者務本之謂也子貢求性與天道扵文章之外聖人懼其離而無得也而曰一以貫之言文章即性與天道也今之為形聲文字訓詁之學者皆是矣君子懼其滯而無得也為之􅀃曰盍反而求之乎心也此所謂有逐末之學而後有反本之論者也而學者縁此遂以為必絶去形聲文字與訓詁求之窈窈􅁳􅁳而後可以為至道二者本末則必有分矣然而皆聖人之所不與哉林侯口義者侯之與二三子所以講扵六經孔孟之書者也林侯苦節而不以驕世峻行而不以矜俗其志務扵反躬以求盡乎精㣲而扵古人形聲文字之間乃索之如此其密而析之如此其詳嘻吾知其不爲滯也其殆有見扵道噐古今之不二也乎雖然吾猶懼二三子之二之也二三子試致誠而求之黙識吾靈知􅂕覺之本體扵群居誦習之中融然以液否耶肅然以歛否耶是融然而肅然者在心耶在經耶在心也則何待乎經在經也則何感乎心是心與經一者耶二三子可以即此而自得之矣而又何窈窈􅁳􅁳之求哉或曰今之爲形聲文字訓詁之學者皆是也子顓顓焉若恐二三子之離而去之何也曰本末則必有分矣二之皆敝也且夫滯經之敝淺而著離經之敝深而㣲滯經之敝惟固陋者而溺扵此離經之敝雖䟽通者或不免溺焉吾舉其深而㣲而二三子乃或昧扵其淺而著吾欲使二三子不溺扵䟽通之士之所溺而二三子乃或不免溺扵固陋之士之所溺則非余之所敢知也而亦非林侯之所知也扵是口義刻既成丹徒李令來請序序之筆疇序苟可以誘世而􅂆俗者君子不廢也匹夫一怒挺而兩闘扵是時而荘語之以詩書禮樂則益其怒而疾其闘耳而滑稽之士為之㣲言冷撃嘲諧詼謔扵其旁則釋然一噱而散小夫婦人恣睢兇毒扵􅄀􅄀或懼之以士師理官之法彼有傲然而巳矣巫見佛媪爲之張皇神􅀑指徴禨祥則彼且瞿目縮舌而駭汗夫苟可以解急闘則嘲諧詼謔或捷扵詩書禮樂苟可以懼􅄀兇則神􅀑禨祥或痛扵士師理官滑稽禨祥之􅀃非君子之說其要扵解闘而懼兇則君子所以為􅂆扵世也由此言之其苟可以為􅂆扵世雖其戯如滑稽誕如禨祥且不廢也况其言之根據古先而不詭扵繩墨者乎筆疇之為書自居身御物至扵家人細􅃈之事皆備自經史百氏至扵小􅀃衢巷之談多所採摭盖亦不盡雅醇而其大㫖要扵使人畏慎柔寛擇歩而蹈以避咎其知足少欲忍辱濡下賔名去華大率稱引老荘然而古先所以厚施薄責懲窒忿慾之緒言亦徃徃而在也昔人謂老荘處危世觸駭機欲以曲自全故徃徃上柔弱黜剛強至自處扵材不材之間迷陽郤曲以晦世而免禍為是書者其意毋乃出扵此歟雖然使明哲之士讀之則自可以􅀚其深剟其驳焉而節取其是者以閭巷郷曲之士讀之且􅀅悚然有動乎其心怵扵禍而冀扵全去其狷忿闘争恣睢兇毒之習而庶幾乎謙柔長厚寛身之道豈非志扵􅂆俗者之一􅂇歟是書故有板刻吾邑吳前川翁乃刻而掲之墓之左屋以示其郷人然半而不完翁之子鳴三既得其全書于是倂刻之以廣扵世以成父之志云王君注握竒經序余少頗好奕無從得國工之譜而獨以意為之寤寐而懸思焉乆之其扵戰守攻圍之間若或有得算焉而因以勝扵人其不能勝而敗焉者則咎扵思之所不至而巳藝既稍習巳而得國譜則余所以勝者大率多古人巳試之術其敗焉者則古人巳先為之營救布置余于是自笑其思之不極不能盡合扵古人而又惜不早得國譜以􅂇余之思也以是知古人之精神寓之于譜奕者索諸巳之精神與索諸古人之精神苟有得焉其致一也奚必譜之是而心思之非奚必心思之是而譜之非乎然則言兵法者何以異此自伏羲畫象貞坎悔乹為師巳寓居中握竒之義而握竒經則世傳以為黄帝書盖戰法自黄帝始也顧其文簡奥世鮮知者王君以窮經餘力推究其􅀃為之註釋其諸家言兵有及于握竒者悉取而附之其營算占候亦綴焉以為兵家全書君示余余竊嘆其有似于吾所謂奕之譜也盖史稱衛霍不學古兵法而每戰輙勝然􅀚其環車爲營縱輕銳徃當匈奴實得經中所載二壘游兵之義至諸葛氏摹握竒爲八陣鈎角聮絡一一古法宜其可以必勝矣而竟不能成混一之功豈其所當之敵有堅脆耶何暗合古法與純用古法者其效乃若是相反耶然君頗自竒其􅀃以爲得吾書而用之内靖草竊外盪醜虜特爲易亊盖余之于奕也雖知思與譜之無二然以譜措之懸思則差較毫􅁵以懸思措之臨局則又差較毫􅁵是以聖人自謂能行三軍而又曰軍旅未學言兵之不可以嘗試也王君年始衰矣而志尚壮今塞垣多故安知不有知君而舉之者使之儒服立軍門親鼓鼙之間以與老􅀅角短長而知其勝算之果不能出吾書也則王君乃可以自信矣江隂縣新志序有家者隨其家之所有而籍記之其常也凡其田畮租甔錢貫絲縷豉合醬􅎆僮指之數此纎勤治生者之所詳而游閒華飾者之所畧也凡其池舘花􅀣狗馬圖畫古物珍噐之數此㳺閒華飾者之所詳而纎勤治生者之所畧也二者則更相笑矣而家之所以爲家者則固在此而不在彼也與郡國州邑之有志自古而巳然亦所謂隨其郡國州邑之所有而籍記之其常也禹貢周職方豈非志國邑者之所􅁠輿也哉然自後世􅀚之則見其有􅃈細而俚俗者矣夫其田賦高下之異等墳壚􅀺赤之異壌九鎮九澤之異名而五戎八蠻之異服其列而載之可也至扵篠簜箘簵淮蠙江􅀛海錯之纎細則􅀋扵草木蟲魚之書而多男少女多女少男之紀則近扵閭井村俗之談古人何若是之􅃈􅃈也盖苟有切扵利噐用而阜民生辨隂陽而蕃孳息則固不得以其􅁾􅁭而畧之而况其大且重者乎其所載而詳者固然則其所不載者亦可知矣後之所謂地志者則異是矣其叙山川也既無關扵險夷瀦􅂥之用而其載風俗也亦無與扵􅀚民省方之實至扵壤則賦額民數一切不紀而仙佛之廬臺榭之廢址逹官貴人之墟墓詞人流連光景之作滿􅁓而是嗚呼此何異扵家之籍專記圖畫狗馬玩具爲粧綴而租甔錢貫所以需衣食之急者漫不足徴也其亦何取扵爲家也與知家之有籍本以治生而非以􅀚美國邑之有志本以經世而非以博物則得之矣竊聞國朝集諸儒臣修一統志時兩人相誚其一人欲載科目之數則曰此非進士錄也其一人欲載戸口田賦之數則曰此非黄白冊也科目則别有錄矣不載宜也戸口田畆固天下之大命而經國者所必稽也且若彼之􅀃則禹貢周職方其亦黄白冊也哉彼固以是為􅃈細俚俗焉而不載也江隂扵常州為属邑而枕江之衝為蘓常諸郡北門以故視他邑獨重舊雖有志而宜書不書不宜書而書大率如所論諸志之弊無足徴者至今令餘姚趙君始更修之趙君爲政㓗巳愛民才敏而慮周凡志中所載田賦徭役戸口食貨謡俗水利防江治盗之源委本末節錯絲棼盖皆君之所嘗蚤夜盡心焉者其扵浮文羡費則盡屏去不事譬如辛苦起家之人斥絶耳目之玩而畢力扵家人生事之間一錢粟之盈縮一臧􅀗之奸良與夫鐍鑰閭戸之守雖其錙銖隱􅄨而聰明智算舉無遺者扵是一切以其精神思慮之所及而登之扵籍至其纂緝成編則以属之學士張先生先生以其國史之餘才而推之以成一邑之史故其所載繁簡刪存能得趙君之所用心而著之以為後來治邑者之所據凖又如計然任公之徒精扵治生而太史公萃之為傳凡其仰俯拾取廢居棄與之法與夫巵茜萩􅃮之細莫不具載能得諸人之所用心而著之以為治生家者所必資盖為邑之與治生意嚮或異家籍之與邑志體裁亦殊至其的然當扵實用而不取辦扵具文焉則一也夫前人以其所用心而著之籍記後人因其所籍記而得前人所用心而守之是以家道能常興而不墜予欲使後之為江隂者因趙君之所為志而知其所用心而守之也為之書其端鄭君元化正典序會稽金錫竹箭之産甲天下其鍾為人文大率峭㧞清慧能以文章勲伐耀于當世至扵方外之士亦徃徃能俶儻瓌恠以露其竒盖所謂地氣然也會稽鄭君少喜談兵讀韜鈐諸書尤工扵風角鳥占嘗北抵宣大東歴遼薊掀髯謁諸邉帥談笑油幕間毎虜鏑驟飛發一語䇿勝敗屢屢竒中以是撼貴璫老􅀅而出其槖中之金短衣飛鞚目中無百萬􅆛虎氣當此時盖一機智勇辨之士及長揖邉帥故裘南㱕乃䆒意黄老内養之學翶翔呉會與娵娵騷人墨士相徴逐􅀉身藥肆中呐然守柔下㢘晝卧人不識其有雄氣者盖鄭君始終若此亦竒矣哉鄭君自謂得青峰碧厓諸異人之傳嘗著内養書名曰元化正典大㮣本之中黄之􅀃又謂邵子十二萬九千六百之數盖暗蔵火候以為邵子最得伯陽㣲㫖余聞内養家多言火數乃虚設期扵隂陽無偏勝而已鄭君乃以為實有是數􅀂跬歩以至百歩然者余不能盡解其􅀃也鄭君又欲徃燕齊海上牢島不夜之間庶幾復遇異人焉燕齊海上之異人若黄石海蟾之流盖嘗决機軍旅而其後得仙者也鄭君倘得而見之乎其㱕以語我右編序古今宇宙一大棊局也天時有從逆地理有險易人情有愛惡機事有利害皆棊局中所載也古聖人經天緯地畫野肇州設官分職正外位内幽明人􅀑不相凟擾奸良淑慝鳥獸戎夷各止其所所以界棊局也至扵奕數之變縱橫翻覆紛然不齊雖其紛然不齊而至扵千百億局則其變亦幾乎盡而其法亦畧備矣自三代之末至扵有元上下二千餘年所謂世事理亂愛惡利害情偽㐫吉成敗之變雖不可勝窮而亦幾乎盡經國之士研精畢智所以因勢而曲為之慮者雖不可為典要而亦未嘗無典要也語云人情世事古猶今也豈不然哉奏議者奕之譜也師心者廢譜拘方者泥譜其失均也有見乎背立之􅀃則以病背水之軍有見乎死地之􅀃則以置背水之軍然而二􅀃同出扵十三篇中焉可泥也而焉可廢也余之纂右編特以爲譜之不可廢而已而未及乎不泥譜之􅀃也右編者古者右史記言也左編附序左編者爲治法而纂也非關扵治者勿録也關扵治者則妃后外戚儲宗宦倖奸􅆲方鎮夷狄草莽之亂而總之将與相而總之君亦云備矣然周官治典所􅕄曰師曰儒師儒何與扵治典也君與相與将行之師儒講而眀之故云師道立則善人多而朝廷正言師儒之係乎治者重也故纂前史儒林道學諸傳為諸儒傳經生訓詁文詞筆劄儒之别也故次之諸儒之後隱士不事王侯而志可則深處巖壑而龍光扵朝英主亦徃徃尊禮其人以風世所謂以無用為用也故纂隱逸傳至扵前史有方技傳盖巫史宗祝所以左右人君而星暦醫藥百工皆有國者之不可缺以漢一時論之東方之詼諧滑稽而要之引君扵正丘子明之卜毛延壽之􅀞與巫蠱之禍則其為奸不可窮詰其人所係殆若此故纂方技傳三代而下儒術與二氏相盛衰亦世道之變也馬遷傳老子范史始紀西域沙門夫二氏之書各五千餘卷其􅀃侈矣則其人宜不可以無紀也且以􅀚儒術之盛衰焉纂二氏傳而總之為左編附云文編序歐陽子述楊子雲之言曰㫁木為棊梡革為鞠莫不有法而况扵書乎然則又况扵文乎以為神明乎吾心而止矣則􅥅􅧒之畫亦贅矣然而畫非贅也神眀之用所不得已也畫非贅則所謂一與言為二二與一爲三自兹以徃巧歷不能盡而文不可勝窮矣文而至扵不可勝窮其亦有不得巳而然者乎然則不能無文而文不能無法是編者文之工匠而法之至也聖人以神明而逹之扵文文士研精于文以窺神眀之奥其窺之也有偏有全有小有大有駁有醇而皆有得也而神明未嘗不在焉所謂法者神明之變化也易曰剛柔交錯天文也文明以止人文也學者􅀚之可以知所謂法矣雜編序易不云乎言天下之至􅄨而不可惡也曾子論道之所貴者三而㱕􅇼豆扵司存以反本也論者猶以為頗析道噐而二之莊生云道在稊稗在瓦礫在尿溺其􅀃靡矣儒者顧有取焉以為可以語道噐之不二也語理而盡扵六經語治而盡扵六官蔑以加之矣然而諸子百家之異說農圃工賈毉卜堪輿占氣星暦方技之小道與夫六藝之節脉碎細皆儒者之所宜究其􅀃而折􅂨之未可以為􅄨而惡之也善學者由之以多識蓄徳不善學者由之以溺心而㓕質則繋乎所趨而已史家有諸志雜編者廣諸志而爲之者也以為語理而不盡扵六經語治而不盡扵六官也故名之曰雜編福建郷試録後序代作􅀼聞化之隆也候扵逺治之衰也􅀱扵近周文王壽考作人而汝濆江沱之間至扵田野武夫皆可爲干城腹心及周之衰則自溱洧之郊密邇王畿且學校堕壞士人挑闥而缺扵禮故詩人本王道之興廢兎􅆯子衿並列于風豈非以逺近爲候與今閩粤去畿甸最遙乃士人蔚然有章採禮樂之華掇仁義之精其經術直與鄒魯相抗而文采或過焉扵戯此所謂候諸逺者乎盖自我高皇帝取閩時曾不血刄而八郡嚮風山珍海錯海外竒寳方􅁤而走扵中國下至蠻谿蜑􅊤皆得脫去桴鼓之警而修其爼豆之業者且百餘年今天子又方懋徳建中以仁義禮樂鼓鑄區宇漸濡煦沫冐于海隅是其人文之化欝扵古而盛扵今有不然與說者謂文王國扵岐豐而江沱汝墳正直其南故詩人歌之謂之二南言王化自北而究扵南今京師古幽薊之墟當中國艮維閩粤當巽維亦直其南􅀚之天文北極執斗樞以旋轉六合而閩粤在東甌之宿近太㣲明堂之位北直斗柄又大海首起于東北而其委在東南潮汐相應天地呼吸之氣相通由此言之天運人事殆有符􅀿者乎故必以閩粤之盛為天下文明之候而不敢以繋之一方之開塞也夫多士者不啻古兎􅆯野人之儔也既與山珍海錯並輸扵天子豈不有魁梧􅉞偉之噐可以當干城腹心如兎􅆯野人者與則世有歌頌天子作人之化其必以閩粤為二南矣多士則永有聞扵世矣乎東川子詩集序西北之音慷慨東南之音柔婉盖昔人所謂繋水土之風氣而先王律之以中聲者惟其慷慨而不入扵猛柔婉而不隣扵悲斯其為中聲焉巳矣若其音之出扵風土之固然則未有能相易者也故其陳之則足以􅀚其風其歌之則足以貢其俗後之言詩者不知其出扵風土之固然而惟恐其粧綴之不工故東南之音有厭其弱而力為慷慨西北之音有病其急而強為柔婉如優伶之相閧老少子女雜然迭進要非本來面目君子譏焉為其陳之不足以􅀚風歌之不足以貢俗也余讀詩至秦風其言盡田獵戰闘之事其人翹然自喜愾然有躍馬賈勇之氣巳而讀楚騷諸篇其言鬱紆而忉怛則愀然有登山臨水覊臣棄婦之思夫秦風慷慨而入扵猛楚騷柔婉而隣扵悲然君子不廢豈非以其雖未止乎中聲而不失其風土之固然其陳之也可以􅀚其風其歌之也可以貢其俗乎東川子家秦中盖昔人所謂汧渭之間與其所爲載歇驕逰北園故處徃徃而在東川子雅喜爲詩甞􅀉余詩百餘篇皆跌宕踈徤絶去脂粉纎冶之態雖其扵中聲未知必合與否然可謂不失其土風者其塞垣諸曲余尤愛之如邉城鼓角春寒夢沙塞旌旗日暮雲天寒細栁營嘶馬草滿長城水飲駝榆關千里秦雲暮􅆧管一聲漢月秋較其音節倘亦有駟鐡無衣之遺否耶然則讀是詩者不必問其何人而知其必爲秦人之詩無疑也余南人也而不能爲楚聲竊喜東川子之爲能爲秦聲也乃爲之題其首後有採風謡者自當得之前後入蜀稿序山澤好竒之士徃徃以極幽遐詭譎之􅀚博搜山川草木鳥獸變化之情状爲快然其耳目有所滯而不能徧扵是有側身四望之思宦游覊旅之士其力足以窮懸車束馬之徑凌跕鳶挂猱之阻然其情志有所累而不能遣扵是有懷郷去國之憂情志與耳目常相違而山川之與人常不相值惟蜀僻在西垂古所謂别為乹坤者也雪嶺大江之雄渾峩巫青城之窈麗仙􅂕之所窟宅其勝甲扵天下然陸則拒以飛厓㫁棧水則陋以驚江急峽闘雷霆而翳日月其險且逺亦甲扵天下自古好竒之士慕其勝而以其險逺不能至扵是有夢而游寤而嘆焉者自非游宦與覊旅終其身無因而一至焉其至者􅇶扵險而忘其為勝扵是覊臣遷客之思深而輕舉冝搜之好移變衰揺落之感生而雄渾窈麗之􅀚改盖昔人所賦側身西望阻岷峨者既足以著山澤好竒繾綣顧慕不能自遂之情而其所記峽州至喜堂者亦足以盡宦游覊旅憔悴無􅂓不能自遣之状夫雖幸為耳目之所接而奪扵情志之所不快與雖幸為情志之所快而限于耳目之所不接其耳目所不接者既不能使景就乎情而工為鑿空揣懸之言其情志之所不快者又不能使情就乎景而􅂥其和平要􅆌之音扵是大夫缺扵登髙能賦之義而騷人竒士縱欲原本山川極命草木亦無所憑焉以聚其精而􅀤其辨博噫嘻此春山公前後入蜀稿所以為可諷也公自郎官出為郡守自郡守遷按察副使先後皆在蜀其為郡守也扵重慶盖陸走棧水浮峽而後至中州之人所謂險且逺其為副使也扵建昌則在靈關大渡瘴雨蠻烟之外雖蜀人亦素憚以為險且逺者而公皆恬然安之政事之暇方且披巉巖踐霜雪穿猩鼯豺虎之窟俯江妃水仙之宫以窮其勝而猶􅀂未足故其險無所不渉則其勝無所不窮其所歷與所窮一切可愕可喜則無不見之乎詩盖其大者關政理謡俗之故其細者足以牢籠百物山川草木鳥獸變化之情状其叙險也既可以使人欷歔􅃤慄而如墮其叙勝也又可以使人䬃爽飛動而如躋向非公以其宦游旅寓之跡而兼乎山澤竒士之好情志之所快與耳目之所接適然遇合固不能摹而冩之􅀂是公詩既刻爲二卷其子于徳請序于余余以謂使好竒之士讀公之詩可以不俟渉險而坐窮其勝于庭戸燕閒之間宦㳺覊旅之士讀公之詩且􅀅恱乎其勝而忘乎其險頓然釋志于驚江絶棧之上也然則不能自遂與不能自遣者皆􅀅于公之詩乎有得也余山澤人也盖慕蜀而不能至者亦将于公之詩乎有得也遂不辭而序之山堂萃稿序余讀孔氏論語而見其所稱古之逸民夫逸之為言隱也彼其事汙君而為之士師至于三黜而不肯去與其㫁髪雕體以君長扵蠻夷偃然有南面之尊可謂漸染干顯榮而孔子至以匹扵譲國餓死之人而謂之逸民何耶盖此數人者其脫扵聲利華寵之外而一無所緇焉則同也特其所謂不降不辱者則心與迹并其所謂降而辱者則心與迹判而難以識耳今吾侍郎養齋徐公其可以與扵若人之徒歟嗟乎士之嗜欲􅇌諸其中而紛華蕩乎其守始進者躁扵求而宦成者固其位能自脫焉者少矣公少時則巳自致扵亨衢然公澹泊不見可好其後反求乎理性精研乎義利益知自貴而賤物故雖居高位享厚禄而其貌冲然常􅀂山林之癯其家蕭然常無十金之槖乞其身有耄夫之所不能决而必之以強徤之年砥其節有寒士之所不能居而甘之以肉食之後自是天下知與不知言淸名完行者莫不翕然㱕公然則公之進而顯也其心與迹判者耶其退而隱也其心與迹并者耶余幸與公同郷曲自蚤歳即知慕公公為侍􅀰而余適在翰林方其旅候扵隆隆之門而習見乎炎炎之態則悶然而返每一見公則不知冷然嘘我以清風也而不能去公還扵家余亦罷㱕又􅀗從公游毎訪公之廬但見山窈水廻老屋數椽堦前鳥雀鳴聲上下則不待見公而已如游扵首陽之曲栁下之郷可以使人樂而忘返矣已而公出其詩文若干卷曰山堂萃稿者示余余受而讀之盖自其平生所謂􅀿酬文字與得㱕草堂以後諸詩及謝病諸䟽皆在焉公非如文章之士刻鏤以為工者也而其清逺間散耿介獨立之氣􅉳乎其淵藏􅟚乎其金鳴其風㫖直與古者逸民採􅅔之歌三黜之語歴百世而相上下則又不必即公之容望公之廬而公之為人固可以一撫卷而得矣雖然昔人不云乎身隱矣焉用文之且夫所謂逸民者方􅀅鳥行而蟬蛻惟恐其影響之不幽而豈蘄之以言語文字行扵世也哉矧公位大臣又當天子嚮意之時苟少需焉施功扵社稷􅀍澤乎生民不難也公意猶若有不屑焉者而亦何藉扵文乎然而世有不能即公之容望公之廬者得其文而讀之或可以得公之為人則夫㢘頑而起懦亦􅀅扵是乎在余既校而正之以還于公因為之題其首劔泉奏議集序劔泉呉公奏議集凡幾卷在嘉靖􅀄天子勵精思治博取俊乂以充庶位尤注意臺諌之選公扵是以才召入院為御史凡所建白多見採納􅀂兹集所載是也於戯公之言備矣而其大者莫如劾柄臣之奸與請開通惠河諸䟽始柄臣掌營兵怙勢為奸利士大夫以為隱憂而公慨然上䟽攻之其言明白切痛多人之所難言已而相􅁇攻之者益衆然或過激不足取信而柄臣益恣不悛後天子亦自燭其奸下之獄以死盖去公上䟽時十五六年而公之言驗矣國家運道自通州至京師故從河運後乃從陸其故河廢閘猶在議者屢請修復而京師大猾􅀝陸運侔利徃徃為飛語摇之公始建議則以身塞利害之衝又頼天子與相力主其事迄有成績其詳具公所上通惠河志中自河功之成也戸部歳省運錢十二萬緍此則公言之既效者公又欲盡轉通州之粟扵京師以消未形之患則其言未及行而憂時者多以公言為是也公始令江山有聲而擢御史自御史出守處州歴官南京太僕少卿而致其亊公為人敏銳濶逹藝扵世務而圎扵􅀿機開口抵掌鋒鍔捷露課功䇿效不爽一髪非同迂腐拘牽之士指摩而坐論之者也公嘗謂余曰士大夫談􅀃經濟指天畫地貫穿今古不足為難惟切中事情若操刀而割刄隨手下卒無一刄不當肯綮乃為難耳此盖公之所自寓乎曩公在御史時又嘗為余言儻得在塞垣之間當為國家鞭笞韃靼鎻吉囊唵噠之頸而致之闕下盖公自量其方畧氣力有足辨此者以其不至大官故其所設施者不竟雖然是集也可以􅀚公之槩矣聲承集序漸齋子録其平生交㳺徃復之書及諸贈言名之曰聲承集凡若干卷漸齋子始居給舎侃侃厲名節故其時所與游多慷慨竒節之士巳而謝事家居蟬脫聲利晚乃刋落華葉潜䆒精㣲故其時所與游多山澤肥遯之流與講學論道之朋且夫人之扵世固未有獨立而無與者縉紳相與以同心而共濟雖山澤與世不相渉亦必有與焉以同道而相益此􅀌立一意之軰所以不可行扵朝而狷狹枯槁逃虚避人之行要亦不可行扵野也漸齋子以其真率苦淡之節而使海内高士争慕與之游􅀂不及又能以其謙虚不自滿之量而使與之游者争獻其所長者如注而一無所拒故其在朝則相與秉公斥奸以共憂天下之憂在野則相與養志理性以共其樂扵山林泉石之間盖漸齋子之所取扵友者既已無不盡矣然猶以爲聚散存没其數之不可常人情乆則易以忘是以雖其平生所與交一臂之人異日或至扵舉其姓名且不能記其姓名且不能記則其所以交相儆戒䇿勵之意亦或至扵怠且廢幸其書詞翰墨尚可尋繹而因以志其人之姓名與其所以相儆戒之意則雖其聚散存没之不可常而宛然常如一臂之交雖在燕閒獨處之中而自得乎群居儆戒相成之益此聲承集之所爲録也盖昔栁子厚作父友志其人之姓名備矣然但以侈朋游結納豪傑為美談至扵切磋儆戒相成之􅁩未著也衛武公所與友自卿至扵師長士至扵旅賁資其儆戒以進扵睿聖故抑淇澳之詩傳之至今然其儆戒之言可聞而卿師長士旅賁固亦當時所謂賢者其姓名獨湮沒不可見使尚友者有遺憾焉至子輿論獻子有友五人則幸扵兩人者尚可識其姓名而慨然有感扵三人者不可記今漸齋子修名砥節不啻如栁某其尚賢取友如獻子其老而好學盖有衛武之遺使後之人慕漸齋子之風而讀其所為書讀其所為書而得其所與游者其将曰某也慷慨竒節人也某也肥遯人也某也講學論道人也是漸齋子能以其所得扵友者而又以為後人尚友之􅂇也其亦可以無子輿三人之感矣而余也又得以不敏之詞附姓名于集中其亦不謂幸矣夫吳孺人輓詩序禮部郎中惺母古者既有左右史以記言動矣而又為之詩詩之與史同于籍善事以鏡來世而咨嗟咏嘆之則其味尤長而其風益逺盖詩者其􅂇史之不及乎然左右史所載惟其朝廷􅀖國王公距人殊勲絶徳非此不列而其載之詩者大半多閨闥房帷之間以及伐桑采􅁑髦笄膏沐家人􅃈屑之事是以􅂗山有莘􅂇賛王業然不列于夏商之書而十三國風自二姜許穆夫人以烈節著聞則詩人多而歌之不一而足雖以田墅閭巷之婦人若草蟲雞鳴静女其名姓絶不登史冊其事亦無特異者而皆得見之于詩豈史主于紀大而畧小詩主于闡幽探􅄨其為教一而其為體則異耶然則詩非特以助史之不及其于女史尤要也漢時劉更生善為詩其所輯列女傳率本之詩謂詩之繋乎女史也豈不信乎吾友吳君敬夫之母吳孺人既没而士大夫為之輓歌輓歌者沿于虞殯其樂道善事而咨嗟咏嘆之者詩之遺也嗚呼孺人以閨中之懿非如男女有四方之事功徳炳炳可以托于􅂦􅃔之勒左右史之載而與之不朽而又非有如燕燕栢舟載馳遭罹厄會以顯其竒節為詩人所希詫其所可見者不過乎閨闥房帷麻絲漿酒之間尊養姑章敬承夫子家人女子之常事而已雖然槩以草蟲雞鳴之義其宜在所不廢乎是以諸君子哀而詩之以附于彤管也其以廣列女之採而興起幽人之貞也乎余國史也于序詩為宜故推本詩之繋乎女史者而為之序鈐山堂詩集序毛鄭􅀃詩有詩譜以譜詩人之世也作詩者豈亦自譜其世矣乎至如羔羊之委蛇自公兎􅆯之好逑公侯碩人之隱扵公庭考槃之遁扵澗谷其人之進退隱顯徃徃自見扵詩而􅀃詩者為之譜其世則因其人之進退隱顯而時之休明衰替變化而蕃閉塞而隱亦因可見故曰誦其詩知其人是以論其世也少師介谿嚴公少稱神童弱冠舉進士入翰林在正德間同時諸僚莫不優㳺玉廬而公獨引身鈐山之隩堅苦績學以􅃉其所蓄如是者十有餘年故其為詩多道岩壑幽居之趣而公之跡則疑扵隱至嘉靖􅀄公起南院歴遷南吏書是時公􅀒相望乆矣徃時諸僚及後軰多巳聮翩秉鈞軸而公猶廻翔散地如是者又十五六年故其為詩多紀留都冠盖之盛公雖已位上卿而志未大得也則又疑扵隱顯之間聖眀御極垂二十年顧前所用内閣諸臣罕能稱上心者而獨注意扵公遂自南宫入内閣未幾遂首内閣上下之交深故其積之也乆經綸之業厚故其􅀤之也遲自是禮樂典章属公協賛煥然以備北虜南倭時有兵革舉賢援能宻授廟算罔不奏功徃徃自為詩以紀其盛至于一時人才公所獎抜而布列者亦彬然畢見扵公之詩公詩有翰􅁐稿使粤稿留院稿使郢稿留省稿南銓稿南宮稿直廬稿公扵詩文各極其工而尤喜為詩公所寓必有詩􅀂以自紀其進退隱顯之跡而讀詩者則以論世也杜少陵一老拾遺偃蹇無所與扵世以其忠義所發為詩多紀時事故謂詩史而唐人又為少陵詩譜以論其世况公詩所紀當世之國家大事皆身所歷而自為之者少陵詩謂之詩史然則公之詩謂為時政記亦可也毛鄭詩譜以譜衆人則詳扵其世而人繋之少陵詩譜以譜一人則詳扵其人而世繋之必有譜公之詩者則公進退隱顯之跡益以明而世益可論矣公既以全詩授胡梅林總督使刻之而属某為之序某􅀼以文詞受知扵公公頗謂可與言詩者嘗侍公扵􅁐直公示之近稿曰吾少扵詩務鍜錬組織求合古調今則率吾意而為之耳某對曰公南都以前之詩猶煩䋲削也至此則不煩䋲削而合矣公頷之已而曰吾不與後軰談詩恐以詩人目我而敝精扵無益語也夫公之詩雄深古雅渾密天成有商周郊廟之遺知音者自當得之然公既不欲以此自著而某又敢以此仰賛扵公哉特舉公之詩係扵談世故之大者使論世者有考焉遂書以爲鈐山詩集序公之諸稿隱顯備矣總而題之曰鈐山集盖處貴顯而不忘隱約者公之志而讀詩者則以爲公之詩鈐山深蓄之力也夫董中峯侍郎文集序喉中以轉氣管中以轉聲氣有湮而復暢聲有歇而復宣闔之以􅂇開尾之以引首此皆􅀤扵天機之自然而凡為樂者其不能然也最善為樂者則不然其妙常在扵喉管之交而其用常潜乎聲氣之表氣轉扵氣之未湮是以湮暢百變而常若一氣聲轉扵聲之未歇是以歇宣萬殊而常􅀂一聲使喉管聲氣融而為一而莫可以窺盖其機㣲矣然而其聲與氣之必有所轉而所謂開闔首尾之節凡為樂者莫不皆然者則不容異也使不轉氣與聲則何以為樂使其轉氣與聲而可以窺也則樂何以為神有賤工者見夫善為樂者之若無所轉而以為果無所轉也扵是直其氣與聲而出之戛戛然一徃而不復是撃腐木濕鼓之音也言文者何以異此漢以前之文未嘗無法而未嘗有法法寓扵無法之中故其爲法也密而不可窺唐與近代之文不能無法而能毫􅁵不失乎法以有法為法故其為法也嚴而不可犯密則疑扵無所謂法嚴則疑扵有法而可窺然而文之必有法出乎自然而不可易者則不容異也且夫不能有法而何以議扵無法有人焉見夫漢以前之文疑扵無法而以為果無法也扵是率然而出之决裂以為體餖飣以爲詞盡去自古以來開闔首尾經緯錯綜之法而别爲一種臃腫侰澁浮蕩之文其氣離而不属其聲離而不節其意卑其語澁以爲秦與漢之文如是也豈不猶腐木濕鼓之音而且詫曰吾之樂合乎神嗚呼今之言秦與漢者紛紛是矣知其果秦乎漢乎否也中峯先生之文未嘗言秦與漢而能盡其才之所近其守䋲墨謹而不肆時出新意扵䋲墨之餘盖其所自得而未嘗離乎法其記與序文章家所謂法之甚嚴者先生尤長先生在翰林三十餘年嘗有聞扵弘治以前諸先軰老儒而潜思以至之故其所為若此然今之為先生之文者盖少其知先生之文而好之者又少矣先生之子近思􅀅刻集以傳而請序扵余近思豈亦以為世之言秦與漢者未必能知先生之文而余之愚陋稍知之也晋江王道思平凉趙景仁其文在一時文人中最有法皆先生丙戌為考官時所取士近思試以先生之文與吾言質之其必有合乎否也重刋荆川先生文集卷之十
