body:
  text: 志銘僉事孫公墓志銘公諱璽字朝信嘉興平湖人也其先世徙自松江之華亭所居南有九峯東有盛溪因自號峯溪道人弘治辛酉舉浙江鄉試登正德戊辰進士除興化知縣四年陞􅀭州府同知幾年陞南京宗人府經歴尋丁外艱服除陞山東按察司僉事提督京畿屯餉調雲南僉事坐撫按搆怨奏逮二司是時公已陞山西叅議矣仍落山西僉事乙未朝覲之歳以老罷歸最前後仕途二十八年歸十年而卒年七十有一嘉靖甲辰六月二日也公爲人寛厚持重内剛外和其所居官不擇劇易不計利害智巧所避毅然任之其有蹉跌亦不爲悔嘗言興利易而除害難然除害所以興利也其在興化興化豪徐恩與其宗人交賂權貴猾賊邑中恩以白衣入粟􅀘興化所千户綰所印而所中諸世千户反悒悒出恩下不敢喘令丞左右亦多爲恩耳目者率常把令丞隂事令丞欲圖恩懼不能制得反噬公始至恩繡胸背持刺上謁公拒􅁍之然亦未遽誦言罪恩也而邑人亦無敢告言恩者乃稍稍以輕罪笞其一二宗人以風指百姓百姓乃敢告恩最後得其謀殺道姑攫財事遂宻擒恩獄中考按盡得恩與其宗人諸不法狀因繫殺恩而宗人坐死者數人邑中爲清公始至邑歳饑􅂢公廪代民輸自是孜孜民隱平徭清賦養老長孤居數年邑以治稱去之日邑人攀擁不得行而徐豪家獨衘公不巳伺公去即持金數千走京師賂閹官瑞蘄反其獄且中公奏下廵鹽張御史正德時諸閹專而瑞尤有名所謂瑞張也御史顧望窮索公過失數月不得則令公與豪家同囚繫困辱之乃爲書抵御史其語深切抉摘御史隱曲御史得書大慙恧竟引疾去後代者至踰年其事乃白已而爲􅀭州府同知􅀭興化所属郡也始御史之勘徐獄也以属淮安守某盱眙令某咸受賂詭法巧詆公罪不克至是兩人爲他御史所論公又徃勘之罪不至罷卒從減論後兩人愧謝公公絶口不道前事人益以爲長者同知職清軍而軍解失文據者例充軍時解人當坐者􅀂干人公請扵上官以爲軍一人則解者二人解者軍則别解者又四人矣牽連無已時請限以一月首免别給文以行便上官下其法所部郡邑爲例頃之淮􅀭饑公徃賑㤗州所活凡三萬餘人是時宸濠反江西攻安慶公奉檄守儀真扼江之衝捕儀賔之爲諜者與其黨十餘人敕旌其功甞以僉事奉命丈皇莊草塲地土清其地之爲奄戚所漁奪者悉歸之民薊州銀冶盗嘯聚千餘乗利據險爲患公攝兵備選能吏馳上山寨榜示禍福各自􅅞詣公公罪其首餘牒遣復業及徙雲南分廵洱海道麗江土官川蜀爭金沙江讐殺公㑹勘其事土官以土金賂同勘者乆伺卒莫敢賂公由此解讐奉約束如故大同經兩亂後卒伍驕悍少不當意輙􅀒怙跳躑以爲常公以山西僉事廵大同盡心撫馭人頼安堵頃之吉囊入寇斬首多以贊晝功賜金自爲令即力薫大豪及在薊州洱海大同倥偬盗賊蠻夷反側兵戈之間而勘地土時則尤以一文吏與貂璫肺腑爭氣力上下公處之未嘗不辦竟以不能俯仰故不至大官在山西嘗衣豸衣見廵按廵按怒以爲慢已因考察中之遂以罷自知縣徙同知自同知徙經歴也亦坐不能曲事鄉大夫之有力者故卒爲所擠尤不喜通權貴人爲山東僉事時以屯田居京師乆之永嘉張公爲相故交也同年桂公爲冢宰未嘗一私伺其門以是徃徃齟齬于世至其清修之節則人亦不得而疵也總兵某嘗間餽寳帶鈎不啟封而還之雲南夷俗廵守行部輙有饋獻納則喜拒則疑且恚公拒之卒無敢疑且恚者大理經歴以鄉人故濳置蒼石文書簏中假公移投入公亦濳還之不􅀤其事平生自俸貲外無所取其俸貲亦多以散諸宗姻族卒之日篋笥敝衣而已性尤喜詩自罷歸居閒則詩益多有雲山履歴稿藏于家公之先諱某者居華亭國􅀄􅀍薦署縣學教諭事至公之祖諱忠自華亭徙平湖者也父諱軒封宗人府經歴母張氏贈宜人子女各一人子植舉進士爲刑部主事植始聞公病脾䟽請歸養歸踰年而公卒將葬植來請銘余以未及識公固辭植曰余先君則知子矣先君每誦子之文而得子之爲人恨老不及見子此行盖先君意也因涕泣固請嗟乎余何足以辱公之知而亦烏能有述扵公也哉扵是按公之壻禮部貟外郎錢萱所爲狀與公所上張御史書論徐豪事而次序之不敢増損焉懼失實也銘曰噬嗑腊肉或遇之毒終利用獄盤桓居貞有膏其屯卒困扵臀嗚呼古稱巧宦四至九卿公豈其拙我則是銘運使張東洛墓碑銘張公諱愷字元之號企齋後更以其所居爲號曰東洛先世居江隂至公父始徙無錫故今爲無錫人公以成化甲辰中進士遭父䘮服除授兵部職方司主事守山海􅀜任滿改刑部主事落職爲順德府管馬通判歴東平州知州􅀺平府知府又落職家居用言官薦起知太原府未任轉福建都轉運鹽使司運使致仕歸凡􅀂干年而卒年八十有六爲人狷介自植扵不㓗一無所屑其居官所至公㢘執法不肯小有所詘其志其在山海􅀜􅀜故籍錢扵旅人以給官用公即移檄永平府使量出官帑代其費至今便之歴順德東平􅀺平三州郡皆有惠利在民務先禮教而後誅罸其自東平徙􅀺平也東平人至涕泣􅃒道不忍其去公平生既不受人一介人亦不敢輕以一介溷公自爲進士服除赴選邑令贐之二十金公謝􅁍之其後爲運使罷歸諸賈人力請致羡餘九百金扵公公拒弗内也獨在東平時受一帶扵郡人太守張鄜鄜重義人也年九十餘矣未嘗謁扵有司公去東平獨率子弟出餞且請贈公兩帶公辭不􅀗而受其一惟公能致鄜之出惟鄜能致公之受盖兩相爲重云其在􅀺平􅀺平所治苗獠獸伏谿峝間頑獷不可覊紲而府治寓湖廣五開衛城諸苗入辦稅錢率爲官軍攫取不敢入以是多逋課又舊設撫苗官苞苴黷貨大爲諸苗害公力請罷之且移文湖廣諸司嚴戢官軍由是諸苗始出入城郭無所苦而稅錢得完諸苗有􅄷殺積十餘年不解者公與刻日爲盟遂解去自是賢聲著蠻中在運司公清如州郡時鈐束貴􅀔人不得占鹽公雖以㢘幹強直爲上下所快亦以此取嫉扵人故屢奮而屢蹶其自刑曹而出順德也坐中官羅織諸曹或謂公居曹未乆可自白公曰諸曹皆無辜我何用獨免爲在􅀺平上官以不時謁爲咎然竟不徃因齟齬力請謝病值閹瑾怒罸米奪官則又蹶在運司爲忌者所論則又蹶硜硜不肯少貶而世遂亦不能容公然其忠信著乎其官靖節孚乎其鄉則雖嫉公者固亦不得掩也公壯歳嚴毅晚更益以寛和絶聲色綺麗博奕之好罷歸三十餘年未嘗一詣公府里人高其義有曲直多就公决公死時篋中無一金之積嘗有盗夜突入其室􅀤篋空無所得怏怏去公爲詩識之曰平生不受一文賄垂老猶疑千鏹藏所著有詩文􅀂干卷及備遺録􅀘賛四臣事評螾竅餘音諸書共􅀂干卷藏扵家張氏先世皆不仕而公父禶以公故贈奉議大夫娶扵鄧而生公自公之存諸子諸孫巳至二十餘人皆爲儒稱其家風其詳在狀誌中公卒扵嘉靖戊戍五月八日次子塘等將葬公扵萬安鄉之新阡啓公配過華二宜人之兆合焉而以墓道之碑請扵余余昔讀貢禹有言居官而致富者爲雄桀處家而得利者爲豪雋夫漢之俗尚近古然已如此又何責扵後世之靡靡者乎以余耳目所見聞有不勝可慨者也然則銘公其可辭銘曰世下而趨純白日渝皦皦張公潔志勵行始官刑曹值閹見傾與僚同禍而不自明骯髒獨信遂與世屯既奮而飛復曵其輪好公嫉公世有千態惟公抗節終始一㮣公歸扵家四壁故廬閉門終日左圖右書繁華滿前公一不好枵然空篋爲盗之笑三十餘年不出戸庭鄉人慕公曰此典刑鄉人慕公曲直就辨縉紳慕公罕見其面如公篤行今也則亡刻辭扵墓以愧墨夫吏部郎中薛西原墓志銘西原先生姓薛氏名蕙字君采先生憫學者漓于多岐作約言學者執言詮以求見聖人之心而不能自見其心也作五經雜􅀃方士穿鑿乎性命之外而不知養性之爲養生也世儒泥象于有無之内而不知無爲之爲有爲也作老子解先生之學無所不窺不名一家中歳始好養生家言自是絶去文字収歛耳目澄慮黙照如是者􅀂干年而卒未之有得也乆之乃悟曰此生死障耳不足學然因是讀老子及瞿曇氏書得其虚静慧寂之􅀃不逆于心巳而證之六經及濂洛諸􅀃至扵中庸喜怒哀樂未􅀤之謂中曰是矣是矣故其學一以復性爲鵠以慎獨爲括以喜怒哀樂未􅀤爲奥以能知未􅀤而至之爲竅自是収歛耳目澄慮黙照如是者又􅀂干年而後信乎其心其自信之確也而後著之于書嗚呼心學之亡乆矣有一人焉倡爲本心之􅀃衆且譁然老佛而詆之矣學者避老佛之形而畏其景雖精㣲之論出于古聖賢者且惑而不敢信矣先生直援世儒之所最詆者以自信而不惑其特立者歟先生少嘗刻鏤于詩世絶喜其工今所傳西原集者其少作也既有志于道則棄不復爲雖爲之亦絶不較工與否然西原集世爭慕效之而約言老子解好者希矣先生以正德甲戍舉進士授刑部主事病免起爲刑部主事以才調吏部主事嘉靖中先生在吏部歴考功司郎中而罷後十八年辛丑正月九日以病卒于家年五十有三其罷也坐論大禮先生自爲刑部時值武廟南狩抗䟽諫禍叵測先生晏然後大禮之議起廼撰爲人後解爲人後辨奏入下獄巳而復其官然巳爲權貴人所不釋矣巳而竟主給事中某搆先生罪先生上書訟坐是罷後所搆事解吏部數移文促先生赴官時權貴人且張甚曰是可褰裳而蹈淵也哉竟屢薦不復起先生貌臞氣清行已素峻潔其才雖高然坦易洞朗破去厓岸豪傑皆慕與之交其庸衆亦無所嫉者獨以一二權貴人故至一斥遂不用先生方且藝圃灌花澹如也居鄉絶不肯爲人干請至戚里有疾親爲之檢方製藥嘗脫綿襖施凍者或曰焉得人人而濟之曰吾不愧此心耳始號西原居士後扁其齋曰大寕齋更號大寕齋居士而世猶稱西原先生云薛氏故􅊢偃師國􅀄以戍武平遂爲亳人祖琇父封吏部主事曰鎰自封主事君而上皆不顯然世推長者妣楊安人生三子先生其仲也與其季萱皆無子而伯兄蘭有一子曰存先生與蘭友愛甚其沒也蘭爲之經紀其䘮將葬先生于亳城南先塋之次而緘其遺書請銘扵余無何蘭使人來速銘且告葬期曰卒之歳某月某日近矣􅇮先生嘗寓書于余叩以致虚極守静篤與未􅀤之中其㫖同異余未及復請於先生也􅀼妄意之寂而未嘗無感而未嘗有吾儒之所指爲中也乎内有鍵而不出外有扞而不入老氏之所指爲虚静也乎以是復于先生先生其許我哉雖然先生之註老子則可謂得其髓者矣乃􅀼取先生之意而爲之銘曰在昔老􅆅握玄化樞人皆競巧巳獨􅀂愚吾師嘆焉其猶龍乎棼棼末學枝葉日繁豈不莞然而撥其根維􅆅之生寔是譙亳寂寥至今西原有作閉戸獨窺㣲言五千叅諸孔庭􅀗我同然孔曰未􅀤􅆅曰静虚立教有二其䆒豈殊譬如入海所貴得珠其所從入孰一其途自是反躬精思力踐黙然一悟與天游衍亳之南墟有鬱其墳嗚呼西原其尚何存吏部郎中林東城墓志銘嗚呼吾友東城林君古所謂敦行君子也紛華盛麗耳目之好一不膩乎其外獧巧慧辨機智之習一不鉤乎其心潔以律乎其身一束修之問畏之􅀂苞苴然謙以􅁉乎其人一輿臺之賤接之􅀂賔友然行必愜乎人之所安故不爲嵬崖嶄嶻之行言必衡乎力之所抵故不爲要􅆌浮濶之言嘉靖辛丑十一月二十日以吏部文選司郎中卒于京師年四十有四出其槖得銀四兩不能棺其寮友爲之棺以歸歸不能葬郡守朱君州守􅀺君賻之錢以葬而􅀺君又使君之友陸位等狀君之行來請銘朱君􅀺君君在文選時所選㢘平吏治其鄉者也君諱春字子仁始號方城以其先福建福清縣方城里人後改東城祖諱某父諱宏母某氏自君幾世而上有諱閠者始自福清以從戎􅊢㤗州守禦所故君爲㤗州人林氏自徙㤗州未有以儒顯者爲儒自君始後君貴始贈其父宏爲吏部文選司主事而封母某氏爲太安人君始以窘故幾廢書者屢矣君讀書居常以竹筩注膏繫衣帶間惟所適則岀膏於筩燃火讀書君父爲漕卒君又獨與母妻織屨織屨讀書率以夜不睡嘗日中不能炊貰米於隣不得君行歌自􅀂家人頗非恠之君自􅀂君是時堅苦已如是已而受學扵知州王君某與其鄉先生王君汝止兩王君故王陽明先生弟子君因此始聞致良知之􅀃則心喜之至夜中睡醒無人處輙嘖嘖自喜不休遂欲以躬踐之則日以朱墨筆􅀧記其意向􅆇否醇雜以自攷鏡乆之乃悟曰此治病扵標者也于是駸駸有意乎反本矣戊子舉鄉試壬辰舉㑹試第一登進士第選戸部廣西司主事調禮部主客司主事又自禮部調吏部文選司主事吏部故矜厓岸鎻門謝賔客雖親故人不徃拜示自尊重而吏部以提􅀬柄故雖諸寮中率自羯羠相猜抵君色温氣柔不以行能先人其在諸寮中悛悛下之唯謹其在同志中雖其名位絶不相埒者悛悛下之唯謹門無留賔日旰出部則徧走刺答諸賔客或羅致諸賔客講學意烝烝如也諸賔客人人自以林君親已其尤厚者則相與挾衾􅀍櫛具徃􅀫觀寺中講學竟夕以爲常後爲郎中官重益多事矣然猶如此以此諸寮中雖其志行與君絶不入者亦謂君長者不復猜也而善􅀋因君以聮者爲多君自束髪至盖棺未嘗一日不講學然君本以長厚清苦繩墨自立其於學也亦因其質之所近君爲主事是時縉紳之士以講學㑹京師者數十人其聰明解悟能􅀤揮師􅀃者則多推山隂王君汝中其志行愊實則多推君與吉水羅君逹夫羅君扵朋友中最沉密矣然君猶面疵羅君以其露才也君之自歛可知已王君汝中灑落而君小心周慎畫尺寸不敢失兩人操行不同然君獨心敬王君爲主事乆之轉驗封貟外郎已而調文選司貟外郎居一年母安人病癱卧君謝病歸養君居鄉則益悛悛謹甚如故儒生時家無一錢亦不以取扵人家有一錢亦必以施扵人侍母安人病病少間則出寓故所讀書處萬壽宫者與其故時友人及鄉之後生講學以其間走安豐就其故師王君叩所疑義每徃必喜幸以爲聞所未聞君扵師推王君汝止於友推王君汝中君居官有未識王汝止者君與之言必曰吾師心齋􅀃如是君居鄉有未識王汝中者君與之言必曰吾友龍溪􅀃如是居乆之赴官􅀘稽勲郎中調文選郎君自爲吏部主事㤗州守某黷而虐君請於尚書黜之㤗君鄉也尚書趦趄曰某未有劾者柰何君曰不實則罷主事遂以其人調邉地頃之南御史劾章至則其人也竟黜之後君赴官泊淮淮守某以次謁諸過客舟始及君供張又薄􅀂不知君爲吏部者後淮守入覲考下當逺調君爲稽勲郎具白尚書以過淮事薦其㢘静懇乞留之更得調永平内郡二者其一逺嫌者不敢爲其一怙􅀔者不能爲而君爲吏部􅀂此然君長者常䕶人短其請黜㤗州守事則尤爲君所難君既長選事益思薦進賢人慎擇監司守令洗刷奉其職然事有曵掣或不能盡如所欲爲則君自謂曰選曹之職欲上通扵君與相􅃁宰之心下通扵選人與天下人之心相􅃁宰之心未必選人與天下人之心選人與天下人之心未必相􅃁宰之心選曹居其閒欲兩合焉難矣雖然求無􅀒乎吾心足矣君始調文選㑹御史論君受牌坊銀事雖衆以爲妄然君獨自念束髪兢兢砥行遭􅀧染居常引咎不愜欲解宦又業已爲之既任事又曵掣縮縮不自得曹又多事君日夜其間固甚瘁居無何病一夕卒卒之日猶在曹不自知病病且革乃舁歸舎先是君嘗㑹朋友講曾子啓手足意懇惻聞者皆怵惕未數日君遂卒君問學幾二十年其膠解凍釋未知其何如也然自同志中語質行者必歸君君娶李氏封安人子四人暁暉曜昕暁樸而材能似君者也爲庠生妻某氏暉聘某氏女一嫁王用賔葬以卒之明年某月某日墓在某所君不喜爲華詞其舉第一􅀿試文字及後所爲詩古文務理道質而不艶如其人始君㓜不知書父故苦貧也不能資君以書以餘子給事千戸王某所某竒君令與其子王烈同學書君自是始學書後父數見君讀書且喜且􅅓之曰兒讀書固善然書可飽乎因取其書欲燒之君婉詞跪謝乃解後君貴常恩王氏厚報之自王烈以下禮節稱謂歳時起居一不改扵故餘子時銘曰君嘗有言天然之門盎然出之不作好醜不爲我偶不爲人觭大心之窟如彼日月光照四垂樓臺殿闕糞壤䑕穴亦所不遺藏疾扵藪有茹其垢蓄德之資有如寳然玉金在前其耀不施君子若愚䁔䁔姝姝不其淺而我韻君語勒石扵墓式昭世規刑部郎中唐嘿菴墓志銘嘉靖乙巳三月二十九日刑部郎中嘿菴唐君卒扵南京之官舎貧不能具棺殮尚書及諸寮賻之錢􅀂干乃棺以還其家而知縣茅君又􅉠之錢爲葬具茅君又將因邑諸生之請爲之請扵上司而祀君扵鄉賢祠而以書來請銘君嘗爲永豐知縣武定州知州吏民爲之生祠以祀君謹按君在鎮江爲鄉先生在永豐武定爲循吏扵銘法宜扵是採君之姻友舉人陳君佐所爲狀爲之叙而銘之君諱侃字廷直號嘿菴家扵丹徒之開沙祖諱用父贈南京刑部郎中諱漢母贈宜人嚴氏年十六入郡學爲諸生正德癸酉舉扵鄉乆之以選爲永豐知縣遷武定州知州已而擢南京刑部貟外郎轉郎中君自束髪至盖棺未嘗一日不兢兢砥厲名檢然扵㢘耻大閑則􅀂生而成之年二十獨居所讀書處夜有奔者君峻拒之明旦遂移其處終不以其故語人爲舉人入國學時出游得巨商所遺金不啓囊而還之君自少時其扵貨利聲色中能嶄然不爲所汙染􅀂此平生尤以忠孝氣節自許爲諸生時父以􅀍囚繫上書請代弗得乃籍草地寝夏不帷冬不􅀍如是者竟一年父免獄乃止居常清苦自刻及爲州縣未嘗一日携妻子數千里外獨與一二垢衣村僕相朝夕而飯􅂼羮豆榻茅以居有寒士所絶不堪者君曰我素然其治永豐武定永豐爲江西刁訟邑而武定爲山東悍州君既素豈弟長者務掩人瑕疵其爲吏尤欲以古教化先之不忍以㪣朴苛細爲能故所設科條其始􅀂甚迂濶乆之真誠溢出吏民至不忍欺紿遂以辦治稱江西俗尚􅀑而永豐有嶽神祠居人奔走雜男女香火無空日永豐又素善爲優閭里浸滛傳習謂永豐腔使民􅁋於欲而匱扵財君曰此大蠧也立痛革之君爲縣其有理之言雖賤吏必改容謝之立爲之行其無理雖權􅀔人百方爲請毫􅁵無所假借寛貸以是君居縣數年告訐請託之俗爲之一變其在武定則尤以鎮静拊綏疲人嘉靖戊戌章聖梓官徃承天道山東上官檄君德州供張至則諸内奄牌校横索百端挾威凌侮聲􅀔詾甚奴叱諸尊官鞭撻州縣假言供張不辦捕死矣欲以恐嚇錢物諸同事者皆懼逃去君獨横身當之先是君命從者舁一空棺密置旁舎中及諸人索錢急君佯謂曰吾與􅀂詣錢所受錢乃引之旁舎中指棺示之曰吾已辦死矣錢終不可得也諸人乃稍稍引去事遂以辦始君受命上官裒民間財甚鉅欲盡以給君猶恐不塞君曰以半徃足矣至是所需又不及其半而以其餘還之公帑諸逃者皆􅀍劾逮去而君乃受旌君本長者居常怡愉簡黙温温不見􅆇否其爲吏尤悃愊至其臨利害乃出鋒鍔片言折伏豪索敏銳集事絶出於精悍吏所不及如此君所居官率空槖以歸及朝覲考滿入京師又率空槖以行以是著節聲亦以是淹滯扵世爲州縣皆五六年而後遷然而上官亦徃徃有知君者至爲考曰㢘介􅀂趙清獻人以爲不誣在郡縣乆人情吏事益練居刑曹尤以執法得情著聞君卒時年五十有九子果府學生先君一月卒女二壻李某王謚孫男三思忠思信㓜者未名始君同邑有易洞丁君者好古道明扵易以傳其子􅀘齋君璣尤刻意清苦風節竦一時君爲􅀘齋入室弟子其風節亦似其師君又善教誘鄉里後進從君㳺者君誨之不專以文藝每曰湏使此心無愧神明可也其弟子浸浸有知嚮方者􅀂朱錫王春王合節軰其著也合節以女婚君之􅀌孫君之卒也爲之經紀其家而速余銘以終君之葬者亦合節也銘曰凡人爲吏㢘者或刻惟君長厚温温悃愊凡人扵鄉貞每絶俗惟君渾然不露畛域州邑有言此吾卓侯鄉閭有言近古太丘經紀其家弟子事師賻葬崇祀是在有司考終譔美太史則宜禮部郎中李君墓志銘公姓李氏諱儒字宗文其先自嘉興徙居華亭之陸磊塘又徙泗涇扵是世爲華亭人大父諱常父諱柬以公故贈南京禮部主事李氏自贈主事公而上世以讀書好禮望于鄉然皆隱而弗耀至公始顯公亦乆而後􅀤自爲邑庠生凡􅀂干年而入太學又􅀂干年爲正德庚午始舉于鄉明年辛未中㑹試又病不能廷對至甲戌始第進士公年四十餘矣人以謂公蓄乆而􅀤之遲且蘄于速售而公見時事不可其意遂謝病以去自是家居者又十年盖未嘗一日歴乎其官而亦已澹然無復有冀于世也因自號宜散以見其志㑹嘉靖􅀄今天子詔起恬退之士􅀂干人而公名在數中于是始就選爲建寕推官屬郡缺守公攝守事凡一切利害當罷行者無不悉力爲之未嘗以攝守故自苟而郡中望公亦如真守是以公雖佐郡而居守之日爲多雖職專平刑而澤之及人不獨鞫訊讞論間而巳爲推官􅀂干年擢南京禮部祠祭司主事南部爲散吏而祠祭爲清曹經歳不知案牘公之靖約尤宜于其官又三年陞南京刑部郎中公年五十有七人謂公尚可以待而公已决于去矣于是請老而歸者又八年而終是爲嘉靖丁酉四月二十七日也嗚呼士之勇于進怯于退而忘其自㓗也乆矣公之行在古人不爲竒然求之今世得數人焉如公者何其少也然就公而論則有兩􅀃去于郎中之時者猶爲易而去于進士之時者則爲難盖宦成而不能去者有矣未有始進而必去者也去于正德之時者猶爲易而去于嘉靖之時者則爲難盖遇濁世而不能去者有矣未有治朝而必去者也豈莊生所謂以簮笏爲柴柵者公固其人歟然公得以極幽居之樂而自肆于園池竹石之閒優游而至于老此其所得較之老死汩沒于奔走者何如也則公之高扵人逺矣公儉朴而寡欲糲飰敝衣終身常然雖在官中亦然自建寕歸不載行李惟破篋貯書數卷而已公資于身者薄故繫于物者輕繫于物者輕故能處紛華而不留甘寂寞而不厭如是而世能攖之者少矣而况于一官之去就歟嘉靖庚寅予以年家子弟識公于潞河􅀼窺公貌古而氣淸蕭然如在江海之上則未嘗不慕其爲人退而詢其履歴尤可慕也後幾年而公卒諸子子忠等將葬公而以長史呉君所爲狀請銘于予于是知公爲尤詳公孝弟修于其家㢘譲信乎其鄉多出于人之所難然公既以恬退有聞他可不具書也公母劉與􅁇母張皆贈安人配王封安人禮部貟外郎諱臯之女子四人子忠子誠子欽子良子欽早卒餘三子皆太學生女二人壻太學生唐自明鄉進士姚篚孫男四人開閶闔闢開爲邑庠生孫女四人􅀄公之生母劉以産死故公平生痛母最深後諸子每欲爲公擇葬地公輙泫然止之曰吾死必邇吾母于是子忠等葬公于某地先塋之次從公志也葬以卒之某年月日嗚呼是其可銘也已銘曰道世交䘮潔者寡得車彌多䑛彌下如蠅集垢檏不捨泊然不繫惟公者衆注以金獨以瓦百年考德在此也戸部郎中林君墓志銘林氏之先自莆田徙居晉江之永福里君高祖梅徴孝㢘不就父嶤縣學生方貢扵大學㑹君貴推恩封承德郎戸部主事母李氏贈安人君諱性之宇帥吾一川其號自少受書扵主事君君學既有所受而精之以思多所自得其所􅀃易中庸時義自爲庠生時諸經生則已遵信之如前軰人已而乆不第諸經生則益遵信其􅀃如已第者所居教授常數十人僉事蕭君請以爲子師賔禮之僉事有所屬吏以􅂍敗因私扵君曰君脫我我厚謝君君曰某書生耳知爲師授弟子經他非所敢聞也其人愧謝去嘉靖元年舉扵郷八年舉進士授浙江麗水縣知縣三年擢南京戸部山西司主事監龍江天䇿諸衛倉丁主事君憂服除改戸部浙江司主事爲尚書梁公材所知委監龍慶古北口倉三年遷貴州司貟外郎監天津倉以病乞改南京遂遷南京戸部廣西司郎中過家病卒年五十二君爲人悃愊質訥葸葸細謹世俗一切鉤距機警鑿空籠􅇁之巧非特有所耻而不爲亦􅀂其性有所必不可移而爲之然者以是居鄉亦以是爲吏以是待其良吏民亦以是待其頑吏民所至未嘗一有所變其始令麗水也或以麗水巖邑非擊摶不可集事君唯唯然竟不變乆之邑亦以治而豪黠吏空手坐曹中至不能具饘糜山谷素捍文網之民有十餘年名捕不能得而涕泣頓首歸誠扵君之一言者邑故有窑課後窑戸以課重徙盡則均其課扵並窑居人之不爲窑者至君䟽除其額凡􅀂干㑹造籍時里中以􅇡絶自言者三十餘戸吏以爲無故减三十餘戸且得罪君竟减之守令本以盈課額多戸口爲功最而君之爲令盖如此律令倉法最重坐者徃徃累死而老倉曹方収粟時貪升斗之賄不擇美惡乾濕歳乆浥爛輙繫死不能賠死則連繫其妻子坐監龍江倉時欵欵戒語其屬曰柰何以升斗故坐重法乎頃之適有浥爛坐罪者君輙愀然曰柰何以升斗故坐人重法乎遂命􅀤數倉粟與其浥爛者均給扵軍曰此一軍所虧粟粒耳于是諸屬感泣至不忍犯法其在龍慶以爲商賈􅁁儲所本商賈病則粟不來粟不來則􅁁人坐困故一切條去其所不便髙其價以招之自是粟溢扵廪而君得以時其出納以濟􅁁人之急至在天津時值倉粟空又寒凍餉道阻軍無所食君即奏請􅀤旁近德州倉粟給天津軍三月食或謂于法不得相借君不爲止已而朝廷竟從君議當是時㣲君一軍幾詾詾君本細謹畏事爲戸部慎出納守尺寸法不敢失至其越法有所移用如天津時事而曲法有所寛貸如龍江倉時事有足多者仕宦十五六年歴縣令戸曹最乆家無多貲割田四十畆以給族人之不能婚與葬者居鄉縮縮循謹甚既卒邑諸生具君行誼請祀君鄉賢祠有司覈實如諸生言君娶云云于是君之鄉人洪君朝選狀君之行而一新且因洪君以請銘扵余余嘗識君扵同年中以爲他人忠詐險易非乆與之處不能知至君固可望而知也爲之銘曰百姓之譽可以非道干鄉曲之聞可以詭行得盖其暫也或然而乆則未嘗不忒惟君既去而邑人以思既沒而鄉人是式吾據是以爲銘庶幾不蔽乎君之德施推官墓志銘公無錫人也姓施氏諱誾字克和自號静觀居士以貢爲平樂府推官致仕歸凡十六年今年嘉靖丁酉七月一日卒年七十有七越三月辛亥望日葬于惠山從先人之兆也公自少讀書能爲文章及年五十餘始得官而平樂在南荒水陸之途且七八千里公素踈散不喜爲吏雖強徃非其樂也滿三載卒棄去公磊犖魁岸􅀒氣少所屈下又善談對客呫呫不休意所蓄藏如噎物必􅄍之乃已故不能媕婀以乆于官亦不能沉浮以媚于鄉里或有過雖親故必剖露無所隱或不可其意雖貴􅀔必衆中噍罵之恐其不聞以是人多畏其口爲推官時值猺酋放横上官以公口辨遣入谿峝中諭酋酋爲之愧屈剽掠一息性喜爲詩尤好陸放翁之作所著有北遊録粤南紀游静翁遺稿其中所載詩爲多大抵皆師放翁而似之者其在平樂意所感慨亦徃徃寓之扵詩郡産蓮酒諸貴官徃徃下郡恣所取無限度民苦之公曰酒有盡而索者無盡雖涸江水爲酒亦不能給也因作詩以諷諸貴官慙之自是少索蓮酒者既罷歸家無厚儲則一以其力寓之于詩後年益老病痺家益蕭然公絶不以屑意而吟詩如故既病痺不可起公曰世所謂諱死者此騃孺子耳死即死何足藉乎及死猶自謔曰吾如􅀒債者今限滿湏償耳嗚呼此豈所謂逹人者耶公父諱㢘爲醫學訓科施故醫也至訓科名益顯訓科子惟公一人而有女二一女嫁于龔訓科君所命公字而子之名漸者龔氏妺所生子也􅀄公未有子因子漸于是尚冀自有子也後公果自有子曰渙矣復夭死故漸未歸龔氏雖自渙在時公愛漸與渙等漸有子陽得公亦撫而教之如其孫公卒漸行三年䘮以子報之觀公之所以待漸與漸之所以報公者鄉人皆以爲厚而余以此未知公之心也嗚呼甥舅之不相爲後也乆矣古者縁恩以制服據義以立宗故􅃝免無服之族人且得相後而功服之甥舅且不得相後是古人所以敬祖重宗也誰能易之以公之意固知漸之不能乆于施氏而况施氏之有後無後固不在漸矣觀公嘗録水東日記所載周氏之事及朱子答汪尚書之書而自題其後盖不以周氏之祭其外家爲是而必以朱子爲外家立後之言爲不可易也此固公之所以隂屬意于漸者與公之力既不及自爲而有待于漸漸之力于今又未能爲也將有待于其後與漸好古知禮必能愛公以德而不􅀒于公也公有女一人嫁莫因余與漸雅善雖不足以知公然漸之請不可辭乃序而銘曰古者立後惟祧是守惟族無逺族異則否公選于族未得其人我施自出甥也則親曰字我甥以待有子天胡不然有子而死公所未爲甥能代之施􅀑無餒終將頼之􅀂古有訓愛之在德預爲此言以勒幽石松陽知縣胡君墓志銘君既卒而余徃吊其家君之弟露出所遺囑示余大要教諸子弟孝友㢘謹退譲或各隨其材性所病而分與之藥井井一如家人居常語其字畫遒謹亦與君平時手書無異盖前屬纊三日也及屬纊露請訣無他言第曰做人做人嗟乎死生亦大矣能精明􅀂是是足以知君矣君年四十餘㳺南都師事吕先生仲木鄒先生謙之始聞古儒者之學時尚以牽扵舉業故未能竟其意也君自南都歸而余罷編修家居時時與其弟露候余君峭立直剛而露恂恂朴實余心喜兩君之爲人每相過輙竟日語其語大率世所謂迂僻者而兩君獨心喜之然君之意每􅀂恨扵向未有聞先生長者之言既有聞扵先生長者之言而已晚者余嘗謂之曰囬頭即岸矣何晚之云嗟乎君今卒矣岸乎與否君其自知之矣而余􅀼謂觀君所以處死其足以知君者也君且卒囑其弟請余銘君之墓君諱雲字雨之號霽齋胡氏譜相傳以爲安定先生之後自海陵徙無錫大父諱轅父諱岳號西崖君自㓜寡言笑不嬉弄不敏扵他藝亦不習扵便獧稍長習舉子業爲文豐約拘縱有法其居庠所與游多豪士至戊子歳舉扵鄉余亦以是歳舉已丑君下第入南監始見吕鄒兩師而問學焉乙未復試京師㑹聞母䘮而奔哀號勞頓渉數千里入門骨立每哭輙仆三月後始力疾營葬事三年未嘗展顔色自君痛西崖之早世也掲一聮扵書舎曰思親每憶臨危日對卷常懷赴考時弟露稍疾痛則君竟夕不寐露有三子接而殤也露顰君爲之蹙扵額露展君爲之解扵頥君之病也露左右寢處如子盖君所以感之戊戍又不第始就選爲松陽知縣松陽處州屬邑也處州古稱難治而松陽僻在山岩中先是數饉扵水又屬開鑛居人爭駭散君周旋撫諭僅而安集其諸奄校以鑛事至者又競欲庖勃威君以浚扵民而土人之不逞者又隂唆之君慷慨辨詰不少屈竟與抗禮君又素㢘撫拾無所得其人至相誡曰母生事非他縣比也是以鑛事首尾二年而民不甚騷君尤爲分廵胡君有恒所知胡君介士也嘗謂君曰官如水衙如氷我最甘扵清苦猶不及也松之俗嫁女破産雖富族亦多不舉女有踰四十不能妻者雖其良族亦率以搶婚爲常事君患之始下令曰母溺女溺女者重坐之又以爲母子天性也惟痛節其送女之費則女可蕃女可蕃則搶婚可不禁而息又下令曰送女母過􅀂干過􅀂干重坐之由是女亦浸育然去官竟以搶婚事也始諸生王宰聘徐女有豪者奪而婚諸其子君怒將置之法遂誣君扵上官反覆辨詰乆之事白矣然竟以誤朝覲遂坐罷君性剛㣲􅀋􅄶扵人不能瓦合其爲令尤不肯脂韋骫法務在惠貧弱抑豪強其抑豪強也取中法而已三年未嘗杖殺一人君既歸每獨坐一小池亭或時與諸相知㳺息論學其間既老矣不復泛觀他書惟好王陽明先生文集日玩誦之有疾尚手摘其要語以爲子孫訓其居閒非慶吊未嘗輙入郡邑城或時入郡城一問訊余也始君爲小池石焉嵌以臨深字而問銘扵余余未及銘而君卒矣于是銘其墓君娶云云銘曰衆之生也如偶借機自多其能逮其卒也如偶去機遂顚其靈君之生也趄趄踽踽不能爲巧逮其卒也垂絶之言一何了了不遭於生而妥於死葢㫺人有言豈以其重若彼而其輕若此興國州同知徐公墓志銘復齋徐公旣卒且葬而公之妻卞孺人實先公卒至是合焉子顯佶等詣余請銘余姻也宜銘公公諱徽字朝典家於武進新塘之板橋大父錡父封戸部主事璟璟娶於陳爲兵部尚書節愍公洽女孫封太恭人是生公公幼讀書善記􅖿於文詞自爲諸生及與余大父給事公同時給事公故名士而公伯兄朝文與馳騁上下兩人交相善也公妻又唐之自出與給事公有連公既師事伯兄而往來於給事公所切劘砥淬其文益昌後伯兄與給事公同時登第去而公獨逡廵庠序間無所遇久之始以貢爲太學生則公年且四十餘矣又數年而選興國州同知楚俗呰窳而興國負山阻習獷悍同知職主賦頑黠逋租戲獄爲常官司相沿一切以鞭箠鉗鈦從事猶不能集公獨㴱隱之爲弛其禁或時自割俸代之償興國人往往惠公然其頑尚逋租如故時態公終不痛䋲督之其諸科條張設􅀋多所縱舍公本魁岸峭直居鄉曲閒不肻與齷齪輩遊又不􅀎忍人之過􅂉面誚讓至其蒞官行法乃更悃愊近人􅀂此上官知公者亦厚奬之然乆之竟坐課殿罷罷官而家又貧恬如也性好奕既㞐閒則益以奕飲爲樂或浪跡山水間間則課諸孫句讀斥俗累一不挂心十餘年至嘉靖辛丑七月壬寅日乃卒年七十又七卞孺人父謨謨娶扵唐給事公從姊扵余從祖姑也能嫓德扵公少公一歳先公三年卒墓在歐墓山公所卜也葬以公卒之明年正月二十八日銘曰仕不必逹期適意處不必豐期無累隤然自足人間世亦有好逑諧厥志考終最德石以識信豐訓導殷君墓志銘翁姓殷氏諱佐字時衡號龍岩無錫人也殷氏之先有諱序者舉進士遭遇文皇帝時自知州擢布政使布政生璉璉生廣成廣成娶扵馬而生翁殷氏以布政公故閥閱推高邑中其子弟相尚以志氣撑拄門戸爲事而翁居其間尤倜儻魁岸自喜然殷氏自布政公以儒術進至翁大父與父與諸昆弟則多隱扵布衣而翁乃復自奮扵儒翁昆弟四人而翁次在第三其長兄俊余嘗銘其墓秋野翁者也秋野既少代父治家事而翁因得專意扵儒􅀄布政公爲四川布政時禦茂州叛夷有功活降者數萬人夷人立祠以祀翁始向學即慨然􅀤憤曰吾先世功德不可無􅁇其業者而布政公故以詩舉進士爲無錫首其後詩學既廢而邑中諸經師徃徃以尚書教授于是翁乃别授尚書翁既􅀤憤扵先世之業又無家累也以專其志故其誦習勤苦精䆒不間日夜夜率五鼓起以硫黄􅅡火然燭至旦爲常既徧以講扵邑中諸經師則又博求四方之精扵經者爲師其最著者同邑張運使愷華亭錢修撰福運使敦行人也修撰以文雄一時其尚書則用以魁禮部試者故翁耿介􅀒氣不少媕阿扵俗得之張氏其爲文冠冕跌宕馳驟不詭繩墨得之錢氏爲多翁在經師同門諸弟子中嶽嶽無所譲諸經師亦每注意翁其爲庠諸生在同庠諸生中嶽嶽無所讓諸提學及諸提調官每試亦輙前翁乆之翁所與同經師及同庠諸名士徃徃登第去爲逹官而翁獨逡廵庠校中凡六舉而不一遇其後以乆次貢京師則翁年五十餘矣遂以貢選爲贑之信豐訓導贑在嶺上信豐尤僻壌仕宦絶少翁至則以素所聞諸經師者切劘諸生信豐相傳地産蜈蚣而少蛇蛇或數十年蛇一出縣􅀤科第一人翁始至一巨蛇出頃之有張生純者果得舉人以爲是殷師之教也居二年力請致仕歸翁既歸而向時所與同經師同庠諸名士登第爲逹官者亦多解官家居其伯兄秋野翁亦既老而致家事扵子矣翁家居則與秋野翁白首訢訢相對每賔燕子弟環列或劒􅀒兩翁兩翁蛇委其間而出則與其故人同時解官者相與結觴咏之㑹談􅀃故事以時登眺爲樂乆之翁病失明而故人亦零落且盡乃獨坐卧一室時時口誦所記憶少時所聞諸經師者以教子旦已而子旦篤扵學行能文章有聲則翁喜謂可以卒先世之業而􅁇吾志矣翁爲人貌偉少魁岸倜儻自􅀒至老而其氣不衰年八十有二而病卒卒之日嘉靖乙巳九月十六日也翁配云云所著有龍岩稿藏扵家旦以翁卒之明年十二月一日啟先嫡母之兆合葬于舜柯山祖塋之次旦與余善故翁之葬也旦來請銘銘曰其爲諸生卅年不遇其師諸生二年以去䆒其􅀄終不離庠序學此斆此弦誦書數博士傳經多在門生亦在其子既文且美謂翁數觭其偶在此趙府奉祀正王君墓志銘趙府奉祀正曰􅈝崖王君者武進人也諱學字子静始以郡庠生入太學以太學生選今官未及行而卒年五十有四曾祖諱珩祖諱尹父諱覲母潘孺人自君以上世爲武進鉅族人號之曰夾山王氏王故匡姓也其先有仕扵宋者以國諱省子孫因之而既沒則稱故姓云妻華孺人爲華君世明之女孺人無子而兩側室皆有子曰守謙守約皆爲太學生守謙娶白君省夫女守約娶孔君叙修女女壻太學生邵鏊庠生曹悰太學生徐莘君卒之日爲嘉靖丁酉二月丙辰葬扵祖塋之次其地曰夾山其日曰卒之明年十有二月甲寅嗚呼君自少巳爲太學生宜其可以坐而注官然君章章句句晝諷而夜思瞿瞿然視其太學生常如白衣之不足以􅀤乎其身君故饒扵貲宜其可以坐而衣食其中然君督耕課織贏入而縮出瞿瞿然視其故貲常如空槖之不足以資乎其家視故貲如不足以資乎其家而欲振之君之志既種而穫矣視太學生如不足以􅀤乎其身而欲進之則君以柅扵命而不能偶也君自居郡庠至爲太學生三十餘年嘗以庠生􅀿舉者一以太學生􅀿舉者三中間豈無可以冀扵一售者然竟莫之售以老君既抑塞以至扵垂老而後就選及選又獨得所謂王府官者王府官雖尊重然散地不持尺寸之􅁠又老死不復遷轉君以故滋悒悒不樂居乆之或有談趙王之賢聳踊君者君以爲然且躍然治行矣又遘疾竟以不起嗚呼悲夫君爲人重厚絶不以口郵傳人過失人亦無有以口過過君者華孺人始歸扵君有從嫁田三百畆君謝􅁍之人以是重君而君貲雖饒然素儉約能甘貧士之所難其所衣常䟽布衣一衣可十許年食常􅂼而不肉其過苦乃如是自其父母沒後奉養祖母三十年如一日不朝夕輕去左右是以君遲囬不肯就選雖其意欲有所湏然亦以祖母故也君葬既有日扵是君之二弟子庸子明戚君之不顯扵世而懼其泯然扵後也乃率其二姪以趙君克􅀄所爲狀詣余請銘余未及知君而嘗交扵子庸子明間二君好學而文足以知其兄也巳乃許之既論次其事又繫之以辭曰余觀漢之才士􅀂枚乗鄒陽宦吳鄒陽又宦梁而相如宦扵梁終能蜚聲天朝爲漢詞臣使後世鴻漸之士莫不抵掌而慕焉彼獨非王國官耶何爲今之沒沒而不著也如王君者縦不能宦逹然使其得曵􅅂王門而􅆖後乗扵鴈池莵􅁐之間亦未爲不遇也筮仕扵始衰方就官而殞身􅀂有或遲之或速之然者此豈可不謂之數耶范蠡有言既已施扵國吾欲用之家君雖無所試扵世然跡其施諸家者亦畧可睹矣都督沈紫江生墓碑記沈氏世官奉議衛其先臨淮人也有諱葆者高皇帝時以功授湖廣蘄州衛指揮同知改廣西馴象衛葆傳子忠調奉議衛景㤗間遷奉議衛扵貴縣扵是沈氏家貴縣忠三傳至錠皆世官錠以功陞指揮使子瑛襲指揮使娶扵鮑生公公既貴而贈祖父皆都指揮同知祖母母皆夫人公名希儀字唐佐以生時紫水出故號紫江自少英氣磊磊雄膽畧廣俗尚弩而公獨精􅃓射能挽強命中正德三年襲指揮使年十八掌衛印八年剿木頭十二年征永安剿陳村所至常先大軍摧鋒毒弩中膊中股陞都指揮僉事十四年征府江剿滑石殱之奪還賊所鹵掠剿義寕桑江杉木諸巢深入親斬大酋一人首虜多礧中其顚十五年征古田先登奪隘爲多陞都指揮同知掌司印嘉靖五年剿龍山深入是年田酋猛叛五哨進兵公自請當中哨奪其隘而濳結猛婦翁歸順知州璋使内間猛以走死田州平公最巳而追殺猛弟禮于陣跌馬折左脇骨六年陞思田叅將七年剿落春首虜多八年調栁慶叅將居二年謝病明年而復爲栁慶叅將帶鏢佩弩箐棧聮絡環廣右而巢者以千數栁慶最勁小刼大掠燒城掊庫無月不有廓清爲難擅地擁兵殺生恣睢環兩江而州府者以百數右江最勁喜人怒獸􅈼黨闘讐無歳不有鈐轄爲難公御諸猺蕩巢摧壁不專以威綏輯善猺視同吾人是以諸猺畏而信公御􅁟酋解紛排難不專以恩洞其隂事坐獖其牙是以􅁟酋睦而懼然則世雄之與烏合情狀各異攻心之與奪氣變化亦殊猺賊慮其散走聚其黨而獵之則公之所以殱渌里也􅁟酋慮其藪衆散其黨而􅀌之則公之所以縳岑金也在栁慶先後十三年所剿皂嶺懷縳三層馬峽火黄馬輦七山曇􅀿諸谿峝凡五十餘所􅀗覃韋鄧雷諸大姓渠帥或馘或磔或剜目截耳縱之凡數十人首虜積至五千餘級身爲大將常先登散家財爲賞得狼兵死力尤善用諜兵行所向雖肘腋不得先聞或已傅賊壘賊尚醉酒􅋜寢其入巢未嘗妄殺是以動輙成功栁人德之比扵山都督雲爲木主而生祀之以配扵雲祠十九年復謝病二十年起爲都督僉事總兵貴州居二年謝病歸二十二年北虜大入􅁁召天下名將至京師公在召中而佐戎事扵宣大遂總兵江淮二十五年調總兵廣西公爲叅將嘗奏言扵朝曰狼兵亦猺獞也猺獞所在爲賊而狼兵死不敢爲賊者非狼兵之順而猺獞之逆其所措置之􅀔則然也狼兵地􅊢之土官而猺獞地􅊢之流官土官法嚴足以制狼兵流官􅀔輕不能制猺獞莫􅀂割猺獞地分􅊢之旁近土官得古以夷治夷之䇿可使猺獞皆爲狼兵矣或慮土官地大則益難制土官富貴巳極自以如天之福􅀔不敢有他望又耽戀巢穴非能爲變即使爲變及其萌芽圖之易也且夫土官之能用其衆者􅀝國家之力也不然肘腋姻黨皆勍敵矣國家之力足以制土官土官之力足以制猺獞臂指之􅀔成則兩廣永無盗賊其論甚偉然世莫之能用也公善揣事情練扵當世大計然世獨以能將知公公爲將其竒䇿逺算世亦不盡知然世獨以膽勇敢戰知公耳􅀄田猛既誅督府議設流官公曰必且挾思恩爲變矣十八年立堡弩灘以控峽賊公曰賊據其險我乗其衝此與投肉虎口何異後皆如所料公既連爲賊所中每隂雨輙痛自爲叅將數以病告製道冠山人服治生墓而時徃㳺焉自江淮徙廣右也以書來請余記余復扵公曰古之爲將者據鞍矍鑠至老不敢言疲􅀂乃自爲塋竁卧而飲酒此山澤自放者之所爲也二者甚不兩得而公乃欲兼之耶雖然公之志則逺矣公爲人精悍其臨敵目光逆射兩顴頳色挺刀一呼人馬辟易其平居嬉怡謔笑􅆇􅀗輿庖無不歡然處族人雖讐至相賊殺不記更厚施之與人交重然諾腸胃如􅀡繩一視可盡至扵臨敵􅀿機腹裏谿谷飛箝網絡神􅀑不能測或誚公譎公曰吾譎賊耳非譎人也知公者以爲然配帥夫人子三長學有父風其次覺次黌俱業儒所治生墓在貴縣城北其地曰廖家井南望渌里北睇龍山左黔右欝兩江縈紆皆公􅇮所揮戈斬級處異日有過公墓者得母慨然而思乎且夫古者人君尊寵立功之臣則或爲之象祁連山象鐡山扵其墓以旌其烈扵不朽公平諸猺靖廣右猺中多大山則宜何象然天子方且鞭撻四夷以大事推轂公公所建立計不止西南一陲也其所象盖未定云指揮僉事湯雪江墓碑銘雪江公既葬之八年有子慶總兵江淮以平海寇功陞都督府署都督同知乃追念先烈將􅀣碑扵公之墓而請文扵余余觀古者人臣有崇勲殊閥則上之人爲之􅐌述其祖先功德而錫之廟噐以彰其世美􅀂古江漢之詩而子孫􅀣有勲閥則亦歸美于其先而爲之銘于彛噐以著于世􅀂古鐘􅂦敦匜之銘而詩與銘又必託之一時文人史氏􅀂吉甫諸人故其文辭與功烈相炳耀不朽今都督所􅀣立既無愧古者經營江漢之績其􅀣碑勒銘亦正與古鐘􅂦之誼相􅀿而余雖嘗職太史然才下不逮古之能爲詩與銘者逺甚其何以彰雪江公之美而稱都督顯􅀭之至意扵是強爲之序而銘之序曰雪江公諱寳字天貴姓湯氏其先有諱忠者爲東甌㐮武王諱和之弟㐮武以故人從高皇帝起滁陽下江東舉甌閩蜀北定中原爲佐命首功忠以諸弟給事幕下摧鋒䧟堅與有勞績累官至錦衣衛指揮僉事改榆林衛再改邳州衛忠生敏敏生鏞鏞生琥皆世其官琥生公自忠至公凡五世公貌魁岸雅好文藝習􅀐射既授任恭謹自將嘗督餉運㢘平敏事漕運都御史總兵官交薦之選掌軍政正德間流賊爲患淮以北諸郡騷動公始屯兵扵外以保兩河既賊大舉來寇公乃移兵入城與知州僇力繕守未幾賊徑由城北渡河去尋有􅀐至城下呼曰我從虜某也願乞降公因詰之曰賊何爲去曰昨賊首劉六令諸營曰邳無輕犯邳帥謀勇紀律整嚴其下必有敢死用命者遂宵遁公辛苦四載卒完􅀌城以抗劇賊邳人至今頌之撫按連䟽其功能將擬擢用甫四十公即引退曰人生貴適志何自苦爲也扁其軒曰白醉亭曰習静以見志公慷慨好振人之急有同官移用庫銀數百兩時宦瑾法酷度不能還欲自斃公爲賣産完之劉馬荘賊起公與千戸張虎分兵出捕忽報賊至馬頭爲虎信地公即脫所披甲與之比虎與賊戰數􅀍箭頼甲厚以免嘗以事之江東聞史癡者能詩􅀞善詼諧夜造其門時盛暑癡散髪披􅁭而出握手懽甚紿之舟中載至邳數月而返公本將家子當其擐甲躍馬􅂡髯奮張可謂雄勇其興致所至乃絶與騷人逸士號爲清狂者相􅀋􅀂此公卒云云始都督爲儀真守備時數以身搏賊軍中服其膽勇余亦素知其爲人巳亥歳余赴京師過邳都督飲余沂水之曲酒酣余戯之曰將軍得無有生之心乎都督慷慨奮言曰幸􅀩國恩更得待罪行間敢不盡死予益壮之及海上捷至以爲不􅀒其志也湯氏本鳯陽人逺祖皆葬鳯陽自忠以下乃葬邳之半戈山公從葬其兆先是天子續東甌之后封靈壁侯而都督又適有成功嗚呼其㐮武之遺烈也哉銘曰桓桓東甌開國扵信帶礪是崇有弟曰忠亦爵扵武是爲小宗蝥弧大纛五世五傳以及扵公保障扵邳有寇草􅀼既乗其墉渠帥愕眙曰有人焉竟不敢攻四十而退逍遥文墨牖下以終繄公有子既生代公而才且雄分閫扵真遂移金山賊無堅鋒時維嘉靖十有九年寇亂海東妖氛狼藉海上諸城晝閉不通帝命都督爾習于海爾維總戎樓船一麾鯨鯢遂戮都督之功人亦有言公侯數世必復其終在昔東甌縳彼方氏亦扵海中扵維都督􅀣績扵海東甌是同稽古有銘勒此豐碑告成扵宗太史作辭以配江漢昭示無窮儀賔李公墓志銘儀賔江陵李公卒扵嘉靖甲午九月某日年七十有七先是公之配隆中縣主薨賜葬扵江陵城東東湖之原垂三十有八年而公卒遂以卒之明年乙未月日合葬焉自公卒至葬天子賜祭二壇扵是公之子中孚等圖所以昭寵命謂銘不可非其人既葬乆之乃以屬其友唐順之追爲之銘順之謹按公諱麟字􅀿禎號西藪曾祖璋祖灝皆不仕至公父愷始以鄉貢士知永新有惠政遷吉安府同知公生而岐嶷既長頎而髯讀書善悟解洞扵聲律尤工字書得子昂體是時遼沅陵昭安王以高皇帝曾孫遼簡王孫封沅陵屬近而􅀔尊其女欲得佳壻壻之及見公喜曰吾壻如李生可矣其女者所謂隆中縣主也以是奏授公亞中大夫爲儀賔歳禄四百石公本儒家子既爲王族館甥又清以閒而公性故坦率一切不營營扵産至扵聲色狗馬馳騁凡諸紈綺貴戚素態又公所不好既清且閑而又無外累與他好是以能㳺心扵載籍或登高賦詩把筆肆書奕棋飲酒清談酣笑睥睨宇宙逍遥人世之外以極騷人逸士之樂而翺翔扵諸王孫與鄉里􅂄舊之間以此適其志而終乎其身盖自諸史百家星官堪輿道書釋經下至稗官小􅀃皆能陟其津涯而􅀤之詩歌清逺颯爽􅀋其爲人有集􅀂干卷嗚呼公在貴戚中其所謂翩翩者歟公淡泊扵財且素長者不猜逆人人或持劵貸之不問其能償與否輙與卒多爲所􅀒不計也有持劵來者又輙與如􅀄故多貲以是後乃落莫矣亦無介扵心顧謂諸子曰汝兄弟不自􅀣立多金何益後諸子皆力學爲儒者而長子中孚以進士今爲府同知中孚前時推官鎮江公來鎮江視中孚所爲皆當公意飄然遂歸中孚爲推官用㢘能徴以例出爲今官其所􅀣立未艾也人謂公固宜有後云三子中孚其長也次中立次中行皆爲邑庠生女六人皆嫁爲士人妻􅀄隆中縣主惟一女而三子五女皆出􅁇室謝孺人而孺人亦卒扵公卒之後三年始公在孕時母史夢有麟􅂁乗白馬造門者吉安公竒之遂以􅀿禎名公而字之夢麟後值沅陵王不喜二名則請易置公之名字而去其字之上字以爲名今名與字是也始者夢耳然公果麟􅂁白馬爲貴人者五十餘年噫亦異矣銘曰在漢尚主列侯之尊爰及後世多取清門雖盛貌選亦以材授磊磊李公少敏而秀遂以韋帶作合椒房惟帝展親用錫金章雖則金章而不官守奕棋賦詩此外何有後有令子官扵潤州公來自西順江而流潤人迎公再拜稽首曰此鉅人吾侯之父昔公在孕吉夢是逢究公所歴正如夢中誰云儒者未嘗語恠視履考祥太史銘在重刋荆川先生文集卷之十四
