body:
  text: 庚子歲海印寺再舉同年㑹紀事四首此下係春坊時作伐木張新燕攀鱗憶往時重來散花處更是聚星期玉佩皆鵷侣金河即鳳池獨憐丘壑質還復接芳儀淨院早凉生佳賔四座傾花間重識面塔裏舊題名對酒憐萍跡聞歌想鹿鳴十年還此㑹那得更無情故遊經繡陌初地入松扉可那看花伴年年漸覺稀一鐘收宿雨雙樹帶餘暉若問龍池劫誰能不醉歸梵宫鄰帝苑長此集儒紳檻外諸天界尊前四海人星霜别後鬢花月向來春且共攄籌策雲臺早致身得薛君所寄三逰紀興刻中有楊方洲見懐之作葢别去已十餘年矣撫巻慨然用韻奉答昔抗萬言疏還歸四壁居誼才應共惜黯戅更無如顧爾猶巖壑慚予濫石渠聖明思直諌早晩下徵書送黄翠巖赴松江推官任君本儒家子新詩更出竒自宜金馬署暫拜爽鳩司海國收魚稻桑田賦繭絲南州饒土物知爾一無私送沈君守寧波五馬去䟃􅑗孤城積水含地收蚶蛤税人與龍蛇參夷貢珠頻入僊書穴可探清貧君已慣海味不須甘送陸舍人調遼府長史十載紫薇郎長隨玉輦傍忽辭漢天子去謁諸侯王夢渚陪游獵蘭臺佐羽觴子虛今在楚作賦有輝光送王舍人往崑山為顧相公營墓明主敦耆老藏山借寵恩使臣出左掖秘器給東園舊路吳中樹新碑海上原平津衆賔客試問幾人存聞石屋彭君置生棺有感為賦四詩青山結净因囘首跡俱陳司馬四壁宅榮期百歲身文犧幸知免行蟻待相親試料還真後誰為倚户人隱几嗒然安疑君是鶡冠道書肘後繫人世鏡中看家本無千橘生常卧一棺不因兹下淚任爾雍門彈苦欲辭簪紱歸來掩故園無過六百石只對五千言倚樹看蜩化逢人笑舌存老龍且莫去為我發狂論吾與爾皆夢相看一笑時拘拘亦何惡役役尚如斯藂桂山中約枯槎海上期胡為更羈緤有愧故人知寺中訪後渠崔侍郎不遇次韻為訪高人館聯鑣出近坰並從金地入不見玉山形榻尚留僊麈雲疑隔使星無人問竒字載酒只空亭濟上别錢副使木落村逾迥洲迴水更包亂泉舂急峽短日漾寒郊問俗非吾土逢君似舊交笑談方此始何事又相抛㸃蒼山歌贈雪屏趙考功㸃蒼山十九峰峰峰巧削玉芙蓉炎天赤日雪不融峰頂湧出十九泉一峰一泉相縈纏流到峰前共一川雪花亂落緑波裏疊島連洲鏡中起是為巨海名西洱䝉舍當年控百蠻山水中間鑿兩闗一夫守此百不攀聖代垂裳九夷附此地千秋罷烽戍洱海行人日夜渡剪除蓬藋疏街衢歌鍾綺衣盈路隅昔日不毛今雄都山中雞犬散不取山下烏蠻種禾黍况乃儒風似鄒魯紛紛犀象走王庭怪石亦具山水形盡輦中州作畫屏羡君結廬山之窟窓裏諸峰互出没夜夜讀書常映雪十年簪笏繫朝班位髙官要身不閒惟有清夢到故山余亦平生好竒者一説名山心若洒何時與君共坐雪峰下李中麓文選藏書歌中麓子最好竒平生苦心只自知破塜將尋姬氏籍鑿山欲出禹王碑鳥篆蚪文焚後字白雲黄竹刪前詩藏在隂厓及海窟神物守護誰得窺自從掇取歸君屋但聞胡山鬼夜哭汗牛詎止盈五車插架應知滿萬軸開函几席生雲煙五色紛紛耀人目家中綾綺割截盡更剪朝衣作裝束中麓子幾歲讀書長閉門自信中郎能一目還輕左氏識三墳邇來下筆作詞賦絶似先年石鼓文却憶射策來京國此時才士紛如雲雕龍白馬爭先後一日逢君皆閉口試問豹鼠君已知解對黄熊誰更有共看飛騰邁等倫早排閶闔上麒麟遂令紈袴生嘆息公卿元是讀書人老大無聞予自憐論交多愧十年前可道壯心猶未已時復從君乞一編詹府讌集奉和上宰松臯公三首祥光虹渚應𤣥蒼喜溢仙曹薦羽觴匕鬯萬年徵子聖股肱一德見臣良袖携香霧東華上履曵星辰北斗旁共説疑丞歸大老競將禮樂贊靈昌御苑先春萬木蒼宫雲裊裊度瓊觴鵷班並引金貂貴鴻羽全收玉署良分日傳經清禁裏罷朝起草紫宸旁恩波忝竊安能報願祝千秋寳厯昌玉津晴望鬱蒼蒼環珮初臨試紫觴並向鳳池開勝㑹早從麟角識元良衣冠迥出商巖上雨露偏承幼海旁自愧承華箴未就謬將彤管奉明昌送王翰林浙江兵備副使同時詞客不如君一劍還將静海濆雞舌舊從香署吏虎符新領伏波軍帆檣萬里輸鮫織樓閣三秋吐蜃雲自笑馮郎將白首欲從幕下策竒勲送鄒東郭掌南院最憐江左風流地暫作周南太史公通籍總稱鸞掖吏分曹獨向鳳臺東香携漢署沾新綬花近秦淮瞰故宫此去談經門下客幾人相對坐春風贈吳山人歸自京師山人不解機心事早歲藏珍學鹿門住傍巖崖惟四壁賦成金石幾千言偶遊卿相多懸榻歸去蓬蒿正滿園京洛豈無知己在看君終是厭煩喧贈許太宰卿家勲貴似諸袁兩世三登八座尊接席貂蟬開甲第成隂桃李在公門身延白屋頻推哺官借青宫獨拜恩天子行將問黄髪老臣何以贊嘉言宿雙塔寺林東城羅念菴誤於郭外相尋不遇有作見寄用韻奉答謾向金門學隱淪獨遊花院散凉氛諸天只在人間世並馬誰尋野外雲白日金輪臨户映香街笙管隔墻分化城本是迷來路莫訝幽人好避羣次韻贈湯將軍將軍故中山侯之孫也將軍妙筭古人同料敵常如在目中銕騎連營寒映月樓船跨海夜乘風玉門烽火今猶急桂嶺珠璣久未通却笑封侯應有種看君百戰立竒功荆川集巻二欽定四庫全書荊川集巻三明唐順之撰詩自述此下係後家居時作祗為抽簪早歸來已四春本非食肉相猶是飯牛身負郭無新業灌園有舊鄰磯邊獨釣客隴上偶耕人相見一相笑吾今罷問津宿游塘書懐二首脉脉常多病睢睢竟寡諧鷽鳩知分量槁木任形骸蟲語喧清夜藤花媚小齋逃虚何足嘆心迹幸無乖雨過草木好夜來池館清露蟲疑燭影風樹答書聲似瓠甘無用為羶厭有名且師河上叟毋使慮營營題陳渡莊經時不到此花落徧庭蕪開館猶如客憑軒忽䘮吾蝶飛看栩栩鳥喚聽烏烏便欲題丘壑於今總姓愚㞯亭遇盗次韻枕書覺已倦挺劎忽相求驚起游仙夢虚疑賈客舟齎糧十日少載槖一身浮澹泊堪為笑將何謝爾偷病中試新茶久不窺園圃多應徧落花生涯只本草歲月又新茶婚嫁身多債詩書眼尚遮病來都忘却恰似老僧伽泊舟郭外有感時旱灾甚愁多畨夜短村郭又雞鳴更聽鄰舟語行看海日生新秋河漢影竟夕桔橰聲誰能訟風伯一使甘霖傾同褚生滔徐生大復夜過城濠水榭作二首出郭即山家孤亭更水涯人開池上酌蓮吐月中花清籟微微至明河漸漸斜坐疑塵世隔雞犬亦無譁祗堪成獨往詎意得同羣柳色秋將近烏啼夜欲分細吟西澗草閒誦北山文縱然逢醉尉不是故將軍時居人有訶問者游永慶寺示諸友村墟正三月春服領春風飛鳥機心外青天佛眼中觀心猶是障齊物亦非同何處叅真訣顔生昔屢空題金山寺付僧惠傑四首何處尋龍藏停橈聽梵音中流一塔影逺樹萬家隂僧定潮來去月明江淺深試將空水相堪比慧公心隱隱帆檣外分明見法幢川光孤斷石井脉割寒江折葦僧歸渡觀潮客倚窓一窺龍女偈坐使戰心降憑虚聊騁望面面荻蘆秋坐據三生石心隨萬里流黿鼉争出没樓館定沉浮向夕煙氛歛珠光似可求法界元無著寥寥空水雲鐘聲潮外住佛相鏡中分經為魚龍設人將鸛鶴羣慈航如可借不厭往來勤登常山山亭次壁間韻二首關通百粤㑹地帶上游雄車馬年年客塵埃滚滚中憂時譏喪狗逃世托㝠鴻出處將誰是徒令懐古風平生好竒士撫景氣還雄棧度盤蛇際灘行磨蟻中客心南北水世事去來鴻聞説仙山近泠然欲馭風過清溪莊值主人不在岸岸夾叢竹清溪幾許深君從城市隱余向碧山尋翳翳孤村景刁刁衆木吟還看題壁字想見閉闗心題清溪莊三首贈顧副使阮生常避俗平子正歸田種秫供生事為樓佇列仙沙行隨鷺跡湖泛趂漁船月下聞髙咏應多感興篇城郭往來久獨憐湖上居素封千樹橘白首一牀書山客秋分蜜溪甿夜捕魚横金豈不貴此樂復何如地即梁鴻宅溪連范蠡湖霜天榮橘柚秋水戲鷗鳬從宦元非巧名丘亦是愚欣君遂始願遶屋樹枌榆贈王山人自笑久磷緇還真已是遲偶尋赤松子更結白雲期短褐身將老微言世莫知吾生同智北從此問無為贈山隂陳千户病卧毘陵三首陳故毘陵人也問子來何處云從剡水隂越吟多病客吳語故鄉心尺牘人爭羡一言余所欽由來絶絃意今日為知音到處能驚座知君是姓陳小言工作賦大隱不違親倒篋酬寒士投書絶貴人吾將從汝去共醉若耶春髙牙將門子何事老蓬蒿坦蕩從吾好浮沉任所遭行窮五名岳家住一漁舠尚覺雄心在逢人脱寳刀周蓮渠以詩問病次韻詩書能作祟齒髪自多愁且效漆園放還同蓮社投樗材非世用藥石拙身謀脉脉淹時序空貽知己憂載疊前韻二首贈蓮渠十年不入市一飲復何愁秘籙時堪展華簪久已投只有歸田賦曽無問舍謀營營憐俗子得失盡成憂字許門生問詩從海上求養真人伴鶴寄傲屋如舟得喪驚蕉夢榮華覺梗浮邑中有耆舊應使俗回偷贈郡倅綱運之子從王事秋江曉問津泛舟千里役行篋一官貧淮海雄畿服瑶琨貢國珍聖明如有問正可繪流民時江南旱甚送人赴真定幕幕下繡鞍來滹沱冰未開股肱稱大郡帷幄選名才鴈起分秦塞雀棲辨魏臺雲山自可樂况得庾公陪贈馮午山提學吳俗今應變楚材昔共聞試看鑄人術豈尚雕蟲文驄馬迴江樹絃歌散海雲史書徵德化更是一馮君漢史大馮君小馮君政如魯衛德化均贈吳賔湖幽棲謝俗客相對只清湖野服裁芳芰時蔬剪緑蒲行吟向漁父著論比潛夫前洲雙白鳥識得主人無題徐君淵泉號磊磊長髯客人間久避名獨因南澗賞遂與北山盟流處玉琴響繞來茅屋清風流堪此地今古一徐生贈王思東號王君祖為中舍以兹百年感東望一欷歔氏族王孫後弓裘世澤餘時攀臯上樹獨對齋中書尚説傳竒字知君辯魯魚贈熊南沙郡倅入賀萬夀節三首去去朝元使先年漢署郎遥將華封祝再惹御爐香近侍陳鴻寳仙人捧御床試看舊朋輩多在珥貂行畫省何年别頻驚江上楓因兹萬里㑹還向五雲宫恩承天語潤班許近臣同自信真心在羞言藉子公一朝辭寵辱終歲事沉冥只可羣麋鹿那能出户庭北邊頻候月南紀正占星時火守斗長策須君輩將何獻帝庭壬子陸生南陽褚生滔赴試與之叙别不覺坐至夜分因作二首齒長愧一日經傳在兩生攝衣常共席連茹亦同征夜露澄杯氣秋河澹月明忘言吾已久欵欵見深情汩没嗟來久前儒與後生争矜腐鼠得誰逐冥鴻征黙坐蛩秋語窺書螢夜明舊游看籍湜應悉此時情韓子云籍湜輩屢指教能不叛去否常山懐羅念菴本為窮幽賞非因避世氛鄉心吳水盡客路粤山分名姓休相問漁樵久作羣忽思鸞掖侣日暮倚停雲夀詩早謝浮名絆生涯常宴如春來江上棹老去枕中書東郭閒居慣南榮世慮疎看君足道貌自與俗人殊董進齋夀詩自愛懸車早經今十歲餘薄逰滄海客大隱市城居坐閲人間世時翻肘後書里中問耆舊羡爾更誰如蔡南村夀詩蔡泰伯里人瀛之父我識南村叟臞然一逸民卜居三讓里擊壤百年身城府入來少桑麻樂處真一經今有子環堵豈嫌貧夀王生革母之子門生秀傳經契獨深還因飲冰志更識和丸心貧供江水饌詩獻柏舟吟古來推善養尹母復如今夀慕菴六十皚之父家世法真餘清名人不如髙年推亥字大隱寄廛居逸客閒相過機心老更疎多君能教子餘慶在詩書贈徐學琴六十大復之父改歲周正月推年絳老人山田新刈秫茅屋久藏珍白雪絃中意青衫物外身贏金亦何羡有子不為貧題孤山林隱居祠二首孤山春欲半猶及見梅花笑踏王孫草言尋處士家塵心瑩水鏡野服映山霞岩壑長如此榮名豈足誇碧水年年色幽人復此遊不因同所好那得獨相求山鳥矜春語湖煙淡夕流思君忽自笑信矣一生浮岳將軍墓國恥猶未雪身危亦自甘九原人不返萬壑氣長寒豈恨藏弓早終知借劍難吾生非壯士於此髪衝冠吳江三忠祠祠在太湖東畔三忠伍太宰張睢陽岳武穆也廟枕洞庭波招魂薦楚歌靈風鼠雀避落日鹿麋過東國終為沼南兵不渡河江淮形勝地保障近如何一日屬鏤賜千年墓檟秋死應為厲鬼􅀾豈覔封侯吳越車書混江淮戰伐休幸逢全盛世此地弄扁舟松闗蠡南雜詩為吳頥山副使作月出照松闗松隂正滿地恐有山僧歸終夜不須閉梅塢層冰結平川積雪埋髙樹無處寄幽情但到梅花塢筠徑面面隔深竹茅齋在何處遥聞犬吠聲試從此路去石丈自是太古人一身衣百草年年只在山憐爾亦枯槁蒼翠亭風來松濤生風去松濤罷雖非叅禪客暫此學觀化㑹逺樓層樓對迴溪溪邊草新緑不是傷春人聊騁千里目元陽洞混沌遇儵忽誤被鑿一竅寄語談𤣥人此中可觀妙小虹橋採花與汲澗幽事俱在山朝向橋上去暮向橋上還迎仙館空齋寂無人草木自森蔚不因羽客逰安得有雲氣禮星臺昔在明光宫日侍北斗傍此時卧空谷頻望北斗光靈芬精舍山人愛長生辟穀亦云久何以濟朝饑紫芝大如手山田從横亂峰裏忽此見平田不須抱甕汲自有峰頂泉山池百泉自奔注更不費疏鑿雨歇天氣清臨池看洗鶴茅亭孤亭簇羣岫宴坐増悄然主人何所作多應草太𤣥良友軒竹里中耆舊多談笑毎相聚日暮各自歸此君獨不去聽鶯閣春催金谷曉一望百花齊不作遼西夢從渠著意啼己酉八月十八日觀潮作秋空忽爾色黯黲萬竅怒號山震盪冥冥混沌一氣來游人共指潮頭上初時映海色尚微及至摧山力漸壯澒洞吳越懼一壑幻戲人獸驚殊狀滿空煙霧走玉龍萬里川源豗白象雷鼔鞺鞳馮夷舞日車出没鮫綃漾海神珍寳不自惜歲與江妃一相餉須臾漲盡勢稍歇依然宇宙囘清亮昔人説此已愈疾何况臨流恣疎放賀金翁夫婦雙夀詩翁舉人子韶庠生子聲之父也金家兄弟早空羣倚馬便作萬言文玉樹輝輝照前後弱冠英名在人口黌舍同逰愧我先相見毎稱吾小友曽説而翁好避喧隱身西郭如鄉村一生愛誦逺公偈累歲不識縣令門夫婦齊年人共羡九月開筵對歸鴈請看二子接翅飛好將文繡作斑衣題贈喬僉事兼為乃翁封君夀使君昂藏闗西客弱冠聲名已籍籍著書毎欲凖盤誥作賦時能擲金石為郎幾歲歴金華還聞建節度褒斜錦水秋霜看避馬杜陵春草正思家君家住近谷口東而翁亦有子真風游宦勿言親舍逺金牛元自接秦中希周兄八十三十年前事未遥兄時鄉杖我垂髫豈識負劍從長者惟解戲雞逐馬誇輕蹻三十年後事已更驚看鏡裏白髭生問兄何為却少壯應是黄金鑄已成題偶耕書屋送謝右溪西歸兼柬左溪長君昔挂西曹冠青楓漠漠滄江寒少君復謝薇省吏身世飄颻忽如棄歸來對坐四壁居篋中一巻種樹書誰言丘壑足枯槁折腰昔日今何如五月黄梅雨茅屋麥苗滿田蠶上簇童稚欣欣笑相語但免饑寒百事足吳國樗生少好游三仕無成感四休已道栖栖非我事將從沮溺問良謀題夏中書畫竹古來畫竹多少人葉葉枝枝輳成幅獨有中書似老文解道胸中有成竹辛苦欲得此君意屢歲清齋斷葷肉偶然興到始一灑萬壑寒聲忽滿屋秋殺春生併一時幾株抽葉幾株秃披紛蛇蠖爭屈伸數寸已覺千尋足中書醉墨滿人間此幅風神更不俗勸君風雨好收拾葛陂恐與蛟龍逐卓小仙草書歌莆守寄我卓仙書北窓閒佇時玩展吳人本慣見龍蛇對此真形驚走轉環譎東海黄公符蒼古太廟姬王瑑曲處素娥欹舞腰勁來壯夫摐狼銑藤纏老樹千尺挂鷹攫寒厓百鳥愞已覺人間出草聖却訝空中墮雲篆古來草聖誰擅塲酒旭僧素頗中選漏痕釵股那足竒脱帽露頂定漫衍雖然奔放不可羈筆墨蹊徑未盡遣傳聞卓仙形貌異蓬頭濶口足爪跣胸中光怪秘不得漏洩機緘在此巻軒轅道士罵俗書寫出靈文世不辨卓仙作字不用手唐生識字亦非眼説到手眼兩忘處作者識者俱一莞幾時杖策入武夷試問仙郎叩金簡楊教師鎗歌老楊自是闗東客短衣長軀棗紅面千里随身丈八矛到處尋人鬭輕健謂余儒生頗好武一揖滚滚發雄辨坐驚平地起波濤蠕蠕龍蛇手中現撥開雙龍分海嬉攢簇兩蛇合穴戰爭先儘教使機闗縮退誰知賣破綻目上中眉左傳事猶自哂綿中裹銕那能見滿身護著不通風百步攛來激流電飛上落下九㸃丸放去收回一條線問君何為技至此使我憑軒神􅀈眩答言少小傳授時五步七步畫地踐邇來操弄三十年渾身化作枯樹簳心却忘手手忘鎗眼前只見天花旋乃知熟處是通神解牛斲輪安足羡因君亦解草書訣君鎗豈讓公孫劍古鏡歌瞿翰林來自汴西亭王孫寄此美人昔日開匣時兩面含嬌自矜戲一朝委世抛珠玉獨殉此物不忍離埋没土中幾何年大塊為工再鑪鞴砂精汞火日夜蒸噴作丹朱滿身痣中凝一㸃秋露珠宿世銅胎盡銷棄有如錬骨老臞仙血肉都捐祗靈氣神物安能久藏匿化作白蜺躍出地銀鏤細細髲髢縈𤓰皮津津流水漬山人何處得此寳王孫逺自夷門寄良工為我重開闢一鈎剖出千齡閟初時混沌蟠𤣥黄倐忽晦明分面背清輝逼人心髓寒驚詫蟾蜍墮簷際却憶朝朝鏡裏人已謂衰容止如是今朝覽鏡咄自驚短髪絲絲見凋敝濕灰餘色轉分明皺縠新紋大髣髴雲臺勲業已如夢名山著書安可冀本欣始識真面目囘首壯心一憔悴照罷還如未照時好醜依然都不記峩􅔞道人拳歌浮屠善幻多技能少林拳法世罕有道人更自出新竒乃是深山白猿授是日茆堂秋氣髙霜薄風微静枯柳忽然竪髪一頓足崖石迸裂驚砂走去來星女擲靈梭夭矯天魔翻翠袖舑舕含沙鬼戲人髬䰄磨牙贙捕獸形人自詫我無形或將跟絓示之肘險中呈巧衆盡驚拙裏藏機人莫究漢京尋橦未趫㨗海國眩人空抖擻畨身直指日車停縮首斜鑽鍼眼透百折連腰盡無骨一撒通身皆是手猶言技癢試賈勇低蹲更作獅子吼興䦨顧影却自惜肯使天機俱洩漏餘竒未竟已收場鼻息無聲神氣守道人變化固不測跳上蒲團如木偶日本刀歌有客贈我日本刀魚鬚作靶青絲綆重重碧海浮渡來身上龍文雜藻荇悵然提刀起四顧白日髙髙天冏冏毛髪凛冽生雞皮坐失炎蒸日方永聞道倭夷初鑄成幾歲埋藏擲深井日淘月煉火氣
