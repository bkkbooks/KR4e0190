body:
  text: 墓表春坊中允方泉李君墓表方泉李君既卒其父推官公謂余與君同寮相好也以書來請余表君之墓君姓李氏諱學詩字正夫世為萊州府平度州人大父諱琮父推官公慧也生二子而君為長君少頴異沈静治經通尚書乙酉秋郡守李君霆夢桃花洞中一少年得雋已而君中試君結廬讀書處則桃花洞之麓也丙戌第進士為永平府推官法麗於情數决滯獄三年以薦召入為稽勲司主事頃之陞考功司員外郎會朝覲考察君與有司佐其長僚黜陟用精已而調文選員外郎君之在考功也而余亦入為考功主事始與君相識君為人豐肉踈眉目進止雍容與人接婉婉若處女腹中坦坦不蓄鱗甲以此能在處協于僚友間其治獄也未嘗以鉤距為巧其考課也未嘗以按吏為功是時都御史王浚川公有物望不輕一言假人自君為諸生而浚川公為提學則己竒君後君居吏部浚川公熟視君益以為逺器數言於諸公卿間諸公卿自是知君亦以為逺器也君居閒獨喜為詩然在衆中絶口未嘗言詩其自晦多如是在文選未幾改官為翰林院編修頃之丁母楊宜人憂既葬廬於墓側産芝三本髙尺許然君不自以為瑞而亦不言於人服除赴官戊戌春同考會試事己亥東朝建君拜左春坊左中允兼翰林院修撰未幾充經筵講官庚子秋主順天府鄉試踰年以病卒嘉靖辛丑六月某日也年三十有九君之入翰林也是時與君同入先後十有一人皆取之科道與諸部屬而君與余則皆自吏部入居二年余罷歸而編修鄞陳君束出為按察僉事是年編修山陽盧君淮卒明年修撰東平王君汝孝出為按察副使又三年余起為春坊司諫是年中允閩陳君節之卒明年陳君束以副使卒是年余再罷歸明年而君又卒嗚呼維昔官翰林者進士髙甲與庶吉士兩塗而已今天子在位以為此不足以博求碩士遂改其制癸巳之歲乃得君等十有一人於是此十有一人者入則陪侍經幄退則校讐東觀景從響附人思自竭以報殊恩暇則相與接杯酒或限韻賦詩分曹壺奕或雜以詼諧嘲笑以極文儒墨士之樂于此之時彬彬雅雅争先恐後何其盛耶七八年間在鬼録者幾及其半出者罷者亦又幾人其尚在院者纔兩三人耳嗚呼何其有終之鮮與自古文儒之士委棄於草野者不少乃其間得自致於金馬玉堂之列以桀然自見其才者千百而一兩人耳其遇不可謂不幸天子度常格而用人亦冀以得魁梧瓌偉之雋蓋蒐於千百庶僚之中獲此數人其致之不可謂不艱而淪落銷歇若此其奄忽也豈非憐才者之所嘆與故為表君之墓而并名其人以志余之所感云户部主事陳君墓表嘉靖己丑歲吾郡之士同舉進士者凡八人于是此八人者得羣然咸聚於京師未幾則或去或留或去者復留而留者又踵以去其間得相聚京師者率不過四五人或三二人再不能及于八人之數而其後無錫張君舜舉與余相繼罷去則此八人之中罷其兩人其後江隂陳君又卒於京師此八人之中䘮其一人矣嗚呼是可嘆也憶昔此八人相與日夕具杯酒相歡笑此時固亦知其聚者終不能不散然殊不意其遽然遽散去猶冀且復聚縱使散去不復聚亦不意升沈存沒邈然分隔遽至於此然此猶七八年之間耳使更復此七八年或數十年則人事之錯迕消息愈益不齊而其聚散升沈存沒之感計亦不止如此而已嗚呼此可以知人生之若浮與天地之為逆旅矣而亦何恠其然也歟然方其聚也則為歡然以喜其散也則為之慨然以憶其罷而去也則或為之悵然以唁其沒而不可作也則或為之欷嘘流涕以悲亦有情者之所不能已歟然則子達之亡此七人者莫不悲焉而余獨有所深悲于子達者以子達有樸茂愿慤之質有務為君子之志而學未及充乎其質力未及竟乎其志非惟大官老壽限于命而不可得而問學事業之可以自致者亦若有所限焉而未究乎其止也此子達之所以為悲歟彼區區聚散升沈存沒之感固又不足較矣子達諱詞自號茶丘居士以進士授户部山東司主事歴官若干年而卒卒時年纔三十有六陳氏故饒於貲而君能刻苦自植立其在衆人中衣裳言貌絶不類紛華子弟而其在官絶不營營然廣交游借聲譽為富人事其為户部嘗監太倉軍儲又監淮安清江浦漕務最後撿校諸司章奏皆精鍊謹潔能于其官而君自少孤事其叔青田如事父之禮友其從兄子和如其親弟兄家之筦鑰一總于青田而君不知焉君出入必稟命于青田翁而後從事觀君之居家與其居官而予所稱君之質與其志大率可知也君始有二子而夭後君卒之八月其妻吳安人始生一子名之曰之才安人系出恭靖侯良之後有賢行而青田又為之綱紀于外其必能相與立孤以成君志也嗚呼陳氏之以善聞也乆矣而君父敔山公既舉於鄉又不顯以死至君且顯矣而天又嗇之固將以昌其後乎曩癸巳之歲余再官京師㑹君亦繼至于是所謂八人者獨余與君二人在京師後雖繼有至者又不乆以去而君與余至再更寒暑而後别且以余之迂戅無似幸不為此七人所棄斥而君尤若以余為可與者盖君於余交深而信篤如此君之沒余安得黙然無一言也君墓誌行狀既自屬于學士張公與户部主事曹君獨墓表未有所屬青田翁以請於余盖君未嘗有言而青田翁揣知君之意或在余也君世譜履歴則誌已詳故余獨序交游始終以道君之可悲者以揭于君之墓而又將以貽諸此六人者云都察院都事秦君墓表錫之言孝弟篤行有家法者必歸秦氏秦氏之先貞静先生諱旭隐居行誼既沒而鄉人私謚貞静先生以長子䕫官封中憲大夫然鄉人不稱其官而稱之曰貞静先生貞静次子永孚以孝子旌弟仲孚亦孝鄉人稱之曰雙孝秦氏君諱鏜字國和號類樗山人貞静先生之孫而孝子公之子也自少為邑諸生治所謂時文者最精每御史歲試諸生諸生心擬甲乙多目君君亦每自負及案出卒無前君者然六試於鄉而後第五試於㑹皆不第已而罷試家居若干年嘉靖辛丑即家授南京都察院都事以卒年七十有九君之罷試也以親老且病故竟二親死君亦遂不仕也曰吾禄不及吾親乃欲以衰年為子孫竊禄耶初孝子公事其父貞静與其母殷恭人惟其志而不忍傷至於刺血吮瘡不憚為之及君事孝子公一如其所以事貞静者其事母張孺人一如其所以事殷恭人者孝子公仁慈儉朴君為是羣下不輕鞭呵中堂無叱咤之聲平生自饗匕筯不出蔬豆之外懼少失孝子公意張孺人嘗病癱不能起又瘖不能言君以意揣其寒温飽饑而時食衣之便溺起坐必君自扶抱朝夕必侍如是者十九年雖女使亦不以屬然此蓋君之所謂孝者即甚勞勩亦不過乎煦愉抑搔人子之常事獨念君束髪即以文自奮人亦期君於當時所謂功名顯榮縱不有得于前必有得于後而君乃鋭然自割於强盛之年非孝愛純至一不中熱於世味有所不能是則難耳抑人亦有言子而仕雖有離憂樂也子而在側雖無離憂不樂也人情豈異是哉君乃能使其親忘乎人情之所樂而深樂乎人情之所不樂者其必有委曲感移乎親之心而人不能知是尤所以為難也君事寡姊曲有恩禮姊亦以節見旌君為人悃愊無表暴之飾然重節槩厲廉隅不妄交游不輕謁於有司君既自以詩書行誼守為家法於教子孫也尤篤子孫化之街衢之間褒衣矩步不問可知其為君家弟子庚子歲子涵孫禾舉於鄉癸夘孫梁又舉鄉之人不以子孫之堦於榮進為秦氏賀而以子孫恂恂謹讓守家法為秦氏賀也盖吾友施君子羽狀君之行而為之説以比於漢石氏其説然矣然石氏自建慶而下不再世孝謹遂衰豈非其質行有餘而詩書學問之澤不足以維持之耶有石氏之孝弟矣而又能從事乎齊魯諸儒之所謂文學者以益修乎其所未至則秦氏孝謹之風其將不衰矣乎余故因表君之墓而并書之以詔其後之人普安州判杭君墓表嗚呼是為吾友宜興杭君錫賢之墓杭君諱封錫賢其字號日惺布政澤西公之子都御史雙溪公之兄子也乙未歲余罷官歸客宜興寔館於君余性褊且戅在鄉曲孑孑不能與人為同然獨嘗心善君君自少以宦游子弟著文行其所結納多海内知名之士顧余何取然君與余獨深相好也以是于君乎館余所館距君所居五六十里君數數往来候余或相對一室講論經史或邀余游東西溪及銅官諸山所至輒盤桓竟日或相與賦詩為樂余是時居常以病謝客然於君之来未嘗不喜余於山水亦雅不甚好然於君之請未嘗不從與君處乆而益津津有味而亦益知君之為人君外和而中介其遇事小心能忍待人依於謙厚於好善尤篤甚於世之嗜勢利者其臭味苟同雖其四海九州之人君縱不能徧與之接然其心未嘗不慕而求之其臭味苟不同雖其里閈姻戚之人君縱强與之接然其心未嘗不踈而逺之其慕而求之也然未嘗翕翕以相驩其踈而逺之也然未嘗悻悻以相忤余以是益信君為長者余既居宜興兩年會有春坊司諫之命去如京師未幾君亦以選入就試北畿復得與君日夕往来如宜興時君居京師尤自守不妄與人交獨余所善吉水羅達夫富順熊叔仁平凉趙景仁君介余徧與之游甚狎至於大官勢人之門雖君力能自通然絶不往也始君少時從澤西公在京師學於翰林諸先生其為文有矩矱為縣諸生已能出名聲然數試不利後為太學生師事湛甘泉吕經野鄒東郭三先生三先生亦深器君君益思自奮及余與君會宜興則君年且五十矣而其氣不少衰時時作為文章包羅馳騁沛如也既試北畿又不利于是始就選有勸以賂者君艴然曰吾父吾叔並以直節蒞官吾縱不能似柰何以此為吾父吾叔羞竟不肯于是選普安州判官歸至淮病卒年五十有七自君在京師而余以狂言再謫為民君送我於崇文門外眤眤不能别且謂余曰君去吾亦歸矣與君結廬深山以老焉可也未幾而君竟死嗚呼余烏得無情哉乃為敘始終游從之故與君為人之大略而書之於其墓按察司照磨吳君墓表文字之變於今世極矣古者秉是非之公以榮辱其人故史與銘相並而行其異者史則美惡兼載銘則稱美而不稱惡美惡兼載則以善善為予以惡惡為奪予與奪並故其為教也章稱美而不稱惡則以得銘為予以不得銘為奪奪因予顯故其為教也㣲義主於兼載則雖家人里巷之碎事可以廣異聞者亦或採焉故其為體也不嫌於詳義主於兼美則非勞臣烈士之殊迹可以繫世風者率不列焉故其為體不嫌於簡是銘較之史猶嚴也後世史與銘皆非古矣而銘之濫且誣也尤甚漢蔡中郎以一代史才自負至其所為碑文則自以為多愧辭豈中郎知嚴於史而不知嚴於銘耶然則銘之不足據以輕重也在漢而已然今又何恠余兩為史官皆以不稱罷而姻戚閭里以其嘗職史故往往以銘辭見屬嗚呼試㸃檢前後所為銘其如中郎之愧辭者有之乎無也余進而位於朝不能信予奪於其史退而處於鄉不能信予奪於其銘是余罪也雖然予奪非余之所敢也是以欲絶筆於銘焉其或牽於一二親故之請有不能盡絶者則謹書其姓名里宦系世卒葬月日此外則不敢輕置一言雖不盡應古銘法亦庶幾從簡近古之意焉墓有銘有表表亦銘也今予所為表者是維按察司照磨吳君之墓據君之族孫進士禎所為状君諱文字從周號鯁齋世為無錫之閭江大父諱某云云君少讀書為邑諸生後援例入太學凡兩試不中第已而選福寧州幕官陞山東按察司照磨不赴任遂乞致仕家居凡幾年病脾一嵗卒嘉靖某年月日也年七十有五墓在閭江第二灣祖塋之次葬以卒之又明年某月某日將葬君之二子忞慰詣余請文而君族弟從夏實為之先二子且致君遺言曰吾死汝必於唐太史乞言焉從夏為吾母任宜人後母之弟其人恬静有守余雅重之故其為君請不可辭而余嘗兩㑹君於京師其氣温然謙厚人也始改官而乞身賢乎冒競不知返者君之遺言又如此嗚呼君豈以余不能為愧辭也故余敘所以不敢輕為銘之説及所以銘君之故而謹書君之姓名里宦系世卒葬月日為文而授之忞慰使鑱諸墓上華三山墓表華三山翁諱從智字克禎按察副使金之父也副使為户部主事時封翁以其官副使廉靜樸木有古人之風余心敬慕其為人後乃稍聞三山公之行事而知副使之樹立有自也則又敬慕三山翁已而得翁所為佘山百詠詩其語類古之隐君子自足於一丘一壑而不好於物者余嘗欲走佘山訪翁以庶幾獲見所謂山澤之臞而未能也嘉靖壬寅四月十有四日翁以病卒年八十有二於是副使来請余表君之墓嗚呼余於翁有感矣翁生為富人而以子貴為封官諸富人率隂陽予奪多其綱絡以力争錐刀其貴人父兄或憑其氣力漁獵其人饜其谿心翁乃約已而豐人一切屏機穽不事賈田宅從其贏斂租息從其肭衣食人也從其贏自衣食也從其肭又諸富人與貴人父兄率飾冠帶都騶奴日夜碌碌以刺候造請結納為事以厚其交而多其勢或時節往来府縣門入則僂僂柔色詞以媚出則詡詡張眉目以矜翁獨一切謝去塞竇自藏在佘山三十年束帶見賔客之日可數也盖翁之泊於利而䟽於勢若此宜其發之詩歌而特有類乎古之隐君子也哉余是以諾副使君之請而表於其墓翁墓在佘山翁所自營也翁少嘗力於治生以逸其父西野翁後西野翁沒翁遂去其故居而老於佘乃自為塋塜因山而壘植一木必其材甃一石必其無泐費可若干金以上經營勤瘁且數十年而後完雖然古有説矣聲利腐鼠也形骸委蛻也故達者解焉翁雖不恡情於其一乃若不能不恡情於其一焉者何耶且夫役其一生之力營營焉以計其身後委蛻之藏與彼役其一生之力營營焉以計其身前腐鼠之奉其較亦何能大相逺而翁乃躭之不置其亦未可以為達歟或曰唐司空生嘗為之矣司空生達人也故達乎死生之際則王孫之裸葬可也司空生之自為塋塜而飲酒賦詩其中可也翁父西野翁諱某祖某家於無錫之鵝湖華氏自翁十五世祖當宋南渡始自汴徙無錫居某地幾世祖自某地徙某地而五世祖又自某地徙鵝湖其墓亦隨所徙族大而墓散往往蔽草莽間翁遂為巨碑數通各題小傳碣諸其墓為識而翁始墓於佘翁配云云莆田林氏先墓表莆田林君華述其先人之行而請余為之表於其墓曰少而為儒老而投閒其績文强記推於士人而好施善忍著於鄉曲自少孤獨與母居母或不懌輒臥不食則跪俯牀下求親黨慰觧百方母懌然後跪為之起母食然後食是吾大父洗心公之行也雖不為儒生章句然喜誦詩書旁及簫管歌曲卜筮星歴之學尤精康節易數而時諷其所為擊壤詩故其平生遇歡愉窮窘悲愁死生之變以為是數也嗒然絶不以逆順生心少喪母喪哭之目盡腫數至失明後遭父喪窶不能給則躬負尸於牀而鬻衣質屋以供含襲其後繼母寡居而家又窶甚滫瀡襦緼之奉有豐無缺是吾父敬菴公之行也寒煖飽饑起居盥頮事關舅姑者以身任之不以勞相遺井汲竈燎器滌衣澣棗栗挑剥家之𤨏細事闗妯娌者以身先之不以難相推諸妯娌見其卑柔或侮以非意則善解遣之復有煦濡翕訿者又正色拒之久之諸妯娌皆服而舅姑則益喜是吾母周安人之行也嗟乎華不幸十三而喪吾大父十七而喪吾母二十而喪吾父空乏顛沛不能存然思先人之義即以不忘溝壑自厲嘗乏食竟日危坐讀易或雪夜衣絺覆草獨處慷慨歌聲達旦益奮激不改以先人遺教在不敢背也華自壬辰登第至於今十有四年而任今職所居官處患難臨民益思砥礪名節深以罔上殘下冐進壞道為耻以先人遺教在不忍玷也大懼先人之善泯墜不紀是以日夜悼心惟君與華相知深敢以累君華之請余文也盖在知鎮江之二年余諾之而未有以應也後二年御史奏華激變事被逮京師華以書别余曰苟君不遺余先人而終賜之華即死瞑矣華發鎮江哭而送之江者幾萬人擁傳車不能行逮者愕眙且笑曰是可以為激變矣華至京師上奏自辨天子以為直而京師諸貴人亦多言華枉者於是天子竟不深罪華而罷為民以歸華於道遣其弟苹以書来曰華誠不自意復奉先人丘墓惟君所以嘉惠先人者願終賜之嗚呼余於是益感涉世之難也將為籧篨戚施嚘咿唯阿苞苴承迎之行可以無譴訶憎疾於人然或不免譴訶憎疾於鬼神而且遺先人以惡名將為矯世厲俗捐私奉公嶄崖狷潔之行可以無譴訶憎疾於鬼神然或不免譴訶憎疾於人甚者為世戮辱以憂丘壠是兩者不知其孰可也以華之自處固以謂可以無譴訶憎疾於鬼神而貽先人以令名然卒不免譴訶憎疾於人既觸法矣然猶得免僇辱以奉先人丘壠以不為譴訶憎疾者所快盖非天子聖明至仁保全善類則不及此故特為紀之以著於世且使世之人知種德積行雖􅇄坎其身必發之於其子孫如林氏之先人秉道守正雖遭罹讒疾終獲保全如華者以為仁人志士之勸其於世教未必無補云彭翠岩處士墓表古之人有書其人之墓者必其智足以知其人者也智不足以知其人而據其所傳聞書之雖其當實君子且以為近誣而况其不當實者乎雖或知不足以知其人而知其子弟則為之書其父兄者今往往有之然其不失實者亦或少矣自余稍知為文惟書人之墓則尤不敢不謹知不足以知其人不敢書雖或知其子弟而亦不敢以書其父兄今余既未足以知處士而又未獲游於處士之子郡推君而特為之書者盖郡推君之僚于余父也最乆而余父之知郡推君也最深則因余父以知郡推君之為人而因郡推君之所稱述者以知處士之為人其亦庶乎可以不失實焉否也按狀處士諱顥遵道其字處士居常自言曰拙可以勤補而窘可以儉裕故其俯拾仰取凡所以家人生産之計未嘗不出於勤而其服食器具凡其所以自奉未嘗不出于儉然至貧不能屋者為之屋貸而不能償者還其劵或遇賢士君子其將迎而贈送之也必恭其貌而豐其儀故士君子樂與之游而鄉之人不病其為纎嗇也其更􅀈賦役凡所以急公家之事者先於所以謀其私至於體其同室之休戚通其有無而孔懐其死喪其所以為其父母之子者先於所以為其子處士既自以不能讀書為儒而獨屬意於郡推君郡推君之少也擇師教之而時督之曰若頼祖父餘業幸無飢寒而不刻骨自植立而惰窳以敗是羞余也嘉靖壬午郡推君舉於鄉處士且喜且督之曰更志其大者可也盖郡推君述處士之行大略如此而余父為余言郡推君之為人縮縮謹甚其治獄多所貸舎不以鍜鍊為能雖鞭楚常恐傷之是殆有聞於處士長者之教乎余是以因余父以知郡推公因郡推公以知處士而為之記之也處士祖希載父德甫自處士祖父而上皆不仕而處士有子澄始舉於鄉今為永州府推官配晏孺人狀以為安祥雍肅能助處士之不逮者也子三人長即澄次渾太學生皆晏出也次深側出也孫男六人天禄天初天視天祐而天禄天初天祐皆邑庠生天視太學生其二也幼未名處士卒於嘉靖某年月日年六十有三晏孺人卒於某年月日年五十有九至嘉靖丙申十一月日始合葬於萬載縣北九子石之岡處士系出宋待制忠肅公龜年之後世居臨江之清江至六世祖始徙袁之萬載城東而翁又構别業於城北龍溪之滸龍溪迤南有岩積翠作亭其上而自號曰翠岩處士余因為之表曰是維翠岩處士之墓云傳周襄敏公傳公姓周氏諱金字子庚號約菴其先武進人也國初有彦居者以閭右徙南京因家焉至公為都御史復還居武進彦居生贈户部尚書道信妻贈夫人董氏於公為祖妣道信生贈户部尚書廣妻贈夫人張氏於公為考妣墳墓皆在南京而公始賜葬於武進之惠化鄉公自弱冠為應天學生𢎞治甲子舉鄉試正德戊辰舉進士擢給事中陞太僕少卿僉都御史轉副都御史致仕家居六年以薦起為副都御史陞兵部侍郎轉右都御史尋轉左陞尚書南京南京公所生長也因得焚黄先人之墓南京人以為榮公之始為給事也於户右於工左於兵復都於户凡歴三科為都御史也僉於延綏副於宣府於保定右左於淮鳯凡歴四地為尚書也於刑於户凡兩部公所歴多在錢穀刑名兵戎劇曹與邊腹要地公為人闊達警敏自在科中則已練習人情世務章數十餘上度可施行而後言不效迂生敢言而已武廟數游幸晏朝公上疏請復常朝之規退則躬覽章奏以總權綱亦頗見采納時貴寵用事國儲蠧於冗食公言京糧嵗入三百五萬而食者嵗乃四百三萬乞痛加澄汰便又言中官以迎佛以織造濫討引鹽暴横道路又言都督馬昂納女弟後宫外議或云已娠請誅昂而還其女弟後昂雖不罪而女竟被黜及公沒禮部為公請贈諡亦獨以公為給事時能隂銷禍孽指此疏也方是時奄幸相繼擅勢尤與言路為仇不旦暮死則竄少能全者公在科九年卒以老成周慎免於戮辱而以乆次得擢為太僕公貌瓌偉善議論其在科中每九卿廷議軍機大事邊境要害衆輒目屬公公口對甚辨聞者莫不心愜壬申狼山之捷兵部議有功將士例陞三級公笑曰不然將士有實職有虚銜有正副㕘遊實職大而虚銜反小有管哨管隊實職小而虚銜反大今一例陞級則管哨以下皆可為督府而㕘副以上或止於都司首尾倒置非便衆是之癸酉廷議用兵土畨復哈密公極言西邊虚憊而土畨險逺且青海之賊窺伺西寧乃欲逺拯哈密譬之人家囊篋空虚子弟臧獲疲死而盗賊滿門庭將拯門庭之冦乎抑急比隣之灾乎衆曰是則然矣如土畨索金幣何公曰彼能效順國家何愛於賞不然勦之未晩也已而卒從公議于是衆以公可屬邊事推延綏則推公推宣府則推公公既家居廷臣交口薦猶尚以邊事也公在兩鎮值寧夏甘肅大同三變之後公既素豁達不拘謭有帥臣體裁又善煦愉接下邊人見公色詞既已心安公公益務寛簡繩法以燠休慰帖之嘗欲笞一二走卒時窮冬多不袴公見之惻然曰邊人窘乃若是遂不忍笞而百方為之招商聚粟廣屯積芻以時給其食使人人有重生之心又為之葺墩墻以衞其居䟽石渠以足其水凡有規畫期於利盡而人不勞邊人益愛公嘉靖甲申公在延綏㑹大同殺都御史報至公諤然因入靜室蹰踟乆之喜曰吾得之矣乃開門召諸將吏軍卒盡入環列庭下謂之曰若輩知大同殺都御史乎衆曰知之公曰若輩以殺之為得已耶非得已耶衆叩頭曰狂賊自取族耳尚何道公曰不然邊人勞苦甚矣而又虐使之是趣之殺也假令上下素相愛若父子彼將倚以為命縱授之刃使殺焉其誰忍乎衆大懽呼叩頭退當是時以片言立觧上下疑阻公自喜得應機之知居家時數嘗為余言之其在宣府總督馮侍郎以苛刻失衆心公數爭之不能得侍郎又以引鹽數萬與其私人為市而平時商人無能得一引者衆固甚怨㑹諸軍詣侍郎請糧不得且欲鞭之衆遂憤轟然面罵因圍帥府公時以病告諸屬奔竄入院泣告公公曰吾在也毋恐即便服出坐院門召諸把總官陽罵曰是若軰剥削之過不然諸軍豈不自愛而至此欲盡痛鞭之軍士聞公不委罪若屬也則氣固已平乃擁跪而前為諸把總請曰非若軰罪也是總制者罔利不䘏我衆耳公從容懇諭以利害衆囂曰公生我始觧散去而總制自是亦心愧公延宣皆要衝公内撫軍情外策强敵闗城晏閉邊甿緩帶兩鎮四五年訖無敗事人益以為才然公他所施設其與公不同趣者或不能不以好惡為贊毁至論公長於治邊則莫得而訾也自公去宣府八年而大同復殺總兵據城亂公時起巡撫保定矣遂往扼紫荆擒大同諜者數人送京師㑹真定巡按李者有疑疾入某邑有銃聲驚以邑令謀已欲抶死之廣平守争之又以守亦謀已至遣吏發卒圍廣平捕守一城盡空公聞變星馳往撫定之上章露巡按罪狀而臺長庇其屬為之訟寃公復上章力辨廷論竟直公而黜御史巡按於巡撫為同事而臺長又於公寮長也公本通達不務為崖異立磽磽名然利害大體所在不肯苟為媕婀此蓋公所難者其以都御史出鎮淮淮當士大夫南北衝地過者或不愜所望則益易為謗然公自如也丙申章聖梓宫南祔始奉㫖由江而諸䕶行大臣至儀真議從陸諸官心知不可而憚於以身任江行之險悒慴不敢出語公獨力争之極言沿江山險路不可通狀且奉玉體馳峻坂上下撼頓萬一聖情聞之悲惻柰何議論往返數日而諸大臣亦密遣人探沿江路果險如公言乃决從江之議以鐵絙維舟行如期至承天遂如期以葬沿江千里居人免於伐樹發屋役夫數萬人得無走死山谷中公於是有力焉及為刑部尚書轉户部益能於其官乙巳致仕歸武進歸年餘而病卒年七十有四公性喜讀書雖稗官小史亦用以資其經略尤喜為詩歌羽檄倥偬中率不廢詩上谷榆陽稿皆成帙也善字書有晉人風骨其罷宣府家居好奨進後軰與人言娓娓不厭與士人言言讀書與俗人言言勤業莫不取其有益是時余以諸生候公公過待以為國器及入仕途公每遺書誨以經世之學顧樗散無能自效於公者公且死以傳文見屬余不得辭也公平生儉樸既已貴其自奉如居約時獨祀先欵客則極豐潔曰賔客重事也年五十遂獨居未嘗畜媵妾教諸子愛而有法一飲食必有訓自公既沒天子賜之葬祭贈公太子太保諡曰襄敏嗚呼可謂有始有終者矣妻夫人吳氏子二人仕為都督府都事偉太學生皆好禮讓能世公之家者也暘谷吳公傳公名傑字士竒武進人也其為醫始公之髙祖肇父寧贈太醫院判公之學自青烏氏書風角雲氣占經李虚中子平之術金丹内外秘訣無所不通醫特其一技耳然竟以醫至大官其於醫精究古方書而善脉其治病不純主古方書而一切以脉消息之有初若與証相反而卒無不効者其餘竒疾尤効也𢎞治間以名醫徵至京師遂以醫游諸公卿間公醫既精而儀觀磊落濶達善談説頴然見鋒鍔於是諸公卿爭迎致為上客京師諸老醫與公同時所徵諸郡國醫莫不望風下之是時都御史王鉞鎮大同奏乞吳某調治邊軍未及行御史顔頤夀給事中李良度皆奏言吳某宜在供奉不宜棄之邊地下禮部禮部尚書集所徵郡國醫試之卒無踰公者故事髙等入御藥房中等入院最下遣還郡而當遣者若干人公為之請曰國家三四十年纔一徵醫耳若等幸被徵又待次都下十餘年而又遣還誠流落可憫願不入御藥房而與若等同入院尚書義而許之正德幾年掌院事李宗周竟薦公入御藥房而同薦者凡八人有與宗周同官争權者因左右讒之上曰宗周所薦多私人且通賄實不能醫上曰吾當自試之時上病喉痺遂按名召公一藥而愈上喜甚嘆曰有醫若此乃不以醫朕耶因厚賜公詰責讒者而謂宗周為忠公自是得幸於上上每病未嘗不屬公公治之未嘗不立愈一日上獵射還憊甚感血疾公進犀角湯愈命進一官賜彪虎衣一嘗幸虎圈虎騰而驚公療之愈命進一官賜銀五十兩表裏一頃之試馬御馬監腹卒痛公進理中湯立愈賜繡春刀一銀三十兩自是上所游幸公必從嘗侍上臥至以肩倚上或撫摩玉體有不以屬左右近幸而以屬公其分御膳啖公有左右近幸所不能得而公得之自醫士十日而遷御醫自御醫三月而遷院判凡一愈病則一遷為院判當遷者數矣公固讓三年而遷院使上親寵益篤嘗欲以禁衞銜公賜蟒衣公謝曰臣以藥囊侍陛下此非臣職也上乃止某年上南巡公以醫諫且泣曰聖體尚未安不宜逺行上怒曰汝醫官也敢乎叱左右掖出公留京師駕行至淮漁於清江浦遂病還臨清夢見公急遣校尉召公公馳至臨清見上上泣曰爾不憶我耶公亦泣遂扈從還通州時權彬握兵在左右見上病一旦不諱懼誅欲據穴窟為亂力請復幸宣府公脉已驚甚密言諸大奄曰疾亟矣幸可及還内耳脱至宣府不諱吾與若軰即死寧有葬地乎奄以為然乗間百方説上上意動而彬亦數從公覘問上病何如即詭言曰且愈矣勿憂也已而駕還京師崩彬坐誅毅皇崩之幾月而公亦致仕去矣既致仕留居京師遣其二子徧從韓林諸名公游壬辰子希孟舉進士以才廉擢給事中於是以恩進公階朝列大夫甲午子希曽舉於鄉自某年公還武進稍葺室廬治田園為終焉之計公既老居鄉不復為人治病而親戚故人有竒証或病危甚衆醫所不治者乃以請公公亦間往往則應手愈居閒誦老莊氏書益究金丹内外秘訣以冀所謂長生者其自號暘谷谷者谷神也或曰暘谷海東仙人所居嵗時與里中故人雅歌彈碁飲酒為樂酒酣數語及毅皇時事出所賜衣物未嘗不泫然流涕也久之希孟為廣信知府懇乞致仕歸養歸數月而公卒始公毎自詫得丹訣指其小腹謂人曰此中有物矣先卒之一日余往候公公紫色瑩然如平生希孟曰唐翰林在公㸃頭卒時神氣不亂整衣端坐口云好好遂卒年七十有八嗟乎公信多竒矣哉希孟居鄉有志嚮師事徐養齋先生而友余余是以得備聞公之行事為傳而敘公在毅皇時事獨詳焉以見公之遭遇以俟國史傳技者有考云萬古齋公傳宜興萬氏相傳徙自鳳陽始徙者曰勝三傳至雄雄兄弟六人皆强力殖産結豪傑而萬氏始大於邑中雄生政政有弟盛為九江推官以學行推髙一時而萬氏於是為文獻家政生璵璵生公諱吉字克修為人方嚴剛峻可望而知其為莊士自少從盛學盛為人亦方嚴公心效慕之盛亦喜公類己公為學以為非有廉隅墻壁不能自植立於是斂束筋骨刻意以古人為師讀書觀古人忠孝大節輒揭之壁間自恐不如平生自禮義廉耻大界限至於拱揖進趨冠履食飲之節畫線而蹈終始相較不失毫髪善戲之謔露齒之笑未嘗一出於口撥衣蹶足箕踞跛倚之小過未嘗一加乎身其事父母視寢視膳視藥恪有儀節深心欵然父母病不解帶自始病竟病愈以為常父暴病一夕卒每痛不及藥哭輒殞絶病尫然骨立年五十餘遭母喪哀毁不衰於喪父時以是病衂至沒齒衂竟不愈也與弟善以友愛聞邑中病則共被寢至老彌篤尤未嘗異錢帛善亦謹厚有兄風教諸子寛而有法先志行而後文藝諸子烝烝雅飭規行矩步孝謹一如公不衰其閨門化之娣姒雍睦自姻族朋友出入公家者不聞有誶語嘻嘻之聲其諸子弟不聞有挑達宕佚華矜之習邑人爭相髙之以比於漢石氏而以公比萬石君公面目清冷對人少寒温語若落落寡情然人乆與之處真意溢出外有邊幅而内朴無城府至其情所甚鍾處宗族姻戚間恩禮欵曲即素婉孌多兒女子情者不能及也其自奉泊然衣未嘗問新敝食未嘗問精惡室無媵妾館無圖畫古器伎藝之玩賔至時一奕而已然亦未嘗溺意求工也居家手不識握算計帳之具口不問錢米盈縮雖以有弟足藉亦其素性於財利疏濶使然然獨喜施舍至歉嵗家人節口而食過窶人未嘗忘施也友人且死屬其妻曰濟我後事者必某也已而果然其處宗族每誦范希文自吾祖宗視之無親疎之語嘆息者乆之族人有緩急既自罄其貲與力其所不及則醵其闔族之貲與力以濟其三族中待公飽饑衣凍婚子嫁女者若干人公恂恂儒生非欲以振急排難為豪舉其平生􅇄坎又非如希文有俸廩賜予可以收族其所為如是盖天性也以繩檢自律亦以繩檢律人人有善雖在後軰必稱嘆推引以為賢於己人有過雖在同軰必面折或動色不少避於義有違雖田夫野人女子之言皆為之屈服及引義争是非雖遇達官勢人鯁鯁反復必伸已説不少媕婀以是人或謂公激而知公者益以公樸直愛人如愛己也其有欲為不義懼公知之而止者較之面折者尤多居學中三十餘年學成行尊其儒生後軰有志節者雖不及公門亦心師公事公一如事師之禮公亦欵欵訓諭相勵以古道不降辭色既執古自信因以古名其齋諸儒生無背面必曰古齋先生而不敢字之其家子弟且冠必為之行古冠禮及婚葬祭率凖家禮從事不為苟簡在學中凡八試於有司皆不第而提學林公有孚蕭公鳴鳯以德行旌士每首公以風諸儒生公自少讀經史守儒先成説甚謹於儒先中尤篤信晦翁氏然至疑難處輒掩巻自思及有所得多出儒先論斷之外文字尚理致不為華言然諸儒生心服公之行故不以文名在學中獨與潘君松為厚交潘君疎爽坦易而公堅苦縝密兩人操行不同而各以所長相取至白首無間嘉靖丙申余始識公於宜興公因遣二子從余游數過余相與講論有合有不合而卒歸於相得也盖公尊經傳甚篤而守格式甚謹然而黙成不言之㫖近於破去經傳而易以為束書游談者之所便得心忘象之宗近於脱落格式而易以為宕無忌憚者之所假故儒者往往因其似而疑其真余既與公交乆之乃稍稍於經傳格式之外有所陳述大要以反求自得一不蹈襲獨操欛柄為説公聞而相與辯析亦乆之然公察余非敢不尊經傳非敢不謹格式者是以因其跡而諒乎其心知其人之不求為異而意其言之或不妄也先是公之友周君道通學於王陽明子得聞致良知之説歸而以語公力慫惥之公以其説異朱子不肯信道通沒十餘年既與余相得則慨然謂其所善門人王革曰道通愛我今荆川子語固多與道通所述相合然固未嘗背於朱子我恨不及道通之存也嗚呼以公之堅志勵行虚心從善使其早嵗有聞且將由忠信而好學不知其何所止正使晩年所遇不至如余之迂駑而得一豪傑之士其感孚契合灑然氷解又不知何如此余所以愧公之知也然公之所自立者其亦足以見於世矣居乆之以貢為桐廬訓導桐廬地磽陜儒生溺於習俗錐刀𤨏𤨏鮮志操公夙夜勸課為之深明義理界限時時舉釣臺故事激發之曰若軰非子陵鄉人耶諸生一時為之爽爽心動時節或有饋遺却弗受間有所受則以振業諸生之貧者提學張君岳考之曰文足以範士行足以勵俗近得其實云未幾懇乞致仕歸是時二子士亨士和舉進士公每遺書必曰願若軰為好人不願若軰為好官士和以翰林吉士出為禮部主事公聞之喜以其能不干進如教指也在桐廬二年而歸歸六年而病卒病且亟余往候之氣已微矣猶披衣端坐作拱揖狀謂余曰吾語言若顛倒者余曰須静以養之公曰正為平日不能養耳是卒之前七日也卒時為嘉靖甲辰七月二十日年六十有三公蚤年剛方自立晩而氣象和易對人煦煦自桐廬歸後軰益樂親之其行已類狷而意甚廣居常有志天下事自為諸生地方利害休戚亹亹為上官陳説既老無所施用然猶不忘時事聞一賢人進則喜見鬚眉為天下賀或聞進一庸惡陋劣者則蹙然改容當食為之廢筯毎得忠諫章疏雖老必手録卒之前一月既已病半起坐間猶類聚平生所録拱手讀之其强於好善至老益篤自桐廬歸數入郡訪余相與講劘益切又邀余訪養齋徐公慨然相見晩也故其卒也養齋公誌其墓妻李氏封安人子三人士亨吏部員外郎後公五月而死於毁士安縣學生士和禮部主事孝謹一如公者也李宜人傳余讀同年友羅君洪先所為述其先人副使雙泉公與李宜人行事為之慨然而嘆盖嘆吏之漬於墨而潰其防也然而潔志好修之士不宜如是其少豈亦有所累焉而不能自免歟且夫隂柔之性嗇而耽於飾牀第之言眤而易以售向非剛士孰能自免於此即有能免於此而或窺罅揣空乗其耳目所不覺而隂入之賂幸而覺之又牽於愛而有濡滯不忍之心往往壊名而失志以至於敗可憐也已故内有采蘋之節則外有素絲之風内有交徧之謫則外有終窶之怨言所自者㣲也雙泉公固潔志好修剛而不惑者而宜人之助盖亦多焉雙泉始以諸生游學於白河雙泉産故窶而旅中益無以為資宜人匍匐憔悴以佐朝夕之急然此猶迫於無可柰何至如雙泉舉進士由兵曹郎歴鎮江淮安兩郡守官尊而俸入多人謂宜人有遭矣而此兩郡又夾江淮之衝魚鹽米穀重装大賈之輳多見可欲以是吏於兹者潔志好修之士尤少而肥家以去者為多與所謂窺罅而隂入之賂者亦時時有焉故為吏人妻者不饜於肥家之公槖則饜於窺罅之私賂矣雙泉為此兩郡守其所入既不足以肥其妻子而宜人亦小心奉約束惟謹其苦楚澹泊如在白河時至雙泉觧官歸宜人篋中皆故貧時物也無一増者雙泉為兵曹郎是時奄瑾張甚雙泉以奉法數忤瑾瑾銜之數使人伺雙泉雙泉於是日夜留曹中治文書不敢歸而宜人獨擁户爨馬矢買魚肉以餉雙泉而自與諸女奴食脱粟或雜以稷菽有旬日食不肉者瑾伺之數月亦竟無所得及雙泉在鎮江宜人擕女奴日往後圃掘野蔬而食之雙泉既亷不受錢又往往割俸錢以資過客宜人不謂迂也宜人於是凡再受封矣至無錢買冠帔而嘗從諸寮婦飲諸寮婦皆冠珠翠冠明璫錦袿釧金纍然宜人既素不具冠又獨衣故貧時衣以往逡巡席間諸寮婦以為苦也更密勸以賂宜人矍然曰若不知吾夫耶且吾安得聞此言諸寮婦因竊嘆笑已而女􅀈有私獻金器飾者盖乗雙泉所不覺也宜人痛呵絶之曰若不知吾夫耶諸寮婦至是始赧然以賂為耻焉嗚呼使為吏人妻者盡如宜人則安有所謂牀第之言與窺罅以敗其夫者即有然者使其盡得見宜人之事安知不有赧然耻如諸寮婦者乎此余之所深歎也宜人故長史李勲之女歸雙泉若干年以卒有子一人而妾所生子二人其女二人則皆出於妾宜人子獨洪先耳宜人均而字之尤善處嫡妾之間兩妾中其少者柔婉自媚於宜人宜人愛而撫之其長者故窘宜人然弗為較也第拊心自泣而已亦不以言於雙泉後雙泉自知而欲督過之宜人曲為救解乃已其或雙泉自以他事督過此兩人宜人曲為救觧乃已此在宜人不為竒然亦人所難者宜人既卒洪先以書屬余使為之傳余於交游中雅慕洪先洪先凝重醇慤其志必欲為古人而後止可以觀雙泉與宜人之教也而宜人之事有足係世風者故余掇其一二大者著於篇而又以志余之所感云章孺人傳吕氏有賢母曰章孺人孺人讀書觧道理有女士之行孺人之知書也自其父省菴翁翁先世累有顯人家故多書而翁尤好書日誦及六千字為凖日誦不及六千字不寢於書尤好誦五經自漢以来諸家之説五經者皆能通之為文博雅尤工騷選然冲澹不好仕進以布衣終翁無子而有女一人孺人也自幼受句讀於翁翁以為能既乃稍進孝經論語大學及史傳所載列女賢人孝弟之事種種能識其大指翁乃慨然而嘆曰惜乎使汝不為男子章氏文獻當在汝矣盖既以喜孺人又若自恚其無子可屬然者孺人既歸於吕其夫為芝山君某芝山有祖母章與母趙母張皆在而芝山兄弟數人諸姒婦比屋居孺人奉一祖姑事兩姑處諸姒能一不失其歡祖姑章者孺人同族亦謂為從祖姑者也年髙性嚴諸子孫婦莫能揣意嚮顧意獨在孺人然非以重親故也諸姒數因孺人進飲食問起居章即喜有賔祭宴饋之事章必以命孺人孺人唯唯受命然不敢專必以請於兩姑退又謀之諸姒以故諸姒欵欵益和兩姑亦喜吾婦之能代事吾姑而章又益悦也孺人與諸姒居欵欵益和然慎重寡言笑即有内事相關涉數語而已或問及諸史輒以不能對以為非婦人事也惟見芝山夜讀史間舉省菴所評史一二語以問于是芝山乃知孺人之嘗讀史也至於訓授諸子書則縷縷竟朝夕其語有外傅所不能詳者孺人之生子洵也後洵既生而不娠者又七年洵又多病力請為芝山納妾妾始娠孺人緝衣絮具湯沐親自舉兒兒死涕泣累日夜是年而孺人自有娠明年演生又明年泌生而洵病亦愈孺人之生洵與演泌也後洵又病恒愛而憐之然厪厪不為姑息居常啖兒糈果勿與粱肉即與皆大人餕羞之餘未嘗為兒烹一雛其所與襦袴皆澣衣為之不為製一新繒常曰兒福薄豈勝美衣肉食耶至於割鮮烹焠之地與里巷謳歌劇戯之事皆閉勿令兒見即隣舍小兒游蕩無狀者戒勿與游狎洵少拂於孺人教㫖孺人視之甚愠然不忍箠撻又不欲聞諸芝山輒自懟為之對案不食改之乃喜洵稍長知勤苦與兩弟夜讀書課文夜過半孺人即又慮其勞以病也輒令女奴趣就寢或自起滅其燭常謂洵兄弟曰汝先世賢人之裔也余家先人亦世世讀書宦顯余父雖布衣文學誼行伏一時余婦人也又不幸無兄弟先人之業絶於余父矣兩家文獻在汝豎子可不慎與憶余父且死時汝曹尚幼乃以先人田廬遺其嗣孫而以所藏圖籍文書畀汝父且謂余曰他日汝子可教教之讀吾書吾死不恨矣汝兄弟志之及洵為諸生嘗就舉弗第孺人慰之曰汝年少學未成爾且余與汝父教汝書固不願汝禄養也汝能積學修行縱終身不遇如余父可也不然徒苟且富貴即鍾鳴鼎食亦何足道於是洵强學博問以儒有聞而章氏之書乃大行洵居官凜凜有名節其志師古人務究於精㣲而止盖皆自孺人發之余觀前史女子能讀父之書者率載以為美談至於有家之傳則往往以託遺書為重事是以重於有子而伏姬班姬之屬雖能讀父書然終不足以世兩家詩書之澤者其竟以女子故耶孺人奉其父之遺書與其遺言以教而成其子子洵强學飭行傑然以儒自見於世人且望而慕之曰是得於章氏之書者為多是使章翁無子而有子其書無傳而有傳也盖人知孺人之為賢母而不知乃其所以為孝也余故為之傳以著之孺人諱寳浙之新昌人子三人光洵光演光泌光洵舉進士今為御史俞孺人傳俞儒人者玉山詹君諱某之妻訓導鈿之母也鈿生而孤時孺人年二十有五嵗鈿伯兄某始三嵗孺人居孀矢節至今凡若干年卒以植二子而觀其成自二子幼學於塾毎夜歸讀書輒篝燈火紡績與相對以為常被服食飲令毋得擇所欲毋得詈人出惡語言有過輒請於其舅而呵責之一不為掩故鈿自童孺時已恂恂若老生後舅氏沒而二子且長矣則使某業農以給而使鈿專業於儒又縱鈿使日與邑之諸雋游處鈿痛自感奮日夜刮淬在諸生中數年以學行推擇超等為貢士鈿居京師是時四方修行之士若鈿之同郡徐子直成都趙孟静軰相與羣居講學鈿悦而從焉恐不得卒聞然世方騖於功利雖薦紳儒生皆不喜若軰説或相指笑以迂濶孺人詢知其子之所與游者某人某人而又詢知其所與游某人某人者如何人也乃獨心喜焉鈿為人愿而善藏其居衆中退然不見辭色而其介然有所不為既訓導於常亦闇闇不自標幟時或舉其所聞於先生長者一兩端為諸生論説諸生相與服其行而信其言孺人以鈿之能惠於諸士也則又益喜鈿為訓導幾年諸生某某軰本其教之所自也相率請余為孺人傳余既傳其事而論之曰夫女子非立節之難而立孤之難然世所稱立孤者謂其不墜門户或能以榮進顯云耳非有能教之以正而成之者也就有能教之以正者顧其為教也止於其母之身其教之所及也止于其子之身而足矣今孺人乃能使其子盡友四方之賢人君子以助乎其教之所不及又能使其子以身為諸士師以廣乎其教之所及盖其所以風世而軌物者逺矣噫嘻此豈婦人女子之所幾也哉葛母傳葛母李姓諱妙賢鳳陽李翁諱泰之女同邑葛翁容菴諱欽之妻貢士澗之母容菴翁豪雋有氣槩游於商賈中能自見其竒嘗上書巡撫言鹽法河渠事利害甚具語在王文恪公所為傳始容菴之賈於揚也母獨家居奉其舅姑服勤幹蠱兼子與婦之役容菴是以無逺賈之憂而舅姑亦忘其子之不在膝也其故廬災於火容菴自揚輦石輸木而經理匠事皆屬之母其居之成也至今族人聚而居之已而從容菴徙於揚則又助容菴構新居其經理視鳳陽時尤勤不踰時而寢堂言言遂如故家至今子姓聚而居之母家於揚幾十餘年揚之俗呰窳浮麗男子游手末作其婦女鮮事織績而習為假髻侈袖縁履之飾母獨纎於治生蚤起育雛食豕釀酒造醯翦裳滌器染􅀈湅縤僕僕迨燭不自休至見美麗服器飾輒閉目斥去以是能殖其家不獨容菴居積貿遷之故也母雖以纎治産至於振里族之乏繕橋甃衢粥餓槥胔縱解簮珥亦無所嗇容菴慷慨行義傾貲結賔客盖不獨容菴之能施也女夫死無子命子澗為之立後其父母死無子又無可後者則以義立主奉之别室而烝嘗之其知大計往往若此母性凝重訓御諸婦諸女如師門内無嘻嘻聲尤謹嫡庶主僕之分僮婢三百餘指飽饑逸勞人人自以為得也其教諸子有法尤屬意澗澗好聚古書購書數百金以上澗能為古文辭所交多四方名士館穀饋遺諸費日出母恣之勿問也曰吾夫積金使吾子易以為善今吾散金以成吾子之善也不亦可乎已而聞湛甘泉先生講道南廱則遣澗往澗於是聞體認天理之説未幾構甘泉書院於揚費且數百金澗請於母母曰此義事也亟圖之自是書院成而揚之士彬彬多嚮方者母年七十有五而卒其詳載在太僕盛公所為狀而盛公又題其旌曰賢貞盖不誣云母五子澗洞澄江漢而澗最知名余亦知澗者於是澗以傳屬余盖余讀鄒東郭先生所為母阡表太息者乆之以謂伊洛先生在當時彼號為衣冠士子羣咻衆狺乃不及一女子又謂葛母可方尹氏之母其説云然然余以謂尹母之所以能彰於世者焞則貽之也伊洛之門其頴敏才辯者幾何人而確實堅苦言行必信能守師法則焞為第一是真能以善養者而母之訓益因以彰澗所聞於師者固伊洛語也澗也自是焉益落其華而收其實習其傳而反諸心求其所以為焞者則所以使其母之有傳者固無待於人而惟盡乎已而其所以盡乎已者固不在於聲華辭藝之蔚然者而有在於克己反躬之闇然者矣故因東郭之論而附著之荆川集巻十一欽定四庫全書荆川集巻十二明唐順之撰雜著讀春秋春秋王道也天下無二尊是王道也禮樂征伐㑹盟朝聘生殺之權一出於天子而無有一人之敢衡行無有一人之敢作好惡作威福是王道也是故大宗伯以賓禮親邦國而以間㑹發四方之志天子廵守諸侯既朝則設方明而盟是㑹盟者天子之權也其或不出於天子而私㑹私盟者罪也故春秋凡書㑹書盟者皆罪之諸侯朝於天子而諸侯之自相與也有聘禮無朝禮凡其不朝於天子而私相朝者罪也故凡春秋之書如書朝者皆以罪其朝者與其受朝者九伐之法掌於司馬而天子賜諸侯弓矢斧鉞然後得顓征伐雖其顓之亦必其臨時請命於天子而後行是侵伐者天子之權也其不出於天子而私侵私伐者罪也故凡春秋之書侵書伐者皆罪之諸侯之大夫公子雖其有罪必請於天子而後刑殺焉其不請於天子而顓殺者罪也故凡春秋書殺大夫殺公子者皆罪之夫侵伐有貪兵有憤兵有應兵有討不睦有以籓國侵王朝有以王朝征籓國有以王臣借籓國而戕王朝者故戰有彼善於此者要之無義戰盟㑹有解讎有固黨有同欲相求有同力相援有同患相恤有以呉楚受盟有以呉楚主盟者故㑹盟有彼善於此者而要之無義㑹義盟殺大夫有誅叛有討貳有愎諫有借以説於大國有為强臣去其所忌故殺大夫有彼善於此者要之無義殺是故春秋自于稷澶淵兩㑹之外並不書其故而至於盟㑹侵伐則絶無一書其故者非略也以為其㑹其盟其侵其伐其戰既足以著其罪矣不必問其故也殺大夫必名亦有不名而但書其官如宋人殺其大夫司馬者亦有併其官不書如曹殺其大夫者此非略也以為義繫乎其殺之者而不繫乎其殺者義繫乎其殺之者則其殺也足以著其罪矣義不繫乎其殺者則不必問其為何人與其為有罪無罪焉可也説春秋者不達其意而瑣為之説曰其㑹也以某故殺某大夫也以某故至於盟戰侵伐亦然是皆無益於春秋也而徒為蛇足之畫者夫春秋經世之書也其經世也以正亂賊也易曰臣弑其君子弑其父非一朝一夕矣不早辨也説春秋者亦云人臣無將夫人臣而竊其君侵伐㑹盟刑殺之權其為將也甚矣人臣竊其君侵伐㑹盟刑殺之權而久假焉而莫之歸也其為漸也甚矣故臣子至於推刃於其君父而春秋書其國弑其君某某人弑其君某者是弑之成也是春秋之所痛也人臣而竊其君㑹盟侵伐刑殺之權是弑之漸也將也是春秋之所辨也孔子嘗自言之矣曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出無道而至於自大夫出無道而至於陪臣執國命嗚呼是春秋之勢也挈其漏於陪臣大夫者而還之諸侯挈其漏於諸侯者而還之天子是春秋之撥其亂而反之正也夫周自東遷以前雖王室已不競矣而其權固在也幽弑而平徙岐豐之地委為草莽瀍洛之外聲教阻絶于是尾大之勢成而諸侯横變易禮樂馮衆暴寡大小相朝強弱相刼無一不出於諸侯者而天子曾不得尺寸之權矣盖周之盛王道行頌聲作而其可見者莫如詩雅蓼蕭湛露是諸侯之㑹同於天子者也彤弓是諸侯聽征伐之命於天子者也出車采薇是天子之自為征伐而四海不敢侵叛者也故曰詩亡而春秋作詩未亡天子之權存詩亡天子之權喪春秋收既喪之權而還之天子者也春秋所以接詩亡之後雖一日不得緩也文宣而下則諸侯又不能自執其權而大夫之交政於中國者攘攘矣三桓六卿七穆孫寗魚華陳鮑擁兵樹黨而主勢孤矣葬原仲而私交始矣作三軍舍中軍而魯之權罄於大夫矣盟溴梁盟宋而天下之權罄於大夫矣衎出奔孫陽州孫越入彭城入朝歌入晉陽而大夫之為禍烈矣盖天下之勢愈下而春秋之治之也愈詳桓僖以前列國之大夫惟特使而與魯接者則名之而㑹盟侵伐則大夫未有以名見者夫救徐大夫特將也翟泉大夫特盟也春秋第曰人曰大夫而已不以名見也若此者非略也以為不繫大夫也文宣而下侵伐㑹盟大夫未有不以名見者雖溴梁之㑹其君在也而大夫盟書雞澤之盟君既盟也而大夫盟書若此者非煩也以為繫乎大夫也不繫乎大夫雖夷吾隰朋狐偃趙衰之勲且賢未嘗以名見焉繫乎大夫雖劣如欒黶荀偃髙厚華閲則瑣瑣以名見焉不繫乎大夫雖其君不在而大夫特盟則亦弗詳焉翟泉是矣繫乎大夫雖其君在而大夫綴盟則亦詳焉溴梁雞澤是矣不繫乎大夫雖主帥亦略而人之桓僖以前侵伐書人者是矣繫乎大夫雖偏裨亦牽連而名之鞍之戰是矣其弗詳大夫者以專治諸侯之為亂賊也其詳大夫者以併治大夫之為亂賊也説春秋者不達其義而日人大夫貶也夫書人為貶彼黶閲之徒以名見者乃為褒也耶惟曹薛滕許之大夫始終書人説春秋者曰小國無大夫非也夫此數君者且為人役之不暇而未嘗敢執天下之權也而况其大夫乎盖不繫乎其大夫是以終始人之而弗詳今曰書人為貶則曰齊晉諸大國之大夫偏受褒而曹薛滕許之大夫偏受貶耶侯犯南蒯弗狃陽虎之徒出則大夫又不能自執其權而陪臣實執之矣墮郈書墮費書圍成弗克書竊寶玉大弓書得寶玉大弓書而春秋之正陪臣者又詳矣故孔子欲往公山佛肸之召而曰吾為東周云者即春秋書墮費墮郈意也是春秋之終也或曰盟葵邱盟踐土師於召陵城濮説春秋者以為聖人予之也今亦曰是禮樂征伐自諸侯出也而奪焉可乎曰是不然矣桓文之未出也權雖不在天子而諸侯亦未能盡得天子之權也盖其權散桓文之既出也則權既不在天子又不在他諸侯而桓文獨盡得天子權也盖其權聚譬之主人有千金焉而竊之者十人雖金已不在主人矣然十人而人得百金焉尚未足以當主人也而竊之者一人苟一人而併千金焉則是疑於主人也權之散臣悖於主權之聚臣疑於主故較利害則權之散而交鬬猶不若權之聚而可以紓禍息民語王道則權之聚而疑主猶不若權之散而未有所屬隨之屯曰隨有獲人隨而我獲之未害也而謂之凶豫之坤曰由豫由我致豫未害也而六五以為貞疾故桓文者臣之凶而主之所以貞疾者也且桓文以前諸侯固有相朝者則亦一二小邦而已猶未有六服羣然相朝者固有私盟㑹擅侵伐者則亦一國兩國相讎相結而已未有舉中國而聽於一人未有十餘國而共攻一國者是天子之權未有所屬也桓文之興五年一朝三年一聘而諸侯之玉帛相率而走於其庭天子黼扆之前乃不得一人秉圭而北面者彼齊晉亦偃然受諸侯之朝已而終其身未嘗一涉天子之庭也衣裳之㑹兵車之㑹未嘗有一介請於天子也是故紏合諸侯同奬王室未有如葵邱踐土者諸侯之羣然役屬臣僕於諸侯亦未有如葵邱踐土之甚者荆蠻攘斥中夏乂安未有如召陵城濮者而摟諸侯以伐諸侯亦未有如召陵城濮之甚者説春秋者不達其意而曰㑹於某盟於某是聖人以諸侯授之齊晉也夫王室之不競也諸侯既已盡折而入於齊晉矣聖人不能挈而還之天子也其又推而授之以益其逼也耶夫權自諸侯出不問其如何而均謂之無道敵國相征不問其如何而均謂之無義不知禮樂征伐之出於桓文也其為道耶其為無道耶桓文之戰其為義耶其為無義耶使桓文而誠於勤王誠於禦敵急病而其柄則倒持也其分則上陵也聖人猶必律之以法而桓文且將為法受惡矣况其借名勤王而實則自殖陽為急病而陰欲養亂哉滅譚滅遂本以自肥執曹畀宋為譎已甚桓之末年侈然有封禪革命之心而文至於請隧以葬此其去問鼎者無㡬耳乂何以責楚也然則聖人所稱民受賜一匡而仁之何也曰是聖人之顓論功也而春秋者顓以明道也穀梁氏曰仁不勝道存王室也然則説春秋者曰謹華夷之辨何也曰此誅亂賊之一也夫春秋之所夷者吳與楚楚之先鬻熊為姬文師國於江漢之間而太伯端委以臨吳盖皆神明之胄矣荆人不道間周之亂革子以王叢毒上國吳亦相效而王是亂賊之尤也是以春秋從而夷之春秋諸侯中其顯然為逆者莫如楚吳其陰逆而陽順者莫如齊晉如斷獄之家吳楚則功意俱惡齊晉則功遂意惡功意俱惡故聖人顯誅之顯誅之故其辭直如卒不書葬君臣同詞之類凡皆直辭也功遂意惡故聖人陰奪之陰奪之故其詞微如邢遷於儀夷城楚邱狩河陽之類凡皆微辭也夫小雅未廢而四夷不敢交侵小雅盡廢而後四夷交侵春秋始書荆入蔡以獻舞歸則其跋扈之勢已見桓文奮而扼之其鋒稍阻文也沒而晉霸衰而楚人之圖北方者遂日長而不可制是故春秋書荆入蔡此霸之未興而楚猾中國之始春秋書次于厥貉此霸之既衰而楚窺中國之始盖桓文之所以扼楚者其力有難易而楚與中國之所以盛衰其㡬有倚伏桓起於海濱而所從者宋衞陳蔡皆弱國故謀之十餘年結江結黄連十二國之師而後能服楚於召陵文據表裏山河之固而所從者齊秦皆勁國故反國一年僅連三國之師而遂能克楚於城濮一戰而殺其專兵之將然晉之克楚也得策於結秦而晉之不競於楚也失策於讐秦自殽之役而秦晉相讐殺者厯四五世戰彭衙戰令狐戰河曲積十餘戰而不解是晉人自失一強援自生一强敵失一強援則其氣力不完强敵伺近則其勢不暇於略逺故晉霸之衰而楚益横者殽之役實然説春秋者乃曰殽之役春秋許晉襄繼霸吾不知也夫楚莊者又蠻酋之雄耳而逺交秦巴近攻陳鄭則是晉之讐秦非特生一强敵乃又借盗以兵也春秋書楚人秦人巴人滅庸而楚之謀益狡矣書楚子圍鄭而中國虎牢之險淪於夷矣書宋人及楚人平而南北衡矣天下之勢一變也雖然于時諸侯固有附楚者而猶未敢公然附楚也晉雖已不能盡得諸侯而猶未肯甘心以諸侯委之楚也蜀之盟謂之匱盟盖諸侯猶惴晉人知之也弭兵之説倡而南北之從交見於是中國諸侯公然朝楚向之玉帛於齊晉者盡在楚矣申之㑹空中國而聽焉齊晉之所連以扼楚者今楚人連之以扼中國矣申之㑹諸侯獻六王之禮宋之㑹虢之㑹長楚於晉則是諸侯甘心為夷役而晉人甘心以諸候委於夷也天下之勢又一變也至於吳越交兵而夷禍極矣書伐剡入州来㑹黄池入吳而春秋所以治夷者又詳矣是春秋之終也或曰楚横而齊晉扼之則是中國果不可無桓文也今曰禮樂征伐自諸侯出也而奪焉夫頼人之功以紓患靳人之權以資敵是責鷹鶻之搏而縶其足也不亦迂乎曰不然吾又有以譬之今有僕於此鳩黨鑄兵而主人弗能令也然盗夜入其室則其僕揭兵嘯黨而逐之以僕為不善也然而足以逐盗以僕為善也然而足以抗主故天下無霸而至於四夷縱横而莫之禁者非天下之幸也天下有霸而至於臣疑於主而莫之怪者非天下之幸也夫春秋之事齊桓晉文是也齊桓晉文之功定而王道明矣王道明而亂賊懼矣或謂春秋誅亂賊者誅其弑君者也曰若是則春秋所誅者止於弑三十六君之人耳其亦狹矣然則所謂誅亂賊者何也曰治弑也治諸侯之專也治大夫也治陪臣也治蠻也凡無王者皆亂賦之道也鴈訓執徐之歲有鴈集于顧舍人第舍人筮之得小過焉其繇曰飛鳥遺之音大吉博物先生聞而往賀之至則蹠華公子在焉公子謂先生曰鄙人聞之人事占㡬天事占符㡬㒺舛盩而能垢符㒺闇沕而弗彰盖昔者元鳥集㦸黄雀投環游龜像紐墜鵲化印斯瑞𦕈乎瑣哉然猶薦紳動色焜焜燿燿若天授幽契而神畀秘寶焉者矧夫鴈抱陽背隂羽蟲最靈者也迺今歛翮戢翼翩然来賓斯亦異矣於舍人何所當焉願先生為舍人鋪張而揚摧之可乎先生曰唯唯可乎哉可乎哉請摭僕所聞而公子選焉夫陸杜隰黍春粟吳粳芬馨狼藉穰穰滿塍爾乃呼儔命侣唼喋蹂踐一飽恒餘羣啗每饜此盖飲食之至樂也舍人嘗羮内饔割肉大官滑脆脭膿溢腹盈飡若是何如公子曰夫繫稻粱之謀者㤀冥冥之志沈豢養之適者違性命之和老子曰五味令人口爽願聞其他先生曰文獸眎皮珍禽辨羽爾乃披黼戴黻純緅雜緇纎毳似鬒温氄方綈甑􅀈􅨎翨翷翾差池濯冷波以修容颺輕颸而整儀若夫東海獻朱上林呈白匪恒理之所窺亦云極態而盡飾于是使鸚鵡羞綠山鷄讓錦此盖羽儀之至文也舍人綰銀垂黄錯以絺藻顧步流暉折周展耀若是何如公子曰古之言章服者特以殊等威别上下而已非以為侈榮極觀也且令聞被躬安事文繡哉先生曰鬱埜茂林平皋廣澤罻羅無所安施矰繳爾迺頡之頏之翔而後集輟雲霄之勁翰指天地以假息故易著漸磐詩詠遵渚豈比夫􅀈鳩蹌踰乎榆枋鷾鴯卑棲于簾廡者哉此盖居處之至適也舍人待詔石渠之庭侍直承明之闥栖遲雲陛偃仰華榱若是何如公子曰儒者以禮義為安居未聞文軒夏屋之為快也且夫東方朔陸沈金馬奚足道哉先生曰神頡作書實始鳥跡而鴈以字稱焉觀其隊矯朋騫翕趿紏紛一從一横乍合乍分既錯落而成㸃亦聫綴而為畫拂素霓以施鉛依𤣥霜以和墨於是掩蝌蚪之竒形奪蝸蜒之巧篆此盖法象之至章也舍人搦碧玉之管操文犀之觚斯籕是摹鍾王為徒若是何如公子曰書者六藝之一耳且夫餘墨成池敝頴成塚固已勤矣無迺非古人所游藝者哉先生曰秋空泬㵳金波皎晶川原䆗窱百籟收聲爾迺揚吭鼔頬載飛載鳴啁哳嗑􅊱嘹嚦呷軋或趂羣而響駛或候侣而聲遲或雙呼而雝雝或单噭而悽悽或中斷而更續比律吕之相諧于是鸛鶴為之罷唳􅀈鴡為之噤舌覊旅聞之而遐思離妻聞之而於邑此盖聲音之至極也舍人擅中吳之逸韻汛下里之煩吟攡篇掜句鍧玉鏘金若是何如公子曰歌賦尚矣然雕蟲篆刻哲人刺焉願先生少益其説也先生曰積石草腓交河凍合蛾蛾層氷皚皚疉雪爾迺審圓方之闔闢謝坎維而向離服匪垂翅于寒門爰晞羽于暘谷異往来于元鳥類屈伸于尺蠖此盖消息之大時也舍人始焉豹隠吳門迺今遘休際昌連茹彚征以應鴻漸豈徒曰好爵是嬰若是何如公子迺俛首深思而未荅也先生遂推而進之曰夫鴈有六德焉知時寒燠智也時去時来若有約劑而不爽者信也銜蘆以避戈慎也締偶不亂者介也能羣者仁也羣而有序者禮也舍人偹姱葆真襲華振若畜茲六德協于禎祥若是何如公子乃雀躍而起喟然而嘆曰嘻吁休哉夫晰萬物之情者不以通塞異觀究天人之際者不以幻化眩見故履㡬莫如謙謙承符莫如兢兢謙謙者人益之兢兢者天庇之然則来鴈之為瑞也盖亦主人之自求多福哉詎不閎哉彼諦圖測諜以覬靈者末矣于是舍人再拜謝先生先生乃去書岳將軍題大營驛莊子以子之於父為命之不可解以臣之於君為義之無所逃意若以君臣為强合予嘗疑其不然觀岳侯所題大營驛壁其處心積慮未嘗一日不在於復中原迎二帝眷眷然若赤子之於慈母然此豈無所逃而為之其亦有所不可解者乎侯之言曰君臣大倫根於天性此侯之所以自狀而吾之所謂異乎莊生者耶彼髙宗者乃忍於㤀父臣敵其獨何心且已既已忍於忘父矣有臣焉為之急於其父如侯者亦竟殺之又獨何心嗚呼綱常萬古事也其磨滅與不磨滅只在此心之死與不死而已髙宗之為心何如也宜侯之竟以殺身而中原卒不可復二帝卒不可還也大營驛故在永州侯所題字久而湮沒余父為是州乃勒之石而併侯所題廣德金沙寺勒之盖侯之心尚炯然在宇宙間未死也固不係乎石之勒不勒雖然使忠臣孝子英雄之士過而讀焉其將慷慨泣下沾襟而繼之以怒髪衝冠者乎書醫施氏婦事語曰物反嘗為妖腥穢之氣薫積世界乃有賊殺其大父者及其弟之婦與弟之婦之大父凡殺者三人其兩人即時死婦尚喘息未絶始某殺大父時婦奔呼某怒其呼也追而斷其頸至骨又刲其口婦忍死齧刀賊以手椎刀至齒根骨乃止刀前後所輳其不絶者一線耳見者莫不憐之亦莫不以為必死㑹余往無錫知金創徐君素有神効而婦家貧甚不能請醫余邀徐君謂之曰君能一往乎徐君激於義舉遂欣然請行曰我不求一錢必活此婦是我心也因與余俱至則婦勢已亟矣徐君視之曰無恙也醫三日而腐肉盡新肉生又二日而口輔上下肉合頸肉起如蓓蕾狀徐君曰生矣始余迎徐君至時余兩弟及親友劉宗堯左升甫徐子初輩聞之亦嘉甚曰是吾輩之心也至是徐君告歸諸友請醵錢為贈不約而合者若干人得銀二兩有竒徐君曰非吾所為来意也余强之曰固知非君意也雖然願少抑君之意以成諸君之義可乎徐君乃不能固辭嗟乎此可以觀人心矣徐君慨然不逺百里而来也其何所為哉諸君之慨然醵錢以醫婦也其何所為哉方徐君欲行時其妻適及月産子且徐君坐市肆可計得厚糈君乃舍其妻之急而徇乎人之妻之急舍其有所利於市肆之間而奔走其無所利於百里之外亦何心哉鄉鄰之鬬雖聖賢亦謂可以無救而簟食之費雖好名者亦所必惜以必惜之費而投之可以無救之鬬至於不約而響應若有所踴躍而不能已者亦何心哉孟子曰人皆有不忍人之心此其機在乎通與塞耳塞則骨肉胡越通則四海我闥或謂今人之非古人之心吾不信也遂書之以貽徐君而且以風世之好義者則古昔相保相愛相䘏相周之俗其亦可以興於今矣瘞河壖枯骨誌髑髏完毁凡若干具其髆髃髀䯒脊脅諸雜骨無算盖出乎犬猪烏鳶所饜飽與夫日炙燹燒風銷水囓之餘而僅有存者自癸夘至乙巳東南荐飢流尸順河而下多於河中之船逮水落不能浮尸尸遂積疊河壖久之維古昔時遇飢饉疾疫則有荒政以聚民其不幸死而暴露則又有掩骼埋胔之令惜哉其不遭乎此時也褚生滔書舍在河壖余與弟正之數往焉每相與散歩河壖之上則見泥滓間圜者如破甌撱者如枯株碎者如沙礫紛然彌望白日照之星星玭玭若尚有光怪余三人者哀其澌滅且盡也命役夫裒而坎焉嗟乎古者葬則旌之以銘旌者别也銘者自名也若曰是其人之骸云耳雖後百千年有得之者亦識之曰是某人之骸云耳古人之于骨骸嚴而别亦不欲其混也若是今乃以五方四裔雜流異業之人而又以殘毁不完之尸爾髆我股甲脊乙脅輳于一坎若藂葦亂蓬然亦重可悲矣然余嘗見元人發宋諸陵事火其尸以其餘骨雜牛馬骨而埋之今此猶尚人骨也嗟乎彼生時何等人也尚不免與牛馬骨同葬况此輩莩丐之餘猶得以人骨附人骨復何憾焉使髑髏果有知如莊生之説必且一噱于吾言矣坎之以嘉靖戊申春二月是掩骼埋胔之時也
