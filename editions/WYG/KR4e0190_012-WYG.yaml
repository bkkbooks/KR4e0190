body:
  text: 記重修宜興縣學記先王因人情而施之教知夫人情所不樂則不可以從事於久不可以從事於久則不可以責其器之備而業之精也是故學校以教士而養之以禮樂以柔伏其速成躁進之心使其終日從事於俎豆筐篚象勺干籥盤辟綴兆之容與其弦匏搏拊笙磬雅頌龡擊歌詠之聲盤辟綴兆其文郁如龡擊詠歌其音鏗如是耳目之所恱而血氣之所暢也天機與器數相觸而不自知是以能終身安焉而不慕乎外上之人九年而後視其成四十而後試之仕而士不自以為滯也故其器之備也則自簡亷直温剛塞恭愿至於中和孝友皆能盡其微妙而無有粗疎傲戾之氣其業之精也則自虞夏商周之典章鞮譯象寄之語言至於射御操縵雜服之技凡可以為家國天下之用者能貫而通之而無有乎鹵莽生澁之習葢其磨揉之久而其勢不得不至乎此也今也禮壞而樂廢先生之所以為教弟子之所以為學者何也朝擊柝而聚之而課之書夕擊柝而聚之而校之文口吻刓於蠧編之誦記而思慮敝於游詞之剽綴夫士者之為此其不得已而應有司之求則可耳豈人情之所樂而況聲利之燄薰心炫目又雜然而日出以非可樂之習驅之以必可奪之誘則宜其有厭苦學校之心惟恐其去之不速亦何怪乎業之不精而器之不備也葢孔門諸子嘗言志矣㸃獨不願仕也浴沂風雩鼔瑟詠歌以適其意而子夏亦云出見紛華盛麗而悦有鼓瑟詠歌浴沂風雩之樂則㸃也可以自足於洙泗之濱而無所慕有紛華盛麗蕩之於外則子夏不能自必於其中今也無禮樂以養之有聲利以驅之而欲使之終身安焉而不去豈非勢之難者歟宜興有學舊矣歳久不葺通判泌陽焦君希程來署縣事斥贖金之餘凡若干兩鳩工庀材以繕其事又立名宦鄉賢兩祠於櫺星門之旁以祀宦於其縣與其鄉先生之賢者而學之制於是為備既訖工教諭張君某訓導某君率其學之弟子來請記嗚呼禮樂以養士古之道其不可復矣雖然無體之禮無聲之樂流乎宇宙而著乎人心不假器數而傳則古之道固未嘗不在也誦書綴文以應有司之求士生於今不可以已矣雖然其誦書也務於約而不汩於百家傳註之煩其綴文也盡乎已而不牽於時俗好醜之說則今之法固不能為累也古之所謂可樂者未嘗不在而今之所謂非可樂者不能為累則亦可以無用於速而去之矣宜興溪深而谷窈石峭而泉冽自古宦游之士多欲徙而家焉葢隠然有舞雩沂水之風而地僻以簡冠葢文繡之所不衝大賈重裝之所不輳故其俗鮮見紛華盛麗之習然則有㸃也之樂而無子夏之誘宜莫如此地者噫嘻諸君子其務求古人之所可樂以自足於其間以修其器與其業而無急急於務去其學也哉重修涇縣儒學記先王本道徳禮樂經術以造士而以士大夫耆老之優於道徳禮樂經術者命之以為庠序之師至於閭胥族師什伍之所鼓篋而從焉者亦無不命于上而一閭一族之間亦無非以道徳禮樂經術相磨切是以上無私師下無私學周衰王道廢缺齊魯列國學校猶在不過粉色潤飾而易象春秋十六國之樂徒以誇於諸侯賔客為古物玩具而未嘗以教諸弟子所謂學官與弟子云者詡詡禮樂徒能習其鏗鏘鼓舞而絶莫知其義其士大夫之有道徳者抱其器而私相與教授于山澤之間不出户庭而自成庠序葢觀於洙泗之濵誾誾侃侃弦歌鼓瑟者至數千人雖數百餘年諸生以時就其家習禮焉而使觀者低徊不能去此其最盛然孔子在當時非有司樂象胥之職沒不與瞽宗之祭而弦歌數千人者亦非所謂司徒俊士之選也自是之後西河鄒嶧傳易授詩紛然彌衆然皆與庠序無預漢興立博士置辟雍橋門觀聽縉紳動色蕃夷武卒莫不受經然秖以為太平之榮觀而當時所謂師弟子者不在也濟南關西琅琊千乗世傳經術隠居教授生徒至萬餘人然亦不屬之庠序由此言之王教興則道徳禮樂經術之寄在庠序而師道為公王教廢則道徳禮樂經術之寄在山澤而師道為私雖其所寄無以異者而世之升降繫之矣國家建學徧宇内蠻陬海徼莫不有學生徒多者七八百人少者百人可謂至盛然而道徳禮樂經術之寄其在焉否也所習者不過乎章句佔畢所志者不過乎聲利榮名其所謂髙等者亦惟騖文詞之博而秖以為溺心滅質之資矜亷隅之飾而秖以成詭激矯誕之習是以豪傑之士往往病之而相與修身治心詠詩習禮考業講徳於巖居燕處之間先王之禮樂經術亦稍稍賴以不墜然庠序為虛器而師弟子為私名論世者亦太息于斯焉涇于寧國為屬邑而學宫圮壞不葺午山馮公為提學嘗欲新之未克也而再為提學則以屬之知府尹宇葉令祥率其民之好義者使出財鳩工不足則濟以贖金之餘董其役于主簿某而視其成於學官董汝礪鍾維揚曹鸞於是㦸門璧池筍簴在列登其堂者如入孔室而聞金石絲竹之聲丹艧黼黻儼而髙居挹其象者如見聖人而親申如夭如之容其與古之庠序亦幾無以異矣而午山公端軌物樹風聲其於為師又非徒以其位焉者涇之俗古稱和柔而涇之士以余所知其有聞先生長者之風志于修身治心而深病乎佔畢聲利之為陋者固且有人焉而在乎庠序之間自是淬磨砥礪融習氣之偏而歸之渾化破意見之障以致乎精微相噓相染而成風俗使人皆曰先王道徳禮樂經術之寄不在山澤在庠序者涇之學則然豈不盛歟古者首善自京師始故司樂象胥之教尤詳於閭胥族師涇為甸服去南都三百里而近是國家之所首善也涇之士相與務乎先王道徳禮樂經術而風流乎四旁使人皆曰道徳禮樂經術之興於庠序者涇之學始又豈不盛歟於是午山公使學官維揚與諸生張鑜來請記余樂為之記以告於多士而朂其成云午山公名天馭字應房蘄人修學始嘉靖某年某月成于某月重修𤓰州鎮龍祠記龍之祠不秩於三代之典記禮者謂之四靈葢以為鱗蟲之靈者耳其祀始見於封禪書朝那龍湫今天下大水之濵無處不有龍祠宋之儒者論大河之治以為不宜祀龍曰是天地之功也龍何力之有然余竊以為未盡也夫天地無為而百物之肖像於其間者莫不各致其能以效其功而天地未嘗與之爭功然而百物之功孰非天地之功也至於昔人之制為祀典也凡有功徳於天地之間者不問細大莫不羣然秩而祀之以致其報而未嘗疑於與天地分功然而所以報百物之功亦孰非所以報天地之功也吾觀於蜡而見古人通乎鬼神之情而悉于幽明之故矣夫生成百穀以粒民孰非天地之功若是則古人為之禋為之社以報之可矣至於大索鬼神而蜡焉者何為也其蜡也先農先嗇庸與坊焉可矣而至於迎貓迎虎而昆蟲亦登焉者何為也惟天地之生成百穀雖一貓虎昆蟲亦使之盡其能於食鼠食豕之間而無遺利焉於此見天地之功為甚大人欲報天地之功而無由則雖貓虎之效一能於天地者亦秩之祀而無遺靈焉於此見人之所以報天地之功者為甚深凡百物之靈固莫不肖氣於隂陽五行而龍得隂陽五行之氣之精故其變化尤靈貓虎未嘗無功於田而謂龍盡無功於水乎祀貓祀虎未嘗疑於與天地分功而獨疑於龍乎且夫天地之間大者不自擅其大而寄於小小者各務致其小以歸於大其為力也大者常逸而小者常勞其功之成也小者易以為徳而其大者常不可名故耕鑿之民不知帝力之何有而至於一社之長一邑之令則人煦煦然而嚮之死則為之尸祝而俎豆之此豈可謂忘大君之功徳而顓顓於一社長一邑令之為報哉又豈可謂一社長一邑令之功徳而非大君之功徳也哉然則龍何疑焉而不祭於古也曰百物之祭古矣又安知古之不祭龍耶古有豢龍氏豢龍氏之於龍安知其非如伊耆氏之於蜡實掌其祭者耶所謂豢龍者其無乃羞飲食以祀龍之謂而好怪者遂以豢龍為畜龍也歟龍乎可畜其亦非所以為龍矣古今大水凡四而河與江為最河移徙潰決不常而江獨為安流意必有宰乎其間者而龍之奔走以効其靈也亦不可謂無𤓰州據江之衝則其建祠以祀龍也亦宜祠不知所始歳久圮壞嘉靖癸卯奉化王侯杏始為揚州府同知署府事乃斥贖金之餘修之而使道士某來請記王侯儒者也其為是舉也必有以通乎鬼神之情而悉於幽明之故矣余懼後之人泥於舊説而以為非經之祀也為之著論如此使龍其安且食於此而無慚焉且使讀者其亦無以余為語怪也重修解州關侯廟開顔樓記嗚呼漢建安迄今二千餘年而侯之烈自縉紳先生與小孺子皆能道之赫赫若目前事其廟侯而尸祝之者自都㑹以至一井一聚且徧天下而解人之慕侯尤深烝嘗伏臘尤䖍以勤者以侯之為其鄉人也解人之廟侯也久矣而為樓以棲樂者則始於國朝𢎞治時其扁曰開顔而樓蔽東西南三面若張幄然其南樓撤於正徳間東西兩樓亦久且壞鄉人某某等復醵金葺之又樹坊其南以承樓之缺而侯之居益崇且嚴矣侯以死事於法得祀乂侯故為將軍封列侯漢制列侯將軍得賜鐃歌鼓吹其沒而葬也得用破陳凱樂則鄉人備樂舞祀侯宜也於是某等因其鄉之士大夫員外郎丘君某來請文按侯始識𤣥徳於草莽卒然之遇而遂授之以肝膽死生之信至於崎嶇顛沛西東奔竄而其志愈不可奪窘於俘虜之中而其志愈明葢侯之大節磊磊如此而論者特稱侯之雄勇冠世而深惜其功之不就以為侯之兵不先加於腹心之吳而先加於肘腋之魏不先加於藏戈背伺之吳而先加於露刃面拒之魏故其勝魏也未足以肥蜀而其信吳也乃足以自斃且操權之不敵也久矣操也且懾於侯之威至欲徙都以相避使侯當時先吳之未發而圖之豈不可以得志噫此亦有數焉耳然使侯為摧鋒拔城之將孰與使侯為伏劒死綏之將也侯始遇𤣥徳固相許以死而已幸而得死侯又何求且夫摧鋒拔城之將勲庸著於當時伏劒死綏之將風采傳於後世勲庸在當時者身沒而響微風采在後世者既遠則人愈悲而思之此固世之所以尸祝於侯而解人所以慕侯之深者也不然古之雄勇如侯而能摧鋒拔城者豈少哉皆身沒而響微可以觀人心矣解之為州在太行上黨之間昔人論五方之俗以為山西懻忮而好氣而慷慨毅武奇節之士多出於其間若介子推先軫狼瞫藺相如馬服君諸人雖或死或不死皆耿然如寒氷皎日不負其志所謂偉男子者也侯從𤣥徳於崎嶇顛沛之中似子推威震乎敵國似相如馬服其賈勇死敵又偶與軫瞫相類豈慷慨奇節之士多出於山西而侯其傑然者歟今之山西古之山西也吾不知其俗之懻忮而好氣於古何如而慷慨奇節之士抑豈無有出乎其間如古人者歟然則解人之所以拳拳於侯者非徒為侯也葢將以鼓其所趨而成其秉節倡義親上死長之風也夫書以俟之常熟縣二烈祠記昔人論女子從一於夫比於臣從一於君之義自古奸人簒竊而其故臣不幸以才見籍錄于斯之時彼有棄瑕用讐之圖而我有佯合觀釁之便苟其黨有可攜事有可濟則逞於一擊以誅讐而復國若王司徒之於卓段司農之於泚此其勢逆而其事之難以必者也彼有棄瑕用讐之圖而我堅委質策名之誼寧死而不二其心寧死而不二其君若豫讓王蠋之說此其勢順而其事之可以必者也二者其所處不同而其要於自盡則一也是故生也而無迂身於徼倖之嫌死也而無自經於無濟之愧女子之於夫則亦有然者矣嘗讀史所載孫翊妻之事而壯之當二兇貪於翊妻之色而殺翊也妻既見窘逼於是藏機匿哀陽許二兇以婚而緩其期隂結故將為援須二兇以婚入而遂刃之雪不共天之憤於閨闥杯酒之間斯亦可快矣若夫二烈之事則異於是其夫以羈旅浮寄江壖非有可以豫藉之勢環而指者皆兇人之黨也非有肘腋可結之援方張島之誣其夫以盜而沈之於江島遂欲室其婦而島之黨欲室其女於是婦與其女倉惶闔門自刃以死嗚呼可謂烈矣雖然二人者豈不欲手揕讐人之胸如孫妻之為以報夫與父哉而勢有不能也則一死而其事辦矣故嘗合孫妻與二烈之事論之苟機有可乗而速忿以必死則殺身而無益苟事無可濟而濡忍以有俟則危逼而近辱此亦其所處不同而其要於自盡則一也二烈死時兇黨裒其尸而焚之其事秘無人能發之者後數年巡按陳君蕙詗得其事島與其黨始伏辜此葢足以見節義之氣有時而必伸淫兇之誅有時而必不能逭也歟二烈者固不必手揕讐人之胸而後為快矣事既白於是知縣羅君鴻為之立祠以祀扁之曰二烈而無錫安君如石請余為之記嗚呼此義行不特所以勸節其亦深所以懼兇也歟是有關於世教大矣烈婦某姓其夫某姓而逸其名相傳自通州而徙常熟之某鎮也零陵縣知縣題名記名者其起於古之所以勵世乎古之所以勵世其法莫備於史史之法莫嚴於春秋史家者將以紀善惡而垂法戒而千百年之善與惡不可勝書也則舉而寄其詞於名姓稱謂之間春秋之法微者名姓不登於冊書其非微者則槩而登之是史家之常法而無所擇乎其人焉者也其有不然者或微而名或非微而不名或書其姓而奪乎其名或書其名而又奪乎其姓其斤斤不肯輕予人以名姓也如此而後得登名姓於冊書者足以為重是史家之變例也今夫人望其容貌而問其人之善與惡者有之矣過其室廬而問其人之善與惡者有之矣識其姓名而問其人之善與惡者有之矣故古之圖容貌表室廬紀姓名使善者因之以久其善惡者因之以久其惡其為教一也零陵楚之南徼也邑乎郴桂之間瘴癘之所濡苗獠之所鄰往往不能得善吏而邑之譜牒亦散佚無可考自余父有懷公少時則已聞先伯祖平樂公始宰是邑有惠愛及為永州欲按其故蹟詢其姓與名雖邑之耆老亦無知者考之郡志所載零陵令之姓與名亦無有也已而更索民間所藏景泰中所撰舊志則稍具其姓名政事歴官大畧而其名亦已誤復為福矣有懷公為之慨然而歎因復思國家二百年之間其邑之善令多亦有如平樂公或僅存其姓名而又誤或并其姓名而湮沒焉者當不啻幾人而其奸回饕餮乗令之威肆毒吾民者亦幸而逃其名於後世豈非志於懲勸者之所悼歟於是蒐輯散逸得某君而下若干人以為是皆令也則槩登其姓名於石以著於世雖然後之人過而指其名有不就而問其為令之善與惡者乎問焉而知其令之善也雖百世有不愛而慕之如其人之存焉者乎問焉而知其令之惡也雖百世有不唾而譙之如其人之存焉者乎是則其為令也善而名之也甚於旂常之載焉其為令也惡而名之也甚於鼎象之鑄焉所謂美惡同詞其亦春秋之法也嗚呼其善者葢不忍欺乎其民而蘄以自盡乎其心初豈有意身後之名也哉其不善者葢亦偷快意於一時自計以為其去官與其身沒之後且影響銷盡人無復指之者豈知更千百年其姓名並彰著而不掩若此嘻其可懼也已廣徳州同知蔡侯政績碑記蔡侯之始去州也州人哭而送之境後十餘年侯以宦游過江南有傳言侯將取道於州州人喜於復見侯也逆諸境數日侯從他道去州人哭而歸則相與謀紀侯之政於石於是署州事判官張君遣陳生潘生來請為之書石余辭謝後一年知州歐陽君繼遣陳生濮生來復以請曰先生與蔡侯相知為深宜為之書余復謝曰余惟與蔡侯相知之深也是以未敢為之書夫蔡侯者居乎今而學古之道者也古之道盡乎已而不蘄乎人先其實而深避乎其名不然畏壘之民規規然感慕而俎豆之此庚桑子之所為懼而逃去者也且古之以循吏書於其傳者有之矣其在當時權任既重且專其居官也又久而信是以能為百姓立殊絶可紀之功而後史氏因書之為傳若蜀郡以興學書南陽以溉田書書渤海也以弭劇盜書膠東也以増户至十餘萬自漢時得書者纔數人而一人又各以一事殊絶自見而已自此之外其緣俗而治者豈遂少哉則以其事無殊絶故不書也蔡侯蒞州之日淺矣又州佐也操柄所不在故其所可見者大率緣俗而治侯之心且自謂不能有殊絶功徳加於細民而歉然不以為足也侯之所不自以為足而州之人乃欲為侯張而侈之不亦拂乎抑古之以循吏書於其傳者非特以殊絶之故亦以位不至通顯其所樹立施設止於一郡一邑而不究乎其大者故史氏亦從一郡一邑書之而謂之循吏傳若黄潁川薛馮翊其治績尤異固不在于蜀郡渤海之後以其事業有大焉者則不得從一郡一邑書之故不以循吏而别自為傳蔡侯行完而才鉅以方顯庸於時其勒之竹帛而銘之鼎彞固將有待若夫一州邑之績豈足為侯書之由前言之殆非侯所以致謙之意由後言之殆非州人所以尊侯之意也二生起而對曰先生為蔡侯言之則可矣而未始為州人慮之也廣徳負山之州也往時為吏者患州人獷悍多豪黠齘齘不可理以柔道於是一切爭為嚴峻深文痛法以繩督之而人亦遂相傳以為非刻深不可治廣徳葢州人之䝉兹詬而病焉者久矣蔡侯乃獨先教化而後誅罰事無劇易處之一以鎮靜人無奸良御之一以誠慤是以侯既去而人懷思之至今嗚呼此豈深文峻法之所及也哉由此言之州之所以為治者蓋在此而不在彼也是故州之人欲為之書以示後之為吏者使知州之所以為治者在此而不在彼也余曰若是則可以書矣蔡侯名克亷字道卿泉之晉江人中嘉靖己丑進士今為江西提學僉事其同知廣徳也以刑部郎中坐獄事謫以某年至州某年遷廬州府同知以去皆宜書鎮江丹徒縣洲田碑記古者與天下為公而泉布其利然山川林麓天地之產金石鉛錫萑蒲鹽蜃鳥獸翎革之𤨏細莫不為之厲禁而名山大澤雖封諸侯不以及者非自封殖也懼夫利孔不窒而争獄滋繁則是以其利人者為人害也其慮可謂深矣丹徒環江為邑沿江上下多有蘆洲其為利甚鉅而新故之洲時没時長故不入版籍而人據以為私每一洲出則大豪宿猾人人睥眤其間畢智殫賄百計求請或連勢人以揺官府必得乃已及不可得則讐其得者而相與為私鬪甚者搆亡命挺矛矟隂賊公閧於叢葦髙浪之間相殺或數十人官司逮捕輙反覆解脱獄案滿筐篋積十數年不可詰絶故洲之争未已而新洲之争又起於是丹徒之視蘆洲如懸疣枝指之著體非特其懸與枝而已且痛連於骨體而怵於心畜為瘇蠱不治日深而丹徒綰水陸之口厨傳日費數十金謂之班支郡邑公私筵燕諸所狼籍嵗費且數千金謂之坊支閭里騷然苦焉不可以已也莆田林侯既莅郡日夜問民所利病除所不便深知班坊苦民而未有以處也適㑹有洲田之訟於是慨然諗於衆曰吾欲祛兩害以興兩利可乎且夫古者山澤之利其權一歸於上而今擅於下古有遺人掌客道路委積賔旅廪餼之奉其費一出於官而今役乎民權宜歸於上者而擅於下則孔漏孔漏者啟奸而人以殃費宜出乎官者而役乎民則歛重歛重者積蠧而人以貧今若一切反此二敝使擅乎下者歸之於上役乎民者出之於官塞其漏孔而蠲其重斂因天地之贏以濟人事之乏収豪民之腴以代貧人之瘠是蘆洲之果為兹邑利也而又何病乎衆讙然曰侯議是侯又以丹陽水陸之衝與丹徒同而並練湖田為豪民所擅與蘆洲同思推所以處丹徒者處丹陽也乃并二議以請於廵撫公廵撫公是之請於廵按公廵按公是之既得請於是痛繩其豪之争洲者與其侵湖者而歸之官而兩邑廢寺之田附焉總洲與湖田寺田之所入而勾其贏縮以代故時班坊之所出裁其濫而存其不可已者於是出入之數大略相均以嘉靖癸卯九月而計籍成如其籍而行之遂以為故事邑人既深徳侯而恐後之人不能守侯之法也而又恐豪者惡是之病已而欲壊之也相率請於邑令茅君而鑿石以記凡洲田與寺田之在丹徒者為畝共五千三百九十五嵗入租二千九百石有竒易金可若干兩蘆薪嵗易金可百兩山薪嵗易金二十六兩以代故時班坊之所出定其額凡為金四百兩而羡凡湖田與寺田之在丹陽者為畝共三千四百五十有竒嵗入租千七百石有竒易金可若干兩湖魚嵗易金可二十兩以代故時班坊之所出定其額凡為金四百兩而羡藏其羡以待嵗収之所不及而間出其羡以賑凶饑自癸卯九月至乙巳五月總羡金九百八十二兩米千五百九十石有竒其纎悉列之碑隂其區畫出入則計籍具存林侯名華字廷份篤志古道為政一本經術余嘗為序其口義者其惠愛在民多可書兹以記洲田也故不及裕州均田碑記裕州於春秋𨽻楚蓋楚屈完對齊桓公之言曰方城為城今方城山在裕州境山旁有楚壁壘斥堠云地故阻險然四衝西脅武關東挾江淮北綰河洛南隙宛鄧四方輻凑其民平居則奔走送徃逆來諸費轇轕百出天下有難則徃徃首先受兵野多陂陀磽确土雜砂石不純可田種以故俗罕土著苦窳寡畜藏輕剽數徙無錫安侯來牧裕既爬剔宿蠧拊循疲瘵與裕人更始先是主計之臣議括天下田檄至裕安侯矍然曰此吾治裕首務哉且夫平瘠沃清錢榖息訟争在此舉矣未幾檄復下止之安侯曰人苟利矣吾専焉可也亟請於參政劉君副使傅君各是之於是經土劃野則耆艾董其役縱横廣袤則量人展其能方弓勾股則筭人竭其思跡阡驗畛則區長與程事因區制畝因畝準税區為綱畝為目綱以麗目則無漏畝畝為母税為子母以權子則無逋税以衍原隰膏腴之田一而當一平石岡田二而當一岡石山田三而當一山石陡坡四而當一陂池林麓廨宇鋪舍㕓市之稅例蠲除田溢稅則從増稅益田則從减咨詢徧故人無遁情版籍明故上有定徵疆土别故下有定輸計田凡一萬三千二百四十頃有畸計稅凡九千二百六十石有畸侯規畫精宻動中肯綮此其大凡也史氏曰孟軻有言仁政必自經界始自衛鞅首禍壊井田開阡陌以迄於今其間經國之臣憂時之士曷嘗不言經界然卒莫能行何也蓋亦難焉守令嵗月更改各懐一切無慮經久一難也語曰天降雨澤農夫悅而行旅怨豪強兼并率不以均田為便謗讟朋興多口可畏二難也守令不能履畝而較之則必寄於吏胥則有上下其手者矣豪右售賕得為蔽匿貧弱抑勒無以自明名曰均田實滋一弊孔也此三難也夫安侯可不謂明察深慮者哉安侯初舉事時裕人亦多訿訿者曰將無擾我安侯不為動既訖事迺人人樂業矣民可與樂成難與圗始顧不信哉安侯名如山己丑進士其為裕多善政兹不書重均田也建陳渡石橋記陳渡橋去郭南十里而近當邑西南諸鄉與宜興金壇孔道近郭而又當孔道故徃来于其上者踵相踐也橋故以石為之其始作與其既毁而易之以木皆不知在何時今獨有石趾在耳而木橋又不一二嵗又壊壊則輒更而作之夫屢壊則病行者屢作則勞居者而費且不勝計非石不可以久而莫之能任也㑹有浮圗人德山至遂慨然諗於橋旁之人曰吾力能辦此衆皆曰然因請山為主而相與以貧富為率出錢若干緡不足則山使其徒募錢于四方共得若干緡買石若干募石工凡若干其財取諸願助之家而不費官帑之一錢其力取諸傭食之夫而不勞公徭之一卒始於某甲子某月訖工於某月嘻可謂易矣蓋山之為人吾知之有粟必以施餓者而終嵗自食糠籺有錢可以易衣而嘗衣碎衲行雨雪中其苦行有足動人者是以募人而人争應之役人而人不敢愛其力宜其成之若是易也於是友人蔣君英玉吳君鎮之為之請書其事夫橋梁王政之所有事也徒杠缺而國僑致譏川梁隳而單公以刺然特語夫長民者耳矧所謂浮圖者固與世漠然絶不相值者也山口不粒粟身不全衣以此自足而絲髪無所假於世亦可矣乃復能急人之病而閔閔于一橋之成也如此則彼長民者固衆之所跂而望以庇焉者耽耽焉居飽禄以嬉其于人之疾疹阽苦則瞀瞀而莫知蓋先王一切所以捍災備害生人之道泯然盡矣其所缺者寧獨一橋也哉嗚呼此不為而彼或為之其亦可以觀世也矣德山某所人其橋旁居人出錢者凡若干人華氏義田記義田者其古道之遺乎其起於古道之廢乎古有之大宗者収族者也義田者其大宗之遺乎雖然有大宗則無義田故義田者其起於大宗之廢乎古者因族而立之宗族人有餘財則歸之宗不給也則資之宗其族人如腰膂手足之相與為一體其財賄如津液之經緯溶灌於其間惟其所虛則注焉而無有乎臃腫羸乏之處是以舉族無甚貧甚富之家而天下之為族者莫不有宗是以天下無甚貧甚富之人豈非所謂人人親其親而天下平者哉井田廢也而始有以貲甲於鄉宗法廢也而始有以貲甲於族甚則有童奴厭臛肉而族人操瓢者仁人君子惻然隱之於是以其力之所及為之義田以贍其族蓋猶有大宗之遺焉然義田立而大宗之名益隠矣要之義田非甚厚有力之人不可以為而宗法則百金之産亦可以相通義田非仁人與族為體者不能以相公而宗法雖纎嗇鄙薄之嗣亦不得而相吝是以義田之為制也狹而偏大宗之為制也均而溥然仁人君子其知既足以及乎此矣卒莫有推而及乎彼者豈古今之勢然耶抑亦以義田出於力之可以自為而宗法非上之人為之制則固莫能相聨屬耶何其宜及焉而莫之及也吾友無錫華君從龍積學好古之士也晩舉進士不數年遂請歸其於人間事既已屏絶不挂意而獨不能忘族人之飽饑乃割近郭田千畝為義田推其逺胄自十一世祖録事君而下之子孫皆籍之其不能自業者給口食其婚娶槥瘞給各有差略如范氏故事自十二世祖而上其族踈人衆則惟視其窶甚不能就塾與過時不能嫁者娶者槥者瘞者則量助之其管鑰以付録事君宗子而推擇族人之賢者一二人専理其事不稱則易其人而君之子孫則將别有處焉不使分給其中夫君之為此舉其可謂仁人君子之用心矣又能寓宗子法于其間豈不尤為近古者乎余是以本宗法之與義田相興廢之説而為之記使君之知足以及乎此者其尚益推之而及乎彼也哉救荒渰記嘉靖癸卯至乙巳東南薦饑溧陽史君恭甫既三捐榖七千五百石以助公家之賑而饑者猶不給也邑故多渰以匯水其沙漲渰在邑西北十餘里潦溢旱縮不障不陂棄為曠土久不可艾君既隠民之饑則計之曰古蓋有興役以救饑者吾試行之且夫嵗凶土荒民不足於食而有餘於力以力易食是民以不足為有餘也吾今日出粟於廪而異日取粟於渰是吾以故粟為新粟也人力地利兩易而各得不亦可乎乃度渰之東南隅廣長各三百五十丈可潴可防測水以凖而疆焉遂請於官募民興工民攜老弱就役者踵至君環堤而茇焉以居之每役一人日給米二升銀一分薪一束時米貴甚民以半米易麰菽而雜食之計一夫赴役自食可兼食其老弱瘠病之不能役者二人於是民之棲於堤者㸑煙飯飶列舍相接蓊然如處村落之間日出則畚者鍤者築者捄者汲者㸑者蟻旋於堤上夜則婦子抱哺嬉嬉而卧又晏然如在樂土而忘其為流徙饑饉之時也其始因渰之底深之為中池以蓄水出池之土環之為堤堤之外又環之為外堤以捍水外堤之北更深之為北池而竇其東西陲以通中池之水半北池之土更築北堤又於外堤之外並渰三面而溝之出其土更築小堤以捍渰之暴水内堤之内三面為池出其土髙築之以為架屋之所自乙巳八月至明年四月畢工而麥適登民讙然散歸曰史君活我核其費為銀若干兩米若干石大率日役若干人計所全活若干人共墾田四百餘畝為圩者三潦則水碍堤不得壊田旱則引堤内之水灌田可四千餘畝並渰而田之家多頼以濟自是百年沮洳欎為沃壤水降土升不相溷瀆各効其職以宜地産萑藋既去生我稻粱堤之隙地亦樹蔬豆縁堤䕃池夾植榆栁池中畜魚蝦蠏蠯蠃生生不淰於是即其地立為義莊嵗計田與堤之入與池之魚利易榖可得千石嵗儲之以待荒嵗之賑一不以給家用君又將築書舍其間以待鄉之来學者而未及也因更名其渰曰救荒渰以其邑人進士繆君所為紀實来請記蓋周禮上有荒政以聚民而下復有閭相受黨相収州相䘏以通其贏乏猶懼其未也則又使世禄地主之有力者與其廣瀦鉅野之可以利民者曰主以利得民曰藪以富得民以是彌縫上下之所不及其民遇凶禮或不見聚於上必見収䘏於閭里不見収䘏於閭里必見得于地主廣瀦鉅野之間其生路為甚多而天灾地沴欲死之而不能也民生其時豈不幸歟後世有司救荒之法既疎濶不講又無古鄰保之義以鳩民民有饑饉疾疫日夜祈死而已余親見乙巳之灾流莩滿野民之不忍為盜賊而自經死與糜其子而食者日幾何人余思欲上下強聒而不能而又無力可以及人也徒惻然傷之而已今之世無周禮所謂主者然貴家大族之有力而望於鄉者則亦有主之誼而瀦野閒田則徃徃有之然非有力不能興是以主與藪相聨而成功今觀史君所為而益信古之所謂利與富得民者其不為迂濶也然古之所謂主者皆與有長人之責而世其禄食其責既無所諉而禄又有可藉故其行之則易君既居閒無所責於世而纎豪皆割已之有乃殫力經營若家人之饑然者以是知君之為尤難也嗟乎使有力者皆如君其所以興起禮俗而有禆於國家休息生養之效豈小也哉余既自以其無力而有感於史君乃樂為之記史君名際嘉靖壬辰進士磊落多才略嘗為吏部主事不究其用而去故其施諸家者若此云大觀草堂記尚書西磐張公既歸老於家以書来屬余記其大觀草堂者曰願子為我言大觀之義我雖老矣而不敢不勉也蓋余嘗獲聞公之為人進無驚於寵辱而退無詘於隕穫躬盛徳之容而謙乎其若不足甘委順之節而坦乎其若有餘其幾乎古之與天游者歟竊意所謂大觀者公既已獨得之於心而人不能知而余也執器而不通于方曲學而不見乎天地之全是儒之陋者也而惡足以知公之大觀矧公之所謂大觀蓋得乎心而寄之草堂者也公之得乎心者既深乎其不可窺而想像乎公之草堂之景則其戴形肖貌露情獻態森然而萃以縱乎公之所觀者吾又未能即而登焉以觀公之所觀也而惡足以知公之大觀而又惡能為公記之雖然余未能登公之草堂以觀公之所觀而嘗登吾之草堂以觀吾之所觀矣方吾之心閒而無事以逍遥乎草堂而觀於魚鳥之飛鳴而潜泳煙雲之出没而隠映融然若有凝于精爽然若有釋於神是以物無逆於目目無逆於心而心無逆於物一旦情随事以遷勃焉而有鬪於是而心逐逐焉而目􅍃􅍃焉凡向之飛泳而出沒若有凝於精而釋於神者舉皆不知所在矣徐徐焉鬪解而機息乃始還而觀之則草堂向之草堂而煙雲魚鳥向之煙雲魚鳥也於是為之憮然而一笑嗟乎嗜欲有蔽乎其中則凡物舉皆得而匿乎其外物舉皆得而匿乎其外則雖與之游乎瀛海之表而騁乎坱漭憑虛之域亦窅然若無覩也而况於草堂乎夫大觀者通宇宙而為觀也故謂吾草堂之景非公草堂之景不可謂吾所觀於吾之草堂非公所觀於公之草堂者不可則願以我所觀於吾之草堂者而記公之所觀於公之草堂者以為公之能得其大觀蓋不蔽於欲而物不能匿也西峪草堂記靈寳陜洛之衝也環而山者以數十而西原獨當其僻處西原蔽秦山之南委蛇數百里散而藪者以數十而西峪又獨當其最深處峪口偪仄始疑路窮忽然中開更出異境茂樹淺草森隂蔽虧水泉㶁㶁若驚蛇出沒草間其人鹿視而穴居可二十餘家於是許君廷議游而樂之乃即峪口作草堂於其上仰而眺秦山俯而顧西峪煙雲竹樹隠見千態不下席而盡取之其勝又於是為最己亥嵗予見許君於京師君為人鬯逹魁岸尤以兵自雄余固意其必且為國家建萬里勲也一日與余論草堂之勝且曰吾將去而休乎此矣余笑而詰之曰君不聞馬文淵昆弟之相笑者乎夫嵬才傑士其所寄意必於奔漰洶湧之川巑岏崔巍之峰泱漭千里之野極世間險恠瓌偉超曠之觀然後足以饜其耳目而發其跌宕濩落不羈之氣若夫耽水竹之清幽䕃樹石之蘙薈此則窮愁枯槁之人漠然無所振於世而有以自足其樂於此夫固各自為尚而不能兩得也今君試料才氣與文淵少游竟何似國家且北収河南南繫交酋之頸假令據鞍躍馬今之人孰能先君者乃欲乘欵段優游閭里自比少游其寧可得耶三門之間洪河巨石怒而觝撃砰砰磕磕若戰皷然百里之外有聲而殽函又秦漢以来百戰故處過而覽者莫不躊蹰慨然想見乎揮戈濺血虓虎喑嗚之雄此皆險恠瓌偉世所駭詫且近在君衣帶間君何不寄意於此乃欲自託於寂寞背嵬才傑士之好而就窮愁枯槁之所樂此又何説耶噫嘻吾知之矣君居河上豈嘗受河上公語耶故曰養辯于其訥藏勇于其怯然則君之欲為彼而姑為此也其有意乎倐而蠖屈倐而虎躍則余不能窺也已任光禄竹溪記余嘗游於京師侯家富人之園見其所蓄自絶徼海外竒花石無所不致而所不能致者惟竹吾江南人斬竹而薪之其為園亦必購求海外竒花石或千錢買一石百錢買一花不自惜然有竹據其間或芟而去焉曰毋以是占我花石地而京師人苟可致一竹輒不惜數千錢然纔遇霜雪又槁以死以其難致而又多槁死則人益貴之而江南人甚或笑之曰京師人乃寳吾之所薪嗚呼竒花石誠為京師與江南人所貴然窮其所生之地則絶徼海外之人視之吾意其亦無以甚異於竹之在江以南而絶徼海外或素不産竹之地然使其人一旦見竹吾意其必又有甚於京師人之寳之者是將不勝笑也語云人去鄉則益賤物去鄉則益貴以此言之世之好醜亦何常之有乎余舅光禄任君治園於荆溪之上徧植以竹不植他木竹間作一小樓暇則與客吟嘯其中而間謂余曰吾不能與有力者争池亭花石之勝獨此取諸土之所有可以不勞力而蓊然滿園亦足適也因自謂竹溪主人甥其為我記之余以謂君豈真不能與有力者争而漫然取諸其土之所有者無乃獨有所深好於竹而不欲以告人歟昔人論竹以為絶無聲色臭味可好故其巧恠不如石其妖艷綽約不如花孑孑然有似乎偃蹇孤特之士不可以諧於俗是以自古以来知好竹者絶少且彼京師人亦豈能知而貴之不過欲以此鬪富與竒花石等耳故京師人之貴竹與江南人之不貴竹其為不知竹一也君生長於紛華而能不溺乎其中裘馬僮奴歌舞凡諸富人所酣嗜一切斥去尤挺挺不妄與人交凛然有偃蹇孤特之氣此其於竹必有自得焉而舉凡萬物可喜可玩固有不能間也歟然則雖使竹非其土之所有君猶將極其力以致之而後快乎其心君之力雖使能盡致竒花石而其好固有不存也嗟乎竹固可以不出江南而取貴也哉吾重有所感矣永嘉袁君芳洲記介乎永嘉左右者若天台雁宕之恠巧瓌麗甲天下其間嘉卉美木蓊然雜植雖博物者亦半不識其名品故自古好逰之士輒以永嘉山水物産為第一宗喬以為是非吾好之所存也吾獨好橘於是種橘數十本於洲上遊而樂焉因以為號曰橘洲主人又曰芳洲主人視其意蓋極世間名山水自以莫如吾洲一切嘉卉美木自以莫如吾橘也而間請記於余余始亦訝其迂且僻而笑之既而歎曰宗喬可謂自足其樂而不羡乎外者矣夫趣有所適則不必其地之所勝意有所鍾則不必其土之所珍嘗試觀於草木之生雖其竒花異卉至不易生之物或絶逺生在海外苟以人力移之而樹藝擁灌之如其法則東西南北惟所徙焉既久而炎冷燥濕之性亦随變矣而橘也確然獨異乎是蓋昔騷人為之頌曰受命不徙生此南國是草木中之専一耿介者也夫騷人彚萃天下之香草美木以况其幽馨窈窕之思然皆未有特為之頌者其於橘也特為之頌豈偶然感觸而假物以發興也哉取其臭味之深有合焉耳宗喬少業儒而以醫自進其志行耿介又雅慕王喬羡門子之道翩然有廹隘斯世輕舉逺遊之思窺其貌葢未嘗以肉食之故而變其山澤之臞也其自寄於橘也殆亦有騷人之意乎余愧無橘之徳亦頗以迂戅不通於俗余家故隣太湖太湖橘藪也余將買山種橘於洞庭之上而老焉清秋霜落搔首而歌楚頌欲以招宗喬宗喬其許我乎否也吳氏墓記昔范蠡所自稱述得計然之䇿七其五用以覇越其餘用以起家而白圭之徒至自比於呂尚孫吳其言頗近誇誕然跡其料穣惡節贏縮權取予亦有道焉蓋足多也自子貢取譏於孔子而儒生遂不敢言治産不知人固不能祼形而枵腹則亦不能無所營而取給且夫公卿大夫修仁義躬教化以導氓俗庶人勤膂力盡山澤之利阜貨賄以給公上各有常業不能相廢而儒生欲槩以一説則過矣吾鄉吳翁衆所指為樸忠長者然翁自少工治産累數十年遂以貲雄邑中觀翁所為大率能取人所棄與人所取能知予之為取能擇人而任時徃徃與古人暗合所謂修其常業儒者莫能訾者也翁始家邑之南隅既老則治别業於徐湖之上穿池養魚優游其間又於其旁度地為葬所雜植材木蓊然塋竁羡道室廬門垣既周以固朝夕徃遊而樂之以待其終而葬焉嗚呼死者人之所必不免也而世俗多諱言死至以石火易盡之身而枉苦其心神豫憂逆數動輒為門戸千百年計慮皆若可以目睹而足履曽不量其身之不待及形氣衰枯死徵已見而尚持籌操鑰勾較米鹽斤斤如不及不自虞其死至於病且死也徘徊顧慕周覽其家之所有戀戀不能舍一物而去此又世之殖産者恒態吳翁乃于生時預為葬地其營壙也如營其室家其植木於墓也如植於園圃徃来松楸墟壠之間不為之悽愴悲懐而顧以為適頗似能視死為歸而知生之不可貪死之不足患庶幾委命而順化者其與没溺牽纏于厚利不能自反者固有間歟墓可數畝材木可數百株土石之工皆樸而不華祀田若干畝帶墓左右以翁之力能自侈其墳墓而所為僅若此此又可為世之破産厚葬虚地上以實地下者之一勸乎翁葬後幾年而其孫嵩與嶽求余記其墓余不能辭也為之書若其世系履歴子姓之詳則銘誌具存而支隴向背起伏風氣散聚此堪輿家事儒生所不窺故皆不書休寧陳氏墓廬記墓祭非古也其起於人之情乎禮起於情之不能已故雖好古執禮之士亦未有能非之者也休寧陳氏墓在某地于墓左个有廬若干楹嵗時上塜則血牲而祭于廬環廬有祭田若干畝作廬者陳君萬秀葬而奉以祭焉者萬秀之父筠軒翁也萬秀故客武進與余父游至是走其子憲以狀詣余請記且寓以書曰嗚呼萬秀先人在布衣中非有竒節偉行可以不朽然子孫㷀㷀之志竊願徼惠于君子録其一二事可紀者而鑱於廬之壁庶幾使我後之人其無忘乎按狀筠軒翁名帥英字希武父名原以行誼著鄉曲陳氏之先自唐末始家歙之休寧其里曰滕谿若干世又自滕谿徙宣仁翁今所居也陳故有顯人在宋有為翰林學士者勝國時儒人定宇先生櫟實生其族載在譜牒翁為人俶儻好義歙人多賈而翁故亦以賈業翁在儔輩中㟁然長者魁傑之氣正徳癸酉間峝源姚賊羣起流刼徽郡以旁近賊故檄民為兵守險扼鋒翁與在行間師克㨗翁以多有司給銀牌一為賞辛巳嵗今上即位迎母后于藩道江徽當遣役人供張往江上徽郡守推擇部民為衆信者使督以往遂以屬翁時暑甚翁老且憊觸熱旦暮馳至大洪嶺病死郡守愍然遣人舁其棺還之家休寧令給銀為埋具以旌之翁以甿庶凡兩從王之役然桃源之役縱横鋒鏑間去死隣耳翁竟生歸且受賞江上之役其事不過奔走輸將之間絶非險阨然竟以死固可謂之數也翁卒以某月某日年幾十有幾葬以卒之某年月日徽之俗羯􅀈喜鬭小睚眦則叢然挺而相擊然用之於義亦往往慷慨前死不避其氣然也翁豈其人乎春秋之義以王事出疆而死則為之加等此固為有列于朝者言也其亦可以通之庶人矣乎余既哀陳翁死役之義而矜萬秀之志故為之記翁子三人萬玉萬瑾萬秀其季而孫憲来求余文者也吳氏石亭埠新阡記石亭埠在郭南五里蓋陽羡一小山耳而發其竒者自頥山吳公始陽羡諸山多峭㧞而是山獨蹲伏蜿蜒以其伏也而峭㧞者乃若環而揖焉諸山皆競秀而是山獨若不見其秀者然登是山則諸山之秀可盡攬而有之如人之謙而尊又如人之深藏不自炫露而萃衆文以文其身也公遊焉以為竒于是出之灌莽豺狐之窟而築之室以居因其泉甃而曲之以為池閒則與客即而觴焉自是石亭之勝聞於邑中而地理家亦以是為吉也即山居之旁而壌樹之以為生墓及公之卒也則遂葬乎其中而賔從戚友嘗從公逰者于是又以送公之葬而至焉以公之所嘗遊而眷然於公之不可作也則為之悽愴而悲懐順之言曰夫公逹人也豈有所介介於生死徃来之間哉昔者公之来遊也當其朝煙方散而夕霏又凝春華始歇而夏木載隂宇宙之景既日新而不窮投壺賦詩惟意所適鳴琴角奕分曹更進人事之樂亦逓代而不厭于斯之時孰不以為此樂未極而公則已譙譙然亟為身後之圗培壠樹檟若恐後之以公之逹蓋不待奏雍門之曲而知樂之必有盡其從公游者又不待聞山陽之笛而知聚之必有散矣夫葬者藏也藏者息也此其無知而不可以生致者也雖然高臺未傾曲池如故果木花卉手植猶存其有知而可以生致者又安知其不且徃来嬉戲乎其間春猿之與唫而秋鶴之與飛矣乎以公之生而游也有不忘乎其死之圗孰知公之死而息也有不遺乎其生之樂者耶此可與通乎幽明生死之故者道也故余為此言以慰公而且以慰夫嘗從公游而悽愴悲哀於公者公諱仕字克學為人剛重有廉隅博學而文少發解南畿舉進士歴官提學副使其為副使也坐不能俯仰故早乞身焉而足其樂於谿山泉石之間公晚而有二子騂驊其所交多當世豪傑在同鄉中與養齋徐公相交尤深以余之無似公亦忘年而與交焉余寓陽羡時公數邀余飲于兹山之上而公之營墓嘗埋雞卵榖芽五色線以驗其氣則余及見之葢公嘗屬余記其所謂山居者而未果也及葬公之弟滄溪翁儔以新阡記為請嗚呼不及記其山居而記其阡焉其亦可以復于公矣敘廣右戰功紫江沈公自襲指揮使時未弱冠已能馳馬手搏賊賊憚之未幾調征永安嘗以數百人擣陳村寨賊牆立山上公一人拍馬而登賊却下山誘公入淖中馬䧟以吻拄淖中而騰其足及於陸三酋前趨淖刼公一酋鏢而左一酋刀而右夾馬一酋彀弩十歩外公捩頸以過鏢而挑右足以譲刀鏢離頸寸而過刃着於鐙鞺然㫁鐵公射鏢者中缺項殪左挂弓而右掣刀斫刀酋于鐙間㫁其頰車折齒殪弩者恟失弩僂而手行上山公又射之中膂既連斃三酋後騎至找其首公以二酋譲後騎而囊㫁頰者自為功餘賊麋而入箐追兵戰於箐中斬首若干級毒弩中公膊整軍而還驗功或以㫁頰者非全首難之監軍吳布政怒曰賊豈伸頸而待斬乎命紀之以功遷都指揮僉事義寧賊寇臨桂掠而還巢公追之巢有兩隘賊伏兵丁嶺隘以伺使熟猺以某隘閉告而導公入丁嶺公䇿之斬所閉隘而入果無兵守於路擒販者數人以丁嶺之賊告遂牽以導巢而熟猺亦以公斬閉隘告丁嶺之賊賊還趨巢大破之賊奔公獨逐一酋酋騎而走崖窘釋騎跳而下澗公騎跳而下澗澗深沒顛馬浮而岸毛盡濕束濕馬于樹縁澗而求酋酋泅而逃矚水中影射之血縷水上入水斬之後騎相屬至厓望見公提人頭立水中厓峻不可跳乃尋路從公則賊遁已逺公乘濕馬與諸騎追之猶斬數十級而還茘浦賊八千餘渡江而東寇諜者告公倉卒率五百人待于江岸駐白面寨去蛟龍滑石兩灘各數里諜者又告賊飽而歸將及江公以為滑石灘狭牽線而濟雖衆可薄也蛟龍灘濶成列而濟衆難圗矣吾欲奪其濶而致之狭令製旗軍中無尺布伐岸竹掲竿而編篾以為縿刻頃成數百旗揷之蛟龍灘令羸卒數十人守之燃柴煙以疑賊賊至果避蛟龍趨滑石公分兵兩岸而潜以小艦載勁卒數十伏葭葦中賊營于中洲以䕶濟濟且半公以艦乘瀧急衝之兩岸軍譟而前有酋騎而水立挺鏢當艦公舍艦跳水斬鏢酋人騎皆踣洲上賊辟易賊濟者西奔巢未濟者却東走上山而復潜趨蛟龍灘以濟洲賊孤艦軍攻洲兩岸軍始至下水夹攻之洲賊後行擠墮淵溺死無筭其前行盡俘之得生口首級若干収賊所掠牛畜之在兩岸者是役也以五百人破八千餘賊公用竒徃徃如是復以功遷都司同知嘉靖六年岑猛叛聚兵數萬人督府奏誅之一日督府召公計曰歸順岑璋猛婦翁也助猛奈何公素能得土官隂事曰璋女失寵而璋心恨猛徒貌合耳公復宻語督府云云如此可使璋擒猛督府復曰猛乘上流之勢擁兵建瓴而下則邕梧諸郡危矣奈何曰此不足憂土官大率飽富貴戀巢穴所以叛者懼誅耳非有他志也猛離田州而子女玉帛皆在彼或乘虛襲之猛安得不慮乎督府又慮猛且走交趾曰猛走交趾則閉不能歸矣猛安得不慮乎猛果如公所料而岑璋雅敬公公潜使人于璋於是督府進兵分五哨入猛勁兵盡在工堯諸将死讓無敢當者公自請將中哨當工堯去工堯五里而軍進攻隘隘堅復退營五里而粮且盡湖兵五千人請於公願得一飽而死敵公時僅有自賫家粮五十石與湖兵人給之升而官軍縮腹張目以觀湖兵分米不敢言公無以為計時左哨将與公隔江而軍公潜濟江就左哨將乞粮而請并兵攻工堯左哨將以分地拒公公笑而還曰兵粮吾自有之姑試公耳左哨將慚公還軍乃夜分軍三百人縁山而右走間道三百人縁江而左上山並繞出工堯背揷旗為號煑餘粮為稀糜食而遣之黎明合戰賊殊死鬪我軍却麾而進又却公親斬却者一人而提其頭以令軍復麾而進先所遣間道卒皆已至登山揷旗初岑璋既與公為約而遣兵二千人陽為助猛守工堯遺精卒千人以䕶女為名居猛左右璋兵在陣後望見山上旗大囂曰天兵得工堯矣潰而却猛軍見後陣却亦嚻而却我軍乘之斬猛子邦彥于陣中蹂尸數里遂入隘得其積粟軍始飽乘勝攻田州猛聞工堯破窘急欲走交趾而璋卒五百人䕶猛妻以歸五百人獨守猛指猛所欲走紿之曰此路皆天兵也不如且走歸順為後圗猛不得已從之璋待于境相見因相抱哭璋以子女歌舞飲食恣猛圈留之而潜遣其子報公于田州公入田州五日而諸哨始至璋所使報猛所在者事頗洩左哨将移軍壓歸順境索猛欲破敗公事自為功璋以二十牛百甕酒犒軍而謂左哨將曰猛誠有之公無急也于是醉猛而斬其首函送督府斬他囚首貫猛尸而以與左哨將左哨將喜於得猛而抽軍獻猛首督府則猛首已梟一日矣猛死田州平安置猛子邦相於福建而議設流官公曰思恩設流官反側至今未息田州復然兩賊且合從起矣督府不聽且調公守田州公請以他將假守三月而待希儀治裝他將守之一月而田州酋盧蘇果與思恩酋王受連兵刼城他將狼狽歸田州復為賊巢公又言於督府曰兩酋能用其衆以復故主為名今若返岑邦相于福建而置之南寧此竒貨也可使兩酋坐受縳矣督府復不聽而徵兵數十萬征之既而失利督府以罪罷新督府餘姚王公至其所以撫定兩酋公多與其謀因薦公右江叅將右江故治栁州栁在萬山中城外皆賊巢軍民至無地可田而室廬妻子數被焚刼知府劉璉殪于賊知府鄧鋐間出城弩中其膊自是諸軍民官必甲而後敢出城城兵又疲不足仗公為叅將始議剿五都五都去城五六里而巢最險賊又最獗所虜獲人畜最富巢中不聞官兵者百餘年公乃以五百兵付百戸蔣紹宗使搗其巢賊蜂出裹我兵殺數十人而隘其入路使不得返我兵即賊巢為營固守而因賊粮以為食然氣奪不能戰賊亦欲坐踣之于是百户潜遣人茇而告急於公公即上馬復聚兵得五百人入巢為援既至聲銃者三因奮擊賊百戸兵聞銃聲亦出奮撃賊賊分兵為二腹背戰我兵鼓譟斬級賊不支然尚横鯁兩陣中守隘不肯散公使人茇而以勝告百戸百戸亦使人茇而以勝告公公因謂百户曰汝且據巢毋出待賊服乃已不服更夾攻之可盡擒也賊素怯栁州兵最易與至是詗曰汝誰也敢入吾巢公使人紿曰是新叅將老沈所率藤峽軍耳兩江賊熟老沈名而憚藤峡軍因咋舌曰吾固知栁州兵不及此相持數日賊不退然心懼因熟猺為解熟猺者界漢人生猺獞間陽附官軍而隂附賊或官軍勢盛附官軍賊勢盛附賊以為常于是熟猺間說於公曰請為兩家解鬪公度賊尚勁乃且聽其説而謂熟猺曰返我生口牛馬我兵乃去賊以所虜生口二十牛馬百四十為獻賊収衆奔山頂而空隘以通百户兵公兵與百户兵牽連行至城城中人讙始知栁州兵之能戰賊也公以為欲大破賊非狼兵不可右江狼兵惟那地最勁乃請于軍門以那地兵二千戍栁州栁之有戍狼兵自公始先是賊勢張甚而熟猺及城中黠吏民多為賊詗者賊耳目徧官府左右官府閨闥動色情性賊在谿峝千百里外輒知凡議大征或鵰𠞰口語沓沓未及聚兵而手足盡露以是賊得隂為備或伏巖藪伺官兵殪之或先徙妻子畜聚于鄰巢而自空巢以待官兵官兵至徒手無所得甚者我所任為鄉導徃徃為賊誤我入死地崩墜厓谷不戰而糜爛者過半而賊以耳目故益知官軍虛實與民積聚少多乘虛掠多所入無一當而所噬無不飽我兵築堡増戍則益紛然如刻穴守鼠而賊活脱不可蹤跡公以為圗勝筭莫如得賊情得賊情則莫如諜而使官府人為諜則賊生疑于是隂求得素與猺人商販者數十人假以買物召至府宻謂之曰吾素知若輩通猺吾不罪若更與若銀為販本若試為我詗賊衆感諾乃人給銀五兩使益買物散入諸峝中諸猺雖凶暴樂殺人然販者至則寨寨傳送䕶衛飲食恐損一販者則諸販不至是以雖絶棧深箐販者無所不歴每有動静販者輒先知奔走報公公厚賞販者而秘其事雖肘腋親近絶不得聞至期鳴銃者三則諸兵皆聚第謂之曰今日出某門而遣心腹人為旗頭引諸軍諸軍貿貿行問旗頭旗頭不知曰然則汝何引我曰公強我徃我漫徃耳軍行千萬人其所徃獨公與旗頭兩人知之而已頃之劄營設伏賊果至遇伏奔追殪之已而賊寇他所則公軍又已先在或絶逺村聚賊度官軍所必不至而潜寇則公軍又已先在賊始驚以為神而我軍亦不知公自何得之也公始至栁令諸猺得出入儥買游戲城中無禁諸猺時入府見公公兒女撫之久之稍稍擇其巧便曉事者結以厚賞使詗賊後賊發其火伍中輒報公公又厚賞之而間謂諸猺曰若見我若妻子何不来見夫人諸猺叩首不敢公曰試令其来已而猺婦五六人来夫人好言慰勞賞之針線包帕諸物以銀簪簮其頭又命諸妾婢灌之以酒人數大碗察群婦中其夫嘗以賊事報者則又隂摘之他所勞苦之曰若夫為吾大人盡力良苦私賞之包帕銀簮諸物倍於人前所賞者而益以珍果美物塞其袖中又隂戒之勿令人知也諸猺婦既多得賞又酒醉踉蹌舞手出府門猺夫望見之歡喜争前掖而歸巢自是諸猺婦来者至數百人夫人傾筐篋針頭線尾皆盡猶不能給而猺婦相戒以勿令人知者猺婦又洩之以所獨得珍果美物誇諸猺婦以為夫人愛已諸猺婦皆怏怏心羡嗾其夫使報賊冀已入府得珍果美物而公間使人徃諸巢中隂以夫人之命賜物諸猺婦自是賊中消息或諸猺不肯言則猺婦嗾之使言或諸猺竟不肯言者則諸猺婦自以使人至巢賜物時附耳語云云若勿向我老公語也公用兵風雨来去既得賊時率輕騎剿其尤劇者一二人兵至巢以菅為繩繞記劇賊家示諸軍所捕繩之内老弱婦女牛畜無一免者繩之外老弱婦女牛畜無一及者遂出巢數里遇平地度賊援所不至則停軍審究其為劇賊家婦女牛畜者収之其雖獲于劇賊家而係鄰家與鄰巢者還之諸猺得完室家與見還者皆喜以為徃時官軍入巢見人輒殺或賊遁則搜斬不為賊者以充級故賊詈我輩我雖為賊時得脱或保孥貲汝輩雖不為賊時見殺或孥貲為虜自今我輩乃有顔面詈賊矣公入巢有助賊戰者既還軍遣熟猺檄之曰若奈何助賊戰吾𠞰若無赦頃之擣其巢盡殱之自是凡所鵰𠞰歴數百巢竟無一人敢助賊戰者鵰𠞰所過他巢或弓弩而門瞷既還軍則檄曰若奈何弓弩而門瞷今罰若五牛不者且𠞰自是所歴百數巢竟無一人敢弓弩而門瞷者所獲劇賊多不殺剜兩目則兩耳賞銀數兩而還之巢自是他賊有所虜掠多不遣兵而用剜目者騎而一人牽以詣賊使徵所虜掠賊見之驚曰某巢某也震懾不敢隠盡還所虜掠而剜目者索不已賊至出自所有與之公以給被虜者而以其餘給剜目者剜目者每一入巢則利益多而為賊者所獲每不補所償則益無利在栁州所剜目七人其六人皆為官用其還巢而復為賊者覃萬星一人而已公竟以計擒殺之公始議發兵故制欲發兵必請督府督府檄下乃發公以為吾治文書吾掾史知之文書上府府檄下我府掾史知之多人知則洩又栁去督府千里待報踰時坐失機㑹而書檄徃来水陸諸巢絡繹能保不為賊得于是凡率兵入巢未嘗先請既勝則上首虜督府而以邂逅追賊至巢為解於是督府不能以文法詰而兵謀得無洩公嘗欲𠞰一巢而恐其洩也乃佯病所部入問病公曰吾病思鳥獸肉若輩能從我獵乎因起出獵去賊二里而止營軍中始知其非獵也公耳目多賊不能藪率走之他巢他巢人又嚇之曰公且𠞰汝則又走之他巢他巢嚇之則又走跰血瘇以死或餒槁崖谷公又每以甚雨凄凍風𡨕之夜察賊所止宿處四散遣人賫火銃以筒貯火衣毯衣毳帽與草同色潜至賊所夜聲銃者二賊盡驚老沈至矣挈妻子裸而蒲伏上山頂兒啼女咷徃徃寒凍死或觸崖石死不者且為虎咬諸妻子更相嗟怨汝為賊之利至此黎明下山詗之則寂無人隂使其黨至城詗之時公所遣衣毯者四散諸巢同夜舉銃明日諸巢所使為詗者亦同㑹于城旁西巢人謂東巢人曰老沈昨夜来吾巢東巢人謂西巢人曰老沈昨夜来吾巢則固已更相怪駭已而詗之城中人則老沈固安坐城中不出也益怪駭曰昨聲銃者誰耶鬼耶諸猺又自相嚇曰虎咬人者老沈所使也自此賊益膽落或易面為好猺獞而栁城四旁一童子牽牛行深山數百里無敢訶者其軍民徃徃寄牛於猺家以耕或索雞酒於猺猺不敢不與公在栁先後十三年名賊宿猾幾盡而韋扶諌者馬平四都猺賊弩中知府膊者也兇猾甚先是嘗七捕之不能得至公亦七捕之不能得㑹有報扶諌逃隣巢三層巢者公潜率兵𠞰之至巢則扶諌又已與三層賊徃刼他所而三層賊妻子獨在公盡俘以歸計七十餘人平時公所俘賊妻子盡以與狼兵為賞至是獨不與而閉之空室中善飲食之公又隂使狼兵數百人怒而挺刀狰獰入室恐諸婦女作欲搶狀公佯執鞭痛鞭狼兵使退如是者三欲以深徳諸婦女而潜使諸猺聞之以繫其心公又使熟猺謂諸猺之亡妻者曰吾不害汝但得韋扶諌則還汝妻子矣諸猺四五人来投公公令入空室視其妻夫妻相持哭其小子牽其父哭妻曰非沈公吾為狼兵殺且搶久矣已而怨相詈曰咄扶諌非汝爹非汝娘何不縛以贖我諸猺心割而别復見公公曰欲得扶諌耳諸猺曰扶諌已逃他巢圗之實難雖然願公切勿以吾妻子與狼兵也吾且為公緩圗之公曰諾因殺牛犒諸猺而去之諸猺踪跡扶諌所在遂徃以言惱扶諌曰還我妻子扶諌不應諸猺因曰我輩失妻子計窮惟有更随汝作賊耳扶諌喜諸猺乃詭相與計曰今官府虜吾妻子而穿山驛與守堡百戸與廵司俱在山中今徃刼之三印可必得也官府懼失三印得重罪以易吾妻子可必得也扶諌曰善扶諌既離巢則黨益孤諸猺因醉扶諌與其黨而縛之置巖洞中而使熟猺報公曰得扶諌矣恐見賣可遣吾妻子於三十里外相易公以為吾不遣諸猺且謂吾怯於是鎖諸猺妻刃挟之以行至三十里使熟猺諭諸猺曰諸猺且刼妻子者先殺妻子然後戰諸猺請於公曰吾獻扶諌懼讐公可遣三十人至巖洞自取之公慮諸猺有變乃選健卒十五人賞而遣之曰得扶諌吾且賞汝若諸猺殺汝者吾且重賞汝家又以十五人付之熟猺而質熟猺妻子曰十五人者損一人汝妻子虀粉矣至巖洞中果得扶諌而出諸猺閉之五里外懼扶諌徃而妻子不至復要公曰必相易於此公又曰吾不徃諸猺且謂吾怯於是先遣諸猺中妻女四五人徃言刃挟諸婦女狀諸猺吐舌懼殺妻子帖息不敢動遂易扶諌以歸剜扶諌目截耳剔心手足斬之而四懸諸城門諸猺出入城者見之無不股慄諸猺既熟公威信公嘗調一巢徃征他巢雖懼讐然不敢不徃牛畜盡俘以歸獨首虜生口視狼兵為少耳公亦盡以所俘牛畜賞諸猺其後復調而與之期㑹天大雨諸猺懼失期乘雨泅溪水沒者六人公勞苦之命沒者人三牛付其家其餘皆遣還之自廣西為將如韓觀山雲惟能使猺人不作賊至公能使猺攻猺則廣西所未有也十六年而有思恩岑金之變初思恩府土官岑濬叛被誅而立流官以其酋二人徐五韋貴為土廵檢分掌其兵各萬餘人而聴於流官然夷民獷悍不樂漢法數十年間凡數叛則數舉兵誅之而亦不能定也當破岑濬時調兵鎮安鎮安掠思恩生口以歸己而其中一人長大而姣因託言岑濬子而名之曰金夷民益思亂鎮安乃潜召其酋長出金而與之盟曰汝小主也諸酋感泣擁金以歸鎮安因要之曰金立與我某地幾百里遂盟金而遣之諸酋聚兵五千人以奉金將攻城郭復故地諸夷多欲為響應者勢洶洶而先時濬既誅其酋楊留者無所歸乃率其黨千餘人詣賔州應募為打手賔州兵素弱故倚打手至是留欲徃投金以逞時公與兵備皆在賔州留入言於公曰留小主人在請徃公方慮岑金之危思恩未暇慮留之在肘腋也聞留言獨心駭以為金去賔州數百里而留應之表裏相扇賔州危矣賔州危則咽喉哽咽喉哽則廣右盡騷而何有于思恩此事大不可急圖宜以計欵之乃婉色好語謂留曰汝第徃我曩征田州調兵鎮安時已聞有岑金在是岑濬第九子也留聞是言固己刺心公因叩留曰聞鎮安縶金甚堅何因出乎留詭曰百計逃耳公低聲作自語狀曰岑氏其復乎欲以深動留而呼留至宻所曰為我一言語金若欲官必毋殺人刼城若欲殺人刼城任汝自為之金能聽我言可以狀訴我及諸上司留唯唯公遂與留銀十兩而以花紵方摺之納留懐中為我寄金得官後為衣衣之可常念我也公復紿留曰金欲官非賂我萬金不可留曰金誠當盡力然金方倥偬安能辦此公笑曰吾豈遽責金耶且欲得一帖為信耳自是益信公無他腸矣留出公又呼還謂之曰我幾忘之韋貴徐五素仇汝亦仇金可善備之無墮彼計也留詣金具如公言金大喜真謂倚公可得官矣因率其兵五千人詣賔見公至城門門者懼而報公請無内金公怒罵曰金非賊奈何不内覘者以告金金心益安率其衆散入城而與留及其親信二十人皆𠂻甲見公公曰金来乎留曰来矣金叩頭潛以萬金帖子奉公公復笑曰若窮鬼安得此乎金曰頼公力得官不窮矣頼公力誠不敢忘報公子孫公戲曰汝土官多不知恩汝得官且忘我矣况子孫乎金唯唯不敢公乃令其姪出見金曰金汝兄弟也金得官他日每一出征乞金四功與汝公復為金計曰汝賂我兵備公獨無賂乎金對不敢公曰第寫帖子吾為汝致公以兩帖子示兵備笑而火之於是遣金詣兵備始金叛而留且徃兵備甚懼公潜與兵備計此事大禍叵測公夷情未熟一語蹉跌敗矣不若一以聽我兵備唯唯及見金但言吾視金有福相以微動之且曰此事一聽沈公明日公詣金營犒之五牛酒五十尊又明日兵備犒之如公公復召留與金謂曰倘兵馬殺金是吾殺金倘暗箭刺客殺金是貴五殺金非關我事今一以付留可無賺金也留乃日夜甲而擁金為備公復遣其姪至金營與金同飲食卧起金自是心死于公矣公欲縛金而憚其衆時廵按在南寜將誘金至南寧乃縳之乃請兵備先徃宻語廵按以故公謂金曰吾挈汝訴廵公吾代汝詞公為金作訴稿塗抹四五次以示忠於金復謂金曰吾與汝徃寧南倘貴五伏人于路暗箭射汝不若易汝土官裝衣青衣雜掾史中而先我馬令五千人後行金如公言路中飲食公與金同席語金曰貴五以重賂賂吾庖使毒汝則奈何自今以後吾所食汝亦食吾所勿食汝亦勿食可也金如公言而益以公為愛已行七十里至思龍驛公晨起耳語金曰今徃南寧南寧人皆言汝叛聲甚惡以五千人往則人益疑汝不若散遣三千人而選心腹健卒二千人以往是汝不撤衛而坐息人言也金以為然選二千人徃復行一日去南寧百里公謂金曰汝至南寧乆候而諸從人衣糧懼不給不若以千人營於此而以千人從為便金亦以為然從金至南寧者纔千人金入見廵按廵按好語慰之曰吾為汝奏明日廵按遣人至金營犒其衆而留金以待奏居五六日公度金衆衣糧且盡復謂金曰思恩去南寧近耳何不遣其半取衣糧而坐待糧盡衆且散矣金復遣其半衆行金所遣千人營百里外者久之亦以衣糧乏稍稍散去而獨五百人尚散處城中公欲縳金而又以為五百人者廹死而狼鬪則殺傷幾何更欲為計而金所遣取衣糧者適至則從金者又千人矣公知金未可動間請于廵按公且徃南寧而以金從可于路圖金也至思籠驛忽報韋徐將萬人在陽以迎廵按而隂襲金金驚而跳公與兵備廵按聞之曰禍矣公謂廵按且陽為不知而聽希儀徐圗之公出呼韋徐罵曰汝安得擅兵至此金得官與不得官唯朝廷所命汝安得私讐之是時金尚駐近地覘視而韋徐部中亦有為金耳目者金聞公言復還公行三十里金道伏候公公曰岑金耶汝尚不知死貴五兵至矣可疾入賔州匿吾叅將府則貴五無如汝何矣金馳馬入賔州公復于廵按曰金入賔州矣廵按兵備至是始有面色自金徃南寧返賔州飲食起居無不随公居數日韋徐復私公曰請甘心于金公又怒罵韋徐亦莫測公計所出也公宻請於廵按散遣貴五衆而後圖金然是時金衆尚千餘人與楊留所統殺手千人皆在賔州内外公與兵備計公可遣楊留殺手百人䕶廵按徃栁州公間謂金曰楊留殺手百人䕶廵按徃栁州矣汝盍將百人䕶送四五十里以自結乎至五十里金欲返公又拉之行百餘里金又欲返公曰汝獨返勢弱倘貴五伏人待汝奈何今去栁且近汝何不與留偕至栁而偕還金遂以百人至栁其酋長十餘人皆金死黨驍健㑹金於路躍馬而墜公以機責其酋五六人曰何不䕶金而令至此痛抶之五六人皆病創卧然尚以公愛金故被抶不敢恚公金至栁入叅將府公命夫人見金曰金我兒子也金得官聴調徃来貴縣吾縱不在汝必見之金益喜置酒勞金與其酋是時諸大酋其五六人既病抶卧獨四五人從金而留所部打手百人與金兵百人皆營於城外栁城故有狼兵二千人足以虞變公將縳金先以狼兵三百人䕶廵按三百人䕶兵備而以三百人入叅將府待事謀既定因酒中戲謂金曰痴兒子汝徃時懼誅又懼貴五逼意常不樂今無事矣何不痛飲金與諸酋皆盡飲至醉其夜遣狼兵縳之黎明遣人召留於城外狼兵夾墀左右立留與其黨三十人見公公大言曰非楊留忠不能成我事以銀十兩勞留取紅紵挂留留愕然公曰汝為之而汝不知乎金國賊也非汝與吾同心誘金至此吾安得縳之留大駭泣下曰留小主人也公曰汝為之而欲誑衆乎公意又欲以疑留于其黨也留懼不能言其黨三十人皆股慄公復曰吾且為留奏功矣因見留於廵按廵按勞賞之如公見兵備兵備勞賞之如公勞城外二百人牛酒而令留率之還賔州遂令留賫牌散遣金衆之在賔州者曰所誅止金一人留既惶恐見紿又虞同行者猜已賣金相讐見殺于路中日夜跼蹐為備奔歸頃之遂發病死金兵聞金縳皆散去公乃以金與其酋之病抶者醉而縳者解廵按府而撲殺之思恩復安當是時使公不先欵留則金必不至而且攻城殺人使公在南寧賔州縳金則困獸之鬪何所不噬使公聽韋徐甘心于金則兩客相閧而主受其釁惟公緩之又緩以漸脱金于五千人之手若剥笋然待其為一夫而後縳之人以是益多公之算而韋徐諸土酋亦益謂公不可測也公見督府於梧時鹽船八十餘阻峡賊不能前左江孫叅將千人送之不能督府以命公先時公泝峡峡中大酋侯公丁嘗謁公公寄六羊令公丁牧養至是遣人取羊于公丁公丁奉羊至潯公命諸鹽船牛酒犒公丁與其從人謂公丁䕶船上峡公丁身居公舟尾命其黨乘小舟䕶船囑曰吾以身質於沈公䕶不謹吾碎矣公因命班首一人與公丁從人䕶船至武宣未返時孫叅將與左江兵備聞公丁在公舟欲乘間捕之而宻言于公公曰此㫁不可人信我而我詐之不祥招而縳之不武且獲一人以疑諸夷將焉用之此㫁不可公居常有所徵召雖其深谿絶峝未嘗不来其来雖桀猾宿惡未嘗輒殺其可諭者諭之其不悛者必遣還巢而後捕之故公以此語兩人兩人猶豫未决公乃摘公丁告之故曰可亟歸矣公丁大感泣去而公所遣班首䕶鹽船上峡者亦至不失升斗公以報督府督府笑曰孫叅將千人乃不如沈叅將一班首十八年七山之役奪兩叅將于虎口功尤竒公膽勇機警善撫士其私財與所得俸禄賞賜半以給諸人為耳目者其出兵多賫私財以行有先登與斬首者就陳給賞不失頃刻故人争盡死力公嘗笑曰人以貲財積賄賂而博官吾以貲財積首級而博官豈為非計哉其征陳村時染危疾所部皆自戕于神前以禱公刀穿手矛剚股鉤刺脊繫鐵鎖拽之痛毒諸體皆徧最後至者一人無所施乃箭貫喉為禱其得士心如此蓋余宦游而得當世名將數人北則馬永梁震西則何卿南則公震與卿余未之識而識公與永永魁瓌長貌而氣特沈毅見人頫首下視寡言笑公短而精悍目炯炯燭人議論磊落激發皆所謂偉男子也公與余稍談及廣西事余是以得撰次之公戰功尚多余不盡聞也公謂余言當世固多良將患在牽掣齪齪不能展噫嘻若公者猶為未盡其用哉荆川集巻八欽定四庫全書荆川集巻九明唐順之撰説
