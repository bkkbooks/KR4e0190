body:
  text: 晉齋説聖人作易以隂陽别淑慝至於晉之象曰明出地上晉夫日出於積隂之下而升於至陽之位如人之破乎障塞而極乎髙明此非强徤有力者不能晉之所以次大壯也然而大壯之象以雷晉之象也以日夫雷蟄於深冬寂然無聲至於春也劃然而萬物皆鼓日麗乎天而含於地見乎南而潛乎北故其韜歛而若無所事者乃所以厚畜其力而用其壯者也君子之於學也本之以深沉有所不為而發之以果决有所必為是以能伐其隂慝而長其陽德其於進也幾矣華子師魯以晉名其齋葢有志於進也華子好學而謙其所畜不以暴於人人亦不能窺也可謂近於深沉者未知其果决何如耳雖然未有畜而不能發者也余故兼大壯晉之義而為之説師魯以晉名其齋也先君子水西先生實命之而余為之説也亦水西實為之請後余文成而水西已不及見矣不知其有當于水西所以命師魯之意否也水西績學練故而用不究乎其才年不副乎其志式榖以似其在後之人乎顧余文何能為師魯朂之而已鄭氏三子字説崑山鄭士魯名其三子應龍應麟應鸞而問字於余天文左為蒼龍禮家以天地温和之氣在左故坐主於左又曰君子尚左龍淵潛而天騰隂則蟄而陽則升是純於温和之氣者也故位於左為之字龍曰左卿麟有趾而以不踐草與蟲之生者為仁其在人也伐一木殺一獸不以其時則亦為不仁觀於此義而一體萬物之心可以油然生矣為之字麟曰趾卿鸞鳥之聲和故樂家象之以協於律吕君子載之在輿而聽焉以消其非僻躁戾之心是和氣之應也為之字鸞曰聲卿夫君子之學以求仁也仁渾然者也左者仁之嚮也趾者仁之履也聲者仁之感也所謂各指其所之也士魯嘗學魏莊渠先生而以是名其三子葢望之以求仁之學也僧承基字説虎丘聽泉老僧以其徒承基請字於予予為之字之曰有住佛氏言無所住而生其心而予以有住字承基者無乃與經㫖相悖乎葢不空者真空也無住者真住也是法非相則謂之無住可也是法即相則謂之有住亦可也儒者之説既曰變動不居周流六虛矣是無住也而又曰艮其止止其所也是有住也知止而后有定基也其務先明所住哉續猫相乳説猫相乳古未之有也自唐以來至今僅兩見耳然在馬北平家特以異母而乳無母之子猶曰憐其無所於乳也而乳之云耳而在博士吳君家特以二母交相為乳焉是尤可異也夫此二者其為和氣之致信矣余竊以為唐德宗﨑嶇兵戈間内輯外捍合暌為同用武功致天下之和故其為瑞也特見于武臣之家矧今天子歛福錫極匝洽胎卵以文德致天下之和故其為瑞也亦特見于儒臣之家然則謂其為天下之瑞焉可也昌黎以為一家之瑞狹矣雖然和氣之寓乎宇宙也其發也必有以起之其凝也必有以鍾之譬如醴泉朱草不擇地而出然據其所出之地固自有以鍾之也且夫武臣多懻忮喜鬬而史稱北平為將獨先拊循至殫家以賞士甘苦與同之使德宗能以武功致天下之和者北平實多力焉其獲兹瑞也宜無足怪而吳君豈弟而不陂諸兄弟之子更相子也友讓之義信乎其家而長者之風行乎其官以能不負天子菁莪育材之意若然者其亦可謂有斯猫之誼也歟余知其獨瑞于二氏也豈其自有以鍾之歟由此言之雖謂其一家之瑞亦可也抑聞之史氏又言北平後與李抱真為隙遂以私忿隳其前功是北平終有愧于兹瑞也已而吳君方且益崇令德協恭僚宷以倡諸生而陶之太和則兹瑞也其將專于吳氏矣乎書以望之銘象梳銘翠則羽象有齒材之美身之否磋為櫛髪乃理處不才鑒於此鏡銘吾杜吾德鬼神莫測有動乎中遂徴于色匪曰形模是為心則維瞭與眊維睟與墨宜鑒於兹其永無忒銅雀硯銘昔維瓦藏歌女貯舞馬今維硯侑圖史承鉛槧嗚呼其為瓦也不知其為硯也然則千百年之後委擲零落又安知其不復為瓦也葢雄豪武人不得而有之子墨客卿不得而有之吾嗒然有感於物化也鼎硯銘嗤爾者謂爾無腹不可以承公餗識爾者謂爾有靈而可以辟妖精尚從我於深山之中魑魅魍魎其莫能逢半月硯銘并序月硯一吾家故物也毁於地中分焉因其形礲而為半月者二銘曰誰謂其毁維毁乃全其全謂何不盈以弦盈則蝕晦則窮明晦相息兩弦其中君子觀象謙謙爾躬又礲而瑩之出其􅀈也則以為明之半生墨而傅之含其垢也則以為魄之半死死與生與争於其所也其孰綱維乎此黒石硯銘硯之未琢石即是墨硯之既琢墨即是石問於道人道人守黒是亦一石是亦一墨既已為石與墨矣而烏能辨石之與墨宛山石硯銘小引宛山石硯者硯之最下且易得者也既而山擅於鉅家工不得穴乃取故時所為碓碾磨硱者硯焉得之者艱而價亦遂髙嗟乎物之貴賤何常之有哉銘曰山屬於公衆工所攻其出不窮山屬於豪封閉以牢其價乃髙嗚呼碓碾磨石遂登几席亦繫其遭方硯銘汝之量足以茹垢納汙而不攖於慳也汝之守足以砥㢘峻隅而不刓於頑也葢既惠且夷可否之間也方圓硯銘惡方喜圎常物之情喜方惡圓幽人之貞皆物我之相笑無益損乎爾形小硯銘大者凝然利以居小者扁然利以行不有居者墻壁户牖誰與供十年之著述不有行者蒼山白水誰與收五嶽之精英又昔人有言一斛臭水而藏蛟龍是維涓滴視之正黒或蟄其中忽然躍出雲滃電掣文章滿空斧硯銘謂爾為藝苑之精吾疑乎其形謂爾為凶門之揮吾疑乎其才形則允武而才之文誰云國容可以入軍荷葉硯銘葉無染此有染葉有巻此無巻其孰知淨染之為一而巻舒之無辨也吾許女具隻眼贊杭中丞雙溪像贊巋然者其位望之隆也而退然其有寒士之風也黝然者其若愚之容也而蔚然其為詞人之宗也惟其呐于口而辨于文崇于位而卑其躬也是以海内操觚之士惟見公逸思麗藻之不可及而溪叟山孺惟見公悃愊真率之可與狎而同也丁近齋參政像贊弱冠超遷或快其早龎眉作尉或惜其遲然駟也既沈身于郎署而誼也竟墮䜛于湘湄則遲宦者不逮通顯而蚤遇者亦或數竒先生重厚長者贍于文辭葢自少傳經已顒然而為人師乃淹蹇次且至于年五十矣則始釋屩褐而閶闔是披然自是揚聲樹績出入乎郎曹藩臬之間者二十有餘年而後返林泉以遨嬉此則屈伸倚伏之不可知而先生獨逢其時者哉𢎞齋黄先生像贊𢎞齋公教授于常者三年順之時在諸生中公為人温厚平易多士樂而親之其去也空學舎而送之百里後來代公者匪人力為威虐以漁獵肆毒於多士多士厭苦弗忍則益相與思公公自教授遷宜黄令病歸以卒始公在常時子冏實從後二十餘年冏復來游吾常多士喜於見冏如復見公也而冏屬余為公贊余乃本多士之所以思公者為之贊而以勸夫為儒師者曰嶺之南儒以發身江之南儒以淑人淑人維何色笑相與舎有絃歌庭無夏楚繼公者誰或肆之毒其稍不饜鞭血相屬遂令膠庠化為圜獄不有虐者孰顯公慈匪我私公多士之思蔣雲壑像贊人見其以貲起家則以為力田致豐而傾身交游冠葢過從則又有俠士之風人望其髙冠獸補則以為武人之容而丹青詞藻模冩之工則又與墨客而争雄葢是數者多不能兼而足以知翁之才無所不通也王思東像贊游間而委蛇者其世胄之餘也冰雪而綽約者其山澤之臞也尊酒竹石者其所以自放而為逸也詩書禮法者其所以自檢而為儒也然余所取於思東子者世胄而無紈綺之習臞於外而中之腴也逸而不違乎俗儒而不類乎迂者也吳南圃像贊吳生集父衆競錐刀以貨易心誰能為譲市有還金終日執籌夜苦不足誰能為逸庭有象局其讓也逺于欺其逸也近于止鳴呼南圃可贊在此吳南洲像贊吳生集叔父伯及季偕自出少同孤行亦埒克厥家匱以腴不自纎割其餘藥與粥及囹圄舟于河登溺徒贊南洲視南圃徴叔銘我非詡祭文啓聖祠祭文維公濬哲淵静胄衍神明饘粥承家永有令名孕靈儲秀篤生聖子地維天柱頼以弗圮五帝避德三王讓功窮本反始誰為之宗若古祭川先河後海因委遡原厥義攸在于王建極隆師象賢廢禮允興必公焉先昔也蒸嘗不出闕里今也新宫徧彼寰宇昔也二丁祀止素王今也父子爼豆兩堂兩堂伊何于泮之水儒林有輝素襟咸喜釁器用幣兹惟一初來格來歆用奠厥居仰徼神休作我士氣父教子率三綱永繫永州祭柳子厚文代父作竊惟山川之與人文同於擅天地之靈秘顧若有神物愛惜乎其間深扄固鑰而不輕以示永之山水天作地藏經幾何年埋沒于灌莽蛇豕之區至公始大發其瓌偉而搜剔其荒翳公之文章開陽闔隂固所自得至於縱其幽遐詭譎之觀而䆳其要眇沉鬱之思則江山不為無助而公之窮愁困阨豈造物者亦有深意葢公之自記鈷鉧小丘也嘗以賀兹丘之有遭而韓退之亦以公窮不乆斥不極或不能以文自見於世歴千載而較失得亦何尤乎偃蹇而擯棄某少而誦公之文見其模冩物狀則已爽然神遊黄山之顛冉溪之涘今來吏兹土周覽四顧而親覩其所謂廽竒獻巧者則又恍然若見乎公之文而挹其餘波之綺麗自顧樗散之才未能庶幾乎公之愚而戒貪于䑕懲猛于蛇敢不因公言以自勵睠風景之如昔想公之神恒徃來于斯地聊奠觴而陳詞尚彷彿其來至祭萬古齋文庚申之歳余客陽羡公來顧余實始識面識面之初遂以知心朱絃白雪相與賞音惟公老成行方志古余也何人自知踈鹵豈足禆公辱公節取過則相規善則相許一日過余奉幣以告余有二子煩君教詔佛廬仙洞水曲山窈擕壺擔盒與余相邀花木玲瓏禽鳥啾啁流目傾耳永日遊遨或時閉門對坐一室竒文共賞疑義與析清言不足或繼以奕晨飡相逢忽焉日昳余有所往不告於僮僮來相尋知必在公公命家人為具客食家人不問知余為客綢繆往復踰四五年曾無一日曠不周旋公訓桐廬余赴官寮心豈不邇其地則遙逮公解官余亦屛居握手一笑歡言如初通家之誼婚媾自此公有女孫以字吾子朋友或言師生之拘公曰何傷古有蔡朱尚期白首頼公劘礪公不我留忽焉厭世屬纊以前神氣清皛顧謂二子事豈有了荆溪山水昔陪公游余今復來愴公其休死生常理抑又何怪不敢負公恃此心在與公二子敢忘切磋尊聞行知矢言勿磨窀穸在兹舉我觴奠叙往悵今公其我鑒祭萬思通文昔夫子之有訓曰觀過以知仁求無過於過中故忠原而孝申嗟惟君之為儒宿誦習乎禮經在節哀以順變不毁性而危生故聞訃而一慟竟疾疢乎膏肓始三日而絶漿遂五月而云亡固𠂻情之獨感不自知其何因雖俯就之有違亦仁可以殺身繄銜哀而入骨諒雖死而不化命縗絰以為歛見先君於地下惟君質之敦厚宿余心之所契始弔君於凷土覺形神之頓異余既已為君而心憂君猶尚慷慨而意氣苟一息之未亡尚前修之可冀復謂予以乆要期規我而無棄曾晤語之幾時忽憑棺而殞涕兹日月之有期從先君以即竁寄一哀以陳詞亦何盡乎余意祭白洛原文國重世臣鄉推世胄兩葉八座公承其後蚤謝紈綺之習遂擅文儒之右課詞非鮑謝不談論文則漢秦是究爰揮霍乎藻思蔚朝華而夕秀雖字畫之細㣲亦鍾王其步驟故白氏自尚書公以來賔客滿海内而公少年聲價遂籍籍乎人口及卅四而登第衆已謂其屈乆歴春曹與青宫惟才藝之堪授忽賜玦而逺投何竒數之見遘幾逡巡乎州郡復郎署之入又晩稍遷乎璽卿近龍光於宻宥謂天衢之既亨痛長駕之中覆惟令子兮承芳可謂死而不朽憶先給事之與尚書中丞兩公實同朝而契厚及愚父子䝉先人之業復與公仕途而相邂逅禁門鐘漏幾廽聮珮而追隨鄉園花月累歳慇懃乎杯酒兹就賔位而恍惚猶疑音容之在覯廼寄詞于一哀兼特牢以為侑惟公其鑒之祭丘思菴文自余少時頗負迂僻空濶乎寥廓之翔而泥滓乎鄉人之處糠粃乎世故而蠓蠛乎禮法然間以語人則人漫不省為何説余見世人所為小者計刀錐之獲大者競旂常之勲粗者土偶乎衣㡌履綦細者筆舌乎儒墨是非零碎乎米鹽甕盎劻勷於弔慶酒餔熬鼎旋蟻無頃時休則余亦不省為何事以是踽然四顧幾成怪人里閈之間一見吾子遂託金石以為可與同心者在古惟漆園生在今惟子而已自是徃還旦必建燭宵必及鐘或子言而我諾或我嘲而子噱或談鋒競起或閴然一黙子既睨空一世而偶余余亦塊然獨居而偕子然不知者則以為吾兩人皆若狂其知者則以為相與切劘文章砥礪節氣而已至其散髪而箕踞瞬目而跳嘯其所快然㑹意處雖余兩人亦不能自知也但覺吾見子則然見人則不然耳及余以雕蟲末技得厠聲利之塗餂腥染膏終日攢眉而子以樗櫟託跡遂志寂寞之野茹菽齒氷終日嬉嬉然子在寂寞之野而余未嘗羡子之髙余涉聲利之塗而子未嘗疑我之膩以為猶是心也余以踈率果非適用屢進屢黜得返初服以從子子見余且泣且笑曰不意子之能自全也自是相與過從議論如曩時而情好有加焉子自三十以外則已决意絶進取然子重㢘耻故不能妄得一錢子性髙簡故又不能治生居常授書為生卒以懶罷已而賣藥為生又以懶罷而獨注意攻古文詞上摹秦漢然復以病罷棲棲環堵饘粥不聊既乃從禄仕得寜陽教諭雖非素所好然亦以謂此官可隱也葢莊生所云蒿目而憂世决性命以饕富貴此兩者皆謂之天弢而子皆解之余趣向雖與子同然能解其一而猶未能脫然於其一常以愧子而子乃更以余為是也余近年懶病亦如子乃始不復蒿目於世而子不及見矣不知子尚以余為是邪為非是耶子交游甚簡然人或託以事最忠信可仗余嘗中夜與子卧偶論一二心事妻子不得聞者子曰吾恨不為浣紗女余笑曰子之信豈待投瀬哉嗟乎自子之存吾於鄉曲得友一人焉自子之沒則一人亦盡矣雖然子子桑扈也吾豈敢以慟累子之魂聊述吾兩人平生所以相與於世外者以告子嗚呼子死矣其無有發余之狂言乎雖然子有不死者其尚能聽余之狂言矣乎荆川集巻九欽定四庫全書荆川集巻十明唐順之撰墓誌銘
