front:
  text: 耳目薰染親相授受故其興起為易而瑄獨崛起絶學之後故其樹立為難其連茹而出也不得不擇其尤者而祀之其崛起也不得不援而進之譬如繁星麗空非五緯不能耀芒而晨星相望則維參與昴嘒然而見微顯闡幽之義也安得牽彼以例此乎此又瑄之無礙於祀典者也故臣以為宜如御史臣瞻臣得仁所疏臣愚昧死謹言
  hash: sha256:b01372b248fef0f9d2bfd6bd2de785ee78081c15c3868e2d2f70ef67573a2624
body:
  text: 荆川集巻一欽定四庫全書荆川集巻二明唐順之撰詩游西山碧雲寺作得悦字此下係翰林時作端居滯文翰久與賞心闋出沐乘休豫尋幽展懽悦涉澗俯潺湲攀巒面􅏭嵲邈哉神臯奥居然靈境别夷峻疏深池塞坎搆崇梲浴室盪陽泉冰井䕃隂穴躋險惕瞑眩逃迥欣超軼密林嬉猿獮逺峰挂虹霓宵看朝旭升晝見昏星列蔀豐光乍熹崖懸曜先晣景㑹萬象昭跡暌百慮絶巖棲庶可希從兹謝塵轍慶夀寺齋宿獨坐花宫月疎鐘報曉晴地超三象外人覺萬縁清茹素分僧飯觀空入化城真詮今已悟寧畏毒龍驚寓城西寺中雜言五首金馬違朝謁雲林久卧疴堦寒鳴蟪蟈庭古䕃藤蘿束帶知圍減觀書厭帙多無人來問疾獨坐似維摩少年好疎懶遂與性相安經月常忘沐逢人或不冠鼎裏金將化囊中玉可餐解言脱屣易豈憚拂衣難緇塵坐自染白社偶相尋俗子慚𤣥度名僧即道林三生空有偈五藴本無心説法何須難忘言悟已深誰言龍藏逺亦在鳳城旁塔湧金銀界筵開功德場常明瞻慧月利涉藉慈航沉痼還能遣齋心奉藥王秋來不覺早落葉忽已繁物化毎相代吾生尚何存微材同樗櫟僻地當丘園竊慕東方子一官堪避喧同孟中丞游龍泉寺二首山深人不到僊侣暫相從金馬聯驄馬晴峯映雨峰竹嶼今棲鳳花潭舊伏龍方欣窺妙偈遽擬謝塵蹤寳地風塵絶琳宫日月偏雁來還繞塔龍去尚留泉戸裏天花落空中梵樂傳逺師休禁酒客醉欲逃禪普濟寺同孟中丞作宛轉雲峰合微茫鳥路通閒來竹林下醉卧石房中隂磵泉先凍陽崖蕋尚紅攀蘿探虎穴憩石俯鮫宫上客思留帶山僧不避驄夜深清嘯發流響入寒空秋夜捲帷望秋月月皎心亦清牀下寒蟲響庭前落葉盈漢隂鮮機械河上多道情一適萬事畢栖栖何所營禁中遇雨紫閣肅隂隂重門寒意深忽看百里霧來作九秋霖灑道先清蹕霑花度禁林楯郎方夾陛雨立濕衣簪夜霽秋月澄初霽退公方掩閨稍聞金柝動坐望玉繩低巢鳥喧餘濕庭花落故畦羇人驚候變燈下理寒綈十五夜旅懐暫輟明光草言從洛下逰塵沙兩河夕風雨二陵秋鏡有潘郎鬢囊無季子裘更堪三五夜獨自下西樓望太河北望太行山嶔岑霄漢間倚天開疊障畫地作重闗車向羊腸轉人從鳥道還一為苦寒曲淚下摧心顔山行即事息馬依叢薄褰裳涉淺沙桃源無俗轍雲谷有人家凍壑含朝雨晴峰聚晩霞相期白社裏共聽演三車泛黄河曽聞星宿海上與月波連西走昆侖坼東流碣石湮魚疑入舟躍馬似負圖傳今日臨秋水望洋私自憐息中山亭子相傳昔人醉千日酒之地日日塵沙裏深愁行路難孤亭自超曠過客暫盤桓霜重飄梧葉雲輕度石欄不能千日醉幸托一枝安雨霽約孟有涯中丞遊山孟先出郭追之不及碧宇隂霏斂青林曉霽分山中期共賞野外復離羣即擬追飛葢猶疑隔片雲行行思無限寒葉落繽紛送焦提學往貴州書生非法吏猶跨五花驄山猺迎漢使海國被王風俎豆夷酋識侏離譯語通爾鄉有名宦好去學文翁送李推官赴髙州天子念南陲君才况抱竒祗將經飾律不以吏為師賈客多踰海居人半雜夷雖言持漢法謠俗自須知送蔣藩幕赴閩中結束千金劒辛勤萬里遊諸侯門下客才子幕中籌風島鯨波湧寒城蜃氣收自公多暇日望海幾登樓休沐家居簡陳約之祗役趨東觀校讐良以疲偶乘青簡暇復與白雲期任性形骸豁忘機鳥雀知求羊何不至三徑坐相思送王生歸蜀明經多不賤嗟子倦遊歸只解攀鱗易何言獻璧非路難裝欲盡客久鬢將稀狗監誰相薦成都一布衣送何學官往金壇近來稱藝苑大率數江南作師君不忝問俗我能諳家擅靈蛇寳人馳白馬談彬彬諸士子莫是出於藍送陳學官往福寧州陳生才亦竒年少舉宏詞自信五經笥堪為一巻師衣冠閩俗變文字海人知莫即傷淹滯三鱣更不欺送莫子良擢舉東歸漢庭方貴少羡爾早翻飛始應公車召旋聞駟馬歸衝星看劍氣逼歲換貂衣想到還家日閨中為下機答陳編修約之柏鄉見寄莵苑俱將命𤓰期獨未歸忽傳千里札坐使寸心違鬒髪行來變丹楓别後稀時時通逺夢恍是薊門非送蔣尉赴金華分野應星躔金華婺女邊微官君勿嘆福地古來傳洞有成羊石山多釀酒泉即令不好飲猶得學神僊送程翰林松溪謫居朝陽四首窈窕玉堂仙漂零瘴海邊煙花違北署鴻雁隔南天水暗疑藏鱷峰髙欲跕鳶應聞前席召誰道去經年天連窮髪國地近卜雞鄉禁闕心偏遶闗河望轉長翻飛看鳳隱消歇怨蘭芳此路饒荆棘思君欲斷腸潮陽何所似雲水日氤氲白晝鮫珠落青天蜃閣分山魈迎客斾海若識人文瀟灑韓祠竹清風今到君南溟君汎棹北地我驅車忽作分飛鳥深慚比目魚啼猿三下淚明月兩離居嶺外梅花發逢人早寄書送孔上公助祭太學歸闕里時賜衮衣一襲國喜嘉賔至人攀上客行來歸周室禮去入魯王城新衮山龍炫餘堂金石鳴聖朝稽古意待爾示諸生春夕皇甫膳部見過索觀鄙作留夜坐蓬扉春色徧柏葉夜筵開愧乏凌雲賦徒煩結駟來疎鐘出長樂明月照章臺痛飲須投轄何言興盡囘輓張舍人二首閣老羅峯之子少小侍中郎人稱張辟彊方隨雞樹息忽是鳳毛亡劎歇雲間氣珠沉掌上光一經何所託重為相君傷象賢超世胄服禮並文儒共羡昻霄鶴翻悲過隙駒藏舟人事盡賜履帝恩孤太息張公子衰榮遂爾殊汲縣謁比干墓下馬登丘壠藂林曲隧通碑因元魏樹地是有周封酒散荒池上人行秀麥中故宫無可問徒此對松風中嶽巫閭控北户䓗嶺奠西隅兹地隂陽合中天洞壑孤黄樞標正位紫氣䕶真圖近接浮丘宅深藏軒后符疏峰連太乙列館象清都圜宫猶漢築馳道尚秦除肅肅泥書秘森森羽葢趨僊遊微見迹帝幸暗聞呼露洗千齡栢霜封九節蒲星榆臨砌發月莢應時敷將訪三山記猶迷七聖途今朝陪廣樂直擬到方壺游嵩山少林寺浄域龍巖上香臺鷲嶺邊山由巨靈闢教以法王傳二室圍蘭若三花接梵筵土中元此地檻外即諸天複岫低衡岱迴軒寫澗瀍雲衣披雜樹虹影度飛泉綴牖皆青壁縁堤盡白蓮神猿叅講幕馴鴿繞爐煙慧月秋逾徹泥珠夕更鮮谷將鐘迸響潭共鏡争圓萬劫終成幻三生併是縁願假金箆力一為照迷川冬至南郊明王敦大報泰畤禮神君位以南離正宵從甲子分月臨太乙館星動羽林軍除道疑登岱鳴簫異度汾聲容六變合海嶽百靈紛封檢微題字屏帷悉畫雲神光人共見天語帝親聞盛跡誰能賦多慚扈從羣奉天殿慶成侍宴饗帝在仁人郊雍景命新方看受釐日即是賜酺辰警蹕喧黄道衣冠集紫宸宰夫稱燕主蕃國備王賔鵷鷺千班序魚龍百伎陳鈞天初聽樂玉食共分珍禮厚過三爵恩均洽四鄰小臣叨醉飽拜舞祝千春朝謁長陵赫赫我文皇恢恢廟筭長定鼎憑天險因山作地藏三泉疏鴈海萬壑轉龍荒雲結蒼梧色峰成金粟岡寢園馴象守松柏孝烏翔清蹕傳虚谷靈旗隱洞房遺弓仙馭逺上食繐帷張臣生良已晩幸此拜冠裳奉命分祀孔廟作後聖禮先師斯文今在兹將陳百官富詎止一牢祠入室瞻遺器圜橋展盛儀樂堪三月聽奠想兩楹時執鬯元公肅捧璋髦士宜鄙儒叨小相端甫奉前規觀州中進賀長至表箋恭述時寓信陽子月開周正朝宗協禹方諸神將受紀四海共迎祥望日扳仙仗呼嵩繞御床天威臨下國星使入明光彤管書雲物黄鍾獻樂章欣逢陽道復願祝帝圖昌登孫登嘯臺即阮籍聞登嘯處晉時肥遁士長嘯此山隂自逺龍蛇跡能為鸞鳳音清浄同河上沉冥異竹林坐超惟黙理妙契守雌心逸駕應難返荒臺尚可臨俯看恒衛水遥見太行岑砌冷疏花發扉扄落葉深寧知千載後更有阮生尋銅雀臺二首玉盌從兹閟銅臺空自寒分香留故愛同輦罷新懽急管銷魂易輕絲續命難何因作雲雨彷彿夢中看漠漠龍髯逺飄飄繐帳空自憐妾薄命不得奉君終望幸非前日棲靈是舊宫翠襦霑薤露錦瑟入松風鸞鏡時猶照蛾眉歲不同誰能更歌舞心折望陵中嵩陽宫柏乃漢武帝所封將軍柏嘉樹植崆峒年長勢更雄已無秦帝幸尚有漢皇封榦比孤生竹根猶半死桐靈泉玉女灌甘雨嶽神通葉密鶯難度枝樛葛易䝉垂隂九華帳弄影五雲宫色掩重巖翠聲含衆竅風賔來虬葢偃仙去鶴巢空非因不材夀春秋自無窮咏天壇梅花名卉來南土竒葩曜上方花遲疑避雪葉早為迎陽靈液滋𤣥榦仙雲拂素裳無言恒斂笑不謝暗飄香夕伴芝房月朝承莵苑霜飛窺玉女鏡舞撲羽人觴擬結千年實先呈五出粧帝羹如可和持此奉明光詠蛺蝶花蜀地羅裁就蜀有蛺蝶羅漆園夢始通何言金翅色翻在碧林中未辨逍遥影爭矜㸃綴工採香蜂趂侣啄蕋鳥銜蟲易濕縁多粉難飛詎少風美人笑來撲誤使損芳藂皇陵行皇陵鬱鬱標淮甸泗上諸峰盡相面衣冠月出鬼前驅劍璽晝扄人不見銅井沉沉碧砌寒綵霞隱映紅䦨干碧砌紅蘭松柏裏迢遙複道中天起石馬隂嘶萬歲山名雲靈風暗捲長淮水深山大澤兩纏綿白虎朱雀紛後先日精月華相迴旋元氣氤氲幾百年憶昔元朝赤縣裂争雄逐鹿俱豪傑一朝此地黄龍飛蝘蜓鯨鯢徒濺血已聞帝王自有真更説南陽多貴人戈矛貔虎三千士礪帶河山十八臣江左金陵扶地軸漢家豐沛還湯沐復户蠲租父老歡重門列㦸園陵肅羽騎千屯䕶玉魚鬛封數仞堆金粟御碑突兀表劬勞百里無人敢樵牧流傳八葉到神孫孝敬先知重本根伏臘烝嘗時不後清明寒食更澆酒貂䄖中使日焚香豸黼詞官夜朝斗新遣撫臣歲祭君不見驪山北邙盡蓁蕪五陵佳氣空糢糊壯哉兹陵從古無天長地久垂鴻圖從軍行送吕兵曹募兵遼海邊軍十萬入雲中烽火照耀甘泉宫戰士三春不解甲天王一怒欲臨戎追奔盡選流星騎併敵齊分明月弓敵氣憑凌恒候月漢兵超忽若乘風已聞舊戍黄花口復道新屯細柳中飛沙颯沓迷亭障組練繽紛皆北向赤羽朝徵六郡材白茅夜拜五丁將吕郎磊犖似劉生許國從來氣不平匣裏雄韜藏豹變腰間寳劍作龍鳴勑散萬金收猛士身騎匹馬出長城鴈行暗結遼西陣魚貫晴開海上營誓同魯仲能飛箭豈學終軍漫請纓建節行行通大漠檄書馬上時能作瀚海連雲太白髙燕然雪照旄頭落知君意氣坐相邀五百神兵集一朝漁陽突騎蛇矛鋭幽并俠客鐵驄驕車上磔人常賈勇帳前戲矟屢争標共道千秋王氣壮直教一戰塞塵消歸來奏凱獻天子功名絶勝漢班超送朱建陽故人三十北上書行到薊門曽棄繻故人今去薊門道雙綬垂腰一何好道旁桃李爛春晴可憐仙令看花行殷勤斗酒與君别落花片片如飛雪昨歲春花滿薊門垂楊陌上始逢君偶然傾葢輸情素交歡毎㑹披雲霧春來春去能幾時聚散匆匆各自知把袂追攀情未已為問閩中幾千里武夷之山天下竒翠壁丹崖共蔽虧可但王喬多道氣應傳潘岳有新詩送陳貢士刺上思州陳生磊磊衆所羡十年不遇常彈劎本期談笑取公卿豈意逡巡向州縣憶從少小負才華飄颻逸思凌綵霞謝眺詩篇差可擬子雲筆札焉足誇終然獻主遭雙刖安事讀書盈五車朅來奔走長安陌人世紛紛笑落魄髙歌白日無誰知用盡黄金徒自惜富貴浮雲不可求且復低眉從薄逰南望桂林雲氣深瘴雨蠻煙多毒淫不辭炎海千里路試取冰壺一片心滎陽行滎陽軍壘髙嵯峨楚漢之戰何其多已向厫倉奪芻粟還令鴻水割山河大小一百一十戰組練崢嶸如閃電存亡呼吸那可知主客縱横忽然變英姿烈烈紀將軍志不可奪身可焚城西夜半赤帝走獨載黄屋開東門漢家社稷蕭曹力殺身衛主誰能識君不見丹書白馬勒元功吹簫屠狗俱開國金臺行君不見七雄割據勢相均得士者富失士貧燕昭信義明日月不惜千金買駿骨郭卿談笑吐深謀海内賢豪競馳突就中樂生尤絶竒按劎魏朝人豈知一朝遇主同心腹親屈君王為推轂指麾燕兵百餘萬蹴踏齊城七十六于今六合無并吞寂寞古臺空復存少年未上麒麟閣且學陸沉金馬門結客少年場行長安少年膽氣粗生來恥作轅下駒買交不惜千金産使氣能􅂸七尺軀探丸夜入平陵郭走狗時過渭水隅朱門傾葢爭言晩白首同心不願餘俠士由來重然諾一言妻子堪相託魯國朱家不學儒洛陽劇孟偏能博别有侯王勢絶倫甍甍甲第接天闉蕭朱自倚金貂貴班許元稱肺腑親青牛翠幰朝朝合錦瑟朱絃夜夜陳門下俱為驚座客堂中皆是報恩人當時顧盻生光彩自矜意氣長無改何言榮耀有沉銷雲散星分在一朝舊客誰過竇車騎新知盡入霍嫖姚始知富貴多親故始知貧賤常辛苦他年北闕競彈冠今日南山空射虎積薪前後遞相踰一死一生交態殊獨有子雲甘寂寞閉門自草太𤣥書歌風臺我來擬上歌風臺豈意臺空只平地琉璃古井亦崩塌斷碑無字苔蘚蘙當年此地説豪華富貴歸鄉多意氣枌榆社裏列黄麾泗水亭前張赤幟里中父老競來窺昔日劉郎今作帝共談疇昔帝一噱季固大言少成事椎牛張宴里閈空進錢今日幾萬計坐中只帶竹皮冠衆裏長呼武負字酒酣撃節帝起舞樂極歌殘更流涕游子誰不悲故鄉萬歲吾魂猶樂沛賜名此朕湯沐邑世世田疇免租税風起雲飛又一時往事蕭條復誰記樵人不識斬蛇藪行客還歸貰酒市臺下黄河盡日流瞬息人間幾興廢同院寮觀閣中芍藥作西掖衡連翡翠城籠煙裊霧百花明祗謂紫薇初吐蕚忽言紅藥已敷英紅藥葳蕤盛艶陽萬年春色在文昌寧同鄴下芙蓉苑詎比洛陽桃李場裁成異瓣千般錦結就同心一様黄金閣披時渾是畫綺樓臨處并凝粧濯枝故向鳳池上裛露偏依仙掌傍仙掌嶙峋對鳳池詞郎侍直鷺鴛齊玲瓏玉珮花間映颻拽羅衫葉下述花間葉下情無極含笑含嬌似相識羞將雞舌鬭馨香欲取䴊冠並顔色翠幕分看態轉新朱䦨斜倚不勝春未採孤根助靈液聊持芳蕋贈佳人南苑秦園盧橘標炎節漢苑蘘荷駐羽旂雲氣自依雕輦集星辰故繞畫梁飛林行草木皆成隊水戲魚龍各合圍更取薫風調曲奏已看暘谷藉光輝午日庭宴南薫應律轉朱旗火帝乘離錦席披榴吐千花承羽葢蓂開五葉拂瑶墀冰盤錯出仙人掌金縷遙分織女絲復道龍舟方競渡銜恩共許向昆池遊龍門龍門嶪嶻拂雲迴鯨浪漰奔動地來一片飛泉千仞落百重疊巘五丁開水同瀍澗縈天色山接崤函鎻帝臺勝槩依稀似禹穴好竒徒愧馬遷才龍泉寺對雨西山爽氣朝來歇倐忽𤣥隂滿四陲雲裏樓臺翻借色雨中花樹更多姿飛虹弄影揺丹嶂瀑水分流射緑池坐覺禪宫倍幽寂憑欄把酒正相宜永年公館夜宿棲遲異域南冠客嘹唳長風北鴈聲静院無朋休對酒髙樓有女獨鳴筝霞光曉伴銀河落露氣宵含玉樹清古往今來成悵望叢臺孤月向人明龍泉寺懐顧南田使君顧以公事不至復惠酒助看山之興琳宫窈窕碧峰隈歴盡巉巖更上臺不見踏花驄焉至虛看送酒白衣來山中泉石誰相賞天末煙雲望屢囘聞道使君能愛客習池還擬接仙杯詠崔後渠書屋碧山學士隱墻東叢菊蕭蕭巻幔中開逕自須同蔣詡著書元不愧楊雄分畦粳稻清溪注對户峰巒翠靄通未許棲遲三畝宅還應宻勿五雲宫題張學士仰宸樓樓藏賜書瀛洲别館切清虛詔賜綈緗出石渠秘典自驚墳索上祥光遙映壁奎餘簷前鳥下疑翻字草際螢來為照書借問鄴侯三萬巻何如今日沐恩殊題張學士陽峰巻陽山秀色滿南州薜荔叢生楚客遊三峽猿聲偏入夜千巖楓葉早知秋僊人結宅雲煙近太史藏書洞壑幽便欲焚魚應未得共言明主待謨謀送張學士歸蜀省親曵履暫違金馬署承歡遙入錦官城欲從狄相雲間望却向王陽道上行旌轉層峰朝雨色舟迴極浦夜猿聲到家已是初冬候聞道林中笋又生潞河别林汝雨提學浙江君去㑹稽何日到諸生湖上待花驄定因立雪知游酢不獨傳經似馬融行載圖書邀海月坐移帆舸信江風剡溪見説好山水苦欲相從奈轉蓬送黄叅政赴陜右黄子風流世絶倫翩翩江海謫仙人紫薇開府勞分陜白馬乘春逺入秦三輔煙花迎使節五陵豪傑望行塵丈夫得意應如此誰笑蹉跎白髪新送項膳部遷之南行兼呈劉祠部春流瀰瀰碧波深送逺其如南浦心魏闕幾年叨結綬江臯千里惜分襟君行白下貪雲卧予滯金門笑陸沉郎署故交如問訊邇來惟有越人吟送高行人使琉球天王玉册頒三殿漢使星槎下百蠻鬼國至今通象貢樓船何處度龍闗海迷南北惟憑日雲起蓬壺忽見山壯志不愁經歲去安流應是計程還送王侍讀赴南都玉堂學士賦南征躍馬鳴騶出上京奉詔明光新佩印校書天禄早知名石頭城下春流滿白鷺洲邊芳草生此去周南異留滯看君到處即蓬瀛送樊大夫㑹朝長至中宵緹室吹葭管候曉𤣥堂駕鐵驂天子迎陽疏玉户羣方獻夀拜金函預占黄道卿雲見漸覺朱城淑氣含擬欲從君觀盛典使星猶自滯周南送周雲卿之任通山湖南此去意何如緑浦清楓萬里餘地僻且看衡岳雁官貧豈食武昌魚千家鑿井分江水幾處開田傍石渠由來撫字惟良牧天子他年有賜書寄周中丞備禦闗口牙旗髙建白羊東鼓角殷殷瀚海空雪後錦裘行塞外月明清嘯滿樓中幕南五部思歸義薊北諸軍盡立功燕頷書生人共羡一朝投筆去平戎送施貢士子羽南行何用相逢歌莫疑感君落魄不勝悲長鳴自許驊騮並髙志寧求燕雀知己道羣公能倒屣也應天子幸同時金陵樓閣秋雲裏肅肅遙瞻鴻漸儀送人上陵作玉園霜露向秋澄節序初臨祀事興恭將圭璧朝羣帝遥奉馨香薦五陵祠壇渺渺神光下路寢熒熒燎火升宣室于今敦孝感還歸早慰聖情凝覽任少海吏部慶都留題悵然懐人因次其韻帝京冠葢同遊日曽忝聲名李杜齊碧樹不堪思逺道綵毫何意覩新題書傳劎閣鴻猶阻月滿燕闗鵲未棲尊酒論文那更得暮雲回首雪峰西贈袁御醫芳洲家本東南海上村翻因避世向金門熊經自信窺真訣鴻寳還將獻至尊鳴佩偶隨供奉侣下簾長對道家言山人不厭少生事種橘年來滿故園張相公夀詩帷中運䇿九州清共説留侯在漢京賜第近連平樂觀入朝新給羽林兵儒生東閣承顔色酋長西蕃識姓名却望上台多氣象年年長傍紫宸明趙州懐古千秋覇業消沉盡風俗猶傳趙武靈市上美人揮錦瑟場中俠客舞青萍雁門北去通沙磧鳥道西来入井陘欲向平原訪公子蕭蕭賔館户長扄吕翁祠堂世所傳邯鄲夢者也吕翁祠堂漳水曲髙秋爽氣何氤氲松間隱隱鳴仙樂簷際時時駐彩雲浮生一夢誰能度羽客千年不可羣未須白首牽朱紱欲向丹丘訪赤文題劉蕡祠歲暮江山搖落時客來下馬入荒祠獨傷往事堪流涕欲問遺墟不可知璧玉無因終易棄龍鱗有逆竟難披今日登科還我輩對君顔厚更何辭朱仙鎮觀岳將軍廟丹書畫壁閃旌旂想像勤王轉戰時黄屋未歸南狩駕金牌已罷北征師平蕪漠漠前朝隔曠野隂隂暮鳥悲惟有西湖原上樹春來猶發向南枝和陳編修約之禁中雪詩二首建章今旦滿清輝朔雪繽紛應候飛忽飄九陌從風散漸積千門待日晞素影偏搖宫女扇輕花欲上侍中衣最是相如能獻賦霑恩新向莵園歸靄靄同雲覆帝畿銀宫玉宇特相宜飛花遍入披香苑積絮微消太液池三署曉光凝劎佩九門寒色映旌旗亦知聖主揮天藻不羡周家黄竹詞詠夾竹桃海南有桃枝竹故首句云云桃竹舊傳生碧海竹桃今見映朱欄春至分香能共逺秋來花葉不同殘疎英灼灼分藂發密蕋菲菲對節攅不信千年將結子錯疑竹實待棲鸞和詠霧中榴花仙曹飛霧曉氤氲幾樹珍花望不分纎萼䝉茸俱襲錦髙枝撩亂稍披雲初疑葉上緇塵染轉覺叢中淑氣薫為問江頭歌綘采何如𤣥女裛清芬江淹石榴賛曰紅花綘采九月晦日鈞州公館見菊天涯已逼三冬候客舍仍開九日花無那繁霜經雨歇獨看疎蕋向風斜飡英實有騷人興送酒虛疑陶令家想像故園搖落盡倍令遊子惜年華村居二首此下係前家居時作偶然灌園興不是學於陵醉卧松間月行攀巖下藤睢于竊自愧捭闔又無能惟應白社裏談笑共髙僧山人頗好事蓬户掩還開四野緑禾滿三秋白雁來授衣裁短褐飲蜡獻新醅即此堪投老栖栖竟何哉村夜纎月生西浦流光照北林羣喧一以息百籟相與吟始悟丘園裏能生清浄心悠悠何所嘆獨坐撫瑤琴同皇甫子循遊横山二首曲磴行來盡松隂轉寂寥不知茅屋近却望石梁遙葉響疑聞雨渠寒未上潮夫君軒冕客此地欲相招常時思獨往坐為塵事攖幸接金門客相攀桂樹榮峰微片雲度谷静衆禽鳴何年將結社與子共逃名夜宿王氏莊微月掛孤壁四山何悄然因穿蘿徑去忽造竹林邊叢木深寒氣平蕪淡野煙徘徊興復盡還就茅齋眠暮春游陽羡南山四首清谿知幾曲惟見白雲深一入蘼蕪徑欣聞樵採吟春鶯未停囀夏葉始繁隂乘此縱長嘯悠然物外心洞口石縱横流泉復有聲柴門何處入雞犬自相迎靈草知昏曉時禽識雨晴非因罷官久誰得此間行到處暗杉松多言路不通却從青嶂外轉入緑園中谷口逢茶女溪邊狎釣童勿嫌疎散甚吾亦是愚公花落已成蹊村村緑葉齊一園通蝶戲千嶂隔鶯啼澗草多名蕙山人舊姓嵇窮歡猶未返忽是夕陽西同林尹遊㑹真菴言尋仙子宅窈窕傍清溪望氣行應近穿雲路轉迷人閒多戲鹿樹老更棲雞願得使君姓留將石上題游馬跡山宿許道士房有贈二首獨住水中央言修不死方開簾見白鳥隔院度清香機息何妨奕神全可却糧偶來分半席遽使世情忘四週環積水信此羽人居鳥下忘機後猿窺搗藥餘閒尋漁父伴自註道家書笑我勞生甚逍遙爾不如題閻泉川副使莊閻侯貧已甚尚有種𤓰田潭巖相映帶農圃與周旋刈秫盡供酒賣蔬時得錢躬耕豈不苦所貴無牽纒謝病贈别高㕘政子業逝將歸舊林復此别知音綰魚慚分薄解劎感交深目送三河使身分十畝吟從兹一相失長嘆隔飛沉罷病歸訪王山人含真一與山翁别年華毎自傷還因解龜後重問養雞鄉蘿薜忩中影鉛砂枕上方鴻䝉常不語何以答雲將送王良醫往岷府獻方曾待詔何事向江干帝側無人薦王門且自安青楓連逺道白首寄微官莫惜囊中秘淮南欲合丹贈春巖王尹朝京赤縣神明宰如君最少年無言似桃李有志笑鷹鸇得暇即開巻長貧不受錢此行人共羡名在御屏前送白尉往湖州君家太湖北作吏太湖南驛路雞鳴近山城樹影含萬川疏沃野百室競春蠶幸此猶吾土微官也自堪送胡主事𣙜税荆州南州饒齒革此去豈徒然言徵山海賦用助水衡錢井邑千金市江門百丈船錐刀未可筭寛大見君賢丹陽别王道思三首久已廢逢迎蕭然世外情因君訪茅屋相送到江城逺岫雪中緑寒流冰下行可堪此時别獨自返柴荆卧病不知久見君三徙官還將鶡冠賤來伴豸衣歡秉燭驚宵曙同衾屬夜寒平生學禪寂猶自别離難書生多落魄羡子最逢時繡服官方顯青衿職所司鑄人稱道術倚馬見文辭徒抱彈冠意迂疎自可嗤夏日聽沈君彈琴詩三首山居足清賞獨恨不能琴偶接青谿客因聽白雪音寒暄乍翻復丘壑轉深沉誰道嵇中散風流更可尋知君技入神一歇一畨新撥處疑非指聲中似有人空山鳴落葉暗水躍潛鱗何獨吹簫客能生隂谷春忽聽使人驚空山迸一聲能令草樹裏齊作秋蟲鳴暫與松風逺還同石磵清曲終人欲散纎月照南楹贈宜興張醫二首翛然一逸民山郭往來頻乞藥從貧士傳方自異人草間收伏莵澗畔煮香蓴嘆息市中客誰知百歲身生長白雲巖仙書宿所探千金方不惜百草味俱諳採藥行山外藏身住市南獨抱文園病逢君試一談次韻贈陳后岡昔日京華居同君直玉廬蛾眉寧見妬樗散自知疎佩印紫薇署垂綸滄海魚為農吾已矣作吏子何如九月八日作日日閉門坐今朝復如斯窓中見風雨始知重陽期海燕已辭主黄花未滿籬余心久委化何用惜良時送真州蔣生至宜興親迎歸相門甥館得才郎文藻翩翩貌復揚十年久著鳴金賦一笑今游射雉場江南江北路非逺幾月辭家猶未返他鄉芳草自相留今夕佳期未為晩歸去春洲漲緑濤滿川桃李送蘭橈若使長江作天漢應言仙女度星橋送莆田方生自宜興歸應試聞君誦詩滿三百十年落魄常自惜書生只是數多竒俗子空嘲𤣥尚白那能環堵事窮愁乘興飄然賦逺游荆溪山水清且美屢月貪歡猶未休荆溪茂宰君妻弟思君不謂君能至山㘭水曲日追隨相對渾忘鄉土異君不見荆人刖足售良玉好醜由來隨世俗期君此去早揚眉一戰能亡三敗辱送林宜興遷官南部移家偶愛山中静地主何煩重相敬吾生恥學茂陵郎如君豈是臨卬令誰言陋巷不容車勞君擁葢常造廬誰言簿書日紛糾勞君為我頻置酒五月清溪暑氣微淹留竹裏共忘歸乍看朝霞初冐嶺忽驚夕露欲沾衣清才自合翻飛早一朝西上金陵道請君别後數寄書山中相識日應少題東石草堂圖贈黄松江連山斷若缺一溪百餘折古松三四株爪秃骨半枯聞道閩山乃有此誰將輦載來東吳松江太守好静者迹在風塵心在野若欲還山未得還故託良工為摹寫太守昔年卧茅荆日日看山無俗情醉來向東拜白石誓與此石同死生豈謂金門被羈束復向名藩分虎竹横金衣錦世無比太守只言非所欲乃知碧山不負吾駟馬髙葢胡為乎有時吏散重門閉焚香獨隱烏皮几披圖相對一莞然不覺逍遙數峰裏樵人漁子似相識手招兩鶴勢欲起扁舟却在窓戸間便欲乘虚泛清泚真邪假邪何足問世間萬事亦寄耳雙夀圖歌為叚翁作是誰寫此大椿樹爪牙縮張相攫吞輪菌偃蹇據絶壁氣凌萬木皆兒孫似鼻似口挺竒榦半枯半嫩蟠靈根千年神物照魑魅滿山精怪爭崩奔樹上懸泉始一線飛洒樹裏成千片匡廬瀑布不可尋忽向今朝眼中見立石復似五老峰雲氣糢糊露頭面可憐此樹與雲石蒼然一色誰能辨石間異草何其多紫芝伏兎森交羅仙萱自是百草長緋葩翠葉呈婀娜上承老樹賴嘉䕃亦如松柏掛女蘿蕭然相伴歲月晩長養齊霑雨露和吾鄉叚翁住東郭夫妻七十鬢未秃翁家猶子擅丹青手揮絹素為翁祝一枝一莖亦有情五百春秋遞相續請翁披圖應自笑形固可使如槁木贈王君五十歲君家城市裏終歲常閉闗青松白日滿庭内不許俗人相往還看君本是山澤臞年來戰勝身亦肥但道龎公堪自老何須蘧瑗更知非題龍圖世人畫龍得龍皮叔也畫龍得龍髓當其停手凝思時青天颯颯生風雨却怪三年不㸃睛那知一日飛騰去山莊閒居身名幸自謝籠樊白首為農誓不諼慣住山中知鹿性數行樹下識禽言巾車毎許鄰翁借書帙閒同道士翻醉後漸看松月上滿村雞犬寂無喧逰神墩寺次壁間韻二首新雨郊原草木柔葛巾黎杖此尋幽藤垂小徑蟬聲滿苔合荒庭鳥跡留隱几翻經聊習静憑髙望逺一銷憂相逢更是煙霞客携手同為汗漫逰古藤千尺猶自柔布葉垂隂滿院幽楓樹暗隨清磬響山人欲去白雲留談𤣥幸有飡霞侣違世已無食肉憂不識老僧蓮社裏可容携酒日來遊登墩此墩可望茅山藂竹裊裊迎風柔古墩掩映清湖幽斷煙白鳥雙洲逺落日青山半景留耳聽鳴蟬知換節坐移芳草覺忘憂興來更望華陽頂想見仙人駕鶴遊廣德道中蒼山百轉見炊煙茆屋髙棲古樹顛細雨薜蘿侵石逕深秋梗稻滿山田雲中望影迷遙岫草裏聞聲覺暗泉倘遇秦人應不識只疑誤入武陵川泊淮上作楓林望盡見蒼山桐栢飛流入楚闗潮散海門孤島出月明渡口數帆還客夢祗驚青𤨏逺滄波長羡白鷗閒聞道淮南多桂樹朝來杖策一相攀淮上五日泛湖同蔣别駕世和青蘋裊裊漾微風輕舸逍遙暫此同客裏緑蒲驚節換尊中清酒覺愁空一徑荻蘆行不盡數洲魚鳥戲相通向晚前川簫鼔發猶疑風景似江東聞復官報寄京師友人姓名不復挂朝叅魚鳥由來性所耽篋裏符經都已廢山中藥草漸能諳踈狂自分三宜黜懶病其如七不堪深謝古人推轂意莫將陽羡比終南代柬寄京中舊游莫須彈鋏嘆無魚自愛山東搆草廬雨後亂蛙生敝竈秋深落葉伴閒居身隨老圃偏能慣論學潛夫愧不如故人休訝無相訊中散從來懶作書寄贈曽郎中再入禮部文昌秘省倍光輝傳道仙郎去復歸三署㑹應尋舊草五時猶得賜新衣官閒常似遊丹壑賦罷多堪獻紫微徒使昔年同宦侣頻於清夜想音徽家居贈别陳僉事約之已甘蹤跡滯丘樊暫逐行麾思欲翻才薄最宜明主棄身貧獨感故交存蒼苔掩徑誰相過芳草懐人未敢言知君王事方鞅掌不記於陵長灌園臨清十五夜柬陳太史約之行人向月占消息一望雲端百感并南去闗山猶未半東升蟾兎已先盈乘槎且傍魚龍宿繞樹那堪鳥鵲驚憶與仙郎當此夜幾回聯珮侍承明贈陳僉事約之生日青春綉服儼神仙早歲為郎霄漢邊問齒方知散騎後論才已是洛陽前官遷栢府多推望經絶韋編不待年衰病無能真自棄慢將犬馬愧君先崔鎮道中晚望懐陳約之郊原極目思依依楚水連天楚樹微逺浦潮生人獨往寒林風静鳥雙歸泥塗自覺朋遊好日月偏催旅鬢稀念爾同為南竄客煙波何事更相違贈别義興林尹遷官移家本為採山薇茂宰風流更可依滿逕蓬蒿頻問訊開尊竹石幾忘歸髙才豈得淹黄綬野性惟甘卧薜衣今日河梁送君後柴闗車馬又應稀次韻贈施道人御氣曽聞老氏柔寄身偏愛水雲幽道書數巻只自注生計一錢常不留賣藥人間應自謫挂瓢樹下復何憂猶言妻子能相累自戴黄冠學逺遊寄題顧東橋侍郎載酒亭後世還聞有子雲為耽寂寞卧江濵門前即是尋山路座上偏多載酒人禄位已非執㦸賤文章真與太𤣥鄰欲比侯巴應自笑不知何日望清塵送樊醫歸南昌山人自小愛逰方尚説懐歸意不忘别友因留隔歲藥還家試解百金裝澄江盡處聞鄉語暮雪深時到草堂願爾常如秋後鴈一年好是一來翔贈張地官督賦江南皇家財賦重江淮浮濟逾河歲歲來豈謂司農方告匱故煩節使逺相催舳艫接水通千里齒革盈筐備五材民力東南已如此因君一為獻蘭臺贈南都莫工部子良夏至齋宿署中萬乘親郊幸北宫千官齋祓兩都同靈光正想泥封上清夢遙依輦路通煙散玉爐知晝永星分銀燭坐宵中聞君已就汾隂賦猶向周南嘆不逢送彭府倅進賀聖節表曽叨執㦸侍楓宸猶記呼嵩拜舞辰獻夀頻將金鏡拂入班許覩玉顔真自憐拙疾辭明主因卧丘園作外臣今日送君何所道祝堯長比華封人宜興舟中讀徐養齋詩稿因思奉别之久悵然有懐二首清溪南望五湖連竹樹隂隂兩岸間桃李孤村春欲盡蒹葭逺水思俱聞散帙曲中驚白雪巻帷天末見青山故鄉共是投簪客猶恨髙蹤不可攀昨歲相逢冰雪深忽看春色獨驚心清風毎憶人如玉嘉句堪言字比金四壁荒廬􅂸自老連洲芳草共誰吟思君坐惜年華暮明月扁舟試一尋覽徐養齋見懐毛古菴及小子之作存没感懐和韻早歲曽陪履杖遊遥思墓木已三秋美人去後空聞笛芳草歸時獨倚樓世上玉顔還易老山中石髓杳難求却慚司馬頻相許擬向清湖共釣舟和徐養齋移居二首何年挂却侍中冠新築山居一畝寛種黍聊為終歲計移花應待早春看門依緑樹人稀到身謝紅塵夢亦安更是謝家兄弟好長吟池草對江干窈窕巖阿叢桂秋清谿一曲草堂幽荒園自向閒中翦靈藥多從病裏收葉上題詩應滿樹沙邊載酒不驚鷗莫道東山淹謝傅蒼生日夕待嘉謀題贈施心菊醫士聞道仙翁昔種菊君今對菊獨凄神蕭條三徑猶含露悵望深秋似有人肘後傳方多已試鼎中留藥不嫌貧相從何日東籬下願乞餘香慰病身贈江隂陳君幽棲選地傍江濆高士風流宿所聞身著薜衣稱隱吏園多橘樹比封君琴尊不厭丘中賞魚鳥堪為物外羣怪爾眉間多道氣年來曽讀五千文寄劉範東提學不材因得返園廬窮巷猶存四壁餘生計十年思種樹病身終歲强移書山僧白社容相往長者髙車日與疎疇昔虚䝉國士待於今樗散更無如題伯祖平樂守素齋翁像國史已收循吏名蠻方猶憶使君清祀留桐縣如朱邑文諭南夷比陸生公有華夷解諭交趾湘江又見棠花發公嘗令零陵而余父於公為從孫又守永州灕浦還聞俎豆成清江傳家自公始髙門大纛豈為榮和朱子學遷居辛勤四十有此居生事蕭條只晏如行李隨身一長鋏疎藤挂壁數椽廬愧無厚禄堪助汝實有髙文能起予獨惜揚雄名位薄世人誰識太𤣥書程副使輓詩同年舜敷之父帝里風煙幾度逢此行復與仙郎同傾城冠葢通家後故國江山對酒中老憶舊遊經畫省閒尋芳草到禪宫亦知今日遊魂處多在清淮白露東嘉靖丁酉秋余始見公於金陵公留余飲酒自言少時為太學生始逰金陵後官於郎曹居此者十餘年自閒居以來常思雨花牛首之勝輒為之慨然已分此生且休矣今老且病誠不自意復能至此每過舊遊處歴歴如昨日事乃知江山長在而人命有極牛山之淚可復下乎語畢公掀髯而笑余亦歡飲盡醉别去至冬而公卒葢别公後纔四月也嗟乎公而有知尚能復來金陵矣乎故予作詩以哀公叙金陵事特詳云元夕詠冰燈正憐火樹鬭春妍忽見清輝映夜䦨出海蛟珠猶帶水滿堂羅袖欲生寒燭花不礙空中影暈氣疑從月裏看為語東風暫相借來宵還得盡餘歡
