body:
  text: 中庸輯略序中庸輯略凡二巻初宋儒新昌石􅗐子重采兩程先生語與其高第弟子游楊謝侯諸家之説中庸者為集解凡幾巻朱子因而芟之爲輯略其後朱子既自采兩程先生語入集註中其于諸家則又著爲或問以辨之自集註或問行而輯略集解兩書因以不著于世友人御史新昌吕信卿宿有志于古人之學且謂子重其鄉人也因購求此兩書而余以所藏宋板輯略本授之已而吕子廵按江南則屬武進李令板焉而集解則不可復見矣序曰蓋古之亂吾道者常在乎六經孔氏之外而後之亂吾道者常在乎六經孔氏之中昔者世教衰而方術競出隂陽老墨名法甞與儒並立而為六家為九流其道不相為謀而相與時為盛衰佛最晩出其説最盛至與吾儒並立而為儒佛然其不相謀而相盛衰也則亦與六家九流同夫彼之各駕其説而其盛也至與儒亢而六而九而二也斯亦悖矣雖然其不相為謀也則是不得相亂也嗚呼六經孔氏之教所以别于六家九流與佛而豈知其後也六家九流與佛之説竄入于六經孔氏之中而莫之辨也説易者以隂陽或以老莊是六經孔氏中有隂陽家有老家矣説春秋者以法律説禮者以刑名數度是六經孔氏中有名家有法家矣説論語者以尚同之與兼愛尚賢明鬼是六經孔氏中有墨家矣性不可以善惡言其作用是性之説乎心不可以死生言其真心常住之説乎是六經孔氏中有佛家矣六家九流與佛之與吾六經孔氏並也是門外之戈也六家九流與佛之説竄入于六經孔氏之中而莫之辨也是室中之戈也雖然六家九流之竄于吾六經孔氏也其為説也粗而其為道也小猶易辨也佛之竄于吾六經孔氏也則其為道也宏以濶而其為説也益精以密儒者曰體用一原佛者曰體用一原儒者曰顯微無間佛者曰顯微無間其孰從而辨之嗟乎六經孔氏之旨與伊洛之所以講于六經孔氏之旨者固具在也苟有得乎其旨而超然自信乎吾之所謂一原無間者自信乎吾之所謂一原無間者而後彼之所謂一原無間者可識矣儒者于喜怒哀樂之發未甞不欲其順而達之其順而達之也至于天地萬物皆吾喜怒哀樂之所融貫而後一原無間者可識也佛者于喜怒哀樂之發未甞不欲其逆而銷之其逆而銷之也至于天地萬物泊然無一喜怒哀樂之交而後一原無間者可識也其機常主于逆故其所謂旋聞反見與其不住聲色香觸乃在于聞見色聲香觸之外其機常主于順故其所謂不睹不聞與其無聲無臭者乃即在于睹聞聲臭之中是以雖其求之于内者窮深極微幾與吾聖人不異而其天機之順與逆有必不可得而强同者子程子曰聖人本天釋氏本心又曰善學者却于已發之際觀之是中庸之旨而百家之所不能駕其説羣儒之所不能亂其眞也彼游楊謝侯諸家之説其未免于疵矣乎吾弗敢知然而醇者大矣其未能不浸滛于老與佛乎吾弗敢知然而師門之緒言蓋多矣學者精擇之而已矣則是書其遂可廢乎是信卿所為刻以待學者之意也明道語略序道致一而已矣學者何具多歧也蓋聖人賛易模冩人心之妙與乾坤合體而蔽之以兩言曰忠信曰敬忠信者非他也吾心之無所欺焉者而已矣敬者非他也吾心之無所肆焉者而已矣此無所欺之心即此無所肆之心此無所肆之心即此無所欺之心此無所欺無所肆之心即渾然乾坤之心非二也乾坤之心不可見而見之於復復之所以見乾坤之心也學者黙識其動而存之可矣是以聖人於乾則曰其動也直於坤則曰敬以直内乾坤一於直也動本直也内本直也非直之而後直也蓋其醖釀流行無斷無續乃吾心天機自然之妙而非人力之可為其所謂黙識而存之者則亦順其天機自然之妙而不容纎毫人力叅乎其間也是故湛然常寂而非静也盎然常感而非動也退藏於密而非内也曲成萬物而非外也不寢不食而非助也不睹不聞而非忘也懲忿窒欲而未甞損也改過遷善而未甞益也是乾之所以為易而坤之所以為簡也如此則為敬以直内不如此則為以敬直内如此則為集義不如此則為義襲如此則為由仁義行不如此則為行仁義故曰道致一而已矣學者何其多歧也彼其所謂從事於心者蓋未甞實有見乎天機流行自然之妙而往往欲以自私用智求之故有欲息思慮以求此心之静者矣而不知思慮即心也有欲絶去外物之誘而專求諸内者矣而不知離物無心也有患此心之無著而每存一中字以着之者矣不知心本無着中本無體也若此者彼亦自以為求之於心者詳矣而不知其弊乃至於别以一心操此一心心心相捽是以欲求寧静而愈見其紛擾也夫聖人論心之精莫如易之乾坤而善發易之藴者莫如程先生之書先生之書得於心而言之者也故其言曰鳶飛魚躍與必有事焉而勿正之意同會得活潑潑地不㑹得只是弄精魂又曰未嘗致纎毫之力此其存之之道又曰以敬直内便不直矣然則彼之所謂從事於心者其為敬以直内者耶其為以敬直内者耶其為非力以存之者耶其為力以存之者耶其為活潑潑地者耶其為弄精魂者耶武進尹撫州徐君子弼自少有志於心學蓋讀先生之書而有㑹焉而懼學者求於心者之差也則取二程全書採其要略而刻之於邑中以其出於明道者為多也而題之曰明道語略嗚呼學者患不知求之於心知求之於心矣而其多歧又如此故夫擇之果不可以不精也季彭山春秋私考序春秋之難明也其孰從而求之曰求之聖人之心聖人之心其孰從而求之曰求之愚夫愚婦之心春秋者儒者之所累世而不能殫其説者也而曰求諸愚夫愚婦之心不亦迂乎孔子甞自言之矣吾之於人也誰毁誰譽斯民三代所以直道而行者也春秋者聖人有是非而無所毁譽之書也直道之所是春秋亦是之直道之所非春秋亦非之春秋者所以寄人人直道之心也人人之心在焉而謂其文有非人人之所與知者乎儒者則以為聖經不如是之淺也而往往謂之微辭是以説之過詳而其義益蔽且夫春秋之為春秋以誅亂討賊而已子而嚴父臣而敬君人人有不知其為是而弑君簒父人人有不知其為非者哉人人知其為是非而或䧟于弑逆焉者昔人所謂以意為之也雖其以意䧟于弑逆而其直道而行之心固隱然而在也聖人早為之辨醒其隱然而在之心以消其勃然敢動於邪之意是以亂臣賊子懼焉而能自還也其使之懼者不逆之於勃然而動者之不可忍而牖之於隱然而在者之不容息是以能使之懼也非書其弑以懼之之謂也其懼者但覺其隱然而在者之忽露而不覺其勃然而動者之暗消是以懼也非懼其書我而不敢為之謂也故曰孔子懼作春秋春秋成而亂臣賊子懼孔子之懼心斯人直道而行之心一也斯人直道而行之心亂臣賊子之懼心一也人人之心在焉而謂其文有非人人所與知者乎善説春秋者則不然曰無義戰人人可以知其為無義戰也而奚問其有鐘皷無鐘皷云爾也曰某三王之罪人某五伯之罪人人人可以知其罪之在也而奚問其功與過云爾也曰亂臣賊子懼人人知其為討亂賊也而奚問其君之有以取之無以取之云爾也以是説春秋豈不簡約而易知也哉可謂以愚夫愚婦之心求春秋而不蔽於聖經者也或曰然則游夏何以不能賛也曰高與赤者世傳以為游夏氏之徒也師説固宜有在焉者其猶未免於説之過詳歟其諸家之紛紛者又可知矣可謂蔽於聖經而不以愚夫愚婦之心求春秋者也余為是説久矣儒者皆牽於舊聞迂焉而莫予信也間以語彭山季君君欣然是之于是出其所著春秋私考視余則公榖之義例左氏之事實諸家紛紛之説一切摧破而獨身處其地以推見當時事情而定其是非雖其千載之上不可億知然以斯人直道而行之心凖之要無甚相逺者余是以益自信余之説有合於君也君甞師陽明王先生聞致知之説為能信斯人直道之心與聖人無毁譽之心同其春秋大旨亦多本之師説故其所見直截如此至於地里古今之沿革姓名氏族之𣲖星歴之數度禘郊甞社禮樂兵賦之纎悉古今之所聚訟皆辨析毫釐務極該貫昔人所稱經師莫之及也以非大義所關故不擿之序中蓋余甞聞李愿中言羅仲素説春秋初未甚曉然及住羅浮後其説不知何如夫羅浮何與於春秋也豈不以此心空洞無物而後能好惡與人同好惡與人同而後能説春秋也歟君老矣方且隱雲門之邃厭文字之支離兀然洗心以游於無物其所説春秋又當有進於是者余尚得而見之巽峰林侯口義序有逐末之學而後有反本之論蓋有執器而無得者論者曰盍反而求之乎道雖然未若即器而道之為至也有稽古而無得者論者曰盍反而求之乎今雖然未若即古而今之為至也有滯經而無得者論者曰盍反而求之乎心雖然未若即經而心之為至也孔子不云乎興於詩立於禮夫詩之咏歌禮之數度豈非所謂器而詩禮之為經也豈非所謂古也哉試甞觀之心之不能離乎經猶經之不能離乎心也自吾心之無所待而忽然有興則詩之咏歌關雎猗那之篇已隨吾心而森然形矣是興固不能離乎詩矣然自其讀詩而有得也未甞不恍然神游乎關雎猗那之間相與倡和乎虞廷周廟而不知膚理血脉之融然以液也則是學詩之時固已興矣非既學詩而後反求所以興也自吾心之無所待而忽然有立則禮之數度玉藻曲禮之篇已隨吾心而森然形矣是立固不能離乎禮矣然自其讀禮而有得也未甞不恍然神游乎玉藻曲禮之間相與揖讓乎虞廷周廟而不知膚理血脉之肅然以歛也則是學禮之時固已立矣非既學禮而後反求所以立也安得以寓於篇者之為經而隨吾心森然形者之不為經耶故即心而經是已安得以無所待者之為吾心而有所待而融然以液與有所待而肅然以歛者之不為吾心耶故即經而心是已然則何末非本而又何所逐耶何本非末而又何所反耶雖然善學者一之不善學者二之非獨今日然也在孔孟之門亦或不免於二之矣子夏傳詩傳禮後世訓詁家宗之子夏非訓詁也然已權輿乎訓詁矣聖人懼其滯而無得也而曰女為君子儒君子者務本之謂也子貢求性與天道於文章之外聖人懼其離而無得也而曰一以貫之言文章即性與天道也今之為形聲文字訓詁之學者皆是矣君子懼其滯而無得也為之説曰盍反而求之乎心也此所謂有逐末之學而後有反本之論者也而學者縁此遂以為必絶去形聲文字與訓詁求之窈窈冥冥而後可以為至道二者本末則必有分矣然而皆聖人之所不與哉林侯口義者侯之與二三子所以講於六經孔孟之書者也林侯苦節而不以驕世峻行而不以矜俗其志務於反躬以求盡乎精微而於古人形聲文字之間乃索之如此其宻而析之如此其詳嘻吾知其不為滯也其殆有見於道器古今之不二也乎雖然吾猶懼二三子之二之也二三子試致誠而求之黙識吾靈知靈覺之本體於羣居誦習之中融然以液否耶肅然以歛否耶是融然而肅然者在心耶在經耶在心也則何待乎經在經也則何感乎心是心與經一者耶二三子可以即此而自得之矣而又何窈窈冥冥之求哉或曰今之為形聲文字訓詁之學者皆是也子顓顓焉若恐二三子之離而去之何也曰本末則必有分矣二之皆弊也且夫滯經之弊淺而著離經之弊深而微滯經之弊惟固陋者而溺於此離經之弊雖䟽通者或不免溺焉吾舉其深而微而二三子乃或昧於其淺而著吾欲使二三子不溺於䟽通之士之所溺而二三子乃或不免溺於固陋之士之所溺則非余之所敢知也而亦非林侯之所知也於是口義刻既成丹徒李令來請序序之筆疇序苟可以誘世而勸俗者君子不廢也匹夫一怒挺而兩鬬於是時而莊語之以詩書禮樂則益其怒而疾其鬬耳而滑稽之士為之微言冷擊嘲諧詼謔於其旁則釋然一噱而散小夫婦人恣睢兇毒於㝠㝠或懼之以士師理官之法彼有傲然而已矣巫兒佛媼為之張皇神鬼指徵禨祥則彼且瞿目縮舌而駭汗夫苟可以解急鬬則嘲諧詼謔或㨗於詩書禮樂苟可以懼㝠兇則神鬼禨祥或痛於士師理官滑稽禨祥之説非君子之説其要於解鬬而懼兇則君子所以為勸於世也由此言之其苟可以為勸於世雖其戯如滑稽誕如禨祥且不廢也况其言之根據古先而不詭於繩墨者乎筆疇之為書自居身御物至於家人細𤨏之事皆備自經史百氏至於小説衢巷之談多所採摭蓋亦不盡雅醇而其大旨要於使人畏慎柔寛擇歩而蹈以避咎其知足少欲忍辱濡下賔名去華大率稱引老莊然而古先所以厚施薄責懲窒忿慾之緒言亦往往而在也昔人謂老莊處危世觸駭機欲以曲自全故往往上柔弱黜剛强至自處於材不材之間迷陽郤曲以晦世而免禍為是書者其意毋乃出於此歟雖然使明哲之士讀之則自可以觀其深剟其駁焉而節取其是者以閭巷鄉曲之士讀之且將悚然有動乎其心怵於禍而冀於全去其狷忿鬬争恣睢兇毒之習而庶幾乎謙柔長厚寛身之道豈非志於勸俗者之一助歟是書故有板刻吾邑吳前川翁乃刻而掲之墓之左屋以示其鄉人然半而不完翁之子鳴玉既得其全書于是併刻之以廣於世以成父之志云王君注握竒經序余少頗好奕無從得國工之譜而獨以意為之寤寐而懸思焉久之其於戰守攻圍之間若或有得算焉而因以勝於人其不能勝而敗焉者則咎於思之所不至而已藝既稍習已而得國譜則余所以勝者大率多古人已試之術其敗焉者則古人已先為之營救布置余于是自笑其思之不極不能盡合於古人而又惜不早得國譜以助余之思也以是知古人之精神寓之于譜奕者索諸已之精神與索諸古人之精神苟有得焉其致一也奚必譜之是而心思之非奚必心思之是而譜之非乎然則言兵法者何以異此自伏羲畫象貞坎悔乾為師已寓居中握竒之義而握竒經則世傳以為黄帝書蓋戰法自黄帝始也顧其文簡奥世鮮知者王君以窮經餘力推究其説為之註釋其諸家言兵有及于握竒者悉取而附之其營算占候亦綴焉以為兵家全書書示余余竊嘆其有似于吾所謂奕之譜也盖史稱衛霍不學古兵法而每戰輙勝然觀其環車為營縱輕鋭往當匃奴實得經中所載二壘游兵之義至諸葛氏摹握竒為八陣鈎角聨絡一一古法宜其可以必勝矣而竟不能成混一之功豈其所當之敵有堅脆耶何暗合古法與純用古法者其效乃若是相反耶然君頗自竒其説以為得吾書而用之内靖草竊外靖疆圉特為易事盖余之于奕也雖知思與譜之無二然以譜措之懸思則差較毫釐以懸思措之臨局則又差較毫釐是以聖人自謂能行三軍而又曰軍旅未學言兵之不可以甞試也王君年始衰矣而志尚壯今塞垣多故安知不有知君而舉之者使之儒服立軍門親皷􅎏之間以與老將角短長而知其勝算之果不能出吾書也則王君乃可以自信矣江隂縣新志序有家者隨其家之所有而籍記之其常也凡其田畮租甔錢貫絲縷豉合醬罌僮指之數此纎勤治生者之所詳而游閒華飾者之所略也凡其池舘花樹狗馬圖畫古物珍器之數此游閒華飾者之所詳而纎勤治生者之所略也二者則更相笑矣而家之所以為家者則固在此而不在彼也與郡國州邑之有志自古而已然亦所謂隨其郡國州邑之所有而籍記之其常也禹貢周職方豈非志國邑者之所權輿也哉然自後世觀之則見其有𤨏細而俚俗者矣夫其田賦高下之異等墳壚黎赤之異壤九鎮九澤之異名而五戎八蠻之異服其列而載之可也至於篠蕩箘簵淮蠙江龜海錯之纎細則類於草木蟲魚之書而多男少女多女少男之紀則近於閭井村俗之談古人何若是之𤨏𤨏也蓋苟有切於利器用而阜民生辨隂陽而蕃孳息則固不得以其穢襍而略之而况其大且重者乎其所載而詳者固然則其所不載者亦可知矣後之所謂地志者則異是矣其叙山川也既無關於險夷瀦洩之用而其載風俗也亦無與於觀民省方之實至於壤則賦額民數一切不紀而仙佛之廬臺榭之廢址達官貴人之墟墓詞人流連光景之作滿紙而是嗚呼此何異於家之籍專記圖畫狗馬玩具為粧綴而租甔錢貫所以需衣食之急者漫不足徵也其亦何取於為家也與知家之有籍本以治生而非以觀美國邑之有志本以經世而非以博物則得之矣竊聞國朝集諸儒臣修一統志時兩人相誚其一人欲載科目之數則曰此非進士録也其一人欲載户口田賦之數則曰此非黄白册也科目則别有録矣不載宜也户口田畝固天下之大命而經國者所必稽也且若彼之説則禹貢周職方其亦黄白册也哉彼固以是為𤨏細俚俗焉而不載也江隂於常州為屬邑而枕江之衝為蘇常諸郡北門以故視他邑獨重舊雖有志而宜書不書不宜書而書大率如所論諸志之弊無足徵者至今令餘姚趙君始更修之趙君為政潔已愛民才敏而慮周凡志中所載田賦徭役户口食貨謡俗水利防江治盗之源委本末節錯絲棼盖皆君之所嘗蚤夜盡心焉者其於浮文羡費則盡屏去不事譬如辛苦起家之人斥絶耳目之玩而畢力於家人生事之間一錢粟之盈縮一臧獲之奸良與夫鐍鑰閭户之守雖其錙銖隱賾而聰明智算舉無遺者於是一切以其精神思慮之所及而登之於籍至其纂緝成編則以屬之學士張先生先生以其國史之餘才而推之以成一邑之史故其所載繁簡删存能得趙君之所用心而著之以為後來治邑者之所據凖又如計然任公之徒精於治生而太史公萃之為傳凡其仰俯拾取廢居棄與之法與夫巵茜荻漆之細莫不具載能得諸人之所用心而著之以為治生家者所必資盖為邑之與治生意嚮或異家籍之與邑志體裁亦殊至其的然當於實用而不取辦於具文焉則一也夫前人以其所用心而著之籍記後人因其所籍記而得前人所用心而守之是以家道能常興而不墜予欲使後之為江隂者因趙君之所為志而知其所用心而守之也為之書其端鄭君元化正典序㑹稽金錫竹箭之産甲天下其鍾為人文大率峭㧞清慧能以文章勲伐耀于當世至於方外之士亦往往能俶儻瓌恠以露其竒盖所謂地氣然也㑹稽鄭君少喜談兵讀韜鈐諸書尤工於風角鳥占嘗北抵宣大東歴遼薊掀髯謁諸邉帥談笑油幕間毎敵鏑驟飛發一語䇿勝敗屢屢竒中以是撼貴璫老將而出其槖中之金短衣飛鞚目中無百萬貔虎氣當此時盖一機智勇辨之士及長揖邉帥故裘南歸乃究意黄老内養之學翺翔吳㑹與娵娵騷人墨士相徵逐寄身藥肆中呐然守柔下簾晝臥人不識其有雄氣者盖鄭君始終若此亦竒矣哉鄭君自謂得青峰碧厓諸異人之傳嘗著内養書名曰元化正典大槩本之中黄之説又謂邵子十二萬九千六百之數盖暗藏火候以為邵子最得伯陽微旨余聞内養家多言火數乃虛設期於隂陽無偏勝而已鄭君乃以為實有是數若跬歩以至百歩然者余不能盡解其説也鄭君又欲往燕齊海上牢島不夜之間庶幾復遇異人焉燕齊海上之異人若黄石海蟾之流盖嘗决機軍旅而其後得仙者也鄭君倘得而見之乎其歸以語我東川子詩序西北之音慷慨東南之音柔婉盖昔人所謂繫水土之風氣而先王律之以中聲者惟其慷慨而不入於猛柔婉而不隣於悲斯其為中聲焉已矣若其音之出於風土之固然則未有能相易者也故其陳之則足以觀其風其歌之則足以貢其俗後之言詩者不知其出於風土之固然而惟恐其粧綴之不工故東南之音有厭其弱而力為慷慨西北之音有病其急而强為柔婉如優伶之相閧老少子女雜然迭進要非本來靣目君子譏焉為其陳之不足以觀風歌之不足以貢俗也余讀詩至秦風其言盡田獵戰鬬之事其人翹然自喜愾然有躍馬賈勇之氣已而讀楚騷諸篇其言鬱紆而忉怛則愀然有登山臨水覊臣棄婦之思夫秦風慷慨而入於猛楚騷柔婉而隣於悲然君子不廢豈非以其雖未止乎中聲而不失其風土之固然其陳之也可以觀其風其歌之也可以貢其俗乎東川子家秦中盖昔人所謂汧渭之間與其所為載歇驕遊北園故處往往而在東川子雅喜為詩嘗寄余詩百餘篇皆跌宕踈健絶去脂粉纎冶之態雖其於中聲未知必合與否然可謂不失其土風者其塞垣諸曲余尤愛之如邉城鼓角春寒夢沙塞旌旗日暮雲天寒細栁營嘶馬草滿長城水飲駝榆關千里秦雲暮羌管一聲漢月秋較其音節倘亦有駟鐵無衣之遺否耶然則讀是詩者不必問其何人而知其必為秦人之詩無疑也余南人也而不能為楚聲竊喜東川子之為能為秦聲也乃為之題其首後有採風謡者自當得之前後入蜀稿序山澤好竒之士往往以極幽遐詭譎之觀博搜山川草木鳥獸變化之情狀為快然其耳目有所滯而不能徧於是有側身四望之思宦游覊旅之士其力足以窮懸車束馬之徑凌跕鳶挂猱之阻然其情志有所累而不能遣於是有懷鄉去國之憂情志與耳目常相違而山川之與人常不相值惟蜀僻在西垂古所謂别為乾坤者也雪嶺大江之雄渾峩巫青城之窈麗仙靈之所窟宅其勝甲於天下然陸則拒以飛厓斷棧水則陿以驚江急峽鬬雷霆而翳日月其險且逺亦甲於天下自古好竒之士慕其勝而以其險逺不能至於是有夢而游寤而嘆焉者自非游宦與覊旅終其身無因而一至焉其至者怵於險而忘其為勝於是覊臣遷客之思深而輕舉冥搜之好移變衰揺落之感生而雄渾窈麗之觀改盖昔人所賦側身西望阻岷峨者既足以著山澤好竒繾綣顧慕不能自遂之情而其所記峽州至喜堂者亦足以盡宦游覊旅憔悴無聊不能自遣之狀夫雖幸為耳目之所接而奪於情志之所不快與雖幸為情志之所快而限于耳目之所不接其耳目所不接者既不能使景就乎情而工為鑿空揣懸之言其情志之所不快者又不能使情就乎景而洩其和平要眇之音於是大夫缺於登高能賦之義而騷人竒士縱欲原本山川極命草木亦無所憑焉以聚其精而發其辨博噫嘻此春山公前後入蜀稿所以為可諷也公自郎官出為郡守自郡守遷按察副使先後皆在蜀其為郡守也於重慶盖陸走棧水浮峽而後至中州之人所謂險且逺其為副使也於建昌則在靈關大渡瘴雨蠻煙之外雖蜀人亦素憚以為險且逺者而公皆恬然安之政事之暇方且披巉巖踐霜雪穿猩鼯豺虎之窟俯江妃水仙之宫以窮其勝而猶若未足故其險無所不渉則其勝無所不窮其所歴與所窮一切可愕可喜則無不見之乎詩盖其大者關政理謡俗之故其細者足以牢籠百物山川草木鳥獸變化之情狀其叙險也既可以使人欷歔慘慄而如墮其叙勝也又可以使人䬃爽飛動而如躋向非公以其宦游旅寓之跡而兼乎山澤竒士之好情志之所快與耳目之所接適然遇合固不能摹而冩之若是公詩既刻為二巻其子于徳請序于余余以謂使好竒之士讀公之詩可以不俟渉險而坐窮其勝于庭户燕閒之間宦游覊旅之士讀公之詩且將悦乎其勝而忘乎其險頓然釋志于驚江絶棧之上也然則不能自遂與不能自遣者皆將于公之詩乎有得也余山澤人也盖慕蜀而不能至者亦將于公之詩乎有得也遂不辭而序之山堂萃稿序余讀孔氏論語而見其所稱古之逸民夫逸之為言隱也彼其事汙君而為之士師至于三黜而不肯去與其斷髪雕體以君長於蠻夷偃然有南靣之尊可謂漸染于顯榮而孔子至以匹於讓國餓死之人而謂之逸民何耶盖此數人者其脱於聲利華寵之外而一無所緇焉則同也特其所謂不降不辱者則心與迹并其所謂降而辱者則心與迹判而難以識耳今吾侍郎養齋徐公其可與於若人之徒歟嗟乎士之嗜欲敺諸其中而紛華蕩乎其守始進者躁於求而宦成者固其位能自脱焉者少矣公少時則已自致於亨衢然公澹泊不見可好其後反求乎理性精研乎義利益知自貴而賤物故雖居高位享厚禄而其貌冲然常若山林之癯其家蕭然常無十金之槖乞其身有耄夫之所不能决而必之以强徤之年砥其節有寒士之所不能居而甘之以肉食之後自是天下知與不知言清名完行者莫不翕然歸公然則公之進而顯也其心與迹判者耶其退而隱也其心與迹并者耶余幸與公同鄉曲自蚤嵗即知慕公公為侍郎而余適在翰林方其旅候於隆隆之門而習見乎炎炎之態則悶然而返毎一見公則不知冷然嘘我以清風也而不能去公還於家余亦罷歸又獲從公游毎訪公之廬但見山窈水廻老屋數椽堦前鳥雀鳴聲上下則不待見公而已如游於首陽之曲栁下之鄉可以使人樂而忘返矣已而公出其詩文若干巻曰山堂萃稿者示余余受而讀之盖自其平生所謂應酬文字與得歸草堂以後諸詩及謝病諸䟽皆在焉公非如文章之士刻鏤以為工者也而其清逺閒散耿介獨立之氣黝乎其淵藏􅟚乎其金鳴其風旨直與古者逸民採薇之歌三黜之語歴百世而相上下則又不必即公之容望公之廬而公之為人固可以一撫巻而得矣雖然昔人不云乎身隱矣焉用文之且夫所謂逸民者方將鳥行而蟬蜕惟恐其影響之不幽而豈蘄之以言語文字行於世也哉矧公位大臣又當天子嚮意之時苟少需焉施功於社稷被澤乎生民不難也公意猶若有不屑焉者而亦何藉於文乎然而世有不能即公之容望公之廬者得其文而讀之或可以得公之為人則夫㢘頑而起懦亦將於是乎在余既校而正之以還于公因為之題其首劒泉奏議集序劒泉吳公奏議集凡幾巻在嘉靖初天子勵精思治博取俊乂以充庻位尤注意臺諫之選公於是以才召入院為御史凡所建白多見採納若兹集所載是也於戲公之言備矣而其大者莫如劾柄臣之奸與請開通惠河諸䟽始柄臣掌營兵怗勢為奸利士大夫以為隱憂而公慨然上䟽攻之其言明白切痛多人之所難言已而相繼攻之者益衆然或過激不足取信而柄臣益恣不悛後天子亦自燭其奸下之獄以死盖去公上䟽時十五六年而公之言驗矣國家運道自通州至京師故從河運後乃從陸其故河廢閘猶在議者屢請修復而京師大猾倚陸運侔利往往為飛語揺之公如建議則以身塞利害之衝又賴天子與相力主其事迄有成績其詳具公所上通惠河志中自河功之成也户部嵗省運錢十二萬緡此則公言之既效者公又欲盡轉通州之粟於京師以消未形之患則其言未及行而憂時者多以公言為是也公始令江山有聲而擢御史自御史出守處州歴官南京太僕少卿而致其事公為人敏鋭濶達藝於世務而㨗於應機開口抵掌鋒鍔㨗露課功䇿效不爽一髪非同迂腐拘牽之士指摩而坐論之者也公嘗謂余曰士大夫談説經濟指天畫地貫穿今古不足為難惟切中事情若操刀而割刃隨手下卒無一刃不當肯綮乃為難耳此盖公之所自寓乎曩公在御史時又嘗為余言儻得在塞垣之間當為國家鞭笞絶域招烏孫鄯善之儔而致之闕下盖公自量其方略氣力有足辦此者以其不至大官故其所設施者不竟雖然是集也可以觀公之槩矣聲承集序漸齋子録其平生交游往復之書及諸贈言名之曰聲承集凡若干巻漸齋子始居給舍侃侃厲名節故其時所與游多慷慨竒節之士已而謝事家居蟬蜕聲利晩乃刋落華葉潜究精微故其時所與游多山澤肥遯之流與講學論道之朋且夫人之於世固未有獨立而無與者縉紳相與以同心而共濟雖山澤與世不相渉亦必有與焉以同道而相益此孤立一意之輩所以不可行於朝而狷狹枯槁逃虚避人之行要亦不可行於野也漸齋子以其真率苦淡之節而使海内高士争慕與之游若不及又能以其謙虚不自滿之量而使與之游者争獻其所長者如注而一無所拒故其在朝則相與秉公斥奸以共憂天下之憂在野則相與養志理性以共其樂於山林泉石之間盖漸齋子之所取於友者既已無不盡矣然猶以為聚散存沒其數之不可常人情久則易以忘是以雖其平生所與交一臂之人異日或至於舉其姓名且不能記其姓名且不能記則其所以交相儆戒策勵之意亦或至於怠且廢幸其書詞翰墨尚可尋繹而因以志其人之姓名與其所以相儆戒之意則雖其聚散存沒之不可常而宛然常如一臂之交雖在燕閒獨處之中而自得乎羣居儆戒相成之益此聲承集之所為録也盖昔栁子厚作父友志其人之姓名備矣然但以侈朋游結納豪傑為美談至於切磋儆戒相成之誼未著也衛武公所與友自卿至於師長士至於旅賁資其儆戒以進於睿聖故抑淇澳之詩傳之至今然其儆戒之言可聞而卿師長士旅賁固亦當時所謂賢者其姓名獨湮沒不可見使尚友者有遺憾焉至子輿論獻子有友五人則幸於兩人者尚可識其姓名而慨然有感於三人者不可記今漸齋子修名砥節不啻如子厚其尚賢取友如獻子其老而好學盖有衛武之遺使後之人慕漸齋子之風而讀其所為書讀其所為書而得其所與游者其将曰某也慷慨竒節人也某也肥遯人也某也講學論道人也是漸齋子能以其所得於友者而乂以為後人尚友之助也其亦可以無子輿三人之感矣而余也又得以不敏之詞附姓名于集中其亦不謂幸矣夫吳孺人輓詩序禮部郎中惺母古者既有左右史以記言動矣而又為之詩詩之與史同于籍善事以鏡來世而咨嗟咏嘆之則其味尤長而其風益逺盖詩者其助史之不及乎然左右史所載惟其朝廷邦國王公鉅人殊勲絶徳非此不列而其載之詩者大半多閨闥房帷之間以及伐桑采葛髦笄膏沭家人𤨏屑之事是以塗山有莘助賛王業然不列于夏商之書而十三國風自二姜許穆夫人以烈節著聞則詩人侈而歌之不一而足雖以田墅閭巷之婦人若草蟲雞鳴静女其名姓絶不登史册其事亦無特異者而皆得見之于詩豈史主于紀大而略小詩主于闡而探賾其為教一而其為體則異耶然則詩非特以助史之不及其于女史尤要也漢時劉更生善為詩其所輯列女傳率本之詩謂詩之繫乎女史也豈不信乎吾友吳君敬夫之母吳孺人既沒而士大夫為之輓歌輓歌者沿于虞殯其樂道善事而咨嗟咏嘆之者詩之遺也鳴呼孺人以閨中之懿非如男子有四方之事功徳炳炳可以托于鼎彛之勒左右史之載而與之不朽而又非有如燕燕栢舟載馳遭罹厄㑹以顯其竒節為詩人所希詫其所可見者不過乎閨闥房帷麻絲漿酒之間尊養姑章敬承夫子家人女子之常事而已雖然槩以草蟲雞鳴之義其宜在所不廢乎是以諸君子哀而詩之以附于彤管也其以廣列女之採而興起幽人之貞也乎余國史也于序詩為宜故推本詩之繫乎女史者而為之序荆川集巻六欽定四庫全書荆川集巻七明唐順之撰序
