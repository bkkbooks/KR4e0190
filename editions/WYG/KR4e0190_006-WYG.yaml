body:
  text: 劎井行時有白氣屬天仙人擲劎不記年至今光怪猶未歇薄蝕日月騰金晶青天倒挂雙白蜺曽斬妖蛟帶腥氣寒泉滿甃誰敢汲只恐仙人求故物但看水底飛霹靂陳渡草堂二首皂衣非復漢庭郎敝緼深冬卧草堂貧薄不羞畜牸計沉浮也逐鬭雞行殘書閣盡經旬病異味嘗來百草香獨愧頑心猶未化十年學道幾亡羊近市偏逢食有魚閉門不問出無車牛衣聊自對妻子蜡酒時將洽里閭世網幸疎如野馬微名猶在愧山樗亦知農圃真吾事春至頻翻種樹書小樓宴坐不入名山不世間嗒然隱几置遺編身名瓦礫宜居後人事蚊䖟任過前抱樹蜕蟬司化運隔窓風竹發真詮未登道域終難罷微管還須學測天涉世已如入夢蝶居身未作脱鞲鷹自疑戾契戾契見韓文俗呼捩及終為病欲學墨杘墨杘見列子俗呼眉西又不能金老相逢知法器慈公頗訝似禪僧牛乎馬也從人喚惟一迂儒是本稱嘉興金道士三十年不下牀亦三十年不開口冬夏一絮被自擁余叩之以指畫卓許余入道慈舟者蘇之名僧也余見之不告以姓名渠深嘆異以余為頭陀相也又疊前韻到處迷陽不記年村中厯本逐時編寒烏滿野成禾後社燕辭人落木前戒酒劉伶終酒性遣言摩詰亦言詮青天自是無逃處何事靈均更問天混合髙低齊鷃鳳經過老少變鳩鷹屈伸禽戲憑何訣篆刻蟲雕誤謂能盡日閉闗非酒聖文中子稱劉伶古閉闗人廿年猜謎是畨僧余與翠峯僧往來酬對者廿年此身本自無觔兩月旦先生若麽稱莊中作帶郭頃田屋一尋歸耕自許力能任浮沉袁盎嗤驅狗㢘侈王陽訝化金貯麥舊庾將易穀行鞭新竹漸成林計然七策皆無用小試經綸底似今自述避人不敢厭髙深逃影何如學息隂楚客又成蕉鹿夢漆園未了是非心紛紛世事看花發黙黙天機聽鳥吟可笑維摩眞病在無言説處是金鍼有相士謂余四十六歲且死者詩以自笑古人云死生亦大矣此謂趂日力以進道者言之也苟不進道總是虚生修短何辨焉苟于道有見處夕死可矣然則死生詎足為大哉本是癯然山澤士衰年况自不勝衣色常帶墨縁辭肉形或如灰似杜機睢于久謝偕來衆蹇拙何心知我希世人莫詫方臯眼相馬由來失瘦肥殤子彭耼誰夭夀百骸九竅孰疎親若過顔氏十四歲便了王孫一祼身三載濫叨金馬客幾人共坐絳紗春即今已似前生事何待他年跡始陳人情世事古猶今寂寞空林寄此心賢聖不分聊中酒虧成忘盡一開琴有書終日只掩巻無病長年亦擁衿即使癃然似桑户未逢㸃也是知音學道曽窺天壤意寒儒又是膝攣人只言蔡澤有限夀誰見壺丘不定身貴客懶迎長謝病薄田可飽敢稱貧後來不用問修短已占溪山四十春囊癰卧病作三首節候經春日日隂寒衿獨擁閉門深終朝錬液非仙氣幾歲懸疣是雨淫焦火凝冰鐫瘦骨兒痴女長試灰心總縁病裏悲歌意不為離鄉也越吟春半忽驚狗馬疾年來似是龍蛇辰謝醫少錢長卻藥煖骨累裀聊借人味為補虚一試肉事求如意屢生嗔正愁未了形骸外生老病苦只此身余平生無厚褥止一褥既薄且敝病骨覺冷硬不堪也乃從親人家借一褥襯之平生有厚褥與重褥自今始而余素戒肉養病乃肉食頻年䘮我几堪隱到處逢人席任爭疣贅勿嫌能侈性支離畨笑足全生野蔬入口勝甘脆病骨先時卜雨晴苦訝道人長好懶如今懶病果相成濕入病骨覺爽然則晴覺痛楚則隂雨至矣瘧病作跰􅓷柳肘盡欣然深隱烏皮也自便金冶由他不由我狼胡是病亦是天身先辭宦猶中熱衣未經秋已著綿炎凉反覆須臾事一疾畨令悟世縁小集為人所刻文學從來本不長隱居辭説半猖狂徒令後世能疑孟祗覺前身似姓莊𤣥白何分終覆瓿穀臧奚事總亡羊從今已息掞天口只著農桑一兩章靈芝寺同童元功宴坐湖上髙樓縱逺心復沿湖岸過東林身閒似覺煙霞氣地冷兼無鐘磬音衣裏寳珠應自信苑中靈草試相尋坐來忽散千峰雪對爾無言意轉深登屠翰林仍臺作二首太史仙臺多勝槩正臨檇李古城東五色雲生知海近四圍山逺覺天空閒居作賦青春後幾歲鳴絃明月中不是掖垣同宦侣閉闗那許得相逢一上髙臺興不孤望中總總入虚無煙霏春變隂晴氣草樹天輸海客圖對酒笑將花是伴銷憂誰問土非吾知君苦厭文園卧此地能令肺病蘇時屠久卧疾次人憂旱作歲歲吳儂事水耕朝朝占雨愁雲輕澤中不聞鳩語合田際但見龜文生野老䑛糠猶自得書生炊桂亦何情東南生計已如此聞道山西又㸃兵再遊清溪莊值主人不在次韻桃樹臨溪思不禁扁舟重問草堂隂西湖水落黿鼉石南國霜清橘柚林壟際流泉宜稻性窓前過鹿解人心憶君剪徑相迎處今日蓬蒿又已侵至常熟陳中丞白訓導邀登福山看海二首春早吳山雨半晴有客邀我觀滄瀛澤國冥冥蒸海氣石灘淺淺鬭江聲日月迴旋一島小金銀色相十洲明微風向夕送清響應是仙人吹玉笙久縁迫陿悲時俗海嶠春臨思若何地湧龍蛇爭起陸天投星斗横翻波封疆坐攬風濤壯氣候常看霧雨多才謝枚生能作賦觀潮恰對曲江阿金澤寺中寄松江友人登湖昨夜雨初霽驟覺春衫寒意多逺浦草青送歸鴈夕陽潮上生微波戲窺佛偈翻金字静卧巖扉掩緑蘿伊人只在蒹葭外獨對清尊奈爾何松江金澤寺四首東南巨浸五湖深古寺維舟正夕隂客到山僧罷清磬雀喧晴日下髙林夾洲煙火三家市滿目蒹葭萬里心徙倚不知餘興盡月明還擬聽龍吟三江抱處勢如環野客探竒住不還一望樓臺疑海上稍聞雞犬覺人間幸無漁父知名姓且望山僧共閉闗自笑歸來張季子春時蓴葉未堪攀何年此地開金刹宋代流傳直到今聽法石將山作幻䕶經龍與水増深爐煙裊裊知塵性栢樹青青見佛心可是攀縁渾未盡天花猶自惹衣襟水國餘寒芳草稀偶隨煙艇問山扉窓中怪石如人立天際孤帆伴鳥飛髙齋盡日逢僧語短褐經春換客衣吳江亦是垂綸地笑指星文愧少微天寧寺塵外樓四首瞰郭棲臺誰共登偶携仙客對山僧林煙渺渺人家盡堦日微微花氣蒸浮世閒看飛鳥過機心不遣白猿騰平生自笑支離甚散髪行歌此又曾名山不用逺攀登暫借繩牀我亦僧幾樹鳴禽助禪寂一藂修竹散炎蒸捻花不盡心傳妙對塔嗟將口説騰俛仰百年成滚滚乾坤隻眼更誰曽金門十載笑重登歸去仍依白社僧虚館静聽宵蟻戰逺山時見夏雲蒸已甘樗散終年計恥逐鴻冥萬里騰為問洛城冠葢侣鬢毛銷盡得閒曽閒裏香臺盡日登嘿然一笑又逢僧衣裁野薜緇塵浄飯試山精石鼎蒸大士西方談實相仙人東海説飛騰人間多少亡羊路一一行來也未曽題湖上廢寺禪宫舊枕清湖曲與客尋幽試共登獨樹春深初著蕋空山行遍不逢僧臺荒曽與施烏食城化徒聞駐鹿乘惟有松房明月影年年長似為然燈題龍池菴三首相傳伏虎禪僧開山處山頂有龍井蜥蝪見則雨逺逰為訪白雲巖轉盡孤峰路更南龍見小身時出井虎馴大士舊開菴禪心客思俱潭水古佛寒松共石龕坐對老僧無一事夜深相與説楞嚴精廬原寄北山巖新築髙齋過嶺南谷窈窕間還宻樹石孤危處更虚菴聽經野鹿頻窺户宴坐山僧不出龕客欲逃禪無可醉逺公於酒禁方嚴霽後嵐光散曉巖望中佳麗盡東南三春蘭蕙堪成畹千里湖山併在菴馴鴿下時呈佛性飛鷹宿處見僧龕維摩今日還多病酬答誰將究妙嚴贈菴中老僧僧解相人術少嘗遊歴江南晩歸菴中早從祝髪事棲巖為禮名師毎向南用華嚴事業淨六根成慧眼身無一物寄茆菴厨邊引澗寧須汲松下翻經幾到龕若使焚香能證道前身應説是香嚴嘉靖丁未春余以病客荆溪遂同杭子宣登龍池僧居嵌巖中如鳥巢梯其門以登值二老僧相對煨笋遂以笋供余二人因留宿與老僧坐至夜分談説楞嚴因縁事老僧意甚樸野可愛也明日曉起嵐氣滿山乾坤如混沌狀堦前竹柏亦在摩蕩中咫尺不可物色日且午始開霽則諸峰歴歴澄湖隱映樓觀草樹百里之外若在几前葢宇宙間晦明不常若此既午出往石屑石屑兩山夾澗山高百餘仞而澗道僅闊四五十步人家縁澗以居惟亭午則見日色葢其勝又與龍池異觀矣既午飯遂從西霞步入舟意興悠然如有得也嗚呼此豈可與沉酣聲利者道哉遂書以貽子宣使藏之贈黄子晦故黄教授子黌舍相逢憶聚星予慚入室爾趨庭子長能繼先人業王吉曽承博士經萬里風煙還命駕廿年踪跡已如萍衰顔重感青衿日一笑尊前喜愧并寄周臺官二首時余將往南郡南臺分署沐恩初官是疇人世業餘龍吐珠璣天地轉星塗黄赤石甘書泰階平處瞻雲闕玉漏清時直禁廬應有道人扣闗者試看紫氣近何如文史元隨供奉間南都祕省更清嚴抄書暗譯西畨厯草奏多陳南極占日下有雲朝紀瑞臺中無事晝垂簾倘覩少微思處士漁樵已判此生淹家居喜袁芳洲相過賦此為贈三首相逢京國最情深休沐歸來毎共尋異品對飡呈海味道衣便坐解朝簪迂疎北闕上書日寂寞江潭俟罪心已分與君成契濶一杯還此幸同斟憶昔曽同念菴子歲寒訪汝深雪邊别開閒館屏人語不解朝衣藉草眠琴意相傳中散後𤣥言毎到漆園前正是江東暮雲處再逢携手一悽然四十支離一老夫衰顔恰比列仙臞鑄金不驗身多病種樹無能圃半蕪長日閉闗聊嘿嘿短衣迎客笑拘拘知君昔日探𤣥意定有真詮肯示予次韻贈薛仲常山林鍾鼎性俱安官舍寧非在澗槃此日心情真似水平生臭味本如蘭閲世方臯誰牝牡認真桑户且衣冠祗應黄馬泰泉溪田頻來往春日江楓共倚欄歲暮有懐諸子歲暮蕭條只自如南州髙士久無書達夫樗材在野大何用種髪經年短不梳剡水驚心溪雪後汝中隴山飛夢嶺梅初景仁祠郎消息憑誰問萬里昆明是謫居叔仁贈張贑州致仕還吳次達夫韻田園舊在海東頭海上新歸張翰舟種菊不辭三徑晚採蓴將及五湖秋人情歴盡惟看奕世事忘來獨好樓剰有著書心尚在知君原不為窮愁贈宜興王丞次韻王蒲州人官粟還能五斗無年來只是憶樵漁道知戰勝臞猶在詩為身窮思獨殊耕稼吾非徐孺子才華爾亦阮元瑜他年更向龍門隱為念江臯一腐儒答朱刑部士南見寄清齋偃息灌園餘囀盡春禽又夏初對客不須妨蠟屐占年常自檢農書六經註脚吾焉敢五岳行踪或可如宣室正須公等在野人只合掩荒廬同萬鹿園宿工文菴次韻有贈何處尋山不厭深淡煙歸鳥暮鐘音去家百里訝如客别爾經年尚此心宴坐清香滋夜氣閉門殘雪映寒林相從一宿應堪覺機事何須問漢隂次葉師與諸生講書鐘樓寺聞鐘作早歲傳經髪已斑寄身精舍渺人寰苔邊屨跡堪盈户花外鐘聲正掩闗驟覺海潮生静夜却隨仙梵響空山先生嘿嘿隱几坐試問諸生醒夢間養病道院忽張君見訪不值奉寄生涯歲歲藥囊間已息交游亦未閒土木形骸真覺槁蓬蒿庭院只常關偶隨道侣學禽戲忽枉髙人題鳳還此夕知君向何處多應弄月卧江灣答贈胡栢泉赤囊前日奏邊書皂帽何時掩故廬鳴劍豈知孤憤切請纓爭笑少年疎自甘淡泊看松菊恥學浮沉逐里閭春日黄鸝西澗草憶君歸去灌園初送郭無錫擢南曹主事郭侯齊魯推名士暫屈清才綰縣符折獄一言驚老吏洗心終歲比冰壺南曹已應郎官宿東國常懐仙令鳬野老殷勤何以贈益崇明德永嘉譽夜歸陳渡草堂時新與諸子别去有懐二首野夫也復到城市日暮還尋四壁廬蛩響露餘將入户人歸月裏又離居坐憑烏几都忘我起對流螢且廢書正憶青衿同舍子别來秋興各何如自擬身名如鄭圃宫環半畝日長扄褐衣頗笑非懐玉茆屋何因却聚星樹底蟬聲希鼓瑟燈前鳥字一談經試言吾易將東去未識何人是姓丁癸卯送仲弟正之赴試偶因今日送行處尚憶當年聽鹿鳴馬氏白眉占仲子吳門霜鬢愧難兄秋來一雁寒江影天外三山古帝城此去騫騰非所羡期無温飽負平生己酉送兩弟正之立之赴試秋水芙蓉映緑衫殷勤送爾到江潭人能鳴世慙三鳳家有遺經是二南文入妙來無過熟書從疑處更須㕘逺遊他日看之子下澤欵段吾已堪送諸從游應試二首一壑謀身世所疎幾人相伴此閒居月懸山館談經處雪壓林臯宴坐餘向來衣鉢吾將付先輩文章子孰如亦知雅志輕青紫好及明時早上書幾年山澤共淹留今日公車且見求楊柳扁舟吳苑夕梧桐雙闕漢京秋清時元不棄寒士白璧誰將笑暗投都下相逢説論語莫言師授是張侯送馮子聲赴試與君硯席辱周旋義理蠶絲毎共研頴悟最居德祖後聲名愧出照鄰前身同槁木甘吾隱賦就凌雲羡爾賢莫道孫𢎞曽不遇漢庭推轂在兹年送褚生滔赴試久撤臯比絶來往褚生時復欵柴門文有波瀾堪得髓座無笙管只清言客心落葉秋江繞别思平蕪夕鳥翻此去期君戰勝後歸來正對菊花尊鄱陽别道友户庭不出已多年千里隨君意豁然飲醉或歌還或泣鬢蓬疑鬼又疑仙詎知衰鳳堪為笑且學塗龜得自全今日别離何足恨終期共住白雲巔中秋夜同陳澄江張夢麟城壕泛月森爽秋逢三五中霜天雲物坐來空河灌百川還小艇寺藏荒野亦疎鐘客嘯忽聞清唳鴈月圓真訝吐珠龍疑君與我皆仙骨身世何須更挂胸和張尚書甬川新修池亭奉母登憩作聖朝耆舊位登三綵服公餘樂更堪東洛撫師雙玉節西園奉母一茆菴春暉映處花侵户冬笋成時竹上簷聞道閒居新作賦承歡養性此能兼贈蔣璞山封君主事宗魯之父早游鄉校已知名曽與賔興聽鹿鳴修行明經為博士夏絃春誦課諸生官無鼎食千鍾願老有鄉園十畝情更笑籯金何所用仙郎作吏比冰清贈張通政五湖舟楫是家居篋裏惟携老氏書幾日陸沉門下省一生心跡海東漁賔常滿座嫌猶少行不齎糧任所如陽羡山靈相望久獨能無意命巾車用韻自述南村北郭任吾居懶散何心更著書小酌或能稱酒隱直鈎聊復事溪漁童時篆刻堪為笑病後形骸漸不如若道猖狂今又甚窮途猶自未迴車夀張通政蚤耽𤣥寂謝塵氛身隱猶嫌名可聞自著道衣辭漢闕因尋仙籙禮茅君行隨勝跡曽無住藏向名山更有文南國夜來占氣色少微渺渺動江雲曹霜崖六十曹生恬之父舊官御史道人容色自臞然幾歲江臯躡紫煙謝氏家兒如玉樹周時柱史是神仙鼎成靈藥方皆驗書貯名山世未傳懶散自憐蒲柳質相從擬欲學長年司訓殷龍巖夀詩文東之父白頭博士早懸車鳩杖扶身八十餘甲子暗占絳老歲今文口授伏生書清尊只許通門客隱几何心出里閭應笑籝金無所用仙郎才藻更誰如楊醫士六十衣裁鶴氅鶡為冠數巻方書一草菴絳縣老人知幾歲太倉仙令却多男不為避人居郭外毎因採藥到山南年來頻訝嬰兒色道術從知宿所探禇怡閒六十滔之父古來仙客説長髯今日髯翁亦是仙家近縣門不識令身居城郭亦耕田鳩形正可供扶杖亥字還堪紀歲年共羡髙門將有待賢郎文藻更翩翩贈宜興閔翁八十夀詩上舍伋之父古貌翛然山澤臞力田還是漢人餘久諳汜勝齊民術閒讀周侯風土書桑榆曖曖隨行徑弟子訢訢與燕居駟馬從來足憂患羡君身世更何如周子隱有陽羡風土記贈天寧寺僧八十化城東畔駐三乘祝髪從師記昔曽頻著袈裟迎上客自分齋飯與遊僧談經幾夜窓飛雨削杖先年手種藤因笑馬鳴身已老欲憑弟子為傳燈懐竹叔夀詩叔善畫傳自乃翁門傍清溪長自扄隂隂藂竹繞幽庭地偏南郭人堪隱秋盡東籬菊正馨笑傲百年惟稼圃風流兩世擅丹青不須海上求靈藥元是江邊老歲星楊醫士夀詩東亭先生富道術隱居城郭似江湖隨身長挾雙白鹿入市只懸一玉壺社中漸覺推前輩門外從教滿病夫予亦文園髙卧客年來肺氣為君蘇喇嘛翠峰老僧輓詩三首枯木寒巖亦未真走盤珠子自精神三飡煮籺一生事翠峰毎食糠餅屢歲齋僧幾萬人鑄冶金容瞻氣象圓通天眼悟根因翠峰得師傳天眼訣欲上伏牛心未了了心應待再來身不事钁頭不坐禪揚眉瞬目見雄談净體髪鬚元不礙翠峰不去鬚髪煉心妻妾宿曽㕘翠峰為僧後入俗曽有妻妾者三年殿壓滄溟功九仞爐開色相佛千龕翠峰一生鑄佛造無梁殿于浦陀未成也年年航海精誠在垂没魂還到海南自愧迂儒厭俗葷毎游香室藉思薰别來常似一臂失用莊子話久寧容六耳聞人去忽驚函谷展錫飛無復海東雲憐君鑄佛經千億欲借餘銅一鑄君錢心漁輓詩心漁先生不可見尚憶吹簫卧草堂垂綸老作江潭客得姓元從吳越王貧病一生心自足雲山千里興難忘更聞治命真堪紀人世空矜石槨藏讀東坡詩戲作東坡卒于武進顧塘橋去余家數十步公詩句句寫胸臆一滴冰成大海翻方臯牝牡無定相曼倩滑稽有至言掃除李杜芻狗語出入鬼神傀儡門異代或疑後身在告終此地招其魂雪詩和蘇韻十首隂風吹隴麥芽纎歲盡𤣥冥令更嚴園圃未春先綴蕋乾坤如海欲生鹽不妨積處堪髙卧預想晴來好曝簷縱是未能堅作玉漸看冰柱已垂尖大地文章散縞纎小堂風物倍清嚴灑來竹裏迷人徑積向巖前訝虎鹽但使曉寒欺短褐獨宜夕影泛虚簷瓊花柳絮皆無用誰擬新詞一鬭尖寒江我亦弄纎纎豈是羊裘人姓嚴履處幸不露足趾嚙餘真覺厭酸鹽紫雲黄竹千年調白屋朱門一様簷髙岫儘教遮葢盡物情元自礙孤尖寒臯白草尚餘纎墐户村村似戒嚴飛舞千峰山吐練粧成幾樹木蒸鹽滇蜀有木鹽病多消渇宜調茗老已捐書莫映簷强欲摛毫追小謝謝惠連有雪賦詞鋒久避六朝尖宛轉素娥腰帶纎迴颷似應舞節嚴三冬怪事驚粤客古語粤人不見雪一夜凄風結解鹽解地鹽遇風則結厭説炰羔歡錦帳思分挾纊到窮簷懸軍此日堪乘便誰奪祈連萬仞尖李靖因雪擒頡利蕭蕭凍樹晩喧鵶門外誰來長者車入夜俄驚千里月開簾相對滿空花東郭先生猶敝履西闗遷客正思家最憐漁父滄江畔閒倚孤舟獨挺义一片寒原滿樹鵶幽人掩户罷柴車聊憑濁酒延春色試向疎梅問臘花草閣映來書幾巻江城積處月千家此時忽憶荆溪道雲際雙峰聳玉义初看朝采颺金鵶倐見𤣥雲隱日車恰似幻師能作霧却驚翳眼驟生花緗編暫借簷前影銀閣常思夢裏家笑道非鹽亦非白禪機一指為君义空城無粟噪饑鴉陌上紛紛正滿車積磵暗隨泉並滴入簾應與筆争花芻米驟髙新歲價柴扉旋掃野人家客來此日須沽酒梁上青錢那得义巢風欲動好占鴉空裏愁翻百寳車葱嶺未消阿耨水珠林忽散鬘陀花故氊猶在能禁冷好客相尋懶卧家且似瞿曇逃世網雪山跏坐足為义家僮自野田携黄菊二株至軒中感而有作三首曠野隂隂萬木霜誰携數蕋到茒堂冷質本非堪競秀閒情敢謂愛孤芳在野寧辭衆草掩入簾聊作滿庭香自笑吾生花興少欣然對爾亦相忘余素不好花見此不覺有喜意豈真所謂花之隱逸者耶已􅂸寒谷不須媒讓寵何嫌並朶開花意幽閒當艶麗天心霜霰是栽培潯陽逸客瞢騰醉姑射仙人綽約來寂寞於人誠少用試將服食制齡頽不沾春色也穠纎小院疎籬秘靚嚴人比孤花清入聖天然真味淡非鹽未須採摘供調藥為嗅馨香置近簷落英好護餘根在來歲還看茁玉尖此詩用坡公雪詩韻海上凱歌贈湯將軍九首湯侯猿臂猛虎鬚少小曽窺𤣥女符明主親頒手中劎直交跨海斬天吳紛紛盗竊爾何知岸上斫人水上嬉自咤一身都是膽欲將巨海作潢池偃旗休角寂無猜百丈樓船泊不開夜半賊營流矢滿纔驚漢將是飛來水軍隊隊黄頭郎迎潮直上凌扶桑已知海若先清道萬里滄波定不揚海上秋髙海氣清營中賈勇競先鳴疊嶼亂翻旌幟影驚濤盡作鼓鼙聲沉船斬馘海為羶潭底潛蛟噴血涎髑髏帶箭逐波去可道孫恩是水仙錦紈愛子亦從軍長鬛蒼頭總策勲誰奪强王萬金首帳前齊説小郎君五千長㦸下淮邳自是沙洲命盡時將軍欲置平戎鼓須借鯨鯢腹下皮湯侯以渠賊王艮皮製鼓㨗上彤庭寵數優詔分玉帶與名裘麾下偏禆盡稽首貂蟬笑看出兠牟南征歌十二首五嶺烽煙久未平君王習戰幸昆明却説將軍多勝算不須文士請長纓詔錫彤弓出禁城良家六郡總從行將軍舊佩平蠻印校尉新開横海營漢皇有道握黄圖南粤何知擅一隅萬里出師將問罪不因大海富明珠獨承節鉞控南州親寵由來冠列侯昨夜輕寒生幕府賜衣初著紫貂裘晴原羽騎簇油幢繡帽爭先蹋鞠場不惜千金收猛士欲將尺組繫名王月明吹笛武陵川馬上行人望跕鳶莫怕炎洲饒毒癘一冬飛雪浄高天軍書插羽速星奔卭僰夷王盡欵門殺氣三秋清瘴海輕兵一夜襲崑崙草木千山鼓角風將軍牧馬夜郎東靈臺向夕占星色已報欃槍墮海中圍合孤城海氣昏紛紛失木泣窮猿何如銜璧歸天闕幸荷明王不死恩牂牁南去亂峰連滇海藤江一帶懸縱謂蠻封堪畫地不知漢將若從天奏凱歸來拜冕旒霍家襁褓更封侯因風為報南荒外漢闕方梟越尉頭千羣椎髻競來王聲教南流盡越裳但使文犀通貢獻不將銅柱隔封疆塞下曲贈翁東厓侍郎總制十首四月旌旂出白狼千山晴雪照油幢預知水草軍無乏試辨風雲陣欲降三晉連年苦被兵九重拊髀憶豪英詔書更不從中御萬里長城一委卿詩書禮樂古人風開闔機鈐又不窮得一降人如愛子用三敗將立竒功山前山後兵馬雄斧鉞衣裳在掌中俠士獻刀承賜酒貴侯免胄為趨風灅川冰盡水泱泱堡堡人家唤蒔秧田中每得鳥獸骨云是單于舊獵場君侯生長在炎洲塞外層冰草木愁祗憐軍士猶寒色臘盡轅門不御裘太師昔日定南荒親把長纓繫莫王寄語健兒須自愛射飛休得近邊墻邊人謂大官為太師畫㦸森森清晝閒指揮只是笑談間收將黄犢教耕去捕得蒼鷹命縱還營平謀國最深忠毎與公卿見不同但使湟中無牧馬不須麾下有邊功青青塞草羽書稀士女鼾眠畜牧肥戲看侍兒呈舞馬醉邀幕客對彈碁題贈段紫峰仙人宿處紫煙孤一片峰隂散玉湖今日隱身城郭裏閉門常寫廬山圖秋日書客童君見過賦此為贈有客扁舟問草廬窓前梧葉正蕭疎山人已得忘筌意不復從君乞異書題陳推官羅江號二首髙卧曾分白鷺沙清谿深處採三花總為徵書出空谷衣裳猶自染雲霞三山江畔入雲齊紫氣千年鎖石堤便欲學仙從此去與君同聽夜猿啼題寳華和尚巻幻目由來見幻華飲光何事又拈華兩華舉似知華客為有别差無别差贈王和尚住善巻偃栢垂蘿古洞春上人飛錫此何因非闗福地尋仙侣自向青山認法身自述贈寫真毛君津黑尚餘山澤氣委蛇又似列仙臞他年太史徵圖畫為識乾坤一腐儒贈周筠臯母七十夀詩髙堂有白髪掩映明春暉七十古來少一陽今又歸瑶池青鳥狎石室紫芝肥令子能承色還看戲綵衣送使人歸蜀蜀吳萬里説殊方總是江流一帶長暫醉𤓰州能幾日乘風忽又過瞿塘題畫山空夜静猿一鳴磴轉雲深鳥不度幽人何事長獨棲只為此中有佳處㢘使廖東雩喪後開所惠地黄酒臨觴慘然尺書滿篋故人情想像荒丘宿草生祗餘此日開尊意堪作山陽聽笛聲贈儀真沙君葭菼蒼蒼水國秋髙樓明月古揚州二十四橋雲霧裏看君騎鶴上天遊贈史君漁沙號問君何處挂漁蓑予亦垂綸坐緑波他日相逢應一笑不知若箇得魚多華補菴三度惠酒而此畨所惠參酒者絶清冽可人雖味甚濃厚而置之杯中淡若無色可謂嘉品因劇飲至醉遂成口號奉謝三首磁杯寫盡只疑空秋月寒潭意頗同隱几偶然成獨酌夜凉白露滿庭中毎甘樗散惟須酒欲補虚羸却藉參瘵疾陶生兼好飲舉杯深見故人心淵明素瘵疾絶無色相傾明水只有馨香藉白茅此夕飲醇􅂸一醉恰如把臂與公交贈曹星士一江號春雨蘭陵江草生江流恰與道心清門前車馬日來往閒坐江城説子平自述并贈曹君少讀隂符恥未工青山偃仰漸成翁人間炎冷都忘盡聽話流年一笑中曉起觀猫捕鼠起來隱几坐朝暾深謝當闗早閉門簷角偶欣猫捕鼠反觀尚覺殺心存贈華君一竹號華生可徵之父巗居無俗好惟與此君知千畝亦何羡一枝聊自怡迎風響獨奏照月影相隨願比幽人節貞柯貫四時補翠峰上人挽詩一首四大于今已各離屈伸猶復似生時𢎞景遺顔常不改翠峯死後四體屈伸如常陶𢎞景傳中亦載此事惠能去路定非迷棺蘄速朽寧辭瓦翠峯以瓦棺身不留名豈用碑亦知繪塑終難像聊使門徒寄爾思詠橘杯二首余過荆溪萬為菴訪余舟中時風雪驟甚欲共飲索杯不可得乃剖橘作盃劇飲至醉相約各賦詩紀之客中酒具愁難得戲幻霜柑當羽觴破處何妨鑿混沌醉來偏覺助馨香古風豈讓匏尊儉佳味何須鬱鬯芳更笑玉盃真俗物朱門豪客漫猖狂天生竒器無人識剖破鴻濛笑我狂醇酎坐令増藥味碧筒徒爾薦荷香持來或訝成金盞寫滿猶疑是橘漿靈均若也知兹意楚頌還應記醉鄉荆川集巻三欽定四庫全書荆川集巻四明唐順之撰書答張甬川尚書書養齋翁歸辱賜手教嘉惠多感逺念順之麤頑非畜德之器迂疎非適用之才徒以麤頑近乎質木迂疎類乎澹泊以此幸不見絶於大君子之門自入山中稍欲收斂精神擺脱習氣庶幾少有所聞以酬宿志且以不負長者拳拳教愛之至意而閒静中轉見種種欲根起滅不斷雖暫隨氣機歇息終非㧞本塞源工夫益覺實病之難除實功之難進也承教中庸不可能乃在聲臭之表此喫𦂳要言中庸所謂無聲無臭實自戒謹不睹恐懼不聞中得之本體不落聲臭工夫不落聞見然其辨只在有欲無欲之間欲根銷盡便是戒謹恐懼雖終日醻酢云為莫非神明妙用而未嘗涉於聲臭也欲根絲忽不盡便不是戒謹恐懼雖使棲心虚寂亦是未離乎聲臭也明公之致力於道而自得之也久矣而猶云老且望洋日有愧嘆此豈明公之過為避讓哉葢常存不及之心而后可以言戒謹恐懼而後可以閑未萌之欲古之聖賢所以兢業此心至老益强類如此也放失如順之輩竊因此更有省矣承示欲修飭武備此明公為國家之深慮也世人作事計較成敗利純畏首畏尾自為之念重而任責之意疎所以弊多積於循襲而事毎牽於掣肘以明公之素望與其素養居其位而行之因則因革則革誰能撓之雖然武備其一事也昔周命周公畢公以東郊之治欲其彰善癉惡以淑人心至於世變風移而後已今之民風士習其淪胥抑可知矣而畿甸為尤甚此俗吏之所謂迂緩而有識之士所為深憂而懼無以善其後者也然而明公今日之任周畢之任也且夫東郊雖周之東郊而實染殷之餘風者也經周畢而一變其俗况南都固祖宗之所肇基而風勤之者也以明公之素望與其素養居其位而行之明示好惡提醒人心而挽之禮義亷恥之域使四方之有風俗自畿甸始畿甸之有風俗自明公始非明公今日之責而誰望乎聞太夫人已就養是明公入則承歡於内出則宣力於外其承歡於内也益所以畜其效忠之心其宣力於外也益所以推其養志之施葢兩不相妨而交相益也此深可為明公賀矣養齋翁考滿歸遂欲乞休但山林中得此翁於鄉俗極有益仕途中又少却此翁為可惜耳然其意已决矣又曩承手教諄切皆道義肝膈之語感幸感幸至於所論學術之虚誕與其毫釐之差則皆足以惑世而害道此切中當世學者之膏肓鄙人亦嘗深憂之而未及面請也先行其言而後從之言非君子之所急而况其誕者乎承示大學小傳葢發於涵養之真而多自得之説至於身心意之别以正心為主静之學尤明公之所獨得其曰正心者不屬於意不屬於身者也是心之無所發動事物未交於視聽時也斯時也心惟存其恂慄而已凝然中居而外誘不敢干也是則然矣但不知事物既交既有視聽之時其凝然中居而外誘不敢干者與前時有異乎無異乎豈所謂凝然中居者只主於静時而為言者乎抑亦無分於動静而皆在者乎更願教之答吕沃洲御史書居鄉無朋友夾持深懼墮落得來教不覺􅌶然甚幸甚慰兄云暫時寧静若有端倪恍惚轉移復離本體自非兄之懇心真實直從心源上著工夫不能為此言然兄自謂未得覇柄入手者正恐此病亦坐乎此大率此學只論有欲無欲不論寧静擾動若本無欲障則頃刻之間念念遷轉即是本體若欲障未盡則雖窮年黙坐能使一念不起亦只是自私自利根子白沙先生嘗言静中養出端倪此語須是活看葢世人病痛多縁隨波逐浪迷失真源故發此耳若識得無欲種子則真源波浪本來無二正不必厭此而求彼耳兄云山中無静味而欲閉闗獨卧以待心志之定即此便有欣羡畔援在矣請兄且毋必求静味只於無静味中尋討毋必閉闗只於開門應酬時至於紛紜轇轕往來不窮之中更試觀此心何如其應酬轇轕與閉闗獨卧時還有二見否若有二見還是我自為障礙否其障礙還是欲根不斷否兄更於此著力一畨若有得與有疑幸不惜見教也苟以為多病羸弱精力不及閉闗以養疾則可耳閉闗以養心則不可也程子嘗曰習忘以養生則可習忘以求道則甚有害其辯之精矣然養生亦只在無欲上求之故曰飲食男女聖賢自這裏做工夫斯言至近而精兄有意於元氣之復乎則願兄毋忽斯言也弟亦多病羸體葢平生得效良方在此耳至於厭事之病弟亦素有之然舊未嘗自以為病今幸知病矣何日得與兄共坐一室日夜相與磨勘洗濯此心臨書耿耿與王龍溪主事書世人之不能不疑於吾輩也久矣近有士夫自浙中來者云及吾兄以佃寺之故使憲司有言且云兄以寺地據風水之勝欲作令先大夫墓地上官某人者既予之矣而憲使持之故若此紛紛也僕聞而竊嘆以為如兄安得有此此乃傳言之誤耳不然則必俗吏欲汚衊善人託為此説就使非傳言之誤非俗吏欲汚衊善人則在兄必自有説固不敢以世人之疑吾輩者而亦疑兄姑笑而置之不欲煩諸齒頰間也既又伏念以為孔子以詩禮教子而陳亢疑其異聞孟子不見儲子而屋廬子以為得間古者師友之間既洞然肝膽相信矣而亦若不免以世俗之疑相疑者何也無乃故為迂其問以剔抉聖賢之隱曲而白之於世也乎今僕幸得兄之間而可以有請安知兄之隱曲不因以白而僕亦冀有陳亢得三之喜與屋廬子之悦者乎且夫人之意兄者則曰兄之請寺是世人之請寺己兄之徇風水是世人之徇風水已而僕之意殊不然也夫兄爽朗超脱得之性成僕毎竊嘆以為即使兄不學不知道亦當作物外高流如𢎞景和靖之徒絶非食煙火輩人而或謂其請寺以自便占風水以規後䕃此真坐井之見且不足以闖兄之藩宜乎兄之不屑與較也然而兄之為是必有説也僕竊觀於兄矣惟兄篤於自信是故不為形跡之防以包荒為大是故無净穢之擇以忠厚善世不私其身是故或與人同過而不求自異此兄之所以生深信深慕於相知者亦所以生微疑於不相知者也寺田出上官之予何必固卻以為潔風水有事機之便何必固避以逺嫌以是闖兄或者得其藩乎然僕竊以兄之意亦稍偏矣孔子惡行怪而愿人亦譏其同乎流俗合乎汙世夫曰同乎流俗則非其自流也特同之耳曰合乎汙世則非其自汙也特合之耳其設心亦豈不善而聖賢甚以為不可者其説可知也且夫本以包荒忠厚而其影或近於愿人此僕之所懼也然則世人望影而疑亦何怪歟古人有放君而代之者而人不疑其富天下有放君而又反之者而人不疑其專葢古人舉大事冐大不韙而猶不䝉人之疑如此今吾輩出格作一小事而人已羣然疑之雖古今人眼孔不同計亦不應如此隔絶也毋乃不邇不殖所以自信與素信於人者有不如古人乎不顧不視不取不予所以自信與素信於人者有不如古人乎且夫以湯之聖宜其脱然於聲色貨利之外也而祗曰不邇不殖真若聲色貨利之足以移湯而湯真若與聲色貨利相持然者何也以尹之所樂者堯舜之道也而祗銖稱寸量於一介取予之間若硜硜之小人然者何也兄所論伊川金楪子之説以此施於㸃檢形跡之人則為對病要藥矣向非其人則加以蓍參治肺癰藥豈不甚美或以助火而長病也曩時諸友所處陽明老先生家事或有造為玉碗之謗此言極俚鄙可笑宜不足以紿三尺之童子然王僉事竟以此解官去有志者至今痛惜之夫毁譽利害不足計然得無吾黨亦有過乎苟非過於自信而疎於事情無乃所謂素信於人者之未至耶君子行有不得反求諸已則工夫日𦂳日精至於己日乃孚是人之疑我者所以精進我也兄意其以為何如然僕非敢謂此言可以少禆於兄亦將以叩兄之隱曲而得聞所未聞耳幸亮之答王南江提學書奉别經年不能通一字以為率然道離合問無恙之泛語既不宜施之於兄而思竭其疲駑以效一言之獻則又茫乎其無所得故遂缺然至此又復以為既疲駑無以自效而有數字以道離合問無恙亦足通殷勤而舒繾綣之懐不猶愈於經年無一字乎故於李君使者來草草作此大抵所謂率然之泛語耳然僕竊誦吾兄前後見惠兩書知吾兄痛懲既往之悔直欲洗刷腸胃不肯若世之葢頭換面作好人者至於用心獨苦處則雖兄口不能自言而僕於筆扎間亦稍窺見焉未嘗不憮然而嘆以為兄之力能自振㧞如此兄之不自護如此即使僕竭其疲駑而有以自效亦何所加也人心存亡不過天理人欲之消長而理欲消長之幾不過迷悟兩字然非努力聚氣决死一戰則必不能悟或不知所戰或戰而不力則往往終其身而不悟故佛家有認賊作子與葛藤絆路之説而兵家亦曰名其為賊敵乃可滅又曰一日縱敵數世之患此佛家之可通於吾儒而治戎之道可用以治心者也儒者以交戰為子夏之病不知能戰是所以為子夏也雖顔子亦有戰矣曰不逺復夫不戰何以有復也雖天地亦有戰矣曰龍戰于野其血𤣥黄夫隂既疑於陽矣陽安得晏然而無戰乎惟戰而不勝故血而至於𤣥黄戰而勝則血可以不𤣥而陽可以亨也是能戰之效也今兄知所以戰戰又能力矣僕自入官得請見於當世士大夫葢三年而後見兄一見則駭然異之而兄亦過以僕為知己夫兄雄俊之文博辨之才邁往之氣無一人不知之而獨謂僕為知己者豈僕之知兄止於世人之所知而已也抑亦有不止於世人所知而已也僕之於兄不為不深知己然竊嘗有少怪於兄以為世間種種嗜好凡人之所可玩可喜者多足以掛兄之胸臆而動其挹慕不捨之意此其中於心也微而不知其植根也膠而難解苟一不戒則微者或横潰而著矣根者或引蔓而枝矣就使能戒而不潰不蔓則其為力甚勞而為功亦寡譬如聚千百不逞於深叢巨莽之間按而不發而時出其一二騎以鈔於路幸不為大憂然而授首獻俘之期恐終不可冀也而况其猖獗之不可料歟雖然兄何如人也豈敢謂其有溺於此歟或者當時年少而氣鋭以為雖小有所嗜好而固無損於吾之大者抑亦知嗜好之不可不欲快於一鬭而以積漸消去之歟且夫以嗜好為無損者無乃不知所戰之過歟以為積漸消去者無乃戰而不力之過歟夫嗜好之中人也亦必有因必非以為漫然無所用也必以為人之資於天地間者一物不可少也孟子之書所以提挈此心者至著矣而尤著於生我所欲一篇葢其不悟也則自宫室妻子之奉至於種種若無一焉可少者其悟也則雖簞食豆羹之切於生死若無一焉不可少者藉令有一人焉始不悟而今也悟則自今日無一物不可少者而追視向時所為無一物可少者未始不啞然自笑也傭工道丐之人徼幸得十數錢則買殽市酒一醉大叫自以天下之樂莫踰於已而千金之子苦身仡仡以程錙銖日夜苦不足藉令此兩人易地而觀焉亦未始不啞然自笑也人之所甚愛而至不可少者莫如七尺之軀也其住於世也能泣能笑能挈能擎能徙能倚無一不能無一不有而其聚諸有以住於世也則又有修有短而卒無不腐為野土化為瓦礫而後已者則此七尺之軀亦終不得自有矣以其終不得自有則當其暫而有之固亦不可據而私之以為真有矣而况於種種嗜好其不如七尺之軀之不可少者又不啻千百倍歟古之聖賢所以超形氣而獨存至於同死生齊得喪漠然無一動乎其心者非誕也既悟則自知之耳如此乃可以悟知性知天乃可以語謹獨誠意之學而其初必始於力戰未有不力戰而能如此者也約之嗜好更不少於兄而僕相聚時數以為言然於兄獨罕及者約之性柔須待有人夾持而兄剛果雄毅氣魄甚大始雖暫牽其必一朝躍然自脱於此無疑也顧所不知者早與不早耳今兄果然知所以戰戰而又力以自脱於此不出吾素所料者如是而又早則吾之所不能知而深為兄喜者也僕不肖聰明百不逮於兄雖僅守繩墨常恐失之兄謂我戰勝而肥今臞然故吾也此足以知戰之不勝之效矣雖然敢不勉耶幸兄常不鄙而教之僕於文字素非所長然以猥嘗受教於兄且幽居少事欲以灌園餘力時一為之又以為既樗散無所用世幸未即老死二三十年之後或為天所牖使少有知識尚能託之於文字雖不敢望於行逺庶幾達鄙陋之意焉是以不能息心於此然往時朝夕於兄尚不能竊其緒論今去兄既逺誰為開之固知終必罷廢矣今往近作數篇冗散無可採至如贈彭通判與李郎中墓文亦稍見已志故敢請教耳僕今年寓居陽羡挈妻子以行有一二童子相與講章句自以此身不量而為人師雖不責我以道而所講者章句然至於收拾放心正容謹節以率之者亦不敢不力自謂於此頗有分寸之益因是知吾兄以道為人師而所教者又非一二童子乃齊魯五六郡豪傑之士則其所以率之者宜何如而其為益又何如也然僕所謂一二童子者自章句外亦稍以内外輕重義利可否時時與之一談則或如鑽礦而不入僕所教不過一二童子而又日夕與之處然猶如此兄雖善於作人然以一人督率五六郡之士而又不能日夕與之處則其頑然而無得於兄者固亦有之歟僕竊為兄慮也夫為此五六郡得一良師孰與為此五六郡得百十良師故為提學者莫急於風勵學官今學官自卑其身無恥而嗜利甚矣誠欲有以風勵之又恐非一僉事之力與二三年之間所得為也奈何家父言某縣某人者在京師百計詆兄此甚可為勇於任事者嘆也然在齊東得無亦如某某者乎此在兄亦惟自信自為而已何較於彼者哉家父又言兄有薦僕之書於京師貴人此兄之愛我甚而忘其醜也雖然僕之與兄以善交聞於人久矣兄之薦我何異於僕之自薦乎僕年來自計已熟大抵人用之不敢以隱人不用必不敢以求亦必不敢以悔終吾身而已矣然兄素已知我矣何待僕自言也答俞訓導書得所示書知執事望我甚厚教我甚至感激感激葢學病於博雜而量病於博廣此鄙人膏肓之証過承發藥敢不盡飲然僕之此心亦不敢不悉於執事也夫士之於世苟無志於為善則已果有志於善則世之人未嘗不欲其入於善已之善未嘗不欲與人共為之所謂衆生病即是已病此萬物一體之心必不能自已者也僕於甲科人才固未嘗專有眷眷搜羅之心其於巖穴之士之賢者亦何嘗敢忘相與切磋之心哉其於卑鄙齷齪越禮放法者固未嘗敢有雷同隨俗之心而其間尚可告語轉移者亦豈敢遂無憫惜愛䕶之心而遽疾之如讐者哉甲科之與巖穴本無揀擇而感應則隨其所遇峻拒之與憫惜本無作好惡而曲成則因乎物情此天則不容人加減者也夫業無定習而心有轉移苟真有萬物一體之心則雖從事於舉業以進身未嘗不為義塗也若使有獨為君子之心則雖從事於飭躬勵行以退處未嘗不為利塗也經義䇿試之陋稍有志者莫不深病之矣雖然春誦夏絃秋禮冬書固古之舉業也固未嘗廢誦與書也苟無為己之心則絃誦禮書亦祗為干禄之具苟真有為己之心則經義策試亦自可正學以言昔人妨功奪志之辨此定論也至於以舉業為教則稍有志者亦知深病其陋矣吕伯恭以舉業教浙中而朱子以書規之伯恭答書以謂若不開此一路則法堂前草深一丈僕嘗誦而竊嘆以為此極是前輩苦心非特後之人未能知雖當時同志者亦未能盡知也僕年來則已決意絶去舉業之教矣而猶𤨏𤨏為執事言者葢亦自知今之不教舉業未為脱洒而向之教舉業未為粘帶也今之不教舉業未必足以閉人之利塗而向之教舉業未必不引人一二於義塗也至於道德性命技藝之辨古人雖以六德六藝分言然德非虚器其切實應用處即謂之藝藝非粗跡其精義致用處即謂之德故古人終日從事於六藝之間非特以實用之不可缺而姑從事云耳葢即此而鼔舞凝聚其精神堅忍操錬其筋骨沉潛縝密其心思以類萬物而通神明故曰灑掃應對精義入神只是一理藝之精處即是心精藝之粗處即是心粗非二致也但古人求藝以為聚精㑹神極深研幾之實而今人於藝則以為溺心玩物爭能好勝之具此則古與今之不同而非所以為藝與德之辨也執事所舉堯舜夫堯舜所未聞與若罔聞云云者此道也羲和之厯象夷䕫之禮樂臯之刑名至於垂弓和矢伯益鳥獸孰非道哉然諸子為之而堯舜若罔聞云云者葢君逸臣勞道則然耳若謂堯舜以道自處而以藝士諉之人何其自待者厚而待人者薄也臯以刑名自處而乃為其君陳迪德之謨䕫以撃石拊石自處而教胄子以簡亷直温之德性則是以藝士自處而以德望之人又何其自責之薄而責人之厚也厯象禮樂藝也修五玉如五器而彰施五采在璣衡獨非藝哉則堯舜亦屑屑矣孟子曰堯舜之知而不徧物急先務也若在羲和則厯象便為先務在䕫則撃石拊石便為先務又安得以堯舜之所不徧者而遂不急也執事以好博雜技藝為僕之病此則不敢不承而至於分技藝與德為兩事則辨之亦不敢以不明也葢儒者慕古之論莫不以為必絶去舉業而後可以復古之德行道藝此則不務變更人心而務變更法制將有如王介甫所謂本欲變學究為秀才不謂變秀才為學究者矣儒者務髙之論莫不以為絶去藝事而别求之道德性命此則藝無精義而道無實用將有如佛老以道德性命為上一截色聲度數為下一截者矣是以鄙意不敢不盡於執事也雖然執事憫時病俗之意則亦深且切矣今執事固有教人之責矣執事之隱居修行僕聞之膠陽諸兄亦久矣今之教以舉業縱欲罷之而勢有不能即使復古之教則六藝固亦不廢僕所願執事之於諸生即舉業之中而示之以窮經明理反躬著已之路而黙消其干名好進之心則是舉業中德行道誼也即古六藝之中而引之於聚精㑹神極深研幾之實而黙消其争能務勝之心則是六藝中道德性命也方且順而導之正不必逆而沮之也大率今之世舉業技藝種種猶未足為心病所為心術大蠧者在乎義利之辨不明執事教人欲明義利之辨則必以身率之以身率之則自取與辭受進退至於纎微必精察之果義歟利歟取與辭受進退至於纎微盡義矣尤必精察之此心果有為歟無為歟一毫不自遮蔽一毫不使潛伏使精神可透金石則成人材動風俗之責固有在矣敢以是少効愛助之意以為執事報也無由面晤極論臨書馳懐嗣後更望時惠盡言此僕之所汲汲而求也答戚南𤣥書來書滿紙無一字非膏肓之病無一字非瞑眩之藥兄之惠我極厚非言可為謝也論語曰據於德游於藝記曰德成而上藝成而下德之與藝説作一個不得説作兩個不得纔提起處色色總在面前纔放下處了了更無一物自是人心本來之妙而不容増減也古人終日從事於琴瑟羽籥操縵安絃種種曲藝之間既云終日從事矣然特可謂之㳺而不可謂之溺今之人其於琴琴羽籥操縵安絃種種曲藝即使偶一為之則亦可謂之溺而不可謂之游何也謂其有欣厭心也為其有好醜心也為其有争長競短心也欣厭心好醜心長短心此兄之所謂即是塵機也然則所謂藝成而下者非是藝病乃是心病也掃除心病用息塵機弟敢不自力以承兄之教也雖然塵機息盡渾淪道心亦願兄之無忽斯言也答王生宗道書唐君誠志節之士所惜平生未與之接不能得其心胸面目之詳只是據紙上語套説一遍殊覺精神不暢不足以發潛德之光且如德州接逓一事乃是據宗道口説故叙事中此一段稍覺精明若前時宗道盡將此君平生首末行事委曲口説一畨或能更有發揮耳今不及矣然竹溪剛介之士其言亦自足以傳信不待予也既已為唐君作銘為之投筆三嘆志士苦心曠世相感且唐君在當時淹蹇不得一第而老於郎署又年不滿六十其清修絶俗亦自足以結裹此身而風末世彼世間取髙第為大官享耆夀勢力赫奕不知幾何人即其沉酣飽滿於聲利間當時莫不自以為最得意然纔一没身便臭腐糞土何異若此者其於唐君何如哉此孔子所以較量於齊景公夷齊千駟餓死之間其於提省人心最切切也清寒之士可以無所待而自立矣宗道素有志向更願於義利𦂳闗處極力研析使不為一切俗情所轉乃是挺挺自作豪傑亦所以不負唐君衣鉢云耳勉之勉之與唐一菴書使者來弟往洞庭歸時乃見尊柬讀罷不覺悽然之甚吾兄盛德人也造物者既窮其躬而又夭其嗣也哉為善者其亦不可以自信矣雖然自古聖賢能就人所不能就之德則必有能堪人所不能堪之情昔者卜子夏哭子失之過延陵三號而行失之不及東門吳則蕩而非人情也兄篤於信道久矣試于此尋究真源則雖極哀極苦中本心了然自明所謂哀之發而中節而未嘗失其為中也
