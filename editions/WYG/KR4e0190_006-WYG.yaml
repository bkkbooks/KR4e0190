front:
  text: 煉火氣盡一片凝冰鬭清冷持此月中斫桂樹顧兎應如避光景倭夷塗刀用人血至今班㸃誰能整精靈長與刀相隨清宵恍見夷鬼影邇來邊圉頗驕黠昨夜三闗又聞警誰能將此奠龍沙邊氓萬戸忻安枕古來神物用有時且向囊中試韜頴
  hash: sha256:fe3d3918c85fb914671517f215bfe68945e9bd28cfaf5252c18143bb333bf955
