  hash: sha256:658605835bfc7ff8ff2387ba751bb7ad6b056a67df75dd0366ecbd4ecdb36c76
body:
  text: 與季彭山書僕不慧自少亦嘗有志于治經漢宋諸儒先以解經名家者亦頗涉其津焉至於當世諸先輩以治經名家者亦嘗承下風而問之葢久之而不得其説則又將脱去聞見洗刷此心而獨求之于遺經又久之而竟未之得也偶游㑹稽獲聞髙論則爽然自失先生之于經闗竅開解搯擢腸胃若秦越人之隔垣而洞五藏也剖破傳注專門之學辭鋒所向决古人所未决之疑而開今人所不敢開之口如荆卿慷慨撃筑睥睨于燕市之中而旁無一人也目論古事又如身揖讓乎虞周禮樂之間憑軾以觀晉楚齊秦鬭爭之域也而聽之者且不自知其忽焉躍然以喜忽焉瞿然以愕而卒果然以飽亦雄矣哉世未之有也雖然願先生益深所養使此心虚壹而静自所獨然不必盡是也衆所共然不必盡非也却意見以融真機則古聖賢之精將于是乎在而况其經乎然則六經之道其卒于先生有明也已僕敢以是少効愛助焉答姪孫一麐書一麐問衛州吁弑其君完倉卒未能悉吾意當時簒弑之人必有自見已之為是而見君父之甚不是處又必有邪説以階之如所謂邪説作而弑君弑父之禍起者春秋特與辨别題目正其為弑如州吁弑完一句即曲直便自了然曲直了然即是非便自分曉亂臣賊子其初為氣所使昧了是非迷却本來君父秉彞之心是以其時惡力甚勁於此之時刑戮且不懼又何暇怕見書但有人一與指㸃是非中其骨髓則不覺回心一回心後手脚都軟便自動彈不得葢其真心如此所謂懼也懼與不懼之間是忠臣孝子亂臣賊子之大機括反復如翻掌大易之所謂辨而春秋之所以震無咎也如善醫者下針中其竅穴則麻痺之人即時便知痛癢春秋一言中却亂臣賊子痛癢處即亂臣賊子便自囘心是以能懼然知痛癢者乃其血氣之固然知懼者乃其人心之固然也善醫者特與遇之春秋特與提醒之而已春秋如化工言隨機提醒人也舊説據春秋所書而言懼吾亦據春秋所書而言懼此無異者但舊説以為亂臣賊子懼于見書而知懼則所懼者既是有所為而非真心且其所懼能及于好名之人而不及于勃然不顧名義之人以為春秋書其名脅持恐動人而使之懼此又只説得董狐南史之作用而非所以語于聖人撥轉人心之妙用且如其説其弊將使亂臣賊子彌縫益宻以逃名而避跡為害不小此其説起自漢儒宜不待智者而知其謬然更千年無有覺其謬者亦無有致疑者何也其悉更待面論善説春秋者無如孟子亂臣賊子懼與春秋天子之事此數句真得聖人微㫖其春秋天子之事一句儒者亦説不通久矣一麐可深思之面㑹言之春秋一部書無一句不為亂臣賊子而作非特書弑君三十六條也答汪生書逺道走使詢及繼祖母喪服深知謹禮之意然此在禮經甚分曉本非有疑似相聚訟也只為不解承重兩字而惑於俗人代父相沿為服之説是以其論紛紜而難通耳承重者禮之所謂受重也如何謂之重謂祭統也古者立主謂之重宗廟謂之重禮曰為人後者三年解之者曰為人後者受重於人受重者必以為服服之也禮曰父卒然後為祖後者斬解之者曰為祖後者受重於祖受重者必以為服服之也為人後者以傍枝後其大宗為祖後者以嫡孫後其祖雖其本末疏戚不同而其所以必為之三年者則皆以為後之故為後者受重之謂也不獨如是而已禮經固有為曽祖後云者為髙祖後云者為曽祖後者謂若父與祖或以疾廢與先曽祖而死者也為髙祖後者謂若父與祖與曽祖或以疾廢與先髙祖而死者也為曽祖後則為曽祖斬為髙祖後則為髙祖斬若以代父為説則是父之所齊期者吾代為之斬父之所齊五月者吾代為之斬此其本末倒置甚矣又何以為代乎為曽祖斬則謂之代祖也可為髙祖斬則為之代曽祖也可代父之説又何施乎此其鄙野舛駁絶不可凖於經典然世耆儒老生亦往往以此為説余竟不知其何所起也禮經十七章中無此説雖漢宋諸儒生論禮者數千家亦絶無此説余竟不知其何所起也禮為祖後者服斬不言服祖之妻何服非略之也葢發凡於為人後者章中矣曰為人後者為所後之妻若子以傍枝後其族人猶服其所後之妻若子况以嫡孫後其祖而不以若子之服服其祖之妻者乎由此言之為其祖加服云者自為受重也非為父也為其祖母加服云者自為祖也亦非為父也此祖母也禮曰繼母如母則繼祖母如祖母也為祖而服其繼祖母豈繫乎父之及見與不及見乎為祖而服其繼祖母豈論其有出無出乎且謂之繼則是不論其有出無出而為之服者固非其所出以繼母之服不問其有出無出而隆殺之也何獨疑於繼祖母焉夫有出而加服無出而降服此古所以制媵妾之等然非所以施之於嫡也禮已之妻嫡子之妻不敢以無出降而况於祖母乎以吾友有好古謹禮之意不敢不悉所聞更與知禮者計之禮後喪有前喪中其服後但據後喪始日為斷不據前喪滿日為繼也假而前喪小祥遇喪則兩喪共服之四年并以白與宜興諸友書古禮饋奠則從主人而服則從族戚朋友各以親疎輕重自製之是故主人饋奠而族戚朋友助之執事則有之矣在禮未聞有族戚朋友供奠物之文也主人勞族戚朋友以執事則有之矣在禮未聞有主人散麻散縞散絹于親戚朋友之文也今一切反是族戚朋友為之饋奠是以族戚朋友而代主人之所自盡也主人為之散麻散縞散絹是以主而擅族戚朋友之所自備也此禮不知始何時古所謂野于禮者其此類之謂乎且近世喪葬日奢日靡富貴人家一日至享十家之奠自啟殯至葬數日間大牲小牲刳割狼籍且百千計鬼神情狀與人情不相逺鬼而無餒所食幾何今若此不惟生者靡費抑亦使死者不忍且夫放生以資冥福則儒者所不信殺生以重冥咎則理未必無是以痛為亡妻謝此業債族戚朋友則相信者多矣而一麐自宜興歸乃聞諸友復欲醵金為奠且殺生靡費於有所用所必受猶尚不可况施于所必無用所必不敢受其謂之何如諸友以為情有未盡但逺來臨𦵏此亦足矣即使吾身後諸友亦只須如是行之但能相體不為無情也答萬思節主事書承示途中遇險及當局冷眼之説足知新功甚慰甚慰熱處冷得絶勝冷處冷得然險處惶惑原是易處錯過不曽做得功夫也易論學毎以涉川為説故曰作易者其有憂患乎所謂終身之憂也吾友閒居少過却是不曽抖擻提醒精神吾固預憂吾友涉川之難今吾友自知之矣自此𦂳著功夫常常從危處操心常如與夭吳河伯對壘毁譽利害諸闗悉與照破即世間一切大川何所不利涉也先輩云聖人於困險中有至樂於安平中却是有至憂然哉吾毎欲與大洲兄相㑹乃欲相與證明絶學非厯數之謂也然厯數自郭氏以來亦成三百餘年絶學矣國初搜得一元統僅能於守敬下乗中下得幾句註脚監中二百餘年拱手推讓以為厯祖吾向來病劇中於此術偶有一悟頗得神解而自笑其為屠龍之技無所用之亦嘆世無可語者近得來書乃知復有透曉如大洲者在也一快一快但不知大洲所謂透曉而厯官所不解者何所指耶豈所謂厯理者七政盈縮遲疾之所以然如元史所載王恂李謙厯議及縁督氏革象書之類獨能洞其精微是厯官祗知其數而吾輩獨能明其理遂指此為透曉而厯官所不解者耶葢昔者太史造厯既已測定日躔盈縮月離遲疾去極逺近渾淪得一天體在胸膈中而欲傳之形氣之間以為厯本則是以數寸算子握住萬古宇宙轉運葢甚難下手此子長所謂太初厯既已測候而姓與都等不能為算之時也古厯大衍為精一行和尚藏却金針世徒傳其鴛鴦譜耳于是守敬獨得一法曰弧矢圜算如所謂横弧矢立弧矢赤道變為黄道黄道變為白道者最為圓機活法自此黄赤白三道之畸零可齊而氣朔之差可定此法不惟儒生不曉而三百年來厯官亦盡不曉矣今監中有一書頗秘名曰厯源者郭氏作法根本所謂弧矢圜術頗在焉試問之厯官亦樂家一啞鐘耳豈大洲所謂透曉而厯官所不曉者葢謂此耶若所指如前説雖極精微幽眇猶是儒生套子所指如後説雖若九九綴術乃是實得也煩問之大洲求一轉語見示當更有請教夫六藝之學昔人以為數可陳而義難知在今日厯家却是義可知而數難陳葢得其數而不通其義者有之矣若謂得其理而不得其數則施之實用既無下手處而并其所謂義者亦脱空影響非真際也雖然今厯家自謂得其數矣今厯家相傳之數如厯經立成通軌云云者郭氏之下乘也死數也弧矢圜術云云者郭氏之上乗也活數也死數言語文字也活數非言語文字也得其活數雖掀翻一部厯經不留一字盡創新法亦可以不失郭氏之意得其死數則挨牆傍壁轉身一步倒矣夫知厯理又知厯數此吾之所以與儒生異也知死數又知活數此吾之所以與厯官異也理與數非二也數者理之實致用處也活數死數非二也死數者活數之所寄也近見一二儒者亦有意象數之學然不得其傳則往往以儒者範圍天地之虚談而欲葢過疇人布算積分之實用不知豈便吃爾葢過了也後世儒生所論六藝往往而然不特厯也大洲其於吾言有合耶否耶楊子雲曰通天地人曰儒通天地而不通人曰伎通乎天地之厯數而未必通乎身心之厯數者又一行守敬輩之所以為蔽也今未暇論也雖然所欲請教於大洲者其大者百未一舉也而輒𤨏𤨏及此毋乃以我不知務乎縱言至此一笑吾友欲吾舉厯家一二𦂳要語與大洲印証如步日躔中盈初縮末限用立差三十一平差二萬四千六百此死數也又如步月離中用初末限度一十四度六十六分此死數也厯家知據此死數布算而已試求其所以為平差立差之原與十四度六十六分之數從恁處起則知活數矣似此只舉一兩件更不費辭也活數者如揲蓍求卦之初參伍錯綜而隂陽未分者也死數者如卦畫已成之後為九為六而隂陽既定者也又來書謂趙大洲主測候吾主布算此説未之盡也布算未有不始於測候測候未有不寄之布算而可以造厯者兩者相須如足與目但測候之法元史所載簡仰二儀今疇人子弟亦稍能用之而學士大夫亦有曉者及趙縁督革象書測經度測緯度之法尤更分曉吾是以略而不言且吾前書所引史記厯書中語太初厯既已測定而姓等不能為算自古造厯亦毎病布算之難此一行守敬所以獨擅專長司馬公是星厯專家其史記厯書是説自家屋裏説話細讀其叙作太初厯始末其意可識也雖然使人皆輸班自可以目定方圓而不必規矩使人皆羲和自可隨時測候而不必布算以成厯故布筭以成厯者令後可繼也此堯典中亦自了了其暘谷昧谷四段則測候也其閏月成歲數語則布算虚盈以造厯也但古文簡約不詳今渾天儀象自漢相傳以為羲和之遺則測候之器尚在而布算之法獨不傳竊意其法若傳比之一行守敬當更簡易密緻葢古人心學精微圍範天地與後世術家自别今所傳周髀經託之周公雖真贗不可知豈亦有羲和布算之遺乎而後世曉了者亦少矣與顧箬溪中丞書僕居閒多暇時或留意於數藝將向所聞之左右者時為紬繹其於古人象數之精意雖或有齟齬難通處亦多有欣然㑹心處其㑹心處既恨不得與明公相印証其齟齬處又恨不得就明公而為之發矇解縳也竊意六藝之學皆先王所以寄精神心術之妙非特以資實用而已傳曰其數可陳也其義難知也顧得其數而昧於其義則九九之技小道泥於致逺是曲藝之所以藝成而下也即其數而神明其義則參伍錯綜之用可以成變化而行鬼神是儒者之所以游於藝也顧先王六藝之教既寢而算書之傳於世者往往出於六藝之士之所為儒者絶不知其説而知其説又多非儒者是以其數存其義隱矣而藝士之著書者又往往以秘其機為竒所謂立天元一云爾如積求之云爾者雖算師亦多不省為何語復著書者之意葢若恐緘藏之不密而示人以金鍼也是以其數雖存而數之所以為數者亦隱矣伏惟明公以當世耆儒玩心神明之學而出其緒餘於藝數之間明公之於數葢古所謂進乎技而入於道以神遇而不以器求者也且小子辱不倦之教久矣是以敢更有請焉謹具如别紙與裘剡溪推府書昨承示欲賜徐醫扁額謹因尊教輳成兩字曰占恒何如恒者人心本常理古今凡聖不減不増惟其有占不占是以有能恒不能恒之别而恒道實未嘗去人也古聖賢教人雖一曲藝未甞不與心學相通人能得此常理設使為醫則必能究性命之源為巫則必能極鬼神之情狀一徹萬融所謂因源而得委也古如農轅重黎之徒以聖賢精微之學而為醫巫師是也若使為巫醫者知無恒之不可則必反而求之於心念念在有恒上著工夫則庶幾性命之源鬼神之情狀可得而無愧于巫醫葢本欲精其藝而因以達乎其德所謂自委而泝源也如古巫咸醫和之徒因巫醫而知道是也聖人提醒人心只在一占字易曰君子居則觀其象而玩其辭動則觀其變而玩其占所謂占者豈是揲蓍布卦乃為占哉此恒心之存主處則為居此恒心之應用處則為動神明在我知幾而動是無時無處不是占也不占則神明失矣幾微昧矣是可謂之恒乎而又何醫巫之可謂乎與項甌東郡守書索居既久益嘆朋友合并之難而知昔日相聚之為樂也然又有可感慨者念昔日從兄於杯酒談笑間此時弟甚疎鹵不能有所切磋於兄而兄之善言惇行弟亦不能竊之以自淑不過如世間所謂好友者而已求如古人切切偲偲講學輔仁則未也自去官歸家閉門静坐大抵人窮則反本霜降水涸天根始見於是大悔曩時孟浪痛自磨刮直欲掃去枝葉文飾從根本上著力久之亦漸覺有洒洒處但苦此心出入幾微之際殊廢檢防然亦漸覺有洒洒處此時欲見兄相與印証一畨了不可得則向者朝夕相聚反自錯過虚却光隂豈不可惜惟吾兄質實純明古所謂脚踏實地人也此不惟吾兄能自信而友朋亦無不以此信兄者别後想淵然深造非鄙陋之所敢窺測以舊時所見吾兄則尚有葑菲所以少贊於吾兄者何也兄得之資禀者持守有餘而充拓未至資禀有餘於毅而力量不足於𢎞其得處乃是氣質最美而其不及古人處乃是學問不能變化氣質也古人為學皆是百磨百錬工夫如書臯陶論九德寛而能於栗直而能於温沉潛能剛髙明能柔斯則磨錬已至氣質變化之効也夫弟所謂充拓者亦非如由赤子之心擴而充之説葢赤子之心本自充擴得去本自能大有一分不能充拓皆是未盡此心之量耳中庸曰致廣大而盡精微極髙明而道中庸德性本自廣大本自精微本自髙明本自中庸人惟為私欲障隔所以不能復然故必須道問學以尊之耳此千古學問之的也據吾兄舊日規模且未免作世間一種寡過之人其於聖賢作用尚是有間學問須先定其基故孔子不取謹愿之士而取狂狷為有基也狂者固不待言至於謹愿之士與狷者其不為不善亦較相似但狷者氣魄大矯世獨行更不畏人非笑謹愿之士氣魄小拘拘謭謭多是畏人非笑悁者必乎已而謹愿者役於物大不同耳今人多以謹愿者為狷此亦問學不明之過也交游可望者殊少得如吾兄者尤少如弟疎鹵尚不敢自棄以吾兄之純明其於道翻然易耳願聞兄之所安整理民事皆是吾人切實工夫而兩郡之治如何并願聞之邇來士風澆薄而江南重以侈靡浮蕩比之他所尤甚大抵富貴功利之習糊人心目如處豐蔀之中舉眼皆蔀也蔀外更不見一物矣是以迷惑顛倒莫知所止非有先知先覺者孰能出之溷穢而轉之清流乎提學馮先生觀其論議行事亦不為無意於此矣詞華本實之間稍有軒輊便足鼔舞人心吾兄相㑹得從容聚語幸委曲一贊之與張士宜書近承來諭同志中往往夢中作醒語誠然誠然其下者假公濟私其髙者以意見所到為實際葢原始初發心原不曽種下真種子所以頭出頭没轉來轉去竟不出人意見科臼中方且認賊作子自謂超悟誑已誑人以迷指迷道之不明不行深可太息僕亦夢中人也雖然自數年來益覺掃除私意之難益信古人備嘗艱苦動心忍性知險知阻是細細磨錬細細降伏此心處方欲强勉從事銖寸積累十數年庶幾少有所進不敢自負也若謂認得本體一超直入不假階級竊恐雖中人以上有所不能竟成一畨議論一畨意見而已謝上蔡云今之學者何足道能言真如鸚鵡耳透得名利闗此是小歇脚此古人自驗過不誑語也兄邇來自考此處何如天理愈窮則愈見其精微之難致人欲愈克則愈見其植根之甚深彼其易之者或皆未嘗實下手用力與用力未嘗懇切者也東南勢利之習薫塞宇宙腥穢人心葢末世氣習盡然而東南靡麗之鄉則為尤矣昔人所謂非百年必世不可得而變也非知命不惑不可得而改也已乎奈何恐但於後輩中視其一二有志者稍稍語之以義利賔主之辨然亦不敢深求而過責之但令其立定趨向儘力從事於清苦淡薄使日揩月磨庶有以奪其紛華盛麗之好而已然亦不知後竟得力否也令兄質地近樸愧不能有以開發之且抱病亟歸又不能久相與也然家庭兄弟間自有餘師矣至舉業一節似亦未嘗苦心其間今但令其讀古儒先之書反之於心稍稍窺見理路然後轉向舉業上去亦以速歸不及竟矣諸皆負其逺來歉歉秋間或當同舍弟至南都此時可得一奉教然未敢必也與陳后岡㕘議書别後戀慕不舍與久病衰頽之狀大略具之葉紹興通判所寄書中今家人來亦當口能道之矣毎毎念昔與兄同住京師日夕相砥淬受教不為不深且愧迂疎無以承之不謂此後渺然相隔葢三四年而僅得一兩日之聚方其離思孤懐十未展其一二而鷁首已南矣亦何暇於吐心曲談道德以交助所不及者乎兄去閩越不知復以何時為聚首之期非惟僕蓬蒿之質不能藉直於麻中而兄之德器如玉亦不暇置諸頑石之間以自攻此其可思可恨豈特以酒食文字之故也僕嘗聞兄緒論大意以為必雜用王覇乃可以適時而濟務而僕則多執泥古方戛戛乎如以舟而行諸陸然兄既以此自信而不疑僕亦以此自謬而不悔是以自承教以來契分雖甚投而議論常至左右古人云去短集長此僕之所以不可無藉於麻中之直而兄顧亦謂有取於頑石焉其可也兄在湖藩清修之節剸繁之才自與時流迥别雖然亦願兄毋見化城而遽住耳今奉去讀書記乙集一部僕意欲以此廣兄不知兄肯降心而觀焉否也僕竊謂三代人才皆從心性上磨錬故其經綸㕘贊之業不出户庭而得之後世反躬之學不傳而其人所以經綸於世者率亦疎鹵求其繋國之輕重如孔明李泌陸贄之徒則其於道雖未醇而本其天資之所暗合亦往往開誠而不欺恬澹而少欲其經綸雖未必盡出於道而竭其才之所及亦往往淵源而有本濶大而無漏固不可謂其無人焉而非謭謭然功名自喜者可以跂而望也蘇子有言士之不以天下之重自任者久矣兄其有意乎僕居閒無事欲得國朝諸名臣奏議讀之且以尚論其人與其所以經綸於世者何如顧僻處山居苦不能多致煩兄為我留意至於北宋以前諸儒解經之書多散軼不存亦煩兄試博求之菽園雜記諸書兄向欲録一副本見與亦願兄毋忘之也若夫詩詞之學則僕自知力之決不足以進此向已告疲於兄矣兄毋更以此望我竢他日有持后岡先生集示我者我當望洋而嘆或尾後作一二句䟦語是則可耳兄許我以暮年買田同住之説如何如何諺云癡人前不得説夢吾已執此作左劵矣幸兄毋使我為癡人也失兄於東隅得兄於桑榆竊以為快草草白答屠漸山諭德書自聞兄有疾時以為懐夏間富生于德來學毎因富生問起居則知既已勿藥矣甚慰甚慰浮屠家稱缺陷世界故物忌于盈吾兄之才于其所享可謂完矣乗除消息天行則然吾兄之疾豈造物者將以是少損虧焉而大受于其後也乎兄平生意氣甚髙聰明甚慧夫高者不可柔而雌也慧者不可藏而晦也兄罹此疾疢則寂寞枯淡之中静思黙視種種之世界種種之伎功無可恃以不朽者必將于幻身之外别求所謂本來面目者而從事焉則兄之學將日以精而其所得於病者不既多乎此僕始為兄憂而竟為兄賀也故曰惟其病病是以不病兄勿以為濶論如何弟年來奔走荆溪今歲始買小庄去縣十四五里妻子始有定居衣食稍能自給一身幸為天地間一閒人矣藥餌之暇亦欲講習故業冀少有得焉以畢宿志而海内知交皆散在四方昔人取多聞而恨于獨學之難毎以為嘆而知交如兄者則尤往來于懐也向嘗託南江道此意而兄不能來僕又不能往奈何今蹉跎又經歲矣後復如何使來承委令兄祠堂文字縁僕素病羸自鄉居以來欲節省言語文字以完心氣故凡親知之託一切謝免而吾兄數百里相命似不宜以此為解然復自念平生未獲請見于九峰先生既無以測知精神意向所在而欲為之叙論若深言之則近于諛墓之嫌淺言之則不足以發潛德而違于銘以稱美之義以不滿于愛弟孝子之心是懼欲辭去則又重以違長者之命而不敢也又復自念兄之所不逺數百里而託於不文之辭者葢以迂戅之人不能為諛其言或可以信于後來者耳今以平生未嘗請見而深言淺言兩無所措乃嚅囁而為之言是無以自信乎其心而又何以信乎其人非兄所以相託之意也是以敢直布腹心而辭于將命者且其人之相知而言之足以信者則既有東郭少湖在矣幸兄亮之與吕通竹嶼書執事佐郡六年清苦直方之節衆共知之而山人之知執事獨深執事亦謂山人臭味之相同也日夕所以拳拳于山人者亦深且厚今執事行有日矣山人非仁人也不能贈執事以言山人貧也不能贈執事以財而繾綣之情不能自已聊具鹿靴一雙奉將别意靴者履也易不云乎素履之往獨行願也伏望執事率其素履獨行所願不以夷險二其心不以終始渝其度用于世則為羔羊素絲之風不用于世則勵蔬食飲水之志履道坦坦為天地間一完人此其所得較之壊名毁節以苟一時之富貴者雖在卿相知執事必不以彼易此矣山人敢以致愛助之意與金令攝山書金入於大冶數經火力愈鍜錬則愈精純而授新馬於舊牧之圉試其熟技則人與馬益相習雖然其雜金固有一火焉則耗者矣其牧馬如東野之御固有始則善而久則馬逸焉者矣攝山之凜坎於世也是金之數經於火也其再令於章丘也是再牧馬也吾見攝山之愈進於精純而章丘之民與攝山益相習也雖然不可以不兢兢也使久而益精也而無耗焉久而益相習也而無逸焉而後知攝山之果為良金與良牧也近得李中麓書言章丘凋敝甚須得良吏拊循極有望於攝山僕以為在攝山舉定海之故事行之益加之意而已至於馬因地異性人因地異習銜勒有緩急飼秣有燥濕不窮其力不失其性則在善牧者虚心而調劑之僕又何言哉與吳令峻伯書前使者冐進瞽言自分必且見絶於吾友矣適㑹陳户曹道及吾友欲相顧是吾友舊愛之深不遽以瞽言為辠也即令人往候使節於白氏則已行矣悵惘竊惟論治者先體故按督之體異乎州縣風憲之職異乎拊循而州縣之所以拊循其民惟其平易豈弟大小畢輸其情使民之入公門者如入乎其家見守令者如見其父母是之為貴耳使民見威而不見德敢怨而不敢言則雖一時或能收整頓撡切之效而其所斲喪者多矣書云髙明柔克可省也向孫文卿在江隂嘗過僕僕問之曰兄素講學學問不是空談即如大學論平天下如保赤子此便是真心便是明明德兄試自省百姓到面前時可與自家兒子一般文卿應曰此意却似有之僕當時不以為然曰兄得無太容易説了久之詢其所以蒞民果無甚愧乎其言僕是以心慕而敬焉文卿方於事上而圓於撫下是以雖或惡而謗之而不勝其愛而譽之者之多也眼中亦曽見一人為江隂使百姓膝行而前俯伏戰慄不敢仰視此輩者何足多哉吾友清才雅志僕何用喋喋若此但柔克之説為髙明者發耳傳曰善人受盡言僕素以豪傑望吾友豈獨善人已也相念甚勤未知使節何時更入郡耳懸懸素不遣人持書入府縣中今特遣此以謝兩次不得相見之故且恃吾友之知我也有持賤名到貴治者必偽無疑預言之與二弟書行者居者形跡各别然理道無二致也日用工夫無二致也汝兄在山中若不能謝遣世縁澄徹此心或止游玩山水笑傲度日是以有限日力作却無益縻廢即與在家何異汝在家若能忍節嗜慾痛割俗情振起十數年懶散氣習將精神歸併一路使讀書務為心得則與山中何異艱哉艱哉各各努力居常只見人過不見已過此學者切骨病痛亦學者公共病痛此後讀書做人須苦切㸃檢自家病痛葢所惡于人許多病痛若真知反身則色色有之也與田柜山提學書約之過敝邑寄到手書嘉惠多謝雅意僕自送約之至姑蘇觸暑積勞遂爾發瘧迄今伏枕未及能强起也病歸以來生平交遊一時雨散空山獨坐毎毎念之令人無以為懐此豈惟握手殷勤日夕之懽不能解之于心而獨學無友則昔人所以深病于孤陋也奈何近㑹約之稍能道吾兄所新得慰甚約之又言吾兄以好畫之故至欲手自摹搨則僕之迂滯所不能解者然吾兄專凝純静豈謂沉溺於此或者居閒無事游息之時聊以此為戲耳僕竊謂游藝之與玩物適情之與喪志差别只在毫芒間如六藝皆古人養性而理心自此便可上達天德今人學射學書學數則不過武人之麤材與胥史之末技是以戴記分為德藝上下之説而子夏亦譏其不能致逺况又不在六藝之科者乎且古之善畫不過如鄭䖍王維輩何足學也况學之終身有竟不能似其一水一石者乎陳履常之詩曰晩知書畫真有益却悔歲月來無多僕常誦而笑之以為履常知書畫之有益而為益有甚于書畫者履常不知也履常自悔其歲月之不足以給書畫而書畫祗足以縻費歲月者履常不知也吾輩年已長大雖籠聚精神早夜矻矻從事于聖賢之後尚懼枉却此生則雖詩文與記誦便可一切罷去况更有贅日剰力為此䑛筆和墨之事乎然僕聞之畫家之説亦不以䑛筆和墨者之為工而必解衣盤薄為之上乃知畫家不貴能畫正在能不畫耳若此者所以凝神而不分其志也兄之畫品能通乎此則僕之所不敢知而所以諷兄者無乃為土苴末論乎幸兄一笑而擲之可也僕自别後携家至陽羡謝去世事牽纏時時閉門黙坐始知平日没于多岐蕩精揺神之過必讀邵子勞多未有收功處踏盡人間閒路岐之語則憮然大悔者久之是以奕棊賦詩博聞强記皆昔所甚好或終歲不對局或終月而不成一韻或數旬不展巻雖或為人所强與自强為之亦竟如嚼蠟了然絶無滋味也觀尊巻所書數作則荒落疎懶之態可盡見之僕之為此其志亦欲發憤刋落收功一原而力又不能逮也惟兄有以教之與陳兩湖主事書兄自少才名已滿海内六家九流之書幾乎無所不誦莊騷太史之文亦無所不摹畫而操縱之矣即使海内竒才偉士欲傲兄以所不知而亦不能也况如僕者才至駑下曩在京師毎同平凉趙景仁過兄論文久之兄慨然曰二子之言是也遂欲盡棄其舊學而更張之然當時猶謂兄之急於奬善而以口語相推云云已而視兄之文則果脱然盡變於舊矣夫文人相笑在古則然景仁於兄未知何如也至於僕之讀書則豈能若兄之博而其為文也亦安敢望如兄之古哉然兄不憚降心屈已而從之推兄是心也設使不徒用之於文而用之反躬為己之間即古人所謂勇徹臯比一變至道者在兄亦何讓乎僕未始不嘆兄之髙明不可及而亦毎毎惜兄有可以一變至道之資力而僅用之於文也雖然此亦未有人焉以反躬為己之説而謦欬於吾兄之側耳設使有人焉以反躬為己之説而謦欬於吾兄之側如吾二子者之論文又安知兄之降心而從而翻然變於其舊也之不為太速乎則又未始不自罪吾二子者不能為古人反躬為己之説以告兄而徒以文士雕蟲篆刻之論投兄之好也兄今之所謂狂也而豁豁磊磊率情而言率情而貌言也寧觸乎人而不肯違乎心貌也寧野於文而不色乎莊其直以肆則亦古之所謂狂也是兄有可以一變至道之力而又有狂以進道之資也兄其能無意乎然兄之意必曰吾平生好適吾性而已矣吾不能為拘儒迂儒苦身縳體如尸如齋言貌如土木人不得動搖云爾夫古之所謂儒者豈盡律以苦身縳體如尸如齋言貌如土木人不得動搖而後可謂之為學也哉天機儘是圓活性地儘是灑落顧人情樂率易而苦拘束然人知恣睢者之為率易矣而不知見天機者之尤為率易也人知任情佚宕之為無拘束矣而不知造性地者之尤為無拘束也人之病兄亦或以其樂率易而苦拘束而僕則以為惟恐兄之不樂率易不苦拘束也如使果樂率易苦拘束也則必真求率易與無拘束之所在矣真求夫率易與無拘束之所在也則舍天機性地將何所求哉故人欲之為苦海而循理之為坦蕩使兄不以僕言為迂也願繼此而更進其説也僕自少亦頗不忍自埋没侵尋四十更無長進惟近來山中閒居體驗此心於日用間覺意味比舊來頗深長耳以應酬之故亦時不免於為文毎一抽思了了如見古人為文之意乃知千古作家别自有正法眼藏在葢其首尾節奏天然之度自不可差而得意於筆墨蹊徑之外則惟神解者而後可以語此近時文人説班説馬多是寢語耳莊定山之論文曰得乎心應乎手若輪扁之斲輪不疾不徐若伯樂之相馬非牡非牝庶足以形容其妙乎顧自以精神短少不欲更弊之于此故不能窮其妙也何時得與吾兄一面談之寄黄士尚遼東書弟也奉職無狀幸䝉寛恩得歸田里不然則從兄於遼海之濵亦所願也易之蹇不云乎君子以反身修德夫身何待蹇而後反德何待蹇而後修葢寂寥枯淡之中其所助於道心者為多也自儒者不知反身之義其高者則激昻於文章氣節之域而其下者則遂沉酣濡首於蟻羶鼠腐之間如兄之志氣固已塵垢一世而與古之志士為徒矣不知近來反身之學得之于蹇者何如幸以教我張舜舉言兄自戍遼以來作詩幾四五本兄何以致多如此豈將是自鳴其習坎心亨之樂耶或者窮愁羇旅之思無聊而姑託以自遣耶抑以寫其江湖之憂而致其去國繾綣不忘之愛如古離騷之作耶其無自擬於鐃歌鼔吹遼東都䕶之曲而與塞垣横槊之士同其慷慨而謳吟耶不然則枝葉無用之辭其足以溺心而愒日也久矣兄何取焉日課一詩不如日玩一爻一卦日玩一爻一卦不如黙而成之此之謂反身而又奚取於枝葉無用之詞耶弟近來深覺往時意氣用事脚根不實之病方欲洗滌心源從獨知處著工夫待其久而有得則思與鄉里後進有志之士共講明焉一洗其蟻羶䑕腐争勢競利之陋而還其青天白日不欲不為之初心此鄙人之所不自量而竊有冀焉者也天子仁聖在宥天下兄豈久於海濵哉弟獨學無朋將藉兄為助日日望之近來應酬文字毎不敢作而年嫂誌文則不敢辭葢以昭天子之寛仁而發海外孤臣心事之一二焉非特為應酬故也嘉幣謹辭果酒則拜賜矣廣寧有賀黄門醫閭先生者忠信髙節之士也其風尚在否兄試詢之土人亦可為旅中蓄德之一助也答皇甫柏泉郎中書前得方山書知與兄日相切磨必多有妙論恨不能往㕘其間而與聞之也僕之不獲奉教於兄而索居也其亦久矣僕之懶病而廢學也其亦久矣藝苑之門久已掃迹雖或意到處作一兩詩及世縁不得已作一兩篇應酬文字率鄙陋無一足觀者其為詩也率意信口不調不格大率似以寒山擊壤為宗而欲摹効之而又不能摹効之然者其於文也大率所謂宋頭巾氣習求一秦字漢語了不可得凡此皆不為好古之士所喜而亦自笑其迂拙而無成也追思向日請教於兄詩必唐文必秦與漢云云者則已茫然如隔世事亦自不省其為何語矣所以久而不能請教於兄者正以村俗匠人不敢呈技於輪扁之前也今既與兄開口説破容繕寫一兩篇奉以為笑耳蔡白石今之名家也僕向來頗不謂然近得其詩讀之則已洗盡鉛華獨存本質幽𤣥雅澹一變而得古作者之精僕雖非知音亦三嘆不能自已竊謂此兄當與吾兄並驅辭場矣雖然以兄之髙明磊磊若以一生之精力盡之於此即盡得古人之精微猶或不免乎以珠彈雀之喻向曽寓一書於蔡兄不知蔡兄曾與兄泛論及之否又不知方山之所謂與兄日相切磨者抑亦止於藝文之間而已也抑亦不止於藝文之間而已也更願聞之來教道未就損學不加益之説雖兄之謙亦足以知兄苦心也學之不加益也正坐不能損耳更願聞所以望之之説也與蔡子木郎中書往年辱兄知愛謂可與共進於文藝之門今忽忽齒髪漸衰兀然成一秃翁向來伎倆剥落且盡雖誦人詩句亦如羅刹國人驟聞中華語音駭不省其何説况能自有所著以自見於世也朋友間往往言及兄之垂意於僕豈特以故人之故耶抑亦謂其可與進於文藝之門耶豈知僕之衰颯剥落至此哉雖然以兄愛我之意其知我之衰颯剥落至此也豈不為僕惜之以僕之愛兄之意亦竊謂兄以聰明絶世之資而消磨剥裂於風雲月露蟲魚草木之間以景差唐勒曹植蕭統為聖人而冀為其後此其輕重豈特隋侯之珠彈雀而已亦可惜也曩與兄相聚時兄年最少而僕亦壯年今壯者衰則少者亦壯矣由壯入衰能幾何時四十無聞則僕既自蹈之矣自惜之矣倘兄以為宇宙内事與吾分内事盡於風雲月露草木蟲魚之間則足矣不然則亦不可以不深思君子進德脩業欲及時也兄苟不以僕言為戅繼此尚有所請不然且閉口耳辱愛多談亮之又曩承答教深慰素懐且自笑僕之所知于兄者淺也僕嘗謂學者非無痛癢之為貴而以真知痛癢為先知痛則不能不䕶而藥之知癢則不能不爬而搔之今之學者病在徧身麻木全然不痛不癢所以更不得力然知痛癢若不是真知其更不可忍處亦是不知痛癢縱使爬搔䕶藥亦悠悠不得力也來書云詞章為聰明之害又云於苫土中覺得曩時醉夢流浪此是吾兄一口説著平生痛癢一些不自瞞一些不瞞人即此一些不自瞞不瞞人處何等光明何等直截便是起凡入道真根子也雖然昔人謂舊習如落葉既掃復積兄試觀之既覺得曩時醉夢流浪之後四五年來種種世味種種酬應種種思慮能盡不醉夢不流浪否抑時有醉夢流浪處否醉夢流浪處當時便能覺得既覺便能撥轉得否抑亦有恍惚不便覺得牽掣不便覺得牽掣不便撥轉得否如把筆作詩時自覺淡然一無喜心否既有喜心其于好醜贊毁種種勝心能不藂然而動否覺有動處便能銷化否抑亦有牽掣不便銷化否其不把筆為詩時喜心勝心能不潛伏否不止作詩一節凡一切外馳習心能銷化否不潛伏否細細照察細細洗滌一些不得瞞過一些不得放過乃是真知痛癢既真知痛癢即境界不論静閙工夫不論頓漸静閙一境界也頓漸一工夫也兄以避北而就南舍頓而即漸為説夫閙處不得力即静處未可謂之得力不究竟所謂頓亦安有所謂漸乎收攝精神併歸一路漸即是頓即此一路接續不斷頓即是漸非二致也然吾兄討方便處用力亦未嘗不是也既真用力則静閙漸不患其不一矣來書所病世之君子以聖學之名習江左之實是非頓之為患也正坐自瞞過自放過麻木不識痛癢耳來書所病英氣血氣害事亦正坐不識痛癢耳弟之不肖年來痛癢頗漸自知追尋病根大率苦血氣之為累血氣薫成習氣不能自脱詩文之障亦時尚往來胸中第争分數重輕而已此不能以欺兄者自顧齒髪漸衰痛癢心切既稍有知不敢不竭力爬搔䕶藥使此生甘為麻痺人也來書提出小心兩字誠是學者對病靈藥但如前所説細細照察細細洗滌使一些私見習氣不留下種子在心裏便是小心矣小心非矜持把捉之謂也若以為矜持把捉則便與鳶飛魚躍意思相妨矣江左諸人任情恣肆不顧名檢謂之脱洒聖賢胸中一物不礙亦是脱洒在辨之而已兄以為脱洒與小心相妨耶惟小心而後能洞見天理流行之實惟洞見天理流行之實而後能脱洒非二致也弟之不肖正程子所謂墮在沉滯執泥坑裏者自愧脱洒之未能也惟兄教之僕之所請教于兄大要只是一言願兄時時無忘苫土中所見如何如何答茅令鹿門書來書論文一段甚善雖然秦中劎閣金陵吳㑹之論僕意猶疑於吾兄之尚以眉髪相山川而未以精神相山川也若以眉髪相則謂劍閣之不如秦中而金陵吳㑹之不如劎閣可也若以精神相則宇宙間靈秀清淑瓌傑之氣固如秦中所不能盡而發之劎閣劎閣所不能盡而發之金陵吳㑹金陵吳㑹亦不能盡而發之遐陋僻絶之鄉至於舉天下之形勝亦不能盡而卒歸之於造化者有之矣故曰有肉眼有法眼有道眼語山川者於秦中劎閣金陵吳㑹苟未嘗探竒窮險一一歴過而得其逶迤曲折之詳則猶未有得於肉眼也而况於法眼道眼者乎願兄且試從金陵吳㑹一一而涉歴之當有無限妙處無限難處耳雖然懼兄且以我吳人而吳語也與茅鹿門主事書熟觀鹿門之文及鹿門與人論文之書門庭路徑與鄙意殊有契合雖中間小小異同異日當自融釋不待喋喋也至如鹿門所疑於我本是欲工文字之人而不語人以求工文字者此則有説鹿門所見於我者殆故吾也而未嘗見夫槁形灰心之吾乎吾豈欺鹿門者哉其不語人以求工文字者非謂一切抹摋以文字絶不足為也葢謂學者先務有源委本末之别耳文莫猶人躬行未得此一段公案姑不敢論只就文章家論之雖其繩墨布置竒正轉摺自有專門師法至於中間一段精神命脉骨髓則非洗滌心源獨立物表具今古隻眼者不足以與此今有兩人其一人心地超然所謂具千古隻眼人也即使未嘗操紙筆呻吟學為文章但直據胸臆信手寫出如寫家書雖或疎鹵然絶無煙火酸餡習氣便是宇宙間一様絶好文字其一人猶然塵中人也雖其顓顓學為文章其於所謂繩墨布置則盡是矣然翻來覆去不過是幾句婆子舌頭話索其所謂真精神與千古不可磨滅之見絶無有也則文雖工而不免為下格此文章本色也即如以詩為喻陶彭澤未嘗較聲律雕句文但信手寫出便是宇宙間第一様好詩何則其本色髙也自有詩以來其較聲律雕句文用心最苦而立説最嚴者無如沈約苦却一生精力使人讀其詩祗見其綑縳齷齪滿巻累牘竟不曾道出一兩句好話何則本色卑也本色卑文不能工也而况非其本色者哉且夫兩漢而下文之不如古者豈其所謂繩墨轉折之精之不盡如哉秦漢以前儒家者有儒家本色至如老莊家有老莊家本色縱横家有縱横家本色名家墨家隂陽家皆有本色雖其為術也駁而莫不皆有一段千古不可磨滅之見是以老家必不肯勦儒家之説縱横必不肯借墨家之談各自其本色而鳴之為言其所言者其本色也是以精光注焉而其言遂不泯於世唐宋而下文人莫不語性命談治道滿紙炫然一切自託於儒家然非其涵養畜聚之素非真有一段千古不可磨滅之見而影響勦説葢頭竊尾如貧人借富人之衣庄農作大賈之飾極力裝做醜態盡露是以精光枵焉而其言遂不久湮廢然則秦漢而上雖其老墨名法雜家之説而猶傳今諸子之書是也唐宋而下雖其一切語性命談治道之説而亦絶不傳歐陽永叔所見唐四庫書目百不存一焉者是也後之文人欲以立言為不朽計者可以知所用心矣然則吾之不語人以求工文字者乃其語人以求工文字者也鹿門其可以自信我矣雖然吾槁形而灰心焉久矣而又敢與知文乎今復縱言至此吾過矣吾過矣此後鹿門更見我之文其謂我之求工於文者耶非求工於文者耶鹿門當自知我矣一笑鹿門東歸正欲待使節西上時得一面晤傾倒十年衷曲乃乗夜過此不已急乎僕三年積下二十餘篇文字債許諾在前不可負約欲待秋冬間病體稍蘇一切塗抹更不敢計較工拙只是了債此後便得燒却毛頴碎却端溪兀然作一不識字人矣而鹿門之文方將日進而與古人為徒未艾也異日吾倘得而觀之老耄尚能識其用意處否耶并附一笑向承青萍之惠附謝適病灸未愈草草與莫子良主事書日夕望吾子良之來得所寄書知㑹在閏月頗以為慰富生逺來愧無以教之此生曩時讀書為文皆未嘗入苦心但隨其資性之所近為之故其語意多淺弱而乏精錬之思今稍稍示以闗鍵所在然渠性亦敏終當有悟也至於為人少年謹愿吾甚愛之亦時時示以立志必為古人之説不知竟能相信否耶幸為轉致意於令岳先生千里之託不敢負也古人不讀非聖之書以致精也僕之馳鶩於博雜也久矣近稍知向裏自悟溺心滅質之為病乃欲發憤而刋落之然亦自悔其歲月之晩矣大率讀書以治經明理為先次則諸史可以備見古人經綸之跡與自來成敗理亂之幾次則載諸世務可以應世之用者此數者其根本枝葉相輳皆為有益之書若但可以資文詞者則其為説固已末矣况好文字與好詩亦正在胸中流出有見者與人自别正不資藉此零星簿子也雖古之以詩文名家者其説亦不過如此况識其大者乎曩見子良舟中所携書多非要𦂳竊以今之世清修自潔如子良篤志好學如子良而或不免耗精力於無所用至於所最當留意者或且束閣而不暇也以與子良知愛之深乃不敢不盡其愚俟面晤時更有請也承嘉葛見惠客中適有一葛亦欲奉寄投李報李得無為笑乎閏月凖望一來勿爽勿爽荆川集巻四欽定四庫全書荆川集巻五明唐順之撰書答顧東橋少宰書某竊聞昔人以名譽不聞歸過朋友者謂其實溢乎内而譽不副之者耳非謂本無可以致譽而朋友為之賁飾以私於其好也沈别駕至辱賜手書奉函驚愧竊不自知所以先容於左右者開函讀之乃知以陳王二友之故明公過信而不疑耳是二友無乃私於其好故忘其醜而飾成其所長明公亹亹好士故博取於朋友之譽而不暇究乎其實也然在僕何敢當也僕自為諸生時得明公之文而讀之雖不能窺其精意然竊嚮徃焉及從㳺薦紳間又獲聞明公高誼傾海内而求士甚於士之求公且不在古人之後則心益慕之然蓄之數年而不敢通姓名於左右則亦有説夫玉工好玉則昆吾于闐之産非不欲盡而收之然有所不能收者碔砆耳瓊瑰碔砆亦莫不欲自獻於玉人之前然而有所不敢獻者自知其為碔砆耳僕迂戅無能人也過不自量嘗從諸友人學為古文詩歌追琢刻鏤亦且數年然材既不近又牽於多病遂不成而罷去及屏居山林自幸尚有餘日将以㳺心六籍究聖賢之述作鑒古今之沿革以進其識而淑諸身及牽於多病輙復罷去既無一成則惟欲逃虛息影以從事於荘生所謂墮體黜聰以為世間一支離之人耕食鑿飲以畢此生而不敢有覬乎其外盖所自量者審也又何敢以求知於左右也哉即使朋友欲為僕文飾計亦無以過於僕之所自量者矣不知二友之所以譽僕於明公者何語而明公又何從而過信之也此僕之所自愧且懼而不敢當也伏惟明公與世巻舒向也遵晦丘園時也於公一不以為損及出而秉鈞軸時也於公一不以為喜然而海内之士方公之退處則皆眷焉望其復用及其既用則皆望其秉鈞軸及公之秉鈞軸則皆欣然以喜何也僕竊觀聖人繫易于否泰初爻皆有彚征之説焉至於泰之以隣否之疇祉則皆繫之於四四者大臣之位近君而任重者也近世之士愞熟獧巧之習日工而羔羊素絲之節或衰矣而任重之人所指以為才且賢者又徃徃在彼而不在此盖士習既然而示之以好惡者則又然何恠乎靡靡一風也是以雖清明平泰之世而包羞匪人或不勝參錯乎其間雖否泰之機未必繫此而士習隆汙則亦可知必有大人君子任當世之重以身範物離祉其疇以長君子之道而黙消隂邪彚征之氣此海内所以致望於明公而非明公不能副海内之望也則如僕僻處山林亦将拭目以觀盛徳不徒為知己之私感而已迂踈病廢之人本不宜開口及世事縱言至此恃明公之知也惶恐惶恐前辱雄文垂示此明公所以誘誨僕者至深也謹拜教草草作載酒亭一詩用致嚮徃之懐更希教之答李中谿御史書兄之使閩也一年矣辱以書下問者且數四矣而僕無一言之獻豈惟素性迂戅自度不能然亦以兄之才力自足辦此耳既又自惟以為兄之才力固不待人然屢問而屢無一言焉是亦不免有負相知乃輾轉思之竟無所得惟有一事可以少效愚悃而塞下問之勤者則言之適在此時然亦自度非迂則戅也惟兄亮之而已且夫撫按之權舉劾最重百官之所以勸懲公道之所以開塞其繫於撫按舉劾亦最重然而今世所謂舉劾者僕竊異焉僕嘗備員郎署矣嘗得日聞邸報矣或曰今日某巡撫舉劾奏至矣僕不問而知之矣或曰今日某巡按舉劾奏至矣僕不問而知之矣何也其所舉者可不問而知其必藩臬方面大官也其所劾者可不問而知其必通判縣丞小官也其所舉者可不問而知其必牽朋聮伍不數十人不止也其所劾者可不問而知其必寂乎寥乎纔三兩人也如此則是賢者盡大官而不賢者盡小官也則是賢者甚多而不賢者甚少也夫使賢者盡大官又使賢者甚多而不賢者甚少則宜其政平而訟理苞苴不行於上怨毒不結於下天下可以卧而帖帖矣而顧不能然則是大官不能盡賢與賢者不必甚多而不賢者不必甚少也大官不必盡賢而賢者不必甚多不賢者不必甚少則彼舉大而劾小者無乃大官則足以樹恩而小官無傷於任怨也歟又無乃勢弱者易凌而根固者難㧞也歟而其所舉所劾之多與少又無乃厚市恩而薄引怨也歟如此則人心奚而得勸懲公道奚而得不塞也雖然固亦有藩臬方面大官而不舉或反見劾者矣嘗駭而問其人焉則是非能劾藩臬方面大官也亦非其人之果不賢也或負氣倔强不善曲媚者也不然則受人指嗾為之快忿者也亦有通判縣丞小官而不劾或反見舉者矣嘗駭而問其人焉則非能舉通判縣丞小官也亦非其人之果賢也或多援善鑚最有力者也不然則其親與故也如此則所劾者縱非小官則必負氣倔强與為人快忿者也所舉者縱非大官則必多援善鑚與親且故也然則人心又奚而得勸懲公道又奚而得不塞也由此言之為撫按者固不得以能舉人能劾人為榮而必以舉劾之不稱為可懼矣今兄之所屬其為方面大官者誰乎其為州縣小官者誰乎僕固不知也賢者多乎少乎不賢者多乎少乎僕固不知也而為是多口者亦據素所疑於人人者言之耳然以兄之志剛而識明秉正而嫉邪固必不同於人人矣必能示勸懲而彰公道矣又何藉於僕之言乎然僕之為是言於兄亦非欲兄之不舉大官不劾小官也非欲兄之所舉必少而所劾必多也大官果賢矣或矯而不舉亦私也賢者果多矣或避收恩之名而欲矯之以少舉不賢果少矣或沽澄清之譽而欲矯之以多劾者亦私也雖然􅀢以為莫如精舉而慎劾則劾者固少而舉者固不得多矣或曰舉劾皆少則是善有隱而不章惡有㣲而不屏也是不然矣夫天下中人多而其最賢與最不賢者少矣舉劾所以出於常格以待最賢與最不賢之人耳若夫小善小惡則固有考語矣又何慮善有不章而惡有不屛也故僕以為莫如精舉而慎劾兄意何如一言之獻如是而已惟兄亮之劉實夫已葬否葬時已有銘否如未有銘吾軰雖不文然以交㳺相知之故亦當强力為之兄北上時可問其家取一行状携来何如種種𠂻曲不能多談惟俟面既與周中丞論項守書數辱惠書教督以所不及深感知愛無量僕自去嵗移家至陽羡與世益踈濶此昔人所謂懶與病相成雖僅守固陋不敢墜失至於讀書窮理冀有新得則甚不能也其何以仰副明公教督之勤耶知愧知愧兹啓僕友人有項喬者其人温雅純實雖自處若謙退而其志常欲為古人雖其貌樸野而其中實耿耿然雖多卧疾若不任事而實蹇蹇奉職不肯一日尸乎其官僕於交㳺中知之最深而資其切磋之益亦最久矣又自羅翁當國為縉紳所輻輳而永嘉之人根株附麗攫美官鼔聲勢者尤衆喬與羅翁又有葭莩之親乃獨泊然自守不亂於羣甘心隱約不覬非望然此士人居身之常不足以稱喬而喬之不苟大率可見也此不惟如僕軰與之素交㳺者能知喬而士夫亦多知喬者夫以僕素辱明公之知則固可以薦人而不為僣以僕知喬之深則固可以薦之於明公而不為黨自喬在屬下二三年間僕不敢以一字稱喬於左右者豈僕過避嫌疑使喬之名譽不通於上而歸朋友之過於僕耶竊以為明公精鑑近世希有又素以汲引人材為心而喬之為人必能在處有所樹立則明公自将知喬而喬自足以受知於明公又何藉乎僕為人媒也昨得邸報見明公薦三郡守獨不及喬則始憮然異之既而思之何僕所料之不中耶豈喬之失其故歩耶或喬之㢘靖宜於郎署而不宜於郡守耶抑僕秪見喬前日之善而明公秪見喬今日之未善耶不然則或有間之者耶不然則以明公精鑑照物無遺而喬也日夕在左右而獨不得借餘光焉豈其命耶夫人情翻覆不常旬日異態固有匿情為善而後或敗露者矣亦有始雖强於為善而後不免改節者矣僕又何敢以四五年前所見過信故人耶雖然喬悃愊可信人也以喬之素能蹇蹇奉職則其為郡守不肯闒茸或可知也以喬之素不肯奔競以覬非望則其在郡不肯自汙或可知也又未敢以過疑故人也雖然僕所取信者明公之鑑也明公之黜喬而不舉必有説也則是喬固可信者少而可疑者多耶果飾於前而壊於後耶不然何為其見黜於明公也耶明公非不憐材則是喬果敗露與改節也僕之心不能觧也使喬之賢而偶未見知於明公則僕固不敢黙矣使喬果不賢以自取戾焉亦宜一請教於明公而與之絶可也是以不量狂妄而有是説焉伏惟亮而恕之幸甚答江五坡提學書海内交㳺如兄者幾人而交㳺中能重意氣不輕然諾如兄者又幾人與兄一别至今幾時中間問訊能相通者有幾眷言思之可為悵恨李中谿使来辱手書惓惓殊自慰幸又辱寄到十三經註䟽此大惠也僕於此書去嵗在山中偶甞讀之而於三禮者讀之頗詳竊以為王鄭諸儒雖未能深究乎先王之精藴至於形聲器度之間比較同異參量今古其功最多學者欲因筌蹄以求魚兎則此書不可不觀惜其舊板譌謬既多糢糊又甚故雖素好學者或倦於觀焉兄之刻此學者可謂幸矣而僕山野之人顧先得之不尢為幸歟中谿又欲刻杜佑通典恐此亦須刻也兄可賛之伏惟兄之蒞閩且三年矣八閩之士固已丕然向風矣而兄猶以人材風俗轉移變化之故未得其端為言者此足以知兄之志也夫今之為提學者苟博識善文及程較諸士文字之精與否而一無所失則已赫然足以收士心取髙譽矣至於人材風俗轉移變化則提學不以是自責而人亦不以是責之也兄獨慨然有意乎此固不以世人所趨尚與兄素所精詣者為可滿而必以不如古之善作人者為可歉歟古之道推其自治者以教人故徳修而教以尊教而後知困知困而後能自反故因其教人也而徳益修所謂教學相半也人之性行牽柔闇伏者多而果决雄毅者固少矣得其果决雄毅而能必為剛善且為剛中者又加少耳故臯陶之論九徳曰剛而塞强而義而箕子曰高明柔克兄固雄毅果决者剛者强者高明者也持之以動心忍性之力致之以收歛凝静之實克之以柔飬之以中使剛者必塞而不近於露强者必義而不過乎激積之也厚而蓄之也宻則兄之所以自進與其所以教人至於人材風俗轉移變化恐無以易此矣然此在兄之材力亦何難也嗟乎士之蕩于紛華競于馳騖而不歸其根也久矣閩固多文少實之域也非兄孰能振之而欲振之豈在聲色文字之間哉固有道矣若其次則莫切於風厲學官僕竊謂今之提學以一人督率六七郡之士即使如古之善作人者則善矣雖然其勢固亦不能人人而董之與日日而礲之也不能人人而董之與日日而礲之則其所被者淺矣古之教者自萬二千五百家為郷郷有師而至於五家為比比有師豈特教二千五百家者則賢哉彼其教五家者亦盡賢人也即使今之提學如古之善作人者亦不過六七郡共得一良師耳為此六七郡得一良師孰與為此六七郡得百十良師故為提學者莫急于風厲學官今學官𤨏尾自卑嗜利無耻人人相師靡然一風雖有一二材俊之士出乎其間猶懼其隨而偃也誠欲有以風厲之又恐非一提學之官與四三年之間所得為耳然以兄之材必能有以處此竊願聞教焉曩與王道思書亦甞及於提學之説大抵不出所以請教於兄者矣僕今嵗携家至荆溪此中山水清絶頗能恱人在病夫尢宜也邇来儘善飯羸弱之軀可以自支惟學不加進殊愧知已然於動心忍性收歛凝静此僕之所請教吾兄者亦不敢自棄也更願兄時督教之所示讀書太苦蕩揺精魂之說此兄之甚愛我敢不拜教尊作儒學記文最古雅然此自兄素所精詣不俟賛也山中亦有一二拙言更容繕冩求教答廖東雩提學書僕於吾兄雖相晤之日頗淺而相知之誼甚深兄之於僕則亦然也兩辱書惠深為空谷之慰又辱兩示髙文讀之喜躍夫京師都㑹也綴文之士比肩僕曩皆獲與之交而皆獲見其文焉然僕之所最傾意者乃獨在兄則數與傅少巖言之以為東雩之文氣骨甚勝無一㸃纎靡愞散之態後来可冀於作者東雩而已春間讀兄所為文視京師所見則加勝焉近復得讀兄所為文視春時所見又益加勝焉駸駸乎作者之堂矣頗自謂曩之所知於兄者之不妄也雖然文與道非二也更願兄完飬神明以深其本原浸涵六經之言以博其旨趣而後發之則兄之文益加勝矣兄志潔而識偉行方而氣和僕固一見而知兄之為任道之器矣嗟乎古聖賢之道其不講於世久矣聲利之燄薫塞宇宙日夜馳騖寡㢘而鮮耻儒生習見以為當然其有以講學為事者又或崇意見而乖實際競口耳而寡心得聼其言則美而考其實亦無以甚異於所習見以為當然者自非精一自信卓然不惑流俗之士則未可以冀於斯者也僕竊有望於兄軰矣山西古帝王之都其人有茅茨土階之風而叚干木卜子夏居西河其人化之凛然有節概今不知其遺俗視古所稱何如而王文中與近代薛敬軒亦出於河汾之間豈其俗固有近古者耶吾兄以身任作人之責兄之所以淑諸其身即其所以淑諸其人者也篤志力行極深研幾求古人之真血脉絡以淑諸身以淑諸其人因其近古之俗而登之於道此其責在吾兄矣僕自屏居来牽於多病齒髪日衰所耿耿不忘者尚冀省身補過以不負此心與不負海内知己者而已與應警菴提學書今之職守令者苟有能飾簿書清獄訟者則為賢有司矣至於為百姓根本之慮則未之及也今之司學校者苟有能品藻文字嚴督課程則為好提學矣至於為學校根本之慮則未之及也吾丈之為守郡也既已能為百姓根本之慮而不徒以簿書獄訟為功矣今之為提學也亦何患其不能為學校根本之慮而惟文字程課之為務也哉向辱手書具見惓惓欲興起士習之至意顧責之人不若盡乎已盖言聲色號令之間不若求之身心性情之實惟反躬自盡益慎以宻刀行古道不落流俗則身所舉動即是士子所師法可以不言而喻甞見近時提學教條何甞不言道徳何甞不談仁義然只成一畨講說只成一畨門面而於士習絲毫無補者無其實也務實者反躬之謂而所以為根本之慮也辱吾丈知愛竊敢以是望之今士子中有實行者多不長於文字工文字者多不修於實行盖淳樸之與浮華徃徃相病然糊名之制行則不得不一一徴之於文則其文可以與選而其行或不齒於市人者亦不容不取髙第而登顯仕是以詩書為世流毒莊生至有發冡之說豪傑士扼腕太息無可柰何竊以為低昂輕重其權實在提學盖提學可以知諸士之文而又可以知諸士之行非如科塲之為糊名所蔽雖欲品藻其行而無所従也抑此伸彼示之意嚮非吾丈又誰望之曩時使節寓郡中僕時承教語以時免於大罪過今離索日久柰何年且四十益深無聞見惡之感願時賜教督是所望也與應警菴郡侯書僕迂戅無能人也伏惟君侯蓄兼人之材且居郡侯之尊而與僕又素無一日之雅乃自下車以来虚心降色所以奬進禮遇於僕者皆出於常格之外此雖古之髙流如盖公任棠之徒當此猶宜三讓而避焉而况草茅迂戅如僕者乎所以敢偃然而當之者以成君侯下士之髙義固不自量其身之卑賤與才之短劣也自是以後綢繆日接盖無浹旬不相徃来不相與從容盡談者此亦形迹似為煩凟矣雖然非君侯不能亮僕之深至此而非君侯亮僕之深僕又安敢以是䖏君侯哉公門無鄙人之迹庭中無長者之車亦已久矣豈特樗散之性不欲溷擾於人亦以相知相信之難耳惟在荆溪時與石屋彭君相切磋石屋之為人君侯之所深與也伏惟君侯住山中既且一年釋塵鞅之勞而就清池白石之安去簿書之煩而縱其清逺閒散之適昔人所謂霜降水涸天根乃見惟捍彼物累全我真機此時工夫此時意氣不知復何如耳僕甞竊謂今世人才未便不如古人惟古人為學堅苦磨錬忍嗜欲以培天根久之則此心凝静百物皆通而今人則未免粘帶未免牽引粘帶之根固於中而牽引之勢揺於外所以精神力量輙見不如古人僕每觀君侯治郡自是近世才傑何可當也雖然以君侯之志詎止欲為近世才傑而已乎意者必欲為古人而後已乎如必欲為古人則堅苦磨鍊正在此時若自此以後固知君侯不能久閒而塵鞅簿書之煩且勞又復不免相累恐不得如山中多暇可以進兼力而收全功矣君侯得無意乎僕質本頑鈍惟不敢惰窳以負相知然進寸或至退尺恐竟不能有所樹耳亦願君侯教之君侯来嵗或宜早出進退自是兩途此身既繫於官而欲結泉石之盟亦未為可也以相知故併及之與徐飬齋尚書書向承教以所不及深感道義之愛皦皦嶢嶢昔人有明戒矣敢不奉教以求進於若虚若愚之學也伏聞晉司徒足占泰道之亨也矣周時敷五典擾兆民故事可復見於今乎斯民無禄連嵗凶饑自冬徂春溝中之瘠在在有之每一郊行露骴滿目為之不能下食幸賴撫巡諸公郡縣有司薄征散積悉力其間不然民其無孑遺矣乎今幸及麥秋可以續食然連朝霧雨二麥之腐壊者又幾半矣去嵗緩征之額若欲於麥内取滿盈則恐民不堪命柰何且二麥無收之處雖征之亦何所出而其薄有所收之處彼方圗救目前之饑猶且不足而尚有餘粒能補其去年之逋竊恐鞭笞日用而故額未必能足則是昔日緩征之惠乃為今日急征之困也非不知上供之定數必不可缺但得稍遲數月併於秋糧内帶徴則有司省却一畨催科閭閻省却一畨煩擾在國計一無所損在民力亦無不堪而撫巡公孜孜愛飬救災恤患之盛心於是為有始有終矣此其事只在數月早晩之間耳非有損上益下之難也僕僻處山林未甞獲奉教於撫公是以不敢徑以書逹而以聞
