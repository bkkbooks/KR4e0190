seq: 9
front:
  text: 於執事且此固百姓之公言也惟明公亮之
  hash: sha256:b895f5177c7a2a35c350705d443c16de24dad9e1d07ede85a77e6956a17794f7
body:
  text: 與吕沃州巡按書别久瞻望甚勞每苦俗套拘人不能一棹於婁江虎丘之間與兄相傾倒也悵悵東南州郡連嵗旱灾即今苖未盡稿遇雨之吉尚有可望倘更三數日不雨則數十萬生靈未知死所山人亦不免於焦枯是懼不知天心仁愛竟何如也前年大祲尚賴滄源公與吾兄勤恤民隱不遺餘力而有司務於仰承兩公徳意蠲租賑粟是以百姓幸有孑遺焉然莩死疫死亦既不忍言矣惟今年事勢又異徃時何者閭閻積連嵗之饑則一嵗艱於一嵗矣官廪捐連嵗之賑則一嵗空於一嵗矣盖承兩年大饑之後而又饑焉故據今年分數雖止是一年之饑其實一年併受三年之饑也其為事勢難易可知况兩公一時代去又若故奪之所恃賴然者夫粟不必其盈於倉而有所可轉錢不必其盈於帑而有所可通此其便宜之權惟撫按則然亦惟撫按有真實為民之心者乃能操其便宜之權以御其變而使不至於窮若夫有司則雖憫雨恤灾儘力周旋顧其力能行於法守之所及而不能行於法守之所不及能為於官民之藏之所有餘而不能為於官民之藏之所不足若使君民盡匱固亦無如之何俗所謂好媳婦做不得沒米不飥也雖然官民之匱憂之誠是也至於憂兩公之将代則竊自笑以為過矣兩公者一日居乎其位一日心乎其民者也去之日如始至者也計兩公代期尚旬月有餘以旬月盡瘁之精力而全活東南數十萬溝壑之命兩公豈憚為之自古救荒無竒䇿亦無多說只是措置錢米一法耳誠得兩公以旬月盡瘁之精力從事其間隱度於公私之用而均平其歛散之宜至於粟不必於倉而有所可轉錢不必於帑而有所可通諸如此類可専行也速行之不可専行也速請之則前之所憂官民盡匱者亦可以化而為豐也不難矣曩時所奉救荒條例併東湖撫公奏䟽中間區處錢米事頗具當時以麥熟無所用之不知今有可採而行者否有可采而陳請者否或可因兄以逹於滄源公采而行之與采而陳請之否聞南都倉粟其羡至四百萬以上可勾十年之支而有餘滄源公去嵗所奏平糶一法此軍民公私凶豐兼利之術柰何當事者議論不同遂使滄源公美意不竟然此法終不可罷也不知滄源公再能以此意陳請否繼滄源公撫巡者又能以此意陳請否願兄力賛之近聞之一戸部長官言此法有三利云云其說可謂曲盡縱使諸郡盡荒但得京倉糶粟三數十萬石分散諸郡每發官帑銀萬兩為糴本輸之京倉則可得米二萬石平嵗人食米一升凶嵗則减之是二萬石者二三萬人百日之命也是官帑不過出銀萬兩而續二三萬人百日之命以待來嵗之熟也三數十萬石者五六十萬人之命也京倉糶粟三十萬石而得銀十五萬兩是國家不過錢米互換之間實未甞費斗糧損一錢而賜五六十餘萬人百日之命以待来嵗之熟也其為利害較然可知其議論不同者不過以苟有緩急京儲缺乏為說耳夫糴三數十萬石之米於四百餘萬石羡餘之中特十餘分之一耳且今江東雖灾而江西湖廣頗聞豐熟則京倉嵗額本色之入固将源源而来矣豈預憂十年之後之不足而輟旦夕之所必救哉故願兄之力賛其説而佐為之請也至於有司所請逺糴一節盖慮異日榖既不登而逺商又不来則雖積錢盈篋坐而待斃矣故救荒惟是預處錢粟而變錢為粟尢是先事預處之善者也計吾兄亦已聞而可之矣雖然此皆人力之可為者也若使皇天果無悔禍之期雨澤終不可冀則人力必有所不及而地方意外之變亦不可不先圖願兄更以旬月盡瘁之精力且徧巡諸郡間延見吏民自親其利害而曲為之處且使車一臨視數十紙文書督促為益多矣兄其圗之與李龍岡邑令書嵗凶民莩賢侯為之心惻而百方圗之者深矣輕齎一說向已面白兹復具之於書以為可以佐百姓之急而禆萬一於賢侯百方之圗則不敢以出位為嫌也竊惟國家之賦其水旱可得而减免者兑運以外之數也雖水旱必不可得而减免者兌運以内之數也水旱不可以不恤而兌運又必不可减免於是有輕齎之法盖米自江南而輸於京師率二三石而致一石則是國有一石之入而民有二三石之輸若是以銀折米則是民止須一石之輸而國已不失一石之入其在國也以米而易銀一石猶一石也於故額一無所損其在民也以輕而易重今之輸一石者昔之輸二三石者也於故額則大有所减矣國家立為此法盖於不可减免之中而寓可以通融之意不必制其正賦之盈縮而但制其脚價之有無不必裁之以豐㐫之歛散而但裁之以本折之低昂一無損於國而萬有利於民此其法之盡善而可久者也以武進一縣言之嵗該儧運米五萬四千五百八十一石三斗四合此其入於國之正額也本色正耗水脚平米七萬九千六百八十三石七斗三合八勺四抄折色銀九千一百五十一兩四錢六分五釐五毫二絲此其費於民之羡數也若以銀而權米石以直五錢為率米七萬九千六百八十三石有竒爲銀四萬九千八百四十兩有竒與折色銀共五萬八千九百兩有竒若得從輕齎之例石折銀五錢計銀二萬七千二百兩有竒而足縱使加折至於六錢七錢計三萬七千八百兩有竒而足則是民每嵗出五萬八千九百兩有竒之中而今出其三萬七千餘兩之數以不失國家之定額而實私其二萬餘之羡以自潤也夫五錢者江南之平價也七錢者折色之極則也若使江南米貴自五錢以上而蒙恩折色或减至七分以下則其所私之羡固當倍之且蓰矣倍之為四萬則是十萬人凶年一月之食也則是國家不出一粟不費一錢而為凶年十萬人續一月之命也為民父母者何憚而不以告乎司國計者亦何靳而不為乎且夫國家漕運四百萬石之中固甞定有輕齎四十萬石以待四方之以水旱来告者矣盖其嵗之凶與否與嵗凶所在之地不可知而所謂輕齎則所謂嵗四十萬之額以待四方之以水旱来告者将安用之况自古經費其本折之權率視緩急而為操縱今國家所以逺輸於江南不憚二三石而致一石者正以江南米賤而京師米貴耳近聞京師之米直自七錢而減至四錢而江南米直自七錢而増至九錢其為貴賤特異常時則是江南以二三石致一石而又不當一石之用也今若取銀於江南而用銀以給京軍之當給米者江南無逺輸之費京軍無賤糶之困此正今日之便宜耳然則非惟無損於國盖深有利於國而得乎緩急操縦之權者也夫損國以益民猶且為之國家發内帑以賑灾者徃徃有之矣又况無損於國而有利於民而又况國與民並受其利者乎此事在不疑而必可行者也為民父母者何憚而不以告乎司國計者何所靳而不為乎嘉靖十數年間江南屢告灾國家亦屢嘗以輕齎與之此其近例試求之故籍可覆案也查得嘉靖十四年蘇松等處災傷巡撫侯都御史等奏戸部覆准除蠲免外兌運四百萬石内准折銀糧一百五十萬石兌運米每石折銀七錢改兌米每石折銀六錢其被災尢重者量准十萬石於臨徳二倉支運每石止徴脚價銀一錢五分自此而上嘉靖十二年折兌一百萬石十年折兌二百一十萬石八年折兌一百七十萬八千石無嵗不有災傷則無嵗不有折兌此其因災傷而折兌者常例也又伏讀嘉靖九年詔書兌運米以十分為率量准五分是時常州一府該得折兌八萬一千石此其不因災傷而折兌者例外之恩也由此言之盖有因災傷而行支運以大寛民力者矣未有災傷而不行折兌以重困吾民者也盖有不因災傷而折兌以廣例外之恩者矣未有災傷而不行折兌以嗇於例外之恩者也此祖宗之良法美政聖天子之深恩厚澤於豐時足國之中而寓救災恤患之至意雖旱乾水溢而民免為溝中瘠者誠戴聖澤之厚於無窮也答施海鹽武陵書方田一法不難於量田而最難於覈田盖田有肥瘠難以一槩論畝湏於未丈量之前先覈一縣之田定為三等必得其實然後丈量乃可用折筭法定畝如周禮一易之田家百畝再易家二百畝三易家三百畝此為定畝起賦之凖亦甞觀國初折畝定稅之法腴鄉田必窄瘠鄉田必寛亦甚得古意今兹不先核田便行丈量則腴鄉之重則必減瘠鄉之輕則必加非均平之道也量田之難全在乎此至於丈量法其簡易者具在九章筭法中湏兄自明此意乃可付之下人為之庶無弊也痛楚中略具梗槩奉答華生所刻書則兄已見之如更查得有書容續奉耳與鄭戸部書執事此行國儲民命繫焉伏聞下車以来仁風所宣里閭相慶盖自来督賦之使多以徴歛裒聚為功而執事獨以寛大行之是以始下車而應感已若此矣變産一節其利病更僕未易數也大率奸民始初莫不上耗國儲下蝕良民以肥其身及其敗露至勤冠盖逺出猶或憑奸民之攀扯而逼迫良民代為之償則是國家懲奸之法未及行於親手欺盗之人而椎膚剥髓鬻妻賣子之苦已波毒於窮簷無告之小民矣是奸民重得志而小民重受困也執事仁人也必自有以處此山澤鄙人出位妄言并希亮之與王蘇州南岷書讀别紙所録尚有不解所謂者然意甚駭之雖江湖甚逺亦何能為情乎東南州郡侈靡日長而虛耗亦日甚譬如病火之人顔色澤然而血氣槁矣吾北厓以古人之節清化源以古人之政撫罷甿朞月則既效矣惟率是道而終始之則百姓之福而區區野人之望也催逋部使者且至僕自生長草萊備見變産之害濫及無辜小民毒痛不忍言北厓仁人也必将有以處之夫素甞侵欺之奸籍其貲可也孥而繫累之可也重戮以懲衆可也小民何罪焉而代為之償乎名曰變産實逼而奪之耳雖然昔人固有言矣成於自同而敗於自異部使者方以括財為功而守令欲以民瘼為事則勢固不同也於是處之為難惟執事悉心以慮之多方以圖之國與民兩無憾矣林鎮江先生亦好古君子也變産之説執事幸不見為迂濶則可與林鎮江共論之盖此非一人之私言也巻子索書鄙作僕於詩本不工自稍知學問以来頗欲收歛精神㑹性情之實是以經年不復從事於此然恐重違吾丈之意當書舊作數首送上也讀衡山先生文字可以補鄙人踈漏之過矣謹謝教謹謝教六經之學邇年来稍甞究心焉而苦未之有得也欲觀西原公所著甚勤便中幸速之奉教末期臨書但有馳情答王蘇州書執事所病於均徭舊法之不可行者其說大槩有五大戶之詭寄也奸猾之那移也花分也賄買也官戸之濫免也大戸之詭寄起於官戸之濫免則此二弊者其實一弊也夫濫免詭寄之弊謂某官例得免田千畝而自有田萬畝或自無田而受詭寄田萬畝則散萬畝於十甲而嵗免千畝實則萬畝皆不當差也其說是矣雖然其以萬畝而散之各甲以嵗嵗倖免千畝者必非田甲皆是本官真名與皆注本官者也必将田甲詭為之名也使其甲甲皆是本官真名而不詭為之名則一人而十甲其為奸固易破矣若必是一甲為真名而諸甲詭為之名遇其真名與注官之甲則免其非真名與注官之甲不得免即十年亦止免一年耳安得歳歳倖免也不然均徭册外别置一册注每嵗所甞蠲免之數如某官例免田千畝而一甲内已免過田七八百畝縱或二甲三甲有田許撞足例免之數數外則役如此則雖甲甲免嵗嵗免亦止得一甲一嵗該免之數又安得以千畝影免萬畝也此法在一彊察吏執之雖真是官戸之田亦不得覬額外濫免况詭寄乎至於移甲之弊則執事所謂只據黄册或十叚册足以革矣而又病於黄册與十叚册之不可據者則固以為與每嵗推收之法相礙也夫每嵗推收宜於賦不宜於役十年定册宜於役不宜於賦役主戸賦主田賦則隨田流轉役則依户擬注是以賦法則既凖之每嵗旋造之徴册所以便民之灌輸役法則宜凖之十年併造之黄册所以便官之㸃差即此兩法本不相綰而執事又疑於據定册編差或有田既賣而差仍累者則編差之際其人必且自言於官曰吾田已賣之某人而某人宜頂吾差於是官為之按其實而以某人頂某人差如此則是以虛名編差者故賣主也以實力頂差者新買主也故賣主以虛名編差可以無亂乎定差之籍新買主以實力頂差可以無累乎鬻田之人且夫役法上下其户以差其甲之錢聚則稍重而散則稍輕花分者只可花分子戸以移稍重而就稍輕其實不得花分鬼名以移絶有而就絶無也且十年輪編不能禁人之花分而一年一編又安能使人必不花分欲使人必不花分則在嚴之於攅籍之始而非所以較於編差之際也賄買一説曩時輪嵗編差則豪民以賄避力差而請銀差今時嵗嵗編差則豪民以賄避差頭而請貼戸曩時輪嵗編差則戸胥之家一年而集一甲豪民之金今時嵗嵗編差則户胥之家一年而集一縣豪民之金大抵論詭寄賄買兩弊則繫乎令長之彊察與否不繫乎輪年與不輪年也論花分移甲兩弊則繫乎册籍之精核與否不繫乎輪年與不輪年也法無全利亦無全害以輪年一編為全害乎而可使小民一嵗忍苦出錢九嵗晏然坐食以一年一編為全利乎縱可以盡革詭寄賄買花分移甲之弊而不能不使窮僻小民嵗嵗褁糧集錢奔走城郭此其利病亦自相凖古有之利不百不變法先時有司激於官戸豪家之暗損小民然却不就舊法中調停裒益而驟變之以收一切之效以為此足以裁損官戸豪民而已不知小民亦竟受其病今之萬口訿訿喧然稱不便者未必盡出於官戸豪民而徃徃多出於窮僻困阨之小民矣請試言小民之所最不便者大槩亦有數説且如一邑丁田以十分為率徃時一嵗編審一分其為數則狹令長耳目差易徧持籌而筭之差易辦縱有弊焉而差易以察今一嵗盡審十分則其為數頓濶於徃時十倍令長一人耳目籌筭所缺漏處必益多耳目籌筭缺漏益多則戸書里胥之權益以重奸民益得以輸金於權之所重以為規避小民無金可輸則嵗受苦役益無所訴而長令則益不能覺察若此者非曩之長令多精彊而後之長令多鶻突也其繁簡濶狹之勢實然而執事乃謂輪年則胥猾多得售奸不輪年則胥猾多不得售奸豈别有説耶不然何其與吾所聞異耶又如一力差約銀十兩為率徃時十年一編正戸約銀五兩貼戸約銀一兩則貼户五而足矣人數既寡故其裒而歛之也不難今一年一編則曩率出銀一兩者今減而出十分兩之一曩用貼户五者今必增而用貼戸之為五者十人數既廣其勢必散有差頭終嵗物色尚不能徧識貼戸之門者何况能盡歛其錢是以徃時所病正戸饕餮貼戸今時所病貼户耗損正戸小民不幸被㸃正户則破家矣若此者非曩時之正户皆彊梁而今之正户皆愞弱也其聚散零總之勢亦必至此而不足恠又如銀差曩之法嵗總納銀一兩則今之法嵗零納銀一錢納多者其倍稱之數稍輕納少者其倍稱之數必重納一兩縱倍之三兩而竒足以納矣納一錢非倍之四錢五錢或至八九錢不足以納也此其總納則費固輕而零納則費固重也不獨如是而已以一兩總納之一年則是為一兩之銀一遍赴官守候交納一遍徃来盤費設或交納不時公人一遍下鄉需索而已今以一兩而散納之十年則是為一錢之銀亦一遍赴官守候交納一遍徃来盤費設或交納不時公人亦一遍下郷需索是今日一錢之累並不減於一兩而曩日一年之累乃浸淫於十年其為便耶其為不便耶其最不便者其為坊郭之豪民耶其為窮僻之細民耶此其為病不可枚舉恐不特如執事所謂似渉騷擾而已也則今法之當變理在不疑秋糧帶徴之説既格於復除之無定數而不可行矣惟用十叚册法則可以革詭寄移甲諸弊而無一嵗一役之擾然執事因黄册之不可行而疑於十叚册之不可行者則亦有説夫黄册之不可行者黄册之法敝也黄册之法敝而邑之丁與田大半不登焉故十叚册者為之括其欺隱以補黄册之不及以均乎力征而已使黄册果無弊乎則徑用黄册編差可也使黄册不能無弊乎則為之十叚册以補黄册之不及而編差焉可也因黄册之不可行而併疑於十叚册之不可行則過也執事又謂常州賦稍輕蘇州賦稍重則其法不可畫一故常州自宜從舊法蘇州自宜從新法夫賦自重輕而人情之好逸厭煩好省厭費則胡人度之越人固有不甚相逺執事其試察之竊恐蘇之民之情不甚逺乎常之民之情而法之可行於常者未必不可行於蘇也又别兄甚久耿耿提學公且至荆溪兄以提調當来可得一面晤也均徭法曩時所欲言於兄者不過只是一兩言盖慮兄以新法為甚便民也今讀来教則兄已深知其不便而有意於革之也久矣大率十年一役雖極重亦甘心一年一役雖極輕亦不願此人之大情而新舊兩法之利病可以一兩言盡之者曾聞人言胡虜愚惷只怕鞭扑更不怕殺盖零零星星痛苦難忍也此言雖可笑然亦可以喻人情矣少時甞讀衍義補論均徭負米之喻亦深以其説為然及今日下老實行之乃見其害益知書生坐談真不可便以經世而差雇兩法在宋時亦甚紛然司馬公力主變雇為差而有識者亦甚病其講之不詳則以為司馬公少歴州縣之日淺也僕屏居草莾于民所便所不便則稍知之而稍能言之至於所以為之區處實以生平未甞親在裏邉經歴雖以為常之民曽享十叚册之利而其中委曲尚未能悉知又何以為蘇人謀也承兄下問草率奉對真似乎强其所不知矣竊惟賦役之最煩而敝最多者無如蘇州牧守有懇惻為民之心者無如兄沉潜善思精於處事者無如兄必能别出良法使新病故病一切掃去以幸蘇之人於百千年也是在心誠求之而已豈待書生坐談如僕者之賛之也哉僕自稍渉世事乃知凡百變更之際極是難事即如曩時有司變十年均徭為一年本是愛民真心而講之不詳則其弊已效於今日矣今欲變一年為十年而講之不詳又焉知不貽後日無窮之弊哉兄之遲遲其間不肯輕變極是不為而後可以有為大易所以致戒致慎於革也雖然革非得已也昔荆公論雇役以為此法終不可罷僕亦以為一年均徭此法必不可不變顧其説如此耳至於利病之詳區處之宜則老吏積年總書中有知此者兄試虚心問之勿以其素曽作弊之人而拒之耆民中有知此者兄試虛心問之勿以其山野倨侮而忽之士大夫中有知此者兄試虛心問之勿以其必為一身一家之私説而先意逆之多方訪求再三斟酌使無一不宜乎人情而無一人不得盡其情則變之可通通之可久矣曩者敝郡更法時盖應君為之守應君志在民者也其所更賦法最為精善可以百年無敝但役法則今日便不可行耳此二法雖同是一時事亦同在一書册中而利病相懸兩不相掩或因其役法而并訾其賦法或因其賦法之不可變而併謂其役法亦不可變皆偏辭也蘇郡其亦然乎聞部司文書督逋甚急則楊給事之説不行矣又累賢使者區畫柰何柰何答蔡判官可泉書白下本非有約顧奉清論同寝食者數日若大洞既有約矣謂必得奉清論同寝食如白下也乃竟爾茫然人事之不可料者如此然兄既絆於領簿不能来而僕江湖散漫之人宜可乗興一至大洞且得逕造府下又以家君至家日侍定省莫遂兹懐乃知名山勝逰非特牽纓者常不能兼雖江湖散漫如僕者亦若有所繫而不可必遂矣柰何伏惟吾兄純明温粹篤於向道以此為政必能近人然僕竊有願言於兄者大凡年少髙志之人於事未必備甞故或病於踈文藻雅逸之士多不柰煩至以簿書獄訟為溷䙝故或病於華而無實而謪官遷客縦不怨尢又徃徃以簡曠不事事為得體故或病於惰窳而苟禄此三事雖號為賢士大夫者或不能免也以兄之篤於嚮道自然不墮落此弊然僕所望於兄亦惟兄不使毫髪有類於此而已若使此處縝宻一有即是學問縝宻一有脫漏即是學問脫漏不當舍此更言學問也大學曰心誠求之孔子曰無倦惟兄留意焉僕自少隱居亦甞痛百姓疾苦欲援手焉而惜無路也以為他日苟幸從薄宦庶幾得一社一民以自效雖才器駑鈍亦庶幾興起一兩事利人者除去一兩事病人者以少償所願焉及竊禄于朝浮沉郎署數年竟不能一獲素心雖已罷官閒居猶用此為歉兄初亦署郎也不謫則不為此官矣是僕昔所冀而不得者兄今得之兄之志豈與僕異耶則今日之謫固天所以拓兄之才成兄之志而試之實效也僕竊為兄幸之廣徳之民以黠悍著聞久矣昔時治廣徳者患其然也則必峻刑法以繩焉民見上刑法之峻也則益出於悍黠以求必避是以至於上下相賊刑罰益以峻而黠悍益不可勝曽不知君子長者雖無一時操切之效然每每能使人囬面而率化乃知漢史馭惡馬者利其銜勒之説為未然而蘇洵以齊魯持蜀人之說益可信也兄意云何或能了大洞之約悉意請教當在此時故不盡言兄其亮之與安子介書謹具布被一端奉為令愛送嫁之需布被誠至質且陋矣然以之而厠於刺繡結繪綾綺綃金綴翠𤣥朱錯陳之間則如葦簫土鼓而與朱絃玉磬金鐘大鏞相答響乃更足以成文又如貴介公子張筵邀客珠履貂冠狐裘豹褎聮翩雜座既美且都而有一山澤被褐老人逍遥曳杖其間乃更足以粧㸃風景而不失其為質且陋也且夫桓少君之事兄之所以飬成閨行而出乎習俗之外者豈足多讓古人哉素辱知愛敢以家之所常用者為獻而侑之以辭不然亦願兄受之而以畀之媵僕之用可也謝歐陽石江巡撫啟伏惟明公負康濟之碩材當東南之重寄振恤瘡痍如春風所扇不間于隂谷寒門搜㧞滯幽如藥籠所儲無間于牛溲馬渤如順之者卑不自立少甞薄遊已甘屏跡于山林豈敢更求于聞逹且誦習徒知泥古儕軰多謂之鄙儒而器局難與適時明公誤以為國士收于衆棄揚彼王庭况自来無門舘賔客之交豈所取在牝牡驪黄之外夫不采而佩雖幽蘭亦捐苟有因而前則朽株為用遂得再塵金馬之署更聮羽翼之班自揣既為不堪衆謂何以至此惟天下信明公之端直而知其嚬笑不以假人惟當宁信明公之激揚而知其顧盻必能得士偶因㧞茹及此彚征雖荐人常恐其知在明公絶不以言于口而受知思所以報在鄙人則竊有愧于心惟當勉䇿愚蒙益精學問其或馳驅于世則庶以罄葵藿之心縱使委棄于時則永以堅溝壑之素期少礪頑鈍之器庶不貽冰鑑之羞而已敢因来惠敬布腹心伏惟俯賜覽觀庶以知鄙志之所存焉耳與歐陽巡撫書僕樗散無似黽勉赴官將圖所以效明公國士之知者而未能也竊有所懼者山林之士閒居而静處其寡過則易或出而馳驅於世當毁譽得失之衝誠欲有所樹立則難故古之人修之于家而多不免壊之于庭者况僕之所以修之于家者固未至耶昔韓持國薦處士常夷甫後夷甫改其平生而韓公亦深以是為薦士之悔不知若何可以使鄙人不為夷甫明公不為持國之悔也幸左右終教之辭免坊牌一事向已面請此非敢矯情近名盖以此生苟不至於飢餓則毫髪不敢有所取于世庶幾伐檀詩人之所謂耳承明公欲置買學田此盛舉也更望明公始終其事中間委曲區畫使異日不為人所侵漁則受賜于明公多矣然此舉必湏出自明公使鄙人若無所與焉者乃為善也不然則鄙人雖不以是為利而更欲以是為名亦非鄙志之所安也敢併以奉凟伏惟明公晉擢樞府辱在知愛殊深慶幸與郭似菴巡按書僕經春常病移家住村塢中居閒自念不奉末光者久矣近聞使檄下府過旌鄙人命有司建牌坊示優崇之意且期之永久此執事盛心豈不感激既而自惟有甚不敢當者恐冒昧以累左右知人之明故敢畢陳其愚左右試垂聼焉書曰彰善癉惡樹之風聲近世牌坊之製盖倣此意古者不以法私人所章必善而人廼勸所所癉必惡而人乃懲不然則懸曲木求直影也僕少不知學中嵗蹉跎即鄉黨自好者正恐不如也執事乃欲以之風鄉人而矯漓俗僕豈不自知此如以迷人指迷不亦踈乎罪莫大于盗名詬莫大于詆罔僕非敢辭此也将以讓詬而辟辠也僕甞厠侍從之列㑹才志紕繆又夙罹疢疾不能效官荷天子明聖不戮瘝曠僅奪官罷歸田里此覆載厚恩詎可勝量僕聞之仕隱二道仕者則蜚聲竹帛或立旄纛表閥閱且不為侈隱人則深林窈谷杜門棧徑羣木石鹿豕且不為陋况僕含瑕積垢以此終世惟應躬耕灌園矢溝壑之志保桑榆之路補東隅之失庻幾不為田夫野人􅀈笑此僕私心萬一者也介子推曰身隠矣焉用文之陶生亦云迷塗未逺今是昨非苟又冒執事此賜為華觀則是違溝壑之素叨焜燿之飾忘廢黜之後責襲官寵之前榮戾大易補過之訓犯中庸素位之戒無一可者也僕幸交于執事久矣且積愛生妍積憎生醜古来共然别嫌明㣲先軰所慎雖以李絳之賢亦有議其私于同年者矣自執事持憲江左于人無所假于法無所貸薦紳間咸稱頌據經秉直無與左右比者夫激揚清濁與衆為公執事豈以公法私一交㳺僕豈得以交㳺故干執事公法雖執事諉曰吾以旌賢誰能信之一牌坊之費四五十金計工二十人有竒一工計役三四旬則是二十餘人計役七八十旬有竒崇虛跡捐實費無禆絲髪有損尋丈此僕為暴殄已過矣僕己丑與第時曾隨例給牌坊直百金且僕既有牌坊直矣又有牌坊是兩饕也有司既給僕牌坊直矣又爲僕建牌坊是兩費也柰何使一人兩費有司凡此數事實所不敢當非敢匿心矯跡多為枝辭以徼避譲之名重獲辠有道之門伏惟執事鑒亮命有司停止前事則幸甚理宜走謝面布悃𠂻坐病不能謹以書致答舒雲川巡按書使節之蒞于南土也且訖事而還之朝矣鄙人之所以伺候于左右者一未能展而左右之所以垂愛于不肖者顧數數有加焉既不敢以草莾蹤跡溷擾公府念無可為謝者其於盛徳但知中心藏之而已兹辱賜坊牌價五十金再拜感激益不自堪曩時郭徐諸公按于兹土亦甞以此惠見及僕時尚蒙恩在致仕之後然于諸公之惠亦未之敢當也今為編氓則又異矣夫郭徐於鄙人同年也而左右乃以此施之於山野踈逖素未嘗交際之人此其為厚施益過于諸公然使僕不敢當於致仕之先而顧敢當于編氓之後其為凟尊者之賜益大矣此僕之所甚不敢也謹告返于使人辱左右知愛之深當不以不恭為罪耳請謝未期臨書不勝馳望伏惟亮之與陳巡按遜齋書某迂拙無似然至於慕徳嚮賢之心未嘗不與人同而交際務施報尚徃来之誼亦未嘗不與人同也自使節惠臨江南躬清苦之行以率先屬吏嚴激揚之政以整齊習俗某雖在山澤亦竊聞風而慕焉久矣且使節蒞敝邑兩辱垂問野人之廬而士夫間亦每傳言執事以道義相愛因復自念僕未嘗一日得奉教於左右而乃辱降意先施若此則又竊感且愧焉久矣然則僕於執事不為無所嚮徃而執事於僕不為無所下交矣其於所謂慕義之心報施之禮皆宜奔走自効於左右而乃缺然至今焉者非甚踈狂當不若是故敢以鄙懐布於左右某被罪為民人也諸公髙誼雖過以士禮相遇而固陋之私則不敢不以民禮自居編甿之役既非所以僣於縉紳之交稼穡之論亦非所以參於政事之間是以八九年来其於公門未嘗敢窺焉盖非敢自為偃蹇誠不敢以凟尊者也草莾之不敢見孟子之所謂不敢也且某多病早衰去冬復感隂寒遂成末疾兩足痿痺卧不能起䬃然摧朽已成廢人惟屏跡村庄少藉藥物支持是以執事之門既未及躬候而執事枉頋又不及擁篲以迎盖坐此也然則僕於執事交際之禮既拘於分之不敢自盡嚮徃之殷又牽於病之不能自致惟有捫心懐慙而已念無以逹於左右故敢以書上并以為謝幸垂亮焉與徐少初邑侯書某罪𨽻之餘禮不宜復齒於縉紳交際之間是以每逺引而去之竊以為姓名不通於諸公久矣兹又辱巡倉巡江二公之賜令人愧悚益不自勝欲作書辭謝又難於為說是以敢有所請教於明公也夫諸公之賜其名則幣帛果酒也而叩其實則白金也欲以辭幣帛果酒為說則悖於其實欲以辭銀為説則悖於其名是以措詞之難也古者禮存于幣帛之先後世以幣帛為禮此其實則亡矣而其名尚存也若夫市道之交則錢貨而已矣雖然如公古道君子也如諸公古道君子也豈不欲行古之道而以市道歟豈以為若某軰人者其好潔操行之心不能勝其嗜利無耻之心故幣帛虛名也金錢實利也而特以此厚之歟其特以此愧之歟頑鄙之人可以省矣是諸公之所以㢘頑也某罪𨽻也賜之幣帛不敢當賜之金錢不敢當豈其能自處以㢘乎盖古之所謂不敢也然而為嘵嘵者竊懼名實之亂也公古道君子必且有以教我矣某山野鄙人於當道諸公辱顧不敢答辱賜不敢拜非以為簡也禮不敢也答與拜既不敢不答不拜又鄙心所甚不自安也曩曽奉凟乞命吏人於鄉官掲帖中除去賤名以安編氓之分豈未蒙亮察耶恃在知愛乞如前所凟則上官可以不知鄙人姓名而交際之間可以冺然無跡矣附凟又讀清獄申文深知仁人之用心至悉謹篋而藏之以告後之君子以延長者之惠於無窮更承示區處牌坊事徃時所辭諸坊牌銀只為未有所處遂至久而不知所用之矣今用以修理書院不惟此銀得有所着落且于風教有補焉甚善甚善但中間稱奨鄙人太過讀之且甚自愧也某嘗以為今日吾軰之病大率在于實行未修而虛名先著閫域不務而門面是張是以書院講學一節多為具文而非彼此感應之真機而其志之不相同者則遂指摘以為口實誠所謂吾黨有過焉者也况如僕者極踈且陋何敢當此乞於申文中自見今買荘一所以下至僦船以居數句及因以禮敦請講學一句敢勞削去是所以免僕于名浮之耻而亦左右相愛以徳之素心也幸亮之與王堯衢編修書抱病懶慢久缺書問知執事不謂我踈簡也春来卜居陽羡此中山水清絶無車馬送迎之煩出門則從二三子登山臨水歸来閉門食飲寝夢尚有餘閒復稍從事于問學然詩文末藝與博雜記問昔嘗强力好之近始自覺其如羊棗昌歜之嗜不足飢飽于人非古人切問近思之義于是取程朱諸老先生之書降心而伏讀焉初亦未嘗覺其好也讀之且半月矣乃知其㫖味雋永字字發明古聖賢之藴凡天地間至精至妙之理更無一閒句閒語所恨資性蒙迷不能深思力踐於其言焉耳然一心好之固不敢復奪焉此類之書皆近世英敏材辨之士以為老生爛話至束閣不肯觀雖其苦心敝精于文字間而竟不免老死而無所聞有可痛者僕之自陳其愚盖過不知量亦欲執事之同所嗜好也何如何如近日當事者所去取投閒之臣僕已先知其去與取之必如此矣不足為恠且平生亦頗能自為主張不敢跟人哭笑不敢以鴟鳶之所争蝸角之所戰者以動吾心而累吾守此亦執事所素鑒無待僕自明也無待僕自明而猶自明云云者有說也父子至情恐以此上累吾父之心湏吾執事觧喻耳當今之士隱居篤學修名砥節如湖州唐子平凉趙子軰者凡若干人僕之駑駘十不及其二三然此軰皆淪胥流落淹滯已十數年少者壮壮者且老以衰或餒凍無以存活又其初皆以盡力國事誤觸綱而抵禁非如僕之自以私罪去也此軰尚不得為當事者所與則僕得與此軰同陸沉焉固無憾也更何有所覬乎凡人出處利鈍數固不偶始言官謬相薦時僕固知終必且棄去以為萬一不棄去則僕之自為處亦有甚難者何也若使僕復如舊時隨逐行隊進退以旅趦趄囁嚅于明時無粟粒之補則將毁平生而弁髦之且嚮惟不能為此所以甘心去官而無所悔耳不然則桞士師所謂何必去父母之邦者也若使不如此而如彼守其愚戅固陋而不變恐日月漸久積嫌積忤自作禍孽更有甚於嚮時既不能為邯鄲之歩竟當匍匐而歸耳是以中夜思之進退狼狽乃今得自脱於此固可謂之幸而不可謂之不幸也古人有言人各有能有不能懸釡帶索枯槁丘壑雖窮死而不肯悔者僕自謂能之隨逐行隊進退以旅以徼幸於衣錦乘軒之華者僕非不欲勉强學焉恐竟不能也僕自生齒以来百種嗜欲頗少於人亦絶不知人間有炫耀顯赫事獨不能淡於飲食乃始痛為節損或四五日不肉食始而苦之久且甘之矣間飲食於富貴之家腥膏滿案且噦之而投筋矣所以苦身自約如此者以為既不能改于其固陋以狥時好則貧賤自是此生常事諺曰畏水者不乗橋恐其動心也且夫自處不當違其所能而强其所不能處人當成就其長而䕶其所短安知當事者之非深愛我乎僕幸未衰敗苟自不樹立則已耳若夫假之以二三年孜孜早夜敏行而不敢怠則子輿所謂獨善兼善與退之所謂行道為書化今傳後或者不能兩讓矣豈有不得於進又不得於退者乎執事知我故不慙大言且非此無以解吾父之懐也吾父之所以戀戀於僕者亦非以今時富貴人望僕也王良有言父子情深或意僕之以是為憂也而亦憂焉耳僕固不憂也又或者以自少教之讀書不忍遽見其廢錮於聖世矣乎雖然成敗失得且當要之久逺毋遽為僕戚戚也望吾執事早晩間曲為寛慰則數千里外人子懸望之心亦稍紓矣是執事之賜也客居無事二三子時時以舉業文字强相問訊亦殊妨静坐與讀書但念此身為宇宙中人其於塵俗奔走縟禮煩儀之事既以其溷擾而厭避之于此不當更有所厭耳舍妹并甥女想皆康吉餘懐不盡生平最懶作書更懶作真書書又多差與執事書既不可假手於人又不能不差又不及更錄輙以呈上并希亮之答周約菴尚書書某自屏居以来自以罪𨽻不敢復齒於薦紳之後故居當南北孔道非逃虛者所宜遂舘於陽羡山間坐此去人益逺親知徃来一切罷廢雖最辱知愛如明公亦尚未能繼掃門之役以承教語叙𠂻曲此其懶慢之罪僕猶自知况長者乎以為宜麾而棄之矣不謂過辱記錄逺勤使人且手書慰諭尚欲納僕於古人之域捧書自激竊感且歎固知長者之度不肯輕棄一物欲曲而成之若此然来書所教尚以僕早年受知之故盖見僕少時意氣可以竊冀人之尺寸焉而未知僕今憊駑樗散雖欲比於今之人而有不逮也僕少不自揆亦嘗有四方之志而才器迂滯本不適時加以弱冠從仕重以負氣學未及成而驟試之且少年負氣不識忌諱以迂滯之器而試未成之學重以負氣之習此其動輙罹咎也豈足恠哉猶幸免誅戮得齒編氓且少嬰疾疢三十以後齒髪漸衰委形既然志亦隨之即如讀書為文本是素所嗜好近或挟册讀未數行輙眊然而睡矣旬月不一御鉛墨時或為之輙終日汗漫申紙䑛筆竟不能成十數字而遂以罷夫外則廢於親知之徃来内則廢於文史之玩即此一兩事則其衰頺弛靡不比於人也可盡見矣此其意盖欲槁形灰心自同木石豕鹿之間使宇宙廣濶着此一閒人足矣淮隂南陽之事固萬不敢一冀焉至如象緯地形諸家之學如来書所稱管鄧所長亦何敢不自量而攬焉以為可幾乎且夫淮隂南陽其始皆匵其器而不輕以試䄂手而觀天下之勢如良醫之隔垣而洞五臟也故其壇而拜焉廬而顧焉則以造次一二語而圖王致伯之畧遂以定况齷齪如僕軰者所謂以迂滯之器而試未成之學如弋者百發而徼於一中故屢試屢蹶此其大巧大拙之效已見于前事矣乃欲以倦逰息機之後而自比於古人隱居求志之前雖强自鞭策固知其不類也然則明公教督之厚其何以承之甚自激也甚自愧也雖然自屏居以来澄慮黙觀亦既久之乃稍稍窺見古之儒者所以為學之大端竊以其實乃在於身心性情之際而不以事功技術掲耳目為也故其退藏於宻者甚約其究可以窮神而立命古固有豪傑之士而不知學者衆矣是以事功流而為權計技術流而為小道凝静致逺南陽其幾乎其雜於申韓則擇術之過也淮隂烈矣竟以矜能伐功殞其軀以輅之才局於方技僅與華佗朱建平醫相為伍鄧征西以所長濟事以所長殞身與淮隂同此數子者不可不謂豪傑之士也然其擇術則可謂不審矣僕功名韁鎖已獲斬㫁至於象緯地形種種諸家之學徃時亦頗嘗注心焉今盡以懶病廢竊以為絶利於百途固将藉此餘閒聚精蓄力洞極本心洗濯愆過以冀収功於一原而未知竟當何如耳近来每觀伊洛之書及六經之㫖覺有毫髮悟入則終日欣然忘其居之陋而形之憊也所苦習氣纏繞欲障起滅未能痛與掃除使之光大然不敢不勉焉以為古来儒者所以自淑其身之學其命脉或不外此而無有乎窮逹古今之異者也若乃進僕於抱膝髙吟之儔則必不敢當謂僕爲今之腐儒鄙儒賤儒也其亦可幾乎以是少酬明公之知明公其許我乎辱愛之深故不敢隱其愚且狂也今邉陲多難兵財窘急明主側席正豪傑展効之時為社稷計維公軰一二耆舊隆中之業是有在矣其何譲焉山野鄙人其盱而望之矣與賈鳳陽書史生還獲聞起居與徳政之詳甚慰素仰弟迂踈無似自屏居以来四方知舊絶不敢通書或有書見及則答之而已以為山林屏廢杜門省過之人其禮自宜如是且亦平生自守其固陋而不敢失者也今春偶有素不相識鄉人名孫伸者持兄書惠見及當時姑奉答一書後或言此人先造贋書以誤左右之聼聞之不勝惶悚弟自己丑偕兄登第至今十餘年雖至親未嘗敢為之請屬雖在敝郡縣諸公亦素不敢有一字相屬乃為素不識面之人請屬于千里之外亦可笑矣且弟縦不才亦素知兄之剛正豈宜以私干之既以自愧又以自訟豈平生心事不能見信于一鄉此人所以至此也若果有此煩兄發其事治其人以為作偽之戒并将原所造贋書發下一覽感感答殷生原學書来書推奨鄙人甚非倫比頭陀僣謂佛子法王此大罪過也雖然亦足以見吾友向徃之殷矣僕不自量竊痛世人汩於利欲迷失真種絶去人理自墮鬼蜮是以在羣衆中徃徃不惜齒頰一與破迷雖至速侮招尢亦不為悔至於同游諸子尢更不敢惜齒頬然察其中如聞古樂而思睡者固亦多矣亦不為悔盖冀有一二人能深信吾說而共行之以究乎其精則宇宙間氣脉尚有所寄不至盡泯爛此吾人大功徳也敢復自愛乎今吾友乃不見謂迂濶直欲相從於湖海寂寞之域信之甚真而志之甚篤則交戰勝負之機固已决矣是余之所汲汲而求者也但湖上之行本欲絶去言語文字於萬緣不染時黙悟此心今與吾友同行不免更費一畨酬酢耳然来意不欲固違也到無錫時當相約所云議論牴牾且勿尢人豪逹宼盗亦且勿尢人盖自家不知有幾多病痛在也今且只悉心洗刮自家病痛盡時更看感應處何如既已深知吾友之意此後當益盡吾言耳草草與劉三府寒泉書荒荘重辱枉駕緣病體就醫不及擁篲耿耿承委送太府先生文字以郡人頌郡公非特分所宜然抑亦情不能已雖然鄙意有不敢不逹之左右者僕少不知學而溺志於文詞之習加以非其才之所長徒以耽於所好而苦心矻力窮日夜而强為之是以精神耗散而不能收筋力枯槁而不能補積病成衰年及四十尫羸卧床已成廢人此皆諸公所共親見所共垂憫者僕平日傷生之事頗能自節獨坐文字之為累耳反之於心既非畜徳之資求之於身又非所以為飬生之地是以深自愧悔盖絶筆不敢為文者四年於兹將以少緩餘生為天地間一枯木朽株而已方欲盡取前稿燒毁以銷宿愆不意為人抄錄而無錫卜君殊不相信謬行刋刻再三以書止之而不能不知其何說也然亦賴有此刻可查平生無一篇文字不在其中執事試考其年月皆四年以前胡說也若今日復勉强承命則後来更不可復辭於人人矣二三年間亦有一二府縣諸公索文者僕不敢為枝辭相誑但據本心以告曰自今以後更有為府縣及朋友間作一篇應酬文字則今日誠得罪於執事矣今於諸公亦不敢為枝辭亦但據本心以告曰自今以後更有為郡縣及朋友間作一篇應酬文字則今日誠得罪於諸公亦誠得罪於太府矣伏惟諸公矜而恕之答王遵巖書兩得兄書拳拳以病體為念真意懇惻令人讀之堪為涕下非兄死生之交不能至此感激感激人傳言吾病過重者盖有兩說一則以木腎為患痰火時作不得不閉戸調理人以我經年病不見人則以我病不可支矣不知我貌則槁矣而精神尚可不死盖近於養生家稍稍得一歸根法也其一說則自以早年有志今四十外矣而猶然醉夢人也盖非特文章氣節平生所劼力而從事者既於真性不切及所聞於經書師友與意見之所窺測而自以為道者亦竟如隔壁聼話全無交渉近来痛苦心切死中求活将四十年前伎倆頭頭放捨四十年前見解種種抹摋於清明中稍見得些影子原是徹天徹地靈明混成的東西生時一物帶不来此物却原自帶来死時一物帶不去此物却要完全還他去然以為有物則何睹何聞以為無則參前倚衡瞻前忽後非胸中不掛世間一物則不能見得此物非心心念念晝夜不捨如養珠抱卵下數十年無滲漏的工夫則不能收攝此物完養此物自古宇宙間豪傑經多少人而聞道者絶歎其難也好仁者無以尚之此真消息也終日如愚終日忘食此真工夫也無以尚之則有一物可尚便不是此物矣忘食則於閒事有不暇者矣如愚則於才技有不使者矣孔顔一生工夫所以完養收攝此寳藏也僕近稍悟得此意而深恨年已過時雖知其無成然本是自家寳藏不得不有冀於萬一也是以痛為掃抹閒事收歛精神之計則不得不簡於應接不得不托於病不可支以謝客是以人知吾之病甚而不知吾之别有意也此意更不敢露於人以兄念我太厚憂我太深故特披露之兄萬無洩我秘宻重増嘵嘵之口也安友為我求序得託雄文以不朽甚幸過望僕舊從兄學為文章有一二僅得處盡是兄之指教但才既不長又不能竭精力以從事是以遂成廢罷韓子所謂徙業者不嚌其胾者也獨覺兄之奔逸絶塵而已矣近来自觀舊稿支離叛道之言篇篇有之理既不當文亦未工赧然盡欲焚燒而後為快緣頗為人抄錄無可柰何盖以吾今日文字伎倆湏并却三四年精力専専幹此一事自謂可望於古閫域今自度必無此閒精神可以了此也既自知不了則豈欲以不了者而信今傳後乎亦愚矣貴鄉洪子因信兄而過信我遂亦以我為可與斯文也與安友謀刻之而請序於兄僕既而聞之愧汗駭愕盖吾文未成吾自知之且不知此生為言語文字人也居常以刻文字為無㢘耻之一節若使吾身後有閒人作此業障則非吾敢知至於自家子弟則湏有遺屬説破此意不欲其作此業障也僕居閒偶想起宇宙間有一二事人人見慣而絶是可笑者其屠沽細人有一碗飯吃其死後則必有一篇墓誌其逹官貴人與中科第人稍有名目在世間者其死後則必有一部詩文刻集如生而飲食死而棺槨之不可缺此事非特三代以上所無雖漢唐以前亦絶無此事幸而所謂墓誌與詩文集者皆不乆泯滅然其徃者滅矣而在者尚滿屋也若皆存在世間即使以大地為架子亦安頓不下矣此等文字倘家藏人畜者盡舉祖龍手叚作用一畨則南山煤炭竹木當盡減價矣可笑可笑僕又何用更置一莖草于鄧林棼棼之間哉至於求序於兄僕與兄何等朋友也其有所求吾自求之而何待於人為之媒哉以為吾文苟有成則當求兄不成則不敢以累兄知人之明也及得兄序讀之令人益增慙汗吳下自古来文人正不少以為僕盖過二千年吳下詞人而直接朴㳺之文統既使兄為私於所好人若使僕與人争名争先然者非兄之所以愛僕也使兄今日為僕作序則亦宜道兄與僕昔以文相切磋以才弱志隳幾成而罷之意句句道却實事庻使兄為不誣而吾亦可以不愧耳至於兄之雄文則千百年自有定價倘吾文稍進乃敢為兄作序今且不欲羔䄂於狐裘也刻板事既已力止兄序遂亦寳藏之未敢示人也不具與卜無錫書僕支離床席已成廢人久不能一奉晤言殊深耿耿近敝邑一刻字人云執事欲刻鄙言雖或傳言之妄然聞之殊不自安盖執事與善之過雖淺陋言語猶不欲遺之此在執事則為盛心然本非立言之人而徒為覆瓿之用此在鄙人則甚可愧且今世所謂文集者徧滿世間不為少矣其實一字無用彼其初作者莫不妄意于不朽之圗而適足以自彰其陋以取誚於觀者徒所謂木災而已僕每為彼愧之而復自效尤之乎昔人論文章家惟見理明而用功深者乃能得之此未易言也况僕平生本無立言以求不朽之意偶少年時隨一二友人强習世間綺語以才力滯鈍兼復懶病加以踈拙于身心而强欲求工於筆札竟不能工而罷閒中偶觀舊稿一二篇支離不經之言滿紙而是盡欲焚燒為快又自悔向来錯用心力而一無所成也若欲以此傳於人人則既以自誤又復誤人且昔人云人短於自見僕自知猶然人又将謂之何執事苟以為可而欲傳之是有累於執事之明苟不擇其可否而欲傳之是有傷於執事隱惡之義也承執事知愛敢布腹心萬望中止其事則執事之愛我更厚矣荆川集巻五欽定四庫全書荊川集巻六明唐順之撰序
