front:
  text: 荆川集卷一
  hash: sha256:5ac97776e4ee23acb52d99ea984201a09e700fce03fe174d5e851d2f9ef1a4a3
body:
  text: 明唐順之撰策廷試策一道臣對臣聞保民所以格天也正百官所以保民也振紀綱所以正百官也何則君者代天理物者也百官者行君之令而致之民以共亮天工者也百官弗正則下有倒懸之危而莫為之恤上有子惠之仁而莫為之施而欲民之安也不可得矣紀綱弗振則憸邪者或以矯飾取容循良者或以朴魯見黜任者不必賢賢者不必任而欲百官之正也不可得矣故曰君得臣而萬化行言安民在乎能官人也曰正朝廷以正百官言官人在乎振紀綱也立法以任人任人以安民則人心和而天地之和亦應矣于此見上下交修之責焉見天人合一之理焉葢自古帝王敬天勤民以致天下之治者其要端在乎此而不可易也我皇帝陛下上畏天變下究民隱臨軒一詔于知人安民二者拳拳焉臣知陛下此心即殷湯桑林自責之心也即髙皇帝仲夏不雨席藁露坐之心也臣雖至愚其于官吏賢不肖與夫民生利病之原則草茅之下嘗有感於中久矣况當清問之勤敢不悉心以對乎臣謹稽之洪範徵之春秋大抵政善民安則嘉祥生政荒民困則災沴作天降災祥在德吉凶不僣在人陛下敬一以昭事中和以立極宜乎休徵至而六沴消矣而顧有不可以常理測者葢雖天心仁愛欲以助陛下宵旰之憂而隆嘉靖之治意者民之危苦無聊所以感傷和氣者亦容有之乎陛下蠲租以阜民財賑貸以周民急恤刑以蘇民命天下之至仁也其為安民計者至矣親賢去奸以别取舍行久任之法以圖治效天下之至明也其為官人計者至矣而民未必皆安官未必皆得其人者意者賢否倒置授任失宜勸懲未著如聖策所慮者亦容有之乎則夫振紀綱以正百官以安萬民信不容緩也臣觀知人安民之謨始自虞廷發之臯陶之告舜曰在知人在安民禹曰知人則哲能官人安民則惠黎民懐之分之以三德三德皆以廣知人之㫖也詳之以惇典庸禮皆以廣安民之㫖也要之官得其人則善政行而天下䝉其福官匪其人則横政行而天下受其害約而言之非二致也哲也者成其惠者也知人非哲弗能知人而至於能官人則非紀綱之振亦弗能也紀綱也者濟其哲者也雖哲如堯舜而三載考績三考黜陟幽明内則九官十六相以為岳牧之倡外則四岳十二牧以任總領之責規為精密斯哲有所寄而其為哲也大矣哲大而惠斯大矣仁急親賢知急先務此之謂也勲格上下治底平成由此其致也是故陛下欲弭災沴則莫若安民矣欲安民則莫若正百官矣欲正百官則莫若振紀綱矣紀綱之所以振者臣雖不能悉舉請得以其槩言之其一曰精監司以察守令臣按永樂中太宗皇帝諭蹇義陳瑛等曰為國牧民莫切於守令吏部選授皆出倉卒未能悉其才行必察所行乃見賢否其令巡按御史及按察司凡府州縣官到任半歲之上者悉察其能否㢘貪之實以聞臣願陛下光昭大訓精擇監司或得於羣臣之公舉或得於睿鑑之獨照必其風采素著秉節剛烈者而後任之其既也果能激濁揚清不畏强禦者量加旌奬其狥私容奸及蔽賢不舉者量行黜責不但以得官吏之賢否而因以為監司之殿最監司憚憲典之嚴孰敢不竭力於旬宣官吏恃監司之公孰敢不勞心於撫字監司賢而守令亦賢矣其二曰清銓法以彰黜陟臣按成化中大學士邱濬議曰朝制三年天下官吏賫册來朝六部都察院查其行事未完報者劾奏之以行黜陟後因選調積滯設法疏通之輒憑巡按考語不復稽其實迹録其罪狀立為貪暴不謹等名以黜退之殊非祖宗初意况貪者未必暴暴者未必貪素行不謹不知何所指名何以厭服其心哉臣願陛下修復舊典申戒銓司核功過勿循毁譽量才能以責名實曰貪暴必指其為貪暴者何如曰不謹必指其為不謹者何如則人不得飾名以求功而亦不得巧文以避罪矣其三曰信賞罰以激人心臣聞之有官而無賞罰是無官也有賞罸而不足以奔走天下是無賞罸也今也循資而擢之累勞而進之人將曰我資我勞固宜然也富貴爵禄皆若其身之所自致而效報之心薄矣奸吏浚財大刻於民而恒幸其不敗露也不幸而敗露也則止以罷免而幸其不及於戮辱也則徼幸之心滋而莫知懲創矣臣願陛下離照旁通乾剛獨斷政績顯著雖待以不次之位而不嫌於躐等貪汙有狀雖加以五刑之誅而不嫌於傷恩或璽書勸勵如漢家故事以收其全功或戴罪供職如大誥中所以處置朝臣者以責其後效用不測之刑用不測之賞以奔走天下而後可也其四曰信命令以敷實惠書曰慎乃出令令出惟行易曰渙汗其大號臣竊謂陛下有䘏民之美意而有司奉行者之未至也陛下嘗下詔曰蠲租矣賑貸矣䘏刑矣然有司之於民也則徵催之苦極矣民之斃於饑斃於刑者過半矣上德隱而靡宣下情迫而莫救凡以此也臣願陛下嚴慢令之戒重沮格之罪限某日至某所于某日蠲租于某日賑貸慢違者必坐以罪而不少姑息焉則庶乎不為虚文而民皆霑實惠也此四者皆以振紀綱而盡官人之道以為安民之本者也若夫除盜賊禦外侮固亦安民者之所當務臣以為其要亦在於得人而已夫民之為盗賊者豈其本心哉迫於不得己或陷於不知耳故曰豐世無盗者足也治世無盗者化也陛下得良吏如龔遂如虞詡者而任之威信所孚則足以折其氣仁恩所被則足以結其心勸相有方則足以安其業盗賊不期息而自息矣天子有道守在四裔今之諸裔乘間竊發侵擾我邊陲䖍劉我民人信可患也臣則謂所患者不在諸邊而在我邊方之無將耳葢今之所謂將者取諸世胄取諸武舉非不可得人也惟䊵綺之習或未熟于經略弓馬記誦之材或未足於竒正之變也臣請陛下行蘇洵之説令大臣各舉所知勇而有謀可以出入險阻者然後嘗之以治兵寄之以邊障養其望專其任而良將可得矣將良則士練而邊備飭矣至於財充而食足此亦百官有司之事耳百官得其人則經理有道儲畜有方而邦之財可充斂散得宜補助以時而民之食可足要不足以煩陛下也以此言之紀綱克振百官之所以正者此也民之所以安者此也天心之所助順而反災為祥者亦此也抑臣猶有獻焉中庸曰為政在人取人以身則人固立政之本而身尤取人之本也朱熹曰紀綱不能以自立必人主之心公平正大無偏黨反側之私然後紀綱有所係而立則心者尤立紀綱之本也臣伏讀陛下敬一之箴則于堯舜禹湯文武之心法而為知人安民之要機者固自有在矣惟陛下始終此心弗以隱顯異其功弗以久暫易其守弗以宴安荒其志必講學以涵養此心必親近君子以維持此心由是心純而賢才輔已正而物自正將不待於慶賞黜陟之及其身而風聲氣習之所加衆正遂彚征之願羣邪沮窺睨之心亦其勢之必至者矣故以之知人則其知如神者也以之安民則其仁如天者也以之除盗賊則如舜之𤣥德在上而寇賊奸宄者自消也以之禦外侮則所謂無怠無荒四夷來王明王慎德四夷咸賔而禦敵之上策在乎此也即董仲舒所謂正心以正朝廷正朝廷以正百官正百官以正萬民逺近一于正而罔有邪氣干其間者也即公孫𢎞所謂心和則氣和氣和則形和而天地之和應者也即劉向所謂衆賢和於朝萬物和於野而和氣致祥者也由是而三光全寒暑時天地位萬物育天不愛其道地不愛其寳諸福之物畢致而王道終矣則夫知人安民以臻盛治又在陛下此心轉移間耳臣不勝拳拳忠愛之至幸陛下垂聽焉臣謹對故禮部左侍郎薛瑄從祀奏議陛下懋建皇極身作君師惠然留意理學之臣博採於庶官之論欲以定祀典而彰潛德甚盛心也夫瑄之為人諸臣論之詳矣臣可無説也臣請折衷之祀典以答明詔可乎臣聞聖人之道有宗傳有羽翼葢孔門身通六藝者七十人其德行稱者纔四人而夫子獨許回庶幾其三人又不與也一貫語之參賜而性與天道賜又自以為不可得聞則其精微之際心授心受毫釐不差者固亦難矣所謂宗傳者也然文學政事言語亦得與德行分科而居而皆不失為聖人之一體至於門人之辨之勇之藝聖人亦自讓以為賢於我也且曰自吾得某也而惡聲不入於耳自吾得某也而門人加親是聖人與人之周也所謂羽翼者也此孔門人物之衡也亦後世論孔門從祀者之衡也如使必其宗傳而後可以從於祀也則顔曽思孟而下及於濓洛四三鉅儒而足矣雖七十子亦有在所略者矣而况於經師之口傳與王韓輩之疵而未醇者乎然且羣然而俎豆焉則羽翼之故也故曰與其過而廢之寧過而存之至如瑄者以復性為究竟以持敬凝静為工夫非聖人之道不以志而學非濓洛闗閩之説不以尊而信雖其於所謂精微之際未知其何如也而歴其平生其背於聖人者亦少矣謂其為聖門之羽翼也復何疑乎此瑄之可附於祀典者一也臣聞衆心安定而成俗俗必有尚衆志鼓舞而成尚尚必有倡倡之者始之也祭之為言報也以報本而反其始也我朝理學彬彬乎盛矣然自瑄以前儒者猶汩於辭章事功之習而未有能卓然於道德性命之歸者也而瑄實倡之矣自瑄以後其有如瑄者繼踵而出乎未可知也其有能直接孔氏之心傳者出乎未可知也而瑄實倡之矣是則瑄其我朝理學之一闢也比之濓洛倡道於宋雖其所自得或有深淺而功則並之此瑄之可附於祀典者二也臣聞之記曰凡釋奠者必有合也有國故則否解之者曰國故云者若虞則䕫伯夷周則周公魯則孔子也此代各自釋奠於其代之人之証也而國又自釋奠於其國之人之証也又曰春官釋奠於其先師解之者曰若漢髙堂生制氏毛公伏生也此漢代釋奠於漢之人之證也故䕫伯夷周公孔子雖不能接世而生而髙堂生制氏毛公伏生固亦非曠世之所希有然而與於釋奠者代有其人則自建學以來皆然未有空一代而絶無其人也明興且二百年絃歌之化暢乎逺近豎子皆知誦法孔氏而壁宫之側至今無一人得俎豆其間者非所以鼓士氣而彰聖朝棫樸之盛也元之世且推其臣許衡而從祀焉我明乃無一人之幾於衡者其不然矣由此言之苟為聖人之徒者猶宜援而進之而况如瑄之真可以羽翼聖門者乎如是而曰我國之故也而祀焉以比於漢髙堂生制氏毛公伏生許衡其亦可以無愧矣乎况今之所謂祀者乃其偃然於累代羣儒之後而非如記所謂特祀以為先師者也奚不可哉此瑄之可附於祀典者三也臣聞周禮大司樂曰凡有德者有道者使教焉没則以為樂祖祭於瞽宗瞽宗者殷學也此學宫祀其能為師者之證也其釁器舍菜而神之者乃其攝齋鼓篋而師之者也瑄嘗督學於齊魯而諸生翕然尊之曰吾薛夫子也故其時師道之尊而庠序之飭始自齊魯而風於天下葢在勝國時許衡實為祭酒勝國時之能尊師道而作人材者莫如衡而我朝之能尊師道而作人材者莫如瑄其亦近乎樂祖瞽宗之義否耶此瑄之可附於祀典者四也然或者謂瑄於六經少所著述宜不得與從祀臣竊以為不然夫聖人所為作經者何也以摹寫此心而已儒者求諸心而有得也是真能發揮六經者也且自古儒者説經之多莫如馬融其體認本心絶不肯為六經註脚者莫如陸九淵陛下嘗進九淵而黜融則聖明昭鑒固有取於躬行妙悟之實而不徒以聞見講解為功矣况瑄所著讀書録且十餘萬言固濂洛闗閩之緒而六經之㫖也其為著述則亦已繁此瑄之無礙於祀典者也然宋儒之賢若尹焞羅從彦李侗黄幹皆不得與今瑄所得未知其與數子何如乃得與或者亦有是説臣又以為不然夫瑄之所得誠未知其與數子何如也然自濂洛倡道之後羣儒連茹而出耳目薰染親相授受故其興起為易而瑄獨崛起絶學之後故其樹立為難其連茹而出也不得不擇其尤者而祀之其崛起也不得不援而進之譬如繁星麗空非五緯不能耀芒而晨星相望則維參與昴嘒然而見微顯闡幽之義也安得牽彼以例此乎此又瑄之無礙於祀典者也故臣以為宜如御史臣瞻臣得仁所疏臣愚昧死謹言荆川集巻一欽定四庫全書荆川集巻二明唐順之撰詩游西山碧雲寺作得悦字此下係翰林時作端居滯文翰久與賞心闋出沐乘休豫尋幽展懽悦涉澗俯潺湲攀巒面􅏭嵲邈哉神臯奥居然靈境别夷峻疏深池塞坎搆崇梲浴室盪陽泉冰井䕃隂穴躋險惕瞑眩逃迥欣超軼密林嬉猿獮逺峰挂虹霓宵看朝旭升晝見昏星列蔀豐光乍熹崖懸曜先晣景㑹萬象昭跡暌百慮絶巖棲庶可希從兹謝塵轍慶夀寺齋宿獨坐花宫月疎鐘報曉晴地超三象外人覺萬縁清茹素分僧飯觀空入化城真詮今已悟寧畏毒龍驚寓城西寺中雜言五首金馬違朝謁雲林久卧疴堦寒鳴蟪蟈庭古䕃藤蘿束帶知圍減觀書厭帙多無人來問疾獨坐似維摩少年好疎懶遂與性相安經月常忘沐逢人或不冠鼎裏金將化囊中玉可餐解言脱屣易豈憚拂衣難緇塵坐自染白社偶相尋俗子慚𤣥度名僧即道林三生空有偈五藴本無心説法何須難忘言悟已深誰言龍藏逺亦在鳳城旁塔湧金銀界筵開功德場常明瞻慧月利涉藉慈航沉痼還能遣齋心奉藥王秋來不覺早落葉忽已繁物化毎相代吾生尚何存微材同樗櫟僻地當丘園竊慕東方子一官堪避喧同孟中丞游龍泉寺二首山深人不到僊侣暫相從金馬聯驄馬晴峯映雨峰竹嶼今棲鳳花潭舊伏龍方欣窺妙偈遽擬謝塵蹤寳地風塵絶琳宫日月偏雁來還繞塔龍去尚留泉戸裏天花落空中梵樂傳逺師休禁酒客醉欲逃禪普濟寺同孟中丞作宛轉雲峰合微茫鳥路通閒來竹林下醉卧石房中隂磵泉先凍陽崖蕋尚紅攀蘿探虎穴憩石俯鮫宫上客思留帶山僧不避驄夜深清嘯發流響入寒空秋夜捲帷望秋月月皎心亦清牀下寒蟲響庭前落葉盈漢隂鮮機械河上多道情一適萬事畢栖栖何所營禁中遇雨紫閣肅隂隂重門寒意深忽看百里霧來作九秋霖灑道先清蹕霑花度禁林楯郎方夾陛雨立濕衣簪夜霽秋月澄初霽退公方掩閨稍聞金柝動坐望玉繩低巢鳥喧餘濕庭花落故畦羇人驚候變燈下理寒綈十五夜旅懐暫輟明光草言從洛下逰塵沙兩河夕風雨二陵秋鏡有潘郎鬢囊無季子裘更堪三五夜獨自下西樓望太河北望太行山嶔岑霄漢間倚天開疊障畫地作重闗車向羊腸轉人從鳥道還一為苦寒曲淚下摧心顔山行即事息馬依叢薄褰裳涉淺沙桃源無俗轍雲谷有人家凍壑含朝雨晴峰聚晩霞相期白社裏共聽演三車泛黄河曽聞星宿海上與月波連西走昆侖坼東流碣石湮魚疑入舟躍馬似負圖傳今日臨秋水望洋私自憐息中山亭子相傳昔人醉千日酒之地日日塵沙裏深愁行路難孤亭自超曠過客暫盤桓霜重飄梧葉雲輕度石欄不能千日醉幸托一枝安雨霽約孟有涯中丞遊山孟先出郭追之不及碧宇隂霏斂青林曉霽分山中期共賞野外復離羣即擬追飛葢猶疑隔片雲行行思無限寒葉落繽紛送焦提學往貴州書生非法吏猶跨五花驄山猺迎漢使海國被王風俎豆夷酋識侏離譯語通爾鄉有名宦好去學文翁送李推官赴髙州天子念南陲君才况抱竒祗將經飾律不以吏為師賈客多踰海居人半雜夷雖言持漢法謠俗自須知送蔣藩幕赴閩中結束千金劒辛勤萬里遊諸侯門下客才子幕中籌風島鯨波湧寒城蜃氣收自公多暇日望海幾登樓休沐家居簡陳約之祗役趨東觀校讐良以疲偶乘青簡暇復與白雲期任性形骸豁忘機鳥雀知求羊何不至三徑坐相思送王生歸蜀明經多不賤嗟子倦遊歸只解攀鱗易何言獻璧非路難裝欲盡客久鬢將稀狗監誰相薦成都一布衣送何學官往金壇近來稱藝苑大率數江南作師君不忝問俗我能諳家擅靈蛇寳人馳白馬談彬彬諸士子莫是出於藍送陳學官往福寧州陳生才亦竒年少舉宏詞自信五經笥堪為一巻師衣冠閩俗變文字海人知莫即傷淹滯三鱣更不欺送莫子良擢舉東歸漢庭方貴少羡爾早翻飛始應公車召旋聞駟馬歸衝星看劍氣逼歲換貂衣想到還家日閨中為下機答陳編修約之柏鄉見寄莵苑俱將命𤓰期獨未歸忽傳千里札坐使寸心違鬒髪行來變丹楓别後稀時時通逺夢恍是薊門非送蔣尉赴金華分野應星躔金華婺女邊微官君勿嘆福地古來傳洞有成羊石山多釀酒泉即令不好飲猶得學神僊送程翰林松溪謫居朝陽四首窈窕玉堂仙漂零瘴海邊煙花違北署鴻雁隔南天水暗疑藏鱷峰髙欲跕鳶應聞前席召誰道去經年天連窮髪國地近卜雞鄉禁闕心偏遶闗河望轉長翻飛看鳳隱消歇怨蘭芳此路饒荆棘思君欲斷腸潮陽何所似雲水日氤氲白晝鮫珠落青天蜃閣分山魈迎客斾海若識人文瀟灑韓祠竹清風今到君南溟君汎棹北地我驅車忽作分飛鳥深慚比目魚啼猿三下淚明月兩離居嶺外梅花發逢人早寄書送孔上公助祭太學歸闕里時賜衮衣一襲國喜嘉賔至人攀上客行來歸周室禮去入魯王城新衮山龍炫餘堂金石鳴聖朝稽古意待爾示諸生春夕皇甫膳部見過索觀鄙作留夜坐蓬扉春色徧柏葉夜筵開愧乏凌雲賦徒煩結駟來疎鐘出長樂明月照章臺痛飲須投轄何言興盡囘輓張舍人二首閣老羅峯之子少小侍中郎人稱張辟彊方隨雞樹息忽是鳳毛亡劎歇雲間氣珠沉掌上光一經何所託重為相君傷象賢超世胄服禮並文儒共羡昻霄鶴翻悲過隙駒藏舟人事盡賜履帝恩孤太息張公子衰榮遂爾殊汲縣謁比干墓下馬登丘壠藂林曲隧通碑因元魏樹地是有周封酒散荒池上人行秀麥中故宫無可問徒此對松風中嶽巫閭控北户䓗嶺奠西隅兹地隂陽合中天洞壑孤黄樞標正位紫氣䕶真圖近接浮丘宅深藏軒后符疏峰連太乙列館象清都圜宫猶漢築馳道尚秦除肅肅泥書秘森森羽葢趨僊遊微見迹帝幸暗聞呼露洗千齡栢霜封九節蒲星榆臨砌發月莢應時敷將訪三山記猶迷七聖途今朝陪廣樂直擬到方壺游嵩山少林寺浄域龍巖上香臺鷲嶺邊山由巨靈闢教以法王傳二室圍蘭若三花接梵筵土中元此地檻外即諸天複岫低衡岱迴軒寫澗瀍雲衣披雜樹虹影度飛泉綴牖皆青壁縁堤盡白蓮神猿叅講幕馴鴿繞爐煙慧月秋逾徹泥珠夕更鮮谷將鐘迸響潭共鏡争圓萬劫終成幻三生併是縁願假金箆力一為照迷川冬至南郊明王敦大報泰畤禮神君位以南離正宵從甲子分月臨太乙館星動羽林軍除道疑登岱鳴簫異度汾聲容六變合海嶽百靈紛封檢微題字屏帷悉畫雲神光人共見天語帝親聞盛跡誰能賦多慚扈從羣奉天殿慶成侍宴饗帝在仁人郊雍景命新方看受釐日即是賜酺辰警蹕喧黄道衣冠集紫宸宰夫稱燕主蕃國備王賔鵷鷺千班序魚龍百伎陳鈞天初聽樂玉食共分珍禮厚過三爵恩均洽四鄰小臣叨醉飽拜舞祝千春朝謁長陵赫赫我文皇恢恢廟筭長定鼎憑天險因山作地藏三泉疏鴈海萬壑轉龍荒雲結蒼梧色峰成金粟岡寢園馴象守松柏孝烏翔清蹕傳虚谷靈旗隱洞房遺弓仙馭逺上食繐帷張臣生良已晩幸此拜冠裳奉命分祀孔廟作後聖禮先師斯文今在兹將陳百官富詎止一牢祠入室瞻遺器圜橋展盛儀樂堪三月聽奠想兩楹時執鬯元公肅捧璋髦士宜鄙儒叨小相端甫奉前規觀州中進賀長至表箋恭述時寓信陽子月開周正朝宗協禹方諸神將受紀四海共迎祥望日扳仙仗呼嵩繞御床天威臨下國星使入明光彤管書雲物黄鍾獻樂章欣逢陽道復願祝帝圖昌登孫登嘯臺即阮籍聞登嘯處晉時肥遁士長嘯此山隂自逺龍蛇跡能為鸞鳳音清浄同河上沉冥異竹林坐超惟黙理妙契守雌心逸駕應難返荒臺尚可臨俯看恒衛水遥見太行岑砌冷疏花發扉扄落葉深寧知千載後更有阮生尋銅雀臺二首玉盌從兹閟銅臺空自寒分香留故愛同輦罷新懽急管銷魂易輕絲續命難何因作雲雨彷彿夢中看漠漠龍髯逺飄飄繐帳空自憐妾薄命不得奉君終望幸非前日棲靈是舊宫翠襦霑薤露錦瑟入松風鸞鏡時猶照蛾眉歲不同誰能更歌舞心折望陵中嵩陽宫柏乃漢武帝所封將軍柏嘉樹植崆峒年長勢更雄已無秦帝幸尚有漢皇封榦比孤生竹根猶半死桐靈泉玉女灌甘雨嶽神通葉密鶯難度枝樛葛易䝉垂隂九華帳弄影五雲宫色掩重巖翠聲含衆竅風賔來虬葢偃仙去鶴巢空非因不材夀春秋自無窮咏天壇梅花名卉來南土竒葩曜上方花遲疑避雪葉早為迎陽靈液滋𤣥榦仙雲拂素裳無言恒斂笑不謝暗飄香夕伴芝房月朝承莵苑霜飛窺玉女鏡舞撲羽人觴擬結千年實先呈五出粧帝羹如可和持此奉明光詠蛺蝶花蜀地羅裁就蜀有蛺蝶羅漆園夢始通何言金翅色翻在碧林中未辨逍遥影爭矜㸃綴工採香蜂趂侣啄蕋鳥銜蟲易濕縁多粉難飛詎少風美人笑來撲誤使損芳藂皇陵行皇陵鬱鬱標淮甸泗上諸峰盡相面衣冠月出鬼前驅劍璽晝扄人不見銅井沉沉碧砌寒綵霞隱映紅䦨干碧砌紅蘭松柏裏迢遙複道中天起石馬隂嘶萬歲山名雲靈風暗捲長淮水深山大澤兩纏綿白虎朱雀紛後先日精月華相迴旋元氣氤氲幾百年憶昔元朝赤縣裂争雄逐鹿俱豪傑一朝此地黄龍飛蝘蜓鯨鯢徒濺血已聞帝王自有真更説南陽多貴人戈矛貔虎三千士礪帶河山十八臣江左金陵扶地軸漢家豐沛還湯沐復户蠲租父老歡重門列㦸園陵肅羽騎千屯䕶玉魚鬛封數仞堆金粟御碑突兀表劬勞百里無人敢樵牧流傳八葉到神孫孝敬先知重本根伏臘烝嘗時不後清明寒食更澆酒貂䄖中使日焚香豸黼詞官夜朝斗新遣撫臣歲祭君不見驪山北邙盡蓁蕪五陵佳氣空糢糊壯哉兹陵從古無天長地久垂鴻圖從軍行送吕兵曹募兵遼海邊軍十萬入雲中烽火照耀甘泉宫戰士三春不解甲天王一怒欲臨戎追奔盡選流星騎併敵齊分明月弓敵氣憑凌恒候月漢兵超忽若乘風已聞舊戍黄花口復道新屯細柳中飛沙颯沓迷亭障組練繽紛皆北向赤羽朝徵六郡材白茅夜拜五丁將吕郎磊犖似劉生許國從來氣不平匣裏雄韜藏豹變腰間寳劍作龍鳴勑散萬金收猛士身騎匹馬出長城鴈行暗結遼西陣魚貫晴開海上營誓同魯仲能飛箭豈學終軍漫請纓建節行行通大漠檄書馬上時能作瀚海連雲太白髙燕然雪照旄頭落知君意氣坐相邀五百神兵集一朝漁陽突騎蛇矛鋭幽并俠客鐵驄驕車上磔人常賈勇帳前戲矟屢争標共道千秋王氣壮直教一戰塞塵消歸來奏凱獻天子功名絶勝漢班超送朱建陽故人三十北上書行到薊門曽棄繻故人今去薊門道雙綬垂腰一何好道旁桃李爛春晴可憐仙令看花行殷勤斗酒與君别落花片片如飛雪昨歲春花滿薊門垂楊陌上始逢君偶然傾葢輸情素交歡毎㑹披雲霧春來春去能幾時聚散匆匆各自知把袂追攀情未已為問閩中幾千里武夷之山天下竒翠壁丹崖共蔽虧可但王喬多道氣應傳潘岳有新詩送陳貢士刺上思州陳生磊磊衆所羡十年不遇常彈劎本期談笑取公卿豈意逡巡向州縣憶從少小負才華飄颻逸思凌綵霞謝眺詩篇差可擬子雲筆札焉足誇終然獻主遭雙刖安事讀書盈五車朅來奔走長安陌人世紛紛笑落魄髙歌白日無誰知用盡黄金徒自惜富貴浮雲不可求且復低眉從薄逰南望桂林雲氣深瘴雨蠻煙多毒淫不辭炎海千里路試取冰壺一片心滎陽行滎陽軍壘髙嵯峨楚漢之戰何其多已向厫倉奪芻粟還令鴻水割山河大小一百一十戰組練崢嶸如閃電存亡呼吸那可知主客縱横忽然變英姿烈烈紀將軍志不可奪身可焚城西夜半赤帝走獨載黄屋開東門漢家社稷蕭曹力殺身衛主誰能識君不見丹書白馬勒元功吹簫屠狗俱開國金臺行君不見七雄割據勢相均得士者富失士貧燕昭信義明日月不惜千金買駿骨郭卿談笑吐深謀海内賢豪競馳突就中樂生尤絶竒按劎魏朝人豈知一朝遇主同心腹親屈君王為推轂指麾燕兵百餘萬蹴踏齊城七十六于今六合無并吞寂寞古臺空復存少年未上麒麟閣且學陸沉金馬門結客少年場行長安少年膽氣粗生來恥作轅下駒買交不惜千金産使氣能􅂸七尺軀探丸夜入平陵郭走狗時過渭水隅朱門傾葢爭言晩白首同心不願餘俠士由來重然諾一言妻子堪相託魯國朱家不學儒洛陽劇孟偏能博别有侯王勢絶倫甍甍甲第接天闉蕭朱自倚金貂貴班許元稱肺腑親青牛翠幰朝朝合錦瑟朱絃夜夜陳門下俱為驚座客堂中皆是報恩人當時顧盻生光彩自矜意氣長無改何言榮耀有沉銷雲散星分在一朝舊客誰過竇車騎新知盡入霍嫖姚始知富貴多親故始知貧賤常辛苦他年北闕競彈冠今日南山空射虎積薪前後遞相踰一死一生交態殊獨有子雲甘寂寞閉門自草太𤣥書歌風臺我來擬上歌風臺豈意臺空只平地琉璃古井亦崩塌斷碑無字苔蘚蘙當年此地説豪華富貴歸鄉多意氣枌榆社裏列黄麾泗水亭前張赤幟里中父老競來窺昔日劉郎今作帝共談疇昔帝一噱季固大言少成事椎牛張宴里閈空進錢今日幾萬計坐中只帶竹皮冠衆裏長呼武負字酒酣撃節帝起舞樂極歌殘更流涕游子誰不悲故鄉萬歲吾魂猶樂沛賜名此朕湯沐邑世世田疇免租税風起雲飛又一時往事蕭條復誰記樵人不識斬蛇藪行客還歸貰酒市臺下黄河盡日流瞬息人間幾興廢同院寮觀閣中芍藥作西掖衡連翡翠城籠煙裊霧百花明祗謂紫薇初吐蕚忽言紅藥已敷英紅藥葳蕤盛艶陽萬年春色在文昌寧同鄴下芙蓉苑詎比洛陽桃李場裁成異瓣千般錦結就同心一様黄金閣披時渾是畫綺樓臨處并凝粧濯枝故向鳳池上裛露偏依仙掌傍仙掌嶙峋對鳳池詞郎侍直鷺鴛齊玲瓏玉珮花間映颻拽羅衫葉下述花間葉下情無極含笑含嬌似相識羞將雞舌鬭馨香欲取䴊冠並顔色翠幕分看態轉新朱䦨斜倚不勝春未採孤根助靈液聊持芳蕋贈佳人南苑秦園盧橘標炎節漢苑蘘荷駐羽旂雲氣自依雕輦集星辰故繞畫梁飛林行草木皆成隊水戲魚龍各合圍更取薫風調曲奏已看暘谷藉光輝午日庭宴南薫應律轉朱旗火帝乘離錦席披榴吐千花承羽葢蓂開五葉拂瑶墀冰盤錯出仙人掌金縷遙分織女絲復道龍舟方競渡銜恩共許向昆池遊龍門龍門嶪嶻拂雲迴鯨浪漰奔動地來一片飛泉千仞落百重疊巘五丁開水同瀍澗縈天色山接崤函鎻帝臺勝槩依稀似禹穴好竒徒愧馬遷才龍泉寺對雨西山爽氣朝來歇倐忽𤣥隂滿四陲雲裏樓臺翻借色雨中花樹更多姿飛虹弄影揺丹嶂瀑水分流射緑池坐覺禪宫倍幽寂憑欄把酒正相宜永年公館夜宿棲遲異域南冠客嘹唳長風北鴈聲静院無朋休對酒髙樓有女獨鳴筝霞光曉伴銀河落露氣宵含玉樹清古往今來成悵望叢臺孤月向人明龍泉寺懐顧南田使君顧以公事不至復惠酒助看山之興琳宫窈窕碧峰隈歴盡巉巖更上臺不見踏花驄焉至虛看送酒白衣來山中泉石誰相賞天末煙雲望屢囘聞道使君能愛客習池還擬接仙杯詠崔後渠書屋碧山學士隱墻東叢菊蕭蕭巻幔中開逕自須同蔣詡著書元不愧楊雄分畦粳稻清溪注對户峰巒翠靄通未許棲遲三畝宅還應宻勿五雲宫題張學士仰宸樓樓藏賜書瀛洲别館切清虛詔賜綈緗出石渠秘典自驚墳索上祥光遙映壁奎餘簷前鳥下疑翻字草際螢來為照書借問鄴侯三萬巻何如今日沐恩殊題張學士陽峰巻陽山秀色滿南州薜荔叢生楚客遊三峽猿聲偏入夜千巖楓葉早知秋僊人結宅雲煙近太史藏書洞壑幽便欲焚魚應未得共言明主待謨謀送張學士歸蜀省親曵履暫違金馬署承歡遙入錦官城欲從狄相雲間望却向王陽道上行旌轉層峰朝雨色舟迴極浦夜猿聲到家已是初冬候聞道林中笋又生潞河别林汝雨提學浙江君去㑹稽何日到諸生湖上待花驄定因立雪知游酢不獨傳經似馬融行載圖書邀海月坐移帆舸信江風剡溪見説好山水苦欲相從奈轉蓬送黄叅政赴陜右黄子風流世絶倫翩翩江海謫仙人紫薇開府勞分陜白馬乘春逺入秦三輔煙花迎使節五陵豪傑望行塵丈夫得意應如此誰笑蹉跎白髪新送項膳部遷之南行兼呈劉祠部春流瀰瀰碧波深送逺其如南浦心魏闕幾年叨結綬江臯千里惜分襟君行白下貪雲卧予滯金門笑陸沉郎署故交如問訊邇來惟有越人吟送高行人使琉球天王玉册頒三殿漢使星槎下百蠻鬼國至今通象貢樓船何處度龍闗海迷南北惟憑日雲起蓬壺忽見山壯志不愁經歲去安流應是計程還送王侍讀赴南都玉堂學士賦南征躍馬鳴騶出上京奉詔明光新佩印校書天禄早知名石頭城下春流滿白鷺洲邊芳草生此去周南異留滯看君到處即蓬瀛送樊大夫㑹朝長至中宵緹室吹葭管候曉𤣥堂駕鐵驂天子迎陽疏玉户羣方獻夀拜金函預占黄道卿雲見漸覺朱城淑氣含擬欲從君觀盛典使星猶自滯周南送周雲卿之任通山湖南此去意何如緑浦清楓萬里餘地僻且看衡岳雁官貧豈食武昌魚千家鑿井分江水幾處開田傍石渠由來撫字惟良牧天子他年有賜書寄周中丞備禦闗口牙旗髙建白羊東鼓角殷殷瀚海空雪後錦裘行塞外月明清嘯滿樓中幕南五部思歸義薊北諸軍盡立功燕頷書生人共羡一朝投筆去平戎送施貢士子羽南行何用相逢歌莫疑感君落魄不勝悲長鳴自許驊騮並髙志寧求燕雀知己道羣公能倒屣也應天子幸同時金陵樓閣秋雲裏肅肅遙瞻鴻漸儀送人上陵作玉園霜露向秋澄節序初臨祀事興恭將圭璧朝羣帝遥奉馨香薦五陵祠壇渺渺神光下路寢熒熒燎火升宣室于今敦孝感還歸早慰聖情凝覽任少海吏部慶都留題悵然懐人因次其韻帝京冠葢同遊日曽忝聲名李杜齊碧樹不堪思逺道綵毫何意覩新題書傳劎閣鴻猶阻月滿燕闗鵲未棲尊酒論文那更得暮雲回首雪峰西贈袁御醫芳洲家本東南海上村翻因避世向金門熊經自信窺真訣鴻寳還將獻至尊鳴佩偶隨供奉侣下簾長對道家言山人不厭少生事種橘年來滿故園張相公夀詩帷中運䇿九州清共説留侯在漢京賜第近連平樂觀入朝新給羽林兵儒生東閣承顔色酋長西蕃識姓名却望上台多氣象年年長傍紫宸明趙州懐古千秋覇業消沉盡風俗猶傳趙武靈市上美人揮錦瑟場中俠客舞青萍雁門北去通沙磧鳥道西来入井陘欲向平原訪公子蕭蕭賔館户長扄吕翁祠堂世所傳邯鄲夢者也吕翁祠堂漳水曲髙秋爽氣何氤氲松間隱隱鳴仙樂簷際時時駐彩雲浮生一夢誰能度羽客千年不可羣未須白首牽朱紱欲向丹丘訪赤文題劉蕡祠歲暮江山搖落時客來下馬入荒祠獨傷往事堪流涕欲問遺墟不可知璧玉無因終易棄龍鱗有逆竟難披今日登科還我輩對君顔厚更何辭朱仙鎮觀岳將軍廟丹書畫壁閃旌旂想像勤王轉戰時黄屋未歸南狩駕金牌已罷北征師平蕪漠漠前朝隔曠野隂隂暮鳥悲惟有西湖原上樹春來猶發向南枝和陳編修約之禁中雪詩二首建章今旦滿清輝朔雪繽紛應候飛忽飄九陌從風散漸積千門待日晞素影偏搖宫女扇輕花欲上侍中衣最是相如能獻賦霑恩新向莵園歸靄靄同雲覆帝畿銀宫玉宇特相宜飛花遍入披香苑積絮微消太液池三署曉光凝劎佩九門寒色映旌旗亦知聖主揮天藻不羡周家黄竹詞詠夾竹桃海南有桃枝竹故首句云云桃竹舊傳生碧海竹桃今見映朱欄春至分香能共逺秋來花葉不同殘疎英灼灼分藂發密蕋菲菲對節攅不信千年將結子錯疑竹實待棲鸞和詠霧中榴花仙曹飛霧曉氤氲幾樹珍花望不分纎萼䝉茸俱襲錦髙枝撩亂稍披雲初疑葉上緇塵染轉覺叢中淑氣薫為問江頭歌綘采何如𤣥女裛清芬江淹石榴賛曰紅花綘采九月晦日鈞州公館見菊天涯已逼三冬候客舍仍開九日花無那繁霜經雨歇獨看疎蕋向風斜飡英實有騷人興送酒虛疑陶令家想像故園搖落盡倍令遊子惜年華村居二首此下係前家居時作偶然灌園興不是學於陵醉卧松間月行攀巖下藤睢于竊自愧捭闔又無能惟應白社裏談笑共髙僧山人頗好事蓬户掩還開四野緑禾滿三秋白雁來授衣裁短褐飲蜡獻新醅即此堪投老栖栖竟何哉村夜纎月生西浦流光照北林羣喧一以息百籟相與吟始悟丘園裏能生清浄心悠悠何所嘆獨坐撫瑤琴同皇甫子循遊横山二首曲磴行來盡松隂轉寂寥不知茅屋近却望石梁遙葉響疑聞雨渠寒未上潮夫君軒冕客此地欲相招常時思獨往坐為塵事攖幸接金門客相攀桂樹榮峰微片雲度谷静衆禽鳴何年將結社與子共逃名夜宿王氏莊微月掛孤壁四山何悄然因穿蘿徑去忽造竹林邊叢木深寒氣平蕪淡野煙徘徊興復盡還就茅齋眠暮春游陽羡南山四首清谿知幾曲惟見白雲深一入蘼蕪徑欣聞樵採吟春鶯未停囀夏葉始繁隂乘此縱長嘯悠然物外心洞口石縱横流泉復有聲柴門何處入雞犬自相迎靈草知昏曉時禽識雨晴非因罷官久誰得此間行到處暗杉松多言路不通却從青嶂外轉入緑園中谷口逢茶女溪邊狎釣童勿嫌疎散甚吾亦是愚公花落已成蹊村村緑葉齊一園通蝶戲千嶂隔鶯啼澗草多名蕙山人舊姓嵇窮歡猶未返忽是夕陽西同林尹遊㑹真菴言尋仙子宅窈窕傍清溪望氣行應近穿雲路轉迷人閒多戲鹿樹老更棲雞願得使君姓留將石上題游馬跡山宿許道士房有贈二首獨住水中央言修不死方開簾見白鳥隔院度清香機息何妨奕神全可却糧偶來分半席遽使世情忘四週環積水信此羽人居鳥下忘機後猿窺搗藥餘閒尋漁父伴自註道家書笑我勞生甚逍遙爾不如題閻泉川副使莊閻侯貧已甚尚有種𤓰田潭巖相映帶農圃與周旋刈秫盡供酒賣蔬時得錢躬耕豈不苦所貴無牽纒謝病贈别高㕘政子業逝將歸舊林復此别知音綰魚慚分薄解劎感交深目送三河使身分十畝吟從兹一相失長嘆隔飛沉罷病歸訪王山人含真一與山翁别年華毎自傷還因解龜後重問養雞鄉蘿薜忩中影鉛砂枕上方鴻䝉常不語何以答雲將送王良醫往岷府獻方曾待詔何事向江干帝側無人薦王門且自安青楓連逺道白首寄微官莫惜囊中秘淮南欲合丹贈春巖王尹朝京赤縣神明宰如君最少年無言似桃李有志笑鷹鸇得暇即開巻長貧不受錢此行人共羡名在御屏前送白尉往湖州君家太湖北作吏太湖南驛路雞鳴近山城樹影含萬川疏沃野百室競春蠶幸此猶吾土微官也自堪送胡主事𣙜税荆州南州饒齒革此去豈徒然言徵山海賦用助水衡錢井邑千金市江門百丈船錐刀未可筭寛大見君賢丹陽别王道思三首久已廢逢迎蕭然世外情因君訪茅屋相送到江城逺岫雪中緑寒流冰下行可堪此時别獨自返柴荆卧病不知久見君三徙官還將鶡冠賤來伴豸衣歡秉燭驚宵曙同衾屬夜寒平生學禪寂猶自别離難書生多落魄羡子最逢時繡服官方顯青衿職所司鑄人稱道術倚馬見文辭徒抱彈冠意迂疎自可嗤夏日聽沈君彈琴詩三首山居足清賞獨恨不能琴偶接青谿客因聽白雪音寒暄乍翻復丘壑轉深沉誰道嵇中散風流更可尋知君技入神一歇一畨新撥處疑非指聲中似有人空山鳴落葉暗水躍潛鱗何獨吹簫客能生隂谷春忽聽使人驚空山迸一聲能令草樹裏齊作秋蟲鳴暫與松風逺還同石磵清曲終人欲散纎月照南楹贈宜興張醫二首翛然一逸民山郭往來頻乞藥從貧士傳方自異人草間收伏莵澗畔煮香蓴嘆息市中客誰知百歲身生長白雲巖仙書宿所探千金方不惜百草味俱諳採藥行山外藏身住市南獨抱文園病逢君試一談次韻贈陳后岡昔日京華居同君直玉廬蛾眉寧見妬樗散自知疎佩印紫薇署垂綸滄海魚為農吾已矣作吏子何如九月八日作日日閉門坐今朝復如斯窓中見風雨始知重陽期海燕已辭主黄花未滿籬余心久委化何用惜良時送真州蔣生至宜興親迎歸相門甥館得才郎文藻翩翩貌復揚十年久著鳴金賦一笑今游射雉場江南江北路非逺幾月辭家猶未返他鄉芳草自相留今夕佳期未為晩歸去春洲漲緑濤滿川桃李送蘭橈若使長江作天漢應言仙女度星橋送莆田方生自宜興歸應試聞君誦詩滿三百十年落魄常自惜書生只是數多竒俗子空嘲𤣥尚白那能環堵事窮愁乘興飄然賦逺游荆溪山水清且美屢月貪歡猶未休荆溪茂宰君妻弟思君不謂君能至山㘭水曲日追隨相對渾忘鄉土異君不見荆人刖足售良玉好醜由來隨世俗期君此去早揚眉一戰能亡三敗辱送林宜興遷官南部移家偶愛山中静地主何煩重相敬吾生恥學茂陵郎如君豈是臨卬令誰言陋巷不容車勞君擁葢常造廬誰言簿書日紛糾勞君為我頻置酒五月清溪暑氣微淹留竹裏共忘歸乍看朝霞初冐嶺忽驚夕露欲沾衣清才自合翻飛早一朝西上金陵道請君别後數寄書山中相識日應少題東石草堂圖贈黄松江連山斷若缺一溪百餘折古松三四株爪秃骨半枯聞道閩山乃有此誰將輦載來東吳松江太守好静者迹在風塵心在野若欲還山未得還故託良工為摹寫太守昔年卧茅荆日日看山無俗情醉來向東拜白石誓與此石同死生豈謂金門被羈束復向名藩分虎竹横金衣錦世無比太守只言非所欲乃知碧山不負吾駟馬髙葢胡為乎有時吏散重門閉焚香獨隱烏皮几披圖相對一莞然不覺逍遙數峰裏樵人漁子似相識手招兩鶴勢欲起扁舟却在窓戸間便欲乘虚泛清泚真邪假邪何足問世間萬事亦寄耳雙夀圖歌為叚翁作是誰寫此大椿樹爪牙縮張相攫吞輪菌偃蹇據絶壁氣凌萬木皆兒孫似鼻似口挺竒榦半枯半嫩蟠靈根千年神物照魑魅滿山精怪爭崩奔樹上懸泉始一線飛洒樹裏成千片匡廬瀑布不可尋忽向今朝眼中見立石復似五老峰雲氣糢糊露頭面可憐此樹與雲石蒼然一色誰能辨石間異草何其多紫芝伏兎森交羅仙萱自是百草長緋葩翠葉呈婀娜上承老樹賴嘉䕃亦如松柏掛女蘿蕭然相伴歲月晩長養齊霑雨露和吾鄉叚翁住東郭夫妻七十鬢未秃翁家猶子擅丹青手揮絹素為翁祝一枝一莖亦有情五百春秋遞相續請翁披圖應自笑形固可使如槁木贈王君五十歲君家城市裏終歲常閉闗青松白日滿庭内不許俗人相往還看君本是山澤臞年來戰勝身亦肥但道龎公堪自老何須蘧瑗更知非題龍圖世人畫龍得龍皮叔也畫龍得龍髓當其停手凝思時青天颯颯生風雨却怪三年不㸃睛那知一日飛騰去山莊閒居身名幸自謝籠樊白首為農誓不諼慣住山中知鹿性數行樹下識禽言巾車毎許鄰翁借書帙閒同道士翻醉後漸看松月上滿村雞犬寂無喧逰神墩寺次壁間韻二首新雨郊原草木柔葛巾黎杖此尋幽藤垂小徑蟬聲滿苔合荒庭鳥跡留隱几翻經聊習静憑髙望逺一銷憂相逢更是煙霞客携手同為汗漫逰古藤千尺猶自柔布葉垂隂滿院幽楓樹暗隨清磬響山人欲去白雲留談𤣥幸有飡霞侣違世已無食肉憂不識老僧蓮社裏可容携酒日來遊登墩此墩可望茅山藂竹裊裊迎風柔古墩掩映清湖幽斷煙白鳥雙洲逺落日青山半景留耳聽鳴蟬知換節坐移芳草覺忘憂興來更望華陽頂想見仙人駕鶴遊廣德道中蒼山百轉見炊煙茆屋髙棲古樹顛細雨薜蘿侵石逕深秋梗稻滿山田雲中望影迷遙岫草裏聞聲覺暗泉倘遇秦人應不識只疑誤入武陵川泊淮上作楓林望盡見蒼山桐栢飛流入楚闗潮散海門孤島出月明渡口數帆還客夢祗驚青𤨏逺滄波長羡白鷗閒聞道淮南多桂樹朝來杖策一相攀淮上五日泛湖同蔣别駕世和青蘋裊裊漾微風輕舸逍遙暫此同客裏緑蒲驚節換尊中清酒覺愁空一徑荻蘆行不盡數洲魚鳥戲相通向晚前川簫鼔發猶疑風景似江東聞復官報寄京師友人姓名不復挂朝叅魚鳥由來性所耽篋裏符經都已廢山中藥草漸能諳踈狂自分三宜黜懶病其如七不堪深謝古人推轂意莫將陽羡比終南代柬寄京中舊游莫須彈鋏嘆無魚自愛山東搆草廬雨後亂蛙生敝竈秋深落葉伴閒居身隨老圃偏能慣論學潛夫愧不如故人休訝無相訊中散從來懶作書寄贈曽郎中再入禮部文昌秘省倍光輝傳道仙郎去復歸三署㑹應尋舊草五時猶得賜新衣官閒常似遊丹壑賦罷多堪獻紫微徒使昔年同宦侣頻於清夜想音徽家居贈别陳僉事約之已甘蹤跡滯丘樊暫逐行麾思欲翻才薄最宜明主棄身貧獨感故交存蒼苔掩徑誰相過芳草懐人未敢言知君王事方鞅掌不記於陵長灌園臨清十五夜柬陳太史約之行人向月占消息一望雲端百感并南去闗山猶未半東升蟾兎已先盈乘槎且傍魚龍宿繞樹那堪鳥鵲驚憶與仙郎當此夜幾回聯珮侍承明贈陳僉事約之生日青春綉服儼神仙早歲為郎霄漢邊問齒方知散騎後論才已是洛陽前官遷栢府多推望經絶韋編不待年衰病無能真自棄慢將犬馬愧君先崔鎮道中晚望懐陳約之郊原極目思依依楚水連天楚樹微逺浦潮生人獨往寒林風静鳥雙歸泥塗自覺朋遊好日月偏催旅鬢稀念爾同為南竄客煙波何事更相違贈别義興林尹遷官移家本為採山薇茂宰風流更可依滿逕蓬蒿頻問訊開尊竹石幾忘歸髙才豈得淹黄綬野性惟甘卧薜衣今日河梁送君後柴闗車馬又應稀次韻贈施道人御氣曽聞老氏柔寄身偏愛水雲幽道書數巻只自注生計一錢常不留賣藥人間應自謫挂瓢樹下復何憂猶言妻子能相累自戴黄冠學逺遊寄題顧東橋侍郎載酒亭後世還聞有子雲為耽寂寞卧江濵門前即是尋山路座上偏多載酒人禄位已非執㦸賤文章真與太𤣥鄰欲比侯巴應自笑不知何日望清塵送樊醫歸南昌山人自小愛逰方尚説懐歸意不忘别友因留隔歲藥還家試解百金裝澄江盡處聞鄉語暮雪深時到草堂願爾常如秋後鴈一年好是一來翔贈張地官督賦江南皇家財賦重江淮浮濟逾河歲歲來豈謂司農方告匱故煩節使逺相催舳艫接水通千里齒革盈筐備五材民力東南已如此因君一為獻蘭臺贈南都莫工部子良夏至齋宿署中萬乘親郊幸北宫千官齋祓兩都同靈光正想泥封上清夢遙依輦路通煙散玉爐知晝永星分銀燭坐宵中聞君已就汾隂賦猶向周南嘆不逢送彭府倅進賀聖節表曽叨執㦸侍楓宸猶記呼嵩拜舞辰獻夀頻將金鏡拂入班許覩玉顔真自憐拙疾辭明主因卧丘園作外臣今日送君何所道祝堯長比華封人宜興舟中讀徐養齋詩稿因思奉别之久悵然有懐二首清溪南望五湖連竹樹隂隂兩岸間桃李孤村春欲盡蒹葭逺水思俱聞散帙曲中驚白雪巻帷天末見青山故鄉共是投簪客猶恨髙蹤不可攀昨歲相逢冰雪深忽看春色獨驚心清風毎憶人如玉嘉句堪言字比金四壁荒廬􅂸自老連洲芳草共誰吟思君坐惜年華暮明月扁舟試一尋覽徐養齋見懐毛古菴及小子之作存没感懐和韻早歲曽陪履杖遊遥思墓木已三秋美人去後空聞笛芳草歸時獨倚樓世上玉顔還易老山中石髓杳難求却慚司馬頻相許擬向清湖共釣舟和徐養齋移居二首何年挂却侍中冠新築山居一畝寛種黍聊為終歲計移花應待早春看門依緑樹人稀到身謝紅塵夢亦安更是謝家兄弟好長吟池草對江干窈窕巖阿叢桂秋清谿一曲草堂幽荒園自向閒中翦靈藥多從病裏收葉上題詩應滿樹沙邊載酒不驚鷗莫道東山淹謝傅蒼生日夕待嘉謀題贈施心菊醫士聞道仙翁昔種菊君今對菊獨凄神蕭條三徑猶含露悵望深秋似有人肘後傳方多已試鼎中留藥不嫌貧相從何日東籬下願乞餘香慰病身贈江隂陳君幽棲選地傍江濆高士風流宿所聞身著薜衣稱隱吏園多橘樹比封君琴尊不厭丘中賞魚鳥堪為物外羣怪爾眉間多道氣年來曽讀五千文寄劉範東提學不材因得返園廬窮巷猶存四壁餘生計十年思種樹病身終歲强移書山僧白社容相往長者髙車日與疎疇昔虚䝉國士待於今樗散更無如題伯祖平樂守素齋翁像國史已收循吏名蠻方猶憶使君清祀留桐縣如朱邑文諭南夷比陸生公有華夷解諭交趾湘江又見棠花發公嘗令零陵而余父於公為從孫又守永州灕浦還聞俎豆成清江傳家自公始髙門大纛豈為榮和朱子學遷居辛勤四十有此居生事蕭條只晏如行李隨身一長鋏疎藤挂壁數椽廬愧無厚禄堪助汝實有髙文能起予獨惜揚雄名位薄世人誰識太𤣥書程副使輓詩同年舜敷之父帝里風煙幾度逢此行復與仙郎同傾城冠葢通家後故國江山對酒中老憶舊遊經畫省閒尋芳草到禪宫亦知今日遊魂處多在清淮白露東嘉靖丁酉秋余始見公於金陵公留余飲酒自言少時為太學生始逰金陵後官於郎曹居此者十餘年自閒居以來常思雨花牛首之勝輒為之慨然已分此生且休矣今老且病誠不自意復能至此每過舊遊處歴歴如昨日事乃知江山長在而人命有極牛山之淚可復下乎語畢公掀髯而笑余亦歡飲盡醉别去至冬而公卒葢别公後纔四月也嗟乎公而有知尚能復來金陵矣乎故予作詩以哀公叙金陵事特詳云元夕詠冰燈正憐火樹鬭春妍忽見清輝映夜䦨出海蛟珠猶帶水滿堂羅袖欲生寒燭花不礙空中影暈氣疑從月裏看為語東風暫相借來宵還得盡餘歡庚子歲海印寺再舉同年㑹紀事四首此下係春坊時作伐木張新燕攀鱗憶往時重來散花處更是聚星期玉佩皆鵷侣金河即鳳池獨憐丘壑質還復接芳儀淨院早凉生佳賔四座傾花間重識面塔裏舊題名對酒憐萍跡聞歌想鹿鳴十年還此㑹那得更無情故遊經繡陌初地入松扉可那看花伴年年漸覺稀一鐘收宿雨雙樹帶餘暉若問龍池劫誰能不醉歸梵宫鄰帝苑長此集儒紳檻外諸天界尊前四海人星霜别後鬢花月向來春且共攄籌策雲臺早致身得薛君所寄三逰紀興刻中有楊方洲見懐之作葢别去已十餘年矣撫巻慨然用韻奉答昔抗萬言疏還歸四壁居誼才應共惜黯戅更無如顧爾猶巖壑慚予濫石渠聖明思直諌早晩下徵書送黄翠巖赴松江推官任君本儒家子新詩更出竒自宜金馬署暫拜爽鳩司海國收魚稻桑田賦繭絲南州饒土物知爾一無私送沈君守寧波五馬去䟃􅑗孤城積水含地收蚶蛤税人與龍蛇參夷貢珠頻入僊書穴可探清貧君已慣海味不須甘送陸舍人調遼府長史十載紫薇郎長隨玉輦傍忽辭漢天子去謁諸侯王夢渚陪游獵蘭臺佐羽觴子虛今在楚作賦有輝光送王舍人往崑山為顧相公營墓明主敦耆老藏山借寵恩使臣出左掖秘器給東園舊路吳中樹新碑海上原平津衆賔客試問幾人存聞石屋彭君置生棺有感為賦四詩青山結净因囘首跡俱陳司馬四壁宅榮期百歲身文犧幸知免行蟻待相親試料還真後誰為倚户人隱几嗒然安疑君是鶡冠道書肘後繫人世鏡中看家本無千橘生常卧一棺不因兹下淚任爾雍門彈苦欲辭簪紱歸來掩故園無過六百石只對五千言倚樹看蜩化逢人笑舌存老龍且莫去為我發狂論吾與爾皆夢相看一笑時拘拘亦何惡役役尚如斯藂桂山中約枯槎海上期胡為更羈緤有愧故人知寺中訪後渠崔侍郎不遇次韻為訪高人館聯鑣出近坰並從金地入不見玉山形榻尚留僊麈雲疑隔使星無人問竒字載酒只空亭濟上别錢副使木落村逾迥洲迴水更包亂泉舂急峽短日漾寒郊問俗非吾土逢君似舊交笑談方此始何事又相抛㸃蒼山歌贈雪屏趙考功㸃蒼山十九峰峰峰巧削玉芙蓉炎天赤日雪不融峰頂湧出十九泉一峰一泉相縈纏流到峰前共一川雪花亂落緑波裏疊島連洲鏡中起是為巨海名西洱䝉舍當年控百蠻山水中間鑿兩闗一夫守此百不攀聖代垂裳九夷附此地千秋罷烽戍洱海行人日夜渡剪除蓬藋疏街衢歌鍾綺衣盈路隅昔日不毛今雄都山中雞犬散不取山下烏蠻種禾黍况乃儒風似鄒魯紛紛犀象走王庭怪石亦具山水形盡輦中州作畫屏羡君結廬山之窟窓裏諸峰互出没夜夜讀書常映雪十年簪笏繫朝班位髙官要身不閒惟有清夢到故山余亦平生好竒者一説名山心若洒何時與君共坐雪峰下李中麓文選藏書歌中麓子最好竒平生苦心只自知破塜將尋姬氏籍鑿山欲出禹王碑鳥篆蚪文焚後字白雲黄竹刪前詩藏在隂厓及海窟神物守護誰得窺自從掇取歸君屋但聞胡山鬼夜哭汗牛詎止盈五車插架應知滿萬軸開函几席生雲煙五色紛紛耀人目家中綾綺割截盡更剪朝衣作裝束中麓子幾歲讀書長閉門自信中郎能一目還輕左氏識三墳邇來下筆作詞賦絶似先年石鼓文却憶射策來京國此時才士紛如雲雕龍白馬爭先後一日逢君皆閉口試問豹鼠君已知解對黄熊誰更有共看飛騰邁等倫早排閶闔上麒麟遂令紈袴生嘆息公卿元是讀書人老大無聞予自憐論交多愧十年前可道壯心猶未已時復從君乞一編詹府讌集奉和上宰松臯公三首祥光虹渚應𤣥蒼喜溢仙曹薦羽觴匕鬯萬年徵子聖股肱一德見臣良袖携香霧東華上履曵星辰北斗旁共説疑丞歸大老競將禮樂贊靈昌御苑先春萬木蒼宫雲裊裊度瓊觴鵷班並引金貂貴鴻羽全收玉署良分日傳經清禁裏罷朝起草紫宸旁恩波忝竊安能報願祝千秋寳厯昌玉津晴望鬱蒼蒼環珮初臨試紫觴並向鳳池開勝㑹早從麟角識元良衣冠迥出商巖上雨露偏承幼海旁自愧承華箴未就謬將彤管奉明昌送王翰林浙江兵備副使同時詞客不如君一劍還將静海濆雞舌舊從香署吏虎符新領伏波軍帆檣萬里輸鮫織樓閣三秋吐蜃雲自笑馮郎將白首欲從幕下策竒勲送鄒東郭掌南院最憐江左風流地暫作周南太史公通籍總稱鸞掖吏分曹獨向鳳臺東香携漢署沾新綬花近秦淮瞰故宫此去談經門下客幾人相對坐春風贈吳山人歸自京師山人不解機心事早歲藏珍學鹿門住傍巖崖惟四壁賦成金石幾千言偶遊卿相多懸榻歸去蓬蒿正滿園京洛豈無知己在看君終是厭煩喧贈許太宰卿家勲貴似諸袁兩世三登八座尊接席貂蟬開甲第成隂桃李在公門身延白屋頻推哺官借青宫獨拜恩天子行將問黄髪老臣何以贊嘉言宿雙塔寺林東城羅念菴誤於郭外相尋不遇有作見寄用韻奉答謾向金門學隱淪獨遊花院散凉氛諸天只在人間世並馬誰尋野外雲白日金輪臨户映香街笙管隔墻分化城本是迷來路莫訝幽人好避羣次韻贈湯將軍將軍故中山侯之孫也將軍妙筭古人同料敵常如在目中銕騎連營寒映月樓船跨海夜乘風玉門烽火今猶急桂嶺珠璣久未通却笑封侯應有種看君百戰立竒功荆川集巻二欽定四庫全書荊川集巻三明唐順之撰詩自述此下係後家居時作祗為抽簪早歸來已四春本非食肉相猶是飯牛身負郭無新業灌園有舊鄰磯邊獨釣客隴上偶耕人相見一相笑吾今罷問津宿游塘書懐二首脉脉常多病睢睢竟寡諧鷽鳩知分量槁木任形骸蟲語喧清夜藤花媚小齋逃虚何足嘆心迹幸無乖雨過草木好夜來池館清露蟲疑燭影風樹答書聲似瓠甘無用為羶厭有名且師河上叟毋使慮營營題陳渡莊經時不到此花落徧庭蕪開館猶如客憑軒忽䘮吾蝶飛看栩栩鳥喚聽烏烏便欲題丘壑於今總姓愚㞯亭遇盗次韻枕書覺已倦挺劎忽相求驚起游仙夢虚疑賈客舟齎糧十日少載槖一身浮澹泊堪為笑將何謝爾偷病中試新茶久不窺園圃多應徧落花生涯只本草歲月又新茶婚嫁身多債詩書眼尚遮病來都忘却恰似老僧伽泊舟郭外有感時旱灾甚愁多畨夜短村郭又雞鳴更聽鄰舟語行看海日生新秋河漢影竟夕桔橰聲誰能訟風伯一使甘霖傾同褚生滔徐生大復夜過城濠水榭作二首出郭即山家孤亭更水涯人開池上酌蓮吐月中花清籟微微至明河漸漸斜坐疑塵世隔雞犬亦無譁祗堪成獨往詎意得同羣柳色秋將近烏啼夜欲分細吟西澗草閒誦北山文縱然逢醉尉不是故將軍時居人有訶問者游永慶寺示諸友村墟正三月春服領春風飛鳥機心外青天佛眼中觀心猶是障齊物亦非同何處叅真訣顔生昔屢空題金山寺付僧惠傑四首何處尋龍藏停橈聽梵音中流一塔影逺樹萬家隂僧定潮來去月明江淺深試將空水相堪比慧公心隱隱帆檣外分明見法幢川光孤斷石井脉割寒江折葦僧歸渡觀潮客倚窓一窺龍女偈坐使戰心降憑虚聊騁望面面荻蘆秋坐據三生石心隨萬里流黿鼉争出没樓館定沉浮向夕煙氛歛珠光似可求法界元無著寥寥空水雲鐘聲潮外住佛相鏡中分經為魚龍設人將鸛鶴羣慈航如可借不厭往來勤登常山山亭次壁間韻二首關通百粤㑹地帶上游雄車馬年年客塵埃滚滚中憂時譏喪狗逃世托㝠鴻出處將誰是徒令懐古風平生好竒士撫景氣還雄棧度盤蛇際灘行磨蟻中客心南北水世事去來鴻聞説仙山近泠然欲馭風過清溪莊值主人不在岸岸夾叢竹清溪幾許深君從城市隱余向碧山尋翳翳孤村景刁刁衆木吟還看題壁字想見閉闗心題清溪莊三首贈顧副使阮生常避俗平子正歸田種秫供生事為樓佇列仙沙行隨鷺跡湖泛趂漁船月下聞髙咏應多感興篇城郭往來久獨憐湖上居素封千樹橘白首一牀書山客秋分蜜溪甿夜捕魚横金豈不貴此樂復何如地即梁鴻宅溪連范蠡湖霜天榮橘柚秋水戲鷗鳬從宦元非巧名丘亦是愚欣君遂始願遶屋樹枌榆贈王山人自笑久磷緇還真已是遲偶尋赤松子更結白雲期短褐身將老微言世莫知吾生同智北從此問無為贈山隂陳千户病卧毘陵三首陳故毘陵人也問子來何處云從剡水隂越吟多病客吳語故鄉心尺牘人爭羡一言余所欽由來絶絃意今日為知音到處能驚座知君是姓陳小言工作賦大隱不違親倒篋酬寒士投書絶貴人吾將從汝去共醉若耶春髙牙將門子何事老蓬蒿坦蕩從吾好浮沉任所遭行窮五名岳家住一漁舠尚覺雄心在逢人脱寳刀周蓮渠以詩問病次韻詩書能作祟齒髪自多愁且效漆園放還同蓮社投樗材非世用藥石拙身謀脉脉淹時序空貽知己憂載疊前韻二首贈蓮渠十年不入市一飲復何愁秘籙時堪展華簪久已投只有歸田賦曽無問舍謀營營憐俗子得失盡成憂字許門生問詩從海上求養真人伴鶴寄傲屋如舟得喪驚蕉夢榮華覺梗浮邑中有耆舊應使俗回偷贈郡倅綱運之子從王事秋江曉問津泛舟千里役行篋一官貧淮海雄畿服瑶琨貢國珍聖明如有問正可繪流民時江南旱甚送人赴真定幕幕下繡鞍來滹沱冰未開股肱稱大郡帷幄選名才鴈起分秦塞雀棲辨魏臺雲山自可樂况得庾公陪贈馮午山提學吳俗今應變楚材昔共聞試看鑄人術豈尚雕蟲文驄馬迴江樹絃歌散海雲史書徵德化更是一馮君漢史大馮君小馮君政如魯衛德化均贈吳賔湖幽棲謝俗客相對只清湖野服裁芳芰時蔬剪緑蒲行吟向漁父著論比潛夫前洲雙白鳥識得主人無題徐君淵泉號磊磊長髯客人間久避名獨因南澗賞遂與北山盟流處玉琴響繞來茅屋清風流堪此地今古一徐生贈王思東號王君祖為中舍以兹百年感東望一欷歔氏族王孫後弓裘世澤餘時攀臯上樹獨對齋中書尚説傳竒字知君辯魯魚贈熊南沙郡倅入賀萬夀節三首去去朝元使先年漢署郎遥將華封祝再惹御爐香近侍陳鴻寳仙人捧御床試看舊朋輩多在珥貂行畫省何年别頻驚江上楓因兹萬里㑹還向五雲宫恩承天語潤班許近臣同自信真心在羞言藉子公一朝辭寵辱終歲事沉冥只可羣麋鹿那能出户庭北邊頻候月南紀正占星時火守斗長策須君輩將何獻帝庭壬子陸生南陽褚生滔赴試與之叙别不覺坐至夜分因作二首齒長愧一日經傳在兩生攝衣常共席連茹亦同征夜露澄杯氣秋河澹月明忘言吾已久欵欵見深情汩没嗟來久前儒與後生争矜腐鼠得誰逐冥鴻征黙坐蛩秋語窺書螢夜明舊游看籍湜應悉此時情韓子云籍湜輩屢指教能不叛去否常山懐羅念菴本為窮幽賞非因避世氛鄉心吳水盡客路粤山分名姓休相問漁樵久作羣忽思鸞掖侣日暮倚停雲夀詩早謝浮名絆生涯常宴如春來江上棹老去枕中書東郭閒居慣南榮世慮疎看君足道貌自與俗人殊董進齋夀詩自愛懸車早經今十歲餘薄逰滄海客大隱市城居坐閲人間世時翻肘後書里中問耆舊羡爾更誰如蔡南村夀詩蔡泰伯里人瀛之父我識南村叟臞然一逸民卜居三讓里擊壤百年身城府入來少桑麻樂處真一經今有子環堵豈嫌貧夀王生革母之子門生秀傳經契獨深還因飲冰志更識和丸心貧供江水饌詩獻柏舟吟古來推善養尹母復如今夀慕菴六十皚之父家世法真餘清名人不如髙年推亥字大隱寄廛居逸客閒相過機心老更疎多君能教子餘慶在詩書贈徐學琴六十大復之父改歲周正月推年絳老人山田新刈秫茅屋久藏珍白雪絃中意青衫物外身贏金亦何羡有子不為貧題孤山林隱居祠二首孤山春欲半猶及見梅花笑踏王孫草言尋處士家塵心瑩水鏡野服映山霞岩壑長如此榮名豈足誇碧水年年色幽人復此遊不因同所好那得獨相求山鳥矜春語湖煙淡夕流思君忽自笑信矣一生浮岳將軍墓國恥猶未雪身危亦自甘九原人不返萬壑氣長寒豈恨藏弓早終知借劍難吾生非壯士於此髪衝冠吳江三忠祠祠在太湖東畔三忠伍太宰張睢陽岳武穆也廟枕洞庭波招魂薦楚歌靈風鼠雀避落日鹿麋過東國終為沼南兵不渡河江淮形勝地保障近如何一日屬鏤賜千年墓檟秋死應為厲鬼􅀾豈覔封侯吳越車書混江淮戰伐休幸逢全盛世此地弄扁舟松闗蠡南雜詩為吳頥山副使作月出照松闗松隂正滿地恐有山僧歸終夜不須閉梅塢層冰結平川積雪埋髙樹無處寄幽情但到梅花塢筠徑面面隔深竹茅齋在何處遥聞犬吠聲試從此路去石丈自是太古人一身衣百草年年只在山憐爾亦枯槁蒼翠亭風來松濤生風去松濤罷雖非叅禪客暫此學觀化㑹逺樓層樓對迴溪溪邊草新緑不是傷春人聊騁千里目元陽洞混沌遇儵忽誤被鑿一竅寄語談𤣥人此中可觀妙小虹橋採花與汲澗幽事俱在山朝向橋上去暮向橋上還迎仙館空齋寂無人草木自森蔚不因羽客逰安得有雲氣禮星臺昔在明光宫日侍北斗傍此時卧空谷頻望北斗光靈芬精舍山人愛長生辟穀亦云久何以濟朝饑紫芝大如手山田從横亂峰裏忽此見平田不須抱甕汲自有峰頂泉山池百泉自奔注更不費疏鑿雨歇天氣清臨池看洗鶴茅亭孤亭簇羣岫宴坐増悄然主人何所作多應草太𤣥良友軒竹里中耆舊多談笑毎相聚日暮各自歸此君獨不去聽鶯閣春催金谷曉一望百花齊不作遼西夢從渠著意啼己酉八月十八日觀潮作秋空忽爾色黯黲萬竅怒號山震盪冥冥混沌一氣來游人共指潮頭上初時映海色尚微及至摧山力漸壯澒洞吳越懼一壑幻戲人獸驚殊狀滿空煙霧走玉龍萬里川源豗白象雷鼔鞺鞳馮夷舞日車出没鮫綃漾海神珍寳不自惜歲與江妃一相餉須臾漲盡勢稍歇依然宇宙囘清亮昔人説此已愈疾何况臨流恣疎放賀金翁夫婦雙夀詩翁舉人子韶庠生子聲之父也金家兄弟早空羣倚馬便作萬言文玉樹輝輝照前後弱冠英名在人口黌舍同逰愧我先相見毎稱吾小友曽説而翁好避喧隱身西郭如鄉村一生愛誦逺公偈累歲不識縣令門夫婦齊年人共羡九月開筵對歸鴈請看二子接翅飛好將文繡作斑衣題贈喬僉事兼為乃翁封君夀使君昂藏闗西客弱冠聲名已籍籍著書毎欲凖盤誥作賦時能擲金石為郎幾歲歴金華還聞建節度褒斜錦水秋霜看避馬杜陵春草正思家君家住近谷口東而翁亦有子真風游宦勿言親舍逺金牛元自接秦中希周兄八十三十年前事未遥兄時鄉杖我垂髫豈識負劍從長者惟解戲雞逐馬誇輕蹻三十年後事已更驚看鏡裏白髭生問兄何為却少壯應是黄金鑄已成題偶耕書屋送謝右溪西歸兼柬左溪長君昔挂西曹冠青楓漠漠滄江寒少君復謝薇省吏身世飄颻忽如棄歸來對坐四壁居篋中一巻種樹書誰言丘壑足枯槁折腰昔日今何如五月黄梅雨茅屋麥苗滿田蠶上簇童稚欣欣笑相語但免饑寒百事足吳國樗生少好游三仕無成感四休已道栖栖非我事將從沮溺問良謀題夏中書畫竹古來畫竹多少人葉葉枝枝輳成幅獨有中書似老文解道胸中有成竹辛苦欲得此君意屢歲清齋斷葷肉偶然興到始一灑萬壑寒聲忽滿屋秋殺春生併一時幾株抽葉幾株秃披紛蛇蠖爭屈伸數寸已覺千尋足中書醉墨滿人間此幅風神更不俗勸君風雨好收拾葛陂恐與蛟龍逐卓小仙草書歌莆守寄我卓仙書北窓閒佇時玩展吳人本慣見龍蛇對此真形驚走轉環譎東海黄公符蒼古太廟姬王瑑曲處素娥欹舞腰勁來壯夫摐狼銑藤纏老樹千尺挂鷹攫寒厓百鳥愞已覺人間出草聖却訝空中墮雲篆古來草聖誰擅塲酒旭僧素頗中選漏痕釵股那足竒脱帽露頂定漫衍雖然奔放不可羈筆墨蹊徑未盡遣傳聞卓仙形貌異蓬頭濶口足爪跣胸中光怪秘不得漏洩機緘在此巻軒轅道士罵俗書寫出靈文世不辨卓仙作字不用手唐生識字亦非眼説到手眼兩忘處作者識者俱一莞幾時杖策入武夷試問仙郎叩金簡楊教師鎗歌老楊自是闗東客短衣長軀棗紅面千里随身丈八矛到處尋人鬭輕健謂余儒生頗好武一揖滚滚發雄辨坐驚平地起波濤蠕蠕龍蛇手中現撥開雙龍分海嬉攢簇兩蛇合穴戰爭先儘教使機闗縮退誰知賣破綻目上中眉左傳事猶自哂綿中裹銕那能見滿身護著不通風百步攛來激流電飛上落下九㸃丸放去收回一條線問君何為技至此使我憑軒神􅀈眩答言少小傳授時五步七步畫地踐邇來操弄三十年渾身化作枯樹簳心却忘手手忘鎗眼前只見天花旋乃知熟處是通神解牛斲輪安足羡因君亦解草書訣君鎗豈讓公孫劍古鏡歌瞿翰林來自汴西亭王孫寄此美人昔日開匣時兩面含嬌自矜戲一朝委世抛珠玉獨殉此物不忍離埋没土中幾何年大塊為工再鑪鞴砂精汞火日夜蒸噴作丹朱滿身痣中凝一㸃秋露珠宿世銅胎盡銷棄有如錬骨老臞仙血肉都捐祗靈氣神物安能久藏匿化作白蜺躍出地銀鏤細細髲髢縈𤓰皮津津流水漬山人何處得此寳王孫逺自夷門寄良工為我重開闢一鈎剖出千齡閟初時混沌蟠𤣥黄倐忽晦明分面背清輝逼人心髓寒驚詫蟾蜍墮簷際却憶朝朝鏡裏人已謂衰容止如是今朝覽鏡咄自驚短髪絲絲見凋敝濕灰餘色轉分明皺縠新紋大髣髴雲臺勲業已如夢名山著書安可冀本欣始識真面目囘首壯心一憔悴照罷還如未照時好醜依然都不記峩􅔞道人拳歌浮屠善幻多技能少林拳法世罕有道人更自出新竒乃是深山白猿授是日茆堂秋氣髙霜薄風微静枯柳忽然竪髪一頓足崖石迸裂驚砂走去來星女擲靈梭夭矯天魔翻翠袖舑舕含沙鬼戲人髬䰄磨牙贙捕獸形人自詫我無形或將跟絓示之肘險中呈巧衆盡驚拙裏藏機人莫究漢京尋橦未趫㨗海國眩人空抖擻畨身直指日車停縮首斜鑽鍼眼透百折連腰盡無骨一撒通身皆是手猶言技癢試賈勇低蹲更作獅子吼興䦨顧影却自惜肯使天機俱洩漏餘竒未竟已收場鼻息無聲神氣守道人變化固不測跳上蒲團如木偶日本刀歌有客贈我日本刀魚鬚作靶青絲綆重重碧海浮渡來身上龍文雜藻荇悵然提刀起四顧白日髙髙天冏冏毛髪凛冽生雞皮坐失炎蒸日方永聞道倭夷初鑄成幾歲埋藏擲深井日淘月煉火氣盡一片凝冰鬭清冷持此月中斫桂樹顧兎應如避光景倭夷塗刀用人血至今班㸃誰能整精靈長與刀相隨清宵恍見夷鬼影邇來邊圉頗驕黠昨夜三闗又聞警誰能將此奠龍沙邊氓萬戸忻安枕古來神物用有時且向囊中試韜頴劎井行時有白氣屬天仙人擲劎不記年至今光怪猶未歇薄蝕日月騰金晶青天倒挂雙白蜺曽斬妖蛟帶腥氣寒泉滿甃誰敢汲只恐仙人求故物但看水底飛霹靂陳渡草堂二首皂衣非復漢庭郎敝緼深冬卧草堂貧薄不羞畜牸計沉浮也逐鬭雞行殘書閣盡經旬病異味嘗來百草香獨愧頑心猶未化十年學道幾亡羊近市偏逢食有魚閉門不問出無車牛衣聊自對妻子蜡酒時將洽里閭世網幸疎如野馬微名猶在愧山樗亦知農圃真吾事春至頻翻種樹書小樓宴坐不入名山不世間嗒然隱几置遺編身名瓦礫宜居後人事蚊䖟任過前抱樹蜕蟬司化運隔窓風竹發真詮未登道域終難罷微管還須學測天涉世已如入夢蝶居身未作脱鞲鷹自疑戾契戾契見韓文俗呼捩及終為病欲學墨杘墨杘見列子俗呼眉西又不能金老相逢知法器慈公頗訝似禪僧牛乎馬也從人喚惟一迂儒是本稱嘉興金道士三十年不下牀亦三十年不開口冬夏一絮被自擁余叩之以指畫卓許余入道慈舟者蘇之名僧也余見之不告以姓名渠深嘆異以余為頭陀相也又疊前韻到處迷陽不記年村中厯本逐時編寒烏滿野成禾後社燕辭人落木前戒酒劉伶終酒性遣言摩詰亦言詮青天自是無逃處何事靈均更問天混合髙低齊鷃鳳經過老少變鳩鷹屈伸禽戲憑何訣篆刻蟲雕誤謂能盡日閉闗非酒聖文中子稱劉伶古閉闗人廿年猜謎是畨僧余與翠峯僧往來酬對者廿年此身本自無觔兩月旦先生若麽稱莊中作帶郭頃田屋一尋歸耕自許力能任浮沉袁盎嗤驅狗㢘侈王陽訝化金貯麥舊庾將易穀行鞭新竹漸成林計然七策皆無用小試經綸底似今自述避人不敢厭髙深逃影何如學息隂楚客又成蕉鹿夢漆園未了是非心紛紛世事看花發黙黙天機聽鳥吟可笑維摩眞病在無言説處是金鍼有相士謂余四十六歲且死者詩以自笑古人云死生亦大矣此謂趂日力以進道者言之也苟不進道總是虚生修短何辨焉苟于道有見處夕死可矣然則死生詎足為大哉本是癯然山澤士衰年况自不勝衣色常帶墨縁辭肉形或如灰似杜機睢于久謝偕來衆蹇拙何心知我希世人莫詫方臯眼相馬由來失瘦肥殤子彭耼誰夭夀百骸九竅孰疎親若過顔氏十四歲便了王孫一祼身三載濫叨金馬客幾人共坐絳紗春即今已似前生事何待他年跡始陳人情世事古猶今寂寞空林寄此心賢聖不分聊中酒虧成忘盡一開琴有書終日只掩巻無病長年亦擁衿即使癃然似桑户未逢㸃也是知音學道曽窺天壤意寒儒又是膝攣人只言蔡澤有限夀誰見壺丘不定身貴客懶迎長謝病薄田可飽敢稱貧後來不用問修短已占溪山四十春囊癰卧病作三首節候經春日日隂寒衿獨擁閉門深終朝錬液非仙氣幾歲懸疣是雨淫焦火凝冰鐫瘦骨兒痴女長試灰心總縁病裏悲歌意不為離鄉也越吟春半忽驚狗馬疾年來似是龍蛇辰謝醫少錢長卻藥煖骨累裀聊借人味為補虚一試肉事求如意屢生嗔正愁未了形骸外生老病苦只此身余平生無厚褥止一褥既薄且敝病骨覺冷硬不堪也乃從親人家借一褥襯之平生有厚褥與重褥自今始而余素戒肉養病乃肉食頻年䘮我几堪隱到處逢人席任爭疣贅勿嫌能侈性支離畨笑足全生野蔬入口勝甘脆病骨先時卜雨晴苦訝道人長好懶如今懶病果相成濕入病骨覺爽然則晴覺痛楚則隂雨至矣瘧病作跰􅓷柳肘盡欣然深隱烏皮也自便金冶由他不由我狼胡是病亦是天身先辭宦猶中熱衣未經秋已著綿炎凉反覆須臾事一疾畨令悟世縁小集為人所刻文學從來本不長隱居辭説半猖狂徒令後世能疑孟祗覺前身似姓莊𤣥白何分終覆瓿穀臧奚事總亡羊從今已息掞天口只著農桑一兩章靈芝寺同童元功宴坐湖上髙樓縱逺心復沿湖岸過東林身閒似覺煙霞氣地冷兼無鐘磬音衣裏寳珠應自信苑中靈草試相尋坐來忽散千峰雪對爾無言意轉深登屠翰林仍臺作二首太史仙臺多勝槩正臨檇李古城東五色雲生知海近四圍山逺覺天空閒居作賦青春後幾歲鳴絃明月中不是掖垣同宦侣閉闗那許得相逢一上髙臺興不孤望中總總入虚無煙霏春變隂晴氣草樹天輸海客圖對酒笑將花是伴銷憂誰問土非吾知君苦厭文園卧此地能令肺病蘇時屠久卧疾次人憂旱作歲歲吳儂事水耕朝朝占雨愁雲輕澤中不聞鳩語合田際但見龜文生野老䑛糠猶自得書生炊桂亦何情東南生計已如此聞道山西又㸃兵再遊清溪莊值主人不在次韻桃樹臨溪思不禁扁舟重問草堂隂西湖水落黿鼉石南國霜清橘柚林壟際流泉宜稻性窓前過鹿解人心憶君剪徑相迎處今日蓬蒿又已侵至常熟陳中丞白訓導邀登福山看海二首春早吳山雨半晴有客邀我觀滄瀛澤國冥冥蒸海氣石灘淺淺鬭江聲日月迴旋一島小金銀色相十洲明微風向夕送清響應是仙人吹玉笙久縁迫陿悲時俗海嶠春臨思若何地湧龍蛇爭起陸天投星斗横翻波封疆坐攬風濤壯氣候常看霧雨多才謝枚生能作賦觀潮恰對曲江阿金澤寺中寄松江友人登湖昨夜雨初霽驟覺春衫寒意多逺浦草青送歸鴈夕陽潮上生微波戲窺佛偈翻金字静卧巖扉掩緑蘿伊人只在蒹葭外獨對清尊奈爾何松江金澤寺四首東南巨浸五湖深古寺維舟正夕隂客到山僧罷清磬雀喧晴日下髙林夾洲煙火三家市滿目蒹葭萬里心徙倚不知餘興盡月明還擬聽龍吟三江抱處勢如環野客探竒住不還一望樓臺疑海上稍聞雞犬覺人間幸無漁父知名姓且望山僧共閉闗自笑歸來張季子春時蓴葉未堪攀何年此地開金刹宋代流傳直到今聽法石將山作幻䕶經龍與水増深爐煙裊裊知塵性栢樹青青見佛心可是攀縁渾未盡天花猶自惹衣襟水國餘寒芳草稀偶隨煙艇問山扉窓中怪石如人立天際孤帆伴鳥飛髙齋盡日逢僧語短褐經春換客衣吳江亦是垂綸地笑指星文愧少微天寧寺塵外樓四首瞰郭棲臺誰共登偶携仙客對山僧林煙渺渺人家盡堦日微微花氣蒸浮世閒看飛鳥過機心不遣白猿騰平生自笑支離甚散髪行歌此又曾名山不用逺攀登暫借繩牀我亦僧幾樹鳴禽助禪寂一藂修竹散炎蒸捻花不盡心傳妙對塔嗟將口説騰俛仰百年成滚滚乾坤隻眼更誰曽金門十載笑重登歸去仍依白社僧虚館静聽宵蟻戰逺山時見夏雲蒸已甘樗散終年計恥逐鴻冥萬里騰為問洛城冠葢侣鬢毛銷盡得閒曽閒裏香臺盡日登嘿然一笑又逢僧衣裁野薜緇塵浄飯試山精石鼎蒸大士西方談實相仙人東海説飛騰人間多少亡羊路一一行來也未曽題湖上廢寺禪宫舊枕清湖曲與客尋幽試共登獨樹春深初著蕋空山行遍不逢僧臺荒曽與施烏食城化徒聞駐鹿乘惟有松房明月影年年長似為然燈題龍池菴三首相傳伏虎禪僧開山處山頂有龍井蜥蝪見則雨逺逰為訪白雲巖轉盡孤峰路更南龍見小身時出井虎馴大士舊開菴禪心客思俱潭水古佛寒松共石龕坐對老僧無一事夜深相與説楞嚴精廬原寄北山巖新築髙齋過嶺南谷窈窕間還宻樹石孤危處更虚菴聽經野鹿頻窺户宴坐山僧不出龕客欲逃禪無可醉逺公於酒禁方嚴霽後嵐光散曉巖望中佳麗盡東南三春蘭蕙堪成畹千里湖山併在菴馴鴿下時呈佛性飛鷹宿處見僧龕維摩今日還多病酬答誰將究妙嚴贈菴中老僧僧解相人術少嘗遊歴江南晩歸菴中早從祝髪事棲巖為禮名師毎向南用華嚴事業淨六根成慧眼身無一物寄茆菴厨邊引澗寧須汲松下翻經幾到龕若使焚香能證道前身應説是香嚴嘉靖丁未春余以病客荆溪遂同杭子宣登龍池僧居嵌巖中如鳥巢梯其門以登值二老僧相對煨笋遂以笋供余二人因留宿與老僧坐至夜分談説楞嚴因縁事老僧意甚樸野可愛也明日曉起嵐氣滿山乾坤如混沌狀堦前竹柏亦在摩蕩中咫尺不可物色日且午始開霽則諸峰歴歴澄湖隱映樓觀草樹百里之外若在几前葢宇宙間晦明不常若此既午出往石屑石屑兩山夾澗山高百餘仞而澗道僅闊四五十步人家縁澗以居惟亭午則見日色葢其勝又與龍池異觀矣既午飯遂從西霞步入舟意興悠然如有得也嗚呼此豈可與沉酣聲利者道哉遂書以貽子宣使藏之贈黄子晦故黄教授子黌舍相逢憶聚星予慚入室爾趨庭子長能繼先人業王吉曽承博士經萬里風煙還命駕廿年踪跡已如萍衰顔重感青衿日一笑尊前喜愧并寄周臺官二首時余將往南郡南臺分署沐恩初官是疇人世業餘龍吐珠璣天地轉星塗黄赤石甘書泰階平處瞻雲闕玉漏清時直禁廬應有道人扣闗者試看紫氣近何如文史元隨供奉間南都祕省更清嚴抄書暗譯西畨厯草奏多陳南極占日下有雲朝紀瑞臺中無事晝垂簾倘覩少微思處士漁樵已判此生淹家居喜袁芳洲相過賦此為贈三首相逢京國最情深休沐歸來毎共尋異品對飡呈海味道衣便坐解朝簪迂疎北闕上書日寂寞江潭俟罪心已分與君成契濶一杯還此幸同斟憶昔曽同念菴子歲寒訪汝深雪邊别開閒館屏人語不解朝衣藉草眠琴意相傳中散後𤣥言毎到漆園前正是江東暮雲處再逢携手一悽然四十支離一老夫衰顔恰比列仙臞鑄金不驗身多病種樹無能圃半蕪長日閉闗聊嘿嘿短衣迎客笑拘拘知君昔日探𤣥意定有真詮肯示予次韻贈薛仲常山林鍾鼎性俱安官舍寧非在澗槃此日心情真似水平生臭味本如蘭閲世方臯誰牝牡認真桑户且衣冠祗應黄馬泰泉溪田頻來往春日江楓共倚欄歲暮有懐諸子歲暮蕭條只自如南州髙士久無書達夫樗材在野大何用種髪經年短不梳剡水驚心溪雪後汝中隴山飛夢嶺梅初景仁祠郎消息憑誰問萬里昆明是謫居叔仁贈張贑州致仕還吳次達夫韻田園舊在海東頭海上新歸張翰舟種菊不辭三徑晚採蓴將及五湖秋人情歴盡惟看奕世事忘來獨好樓剰有著書心尚在知君原不為窮愁贈宜興王丞次韻王蒲州人官粟還能五斗無年來只是憶樵漁道知戰勝臞猶在詩為身窮思獨殊耕稼吾非徐孺子才華爾亦阮元瑜他年更向龍門隱為念江臯一腐儒答朱刑部士南見寄清齋偃息灌園餘囀盡春禽又夏初對客不須妨蠟屐占年常自檢農書六經註脚吾焉敢五岳行踪或可如宣室正須公等在野人只合掩荒廬同萬鹿園宿工文菴次韻有贈何處尋山不厭深淡煙歸鳥暮鐘音去家百里訝如客别爾經年尚此心宴坐清香滋夜氣閉門殘雪映寒林相從一宿應堪覺機事何須問漢隂次葉師與諸生講書鐘樓寺聞鐘作早歲傳經髪已斑寄身精舍渺人寰苔邊屨跡堪盈户花外鐘聲正掩闗驟覺海潮生静夜却隨仙梵響空山先生嘿嘿隱几坐試問諸生醒夢間養病道院忽張君見訪不值奉寄生涯歲歲藥囊間已息交游亦未閒土木形骸真覺槁蓬蒿庭院只常關偶隨道侣學禽戲忽枉髙人題鳳還此夕知君向何處多應弄月卧江灣答贈胡栢泉赤囊前日奏邊書皂帽何時掩故廬鳴劍豈知孤憤切請纓爭笑少年疎自甘淡泊看松菊恥學浮沉逐里閭春日黄鸝西澗草憶君歸去灌園初送郭無錫擢南曹主事郭侯齊魯推名士暫屈清才綰縣符折獄一言驚老吏洗心終歲比冰壺南曹已應郎官宿東國常懐仙令鳬野老殷勤何以贈益崇明德永嘉譽夜歸陳渡草堂時新與諸子别去有懐二首野夫也復到城市日暮還尋四壁廬蛩響露餘將入户人歸月裏又離居坐憑烏几都忘我起對流螢且廢書正憶青衿同舍子别來秋興各何如自擬身名如鄭圃宫環半畝日長扄褐衣頗笑非懐玉茆屋何因却聚星樹底蟬聲希鼓瑟燈前鳥字一談經試言吾易將東去未識何人是姓丁癸卯送仲弟正之赴試偶因今日送行處尚憶當年聽鹿鳴馬氏白眉占仲子吳門霜鬢愧難兄秋來一雁寒江影天外三山古帝城此去騫騰非所羡期無温飽負平生己酉送兩弟正之立之赴試秋水芙蓉映緑衫殷勤送爾到江潭人能鳴世慙三鳳家有遺經是二南文入妙來無過熟書從疑處更須㕘逺遊他日看之子下澤欵段吾已堪送諸從游應試二首一壑謀身世所疎幾人相伴此閒居月懸山館談經處雪壓林臯宴坐餘向來衣鉢吾將付先輩文章子孰如亦知雅志輕青紫好及明時早上書幾年山澤共淹留今日公車且見求楊柳扁舟吳苑夕梧桐雙闕漢京秋清時元不棄寒士白璧誰將笑暗投都下相逢説論語莫言師授是張侯送馮子聲赴試與君硯席辱周旋義理蠶絲毎共研頴悟最居德祖後聲名愧出照鄰前身同槁木甘吾隱賦就凌雲羡爾賢莫道孫𢎞曽不遇漢庭推轂在兹年送褚生滔赴試久撤臯比絶來往褚生時復欵柴門文有波瀾堪得髓座無笙管只清言客心落葉秋江繞别思平蕪夕鳥翻此去期君戰勝後歸來正對菊花尊鄱陽别道友户庭不出已多年千里隨君意豁然飲醉或歌還或泣鬢蓬疑鬼又疑仙詎知衰鳳堪為笑且學塗龜得自全今日别離何足恨終期共住白雲巔中秋夜同陳澄江張夢麟城壕泛月森爽秋逢三五中霜天雲物坐來空河灌百川還小艇寺藏荒野亦疎鐘客嘯忽聞清唳鴈月圓真訝吐珠龍疑君與我皆仙骨身世何須更挂胸和張尚書甬川新修池亭奉母登憩作聖朝耆舊位登三綵服公餘樂更堪東洛撫師雙玉節西園奉母一茆菴春暉映處花侵户冬笋成時竹上簷聞道閒居新作賦承歡養性此能兼贈蔣璞山封君主事宗魯之父早游鄉校已知名曽與賔興聽鹿鳴修行明經為博士夏絃春誦課諸生官無鼎食千鍾願老有鄉園十畝情更笑籯金何所用仙郎作吏比冰清贈張通政五湖舟楫是家居篋裏惟携老氏書幾日陸沉門下省一生心跡海東漁賔常滿座嫌猶少行不齎糧任所如陽羡山靈相望久獨能無意命巾車用韻自述南村北郭任吾居懶散何心更著書小酌或能稱酒隱直鈎聊復事溪漁童時篆刻堪為笑病後形骸漸不如若道猖狂今又甚窮途猶自未迴車夀張通政蚤耽𤣥寂謝塵氛身隱猶嫌名可聞自著道衣辭漢闕因尋仙籙禮茅君行隨勝跡曽無住藏向名山更有文南國夜來占氣色少微渺渺動江雲曹霜崖六十曹生恬之父舊官御史道人容色自臞然幾歲江臯躡紫煙謝氏家兒如玉樹周時柱史是神仙鼎成靈藥方皆驗書貯名山世未傳懶散自憐蒲柳質相從擬欲學長年司訓殷龍巖夀詩文東之父白頭博士早懸車鳩杖扶身八十餘甲子暗占絳老歲今文口授伏生書清尊只許通門客隱几何心出里閭應笑籝金無所用仙郎才藻更誰如楊醫士六十衣裁鶴氅鶡為冠數巻方書一草菴絳縣老人知幾歲太倉仙令却多男不為避人居郭外毎因採藥到山南年來頻訝嬰兒色道術從知宿所探禇怡閒六十滔之父古來仙客説長髯今日髯翁亦是仙家近縣門不識令身居城郭亦耕田鳩形正可供扶杖亥字還堪紀歲年共羡髙門將有待賢郎文藻更翩翩贈宜興閔翁八十夀詩上舍伋之父古貌翛然山澤臞力田還是漢人餘久諳汜勝齊民術閒讀周侯風土書桑榆曖曖隨行徑弟子訢訢與燕居駟馬從來足憂患羡君身世更何如周子隱有陽羡風土記贈天寧寺僧八十化城東畔駐三乘祝髪從師記昔曽頻著袈裟迎上客自分齋飯與遊僧談經幾夜窓飛雨削杖先年手種藤因笑馬鳴身已老欲憑弟子為傳燈懐竹叔夀詩叔善畫傳自乃翁門傍清溪長自扄隂隂藂竹繞幽庭地偏南郭人堪隱秋盡東籬菊正馨笑傲百年惟稼圃風流兩世擅丹青不須海上求靈藥元是江邊老歲星楊醫士夀詩東亭先生富道術隱居城郭似江湖隨身長挾雙白鹿入市只懸一玉壺社中漸覺推前輩門外從教滿病夫予亦文園髙卧客年來肺氣為君蘇喇嘛翠峰老僧輓詩三首枯木寒巖亦未真走盤珠子自精神三飡煮籺一生事翠峰毎食糠餅屢歲齋僧幾萬人鑄冶金容瞻氣象圓通天眼悟根因翠峰得師傳天眼訣欲上伏牛心未了了心應待再來身不事钁頭不坐禪揚眉瞬目見雄談净體髪鬚元不礙翠峰不去鬚髪煉心妻妾宿曽㕘翠峰為僧後入俗曽有妻妾者三年殿壓滄溟功九仞爐開色相佛千龕翠峰一生鑄佛造無梁殿于浦陀未成也年年航海精誠在垂没魂還到海南自愧迂儒厭俗葷毎游香室藉思薰别來常似一臂失用莊子話久寧容六耳聞人去忽驚函谷展錫飛無復海東雲憐君鑄佛經千億欲借餘銅一鑄君錢心漁輓詩心漁先生不可見尚憶吹簫卧草堂垂綸老作江潭客得姓元從吳越王貧病一生心自足雲山千里興難忘更聞治命真堪紀人世空矜石槨藏讀東坡詩戲作東坡卒于武進顧塘橋去余家數十步公詩句句寫胸臆一滴冰成大海翻方臯牝牡無定相曼倩滑稽有至言掃除李杜芻狗語出入鬼神傀儡門異代或疑後身在告終此地招其魂雪詩和蘇韻十首隂風吹隴麥芽纎歲盡𤣥冥令更嚴園圃未春先綴蕋乾坤如海欲生鹽不妨積處堪髙卧預想晴來好曝簷縱是未能堅作玉漸看冰柱已垂尖大地文章散縞纎小堂風物倍清嚴灑來竹裏迷人徑積向巖前訝虎鹽但使曉寒欺短褐獨宜夕影泛虚簷瓊花柳絮皆無用誰擬新詞一鬭尖寒江我亦弄纎纎豈是羊裘人姓嚴履處幸不露足趾嚙餘真覺厭酸鹽紫雲黄竹千年調白屋朱門一様簷髙岫儘教遮葢盡物情元自礙孤尖寒臯白草尚餘纎墐户村村似戒嚴飛舞千峰山吐練粧成幾樹木蒸鹽滇蜀有木鹽病多消渇宜調茗老已捐書莫映簷强欲摛毫追小謝謝惠連有雪賦詞鋒久避六朝尖宛轉素娥腰帶纎迴颷似應舞節嚴三冬怪事驚粤客古語粤人不見雪一夜凄風結解鹽解地鹽遇風則結厭説炰羔歡錦帳思分挾纊到窮簷懸軍此日堪乘便誰奪祈連萬仞尖李靖因雪擒頡利蕭蕭凍樹晩喧鵶門外誰來長者車入夜俄驚千里月開簾相對滿空花東郭先生猶敝履西闗遷客正思家最憐漁父滄江畔閒倚孤舟獨挺义一片寒原滿樹鵶幽人掩户罷柴車聊憑濁酒延春色試向疎梅問臘花草閣映來書幾巻江城積處月千家此時忽憶荆溪道雲際雙峰聳玉义初看朝采颺金鵶倐見𤣥雲隱日車恰似幻師能作霧却驚翳眼驟生花緗編暫借簷前影銀閣常思夢裏家笑道非鹽亦非白禪機一指為君义空城無粟噪饑鴉陌上紛紛正滿車積磵暗隨泉並滴入簾應與筆争花芻米驟髙新歲價柴扉旋掃野人家客來此日須沽酒梁上青錢那得义巢風欲動好占鴉空裏愁翻百寳車葱嶺未消阿耨水珠林忽散鬘陀花故氊猶在能禁冷好客相尋懶卧家且似瞿曇逃世網雪山跏坐足為义家僮自野田携黄菊二株至軒中感而有作三首曠野隂隂萬木霜誰携數蕋到茒堂冷質本非堪競秀閒情敢謂愛孤芳在野寧辭衆草掩入簾聊作滿庭香自笑吾生花興少欣然對爾亦相忘余素不好花見此不覺有喜意豈真所謂花之隱逸者耶已􅂸寒谷不須媒讓寵何嫌並朶開花意幽閒當艶麗天心霜霰是栽培潯陽逸客瞢騰醉姑射仙人綽約來寂寞於人誠少用試將服食制齡頽不沾春色也穠纎小院疎籬秘靚嚴人比孤花清入聖天然真味淡非鹽未須採摘供調藥為嗅馨香置近簷落英好護餘根在來歲還看茁玉尖此詩用坡公雪詩韻海上凱歌贈湯將軍九首湯侯猿臂猛虎鬚少小曽窺𤣥女符明主親頒手中劎直交跨海斬天吳紛紛盗竊爾何知岸上斫人水上嬉自咤一身都是膽欲將巨海作潢池偃旗休角寂無猜百丈樓船泊不開夜半賊營流矢滿纔驚漢將是飛來水軍隊隊黄頭郎迎潮直上凌扶桑已知海若先清道萬里滄波定不揚海上秋髙海氣清營中賈勇競先鳴疊嶼亂翻旌幟影驚濤盡作鼓鼙聲沉船斬馘海為羶潭底潛蛟噴血涎髑髏帶箭逐波去可道孫恩是水仙錦紈愛子亦從軍長鬛蒼頭總策勲誰奪强王萬金首帳前齊説小郎君五千長㦸下淮邳自是沙洲命盡時將軍欲置平戎鼓須借鯨鯢腹下皮湯侯以渠賊王艮皮製鼓㨗上彤庭寵數優詔分玉帶與名裘麾下偏禆盡稽首貂蟬笑看出兠牟南征歌十二首五嶺烽煙久未平君王習戰幸昆明却説將軍多勝算不須文士請長纓詔錫彤弓出禁城良家六郡總從行將軍舊佩平蠻印校尉新開横海營漢皇有道握黄圖南粤何知擅一隅萬里出師將問罪不因大海富明珠獨承節鉞控南州親寵由來冠列侯昨夜輕寒生幕府賜衣初著紫貂裘晴原羽騎簇油幢繡帽爭先蹋鞠場不惜千金收猛士欲將尺組繫名王月明吹笛武陵川馬上行人望跕鳶莫怕炎洲饒毒癘一冬飛雪浄高天軍書插羽速星奔卭僰夷王盡欵門殺氣三秋清瘴海輕兵一夜襲崑崙草木千山鼓角風將軍牧馬夜郎東靈臺向夕占星色已報欃槍墮海中圍合孤城海氣昏紛紛失木泣窮猿何如銜璧歸天闕幸荷明王不死恩牂牁南去亂峰連滇海藤江一帶懸縱謂蠻封堪畫地不知漢將若從天奏凱歸來拜冕旒霍家襁褓更封侯因風為報南荒外漢闕方梟越尉頭千羣椎髻競來王聲教南流盡越裳但使文犀通貢獻不將銅柱隔封疆塞下曲贈翁東厓侍郎總制十首四月旌旂出白狼千山晴雪照油幢預知水草軍無乏試辨風雲陣欲降三晉連年苦被兵九重拊髀憶豪英詔書更不從中御萬里長城一委卿詩書禮樂古人風開闔機鈐又不窮得一降人如愛子用三敗將立竒功山前山後兵馬雄斧鉞衣裳在掌中俠士獻刀承賜酒貴侯免胄為趨風灅川冰盡水泱泱堡堡人家唤蒔秧田中每得鳥獸骨云是單于舊獵場君侯生長在炎洲塞外層冰草木愁祗憐軍士猶寒色臘盡轅門不御裘太師昔日定南荒親把長纓繫莫王寄語健兒須自愛射飛休得近邊墻邊人謂大官為太師畫㦸森森清晝閒指揮只是笑談間收將黄犢教耕去捕得蒼鷹命縱還營平謀國最深忠毎與公卿見不同但使湟中無牧馬不須麾下有邊功青青塞草羽書稀士女鼾眠畜牧肥戲看侍兒呈舞馬醉邀幕客對彈碁題贈段紫峰仙人宿處紫煙孤一片峰隂散玉湖今日隱身城郭裏閉門常寫廬山圖秋日書客童君見過賦此為贈有客扁舟問草廬窓前梧葉正蕭疎山人已得忘筌意不復從君乞異書題陳推官羅江號二首髙卧曾分白鷺沙清谿深處採三花總為徵書出空谷衣裳猶自染雲霞三山江畔入雲齊紫氣千年鎖石堤便欲學仙從此去與君同聽夜猿啼題寳華和尚巻幻目由來見幻華飲光何事又拈華兩華舉似知華客為有别差無别差贈王和尚住善巻偃栢垂蘿古洞春上人飛錫此何因非闗福地尋仙侣自向青山認法身自述贈寫真毛君津黑尚餘山澤氣委蛇又似列仙臞他年太史徵圖畫為識乾坤一腐儒贈周筠臯母七十夀詩髙堂有白髪掩映明春暉七十古來少一陽今又歸瑶池青鳥狎石室紫芝肥令子能承色還看戲綵衣送使人歸蜀蜀吳萬里説殊方總是江流一帶長暫醉𤓰州能幾日乘風忽又過瞿塘題畫山空夜静猿一鳴磴轉雲深鳥不度幽人何事長獨棲只為此中有佳處㢘使廖東雩喪後開所惠地黄酒臨觴慘然尺書滿篋故人情想像荒丘宿草生祗餘此日開尊意堪作山陽聽笛聲贈儀真沙君葭菼蒼蒼水國秋髙樓明月古揚州二十四橋雲霧裏看君騎鶴上天遊贈史君漁沙號問君何處挂漁蓑予亦垂綸坐緑波他日相逢應一笑不知若箇得魚多華補菴三度惠酒而此畨所惠參酒者絶清冽可人雖味甚濃厚而置之杯中淡若無色可謂嘉品因劇飲至醉遂成口號奉謝三首磁杯寫盡只疑空秋月寒潭意頗同隱几偶然成獨酌夜凉白露滿庭中毎甘樗散惟須酒欲補虚羸却藉參瘵疾陶生兼好飲舉杯深見故人心淵明素瘵疾絶無色相傾明水只有馨香藉白茅此夕飲醇􅂸一醉恰如把臂與公交贈曹星士一江號春雨蘭陵江草生江流恰與道心清門前車馬日來往閒坐江城説子平自述并贈曹君少讀隂符恥未工青山偃仰漸成翁人間炎冷都忘盡聽話流年一笑中曉起觀猫捕鼠起來隱几坐朝暾深謝當闗早閉門簷角偶欣猫捕鼠反觀尚覺殺心存贈華君一竹號華生可徵之父巗居無俗好惟與此君知千畝亦何羡一枝聊自怡迎風響獨奏照月影相隨願比幽人節貞柯貫四時補翠峰上人挽詩一首四大于今已各離屈伸猶復似生時𢎞景遺顔常不改翠峯死後四體屈伸如常陶𢎞景傳中亦載此事惠能去路定非迷棺蘄速朽寧辭瓦翠峯以瓦棺身不留名豈用碑亦知繪塑終難像聊使門徒寄爾思詠橘杯二首余過荆溪萬為菴訪余舟中時風雪驟甚欲共飲索杯不可得乃剖橘作盃劇飲至醉相約各賦詩紀之客中酒具愁難得戲幻霜柑當羽觴破處何妨鑿混沌醉來偏覺助馨香古風豈讓匏尊儉佳味何須鬱鬯芳更笑玉盃真俗物朱門豪客漫猖狂天生竒器無人識剖破鴻濛笑我狂醇酎坐令増藥味碧筒徒爾薦荷香持來或訝成金盞寫滿猶疑是橘漿靈均若也知兹意楚頌還應記醉鄉荆川集巻三欽定四庫全書荆川集巻四明唐順之撰書答張甬川尚書書養齋翁歸辱賜手教嘉惠多感逺念順之麤頑非畜德之器迂疎非適用之才徒以麤頑近乎質木迂疎類乎澹泊以此幸不見絶於大君子之門自入山中稍欲收斂精神擺脱習氣庶幾少有所聞以酬宿志且以不負長者拳拳教愛之至意而閒静中轉見種種欲根起滅不斷雖暫隨氣機歇息終非㧞本塞源工夫益覺實病之難除實功之難進也承教中庸不可能乃在聲臭之表此喫𦂳要言中庸所謂無聲無臭實自戒謹不睹恐懼不聞中得之本體不落聲臭工夫不落聞見然其辨只在有欲無欲之間欲根銷盡便是戒謹恐懼雖終日醻酢云為莫非神明妙用而未嘗涉於聲臭也欲根絲忽不盡便不是戒謹恐懼雖使棲心虚寂亦是未離乎聲臭也明公之致力於道而自得之也久矣而猶云老且望洋日有愧嘆此豈明公之過為避讓哉葢常存不及之心而后可以言戒謹恐懼而後可以閑未萌之欲古之聖賢所以兢業此心至老益强類如此也放失如順之輩竊因此更有省矣承示欲修飭武備此明公為國家之深慮也世人作事計較成敗利純畏首畏尾自為之念重而任責之意疎所以弊多積於循襲而事毎牽於掣肘以明公之素望與其素養居其位而行之因則因革則革誰能撓之雖然武備其一事也昔周命周公畢公以東郊之治欲其彰善癉惡以淑人心至於世變風移而後已今之民風士習其淪胥抑可知矣而畿甸為尤甚此俗吏之所謂迂緩而有識之士所為深憂而懼無以善其後者也然而明公今日之任周畢之任也且夫東郊雖周之東郊而實染殷之餘風者也經周畢而一變其俗况南都固祖宗之所肇基而風勤之者也以明公之素望與其素養居其位而行之明示好惡提醒人心而挽之禮義亷恥之域使四方之有風俗自畿甸始畿甸之有風俗自明公始非明公今日之責而誰望乎聞太夫人已就養是明公入則承歡於内出則宣力於外其承歡於内也益所以畜其效忠之心其宣力於外也益所以推其養志之施葢兩不相妨而交相益也此深可為明公賀矣養齋翁考滿歸遂欲乞休但山林中得此翁於鄉俗極有益仕途中又少却此翁為可惜耳然其意已决矣又曩承手教諄切皆道義肝膈之語感幸感幸至於所論學術之虚誕與其毫釐之差則皆足以惑世而害道此切中當世學者之膏肓鄙人亦嘗深憂之而未及面請也先行其言而後從之言非君子之所急而况其誕者乎承示大學小傳葢發於涵養之真而多自得之説至於身心意之别以正心為主静之學尤明公之所獨得其曰正心者不屬於意不屬於身者也是心之無所發動事物未交於視聽時也斯時也心惟存其恂慄而已凝然中居而外誘不敢干也是則然矣但不知事物既交既有視聽之時其凝然中居而外誘不敢干者與前時有異乎無異乎豈所謂凝然中居者只主於静時而為言者乎抑亦無分於動静而皆在者乎更願教之答吕沃洲御史書居鄉無朋友夾持深懼墮落得來教不覺􅌶然甚幸甚慰兄云暫時寧静若有端倪恍惚轉移復離本體自非兄之懇心真實直從心源上著工夫不能為此言然兄自謂未得覇柄入手者正恐此病亦坐乎此大率此學只論有欲無欲不論寧静擾動若本無欲障則頃刻之間念念遷轉即是本體若欲障未盡則雖窮年黙坐能使一念不起亦只是自私自利根子白沙先生嘗言静中養出端倪此語須是活看葢世人病痛多縁隨波逐浪迷失真源故發此耳若識得無欲種子則真源波浪本來無二正不必厭此而求彼耳兄云山中無静味而欲閉闗獨卧以待心志之定即此便有欣羡畔援在矣請兄且毋必求静味只於無静味中尋討毋必閉闗只於開門應酬時至於紛紜轇轕往來不窮之中更試觀此心何如其應酬轇轕與閉闗獨卧時還有二見否若有二見還是我自為障礙否其障礙還是欲根不斷否兄更於此著力一畨若有得與有疑幸不惜見教也苟以為多病羸弱精力不及閉闗以養疾則可耳閉闗以養心則不可也程子嘗曰習忘以養生則可習忘以求道則甚有害其辯之精矣然養生亦只在無欲上求之故曰飲食男女聖賢自這裏做工夫斯言至近而精兄有意於元氣之復乎則願兄毋忽斯言也弟亦多病羸體葢平生得效良方在此耳至於厭事之病弟亦素有之然舊未嘗自以為病今幸知病矣何日得與兄共坐一室日夜相與磨勘洗濯此心臨書耿耿與王龍溪主事書世人之不能不疑於吾輩也久矣近有士夫自浙中來者云及吾兄以佃寺之故使憲司有言且云兄以寺地據風水之勝欲作令先大夫墓地上官某人者既予之矣而憲使持之故若此紛紛也僕聞而竊嘆以為如兄安得有此此乃傳言之誤耳不然則必俗吏欲汚衊善人託為此説就使非傳言之誤非俗吏欲汚衊善人則在兄必自有説固不敢以世人之疑吾輩者而亦疑兄姑笑而置之不欲煩諸齒頰間也既又伏念以為孔子以詩禮教子而陳亢疑其異聞孟子不見儲子而屋廬子以為得間古者師友之間既洞然肝膽相信矣而亦若不免以世俗之疑相疑者何也無乃故為迂其問以剔抉聖賢之隱曲而白之於世也乎今僕幸得兄之間而可以有請安知兄之隱曲不因以白而僕亦冀有陳亢得三之喜與屋廬子之悦者乎且夫人之意兄者則曰兄之請寺是世人之請寺己兄之徇風水是世人之徇風水已而僕之意殊不然也夫兄爽朗超脱得之性成僕毎竊嘆以為即使兄不學不知道亦當作物外高流如𢎞景和靖之徒絶非食煙火輩人而或謂其請寺以自便占風水以規後䕃此真坐井之見且不足以闖兄之藩宜乎兄之不屑與較也然而兄之為是必有説也僕竊觀於兄矣惟兄篤於自信是故不為形跡之防以包荒為大是故無净穢之擇以忠厚善世不私其身是故或與人同過而不求自異此兄之所以生深信深慕於相知者亦所以生微疑於不相知者也寺田出上官之予何必固卻以為潔風水有事機之便何必固避以逺嫌以是闖兄或者得其藩乎然僕竊以兄之意亦稍偏矣孔子惡行怪而愿人亦譏其同乎流俗合乎汙世夫曰同乎流俗則非其自流也特同之耳曰合乎汙世則非其自汙也特合之耳其設心亦豈不善而聖賢甚以為不可者其説可知也且夫本以包荒忠厚而其影或近於愿人此僕之所懼也然則世人望影而疑亦何怪歟古人有放君而代之者而人不疑其富天下有放君而又反之者而人不疑其專葢古人舉大事冐大不韙而猶不䝉人之疑如此今吾輩出格作一小事而人已羣然疑之雖古今人眼孔不同計亦不應如此隔絶也毋乃不邇不殖所以自信與素信於人者有不如古人乎不顧不視不取不予所以自信與素信於人者有不如古人乎且夫以湯之聖宜其脱然於聲色貨利之外也而祗曰不邇不殖真若聲色貨利之足以移湯而湯真若與聲色貨利相持然者何也以尹之所樂者堯舜之道也而祗銖稱寸量於一介取予之間若硜硜之小人然者何也兄所論伊川金楪子之説以此施於㸃檢形跡之人則為對病要藥矣向非其人則加以蓍參治肺癰藥豈不甚美或以助火而長病也曩時諸友所處陽明老先生家事或有造為玉碗之謗此言極俚鄙可笑宜不足以紿三尺之童子然王僉事竟以此解官去有志者至今痛惜之夫毁譽利害不足計然得無吾黨亦有過乎苟非過於自信而疎於事情無乃所謂素信於人者之未至耶君子行有不得反求諸已則工夫日𦂳日精至於己日乃孚是人之疑我者所以精進我也兄意其以為何如然僕非敢謂此言可以少禆於兄亦將以叩兄之隱曲而得聞所未聞耳幸亮之答王南江提學書奉别經年不能通一字以為率然道離合問無恙之泛語既不宜施之於兄而思竭其疲駑以效一言之獻則又茫乎其無所得故遂缺然至此又復以為既疲駑無以自效而有數字以道離合問無恙亦足通殷勤而舒繾綣之懐不猶愈於經年無一字乎故於李君使者來草草作此大抵所謂率然之泛語耳然僕竊誦吾兄前後見惠兩書知吾兄痛懲既往之悔直欲洗刷腸胃不肯若世之葢頭換面作好人者至於用心獨苦處則雖兄口不能自言而僕於筆扎間亦稍窺見焉未嘗不憮然而嘆以為兄之力能自振㧞如此兄之不自護如此即使僕竭其疲駑而有以自效亦何所加也人心存亡不過天理人欲之消長而理欲消長之幾不過迷悟兩字然非努力聚氣决死一戰則必不能悟或不知所戰或戰而不力則往往終其身而不悟故佛家有認賊作子與葛藤絆路之説而兵家亦曰名其為賊敵乃可滅又曰一日縱敵數世之患此佛家之可通於吾儒而治戎之道可用以治心者也儒者以交戰為子夏之病不知能戰是所以為子夏也雖顔子亦有戰矣曰不逺復夫不戰何以有復也雖天地亦有戰矣曰龍戰于野其血𤣥黄夫隂既疑於陽矣陽安得晏然而無戰乎惟戰而不勝故血而至於𤣥黄戰而勝則血可以不𤣥而陽可以亨也是能戰之效也今兄知所以戰戰又能力矣僕自入官得請見於當世士大夫葢三年而後見兄一見則駭然異之而兄亦過以僕為知己夫兄雄俊之文博辨之才邁往之氣無一人不知之而獨謂僕為知己者豈僕之知兄止於世人之所知而已也抑亦有不止於世人所知而已也僕之於兄不為不深知己然竊嘗有少怪於兄以為世間種種嗜好凡人之所可玩可喜者多足以掛兄之胸臆而動其挹慕不捨之意此其中於心也微而不知其植根也膠而難解苟一不戒則微者或横潰而著矣根者或引蔓而枝矣就使能戒而不潰不蔓則其為力甚勞而為功亦寡譬如聚千百不逞於深叢巨莽之間按而不發而時出其一二騎以鈔於路幸不為大憂然而授首獻俘之期恐終不可冀也而况其猖獗之不可料歟雖然兄何如人也豈敢謂其有溺於此歟或者當時年少而氣鋭以為雖小有所嗜好而固無損於吾之大者抑亦知嗜好之不可不欲快於一鬭而以積漸消去之歟且夫以嗜好為無損者無乃不知所戰之過歟以為積漸消去者無乃戰而不力之過歟夫嗜好之中人也亦必有因必非以為漫然無所用也必以為人之資於天地間者一物不可少也孟子之書所以提挈此心者至著矣而尤著於生我所欲一篇葢其不悟也則自宫室妻子之奉至於種種若無一焉可少者其悟也則雖簞食豆羹之切於生死若無一焉不可少者藉令有一人焉始不悟而今也悟則自今日無一物不可少者而追視向時所為無一物可少者未始不啞然自笑也傭工道丐之人徼幸得十數錢則買殽市酒一醉大叫自以天下之樂莫踰於已而千金之子苦身仡仡以程錙銖日夜苦不足藉令此兩人易地而觀焉亦未始不啞然自笑也人之所甚愛而至不可少者莫如七尺之軀也其住於世也能泣能笑能挈能擎能徙能倚無一不能無一不有而其聚諸有以住於世也則又有修有短而卒無不腐為野土化為瓦礫而後已者則此七尺之軀亦終不得自有矣以其終不得自有則當其暫而有之固亦不可據而私之以為真有矣而况於種種嗜好其不如七尺之軀之不可少者又不啻千百倍歟古之聖賢所以超形氣而獨存至於同死生齊得喪漠然無一動乎其心者非誕也既悟則自知之耳如此乃可以悟知性知天乃可以語謹獨誠意之學而其初必始於力戰未有不力戰而能如此者也約之嗜好更不少於兄而僕相聚時數以為言然於兄獨罕及者約之性柔須待有人夾持而兄剛果雄毅氣魄甚大始雖暫牽其必一朝躍然自脱於此無疑也顧所不知者早與不早耳今兄果然知所以戰戰而又力以自脱於此不出吾素所料者如是而又早則吾之所不能知而深為兄喜者也僕不肖聰明百不逮於兄雖僅守繩墨常恐失之兄謂我戰勝而肥今臞然故吾也此足以知戰之不勝之效矣雖然敢不勉耶幸兄常不鄙而教之僕於文字素非所長然以猥嘗受教於兄且幽居少事欲以灌園餘力時一為之又以為既樗散無所用世幸未即老死二三十年之後或為天所牖使少有知識尚能託之於文字雖不敢望於行逺庶幾達鄙陋之意焉是以不能息心於此然往時朝夕於兄尚不能竊其緒論今去兄既逺誰為開之固知終必罷廢矣今往近作數篇冗散無可採至如贈彭通判與李郎中墓文亦稍見已志故敢請教耳僕今年寓居陽羡挈妻子以行有一二童子相與講章句自以此身不量而為人師雖不責我以道而所講者章句然至於收拾放心正容謹節以率之者亦不敢不力自謂於此頗有分寸之益因是知吾兄以道為人師而所教者又非一二童子乃齊魯五六郡豪傑之士則其所以率之者宜何如而其為益又何如也然僕所謂一二童子者自章句外亦稍以内外輕重義利可否時時與之一談則或如鑽礦而不入僕所教不過一二童子而又日夕與之處然猶如此兄雖善於作人然以一人督率五六郡之士而又不能日夕與之處則其頑然而無得於兄者固亦有之歟僕竊為兄慮也夫為此五六郡得一良師孰與為此五六郡得百十良師故為提學者莫急於風勵學官今學官自卑其身無恥而嗜利甚矣誠欲有以風勵之又恐非一僉事之力與二三年之間所得為也奈何家父言某縣某人者在京師百計詆兄此甚可為勇於任事者嘆也然在齊東得無亦如某某者乎此在兄亦惟自信自為而已何較於彼者哉家父又言兄有薦僕之書於京師貴人此兄之愛我甚而忘其醜也雖然僕之與兄以善交聞於人久矣兄之薦我何異於僕之自薦乎僕年來自計已熟大抵人用之不敢以隱人不用必不敢以求亦必不敢以悔終吾身而已矣然兄素已知我矣何待僕自言也答俞訓導書得所示書知執事望我甚厚教我甚至感激感激葢學病於博雜而量病於博廣此鄙人膏肓之証過承發藥敢不盡飲然僕之此心亦不敢不悉於執事也夫士之於世苟無志於為善則已果有志於善則世之人未嘗不欲其入於善已之善未嘗不欲與人共為之所謂衆生病即是已病此萬物一體之心必不能自已者也僕於甲科人才固未嘗專有眷眷搜羅之心其於巖穴之士之賢者亦何嘗敢忘相與切磋之心哉其於卑鄙齷齪越禮放法者固未嘗敢有雷同隨俗之心而其間尚可告語轉移者亦豈敢遂無憫惜愛䕶之心而遽疾之如讐者哉甲科之與巖穴本無揀擇而感應則隨其所遇峻拒之與憫惜本無作好惡而曲成則因乎物情此天則不容人加減者也夫業無定習而心有轉移苟真有萬物一體之心則雖從事於舉業以進身未嘗不為義塗也若使有獨為君子之心則雖從事於飭躬勵行以退處未嘗不為利塗也經義䇿試之陋稍有志者莫不深病之矣雖然春誦夏絃秋禮冬書固古之舉業也固未嘗廢誦與書也苟無為己之心則絃誦禮書亦祗為干禄之具苟真有為己之心則經義策試亦自可正學以言昔人妨功奪志之辨此定論也至於以舉業為教則稍有志者亦知深病其陋矣吕伯恭以舉業教浙中而朱子以書規之伯恭答書以謂若不開此一路則法堂前草深一丈僕嘗誦而竊嘆以為此極是前輩苦心非特後之人未能知雖當時同志者亦未能盡知也僕年來則已決意絶去舉業之教矣而猶𤨏𤨏為執事言者葢亦自知今之不教舉業未為脱洒而向之教舉業未為粘帶也今之不教舉業未必足以閉人之利塗而向之教舉業未必不引人一二於義塗也至於道德性命技藝之辨古人雖以六德六藝分言然德非虚器其切實應用處即謂之藝藝非粗跡其精義致用處即謂之德故古人終日從事於六藝之間非特以實用之不可缺而姑從事云耳葢即此而鼔舞凝聚其精神堅忍操錬其筋骨沉潛縝密其心思以類萬物而通神明故曰灑掃應對精義入神只是一理藝之精處即是心精藝之粗處即是心粗非二致也但古人求藝以為聚精㑹神極深研幾之實而今人於藝則以為溺心玩物爭能好勝之具此則古與今之不同而非所以為藝與德之辨也執事所舉堯舜夫堯舜所未聞與若罔聞云云者此道也羲和之厯象夷䕫之禮樂臯之刑名至於垂弓和矢伯益鳥獸孰非道哉然諸子為之而堯舜若罔聞云云者葢君逸臣勞道則然耳若謂堯舜以道自處而以藝士諉之人何其自待者厚而待人者薄也臯以刑名自處而乃為其君陳迪德之謨䕫以撃石拊石自處而教胄子以簡亷直温之德性則是以藝士自處而以德望之人又何其自責之薄而責人之厚也厯象禮樂藝也修五玉如五器而彰施五采在璣衡獨非藝哉則堯舜亦屑屑矣孟子曰堯舜之知而不徧物急先務也若在羲和則厯象便為先務在䕫則撃石拊石便為先務又安得以堯舜之所不徧者而遂不急也執事以好博雜技藝為僕之病此則不敢不承而至於分技藝與德為兩事則辨之亦不敢以不明也葢儒者慕古之論莫不以為必絶去舉業而後可以復古之德行道藝此則不務變更人心而務變更法制將有如王介甫所謂本欲變學究為秀才不謂變秀才為學究者矣儒者務髙之論莫不以為絶去藝事而别求之道德性命此則藝無精義而道無實用將有如佛老以道德性命為上一截色聲度數為下一截者矣是以鄙意不敢不盡於執事也雖然執事憫時病俗之意則亦深且切矣今執事固有教人之責矣執事之隱居修行僕聞之膠陽諸兄亦久矣今之教以舉業縱欲罷之而勢有不能即使復古之教則六藝固亦不廢僕所願執事之於諸生即舉業之中而示之以窮經明理反躬著已之路而黙消其干名好進之心則是舉業中德行道誼也即古六藝之中而引之於聚精㑹神極深研幾之實而黙消其争能務勝之心則是六藝中道德性命也方且順而導之正不必逆而沮之也大率今之世舉業技藝種種猶未足為心病所為心術大蠧者在乎義利之辨不明執事教人欲明義利之辨則必以身率之以身率之則自取與辭受進退至於纎微必精察之果義歟利歟取與辭受進退至於纎微盡義矣尤必精察之此心果有為歟無為歟一毫不自遮蔽一毫不使潛伏使精神可透金石則成人材動風俗之責固有在矣敢以是少効愛助之意以為執事報也無由面晤極論臨書馳懐嗣後更望時惠盡言此僕之所汲汲而求也答戚南𤣥書來書滿紙無一字非膏肓之病無一字非瞑眩之藥兄之惠我極厚非言可為謝也論語曰據於德游於藝記曰德成而上藝成而下德之與藝説作一個不得説作兩個不得纔提起處色色總在面前纔放下處了了更無一物自是人心本來之妙而不容増減也古人終日從事於琴瑟羽籥操縵安絃種種曲藝之間既云終日從事矣然特可謂之㳺而不可謂之溺今之人其於琴琴羽籥操縵安絃種種曲藝即使偶一為之則亦可謂之溺而不可謂之游何也謂其有欣厭心也為其有好醜心也為其有争長競短心也欣厭心好醜心長短心此兄之所謂即是塵機也然則所謂藝成而下者非是藝病乃是心病也掃除心病用息塵機弟敢不自力以承兄之教也雖然塵機息盡渾淪道心亦願兄之無忽斯言也答王生宗道書唐君誠志節之士所惜平生未與之接不能得其心胸面目之詳只是據紙上語套説一遍殊覺精神不暢不足以發潛德之光且如德州接逓一事乃是據宗道口説故叙事中此一段稍覺精明若前時宗道盡將此君平生首末行事委曲口説一畨或能更有發揮耳今不及矣然竹溪剛介之士其言亦自足以傳信不待予也既已為唐君作銘為之投筆三嘆志士苦心曠世相感且唐君在當時淹蹇不得一第而老於郎署又年不滿六十其清修絶俗亦自足以結裹此身而風末世彼世間取髙第為大官享耆夀勢力赫奕不知幾何人即其沉酣飽滿於聲利間當時莫不自以為最得意然纔一没身便臭腐糞土何異若此者其於唐君何如哉此孔子所以較量於齊景公夷齊千駟餓死之間其於提省人心最切切也清寒之士可以無所待而自立矣宗道素有志向更願於義利𦂳闗處極力研析使不為一切俗情所轉乃是挺挺自作豪傑亦所以不負唐君衣鉢云耳勉之勉之與唐一菴書使者來弟往洞庭歸時乃見尊柬讀罷不覺悽然之甚吾兄盛德人也造物者既窮其躬而又夭其嗣也哉為善者其亦不可以自信矣雖然自古聖賢能就人所不能就之德則必有能堪人所不能堪之情昔者卜子夏哭子失之過延陵三號而行失之不及東門吳則蕩而非人情也兄篤於信道久矣試于此尋究真源則雖極哀極苦中本心了然自明所謂哀之發而中節而未嘗失其為中也與季彭山書僕不慧自少亦嘗有志于治經漢宋諸儒先以解經名家者亦頗涉其津焉至於當世諸先輩以治經名家者亦嘗承下風而問之葢久之而不得其説則又將脱去聞見洗刷此心而獨求之于遺經又久之而竟未之得也偶游㑹稽獲聞髙論則爽然自失先生之于經闗竅開解搯擢腸胃若秦越人之隔垣而洞五藏也剖破傳注專門之學辭鋒所向决古人所未决之疑而開今人所不敢開之口如荆卿慷慨撃筑睥睨于燕市之中而旁無一人也目論古事又如身揖讓乎虞周禮樂之間憑軾以觀晉楚齊秦鬭爭之域也而聽之者且不自知其忽焉躍然以喜忽焉瞿然以愕而卒果然以飽亦雄矣哉世未之有也雖然願先生益深所養使此心虚壹而静自所獨然不必盡是也衆所共然不必盡非也却意見以融真機則古聖賢之精將于是乎在而况其經乎然則六經之道其卒于先生有明也已僕敢以是少効愛助焉答姪孫一麐書一麐問衛州吁弑其君完倉卒未能悉吾意當時簒弑之人必有自見已之為是而見君父之甚不是處又必有邪説以階之如所謂邪説作而弑君弑父之禍起者春秋特與辨别題目正其為弑如州吁弑完一句即曲直便自了然曲直了然即是非便自分曉亂臣賊子其初為氣所使昧了是非迷却本來君父秉彞之心是以其時惡力甚勁於此之時刑戮且不懼又何暇怕見書但有人一與指㸃是非中其骨髓則不覺回心一回心後手脚都軟便自動彈不得葢其真心如此所謂懼也懼與不懼之間是忠臣孝子亂臣賊子之大機括反復如翻掌大易之所謂辨而春秋之所以震無咎也如善醫者下針中其竅穴則麻痺之人即時便知痛癢春秋一言中却亂臣賊子痛癢處即亂臣賊子便自囘心是以能懼然知痛癢者乃其血氣之固然知懼者乃其人心之固然也善醫者特與遇之春秋特與提醒之而已春秋如化工言隨機提醒人也舊説據春秋所書而言懼吾亦據春秋所書而言懼此無異者但舊説以為亂臣賊子懼于見書而知懼則所懼者既是有所為而非真心且其所懼能及于好名之人而不及于勃然不顧名義之人以為春秋書其名脅持恐動人而使之懼此又只説得董狐南史之作用而非所以語于聖人撥轉人心之妙用且如其説其弊將使亂臣賊子彌縫益宻以逃名而避跡為害不小此其説起自漢儒宜不待智者而知其謬然更千年無有覺其謬者亦無有致疑者何也其悉更待面論善説春秋者無如孟子亂臣賊子懼與春秋天子之事此數句真得聖人微㫖其春秋天子之事一句儒者亦説不通久矣一麐可深思之面㑹言之春秋一部書無一句不為亂臣賊子而作非特書弑君三十六條也答汪生書逺道走使詢及繼祖母喪服深知謹禮之意然此在禮經甚分曉本非有疑似相聚訟也只為不解承重兩字而惑於俗人代父相沿為服之説是以其論紛紜而難通耳承重者禮之所謂受重也如何謂之重謂祭統也古者立主謂之重宗廟謂之重禮曰為人後者三年解之者曰為人後者受重於人受重者必以為服服之也禮曰父卒然後為祖後者斬解之者曰為祖後者受重於祖受重者必以為服服之也為人後者以傍枝後其大宗為祖後者以嫡孫後其祖雖其本末疏戚不同而其所以必為之三年者則皆以為後之故為後者受重之謂也不獨如是而已禮經固有為曽祖後云者為髙祖後云者為曽祖後者謂若父與祖或以疾廢與先曽祖而死者也為髙祖後者謂若父與祖與曽祖或以疾廢與先髙祖而死者也為曽祖後則為曽祖斬為髙祖後則為髙祖斬若以代父為説則是父之所齊期者吾代為之斬父之所齊五月者吾代為之斬此其本末倒置甚矣又何以為代乎為曽祖斬則謂之代祖也可為髙祖斬則為之代曽祖也可代父之説又何施乎此其鄙野舛駁絶不可凖於經典然世耆儒老生亦往往以此為説余竟不知其何所起也禮經十七章中無此説雖漢宋諸儒生論禮者數千家亦絶無此説余竟不知其何所起也禮為祖後者服斬不言服祖之妻何服非略之也葢發凡於為人後者章中矣曰為人後者為所後之妻若子以傍枝後其族人猶服其所後之妻若子况以嫡孫後其祖而不以若子之服服其祖之妻者乎由此言之為其祖加服云者自為受重也非為父也為其祖母加服云者自為祖也亦非為父也此祖母也禮曰繼母如母則繼祖母如祖母也為祖而服其繼祖母豈繫乎父之及見與不及見乎為祖而服其繼祖母豈論其有出無出乎且謂之繼則是不論其有出無出而為之服者固非其所出以繼母之服不問其有出無出而隆殺之也何獨疑於繼祖母焉夫有出而加服無出而降服此古所以制媵妾之等然非所以施之於嫡也禮已之妻嫡子之妻不敢以無出降而况於祖母乎以吾友有好古謹禮之意不敢不悉所聞更與知禮者計之禮後喪有前喪中其服後但據後喪始日為斷不據前喪滿日為繼也假而前喪小祥遇喪則兩喪共服之四年并以白與宜興諸友書古禮饋奠則從主人而服則從族戚朋友各以親疎輕重自製之是故主人饋奠而族戚朋友助之執事則有之矣在禮未聞有族戚朋友供奠物之文也主人勞族戚朋友以執事則有之矣在禮未聞有主人散麻散縞散絹于親戚朋友之文也今一切反是族戚朋友為之饋奠是以族戚朋友而代主人之所自盡也主人為之散麻散縞散絹是以主而擅族戚朋友之所自備也此禮不知始何時古所謂野于禮者其此類之謂乎且近世喪葬日奢日靡富貴人家一日至享十家之奠自啟殯至葬數日間大牲小牲刳割狼籍且百千計鬼神情狀與人情不相逺鬼而無餒所食幾何今若此不惟生者靡費抑亦使死者不忍且夫放生以資冥福則儒者所不信殺生以重冥咎則理未必無是以痛為亡妻謝此業債族戚朋友則相信者多矣而一麐自宜興歸乃聞諸友復欲醵金為奠且殺生靡費於有所用所必受猶尚不可况施于所必無用所必不敢受其謂之何如諸友以為情有未盡但逺來臨𦵏此亦足矣即使吾身後諸友亦只須如是行之但能相體不為無情也答萬思節主事書承示途中遇險及當局冷眼之説足知新功甚慰甚慰熱處冷得絶勝冷處冷得然險處惶惑原是易處錯過不曽做得功夫也易論學毎以涉川為説故曰作易者其有憂患乎所謂終身之憂也吾友閒居少過却是不曽抖擻提醒精神吾固預憂吾友涉川之難今吾友自知之矣自此𦂳著功夫常常從危處操心常如與夭吳河伯對壘毁譽利害諸闗悉與照破即世間一切大川何所不利涉也先輩云聖人於困險中有至樂於安平中却是有至憂然哉吾毎欲與大洲兄相㑹乃欲相與證明絶學非厯數之謂也然厯數自郭氏以來亦成三百餘年絶學矣國初搜得一元統僅能於守敬下乗中下得幾句註脚監中二百餘年拱手推讓以為厯祖吾向來病劇中於此術偶有一悟頗得神解而自笑其為屠龍之技無所用之亦嘆世無可語者近得來書乃知復有透曉如大洲者在也一快一快但不知大洲所謂透曉而厯官所不解者何所指耶豈所謂厯理者七政盈縮遲疾之所以然如元史所載王恂李謙厯議及縁督氏革象書之類獨能洞其精微是厯官祗知其數而吾輩獨能明其理遂指此為透曉而厯官所不解者耶葢昔者太史造厯既已測定日躔盈縮月離遲疾去極逺近渾淪得一天體在胸膈中而欲傳之形氣之間以為厯本則是以數寸算子握住萬古宇宙轉運葢甚難下手此子長所謂太初厯既已測候而姓與都等不能為算之時也古厯大衍為精一行和尚藏却金針世徒傳其鴛鴦譜耳于是守敬獨得一法曰弧矢圜算如所謂横弧矢立弧矢赤道變為黄道黄道變為白道者最為圓機活法自此黄赤白三道之畸零可齊而氣朔之差可定此法不惟儒生不曉而三百年來厯官亦盡不曉矣今監中有一書頗秘名曰厯源者郭氏作法根本所謂弧矢圜術頗在焉試問之厯官亦樂家一啞鐘耳豈大洲所謂透曉而厯官所不曉者葢謂此耶若所指如前説雖極精微幽眇猶是儒生套子所指如後説雖若九九綴術乃是實得也煩問之大洲求一轉語見示當更有請教夫六藝之學昔人以為數可陳而義難知在今日厯家却是義可知而數難陳葢得其數而不通其義者有之矣若謂得其理而不得其數則施之實用既無下手處而并其所謂義者亦脱空影響非真際也雖然今厯家自謂得其數矣今厯家相傳之數如厯經立成通軌云云者郭氏之下乘也死數也弧矢圜術云云者郭氏之上乗也活數也死數言語文字也活數非言語文字也得其活數雖掀翻一部厯經不留一字盡創新法亦可以不失郭氏之意得其死數則挨牆傍壁轉身一步倒矣夫知厯理又知厯數此吾之所以與儒生異也知死數又知活數此吾之所以與厯官異也理與數非二也數者理之實致用處也活數死數非二也死數者活數之所寄也近見一二儒者亦有意象數之學然不得其傳則往往以儒者範圍天地之虚談而欲葢過疇人布算積分之實用不知豈便吃爾葢過了也後世儒生所論六藝往往而然不特厯也大洲其於吾言有合耶否耶楊子雲曰通天地人曰儒通天地而不通人曰伎通乎天地之厯數而未必通乎身心之厯數者又一行守敬輩之所以為蔽也今未暇論也雖然所欲請教於大洲者其大者百未一舉也而輒𤨏𤨏及此毋乃以我不知務乎縱言至此一笑吾友欲吾舉厯家一二𦂳要語與大洲印証如步日躔中盈初縮末限用立差三十一平差二萬四千六百此死數也又如步月離中用初末限度一十四度六十六分此死數也厯家知據此死數布算而已試求其所以為平差立差之原與十四度六十六分之數從恁處起則知活數矣似此只舉一兩件更不費辭也活數者如揲蓍求卦之初參伍錯綜而隂陽未分者也死數者如卦畫已成之後為九為六而隂陽既定者也又來書謂趙大洲主測候吾主布算此説未之盡也布算未有不始於測候測候未有不寄之布算而可以造厯者兩者相須如足與目但測候之法元史所載簡仰二儀今疇人子弟亦稍能用之而學士大夫亦有曉者及趙縁督革象書測經度測緯度之法尤更分曉吾是以略而不言且吾前書所引史記厯書中語太初厯既已測定而姓等不能為算自古造厯亦毎病布算之難此一行守敬所以獨擅專長司馬公是星厯專家其史記厯書是説自家屋裏説話細讀其叙作太初厯始末其意可識也雖然使人皆輸班自可以目定方圓而不必規矩使人皆羲和自可隨時測候而不必布算以成厯故布筭以成厯者令後可繼也此堯典中亦自了了其暘谷昧谷四段則測候也其閏月成歲數語則布算虚盈以造厯也但古文簡約不詳今渾天儀象自漢相傳以為羲和之遺則測候之器尚在而布算之法獨不傳竊意其法若傳比之一行守敬當更簡易密緻葢古人心學精微圍範天地與後世術家自别今所傳周髀經託之周公雖真贗不可知豈亦有羲和布算之遺乎而後世曉了者亦少矣與顧箬溪中丞書僕居閒多暇時或留意於數藝將向所聞之左右者時為紬繹其於古人象數之精意雖或有齟齬難通處亦多有欣然㑹心處其㑹心處既恨不得與明公相印証其齟齬處又恨不得就明公而為之發矇解縳也竊意六藝之學皆先王所以寄精神心術之妙非特以資實用而已傳曰其數可陳也其義難知也顧得其數而昧於其義則九九之技小道泥於致逺是曲藝之所以藝成而下也即其數而神明其義則參伍錯綜之用可以成變化而行鬼神是儒者之所以游於藝也顧先王六藝之教既寢而算書之傳於世者往往出於六藝之士之所為儒者絶不知其説而知其説又多非儒者是以其數存其義隱矣而藝士之著書者又往往以秘其機為竒所謂立天元一云爾如積求之云爾者雖算師亦多不省為何語復著書者之意葢若恐緘藏之不密而示人以金鍼也是以其數雖存而數之所以為數者亦隱矣伏惟明公以當世耆儒玩心神明之學而出其緒餘於藝數之間明公之於數葢古所謂進乎技而入於道以神遇而不以器求者也且小子辱不倦之教久矣是以敢更有請焉謹具如别紙與裘剡溪推府書昨承示欲賜徐醫扁額謹因尊教輳成兩字曰占恒何如恒者人心本常理古今凡聖不減不増惟其有占不占是以有能恒不能恒之别而恒道實未嘗去人也古聖賢教人雖一曲藝未甞不與心學相通人能得此常理設使為醫則必能究性命之源為巫則必能極鬼神之情狀一徹萬融所謂因源而得委也古如農轅重黎之徒以聖賢精微之學而為醫巫師是也若使為巫醫者知無恒之不可則必反而求之於心念念在有恒上著工夫則庶幾性命之源鬼神之情狀可得而無愧于巫醫葢本欲精其藝而因以達乎其德所謂自委而泝源也如古巫咸醫和之徒因巫醫而知道是也聖人提醒人心只在一占字易曰君子居則觀其象而玩其辭動則觀其變而玩其占所謂占者豈是揲蓍布卦乃為占哉此恒心之存主處則為居此恒心之應用處則為動神明在我知幾而動是無時無處不是占也不占則神明失矣幾微昧矣是可謂之恒乎而又何醫巫之可謂乎與項甌東郡守書索居既久益嘆朋友合并之難而知昔日相聚之為樂也然又有可感慨者念昔日從兄於杯酒談笑間此時弟甚疎鹵不能有所切磋於兄而兄之善言惇行弟亦不能竊之以自淑不過如世間所謂好友者而已求如古人切切偲偲講學輔仁則未也自去官歸家閉門静坐大抵人窮則反本霜降水涸天根始見於是大悔曩時孟浪痛自磨刮直欲掃去枝葉文飾從根本上著力久之亦漸覺有洒洒處但苦此心出入幾微之際殊廢檢防然亦漸覺有洒洒處此時欲見兄相與印証一畨了不可得則向者朝夕相聚反自錯過虚却光隂豈不可惜惟吾兄質實純明古所謂脚踏實地人也此不惟吾兄能自信而友朋亦無不以此信兄者别後想淵然深造非鄙陋之所敢窺測以舊時所見吾兄則尚有葑菲所以少贊於吾兄者何也兄得之資禀者持守有餘而充拓未至資禀有餘於毅而力量不足於𢎞其得處乃是氣質最美而其不及古人處乃是學問不能變化氣質也古人為學皆是百磨百錬工夫如書臯陶論九德寛而能於栗直而能於温沉潛能剛髙明能柔斯則磨錬已至氣質變化之効也夫弟所謂充拓者亦非如由赤子之心擴而充之説葢赤子之心本自充擴得去本自能大有一分不能充拓皆是未盡此心之量耳中庸曰致廣大而盡精微極髙明而道中庸德性本自廣大本自精微本自髙明本自中庸人惟為私欲障隔所以不能復然故必須道問學以尊之耳此千古學問之的也據吾兄舊日規模且未免作世間一種寡過之人其於聖賢作用尚是有間學問須先定其基故孔子不取謹愿之士而取狂狷為有基也狂者固不待言至於謹愿之士與狷者其不為不善亦較相似但狷者氣魄大矯世獨行更不畏人非笑謹愿之士氣魄小拘拘謭謭多是畏人非笑悁者必乎已而謹愿者役於物大不同耳今人多以謹愿者為狷此亦問學不明之過也交游可望者殊少得如吾兄者尤少如弟疎鹵尚不敢自棄以吾兄之純明其於道翻然易耳願聞兄之所安整理民事皆是吾人切實工夫而兩郡之治如何并願聞之邇來士風澆薄而江南重以侈靡浮蕩比之他所尤甚大抵富貴功利之習糊人心目如處豐蔀之中舉眼皆蔀也蔀外更不見一物矣是以迷惑顛倒莫知所止非有先知先覺者孰能出之溷穢而轉之清流乎提學馮先生觀其論議行事亦不為無意於此矣詞華本實之間稍有軒輊便足鼔舞人心吾兄相㑹得從容聚語幸委曲一贊之與張士宜書近承來諭同志中往往夢中作醒語誠然誠然其下者假公濟私其髙者以意見所到為實際葢原始初發心原不曽種下真種子所以頭出頭没轉來轉去竟不出人意見科臼中方且認賊作子自謂超悟誑已誑人以迷指迷道之不明不行深可太息僕亦夢中人也雖然自數年來益覺掃除私意之難益信古人備嘗艱苦動心忍性知險知阻是細細磨錬細細降伏此心處方欲强勉從事銖寸積累十數年庶幾少有所進不敢自負也若謂認得本體一超直入不假階級竊恐雖中人以上有所不能竟成一畨議論一畨意見而已謝上蔡云今之學者何足道能言真如鸚鵡耳透得名利闗此是小歇脚此古人自驗過不誑語也兄邇來自考此處何如天理愈窮則愈見其精微之難致人欲愈克則愈見其植根之甚深彼其易之者或皆未嘗實下手用力與用力未嘗懇切者也東南勢利之習薫塞宇宙腥穢人心葢末世氣習盡然而東南靡麗之鄉則為尤矣昔人所謂非百年必世不可得而變也非知命不惑不可得而改也已乎奈何恐但於後輩中視其一二有志者稍稍語之以義利賔主之辨然亦不敢深求而過責之但令其立定趨向儘力從事於清苦淡薄使日揩月磨庶有以奪其紛華盛麗之好而已然亦不知後竟得力否也令兄質地近樸愧不能有以開發之且抱病亟歸又不能久相與也然家庭兄弟間自有餘師矣至舉業一節似亦未嘗苦心其間今但令其讀古儒先之書反之於心稍稍窺見理路然後轉向舉業上去亦以速歸不及竟矣諸皆負其逺來歉歉秋間或當同舍弟至南都此時可得一奉教然未敢必也與陳后岡㕘議書别後戀慕不舍與久病衰頽之狀大略具之葉紹興通判所寄書中今家人來亦當口能道之矣毎毎念昔與兄同住京師日夕相砥淬受教不為不深且愧迂疎無以承之不謂此後渺然相隔葢三四年而僅得一兩日之聚方其離思孤懐十未展其一二而鷁首已南矣亦何暇於吐心曲談道德以交助所不及者乎兄去閩越不知復以何時為聚首之期非惟僕蓬蒿之質不能藉直於麻中而兄之德器如玉亦不暇置諸頑石之間以自攻此其可思可恨豈特以酒食文字之故也僕嘗聞兄緒論大意以為必雜用王覇乃可以適時而濟務而僕則多執泥古方戛戛乎如以舟而行諸陸然兄既以此自信而不疑僕亦以此自謬而不悔是以自承教以來契分雖甚投而議論常至左右古人云去短集長此僕之所以不可無藉於麻中之直而兄顧亦謂有取於頑石焉其可也兄在湖藩清修之節剸繁之才自與時流迥别雖然亦願兄毋見化城而遽住耳今奉去讀書記乙集一部僕意欲以此廣兄不知兄肯降心而觀焉否也僕竊謂三代人才皆從心性上磨錬故其經綸㕘贊之業不出户庭而得之後世反躬之學不傳而其人所以經綸於世者率亦疎鹵求其繋國之輕重如孔明李泌陸贄之徒則其於道雖未醇而本其天資之所暗合亦往往開誠而不欺恬澹而少欲其經綸雖未必盡出於道而竭其才之所及亦往往淵源而有本濶大而無漏固不可謂其無人焉而非謭謭然功名自喜者可以跂而望也蘇子有言士之不以天下之重自任者久矣兄其有意乎僕居閒無事欲得國朝諸名臣奏議讀之且以尚論其人與其所以經綸於世者何如顧僻處山居苦不能多致煩兄為我留意至於北宋以前諸儒解經之書多散軼不存亦煩兄試博求之菽園雜記諸書兄向欲録一副本見與亦願兄毋忘之也若夫詩詞之學則僕自知力之決不足以進此向已告疲於兄矣兄毋更以此望我竢他日有持后岡先生集示我者我當望洋而嘆或尾後作一二句䟦語是則可耳兄許我以暮年買田同住之説如何如何諺云癡人前不得説夢吾已執此作左劵矣幸兄毋使我為癡人也失兄於東隅得兄於桑榆竊以為快草草白答屠漸山諭德書自聞兄有疾時以為懐夏間富生于德來學毎因富生問起居則知既已勿藥矣甚慰甚慰浮屠家稱缺陷世界故物忌于盈吾兄之才于其所享可謂完矣乗除消息天行則然吾兄之疾豈造物者將以是少損虧焉而大受于其後也乎兄平生意氣甚髙聰明甚慧夫高者不可柔而雌也慧者不可藏而晦也兄罹此疾疢則寂寞枯淡之中静思黙視種種之世界種種之伎功無可恃以不朽者必將于幻身之外别求所謂本來面目者而從事焉則兄之學將日以精而其所得於病者不既多乎此僕始為兄憂而竟為兄賀也故曰惟其病病是以不病兄勿以為濶論如何弟年來奔走荆溪今歲始買小庄去縣十四五里妻子始有定居衣食稍能自給一身幸為天地間一閒人矣藥餌之暇亦欲講習故業冀少有得焉以畢宿志而海内知交皆散在四方昔人取多聞而恨于獨學之難毎以為嘆而知交如兄者則尤往來于懐也向嘗託南江道此意而兄不能來僕又不能往奈何今蹉跎又經歲矣後復如何使來承委令兄祠堂文字縁僕素病羸自鄉居以來欲節省言語文字以完心氣故凡親知之託一切謝免而吾兄數百里相命似不宜以此為解然復自念平生未獲請見于九峰先生既無以測知精神意向所在而欲為之叙論若深言之則近于諛墓之嫌淺言之則不足以發潛德而違于銘以稱美之義以不滿于愛弟孝子之心是懼欲辭去則又重以違長者之命而不敢也又復自念兄之所不逺數百里而託於不文之辭者葢以迂戅之人不能為諛其言或可以信于後來者耳今以平生未嘗請見而深言淺言兩無所措乃嚅囁而為之言是無以自信乎其心而又何以信乎其人非兄所以相託之意也是以敢直布腹心而辭于將命者且其人之相知而言之足以信者則既有東郭少湖在矣幸兄亮之與吕通竹嶼書執事佐郡六年清苦直方之節衆共知之而山人之知執事獨深執事亦謂山人臭味之相同也日夕所以拳拳于山人者亦深且厚今執事行有日矣山人非仁人也不能贈執事以言山人貧也不能贈執事以財而繾綣之情不能自已聊具鹿靴一雙奉將别意靴者履也易不云乎素履之往獨行願也伏望執事率其素履獨行所願不以夷險二其心不以終始渝其度用于世則為羔羊素絲之風不用于世則勵蔬食飲水之志履道坦坦為天地間一完人此其所得較之壊名毁節以苟一時之富貴者雖在卿相知執事必不以彼易此矣山人敢以致愛助之意與金令攝山書金入於大冶數經火力愈鍜錬則愈精純而授新馬於舊牧之圉試其熟技則人與馬益相習雖然其雜金固有一火焉則耗者矣其牧馬如東野之御固有始則善而久則馬逸焉者矣攝山之凜坎於世也是金之數經於火也其再令於章丘也是再牧馬也吾見攝山之愈進於精純而章丘之民與攝山益相習也雖然不可以不兢兢也使久而益精也而無耗焉久而益相習也而無逸焉而後知攝山之果為良金與良牧也近得李中麓書言章丘凋敝甚須得良吏拊循極有望於攝山僕以為在攝山舉定海之故事行之益加之意而已至於馬因地異性人因地異習銜勒有緩急飼秣有燥濕不窮其力不失其性則在善牧者虚心而調劑之僕又何言哉與吳令峻伯書前使者冐進瞽言自分必且見絶於吾友矣適㑹陳户曹道及吾友欲相顧是吾友舊愛之深不遽以瞽言為辠也即令人往候使節於白氏則已行矣悵惘竊惟論治者先體故按督之體異乎州縣風憲之職異乎拊循而州縣之所以拊循其民惟其平易豈弟大小畢輸其情使民之入公門者如入乎其家見守令者如見其父母是之為貴耳使民見威而不見德敢怨而不敢言則雖一時或能收整頓撡切之效而其所斲喪者多矣書云髙明柔克可省也向孫文卿在江隂嘗過僕僕問之曰兄素講學學問不是空談即如大學論平天下如保赤子此便是真心便是明明德兄試自省百姓到面前時可與自家兒子一般文卿應曰此意却似有之僕當時不以為然曰兄得無太容易説了久之詢其所以蒞民果無甚愧乎其言僕是以心慕而敬焉文卿方於事上而圓於撫下是以雖或惡而謗之而不勝其愛而譽之者之多也眼中亦曽見一人為江隂使百姓膝行而前俯伏戰慄不敢仰視此輩者何足多哉吾友清才雅志僕何用喋喋若此但柔克之説為髙明者發耳傳曰善人受盡言僕素以豪傑望吾友豈獨善人已也相念甚勤未知使節何時更入郡耳懸懸素不遣人持書入府縣中今特遣此以謝兩次不得相見之故且恃吾友之知我也有持賤名到貴治者必偽無疑預言之與二弟書行者居者形跡各别然理道無二致也日用工夫無二致也汝兄在山中若不能謝遣世縁澄徹此心或止游玩山水笑傲度日是以有限日力作却無益縻廢即與在家何異汝在家若能忍節嗜慾痛割俗情振起十數年懶散氣習將精神歸併一路使讀書務為心得則與山中何異艱哉艱哉各各努力居常只見人過不見已過此學者切骨病痛亦學者公共病痛此後讀書做人須苦切㸃檢自家病痛葢所惡于人許多病痛若真知反身則色色有之也與田柜山提學書約之過敝邑寄到手書嘉惠多謝雅意僕自送約之至姑蘇觸暑積勞遂爾發瘧迄今伏枕未及能强起也病歸以來生平交遊一時雨散空山獨坐毎毎念之令人無以為懐此豈惟握手殷勤日夕之懽不能解之于心而獨學無友則昔人所以深病于孤陋也奈何近㑹約之稍能道吾兄所新得慰甚約之又言吾兄以好畫之故至欲手自摹搨則僕之迂滯所不能解者然吾兄專凝純静豈謂沉溺於此或者居閒無事游息之時聊以此為戲耳僕竊謂游藝之與玩物適情之與喪志差别只在毫芒間如六藝皆古人養性而理心自此便可上達天德今人學射學書學數則不過武人之麤材與胥史之末技是以戴記分為德藝上下之説而子夏亦譏其不能致逺况又不在六藝之科者乎且古之善畫不過如鄭䖍王維輩何足學也况學之終身有竟不能似其一水一石者乎陳履常之詩曰晩知書畫真有益却悔歲月來無多僕常誦而笑之以為履常知書畫之有益而為益有甚于書畫者履常不知也履常自悔其歲月之不足以給書畫而書畫祗足以縻費歲月者履常不知也吾輩年已長大雖籠聚精神早夜矻矻從事于聖賢之後尚懼枉却此生則雖詩文與記誦便可一切罷去况更有贅日剰力為此䑛筆和墨之事乎然僕聞之畫家之説亦不以䑛筆和墨者之為工而必解衣盤薄為之上乃知畫家不貴能畫正在能不畫耳若此者所以凝神而不分其志也兄之畫品能通乎此則僕之所不敢知而所以諷兄者無乃為土苴末論乎幸兄一笑而擲之可也僕自别後携家至陽羡謝去世事牽纏時時閉門黙坐始知平日没于多岐蕩精揺神之過必讀邵子勞多未有收功處踏盡人間閒路岐之語則憮然大悔者久之是以奕棊賦詩博聞强記皆昔所甚好或終歲不對局或終月而不成一韻或數旬不展巻雖或為人所强與自强為之亦竟如嚼蠟了然絶無滋味也觀尊巻所書數作則荒落疎懶之態可盡見之僕之為此其志亦欲發憤刋落收功一原而力又不能逮也惟兄有以教之與陳兩湖主事書兄自少才名已滿海内六家九流之書幾乎無所不誦莊騷太史之文亦無所不摹畫而操縱之矣即使海内竒才偉士欲傲兄以所不知而亦不能也况如僕者才至駑下曩在京師毎同平凉趙景仁過兄論文久之兄慨然曰二子之言是也遂欲盡棄其舊學而更張之然當時猶謂兄之急於奬善而以口語相推云云已而視兄之文則果脱然盡變於舊矣夫文人相笑在古則然景仁於兄未知何如也至於僕之讀書則豈能若兄之博而其為文也亦安敢望如兄之古哉然兄不憚降心屈已而從之推兄是心也設使不徒用之於文而用之反躬為己之間即古人所謂勇徹臯比一變至道者在兄亦何讓乎僕未始不嘆兄之髙明不可及而亦毎毎惜兄有可以一變至道之資力而僅用之於文也雖然此亦未有人焉以反躬為己之説而謦欬於吾兄之側耳設使有人焉以反躬為己之説而謦欬於吾兄之側如吾二子者之論文又安知兄之降心而從而翻然變於其舊也之不為太速乎則又未始不自罪吾二子者不能為古人反躬為己之説以告兄而徒以文士雕蟲篆刻之論投兄之好也兄今之所謂狂也而豁豁磊磊率情而言率情而貌言也寧觸乎人而不肯違乎心貌也寧野於文而不色乎莊其直以肆則亦古之所謂狂也是兄有可以一變至道之力而又有狂以進道之資也兄其能無意乎然兄之意必曰吾平生好適吾性而已矣吾不能為拘儒迂儒苦身縳體如尸如齋言貌如土木人不得動搖云爾夫古之所謂儒者豈盡律以苦身縳體如尸如齋言貌如土木人不得動搖而後可謂之為學也哉天機儘是圓活性地儘是灑落顧人情樂率易而苦拘束然人知恣睢者之為率易矣而不知見天機者之尤為率易也人知任情佚宕之為無拘束矣而不知造性地者之尤為無拘束也人之病兄亦或以其樂率易而苦拘束而僕則以為惟恐兄之不樂率易不苦拘束也如使果樂率易苦拘束也則必真求率易與無拘束之所在矣真求夫率易與無拘束之所在也則舍天機性地將何所求哉故人欲之為苦海而循理之為坦蕩使兄不以僕言為迂也願繼此而更進其説也僕自少亦頗不忍自埋没侵尋四十更無長進惟近來山中閒居體驗此心於日用間覺意味比舊來頗深長耳以應酬之故亦時不免於為文毎一抽思了了如見古人為文之意乃知千古作家别自有正法眼藏在葢其首尾節奏天然之度自不可差而得意於筆墨蹊徑之外則惟神解者而後可以語此近時文人説班説馬多是寢語耳莊定山之論文曰得乎心應乎手若輪扁之斲輪不疾不徐若伯樂之相馬非牡非牝庶足以形容其妙乎顧自以精神短少不欲更弊之于此故不能窮其妙也何時得與吾兄一面談之寄黄士尚遼東書弟也奉職無狀幸䝉寛恩得歸田里不然則從兄於遼海之濵亦所願也易之蹇不云乎君子以反身修德夫身何待蹇而後反德何待蹇而後修葢寂寥枯淡之中其所助於道心者為多也自儒者不知反身之義其高者則激昻於文章氣節之域而其下者則遂沉酣濡首於蟻羶鼠腐之間如兄之志氣固已塵垢一世而與古之志士為徒矣不知近來反身之學得之于蹇者何如幸以教我張舜舉言兄自戍遼以來作詩幾四五本兄何以致多如此豈將是自鳴其習坎心亨之樂耶或者窮愁羇旅之思無聊而姑託以自遣耶抑以寫其江湖之憂而致其去國繾綣不忘之愛如古離騷之作耶其無自擬於鐃歌鼔吹遼東都䕶之曲而與塞垣横槊之士同其慷慨而謳吟耶不然則枝葉無用之辭其足以溺心而愒日也久矣兄何取焉日課一詩不如日玩一爻一卦日玩一爻一卦不如黙而成之此之謂反身而又奚取於枝葉無用之詞耶弟近來深覺往時意氣用事脚根不實之病方欲洗滌心源從獨知處著工夫待其久而有得則思與鄉里後進有志之士共講明焉一洗其蟻羶䑕腐争勢競利之陋而還其青天白日不欲不為之初心此鄙人之所不自量而竊有冀焉者也天子仁聖在宥天下兄豈久於海濵哉弟獨學無朋將藉兄為助日日望之近來應酬文字毎不敢作而年嫂誌文則不敢辭葢以昭天子之寛仁而發海外孤臣心事之一二焉非特為應酬故也嘉幣謹辭果酒則拜賜矣廣寧有賀黄門醫閭先生者忠信髙節之士也其風尚在否兄試詢之土人亦可為旅中蓄德之一助也答皇甫柏泉郎中書前得方山書知與兄日相切磨必多有妙論恨不能往㕘其間而與聞之也僕之不獲奉教於兄而索居也其亦久矣僕之懶病而廢學也其亦久矣藝苑之門久已掃迹雖或意到處作一兩詩及世縁不得已作一兩篇應酬文字率鄙陋無一足觀者其為詩也率意信口不調不格大率似以寒山擊壤為宗而欲摹効之而又不能摹効之然者其於文也大率所謂宋頭巾氣習求一秦字漢語了不可得凡此皆不為好古之士所喜而亦自笑其迂拙而無成也追思向日請教於兄詩必唐文必秦與漢云云者則已茫然如隔世事亦自不省其為何語矣所以久而不能請教於兄者正以村俗匠人不敢呈技於輪扁之前也今既與兄開口説破容繕寫一兩篇奉以為笑耳蔡白石今之名家也僕向來頗不謂然近得其詩讀之則已洗盡鉛華獨存本質幽𤣥雅澹一變而得古作者之精僕雖非知音亦三嘆不能自已竊謂此兄當與吾兄並驅辭場矣雖然以兄之髙明磊磊若以一生之精力盡之於此即盡得古人之精微猶或不免乎以珠彈雀之喻向曽寓一書於蔡兄不知蔡兄曾與兄泛論及之否又不知方山之所謂與兄日相切磨者抑亦止於藝文之間而已也抑亦不止於藝文之間而已也更願聞之來教道未就損學不加益之説雖兄之謙亦足以知兄苦心也學之不加益也正坐不能損耳更願聞所以望之之説也與蔡子木郎中書往年辱兄知愛謂可與共進於文藝之門今忽忽齒髪漸衰兀然成一秃翁向來伎倆剥落且盡雖誦人詩句亦如羅刹國人驟聞中華語音駭不省其何説况能自有所著以自見於世也朋友間往往言及兄之垂意於僕豈特以故人之故耶抑亦謂其可與進於文藝之門耶豈知僕之衰颯剥落至此哉雖然以兄愛我之意其知我之衰颯剥落至此也豈不為僕惜之以僕之愛兄之意亦竊謂兄以聰明絶世之資而消磨剥裂於風雲月露蟲魚草木之間以景差唐勒曹植蕭統為聖人而冀為其後此其輕重豈特隋侯之珠彈雀而已亦可惜也曩與兄相聚時兄年最少而僕亦壯年今壯者衰則少者亦壯矣由壯入衰能幾何時四十無聞則僕既自蹈之矣自惜之矣倘兄以為宇宙内事與吾分内事盡於風雲月露草木蟲魚之間則足矣不然則亦不可以不深思君子進德脩業欲及時也兄苟不以僕言為戅繼此尚有所請不然且閉口耳辱愛多談亮之又曩承答教深慰素懐且自笑僕之所知于兄者淺也僕嘗謂學者非無痛癢之為貴而以真知痛癢為先知痛則不能不䕶而藥之知癢則不能不爬而搔之今之學者病在徧身麻木全然不痛不癢所以更不得力然知痛癢若不是真知其更不可忍處亦是不知痛癢縱使爬搔䕶藥亦悠悠不得力也來書云詞章為聰明之害又云於苫土中覺得曩時醉夢流浪此是吾兄一口説著平生痛癢一些不自瞞一些不瞞人即此一些不自瞞不瞞人處何等光明何等直截便是起凡入道真根子也雖然昔人謂舊習如落葉既掃復積兄試觀之既覺得曩時醉夢流浪之後四五年來種種世味種種酬應種種思慮能盡不醉夢不流浪否抑時有醉夢流浪處否醉夢流浪處當時便能覺得既覺便能撥轉得否抑亦有恍惚不便覺得牽掣不便覺得牽掣不便撥轉得否如把筆作詩時自覺淡然一無喜心否既有喜心其于好醜贊毁種種勝心能不藂然而動否覺有動處便能銷化否抑亦有牽掣不便銷化否其不把筆為詩時喜心勝心能不潛伏否不止作詩一節凡一切外馳習心能銷化否不潛伏否細細照察細細洗滌一些不得瞞過一些不得放過乃是真知痛癢既真知痛癢即境界不論静閙工夫不論頓漸静閙一境界也頓漸一工夫也兄以避北而就南舍頓而即漸為説夫閙處不得力即静處未可謂之得力不究竟所謂頓亦安有所謂漸乎收攝精神併歸一路漸即是頓即此一路接續不斷頓即是漸非二致也然吾兄討方便處用力亦未嘗不是也既真用力則静閙漸不患其不一矣來書所病世之君子以聖學之名習江左之實是非頓之為患也正坐自瞞過自放過麻木不識痛癢耳來書所病英氣血氣害事亦正坐不識痛癢耳弟之不肖年來痛癢頗漸自知追尋病根大率苦血氣之為累血氣薫成習氣不能自脱詩文之障亦時尚往來胸中第争分數重輕而已此不能以欺兄者自顧齒髪漸衰痛癢心切既稍有知不敢不竭力爬搔䕶藥使此生甘為麻痺人也來書提出小心兩字誠是學者對病靈藥但如前所説細細照察細細洗滌使一些私見習氣不留下種子在心裏便是小心矣小心非矜持把捉之謂也若以為矜持把捉則便與鳶飛魚躍意思相妨矣江左諸人任情恣肆不顧名檢謂之脱洒聖賢胸中一物不礙亦是脱洒在辨之而已兄以為脱洒與小心相妨耶惟小心而後能洞見天理流行之實惟洞見天理流行之實而後能脱洒非二致也弟之不肖正程子所謂墮在沉滯執泥坑裏者自愧脱洒之未能也惟兄教之僕之所請教于兄大要只是一言願兄時時無忘苫土中所見如何如何答茅令鹿門書來書論文一段甚善雖然秦中劎閣金陵吳㑹之論僕意猶疑於吾兄之尚以眉髪相山川而未以精神相山川也若以眉髪相則謂劍閣之不如秦中而金陵吳㑹之不如劎閣可也若以精神相則宇宙間靈秀清淑瓌傑之氣固如秦中所不能盡而發之劎閣劎閣所不能盡而發之金陵吳㑹金陵吳㑹亦不能盡而發之遐陋僻絶之鄉至於舉天下之形勝亦不能盡而卒歸之於造化者有之矣故曰有肉眼有法眼有道眼語山川者於秦中劎閣金陵吳㑹苟未嘗探竒窮險一一歴過而得其逶迤曲折之詳則猶未有得於肉眼也而况於法眼道眼者乎願兄且試從金陵吳㑹一一而涉歴之當有無限妙處無限難處耳雖然懼兄且以我吳人而吳語也與茅鹿門主事書熟觀鹿門之文及鹿門與人論文之書門庭路徑與鄙意殊有契合雖中間小小異同異日當自融釋不待喋喋也至如鹿門所疑於我本是欲工文字之人而不語人以求工文字者此則有説鹿門所見於我者殆故吾也而未嘗見夫槁形灰心之吾乎吾豈欺鹿門者哉其不語人以求工文字者非謂一切抹摋以文字絶不足為也葢謂學者先務有源委本末之别耳文莫猶人躬行未得此一段公案姑不敢論只就文章家論之雖其繩墨布置竒正轉摺自有專門師法至於中間一段精神命脉骨髓則非洗滌心源獨立物表具今古隻眼者不足以與此今有兩人其一人心地超然所謂具千古隻眼人也即使未嘗操紙筆呻吟學為文章但直據胸臆信手寫出如寫家書雖或疎鹵然絶無煙火酸餡習氣便是宇宙間一様絶好文字其一人猶然塵中人也雖其顓顓學為文章其於所謂繩墨布置則盡是矣然翻來覆去不過是幾句婆子舌頭話索其所謂真精神與千古不可磨滅之見絶無有也則文雖工而不免為下格此文章本色也即如以詩為喻陶彭澤未嘗較聲律雕句文但信手寫出便是宇宙間第一様好詩何則其本色髙也自有詩以來其較聲律雕句文用心最苦而立説最嚴者無如沈約苦却一生精力使人讀其詩祗見其綑縳齷齪滿巻累牘竟不曾道出一兩句好話何則本色卑也本色卑文不能工也而况非其本色者哉且夫兩漢而下文之不如古者豈其所謂繩墨轉折之精之不盡如哉秦漢以前儒家者有儒家本色至如老莊家有老莊家本色縱横家有縱横家本色名家墨家隂陽家皆有本色雖其為術也駁而莫不皆有一段千古不可磨滅之見是以老家必不肯勦儒家之説縱横必不肯借墨家之談各自其本色而鳴之為言其所言者其本色也是以精光注焉而其言遂不泯於世唐宋而下文人莫不語性命談治道滿紙炫然一切自託於儒家然非其涵養畜聚之素非真有一段千古不可磨滅之見而影響勦説葢頭竊尾如貧人借富人之衣庄農作大賈之飾極力裝做醜態盡露是以精光枵焉而其言遂不久湮廢然則秦漢而上雖其老墨名法雜家之説而猶傳今諸子之書是也唐宋而下雖其一切語性命談治道之説而亦絶不傳歐陽永叔所見唐四庫書目百不存一焉者是也後之文人欲以立言為不朽計者可以知所用心矣然則吾之不語人以求工文字者乃其語人以求工文字者也鹿門其可以自信我矣雖然吾槁形而灰心焉久矣而又敢與知文乎今復縱言至此吾過矣吾過矣此後鹿門更見我之文其謂我之求工於文者耶非求工於文者耶鹿門當自知我矣一笑鹿門東歸正欲待使節西上時得一面晤傾倒十年衷曲乃乗夜過此不已急乎僕三年積下二十餘篇文字債許諾在前不可負約欲待秋冬間病體稍蘇一切塗抹更不敢計較工拙只是了債此後便得燒却毛頴碎却端溪兀然作一不識字人矣而鹿門之文方將日進而與古人為徒未艾也異日吾倘得而觀之老耄尚能識其用意處否耶并附一笑向承青萍之惠附謝適病灸未愈草草與莫子良主事書日夕望吾子良之來得所寄書知㑹在閏月頗以為慰富生逺來愧無以教之此生曩時讀書為文皆未嘗入苦心但隨其資性之所近為之故其語意多淺弱而乏精錬之思今稍稍示以闗鍵所在然渠性亦敏終當有悟也至於為人少年謹愿吾甚愛之亦時時示以立志必為古人之説不知竟能相信否耶幸為轉致意於令岳先生千里之託不敢負也古人不讀非聖之書以致精也僕之馳鶩於博雜也久矣近稍知向裏自悟溺心滅質之為病乃欲發憤而刋落之然亦自悔其歲月之晩矣大率讀書以治經明理為先次則諸史可以備見古人經綸之跡與自來成敗理亂之幾次則載諸世務可以應世之用者此數者其根本枝葉相輳皆為有益之書若但可以資文詞者則其為説固已末矣况好文字與好詩亦正在胸中流出有見者與人自别正不資藉此零星簿子也雖古之以詩文名家者其説亦不過如此况識其大者乎曩見子良舟中所携書多非要𦂳竊以今之世清修自潔如子良篤志好學如子良而或不免耗精力於無所用至於所最當留意者或且束閣而不暇也以與子良知愛之深乃不敢不盡其愚俟面晤時更有請也承嘉葛見惠客中適有一葛亦欲奉寄投李報李得無為笑乎閏月凖望一來勿爽勿爽荆川集巻四欽定四庫全書荆川集巻五明唐順之撰書答顧東橋少宰書某竊聞昔人以名譽不聞歸過朋友者謂其實溢乎内而譽不副之者耳非謂本無可以致譽而朋友為之賁飾以私於其好也沈别駕至辱賜手書奉函驚愧竊不自知所以先容於左右者開函讀之乃知以陳王二友之故明公過信而不疑耳是二友無乃私於其好故忘其醜而飾成其所長明公亹亹好士故博取於朋友之譽而不暇究乎其實也然在僕何敢當也僕自為諸生時得明公之文而讀之雖不能窺其精意然竊嚮徃焉及從㳺薦紳間又獲聞明公高誼傾海内而求士甚於士之求公且不在古人之後則心益慕之然蓄之數年而不敢通姓名於左右則亦有説夫玉工好玉則昆吾于闐之産非不欲盡而收之然有所不能收者碔砆耳瓊瑰碔砆亦莫不欲自獻於玉人之前然而有所不敢獻者自知其為碔砆耳僕迂戅無能人也過不自量嘗從諸友人學為古文詩歌追琢刻鏤亦且數年然材既不近又牽於多病遂不成而罷去及屏居山林自幸尚有餘日将以㳺心六籍究聖賢之述作鑒古今之沿革以進其識而淑諸身及牽於多病輙復罷去既無一成則惟欲逃虛息影以從事於荘生所謂墮體黜聰以為世間一支離之人耕食鑿飲以畢此生而不敢有覬乎其外盖所自量者審也又何敢以求知於左右也哉即使朋友欲為僕文飾計亦無以過於僕之所自量者矣不知二友之所以譽僕於明公者何語而明公又何從而過信之也此僕之所自愧且懼而不敢當也伏惟明公與世巻舒向也遵晦丘園時也於公一不以為損及出而秉鈞軸時也於公一不以為喜然而海内之士方公之退處則皆眷焉望其復用及其既用則皆望其秉鈞軸及公之秉鈞軸則皆欣然以喜何也僕竊觀聖人繫易于否泰初爻皆有彚征之説焉至於泰之以隣否之疇祉則皆繫之於四四者大臣之位近君而任重者也近世之士愞熟獧巧之習日工而羔羊素絲之節或衰矣而任重之人所指以為才且賢者又徃徃在彼而不在此盖士習既然而示之以好惡者則又然何恠乎靡靡一風也是以雖清明平泰之世而包羞匪人或不勝參錯乎其間雖否泰之機未必繫此而士習隆汙則亦可知必有大人君子任當世之重以身範物離祉其疇以長君子之道而黙消隂邪彚征之氣此海内所以致望於明公而非明公不能副海内之望也則如僕僻處山林亦将拭目以觀盛徳不徒為知己之私感而已迂踈病廢之人本不宜開口及世事縱言至此恃明公之知也惶恐惶恐前辱雄文垂示此明公所以誘誨僕者至深也謹拜教草草作載酒亭一詩用致嚮徃之懐更希教之答李中谿御史書兄之使閩也一年矣辱以書下問者且數四矣而僕無一言之獻豈惟素性迂戅自度不能然亦以兄之才力自足辦此耳既又自惟以為兄之才力固不待人然屢問而屢無一言焉是亦不免有負相知乃輾轉思之竟無所得惟有一事可以少效愚悃而塞下問之勤者則言之適在此時然亦自度非迂則戅也惟兄亮之而已且夫撫按之權舉劾最重百官之所以勸懲公道之所以開塞其繫於撫按舉劾亦最重然而今世所謂舉劾者僕竊異焉僕嘗備員郎署矣嘗得日聞邸報矣或曰今日某巡撫舉劾奏至矣僕不問而知之矣或曰今日某巡按舉劾奏至矣僕不問而知之矣何也其所舉者可不問而知其必藩臬方面大官也其所劾者可不問而知其必通判縣丞小官也其所舉者可不問而知其必牽朋聮伍不數十人不止也其所劾者可不問而知其必寂乎寥乎纔三兩人也如此則是賢者盡大官而不賢者盡小官也則是賢者甚多而不賢者甚少也夫使賢者盡大官又使賢者甚多而不賢者甚少則宜其政平而訟理苞苴不行於上怨毒不結於下天下可以卧而帖帖矣而顧不能然則是大官不能盡賢與賢者不必甚多而不賢者不必甚少也大官不必盡賢而賢者不必甚多不賢者不必甚少則彼舉大而劾小者無乃大官則足以樹恩而小官無傷於任怨也歟又無乃勢弱者易凌而根固者難㧞也歟而其所舉所劾之多與少又無乃厚市恩而薄引怨也歟如此則人心奚而得勸懲公道奚而得不塞也雖然固亦有藩臬方面大官而不舉或反見劾者矣嘗駭而問其人焉則是非能劾藩臬方面大官也亦非其人之果不賢也或負氣倔强不善曲媚者也不然則受人指嗾為之快忿者也亦有通判縣丞小官而不劾或反見舉者矣嘗駭而問其人焉則非能舉通判縣丞小官也亦非其人之果賢也或多援善鑚最有力者也不然則其親與故也如此則所劾者縱非小官則必負氣倔强與為人快忿者也所舉者縱非大官則必多援善鑚與親且故也然則人心又奚而得勸懲公道又奚而得不塞也由此言之為撫按者固不得以能舉人能劾人為榮而必以舉劾之不稱為可懼矣今兄之所屬其為方面大官者誰乎其為州縣小官者誰乎僕固不知也賢者多乎少乎不賢者多乎少乎僕固不知也而為是多口者亦據素所疑於人人者言之耳然以兄之志剛而識明秉正而嫉邪固必不同於人人矣必能示勸懲而彰公道矣又何藉於僕之言乎然僕之為是言於兄亦非欲兄之不舉大官不劾小官也非欲兄之所舉必少而所劾必多也大官果賢矣或矯而不舉亦私也賢者果多矣或避收恩之名而欲矯之以少舉不賢果少矣或沽澄清之譽而欲矯之以多劾者亦私也雖然􅀢以為莫如精舉而慎劾則劾者固少而舉者固不得多矣或曰舉劾皆少則是善有隱而不章惡有㣲而不屏也是不然矣夫天下中人多而其最賢與最不賢者少矣舉劾所以出於常格以待最賢與最不賢之人耳若夫小善小惡則固有考語矣又何慮善有不章而惡有不屛也故僕以為莫如精舉而慎劾兄意何如一言之獻如是而已惟兄亮之劉實夫已葬否葬時已有銘否如未有銘吾軰雖不文然以交㳺相知之故亦當强力為之兄北上時可問其家取一行状携来何如種種𠂻曲不能多談惟俟面既與周中丞論項守書數辱惠書教督以所不及深感知愛無量僕自去嵗移家至陽羡與世益踈濶此昔人所謂懶與病相成雖僅守固陋不敢墜失至於讀書窮理冀有新得則甚不能也其何以仰副明公教督之勤耶知愧知愧兹啓僕友人有項喬者其人温雅純實雖自處若謙退而其志常欲為古人雖其貌樸野而其中實耿耿然雖多卧疾若不任事而實蹇蹇奉職不肯一日尸乎其官僕於交㳺中知之最深而資其切磋之益亦最久矣又自羅翁當國為縉紳所輻輳而永嘉之人根株附麗攫美官鼔聲勢者尤衆喬與羅翁又有葭莩之親乃獨泊然自守不亂於羣甘心隱約不覬非望然此士人居身之常不足以稱喬而喬之不苟大率可見也此不惟如僕軰與之素交㳺者能知喬而士夫亦多知喬者夫以僕素辱明公之知則固可以薦人而不為僣以僕知喬之深則固可以薦之於明公而不為黨自喬在屬下二三年間僕不敢以一字稱喬於左右者豈僕過避嫌疑使喬之名譽不通於上而歸朋友之過於僕耶竊以為明公精鑑近世希有又素以汲引人材為心而喬之為人必能在處有所樹立則明公自将知喬而喬自足以受知於明公又何藉乎僕為人媒也昨得邸報見明公薦三郡守獨不及喬則始憮然異之既而思之何僕所料之不中耶豈喬之失其故歩耶或喬之㢘靖宜於郎署而不宜於郡守耶抑僕秪見喬前日之善而明公秪見喬今日之未善耶不然則或有間之者耶不然則以明公精鑑照物無遺而喬也日夕在左右而獨不得借餘光焉豈其命耶夫人情翻覆不常旬日異態固有匿情為善而後或敗露者矣亦有始雖强於為善而後不免改節者矣僕又何敢以四五年前所見過信故人耶雖然喬悃愊可信人也以喬之素能蹇蹇奉職則其為郡守不肯闒茸或可知也以喬之素不肯奔競以覬非望則其在郡不肯自汙或可知也又未敢以過疑故人也雖然僕所取信者明公之鑑也明公之黜喬而不舉必有説也則是喬固可信者少而可疑者多耶果飾於前而壊於後耶不然何為其見黜於明公也耶明公非不憐材則是喬果敗露與改節也僕之心不能觧也使喬之賢而偶未見知於明公則僕固不敢黙矣使喬果不賢以自取戾焉亦宜一請教於明公而與之絶可也是以不量狂妄而有是説焉伏惟亮而恕之幸甚答江五坡提學書海内交㳺如兄者幾人而交㳺中能重意氣不輕然諾如兄者又幾人與兄一别至今幾時中間問訊能相通者有幾眷言思之可為悵恨李中谿使来辱手書惓惓殊自慰幸又辱寄到十三經註䟽此大惠也僕於此書去嵗在山中偶甞讀之而於三禮者讀之頗詳竊以為王鄭諸儒雖未能深究乎先王之精藴至於形聲器度之間比較同異參量今古其功最多學者欲因筌蹄以求魚兎則此書不可不觀惜其舊板譌謬既多糢糊又甚故雖素好學者或倦於觀焉兄之刻此學者可謂幸矣而僕山野之人顧先得之不尢為幸歟中谿又欲刻杜佑通典恐此亦須刻也兄可賛之伏惟兄之蒞閩且三年矣八閩之士固已丕然向風矣而兄猶以人材風俗轉移變化之故未得其端為言者此足以知兄之志也夫今之為提學者苟博識善文及程較諸士文字之精與否而一無所失則已赫然足以收士心取髙譽矣至於人材風俗轉移變化則提學不以是自責而人亦不以是責之也兄獨慨然有意乎此固不以世人所趨尚與兄素所精詣者為可滿而必以不如古之善作人者為可歉歟古之道推其自治者以教人故徳修而教以尊教而後知困知困而後能自反故因其教人也而徳益修所謂教學相半也人之性行牽柔闇伏者多而果决雄毅者固少矣得其果决雄毅而能必為剛善且為剛中者又加少耳故臯陶之論九徳曰剛而塞强而義而箕子曰高明柔克兄固雄毅果决者剛者强者高明者也持之以動心忍性之力致之以收歛凝静之實克之以柔飬之以中使剛者必塞而不近於露强者必義而不過乎激積之也厚而蓄之也宻則兄之所以自進與其所以教人至於人材風俗轉移變化恐無以易此矣然此在兄之材力亦何難也嗟乎士之蕩于紛華競于馳騖而不歸其根也久矣閩固多文少實之域也非兄孰能振之而欲振之豈在聲色文字之間哉固有道矣若其次則莫切於風厲學官僕竊謂今之提學以一人督率六七郡之士即使如古之善作人者則善矣雖然其勢固亦不能人人而董之與日日而礲之也不能人人而董之與日日而礲之則其所被者淺矣古之教者自萬二千五百家為郷郷有師而至於五家為比比有師豈特教二千五百家者則賢哉彼其教五家者亦盡賢人也即使今之提學如古之善作人者亦不過六七郡共得一良師耳為此六七郡得一良師孰與為此六七郡得百十良師故為提學者莫急于風厲學官今學官𤨏尾自卑嗜利無耻人人相師靡然一風雖有一二材俊之士出乎其間猶懼其隨而偃也誠欲有以風厲之又恐非一提學之官與四三年之間所得為耳然以兄之材必能有以處此竊願聞教焉曩與王道思書亦甞及於提學之説大抵不出所以請教於兄者矣僕今嵗携家至荆溪此中山水清絶頗能恱人在病夫尢宜也邇来儘善飯羸弱之軀可以自支惟學不加進殊愧知已然於動心忍性收歛凝静此僕之所請教吾兄者亦不敢自棄也更願兄時督教之所示讀書太苦蕩揺精魂之說此兄之甚愛我敢不拜教尊作儒學記文最古雅然此自兄素所精詣不俟賛也山中亦有一二拙言更容繕冩求教答廖東雩提學書僕於吾兄雖相晤之日頗淺而相知之誼甚深兄之於僕則亦然也兩辱書惠深為空谷之慰又辱兩示髙文讀之喜躍夫京師都㑹也綴文之士比肩僕曩皆獲與之交而皆獲見其文焉然僕之所最傾意者乃獨在兄則數與傅少巖言之以為東雩之文氣骨甚勝無一㸃纎靡愞散之態後来可冀於作者東雩而已春間讀兄所為文視京師所見則加勝焉近復得讀兄所為文視春時所見又益加勝焉駸駸乎作者之堂矣頗自謂曩之所知於兄者之不妄也雖然文與道非二也更願兄完飬神明以深其本原浸涵六經之言以博其旨趣而後發之則兄之文益加勝矣兄志潔而識偉行方而氣和僕固一見而知兄之為任道之器矣嗟乎古聖賢之道其不講於世久矣聲利之燄薫塞宇宙日夜馳騖寡㢘而鮮耻儒生習見以為當然其有以講學為事者又或崇意見而乖實際競口耳而寡心得聼其言則美而考其實亦無以甚異於所習見以為當然者自非精一自信卓然不惑流俗之士則未可以冀於斯者也僕竊有望於兄軰矣山西古帝王之都其人有茅茨土階之風而叚干木卜子夏居西河其人化之凛然有節概今不知其遺俗視古所稱何如而王文中與近代薛敬軒亦出於河汾之間豈其俗固有近古者耶吾兄以身任作人之責兄之所以淑諸其身即其所以淑諸其人者也篤志力行極深研幾求古人之真血脉絡以淑諸身以淑諸其人因其近古之俗而登之於道此其責在吾兄矣僕自屏居来牽於多病齒髪日衰所耿耿不忘者尚冀省身補過以不負此心與不負海内知己者而已與應警菴提學書今之職守令者苟有能飾簿書清獄訟者則為賢有司矣至於為百姓根本之慮則未之及也今之司學校者苟有能品藻文字嚴督課程則為好提學矣至於為學校根本之慮則未之及也吾丈之為守郡也既已能為百姓根本之慮而不徒以簿書獄訟為功矣今之為提學也亦何患其不能為學校根本之慮而惟文字程課之為務也哉向辱手書具見惓惓欲興起士習之至意顧責之人不若盡乎已盖言聲色號令之間不若求之身心性情之實惟反躬自盡益慎以宻刀行古道不落流俗則身所舉動即是士子所師法可以不言而喻甞見近時提學教條何甞不言道徳何甞不談仁義然只成一畨講說只成一畨門面而於士習絲毫無補者無其實也務實者反躬之謂而所以為根本之慮也辱吾丈知愛竊敢以是望之今士子中有實行者多不長於文字工文字者多不修於實行盖淳樸之與浮華徃徃相病然糊名之制行則不得不一一徴之於文則其文可以與選而其行或不齒於市人者亦不容不取髙第而登顯仕是以詩書為世流毒莊生至有發冡之說豪傑士扼腕太息無可柰何竊以為低昂輕重其權實在提學盖提學可以知諸士之文而又可以知諸士之行非如科塲之為糊名所蔽雖欲品藻其行而無所従也抑此伸彼示之意嚮非吾丈又誰望之曩時使節寓郡中僕時承教語以時免於大罪過今離索日久柰何年且四十益深無聞見惡之感願時賜教督是所望也與應警菴郡侯書僕迂戅無能人也伏惟君侯蓄兼人之材且居郡侯之尊而與僕又素無一日之雅乃自下車以来虚心降色所以奬進禮遇於僕者皆出於常格之外此雖古之髙流如盖公任棠之徒當此猶宜三讓而避焉而况草茅迂戅如僕者乎所以敢偃然而當之者以成君侯下士之髙義固不自量其身之卑賤與才之短劣也自是以後綢繆日接盖無浹旬不相徃来不相與從容盡談者此亦形迹似為煩凟矣雖然非君侯不能亮僕之深至此而非君侯亮僕之深僕又安敢以是䖏君侯哉公門無鄙人之迹庭中無長者之車亦已久矣豈特樗散之性不欲溷擾於人亦以相知相信之難耳惟在荆溪時與石屋彭君相切磋石屋之為人君侯之所深與也伏惟君侯住山中既且一年釋塵鞅之勞而就清池白石之安去簿書之煩而縱其清逺閒散之適昔人所謂霜降水涸天根乃見惟捍彼物累全我真機此時工夫此時意氣不知復何如耳僕甞竊謂今世人才未便不如古人惟古人為學堅苦磨錬忍嗜欲以培天根久之則此心凝静百物皆通而今人則未免粘帶未免牽引粘帶之根固於中而牽引之勢揺於外所以精神力量輙見不如古人僕每觀君侯治郡自是近世才傑何可當也雖然以君侯之志詎止欲為近世才傑而已乎意者必欲為古人而後已乎如必欲為古人則堅苦磨鍊正在此時若自此以後固知君侯不能久閒而塵鞅簿書之煩且勞又復不免相累恐不得如山中多暇可以進兼力而收全功矣君侯得無意乎僕質本頑鈍惟不敢惰窳以負相知然進寸或至退尺恐竟不能有所樹耳亦願君侯教之君侯来嵗或宜早出進退自是兩途此身既繫於官而欲結泉石之盟亦未為可也以相知故併及之與徐飬齋尚書書向承教以所不及深感道義之愛皦皦嶢嶢昔人有明戒矣敢不奉教以求進於若虚若愚之學也伏聞晉司徒足占泰道之亨也矣周時敷五典擾兆民故事可復見於今乎斯民無禄連嵗凶饑自冬徂春溝中之瘠在在有之每一郊行露骴滿目為之不能下食幸賴撫巡諸公郡縣有司薄征散積悉力其間不然民其無孑遺矣乎今幸及麥秋可以續食然連朝霧雨二麥之腐壊者又幾半矣去嵗緩征之額若欲於麥内取滿盈則恐民不堪命柰何且二麥無收之處雖征之亦何所出而其薄有所收之處彼方圗救目前之饑猶且不足而尚有餘粒能補其去年之逋竊恐鞭笞日用而故額未必能足則是昔日緩征之惠乃為今日急征之困也非不知上供之定數必不可缺但得稍遲數月併於秋糧内帶徴則有司省却一畨催科閭閻省却一畨煩擾在國計一無所損在民力亦無不堪而撫巡公孜孜愛飬救災恤患之盛心於是為有始有終矣此其事只在數月早晩之間耳非有損上益下之難也僕僻處山林未甞獲奉教於撫公是以不敢徑以書逹而以聞於執事且此固百姓之公言也惟明公亮之與吕沃州巡按書别久瞻望甚勞每苦俗套拘人不能一棹於婁江虎丘之間與兄相傾倒也悵悵東南州郡連嵗旱灾即今苖未盡稿遇雨之吉尚有可望倘更三數日不雨則數十萬生靈未知死所山人亦不免於焦枯是懼不知天心仁愛竟何如也前年大祲尚賴滄源公與吾兄勤恤民隱不遺餘力而有司務於仰承兩公徳意蠲租賑粟是以百姓幸有孑遺焉然莩死疫死亦既不忍言矣惟今年事勢又異徃時何者閭閻積連嵗之饑則一嵗艱於一嵗矣官廪捐連嵗之賑則一嵗空於一嵗矣盖承兩年大饑之後而又饑焉故據今年分數雖止是一年之饑其實一年併受三年之饑也其為事勢難易可知况兩公一時代去又若故奪之所恃賴然者夫粟不必其盈於倉而有所可轉錢不必其盈於帑而有所可通此其便宜之權惟撫按則然亦惟撫按有真實為民之心者乃能操其便宜之權以御其變而使不至於窮若夫有司則雖憫雨恤灾儘力周旋顧其力能行於法守之所及而不能行於法守之所不及能為於官民之藏之所有餘而不能為於官民之藏之所不足若使君民盡匱固亦無如之何俗所謂好媳婦做不得沒米不飥也雖然官民之匱憂之誠是也至於憂兩公之将代則竊自笑以為過矣兩公者一日居乎其位一日心乎其民者也去之日如始至者也計兩公代期尚旬月有餘以旬月盡瘁之精力而全活東南數十萬溝壑之命兩公豈憚為之自古救荒無竒䇿亦無多說只是措置錢米一法耳誠得兩公以旬月盡瘁之精力從事其間隱度於公私之用而均平其歛散之宜至於粟不必於倉而有所可轉錢不必於帑而有所可通諸如此類可専行也速行之不可専行也速請之則前之所憂官民盡匱者亦可以化而為豐也不難矣曩時所奉救荒條例併東湖撫公奏䟽中間區處錢米事頗具當時以麥熟無所用之不知今有可採而行者否有可采而陳請者否或可因兄以逹於滄源公采而行之與采而陳請之否聞南都倉粟其羡至四百萬以上可勾十年之支而有餘滄源公去嵗所奏平糶一法此軍民公私凶豐兼利之術柰何當事者議論不同遂使滄源公美意不竟然此法終不可罷也不知滄源公再能以此意陳請否繼滄源公撫巡者又能以此意陳請否願兄力賛之近聞之一戸部長官言此法有三利云云其說可謂曲盡縱使諸郡盡荒但得京倉糶粟三數十萬石分散諸郡每發官帑銀萬兩為糴本輸之京倉則可得米二萬石平嵗人食米一升凶嵗則减之是二萬石者二三萬人百日之命也是官帑不過出銀萬兩而續二三萬人百日之命以待來嵗之熟也三數十萬石者五六十萬人之命也京倉糶粟三十萬石而得銀十五萬兩是國家不過錢米互換之間實未甞費斗糧損一錢而賜五六十餘萬人百日之命以待来嵗之熟也其為利害較然可知其議論不同者不過以苟有緩急京儲缺乏為說耳夫糴三數十萬石之米於四百餘萬石羡餘之中特十餘分之一耳且今江東雖灾而江西湖廣頗聞豐熟則京倉嵗額本色之入固将源源而来矣豈預憂十年之後之不足而輟旦夕之所必救哉故願兄之力賛其説而佐為之請也至於有司所請逺糴一節盖慮異日榖既不登而逺商又不来則雖積錢盈篋坐而待斃矣故救荒惟是預處錢粟而變錢為粟尢是先事預處之善者也計吾兄亦已聞而可之矣雖然此皆人力之可為者也若使皇天果無悔禍之期雨澤終不可冀則人力必有所不及而地方意外之變亦不可不先圖願兄更以旬月盡瘁之精力且徧巡諸郡間延見吏民自親其利害而曲為之處且使車一臨視數十紙文書督促為益多矣兄其圗之與李龍岡邑令書嵗凶民莩賢侯為之心惻而百方圗之者深矣輕齎一說向已面白兹復具之於書以為可以佐百姓之急而禆萬一於賢侯百方之圗則不敢以出位為嫌也竊惟國家之賦其水旱可得而减免者兑運以外之數也雖水旱必不可得而减免者兌運以内之數也水旱不可以不恤而兌運又必不可减免於是有輕齎之法盖米自江南而輸於京師率二三石而致一石則是國有一石之入而民有二三石之輸若是以銀折米則是民止須一石之輸而國已不失一石之入其在國也以米而易銀一石猶一石也於故額一無所損其在民也以輕而易重今之輸一石者昔之輸二三石者也於故額則大有所减矣國家立為此法盖於不可减免之中而寓可以通融之意不必制其正賦之盈縮而但制其脚價之有無不必裁之以豐㐫之歛散而但裁之以本折之低昂一無損於國而萬有利於民此其法之盡善而可久者也以武進一縣言之嵗該儧運米五萬四千五百八十一石三斗四合此其入於國之正額也本色正耗水脚平米七萬九千六百八十三石七斗三合八勺四抄折色銀九千一百五十一兩四錢六分五釐五毫二絲此其費於民之羡數也若以銀而權米石以直五錢為率米七萬九千六百八十三石有竒爲銀四萬九千八百四十兩有竒與折色銀共五萬八千九百兩有竒若得從輕齎之例石折銀五錢計銀二萬七千二百兩有竒而足縱使加折至於六錢七錢計三萬七千八百兩有竒而足則是民每嵗出五萬八千九百兩有竒之中而今出其三萬七千餘兩之數以不失國家之定額而實私其二萬餘之羡以自潤也夫五錢者江南之平價也七錢者折色之極則也若使江南米貴自五錢以上而蒙恩折色或减至七分以下則其所私之羡固當倍之且蓰矣倍之為四萬則是十萬人凶年一月之食也則是國家不出一粟不費一錢而為凶年十萬人續一月之命也為民父母者何憚而不以告乎司國計者亦何靳而不為乎且夫國家漕運四百萬石之中固甞定有輕齎四十萬石以待四方之以水旱来告者矣盖其嵗之凶與否與嵗凶所在之地不可知而所謂輕齎則所謂嵗四十萬之額以待四方之以水旱来告者将安用之况自古經費其本折之權率視緩急而為操縱今國家所以逺輸於江南不憚二三石而致一石者正以江南米賤而京師米貴耳近聞京師之米直自七錢而減至四錢而江南米直自七錢而増至九錢其為貴賤特異常時則是江南以二三石致一石而又不當一石之用也今若取銀於江南而用銀以給京軍之當給米者江南無逺輸之費京軍無賤糶之困此正今日之便宜耳然則非惟無損於國盖深有利於國而得乎緩急操縦之權者也夫損國以益民猶且為之國家發内帑以賑灾者徃徃有之矣又况無損於國而有利於民而又况國與民並受其利者乎此事在不疑而必可行者也為民父母者何憚而不以告乎司國計者何所靳而不為乎嘉靖十數年間江南屢告灾國家亦屢嘗以輕齎與之此其近例試求之故籍可覆案也查得嘉靖十四年蘇松等處災傷巡撫侯都御史等奏戸部覆准除蠲免外兌運四百萬石内准折銀糧一百五十萬石兌運米每石折銀七錢改兌米每石折銀六錢其被災尢重者量准十萬石於臨徳二倉支運每石止徴脚價銀一錢五分自此而上嘉靖十二年折兌一百萬石十年折兌二百一十萬石八年折兌一百七十萬八千石無嵗不有災傷則無嵗不有折兌此其因災傷而折兌者常例也又伏讀嘉靖九年詔書兌運米以十分為率量准五分是時常州一府該得折兌八萬一千石此其不因災傷而折兌者例外之恩也由此言之盖有因災傷而行支運以大寛民力者矣未有災傷而不行折兌以重困吾民者也盖有不因災傷而折兌以廣例外之恩者矣未有災傷而不行折兌以嗇於例外之恩者也此祖宗之良法美政聖天子之深恩厚澤於豐時足國之中而寓救災恤患之至意雖旱乾水溢而民免為溝中瘠者誠戴聖澤之厚於無窮也答施海鹽武陵書方田一法不難於量田而最難於覈田盖田有肥瘠難以一槩論畝湏於未丈量之前先覈一縣之田定為三等必得其實然後丈量乃可用折筭法定畝如周禮一易之田家百畝再易家二百畝三易家三百畝此為定畝起賦之凖亦甞觀國初折畝定稅之法腴鄉田必窄瘠鄉田必寛亦甚得古意今兹不先核田便行丈量則腴鄉之重則必減瘠鄉之輕則必加非均平之道也量田之難全在乎此至於丈量法其簡易者具在九章筭法中湏兄自明此意乃可付之下人為之庶無弊也痛楚中略具梗槩奉答華生所刻書則兄已見之如更查得有書容續奉耳與鄭戸部書執事此行國儲民命繫焉伏聞下車以来仁風所宣里閭相慶盖自来督賦之使多以徴歛裒聚為功而執事獨以寛大行之是以始下車而應感已若此矣變産一節其利病更僕未易數也大率奸民始初莫不上耗國儲下蝕良民以肥其身及其敗露至勤冠盖逺出猶或憑奸民之攀扯而逼迫良民代為之償則是國家懲奸之法未及行於親手欺盗之人而椎膚剥髓鬻妻賣子之苦已波毒於窮簷無告之小民矣是奸民重得志而小民重受困也執事仁人也必自有以處此山澤鄙人出位妄言并希亮之與王蘇州南岷書讀别紙所録尚有不解所謂者然意甚駭之雖江湖甚逺亦何能為情乎東南州郡侈靡日長而虛耗亦日甚譬如病火之人顔色澤然而血氣槁矣吾北厓以古人之節清化源以古人之政撫罷甿朞月則既效矣惟率是道而終始之則百姓之福而區區野人之望也催逋部使者且至僕自生長草萊備見變産之害濫及無辜小民毒痛不忍言北厓仁人也必将有以處之夫素甞侵欺之奸籍其貲可也孥而繫累之可也重戮以懲衆可也小民何罪焉而代為之償乎名曰變産實逼而奪之耳雖然昔人固有言矣成於自同而敗於自異部使者方以括財為功而守令欲以民瘼為事則勢固不同也於是處之為難惟執事悉心以慮之多方以圖之國與民兩無憾矣林鎮江先生亦好古君子也變産之説執事幸不見為迂濶則可與林鎮江共論之盖此非一人之私言也巻子索書鄙作僕於詩本不工自稍知學問以来頗欲收歛精神㑹性情之實是以經年不復從事於此然恐重違吾丈之意當書舊作數首送上也讀衡山先生文字可以補鄙人踈漏之過矣謹謝教謹謝教六經之學邇年来稍甞究心焉而苦未之有得也欲觀西原公所著甚勤便中幸速之奉教末期臨書但有馳情答王蘇州書執事所病於均徭舊法之不可行者其說大槩有五大戶之詭寄也奸猾之那移也花分也賄買也官戸之濫免也大戸之詭寄起於官戸之濫免則此二弊者其實一弊也夫濫免詭寄之弊謂某官例得免田千畝而自有田萬畝或自無田而受詭寄田萬畝則散萬畝於十甲而嵗免千畝實則萬畝皆不當差也其說是矣雖然其以萬畝而散之各甲以嵗嵗倖免千畝者必非田甲皆是本官真名與皆注本官者也必将田甲詭為之名也使其甲甲皆是本官真名而不詭為之名則一人而十甲其為奸固易破矣若必是一甲為真名而諸甲詭為之名遇其真名與注官之甲則免其非真名與注官之甲不得免即十年亦止免一年耳安得歳歳倖免也不然均徭册外别置一册注每嵗所甞蠲免之數如某官例免田千畝而一甲内已免過田七八百畝縱或二甲三甲有田許撞足例免之數數外則役如此則雖甲甲免嵗嵗免亦止得一甲一嵗該免之數又安得以千畝影免萬畝也此法在一彊察吏執之雖真是官戸之田亦不得覬額外濫免况詭寄乎至於移甲之弊則執事所謂只據黄册或十叚册足以革矣而又病於黄册與十叚册之不可據者則固以為與每嵗推收之法相礙也夫每嵗推收宜於賦不宜於役十年定册宜於役不宜於賦役主戸賦主田賦則隨田流轉役則依户擬注是以賦法則既凖之每嵗旋造之徴册所以便民之灌輸役法則宜凖之十年併造之黄册所以便官之㸃差即此兩法本不相綰而執事又疑於據定册編差或有田既賣而差仍累者則編差之際其人必且自言於官曰吾田已賣之某人而某人宜頂吾差於是官為之按其實而以某人頂某人差如此則是以虛名編差者故賣主也以實力頂差者新買主也故賣主以虛名編差可以無亂乎定差之籍新買主以實力頂差可以無累乎鬻田之人且夫役法上下其户以差其甲之錢聚則稍重而散則稍輕花分者只可花分子戸以移稍重而就稍輕其實不得花分鬼名以移絶有而就絶無也且十年輪編不能禁人之花分而一年一編又安能使人必不花分欲使人必不花分則在嚴之於攅籍之始而非所以較於編差之際也賄買一説曩時輪嵗編差則豪民以賄避力差而請銀差今時嵗嵗編差則豪民以賄避差頭而請貼戸曩時輪嵗編差則戸胥之家一年而集一甲豪民之金今時嵗嵗編差則户胥之家一年而集一縣豪民之金大抵論詭寄賄買兩弊則繫乎令長之彊察與否不繫乎輪年與不輪年也論花分移甲兩弊則繫乎册籍之精核與否不繫乎輪年與不輪年也法無全利亦無全害以輪年一編為全害乎而可使小民一嵗忍苦出錢九嵗晏然坐食以一年一編為全利乎縱可以盡革詭寄賄買花分移甲之弊而不能不使窮僻小民嵗嵗褁糧集錢奔走城郭此其利病亦自相凖古有之利不百不變法先時有司激於官戸豪家之暗損小民然却不就舊法中調停裒益而驟變之以收一切之效以為此足以裁損官戸豪民而已不知小民亦竟受其病今之萬口訿訿喧然稱不便者未必盡出於官戸豪民而徃徃多出於窮僻困阨之小民矣請試言小民之所最不便者大槩亦有數説且如一邑丁田以十分為率徃時一嵗編審一分其為數則狹令長耳目差易徧持籌而筭之差易辦縱有弊焉而差易以察今一嵗盡審十分則其為數頓濶於徃時十倍令長一人耳目籌筭所缺漏處必益多耳目籌筭缺漏益多則戸書里胥之權益以重奸民益得以輸金於權之所重以為規避小民無金可輸則嵗受苦役益無所訴而長令則益不能覺察若此者非曩之長令多精彊而後之長令多鶻突也其繁簡濶狹之勢實然而執事乃謂輪年則胥猾多得售奸不輪年則胥猾多不得售奸豈别有説耶不然何其與吾所聞異耶又如一力差約銀十兩為率徃時十年一編正戸約銀五兩貼戸約銀一兩則貼户五而足矣人數既寡故其裒而歛之也不難今一年一編則曩率出銀一兩者今減而出十分兩之一曩用貼户五者今必增而用貼戸之為五者十人數既廣其勢必散有差頭終嵗物色尚不能徧識貼戸之門者何况能盡歛其錢是以徃時所病正戸饕餮貼戸今時所病貼户耗損正戸小民不幸被㸃正户則破家矣若此者非曩時之正户皆彊梁而今之正户皆愞弱也其聚散零總之勢亦必至此而不足恠又如銀差曩之法嵗總納銀一兩則今之法嵗零納銀一錢納多者其倍稱之數稍輕納少者其倍稱之數必重納一兩縱倍之三兩而竒足以納矣納一錢非倍之四錢五錢或至八九錢不足以納也此其總納則費固輕而零納則費固重也不獨如是而已以一兩總納之一年則是為一兩之銀一遍赴官守候交納一遍徃来盤費設或交納不時公人一遍下鄉需索而已今以一兩而散納之十年則是為一錢之銀亦一遍赴官守候交納一遍徃来盤費設或交納不時公人亦一遍下郷需索是今日一錢之累並不減於一兩而曩日一年之累乃浸淫於十年其為便耶其為不便耶其最不便者其為坊郭之豪民耶其為窮僻之細民耶此其為病不可枚舉恐不特如執事所謂似渉騷擾而已也則今法之當變理在不疑秋糧帶徴之説既格於復除之無定數而不可行矣惟用十叚册法則可以革詭寄移甲諸弊而無一嵗一役之擾然執事因黄册之不可行而疑於十叚册之不可行者則亦有説夫黄册之不可行者黄册之法敝也黄册之法敝而邑之丁與田大半不登焉故十叚册者為之括其欺隱以補黄册之不及以均乎力征而已使黄册果無弊乎則徑用黄册編差可也使黄册不能無弊乎則為之十叚册以補黄册之不及而編差焉可也因黄册之不可行而併疑於十叚册之不可行則過也執事又謂常州賦稍輕蘇州賦稍重則其法不可畫一故常州自宜從舊法蘇州自宜從新法夫賦自重輕而人情之好逸厭煩好省厭費則胡人度之越人固有不甚相逺執事其試察之竊恐蘇之民之情不甚逺乎常之民之情而法之可行於常者未必不可行於蘇也又别兄甚久耿耿提學公且至荆溪兄以提調當来可得一面晤也均徭法曩時所欲言於兄者不過只是一兩言盖慮兄以新法為甚便民也今讀来教則兄已深知其不便而有意於革之也久矣大率十年一役雖極重亦甘心一年一役雖極輕亦不願此人之大情而新舊兩法之利病可以一兩言盡之者曾聞人言胡虜愚惷只怕鞭扑更不怕殺盖零零星星痛苦難忍也此言雖可笑然亦可以喻人情矣少時甞讀衍義補論均徭負米之喻亦深以其説為然及今日下老實行之乃見其害益知書生坐談真不可便以經世而差雇兩法在宋時亦甚紛然司馬公力主變雇為差而有識者亦甚病其講之不詳則以為司馬公少歴州縣之日淺也僕屏居草莾于民所便所不便則稍知之而稍能言之至於所以為之區處實以生平未甞親在裏邉經歴雖以為常之民曽享十叚册之利而其中委曲尚未能悉知又何以為蘇人謀也承兄下問草率奉對真似乎强其所不知矣竊惟賦役之最煩而敝最多者無如蘇州牧守有懇惻為民之心者無如兄沉潜善思精於處事者無如兄必能别出良法使新病故病一切掃去以幸蘇之人於百千年也是在心誠求之而已豈待書生坐談如僕者之賛之也哉僕自稍渉世事乃知凡百變更之際極是難事即如曩時有司變十年均徭為一年本是愛民真心而講之不詳則其弊已效於今日矣今欲變一年為十年而講之不詳又焉知不貽後日無窮之弊哉兄之遲遲其間不肯輕變極是不為而後可以有為大易所以致戒致慎於革也雖然革非得已也昔荆公論雇役以為此法終不可罷僕亦以為一年均徭此法必不可不變顧其説如此耳至於利病之詳區處之宜則老吏積年總書中有知此者兄試虚心問之勿以其素曽作弊之人而拒之耆民中有知此者兄試虛心問之勿以其山野倨侮而忽之士大夫中有知此者兄試虛心問之勿以其必為一身一家之私説而先意逆之多方訪求再三斟酌使無一不宜乎人情而無一人不得盡其情則變之可通通之可久矣曩者敝郡更法時盖應君為之守應君志在民者也其所更賦法最為精善可以百年無敝但役法則今日便不可行耳此二法雖同是一時事亦同在一書册中而利病相懸兩不相掩或因其役法而并訾其賦法或因其賦法之不可變而併謂其役法亦不可變皆偏辭也蘇郡其亦然乎聞部司文書督逋甚急則楊給事之説不行矣又累賢使者區畫柰何柰何答蔡判官可泉書白下本非有約顧奉清論同寝食者數日若大洞既有約矣謂必得奉清論同寝食如白下也乃竟爾茫然人事之不可料者如此然兄既絆於領簿不能来而僕江湖散漫之人宜可乗興一至大洞且得逕造府下又以家君至家日侍定省莫遂兹懐乃知名山勝逰非特牽纓者常不能兼雖江湖散漫如僕者亦若有所繫而不可必遂矣柰何伏惟吾兄純明温粹篤於向道以此為政必能近人然僕竊有願言於兄者大凡年少髙志之人於事未必備甞故或病於踈文藻雅逸之士多不柰煩至以簿書獄訟為溷䙝故或病於華而無實而謪官遷客縦不怨尢又徃徃以簡曠不事事為得體故或病於惰窳而苟禄此三事雖號為賢士大夫者或不能免也以兄之篤於嚮道自然不墮落此弊然僕所望於兄亦惟兄不使毫髪有類於此而已若使此處縝宻一有即是學問縝宻一有脫漏即是學問脫漏不當舍此更言學問也大學曰心誠求之孔子曰無倦惟兄留意焉僕自少隱居亦甞痛百姓疾苦欲援手焉而惜無路也以為他日苟幸從薄宦庶幾得一社一民以自效雖才器駑鈍亦庶幾興起一兩事利人者除去一兩事病人者以少償所願焉及竊禄于朝浮沉郎署數年竟不能一獲素心雖已罷官閒居猶用此為歉兄初亦署郎也不謫則不為此官矣是僕昔所冀而不得者兄今得之兄之志豈與僕異耶則今日之謫固天所以拓兄之才成兄之志而試之實效也僕竊為兄幸之廣徳之民以黠悍著聞久矣昔時治廣徳者患其然也則必峻刑法以繩焉民見上刑法之峻也則益出於悍黠以求必避是以至於上下相賊刑罰益以峻而黠悍益不可勝曽不知君子長者雖無一時操切之效然每每能使人囬面而率化乃知漢史馭惡馬者利其銜勒之説為未然而蘇洵以齊魯持蜀人之說益可信也兄意云何或能了大洞之約悉意請教當在此時故不盡言兄其亮之與安子介書謹具布被一端奉為令愛送嫁之需布被誠至質且陋矣然以之而厠於刺繡結繪綾綺綃金綴翠𤣥朱錯陳之間則如葦簫土鼓而與朱絃玉磬金鐘大鏞相答響乃更足以成文又如貴介公子張筵邀客珠履貂冠狐裘豹褎聮翩雜座既美且都而有一山澤被褐老人逍遥曳杖其間乃更足以粧㸃風景而不失其為質且陋也且夫桓少君之事兄之所以飬成閨行而出乎習俗之外者豈足多讓古人哉素辱知愛敢以家之所常用者為獻而侑之以辭不然亦願兄受之而以畀之媵僕之用可也謝歐陽石江巡撫啟伏惟明公負康濟之碩材當東南之重寄振恤瘡痍如春風所扇不間于隂谷寒門搜㧞滯幽如藥籠所儲無間于牛溲馬渤如順之者卑不自立少甞薄遊已甘屏跡于山林豈敢更求于聞逹且誦習徒知泥古儕軰多謂之鄙儒而器局難與適時明公誤以為國士收于衆棄揚彼王庭况自来無門舘賔客之交豈所取在牝牡驪黄之外夫不采而佩雖幽蘭亦捐苟有因而前則朽株為用遂得再塵金馬之署更聮羽翼之班自揣既為不堪衆謂何以至此惟天下信明公之端直而知其嚬笑不以假人惟當宁信明公之激揚而知其顧盻必能得士偶因㧞茹及此彚征雖荐人常恐其知在明公絶不以言于口而受知思所以報在鄙人則竊有愧于心惟當勉䇿愚蒙益精學問其或馳驅于世則庶以罄葵藿之心縱使委棄于時則永以堅溝壑之素期少礪頑鈍之器庶不貽冰鑑之羞而已敢因来惠敬布腹心伏惟俯賜覽觀庶以知鄙志之所存焉耳與歐陽巡撫書僕樗散無似黽勉赴官將圖所以效明公國士之知者而未能也竊有所懼者山林之士閒居而静處其寡過則易或出而馳驅於世當毁譽得失之衝誠欲有所樹立則難故古之人修之于家而多不免壊之于庭者况僕之所以修之于家者固未至耶昔韓持國薦處士常夷甫後夷甫改其平生而韓公亦深以是為薦士之悔不知若何可以使鄙人不為夷甫明公不為持國之悔也幸左右終教之辭免坊牌一事向已面請此非敢矯情近名盖以此生苟不至於飢餓則毫髪不敢有所取于世庶幾伐檀詩人之所謂耳承明公欲置買學田此盛舉也更望明公始終其事中間委曲區畫使異日不為人所侵漁則受賜于明公多矣然此舉必湏出自明公使鄙人若無所與焉者乃為善也不然則鄙人雖不以是為利而更欲以是為名亦非鄙志之所安也敢併以奉凟伏惟明公晉擢樞府辱在知愛殊深慶幸與郭似菴巡按書僕經春常病移家住村塢中居閒自念不奉末光者久矣近聞使檄下府過旌鄙人命有司建牌坊示優崇之意且期之永久此執事盛心豈不感激既而自惟有甚不敢當者恐冒昧以累左右知人之明故敢畢陳其愚左右試垂聼焉書曰彰善癉惡樹之風聲近世牌坊之製盖倣此意古者不以法私人所章必善而人廼勸所所癉必惡而人乃懲不然則懸曲木求直影也僕少不知學中嵗蹉跎即鄉黨自好者正恐不如也執事乃欲以之風鄉人而矯漓俗僕豈不自知此如以迷人指迷不亦踈乎罪莫大于盗名詬莫大于詆罔僕非敢辭此也将以讓詬而辟辠也僕甞厠侍從之列㑹才志紕繆又夙罹疢疾不能效官荷天子明聖不戮瘝曠僅奪官罷歸田里此覆載厚恩詎可勝量僕聞之仕隱二道仕者則蜚聲竹帛或立旄纛表閥閱且不為侈隱人則深林窈谷杜門棧徑羣木石鹿豕且不為陋况僕含瑕積垢以此終世惟應躬耕灌園矢溝壑之志保桑榆之路補東隅之失庻幾不為田夫野人􅀈笑此僕私心萬一者也介子推曰身隠矣焉用文之陶生亦云迷塗未逺今是昨非苟又冒執事此賜為華觀則是違溝壑之素叨焜燿之飾忘廢黜之後責襲官寵之前榮戾大易補過之訓犯中庸素位之戒無一可者也僕幸交于執事久矣且積愛生妍積憎生醜古来共然别嫌明㣲先軰所慎雖以李絳之賢亦有議其私于同年者矣自執事持憲江左于人無所假于法無所貸薦紳間咸稱頌據經秉直無與左右比者夫激揚清濁與衆為公執事豈以公法私一交㳺僕豈得以交㳺故干執事公法雖執事諉曰吾以旌賢誰能信之一牌坊之費四五十金計工二十人有竒一工計役三四旬則是二十餘人計役七八十旬有竒崇虛跡捐實費無禆絲髪有損尋丈此僕為暴殄已過矣僕己丑與第時曾隨例給牌坊直百金且僕既有牌坊直矣又有牌坊是兩饕也有司既給僕牌坊直矣又爲僕建牌坊是兩費也柰何使一人兩費有司凡此數事實所不敢當非敢匿心矯跡多為枝辭以徼避譲之名重獲辠有道之門伏惟執事鑒亮命有司停止前事則幸甚理宜走謝面布悃𠂻坐病不能謹以書致答舒雲川巡按書使節之蒞于南土也且訖事而還之朝矣鄙人之所以伺候于左右者一未能展而左右之所以垂愛于不肖者顧數數有加焉既不敢以草莾蹤跡溷擾公府念無可為謝者其於盛徳但知中心藏之而已兹辱賜坊牌價五十金再拜感激益不自堪曩時郭徐諸公按于兹土亦甞以此惠見及僕時尚蒙恩在致仕之後然于諸公之惠亦未之敢當也今為編氓則又異矣夫郭徐於鄙人同年也而左右乃以此施之於山野踈逖素未嘗交際之人此其為厚施益過于諸公然使僕不敢當於致仕之先而顧敢當于編氓之後其為凟尊者之賜益大矣此僕之所甚不敢也謹告返于使人辱左右知愛之深當不以不恭為罪耳請謝未期臨書不勝馳望伏惟亮之與陳巡按遜齋書某迂拙無似然至於慕徳嚮賢之心未嘗不與人同而交際務施報尚徃来之誼亦未嘗不與人同也自使節惠臨江南躬清苦之行以率先屬吏嚴激揚之政以整齊習俗某雖在山澤亦竊聞風而慕焉久矣且使節蒞敝邑兩辱垂問野人之廬而士夫間亦每傳言執事以道義相愛因復自念僕未嘗一日得奉教於左右而乃辱降意先施若此則又竊感且愧焉久矣然則僕於執事不為無所嚮徃而執事於僕不為無所下交矣其於所謂慕義之心報施之禮皆宜奔走自効於左右而乃缺然至今焉者非甚踈狂當不若是故敢以鄙懐布於左右某被罪為民人也諸公髙誼雖過以士禮相遇而固陋之私則不敢不以民禮自居編甿之役既非所以僣於縉紳之交稼穡之論亦非所以參於政事之間是以八九年来其於公門未嘗敢窺焉盖非敢自為偃蹇誠不敢以凟尊者也草莾之不敢見孟子之所謂不敢也且某多病早衰去冬復感隂寒遂成末疾兩足痿痺卧不能起䬃然摧朽已成廢人惟屏跡村庄少藉藥物支持是以執事之門既未及躬候而執事枉頋又不及擁篲以迎盖坐此也然則僕於執事交際之禮既拘於分之不敢自盡嚮徃之殷又牽於病之不能自致惟有捫心懐慙而已念無以逹於左右故敢以書上并以為謝幸垂亮焉與徐少初邑侯書某罪𨽻之餘禮不宜復齒於縉紳交際之間是以每逺引而去之竊以為姓名不通於諸公久矣兹又辱巡倉巡江二公之賜令人愧悚益不自勝欲作書辭謝又難於為說是以敢有所請教於明公也夫諸公之賜其名則幣帛果酒也而叩其實則白金也欲以辭幣帛果酒為說則悖於其實欲以辭銀為説則悖於其名是以措詞之難也古者禮存于幣帛之先後世以幣帛為禮此其實則亡矣而其名尚存也若夫市道之交則錢貨而已矣雖然如公古道君子也如諸公古道君子也豈不欲行古之道而以市道歟豈以為若某軰人者其好潔操行之心不能勝其嗜利無耻之心故幣帛虛名也金錢實利也而特以此厚之歟其特以此愧之歟頑鄙之人可以省矣是諸公之所以㢘頑也某罪𨽻也賜之幣帛不敢當賜之金錢不敢當豈其能自處以㢘乎盖古之所謂不敢也然而為嘵嘵者竊懼名實之亂也公古道君子必且有以教我矣某山野鄙人於當道諸公辱顧不敢答辱賜不敢拜非以為簡也禮不敢也答與拜既不敢不答不拜又鄙心所甚不自安也曩曽奉凟乞命吏人於鄉官掲帖中除去賤名以安編氓之分豈未蒙亮察耶恃在知愛乞如前所凟則上官可以不知鄙人姓名而交際之間可以冺然無跡矣附凟又讀清獄申文深知仁人之用心至悉謹篋而藏之以告後之君子以延長者之惠於無窮更承示區處牌坊事徃時所辭諸坊牌銀只為未有所處遂至久而不知所用之矣今用以修理書院不惟此銀得有所着落且于風教有補焉甚善甚善但中間稱奨鄙人太過讀之且甚自愧也某嘗以為今日吾軰之病大率在于實行未修而虛名先著閫域不務而門面是張是以書院講學一節多為具文而非彼此感應之真機而其志之不相同者則遂指摘以為口實誠所謂吾黨有過焉者也况如僕者極踈且陋何敢當此乞於申文中自見今買荘一所以下至僦船以居數句及因以禮敦請講學一句敢勞削去是所以免僕于名浮之耻而亦左右相愛以徳之素心也幸亮之與王堯衢編修書抱病懶慢久缺書問知執事不謂我踈簡也春来卜居陽羡此中山水清絶無車馬送迎之煩出門則從二三子登山臨水歸来閉門食飲寝夢尚有餘閒復稍從事于問學然詩文末藝與博雜記問昔嘗强力好之近始自覺其如羊棗昌歜之嗜不足飢飽于人非古人切問近思之義于是取程朱諸老先生之書降心而伏讀焉初亦未嘗覺其好也讀之且半月矣乃知其㫖味雋永字字發明古聖賢之藴凡天地間至精至妙之理更無一閒句閒語所恨資性蒙迷不能深思力踐於其言焉耳然一心好之固不敢復奪焉此類之書皆近世英敏材辨之士以為老生爛話至束閣不肯觀雖其苦心敝精于文字間而竟不免老死而無所聞有可痛者僕之自陳其愚盖過不知量亦欲執事之同所嗜好也何如何如近日當事者所去取投閒之臣僕已先知其去與取之必如此矣不足為恠且平生亦頗能自為主張不敢跟人哭笑不敢以鴟鳶之所争蝸角之所戰者以動吾心而累吾守此亦執事所素鑒無待僕自明也無待僕自明而猶自明云云者有說也父子至情恐以此上累吾父之心湏吾執事觧喻耳當今之士隱居篤學修名砥節如湖州唐子平凉趙子軰者凡若干人僕之駑駘十不及其二三然此軰皆淪胥流落淹滯已十數年少者壮壮者且老以衰或餒凍無以存活又其初皆以盡力國事誤觸綱而抵禁非如僕之自以私罪去也此軰尚不得為當事者所與則僕得與此軰同陸沉焉固無憾也更何有所覬乎凡人出處利鈍數固不偶始言官謬相薦時僕固知終必且棄去以為萬一不棄去則僕之自為處亦有甚難者何也若使僕復如舊時隨逐行隊進退以旅趦趄囁嚅于明時無粟粒之補則將毁平生而弁髦之且嚮惟不能為此所以甘心去官而無所悔耳不然則桞士師所謂何必去父母之邦者也若使不如此而如彼守其愚戅固陋而不變恐日月漸久積嫌積忤自作禍孽更有甚於嚮時既不能為邯鄲之歩竟當匍匐而歸耳是以中夜思之進退狼狽乃今得自脱於此固可謂之幸而不可謂之不幸也古人有言人各有能有不能懸釡帶索枯槁丘壑雖窮死而不肯悔者僕自謂能之隨逐行隊進退以旅以徼幸於衣錦乘軒之華者僕非不欲勉强學焉恐竟不能也僕自生齒以来百種嗜欲頗少於人亦絶不知人間有炫耀顯赫事獨不能淡於飲食乃始痛為節損或四五日不肉食始而苦之久且甘之矣間飲食於富貴之家腥膏滿案且噦之而投筋矣所以苦身自約如此者以為既不能改于其固陋以狥時好則貧賤自是此生常事諺曰畏水者不乗橋恐其動心也且夫自處不當違其所能而强其所不能處人當成就其長而䕶其所短安知當事者之非深愛我乎僕幸未衰敗苟自不樹立則已耳若夫假之以二三年孜孜早夜敏行而不敢怠則子輿所謂獨善兼善與退之所謂行道為書化今傳後或者不能兩讓矣豈有不得於進又不得於退者乎執事知我故不慙大言且非此無以解吾父之懐也吾父之所以戀戀於僕者亦非以今時富貴人望僕也王良有言父子情深或意僕之以是為憂也而亦憂焉耳僕固不憂也又或者以自少教之讀書不忍遽見其廢錮於聖世矣乎雖然成敗失得且當要之久逺毋遽為僕戚戚也望吾執事早晩間曲為寛慰則數千里外人子懸望之心亦稍紓矣是執事之賜也客居無事二三子時時以舉業文字强相問訊亦殊妨静坐與讀書但念此身為宇宙中人其於塵俗奔走縟禮煩儀之事既以其溷擾而厭避之于此不當更有所厭耳舍妹并甥女想皆康吉餘懐不盡生平最懶作書更懶作真書書又多差與執事書既不可假手於人又不能不差又不及更錄輙以呈上并希亮之答周約菴尚書書某自屏居以来自以罪𨽻不敢復齒於薦紳之後故居當南北孔道非逃虛者所宜遂舘於陽羡山間坐此去人益逺親知徃来一切罷廢雖最辱知愛如明公亦尚未能繼掃門之役以承教語叙𠂻曲此其懶慢之罪僕猶自知况長者乎以為宜麾而棄之矣不謂過辱記錄逺勤使人且手書慰諭尚欲納僕於古人之域捧書自激竊感且歎固知長者之度不肯輕棄一物欲曲而成之若此然来書所教尚以僕早年受知之故盖見僕少時意氣可以竊冀人之尺寸焉而未知僕今憊駑樗散雖欲比於今之人而有不逮也僕少不自揆亦嘗有四方之志而才器迂滯本不適時加以弱冠從仕重以負氣學未及成而驟試之且少年負氣不識忌諱以迂滯之器而試未成之學重以負氣之習此其動輙罹咎也豈足恠哉猶幸免誅戮得齒編氓且少嬰疾疢三十以後齒髪漸衰委形既然志亦隨之即如讀書為文本是素所嗜好近或挟册讀未數行輙眊然而睡矣旬月不一御鉛墨時或為之輙終日汗漫申紙䑛筆竟不能成十數字而遂以罷夫外則廢於親知之徃来内則廢於文史之玩即此一兩事則其衰頺弛靡不比於人也可盡見矣此其意盖欲槁形灰心自同木石豕鹿之間使宇宙廣濶着此一閒人足矣淮隂南陽之事固萬不敢一冀焉至如象緯地形諸家之學如来書所稱管鄧所長亦何敢不自量而攬焉以為可幾乎且夫淮隂南陽其始皆匵其器而不輕以試䄂手而觀天下之勢如良醫之隔垣而洞五臟也故其壇而拜焉廬而顧焉則以造次一二語而圖王致伯之畧遂以定况齷齪如僕軰者所謂以迂滯之器而試未成之學如弋者百發而徼於一中故屢試屢蹶此其大巧大拙之效已見于前事矣乃欲以倦逰息機之後而自比於古人隱居求志之前雖强自鞭策固知其不類也然則明公教督之厚其何以承之甚自激也甚自愧也雖然自屏居以来澄慮黙觀亦既久之乃稍稍窺見古之儒者所以為學之大端竊以其實乃在於身心性情之際而不以事功技術掲耳目為也故其退藏於宻者甚約其究可以窮神而立命古固有豪傑之士而不知學者衆矣是以事功流而為權計技術流而為小道凝静致逺南陽其幾乎其雜於申韓則擇術之過也淮隂烈矣竟以矜能伐功殞其軀以輅之才局於方技僅與華佗朱建平醫相為伍鄧征西以所長濟事以所長殞身與淮隂同此數子者不可不謂豪傑之士也然其擇術則可謂不審矣僕功名韁鎖已獲斬㫁至於象緯地形種種諸家之學徃時亦頗嘗注心焉今盡以懶病廢竊以為絶利於百途固将藉此餘閒聚精蓄力洞極本心洗濯愆過以冀収功於一原而未知竟當何如耳近来每觀伊洛之書及六經之㫖覺有毫髮悟入則終日欣然忘其居之陋而形之憊也所苦習氣纏繞欲障起滅未能痛與掃除使之光大然不敢不勉焉以為古来儒者所以自淑其身之學其命脉或不外此而無有乎窮逹古今之異者也若乃進僕於抱膝髙吟之儔則必不敢當謂僕爲今之腐儒鄙儒賤儒也其亦可幾乎以是少酬明公之知明公其許我乎辱愛之深故不敢隱其愚且狂也今邉陲多難兵財窘急明主側席正豪傑展効之時為社稷計維公軰一二耆舊隆中之業是有在矣其何譲焉山野鄙人其盱而望之矣與賈鳳陽書史生還獲聞起居與徳政之詳甚慰素仰弟迂踈無似自屏居以来四方知舊絶不敢通書或有書見及則答之而已以為山林屏廢杜門省過之人其禮自宜如是且亦平生自守其固陋而不敢失者也今春偶有素不相識鄉人名孫伸者持兄書惠見及當時姑奉答一書後或言此人先造贋書以誤左右之聼聞之不勝惶悚弟自己丑偕兄登第至今十餘年雖至親未嘗敢為之請屬雖在敝郡縣諸公亦素不敢有一字相屬乃為素不識面之人請屬于千里之外亦可笑矣且弟縦不才亦素知兄之剛正豈宜以私干之既以自愧又以自訟豈平生心事不能見信于一鄉此人所以至此也若果有此煩兄發其事治其人以為作偽之戒并将原所造贋書發下一覽感感答殷生原學書来書推奨鄙人甚非倫比頭陀僣謂佛子法王此大罪過也雖然亦足以見吾友向徃之殷矣僕不自量竊痛世人汩於利欲迷失真種絶去人理自墮鬼蜮是以在羣衆中徃徃不惜齒頰一與破迷雖至速侮招尢亦不為悔至於同游諸子尢更不敢惜齒頬然察其中如聞古樂而思睡者固亦多矣亦不為悔盖冀有一二人能深信吾說而共行之以究乎其精則宇宙間氣脉尚有所寄不至盡泯爛此吾人大功徳也敢復自愛乎今吾友乃不見謂迂濶直欲相從於湖海寂寞之域信之甚真而志之甚篤則交戰勝負之機固已决矣是余之所汲汲而求者也但湖上之行本欲絶去言語文字於萬緣不染時黙悟此心今與吾友同行不免更費一畨酬酢耳然来意不欲固違也到無錫時當相約所云議論牴牾且勿尢人豪逹宼盗亦且勿尢人盖自家不知有幾多病痛在也今且只悉心洗刮自家病痛盡時更看感應處何如既已深知吾友之意此後當益盡吾言耳草草與劉三府寒泉書荒荘重辱枉駕緣病體就醫不及擁篲耿耿承委送太府先生文字以郡人頌郡公非特分所宜然抑亦情不能已雖然鄙意有不敢不逹之左右者僕少不知學而溺志於文詞之習加以非其才之所長徒以耽於所好而苦心矻力窮日夜而强為之是以精神耗散而不能收筋力枯槁而不能補積病成衰年及四十尫羸卧床已成廢人此皆諸公所共親見所共垂憫者僕平日傷生之事頗能自節獨坐文字之為累耳反之於心既非畜徳之資求之於身又非所以為飬生之地是以深自愧悔盖絶筆不敢為文者四年於兹將以少緩餘生為天地間一枯木朽株而已方欲盡取前稿燒毁以銷宿愆不意為人抄錄而無錫卜君殊不相信謬行刋刻再三以書止之而不能不知其何說也然亦賴有此刻可查平生無一篇文字不在其中執事試考其年月皆四年以前胡說也若今日復勉强承命則後来更不可復辭於人人矣二三年間亦有一二府縣諸公索文者僕不敢為枝辭相誑但據本心以告曰自今以後更有為府縣及朋友間作一篇應酬文字則今日誠得罪於執事矣今於諸公亦不敢為枝辭亦但據本心以告曰自今以後更有為郡縣及朋友間作一篇應酬文字則今日誠得罪於諸公亦誠得罪於太府矣伏惟諸公矜而恕之答王遵巖書兩得兄書拳拳以病體為念真意懇惻令人讀之堪為涕下非兄死生之交不能至此感激感激人傳言吾病過重者盖有兩說一則以木腎為患痰火時作不得不閉戸調理人以我經年病不見人則以我病不可支矣不知我貌則槁矣而精神尚可不死盖近於養生家稍稍得一歸根法也其一說則自以早年有志今四十外矣而猶然醉夢人也盖非特文章氣節平生所劼力而從事者既於真性不切及所聞於經書師友與意見之所窺測而自以為道者亦竟如隔壁聼話全無交渉近来痛苦心切死中求活将四十年前伎倆頭頭放捨四十年前見解種種抹摋於清明中稍見得些影子原是徹天徹地靈明混成的東西生時一物帶不来此物却原自帶来死時一物帶不去此物却要完全還他去然以為有物則何睹何聞以為無則參前倚衡瞻前忽後非胸中不掛世間一物則不能見得此物非心心念念晝夜不捨如養珠抱卵下數十年無滲漏的工夫則不能收攝此物完養此物自古宇宙間豪傑經多少人而聞道者絶歎其難也好仁者無以尚之此真消息也終日如愚終日忘食此真工夫也無以尚之則有一物可尚便不是此物矣忘食則於閒事有不暇者矣如愚則於才技有不使者矣孔顔一生工夫所以完養收攝此寳藏也僕近稍悟得此意而深恨年已過時雖知其無成然本是自家寳藏不得不有冀於萬一也是以痛為掃抹閒事收歛精神之計則不得不簡於應接不得不托於病不可支以謝客是以人知吾之病甚而不知吾之别有意也此意更不敢露於人以兄念我太厚憂我太深故特披露之兄萬無洩我秘宻重増嘵嘵之口也安友為我求序得託雄文以不朽甚幸過望僕舊從兄學為文章有一二僅得處盡是兄之指教但才既不長又不能竭精力以從事是以遂成廢罷韓子所謂徙業者不嚌其胾者也獨覺兄之奔逸絶塵而已矣近来自觀舊稿支離叛道之言篇篇有之理既不當文亦未工赧然盡欲焚燒而後為快緣頗為人抄錄無可柰何盖以吾今日文字伎倆湏并却三四年精力専専幹此一事自謂可望於古閫域今自度必無此閒精神可以了此也既自知不了則豈欲以不了者而信今傳後乎亦愚矣貴鄉洪子因信兄而過信我遂亦以我為可與斯文也與安友謀刻之而請序於兄僕既而聞之愧汗駭愕盖吾文未成吾自知之且不知此生為言語文字人也居常以刻文字為無㢘耻之一節若使吾身後有閒人作此業障則非吾敢知至於自家子弟則湏有遺屬説破此意不欲其作此業障也僕居閒偶想起宇宙間有一二事人人見慣而絶是可笑者其屠沽細人有一碗飯吃其死後則必有一篇墓誌其逹官貴人與中科第人稍有名目在世間者其死後則必有一部詩文刻集如生而飲食死而棺槨之不可缺此事非特三代以上所無雖漢唐以前亦絶無此事幸而所謂墓誌與詩文集者皆不乆泯滅然其徃者滅矣而在者尚滿屋也若皆存在世間即使以大地為架子亦安頓不下矣此等文字倘家藏人畜者盡舉祖龍手叚作用一畨則南山煤炭竹木當盡減價矣可笑可笑僕又何用更置一莖草于鄧林棼棼之間哉至於求序於兄僕與兄何等朋友也其有所求吾自求之而何待於人為之媒哉以為吾文苟有成則當求兄不成則不敢以累兄知人之明也及得兄序讀之令人益增慙汗吳下自古来文人正不少以為僕盖過二千年吳下詞人而直接朴㳺之文統既使兄為私於所好人若使僕與人争名争先然者非兄之所以愛僕也使兄今日為僕作序則亦宜道兄與僕昔以文相切磋以才弱志隳幾成而罷之意句句道却實事庻使兄為不誣而吾亦可以不愧耳至於兄之雄文則千百年自有定價倘吾文稍進乃敢為兄作序今且不欲羔䄂於狐裘也刻板事既已力止兄序遂亦寳藏之未敢示人也不具與卜無錫書僕支離床席已成廢人久不能一奉晤言殊深耿耿近敝邑一刻字人云執事欲刻鄙言雖或傳言之妄然聞之殊不自安盖執事與善之過雖淺陋言語猶不欲遺之此在執事則為盛心然本非立言之人而徒為覆瓿之用此在鄙人則甚可愧且今世所謂文集者徧滿世間不為少矣其實一字無用彼其初作者莫不妄意于不朽之圗而適足以自彰其陋以取誚於觀者徒所謂木災而已僕每為彼愧之而復自效尤之乎昔人論文章家惟見理明而用功深者乃能得之此未易言也况僕平生本無立言以求不朽之意偶少年時隨一二友人强習世間綺語以才力滯鈍兼復懶病加以踈拙于身心而强欲求工於筆札竟不能工而罷閒中偶觀舊稿一二篇支離不經之言滿紙而是盡欲焚燒為快又自悔向来錯用心力而一無所成也若欲以此傳於人人則既以自誤又復誤人且昔人云人短於自見僕自知猶然人又将謂之何執事苟以為可而欲傳之是有累於執事之明苟不擇其可否而欲傳之是有傷於執事隱惡之義也承執事知愛敢布腹心萬望中止其事則執事之愛我更厚矣荆川集巻五欽定四庫全書荊川集巻六明唐順之撰序中庸輯略序中庸輯略凡二巻初宋儒新昌石􅗐子重采兩程先生語與其高第弟子游楊謝侯諸家之説中庸者為集解凡幾巻朱子因而芟之爲輯略其後朱子既自采兩程先生語入集註中其于諸家則又著爲或問以辨之自集註或問行而輯略集解兩書因以不著于世友人御史新昌吕信卿宿有志于古人之學且謂子重其鄉人也因購求此兩書而余以所藏宋板輯略本授之已而吕子廵按江南則屬武進李令板焉而集解則不可復見矣序曰蓋古之亂吾道者常在乎六經孔氏之外而後之亂吾道者常在乎六經孔氏之中昔者世教衰而方術競出隂陽老墨名法甞與儒並立而為六家為九流其道不相為謀而相與時為盛衰佛最晩出其説最盛至與吾儒並立而為儒佛然其不相謀而相盛衰也則亦與六家九流同夫彼之各駕其説而其盛也至與儒亢而六而九而二也斯亦悖矣雖然其不相為謀也則是不得相亂也嗚呼六經孔氏之教所以别于六家九流與佛而豈知其後也六家九流與佛之説竄入于六經孔氏之中而莫之辨也説易者以隂陽或以老莊是六經孔氏中有隂陽家有老家矣説春秋者以法律説禮者以刑名數度是六經孔氏中有名家有法家矣説論語者以尚同之與兼愛尚賢明鬼是六經孔氏中有墨家矣性不可以善惡言其作用是性之説乎心不可以死生言其真心常住之説乎是六經孔氏中有佛家矣六家九流與佛之與吾六經孔氏並也是門外之戈也六家九流與佛之説竄入于六經孔氏之中而莫之辨也是室中之戈也雖然六家九流之竄于吾六經孔氏也其為説也粗而其為道也小猶易辨也佛之竄于吾六經孔氏也則其為道也宏以濶而其為説也益精以密儒者曰體用一原佛者曰體用一原儒者曰顯微無間佛者曰顯微無間其孰從而辨之嗟乎六經孔氏之旨與伊洛之所以講于六經孔氏之旨者固具在也苟有得乎其旨而超然自信乎吾之所謂一原無間者自信乎吾之所謂一原無間者而後彼之所謂一原無間者可識矣儒者于喜怒哀樂之發未甞不欲其順而達之其順而達之也至于天地萬物皆吾喜怒哀樂之所融貫而後一原無間者可識也佛者于喜怒哀樂之發未甞不欲其逆而銷之其逆而銷之也至于天地萬物泊然無一喜怒哀樂之交而後一原無間者可識也其機常主于逆故其所謂旋聞反見與其不住聲色香觸乃在于聞見色聲香觸之外其機常主于順故其所謂不睹不聞與其無聲無臭者乃即在于睹聞聲臭之中是以雖其求之于内者窮深極微幾與吾聖人不異而其天機之順與逆有必不可得而强同者子程子曰聖人本天釋氏本心又曰善學者却于已發之際觀之是中庸之旨而百家之所不能駕其説羣儒之所不能亂其眞也彼游楊謝侯諸家之説其未免于疵矣乎吾弗敢知然而醇者大矣其未能不浸滛于老與佛乎吾弗敢知然而師門之緒言蓋多矣學者精擇之而已矣則是書其遂可廢乎是信卿所為刻以待學者之意也明道語略序道致一而已矣學者何具多歧也蓋聖人賛易模冩人心之妙與乾坤合體而蔽之以兩言曰忠信曰敬忠信者非他也吾心之無所欺焉者而已矣敬者非他也吾心之無所肆焉者而已矣此無所欺之心即此無所肆之心此無所肆之心即此無所欺之心此無所欺無所肆之心即渾然乾坤之心非二也乾坤之心不可見而見之於復復之所以見乾坤之心也學者黙識其動而存之可矣是以聖人於乾則曰其動也直於坤則曰敬以直内乾坤一於直也動本直也内本直也非直之而後直也蓋其醖釀流行無斷無續乃吾心天機自然之妙而非人力之可為其所謂黙識而存之者則亦順其天機自然之妙而不容纎毫人力叅乎其間也是故湛然常寂而非静也盎然常感而非動也退藏於密而非内也曲成萬物而非外也不寢不食而非助也不睹不聞而非忘也懲忿窒欲而未甞損也改過遷善而未甞益也是乾之所以為易而坤之所以為簡也如此則為敬以直内不如此則為以敬直内如此則為集義不如此則為義襲如此則為由仁義行不如此則為行仁義故曰道致一而已矣學者何其多歧也彼其所謂從事於心者蓋未甞實有見乎天機流行自然之妙而往往欲以自私用智求之故有欲息思慮以求此心之静者矣而不知思慮即心也有欲絶去外物之誘而專求諸内者矣而不知離物無心也有患此心之無著而每存一中字以着之者矣不知心本無着中本無體也若此者彼亦自以為求之於心者詳矣而不知其弊乃至於别以一心操此一心心心相捽是以欲求寧静而愈見其紛擾也夫聖人論心之精莫如易之乾坤而善發易之藴者莫如程先生之書先生之書得於心而言之者也故其言曰鳶飛魚躍與必有事焉而勿正之意同會得活潑潑地不㑹得只是弄精魂又曰未嘗致纎毫之力此其存之之道又曰以敬直内便不直矣然則彼之所謂從事於心者其為敬以直内者耶其為以敬直内者耶其為非力以存之者耶其為力以存之者耶其為活潑潑地者耶其為弄精魂者耶武進尹撫州徐君子弼自少有志於心學蓋讀先生之書而有㑹焉而懼學者求於心者之差也則取二程全書採其要略而刻之於邑中以其出於明道者為多也而題之曰明道語略嗚呼學者患不知求之於心知求之於心矣而其多歧又如此故夫擇之果不可以不精也季彭山春秋私考序春秋之難明也其孰從而求之曰求之聖人之心聖人之心其孰從而求之曰求之愚夫愚婦之心春秋者儒者之所累世而不能殫其説者也而曰求諸愚夫愚婦之心不亦迂乎孔子甞自言之矣吾之於人也誰毁誰譽斯民三代所以直道而行者也春秋者聖人有是非而無所毁譽之書也直道之所是春秋亦是之直道之所非春秋亦非之春秋者所以寄人人直道之心也人人之心在焉而謂其文有非人人之所與知者乎儒者則以為聖經不如是之淺也而往往謂之微辭是以説之過詳而其義益蔽且夫春秋之為春秋以誅亂討賊而已子而嚴父臣而敬君人人有不知其為是而弑君簒父人人有不知其為非者哉人人知其為是非而或䧟于弑逆焉者昔人所謂以意為之也雖其以意䧟于弑逆而其直道而行之心固隱然而在也聖人早為之辨醒其隱然而在之心以消其勃然敢動於邪之意是以亂臣賊子懼焉而能自還也其使之懼者不逆之於勃然而動者之不可忍而牖之於隱然而在者之不容息是以能使之懼也非書其弑以懼之之謂也其懼者但覺其隱然而在者之忽露而不覺其勃然而動者之暗消是以懼也非懼其書我而不敢為之謂也故曰孔子懼作春秋春秋成而亂臣賊子懼孔子之懼心斯人直道而行之心一也斯人直道而行之心亂臣賊子之懼心一也人人之心在焉而謂其文有非人人所與知者乎善説春秋者則不然曰無義戰人人可以知其為無義戰也而奚問其有鐘皷無鐘皷云爾也曰某三王之罪人某五伯之罪人人人可以知其罪之在也而奚問其功與過云爾也曰亂臣賊子懼人人知其為討亂賊也而奚問其君之有以取之無以取之云爾也以是説春秋豈不簡約而易知也哉可謂以愚夫愚婦之心求春秋而不蔽於聖經者也或曰然則游夏何以不能賛也曰高與赤者世傳以為游夏氏之徒也師説固宜有在焉者其猶未免於説之過詳歟其諸家之紛紛者又可知矣可謂蔽於聖經而不以愚夫愚婦之心求春秋者也余為是説久矣儒者皆牽於舊聞迂焉而莫予信也間以語彭山季君君欣然是之于是出其所著春秋私考視余則公榖之義例左氏之事實諸家紛紛之説一切摧破而獨身處其地以推見當時事情而定其是非雖其千載之上不可億知然以斯人直道而行之心凖之要無甚相逺者余是以益自信余之説有合於君也君甞師陽明王先生聞致知之説為能信斯人直道之心與聖人無毁譽之心同其春秋大旨亦多本之師説故其所見直截如此至於地里古今之沿革姓名氏族之𣲖星歴之數度禘郊甞社禮樂兵賦之纎悉古今之所聚訟皆辨析毫釐務極該貫昔人所稱經師莫之及也以非大義所關故不擿之序中蓋余甞聞李愿中言羅仲素説春秋初未甚曉然及住羅浮後其説不知何如夫羅浮何與於春秋也豈不以此心空洞無物而後能好惡與人同好惡與人同而後能説春秋也歟君老矣方且隱雲門之邃厭文字之支離兀然洗心以游於無物其所説春秋又當有進於是者余尚得而見之巽峰林侯口義序有逐末之學而後有反本之論蓋有執器而無得者論者曰盍反而求之乎道雖然未若即器而道之為至也有稽古而無得者論者曰盍反而求之乎今雖然未若即古而今之為至也有滯經而無得者論者曰盍反而求之乎心雖然未若即經而心之為至也孔子不云乎興於詩立於禮夫詩之咏歌禮之數度豈非所謂器而詩禮之為經也豈非所謂古也哉試甞觀之心之不能離乎經猶經之不能離乎心也自吾心之無所待而忽然有興則詩之咏歌關雎猗那之篇已隨吾心而森然形矣是興固不能離乎詩矣然自其讀詩而有得也未甞不恍然神游乎關雎猗那之間相與倡和乎虞廷周廟而不知膚理血脉之融然以液也則是學詩之時固已興矣非既學詩而後反求所以興也自吾心之無所待而忽然有立則禮之數度玉藻曲禮之篇已隨吾心而森然形矣是立固不能離乎禮矣然自其讀禮而有得也未甞不恍然神游乎玉藻曲禮之間相與揖讓乎虞廷周廟而不知膚理血脉之肅然以歛也則是學禮之時固已立矣非既學禮而後反求所以立也安得以寓於篇者之為經而隨吾心森然形者之不為經耶故即心而經是已安得以無所待者之為吾心而有所待而融然以液與有所待而肅然以歛者之不為吾心耶故即經而心是已然則何末非本而又何所逐耶何本非末而又何所反耶雖然善學者一之不善學者二之非獨今日然也在孔孟之門亦或不免於二之矣子夏傳詩傳禮後世訓詁家宗之子夏非訓詁也然已權輿乎訓詁矣聖人懼其滯而無得也而曰女為君子儒君子者務本之謂也子貢求性與天道於文章之外聖人懼其離而無得也而曰一以貫之言文章即性與天道也今之為形聲文字訓詁之學者皆是矣君子懼其滯而無得也為之説曰盍反而求之乎心也此所謂有逐末之學而後有反本之論者也而學者縁此遂以為必絶去形聲文字與訓詁求之窈窈冥冥而後可以為至道二者本末則必有分矣然而皆聖人之所不與哉林侯口義者侯之與二三子所以講於六經孔孟之書者也林侯苦節而不以驕世峻行而不以矜俗其志務於反躬以求盡乎精微而於古人形聲文字之間乃索之如此其宻而析之如此其詳嘻吾知其不為滯也其殆有見於道器古今之不二也乎雖然吾猶懼二三子之二之也二三子試致誠而求之黙識吾靈知靈覺之本體於羣居誦習之中融然以液否耶肅然以歛否耶是融然而肅然者在心耶在經耶在心也則何待乎經在經也則何感乎心是心與經一者耶二三子可以即此而自得之矣而又何窈窈冥冥之求哉或曰今之為形聲文字訓詁之學者皆是也子顓顓焉若恐二三子之離而去之何也曰本末則必有分矣二之皆弊也且夫滯經之弊淺而著離經之弊深而微滯經之弊惟固陋者而溺於此離經之弊雖䟽通者或不免溺焉吾舉其深而微而二三子乃或昧於其淺而著吾欲使二三子不溺於䟽通之士之所溺而二三子乃或不免溺於固陋之士之所溺則非余之所敢知也而亦非林侯之所知也於是口義刻既成丹徒李令來請序序之筆疇序苟可以誘世而勸俗者君子不廢也匹夫一怒挺而兩鬬於是時而莊語之以詩書禮樂則益其怒而疾其鬬耳而滑稽之士為之微言冷擊嘲諧詼謔於其旁則釋然一噱而散小夫婦人恣睢兇毒於㝠㝠或懼之以士師理官之法彼有傲然而已矣巫兒佛媼為之張皇神鬼指徵禨祥則彼且瞿目縮舌而駭汗夫苟可以解急鬬則嘲諧詼謔或㨗於詩書禮樂苟可以懼㝠兇則神鬼禨祥或痛於士師理官滑稽禨祥之説非君子之説其要於解鬬而懼兇則君子所以為勸於世也由此言之其苟可以為勸於世雖其戯如滑稽誕如禨祥且不廢也况其言之根據古先而不詭於繩墨者乎筆疇之為書自居身御物至於家人細𤨏之事皆備自經史百氏至於小説衢巷之談多所採摭蓋亦不盡雅醇而其大旨要於使人畏慎柔寛擇歩而蹈以避咎其知足少欲忍辱濡下賔名去華大率稱引老莊然而古先所以厚施薄責懲窒忿慾之緒言亦往往而在也昔人謂老莊處危世觸駭機欲以曲自全故往往上柔弱黜剛强至自處於材不材之間迷陽郤曲以晦世而免禍為是書者其意毋乃出於此歟雖然使明哲之士讀之則自可以觀其深剟其駁焉而節取其是者以閭巷鄉曲之士讀之且將悚然有動乎其心怵於禍而冀於全去其狷忿鬬争恣睢兇毒之習而庶幾乎謙柔長厚寛身之道豈非志於勸俗者之一助歟是書故有板刻吾邑吳前川翁乃刻而掲之墓之左屋以示其鄉人然半而不完翁之子鳴玉既得其全書于是併刻之以廣於世以成父之志云王君注握竒經序余少頗好奕無從得國工之譜而獨以意為之寤寐而懸思焉久之其於戰守攻圍之間若或有得算焉而因以勝於人其不能勝而敗焉者則咎於思之所不至而已藝既稍習已而得國譜則余所以勝者大率多古人已試之術其敗焉者則古人已先為之營救布置余于是自笑其思之不極不能盡合於古人而又惜不早得國譜以助余之思也以是知古人之精神寓之于譜奕者索諸已之精神與索諸古人之精神苟有得焉其致一也奚必譜之是而心思之非奚必心思之是而譜之非乎然則言兵法者何以異此自伏羲畫象貞坎悔乾為師已寓居中握竒之義而握竒經則世傳以為黄帝書蓋戰法自黄帝始也顧其文簡奥世鮮知者王君以窮經餘力推究其説為之註釋其諸家言兵有及于握竒者悉取而附之其營算占候亦綴焉以為兵家全書書示余余竊嘆其有似于吾所謂奕之譜也盖史稱衛霍不學古兵法而每戰輙勝然觀其環車為營縱輕鋭往當匃奴實得經中所載二壘游兵之義至諸葛氏摹握竒為八陣鈎角聨絡一一古法宜其可以必勝矣而竟不能成混一之功豈其所當之敵有堅脆耶何暗合古法與純用古法者其效乃若是相反耶然君頗自竒其説以為得吾書而用之内靖草竊外靖疆圉特為易事盖余之于奕也雖知思與譜之無二然以譜措之懸思則差較毫釐以懸思措之臨局則又差較毫釐是以聖人自謂能行三軍而又曰軍旅未學言兵之不可以甞試也王君年始衰矣而志尚壯今塞垣多故安知不有知君而舉之者使之儒服立軍門親皷􅎏之間以與老將角短長而知其勝算之果不能出吾書也則王君乃可以自信矣江隂縣新志序有家者隨其家之所有而籍記之其常也凡其田畮租甔錢貫絲縷豉合醬罌僮指之數此纎勤治生者之所詳而游閒華飾者之所略也凡其池舘花樹狗馬圖畫古物珍器之數此游閒華飾者之所詳而纎勤治生者之所略也二者則更相笑矣而家之所以為家者則固在此而不在彼也與郡國州邑之有志自古而已然亦所謂隨其郡國州邑之所有而籍記之其常也禹貢周職方豈非志國邑者之所權輿也哉然自後世觀之則見其有𤨏細而俚俗者矣夫其田賦高下之異等墳壚黎赤之異壤九鎮九澤之異名而五戎八蠻之異服其列而載之可也至於篠蕩箘簵淮蠙江龜海錯之纎細則類於草木蟲魚之書而多男少女多女少男之紀則近於閭井村俗之談古人何若是之𤨏𤨏也蓋苟有切於利器用而阜民生辨隂陽而蕃孳息則固不得以其穢襍而略之而况其大且重者乎其所載而詳者固然則其所不載者亦可知矣後之所謂地志者則異是矣其叙山川也既無關於險夷瀦洩之用而其載風俗也亦無與於觀民省方之實至於壤則賦額民數一切不紀而仙佛之廬臺榭之廢址達官貴人之墟墓詞人流連光景之作滿紙而是嗚呼此何異於家之籍專記圖畫狗馬玩具為粧綴而租甔錢貫所以需衣食之急者漫不足徵也其亦何取於為家也與知家之有籍本以治生而非以觀美國邑之有志本以經世而非以博物則得之矣竊聞國朝集諸儒臣修一統志時兩人相誚其一人欲載科目之數則曰此非進士録也其一人欲載户口田賦之數則曰此非黄白册也科目則别有録矣不載宜也户口田畝固天下之大命而經國者所必稽也且若彼之説則禹貢周職方其亦黄白册也哉彼固以是為𤨏細俚俗焉而不載也江隂於常州為屬邑而枕江之衝為蘇常諸郡北門以故視他邑獨重舊雖有志而宜書不書不宜書而書大率如所論諸志之弊無足徵者至今令餘姚趙君始更修之趙君為政潔已愛民才敏而慮周凡志中所載田賦徭役户口食貨謡俗水利防江治盗之源委本末節錯絲棼盖皆君之所嘗蚤夜盡心焉者其於浮文羡費則盡屏去不事譬如辛苦起家之人斥絶耳目之玩而畢力於家人生事之間一錢粟之盈縮一臧獲之奸良與夫鐍鑰閭户之守雖其錙銖隱賾而聰明智算舉無遺者於是一切以其精神思慮之所及而登之於籍至其纂緝成編則以屬之學士張先生先生以其國史之餘才而推之以成一邑之史故其所載繁簡删存能得趙君之所用心而著之以為後來治邑者之所據凖又如計然任公之徒精於治生而太史公萃之為傳凡其仰俯拾取廢居棄與之法與夫巵茜荻漆之細莫不具載能得諸人之所用心而著之以為治生家者所必資盖為邑之與治生意嚮或異家籍之與邑志體裁亦殊至其的然當於實用而不取辦於具文焉則一也夫前人以其所用心而著之籍記後人因其所籍記而得前人所用心而守之是以家道能常興而不墜予欲使後之為江隂者因趙君之所為志而知其所用心而守之也為之書其端鄭君元化正典序㑹稽金錫竹箭之産甲天下其鍾為人文大率峭㧞清慧能以文章勲伐耀于當世至於方外之士亦往往能俶儻瓌恠以露其竒盖所謂地氣然也㑹稽鄭君少喜談兵讀韜鈐諸書尤工於風角鳥占嘗北抵宣大東歴遼薊掀髯謁諸邉帥談笑油幕間毎敵鏑驟飛發一語䇿勝敗屢屢竒中以是撼貴璫老將而出其槖中之金短衣飛鞚目中無百萬貔虎氣當此時盖一機智勇辨之士及長揖邉帥故裘南歸乃究意黄老内養之學翺翔吳㑹與娵娵騷人墨士相徵逐寄身藥肆中呐然守柔下簾晝臥人不識其有雄氣者盖鄭君始終若此亦竒矣哉鄭君自謂得青峰碧厓諸異人之傳嘗著内養書名曰元化正典大槩本之中黄之説又謂邵子十二萬九千六百之數盖暗藏火候以為邵子最得伯陽微旨余聞内養家多言火數乃虛設期於隂陽無偏勝而已鄭君乃以為實有是數若跬歩以至百歩然者余不能盡解其説也鄭君又欲往燕齊海上牢島不夜之間庶幾復遇異人焉燕齊海上之異人若黄石海蟾之流盖嘗决機軍旅而其後得仙者也鄭君倘得而見之乎其歸以語我東川子詩序西北之音慷慨東南之音柔婉盖昔人所謂繫水土之風氣而先王律之以中聲者惟其慷慨而不入於猛柔婉而不隣於悲斯其為中聲焉已矣若其音之出於風土之固然則未有能相易者也故其陳之則足以觀其風其歌之則足以貢其俗後之言詩者不知其出於風土之固然而惟恐其粧綴之不工故東南之音有厭其弱而力為慷慨西北之音有病其急而强為柔婉如優伶之相閧老少子女雜然迭進要非本來靣目君子譏焉為其陳之不足以觀風歌之不足以貢俗也余讀詩至秦風其言盡田獵戰鬬之事其人翹然自喜愾然有躍馬賈勇之氣已而讀楚騷諸篇其言鬱紆而忉怛則愀然有登山臨水覊臣棄婦之思夫秦風慷慨而入於猛楚騷柔婉而隣於悲然君子不廢豈非以其雖未止乎中聲而不失其風土之固然其陳之也可以觀其風其歌之也可以貢其俗乎東川子家秦中盖昔人所謂汧渭之間與其所為載歇驕遊北園故處往往而在東川子雅喜為詩嘗寄余詩百餘篇皆跌宕踈健絶去脂粉纎冶之態雖其於中聲未知必合與否然可謂不失其土風者其塞垣諸曲余尤愛之如邉城鼓角春寒夢沙塞旌旗日暮雲天寒細栁營嘶馬草滿長城水飲駝榆關千里秦雲暮羌管一聲漢月秋較其音節倘亦有駟鐵無衣之遺否耶然則讀是詩者不必問其何人而知其必為秦人之詩無疑也余南人也而不能為楚聲竊喜東川子之為能為秦聲也乃為之題其首後有採風謡者自當得之前後入蜀稿序山澤好竒之士往往以極幽遐詭譎之觀博搜山川草木鳥獸變化之情狀為快然其耳目有所滯而不能徧於是有側身四望之思宦游覊旅之士其力足以窮懸車束馬之徑凌跕鳶挂猱之阻然其情志有所累而不能遣於是有懷鄉去國之憂情志與耳目常相違而山川之與人常不相值惟蜀僻在西垂古所謂别為乾坤者也雪嶺大江之雄渾峩巫青城之窈麗仙靈之所窟宅其勝甲於天下然陸則拒以飛厓斷棧水則陿以驚江急峽鬬雷霆而翳日月其險且逺亦甲於天下自古好竒之士慕其勝而以其險逺不能至於是有夢而游寤而嘆焉者自非游宦與覊旅終其身無因而一至焉其至者怵於險而忘其為勝於是覊臣遷客之思深而輕舉冥搜之好移變衰揺落之感生而雄渾窈麗之觀改盖昔人所賦側身西望阻岷峨者既足以著山澤好竒繾綣顧慕不能自遂之情而其所記峽州至喜堂者亦足以盡宦游覊旅憔悴無聊不能自遣之狀夫雖幸為耳目之所接而奪於情志之所不快與雖幸為情志之所快而限于耳目之所不接其耳目所不接者既不能使景就乎情而工為鑿空揣懸之言其情志之所不快者又不能使情就乎景而洩其和平要眇之音於是大夫缺於登高能賦之義而騷人竒士縱欲原本山川極命草木亦無所憑焉以聚其精而發其辨博噫嘻此春山公前後入蜀稿所以為可諷也公自郎官出為郡守自郡守遷按察副使先後皆在蜀其為郡守也於重慶盖陸走棧水浮峽而後至中州之人所謂險且逺其為副使也於建昌則在靈關大渡瘴雨蠻煙之外雖蜀人亦素憚以為險且逺者而公皆恬然安之政事之暇方且披巉巖踐霜雪穿猩鼯豺虎之窟俯江妃水仙之宫以窮其勝而猶若未足故其險無所不渉則其勝無所不窮其所歴與所窮一切可愕可喜則無不見之乎詩盖其大者關政理謡俗之故其細者足以牢籠百物山川草木鳥獸變化之情狀其叙險也既可以使人欷歔慘慄而如墮其叙勝也又可以使人䬃爽飛動而如躋向非公以其宦游旅寓之跡而兼乎山澤竒士之好情志之所快與耳目之所接適然遇合固不能摹而冩之若是公詩既刻為二巻其子于徳請序于余余以謂使好竒之士讀公之詩可以不俟渉險而坐窮其勝于庭户燕閒之間宦游覊旅之士讀公之詩且將悦乎其勝而忘乎其險頓然釋志于驚江絶棧之上也然則不能自遂與不能自遣者皆將于公之詩乎有得也余山澤人也盖慕蜀而不能至者亦將于公之詩乎有得也遂不辭而序之山堂萃稿序余讀孔氏論語而見其所稱古之逸民夫逸之為言隱也彼其事汙君而為之士師至于三黜而不肯去與其斷髪雕體以君長於蠻夷偃然有南靣之尊可謂漸染于顯榮而孔子至以匹於讓國餓死之人而謂之逸民何耶盖此數人者其脱於聲利華寵之外而一無所緇焉則同也特其所謂不降不辱者則心與迹并其所謂降而辱者則心與迹判而難以識耳今吾侍郎養齋徐公其可與於若人之徒歟嗟乎士之嗜欲敺諸其中而紛華蕩乎其守始進者躁於求而宦成者固其位能自脱焉者少矣公少時則已自致於亨衢然公澹泊不見可好其後反求乎理性精研乎義利益知自貴而賤物故雖居高位享厚禄而其貌冲然常若山林之癯其家蕭然常無十金之槖乞其身有耄夫之所不能决而必之以强徤之年砥其節有寒士之所不能居而甘之以肉食之後自是天下知與不知言清名完行者莫不翕然歸公然則公之進而顯也其心與迹判者耶其退而隱也其心與迹并者耶余幸與公同鄉曲自蚤嵗即知慕公公為侍郎而余適在翰林方其旅候於隆隆之門而習見乎炎炎之態則悶然而返毎一見公則不知冷然嘘我以清風也而不能去公還於家余亦罷歸又獲從公游毎訪公之廬但見山窈水廻老屋數椽堦前鳥雀鳴聲上下則不待見公而已如游於首陽之曲栁下之鄉可以使人樂而忘返矣已而公出其詩文若干巻曰山堂萃稿者示余余受而讀之盖自其平生所謂應酬文字與得歸草堂以後諸詩及謝病諸䟽皆在焉公非如文章之士刻鏤以為工者也而其清逺閒散耿介獨立之氣黝乎其淵藏􅟚乎其金鳴其風旨直與古者逸民採薇之歌三黜之語歴百世而相上下則又不必即公之容望公之廬而公之為人固可以一撫巻而得矣雖然昔人不云乎身隱矣焉用文之且夫所謂逸民者方將鳥行而蟬蜕惟恐其影響之不幽而豈蘄之以言語文字行於世也哉矧公位大臣又當天子嚮意之時苟少需焉施功於社稷被澤乎生民不難也公意猶若有不屑焉者而亦何藉於文乎然而世有不能即公之容望公之廬者得其文而讀之或可以得公之為人則夫㢘頑而起懦亦將於是乎在余既校而正之以還于公因為之題其首劒泉奏議集序劒泉吳公奏議集凡幾巻在嘉靖初天子勵精思治博取俊乂以充庻位尤注意臺諫之選公於是以才召入院為御史凡所建白多見採納若兹集所載是也於戲公之言備矣而其大者莫如劾柄臣之奸與請開通惠河諸䟽始柄臣掌營兵怗勢為奸利士大夫以為隱憂而公慨然上䟽攻之其言明白切痛多人之所難言已而相繼攻之者益衆然或過激不足取信而柄臣益恣不悛後天子亦自燭其奸下之獄以死盖去公上䟽時十五六年而公之言驗矣國家運道自通州至京師故從河運後乃從陸其故河廢閘猶在議者屢請修復而京師大猾倚陸運侔利往往為飛語揺之公如建議則以身塞利害之衝又賴天子與相力主其事迄有成績其詳具公所上通惠河志中自河功之成也户部嵗省運錢十二萬緡此則公言之既效者公又欲盡轉通州之粟於京師以消未形之患則其言未及行而憂時者多以公言為是也公始令江山有聲而擢御史自御史出守處州歴官南京太僕少卿而致其事公為人敏鋭濶達藝於世務而㨗於應機開口抵掌鋒鍔㨗露課功䇿效不爽一髪非同迂腐拘牽之士指摩而坐論之者也公嘗謂余曰士大夫談説經濟指天畫地貫穿今古不足為難惟切中事情若操刀而割刃隨手下卒無一刃不當肯綮乃為難耳此盖公之所自寓乎曩公在御史時又嘗為余言儻得在塞垣之間當為國家鞭笞絶域招烏孫鄯善之儔而致之闕下盖公自量其方略氣力有足辦此者以其不至大官故其所設施者不竟雖然是集也可以觀公之槩矣聲承集序漸齋子録其平生交游往復之書及諸贈言名之曰聲承集凡若干巻漸齋子始居給舍侃侃厲名節故其時所與游多慷慨竒節之士已而謝事家居蟬蜕聲利晩乃刋落華葉潜究精微故其時所與游多山澤肥遯之流與講學論道之朋且夫人之於世固未有獨立而無與者縉紳相與以同心而共濟雖山澤與世不相渉亦必有與焉以同道而相益此孤立一意之輩所以不可行於朝而狷狹枯槁逃虚避人之行要亦不可行於野也漸齋子以其真率苦淡之節而使海内高士争慕與之游若不及又能以其謙虚不自滿之量而使與之游者争獻其所長者如注而一無所拒故其在朝則相與秉公斥奸以共憂天下之憂在野則相與養志理性以共其樂於山林泉石之間盖漸齋子之所取於友者既已無不盡矣然猶以為聚散存沒其數之不可常人情久則易以忘是以雖其平生所與交一臂之人異日或至於舉其姓名且不能記其姓名且不能記則其所以交相儆戒策勵之意亦或至於怠且廢幸其書詞翰墨尚可尋繹而因以志其人之姓名與其所以相儆戒之意則雖其聚散存沒之不可常而宛然常如一臂之交雖在燕閒獨處之中而自得乎羣居儆戒相成之益此聲承集之所為録也盖昔栁子厚作父友志其人之姓名備矣然但以侈朋游結納豪傑為美談至於切磋儆戒相成之誼未著也衛武公所與友自卿至於師長士至於旅賁資其儆戒以進於睿聖故抑淇澳之詩傳之至今然其儆戒之言可聞而卿師長士旅賁固亦當時所謂賢者其姓名獨湮沒不可見使尚友者有遺憾焉至子輿論獻子有友五人則幸於兩人者尚可識其姓名而慨然有感於三人者不可記今漸齋子修名砥節不啻如子厚其尚賢取友如獻子其老而好學盖有衛武之遺使後之人慕漸齋子之風而讀其所為書讀其所為書而得其所與游者其将曰某也慷慨竒節人也某也肥遯人也某也講學論道人也是漸齋子能以其所得於友者而乂以為後人尚友之助也其亦可以無子輿三人之感矣而余也又得以不敏之詞附姓名于集中其亦不謂幸矣夫吳孺人輓詩序禮部郎中惺母古者既有左右史以記言動矣而又為之詩詩之與史同于籍善事以鏡來世而咨嗟咏嘆之則其味尤長而其風益逺盖詩者其助史之不及乎然左右史所載惟其朝廷邦國王公鉅人殊勲絶徳非此不列而其載之詩者大半多閨闥房帷之間以及伐桑采葛髦笄膏沭家人𤨏屑之事是以塗山有莘助賛王業然不列于夏商之書而十三國風自二姜許穆夫人以烈節著聞則詩人侈而歌之不一而足雖以田墅閭巷之婦人若草蟲雞鳴静女其名姓絶不登史册其事亦無特異者而皆得見之于詩豈史主于紀大而略小詩主于闡而探賾其為教一而其為體則異耶然則詩非特以助史之不及其于女史尤要也漢時劉更生善為詩其所輯列女傳率本之詩謂詩之繫乎女史也豈不信乎吾友吳君敬夫之母吳孺人既沒而士大夫為之輓歌輓歌者沿于虞殯其樂道善事而咨嗟咏嘆之者詩之遺也鳴呼孺人以閨中之懿非如男子有四方之事功徳炳炳可以托于鼎彛之勒左右史之載而與之不朽而又非有如燕燕栢舟載馳遭罹厄㑹以顯其竒節為詩人所希詫其所可見者不過乎閨闥房帷麻絲漿酒之間尊養姑章敬承夫子家人女子之常事而已雖然槩以草蟲雞鳴之義其宜在所不廢乎是以諸君子哀而詩之以附于彤管也其以廣列女之採而興起幽人之貞也乎余國史也于序詩為宜故推本詩之繫乎女史者而為之序荆川集巻六欽定四庫全書荆川集巻七明唐順之撰序石屋山志序凡情攖於物者未有不累於中而喪失其所樂者也有人焉知夫軒裳圭組之足以為累而欲自逃於山顛水涯之外以為得所樂不攖於物矣然不知方其有羨於山水而莫之致也則或煩勞而悵望而其既得也則或嗜深玩奇窮乎幽絶勞精神而不知止其據而私之也則一丘一壑悉以自占而若恐其或奪也其久而將去也則躊蹰顧戀而其既去也則或悵然有失如遷客之思其故鄉罥於懷而不能已此其患得患失於山水與夫患得患失於軒裳圭組者清濁有間矣其決性命之情以攖於物而喪失其所樂則一也孔子不云乎知者樂水仁者樂山知者動仁者靜仁則所見無非山者然非待山而後為樂也知則所見無非水者然非待水而後為樂也非待山水而後為樂者非遇境而情生非遇境而情生則亦非違境而情歇矣故境有來去而其樂未嘗不在也苟其樂未嘗不在則雖仁者之于水知者之于山亦是樂也雖入金石蹈水火不足為礙至於軒裳圭組不足為紲亦是樂也君子所以欲自得者以此而已石屋者安成山水之勝處也彭君隠焉而樂之既官於四方而恨不能與俱於是纂為圖若干巻凡巖洞之嶔崟飛泉之噴薄草木禽魚之窈窕朝靄夕霏之變化不假登頓不勞騁望而宛然坐得于此不離乎軒裳圭組之間𣺌然自縱乎幽遐詭異蕭散之觀雖人之未嘗至石屋者亦將於是焉可以神游而意到也君信可謂能樂于山水矣然吾不知君之樂豈以厭軒裳圭組之為累而欲自逃于此歟或悵然于懷而不能自己歟抑其中固有可樂聊以寄于此歟君苦志好學而從事于仁知不欲為亢世髙蹈之士而欲為中行君子其必有不攖於物者矣其必有不待山水而後為樂矣因敘以問之贈彭石屋序君子之仕也非以為利也其苦身以為人至于手足胼胝而不敢以為勞其忘身以從王事至於終窶且貧室人交讁而不敢怨此豈有一毫利之也哉宋儒程伯子之言曰孔子曰古之學者為己今之學者為人吾以謂古之仕者為人今之仕者為己其學也為己則其仕也必為人其學也為人則其仕也必為己順之讀其說而有感焉又嘗觀太史公循吏傳至公儀休則獨述其拔園葵辭饋魚一二細事而略不及乎其他竊意休之所以能垂世而立名者必有經國之大計而此二事乃匹夫之小亷耳何太史公舍彼經國之大計而取其匹夫之小亷也其意可知矣葢以為苟不自利必能利人苟不為己必能為人也歟余從縉紳之後見世所謂賢士大夫者多矣未見有一毫無所利於官者也夫世之潔清好修者不啻幾人而余以為未能無所利者非過歟葢檢于耳目之所及而或忽于所不及慎于大或忽于細此僅愈于黷冒無恥者則可耳其去古之循吏不亦逺乎今夫以小民供有司之飲食器具而不以為有司之浚我以有司受小民飲食器具之供而不以為小民之過奉我其來也久其習之也熟而恬然莫之怪也嗚呼此豈非所謂耳目之所不及與其細者歟宜興山縣也里胥之供官歳為金者以百計通判彭侯來署縣事公曰吾廩祿之外一錢亦私也況百金乎且我書生所須幾何安用百金亟去之或謂侯曰公則可矣得無病後來者侯曰吾知自盡而已遑恤其後乎且後來者賢必不非我不然吾亦安能預為不賢者地乎侯為人貌古而氣凝恬淡而寡欲其居處苦約有寒士所不能堪者推侯之志雖枯槁山澤對四壁之居亦可軒然無求于世而顧有一毫利于官也哉侯治宜興數月有惠愛其利害所興革多可書而余獨稱侯之節且侯之節其大者多矣而余獨舉其細者亦太史公載公儀休之意也以侯之仕不為己而其仕必為人者可知己以侯之仕能為人而其學必為己者又可知己或謂小節不足以觀人豈其然耶于是新令且至侯還郡有日矣學官某與諸生某輩欲留侯不得則求予文為侯贈余不能辭也遂因侯之節而及於儒者為己為人之説以告于世之仕者非獨以告為宜興者也送太平守江君序嘉靖中交人簒其君貢獻不通天子議將用師於是命庭臣推擇諸臣中才望尤異者使為廣東西雲南三省撫臣而三省之吏自藩臬至於州郡縣必精其人有不稱者更而置之而廣西之太平與廣東之欽亷雲南之廣南諸郡尤綰三省之口為中國出兵之户其地與交南相齒錯故其選人尤重于他郡而江君適以户部郎出守太平君練達而沈毅氣偉而志雄士大夫以是賀太平之得其人而知君之能勇于立功名以自見也㑹余以省父至南都君之僚某君輩因求余文以為君贈余惟交南距中國萬里許且夫以北土能寒之人而爭騖于毒利暑濕瘴癘之域以轉餉之艱而當自食其地之逸以不習地形之勢而當當關拒險陡崖深溝之塞此兵家之忌罪人未可以必得而中國且騷然敝矣故征交之議士夫多難之雖然固有不煩兵不費糧而可以有功者則漢人所謂州郡足任者也今廣東西雲南諸郡所轄諸土兵其長技固與交人無以異其巢窟于陡崖深溝之中固與出入于交人之地無以異也往時徼上之甿多竊出與交人相市近以通夷禁之夫此正不必禁也貴在因而用之耳誠欲刺其隂事而疑散其黨則足以備間諜欲奪其險阨則足以供鄉導何不可哉且莫氏以簒得國交人雖蠻夷固未必盡肯甘心為簒人役也其左右之刼于兇虐欲自拔而不能者計亦多矣聞故王子孫尚有據國之半而爭之者而占城壓交人之胸世仇國也此皆可借其報怨之憤而資其夾攻之力顧為計者未知出此誠使此諸郡迭相臂指潛形蓄鋭蹈瑕而動用其長技與熟于地形之兵加之以間諜鄉導之便因其故王子孫與左右欲自拔之人以為内間因其仇國以為外掎使彼備多而力寡然後陽壁于其所備而隂襲其所不備其國中固宜有嚮應者然則兵不必傳其都而簒之首可以懸而馘之矣其與勞師匱糧以犯兵家之忌者不亦逺乎故以為天子苟赦而不誅則已誅之則宜委其責于州郡而毋出内兵苟委其責于州郡則太平其宜率先諸郡者也嗟乎士患不遇時彼慷慨躍馬策勲銅柱之外者世固不可無若人吾將以君之行觀之又古之仕者比閭族黨之長皆不去乎其鄉積而至于公卿大夫皆不去乎其邦出有禄位之榮而入有桑梓之歡其委贄而效之君也未嘗一日違乎其親其戮力于國也未嘗一日捐乎其家其或銜命而使葢亦不過乎友邦侯服之間而非有蠻陬海徼之逺且艱也然而四牡祈父之詩上之所以深悉乎下下之所以自鳴于上者且眷然而不釋也是故上不敢恃其勢之所易以使而下不必矯其情之所難以安上不忍奪人之私以蘄乎事之所必集而下不必自割其私以殉乎公之所必急于此之時士之不樂于仕者其亦鮮矣後世之仕者不然徼于一命之寄則不得不去乎其鄉羈於畫土之守則不得不違乎其親其所冒而歴者或絶棧驚波翳瘴毒霧夢寐之所駭而虞焉者也其所羣而縻者或侏􅍣猩語豕竄鹿視耳目之所怪而愕焉者也此其勞逸愉悴與古已大異矣而上之人方且據其勢之所易以使而惟蘄乎其事之所必集下之人方且割其情之所難以安而惟殉乎其公之所必急然則今之仕者其亦有所不樂乎否耶白石江君歙人也乃今為天子出守太平當南徼之絶去鄉萬里之外涉瘴癘之地與夷獠雜處君雖慷慨不畏艱阻然而君有老母在顧力不能偕也豈亦有不樂者乎君既不得如古士大夫各用于其鄉而其勢又不得以其情自請近地而朋友間亦無有能以栁易播如古人而又無有能代為之請者其亦有所不樂乎否耶雖然太平為南徼雄鎮外拊交人之背内理綏諸蠻酋其為地也最要而其欲得良吏也甚急君負材練達氣偉而志雄意者太平固非君不可而君不宜以親為辭耶抑以天子方有事南陲欲借豪雋於鎖鑰之用而暫試之盤錯之效以待旦夕而事定則遂還君於内地以便君之私也歟余固知君非久淹邊郡者也然則君其可以慨然請行而祈父之歌余知其不必作于他日矣送彭通判致仕序代府官作古者僚友之間其相須至殷而其相比至勤也其去者則居者曲為之挽而留之于是有以去者從居者而居者不患于無與共勲伐焉則君奭之書是也其居者則去者曲為之引而致之于是有以居者從去者而去者不患于無與共泉石焉則北風之詩是也其或去者不能為居者留則居者為之盛祖帳車數十百兩至作為詠歌倡而和者數十百人于是居者慨然有羨于去者以其絶塵而不可及而去者亦待居者以為重然後風聲奕奕耀人耳目至於久而益章則漢人之于二疏唐人之于賀監是也自余官于常而得與石屋彭君為同僚君温雅純粹行潔而材裕雖在僚佐中而隠然係一郡之重輕余方幸于得君竊以為彌縫缺失實惟君是賴曾不幾時而君謝病以去余為之悵然自失既自愧其力不能留君且以余之迂拙無所用于世其去不宜在君後又自愧其縻于此而不能從也獨知慨然羨乎君之不可及而欲載之詩歌使君之風聲耀人耳目如古人者而又不能也則請聊述余所聞以贈君可乎夫去就有二途而仕隠無兩道在易之漸之上九既已漸于逵矣而孔子曰其羽可用為儀不可亂也觀之上九可以肆志矣而孔子曰志未平也由此言之君子所以蚤夜孜孜蘄盡乎已而被乎物者豈獨蹩蹩于世者則然雖肥遯髙尚之士亦固有責焉耳且君之居官清逺閒散翛然絶不以聲利自汙則仕固無異乎其隠今君之去也將益盡乎已而被乎物使其志未平而其羽可用則隠固亦無異乎其仕矣故曰去就有二途而仕隠無兩道苟徒枕石漱流嘲弄烟月以為曠達而曰世與我既相違矣則余又何敢以此望君且非君所以自待也君行矣其亦有以處予也哉贈竹嶼吕通判還郡序今之為蠲災之説者余知之矣有司以災上之計府主計者量其所災而上下其所蠲之數宜乎所災與所蠲必相當也然主計者疑於有司之不信也而必裁其數于三分之内有司者亦逆知主計者之不吾信也而必溢其數于三分之外大率主計者之蠲災也十裁而為七有司之上災也七溢而為十然後有司之所溢與主計之所裁較足相補而所蠲與所災適得如其分數而無盈乏若使據實而上焉則是所蠲常不能如其分數也然災自七分以下皆中饑小饑也猶得溢其虛分以求不失乎實分之蠲若夫大饑則其實分已盈乎十而十之外有司固不得復溢其虛分之三以待主計者之所裁矣其所蠲亦不得過七而止則是大饑之所蠲常不能如其分數也夫所蠲既已不能當其所災矣況所蠲之分數云者又非通而計之也其法曰留者蠲解者不蠲大率一州邑之稅解者十居七八而留者十不能二三也顓計留者二三分之中而蠲其十之七乃通計留者解者十分之中僅得蠲其十之三耳則是十蠲其七者虛也而十蠲其一二者實也若使其所虛蠲者未及乎七則其所實蠲又當遞少於一二也夫災之數溢于十而蠲之數裁於一二此如徧體殘矣而益之以一毛然尚有一毛之益也而況所謂一毛者又未必在民也其或有司不能皆賢也胥吏實操其散斂之柄蠲詔下矣匿而不布也鞭笞競行程期轉迫至于一無所負而後出詔而揭之壁則固無用于蠲矣是蠲之公囷者虛也注之私囷者實也有十分之災而卒至于無一毛之蠲嘻其亦可嘆矣章丘吕君判于吾常以督税為司者也君操履修潔饋遺一無所受可謂皭然不湼於緇其才精於勾稽胥吏不能欺也而窺其志葢若不欲以繭絲為功者豈古所謂撫字於催科者非耶己亥之歳將入京師既成事將返郡求余言以贈是時東南諸郡大災斗米百錢而羨中家以上不能具饘食其野人或剥樹而㗖之余不知主計者將如其分數而蠲之耶抑猶不免乎裁其三分如曩時耶將通其留者解者之算而蠲耶抑猶不免乎不蠲解者如曩時耶吕君以督稅為司則固曰知受成主計者而已矣知盈算而轉輸之而已矣主計者之所裁也解者之所不可蠲也此吕君之所不得專焉者也若夫裁補乎官私贏朒而操縱乎貧富予奪疎其鞭笞而緩與之期使所蠲者雖一毛必達於民而所不蠲者不至乎棘以厲民此吕君之所得專焉者也君為其所得專者而已矣君之所得專焉者余既以告於君而君且信而行之矣則君之所不得專焉者又安知不有以吾說而告之主計者耶安知主計者不且信而行之耶然則東南之民其亦庶幾乎饑而不害也歟贈蔡年兄道卿序嘉靖己丑余始識道卿於同年中已而同事於吏部後數年道卿為刑部郎余見之京師又數年道卿謫為廣徳同知余游金陵而道卿適在焉於是又見之於金陵自始見道卿則貌樸而氣温如良金之藴於礦也再見之其貌煒然其氣充然問之以古人之書無所不通間或作為文辭率能與一時文士相馳騁上下如虎豹之不肯自晦其章而蔚炳時見乎外也又再見之則貌之煒然者以凝氣之充然者以虛與之語非六經之藴不以言從而叩之非君子之儒不以存諸胸中如草木之將落其華斂其元氣而歸乎其根也道卿年未三十而余三見道卿亦不過四五年間耳既已屢變不可涯涘而且卓然有志於道借使過此數十年余不知幾見道卿不知道卿容貌辭氣又何如而其於道何如也其所謂速化者歟夫學者非其才之足貴而聞道之難聖賢之道易以簡而學者每病其難聞何也其毋乃多歧誤之歟故學者必一其所志而後精乎其進百家衆藝莫不皆有可喜可慕而皆可以附託於聖賢之道後生耳目好奇而不擇方其力蓄而氣銳力蓄則必有所湧洩非泛濫不足以肆氣鋭則恥於一藝之不及又安能奪其可喜可好而專事於淡乎無味之至道哉其習之也惟恐其不博而不知博之適足以溺心其羅而張之也惟恐其不文而不知文之適足以喪質及其力刓於無所不搜氣竭於無所不恢于是向之可喜可慕者或如搏影而不可得或得之又不足以理身而養性而適以溺乎其心喪乎其質于是始欲反之于道則力已刓而不能果氣已竭而不可鼓大率少年剛鋭之士不患乎進之難精而常患乎志之不一至於力刓而氣竭則雖或不患乎志之不一而常患乎進之難精道卿既已落其華歸其根以一乎其志矣夫聚其全氣與力無所滲洩而一以輸之於道至於久而未有聞焉者吾不信也在道卿精進之而已于是道卿遷官廬州將行廣徳諸生彭某輩來求余文以贈余欲堅道卿之志而勵乎其進也故聊為之言以俟異日更見道卿云爾贈宜興尹林君序宜興環山為邑所産多竹木名材熊狶異獸柿栗茶荈之饒其民人工織屨治絲葛善獵射自食其土不為游賈於四方而四方賈人亦以僻絶罕至其地其民終身不見都㑹之綺麗與奇衺之人而自老於巖壑之間是以其俗儉陋而木戅畏吏而簡訟山澤之税不待督而入為吏者既樂其土風之醇而又無賓客送迎得以優游而養尊又有迴溪峻嶺飛泉石竇皆帶郭數十里内以其暇時游娛其間以極幽人逸士之所翫好而忘其身之為吏也葢凡宦於東南者莫不以宜興為善地豈不然哉其後敦龎之風漸泯而機利之習稍興其民之巧於捭闔既無以異於大都喧市之人而豪家富人競為浮侈與吳㑹爭勝山谷之甿往往憑險以逃稅或擊鑼聚羣持木挺格捕者急則竄入鄰境不可禁甚者或與長吏相詬訟獨其山溪泉石之勝不改於曩時而為吏者亦苦於簿書之煩且勞而不暇以娯也其風俗之變遷不同者如此余嘗登銅官泛荆溪歴二洞周覽其山川之故庶幾復見古者敦龎之風而不可得為之慨然太息其老人為余言往時吏多長者善拊循其民後為吏者見民之饒給又蠢蠢易籠也則多張網絡侵漁之故民生日以殫蹙而奸偽萌起由此言之風俗之趨大率在長吏矣於今迺見林侯林侯葢所謂長者也侯本以經術取髙第其恂恂儒雅不類於法吏為政潔已而恕人未嘗取辦於敲朴鈎擿以為能然而其期月之間民已四嚮而慕之其政平訟理尤出於法吏之所不及豈邑之古風其尚有存者乎何侯之致理之速也夫民之於吏如金鐵之在鑪冶惟其所鑄南陽好商賈而召信臣富以本業潁川好告訐而韓延夀教以禮讓南陽潁川非素善俗也被二君之化翕然為之改觀易聽而況宜興舊稱醇風者乎在侯之所潛轉而黙導之者而已若是余知宜興之民復於敦龎而余得以與觀其盛也可幾矣余於侯有同年之誼又與宜興鄰邑也故不徒頌侯之政而有所深望於侯焉贈邑侯王春巖奬勸序始侯之入覲也余嘗贈之以詩其詩曰無言似桃李有志笑鷹鸇得暇即開巻長貧不受錢自余為此詩流聞士大夫間其士大夫之素知余者則曰是戅不妄譽人者其所譽者必其人也而因以知侯其素知侯者則曰是不為鷹鸇者是不受錢者其譽之者必其不妄譽人者也而因以知余然是時侯之為邑僅踰年耳侯為人悃愊不矯以近名又不善候刺人意而迎之故當時雖有知侯者然尚少也上之人其知侯者又加少矣或抑而挫之侯亦恬然而甘之葢不汲汲于求知也至是侯之為邑也三年矣其政之平易于其初者則益以精明于其後其守之不可緇于其始者則益以不可渝于其終于是上之人其不知侯者亦少矣其飛章以薦焉與其馳檄而奬焉者屬而至也夫侯能恬然於其抑而挫之者則亦豈有欣然于其薦而奬之者哉而余獨喜為侯道焉者亦喜余所譽之益有所試耳所謂馳檄而奬者御史巡江鍾君其一人也於是侯之寮羅丞輩將奉鍾君之檄而行事焉而相率求余文以張之余觀鍾君所以奬侯之語固曰公而謹也勤而亷也其公而謹也無乃余所謂不為鷹鸇者耶其勤而亷也無乃余所謂不受錢者耶甚矣鍾君之知侯而其言之有似于余也然以邑人譽邑大夫則是上交之分而其為言也近諂以監司譽屬吏則是下臨之勢而其為言也必公余方且援鍾君以自信焉而羅丞輩乃欲張之以余文豈以予之言為有加于鍾君之檄也歟雖然監司之于其屬也終歳而不一二涉其地焉則多得之于耳剽邑人之于其令也朝夕而薰焉則多得之于目注故悶悶之政可以孚乎其邑未必可以獲乎其上察察之政可以市乎其上未必可以愚乎其邑之人然則較吏治于上人之口宜不若巷處街談之口尤為親且詳也矧余與侯又相知最深者哉且余譽侯于踰年之前與上之人抑而挫之之時人固不以余為妄而信之也矧余譽侯於三年之後與上之人薦而奬之之時人其有不余信者哉侯好學而志古之道則其所樹立將不止如施之一邑者而古之良吏所居常不赫赫而去則見思侯行且去矣人之思侯也其將何如故余預為言之以俟他日又當有信余者贈宜興令馮少虛序君子近於靜而逺於囂近於簡而逺於煩非以便乎靜與簡之為逸而憚乎囂與煩之為勞也靜則可以致一而極其精爽之思簡則可蓄其有餘不盡之力以待其有為是以神凝而幾決氣完而務濟易不云乎君子安其身而后動莊生亦云室無虛空而婦姑勃磎今之言治者何其轇轕而好多事也麗省之邑上承監司部使而監司部使一省率數十人此數十人者滿其意皆若欲得一令而為之役而令以一身而役於數十人拜跪唯諾之所承應米鹽瑣屑之所責辦率常以星出以星入然炬而後視邑事中夜而治文書雞鳴而寢睫未及交耳聞鐘聲而心已紛馳於數十人之庭矣驛道之令蚤夜飭㕑傳戒廩餼走而候於水陸之衝賓旅之往來者如織迎於東而懼其或失於西豐於南而懼其或儉於北以為得罪幸其無呵望懽然而出境則驟馬而歸未及脱鞅而疆候又以賓至告矣此兩者煩文縟禮之疲其形惕讒畏譴之鬬其心雖有强幹之資剸割之才且耗然而眊矣何暇清筦庫察獄訟注意於刀筆筐篋之間而為俗吏之所必為者乎而又何暇蓄其力精其思毣毣然為百姓根本計慮而出於俗吏之所不能為者乎非其人之所不能勢使之然也宜興地僻以遐賔客之所不通監臨之吏或數歳而一至故其令常逸而尊又其人山採而澤漁其食衣易給而徭稅易完也非有确瘠啙窳剪爪及膚之艱其俗椎朴而尚親重於去田畝而怯於犯法非有椎埋告訐之奸非有武㫁睚眦殺人之豪非有探丸鳴桴之警故其錢穀訟獄盜賊諸課常省於他邑然則地之靜以簡而為君子之所便近者宜無過於此而邑令馮君又所謂有强幹之資剸割之才者也雖使之騖於最囂且煩如前之云者猶或未有不濟而況其靜與簡者乎夫因其强幹之資而試之於簡則其力益厚用其剸割之才而養之於靜則其思益精馮君行哉予將踴躍以觀宜興之政矣送柯僉事序承天故郢都據江漢上游扼襄沔荆鄂之喉自古為巨鎮今天子起漢沔則承天為湯沐邑且先帝寢陵所在天子既肇建園邑備規制金堆之藏焜燿山石將與紫金天夀相望無極故其地視昔尤重于是撫按之臣請于上曰承天故荆南巡屬地遼濶守巡吏歳不能一二至且權分非所以重寢園也請自為一道割沔陽𨽻之設守巡吏各一人詔報曰可其以承天為荆西道鑄印置吏如所請而柯君遷之自户部員外郎擢拜按察司僉事奉勅往巡其地柯君以學問幹局顯郎署間及是行士大夫皆以為荆西得人也其友人武進唐某送而謂之曰柯君知斯職之不易乎葢在漢時諸陵邑習俗龎雜豪猾所窟穴故天子常為選用强察能治劇吏以附循而芟薙之其所以銷奸萌擁䕶陵寢之計甚至然是時諸陵邑近在輦轂下耳今承天界在南服地故阻險又楚人啙窳無積聚以剽悍相鼔扇其習俗視漢時諸陵邑何如也顯陵之工為費鉅矣去年楚大饑流人聚而藪於承天左右僵者日幾何人丘墟之間刳而市其胔可謂廩廩夫以杼軸既空之後而斂之以日溢無限之費以轉徙罷弊之人而率之以趣期就辦之役此在素沃土重厚之民亦難矣況于啙窳剽悍之俗乎欲以銷奸萌䕶陵寢安得不深慮也詩曰滔滔江漢南國之紀柯君其無忽也哉贈郡侯郭文麓陞副使序亷吏自古難之雖然今之所謂亷者有之矣前有所慕於進而後有所懼於罪是以雖其嗜利之心不勝其競進之心而其避罪之計有甚於憂貧之計慕與懼相持於中則勢不得不矯强而為亷其幸而恒處於有可慕有可懼之地則可以終其身而不至於壞而世遂以全節歸之其或權位漸以極泄然志盈而氣盛則可慕者既已得之而無復有懼於罪至如蹉跎淪落不復自振則可慕者既已絶望萎然志銷而氣沮且將甘心冒罪而不辭是故其始也縮腹鏤骨以自苦而其後也甚或出於饕餮之所不為人見其然則曰若人也而今乃若是而不知始終固此一人也雖然此猶自其既壞言之也方其刻意為亷之時而其萌芽固已露矣苟捐之足以為名而得之足以為罪則千金有所必割苟捐之不足以為名而得之不足以為罪則錐刀有所必算人見其千金之捐乃其奇節而不知錐刀之算其真機也從而謂之曰亷嗟乎是安知古之所謂亷者哉古之所謂亷者必始於不見可欲不見可欲故其奉於身者薄奉於身者薄故其資於物者輕雖其一無所慕與無所懼而未嘗不亷葢雖欲不亷而無所用之也郭侯治吾常以平易豈弟與民休息為政而尤以清苦繩約自律余始見侯如是則亦以為今之所謂亷者耳徐而與侯處聽其議論察其志之所存乃知侯非今之所謂亷者也侯性本澹泊苦厭紛華又嘗講於歐陽南野先生葢知從事於無求飽無求安之學者嘗言曰我蔬食則喜肉食則不喜布裀則寢乃安紵裀則寢不安其奉身率如此然則雖欲不亷而無所用之也侯葢古之亷者也聞侯之夫人亦樂於糲食敝衣與侯所嗜好無異然則古之亷者猶或不免於室人交讁于是益知侯之為難能也侯居常三年陞山東副使以去侯之僚霍君裘君與其屬武進尹楊君徵余文為侯贈夫侯之亷人既已盡知之而奚俟乎余之言耶雖然余知侯之亷非出於慕與懼而方其為守則猶在有可慕有可懼之地也自今以往官益峻而望益隆將可慕者得而可懼者去矣侯之亷猶是也而後人信之曰侯果非慕與懼者也然則知侯者莫如余先也而烏得無言乎送邑令李龍岡擢户部主事序嘉靖甲辰至丙午東南連歳大祲先是為户部者疑有司之緩于其賦而私於其民於是水旱霜蝗之奏十不一聽而沮抑推勘之令嚴軍儲國需窘乏常在目前而里閭疾苦常在千萬里外于是蠲租發帑之請十不一得而督責迫促之網密李侯為武進既遭大祲則計以為户部之不信有司非其壅膏以自潤之為咎而患在不盡知有司之急有司之不見信於户部非其籍災以庇民之為罪而患在不盡通户部之情如使為户部者知有司之急則固可越法破例以為貸而曲全乎有司為有司者通户部之情則亦可據法奉例以為請而無逆於户部然而有司常冐求於法與例之外而不知裁請於法與例之内户部不能靳恩於法與例之内而亦不能借恩於法與例之外是以其勢常相左然則户部之不信有司非户部之拒有司亦有司之自拒于户部也今縱不敢望户部設以身處有司之地而為之計猶可使有司設以身處户部之地而為之計於是日夜搜檢故牘及訪之邑中士大夫家得户部支運折兊故事絲髪無耗於國而百萬有益於民者凡四五條為疏以請於撫按撫按以請於朝而下之户部户部果以為便不終歳而奏行之自武進一邑得免米若干萬石及東南諸郡邑共得免米若干萬石三數年間東南連遭大祲而民不盡捐溝壑者李侯之功為多居久之李侯以政最擢户部主事夫李侯之為有司也既已能辦户部之事為户部也其必不忘有司之心為有司也能設以身處户部之地而為之計為户部也有不能設以身處有司之地而為之計乎韓退之以為天下之事成於自同而敗於自異余以為其自同者始於氣脈之相貫其自異者始於氣脈之相壅葢在周時司徒主國計而州長縣正寔受法焉安有為有司而不能通户部之情司徒斂財賄而荒政聚民尤必先焉安有為户部而不能知有司之急如今日者乎然而司徒之屬有司救一官寔周旋于上下之間凡歳時有天患民病則以節巡於州縣以告之司徒而施惠焉是以長正與司徒氣脈恒相通惟司牧焉是賴今之世無是官而户部郎出為郡守縣令入為户部郎則猶有通融之意且國家財賦委之户部而源于東南諸郡縣李侯佐户部倘尚書有問錢穀盈縮與國計民力之孰利孰害李侯必且舉所嘗治縣者以對至於異日四方水旱凡有請焉而無不得者必李侯為之周旋其間也贈訓導丘君序古之職於學者皆其鄉與國之老其體貌也甚尊而其廩餼也甚豐其在國學天子至為之饋醬酳爵而鄉學則鄉之大夫嚴而事之如師其子弟之不心服而安其教者少矣今之職於學者則異矣饋醬酳爵之禮其廢於國也既久而其職於郡邑之學者日數溢之廩月朔而朢抑首促步揖且伏於守與令之庭候顔色怒喜為欣戚雖其子弟有不貌而師背而嘲者少矣故古之職於學者常易而今之職於學者常難雖然古者非苟隆其禮而已固責之以徳行道藝之備乎其身軌物化導之善乎其俗弟子執經而雜問以觀吾之所應郡邑之鄉大夫有大事從而乞言焉以決其所疑苟一之不副則其責不可以諉而今也課書升散之外一無所于責矣于于然飽且卧而已矣故今之職於學者常易而古之職於學者常難然則今之所謂難者顧待之者則為薄耳而居其職者未嘗不自以為便也古之所謂易者顧待之者則為厚矣而居其職者未嘗不自以為懼也古之易者果易耶今之難者果難耶雖然抑今有所甚難者古之道不以責於今之人而今之官古之官也人雖不以古之道責之而吾古之官也則亦安得不以古之道自責乎以古之道自責則是食今之食而任古之事其勢將益齟齬而不行且夫古者據至隆重之勢以御其心服之子弟其教之行也豈不易然然猶有一再三不變而移之郊與遂而屏之逺者是其責尚有所不盡而況據至卑䙝之勢以御其面而師背而嘲之子弟欲驅之帖帖以就吾教以冀於育才善俗如古人而無負乎其所自責其必能乎否耶然則古之所謂難者猶或有所易而今之所謂易者終有所甚難也雖然亦在乎自盡而已苟徳行道藝之在我者備則雖勢有所不行而吾固已無愧於古之人矣自余為諸生所見不啻幾何人矣求一二人焉幾於自盡者而不可得也及往來仕途則以詢於天下不啻幾何人矣求一二人焉幾於自盡者而不可得也豈古今人不相及往往如此耶抑其待之者薄則亦不能自為才耶若丘君者其幾於自盡而為吾之所求者乎丘君卑而無所屈於身貧而無所緇於利于今之䔩䔩齪齪之態丘君一無有焉其徳與藝不知於古何如耳夫因乎待者之厚薄以為其人之隆汙者有之矣因乎其人之隆汙以為待者之厚薄者有之矣向使齪齪者而出乎古古亦未必不以薄待之向使徳行道藝者而出於今亦安知不以隆且厚者待之耶余嘗問丘君於學之諸弟子羣然曰丘先生吾師也則既異乎貌而師背而嘲焉者矣古不云乎教學相長也自今以往丘君徳益成藝益進而譽日益流也然則所謂嚴而事之與就而乞言焉者安知不在丘君余既有感於古今之難與易而喜於丘君為余之所求又冀於古道之復自丘君始也因諸弟子之請遂書之以為贈丘君序時嘉靖丙午秋七月也贈李司訓遷官臨安序古今之變其可怪也歟古者任官以才雖無所不擇然自一藝而上皆可以器而使也至於學校之師則規規而謀之曰彼有道者乎彼有徳者乎彼道隆而徳純者乎何其求備之至也古者或委之以卿相而不懾投之以盤錯而不避至於命之為師則逡巡而若驚焉曰吾不堪也雖亞聖大賢猶不敢輕也而曰人之患在好為人師何其遜避之至也今則不然不量其人之能與不能也率然而授之為師曰彼無不可焉不自量其身之能與不能也傲然而當乎為師曰吾無不可焉嗚呼古之所靳而不以與有道而未隆有徳而未純者今不問其人而可以與者也古亞聖大賢之所遜者今人人之所不遜也其亦可怪也歟或者曰今學校之師誠無難焉勾稽廩食督促升散如是而已耳其髙者講章句課文字如是而已耳夫使師之為師如是而已也則誰不可也如曰不如是而已耳則必修教化興禮樂而後可以無愧然則有志之士居是官者能不畏且懼歟又安得傲然而已乎且夫不量其人而率然授之者是謂失人不自量其身而傲然當之者是謂失己失人者則既失於人矣不可以有補也失己者則所失者己耳可以勉而補也說命曰惟斆學半古人之於教未嘗不學而其學未嘗不資乎教此所謂可勉而補焉者也嘉靖丁酉余始識司訓李君於宜興㑹君調臨安教諭于是諸生愛君不忍其去也因相與求余文以贈余知君為忠實長者氣温而語確能自異乎時之為師者可謂有志之士也司訓與教諭雖同為學官然司訓於官為貳其勢不可以專不專則其責猶輕教諭於官為長而一學之事皆專焉專則其責益以重矣君固且傲然當之而已歟其亦畏且懼歟吁君其自勉而務學以有補焉可也曰如是而已耳如是而已耳則余又奚說以贈君哉送陸訓導序六籍之教之廢也久矣而詩為最甚何哉六籍皆以文傳而詩獨以聲傳也昔者孔子患鄭衞之聲亂於雅頌乖刺無所從正乃周流四方聞韶樂於齊不知肉味又得文王之操於萇𢎞乃始黙然自信曰吾六十而耳順然後反魯正樂命太師歌關雎而曰皦如也繹如也洋洋乎盈耳哉自是刪詩定其中聲得三百篇皆被之筦絃而雅頌各得其所其於門人弟子亦往往教以詩歌其尤有得者聲若金石而子貢聞聲歌所宜之説於師乙則夫子樂而與之曰賜也可與言詩矣然則詩之為詩不專以其文以其聲也自漢而下詩之文徒在而其聲盡亡然其時樂師尚能譜鹿鳴伐檀文王騶虞四詩又不久而廢韓毛諸家號為專經竭其力以爭草木蟲魚至問其音節不能解也今三百篇具在學官諸生誦習其文與諸經同然絶無有能繹而歌之者而弦匏琴瑟諸器因此遂不列於學官其鹿鳴諸詩則賔興鄉飲酒學官命弟子時一歌之然有聲而不成調噶噶然若擊土鼓然不知其於槁木貫珠之義安在乎若是而欲以陶養性靈風化邦國人知其難也然則詩之存者其亦少矣余少而受詩説於邑人陸文禎先生嘗病不得其聲而亦未暇請於先生也今先生之弟文祥為海鹽訓導文祥亦善説詩以詩貢為是官是官葢古司樂之遺以六詩為教者以其人之素善於詩而又當乎以詩為教之官竊以為發古六義之意以長育人材而興起菁莪之化非習其文而兼通其聲則不可此其責在文祥宜無所讓故余推舉詩之興廢以為説然余少時聞今之歌有越曲者越人類能歌之而尤著於海鹽之間余亦不能辨其聲也文祥之行也其將能辨之耶豈所謂詩之遺耶抑亦浮艷要眇繁音促節悲而助欲者耶南風柔而靡近寶而民佚以宕海鹽故濵海之沃而柔靡奢慢之俗也豈其俗之發乎其音者固然耶里謠巷謳采詩者以觀風焉其信然耶夫古聲詩之義不傳而艷詞麗曲譁於民間此最教化者之所禁也嘻文祥其尚能以雅而易淫也哉送第上人度海謁觀音大士序自三十二相至于種種恒河沙相謂之曰皆觀音大士焉可也徧微塵國土謂之曰皆補陀焉可也昔諸菩薩未見多寶佛時多寶佛乃在寶淨國諸菩薩既見多寶佛時多寶佛即不離娑婆世界多寶佛無在無不在而人有見不見耳由此言之求觀音大士者不必補陀求補陀者不必海然而大士見身獨補陀為著而其徒者往往必跨海以求而後得焉何也吾聞佛家之説以塵勞為苦海以解脱為彼岸非離苦海不能到彼岸如非跨海不能見補陀或者大士假此以度世而其徒又假此以自度也第之意其出于此乎然則世豈真有補陀者耶其亦化城火聚之寓言耳補陀之事其誕與信無足深究吾特有激於第之行也以補陀之眇然大洋之外絶不見蹤影至使其徒莫不翕然醉心焉不憚驚波之險颶母蛟魚之毒冀一至焉而後為快葢其信之篤而趨之果如此今儒者學於孔氏孔氏之宫巋然可目量而趾援也其醉心焉與冀一至焉而後為快者何其少歟嗚呼孔氏之與佛不待較而知也然彼能奔走人于窮海不可蹤影之境而此不能奔走人于可以目量趾援之間彼不憚措身于蛟魚之窟而此畫地于坦坦之途是何詭之易溺而正之難歸耶豈吾儒言義利乃不如佛氏言死生足以關斯人而鍵之耶藉令第始者不為彼而為此其能必至于孔氏之宫如今之必至補陀見大士否耶諺曰雀翼不能伏鵠卵吾才薄不能熾吾儒以柅第之行而迴其轅于孔氏也第兹行過山隂見吾友王君汝中者其必有以語第矣葉包菴先生夀序嘉靖壬寅之歳先生年六十門生若干人相與謀贈先生以言順之諗於衆曰葢嘗觀於漢儒林傳矣乎漢初六經始出秦火齊魯諸老先生大率各以其意治經凡數十家自是諸生各自名其師説而固守之終其身不敢變一字一句以為家法又各自以其師說轉相授受雖支派分擘莫不繩然以世迭譜生徒之盛一家或至千有餘人其傳且十數輩矣猶然名其首傳之人而曰此某氏易也此某氏之書若詩與春秋也在元封間表顯六藝取其説之盛行者立為博士自餘諸家則或以其無師與無書可傳也遂罷不列自是之後諸博士弟子多以經至大官國家有大議論必令傳經義以對至勤人主親自問其師何人師説云何則對曰臣師某也臣師之説云云葢其重也若是故當其時經生之為業也專而篤經師之為功也尊而信以久今吾包菴先生其古所謂經為人師者非耶先生行修而志潔其於書無不涉也而尤攻于詩先生治詩且三十年雖一以傳註為宗然訓詁名物之外往往能深探古人之精微而發之於文自邑中諸先輩故多以詩名家至先生乃益精先生之出邑子以詩為業者大半多先生弟子先生為學者説詩絲聨髪比關竅開解音節洞朗學者俯而聽之如身殷周之間而聆猗那關雎之響也先生古慤自信故其宦不達順之碌碌在弟子中進不能張大先生之教以行于世退復不能推衍先生之説以淑于人顧獨知守所聞不敢變而已然諸弟子中固且多顯者若夫精于其業而轉相授受者固已不可籍記矣安知不有以經義為國家決大議論引師說以對如昔人者乎又安知不有史氏傳儒林者且將家而列之曰葉氏詩焉然則先生之夀固逺矣若乃夀先生于年齒間不其末歟衆曰然請以為先生夀薛翁八十夀序古者鄉有耆老父兄則率其一鄉之子弟烝烝然皆勸之於善而況于其子弟乎至於後世雖其子弟亦莫有勸之於善者而況於其鄉之子弟乎若此者非古人徧愛其鄉之子弟而今人不自愛其子弟也何者其為愛一而其所以愛之之道異也古者貴義而賤利愛之必以其所貴者則固日夜望其子弟之趨於道徳仁義也是為愛之而已矣後世貴利而賤義愛之必以其所貴者則固日夜望其子弟之趨於富貴利達也是為愛之而已矣嗟乎人情固憚乎趨道徳仁義也雖督之弗率也而又不足以悦其父兄之心則將益怠而肆人情固競乎趨富貴利達也雖牽之弗止也而又非此不足以悦其父兄之心則將日鋭而堅葢風俗之靡而古道之缺然也久矣非有志之士孰能自拔於此薛君圖南其始之所自為與其父始之所以望之者固亦猶夫人耳既而圖南游學于四方得聞仁義道徳之説於鄒東郭先生於是惕然有悟快然如遷客之反乎其家則又講求於鄉先生毛古菴與其鄉人朱信夫唐希古之間乃益以自信始欲剥落枝葉歸其本根既而語其父薛翁曰南也將為此而不為彼矣翁亦惕然知始之所以教其子者之非也於是惟恐其子之不為道徳仁義與為之而不底於成也圖南益感其父之愛已則日夜淬勵惟恐其不為道徳仁義與為之而不底於成也吾見薛氏父子之交相成也可不謂能自拔于今之人者歟於是翁年八十圖南與其弟某欲夀翁而問其說於余余曰夫古之所謂不朽與所謂有子者可知己且薛氏父子既有聞於仁義道徳之説矣則較修短于彭耼殤子之間豈足以為翁夀而鞲臂曲膝饋漿酳爵亦何足以夀其親也哉薛氏居夫椒山夫椒眇然在五湖中土狹而人輳其富人則通魚鹽逐什伍之利其貧者鼓刀筆工獄書家為胥史以機變囂訟為常故其所爭不能錐匕而骨肉且反目矣斯固貴利賤義之甚者歟由此言之薛氏父子能自拔于今之人尚不為難其能自拔于其所居尤足多也夫風俗之靡也其初一二人焉倡之而已其反之於古也其初亦一二人焉倡之而已夫椒之俗之至於是也吾不知其初孰為倡之者而其不能反之於古也吾知其惟無有倡之者耳使薛翁之所以望於圖南與圖南之所以自為者繼此而必底於成彼鄉人之聞薛氏之風安知不有感而興焉者乎然則異日夫椒五湖之曲有稱鄉先生能風其鄉人者必薛翁矣乎是謂翁之能自夀而圖南之能夀其親也已羅君八十夀序先王所以養老者何其厚而尊也饋漿而酳爵非無人也而天子親之割牲而總干非無人也天子至自祖焉冕焉而為之天子事老者踧踧然如子弟之事其師而無敢肆也老者受天子之奉衎衎然如自受其子弟之奉而無所讓也若然者豈先王以為天下之子弟不足以尊事天下之老者而至于以身代天下子弟之役哉葢王化必始於孝弟而孝弟之行于下非自上率之不可則尊有所伸固不得而降敬有所隆固不得而殺也周衰而此禮廢矣絳縣老人有白首而從征役者雖洙泗禮義之鄉至于齗齗然少肩其老老下其少而莫之正也由此言之則自諸侯之國鄉黨之間亦不復知齒之可貴矣而況於朝廷之上哉嗟乎王教興則老者尊於朝王教廢則老者不得尊於鄉葢其勢之使然歟老者於古今誠未有以異也尚不能不隨世為貴賤如此而況於懷珍抱器之士又安得不貴於古而賤於今也歟此君子所為深嘆乎古今之際也夫後世天子之勢益尊而欲其屈體以事匹夫之老者如古之時其勢誠必不能然而老者固鄉人耳以鄉之少者而讓乎鄉之老者使少不肩其老老不下其少力役勞苦先少者飽煖安逸先老者此不過以鄉之人而讓乎其鄉之人耳豈亦有不能者哉然而自周之衰既已不盡然在後世其又何説則是老者既不尊於朝又不尊於鄉獨所謂稱夀之禮今鄉人行之而不廢也夫稱夀不過飲酒獻酬之間其為禮至末也然而為子弟者曰吾父若兄老矣吾酌而賀焉可也為鄉人者曰吾鄉丈人老矣吾酌而賀焉可也是尚齒之遺也以此意推之老者其亦可以尊於鄉矣孔子觀於鄉而知王道之易易豈非飲酒獻酬之間而其俗猶有近古者歟歙人方生大中從余游求余文以夀其外家雙溪羅君而余不靳為之言者以為是尚齒之遺而俗之近古者也君本衣冠之後而隠於商梁宋吳楚舟車之輳無所不游四方名士無所不交及其晩年息機以歸老蕭然一室若不知有門外事者葢方生之語君如此則固老而有行者歟吁有如君者以生於古而親遇三王之盛安知其不在祝鯁祝噎之列也歟奈何使君尊於鄉而已也然而吾猶幸君之尊於鄉也李封君七十序代人作古今語父子之盛者必推蜀陳氏自文惠公既登將相兩兄弟亦為大官至尊重而其父秦公是時尚無恙每秦公與客坐則文惠公兄弟左右侍立坐客跼蹜不安求去秦公笑曰此兒子輩耳今副使五石李侯出則提方寸之印專制一道數千里之地操縱予奪在其手中而匍匐十餘州郡縣綰綬束帶之吏呼吸十餘萬乗城守障虓雄之士鞭笞深箐絶峝鳥言獸面之蠻夷而莫不如志四方之望之也虎峙而嶽聳其入則奉其怡齋封君於内帣韝而鞠􅎽獻漿而酳爵傴僂而候起居欵密而承色語宛轉嬉戲於尊俎衽席間若嬰兒孺子然此其事與陳氏何異雖侯之祿位勲業其後來未知與文惠公孰上下而封君之夀考榮遇則既已無歉於秦公封君與秦公又同為蜀人葢歴四五百年而兩家父子起而相望於岷峨大江之間嘻何其奇也然史稱文惠公居官有節槩不妄進取自為小官積十餘年不調一時翕然以恬靜歸之而文惠出入内外歴典方鎮其在官雖以精嚴立事而其意要歸於忠厚未嘗按黜一下吏人以為得於秦公之教為多李侯自兵曹主事為御史前後郎署十餘年較其資與望宜在臺省而侯逡巡出就方鎮其故寮多至公卿者而侯坦然無幾微不平見乎色詞此其與沾沾競於勢利者逺甚侯嘗以御史巡江南又巡閩所居雖以憲度從事而温厚博大未嘗作威福以捃摭刻峭為能及為副使則益鎮以清靜數千里内吏承寧一之化民荷悃愊之仁軍戴醪纊之賜而蠻夷亦息戈負耒喁喁然自嚮於亭徼之外然則侯之行已涖官大率有似乎文惠公而禄位之同不同有不足論者至於封君之教其子雖非外人之所得聞然亦知其大率無以異於秦公之所以教也於是封君年七十有二余父與侯為同年封君余大父行也道逺不能走賀堂下嘻倘余得走賀堂下而見侯之侍立左右將有跼蹜求去如秦公之客者乎陳封君六十夀序員外崇慶之父封君年六十而王君懋中為説以贈之其論黄冶變化非老子事信矣至以老子為長生久視之學而謂其與吾儒不類則亦未為得老子之精者吾以為老子之書其為㫖也閎而奥其象於物也曲而賾故讀之者卒未能解然世多稱老子為養生家則不過以其𤣥牝嬰兒之説為魏葛諸人所勦襲而云耳若是則以奇用兵固當屬之兵家而翕張予取又當為縱横家耶然則老子之言其亦厖矣莊生以吐故納新熊經鳥伸歸之彭祖絶不及老子其論老子聞風于古之道術又絶不及長生吐納事明老子彭祖各自為一家不相入也黄冶變化非所以語老子而長生久視亦豈盡老子之精也哉葢孔子西遊而見老耼有猶龍之歎而耼之言曰良賈若虛盛徳若愚以是參之其所著書多相貫穿出入乃知老子之旨固在於此至讀孔子繫易之謙以為天道之所虧益人道之所好惡地道之所流變鬼神之所福禍皆不出乎謙盈二者其於老子亦有同乎否耶老氏長生久視之學余不能信而其謙虛不爭持滿守柔以逺禍邇福則老氏之所長而儒者不能易也故嘗以耳目所及質之大易老氏所稱吉凶禍福真若執左券以要于後者夸詡之子一旦逢機藉勢氣滿而意得極其力之所可獵取漁奪而窮其志之所欲馳騁矜耀居則盛歌舞出則侈僮騎狼藉閭巷間閭巷之人曩與等夷者莫不奔走伏謁喘汗不暇然曾未幾而景響銷歇所謂伏謁喘汗閭巷之人且將徘徊乎其髙臺曲池之間相與追其盛而詫乎其衰以予耳目所及若此者幾何人矣豈其倚伏乗除之數物理固然而不可逃歟其無乃驕汰盈溢犯大易老氏之戒然後至于此歟余觀封君其貌俛然而敕其氣藹然而温其裏坦然而無所營豈所謂君子終吉而持滿有道者耶老子長生久視之學余雖未知封君之有得焉與否而其謙虛守柔則竊疑其出於老子封君其以余言為然耶為不然耶陸慎齋先生夀序走曩以童子侍先生先生授之書課之文字觀其進止動靜往往奬嘆以為逺器是時先生方日夜治經史綜百家之言期以奮乎身而措之事業然竟齟齬而走也竊先生之口説數年遂以經中第為翰林未幾而拙疾罷歸時先生尚留滯庠序中比走起為春坊再罷歸而先生亦已去其業而老于家既獲拜先生于環堵間因復思童子從游時事奄忽二十餘年則先生既颯然成翁而走亦且髪種種矣先生既齟齬以老走亦旅進旅退於是既為先生抱井渫之惻而又深以自媿有負乎先生國士之期也雖然古所謂鄉先生者非其禄與位之謂也古者耆年道藝之士尊則為三老五更以為王侯之師下不失為閭胥族師以教誘化誨其鄉人是以雖居無位之地而各有以致于用先生志行愊實其取與有狷士之節今年益髙行益修而益以信乎其鄉縱不得為老與更其所以式是鄉人宜不在古閭胥族師之後然則先生之自致於用固在此而不在彼歟且夫世固有履顯赫之位而身妾婦之行瞿瞿然終日伺人面目為喜戚至於腰脊傴僂老且疲矣而不知止先生少而讀書老而投閒蘧然自足於隴畝而一無所俯仰於其外兩者相較豈得以此而易彼耶走雖駑拙無所樹立于世尚幸以山中餘力因先生早歳之説以上泝古人為學之大方冀洗滌宿愆而自淑其身然則所以報國士之期者固亦將在彼而不在此也先生年六十其子維新來請文維新好學能繼先生之志者也遂次其説以授維新使持以為先生夀而因以自朂又以朂維新云爾書水西集華師魯刻其父水西君所為詩文凡八巻曩余與君同在兵曹而君為職方郎是時西北邊數被侵職方頗號多事君據案草奏或一日四五上莫不切中機宜每赤囊纔入尚書立召問君君口對甚辨無留滯者於是遂以才稱頃之君坐言者所中免官家居而余時亦罷歸每嘗候君則見君悄然獨閉一室盡取古儒先所疏註箋纂六經文字凡百餘家精髓糟粕咸在所謂累世不能殫其説者君獨悉力標駁參伍毛釐同異要於融而聨之以上究六經之㫖而成一家之説若小戴書則既有端緒矣未幾而遂卒自君居劇曹與家居治經亦時以餘力作為詩文葢君為人勁挺有精力其志甚銳而用心最苦其試於世則欲以才具功名自振即使枯稿山澤亦欲自託於經術以蘄於後世有知我者詩文雖贍切可喜然要非君志之所存也顧其才既遭抑塞而經術所著述亦未克就是以其所志者若或靳之而泯焉無傳其非志之所存者獨尚足以傳於世若此余恐讀是編者以為是足以盡君也故為發君之平生雖然昔人謂容貌禄位不能動人人安肯傳其書然則書之傳者亦往往禄位能動人者也即如世所傳經註百餘家者雖其山澤之儒禄位不顯則以附於六經與之並行而人不能廢之舍是而傳焉者寡矣君既不得顯於功名而又不及託於經術彼其泯焉無傳者則既已矣其所謂足傳於世者亦焉可知其何如也哉此余所以重悲君之志而為之言者冀後世有因余言而知君者也書錢遇齋高尚巻予自為編修罷歸是時邑中士大夫謝事而居者十數人此十數人者里閭丘壑遨遊燕笑之歡日相聚也彬彬乎有佚老之遺焉而余適以罷歸得厠其間時時從諸君子游相與為樂然諸君子多以久宦致通顯而余亦逡巡郎署者數年而後歸獨遇齋始挂仕籍不赴官即解去遇齋解官既先於諸君子而年又最髙於是諸君子相與推而尊之至相率為詩歌以贈而題其巻首曰髙尚其意若有羨於遇齋而歉然以為不可及者夫諸君子既已與遇齋同其所樂而無間矣顧若有羨於彼而不可及者何也夫士大夫馳騁於功名之門而逍遙乎泉石之娛使兩者各據其方而不相為謀則莫不皆自以為快意然至課其盈虧倚伏之數則泉石之士或病其枯槁而功名之士至以為頭顱可知自悔而無所及方遇齋之抱利器而不售以至于老也則諸君子亦或未始不悲其窮然諸君子之出而用於世也雖無窮愁抑塞之患然而傴僂趦趄日疲乎其形寵辱譽毁日鬭乎其心者宜亦不少矣如是者十數年或三四十年而後得與遇齋同其樂于此譬如賈人歳歳出沒于驚濤駭浪之中既抵于岸而得晏然當此之時亦未有不自笑其税駕之晩者矣而奚啻有羨于遇齋而已歟然則功名之門此遇齋之所不能與諸君子爭焉者也而泉石之娛此遇齋所以不易其樂而諸君子能同之于終不能同之于始者也易不云乎壯趾則凶遯尾則厲葢言進而趨時者利于後退而息機者利于先也諸君子之退而息機也比之遇齋則已後矣矧余又誤不自量始弱冠而已得官未溉其根而繁其葉又逡巡其間不早自解去則是諸君子之中其不為遯尾者莫如遇齋其為壯趾者莫如余也余退則既後于遇齋其進也又不幸而早于諸君子噫嘻幾何而不為凶與厲之萃也歟然猶幸得罷歸以與諸君子相從于泉石之間雖髙尚之風不可以冀矣然莊生所謂樗櫟以不材得全余今亦庶幾焉耳書地理鶴岡況君巻叩巫卜星相堪輿之家而問焉曰吉乎未必然也而聞者驟然喜叩巫卜星相堪輿之家而問焉曰凶乎未必然也而聞者驟然悲則是巫卜星相堪輿常操吉人凶人悲人喜人之權以奔走乎其人而其人之吉凶悲喜一繫于巫卜星相堪輿之口而聽焉若是何也人情常喜希覬乎其所不可必而常揣摩乎其所不可知而術家馮鬼神以自神故多言而或信巧發而奇中操希覬之心與摩揣之見而叩之憑鬼神之人而投之巧發奇中之説宜其入之深也諸家之中其尤熾者曰堪輿其指畫天地支離五行八卦奇中之說尤多而人尤尊之堪輿家吾不知其所始吾意其初本以候土驗氣測量水脈以寧死者而贊慈孝如是而已葢未始有鬼䕃之説也自兹説之行至使子孫露其先人不葬以待吉地與吉日致其人而不免於水火者有矣或取土中數十年之陳胔非有山崩水齧而好數徙之甚者豫章饒歙之間盜地以葬往往至於殺人而不止然則堪輿家之説吾懼其不為祥而為孽也夫儒者之論殃慶歸之積善與惡其説至精猶或半驗半不驗則天道之逺也而謂既朽之骨叢禍叢福若呼谷而響答焉其亦未必然歟鶴岡況君精於術而能奇中者也曩余葬母實藉於君然余之藉君非其吉凶禍福之謂也君間嘗請文於余嗚呼挾君之術以游於世其有不能奔走乎其人而其人之悲喜有不惟君之為聽者歟然則余言何能輕重君耶君如有意乎余言也則君其務為候土驗氣以寧死者毋務為吉凶禍福以邀生者而孝子慈孫有溺於吉凶之説其亦以余言解之而已矣書王氏傳家錄後文皇起北藩靖内難一時雲合之士其首功既皆裂土而王矣其斬馘自一級以上至于執殳樵爨亦莫不授武功爵世其子孫至萬餘然王氏自長史公以儒生首事文皇於藩至其子彦昭兩世矣長史左右夾輔不幸老死及靖難兵起彦昭寔與居守其兩世皆不可謂無功然顧不得與一時雲合之士同裂土而又不得一介之爵以世其子孫若是何也豈其翊贊于遵晦之日者不及乎純熈大介之㑹其居而守社稷者固不如行而扞牧圉之為勞也歟自漢而下拜侯徹爵率以戰功為重文皇之意其或在於此歟雖然裂土之封孰與詩書之澤之可以長久使其子孫飽祿而驕佚孰與使其子孫苦約而思以自立也夫世祿之族驕驕則舉其累世之所遺者或一朝而褫之儒生之族發憤自立則其先世雖無所遺而猶可以自振自國初以來所謂世禄之族其盛衰可數已而王氏子孫讀書好禮彬彬然以儒名其家者相望而東臯公以能書官至太常卿然則儒術之與戰功王氏之所以遺其子孫與文皇之所以報王氏者又孰多而孰少耶於是長史公幾世孫稷纂其先人之行事自長史公而下凡幾世題曰王氏傳家録葢詩書之澤在焉余嘗讀唐李鄴侯家傅侯遇肅宗於潛龍之時及其起事李郭諸人皆以百戰裂土而鄴侯雖幃幄謀臣然不得與其列其事頗與王氏類鄴侯之子繁積書至三萬軸而當世推其文雅此亦偶類於王氏且夫李郭諸人不能世其家也久矣而鄴侯之事至今獨著於世者則以家傳在也然則後有欲觀王氏者其在兹錄矣乎此稷之所為纂也荆川集巻七欽定四庫全書荆川集巻八明唐順之撰記重修宜興縣學記先王因人情而施之教知夫人情所不樂則不可以從事於久不可以從事於久則不可以責其器之備而業之精也是故學校以教士而養之以禮樂以柔伏其速成躁進之心使其終日從事於俎豆筐篚象勺干籥盤辟綴兆之容與其弦匏搏拊笙磬雅頌龡擊歌詠之聲盤辟綴兆其文郁如龡擊詠歌其音鏗如是耳目之所恱而血氣之所暢也天機與器數相觸而不自知是以能終身安焉而不慕乎外上之人九年而後視其成四十而後試之仕而士不自以為滯也故其器之備也則自簡亷直温剛塞恭愿至於中和孝友皆能盡其微妙而無有粗疎傲戾之氣其業之精也則自虞夏商周之典章鞮譯象寄之語言至於射御操縵雜服之技凡可以為家國天下之用者能貫而通之而無有乎鹵莽生澁之習葢其磨揉之久而其勢不得不至乎此也今也禮壞而樂廢先生之所以為教弟子之所以為學者何也朝擊柝而聚之而課之書夕擊柝而聚之而校之文口吻刓於蠧編之誦記而思慮敝於游詞之剽綴夫士者之為此其不得已而應有司之求則可耳豈人情之所樂而況聲利之燄薰心炫目又雜然而日出以非可樂之習驅之以必可奪之誘則宜其有厭苦學校之心惟恐其去之不速亦何怪乎業之不精而器之不備也葢孔門諸子嘗言志矣㸃獨不願仕也浴沂風雩鼔瑟詠歌以適其意而子夏亦云出見紛華盛麗而悦有鼓瑟詠歌浴沂風雩之樂則㸃也可以自足於洙泗之濱而無所慕有紛華盛麗蕩之於外則子夏不能自必於其中今也無禮樂以養之有聲利以驅之而欲使之終身安焉而不去豈非勢之難者歟宜興有學舊矣歳久不葺通判泌陽焦君希程來署縣事斥贖金之餘凡若干兩鳩工庀材以繕其事又立名宦鄉賢兩祠於櫺星門之旁以祀宦於其縣與其鄉先生之賢者而學之制於是為備既訖工教諭張君某訓導某君率其學之弟子來請記嗚呼禮樂以養士古之道其不可復矣雖然無體之禮無聲之樂流乎宇宙而著乎人心不假器數而傳則古之道固未嘗不在也誦書綴文以應有司之求士生於今不可以已矣雖然其誦書也務於約而不汩於百家傳註之煩其綴文也盡乎已而不牽於時俗好醜之說則今之法固不能為累也古之所謂可樂者未嘗不在而今之所謂非可樂者不能為累則亦可以無用於速而去之矣宜興溪深而谷窈石峭而泉冽自古宦游之士多欲徙而家焉葢隠然有舞雩沂水之風而地僻以簡冠葢文繡之所不衝大賈重裝之所不輳故其俗鮮見紛華盛麗之習然則有㸃也之樂而無子夏之誘宜莫如此地者噫嘻諸君子其務求古人之所可樂以自足於其間以修其器與其業而無急急於務去其學也哉重修涇縣儒學記先王本道徳禮樂經術以造士而以士大夫耆老之優於道徳禮樂經術者命之以為庠序之師至於閭胥族師什伍之所鼓篋而從焉者亦無不命于上而一閭一族之間亦無非以道徳禮樂經術相磨切是以上無私師下無私學周衰王道廢缺齊魯列國學校猶在不過粉色潤飾而易象春秋十六國之樂徒以誇於諸侯賔客為古物玩具而未嘗以教諸弟子所謂學官與弟子云者詡詡禮樂徒能習其鏗鏘鼓舞而絶莫知其義其士大夫之有道徳者抱其器而私相與教授于山澤之間不出户庭而自成庠序葢觀於洙泗之濵誾誾侃侃弦歌鼓瑟者至數千人雖數百餘年諸生以時就其家習禮焉而使觀者低徊不能去此其最盛然孔子在當時非有司樂象胥之職沒不與瞽宗之祭而弦歌數千人者亦非所謂司徒俊士之選也自是之後西河鄒嶧傳易授詩紛然彌衆然皆與庠序無預漢興立博士置辟雍橋門觀聽縉紳動色蕃夷武卒莫不受經然秖以為太平之榮觀而當時所謂師弟子者不在也濟南關西琅琊千乗世傳經術隠居教授生徒至萬餘人然亦不屬之庠序由此言之王教興則道徳禮樂經術之寄在庠序而師道為公王教廢則道徳禮樂經術之寄在山澤而師道為私雖其所寄無以異者而世之升降繫之矣國家建學徧宇内蠻陬海徼莫不有學生徒多者七八百人少者百人可謂至盛然而道徳禮樂經術之寄其在焉否也所習者不過乎章句佔畢所志者不過乎聲利榮名其所謂髙等者亦惟騖文詞之博而秖以為溺心滅質之資矜亷隅之飾而秖以成詭激矯誕之習是以豪傑之士往往病之而相與修身治心詠詩習禮考業講徳於巖居燕處之間先王之禮樂經術亦稍稍賴以不墜然庠序為虛器而師弟子為私名論世者亦太息于斯焉涇于寧國為屬邑而學宫圮壞不葺午山馮公為提學嘗欲新之未克也而再為提學則以屬之知府尹宇葉令祥率其民之好義者使出財鳩工不足則濟以贖金之餘董其役于主簿某而視其成於學官董汝礪鍾維揚曹鸞於是㦸門璧池筍簴在列登其堂者如入孔室而聞金石絲竹之聲丹艧黼黻儼而髙居挹其象者如見聖人而親申如夭如之容其與古之庠序亦幾無以異矣而午山公端軌物樹風聲其於為師又非徒以其位焉者涇之俗古稱和柔而涇之士以余所知其有聞先生長者之風志于修身治心而深病乎佔畢聲利之為陋者固且有人焉而在乎庠序之間自是淬磨砥礪融習氣之偏而歸之渾化破意見之障以致乎精微相噓相染而成風俗使人皆曰先王道徳禮樂經術之寄不在山澤在庠序者涇之學則然豈不盛歟古者首善自京師始故司樂象胥之教尤詳於閭胥族師涇為甸服去南都三百里而近是國家之所首善也涇之士相與務乎先王道徳禮樂經術而風流乎四旁使人皆曰道徳禮樂經術之興於庠序者涇之學始又豈不盛歟於是午山公使學官維揚與諸生張鑜來請記余樂為之記以告於多士而朂其成云午山公名天馭字應房蘄人修學始嘉靖某年某月成于某月重修𤓰州鎮龍祠記龍之祠不秩於三代之典記禮者謂之四靈葢以為鱗蟲之靈者耳其祀始見於封禪書朝那龍湫今天下大水之濵無處不有龍祠宋之儒者論大河之治以為不宜祀龍曰是天地之功也龍何力之有然余竊以為未盡也夫天地無為而百物之肖像於其間者莫不各致其能以效其功而天地未嘗與之爭功然而百物之功孰非天地之功也至於昔人之制為祀典也凡有功徳於天地之間者不問細大莫不羣然秩而祀之以致其報而未嘗疑於與天地分功然而所以報百物之功亦孰非所以報天地之功也吾觀於蜡而見古人通乎鬼神之情而悉于幽明之故矣夫生成百穀以粒民孰非天地之功若是則古人為之禋為之社以報之可矣至於大索鬼神而蜡焉者何為也其蜡也先農先嗇庸與坊焉可矣而至於迎貓迎虎而昆蟲亦登焉者何為也惟天地之生成百穀雖一貓虎昆蟲亦使之盡其能於食鼠食豕之間而無遺利焉於此見天地之功為甚大人欲報天地之功而無由則雖貓虎之效一能於天地者亦秩之祀而無遺靈焉於此見人之所以報天地之功者為甚深凡百物之靈固莫不肖氣於隂陽五行而龍得隂陽五行之氣之精故其變化尤靈貓虎未嘗無功於田而謂龍盡無功於水乎祀貓祀虎未嘗疑於與天地分功而獨疑於龍乎且夫天地之間大者不自擅其大而寄於小小者各務致其小以歸於大其為力也大者常逸而小者常勞其功之成也小者易以為徳而其大者常不可名故耕鑿之民不知帝力之何有而至於一社之長一邑之令則人煦煦然而嚮之死則為之尸祝而俎豆之此豈可謂忘大君之功徳而顓顓於一社長一邑令之為報哉又豈可謂一社長一邑令之功徳而非大君之功徳也哉然則龍何疑焉而不祭於古也曰百物之祭古矣又安知古之不祭龍耶古有豢龍氏豢龍氏之於龍安知其非如伊耆氏之於蜡實掌其祭者耶所謂豢龍者其無乃羞飲食以祀龍之謂而好怪者遂以豢龍為畜龍也歟龍乎可畜其亦非所以為龍矣古今大水凡四而河與江為最河移徙潰決不常而江獨為安流意必有宰乎其間者而龍之奔走以効其靈也亦不可謂無𤓰州據江之衝則其建祠以祀龍也亦宜祠不知所始歳久圮壞嘉靖癸卯奉化王侯杏始為揚州府同知署府事乃斥贖金之餘修之而使道士某來請記王侯儒者也其為是舉也必有以通乎鬼神之情而悉於幽明之故矣余懼後之人泥於舊説而以為非經之祀也為之著論如此使龍其安且食於此而無慚焉且使讀者其亦無以余為語怪也重修解州關侯廟開顔樓記嗚呼漢建安迄今二千餘年而侯之烈自縉紳先生與小孺子皆能道之赫赫若目前事其廟侯而尸祝之者自都㑹以至一井一聚且徧天下而解人之慕侯尤深烝嘗伏臘尤䖍以勤者以侯之為其鄉人也解人之廟侯也久矣而為樓以棲樂者則始於國朝𢎞治時其扁曰開顔而樓蔽東西南三面若張幄然其南樓撤於正徳間東西兩樓亦久且壞鄉人某某等復醵金葺之又樹坊其南以承樓之缺而侯之居益崇且嚴矣侯以死事於法得祀乂侯故為將軍封列侯漢制列侯將軍得賜鐃歌鼓吹其沒而葬也得用破陳凱樂則鄉人備樂舞祀侯宜也於是某等因其鄉之士大夫員外郎丘君某來請文按侯始識𤣥徳於草莽卒然之遇而遂授之以肝膽死生之信至於崎嶇顛沛西東奔竄而其志愈不可奪窘於俘虜之中而其志愈明葢侯之大節磊磊如此而論者特稱侯之雄勇冠世而深惜其功之不就以為侯之兵不先加於腹心之吳而先加於肘腋之魏不先加於藏戈背伺之吳而先加於露刃面拒之魏故其勝魏也未足以肥蜀而其信吳也乃足以自斃且操權之不敵也久矣操也且懾於侯之威至欲徙都以相避使侯當時先吳之未發而圖之豈不可以得志噫此亦有數焉耳然使侯為摧鋒拔城之將孰與使侯為伏劒死綏之將也侯始遇𤣥徳固相許以死而已幸而得死侯又何求且夫摧鋒拔城之將勲庸著於當時伏劒死綏之將風采傳於後世勲庸在當時者身沒而響微風采在後世者既遠則人愈悲而思之此固世之所以尸祝於侯而解人所以慕侯之深者也不然古之雄勇如侯而能摧鋒拔城者豈少哉皆身沒而響微可以觀人心矣解之為州在太行上黨之間昔人論五方之俗以為山西懻忮而好氣而慷慨毅武奇節之士多出於其間若介子推先軫狼瞫藺相如馬服君諸人雖或死或不死皆耿然如寒氷皎日不負其志所謂偉男子者也侯從𤣥徳於崎嶇顛沛之中似子推威震乎敵國似相如馬服其賈勇死敵又偶與軫瞫相類豈慷慨奇節之士多出於山西而侯其傑然者歟今之山西古之山西也吾不知其俗之懻忮而好氣於古何如而慷慨奇節之士抑豈無有出乎其間如古人者歟然則解人之所以拳拳於侯者非徒為侯也葢將以鼓其所趨而成其秉節倡義親上死長之風也夫書以俟之常熟縣二烈祠記昔人論女子從一於夫比於臣從一於君之義自古奸人簒竊而其故臣不幸以才見籍錄于斯之時彼有棄瑕用讐之圖而我有佯合觀釁之便苟其黨有可攜事有可濟則逞於一擊以誅讐而復國若王司徒之於卓段司農之於泚此其勢逆而其事之難以必者也彼有棄瑕用讐之圖而我堅委質策名之誼寧死而不二其心寧死而不二其君若豫讓王蠋之說此其勢順而其事之可以必者也二者其所處不同而其要於自盡則一也是故生也而無迂身於徼倖之嫌死也而無自經於無濟之愧女子之於夫則亦有然者矣嘗讀史所載孫翊妻之事而壯之當二兇貪於翊妻之色而殺翊也妻既見窘逼於是藏機匿哀陽許二兇以婚而緩其期隂結故將為援須二兇以婚入而遂刃之雪不共天之憤於閨闥杯酒之間斯亦可快矣若夫二烈之事則異於是其夫以羈旅浮寄江壖非有可以豫藉之勢環而指者皆兇人之黨也非有肘腋可結之援方張島之誣其夫以盜而沈之於江島遂欲室其婦而島之黨欲室其女於是婦與其女倉惶闔門自刃以死嗚呼可謂烈矣雖然二人者豈不欲手揕讐人之胸如孫妻之為以報夫與父哉而勢有不能也則一死而其事辦矣故嘗合孫妻與二烈之事論之苟機有可乗而速忿以必死則殺身而無益苟事無可濟而濡忍以有俟則危逼而近辱此亦其所處不同而其要於自盡則一也二烈死時兇黨裒其尸而焚之其事秘無人能發之者後數年巡按陳君蕙詗得其事島與其黨始伏辜此葢足以見節義之氣有時而必伸淫兇之誅有時而必不能逭也歟二烈者固不必手揕讐人之胸而後為快矣事既白於是知縣羅君鴻為之立祠以祀扁之曰二烈而無錫安君如石請余為之記嗚呼此義行不特所以勸節其亦深所以懼兇也歟是有關於世教大矣烈婦某姓其夫某姓而逸其名相傳自通州而徙常熟之某鎮也零陵縣知縣題名記名者其起於古之所以勵世乎古之所以勵世其法莫備於史史之法莫嚴於春秋史家者將以紀善惡而垂法戒而千百年之善與惡不可勝書也則舉而寄其詞於名姓稱謂之間春秋之法微者名姓不登於冊書其非微者則槩而登之是史家之常法而無所擇乎其人焉者也其有不然者或微而名或非微而不名或書其姓而奪乎其名或書其名而又奪乎其姓其斤斤不肯輕予人以名姓也如此而後得登名姓於冊書者足以為重是史家之變例也今夫人望其容貌而問其人之善與惡者有之矣過其室廬而問其人之善與惡者有之矣識其姓名而問其人之善與惡者有之矣故古之圖容貌表室廬紀姓名使善者因之以久其善惡者因之以久其惡其為教一也零陵楚之南徼也邑乎郴桂之間瘴癘之所濡苗獠之所鄰往往不能得善吏而邑之譜牒亦散佚無可考自余父有懷公少時則已聞先伯祖平樂公始宰是邑有惠愛及為永州欲按其故蹟詢其姓與名雖邑之耆老亦無知者考之郡志所載零陵令之姓與名亦無有也已而更索民間所藏景泰中所撰舊志則稍具其姓名政事歴官大畧而其名亦已誤復為福矣有懷公為之慨然而歎因復思國家二百年之間其邑之善令多亦有如平樂公或僅存其姓名而又誤或并其姓名而湮沒焉者當不啻幾人而其奸回饕餮乗令之威肆毒吾民者亦幸而逃其名於後世豈非志於懲勸者之所悼歟於是蒐輯散逸得某君而下若干人以為是皆令也則槩登其姓名於石以著於世雖然後之人過而指其名有不就而問其為令之善與惡者乎問焉而知其令之善也雖百世有不愛而慕之如其人之存焉者乎問焉而知其令之惡也雖百世有不唾而譙之如其人之存焉者乎是則其為令也善而名之也甚於旂常之載焉其為令也惡而名之也甚於鼎象之鑄焉所謂美惡同詞其亦春秋之法也嗚呼其善者葢不忍欺乎其民而蘄以自盡乎其心初豈有意身後之名也哉其不善者葢亦偷快意於一時自計以為其去官與其身沒之後且影響銷盡人無復指之者豈知更千百年其姓名並彰著而不掩若此嘻其可懼也已廣徳州同知蔡侯政績碑記蔡侯之始去州也州人哭而送之境後十餘年侯以宦游過江南有傳言侯將取道於州州人喜於復見侯也逆諸境數日侯從他道去州人哭而歸則相與謀紀侯之政於石於是署州事判官張君遣陳生潘生來請為之書石余辭謝後一年知州歐陽君繼遣陳生濮生來復以請曰先生與蔡侯相知為深宜為之書余復謝曰余惟與蔡侯相知之深也是以未敢為之書夫蔡侯者居乎今而學古之道者也古之道盡乎已而不蘄乎人先其實而深避乎其名不然畏壘之民規規然感慕而俎豆之此庚桑子之所為懼而逃去者也且古之以循吏書於其傳者有之矣其在當時權任既重且專其居官也又久而信是以能為百姓立殊絶可紀之功而後史氏因書之為傳若蜀郡以興學書南陽以溉田書書渤海也以弭劇盜書膠東也以増户至十餘萬自漢時得書者纔數人而一人又各以一事殊絶自見而已自此之外其緣俗而治者豈遂少哉則以其事無殊絶故不書也蔡侯蒞州之日淺矣又州佐也操柄所不在故其所可見者大率緣俗而治侯之心且自謂不能有殊絶功徳加於細民而歉然不以為足也侯之所不自以為足而州之人乃欲為侯張而侈之不亦拂乎抑古之以循吏書於其傳者非特以殊絶之故亦以位不至通顯其所樹立施設止於一郡一邑而不究乎其大者故史氏亦從一郡一邑書之而謂之循吏傳若黄潁川薛馮翊其治績尤異固不在于蜀郡渤海之後以其事業有大焉者則不得從一郡一邑書之故不以循吏而别自為傳蔡侯行完而才鉅以方顯庸於時其勒之竹帛而銘之鼎彞固將有待若夫一州邑之績豈足為侯書之由前言之殆非侯所以致謙之意由後言之殆非州人所以尊侯之意也二生起而對曰先生為蔡侯言之則可矣而未始為州人慮之也廣徳負山之州也往時為吏者患州人獷悍多豪黠齘齘不可理以柔道於是一切爭為嚴峻深文痛法以繩督之而人亦遂相傳以為非刻深不可治廣徳葢州人之䝉兹詬而病焉者久矣蔡侯乃獨先教化而後誅罰事無劇易處之一以鎮靜人無奸良御之一以誠慤是以侯既去而人懷思之至今嗚呼此豈深文峻法之所及也哉由此言之州之所以為治者蓋在此而不在彼也是故州之人欲為之書以示後之為吏者使知州之所以為治者在此而不在彼也余曰若是則可以書矣蔡侯名克亷字道卿泉之晉江人中嘉靖己丑進士今為江西提學僉事其同知廣徳也以刑部郎中坐獄事謫以某年至州某年遷廬州府同知以去皆宜書鎮江丹徒縣洲田碑記古者與天下為公而泉布其利然山川林麓天地之產金石鉛錫萑蒲鹽蜃鳥獸翎革之𤨏細莫不為之厲禁而名山大澤雖封諸侯不以及者非自封殖也懼夫利孔不窒而争獄滋繁則是以其利人者為人害也其慮可謂深矣丹徒環江為邑沿江上下多有蘆洲其為利甚鉅而新故之洲時没時長故不入版籍而人據以為私每一洲出則大豪宿猾人人睥眤其間畢智殫賄百計求請或連勢人以揺官府必得乃已及不可得則讐其得者而相與為私鬪甚者搆亡命挺矛矟隂賊公閧於叢葦髙浪之間相殺或數十人官司逮捕輙反覆解脱獄案滿筐篋積十數年不可詰絶故洲之争未已而新洲之争又起於是丹徒之視蘆洲如懸疣枝指之著體非特其懸與枝而已且痛連於骨體而怵於心畜為瘇蠱不治日深而丹徒綰水陸之口厨傳日費數十金謂之班支郡邑公私筵燕諸所狼籍嵗費且數千金謂之坊支閭里騷然苦焉不可以已也莆田林侯既莅郡日夜問民所利病除所不便深知班坊苦民而未有以處也適㑹有洲田之訟於是慨然諗於衆曰吾欲祛兩害以興兩利可乎且夫古者山澤之利其權一歸於上而今擅於下古有遺人掌客道路委積賔旅廪餼之奉其費一出於官而今役乎民權宜歸於上者而擅於下則孔漏孔漏者啟奸而人以殃費宜出乎官者而役乎民則歛重歛重者積蠧而人以貧今若一切反此二敝使擅乎下者歸之於上役乎民者出之於官塞其漏孔而蠲其重斂因天地之贏以濟人事之乏収豪民之腴以代貧人之瘠是蘆洲之果為兹邑利也而又何病乎衆讙然曰侯議是侯又以丹陽水陸之衝與丹徒同而並練湖田為豪民所擅與蘆洲同思推所以處丹徒者處丹陽也乃并二議以請於廵撫公廵撫公是之請於廵按公廵按公是之既得請於是痛繩其豪之争洲者與其侵湖者而歸之官而兩邑廢寺之田附焉總洲與湖田寺田之所入而勾其贏縮以代故時班坊之所出裁其濫而存其不可已者於是出入之數大略相均以嘉靖癸卯九月而計籍成如其籍而行之遂以為故事邑人既深徳侯而恐後之人不能守侯之法也而又恐豪者惡是之病已而欲壊之也相率請於邑令茅君而鑿石以記凡洲田與寺田之在丹徒者為畝共五千三百九十五嵗入租二千九百石有竒易金可若干兩蘆薪嵗易金可百兩山薪嵗易金二十六兩以代故時班坊之所出定其額凡為金四百兩而羡凡湖田與寺田之在丹陽者為畝共三千四百五十有竒嵗入租千七百石有竒易金可若干兩湖魚嵗易金可二十兩以代故時班坊之所出定其額凡為金四百兩而羡藏其羡以待嵗収之所不及而間出其羡以賑凶饑自癸卯九月至乙巳五月總羡金九百八十二兩米千五百九十石有竒其纎悉列之碑隂其區畫出入則計籍具存林侯名華字廷份篤志古道為政一本經術余嘗為序其口義者其惠愛在民多可書兹以記洲田也故不及裕州均田碑記裕州於春秋𨽻楚蓋楚屈完對齊桓公之言曰方城為城今方城山在裕州境山旁有楚壁壘斥堠云地故阻險然四衝西脅武關東挾江淮北綰河洛南隙宛鄧四方輻凑其民平居則奔走送徃逆來諸費轇轕百出天下有難則徃徃首先受兵野多陂陀磽确土雜砂石不純可田種以故俗罕土著苦窳寡畜藏輕剽數徙無錫安侯來牧裕既爬剔宿蠧拊循疲瘵與裕人更始先是主計之臣議括天下田檄至裕安侯矍然曰此吾治裕首務哉且夫平瘠沃清錢榖息訟争在此舉矣未幾檄復下止之安侯曰人苟利矣吾専焉可也亟請於參政劉君副使傅君各是之於是經土劃野則耆艾董其役縱横廣袤則量人展其能方弓勾股則筭人竭其思跡阡驗畛則區長與程事因區制畝因畝準税區為綱畝為目綱以麗目則無漏畝畝為母税為子母以權子則無逋税以衍原隰膏腴之田一而當一平石岡田二而當一岡石山田三而當一山石陡坡四而當一陂池林麓廨宇鋪舍㕓市之稅例蠲除田溢稅則從増稅益田則從减咨詢徧故人無遁情版籍明故上有定徵疆土别故下有定輸計田凡一萬三千二百四十頃有畸計稅凡九千二百六十石有畸侯規畫精宻動中肯綮此其大凡也史氏曰孟軻有言仁政必自經界始自衛鞅首禍壊井田開阡陌以迄於今其間經國之臣憂時之士曷嘗不言經界然卒莫能行何也蓋亦難焉守令嵗月更改各懐一切無慮經久一難也語曰天降雨澤農夫悅而行旅怨豪強兼并率不以均田為便謗讟朋興多口可畏二難也守令不能履畝而較之則必寄於吏胥則有上下其手者矣豪右售賕得為蔽匿貧弱抑勒無以自明名曰均田實滋一弊孔也此三難也夫安侯可不謂明察深慮者哉安侯初舉事時裕人亦多訿訿者曰將無擾我安侯不為動既訖事迺人人樂業矣民可與樂成難與圗始顧不信哉安侯名如山己丑進士其為裕多善政兹不書重均田也建陳渡石橋記陳渡橋去郭南十里而近當邑西南諸鄉與宜興金壇孔道近郭而又當孔道故徃来于其上者踵相踐也橋故以石為之其始作與其既毁而易之以木皆不知在何時今獨有石趾在耳而木橋又不一二嵗又壊壊則輒更而作之夫屢壊則病行者屢作則勞居者而費且不勝計非石不可以久而莫之能任也㑹有浮圗人德山至遂慨然諗於橋旁之人曰吾力能辦此衆皆曰然因請山為主而相與以貧富為率出錢若干緡不足則山使其徒募錢于四方共得若干緡買石若干募石工凡若干其財取諸願助之家而不費官帑之一錢其力取諸傭食之夫而不勞公徭之一卒始於某甲子某月訖工於某月嘻可謂易矣蓋山之為人吾知之有粟必以施餓者而終嵗自食糠籺有錢可以易衣而嘗衣碎衲行雨雪中其苦行有足動人者是以募人而人争應之役人而人不敢愛其力宜其成之若是易也於是友人蔣君英玉吳君鎮之為之請書其事夫橋梁王政之所有事也徒杠缺而國僑致譏川梁隳而單公以刺然特語夫長民者耳矧所謂浮圖者固與世漠然絶不相值者也山口不粒粟身不全衣以此自足而絲髪無所假於世亦可矣乃復能急人之病而閔閔于一橋之成也如此則彼長民者固衆之所跂而望以庇焉者耽耽焉居飽禄以嬉其于人之疾疹阽苦則瞀瞀而莫知蓋先王一切所以捍災備害生人之道泯然盡矣其所缺者寧獨一橋也哉嗚呼此不為而彼或為之其亦可以觀世也矣德山某所人其橋旁居人出錢者凡若干人華氏義田記義田者其古道之遺乎其起於古道之廢乎古有之大宗者収族者也義田者其大宗之遺乎雖然有大宗則無義田故義田者其起於大宗之廢乎古者因族而立之宗族人有餘財則歸之宗不給也則資之宗其族人如腰膂手足之相與為一體其財賄如津液之經緯溶灌於其間惟其所虛則注焉而無有乎臃腫羸乏之處是以舉族無甚貧甚富之家而天下之為族者莫不有宗是以天下無甚貧甚富之人豈非所謂人人親其親而天下平者哉井田廢也而始有以貲甲於鄉宗法廢也而始有以貲甲於族甚則有童奴厭臛肉而族人操瓢者仁人君子惻然隱之於是以其力之所及為之義田以贍其族蓋猶有大宗之遺焉然義田立而大宗之名益隠矣要之義田非甚厚有力之人不可以為而宗法則百金之産亦可以相通義田非仁人與族為體者不能以相公而宗法雖纎嗇鄙薄之嗣亦不得而相吝是以義田之為制也狹而偏大宗之為制也均而溥然仁人君子其知既足以及乎此矣卒莫有推而及乎彼者豈古今之勢然耶抑亦以義田出於力之可以自為而宗法非上之人為之制則固莫能相聨屬耶何其宜及焉而莫之及也吾友無錫華君從龍積學好古之士也晩舉進士不數年遂請歸其於人間事既已屏絶不挂意而獨不能忘族人之飽饑乃割近郭田千畝為義田推其逺胄自十一世祖録事君而下之子孫皆籍之其不能自業者給口食其婚娶槥瘞給各有差略如范氏故事自十二世祖而上其族踈人衆則惟視其窶甚不能就塾與過時不能嫁者娶者槥者瘞者則量助之其管鑰以付録事君宗子而推擇族人之賢者一二人専理其事不稱則易其人而君之子孫則將别有處焉不使分給其中夫君之為此舉其可謂仁人君子之用心矣又能寓宗子法于其間豈不尤為近古者乎余是以本宗法之與義田相興廢之説而為之記使君之知足以及乎此者其尚益推之而及乎彼也哉救荒渰記嘉靖癸卯至乙巳東南薦饑溧陽史君恭甫既三捐榖七千五百石以助公家之賑而饑者猶不給也邑故多渰以匯水其沙漲渰在邑西北十餘里潦溢旱縮不障不陂棄為曠土久不可艾君既隠民之饑則計之曰古蓋有興役以救饑者吾試行之且夫嵗凶土荒民不足於食而有餘於力以力易食是民以不足為有餘也吾今日出粟於廪而異日取粟於渰是吾以故粟為新粟也人力地利兩易而各得不亦可乎乃度渰之東南隅廣長各三百五十丈可潴可防測水以凖而疆焉遂請於官募民興工民攜老弱就役者踵至君環堤而茇焉以居之每役一人日給米二升銀一分薪一束時米貴甚民以半米易麰菽而雜食之計一夫赴役自食可兼食其老弱瘠病之不能役者二人於是民之棲於堤者㸑煙飯飶列舍相接蓊然如處村落之間日出則畚者鍤者築者捄者汲者㸑者蟻旋於堤上夜則婦子抱哺嬉嬉而卧又晏然如在樂土而忘其為流徙饑饉之時也其始因渰之底深之為中池以蓄水出池之土環之為堤堤之外又環之為外堤以捍水外堤之北更深之為北池而竇其東西陲以通中池之水半北池之土更築北堤又於外堤之外並渰三面而溝之出其土更築小堤以捍渰之暴水内堤之内三面為池出其土髙築之以為架屋之所自乙巳八月至明年四月畢工而麥適登民讙然散歸曰史君活我核其費為銀若干兩米若干石大率日役若干人計所全活若干人共墾田四百餘畝為圩者三潦則水碍堤不得壊田旱則引堤内之水灌田可四千餘畝並渰而田之家多頼以濟自是百年沮洳欎為沃壤水降土升不相溷瀆各効其職以宜地産萑藋既去生我稻粱堤之隙地亦樹蔬豆縁堤䕃池夾植榆栁池中畜魚蝦蠏蠯蠃生生不淰於是即其地立為義莊嵗計田與堤之入與池之魚利易榖可得千石嵗儲之以待荒嵗之賑一不以給家用君又將築書舍其間以待鄉之来學者而未及也因更名其渰曰救荒渰以其邑人進士繆君所為紀實来請記蓋周禮上有荒政以聚民而下復有閭相受黨相収州相䘏以通其贏乏猶懼其未也則又使世禄地主之有力者與其廣瀦鉅野之可以利民者曰主以利得民曰藪以富得民以是彌縫上下之所不及其民遇凶禮或不見聚於上必見収䘏於閭里不見収䘏於閭里必見得于地主廣瀦鉅野之間其生路為甚多而天灾地沴欲死之而不能也民生其時豈不幸歟後世有司救荒之法既疎濶不講又無古鄰保之義以鳩民民有饑饉疾疫日夜祈死而已余親見乙巳之灾流莩滿野民之不忍為盜賊而自經死與糜其子而食者日幾何人余思欲上下強聒而不能而又無力可以及人也徒惻然傷之而已今之世無周禮所謂主者然貴家大族之有力而望於鄉者則亦有主之誼而瀦野閒田則徃徃有之然非有力不能興是以主與藪相聨而成功今觀史君所為而益信古之所謂利與富得民者其不為迂濶也然古之所謂主者皆與有長人之責而世其禄食其責既無所諉而禄又有可藉故其行之則易君既居閒無所責於世而纎豪皆割已之有乃殫力經營若家人之饑然者以是知君之為尤難也嗟乎使有力者皆如君其所以興起禮俗而有禆於國家休息生養之效豈小也哉余既自以其無力而有感於史君乃樂為之記史君名際嘉靖壬辰進士磊落多才略嘗為吏部主事不究其用而去故其施諸家者若此云大觀草堂記尚書西磐張公既歸老於家以書来屬余記其大觀草堂者曰願子為我言大觀之義我雖老矣而不敢不勉也蓋余嘗獲聞公之為人進無驚於寵辱而退無詘於隕穫躬盛徳之容而謙乎其若不足甘委順之節而坦乎其若有餘其幾乎古之與天游者歟竊意所謂大觀者公既已獨得之於心而人不能知而余也執器而不通于方曲學而不見乎天地之全是儒之陋者也而惡足以知公之大觀矧公之所謂大觀蓋得乎心而寄之草堂者也公之得乎心者既深乎其不可窺而想像乎公之草堂之景則其戴形肖貌露情獻態森然而萃以縱乎公之所觀者吾又未能即而登焉以觀公之所觀也而惡足以知公之大觀而又惡能為公記之雖然余未能登公之草堂以觀公之所觀而嘗登吾之草堂以觀吾之所觀矣方吾之心閒而無事以逍遥乎草堂而觀於魚鳥之飛鳴而潜泳煙雲之出没而隠映融然若有凝于精爽然若有釋於神是以物無逆於目目無逆於心而心無逆於物一旦情随事以遷勃焉而有鬪於是而心逐逐焉而目􅍃􅍃焉凡向之飛泳而出沒若有凝於精而釋於神者舉皆不知所在矣徐徐焉鬪解而機息乃始還而觀之則草堂向之草堂而煙雲魚鳥向之煙雲魚鳥也於是為之憮然而一笑嗟乎嗜欲有蔽乎其中則凡物舉皆得而匿乎其外物舉皆得而匿乎其外則雖與之游乎瀛海之表而騁乎坱漭憑虛之域亦窅然若無覩也而况於草堂乎夫大觀者通宇宙而為觀也故謂吾草堂之景非公草堂之景不可謂吾所觀於吾之草堂非公所觀於公之草堂者不可則願以我所觀於吾之草堂者而記公之所觀於公之草堂者以為公之能得其大觀蓋不蔽於欲而物不能匿也西峪草堂記靈寳陜洛之衝也環而山者以數十而西原獨當其僻處西原蔽秦山之南委蛇數百里散而藪者以數十而西峪又獨當其最深處峪口偪仄始疑路窮忽然中開更出異境茂樹淺草森隂蔽虧水泉㶁㶁若驚蛇出沒草間其人鹿視而穴居可二十餘家於是許君廷議游而樂之乃即峪口作草堂於其上仰而眺秦山俯而顧西峪煙雲竹樹隠見千態不下席而盡取之其勝又於是為最己亥嵗予見許君於京師君為人鬯逹魁岸尤以兵自雄余固意其必且為國家建萬里勲也一日與余論草堂之勝且曰吾將去而休乎此矣余笑而詰之曰君不聞馬文淵昆弟之相笑者乎夫嵬才傑士其所寄意必於奔漰洶湧之川巑岏崔巍之峰泱漭千里之野極世間險恠瓌偉超曠之觀然後足以饜其耳目而發其跌宕濩落不羈之氣若夫耽水竹之清幽䕃樹石之蘙薈此則窮愁枯槁之人漠然無所振於世而有以自足其樂於此夫固各自為尚而不能兩得也今君試料才氣與文淵少游竟何似國家且北収河南南繫交酋之頸假令據鞍躍馬今之人孰能先君者乃欲乘欵段優游閭里自比少游其寧可得耶三門之間洪河巨石怒而觝撃砰砰磕磕若戰皷然百里之外有聲而殽函又秦漢以来百戰故處過而覽者莫不躊蹰慨然想見乎揮戈濺血虓虎喑嗚之雄此皆險恠瓌偉世所駭詫且近在君衣帶間君何不寄意於此乃欲自託於寂寞背嵬才傑士之好而就窮愁枯槁之所樂此又何説耶噫嘻吾知之矣君居河上豈嘗受河上公語耶故曰養辯于其訥藏勇于其怯然則君之欲為彼而姑為此也其有意乎倐而蠖屈倐而虎躍則余不能窺也已任光禄竹溪記余嘗游於京師侯家富人之園見其所蓄自絶徼海外竒花石無所不致而所不能致者惟竹吾江南人斬竹而薪之其為園亦必購求海外竒花石或千錢買一石百錢買一花不自惜然有竹據其間或芟而去焉曰毋以是占我花石地而京師人苟可致一竹輒不惜數千錢然纔遇霜雪又槁以死以其難致而又多槁死則人益貴之而江南人甚或笑之曰京師人乃寳吾之所薪嗚呼竒花石誠為京師與江南人所貴然窮其所生之地則絶徼海外之人視之吾意其亦無以甚異於竹之在江以南而絶徼海外或素不産竹之地然使其人一旦見竹吾意其必又有甚於京師人之寳之者是將不勝笑也語云人去鄉則益賤物去鄉則益貴以此言之世之好醜亦何常之有乎余舅光禄任君治園於荆溪之上徧植以竹不植他木竹間作一小樓暇則與客吟嘯其中而間謂余曰吾不能與有力者争池亭花石之勝獨此取諸土之所有可以不勞力而蓊然滿園亦足適也因自謂竹溪主人甥其為我記之余以謂君豈真不能與有力者争而漫然取諸其土之所有者無乃獨有所深好於竹而不欲以告人歟昔人論竹以為絶無聲色臭味可好故其巧恠不如石其妖艷綽約不如花孑孑然有似乎偃蹇孤特之士不可以諧於俗是以自古以来知好竹者絶少且彼京師人亦豈能知而貴之不過欲以此鬪富與竒花石等耳故京師人之貴竹與江南人之不貴竹其為不知竹一也君生長於紛華而能不溺乎其中裘馬僮奴歌舞凡諸富人所酣嗜一切斥去尤挺挺不妄與人交凛然有偃蹇孤特之氣此其於竹必有自得焉而舉凡萬物可喜可玩固有不能間也歟然則雖使竹非其土之所有君猶將極其力以致之而後快乎其心君之力雖使能盡致竒花石而其好固有不存也嗟乎竹固可以不出江南而取貴也哉吾重有所感矣永嘉袁君芳洲記介乎永嘉左右者若天台雁宕之恠巧瓌麗甲天下其間嘉卉美木蓊然雜植雖博物者亦半不識其名品故自古好逰之士輒以永嘉山水物産為第一宗喬以為是非吾好之所存也吾獨好橘於是種橘數十本於洲上遊而樂焉因以為號曰橘洲主人又曰芳洲主人視其意蓋極世間名山水自以莫如吾洲一切嘉卉美木自以莫如吾橘也而間請記於余余始亦訝其迂且僻而笑之既而歎曰宗喬可謂自足其樂而不羡乎外者矣夫趣有所適則不必其地之所勝意有所鍾則不必其土之所珍嘗試觀於草木之生雖其竒花異卉至不易生之物或絶逺生在海外苟以人力移之而樹藝擁灌之如其法則東西南北惟所徙焉既久而炎冷燥濕之性亦随變矣而橘也確然獨異乎是蓋昔騷人為之頌曰受命不徙生此南國是草木中之専一耿介者也夫騷人彚萃天下之香草美木以况其幽馨窈窕之思然皆未有特為之頌者其於橘也特為之頌豈偶然感觸而假物以發興也哉取其臭味之深有合焉耳宗喬少業儒而以醫自進其志行耿介又雅慕王喬羡門子之道翩然有廹隘斯世輕舉逺遊之思窺其貌葢未嘗以肉食之故而變其山澤之臞也其自寄於橘也殆亦有騷人之意乎余愧無橘之徳亦頗以迂戅不通於俗余家故隣太湖太湖橘藪也余將買山種橘於洞庭之上而老焉清秋霜落搔首而歌楚頌欲以招宗喬宗喬其許我乎否也吳氏墓記昔范蠡所自稱述得計然之䇿七其五用以覇越其餘用以起家而白圭之徒至自比於呂尚孫吳其言頗近誇誕然跡其料穣惡節贏縮權取予亦有道焉蓋足多也自子貢取譏於孔子而儒生遂不敢言治産不知人固不能祼形而枵腹則亦不能無所營而取給且夫公卿大夫修仁義躬教化以導氓俗庶人勤膂力盡山澤之利阜貨賄以給公上各有常業不能相廢而儒生欲槩以一説則過矣吾鄉吳翁衆所指為樸忠長者然翁自少工治産累數十年遂以貲雄邑中觀翁所為大率能取人所棄與人所取能知予之為取能擇人而任時徃徃與古人暗合所謂修其常業儒者莫能訾者也翁始家邑之南隅既老則治别業於徐湖之上穿池養魚優游其間又於其旁度地為葬所雜植材木蓊然塋竁羡道室廬門垣既周以固朝夕徃遊而樂之以待其終而葬焉嗚呼死者人之所必不免也而世俗多諱言死至以石火易盡之身而枉苦其心神豫憂逆數動輒為門戸千百年計慮皆若可以目睹而足履曽不量其身之不待及形氣衰枯死徵已見而尚持籌操鑰勾較米鹽斤斤如不及不自虞其死至於病且死也徘徊顧慕周覽其家之所有戀戀不能舍一物而去此又世之殖産者恒態吳翁乃于生時預為葬地其營壙也如營其室家其植木於墓也如植於園圃徃来松楸墟壠之間不為之悽愴悲懐而顧以為適頗似能視死為歸而知生之不可貪死之不足患庶幾委命而順化者其與没溺牽纏于厚利不能自反者固有間歟墓可數畝材木可數百株土石之工皆樸而不華祀田若干畝帶墓左右以翁之力能自侈其墳墓而所為僅若此此又可為世之破産厚葬虚地上以實地下者之一勸乎翁葬後幾年而其孫嵩與嶽求余記其墓余不能辭也為之書若其世系履歴子姓之詳則銘誌具存而支隴向背起伏風氣散聚此堪輿家事儒生所不窺故皆不書休寧陳氏墓廬記墓祭非古也其起於人之情乎禮起於情之不能已故雖好古執禮之士亦未有能非之者也休寧陳氏墓在某地于墓左个有廬若干楹嵗時上塜則血牲而祭于廬環廬有祭田若干畝作廬者陳君萬秀葬而奉以祭焉者萬秀之父筠軒翁也萬秀故客武進與余父游至是走其子憲以狀詣余請記且寓以書曰嗚呼萬秀先人在布衣中非有竒節偉行可以不朽然子孫㷀㷀之志竊願徼惠于君子録其一二事可紀者而鑱於廬之壁庶幾使我後之人其無忘乎按狀筠軒翁名帥英字希武父名原以行誼著鄉曲陳氏之先自唐末始家歙之休寧其里曰滕谿若干世又自滕谿徙宣仁翁今所居也陳故有顯人在宋有為翰林學士者勝國時儒人定宇先生櫟實生其族載在譜牒翁為人俶儻好義歙人多賈而翁故亦以賈業翁在儔輩中㟁然長者魁傑之氣正徳癸酉間峝源姚賊羣起流刼徽郡以旁近賊故檄民為兵守險扼鋒翁與在行間師克㨗翁以多有司給銀牌一為賞辛巳嵗今上即位迎母后于藩道江徽當遣役人供張往江上徽郡守推擇部民為衆信者使督以往遂以屬翁時暑甚翁老且憊觸熱旦暮馳至大洪嶺病死郡守愍然遣人舁其棺還之家休寧令給銀為埋具以旌之翁以甿庶凡兩從王之役然桃源之役縱横鋒鏑間去死隣耳翁竟生歸且受賞江上之役其事不過奔走輸將之間絶非險阨然竟以死固可謂之數也翁卒以某月某日年幾十有幾葬以卒之某年月日徽之俗羯􅀈喜鬭小睚眦則叢然挺而相擊然用之於義亦往往慷慨前死不避其氣然也翁豈其人乎春秋之義以王事出疆而死則為之加等此固為有列于朝者言也其亦可以通之庶人矣乎余既哀陳翁死役之義而矜萬秀之志故為之記翁子三人萬玉萬瑾萬秀其季而孫憲来求余文者也吳氏石亭埠新阡記石亭埠在郭南五里蓋陽羡一小山耳而發其竒者自頥山吳公始陽羡諸山多峭㧞而是山獨蹲伏蜿蜒以其伏也而峭㧞者乃若環而揖焉諸山皆競秀而是山獨若不見其秀者然登是山則諸山之秀可盡攬而有之如人之謙而尊又如人之深藏不自炫露而萃衆文以文其身也公遊焉以為竒于是出之灌莽豺狐之窟而築之室以居因其泉甃而曲之以為池閒則與客即而觴焉自是石亭之勝聞於邑中而地理家亦以是為吉也即山居之旁而壌樹之以為生墓及公之卒也則遂葬乎其中而賔從戚友嘗從公逰者于是又以送公之葬而至焉以公之所嘗遊而眷然於公之不可作也則為之悽愴而悲懐順之言曰夫公逹人也豈有所介介於生死徃来之間哉昔者公之来遊也當其朝煙方散而夕霏又凝春華始歇而夏木載隂宇宙之景既日新而不窮投壺賦詩惟意所適鳴琴角奕分曹更進人事之樂亦逓代而不厭于斯之時孰不以為此樂未極而公則已譙譙然亟為身後之圗培壠樹檟若恐後之以公之逹蓋不待奏雍門之曲而知樂之必有盡其從公游者又不待聞山陽之笛而知聚之必有散矣夫葬者藏也藏者息也此其無知而不可以生致者也雖然高臺未傾曲池如故果木花卉手植猶存其有知而可以生致者又安知其不且徃来嬉戲乎其間春猿之與唫而秋鶴之與飛矣乎以公之生而游也有不忘乎其死之圗孰知公之死而息也有不遺乎其生之樂者耶此可與通乎幽明生死之故者道也故余為此言以慰公而且以慰夫嘗從公游而悽愴悲哀於公者公諱仕字克學為人剛重有廉隅博學而文少發解南畿舉進士歴官提學副使其為副使也坐不能俯仰故早乞身焉而足其樂於谿山泉石之間公晚而有二子騂驊其所交多當世豪傑在同鄉中與養齋徐公相交尤深以余之無似公亦忘年而與交焉余寓陽羡時公數邀余飲于兹山之上而公之營墓嘗埋雞卵榖芽五色線以驗其氣則余及見之葢公嘗屬余記其所謂山居者而未果也及葬公之弟滄溪翁儔以新阡記為請嗚呼不及記其山居而記其阡焉其亦可以復于公矣敘廣右戰功紫江沈公自襲指揮使時未弱冠已能馳馬手搏賊賊憚之未幾調征永安嘗以數百人擣陳村寨賊牆立山上公一人拍馬而登賊却下山誘公入淖中馬䧟以吻拄淖中而騰其足及於陸三酋前趨淖刼公一酋鏢而左一酋刀而右夾馬一酋彀弩十歩外公捩頸以過鏢而挑右足以譲刀鏢離頸寸而過刃着於鐙鞺然㫁鐵公射鏢者中缺項殪左挂弓而右掣刀斫刀酋于鐙間㫁其頰車折齒殪弩者恟失弩僂而手行上山公又射之中膂既連斃三酋後騎至找其首公以二酋譲後騎而囊㫁頰者自為功餘賊麋而入箐追兵戰於箐中斬首若干級毒弩中公膊整軍而還驗功或以㫁頰者非全首難之監軍吳布政怒曰賊豈伸頸而待斬乎命紀之以功遷都指揮僉事義寧賊寇臨桂掠而還巢公追之巢有兩隘賊伏兵丁嶺隘以伺使熟猺以某隘閉告而導公入丁嶺公䇿之斬所閉隘而入果無兵守於路擒販者數人以丁嶺之賊告遂牽以導巢而熟猺亦以公斬閉隘告丁嶺之賊賊還趨巢大破之賊奔公獨逐一酋酋騎而走崖窘釋騎跳而下澗公騎跳而下澗澗深沒顛馬浮而岸毛盡濕束濕馬于樹縁澗而求酋酋泅而逃矚水中影射之血縷水上入水斬之後騎相屬至厓望見公提人頭立水中厓峻不可跳乃尋路從公則賊遁已逺公乘濕馬與諸騎追之猶斬數十級而還茘浦賊八千餘渡江而東寇諜者告公倉卒率五百人待于江岸駐白面寨去蛟龍滑石兩灘各數里諜者又告賊飽而歸將及江公以為滑石灘狭牽線而濟雖衆可薄也蛟龍灘濶成列而濟衆難圗矣吾欲奪其濶而致之狭令製旗軍中無尺布伐岸竹掲竿而編篾以為縿刻頃成數百旗揷之蛟龍灘令羸卒數十人守之燃柴煙以疑賊賊至果避蛟龍趨滑石公分兵兩岸而潜以小艦載勁卒數十伏葭葦中賊營于中洲以䕶濟濟且半公以艦乘瀧急衝之兩岸軍譟而前有酋騎而水立挺鏢當艦公舍艦跳水斬鏢酋人騎皆踣洲上賊辟易賊濟者西奔巢未濟者却東走上山而復潜趨蛟龍灘以濟洲賊孤艦軍攻洲兩岸軍始至下水夹攻之洲賊後行擠墮淵溺死無筭其前行盡俘之得生口首級若干収賊所掠牛畜之在兩岸者是役也以五百人破八千餘賊公用竒徃徃如是復以功遷都司同知嘉靖六年岑猛叛聚兵數萬人督府奏誅之一日督府召公計曰歸順岑璋猛婦翁也助猛奈何公素能得土官隂事曰璋女失寵而璋心恨猛徒貌合耳公復宻語督府云云如此可使璋擒猛督府復曰猛乘上流之勢擁兵建瓴而下則邕梧諸郡危矣奈何曰此不足憂土官大率飽富貴戀巢穴所以叛者懼誅耳非有他志也猛離田州而子女玉帛皆在彼或乘虛襲之猛安得不慮乎督府又慮猛且走交趾曰猛走交趾則閉不能歸矣猛安得不慮乎猛果如公所料而岑璋雅敬公公潜使人于璋於是督府進兵分五哨入猛勁兵盡在工堯諸将死讓無敢當者公自請將中哨當工堯去工堯五里而軍進攻隘隘堅復退營五里而粮且盡湖兵五千人請於公願得一飽而死敵公時僅有自賫家粮五十石與湖兵人給之升而官軍縮腹張目以觀湖兵分米不敢言公無以為計時左哨将與公隔江而軍公潜濟江就左哨將乞粮而請并兵攻工堯左哨將以分地拒公公笑而還曰兵粮吾自有之姑試公耳左哨將慚公還軍乃夜分軍三百人縁山而右走間道三百人縁江而左上山並繞出工堯背揷旗為號煑餘粮為稀糜食而遣之黎明合戰賊殊死鬪我軍却麾而進又却公親斬却者一人而提其頭以令軍復麾而進先所遣間道卒皆已至登山揷旗初岑璋既與公為約而遣兵二千人陽為助猛守工堯遺精卒千人以䕶女為名居猛左右璋兵在陣後望見山上旗大囂曰天兵得工堯矣潰而却猛軍見後陣却亦嚻而却我軍乘之斬猛子邦彥于陣中蹂尸數里遂入隘得其積粟軍始飽乘勝攻田州猛聞工堯破窘急欲走交趾而璋卒五百人䕶猛妻以歸五百人獨守猛指猛所欲走紿之曰此路皆天兵也不如且走歸順為後圗猛不得已從之璋待于境相見因相抱哭璋以子女歌舞飲食恣猛圈留之而潜遣其子報公于田州公入田州五日而諸哨始至璋所使報猛所在者事頗洩左哨将移軍壓歸順境索猛欲破敗公事自為功璋以二十牛百甕酒犒軍而謂左哨將曰猛誠有之公無急也于是醉猛而斬其首函送督府斬他囚首貫猛尸而以與左哨將左哨將喜於得猛而抽軍獻猛首督府則猛首已梟一日矣猛死田州平安置猛子邦相於福建而議設流官公曰思恩設流官反側至今未息田州復然兩賊且合從起矣督府不聽且調公守田州公請以他將假守三月而待希儀治裝他將守之一月而田州酋盧蘇果與思恩酋王受連兵刼城他將狼狽歸田州復為賊巢公又言於督府曰兩酋能用其衆以復故主為名今若返岑邦相于福建而置之南寧此竒貨也可使兩酋坐受縳矣督府復不聽而徵兵數十萬征之既而失利督府以罪罷新督府餘姚王公至其所以撫定兩酋公多與其謀因薦公右江叅將右江故治栁州栁在萬山中城外皆賊巢軍民至無地可田而室廬妻子數被焚刼知府劉璉殪于賊知府鄧鋐間出城弩中其膊自是諸軍民官必甲而後敢出城城兵又疲不足仗公為叅將始議剿五都五都去城五六里而巢最險賊又最獗所虜獲人畜最富巢中不聞官兵者百餘年公乃以五百兵付百戸蔣紹宗使搗其巢賊蜂出裹我兵殺數十人而隘其入路使不得返我兵即賊巢為營固守而因賊粮以為食然氣奪不能戰賊亦欲坐踣之于是百户潜遣人茇而告急於公公即上馬復聚兵得五百人入巢為援既至聲銃者三因奮擊賊百戸兵聞銃聲亦出奮撃賊賊分兵為二腹背戰我兵鼓譟斬級賊不支然尚横鯁兩陣中守隘不肯散公使人茇而以勝告百戸百戸亦使人茇而以勝告公公因謂百户曰汝且據巢毋出待賊服乃已不服更夾攻之可盡擒也賊素怯栁州兵最易與至是詗曰汝誰也敢入吾巢公使人紿曰是新叅將老沈所率藤峽軍耳兩江賊熟老沈名而憚藤峡軍因咋舌曰吾固知栁州兵不及此相持數日賊不退然心懼因熟猺為解熟猺者界漢人生猺獞間陽附官軍而隂附賊或官軍勢盛附官軍賊勢盛附賊以為常于是熟猺間說於公曰請為兩家解鬪公度賊尚勁乃且聽其説而謂熟猺曰返我生口牛馬我兵乃去賊以所虜生口二十牛馬百四十為獻賊収衆奔山頂而空隘以通百户兵公兵與百户兵牽連行至城城中人讙始知栁州兵之能戰賊也公以為欲大破賊非狼兵不可右江狼兵惟那地最勁乃請于軍門以那地兵二千戍栁州栁之有戍狼兵自公始先是賊勢張甚而熟猺及城中黠吏民多為賊詗者賊耳目徧官府左右官府閨闥動色情性賊在谿峝千百里外輒知凡議大征或鵰𠞰口語沓沓未及聚兵而手足盡露以是賊得隂為備或伏巖藪伺官兵殪之或先徙妻子畜聚于鄰巢而自空巢以待官兵官兵至徒手無所得甚者我所任為鄉導徃徃為賊誤我入死地崩墜厓谷不戰而糜爛者過半而賊以耳目故益知官軍虛實與民積聚少多乘虛掠多所入無一當而所噬無不飽我兵築堡増戍則益紛然如刻穴守鼠而賊活脱不可蹤跡公以為圗勝筭莫如得賊情得賊情則莫如諜而使官府人為諜則賊生疑于是隂求得素與猺人商販者數十人假以買物召至府宻謂之曰吾素知若輩通猺吾不罪若更與若銀為販本若試為我詗賊衆感諾乃人給銀五兩使益買物散入諸峝中諸猺雖凶暴樂殺人然販者至則寨寨傳送䕶衛飲食恐損一販者則諸販不至是以雖絶棧深箐販者無所不歴每有動静販者輒先知奔走報公公厚賞販者而秘其事雖肘腋親近絶不得聞至期鳴銃者三則諸兵皆聚第謂之曰今日出某門而遣心腹人為旗頭引諸軍諸軍貿貿行問旗頭旗頭不知曰然則汝何引我曰公強我徃我漫徃耳軍行千萬人其所徃獨公與旗頭兩人知之而已頃之劄營設伏賊果至遇伏奔追殪之已而賊寇他所則公軍又已先在或絶逺村聚賊度官軍所必不至而潜寇則公軍又已先在賊始驚以為神而我軍亦不知公自何得之也公始至栁令諸猺得出入儥買游戲城中無禁諸猺時入府見公公兒女撫之久之稍稍擇其巧便曉事者結以厚賞使詗賊後賊發其火伍中輒報公公又厚賞之而間謂諸猺曰若見我若妻子何不来見夫人諸猺叩首不敢公曰試令其来已而猺婦五六人来夫人好言慰勞賞之針線包帕諸物以銀簪簮其頭又命諸妾婢灌之以酒人數大碗察群婦中其夫嘗以賊事報者則又隂摘之他所勞苦之曰若夫為吾大人盡力良苦私賞之包帕銀簮諸物倍於人前所賞者而益以珍果美物塞其袖中又隂戒之勿令人知也諸猺婦既多得賞又酒醉踉蹌舞手出府門猺夫望見之歡喜争前掖而歸巢自是諸猺婦来者至數百人夫人傾筐篋針頭線尾皆盡猶不能給而猺婦相戒以勿令人知者猺婦又洩之以所獨得珍果美物誇諸猺婦以為夫人愛已諸猺婦皆怏怏心羡嗾其夫使報賊冀已入府得珍果美物而公間使人徃諸巢中隂以夫人之命賜物諸猺婦自是賊中消息或諸猺不肯言則猺婦嗾之使言或諸猺竟不肯言者則諸猺婦自以使人至巢賜物時附耳語云云若勿向我老公語也公用兵風雨来去既得賊時率輕騎剿其尤劇者一二人兵至巢以菅為繩繞記劇賊家示諸軍所捕繩之内老弱婦女牛畜無一免者繩之外老弱婦女牛畜無一及者遂出巢數里遇平地度賊援所不至則停軍審究其為劇賊家婦女牛畜者収之其雖獲于劇賊家而係鄰家與鄰巢者還之諸猺得完室家與見還者皆喜以為徃時官軍入巢見人輒殺或賊遁則搜斬不為賊者以充級故賊詈我輩我雖為賊時得脱或保孥貲汝輩雖不為賊時見殺或孥貲為虜自今我輩乃有顔面詈賊矣公入巢有助賊戰者既還軍遣熟猺檄之曰若奈何助賊戰吾𠞰若無赦頃之擣其巢盡殱之自是凡所鵰𠞰歴數百巢竟無一人敢助賊戰者鵰𠞰所過他巢或弓弩而門瞷既還軍則檄曰若奈何弓弩而門瞷今罰若五牛不者且𠞰自是所歴百數巢竟無一人敢弓弩而門瞷者所獲劇賊多不殺剜兩目則兩耳賞銀數兩而還之巢自是他賊有所虜掠多不遣兵而用剜目者騎而一人牽以詣賊使徵所虜掠賊見之驚曰某巢某也震懾不敢隠盡還所虜掠而剜目者索不已賊至出自所有與之公以給被虜者而以其餘給剜目者剜目者每一入巢則利益多而為賊者所獲每不補所償則益無利在栁州所剜目七人其六人皆為官用其還巢而復為賊者覃萬星一人而已公竟以計擒殺之公始議發兵故制欲發兵必請督府督府檄下乃發公以為吾治文書吾掾史知之文書上府府檄下我府掾史知之多人知則洩又栁去督府千里待報踰時坐失機㑹而書檄徃来水陸諸巢絡繹能保不為賊得于是凡率兵入巢未嘗先請既勝則上首虜督府而以邂逅追賊至巢為解於是督府不能以文法詰而兵謀得無洩公嘗欲𠞰一巢而恐其洩也乃佯病所部入問病公曰吾病思鳥獸肉若輩能從我獵乎因起出獵去賊二里而止營軍中始知其非獵也公耳目多賊不能藪率走之他巢他巢人又嚇之曰公且𠞰汝則又走之他巢他巢嚇之則又走跰血瘇以死或餒槁崖谷公又每以甚雨凄凍風𡨕之夜察賊所止宿處四散遣人賫火銃以筒貯火衣毯衣毳帽與草同色潜至賊所夜聲銃者二賊盡驚老沈至矣挈妻子裸而蒲伏上山頂兒啼女咷徃徃寒凍死或觸崖石死不者且為虎咬諸妻子更相嗟怨汝為賊之利至此黎明下山詗之則寂無人隂使其黨至城詗之時公所遣衣毯者四散諸巢同夜舉銃明日諸巢所使為詗者亦同㑹于城旁西巢人謂東巢人曰老沈昨夜来吾巢東巢人謂西巢人曰老沈昨夜来吾巢則固已更相怪駭已而詗之城中人則老沈固安坐城中不出也益怪駭曰昨聲銃者誰耶鬼耶諸猺又自相嚇曰虎咬人者老沈所使也自此賊益膽落或易面為好猺獞而栁城四旁一童子牽牛行深山數百里無敢訶者其軍民徃徃寄牛於猺家以耕或索雞酒於猺猺不敢不與公在栁先後十三年名賊宿猾幾盡而韋扶諌者馬平四都猺賊弩中知府膊者也兇猾甚先是嘗七捕之不能得至公亦七捕之不能得㑹有報扶諌逃隣巢三層巢者公潜率兵𠞰之至巢則扶諌又已與三層賊徃刼他所而三層賊妻子獨在公盡俘以歸計七十餘人平時公所俘賊妻子盡以與狼兵為賞至是獨不與而閉之空室中善飲食之公又隂使狼兵數百人怒而挺刀狰獰入室恐諸婦女作欲搶狀公佯執鞭痛鞭狼兵使退如是者三欲以深徳諸婦女而潜使諸猺聞之以繫其心公又使熟猺謂諸猺之亡妻者曰吾不害汝但得韋扶諌則還汝妻子矣諸猺四五人来投公公令入空室視其妻夫妻相持哭其小子牽其父哭妻曰非沈公吾為狼兵殺且搶久矣已而怨相詈曰咄扶諌非汝爹非汝娘何不縛以贖我諸猺心割而别復見公公曰欲得扶諌耳諸猺曰扶諌已逃他巢圗之實難雖然願公切勿以吾妻子與狼兵也吾且為公緩圗之公曰諾因殺牛犒諸猺而去之諸猺踪跡扶諌所在遂徃以言惱扶諌曰還我妻子扶諌不應諸猺因曰我輩失妻子計窮惟有更随汝作賊耳扶諌喜諸猺乃詭相與計曰今官府虜吾妻子而穿山驛與守堡百戸與廵司俱在山中今徃刼之三印可必得也官府懼失三印得重罪以易吾妻子可必得也扶諌曰善扶諌既離巢則黨益孤諸猺因醉扶諌與其黨而縛之置巖洞中而使熟猺報公曰得扶諌矣恐見賣可遣吾妻子於三十里外相易公以為吾不遣諸猺且謂吾怯於是鎖諸猺妻刃挟之以行至三十里使熟猺諭諸猺曰諸猺且刼妻子者先殺妻子然後戰諸猺請於公曰吾獻扶諌懼讐公可遣三十人至巖洞自取之公慮諸猺有變乃選健卒十五人賞而遣之曰得扶諌吾且賞汝若諸猺殺汝者吾且重賞汝家又以十五人付之熟猺而質熟猺妻子曰十五人者損一人汝妻子虀粉矣至巖洞中果得扶諌而出諸猺閉之五里外懼扶諌徃而妻子不至復要公曰必相易於此公又曰吾不徃諸猺且謂吾怯於是先遣諸猺中妻女四五人徃言刃挟諸婦女狀諸猺吐舌懼殺妻子帖息不敢動遂易扶諌以歸剜扶諌目截耳剔心手足斬之而四懸諸城門諸猺出入城者見之無不股慄諸猺既熟公威信公嘗調一巢徃征他巢雖懼讐然不敢不徃牛畜盡俘以歸獨首虜生口視狼兵為少耳公亦盡以所俘牛畜賞諸猺其後復調而與之期㑹天大雨諸猺懼失期乘雨泅溪水沒者六人公勞苦之命沒者人三牛付其家其餘皆遣還之自廣西為將如韓觀山雲惟能使猺人不作賊至公能使猺攻猺則廣西所未有也十六年而有思恩岑金之變初思恩府土官岑濬叛被誅而立流官以其酋二人徐五韋貴為土廵檢分掌其兵各萬餘人而聴於流官然夷民獷悍不樂漢法數十年間凡數叛則數舉兵誅之而亦不能定也當破岑濬時調兵鎮安鎮安掠思恩生口以歸己而其中一人長大而姣因託言岑濬子而名之曰金夷民益思亂鎮安乃潜召其酋長出金而與之盟曰汝小主也諸酋感泣擁金以歸鎮安因要之曰金立與我某地幾百里遂盟金而遣之諸酋聚兵五千人以奉金將攻城郭復故地諸夷多欲為響應者勢洶洶而先時濬既誅其酋楊留者無所歸乃率其黨千餘人詣賔州應募為打手賔州兵素弱故倚打手至是留欲徃投金以逞時公與兵備皆在賔州留入言於公曰留小主人在請徃公方慮岑金之危思恩未暇慮留之在肘腋也聞留言獨心駭以為金去賔州數百里而留應之表裏相扇賔州危矣賔州危則咽喉哽咽喉哽則廣右盡騷而何有于思恩此事大不可急圖宜以計欵之乃婉色好語謂留曰汝第徃我曩征田州調兵鎮安時已聞有岑金在是岑濬第九子也留聞是言固己刺心公因叩留曰聞鎮安縶金甚堅何因出乎留詭曰百計逃耳公低聲作自語狀曰岑氏其復乎欲以深動留而呼留至宻所曰為我一言語金若欲官必毋殺人刼城若欲殺人刼城任汝自為之金能聽我言可以狀訴我及諸上司留唯唯公遂與留銀十兩而以花紵方摺之納留懐中為我寄金得官後為衣衣之可常念我也公復紿留曰金欲官非賂我萬金不可留曰金誠當盡力然金方倥偬安能辦此公笑曰吾豈遽責金耶且欲得一帖為信耳自是益信公無他腸矣留出公又呼還謂之曰我幾忘之韋貴徐五素仇汝亦仇金可善備之無墮彼計也留詣金具如公言金大喜真謂倚公可得官矣因率其兵五千人詣賔見公至城門門者懼而報公請無内金公怒罵曰金非賊奈何不内覘者以告金金心益安率其衆散入城而與留及其親信二十人皆𠂻甲見公公曰金来乎留曰来矣金叩頭潛以萬金帖子奉公公復笑曰若窮鬼安得此乎金曰頼公力得官不窮矣頼公力誠不敢忘報公子孫公戲曰汝土官多不知恩汝得官且忘我矣况子孫乎金唯唯不敢公乃令其姪出見金曰金汝兄弟也金得官他日每一出征乞金四功與汝公復為金計曰汝賂我兵備公獨無賂乎金對不敢公曰第寫帖子吾為汝致公以兩帖子示兵備笑而火之於是遣金詣兵備始金叛而留且徃兵備甚懼公潜與兵備計此事大禍叵測公夷情未熟一語蹉跌敗矣不若一以聽我兵備唯唯及見金但言吾視金有福相以微動之且曰此事一聽沈公明日公詣金營犒之五牛酒五十尊又明日兵備犒之如公公復召留與金謂曰倘兵馬殺金是吾殺金倘暗箭刺客殺金是貴五殺金非關我事今一以付留可無賺金也留乃日夜甲而擁金為備公復遣其姪至金營與金同飲食卧起金自是心死于公矣公欲縛金而憚其衆時廵按在南寜將誘金至南寧乃縳之乃請兵備先徃宻語廵按以故公謂金曰吾挈汝訴廵公吾代汝詞公為金作訴稿塗抹四五次以示忠於金復謂金曰吾與汝徃寧南倘貴五伏人于路暗箭射汝不若易汝土官裝衣青衣雜掾史中而先我馬令五千人後行金如公言路中飲食公與金同席語金曰貴五以重賂賂吾庖使毒汝則奈何自今以後吾所食汝亦食吾所勿食汝亦勿食可也金如公言而益以公為愛已行七十里至思龍驛公晨起耳語金曰今徃南寧南寧人皆言汝叛聲甚惡以五千人往則人益疑汝不若散遣三千人而選心腹健卒二千人以往是汝不撤衛而坐息人言也金以為然選二千人徃復行一日去南寧百里公謂金曰汝至南寧乆候而諸從人衣糧懼不給不若以千人營於此而以千人從為便金亦以為然從金至南寧者纔千人金入見廵按廵按好語慰之曰吾為汝奏明日廵按遣人至金營犒其衆而留金以待奏居五六日公度金衆衣糧且盡復謂金曰思恩去南寧近耳何不遣其半取衣糧而坐待糧盡衆且散矣金復遣其半衆行金所遣千人營百里外者久之亦以衣糧乏稍稍散去而獨五百人尚散處城中公欲縳金而又以為五百人者廹死而狼鬪則殺傷幾何更欲為計而金所遣取衣糧者適至則從金者又千人矣公知金未可動間請于廵按公且徃南寧而以金從可于路圖金也至思籠驛忽報韋徐將萬人在陽以迎廵按而隂襲金金驚而跳公與兵備廵按聞之曰禍矣公謂廵按且陽為不知而聽希儀徐圗之公出呼韋徐罵曰汝安得擅兵至此金得官與不得官唯朝廷所命汝安得私讐之是時金尚駐近地覘視而韋徐部中亦有為金耳目者金聞公言復還公行三十里金道伏候公公曰岑金耶汝尚不知死貴五兵至矣可疾入賔州匿吾叅將府則貴五無如汝何矣金馳馬入賔州公復于廵按曰金入賔州矣廵按兵備至是始有面色自金徃南寧返賔州飲食起居無不随公居數日韋徐復私公曰請甘心于金公又怒罵韋徐亦莫測公計所出也公宻請於廵按散遣貴五衆而後圖金然是時金衆尚千餘人與楊留所統殺手千人皆在賔州内外公與兵備計公可遣楊留殺手百人䕶廵按徃栁州公間謂金曰楊留殺手百人䕶廵按徃栁州矣汝盍將百人䕶送四五十里以自結乎至五十里金欲返公又拉之行百餘里金又欲返公曰汝獨返勢弱倘貴五伏人待汝奈何今去栁且近汝何不與留偕至栁而偕還金遂以百人至栁其酋長十餘人皆金死黨驍健㑹金於路躍馬而墜公以機責其酋五六人曰何不䕶金而令至此痛抶之五六人皆病創卧然尚以公愛金故被抶不敢恚公金至栁入叅將府公命夫人見金曰金我兒子也金得官聴調徃来貴縣吾縱不在汝必見之金益喜置酒勞金與其酋是時諸大酋其五六人既病抶卧獨四五人從金而留所部打手百人與金兵百人皆營於城外栁城故有狼兵二千人足以虞變公將縳金先以狼兵三百人䕶廵按三百人䕶兵備而以三百人入叅將府待事謀既定因酒中戲謂金曰痴兒子汝徃時懼誅又懼貴五逼意常不樂今無事矣何不痛飲金與諸酋皆盡飲至醉其夜遣狼兵縳之黎明遣人召留於城外狼兵夾墀左右立留與其黨三十人見公公大言曰非楊留忠不能成我事以銀十兩勞留取紅紵挂留留愕然公曰汝為之而汝不知乎金國賊也非汝與吾同心誘金至此吾安得縳之留大駭泣下曰留小主人也公曰汝為之而欲誑衆乎公意又欲以疑留于其黨也留懼不能言其黨三十人皆股慄公復曰吾且為留奏功矣因見留於廵按廵按勞賞之如公見兵備兵備勞賞之如公勞城外二百人牛酒而令留率之還賔州遂令留賫牌散遣金衆之在賔州者曰所誅止金一人留既惶恐見紿又虞同行者猜已賣金相讐見殺于路中日夜跼蹐為備奔歸頃之遂發病死金兵聞金縳皆散去公乃以金與其酋之病抶者醉而縳者解廵按府而撲殺之思恩復安當是時使公不先欵留則金必不至而且攻城殺人使公在南寧賔州縳金則困獸之鬪何所不噬使公聽韋徐甘心于金則兩客相閧而主受其釁惟公緩之又緩以漸脱金于五千人之手若剥笋然待其為一夫而後縳之人以是益多公之算而韋徐諸土酋亦益謂公不可測也公見督府於梧時鹽船八十餘阻峡賊不能前左江孫叅將千人送之不能督府以命公先時公泝峡峡中大酋侯公丁嘗謁公公寄六羊令公丁牧養至是遣人取羊于公丁公丁奉羊至潯公命諸鹽船牛酒犒公丁與其從人謂公丁䕶船上峡公丁身居公舟尾命其黨乘小舟䕶船囑曰吾以身質於沈公䕶不謹吾碎矣公因命班首一人與公丁從人䕶船至武宣未返時孫叅將與左江兵備聞公丁在公舟欲乘間捕之而宻言于公公曰此㫁不可人信我而我詐之不祥招而縳之不武且獲一人以疑諸夷將焉用之此㫁不可公居常有所徵召雖其深谿絶峝未嘗不来其来雖桀猾宿惡未嘗輒殺其可諭者諭之其不悛者必遣還巢而後捕之故公以此語兩人兩人猶豫未决公乃摘公丁告之故曰可亟歸矣公丁大感泣去而公所遣班首䕶鹽船上峡者亦至不失升斗公以報督府督府笑曰孫叅將千人乃不如沈叅將一班首十八年七山之役奪兩叅將于虎口功尤竒公膽勇機警善撫士其私財與所得俸禄賞賜半以給諸人為耳目者其出兵多賫私財以行有先登與斬首者就陳給賞不失頃刻故人争盡死力公嘗笑曰人以貲財積賄賂而博官吾以貲財積首級而博官豈為非計哉其征陳村時染危疾所部皆自戕于神前以禱公刀穿手矛剚股鉤刺脊繫鐵鎖拽之痛毒諸體皆徧最後至者一人無所施乃箭貫喉為禱其得士心如此蓋余宦游而得當世名將數人北則馬永梁震西則何卿南則公震與卿余未之識而識公與永永魁瓌長貌而氣特沈毅見人頫首下視寡言笑公短而精悍目炯炯燭人議論磊落激發皆所謂偉男子也公與余稍談及廣西事余是以得撰次之公戰功尚多余不盡聞也公謂余言當世固多良將患在牽掣齪齪不能展噫嘻若公者猶為未盡其用哉荆川集巻八欽定四庫全書荆川集巻九明唐順之撰説晉齋説聖人作易以隂陽别淑慝至於晉之象曰明出地上晉夫日出於積隂之下而升於至陽之位如人之破乎障塞而極乎髙明此非强徤有力者不能晉之所以次大壯也然而大壯之象以雷晉之象也以日夫雷蟄於深冬寂然無聲至於春也劃然而萬物皆鼓日麗乎天而含於地見乎南而潛乎北故其韜歛而若無所事者乃所以厚畜其力而用其壯者也君子之於學也本之以深沉有所不為而發之以果决有所必為是以能伐其隂慝而長其陽德其於進也幾矣華子師魯以晉名其齋葢有志於進也華子好學而謙其所畜不以暴於人人亦不能窺也可謂近於深沉者未知其果决何如耳雖然未有畜而不能發者也余故兼大壯晉之義而為之説師魯以晉名其齋也先君子水西先生實命之而余為之説也亦水西實為之請後余文成而水西已不及見矣不知其有當于水西所以命師魯之意否也水西績學練故而用不究乎其才年不副乎其志式榖以似其在後之人乎顧余文何能為師魯朂之而已鄭氏三子字説崑山鄭士魯名其三子應龍應麟應鸞而問字於余天文左為蒼龍禮家以天地温和之氣在左故坐主於左又曰君子尚左龍淵潛而天騰隂則蟄而陽則升是純於温和之氣者也故位於左為之字龍曰左卿麟有趾而以不踐草與蟲之生者為仁其在人也伐一木殺一獸不以其時則亦為不仁觀於此義而一體萬物之心可以油然生矣為之字麟曰趾卿鸞鳥之聲和故樂家象之以協於律吕君子載之在輿而聽焉以消其非僻躁戾之心是和氣之應也為之字鸞曰聲卿夫君子之學以求仁也仁渾然者也左者仁之嚮也趾者仁之履也聲者仁之感也所謂各指其所之也士魯嘗學魏莊渠先生而以是名其三子葢望之以求仁之學也僧承基字説虎丘聽泉老僧以其徒承基請字於予予為之字之曰有住佛氏言無所住而生其心而予以有住字承基者無乃與經㫖相悖乎葢不空者真空也無住者真住也是法非相則謂之無住可也是法即相則謂之有住亦可也儒者之説既曰變動不居周流六虛矣是無住也而又曰艮其止止其所也是有住也知止而后有定基也其務先明所住哉續猫相乳説猫相乳古未之有也自唐以來至今僅兩見耳然在馬北平家特以異母而乳無母之子猶曰憐其無所於乳也而乳之云耳而在博士吳君家特以二母交相為乳焉是尤可異也夫此二者其為和氣之致信矣余竊以為唐德宗﨑嶇兵戈間内輯外捍合暌為同用武功致天下之和故其為瑞也特見于武臣之家矧今天子歛福錫極匝洽胎卵以文德致天下之和故其為瑞也亦特見于儒臣之家然則謂其為天下之瑞焉可也昌黎以為一家之瑞狹矣雖然和氣之寓乎宇宙也其發也必有以起之其凝也必有以鍾之譬如醴泉朱草不擇地而出然據其所出之地固自有以鍾之也且夫武臣多懻忮喜鬬而史稱北平為將獨先拊循至殫家以賞士甘苦與同之使德宗能以武功致天下之和者北平實多力焉其獲兹瑞也宜無足怪而吳君豈弟而不陂諸兄弟之子更相子也友讓之義信乎其家而長者之風行乎其官以能不負天子菁莪育材之意若然者其亦可謂有斯猫之誼也歟余知其獨瑞于二氏也豈其自有以鍾之歟由此言之雖謂其一家之瑞亦可也抑聞之史氏又言北平後與李抱真為隙遂以私忿隳其前功是北平終有愧于兹瑞也已而吳君方且益崇令德協恭僚宷以倡諸生而陶之太和則兹瑞也其將專于吳氏矣乎書以望之銘象梳銘翠則羽象有齒材之美身之否磋為櫛髪乃理處不才鑒於此鏡銘吾杜吾德鬼神莫測有動乎中遂徴于色匪曰形模是為心則維瞭與眊維睟與墨宜鑒於兹其永無忒銅雀硯銘昔維瓦藏歌女貯舞馬今維硯侑圖史承鉛槧嗚呼其為瓦也不知其為硯也然則千百年之後委擲零落又安知其不復為瓦也葢雄豪武人不得而有之子墨客卿不得而有之吾嗒然有感於物化也鼎硯銘嗤爾者謂爾無腹不可以承公餗識爾者謂爾有靈而可以辟妖精尚從我於深山之中魑魅魍魎其莫能逢半月硯銘并序月硯一吾家故物也毁於地中分焉因其形礲而為半月者二銘曰誰謂其毁維毁乃全其全謂何不盈以弦盈則蝕晦則窮明晦相息兩弦其中君子觀象謙謙爾躬又礲而瑩之出其􅀈也則以為明之半生墨而傅之含其垢也則以為魄之半死死與生與争於其所也其孰綱維乎此黒石硯銘硯之未琢石即是墨硯之既琢墨即是石問於道人道人守黒是亦一石是亦一墨既已為石與墨矣而烏能辨石之與墨宛山石硯銘小引宛山石硯者硯之最下且易得者也既而山擅於鉅家工不得穴乃取故時所為碓碾磨硱者硯焉得之者艱而價亦遂髙嗟乎物之貴賤何常之有哉銘曰山屬於公衆工所攻其出不窮山屬於豪封閉以牢其價乃髙嗚呼碓碾磨石遂登几席亦繫其遭方硯銘汝之量足以茹垢納汙而不攖於慳也汝之守足以砥㢘峻隅而不刓於頑也葢既惠且夷可否之間也方圓硯銘惡方喜圎常物之情喜方惡圓幽人之貞皆物我之相笑無益損乎爾形小硯銘大者凝然利以居小者扁然利以行不有居者墻壁户牖誰與供十年之著述不有行者蒼山白水誰與收五嶽之精英又昔人有言一斛臭水而藏蛟龍是維涓滴視之正黒或蟄其中忽然躍出雲滃電掣文章滿空斧硯銘謂爾為藝苑之精吾疑乎其形謂爾為凶門之揮吾疑乎其才形則允武而才之文誰云國容可以入軍荷葉硯銘葉無染此有染葉有巻此無巻其孰知淨染之為一而巻舒之無辨也吾許女具隻眼贊杭中丞雙溪像贊巋然者其位望之隆也而退然其有寒士之風也黝然者其若愚之容也而蔚然其為詞人之宗也惟其呐于口而辨于文崇于位而卑其躬也是以海内操觚之士惟見公逸思麗藻之不可及而溪叟山孺惟見公悃愊真率之可與狎而同也丁近齋參政像贊弱冠超遷或快其早龎眉作尉或惜其遲然駟也既沈身于郎署而誼也竟墮䜛于湘湄則遲宦者不逮通顯而蚤遇者亦或數竒先生重厚長者贍于文辭葢自少傳經已顒然而為人師乃淹蹇次且至于年五十矣則始釋屩褐而閶闔是披然自是揚聲樹績出入乎郎曹藩臬之間者二十有餘年而後返林泉以遨嬉此則屈伸倚伏之不可知而先生獨逢其時者哉𢎞齋黄先生像贊𢎞齋公教授于常者三年順之時在諸生中公為人温厚平易多士樂而親之其去也空學舎而送之百里後來代公者匪人力為威虐以漁獵肆毒於多士多士厭苦弗忍則益相與思公公自教授遷宜黄令病歸以卒始公在常時子冏實從後二十餘年冏復來游吾常多士喜於見冏如復見公也而冏屬余為公贊余乃本多士之所以思公者為之贊而以勸夫為儒師者曰嶺之南儒以發身江之南儒以淑人淑人維何色笑相與舎有絃歌庭無夏楚繼公者誰或肆之毒其稍不饜鞭血相屬遂令膠庠化為圜獄不有虐者孰顯公慈匪我私公多士之思蔣雲壑像贊人見其以貲起家則以為力田致豐而傾身交游冠葢過從則又有俠士之風人望其髙冠獸補則以為武人之容而丹青詞藻模冩之工則又與墨客而争雄葢是數者多不能兼而足以知翁之才無所不通也王思東像贊游間而委蛇者其世胄之餘也冰雪而綽約者其山澤之臞也尊酒竹石者其所以自放而為逸也詩書禮法者其所以自檢而為儒也然余所取於思東子者世胄而無紈綺之習臞於外而中之腴也逸而不違乎俗儒而不類乎迂者也吳南圃像贊吳生集父衆競錐刀以貨易心誰能為譲市有還金終日執籌夜苦不足誰能為逸庭有象局其讓也逺于欺其逸也近于止鳴呼南圃可贊在此吳南洲像贊吳生集叔父伯及季偕自出少同孤行亦埒克厥家匱以腴不自纎割其餘藥與粥及囹圄舟于河登溺徒贊南洲視南圃徴叔銘我非詡祭文啓聖祠祭文維公濬哲淵静胄衍神明饘粥承家永有令名孕靈儲秀篤生聖子地維天柱頼以弗圮五帝避德三王讓功窮本反始誰為之宗若古祭川先河後海因委遡原厥義攸在于王建極隆師象賢廢禮允興必公焉先昔也蒸嘗不出闕里今也新宫徧彼寰宇昔也二丁祀止素王今也父子爼豆兩堂兩堂伊何于泮之水儒林有輝素襟咸喜釁器用幣兹惟一初來格來歆用奠厥居仰徼神休作我士氣父教子率三綱永繫永州祭柳子厚文代父作竊惟山川之與人文同於擅天地之靈秘顧若有神物愛惜乎其間深扄固鑰而不輕以示永之山水天作地藏經幾何年埋沒于灌莽蛇豕之區至公始大發其瓌偉而搜剔其荒翳公之文章開陽闔隂固所自得至於縱其幽遐詭譎之觀而䆳其要眇沉鬱之思則江山不為無助而公之窮愁困阨豈造物者亦有深意葢公之自記鈷鉧小丘也嘗以賀兹丘之有遭而韓退之亦以公窮不乆斥不極或不能以文自見於世歴千載而較失得亦何尤乎偃蹇而擯棄某少而誦公之文見其模冩物狀則已爽然神遊黄山之顛冉溪之涘今來吏兹土周覽四顧而親覩其所謂廽竒獻巧者則又恍然若見乎公之文而挹其餘波之綺麗自顧樗散之才未能庶幾乎公之愚而戒貪于䑕懲猛于蛇敢不因公言以自勵睠風景之如昔想公之神恒徃來于斯地聊奠觴而陳詞尚彷彿其來至祭萬古齋文庚申之歳余客陽羡公來顧余實始識面識面之初遂以知心朱絃白雪相與賞音惟公老成行方志古余也何人自知踈鹵豈足禆公辱公節取過則相規善則相許一日過余奉幣以告余有二子煩君教詔佛廬仙洞水曲山窈擕壺擔盒與余相邀花木玲瓏禽鳥啾啁流目傾耳永日遊遨或時閉門對坐一室竒文共賞疑義與析清言不足或繼以奕晨飡相逢忽焉日昳余有所往不告於僮僮來相尋知必在公公命家人為具客食家人不問知余為客綢繆往復踰四五年曾無一日曠不周旋公訓桐廬余赴官寮心豈不邇其地則遙逮公解官余亦屛居握手一笑歡言如初通家之誼婚媾自此公有女孫以字吾子朋友或言師生之拘公曰何傷古有蔡朱尚期白首頼公劘礪公不我留忽焉厭世屬纊以前神氣清皛顧謂二子事豈有了荆溪山水昔陪公游余今復來愴公其休死生常理抑又何怪不敢負公恃此心在與公二子敢忘切磋尊聞行知矢言勿磨窀穸在兹舉我觴奠叙往悵今公其我鑒祭萬思通文昔夫子之有訓曰觀過以知仁求無過於過中故忠原而孝申嗟惟君之為儒宿誦習乎禮經在節哀以順變不毁性而危生故聞訃而一慟竟疾疢乎膏肓始三日而絶漿遂五月而云亡固𠂻情之獨感不自知其何因雖俯就之有違亦仁可以殺身繄銜哀而入骨諒雖死而不化命縗絰以為歛見先君於地下惟君質之敦厚宿余心之所契始弔君於凷土覺形神之頓異余既已為君而心憂君猶尚慷慨而意氣苟一息之未亡尚前修之可冀復謂予以乆要期規我而無棄曾晤語之幾時忽憑棺而殞涕兹日月之有期從先君以即竁寄一哀以陳詞亦何盡乎余意祭白洛原文國重世臣鄉推世胄兩葉八座公承其後蚤謝紈綺之習遂擅文儒之右課詞非鮑謝不談論文則漢秦是究爰揮霍乎藻思蔚朝華而夕秀雖字畫之細㣲亦鍾王其步驟故白氏自尚書公以來賔客滿海内而公少年聲價遂籍籍乎人口及卅四而登第衆已謂其屈乆歴春曹與青宫惟才藝之堪授忽賜玦而逺投何竒數之見遘幾逡巡乎州郡復郎署之入又晩稍遷乎璽卿近龍光於宻宥謂天衢之既亨痛長駕之中覆惟令子兮承芳可謂死而不朽憶先給事之與尚書中丞兩公實同朝而契厚及愚父子䝉先人之業復與公仕途而相邂逅禁門鐘漏幾廽聮珮而追隨鄉園花月累歳慇懃乎杯酒兹就賔位而恍惚猶疑音容之在覯廼寄詞于一哀兼特牢以為侑惟公其鑒之祭丘思菴文自余少時頗負迂僻空濶乎寥廓之翔而泥滓乎鄉人之處糠粃乎世故而蠓蠛乎禮法然間以語人則人漫不省為何説余見世人所為小者計刀錐之獲大者競旂常之勲粗者土偶乎衣㡌履綦細者筆舌乎儒墨是非零碎乎米鹽甕盎劻勷於弔慶酒餔熬鼎旋蟻無頃時休則余亦不省為何事以是踽然四顧幾成怪人里閈之間一見吾子遂託金石以為可與同心者在古惟漆園生在今惟子而已自是徃還旦必建燭宵必及鐘或子言而我諾或我嘲而子噱或談鋒競起或閴然一黙子既睨空一世而偶余余亦塊然獨居而偕子然不知者則以為吾兩人皆若狂其知者則以為相與切劘文章砥礪節氣而已至其散髪而箕踞瞬目而跳嘯其所快然㑹意處雖余兩人亦不能自知也但覺吾見子則然見人則不然耳及余以雕蟲末技得厠聲利之塗餂腥染膏終日攢眉而子以樗櫟託跡遂志寂寞之野茹菽齒氷終日嬉嬉然子在寂寞之野而余未嘗羡子之髙余涉聲利之塗而子未嘗疑我之膩以為猶是心也余以踈率果非適用屢進屢黜得返初服以從子子見余且泣且笑曰不意子之能自全也自是相與過從議論如曩時而情好有加焉子自三十以外則已决意絶進取然子重㢘耻故不能妄得一錢子性髙簡故又不能治生居常授書為生卒以懶罷已而賣藥為生又以懶罷而獨注意攻古文詞上摹秦漢然復以病罷棲棲環堵饘粥不聊既乃從禄仕得寜陽教諭雖非素所好然亦以謂此官可隱也葢莊生所云蒿目而憂世决性命以饕富貴此兩者皆謂之天弢而子皆解之余趣向雖與子同然能解其一而猶未能脫然於其一常以愧子而子乃更以余為是也余近年懶病亦如子乃始不復蒿目於世而子不及見矣不知子尚以余為是邪為非是耶子交游甚簡然人或託以事最忠信可仗余嘗中夜與子卧偶論一二心事妻子不得聞者子曰吾恨不為浣紗女余笑曰子之信豈待投瀬哉嗟乎自子之存吾於鄉曲得友一人焉自子之沒則一人亦盡矣雖然子子桑扈也吾豈敢以慟累子之魂聊述吾兩人平生所以相與於世外者以告子嗚呼子死矣其無有發余之狂言乎雖然子有不死者其尚能聽余之狂言矣乎荆川集巻九欽定四庫全書荆川集巻十明唐順之撰墓誌銘僉事孫公墓誌銘公諱璽字朝信嘉興平湖人也其先世徙自松江之華亭所居南有九峰東有盛溪因自號峰溪道人𢎞治辛酉舉浙江鄉試登正德戊辰進士除興化知縣四年陞揚州府同知幾年陞南京宗人府經歴尋丁外艱服除陞山東按察司僉事提督京畿屯餉調雲南僉事坐撫按搆怨奏逮二司是時公已陞山西參議矣仍落山西僉事乙未朝覲之歳以老罷歸最前後仕途二十八年歸十年而卒年七十有一嘉靖甲辰六月二日也公為人寛厚持重内剛外和其所居官不擇劇易不計利害智巧所避毅然任之其有蹉跌亦不為悔嘗言興利易而除害難然除害所以興利也其在興化興化豪徐恩與其宗人交賂權貴猾賊邑中恩以白衣入粟補興化所千户綰所印而所中諸世千户反悒悒出思下不敢喘令丞左右亦多為恩耳目者率常把令丞隂事令丞欲圖恩懼不能制得反噬公始至恩繡胸背持刺上謁公拒却之然亦未遽誦言罪恩也而邑人亦無敢告言恩者乃稍稍以輕罪笞其一二宗人以風指百姓百姓乃敢告恩最後得其謀殺道姑攫財事遂宻擒恩獄中考按盡得恩與其宗人諸不法狀因繫殺恩而宗人坐死者數人邑中為清公始至邑歳饑捐公廪代民輸自是孜孜民隱平徭清賦養老長孤居數年邑以治稱去之日邑人攀擁不得行而徐豪家獨銜公不已伺公去即持金數千走京師賂閹官瑞蘄反其獄且中公奏下廵鹽張御史正德時諸閹專而瑞尤有名所謂瑞張也御史顧望窮索公過失數月不得則令公與豪家同囚繫困辱之乃為書抵御史其語深切抉摘御史隱曲御火得書大慙恧竟引疾去後代者至踰年其事乃白已而為揚州府同知揚興化所屬郡也始御史之勘徐獄也以屬淮安守某盱眙令某咸受賂詭法巧詆公罪不克至是兩人為他御史所論公又徃勘之罪不至罷卒從減論後兩人愧謝公公絶口不道前事人益以為長者同知職清軍而軍解失文據者例充軍時解人當坐者若干人公請於上官以為軍一人則解者二人解者軍則别解者又四人矣牽連無已時請限以一月首免别給文以行便上官下其法所部郡邑為例頃之淮揚饑公往賑泰州所活凡三萬餘人是時宸濠反江西攻安慶公奉檄守儀真扼江之衝捕儀賔之為諜者與其黨十餘人勑旌其功嘗以僉事奉命丈皇莊草塲地土清其地之為奄戚所漁奪者悉歸之民薊州銀冶盗嘯聚千餘乘利據險為患公攝兵備選能吏馳上山寨榜示禍福各自縛詣公公罪其首餘牒遣復業及徙雲南分廵洱海道麗江土官川蜀争金沙江讐殺公㑹勘其事土官以土金賂同勘者乆伺卒莫敢賂公由此解讐奉約束如故大同經兩亂後卒伍驕悍少不當意輒負怙跳躑以為常公以山西僉事廵大同盡心撫馭人頼安堵頃之濟農入㓂斬首多以贊畫功賜金自為令即力薫大豪及在薊州洱海大同倥偬邊塞炎荒反側兵戈之間而勘地土時則尤以一文吏與貂璫肺腑争氣力上下公處之未嘗不辦竟以不能俯仰故不至大官在山西嘗衣豸衣見廵按廵按怒以為慢已因考察中之遂以罷自知縣徙同知自同知徙經歴也亦坐不能曲事郷大夫之有力者故卒為所擠尤不喜通權貴人為山東僉事時以屯田居京師乆之永嘉張公為相故交也同年桂公為冡宰未嘗一私伺其門以是往往齟齬于世至其清修之節則人亦不得而疵也總兵某嘗間餽寳帶鈎不啟封而還之雲南夷俗廵守行部輒有饋獻納則喜拒則疑且恚公拒之卒無敢疑且恚者大理經歴以郷人故潛置蒼石文書簏中假公移投入公亦潛還之不發其事平生自俸貲外無所取其俸貲亦多以散諸宗姻族卒之日篋笥敝衣而已性尤喜詩自罷歸居間則詩益多有雲山履歴稿藏于家公之先諱某者居華亭國初被薦署縣學教諭事至公之祖諱忠自華亭徙平湖者也父諱軒封宗人府經歴母張氏贈宜人子女各一人子植舉進士為刑部主事植始聞公病脾䟽請歸養歸踰年而公卒將葬植來請銘余以未及識公固辭植曰余先君則知子矣先君毎誦子之文而得子之為人恨老不及見子此行葢先君意也因涕泣固請嗟乎余何足以辱公之知而亦烏能有述於公也哉於是按公之壻禮部員外郎錢萱所為狀與公所上張御史書論徐豪事而次序之不敢増損焉懼失實也銘曰噬嗑腊肉或遇之毒終利用獄盤桓居貞有膏其屯卒困於臀嗚呼古稱巧宦四至九卿公豈其拙我則是銘張運使墓碑銘張公諱愷字元之號企齋後更以其所居為號曰東洛先世居江隂至公父始徙無錫故今為無錫人公以成化甲辰中進士遭父喪服除授兵部職方司主事守山海關任滿改刑部主事落職為順德府管馬通判歴東平州知州黎平府知府又落職家居用言官薦起知太原府未任轉福建都轉運鹽使司運使致仕歸凡若干年而卒年八十有六為人狷介自植於不潔一無所屑其居官所至公亷執法不肯小有所詘其志其在山海關關故籍錢於旅人以給官用公即移檄永平府使量出官帑代其費至今便之歴順德東平黎平三州郡皆有惠利在民務先禮教而後誅罸其自東平徙黎平也東平人至涕泣遮道不忍其去公平生既不受人一介人亦不敢輕以一介溷公自為進士服除赴選邑令贐之二十金公謝却之其後為運使罷歸諸賈人力請致羡餘九百金於公公拒弗内也獨在東平時受一帶於郡人太守張鄜鄜重義人也年九十餘矣未嘗謁於有司公去東平獨率子弟出餞且請贈公兩帶公辭不獲而受其一惟公能致鄜之出惟鄜能致公之受葢兩相為重云其在黎平黎平所治苖獠獸伏谿峝間頑獷不可覊紲而府治寓湖廣五開衛城諸苖入辦税錢率為官軍攫取不敢入以是多逋課又舊設撫苗官苞苴黷貨大為諸苖害公力請罷之且移文湖廣諸司嚴戢官軍由是諸苖始出入城郭無所苦而税錢得完諸苖有仇殺積十餘年不解者公與刻日為盟遂解去自是賢聲著蠻中在運司公清如州郡時鈐束貴勢人不得占鹽公雖以㢘幹强直為上下所快亦以此取嫉於人故屢奮而屢蹶其自刑曹而出順德也坐中官羅織諸曹或謂公居曹未乆可自白公曰諸曹皆無辜我何用獨免為在黎平上官以不時謁為咎然竟不徃因齟齬力請謝病值閹瑾怒罸米奪官則又蹶在運司為忌者所論則又蹶硜硜不肯少貶而世遂亦不能容公然其忠信著乎其官靖節孚乎其郷則雖嫉公者固亦不得掩也公壯歳嚴毅晩更益以寛和絶聲色綺麗愽奕之好罷歸三十餘年未嘗一詣公府里人髙其義有曲直多就公决公死時篋中無一金之積嘗有盗夜突入其室發篋空無所得怏怏去公為詩識之曰平生不受一文賄垂老猶疑千鏹藏所著有詩文若干巻及偹遺録補贊四臣事評螾竅餘音諸書共若干巻藏於家張氏先世皆不仕而公父禶以公故贈奉議大夫娶於鄧而生公自公之存諸子諸孫已至二十餘人皆為儒稱其家風其詳在狀誌中公卒於嘉靖戊戌五月八日次子塘等將葬公於萬安郷之新阡啟公配過華二宜人之兆合焉而以墓道之碑請於余余昔讀貢禹有言居官而致富者為雄桀處家而得利者為豪雋夫漢之俗尚近古然已如此又何責於後世之靡靡者乎以余耳目所見聞有不勝可慨者也然則銘公其可辭銘曰世下而趨純白日渝皦皦張公潔志勵行始官刑曹值閹見傾與僚同禍而不自明骯髒獨信遂與世屯既奮而飛復曵其輪好公嫉公世有千態惟公抗節終始一槩公歸於家四壁故廬閉門終日左圖右書繁華滿前公一不好枵然空篋為盗之笑三十餘年不出户庭郷人慕公曰此典刑郷人慕公曲直就辨縉紳慕公罕見其面如公篤行今也則亡刻辭於墓以愧墨夫吏部郎中薛西原墓誌銘西原先生姓薛氏名蕙字君采先生憫學者漓于多岐作約言學者執言詮以求見聖人之心而不能自見其心也作五經雜説方士穿鑿乎性命之外而不知養性之為養生也世儒泥象于有無之内而不知無為之為有為也作老子解先生之學無所不窺不名一家中歳始好養生家言自是絶去文字收歛耳目澄慮黙照如是者若干年而卒未之有得也乆之乃悟曰此生死障耳不足學然因是讀老子及瞿曇氏書得其虚静慧寂之説不逆于心已而證之六經及濂洛諸説至於中庸喜怒哀樂未發之謂中曰是矣是矣故其學一以復性為鵠以慎獨為括以喜怒哀樂未發為奥以能知未發而至之為竅自是收歛耳目澄慮黙照如是者又若干年而後信乎其心其自信之確也而後著之于書嗚呼心學之亡乆矣有一人焉倡為本心之説衆且譁然老佛而詆之矣學者避老佛之形而畏其景雖精㣲之論出于古聖賢者且惑而不敢信矣先生直援世儒之所最詆者以自信而不惑其特立者歟先生少嘗刻鏤于詩世絶喜其工今所傳西原集者其少作也既有志于道則棄不復為雖為之亦絶不較工與否然西原集世争慕效之而約言老子解好者希矣先生以正德甲戌舉進士授刑部主事病免起為刑部主事以才調吏部主事嘉靖中先生在吏部歴考功司郎中而罷歸十八年辛丑正月九日以病卒于家年五十有三其罷也坐論大禮先生自為刑部時值武廟南狩抗䟽諌禍叵測先生晏然後大禮之議起廼撰為人後解為人後辨奏入下獄已而復其官然已為權貴人所不釋矣已而竟主給事中某搆先生罪先生上書訟坐是罷後所搆事解吏部數移文促先生赴官時權貴人且張甚曰是可褰裳而蹈淵也哉竟屢薦不復起先生貌臞氣清行已素峻潔其才雖髙然坦易洞朗破去厓岸豪傑皆慕與之交其庸衆亦無所嫉者獨以一二權貴人故至一斥遂不用先生方且藝圃灌花澹如也居郷絶不肯為人干請至戚里有疾親為之檢方製藥嘗脱綿襖施凍者或曰焉得人人而濟之曰吾不愧此心耳始號西原居士後扁其齋曰大寜齋更號大寕齋居士而世猶稱西原先生云薛氏故𨽻偃師國初以戍武平遂為亳人祖琇父封吏部主事曰鎰自封主事君而上皆不顯然世推長者妣楊安人生三子先生其仲也與其季萱皆無子而伯兄蘭有一子曰存先生與蘭友愛甚其沒也蘭為之經紀其喪將葬先生于亳城南先塋之次而緘其遺書請銘於余無何蘭使人來速銘且告葬期曰卒之歳某月某日近矣曩先生嘗寓書于余叩以致虚極守静篤與未發之中其㫖同異余未及復請於先生也竊妄意之寂而未嘗無感而未嘗有吾儒之所指為中也乎内有鍵而不出外有扞而不入老氏之所指為虚静也乎以是復于先生先生其許我哉雖然先生之註老子則可謂得其髓者矣乃竊取先生之意而為之銘曰在昔老耼握𤣥化樞人皆競巧已獨若愚吾師嘆焉其猶龍乎棼棼末學枝葉日繁豈不莞然而撥其根維耼之生實是譙亳寂寥至今西原有作閉户獨窺㣲言五千參諸孔庭獲我同然孔曰未發耼曰静虚立教有二其究豈殊譬如入海所貴得珠其所從入孰一其途自是反躬精思力踐黙然一悟與天游衍亳之南墟有鬱其墳嗚呼西原其尚何存吏部郎中林東城墓誌銘嗚呼吾友東城林君古所謂敦行君子也紛華盛麗耳目之好一不膩乎其外獧巧慧辨機智之習一不鉤乎其心潔以律乎其身一束修之問畏之若苞苴然謙以裕乎其人一輿臺之賤接之若賔友然行必愜乎人之所安故不為嵬崖嶄嶻之行言必衡乎力之所抵故不為要眇浮濶之言嘉靖辛丑十一月二十日以吏部文選司郎中卒于京師年四十有四出其槖得銀四兩不能棺其寮友為之棺以歸歸不能葬郡守朱君州守黎君賻之錢以葬而黎君又使君之友陸位等狀君之行來請銘朱君黎君君在文選時所選亷平吏治其鄉者也君諱春字子仁始號方城以其先福建福清縣方城里人後改東城祖諱某父諱宏母某氏自君幾世而上有諱閏者始自福清以從戎𨽻泰州守禦所故君為泰州人林氏自徙泰州未有以儒顯者為儒自君始後君貴始贈其父宏為吏部文選司主事而封母某氏為太安人君始以窘故幾廢書者屢矣君讀書居常以竹筩注膏繫衣帶間惟所適則出膏於筩燃火讀書君父為漕卒君又獨與母妻織屨織屨讀書率以夜不睡嘗日中不能炊貰米於隣不得君行歌自若家人頗非怪之君自若君是時堅苦已如是已而受學於知州王君某與其郷先生王君汝止兩王君故王陽明先生弟子君因此始聞致良知之説則心喜之至夜中睡醒無人處輒嘖嘖自喜不休遂欲以躬踐之則日以朱墨筆㸃記其意向臧否醇雜以自攷鏡乆之乃悟曰此治病於標者也於是駸駸有意乎反本矣戊子舉郷試壬辰舉㑹試第一登進士第選户部廣西司主事調禮部主客司主事又自禮部調吏部文選司主事吏部故矜厓岸鎻門謝賔客雖親故人不徃拜示自尊重而吏部以提熱柄故雖諸寮中率自羯羠相猜抵君色温氣柔不以行能先人其在諸寮中惴惴下之唯謹其在同志中雖其名位絶不相埒者惴惴下之唯謹門無留賔日旰出部則徧走剌答諸賔客或羅致諸賔客講學意烝烝如也諸賔客人人自以林君親已其尤厚者則相與挾衾被櫛具徃宿觀寺中講學竟夕以為常後為郎中官重益多事矣然猶如此以此諸寮中雖其志行與君絶不入者亦謂君長者不復猜也而善類因君以聮者為多君自束髪至葢棺未嘗一日不講學然君本以長厚清苦繩墨自立其於學也亦因其質之所近君為主事是時縉紳之士以講學㑹京師者數十人其聰明解悟能發揮師説者則多推山隂王君汝中其志行愊實則多推君與吉水羅君達夫羅君於朋友中最沉宻矣然君猶面疵羅君以其露才也君之自歛可知已王君汝中洒落而君小心周慎畫尺寸不敢失兩人操行不同然君獨心敬王君為主事乆之轉驗封員外郎已而調文選司員外郎居一年母安人病癱卧君謝病歸養君居鄉則益惴惴謹甚如故儒生時家無一錢亦不以取於人家有一錢亦必以施於人侍母安人病病少間則出寓故所讀書處萬壽宫者與其故時友人及鄉之後生講學以其間走安豐就其故師王君叩所疑義毎徃必喜幸以為聞所未聞君於師推王君汝止於友推王君汝中君居官有未識王汝止者君與之言必曰吾師心齋説如是君居鄉有未識王汝中者君與之言必曰吾友龍溪説如是居乆之赴官補稽勲郎中調文選郎君自為吏部主事泰州守某黷而虐君請於尚書黜之泰君鄉也尚書趦趄曰某未有劾者柰何君曰不實則罷主事遂以其人調邉地頃之南御史劾章至則其人也竟黜之後君赴官泊淮淮守某以次謁諸過客舟始及君供張又薄若不知君為吏部者後淮守入覲考下當逺調君為稽勲郎具白尚書以過淮事薦其㢘静懇乞留之更得調永平内郡二者其一逺嫌者不敢為其一怙勢者不能為而君為吏部若此然君長者常䕶人短其請黜泰州守事則尤為君所難君既長選事益思薦進賢人慎擇監司守令洗刷奉其職然事有曵掣或不能盡如所欲為則君自謂曰選曹之職欲上通於君與相冡宰之心下通於選人與天下人之心相冡宰之心未必選人與天下人之心選人與天下人之心未必相冡宰之心選曹居其間欲兩合焉難矣雖然求無負乎吾心足矣君始調文選㑹御史論君受牌坊銀事雖衆以為妄然君獨自念束髪兢兢砥行遭㸃染居常引咎不愜欲解官又業已為之既任事又曵掣縮縮不自得曹又多事君日夜其間固甚瘁居無何病一夕卒卒之日猶在曹不自知病病且革乃舁歸舎先是君嘗㑹朋友講曽子啟手足意懇惻聞者皆怵愓未數日君遂卒君問學幾二十年其膠解凍釋未知其何如也然自同志中語質行者必歸君君娶李氏封安人子四人曉暉曜昕曉檏而材能似君者也為庠生妻某氏暉聘某氏女一嫁王用賔葬以卒之明年某月某日墓在某所君不喜為華詞其舉第一應試文字及後所為詩古文務理道質而不艷如其人始君㓜不知書父故苦貧也不能資君以書以餘子給事千户王某所某竒君令與其子王烈同學書君自是始學書後父數見君讀書且喜且嗤之曰兒讀書固善然書可飽乎因取其書欲燒之君婉詞跪謝乃解後君貴常恩王氏厚報之自王烈以下禮節稱謂歳時起居一不改於故餘子時銘曰君嘗有言天然之門盎然出之不作好醜不為我偶不為人觭大心之窟如彼日月光照四垂樓臺殿闕糞壤䑕穴亦所不遺藏疾於藪有茹其垢蓄德之資有如寳然玉金在前其耀不施君子若愚䁔䁔姝姝不其淺而我韻君語勒石於墓式昭世規唐郎中嘿菴墓誌銘嘉靖乙已三月二十九日刑部郎中嘿菴唐君卒於南京之官舎貧不能具棺殮尚書及諸寮賻之錢若干乃棺以還其家而知縣茅君又賻之錢為葬具茅君又將因邑諸生之請為之請於上司而祀君於鄉賢祠而以書來請銘君嘗為永豐知縣武定州知州吏民為之生祠以祀君謹按君在鎮江為鄉先生在永豐武定為循吏於銘法宜於是採君之姻友舉人陳君佐所為狀為之敘而銘之君諱侃字廷直號嘿菴家於丹徒之開沙祖諱用父贈南京刑部郎中諱漢母贈宜人嚴氏年十六入郡學為諸生正德癸酉舉於鄉乆之以選為永豐知縣遷武定州知州已而擢南京刑部員外郎轉郎中君自束髪至葢棺未嘗一日不兢兢砥礪名檢然於亷耻大閑則若生而成之年二十獨居所讀書處夜有奔者君峻拒之明旦遂移其處終不以其故語人為舉人入國學時出游得巨商所遺金不啟囊而還之君自少時其於貨利聲色中能嶄然不為所汙染若此平生尤以忠孝氣節自許為諸生時父以被囚繫上書請代弗得乃藉草地寢夏不帷冬不被如是者竟一年父免獄乃止居常清苦自刻及為州縣未嘗一日擕妻子數千里外獨與一二垢衣村僕相朝夕而飯蔬羮豆榻茅以居有寒士所絶不堪者君曰我素然其治永豐武定永豐為江西刁訟邑而武定為山東悍州君既素豈弟長者務掩人瑕疵其為吏尤欲以古教化先之不忍以㪣朴苛細為能故所設科條其始若甚迂濶乆之真誠溢出吏民至不忍欺紿遂以辦治稱江西俗尚鬼而永豐有嶽神祠居人奔走雜男女香火無空日永豐又素善為優閭里浸滛傳習謂永豐腔使民淫於欲而匱於財君曰此大蠧也立痛革之君為縣其有理之言雖賤吏必改容謝之立為之行其無理雖權勢人百方為請毫釐無所假借寛貸以是君居縣數年告訐請託之俗為之一變其在武定則尤以鎮静拊綏疲人嘉靖戊戌章聖梓宫徃承天道山東上官檄君德州供張至則諸内奄牌校横索百端挾威凌侮聲勢詾甚奴叱諸尊官鞭撻州縣假言供張不辦捕死矣欲以恐嚇錢物諸同事者皆懼逃去君獨横身當之先是君命從者舁一空棺宻置旁舎中及諸人索錢急君佯謂曰吾與若詣錢所受錢乃引之旁舎中指棺示之曰吾已辦死矣錢終不可得也諸人乃稍稍引去事遂以辦始君受命上官裒民間財甚鉅欲盡以給君猶恐不塞君曰以半往足矣至是所需又不及其半而以其餘還之公帑諸逃者皆被劾逮去而君乃受旌君本長者居常怡愉簡黙温温不見臧否其為吏尤悃愊至其臨利害乃出鋒鍔片言折伏豪索敏鋭集事絶出於精悍吏所不及如此君所居官率空槖以歸及朝覲考滿入京師又率空槖以行以是著節聲亦以是淹滯於世為州縣皆五六年而後遷然而上官亦往往有知君者至為考曰㢘介若趙清獻人以為不誣在郡縣乆人情吏事益練居刑曹尤以執法得情著聞君卒時年五十有九子果府學生先君一月卒女二壻李某王謚孫男三思忠思信㓜者未名始君同邑有易洞丁君者好古道明於易以傳其子補齋君璣尤刻意清苦風節竦一時君為補齋入室弟子其風節亦似其師君又善教誘鄉里後進從君游者君誨之不專以文藝毎曰須使此心無愧神明可也其弟子浸浸有知嚮方者若朱錫王春王合節輩其著也合節以女婚君之孤孫君之卒也為之經紀其家而速余銘以終君之葬者亦合節也銘曰凡人為吏㢘者或刻惟君長厚温温悃愊凡人於鄉貞毎絶俗惟君渾然不露畛域州邑有言此吾卓侯鄉閭有言近古太丘經紀其家弟子事師賻葬崇祀是在有司考終譔美太史則宜李郎中墓誌銘公姓李氏諱儒字宗文其先自嘉興徙居華亭之陸磊塘又徙泗涇於是世為華亭人大父諱常父諱柬以公故贈南京禮部主事李氏自贈主事公而上世以讀書好禮望于鄉然皆隐而弗耀至公始顯公亦乆而後發自為邑庠生凡若干年而入太學又若干年為正德庚午始舉于鄉明年辛未中㑹試又病不能廷對至甲戌始第進士公年四十餘矣人以為公蓄乆而發之遲且蘄于速售而公見時事不可其意遂謝病以去自是家居者又十年葢未嘗一日歴乎其官而亦已澹然無復有冀于世也因自號宜散以見其志㑹嘉靖初今天子詔起恬退之士若干人而公名在數中于是始就選為建寜推官屬郡缺守公攝守事凡一切利害當罷行者無不悉力為之未嘗以攝守故自苟而郡中望公亦如真守是以公雖佐郡而居守之日為多雖職專平刑而澤之及人不獨鞫訊讞論間而已為推官若干年擢南京禮部祠祭司主事南部為散吏而祠祭為清曹經歳不知案牘公之靖約尤宜于其官又三年陞南京刑部郎中公年五十有七人謂公尚可以待而公已决于去矣于是請老而歸者又八年而終是為嘉靖丁酉四月二十七日也嗚呼士之勇于進怯于退而忘其自潔也乆矣公之行在古人不為竒然求之今世得數人焉如公者何其少也然就公而論則有兩説去于郎中之時者猶為易而去于進士之時者則為難葢宦成而不能去者有矣未有始進而必去者也去于正德之時者猶為易而去于嘉靖之時者則為難葢遇濁世而不能去者有矣未有治朝而必去者也豈莊生所謂以簮笏為柴栅者公固其人歟然公得以極幽居之樂而自肆于園池竹石之間優游而至于老此其所得較之老死汩沒于奔走者何如也則公之髙於人逺矣公儉朴而寡欲糲飰敝衣終身常然雖在官中亦然自建寜歸不載行李惟破篋貯書數巻而已公資于身者薄故繫于物者輕繫于物者輕故能處紛華而不留甘寂寞而不厭如是而世能攖之者少矣而况于一官之去就歟嘉靖庚寅予以年家子弟識公于潞河竊窺公貌古而氣清蕭然如在江海之上則未嘗不慕其為人退而詢其履歴尤可慕也後幾年而公卒諸子子忠等將葬公而以長史吳君所為狀請銘于予于是知公為尤詳公孝弟修于其家㢘譲信乎其鄉多出于人之所難然公既以恬退有聞他可不具書也公母劉與繼母張皆贈安人配王封安人禮部員外郎諱臯之女子四人子忠子誠子欽子良子欽早卒餘三子皆太學生女二人壻太學生唐自明鄉進士姚篚孫男四人開閶闔闢開為邑庠生孫女四人初公之生母劉以産死故公平生痛母最深後諸子毎欲為公擇葬地公輒泫然止之曰吾死必邇吾母于是子忠等葬公于某地先塋之次從公志也葬以卒之某年月日嗚呼是其可銘也已銘曰道世交喪潔者寡得車彌多䑛彌下如蠅集垢檏不捨泊然不繫惟公者衆注以金獨以瓦百年考德在此也户部郎中林君墓誌銘林氏之先自莆田徙居晉江之永福里君髙祖梅徴孝㢘不就父嶤縣學生方貢於太學㑹君貴推恩封承德郎户部主事母李氏贈安人君諱性之字帥吾六川其號自少受書於主事君君學既有所受而精之以思多所自得其所説易中庸時義自為庠生時諸經生則已遵信之如前輩人已而乆不第諸經生則益遵信其説如已第者所居教授常數十人僉事蕭君請以為子師賔禮之僉事有所屬吏以贓敗因私於君曰君脱我我厚謝君君曰某書生耳知為師授弟子經他非所敢聞也其人愧謝去嘉靖元年舉於鄉八年舉進士授浙江麗水縣知縣三年擢南京户部山西司主事監龍江天䇿諸衛倉丁主事君憂服除改户部浙江司主事為尚書梁公材所知委監龍慶古北口倉三年遷貴州司員外郎監天津倉以病乞改南京遂遷南京户部廣西司郎中過家病卒年五十二君為人悃愊質訥葸葸細謹世俗一切鉤距機警鑿空籠罩之巧非特有所耻而不為亦若其性有所必不可移而為之然者以是居鄉亦以是為吏以是待其良吏民亦以是待其頑吏民所至未嘗一有所變其始令麗水也或以麗水巖邑非撃搏不可集事君唯唯然竟不變乆之邑亦以治而豪黠吏空手坐曹中至不能具饘糜山谷素捍文網之民有十餘年名捕不能得而涕泣頓首歸誠於君之一言者邑故有窑課後窑户以課重徙盡則均其課於並窑居人之不為窑者至君疏除其額凡若干㑹造籍時里中以竄絶自言者三十餘户吏以為無故減三十餘户且得罪君竟減之守令本以盈課額多户口為功最而君之為令葢如此律令倉法最重坐者徃徃累死而老倉曹方收粟時貪升斗之賄不擇美惡乾濕歳乆浥爛輒繫死不能賠死則連繫其妻子坐監龍江倉時欵欵戒語其屬曰柰何以升斗故坐重法乎頃之適有浥爛坐罪者君輒愀然曰柰何以升斗故坐人重法乎遂命發數倉粟與其浥爛者均給於軍曰此一軍所虧粟粒耳于是諸屬感泣至不忍犯法其在龍慶以為商賈邉儲所本商賈病則粟不來粟不來則邉人坐困故一切條去其所不便髙其價以招之自是粟溢於廪而君得以時其出納以濟邉人之急至在天津時值倉粟空又寒凍餉道阻軍無所食君即奏請發旁近徳州倉粟給天津軍三月食或謂于法不得相借君不為止已而朝廷竟從君議當是時㣲君一軍幾詾詾君本細謹畏事為户部慎出納守尺寸法不敢失至其越法有所移用如天津時事而曲法有所寛貸如龍江倉時事有足多者仕宦十五六年歴縣令戸曹最乆家無多貲割田四十畝以給族人之不能婚與葬者居鄉縮縮循謹甚既卒邑諸生具君行誼請祀君鄉賢祠有司覈實如諸生言君娶云云于是君之鄉人洪君朝選狀君之行而一新且因洪君以請銘於余余嘗識君於同年中以為他人忠詐險易非乆與之處不能知至君可望而知也為之銘曰百姓之譽可以非道干鄉曲之聞可以詭行得葢其暫也或然而乆則未嘗不忒惟君既去而邑人以思既沒而鄉人是式吾據是以為銘庶幾不蔽乎君之德施推官墓誌銘公無錫人也姓施氏諱誾字克和自號静觀居士以貢為平樂府推官致仕歸凡十六年今年嘉靖丁酉七月一日卒年七十有七越三月辛亥望日葬于惠山從先人之兆也公自少讀書能為文章及年五十餘始得官而平樂在南荒水陸之途且七八千里公素踈散不喜為吏雖强往非其樂也滿三載卒棄去公磊犖魁岸負氣少所屈下又善談對客呫呫不休意所蓄藏如噎物必吐之乃已故不能媕婀以乆于官亦不能沉浮以媚于鄉里或有過雖親故必剖露無所隱或不可其意雖貴勢必衆中噍罵之恐其不聞以是人多畏其口為推官時值猺酋放横上官以公口辨遣入谿峝中諭酋酋為之愧屈剽掠一息性喜為詩尤好陸放翁之作所著有北遊録粤南紀游静翁遺稿其中所載詩為多大抵皆師放翁而似之者其在平樂意所感慨亦徃徃寓之於詩郡産蓮酒諸貴官往往下郡恣所取無限度民苦之公曰酒有盡而索者無盡雖涸江水為酒亦不能給也因作詩以諷諸貴官慙之自是少索蓮酒者既罷歸家無厚儲則一以其力寓之于詩後年益老病痺家益蕭然公絶不以屑意而吟詩如故既病痺不可起公曰世所謂諱死者此騃孺子耳死即死何足藉乎及死猶自謔曰吾如負債者今限滿須償耳嗚呼此豈所謂達人者耶公父諱㢘為醫學訓科施故醫也至訓科名益顯訓科子惟公一人而有女二一女嫁于龔訓科君所命公字而子之名漸者龔氏妹所生子也初公未有子因子漸于是尚冀自有子也後公果自有子曰渙矣復夭死故漸未歸龔氏雖自渙在時公愛漸與渙等漸有子陽得公亦撫而教之如其孫公卒漸行三年喪以子報之觀公之所以待漸與漸之所以報公者鄉人皆以為厚而余以此未知公之心也嗚呼甥舅之不相為後也乆矣古者縁恩以制服據義以立宗故袒免無服之族人且得相後而功服之甥舅且不得相後是古人所以敬祖重宗也誰能易之以公之意固知漸之不能乆于施氏而况施氏之有後無後固不在漸矣觀公嘗録水東日記所載周氏之事及朱子答汪尚書之書而自題其後葢不以周氏之祭其外家為是而必以朱子為外家立後之言為不可易也此固公之所以隂屬意于漸者與公之力既不及自為而有待于漸漸之力于今又未能為也將有待于其後與漸好古知禮必能愛公以德而不負于公也公有女一人嫁莫因余與漸雅善雖不足以知公然漸之請不可辭乃序而銘曰古者立後惟祧是守惟族無逺族異則否公選于族未得其人我施自出甥也則親曰字我甥以待有子天胡不然有子而死公所未為甥能代之施鬼無餒終將頼之若古有訓愛之在德預為此言以勒幽石知縣胡君墓誌銘君既卒而余往弔其家君之弟露出所遺囑示余大要教諸子弟孝友㢘謹退讓或各随其材性所病而分與之藥井井一如家人居常語其字畫遒謹亦與君平時手書無異葢前屬纊三日也及屬纊露請訣無他言第曰做人做人嗟乎死生亦大矣能精明若是是足以知君矣君年四十餘游南都師事呂先生仲木鄒先生謙之始聞古儒者之學時尚以牽於舉業故未能竟其意也君自南都歸而余罷編修家居時時與其弟露候余君峭立直剛而露恂恂朴實余心喜兩君之為人毎相過輒竟日語其語大率世所謂迂僻者而兩君獨心喜之然君之意毎若恨于向未有聞先生長者之言既有聞于先生長者之言而已晩者余嘗謂之曰回頭即岸矣何晩之云嗟乎君今卒矣岸乎與否君其自知之矣而余竊謂觀君所以處死其足以知君者也君且卒囑其弟請余銘君之墓君諱雲字雨之號霽齋胡氏譜相傳以為安定先生之後自海陵徙無錫大父諱轅父諱岳號西崖君自㓜寡言笑不嬉弄不敏於他藝亦不習於便獧稍長習舉子業為文豐約拘縱有法其居庠所與游多豪士至戊子歳舉於鄉余亦以是歳舉己丑君下第入南監始見呂鄒兩師而問學焉乙未復試京師㑹聞母喪而奔哀號勞頓渉數千里入門骨立毎哭輒仆三月後始力疾營葬事三年未嘗展顔色自君痛西崖之早世也掲一聮於書舎曰思親毎憶臨危日對巻常懷赴考時弟露稍疾痛則君竟夕不寐露有三子接而殤也露顰君為之蹙於額露展君為之解於頥君之病也露左右寢處如子葢君所以感之戊戌又不第始就選為松陽知縣松陽處州屬邑也處州古稱難治而松陽僻在山巖中先是數饉於水又屬開鑛居人争駭散君周旋撫諭僅而安集其諸奄校以鑛事至者又競欲庖勃威君以浚於民而土人之不逞者又隂唆之君慷慨辨詰不少屈竟與抗禮君又素亷摭拾無所得其人至相誡曰毋生事非他縣比也是以鑛事首尾二年而民不甚騷君尤為分廵胡君有恒所知胡君介士也嘗謂君曰官如水衙如氷我最甘於清苦猶不及也松之俗嫁女破産雖富族亦多不舉女有踰四十不能妻者雖其良族亦率以搶婚為常事君患之始下令曰毋溺女溺女者重坐之又以為母子天性也惟痛節其送女之費則女可蕃女可蕃則搶婚可不禁而息又下令曰送女毋過若干過若干重坐之由是女亦浸育然去官竟以搶婚事也始諸生王宰聘徐女有豪者奪而婚諸其子君怒將置之法遂誣君於上官反覆辨詰乆之事白矣然竟以誤朝覲遂坐罷君性剛㣲類褊於人不能瓦合其為令尤不肯脂韋骫法務在惠貧弱抑豪强其抑豪强也取中法而已三年未嘗杖殺一人君既歸毎獨坐一小池亭或時與諸相知游息論學其間既老矣不復泛觀他書惟好王陽明先生文集日玩誦之有疾尚手摘其要語以為子孫訓其居閒非慶弔未嘗輒入郡邑城或時入郡城一問訊余也始君為小池石焉嵌以臨深字而問銘於余余未及銘而君卒矣于是銘其墓君娶云云銘曰衆之生也如偶借機自多其能逮其卒也如偶去機遂顛其靈君之生也趄趄踽踽不能為巧逮其卒也垂絶之言一何了了不遭於生而妥於死葢昔人有言豈以其重若彼而其輕若此興國州同知徐公墓誌銘復齋徐公既卒且葬而公之妻卞孺人實先公卒至是合焉子顯佶等詣余請銘余姻也宜銘公公諱徽字朝典家於武進新塘之板橋大父錡父封户部主事璟璟娶于陳為兵部尚書節愍公洽女孫封太恭人是生公公㓜讀書善記雋於文詞自為諸生及與余大父給事公同時給事公故名士而公伯兄朝文與馳騁上下兩人交相善也公妻又唐之自出與給事公有連公既師事伯兄而徃來於給事公所切劘砥淬其文益昌後伯兄與給事公同時登第去而公獨逡廵庠序間無所遇乆之始以貢為太學生則公年且四十餘矣又數年而選興國州同知楚俗皆窳而興國負山阻習獷悍同知職主賦頑黠逋租豻獄為積官司相沿一切以鞭箠鉗釱從事猶不能集公獨深隱之為弛其禁或時自割俸代之償興國人往往惠公然其頑尚逋租如故時態公終不痛繩督之其諸科條張設類多所縱舎公本魁岸峭直居鄉曲間不肯與齷齪輩游又不能忍人之過或面誚譲至其莅官行法乃更悃愊近人若此上官知公者亦厚奬之然乆之竟坐課殿罷罷官而家又貧恬如也性好奕既㞐閒則益以奕飲為樂或浪跡山水間閒則課諸孫句讀斥俗累一不挂心十餘年至嘉靖辛丑七月壬寅日乃卒年七十又七卞孺人父謨謨娶於唐給事公從姊於余從祖姑也能嫓德于公少公一歳先公三年卒墓在歐墓山公所卜也葬以公卒之明年正月二十八日銘曰仕不必達期適意處不必豐期無累隤然自足人間世亦有好逑諧厥志考終最德石以識訓導殷翁墓誌銘翁姓殷氏諱佐字時衡號龍巖無錫人也殷氏之先有諱序者舉進士遭遇文皇帝時自知州擢布政使布政生璉璉生廣成廣成娶於馬而生翁殷氏以布政公故閥閲推髙邑中其子弟相尚以志氣撑拄門户為事而翁居其間尤倜儻魁岸自喜然殷氏自布政公以儒術進至翁大父與父與諸昆弟則多隱於布衣而翁乃復自奮於儒翁昆弟四人而翁次在第三其長兄俊余嘗銘其墓秋野翁者也秋野既少代父治家事而翁因得專意於儒初布政公為四川布政時禦茂州叛夷有功活降者數萬人夷人立祠以祀翁始向學即慨然發憤曰吾先世功德不可無繼其業者而布政公故以詩舉進士為無錫首其後詩學既廢而邑中諸經師往往以尚書教授于是翁乃别授尚書翁既發憤於先世之業又無家累也以專其志故其誦習勤苦精究不間日夜夜率五鼓起以硫黄爇火然燭至旦為常既徧以講於邑中諸經師則又博求四方之精於經者為師其最著者同邑張運使愷華亭錢修撰福運使敦行人也修撰以文雄一時其尚書則用以魁禮部試者故翁耿介負氣不少媕阿於俗得之張氏其為文冠冕跌宕馳驟不詭繩墨得之錢氏為多翁在經師同門諸弟子中嶽嶽無所讓諸經師亦毎注意翁其為庠諸生在同庠諸生中嶽嶽無所讓諸提學及諸提調官毎試亦輒前翁乆之翁所與同經師及同庠諸名士往往登第去為達官而翁獨逡廵庠校中凡六舉而不一遇其後以乆次貢京師則翁年五十餘矣遂以貢選為贑之信豐訓導贑在嶺上信豐尤僻壤仕宦絶少翁至則以素所聞諸經師者切劘諸生信豐相傳地産蜈蚣而少蛇蛇或數十年蛇一出縣發科第一人翁始至一巨蛇出頃之有張生純者果得舉人以為是殷師之教也居二年力請致仕歸翁既歸而向時所與同經師同庠諸名士登第為達官者亦多解官家居其伯兄秋野翁亦既老而致家事於子矣翁家居則與秋野翁白首訢訢相對毎賔燕子弟環列或劔負兩翁兩翁蛇委其間而出則與其故人同時解官者相與結觴咏之㑹談説故事以時登眺為樂乆之翁病失明而故人亦零落且盡乃獨坐卧一室時時口誦所記憶少時所聞諸經師者以教子旦已而子旦篤於學行能文章有聲則翁喜謂可以卒先世之業而繼吾志矣翁為人貌偉少魁岸倜儻自負至老而其氣不衰年八十有二而病卒卒之日嘉靖乙巳九月十六日也翁配云云所著有龍巖稿藏於家旦以翁卒之明年十二月一日啟先嫡母之兆合葬于舜柯山祖塋之次旦與余善故翁之葬也旦來請銘銘曰其為諸生卅年不遇其師諸生二年以去究其初終不離庠序學此斆此弦誦書數博士傳經多在門生亦在其子既文且美謂翁數竒其偶在此趙府奉祀正王君墓誌銘趙府奉祀正曰徙崖王君者武進人也諱學字子静始以郡庠生入太學以太學生選今官未及行而卒年五十有四曽祖諱珩祖諱尹父諱覲母潘孺人自君以上世為武進鉅族人號之曰夾山王氏王故匡姓也其先有仕於宋者以國諱省子孫因之而既沒則稱故姓云妻華孺人為華君世明之女孺人無子而兩側室皆有子曰守謙守約皆為太學生守謙娶白君省夫女守約娶孔君敘修女女壻太學生邵鏊庠生曹悰太學生徐莘君卒之日為嘉靖丁酉二月丙辰葬於祖塋之次其地曰夾山其日曰卒之明年十有二月甲寅嗚呼君自少已為太學生宜其可以坐而注官然君章章句句晝諷而夜思瞿瞿然視其太學生常如白衣之不足以發乎其身君故饒於貲宜其可以坐而衣食其中然君督耕課織贏入而縮出瞿瞿然視其故貲常如空槖之不足以資乎其家視故貲如不足以資乎其家而欲振之君之志既種而穫矣視太學生如不足以發乎其身而欲進之則君以柅於命而不能偶也君自居郡庠至為太學生三十餘年嘗以庠生應舉者一以太學生應舉者三中間豈無可以冀於一售者然竟莫之售以老君既抑塞以至於垂老而後就選及選又獨得所謂王府官者王府官雖尊重然散地不持尺寸之權又老死不復遷轉君以故滋悒悒不樂居乆之或有談趙王之賢慫恿君者君以為然且躍然治行矣又遘疾竟以不起嗚呼悲夫君為人重厚絶不以口郵傳人過失人亦無有以口過過君者華孺人始歸於君有從嫁田三百畝君謝却之人以是重君而君貲雖饒然素儉約能甘貧士之所難其所衣常䟽布衣一衣可十許年食常蔬而不肉其過苦乃如是自其父母沒後奉養祖母三十年如一日不朝夕輕去左右是以君遲囬不肯就選雖其意欲有所須然亦以祖母故也君葬既有日於是君之二弟子庸子明戚君之不顯於世而懼其冺然於後也乃率其二姪以趙君克初所為狀詣余請銘余未及知君而嘗交於子庸子明間二君好學而文足以知其兄也已乃許之既論次其事又繫之以辭曰余觀漢之才士若枚乗鄒陽宦吳鄒陽又宦梁而相如宦於梁終能蜚聲天朝為漢詞臣使後世鴻漸之士莫不抵掌而慕焉彼獨非王國官耶何為今之沒沒而不著也如王君者縱不能宦逹然使其得曵裾王門而驂後乗於鴈池兎苑之間亦未為不遇也筮仕於始衰方就官而殞身若有或遲之或速之然者此豈可不謂之數耶范蠡有言既已施於國吾欲用之家君雖無所試於世然跡其施諸家者亦略可睹矣都督沈紫江生墓碑記沈氏世官奉議衛其先臨淮人也有諱葆者髙皇帝時以功授湖廣蘄州衛指揮同知改廣西馴象衛葆傳子忠調奉議衛景泰間遷奉議衛於貴縣於是沈氏家貴縣忠三傳至錠皆世官錠以功陞指揮使子瑛襲指揮使娶于鮑生公公既貴而贈祖父皆都指揮同知祖母母皆夫人公名希儀字唐佐以生時紫水出故號紫江自少英氣磊磊雄膽略廣俗尚弩而公獨精弓射能挽强命中正德三年襲指揮使年十八掌衛印八年剿木頭十二年征永安剿陳村所至常先大軍摧鋒毒弩中膊中股陞都指揮僉事十四年征府江剿滑石殱之奪還賊所鹵掠剿義寜桑江杉木諸巢深入親斬大酋一人首虜多礧中其顛十五年征古田先登奪隘為多陞都指揮同知掌司印嘉靖五年剿龍山深入是年田酋猛叛五哨進兵公自請當中哨奪其隘而潛結猛婦翁歸順知州璋使内間猛以走死田州平公最已而追殺猛弟禮于陣跌馬折左脅骨六年陞思田參將七年剿落春首虜多八年調柳慶參將居二年謝病明年而復為柳慶參將帶鏢佩弩箐棧聮絡環廣右而巢者以千數柳慶最勁小刧大掠燒城掊庫無月不有廓清為難擅地擁兵殺生恣睢環兩江而州府者以百數右江最勁喜人怒獸籲黨鬭讎無歳不有鈐轄為難公御諸猺蕩巢摧壁不專以威綏輯善猺視同吾人是以諸猺畏而信公御土酋解紛排難不專以恩洞其隂事坐豶其牙是以土酋睦而懼然則世雄之與烏合情狀各異攻心之與奪氣變化亦殊猺賊慮其散走聚其黨而獵之則公之所以殱渌里也土酋慮其藪衆散其黨而孤之則公之所以縛岑金也在柳慶先後十三年所剿皂嶺懷縛三層馬峽火黄馬輦七山曇應諸谿峝凡五十餘所獲覃韋鄧雷諸大姓渠帥或馘或磔或剜目截耳縱之凡數十人首虜積至五千餘級身為大將常先登散家財為賞得狼兵死力尤善用諜兵行所向雖肘腋不得先聞或已傅賊壘賊尚醉酒齁寢其入巢未嘗妄殺是以動輒成功柳人德之比於山都督雲為木主而生祀之以配於雲祠十九年復謝病二十年起為都督僉事總兵貴州居二年謝病歸二十二年北敵大入邉召天下名將至京師公在召中而佐戎事於宣大遂總兵江淮二十五年調總兵廣西公為參將嘗奏言於朝曰狼兵亦猺獞也猺獞所在為賊而狼兵死不敢為賊者非狼兵之順而猺獞之逆其所措置之勢則然也狼兵地𨽻之土官而猺獞地𨽻之流官土官法嚴足以制狼兵流官勢輕不能制猺獞莫若割猺獞地分𨽻之旁近土官得古以夷治夷之䇿可使猺獞皆為狼兵矣或慮土官地大則益難制土官富貴已極自以如天之福勢不敢有他望又眈戀巢穴非能為變即使為變及其萌芽圖之易也且夫土官之能用其衆者倚國家之力也不然肘腋姻黨皆勍敵矣國家之力足以制土官土官之力足以制猺獞臂指之勢成則兩廣永無盗賊其論甚偉然世莫之能用也公善揣事情練於當世大計然世獨以能將知公公為將其竒䇿逺算世亦不盡知然世獨以膽勇敢戰知公耳初田猛既誅督府議設流官公曰必且挾思恩為變矣十八年立堡弩灘以控峽賊公曰賊據其險我乗其衝此與投肉虎口何異後皆如所料公既連為賊所中毎隂雨輒痛自為參將數以病告製道冠山人服治生墓而時往游焉自江淮徙廣右也以書來請余記余復于公曰古之為將者據鞍矍鑠至老不敢言疲若乃自為塋竁卧而飲酒此山澤自放者之所為也二者甚不兩得而公乃欲兼之耶雖然公之志則逺矣公為人精悍其臨敵目光逆射兩顴頳色挺刀一呼人馬辟易其平居嬉怡謔笑臧獲輿庖無不歡然處族人雖讐至相賊殺不記更厚施之與人交重然諾腸胃如直繩一視可盡至於臨敵應機腹裏谿谷飛箝網絡神鬼不能測或誚公譎公曰吾譎賊耳非譎人也知公者以為然配帥夫人子三長學有父風其次覺次黌俱業儒所治生墓在貴縣城北其地曰廖家井南望渌里北睇龍山左黔右欎兩江縈紆皆公曩所揮戈斬級處異日有過公墓者得毋慨然而思乎且夫古者人君尊寵立功之臣則或為之象祁連山象鐵山於其墓以旌其烈於不朽公平諸猺靖廣右猺中多大山則宜何象然天子方且鞭撻四海以大事推轂公公所建立計不止西南一陲也其所象葢未定云指揮僉事湯雪江墓碑銘雪江公既葬之八年有子慶總兵江淮以平海㓂功陞都督府署都督同知乃追念先烈將樹碑於公之墓而請文於余余觀古者人臣有崇勲殊閥則上之人為之贊述其祖先功德而錫之廟器以彰其世美若古江漢之詩而子孫樹有勲閥則亦歸美于其先而為之銘于彛器以著于世若古鐘鼎敦匜之銘而詩與銘又必託之一時文人史氏若吉甫諸人故其文辭與功烈相炳耀不朽今都督所樹立既無愧古者經營江漢之績其樹碑勒銘亦正與古鐘鼎之誼相應而余雖嘗職太史然才下不逮古之能為詩與銘者逺甚其何以彰雪江公之美而稱都督顯揚之至意於是强為之序而銘之序曰雪江公諱寳字天貴姓湯氏其先有諱忠者為東甌襄武王諱和之弟襄武以故人從髙皇帝起滁陽下江東舉甌閩蜀北定中原為佐命首功忠以諸弟給事幕下摧鋒䧟堅與有勞績累官至錦衣衛指揮僉事改榆林衛再改邳州衛忠生敏敏生鏞鏞生琥皆世其官琥生公自忠至公凡五世公貌魁岸雅好文藝習騎射既授任恭謹自將嘗督餉運㢘平敏事漕運都御史總兵官交薦之選掌軍政正徳間流賊為患淮以北諸郡騷動公始屯兵於外以保兩河既賊大舉來㓂公乃移兵入城與知州僇力繕守未幾賊徑由城北渡河去尋有騎至城下呼曰我從虜某也願乞降公因詰之曰賊何為去曰昨賊首劉六令諸營曰邳無輕犯邳帥謀勇紀律整嚴其下必有敢死用命者遂宵遁公辛苦四載卒完孤城以抗劇賊邳人至今頌之撫按連䟽其功能將擬擢用甫四十公即引退曰人生貴適志何自苦為也扁其軒曰白醉亭曰習静以見志公慷慨好賑人之急有同官移用庫銀數百兩時宦瑾法酷度不能還欲自斃公為賣産完之劉馬莊賊起公與千户張虎分兵出捕忽報賊至馬頭為虎信地公即脫所披甲與之比虎與賊戰數被箭頼甲厚以免嘗以事之江東聞史癡者能詩畫善詼諧夜造其門時盛暑癡散髪披襟而出握手懽甚紿之舟中載至邳數月而返公本將家子當其擐甲躍馬鬚髯奮張可謂雄勇其興致所至乃絶與騷人逸士號為清狂者相類若此公卒云云始都督為儀真守偹時數以身搏賊軍中服其膽勇余亦素知其為人己亥歳余赴京師過邳都督飲余沂水之曲酒酣余戯之曰將軍得無有生之心乎都督慷慨奮言曰幸䝉國恩更得待罪行間敢不盡死予益壯之及海上捷至以為不負其志也湯氏本鳯陽人逺祖皆塟鳯陽自忠以下乃塟邳之半戈山公從塟其兆先是天子續東甌之後封靈壁侯而都督又適有成功嗚呼其襄武之遺烈也哉銘曰桓桓東甌開國於信帶礪是崇有弟曰忠亦爵於武是為小宗蝥弧大纛五世五傳以及於公保障於邳有㓂草竊既乘其墉渠帥愕眙曰有人焉竟不敢攻四十而退逍遥文墨牖下以終繄公有子既生代公而才且雄分閫於真遂移金山賊無堅鋒時維嘉靖十有九年㓂亂海東妖氛狼藉海上諸城晝閉不通帝命都督爾習于海爾維總戎樓船一麾鯨鯢遂戮都督之功人亦有言公侯數世必復其終在昔東甌縳彼方氏亦於海中於維都督樹績於海東甌是同稽古有銘勒此豐碑告成於宗太史作辭以配江漢昭示無窮儀賔李公墓誌銘儀賔江陵李公卒於嘉靖甲午九月某日年七十有七先是公之配隆中縣主薨賜塟於江陵城東東湖之原垂三十有八年而公卒遂以卒之明年乙未月日合葬焉自公卒至葬天子賜祭二壇於是公之子中孚等圖所以昭寵命謂銘不可非其人既葬乆之乃以屬其友唐順之追為之銘順之謹按公諱麟字應禎號西藪曾祖璋祖灝皆不仕至公父愷始以鄉貢士知永新有惠政遷吉安府同知公生而岐嶷既長頎而髯讀書善悟解洞於聲律尤工字書得子昂體當是時遼沅陵昭安王以髙皇帝之曾孫遼簡王孫封沅陵屬近而勢尊其女欲得佳壻壻之及見公喜曰吾壻如李生可矣其女者所謂隆中縣主也以是奏授公亞中大夫為儀賔歳禄四百石公本儒家子既為王族館甥又清以閒而公性故坦率一切不營營於産至於聲色狗馬馳騁凡諸紈綺貴戚素態又公所不好既清且閒而又無外累與他好是以能游心於載籍或登髙賦詩把筆肆書奕棋飲酒清談酣笑睥睨宇宙逍遥人世之外以極騷人逸士之樂而翺翔於諸王孫與鄉里耆舊之間以此適其志而終乎其身葢自諸史百家星官堪輿道書釋經下至稗官小説皆能陟其津涯而發之詩歌清逺颯爽類其為人有集若干卷嗚呼公在貴戚中其所謂翩翩者歟公淡泊於財且素長者不猜逆人人或持劵貸之不問其能償與否輒與卒多為所負不計也有持劵來者又輒與如初故多貲以是後乃落莫矣亦無介於心顧謂諸子曰汝兄弟不自樹立多金何益後諸子皆力學為儒者而長子中孚以進士今為府同知中孚前時推官鎮江公來鎮江視中孚所為皆當公意飄然遂歸中孚為推官用㢘能徴以例出為今官其所樹立未艾也人謂公固宜有後云三子中孚其長也次中立次中行皆為邑庠生女六人皆嫁為士人妻初隆中縣主惟一女而三子五女皆出繼室謝孺人而孺人亦卒於公卒之後三年始公在孕時母史夢有麟袍乗白馬造門者吉安公竒之遂以應禎名公而字之夢麟後值沅陵王不喜二名則請易置公之名字而去其字之上字以為名今名與字是也始者夢耳然公果麟袍白馬為貴人者五十餘年噫亦異矣銘曰在漢尚主列侯之尊爰及後世多取清門雖盛貌選亦以材授磊磊李公少敏而秀遂以韋帶作合椒房惟帝展親用錫金章雖則金章而不官守奕棋賦詩此外何有後有令子官於潤州公來自西順江而流潤人迎公再拜稽首曰此鉅人吾侯之父昔公在孕吉夢是逢究公所歴正如夢中誰云儒者未嘗語怪視履考祥太史銘在封知府朱公墓誌銘公姓朱氏諱某字某吳縣人也父東耕君謚以隐德為里中所推至公讀書為儒在縣學若干年以貢入太學在太學一年謝去歸老於家明年子鴻漸第進士歴官兵部武選主事于是天子封公武選主事後鴻漸為武選郎中已而鴻漸守瑞州調守廣信又自廣信調守梧州而公復封鴻漸未去梧而公卒于家某年月日也公自少苦志讀書嘗寓蘇城北寳幢寺寺傍空室一區寺僧以寄棺槥其中歳乆積疊墻壁間鬼氣觸人户無履跡公喜曰此真吾讀書處矣因獨擕一童子往讀書其中毎夜中或晝風雨輒有聲隂隂若嘯若泣一童子者數以為鬼也竟驚病死而公讀書其中如故公既以老儒生精於治經又性喜為詩所著有草堂集凡十巻蘇人故多以詩名家而近時則迪功郎徐君昌榖最著昌榖嘗數過公論詩公曰詩貴成家格卑弱固不可若規規摹擬前人逼真亦詞家大忌也且夫古之為詩者以寓性情也得之於體裁而失之於性情亦安用詩昌榖深服其言故公之詩雖醖藉古人而要於自寫己意略如所以對昌榖語然昌榖之詩則自海内藝文之士莫不喜道之而公之詩雖以吳之人士雅好為詩者亦多不能舉其詞豈公善韜蓄以為既隱矣不欲以言自文耶抑古所謂山澤之士必有待而後能施乎世耶彼其所謂有待者不獨操柄也雖文詞技藝若可以自振於世者固亦不能無待也耶公既以讀書至老無所遇而發之於其子副使君副使彊直有節槩不善與時上下其為宦也亦往往多梗自為郎積若干年而始出守為守歴三郡積若干年其最後徙梧梧瘴癘窮徼地也副使君訢訢然曰吾所聞於家大人者如是吾何憾公亦訢訢然曰吾兒如是吾何憾公卒之三年某月日副使君始得地於陽山白墡塢之北麓乃克葬公先葬之日副使君具公行事為狀來請銘余雅善副使君其語當不誣為之敘而銘之公娶李氏繼娶鄒氏子五人其長副使君鴻漸也次鶴鳴虎文雉膏馬良孫男九人承家承烈承宣承武承文餘未名曾孫男四人享年七十有九銘曰學古為儒委蛇歩趨挹其容者以為此山澤之癯貤封自天有子則然署其墓者以為此梧州之阡封知縣張翁墓誌銘翁姓張氏諱獻可字廷諌號東涯世為無錫人給事中選之父也翁少頴敏嘗有志讀書矣以貧故資生事為急也故不得乆從事於庠塾絃誦之業以貧故資生事以多途也故嘗博通於醫卜星厯堪輿佛老諸家之説然非其好也日奔走生事已至夜歸必篝燈讀經史不廢已而更發憤習舉子業則年已過矣家又無錢可行束修然經生碩儒以其志懇而禮謙也咸樂為講解翁自以其年過而學也則益勤苦習師説已而援筆為文輒數百言未嘗起草而㑹於經㫖可以自奮矣然竟以年限不得游庠校而邑中右族則爭迎致以為塾師翁既毎自惜其志之不就及子選為童子時而家故貧也則羣之於諸弟子中而身自教之翁教子弟嚴而有法温温誨誘不專訶朴故諸子弟視翁以為其父兄其教選也嚴於其所以教諸子弟者不廢訶朴故選視翁以為其嚴師選既冠翁猶為之改所業課而選畏翁一如童時為塾師三十年諸弟子彬彬多成材者選以進士起家為邑令能愛其民為給事中有直節葢翁之所以成就之者為深選令蕭山時翁嘗一往知民之安其令而令衙清冷如家故時則大喜居三日即歸曰吾非就養也選以言事杖闕下罷歸翁迎喜謂之曰顧吾與若母兩人老耳死諌是爾職不死是聖天子恩厚無量也翁以子官封蕭山縣知縣始翁涉艱苦其後子貴身為封官有輿厮可以代步而翁踽踽行歩里巷中如故時翁居常遇人欣欣煦濡謙下後為封官年且髙邑中推為耄耆而翁益欣欣煦濡謙下未嘗有自驕色於弟姪睦於夫婦無忤言待童僕如子女性慈惻既老則謂子選施無棺者棺畫圈於紙為圈者三千毎施棺一則登其日月於圈者亦一期盡始圈之數而續圈焉傭丐者掩道旁露尸掩一尸與錢若干丐者毎得露尸則喜以為貨也亟奔走告翁自是邑中幾無露尸者計所棺與所掩及翁之身已數千人而翁且謂子選汝終身行之勿計數也煮藥膏以施瘡痬者寒凍則為粥以食餓者曰掩死人又何如活生人嗚呼可謂厚矣云云銘曰少也食貧貲不謀身既稍自餘乃謀及人及人謂何所重者䘮誰骼誰胔臝死不藏我覆我掩我槥我棺水免鼈魚野避烏鳶古維有位方春掩骼翁隱人也而專是澤銘以頌翁義風可作鈍齋吳翁墓碣銘嘉靖甲辰吳翁有子情舉進士第三授官編修翰林其明年閏正月十有九日翁病疽卒年六十有二情解官奔歸將以明年丙午月日葬翁青龍之原合於妻徐孺人之兆禮也先葬情既以墓中之銘請於尚書孫毅齋公而復介其姻給事中張君屬余書其墓道之碣情因涕泣謂余曰情少為郡諸生而大父始喪是時先君與諸兄弟分産而獨持門户益落莫不自支惟時時撫情慟哭曰汝祖固日夜望汝汝奈何辛卯歳情中試南畿還先君望見情泣曰汝祖固日夜望汝乃今不及見汝之有立也未幾吾母疾作明年正月卒先君泣曰汝母與吾共甘苦三十年且余教汝嚴父也汝母悉吾意時時課汝讀書其嚴乃更過我今汝始漸進取而汝母不待也情三試禮部不第先君毎慰藉之癸卯冬且就試先君語曰汝不須念我我近不到城市者十三四年朝夕惟唐詩數過杯酒五六行更無他望惟望汝勉强無愧古人耳甲辰情舉進士及第先君又痛吾祖與吾母之不及見也毎語輒泣下時寓書於情輒舉㑹試時所命題先事後食為戒葢欵欵望情以不愧先資之言也明年而先君遂卒矣嗟乎自吾舉于鄉先君方痛吾祖之不及見也孰意未幾而遽痛吾母也吾始及第先君方痛吾祖與吾母之不及見也孰意未幾而遽痛吾先君也情至孤孽不幸人也又曰先君終始布衣無他大行可紀獨念先君性剛直耻為譎祕媕婀之態其遇事雖不關己利害亦公言激發無所避故嫉之者或乗其踣也相與搆而侮之先君挺挺自若也乆之搆者亦知先君之無城府也相與愧而服焉先君自若也先君且死戒毋得厚葬而獨因舅氏語情願得當世名人一言於墓吾即瞑矣嗟乎情不及禄養吾先君而又墜其將絶之命是重情之不幸而不瞑我先君也惟君其有意哀憐之始余未獲識翁而交於情也乆自壬午歳與情同時入為郡諸生則已竒情之為人嘗竊嘆中世俗益薄士人稍得志輒恣已矜物甚者怙侈饕餮其㢘耻往往出市道人下情自中第後益務謹飭逺聲利侃然有志槩間嘗過余操十斛舟從羸僮一兩人徐與之言而深察其意氣葢絶與同為諸生時無異余益竒情知其志所向與其後來所樹立未可涯也是足以徴翁之教矣且夫以情之祖與母不及見其孫與子之舉於鄉與登第之為可哀也翁及見之矣乃又不及少見其後來所樹立其亦可哀也余哀之而許之銘翁諱云云銘曰維天之道猶弓斯張髙者下之抑者乃揚維翁之晦其後之昌其昌謂何冠此多士冠此多士不獨其藝砥礪亷隅曰維先志以邁厥跡以顯厥世沿流泝源以為翁誄茅處士妻李孺人合葬墓誌銘茅處士者進士坤之父也坤為青陽知縣數月有聲而奔處士之喪以歸歸而又喪其母李李之喪距處士喪僅三十五日而處士喪之日則嘉靖庚子八月二十二日也其三年癸卯四月十二日乃合葬於唐家村之原唐家村故處士所游息處湖俗以桑為業而處士治生喜種桑則種桑萬餘唐家村上居常自言吾死第葬我於唐家村且死者有知吾得覩諸兒荷鋤擕筐往來吾墓上何不樂之有哉處士死坤徧求地於湖之諸山不得及得卜之處士不吉後乃卜之唐家村遂吉坤曰此先君子意也於是葬之唐家村之原先是庚寅之歳處士嘗病幾死㑹有相者過處士曰翁相未死勿憂也已而私謂坤曰翁其死於䑕之歳乎後十年坤舉進士例得請歸省而歳在䑕坤家居頃之乃就選然心獨念相者言欲去處士則不忍欲留又難於為言而處士在布夜中雅喜為詩又躭好山水嘗欲邀諸詩客相與入天台鴈宕訪赤城佳處以為快於是坤即婉謂處士曰大人不記天台鴈宕之游乎兒一旦綰印綬作吏縱欲歸必不可得何不令兒以此閒時奉大人往游其間坤意姑欲以是緩行耳于是處士揣知其意罵曰吾日夜固望女立功名幸始入仕奈何以吾故趦趄且吾欲往游即自往耳固不令女廢公家事從我坤不得已乃就選居青陽數月而處士死如相者言處士且死猶張目咄嗟以竟不得往游天台鴈宕自恨而坤亦自以不能堅持初説濡忍數月奉處士終言之輒嗚噎不自得至是且葬坤以其友人董吉士份所為狀來請銘按狀處士諱遷字于善號南溪以其居歸安之華溪也處士為人豐頰而髯魁岸自豪意氣軒軒若不可羈然槩其平生亦少所出入於繩約其面折人過若硜硜不少讓然善忍或睚眦之不為報也人亦竟無睚眦之者其少治生不業儒然喜談詩翩然有逸士之風其治生操縱出入心算盈縮無所爽然未嘗以錐毛恡惜為事而割田以衣食其族之人為屋以歸其族人之流而徙者坤之舉進士也處士為之破劵若干金妻李孺人有婦行處士魁岸意氣而孺人佐以和柔静黙尤善處嫡妾間掩瑕絶嫌人未嘗少見其隙初處士同邑施翁隱居行義崔太史子鍾銘其墓曰古之鄉先生也處士毎過翁墓輒慷慨低囬乆之嘆曰人生何必赫赫吾他日竊從遊於地下第為里隱君子不負此生矣間嘗語坤曰即吾死誰當銘我者坤跪而請曰唐司諌乎處士喜曰可矣故其卒也坤為之來請銘嗚呼處士其有意於身後之名也乎雖然此亦足以觀處士矣處士云云卒年五十有三孺人長處士兩歳而同時以卒茅氏故居邑之埭谿宋元間以治篾為業東徃市海上經華溪飯而沉其碗以為祥曰天使我飯於此乎遂捨篾而家華溪八傳至處士家益饒子坤始以文儒進云銘曰唐村之原有欎維桑兮生也游於斯死以為藏兮赤城之墟仙人所嬉兮生也不得游於斯死而魂氣之兮殷秋野翁墓誌銘殷生邦靖從余游嘗與余言其大父秋野翁之行甚具余時獨心善翁未幾翁子文輝以吾友施子羽所為狀來請銘狀中事多與邦靖所説參合余往無錫問其邑之士大夫與其街衢巷陌之人皆曰翁長者也余益知邦靖所説與狀皆不虚余覽史傳所紀長者大抵多詭情以釣竒至償金不復辨認牛不復問諸如此類史家以為竒而列之長者然余以謂長者正不必然如秋野翁在族戚能無尤惡於族戚已矣在鄉曲能無尤惡於鄉曲已矣未嘗有意騖竒節為名髙然其處心行已亦往往多出於過厚一士人子負翁錢不能還自請以女婢翁翁不忍竟還其劵嘗亡金篋中踰年盗不得已而邏者踪跡盗盗乃故翁所舎客客囚而見翁翁駭愕若固盗耶且金安所用客跪吐實曰余之妻公之金也請得賣妻以償公幸不獄死足矣翁惻然更乃出錢以與邏者求脫客而私語客曰女吾客也雖以此十數金贈女不為過柰何以𤨏𤨏故絶汝夫婦之歡吾脫女女可自抆拭客叩頭涕泣謝去客本善星術故翁嘗客之後客竟為善士而以星故走江湖間數過無錫具土物候翁欵曲乆之乃去翁所居並醫局嘗有海㓂邑吏鳩工即局中髙敞地繕軍器為備衆乆役疫作人相枕翁乃日擣椒蒜和酒以徧飲不病者而大鑊煮藥以徧飲病者又日令不病者一人給事病者五人時其藥物而掖搔之已而不病者得不染其病者往往得活相與詣翁羅拜手加額為謝後數年有人與翁相讐翁子應試南京過毘陵驛讐者狙人驛旁伺翁子欲毆之沮其行翁子大窘忽有驛卒數人躍而前助翁子與之力鬭翁子由是免於難既免而詢諸躍鬭者乃故嘗役醫局中翁所活者於是翁子欲厚報之其人謝固不肯受競還家持果與雞饋翁子然後去此數事皆世所謂過厚然翁處心本如是未嘗矯而行之翁父病痰閉不可飲食屈伸翁夜禮北斗以禱已而夢一黄衣力士以刀刺其頸疑不祥甚明日驀有軍人黄姓者造門自言能醫此疾翁異之果以針刺喉中出穢痰而愈如所夢者然翁未嘗言於人人亦莫之稱也翁諱俊字時選殷氏自布政公以才見竒文皇帝而其後遂為文獻之族至翁以隱行著而翁之叔季子姓多為儒者翁始以輸粟授冠帶非其好也因自號秋野以寓其蕭散淡泊之志云布政公生璉璉生廣成廣成生翁殷氏之先自毘陵徙家無錫之嚴埭又自嚴埭徙家邑中其家邑中也自布政公始翁配王孺人有賢行先翁二十五年卒邵文莊為誌其墓子一人文輝云云翁年九十歳乃卒嘗以耆老請為鄉飲賔者凡三十年應詔與賜老人粟帛者凡六墓在㠏􅣦山葬以嘉靖年月日其卒也先葬之一年八月十六日銘曰漢世論人必先長者寥寥誰哉嗚呼秋野蕭孺人墓誌銘嘉靖己亥冬南京浙江道御史臣正色奏言扈從章聖梓宫諸貴人不法事諸貴人奏列御史罪狀自辨天子逮御史於獄竟寛之使戍邉下兵部臣定戍所遣去而兵部臣故御史嘗所劾者於是御史戍遼之瀋陽御史家故在無錫其明年妻蕭孺人卒於家御史為人慷慨有氣自始為御史數獨自閉門草䟽不令孺人知孺人時時從隙窺見之自念不能沮又不能忍則欵欵為好語解之且曰毋騷𤨏生事為也已而御史得罪御史既上疏則𠂻囚服而襲豸服以聽臺事後逮者至御史自臺囚服出不過家徑去孺人㩦諸子倉皇南歸且憂不測遂病聞戍遼報稍解矣乆之竟以憂病死辛丑六月十日也年三十有九孺人父蕭愷母錢氏御史黄姓士尚其字孺人性謹厚其歸於黄也事後姑左右朝夕十餘年竟後姑死未嘗有一違言愷有女弟老而寡且窶孺人迎以歸與共哺糜廿餘年竟孺人死未嘗有一厭心人以為難初士尚為仁和南海兩縣知縣孺人從士尚果决負才氣見事立斷無所避其於權勢人鯁鯁欲繩以法而孺人濟以和柔温慎其所匡助為多士尚㢘則孺人以儉約自律也在官中躬絲枲織布如村居子四人學詩邑庠生娶某女學禮聘某女學海聘張君舜舉女舜舉名選故給事中以言事罷為民與士尚同年其意氣同也於是乎姻孺人葬以卒之歳十月某日墓在某所將葬士尚自瀋陽以狀來請銘余觀漢史所載王仲卿戅而狂好數言事其妻毎抑止之仲卿曰此非兒女子所知後仲卿竟殞妻子亦徙合浦余讀而悲之以為臣之娓娓於其國妻之娓娓於其夫皆期於自盡而已其事則若相睽然臣之於國耻其不言妻之於夫恐其有言嗚呼臣之難自古紀之矣今士尚幸遇天子至仁聖有仲卿之狂戅而免于仲卿之戮是孺人所遭過仲卿妻逺甚然史又載仲卿妻徙合浦後赦歸更以采珠為富人家今天子至仁聖且將脱士尚于伍藉而還之以與孺人相朝夕也有日矣孺人乃不幸死不得如仲卿之妻特䝉後凋之福吁其命也夫余哀而為之詞孺人以御史故得封御史在戍矣稱孺人者罪不及孥也詞曰謂媛之生兮處深閨兮心奚所思遼水之涯兮謂媛之死兮閟幽室兮魂奚所遊遼水之側兮盛孺人墓誌銘盛孺人蘇之太倉人盛君諱某之女居庸山人顧君存仁之妻嘉靖丙申山人為給事中上疏笞於闕下謫為民保安州居居庸孺人從之居庸踰五年而歸歸至家幾月而卒辛丑某月某日也年三十有九初孺人既字於顧而遭母喪于是童而婦于顧為童婦三年而室於山人孺人既以童而婦婉婉自屬於其姑錢儒人姑亦極意拊育之如其女孺人居常謂山人曰姑吾母也即姑百歳後願加服喪三年以報姑姑性好潔而嚴孺人所為縫紉漿酒糔餈滫瀡之具必以潔恐一不當姑意且得罪姑或不懌必跪而請罪不敢起及從山人於京師遇美飲食必思而泣居居庸時時與山人焚香南向拜且祝幸早見姑已而聞姑病日夜泣遂辭山人歸歸而道病既至家强力羞藥物食飲於姑病且革憖而呼姑姑至與訣遂瞑數月而姑亦死孺人自少讀小學孝經書頗解意㫖故平生喜書然獨不喜佛書中饋有間則取小學日記故事稗官小説家誦説之毎至古人壯節偉行則擊手詫嘆以為烈士當如是若自恨其不得為而隂以從㬰山人然者其始娠山人且游學慨然與之别曰君行矣謹毋以室家為意别三日而産子山人且上疏與孺人對坐土榻上夜草疏忽若有鬼物嘯户外孺人己心訝其不祥然竟不一語勸止及受笞以死報者三心苦之然不為動或怵曰事叵測柰何可蚤自脫不爾且及亦竟不為動山人舁居庸而孺人尚居京師時寒凍雖諸僮皆苦楚窮徼莫肯往孺人獨以一女子提衣粮觸風雪為諸僮先﨑嶇走塞上就山人㑹山人病瘡劇左右䕶持百方乆之山人以不死其居居庸也雖以不得事姑為慼然未嘗有一日覊愁不可忍之色故山人亦安之既死且葬山人為之狀其行來請銘嗚呼士鮮慷慨之節乆矣豈其素所自樹立者盡然或者鉤牽兒女子語故噎噎不能自割然則如孺人其可多得也于是許之銘子三人可立太學生次可大早卒次可興女一許聘陸某故冢宰公孫墓在太倉新安鄉祔錢孺人之兆其葬日為卒之又明年癸卯某月某日始山人為給事幾月而孺人封以恩也銘曰北瞻居庸崇山崔崔匪夫之故胡為乎來南望吳門既阻既逺匪姑之故胡為乎返間關而來間關而返今其休矣即安於坎楊孺人旌節碑銘嘉靖十有三年知常州府臣檟奏臣屬邑無錫無錫諸生楝等若干人父老㢘等若干人詣臣言楊氏婦守節事甚具臣聞守令以興教化美風俗為職也臣謹以楊氏婦守節事上聞者婦故邑人俞暉之妻邑人楊復之女自少從父叔識字通書史大指歸暉六年而暉卒婦痛䀌幾死及葬俞氏墓故在惠山㑹風雨不能舟婦匍匐即路以身翼棺哭且走躑躅泥石間觀者皆欷歔有泣者凡十許里乃抵墓所以克葬事自暉死時婦始二十有八歳二子長者始五歳舅姑且老矣而暉故儒家無宿貲可藉于是姻黨憐之欲奪其志而前時暉且死猶强起書雪操氷心四字與婦訣婦粘之寢壁坐卧瞻焉至是指而謂其二子曰而父知余心矣余即死敢二乎則又指二子而謂其人曰余所以忍死者為此而已不然余何愛焉婣黨諒其志遂絶口不復言也居常内外女婣宴好絶不徃來曰我孀也宜然至老猶然姑嘗末疾踰屢歳湯藥禱祈拭掃温扇至於頮盥櫛沐扶抱吮摩抑搔便液之事必自親之一不以屬僕人二子稍長親授句讀後雖已就師毎夜歸必篝燈火與相對以助其勤時時稱説暉之音容嗜好及其蹈履與其所志焉而不遂以待其後者幾以朂二子且使識勿忘也今二子皆强學有立其一為鄉試舉人曰憲其一為諸生曰寰者也臣謹按楊氏婦有不二之貞有撫孤之義宜旌婦今年及五十歳矣於旌格應臣檟昧死奏制曰下禮部禮部臣請命廵按御史核實御史臣蕙奏臣檟言不妄禮部臣覆奏制報曰如令于是禮部下常州府給錢立綽楔遂如令後四年而憲舉進士孺人從憲於京師病卒反柩於無錫將葬憲詣余請曰子其為憲母書墓隧之碑匪敢曰以嘉惠憲母其以對天子之寵命而章守臣之不蔽善也不亦可乎余既以許憲因自念嘗讀漢史黄覇傳覇為相課郡國計吏以郡國有孝子弟弟貞婦順孫者為一輩先上殿而張敞非之以謂此無益於㢘貪貞忒之行而適足以導偽長謾覇敞皆世所指才吏其相反何也夫有善而不見褒賞謂之匿褒賞不當其善謂之誣匿且誣其敝也均今國家表崇節義之意至慎重也而草野委巷之間力不能自達則或不列於褒賞其列於褒賞者參輿人之論乃或十一異同焉以古較今不甚逺乃知敞之言於漢要未為過余家武進徃來無錫間問其邑人邑人之賢俞母者相屬也私論之與公褒可謂參合然則守臣檟之為此舉也其可以當黄覇之賞而免於張敞之譏矣乎余以是具載其文且為之銘曰於皇有明風軌是敦貞婦弟弟孝子順孫有一於此帝罔不聞大者祠祀小者樹門歳之甲午守臣檟言楊女俞婦孀三十年維居之艱維節之完維帝曰咨朕其試哉爰命廵吏其核以來御史蕙對守言不妄維帝曰咨朕心所貺乃按甲令乃表厥宅嗚呼豈一人之為來者是式王母繆孺人墓誌銘余同年信陽王養之至京師擕其兄所纂次其母繆孺人之行請余銘諸其墓余嘗徃來信陽時孺人沒未乆鄉人多有能道孺人事者余聞而善之又嘗㑹養之之兄及姪之為州學弟子者皆秀而有文葢徴孺人之能教也遂許之銘而養之又言為其卜墓地時頗有竒怪始得二地堪輿師不能擇疑不决者乆之忽一夕孺人夢若有告曰某形者吉蛇形者不吉覺而語諸子諸子駭之問堪輿師堪輿師初亦不知其為某形某形也復至其地熟視之則某地果某形某地果蛇形一如夢中語乃徙某形者竟吉嗚呼聖人不語怪若此者何説耶則傳中所稱牛眠而馬嘶者其皆可信矣乎孺人信陽繆君諱家之女王君諱虎仲威之妻孺人嫁於仲威若干年而仲威先卒是時諸孤六人其㓜者四人尚髫齔也孺人恐墜門户督諸子稍長者使服田賈治生産不得游蕩擇其㓜而敏者教之讀書而日課其程毎漏下五皷親叩寢户使就燈火後諸子皆長大娶婦諸孫且嶄嶄孺人亦老且衰矣猶教之不弛於曩時有不率教者雖斑白必加誚讓或至鞭笞之不貸其嚴如此性素慧好聽古書列傳談説理道者惟恐不得聞至於里巷不雅之語惟恐聞之能薄飲食諸子有進重肉者輒不食至奉賔客未嘗不豐潔勞於治家能拓其業至於周䘏貧匱為粥以食饉於歳者雖費無所惜此孺人之行其子所自為叙與余所聞於鄉人者大率近之矣孺人卒於嘉靖十有一年某月日年八十有七子男六鑑鎮欽鑰鎬鋭鑰州學生鋭余同年進士也今為武昌令鋭初調崇明令以海道險不能迎養為憂孺人曰地之夷險惟君所命汝苐安之况有汝諸兄奉我汝毋以我故阻抑其志且此未必非福也曽無戚容後鋭以能調曲周又調安邑孺人聞之曰當益慎其官則可亦竟無喜顔故鋭數為令多以能稱孺人教之也女二人與子某皆先孺人卒孫男十七人某某皆州學生初余既許之銘乆未有以應也後余家居而銳為武昌令遣使來速銘乃克為之孺人葬以某年月日合於仲威君之兆故孺人所夢處也銘曰有崇斯墳神所惎也山鬼䕶門辟魑魅也氣如春温君子憇也生以為婚死不離也䕃彼後昆永無匱也蔡母鄒孺人墓誌銘蔡生瀛喪其母鄒孺人將葬請銘于余因泣而言曰嗟乎吾母之生也偹嘗艱苦而不獲享一日之逸吾母之殯且葬也僅于歛形無以厚其終而恔于心此昔人之所為痛心而自傷其貧者也瀛也奈何既而曰吾母雖欎于生前庻幾可彰于身後雖葬不能偹禮庻幾可藉此一片石而貽吾母以不朽也惟先生幸哀憐之初生嘗學于予予固喜生之貧而有志也于是許生為銘其母取生所為狀而叙之云鄒孺人者無錫鄒君廷章之女蔡君元際之妻邑庠生瀛之母蔡君雖大族然貲故貧君又倜儻不事畜藏囊篋屢空然而左綴右緝如補敝衣僅而獲完者以孺人為之經營黽勉于其内也生瀛學古為儒不以貧故墮壞其業而隕穫其志以孺人為之母而教督之也孺人父卒母華孺人獨寡居使華孺人無子而有子以孺人為之女而迎之使就養于蔡也蔡君前所娶華孺人既殁而所遺子女無母而有母者以孺人為之後母而長養婚嫁之使與己子女同也孺人之為婦也如夫有幹蠱之勤焉為女也如子有終養之孝焉為後母也如母有鳲鳩之均焉而享年止于四十有七不克與夫子偕老啜菽飲水之奉亦不克食報于其子於戲此瀛之所以重為悲痛而必求余銘者也孺人子女孫云云卒以嘉靖年月日葬以明年月日合于茅塘華孺人之兆禮也銘曰婦德含章弗耀厥美曷銘孺人吾識其子作銘者誰維太史氏銘如可滅石亦可毁賀氏孫楊二妻墓誌銘代父作孫孺人者太學生賀君汝勉之妻而楊孺人者汝勉之繼妻也孫孺人卒于正德庚辰七月四日而楊孺人卒于嘉靖辛卯七月八日至是為嘉靖丁酉十一月二十一日始同葬于先塋之次其地曰官壩而汝勉因以二孺人之銘來請于余余有女嫁于賀而汝勉之女又妻于余甥余女與甥往往能道二孺人之行而况鄉進士姜君為之狀可信也乃不辭而許之孫孺人父承事郎諱堂楊孺人父承仕郎諱昺孫賀皆丹陽鉅族而楊之族亦望于無錫故二孺人相繼歸于賀氏有朱陳之睦焉而二孺人者又皆柔惠婉娩克嫓厥美葢若生于一家而非二姓之女偶然以聚為一人之婦者初汝勉未有子是時汝勉與孫孺人年尚少可以有待而孺人已為汝勉置側室且日夜冀其有子甚于自冀其有子也及病且死猶惓惓以賀氏無子為意而屬其妾曰汝無子吾不瞑矣又屬其女曰妾幸有子汝同胞也汝善視之其望深而慮逺如平常時而不自知其身之悲也孫孺人既沒而側室果有子其後楊孺人自有子與女矣楊孺人撫側室之子如孫孺人之志而均之于己子不曰吾子嫡也楊孺人嫁孫所遺二女悉其裝以遣之不曰留以嫁吾女也此凡婦人之所難而二孺人能之其操行大略相同而孫既無子楊有子矣又夭孫年止三十有七楊年止二十有七又皆不幸早世嗚呼此汝勉之所以悲慟而必求予銘之使二孺人有傳也雖然顧予不文其能使孺人有傳耶汝勉子二人楊孺人生一子九歳而夭其一曰某聘何氏側室劉出也為楊孺人所撫者而其母故孫孺人所置也女三其二嫁楊銳周書皆孫出而銳者余甥也其一尚㓜楊出也為之銘曰其生也不相識而死其同宅以寜厥魄其死也不偕行而葬其同銘以垂厥聲楊母唐孺人墓誌銘唐孺人者余大父給事中曽可公之女余父永州知府有懐翁之姊余順之之姑知冠縣晉齋公諱溢之婦太學生東墅君諱墉之妻給事公與知縣公同年也故孺人以字於楊孺人性孝而惠少從給事公於官給事公卒孺人從其母周孺人與弟有懐翁扶襯歸毁而嘔血幾不可藥積數年乃止及歸東墅而東墅嫡母金與生母潘孺人事之兩得其心中歳姑金與東墅君相繼卒孺人㷀㷀遭兩喪哀慟積痞而痼晩年又遭叔父喪慟而又病病少間痞又作遂不起嘉靖壬寅八月初四日也年六十有三自孺人始嫁時楊氏門户方盛舅姑皆無恙家事一不以關孺人而衣食饒給周孺人又甚愛其女欲數見之孺人不數月輒一來每來必月留乃去既去則我饋遺問訊之使日不絶於路孺人亦數相報以為常當是時孺人不知為婦之勞而晏然有為女之樂後周孺人既沒舅知縣公亦物故東墅與其兄析産東墅又少讀書不善治生則家日落于曩時孺人上奉寡姑下釐家務井臼蚕績必自操之而亦不能如曩之饒給也後東墅又死其子又析産為四則家又益落自周孺人之沒而孺人獨與其弟婦相際則歳乃一來其後又獨與其諸姪婦相際也或四三歳乃一來其饋遺問訊之使其數與踈亦率如其來之數孺人往來母家既稀濶諸子又各自謀生或擕妻子徃田廬治田或往贅于婦家孺人更悄然寡居而黽勉有無至老且病或不自休也葢孺人所歴于夫家與母家凡三世而三變嗚呼此可以知人世之感矣有懐翁與孺人最友愛孺人病且死而有懐翁適官永州以是病不及候其藥沒不及憑其尸病則姪順之往候其藥沒則姪正之往憑其尸而以訃于永州初孺人送弟往永州泣之甚曰吾其不及見吾弟乎至是竟死且死謂諸子曰汝諸兄弟幸輯睦吾不恨矣嗚呼諸子其終奉孺人之教以周旋乎諸子勉之諸子者銳鎜鐈鉷也鎜太學生鐈鉷郡諸生賀氏周氏鄒氏沈氏其婦也鄒婦先孺人七月而卒遂與孺人同時以葬鄒於諸婦中最孝故其卒也孺人哭之極哀遂以病女一嫁郡諸生蔣瑫孫男五葬以十二月十五日墓在袁塘之原合于東墅君之兆將葬壻瑫既為之狀而順之乃銘曰夫竁其中旁有令婦孺人歸此其永不朽吳母唐孺人墓誌銘吾唐氏之先以詩書長厚創其家子孫相與守之其女子亦往往有化於其風者若孺人其一人也性喜書自孝經女傳諸所常誦之外至於毉藥卜筮種樹之書顧不如專門家耳然未嘗不通其㫖其試之亦數數有效往來姻戚所或見有異書及諸禆官小説輒擕取以歸旬日而還之則既誦習之矣既老尤喜佛與道兩家言日蔬素食焚香宴坐或夜中起坐若有意乎齋心修觀之為者嗚呼使孺人不為女子其可以語於儒者性情之㫖矣乎不然亦當為博涉多藝能人無疑也其禔身不為矯飾然子女􅉏御日在側未嘗見其袒衣與其見齒之笑其治家耕織累積絲粟然施藥與棺饘粥餓者至不以脫簪賣衣為解其於族里雖其襫襏藍縷之㣲待之未嘗不如富貴人其於姻戚雖其幾世之逺姻歳時棗栗腵脯之問施之未嘗不如近姻以是族人皆曰孺人有德於我其姻戚皆曰孺人未嘗失禮於我性柔儉慈静不色笑而其氣温然其於父母舅姑尤篤既嫁至老數十年間毎語及父母苦楚輒欷歔泣下舅姑既沒數十年間孺人亦已傳家事矣惟四時饋奠必躬滌濯羞殽烝以為常孺人之卒也以歳祲避宼城郭痢疾五十日卒嘉靖乙巳七月廿有六日也享年六十九月十日返葬於董墅里合於其夫榆林衛經歴南墩公之兆禮也南墩諱静夫姓吳氏舅曰七品散官水南翁諱良瑞姑曰張孺人父則余大父給事中贈奉訓大夫曽可公母則余大母贈太宜人周也子一人國平云云孺人同母三人余父永州守有懐翁其一人也姊一人嫁於楊先孺人三年卒姊病時孺人往候姊左右抑搔給事者月餘姊與之金墜胸為訣至是而孺人亦死蓋有懷翁三歳而遭二同母之喪哀之而不忍銘也謂順之曰小子銘之銘曰産於郭歸於鄉終於郭瘞於鄉葢魂氣何所不之而骨肉兹其永藏王冡婦唐孺人墓誌銘孺人姓唐氏常之武進人户科給事中曽可公之孫永州守有懐翁之女禮部郎中無錫王君九巖之婦編修王懋中立道之妻而余順之之妹也孺人後其兄五歳而生於姊妹行為第三孺人㓜頴慧紃組字書不煩於教而若素為之兄毎曰惜女不為丈夫子而有懐翁亦為之擇壻後乃得懋中十有七歳而卒二十有六歳以懋中官編修故封三十有三歳而卒其婦於懋中者十有七年王氏故饒而懋中又少貴也孺人從於宦者十年然所服御一不改其素非賔燕不設兼肉或懋中偶飯於他所孺人輒為蔬具問之曰吾適不喜肉耳惟為懋中肉必手調或一飯數起以為常懋中始未有子而孺人齒僅踰弱也然已數憂之一日自歸寜載一女子俱還顧謂懋中曰君大宗之後也不可以不亟圖此於卜相皆宜予故為君聘之既乃時時為理膏沭笄櫛飾容止惟恐不當懋中意者嗚呼吾母任宜人有少君裙布之儉是以諸女化之而孺人能淡泊撙約於既貴之後任宜人有小星逮下之慈是以諸女化之而孺人能委曲置妾於方盛之年葢所濡染者然也孺人事其姑朱安人朱安人煦濡温厚無與比孺人於諸姒中尤曲得其歡是以孺人毎自喜以為其在姑之側也如在母之側也其事懋中懋中簡重詳慎内行修飭孺人揣其意所注輒婉為將順若恐傷之然懋中或有微過則終日不自得其有善未嘗不力從㬰其間是以懋中毎自喜以為吾得吾妻也如得吾友也孺人從懋中而北也則念朱安人數千里外欵欵然如在朱安人之側也其辭懋中於京師而歸事朱安人也則念懋中數千里外欵欵然如在懋中之側也既死且憒矣索杯羮嘗之以為甘也目女奴使進懋中所葢猶如在懋中之側也嗚呼悲矣孺人卒於嘉靖甲辰五月二十一日初懋中在京師欲請歸省令孺人先歸時暑月舟人病寒熱相染有死者孺人以一女子擕數㓜兒女與病者同載歴險數千里固己心恐憔悴幸不病抵家未一月病遂作再旬而卒其病亦寒熱也子一人化𢎞聘太學生安子介女女二人其一人者母故孺人歸寜時所載與俱還者也嗚呼吾宗自吾曾祖贈給事公而下其男子幸不絶衣冠而女子之貴則自孺人始孺人姊妹凡六人以夫貴者于今兩人其未三十而貴于室也獨孺人為然然卒奪之年以死豈其豐其嗇固皆適然而值之者耶抑亦數之定而不可益損者耶懋中將以丙午春正月三日葬孺人于前王村之新阡懋中既述孺人之行為狀矣而余為之銘曰史氏之妹史氏之妻史也狀之史也銘之後有考者其將在兹弟婦王氏墓誌銘弟婦姓王氏尚書文肅公之曾孫女應天府經歴横山文炳之女余父永州守有懐翁之中婦余弟郡學生正之之妻也年十八而來嫁其生而貴家女也既嫁而驟見余儒生家所尚一旦解去所御金簮珥悉易以銀而褧其華衣至於中饋女紅率常身先諸僮奴其所解去金簪珥又以之易銀為本而經營什一之息拮据勤生若素處窮約然者其性警慧爽豁故於人情世務不習而曉家人尊卑上下一無不宜其舅稱之曰余中婦最能潔茗精饌以適我意於是賔客茗饌有不盡以分屬之諸婦而多以屬之中婦者其母徐孺人聞之曰是在我側固然固知其能事舅也其姒余妻莊稱之曰吾嬸最能得我心事於是心腹委曲有不可以諮於其夫而必以諮之姆嬸間者其姊妹聞之曰是在姊妹中固然固知其能睦於其姒也其始歸余弟三歳而兩娠皆半胎而堕即以後嗣為急偶余弟從余自宜興歸入室見一女子訝問之知所置妾也余弟靳靳以年始弱冠為辭不御而遣之後五六年竟無子乃更為置妾至親為之膏髪整容惟恐不當余弟意居常夫婦間相得歡甚也及置妾則毎割牀第之愛若使其妾得以時御焉而不以己故妨之者其在姊妹五人中最得其母徐孺人意初横山公卒母以意遺之二百金乃以母當總總時不忍受其後母病且卒以金簪分與諸女為訣其所分又獨倍諸女乃復以獨厚為嫌而併辭其所同得者嗚呼其能置妾於中年無子之日不足為難而能置妾於少年始婚之時則為難能辭金於母存之日不足為難而能辭金於終母之身則為難葢其自少知書稗官小説終日未嘗去手毎覽至古人竒節輒激烈自詫恨其不為男子余以為正使其為男子必能磊磊植立不媢妬以敗人之國不貨賄以自汙其身可知也與余弟夫婦間相得歡甚而警戒相成之者尤切始余父宦於外余獨與弟居弟或所過動也乃不喜而謂曰子縱不自愛其若汝兄何且又為之隱䕶不使人知葢恐以是見尤於其兄而或至於相踈也弟有一善可稱也則喜而謂曰非子之能其汝兄薫染使然葢以是深動余弟而欲其與兄相親善也以是余弟能知彊於為善而兄弟之好益宻彌縫從㬰其間葢有助焉以彼才且賢宜其多男子享髙壽而竟以無子夭死其死也又以産此則理數之不可知者也自其始連娠而墮則已不專意於自娠矣既置妾固日夜以娠望之妾也及自娠矣衆且以不妬之報庶或在此而竟以是死謂之何哉謂之何哉其卒以嘉靖丁未六月初五日年二十有九葬以卒之年十二月十三日祔於其姑余母任冝人兆之右方銘曰詩詠螽斯詵詵振振嗟彼淑媛罹此不辰讓娠於妾不欲自娠幸自有娠卒災其身造物報施孰云可信惟其美行乆而不泯伯氏銘之以垂家人荆川集巻十欽定四庫全書荆川集巻十一明唐順之撰行狀月樓唐翁行狀月樓唐翁武進人也諱世美字某月樓其號大父封寺副諱某者生五子仲子復為大理寺副後守平樂有宦績載在國志封寺副之少子贈給事中諱某號友蘭翁生四子長子為給事中翁其第三子翁貌魁岸為人倜儻負氣嘗從伯兄給事公指受章句能涉獵記誦然家故産薄而友蘭翁又病癱臥米鹽醫藥婚嫁百費叢於伯兄伯兄又方日夜治經史聚徒而教之其勢不相給也翁以故廢其學而營於家翁雖已不治經然不輟文墨其閒時則作為草書遂窮極竒變闔闢閃縮上逼懐素詩歌有唐人風骨是時翁伯兄既以文雄於當世而季弟竹忩翁善畫尤以草蟲名一時言文章字畫歸唐氏云伯兄為給事中值敬皇帝在位言官甚見親幸有權給事公素小心慎事屢為書與翁大要教之謙下毋輒入州縣門即入必傴僂不得騎閭巷往來戢族屬僮奴不得閙街市中翁遵其説而行之是以唐氏雖世宦然未嘗有子弟為鄉里所苦者後三十餘年嘉靖某甲子翁年七十餘郡太守請與蜡賔後若干年詔賜天下老人粟帛八十以上冠帶翁於是始冠帶然始一服之後不更服也嘗一與蜡賔後太守連歲以故事請然亦不更往其好省事如此始翁壯時唐氏以給事公故方盛給事公自為庠生有名聲已能盡致數邑客後為給事賔客益輳翁家居則應接賔客出則從親朋隣里邀請酒殽之㑹投壺陸博遨遊宴笑之歡碌碌不絶翁每所過輒為上客議論常摧其一座人以是人益貌之後翁既老兄弟物故盡平生故人多不存存者亦衰且病不能相往來矣翁又失其壯子獨擕二幼孫以居雖門外終歲率不一出甘脆滫瀡所以輔老之具亦不能豐也時時有一二族子問起居翁據牀坐與之道説故事助遣歲時而已人謂翁由喧熱至落莫不能無介介翁獨翛然自得也然自翁而上友蘭翁年至四十有幾翁伯兄仲兄亦皆不及五十而卒竹忩翁卒以五十而翁在父子兄弟中獨巋然老壽至於八十有三其所得可不謂厚也歟翁配云云葬以卒後三月某甲子在黄塘祖塋之次於是一之圖所以不朽翁而欲請銘於立言君子乃謂順之述其事略順之於翁為姪孫而給事公之孫云墓表春坊中允方泉李君墓表方泉李君既卒其父推官公謂余與君同寮相好也以書來請余表君之墓君姓李氏諱學詩字正夫世為萊州府平度州人大父諱琮父推官公慧也生二子而君為長君少頴異沈静治經通尚書乙酉秋郡守李君霆夢桃花洞中一少年得雋已而君中試君結廬讀書處則桃花洞之麓也丙戌第進士為永平府推官法麗於情數决滯獄三年以薦召入為稽勲司主事頃之陞考功司員外郎會朝覲考察君與有司佐其長僚黜陟用精已而調文選員外郎君之在考功也而余亦入為考功主事始與君相識君為人豐肉踈眉目進止雍容與人接婉婉若處女腹中坦坦不蓄鱗甲以此能在處協于僚友間其治獄也未嘗以鉤距為巧其考課也未嘗以按吏為功是時都御史王浚川公有物望不輕一言假人自君為諸生而浚川公為提學則己竒君後君居吏部浚川公熟視君益以為逺器數言於諸公卿間諸公卿自是知君亦以為逺器也君居閒獨喜為詩然在衆中絶口未嘗言詩其自晦多如是在文選未幾改官為翰林院編修頃之丁母楊宜人憂既葬廬於墓側産芝三本髙尺許然君不自以為瑞而亦不言於人服除赴官戊戌春同考會試事己亥東朝建君拜左春坊左中允兼翰林院修撰未幾充經筵講官庚子秋主順天府鄉試踰年以病卒嘉靖辛丑六月某日也年三十有九君之入翰林也是時與君同入先後十有一人皆取之科道與諸部屬而君與余則皆自吏部入居二年余罷歸而編修鄞陳君束出為按察僉事是年編修山陽盧君淮卒明年修撰東平王君汝孝出為按察副使又三年余起為春坊司諫是年中允閩陳君節之卒明年陳君束以副使卒是年余再罷歸明年而君又卒嗚呼維昔官翰林者進士髙甲與庶吉士兩塗而已今天子在位以為此不足以博求碩士遂改其制癸巳之歲乃得君等十有一人於是此十有一人者入則陪侍經幄退則校讐東觀景從響附人思自竭以報殊恩暇則相與接杯酒或限韻賦詩分曹壺奕或雜以詼諧嘲笑以極文儒墨士之樂于此之時彬彬雅雅争先恐後何其盛耶七八年間在鬼録者幾及其半出者罷者亦又幾人其尚在院者纔兩三人耳嗚呼何其有終之鮮與自古文儒之士委棄於草野者不少乃其間得自致於金馬玉堂之列以桀然自見其才者千百而一兩人耳其遇不可謂不幸天子度常格而用人亦冀以得魁梧瓌偉之雋蓋蒐於千百庶僚之中獲此數人其致之不可謂不艱而淪落銷歇若此其奄忽也豈非憐才者之所嘆與故為表君之墓而并名其人以志余之所感云户部主事陳君墓表嘉靖己丑歲吾郡之士同舉進士者凡八人于是此八人者得羣然咸聚於京師未幾則或去或留或去者復留而留者又踵以去其間得相聚京師者率不過四五人或三二人再不能及于八人之數而其後無錫張君舜舉與余相繼罷去則此八人之中罷其兩人其後江隂陳君又卒於京師此八人之中䘮其一人矣嗚呼是可嘆也憶昔此八人相與日夕具杯酒相歡笑此時固亦知其聚者終不能不散然殊不意其遽然遽散去猶冀且復聚縱使散去不復聚亦不意升沈存沒邈然分隔遽至於此然此猶七八年之間耳使更復此七八年或數十年則人事之錯迕消息愈益不齊而其聚散升沈存沒之感計亦不止如此而已嗚呼此可以知人生之若浮與天地之為逆旅矣而亦何恠其然也歟然方其聚也則為歡然以喜其散也則為之慨然以憶其罷而去也則或為之悵然以唁其沒而不可作也則或為之欷嘘流涕以悲亦有情者之所不能已歟然則子達之亡此七人者莫不悲焉而余獨有所深悲于子達者以子達有樸茂愿慤之質有務為君子之志而學未及充乎其質力未及竟乎其志非惟大官老壽限于命而不可得而問學事業之可以自致者亦若有所限焉而未究乎其止也此子達之所以為悲歟彼區區聚散升沈存沒之感固又不足較矣子達諱詞自號茶丘居士以進士授户部山東司主事歴官若干年而卒卒時年纔三十有六陳氏故饒於貲而君能刻苦自植立其在衆人中衣裳言貌絶不類紛華子弟而其在官絶不營營然廣交游借聲譽為富人事其為户部嘗監太倉軍儲又監淮安清江浦漕務最後撿校諸司章奏皆精鍊謹潔能于其官而君自少孤事其叔青田如事父之禮友其從兄子和如其親弟兄家之筦鑰一總于青田而君不知焉君出入必稟命于青田翁而後從事觀君之居家與其居官而予所稱君之質與其志大率可知也君始有二子而夭後君卒之八月其妻吳安人始生一子名之曰之才安人系出恭靖侯良之後有賢行而青田又為之綱紀于外其必能相與立孤以成君志也嗚呼陳氏之以善聞也乆矣而君父敔山公既舉於鄉又不顯以死至君且顯矣而天又嗇之固將以昌其後乎曩癸巳之歲余再官京師㑹君亦繼至于是所謂八人者獨余與君二人在京師後雖繼有至者又不乆以去而君與余至再更寒暑而後别且以余之迂戅無似幸不為此七人所棄斥而君尤若以余為可與者盖君於余交深而信篤如此君之沒余安得黙然無一言也君墓誌行狀既自屬于學士張公與户部主事曹君獨墓表未有所屬青田翁以請於余盖君未嘗有言而青田翁揣知君之意或在余也君世譜履歴則誌已詳故余獨序交游始終以道君之可悲者以揭于君之墓而又將以貽諸此六人者云都察院都事秦君墓表錫之言孝弟篤行有家法者必歸秦氏秦氏之先貞静先生諱旭隐居行誼既沒而鄉人私謚貞静先生以長子䕫官封中憲大夫然鄉人不稱其官而稱之曰貞静先生貞静次子永孚以孝子旌弟仲孚亦孝鄉人稱之曰雙孝秦氏君諱鏜字國和號類樗山人貞静先生之孫而孝子公之子也自少為邑諸生治所謂時文者最精每御史歲試諸生諸生心擬甲乙多目君君亦每自負及案出卒無前君者然六試於鄉而後第五試於㑹皆不第已而罷試家居若干年嘉靖辛丑即家授南京都察院都事以卒年七十有九君之罷試也以親老且病故竟二親死君亦遂不仕也曰吾禄不及吾親乃欲以衰年為子孫竊禄耶初孝子公事其父貞静與其母殷恭人惟其志而不忍傷至於刺血吮瘡不憚為之及君事孝子公一如其所以事貞静者其事母張孺人一如其所以事殷恭人者孝子公仁慈儉朴君為是羣下不輕鞭呵中堂無叱咤之聲平生自饗匕筯不出蔬豆之外懼少失孝子公意張孺人嘗病癱不能起又瘖不能言君以意揣其寒温飽饑而時食衣之便溺起坐必君自扶抱朝夕必侍如是者十九年雖女使亦不以屬然此蓋君之所謂孝者即甚勞勩亦不過乎煦愉抑搔人子之常事獨念君束髪即以文自奮人亦期君於當時所謂功名顯榮縱不有得于前必有得于後而君乃鋭然自割於强盛之年非孝愛純至一不中熱於世味有所不能是則難耳抑人亦有言子而仕雖有離憂樂也子而在側雖無離憂不樂也人情豈異是哉君乃能使其親忘乎人情之所樂而深樂乎人情之所不樂者其必有委曲感移乎親之心而人不能知是尤所以為難也君事寡姊曲有恩禮姊亦以節見旌君為人悃愊無表暴之飾然重節槩厲廉隅不妄交游不輕謁於有司君既自以詩書行誼守為家法於教子孫也尤篤子孫化之街衢之間褒衣矩步不問可知其為君家弟子庚子歲子涵孫禾舉於鄉癸夘孫梁又舉鄉之人不以子孫之堦於榮進為秦氏賀而以子孫恂恂謹讓守家法為秦氏賀也盖吾友施君子羽狀君之行而為之説以比於漢石氏其説然矣然石氏自建慶而下不再世孝謹遂衰豈非其質行有餘而詩書學問之澤不足以維持之耶有石氏之孝弟矣而又能從事乎齊魯諸儒之所謂文學者以益修乎其所未至則秦氏孝謹之風其將不衰矣乎余故因表君之墓而并書之以詔其後之人普安州判杭君墓表嗚呼是為吾友宜興杭君錫賢之墓杭君諱封錫賢其字號日惺布政澤西公之子都御史雙溪公之兄子也乙未歲余罷官歸客宜興寔館於君余性褊且戅在鄉曲孑孑不能與人為同然獨嘗心善君君自少以宦游子弟著文行其所結納多海内知名之士顧余何取然君與余獨深相好也以是于君乎館余所館距君所居五六十里君數數往来候余或相對一室講論經史或邀余游東西溪及銅官諸山所至輒盤桓竟日或相與賦詩為樂余是時居常以病謝客然於君之来未嘗不喜余於山水亦雅不甚好然於君之請未嘗不從與君處乆而益津津有味而亦益知君之為人君外和而中介其遇事小心能忍待人依於謙厚於好善尤篤甚於世之嗜勢利者其臭味苟同雖其四海九州之人君縱不能徧與之接然其心未嘗不慕而求之其臭味苟不同雖其里閈姻戚之人君縱强與之接然其心未嘗不踈而逺之其慕而求之也然未嘗翕翕以相驩其踈而逺之也然未嘗悻悻以相忤余以是益信君為長者余既居宜興兩年會有春坊司諫之命去如京師未幾君亦以選入就試北畿復得與君日夕往来如宜興時君居京師尤自守不妄與人交獨余所善吉水羅達夫富順熊叔仁平凉趙景仁君介余徧與之游甚狎至於大官勢人之門雖君力能自通然絶不往也始君少時從澤西公在京師學於翰林諸先生其為文有矩矱為縣諸生已能出名聲然數試不利後為太學生師事湛甘泉吕經野鄒東郭三先生三先生亦深器君君益思自奮及余與君會宜興則君年且五十矣而其氣不少衰時時作為文章包羅馳騁沛如也既試北畿又不利于是始就選有勸以賂者君艴然曰吾父吾叔並以直節蒞官吾縱不能似柰何以此為吾父吾叔羞竟不肯于是選普安州判官歸至淮病卒年五十有七自君在京師而余以狂言再謫為民君送我於崇文門外眤眤不能别且謂余曰君去吾亦歸矣與君結廬深山以老焉可也未幾而君竟死嗚呼余烏得無情哉乃為敘始終游從之故與君為人之大略而書之於其墓按察司照磨吳君墓表文字之變於今世極矣古者秉是非之公以榮辱其人故史與銘相並而行其異者史則美惡兼載銘則稱美而不稱惡美惡兼載則以善善為予以惡惡為奪予與奪並故其為教也章稱美而不稱惡則以得銘為予以不得銘為奪奪因予顯故其為教也㣲義主於兼載則雖家人里巷之碎事可以廣異聞者亦或採焉故其為體也不嫌於詳義主於兼美則非勞臣烈士之殊迹可以繫世風者率不列焉故其為體不嫌於簡是銘較之史猶嚴也後世史與銘皆非古矣而銘之濫且誣也尤甚漢蔡中郎以一代史才自負至其所為碑文則自以為多愧辭豈中郎知嚴於史而不知嚴於銘耶然則銘之不足據以輕重也在漢而已然今又何恠余兩為史官皆以不稱罷而姻戚閭里以其嘗職史故往往以銘辭見屬嗚呼試㸃檢前後所為銘其如中郎之愧辭者有之乎無也余進而位於朝不能信予奪於其史退而處於鄉不能信予奪於其銘是余罪也雖然予奪非余之所敢也是以欲絶筆於銘焉其或牽於一二親故之請有不能盡絶者則謹書其姓名里宦系世卒葬月日此外則不敢輕置一言雖不盡應古銘法亦庶幾從簡近古之意焉墓有銘有表表亦銘也今予所為表者是維按察司照磨吳君之墓據君之族孫進士禎所為状君諱文字從周號鯁齋世為無錫之閭江大父諱某云云君少讀書為邑諸生後援例入太學凡兩試不中第已而選福寧州幕官陞山東按察司照磨不赴任遂乞致仕家居凡幾年病脾一嵗卒嘉靖某年月日也年七十有五墓在閭江第二灣祖塋之次葬以卒之又明年某月某日將葬君之二子忞慰詣余請文而君族弟從夏實為之先二子且致君遺言曰吾死汝必於唐太史乞言焉從夏為吾母任宜人後母之弟其人恬静有守余雅重之故其為君請不可辭而余嘗兩㑹君於京師其氣温然謙厚人也始改官而乞身賢乎冒競不知返者君之遺言又如此嗚呼君豈以余不能為愧辭也故余敘所以不敢輕為銘之説及所以銘君之故而謹書君之姓名里宦系世卒葬月日為文而授之忞慰使鑱諸墓上華三山墓表華三山翁諱從智字克禎按察副使金之父也副使為户部主事時封翁以其官副使廉靜樸木有古人之風余心敬慕其為人後乃稍聞三山公之行事而知副使之樹立有自也則又敬慕三山翁已而得翁所為佘山百詠詩其語類古之隐君子自足於一丘一壑而不好於物者余嘗欲走佘山訪翁以庶幾獲見所謂山澤之臞而未能也嘉靖壬寅四月十有四日翁以病卒年八十有二於是副使来請余表君之墓嗚呼余於翁有感矣翁生為富人而以子貴為封官諸富人率隂陽予奪多其綱絡以力争錐刀其貴人父兄或憑其氣力漁獵其人饜其谿心翁乃約已而豐人一切屏機穽不事賈田宅從其贏斂租息從其肭衣食人也從其贏自衣食也從其肭又諸富人與貴人父兄率飾冠帶都騶奴日夜碌碌以刺候造請結納為事以厚其交而多其勢或時節往来府縣門入則僂僂柔色詞以媚出則詡詡張眉目以矜翁獨一切謝去塞竇自藏在佘山三十年束帶見賔客之日可數也盖翁之泊於利而䟽於勢若此宜其發之詩歌而特有類乎古之隐君子也哉余是以諾副使君之請而表於其墓翁墓在佘山翁所自營也翁少嘗力於治生以逸其父西野翁後西野翁沒翁遂去其故居而老於佘乃自為塋塜因山而壘植一木必其材甃一石必其無泐費可若干金以上經營勤瘁且數十年而後完雖然古有説矣聲利腐鼠也形骸委蛻也故達者解焉翁雖不恡情於其一乃若不能不恡情於其一焉者何耶且夫役其一生之力營營焉以計其身後委蛻之藏與彼役其一生之力營營焉以計其身前腐鼠之奉其較亦何能大相逺而翁乃躭之不置其亦未可以為達歟或曰唐司空生嘗為之矣司空生達人也故達乎死生之際則王孫之裸葬可也司空生之自為塋塜而飲酒賦詩其中可也翁父西野翁諱某祖某家於無錫之鵝湖華氏自翁十五世祖當宋南渡始自汴徙無錫居某地幾世祖自某地徙某地而五世祖又自某地徙鵝湖其墓亦隨所徙族大而墓散往往蔽草莽間翁遂為巨碑數通各題小傳碣諸其墓為識而翁始墓於佘翁配云云莆田林氏先墓表莆田林君華述其先人之行而請余為之表於其墓曰少而為儒老而投閒其績文强記推於士人而好施善忍著於鄉曲自少孤獨與母居母或不懌輒臥不食則跪俯牀下求親黨慰觧百方母懌然後跪為之起母食然後食是吾大父洗心公之行也雖不為儒生章句然喜誦詩書旁及簫管歌曲卜筮星歴之學尤精康節易數而時諷其所為擊壤詩故其平生遇歡愉窮窘悲愁死生之變以為是數也嗒然絶不以逆順生心少喪母喪哭之目盡腫數至失明後遭父喪窶不能給則躬負尸於牀而鬻衣質屋以供含襲其後繼母寡居而家又窶甚滫瀡襦緼之奉有豐無缺是吾父敬菴公之行也寒煖飽饑起居盥頮事關舅姑者以身任之不以勞相遺井汲竈燎器滌衣澣棗栗挑剥家之𤨏細事闗妯娌者以身先之不以難相推諸妯娌見其卑柔或侮以非意則善解遣之復有煦濡翕訿者又正色拒之久之諸妯娌皆服而舅姑則益喜是吾母周安人之行也嗟乎華不幸十三而喪吾大父十七而喪吾母二十而喪吾父空乏顛沛不能存然思先人之義即以不忘溝壑自厲嘗乏食竟日危坐讀易或雪夜衣絺覆草獨處慷慨歌聲達旦益奮激不改以先人遺教在不敢背也華自壬辰登第至於今十有四年而任今職所居官處患難臨民益思砥礪名節深以罔上殘下冐進壞道為耻以先人遺教在不忍玷也大懼先人之善泯墜不紀是以日夜悼心惟君與華相知深敢以累君華之請余文也盖在知鎮江之二年余諾之而未有以應也後二年御史奏華激變事被逮京師華以書别余曰苟君不遺余先人而終賜之華即死瞑矣華發鎮江哭而送之江者幾萬人擁傳車不能行逮者愕眙且笑曰是可以為激變矣華至京師上奏自辨天子以為直而京師諸貴人亦多言華枉者於是天子竟不深罪華而罷為民以歸華於道遣其弟苹以書来曰華誠不自意復奉先人丘墓惟君所以嘉惠先人者願終賜之嗚呼余於是益感涉世之難也將為籧篨戚施嚘咿唯阿苞苴承迎之行可以無譴訶憎疾於人然或不免譴訶憎疾於鬼神而且遺先人以惡名將為矯世厲俗捐私奉公嶄崖狷潔之行可以無譴訶憎疾於鬼神然或不免譴訶憎疾於人甚者為世戮辱以憂丘壠是兩者不知其孰可也以華之自處固以謂可以無譴訶憎疾於鬼神而貽先人以令名然卒不免譴訶憎疾於人既觸法矣然猶得免僇辱以奉先人丘壠以不為譴訶憎疾者所快盖非天子聖明至仁保全善類則不及此故特為紀之以著於世且使世之人知種德積行雖􅇄坎其身必發之於其子孫如林氏之先人秉道守正雖遭罹讒疾終獲保全如華者以為仁人志士之勸其於世教未必無補云彭翠岩處士墓表古之人有書其人之墓者必其智足以知其人者也智不足以知其人而據其所傳聞書之雖其當實君子且以為近誣而况其不當實者乎雖或知不足以知其人而知其子弟則為之書其父兄者今往往有之然其不失實者亦或少矣自余稍知為文惟書人之墓則尤不敢不謹知不足以知其人不敢書雖或知其子弟而亦不敢以書其父兄今余既未足以知處士而又未獲游於處士之子郡推君而特為之書者盖郡推君之僚于余父也最乆而余父之知郡推君也最深則因余父以知郡推君之為人而因郡推君之所稱述者以知處士之為人其亦庶乎可以不失實焉否也按狀處士諱顥遵道其字處士居常自言曰拙可以勤補而窘可以儉裕故其俯拾仰取凡所以家人生産之計未嘗不出於勤而其服食器具凡其所以自奉未嘗不出于儉然至貧不能屋者為之屋貸而不能償者還其劵或遇賢士君子其將迎而贈送之也必恭其貌而豐其儀故士君子樂與之游而鄉之人不病其為纎嗇也其更􅀈賦役凡所以急公家之事者先於所以謀其私至於體其同室之休戚通其有無而孔懐其死喪其所以為其父母之子者先於所以為其子處士既自以不能讀書為儒而獨屬意於郡推君郡推君之少也擇師教之而時督之曰若頼祖父餘業幸無飢寒而不刻骨自植立而惰窳以敗是羞余也嘉靖壬午郡推君舉於鄉處士且喜且督之曰更志其大者可也盖郡推君述處士之行大略如此而余父為余言郡推君之為人縮縮謹甚其治獄多所貸舎不以鍜鍊為能雖鞭楚常恐傷之是殆有聞於處士長者之教乎余是以因余父以知郡推公因郡推公以知處士而為之記之也處士祖希載父德甫自處士祖父而上皆不仕而處士有子澄始舉於鄉今為永州府推官配晏孺人狀以為安祥雍肅能助處士之不逮者也子三人長即澄次渾太學生皆晏出也次深側出也孫男六人天禄天初天視天祐而天禄天初天祐皆邑庠生天視太學生其二也幼未名處士卒於嘉靖某年月日年六十有三晏孺人卒於某年月日年五十有九至嘉靖丙申十一月日始合葬於萬載縣北九子石之岡處士系出宋待制忠肅公龜年之後世居臨江之清江至六世祖始徙袁之萬載城東而翁又構别業於城北龍溪之滸龍溪迤南有岩積翠作亭其上而自號曰翠岩處士余因為之表曰是維翠岩處士之墓云傳周襄敏公傳公姓周氏諱金字子庚號約菴其先武進人也國初有彦居者以閭右徙南京因家焉至公為都御史復還居武進彦居生贈户部尚書道信妻贈夫人董氏於公為祖妣道信生贈户部尚書廣妻贈夫人張氏於公為考妣墳墓皆在南京而公始賜葬於武進之惠化鄉公自弱冠為應天學生𢎞治甲子舉鄉試正德戊辰舉進士擢給事中陞太僕少卿僉都御史轉副都御史致仕家居六年以薦起為副都御史陞兵部侍郎轉右都御史尋轉左陞尚書南京南京公所生長也因得焚黄先人之墓南京人以為榮公之始為給事也於户右於工左於兵復都於户凡歴三科為都御史也僉於延綏副於宣府於保定右左於淮鳯凡歴四地為尚書也於刑於户凡兩部公所歴多在錢穀刑名兵戎劇曹與邊腹要地公為人闊達警敏自在科中則已練習人情世務章數十餘上度可施行而後言不效迂生敢言而已武廟數游幸晏朝公上疏請復常朝之規退則躬覽章奏以總權綱亦頗見采納時貴寵用事國儲蠧於冗食公言京糧嵗入三百五萬而食者嵗乃四百三萬乞痛加澄汰便又言中官以迎佛以織造濫討引鹽暴横道路又言都督馬昂納女弟後宫外議或云已娠請誅昂而還其女弟後昂雖不罪而女竟被黜及公沒禮部為公請贈諡亦獨以公為給事時能隂銷禍孽指此疏也方是時奄幸相繼擅勢尤與言路為仇不旦暮死則竄少能全者公在科九年卒以老成周慎免於戮辱而以乆次得擢為太僕公貌瓌偉善議論其在科中每九卿廷議軍機大事邊境要害衆輒目屬公公口對甚辨聞者莫不心愜壬申狼山之捷兵部議有功將士例陞三級公笑曰不然將士有實職有虚銜有正副㕘遊實職大而虚銜反小有管哨管隊實職小而虚銜反大今一例陞級則管哨以下皆可為督府而㕘副以上或止於都司首尾倒置非便衆是之癸酉廷議用兵土畨復哈密公極言西邊虚憊而土畨險逺且青海之賊窺伺西寧乃欲逺拯哈密譬之人家囊篋空虚子弟臧獲疲死而盗賊滿門庭將拯門庭之冦乎抑急比隣之灾乎衆曰是則然矣如土畨索金幣何公曰彼能效順國家何愛於賞不然勦之未晩也已而卒從公議于是衆以公可屬邊事推延綏則推公推宣府則推公公既家居廷臣交口薦猶尚以邊事也公在兩鎮值寧夏甘肅大同三變之後公既素豁達不拘謭有帥臣體裁又善煦愉接下邊人見公色詞既已心安公公益務寛簡繩法以燠休慰帖之嘗欲笞一二走卒時窮冬多不袴公見之惻然曰邊人窘乃若是遂不忍笞而百方為之招商聚粟廣屯積芻以時給其食使人人有重生之心又為之葺墩墻以衞其居䟽石渠以足其水凡有規畫期於利盡而人不勞邊人益愛公嘉靖甲申公在延綏㑹大同殺都御史報至公諤然因入靜室蹰踟乆之喜曰吾得之矣乃開門召諸將吏軍卒盡入環列庭下謂之曰若輩知大同殺都御史乎衆曰知之公曰若輩以殺之為得已耶非得已耶衆叩頭曰狂賊自取族耳尚何道公曰不然邊人勞苦甚矣而又虐使之是趣之殺也假令上下素相愛若父子彼將倚以為命縱授之刃使殺焉其誰忍乎衆大懽呼叩頭退當是時以片言立觧上下疑阻公自喜得應機之知居家時數嘗為余言之其在宣府總督馮侍郎以苛刻失衆心公數爭之不能得侍郎又以引鹽數萬與其私人為市而平時商人無能得一引者衆固甚怨㑹諸軍詣侍郎請糧不得且欲鞭之衆遂憤轟然面罵因圍帥府公時以病告諸屬奔竄入院泣告公公曰吾在也毋恐即便服出坐院門召諸把總官陽罵曰是若軰剥削之過不然諸軍豈不自愛而至此欲盡痛鞭之軍士聞公不委罪若屬也則氣固已平乃擁跪而前為諸把總請曰非若軰罪也是總制者罔利不䘏我衆耳公從容懇諭以利害衆囂曰公生我始觧散去而總制自是亦心愧公延宣皆要衝公内撫軍情外策强敵闗城晏閉邊甿緩帶兩鎮四五年訖無敗事人益以為才然公他所施設其與公不同趣者或不能不以好惡為贊毁至論公長於治邊則莫得而訾也自公去宣府八年而大同復殺總兵據城亂公時起巡撫保定矣遂往扼紫荆擒大同諜者數人送京師㑹真定巡按李者有疑疾入某邑有銃聲驚以邑令謀已欲抶死之廣平守争之又以守亦謀已至遣吏發卒圍廣平捕守一城盡空公聞變星馳往撫定之上章露巡按罪狀而臺長庇其屬為之訟寃公復上章力辨廷論竟直公而黜御史巡按於巡撫為同事而臺長又於公寮長也公本通達不務為崖異立磽磽名然利害大體所在不肯苟為媕婀此蓋公所難者其以都御史出鎮淮淮當士大夫南北衝地過者或不愜所望則益易為謗然公自如也丙申章聖梓宫南祔始奉㫖由江而諸䕶行大臣至儀真議從陸諸官心知不可而憚於以身任江行之險悒慴不敢出語公獨力争之極言沿江山險路不可通狀且奉玉體馳峻坂上下撼頓萬一聖情聞之悲惻柰何議論往返數日而諸大臣亦密遣人探沿江路果險如公言乃决從江之議以鐵絙維舟行如期至承天遂如期以葬沿江千里居人免於伐樹發屋役夫數萬人得無走死山谷中公於是有力焉及為刑部尚書轉户部益能於其官乙巳致仕歸武進歸年餘而病卒年七十有四公性喜讀書雖稗官小史亦用以資其經略尤喜為詩歌羽檄倥偬中率不廢詩上谷榆陽稿皆成帙也善字書有晉人風骨其罷宣府家居好奨進後軰與人言娓娓不厭與士人言言讀書與俗人言言勤業莫不取其有益是時余以諸生候公公過待以為國器及入仕途公每遺書誨以經世之學顧樗散無能自效於公者公且死以傳文見屬余不得辭也公平生儉樸既已貴其自奉如居約時獨祀先欵客則極豐潔曰賔客重事也年五十遂獨居未嘗畜媵妾教諸子愛而有法一飲食必有訓自公既沒天子賜之葬祭贈公太子太保諡曰襄敏嗚呼可謂有始有終者矣妻夫人吳氏子二人仕為都督府都事偉太學生皆好禮讓能世公之家者也暘谷吳公傳公名傑字士竒武進人也其為醫始公之髙祖肇父寧贈太醫院判公之學自青烏氏書風角雲氣占經李虚中子平之術金丹内外秘訣無所不通醫特其一技耳然竟以醫至大官其於醫精究古方書而善脉其治病不純主古方書而一切以脉消息之有初若與証相反而卒無不効者其餘竒疾尤効也𢎞治間以名醫徵至京師遂以醫游諸公卿間公醫既精而儀觀磊落濶達善談説頴然見鋒鍔於是諸公卿爭迎致為上客京師諸老醫與公同時所徵諸郡國醫莫不望風下之是時都御史王鉞鎮大同奏乞吳某調治邊軍未及行御史顔頤夀給事中李良度皆奏言吳某宜在供奉不宜棄之邊地下禮部禮部尚書集所徵郡國醫試之卒無踰公者故事髙等入御藥房中等入院最下遣還郡而當遣者若干人公為之請曰國家三四十年纔一徵醫耳若等幸被徵又待次都下十餘年而又遣還誠流落可憫願不入御藥房而與若等同入院尚書義而許之正德幾年掌院事李宗周竟薦公入御藥房而同薦者凡八人有與宗周同官争權者因左右讒之上曰宗周所薦多私人且通賄實不能醫上曰吾當自試之時上病喉痺遂按名召公一藥而愈上喜甚嘆曰有醫若此乃不以醫朕耶因厚賜公詰責讒者而謂宗周為忠公自是得幸於上上每病未嘗不屬公公治之未嘗不立愈一日上獵射還憊甚感血疾公進犀角湯愈命進一官賜彪虎衣一嘗幸虎圈虎騰而驚公療之愈命進一官賜銀五十兩表裏一頃之試馬御馬監腹卒痛公進理中湯立愈賜繡春刀一銀三十兩自是上所游幸公必從嘗侍上臥至以肩倚上或撫摩玉體有不以屬左右近幸而以屬公其分御膳啖公有左右近幸所不能得而公得之自醫士十日而遷御醫自御醫三月而遷院判凡一愈病則一遷為院判當遷者數矣公固讓三年而遷院使上親寵益篤嘗欲以禁衞銜公賜蟒衣公謝曰臣以藥囊侍陛下此非臣職也上乃止某年上南巡公以醫諫且泣曰聖體尚未安不宜逺行上怒曰汝醫官也敢乎叱左右掖出公留京師駕行至淮漁於清江浦遂病還臨清夢見公急遣校尉召公公馳至臨清見上上泣曰爾不憶我耶公亦泣遂扈從還通州時權彬握兵在左右見上病一旦不諱懼誅欲據穴窟為亂力請復幸宣府公脉已驚甚密言諸大奄曰疾亟矣幸可及還内耳脱至宣府不諱吾與若軰即死寧有葬地乎奄以為然乗間百方説上上意動而彬亦數從公覘問上病何如即詭言曰且愈矣勿憂也已而駕還京師崩彬坐誅毅皇崩之幾月而公亦致仕去矣既致仕留居京師遣其二子徧從韓林諸名公游壬辰子希孟舉進士以才廉擢給事中於是以恩進公階朝列大夫甲午子希曽舉於鄉自某年公還武進稍葺室廬治田園為終焉之計公既老居鄉不復為人治病而親戚故人有竒証或病危甚衆醫所不治者乃以請公公亦間往往則應手愈居閒誦老莊氏書益究金丹内外秘訣以冀所謂長生者其自號暘谷谷者谷神也或曰暘谷海東仙人所居嵗時與里中故人雅歌彈碁飲酒為樂酒酣數語及毅皇時事出所賜衣物未嘗不泫然流涕也久之希孟為廣信知府懇乞致仕歸養歸數月而公卒始公毎自詫得丹訣指其小腹謂人曰此中有物矣先卒之一日余往候公公紫色瑩然如平生希孟曰唐翰林在公㸃頭卒時神氣不亂整衣端坐口云好好遂卒年七十有八嗟乎公信多竒矣哉希孟居鄉有志嚮師事徐養齋先生而友余余是以得備聞公之行事為傳而敘公在毅皇時事獨詳焉以見公之遭遇以俟國史傳技者有考云萬古齋公傳宜興萬氏相傳徙自鳳陽始徙者曰勝三傳至雄雄兄弟六人皆强力殖産結豪傑而萬氏始大於邑中雄生政政有弟盛為九江推官以學行推髙一時而萬氏於是為文獻家政生璵璵生公諱吉字克修為人方嚴剛峻可望而知其為莊士自少從盛學盛為人亦方嚴公心效慕之盛亦喜公類己公為學以為非有廉隅墻壁不能自植立於是斂束筋骨刻意以古人為師讀書觀古人忠孝大節輒揭之壁間自恐不如平生自禮義廉耻大界限至於拱揖進趨冠履食飲之節畫線而蹈終始相較不失毫髪善戲之謔露齒之笑未嘗一出於口撥衣蹶足箕踞跛倚之小過未嘗一加乎身其事父母視寢視膳視藥恪有儀節深心欵然父母病不解帶自始病竟病愈以為常父暴病一夕卒每痛不及藥哭輒殞絶病尫然骨立年五十餘遭母喪哀毁不衰於喪父時以是病衂至沒齒衂竟不愈也與弟善以友愛聞邑中病則共被寢至老彌篤尤未嘗異錢帛善亦謹厚有兄風教諸子寛而有法先志行而後文藝諸子烝烝雅飭規行矩步孝謹一如公不衰其閨門化之娣姒雍睦自姻族朋友出入公家者不聞有誶語嘻嘻之聲其諸子弟不聞有挑達宕佚華矜之習邑人爭相髙之以比於漢石氏而以公比萬石君公面目清冷對人少寒温語若落落寡情然人乆與之處真意溢出外有邊幅而内朴無城府至其情所甚鍾處宗族姻戚間恩禮欵曲即素婉孌多兒女子情者不能及也其自奉泊然衣未嘗問新敝食未嘗問精惡室無媵妾館無圖畫古器伎藝之玩賔至時一奕而已然亦未嘗溺意求工也居家手不識握算計帳之具口不問錢米盈縮雖以有弟足藉亦其素性於財利疏濶使然然獨喜施舍至歉嵗家人節口而食過窶人未嘗忘施也友人且死屬其妻曰濟我後事者必某也已而果然其處宗族每誦范希文自吾祖宗視之無親疎之語嘆息者乆之族人有緩急既自罄其貲與力其所不及則醵其闔族之貲與力以濟其三族中待公飽饑衣凍婚子嫁女者若干人公恂恂儒生非欲以振急排難為豪舉其平生􅇄坎又非如希文有俸廩賜予可以收族其所為如是盖天性也以繩檢自律亦以繩檢律人人有善雖在後軰必稱嘆推引以為賢於己人有過雖在同軰必面折或動色不少避於義有違雖田夫野人女子之言皆為之屈服及引義争是非雖遇達官勢人鯁鯁反復必伸已説不少媕婀以是人或謂公激而知公者益以公樸直愛人如愛己也其有欲為不義懼公知之而止者較之面折者尤多居學中三十餘年學成行尊其儒生後軰有志節者雖不及公門亦心師公事公一如事師之禮公亦欵欵訓諭相勵以古道不降辭色既執古自信因以古名其齋諸儒生無背面必曰古齋先生而不敢字之其家子弟且冠必為之行古冠禮及婚葬祭率凖家禮從事不為苟簡在學中凡八試於有司皆不第而提學林公有孚蕭公鳴鳯以德行旌士每首公以風諸儒生公自少讀經史守儒先成説甚謹於儒先中尤篤信晦翁氏然至疑難處輒掩巻自思及有所得多出儒先論斷之外文字尚理致不為華言然諸儒生心服公之行故不以文名在學中獨與潘君松為厚交潘君疎爽坦易而公堅苦縝密兩人操行不同而各以所長相取至白首無間嘉靖丙申余始識公於宜興公因遣二子從余游數過余相與講論有合有不合而卒歸於相得也盖公尊經傳甚篤而守格式甚謹然而黙成不言之㫖近於破去經傳而易以為束書游談者之所便得心忘象之宗近於脱落格式而易以為宕無忌憚者之所假故儒者往往因其似而疑其真余既與公交乆之乃稍稍於經傳格式之外有所陳述大要以反求自得一不蹈襲獨操欛柄為説公聞而相與辯析亦乆之然公察余非敢不尊經傳非敢不謹格式者是以因其跡而諒乎其心知其人之不求為異而意其言之或不妄也先是公之友周君道通學於王陽明子得聞致良知之説歸而以語公力慫惥之公以其説異朱子不肯信道通沒十餘年既與余相得則慨然謂其所善門人王革曰道通愛我今荆川子語固多與道通所述相合然固未嘗背於朱子我恨不及道通之存也嗚呼以公之堅志勵行虚心從善使其早嵗有聞且將由忠信而好學不知其何所止正使晩年所遇不至如余之迂駑而得一豪傑之士其感孚契合灑然氷解又不知何如此余所以愧公之知也然公之所自立者其亦足以見於世矣居乆之以貢為桐廬訓導桐廬地磽陜儒生溺於習俗錐刀𤨏𤨏鮮志操公夙夜勸課為之深明義理界限時時舉釣臺故事激發之曰若軰非子陵鄉人耶諸生一時為之爽爽心動時節或有饋遺却弗受間有所受則以振業諸生之貧者提學張君岳考之曰文足以範士行足以勵俗近得其實云未幾懇乞致仕歸是時二子士亨士和舉進士公每遺書必曰願若軰為好人不願若軰為好官士和以翰林吉士出為禮部主事公聞之喜以其能不干進如教指也在桐廬二年而歸歸六年而病卒病且亟余往候之氣已微矣猶披衣端坐作拱揖狀謂余曰吾語言若顛倒者余曰須静以養之公曰正為平日不能養耳是卒之前七日也卒時為嘉靖甲辰七月二十日年六十有三公蚤年剛方自立晩而氣象和易對人煦煦自桐廬歸後軰益樂親之其行已類狷而意甚廣居常有志天下事自為諸生地方利害休戚亹亹為上官陳説既老無所施用然猶不忘時事聞一賢人進則喜見鬚眉為天下賀或聞進一庸惡陋劣者則蹙然改容當食為之廢筯毎得忠諫章疏雖老必手録卒之前一月既已病半起坐間猶類聚平生所録拱手讀之其强於好善至老益篤自桐廬歸數入郡訪余相與講劘益切又邀余訪養齋徐公慨然相見晩也故其卒也養齋公誌其墓妻李氏封安人子三人士亨吏部員外郎後公五月而死於毁士安縣學生士和禮部主事孝謹一如公者也李宜人傳余讀同年友羅君洪先所為述其先人副使雙泉公與李宜人行事為之慨然而嘆盖嘆吏之漬於墨而潰其防也然而潔志好修之士不宜如是其少豈亦有所累焉而不能自免歟且夫隂柔之性嗇而耽於飾牀第之言眤而易以售向非剛士孰能自免於此即有能免於此而或窺罅揣空乗其耳目所不覺而隂入之賂幸而覺之又牽於愛而有濡滯不忍之心往往壊名而失志以至於敗可憐也已故内有采蘋之節則外有素絲之風内有交徧之謫則外有終窶之怨言所自者㣲也雙泉公固潔志好修剛而不惑者而宜人之助盖亦多焉雙泉始以諸生游學於白河雙泉産故窶而旅中益無以為資宜人匍匐憔悴以佐朝夕之急然此猶迫於無可柰何至如雙泉舉進士由兵曹郎歴鎮江淮安兩郡守官尊而俸入多人謂宜人有遭矣而此兩郡又夾江淮之衝魚鹽米穀重装大賈之輳多見可欲以是吏於兹者潔志好修之士尤少而肥家以去者為多與所謂窺罅而隂入之賂者亦時時有焉故為吏人妻者不饜於肥家之公槖則饜於窺罅之私賂矣雙泉為此兩郡守其所入既不足以肥其妻子而宜人亦小心奉約束惟謹其苦楚澹泊如在白河時至雙泉觧官歸宜人篋中皆故貧時物也無一増者雙泉為兵曹郎是時奄瑾張甚雙泉以奉法數忤瑾瑾銜之數使人伺雙泉雙泉於是日夜留曹中治文書不敢歸而宜人獨擁户爨馬矢買魚肉以餉雙泉而自與諸女奴食脱粟或雜以稷菽有旬日食不肉者瑾伺之數月亦竟無所得及雙泉在鎮江宜人擕女奴日往後圃掘野蔬而食之雙泉既亷不受錢又往往割俸錢以資過客宜人不謂迂也宜人於是凡再受封矣至無錢買冠帔而嘗從諸寮婦飲諸寮婦皆冠珠翠冠明璫錦袿釧金纍然宜人既素不具冠又獨衣故貧時衣以往逡巡席間諸寮婦以為苦也更密勸以賂宜人矍然曰若不知吾夫耶且吾安得聞此言諸寮婦因竊嘆笑已而女􅀈有私獻金器飾者盖乗雙泉所不覺也宜人痛呵絶之曰若不知吾夫耶諸寮婦至是始赧然以賂為耻焉嗚呼使為吏人妻者盡如宜人則安有所謂牀第之言與窺罅以敗其夫者即有然者使其盡得見宜人之事安知不有赧然耻如諸寮婦者乎此余之所深歎也宜人故長史李勲之女歸雙泉若干年以卒有子一人而妾所生子二人其女二人則皆出於妾宜人子獨洪先耳宜人均而字之尤善處嫡妾之間兩妾中其少者柔婉自媚於宜人宜人愛而撫之其長者故窘宜人然弗為較也第拊心自泣而已亦不以言於雙泉後雙泉自知而欲督過之宜人曲為救解乃已其或雙泉自以他事督過此兩人宜人曲為救觧乃已此在宜人不為竒然亦人所難者宜人既卒洪先以書屬余使為之傳余於交游中雅慕洪先洪先凝重醇慤其志必欲為古人而後止可以觀雙泉與宜人之教也而宜人之事有足係世風者故余掇其一二大者著於篇而又以志余之所感云章孺人傳吕氏有賢母曰章孺人孺人讀書觧道理有女士之行孺人之知書也自其父省菴翁翁先世累有顯人家故多書而翁尤好書日誦及六千字為凖日誦不及六千字不寢於書尤好誦五經自漢以来諸家之説五經者皆能通之為文博雅尤工騷選然冲澹不好仕進以布衣終翁無子而有女一人孺人也自幼受句讀於翁翁以為能既乃稍進孝經論語大學及史傳所載列女賢人孝弟之事種種能識其大指翁乃慨然而嘆曰惜乎使汝不為男子章氏文獻當在汝矣盖既以喜孺人又若自恚其無子可屬然者孺人既歸於吕其夫為芝山君某芝山有祖母章與母趙母張皆在而芝山兄弟數人諸姒婦比屋居孺人奉一祖姑事兩姑處諸姒能一不失其歡祖姑章者孺人同族亦謂為從祖姑者也年髙性嚴諸子孫婦莫能揣意嚮顧意獨在孺人然非以重親故也諸姒數因孺人進飲食問起居章即喜有賔祭宴饋之事章必以命孺人孺人唯唯受命然不敢專必以請於兩姑退又謀之諸姒以故諸姒欵欵益和兩姑亦喜吾婦之能代事吾姑而章又益悦也孺人與諸姒居欵欵益和然慎重寡言笑即有内事相關涉數語而已或問及諸史輒以不能對以為非婦人事也惟見芝山夜讀史間舉省菴所評史一二語以問于是芝山乃知孺人之嘗讀史也至於訓授諸子書則縷縷竟朝夕其語有外傅所不能詳者孺人之生子洵也後洵既生而不娠者又七年洵又多病力請為芝山納妾妾始娠孺人緝衣絮具湯沐親自舉兒兒死涕泣累日夜是年而孺人自有娠明年演生又明年泌生而洵病亦愈孺人之生洵與演泌也後洵又病恒愛而憐之然厪厪不為姑息居常啖兒糈果勿與粱肉即與皆大人餕羞之餘未嘗為兒烹一雛其所與襦袴皆澣衣為之不為製一新繒常曰兒福薄豈勝美衣肉食耶至於割鮮烹焠之地與里巷謳歌劇戯之事皆閉勿令兒見即隣舍小兒游蕩無狀者戒勿與游狎洵少拂於孺人教㫖孺人視之甚愠然不忍箠撻又不欲聞諸芝山輒自懟為之對案不食改之乃喜洵稍長知勤苦與兩弟夜讀書課文夜過半孺人即又慮其勞以病也輒令女奴趣就寢或自起滅其燭常謂洵兄弟曰汝先世賢人之裔也余家先人亦世世讀書宦顯余父雖布衣文學誼行伏一時余婦人也又不幸無兄弟先人之業絶於余父矣兩家文獻在汝豎子可不慎與憶余父且死時汝曹尚幼乃以先人田廬遺其嗣孫而以所藏圖籍文書畀汝父且謂余曰他日汝子可教教之讀吾書吾死不恨矣汝兄弟志之及洵為諸生嘗就舉弗第孺人慰之曰汝年少學未成爾且余與汝父教汝書固不願汝禄養也汝能積學修行縱終身不遇如余父可也不然徒苟且富貴即鍾鳴鼎食亦何足道於是洵强學博問以儒有聞而章氏之書乃大行洵居官凜凜有名節其志師古人務究於精㣲而止盖皆自孺人發之余觀前史女子能讀父之書者率載以為美談至於有家之傳則往往以託遺書為重事是以重於有子而伏姬班姬之屬雖能讀父書然終不足以世兩家詩書之澤者其竟以女子故耶孺人奉其父之遺書與其遺言以教而成其子子洵强學飭行傑然以儒自見於世人且望而慕之曰是得於章氏之書者為多是使章翁無子而有子其書無傳而有傳也盖人知孺人之為賢母而不知乃其所以為孝也余故為之傳以著之孺人諱寳浙之新昌人子三人光洵光演光泌光洵舉進士今為御史俞孺人傳俞儒人者玉山詹君諱某之妻訓導鈿之母也鈿生而孤時孺人年二十有五嵗鈿伯兄某始三嵗孺人居孀矢節至今凡若干年卒以植二子而觀其成自二子幼學於塾毎夜歸讀書輒篝燈火紡績與相對以為常被服食飲令毋得擇所欲毋得詈人出惡語言有過輒請於其舅而呵責之一不為掩故鈿自童孺時已恂恂若老生後舅氏沒而二子且長矣則使某業農以給而使鈿專業於儒又縱鈿使日與邑之諸雋游處鈿痛自感奮日夜刮淬在諸生中數年以學行推擇超等為貢士鈿居京師是時四方修行之士若鈿之同郡徐子直成都趙孟静軰相與羣居講學鈿悦而從焉恐不得卒聞然世方騖於功利雖薦紳儒生皆不喜若軰説或相指笑以迂濶孺人詢知其子之所與游者某人某人而又詢知其所與游某人某人者如何人也乃獨心喜焉鈿為人愿而善藏其居衆中退然不見辭色而其介然有所不為既訓導於常亦闇闇不自標幟時或舉其所聞於先生長者一兩端為諸生論説諸生相與服其行而信其言孺人以鈿之能惠於諸士也則又益喜鈿為訓導幾年諸生某某軰本其教之所自也相率請余為孺人傳余既傳其事而論之曰夫女子非立節之難而立孤之難然世所稱立孤者謂其不墜門户或能以榮進顯云耳非有能教之以正而成之者也就有能教之以正者顧其為教也止於其母之身其教之所及也止于其子之身而足矣今孺人乃能使其子盡友四方之賢人君子以助乎其教之所不及又能使其子以身為諸士師以廣乎其教之所及盖其所以風世而軌物者逺矣噫嘻此豈婦人女子之所幾也哉葛母傳葛母李姓諱妙賢鳳陽李翁諱泰之女同邑葛翁容菴諱欽之妻貢士澗之母容菴翁豪雋有氣槩游於商賈中能自見其竒嘗上書巡撫言鹽法河渠事利害甚具語在王文恪公所為傳始容菴之賈於揚也母獨家居奉其舅姑服勤幹蠱兼子與婦之役容菴是以無逺賈之憂而舅姑亦忘其子之不在膝也其故廬災於火容菴自揚輦石輸木而經理匠事皆屬之母其居之成也至今族人聚而居之已而從容菴徙於揚則又助容菴構新居其經理視鳳陽時尤勤不踰時而寢堂言言遂如故家至今子姓聚而居之母家於揚幾十餘年揚之俗呰窳浮麗男子游手末作其婦女鮮事織績而習為假髻侈袖縁履之飾母獨纎於治生蚤起育雛食豕釀酒造醯翦裳滌器染􅀈湅縤僕僕迨燭不自休至見美麗服器飾輒閉目斥去以是能殖其家不獨容菴居積貿遷之故也母雖以纎治産至於振里族之乏繕橋甃衢粥餓槥胔縱解簮珥亦無所嗇容菴慷慨行義傾貲結賔客盖不獨容菴之能施也女夫死無子命子澗為之立後其父母死無子又無可後者則以義立主奉之别室而烝嘗之其知大計往往若此母性凝重訓御諸婦諸女如師門内無嘻嘻聲尤謹嫡庶主僕之分僮婢三百餘指飽饑逸勞人人自以為得也其教諸子有法尤屬意澗澗好聚古書購書數百金以上澗能為古文辭所交多四方名士館穀饋遺諸費日出母恣之勿問也曰吾夫積金使吾子易以為善今吾散金以成吾子之善也不亦可乎已而聞湛甘泉先生講道南廱則遣澗往澗於是聞體認天理之説未幾構甘泉書院於揚費且數百金澗請於母母曰此義事也亟圖之自是書院成而揚之士彬彬多嚮方者母年七十有五而卒其詳載在太僕盛公所為狀而盛公又題其旌曰賢貞盖不誣云母五子澗洞澄江漢而澗最知名余亦知澗者於是澗以傳屬余盖余讀鄒東郭先生所為母阡表太息者乆之以謂伊洛先生在當時彼號為衣冠士子羣咻衆狺乃不及一女子又謂葛母可方尹氏之母其説云然然余以謂尹母之所以能彰於世者焞則貽之也伊洛之門其頴敏才辯者幾何人而確實堅苦言行必信能守師法則焞為第一是真能以善養者而母之訓益因以彰澗所聞於師者固伊洛語也澗也自是焉益落其華而收其實習其傳而反諸心求其所以為焞者則所以使其母之有傳者固無待於人而惟盡乎已而其所以盡乎已者固不在於聲華辭藝之蔚然者而有在於克己反躬之闇然者矣故因東郭之論而附著之荆川集巻十一欽定四庫全書荆川集巻十二明唐順之撰雜著讀春秋春秋王道也天下無二尊是王道也禮樂征伐㑹盟朝聘生殺之權一出於天子而無有一人之敢衡行無有一人之敢作好惡作威福是王道也是故大宗伯以賓禮親邦國而以間㑹發四方之志天子廵守諸侯既朝則設方明而盟是㑹盟者天子之權也其或不出於天子而私㑹私盟者罪也故春秋凡書㑹書盟者皆罪之諸侯朝於天子而諸侯之自相與也有聘禮無朝禮凡其不朝於天子而私相朝者罪也故凡春秋之書如書朝者皆以罪其朝者與其受朝者九伐之法掌於司馬而天子賜諸侯弓矢斧鉞然後得顓征伐雖其顓之亦必其臨時請命於天子而後行是侵伐者天子之權也其不出於天子而私侵私伐者罪也故凡春秋之書侵書伐者皆罪之諸侯之大夫公子雖其有罪必請於天子而後刑殺焉其不請於天子而顓殺者罪也故凡春秋書殺大夫殺公子者皆罪之夫侵伐有貪兵有憤兵有應兵有討不睦有以籓國侵王朝有以王朝征籓國有以王臣借籓國而戕王朝者故戰有彼善於此者要之無義戰盟㑹有解讎有固黨有同欲相求有同力相援有同患相恤有以呉楚受盟有以呉楚主盟者故㑹盟有彼善於此者而要之無義㑹義盟殺大夫有誅叛有討貳有愎諫有借以説於大國有為强臣去其所忌故殺大夫有彼善於此者要之無義殺是故春秋自于稷澶淵兩㑹之外並不書其故而至於盟㑹侵伐則絶無一書其故者非略也以為其㑹其盟其侵其伐其戰既足以著其罪矣不必問其故也殺大夫必名亦有不名而但書其官如宋人殺其大夫司馬者亦有併其官不書如曹殺其大夫者此非略也以為義繫乎其殺之者而不繫乎其殺者義繫乎其殺之者則其殺也足以著其罪矣義不繫乎其殺者則不必問其為何人與其為有罪無罪焉可也説春秋者不達其意而瑣為之説曰其㑹也以某故殺某大夫也以某故至於盟戰侵伐亦然是皆無益於春秋也而徒為蛇足之畫者夫春秋經世之書也其經世也以正亂賊也易曰臣弑其君子弑其父非一朝一夕矣不早辨也説春秋者亦云人臣無將夫人臣而竊其君侵伐㑹盟刑殺之權其為將也甚矣人臣竊其君侵伐㑹盟刑殺之權而久假焉而莫之歸也其為漸也甚矣故臣子至於推刃於其君父而春秋書其國弑其君某某人弑其君某者是弑之成也是春秋之所痛也人臣而竊其君㑹盟侵伐刑殺之權是弑之漸也將也是春秋之所辨也孔子嘗自言之矣曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出無道而至於自大夫出無道而至於陪臣執國命嗚呼是春秋之勢也挈其漏於陪臣大夫者而還之諸侯挈其漏於諸侯者而還之天子是春秋之撥其亂而反之正也夫周自東遷以前雖王室已不競矣而其權固在也幽弑而平徙岐豐之地委為草莽瀍洛之外聲教阻絶于是尾大之勢成而諸侯横變易禮樂馮衆暴寡大小相朝強弱相刼無一不出於諸侯者而天子曾不得尺寸之權矣盖周之盛王道行頌聲作而其可見者莫如詩雅蓼蕭湛露是諸侯之㑹同於天子者也彤弓是諸侯聽征伐之命於天子者也出車采薇是天子之自為征伐而四海不敢侵叛者也故曰詩亡而春秋作詩未亡天子之權存詩亡天子之權喪春秋收既喪之權而還之天子者也春秋所以接詩亡之後雖一日不得緩也文宣而下則諸侯又不能自執其權而大夫之交政於中國者攘攘矣三桓六卿七穆孫寗魚華陳鮑擁兵樹黨而主勢孤矣葬原仲而私交始矣作三軍舍中軍而魯之權罄於大夫矣盟溴梁盟宋而天下之權罄於大夫矣衎出奔孫陽州孫越入彭城入朝歌入晉陽而大夫之為禍烈矣盖天下之勢愈下而春秋之治之也愈詳桓僖以前列國之大夫惟特使而與魯接者則名之而㑹盟侵伐則大夫未有以名見者夫救徐大夫特將也翟泉大夫特盟也春秋第曰人曰大夫而已不以名見也若此者非略也以為不繫大夫也文宣而下侵伐㑹盟大夫未有不以名見者雖溴梁之㑹其君在也而大夫盟書雞澤之盟君既盟也而大夫盟書若此者非煩也以為繫乎大夫也不繫乎大夫雖夷吾隰朋狐偃趙衰之勲且賢未嘗以名見焉繫乎大夫雖劣如欒黶荀偃髙厚華閲則瑣瑣以名見焉不繫乎大夫雖其君不在而大夫特盟則亦弗詳焉翟泉是矣繫乎大夫雖其君在而大夫綴盟則亦詳焉溴梁雞澤是矣不繫乎大夫雖主帥亦略而人之桓僖以前侵伐書人者是矣繫乎大夫雖偏裨亦牽連而名之鞍之戰是矣其弗詳大夫者以專治諸侯之為亂賊也其詳大夫者以併治大夫之為亂賊也説春秋者不達其義而日人大夫貶也夫書人為貶彼黶閲之徒以名見者乃為褒也耶惟曹薛滕許之大夫始終書人説春秋者曰小國無大夫非也夫此數君者且為人役之不暇而未嘗敢執天下之權也而况其大夫乎盖不繫乎其大夫是以終始人之而弗詳今曰書人為貶則曰齊晉諸大國之大夫偏受褒而曹薛滕許之大夫偏受貶耶侯犯南蒯弗狃陽虎之徒出則大夫又不能自執其權而陪臣實執之矣墮郈書墮費書圍成弗克書竊寶玉大弓書得寶玉大弓書而春秋之正陪臣者又詳矣故孔子欲往公山佛肸之召而曰吾為東周云者即春秋書墮費墮郈意也是春秋之終也或曰盟葵邱盟踐土師於召陵城濮説春秋者以為聖人予之也今亦曰是禮樂征伐自諸侯出也而奪焉可乎曰是不然矣桓文之未出也權雖不在天子而諸侯亦未能盡得天子之權也盖其權散桓文之既出也則權既不在天子又不在他諸侯而桓文獨盡得天子權也盖其權聚譬之主人有千金焉而竊之者十人雖金已不在主人矣然十人而人得百金焉尚未足以當主人也而竊之者一人苟一人而併千金焉則是疑於主人也權之散臣悖於主權之聚臣疑於主故較利害則權之散而交鬬猶不若權之聚而可以紓禍息民語王道則權之聚而疑主猶不若權之散而未有所屬隨之屯曰隨有獲人隨而我獲之未害也而謂之凶豫之坤曰由豫由我致豫未害也而六五以為貞疾故桓文者臣之凶而主之所以貞疾者也且桓文以前諸侯固有相朝者則亦一二小邦而已猶未有六服羣然相朝者固有私盟㑹擅侵伐者則亦一國兩國相讎相結而已未有舉中國而聽於一人未有十餘國而共攻一國者是天子之權未有所屬也桓文之興五年一朝三年一聘而諸侯之玉帛相率而走於其庭天子黼扆之前乃不得一人秉圭而北面者彼齊晉亦偃然受諸侯之朝已而終其身未嘗一涉天子之庭也衣裳之㑹兵車之㑹未嘗有一介請於天子也是故紏合諸侯同奬王室未有如葵邱踐土者諸侯之羣然役屬臣僕於諸侯亦未有如葵邱踐土之甚者荆蠻攘斥中夏乂安未有如召陵城濮者而摟諸侯以伐諸侯亦未有如召陵城濮之甚者説春秋者不達其意而曰㑹於某盟於某是聖人以諸侯授之齊晉也夫王室之不競也諸侯既已盡折而入於齊晉矣聖人不能挈而還之天子也其又推而授之以益其逼也耶夫權自諸侯出不問其如何而均謂之無道敵國相征不問其如何而均謂之無義不知禮樂征伐之出於桓文也其為道耶其為無道耶桓文之戰其為義耶其為無義耶使桓文而誠於勤王誠於禦敵急病而其柄則倒持也其分則上陵也聖人猶必律之以法而桓文且將為法受惡矣况其借名勤王而實則自殖陽為急病而陰欲養亂哉滅譚滅遂本以自肥執曹畀宋為譎已甚桓之末年侈然有封禪革命之心而文至於請隧以葬此其去問鼎者無㡬耳乂何以責楚也然則聖人所稱民受賜一匡而仁之何也曰是聖人之顓論功也而春秋者顓以明道也穀梁氏曰仁不勝道存王室也然則説春秋者曰謹華夷之辨何也曰此誅亂賊之一也夫春秋之所夷者吳與楚楚之先鬻熊為姬文師國於江漢之間而太伯端委以臨吳盖皆神明之胄矣荆人不道間周之亂革子以王叢毒上國吳亦相效而王是亂賊之尤也是以春秋從而夷之春秋諸侯中其顯然為逆者莫如楚吳其陰逆而陽順者莫如齊晉如斷獄之家吳楚則功意俱惡齊晉則功遂意惡功意俱惡故聖人顯誅之顯誅之故其辭直如卒不書葬君臣同詞之類凡皆直辭也功遂意惡故聖人陰奪之陰奪之故其詞微如邢遷於儀夷城楚邱狩河陽之類凡皆微辭也夫小雅未廢而四夷不敢交侵小雅盡廢而後四夷交侵春秋始書荆入蔡以獻舞歸則其跋扈之勢已見桓文奮而扼之其鋒稍阻文也沒而晉霸衰而楚人之圖北方者遂日長而不可制是故春秋書荆入蔡此霸之未興而楚猾中國之始春秋書次于厥貉此霸之既衰而楚窺中國之始盖桓文之所以扼楚者其力有難易而楚與中國之所以盛衰其㡬有倚伏桓起於海濱而所從者宋衞陳蔡皆弱國故謀之十餘年結江結黄連十二國之師而後能服楚於召陵文據表裏山河之固而所從者齊秦皆勁國故反國一年僅連三國之師而遂能克楚於城濮一戰而殺其專兵之將然晉之克楚也得策於結秦而晉之不競於楚也失策於讐秦自殽之役而秦晉相讐殺者厯四五世戰彭衙戰令狐戰河曲積十餘戰而不解是晉人自失一強援自生一强敵失一強援則其氣力不完强敵伺近則其勢不暇於略逺故晉霸之衰而楚益横者殽之役實然説春秋者乃曰殽之役春秋許晉襄繼霸吾不知也夫楚莊者又蠻酋之雄耳而逺交秦巴近攻陳鄭則是晉之讐秦非特生一强敵乃又借盗以兵也春秋書楚人秦人巴人滅庸而楚之謀益狡矣書楚子圍鄭而中國虎牢之險淪於夷矣書宋人及楚人平而南北衡矣天下之勢一變也雖然于時諸侯固有附楚者而猶未敢公然附楚也晉雖已不能盡得諸侯而猶未肯甘心以諸侯委之楚也蜀之盟謂之匱盟盖諸侯猶惴晉人知之也弭兵之説倡而南北之從交見於是中國諸侯公然朝楚向之玉帛於齊晉者盡在楚矣申之㑹空中國而聽焉齊晉之所連以扼楚者今楚人連之以扼中國矣申之㑹諸侯獻六王之禮宋之㑹虢之㑹長楚於晉則是諸侯甘心為夷役而晉人甘心以諸候委於夷也天下之勢又一變也至於吳越交兵而夷禍極矣書伐剡入州来㑹黄池入吳而春秋所以治夷者又詳矣是春秋之終也或曰楚横而齊晉扼之則是中國果不可無桓文也今曰禮樂征伐自諸侯出也而奪焉夫頼人之功以紓患靳人之權以資敵是責鷹鶻之搏而縶其足也不亦迂乎曰不然吾又有以譬之今有僕於此鳩黨鑄兵而主人弗能令也然盗夜入其室則其僕揭兵嘯黨而逐之以僕為不善也然而足以逐盗以僕為善也然而足以抗主故天下無霸而至於四夷縱横而莫之禁者非天下之幸也天下有霸而至於臣疑於主而莫之怪者非天下之幸也夫春秋之事齊桓晉文是也齊桓晉文之功定而王道明矣王道明而亂賊懼矣或謂春秋誅亂賊者誅其弑君者也曰若是則春秋所誅者止於弑三十六君之人耳其亦狹矣然則所謂誅亂賊者何也曰治弑也治諸侯之專也治大夫也治陪臣也治蠻也凡無王者皆亂賦之道也鴈訓執徐之歲有鴈集于顧舍人第舍人筮之得小過焉其繇曰飛鳥遺之音大吉博物先生聞而往賀之至則蹠華公子在焉公子謂先生曰鄙人聞之人事占㡬天事占符㡬㒺舛盩而能垢符㒺闇沕而弗彰盖昔者元鳥集㦸黄雀投環游龜像紐墜鵲化印斯瑞𦕈乎瑣哉然猶薦紳動色焜焜燿燿若天授幽契而神畀秘寶焉者矧夫鴈抱陽背隂羽蟲最靈者也迺今歛翮戢翼翩然来賓斯亦異矣於舍人何所當焉願先生為舍人鋪張而揚摧之可乎先生曰唯唯可乎哉可乎哉請摭僕所聞而公子選焉夫陸杜隰黍春粟吳粳芬馨狼藉穰穰滿塍爾乃呼儔命侣唼喋蹂踐一飽恒餘羣啗每饜此盖飲食之至樂也舍人嘗羮内饔割肉大官滑脆脭膿溢腹盈飡若是何如公子曰夫繫稻粱之謀者㤀冥冥之志沈豢養之適者違性命之和老子曰五味令人口爽願聞其他先生曰文獸眎皮珍禽辨羽爾乃披黼戴黻純緅雜緇纎毳似鬒温氄方綈甑􅀈􅨎翨翷翾差池濯冷波以修容颺輕颸而整儀若夫東海獻朱上林呈白匪恒理之所窺亦云極態而盡飾于是使鸚鵡羞綠山鷄讓錦此盖羽儀之至文也舍人綰銀垂黄錯以絺藻顧步流暉折周展耀若是何如公子曰古之言章服者特以殊等威别上下而已非以為侈榮極觀也且令聞被躬安事文繡哉先生曰鬱埜茂林平皋廣澤罻羅無所安施矰繳爾迺頡之頏之翔而後集輟雲霄之勁翰指天地以假息故易著漸磐詩詠遵渚豈比夫􅀈鳩蹌踰乎榆枋鷾鴯卑棲于簾廡者哉此盖居處之至適也舍人待詔石渠之庭侍直承明之闥栖遲雲陛偃仰華榱若是何如公子曰儒者以禮義為安居未聞文軒夏屋之為快也且夫東方朔陸沈金馬奚足道哉先生曰神頡作書實始鳥跡而鴈以字稱焉觀其隊矯朋騫翕趿紏紛一從一横乍合乍分既錯落而成㸃亦聫綴而為畫拂素霓以施鉛依𤣥霜以和墨於是掩蝌蚪之竒形奪蝸蜒之巧篆此盖法象之至章也舍人搦碧玉之管操文犀之觚斯籕是摹鍾王為徒若是何如公子曰書者六藝之一耳且夫餘墨成池敝頴成塚固已勤矣無迺非古人所游藝者哉先生曰秋空泬㵳金波皎晶川原䆗窱百籟收聲爾迺揚吭鼔頬載飛載鳴啁哳嗑􅊱嘹嚦呷軋或趂羣而響駛或候侣而聲遲或雙呼而雝雝或单噭而悽悽或中斷而更續比律吕之相諧于是鸛鶴為之罷唳􅀈鴡為之噤舌覊旅聞之而遐思離妻聞之而於邑此盖聲音之至極也舍人擅中吳之逸韻汛下里之煩吟攡篇掜句鍧玉鏘金若是何如公子曰歌賦尚矣然雕蟲篆刻哲人刺焉願先生少益其説也先生曰積石草腓交河凍合蛾蛾層氷皚皚疉雪爾迺審圓方之闔闢謝坎維而向離服匪垂翅于寒門爰晞羽于暘谷異往来于元鳥類屈伸于尺蠖此盖消息之大時也舍人始焉豹隠吳門迺今遘休際昌連茹彚征以應鴻漸豈徒曰好爵是嬰若是何如公子迺俛首深思而未荅也先生遂推而進之曰夫鴈有六德焉知時寒燠智也時去時来若有約劑而不爽者信也銜蘆以避戈慎也締偶不亂者介也能羣者仁也羣而有序者禮也舍人偹姱葆真襲華振若畜茲六德協于禎祥若是何如公子乃雀躍而起喟然而嘆曰嘻吁休哉夫晰萬物之情者不以通塞異觀究天人之際者不以幻化眩見故履㡬莫如謙謙承符莫如兢兢謙謙者人益之兢兢者天庇之然則来鴈之為瑞也盖亦主人之自求多福哉詎不閎哉彼諦圖測諜以覬靈者末矣于是舍人再拜謝先生先生乃去書岳將軍題大營驛莊子以子之於父為命之不可解以臣之於君為義之無所逃意若以君臣為强合予嘗疑其不然觀岳侯所題大營驛壁其處心積慮未嘗一日不在於復中原迎二帝眷眷然若赤子之於慈母然此豈無所逃而為之其亦有所不可解者乎侯之言曰君臣大倫根於天性此侯之所以自狀而吾之所謂異乎莊生者耶彼髙宗者乃忍於㤀父臣敵其獨何心且已既已忍於忘父矣有臣焉為之急於其父如侯者亦竟殺之又獨何心嗚呼綱常萬古事也其磨滅與不磨滅只在此心之死與不死而已髙宗之為心何如也宜侯之竟以殺身而中原卒不可復二帝卒不可還也大營驛故在永州侯所題字久而湮沒余父為是州乃勒之石而併侯所題廣德金沙寺勒之盖侯之心尚炯然在宇宙間未死也固不係乎石之勒不勒雖然使忠臣孝子英雄之士過而讀焉其將慷慨泣下沾襟而繼之以怒髪衝冠者乎書醫施氏婦事語曰物反嘗為妖腥穢之氣薫積世界乃有賊殺其大父者及其弟之婦與弟之婦之大父凡殺者三人其兩人即時死婦尚喘息未絶始某殺大父時婦奔呼某怒其呼也追而斷其頸至骨又刲其口婦忍死齧刀賊以手椎刀至齒根骨乃止刀前後所輳其不絶者一線耳見者莫不憐之亦莫不以為必死㑹余往無錫知金創徐君素有神効而婦家貧甚不能請醫余邀徐君謂之曰君能一往乎徐君激於義舉遂欣然請行曰我不求一錢必活此婦是我心也因與余俱至則婦勢已亟矣徐君視之曰無恙也醫三日而腐肉盡新肉生又二日而口輔上下肉合頸肉起如蓓蕾狀徐君曰生矣始余迎徐君至時余兩弟及親友劉宗堯左升甫徐子初輩聞之亦嘉甚曰是吾輩之心也至是徐君告歸諸友請醵錢為贈不約而合者若干人得銀二兩有竒徐君曰非吾所為来意也余强之曰固知非君意也雖然願少抑君之意以成諸君之義可乎徐君乃不能固辭嗟乎此可以觀人心矣徐君慨然不逺百里而来也其何所為哉諸君之慨然醵錢以醫婦也其何所為哉方徐君欲行時其妻適及月産子且徐君坐市肆可計得厚糈君乃舍其妻之急而徇乎人之妻之急舍其有所利於市肆之間而奔走其無所利於百里之外亦何心哉鄉鄰之鬬雖聖賢亦謂可以無救而簟食之費雖好名者亦所必惜以必惜之費而投之可以無救之鬬至於不約而響應若有所踴躍而不能已者亦何心哉孟子曰人皆有不忍人之心此其機在乎通與塞耳塞則骨肉胡越通則四海我闥或謂今人之非古人之心吾不信也遂書之以貽徐君而且以風世之好義者則古昔相保相愛相䘏相周之俗其亦可以興於今矣瘞河壖枯骨誌髑髏完毁凡若干具其髆髃髀䯒脊脅諸雜骨無算盖出乎犬猪烏鳶所饜飽與夫日炙燹燒風銷水囓之餘而僅有存者自癸夘至乙巳東南荐飢流尸順河而下多於河中之船逮水落不能浮尸尸遂積疊河壖久之維古昔時遇飢饉疾疫則有荒政以聚民其不幸死而暴露則又有掩骼埋胔之令惜哉其不遭乎此時也褚生滔書舍在河壖余與弟正之數往焉每相與散歩河壖之上則見泥滓間圜者如破甌撱者如枯株碎者如沙礫紛然彌望白日照之星星玭玭若尚有光怪余三人者哀其澌滅且盡也命役夫裒而坎焉嗟乎古者葬則旌之以銘旌者别也銘者自名也若曰是其人之骸云耳雖後百千年有得之者亦識之曰是某人之骸云耳古人之于骨骸嚴而别亦不欲其混也若是今乃以五方四裔雜流異業之人而又以殘毁不完之尸爾髆我股甲脊乙脅輳于一坎若藂葦亂蓬然亦重可悲矣然余嘗見元人發宋諸陵事火其尸以其餘骨雜牛馬骨而埋之今此猶尚人骨也嗟乎彼生時何等人也尚不免與牛馬骨同葬况此輩莩丐之餘猶得以人骨附人骨復何憾焉使髑髏果有知如莊生之説必且一噱于吾言矣坎之以嘉靖戊申春二月是掩骼埋胔之時也書秦風蒹葭三章後嘉靖戊申秋七月廿五日夜雷雨大作萬艘震蕩平明開霽則河水增髙四五尺矣余與褚生泛小舠如陳渡臨流歌嘯渺然有千里江湖之思因詠秦風蒹葭三章則宛如目前風景而所謂伊人者猶庶㡬見之且秦時風俗不雄心於戈矛戰鬬則癢技於獫歇射獵至其聲利所驅雖豪傑亦且側足於寺人媚子之間方以為榮而不知愧其義士亦且沈酣豢養與君為殉而不可贖盖靡然矜侠趨勢之甚矣而乃有遺世獨立澹乎埃􅅽之外若斯人者豈所謂一國之人皆若狂而此其獨醒者歟抑亦以秦之不足與而優游肥遁若後来鑿坏羊裘之徒者在當時固已有人歟余獨惜其風可聞而姓名不著不得與鑿坏羊裘並列隠逸傳然鑿坏羊裘之徒以其身而逃之蒹葭伊人者乃并其姓名而逃之此又其所以為至也噫嘻士固有不慕乎當世之榮而亦何心於後世之名也哉因慨然為之一笑遂書以示褚生書王明齋巻王君明齋精史頡氏之學博通諸家於易尤多所自得嘗以古文書六十四卦名以還科斗之舊而稍為之訓注使讀者觀於卦名即卦爻之義了然盖不待觀彖而後思過半也余見而悦之君因書一紙遺余而索余為之草書舊詩於册用以相報君始以欲學余論易故携所注易自姑蘇来寓天寧僧舍者半閲嵗余雖頗竭鄙陋以請於君君所注易與余之説兩人或相印可或不相印可或始不相印可而卒相印可或始卒竟不相印可然率余得之君者為多而余自知竟不能少禆君也至於詩歌盖昔人所謂雕蟲末伎宜為談經者所不道而草書出東漢芝象以後昌黎氏鄙之以為俗書逞姿媚者也况余於此兩者又素不工哉且夫君以經易教余余竟投之以雕蟲之技君惠我以科斗頡氏太古之書而余乃報之以效近俗姿媚之書其不相稱甚矣然不知君又何所取也漫書以歸之書丁近齋示孫卷後丁生輈從予遊出其大父近齋翁家教之語凡二紙其一教之以勤讀書取科第盖世俗教子弟之常其一教之以决擇於君子小人兩儒之間則固以古道望之而有世間家人語之所不及者矣然翁所教輈以勤讀書寔舉予為况盖余之少也或然其後年既長大則已知記誦佔畢詞章之習非所以反身而崇德况今益衰且病精力日減於是經年束書不一觀與絶不為文者亦往往有之則是余之壯且老也既已與翁所責輈少時懶散廢書之狀㡬無以異矣其尚足以為輈之所取法而無愧於翁之所稱述者哉然至於君子之儒則未嘗不竊有志焉而願與輈共勉焉其可也數論三篇勾股測望論勾股所謂矩也古人執數寸之矩而日月運行朓朒遲速之變山谿之髙深廣逺凡目力所及無不可知盖不能逃乎數也勾股之法横為勾縱為股斜為弦勾股求弦勾股自乗相併為實平方開之得弦勾股求股勾弦自乗相減為實平方開之得股股弦求勾同法盖一弦實藏一勾一股之實一勾一股之實併得一弦實也數非兩不行因勾股而得弦因股弦而得勾因勾弦而得股三者之中其兩者顯而可知其一者藏而不可知因兩以得三此勾股法之可通者也至如逺近可知而髙下不可知如卑則塔影髙則日影之類塔影之在地者可量而人足可以至於戴日之下而日與塔髙低之數不可知則是有勾而無股弦三者缺其二數不可起而勾股之法窮矣於是有立表之法盖以小勾股求大勾股也小勾股每一寸之勾為股長㡬何則大勾股每一尺之勾其長㡬何可知矣此以人目與表與所望之髙三相直而知之也人目至表小弦也人目至所望之髙大弦也又法表為小股其髙㡬何與至塔下之數相乗以小勾除之則得塔髙盖横之則為小股至塔之積縱之則為小勾至塔頂之積縱横之數恰同是變勾以為股因横而得縱者也勾股弦三者有一可知則立表之法可得而用若其髙與逺之數皆不可知而但目力可及如隔海望山之類則勾股弦三者無一可知而立表之法又窮矣於是有重表之法盖兩表相去㡬何為影差者㡬何因其差以求勾股亦可得矣立表者以通勾股之窮也重表者以通一表之窮也其實重表一表也一表勾股也無二法也勾股容方圓論凡竒零不齊之數凖之於齊圓凖之於方不齊之圓凖於齊之圓不齊之方凖於齊之方勾股容圓凖於勾股容方假令勾五股五弦七有竒此為整方均齊無較之勾股其容方徑該得勾之半盖容方積得勾股全積四分之一其取全積時勾股分在兩㢘則勾五股五五五二十五内一半為勾積一半為股積其求容方則併勾股為縱一㢘得十為長之數得濶二五與原勾相半盖始初則一半勾積一半股積横列之而為正方及取容方則股積在上勾積在下而為長方矣其容方所以止得半勾者則以勾股之數均也若勾短股長則容方以漸而濶不止於半勾矣故大半為股積小半為勾積其始横列時勾積與股同長而不同濶其從列時則股積之濶如故而勾積截長以為濶則濶與股積同而長與股積異與横列正相反此變長為濶而取容方之法也其謂之勾積股積者從容方徑與勾股相乗之數而名之也若取容圓徑則用勾股自之而倍其數以勾股與弦併為法盖容圓之徑多於容方方有四角與弦相礙故其數少圓循弦宛轉故其數多若以求容方與求容圓相比則積中恰少一段圓徑與半弦和較相乗之數弦和較者勾股併與弦相較之數也假令勾五股五相乗亦倍之得五十如求容方則亦倍勾股為法得二十亦恰得二寸五分之徑如求容圓則不用倍勾股為法而用一勾股併與一弦是以一弦代一勾股併也以一弦代一勾股併恰少一弦和較加一弦和較則亦兩勾股矣假令一勾股得十倍勾股得二十是取容方之徑一勾股得十一弦得七恰少一弦和較三是取容圓之徑其所以少一弦和較者圓徑多於方徑也假令取容圓不用勾股倍積而止用勾股本積則宜用勾股併為㢘而除去半弦和較亦得或約得圓徑之後與半弦和較相乗添積而以勾股并為㢘不除亦得或用勾股倍積用兩勾股相併為㢘而以全弦和較與約得圓徑相乗添積亦得此改方為圓之妙其機枯只寓之於弦和較間也至於勾股積與弦積亦只於勾股較中求之盖數起於㕘伍㕘伍起於畸零不齊也假令股五勾五齊數之勾股則勾股幕倍之即得弦幕盖兩勾股積而成弦積也至於勾短股長相乗之積則成一長方倍之而弦側不當中徑亦不成弦幕惟以一勾股較積補之乃能使長方為一正方而得弦積盖勾股之差愈逺則長方愈狹長方愈狹則勾股之差積愈多故勾股差者所以權長方不及正方之數以相補輳此補狹為方之法也弧矢論凡弧矢算法凖之於矢而㕘之於徑背徑求矢之法先求之背弦差而半背弦差藏之矢冪與徑相除之中倍矢冪與徑相除則全背弦差也半法簡捷故用其半冪者方眼也自乗之數必方故謂之冪假令徑十寸截矢一寸一寸隅無開方即以一寸為矢冪而以十寸之徑除之該得一分是半背弦差一分若二寸矢開方得四寸是為一寸者四半背弦差得四分三寸矢開方得九是為一寸者九半背弦差得九分皆凖之於十寸之徑故一寸之冪而差一分逓而上之視其冪以為差之多少又假令徑十三寸矢冪一寸則以十三寸之徑與一寸相除每寸該差七釐七毫弱以為半背弦差若二寸寸矢開方得四該四箇七釐七毫併之得三分八毫以為二寸矢半背弦差此凖之十三寸之徑亦逓而上之視其冪以為差之多少盖徑長則背弦之差減故一寸矢而差止七釐有竒徑短則背弦之差增故一寸矢而差及一分雖其數有增减而凖之於一寸之冪與徑相除而以漸開之每得一寸則得元差而相併以為背弦之差則其法之一定不可易者也背徑求矢矢背求徑諸法消息管於是矣至於徑積求矢一法古法以倍截積自乗為實四因截積為上㢘四因直徑為下㢘五為負隅與矢相乗以減下㢘而以上下㢘與矢除實今立一法但以截積自乗為實而遂以截積為上㢘直徑為下㢘每一寸矢帶二分五釐二寸矢則帶五分四分而增其一以減徑其倍積四因之法悉去不用頗為簡捷盖徑積求矢凖於矢徑之差矢徑差者矢徑互為升降也矢一寸則該減徑一寸二分五釐矢二寸則該減徑二寸五分而矢徑之差起於積數之不足且夫圓凖於方而畸零之圓又凖於均齊之圓以方為率徑十寸矢一寸則積必是十寸矢二寸則積必是二十寸但得積為實只約矢與徑為從平方開之足矣盖方無虛隅也又以整圓為率徑十寸矢五寸則圓積必居方積四分之三而以四之一為虛隅足矣盖雖有虛隅而其數易凖也惟是矢以漸而短則積以漸而減有不能及四分之三虛隅以漸而加有不止於四分之一者矣於是平方法與四分而一為虛隅之法皆不可用惟自乗平方之積為三乗而以四分之矢減五分之徑則不問矢之長短積與虛隅之多寡而其數皆至此而均齊猶之平方之法數有多寡而減来減去必得以均齊之數以為凖而後不齊者皆齊此天然之妙也夫積自乗而為三乗方之實則一整方耳而矢數藏焉及立法求矢則分為上下兩㢘而矢數著焉盖整方所以聚積而分㢘所以散積補短截長而方圓斜直通融為一此亦天然之妙也假令徑十寸矢一寸積該三寸五分自乗該十二寸二分五釐上㢘三寸五分下㢘十寸以三乗方開之而一寸無開方則上下㢘如元數共得十三寸五分為㢘法與一寸矢相乗除實恰少一寸二分五釐是為負隅之數所以用每矢一寸則帶二分五釐為凖以減徑然後法實相當也又如徑十寸矢二寸積該十寸自乗該百寸上㢘十寸下㢘亦十寸以三乗方開之則須以矢數乗上㢘上㢘該得二十寸盖長十寸而髙二寸之數以矢數自乗得四而乗下㢘下㢘該得四十寸盖髙十寸而濶四寸之數上下㢘共得六十寸又以矢二寸為方面與上下㢘相乗除實共二箇六十寸該得一百二十寸其數乃足而元數止得百寸恰少積二十寸所以用二寸五分以除下㢘則該止得七寸五分為下㢘其下㢘减去髙二寸五分中濶該四寸則四箇二寸五分該得十寸方面二寸與十寸相乗共二十寸恰勾負隅之數所以二寸矢則用二寸五分減法也逓而上之每寸以二分五釐為凖盖雖徑有極長極短而一寸寸矢帶二分五釐減徑之法則定數也徑積求矢矢積求徑徑矢求積諸法消息管於是矣然此二法者背弦之差則隨徑而不隨矢所以均為一寸之矢而其差則有多寡之不齊矢徑之差則隨矢而不隨徑所以但得一寸之矢則不問徑之長短而一例為差此二法之異也若以今法與舊法相通今法不倍積所以不用四因四因者生於倍積也古法之五為負隅即今之一寸帶二分五釐也盖以五乗之矢除四因之徑則亦一寸矢而減一寸二分五釐之徑也然有㢘而無方隅者盖截積止得㢘數也即此二法可見截弧截積之法皆從邊起而凖之於邊以漸消息之矣既得一寸之定差則雖倍蓰十伯錯綜變化而皆不能出乎範圍之外此天然之妙也故曰握其機而萬事理矣其弦矢求徑法半弦自乗為實而以矢除之加矢得徑是徑之數藏於半弦冪與矢相除而加矢之中也今環而通之以為背弦求矢諸法背弦求矢其半背冪中藏一箇半弦冪與矢相除而加矢之徑數藏一箇矢冪以徑數相除為背弦差之數二數消息恰得半背冪本數則矢數見矣假令徑十寸矢一寸半背弦差一分半背數三寸一分自乘得九寸六分一釐其九寸為弦冪所謂中藏半弦冪與矢相除而加矢之徑數其六分一釐乃是兩半背冪而空其一差亦名差與半背相開方之數即以與其差一分相乗之數所謂一箇矢冪以徑數相除為背弦差之數也二數消息以盡背冪而法可立矣其背矢求弦法若背矢先求出徑而後以矢徑求弦則為簡捷盖半背冪中所藏弦冪與背弦差冪今以矢冪約徑而以徑除矢冪為背弦差冪本數則徑數見矣得徑而弦在其中矣其矢弦求背亦須先得徑而後得背盖半弦冪為實乃以矢約徑以矢減之以矢乗之恰得半弦冪本數則徑數見矣得徑而背在其中矣假令矢一寸半弦三寸自乗九寸為半弦冪為實以矢約徑得十寸以矢一寸減之得九寸以矢一寸乗之得九寸恰與半弦冪相同則為徑十寸矣此背弦矢徑四者相乗除循環無窮之妙也至於徑積求矢則既然矣因而通之積矢求徑假令徑十寸矢一寸積三寸五分自乗該十二寸二分五釐乃以原積三寸五分為上㢘一寸之矢為下㢘以除自乗之積餘數得八寸七分五釐如矢帶數一寸二分五釐則為徑十寸矣又如徑十寸矢二寸積十寸自乗寸百為實矢乗積得二十寸為上㢘再矢自乗得八為下㢘以二乗上㢘消積四十以八消餘積六十得七寸五分加入矢帶數二寸五分則徑十寸矣徑積求矢則積為上㢘而徑為下㢘矢積求徑則亦積為上㢘而矢為下㢘此其縱横往来相通之妙而一乗上㢘再乗下㢘則三乗開方之定法也積矢求弦則倍其積以矢除積而減矢弦矢求積則并矢於弦以矢乗積而半其積盖矢弦并之為長以矢乗之而得兩積故半之而積可見也倍之則為矢弦相併之積以矢除之而得矢弦相併之本數除矢而弦可見也徑矢求積則先得弦而後得積盖以矢減徑以矢乗之四因得數而弦冪藏於其中平方開之得弦乃以矢自乗以矢與弦相乗合二數而半之則得積矣此又積矢徑弦四者相乗除循環無窮之妙也其徑背求矢法則以半背自乗為實而約矢以減徑以矢乘之為半弦冪而平方開之以減背其減餘之數恰與矢之背弦差數相當則矢數見矣盖半背數中藏一半弦數藏一背弦差數故合二數而消息之也徑十寸矢一寸半背三寸一分十寸之徑每一寸矢該差二分二寸矢該差四分為定差今約矢一寸以減徑得九寸以矢乗亦得九寸平方開之得三寸為半弦以除半背而餘一分恰勾一寸差數則矢之為一寸也無疑矣又如徑十寸半背四寸四分約得矢二寸以減徑餘八寸以矢乗得十六寸為弦冪平方開之為四寸以減半背四寸而餘四分恰得二寸矢之定差則矢之為二寸也無疑矣又法半背冪自乗為實中藏一箇半弦自乗之數一箇背弦差與兩半背而空出一差相乗之數亦名背弦差與背相開方之數以此兩數與實相消而矢數見矣假令徑十寸半背三寸一分其半背冪該九寸六分一釐約矢一寸與徑相減相乗如前法得九寸以除實九寸而以一寸之差一分與兩半背而空出一差之數得六寸一分與上差一分相乗得六分一釐并二數九寸六分一釐除實恰盡以是知矢之為一寸也又如半背四寸四分自乗得十九寸三分六釐為實約矢二寸與徑相減相乗如前法得十六寸以除十六寸而以二寸之差四分與兩半背而空出一差之數得八寸四分與上差四分相乗得三寸三分六釐併二數十九寸三分六釐除實恰盡以是知矢之為二寸也此其法亦始於先得定差而約矢與徑兩相消息以得矢也其徑數有長短差數有多寡亦凖此法而通之也在先得定差而已又法半徑自乗為徑冪半背自乗為背冪二冪相乗為實乃約矢以減徑以矢乗之為半弦冪與徑冪相乗以除實又以徑冪除其餘實恰得矢數之定差則矢可得矣盖二冪相乗中藏一箇徑冪與弦冪相乗之數藏一箇徑冪與半背弦差冪相乗之數而背弦差者矢之所藏也假令徑十寸矢二寸背差八分半徑自乗得二十五寸半背自乗得十九寸三分六釐相乗得四百八十四寸為實及約矢得二寸以減徑而乗之得十六寸為弦冪與徑冪相乗得四百以除實餘八十四寸又以徑冪除之得三寸三分六釐恰與二寸矢之定差相合然二寸矢之定差四分而乃有三寸三分六釐者盖始求背冪之時以兩背數相乗則四分寓其間恰得此數所謂差與背相開方之數也以四分與八寸四分相乗得三寸三分六釐故定差四分而其積則三寸三分六釐也以八寸四分除之則定差本數也夫背弦差者矢之所藏也以差立法古未有之而實求矢之大機也差徑求矢以差與徑相乗平方開之得矢差矢求徑矢自乗以差為從平方開之得徑而差與弦亦可以求矢徑半弦之冪矢除徑而矢乗徑之數也差者矢冪而徑除之之數也先約徑矢數與弦冪相同而又以徑除矢冪與差數同則得矢徑差與背求矢徑減差則得弦即差弦求矢徑也積者矢與弦并以矢除而半之之數也積弦求矢倍積為實約矢而加之於弦為從方以矢為法除之則得矢也矢積求弦矢自乗而置虛積與元積相當然後減去矢自乗之冪而以矢除其虛積與元積之并則得弦也假令矢一寸積三寸五分矢自乗得寸添積二寸五分乃與元積相當然後減去矢自乗之寸餘六寸以矢除之得弦六寸也矢二寸積十寸矢自乗得四寸加虛積六寸與元積相當减去矢自乗之寸餘十六寸以矢除之得弦八寸也如不以矢徑求弦得積而遂以矢徑求積則矢每寸截徑寸二分五釐而以矢自乗再乗以乗截餘之徑為徑積然後以徑約積而以積與矢自乗之數相乗添入徑積合為積冪而復以約積自乗亦與前積冪同數則積亦可得矣然不如得弦而後得積之為簡捷也至於殘周與弦求矢則亦用半弦自乘為實而約出矢數以除半弦冪而加矢為徑乃以徑補出全周之數而以半背數除半弦數餘為半背弦差恰得矢之定差則矢可得矣假令弦六寸殘周二十三寸八分則以半弦自乘得九為實而約出矢一寸以除實而加之得十寸為徑該周三十寸除殘周數得半背三寸一分除半弦三寸而餘一分恰得一寸矢之定差則矢一寸也又如弦八寸殘周二十一寸二分半弦自乗得十六為實約出矢二寸以除實而加之得十寸為徑該周三十寸除殘周數得半背四寸四分除半弦四寸而餘四分恰得二寸矢之定差則矢二寸也數雖如是而起算極周折惟求之弦矢徑三相權則其數可準盖徑矢求弦則以矢減徑以矢乗之為半弦冪徑弦求矢則以半弦自乗為實而以徑為益方以矢減益方而相乗除實亦是以矢减徑以矢乗之而得半弦冪也弦矢求徑則以半弦自乗以矢除之加矢而得徑由是三者輾轉求之則是半弦冪中藏却以矢減徑以矢乗之之定數以是約出矢徑而因徑以為周減其殘周而得背以半背與半弦相較而得差恰與矢之定差相同則矢數無所失矣其有不合則更約之此數雖若眇茫然凖之於以矢減徑即以矢乗必須與半弦冪相當則亦未嘗無繩墨也此意𤣥之又𤣥非至神莫知也積也矢也徑也弦也背也殘周也差也凡七者轉相為法而轉相求共得三百二十六法而後盡渾然一圓圈而中含錯綜變化乃至於此嗚呼豈非所謂至妙至妙者哉書瘞枯骨志碑陰始余與褚生之欲瘞枯骨也盖偶有感於所見而未暇徧所不及者也偶盡一二人之力所能及以無歉乎此心之所感而非有意於人之我同也偶以河壖不毛之隙地可以瘞焉而非有擇於其地也已而朋聞是舉者競出錢相助而褚生父怡閒翁又以河壖地卑濕逼水非所以棲骨乃割菜地之一隅以瘞之於是城旁枯骨得盡瘞焉而又得髙燥地以免於後日水囓之患嗚呼此可見惻隠怵惕人人所同惟無所感而亦無為之倡者耳使義舉更有大於此者而有人焉倡之人其有不翕然而趨之若是者哉君子是以知善俗之有機也因書出錢人姓名於隂而附著其説云荆川集卷十二
